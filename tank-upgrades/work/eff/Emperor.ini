Object Tank_ChinaTankEmperor

  ; *** ART Parameters ***
  SelectPortrait         = SNEmpTank_L
  ButtonImage            = SNEmpTank
  
  UpgradeCameo1 = Upgrade_ChinaUraniumShells
  UpgradeCameo2 = Upgrade_ChinaNuclearTanks
  UpgradeCameo3 = Upgrade_ChinaOverlordGattlingCannon
  UpgradeCameo4 = Upgrade_TankLightArmor
  UpgradeCameo5 = Upgrade_ChinaSubliminalMessaging
  
  Draw = W3DOverlordTankDraw ModuleTag_01
    ConditionState        = NONE
      Model               = NVEmperor
      Animation           = NVEmperor.NVEmperor
      AnimationMode       = LOOP
      Turret              = Turret01
      WeaponFireFXBone    = SECONDARY Muzzle
      WeaponRecoilBone    = SECONDARY Barrel
      WeaponMuzzleFlash   = SECONDARY MuzzleFX
      WeaponLaunchBone    = SECONDARY Muzzle
    End
    ConditionState        = REALLYDAMAGED
      Model               = NVEmperor_D
      Animation           = NVEmperor_D.NVEmperor_D
      AnimationMode       = LOOP
      Turret              = Turret01
      WeaponFireFXBone    = SECONDARY Muzzle
      WeaponRecoilBone    = SECONDARY Barrel
      WeaponMuzzleFlash   = SECONDARY MuzzleFX
      WeaponLaunchBone    = SECONDARY Muzzle
    End

    ConditionState        = RUBBLE
      Model               = NVEmperor_D
      Animation           = NVEmperor_D.NVEmperor_D
      AnimationMode       = LOOP
      Turret              = Turret01
      WeaponRecoilBone    = SECONDARY Barrel
      HideSubObject       = MuzzleFX01 MuzzleFX02
    End

    TrackMarks           = EXTnkTrack.tga
    OkToChangeModelColor = Yes
    TreadAnimationRate = 2.0;  amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End
  
  Draw = W3DModelDraw ModuleTag_ArtArmor01
    
    ConditionState = NONE
      Model               = None
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE

    
    ConditionState = POWER_PLANT_UPGRADED
      Model               = NVEArmor
      Turret              = TURRET01
    End
    
    ConditionState = POWER_PLANT_UPGRADED REALLYDAMAGED
      Model               = NVEArmor_D
      Turret              = TURRET01
    End
    
    ConditionState = POWER_PLANT_UPGRADED RUBBLE
      Model               = NVEArmor_D
      Turret              = TURRET01
    End
    
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:Tank_Overlord
  Side                = ChinaTankGeneral
  EditorSorting       = VEHICLE
  TransportSlotCount  = 6                 ;how many "slots" we take in a transport (0 == not transportable)
  EnergyBonus         = 0  ;defining this just incase
  
  WeaponSet
    Conditions        = None
    
    Weapon            = PRIMARY Tank_OverlordTankGun_Dummy
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_AI FROM_SCRIPT
    PreferredAgainst  = PRIMARY UNATTACKABLE

    Weapon            = SECONDARY Tank_OverlordTankGun
    AutoChooseSources = SECONDARY FROM_PLAYER FROM_AI FROM_SCRIPT
    ; zzz-ZZZZZZZVehicleKit: the cannon's 'PreferredAgainst = SECONDARY INFANTRY' moved to the
    ; TERTIARY coax - preferred weapons all tie at HUGE_DAMAGE and the tie goes to
    ; the lowest slot (WeaponSet.cpp chooseBestWeaponForTarget), so keeping it on
    ; the cannon would leave the coax permanently unselected.

    Weapon            = TERTIARY ShwBattleMasterCoaxMGWeapon ; zzz-ZZZZZZZVehicleKit: innate coaxial MG (battlemaster-coax hitscan weapon, reused).  NOT in the PLAYER_UPGRADE set: that set's TERTIARY is the manual anti-air dummy for the mounted gattling turret (all 3 slots full) - once the gattling rider is bought it supersedes the coax as the anti-infantry weapon.
    PreferredAgainst  = TERTIARY INFANTRY
  End
  
  WeaponSet
    Conditions        = PLAYER_UPGRADE
    
    Weapon            = PRIMARY Tank_OverlordTankGun_Dummy
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_AI FROM_SCRIPT
    PreferredAgainst  = PRIMARY UNATTACKABLE

    Weapon            = SECONDARY Tank_OverlordTankGun
    AutoChooseSources = SECONDARY FROM_PLAYER FROM_AI FROM_SCRIPT
    PreferredAgainst  = SECONDARY INFANTRY

    Weapon            = TERTIARY Tank_GattlingBuildingGunAirDummy ;Dummy weapon that allows manual targeting of air units outside range
    PreferredAgainst  = TERTIARY AIRCRAFT
  End
  
  ArmorSet
    Conditions        = None
    Armor             = TankArmor
    DamageFX          = HeavyTankDamageFX
  End
  
  ArmorSet
    Conditions        = PLAYER_UPGRADE
    Armor             = TankArmor
    DamageFX          = HeavyTankEraDamageFX
  End
  
  BuildCost       = 2400
  BuildTime       = 20.0          ;in seconds    
  VisionRange     = 150
  ShroudClearingRange = 200
  Prerequisites
    Object = Tank_ChinaWarFactory
    Object = Tank_ChinaPropagandaCenter
  End

  ExperienceValue = 200 200 400 600   ;Experience point value at each level
  ExperienceRequired = 0 400 800 1400  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 3  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 3  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = Tank_ChinaTankEmperorDefaultCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = EmperorTankVoiceSelect
  SoundMoveStart = EmperorTankMoveStart
  SoundMoveStartDamaged = EmperorTankMoveStart
  VoiceMove = EmperorTankVoiceMove
  VoiceGuard = EmperorTankVoiceMove
  VoiceAttack = OverlordTankVoiceAttack

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate          = EmperorOverlordTankVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = OverlordTankTurretMoveLoop
    VoiceCrush = OverlordTankVoiceCrush
    VoiceEnter = EmperorTankVoiceMove
    VoiceUnload     = OverlordTankVoiceUnload
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE HUGE_VEHICLE
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 1100
    InitialHealth   = 1100

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 2200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = MaxHealthUpgrade ModuleTag_KD_Armor1 ; zzz-KwaiDoctrine: +10% of base 1320.0 for Tank_ChinaTankEmperor
    TriggeredBy   = Tank_Upgrade_KwaiVehicleArmor1
    AddMaxHealth  = 132.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End
  Behavior = MaxHealthUpgrade ModuleTag_KD_Armor2 ; zzz-KwaiDoctrine: +10% of base 1320.0 for Tank_ChinaTankEmperor
    TriggeredBy   = Tank_Upgrade_KwaiVehicleArmor2
    AddMaxHealth  = 132.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End
  Behavior = MaxHealthUpgrade ModuleTag_KD_Armor3 ; zzz-KwaiDoctrine: +10% of base 1320.0 for Tank_ChinaTankEmperor
    TriggeredBy   = Tank_Upgrade_KwaiVehicleArmor3
    AddMaxHealth  = 132.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End
  Behavior = MaxHealthUpgrade ModuleTag_KD_Armor4 ; zzz-KwaiDoctrine: +10% of base 1320.0 for Tank_ChinaTankEmperor
    TriggeredBy   = Tank_Upgrade_KwaiVehicleArmor4
    AddMaxHealth  = 132.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End
  Behavior = WeaponBonusUpgrade ModuleTag_KD_Tungsten01 ; zzz-KwaiDoctrine
    TriggeredBy = Tank_Upgrade_KwaiTungstenShells
  End

  Behavior = VeterancyGainCreate ModuleTag_23
    StartingLevel = VETERAN
  End

  Behavior = TransportAIUpdate ModuleTag_03
    Turret
      TurretTurnRate = 60
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY 
    End
    AutoAcquireEnemiesWhenIdle = Yes
    TurretsLinked = Yes
  End

  Locomotor = SET_NORMAL OverlordLocomotor
  Locomotor = SET_NORMAL_UPGRADED NuclearOverlordLocomotor

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_04
    DeathWeapon   = NuclearTankDeathWeapon
    StartsActive  = No                        ; turned on by upgrade
    TriggeredBy   = Upgrade_ChinaNuclearTanks
  End

  Behavior = LocomotorSetUpgrade ModuleTag_05
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End
  
  Behavior = MaxHealthUpgrade ModuleTag_Armor_01
    TriggeredBy   = Upgrade_TankLightArmor
    AddMaxHealth  = 100.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End
  
  Behavior = ArmorUpgrade ModuleTag_Armor_02
    TriggeredBy  = Upgrade_TankLightArmor
  End
  
  Behavior = PowerPlantUpgrade ModuleTag_ArmorUpgradeVissual01
    TriggeredBy = Upgrade_TankLightArmor
  End

  Behavior = PowerPlantUpdate ModuleTag_ArmorUpgradeVissual02
    RodsExtendTime = 33
  End

  Behavior = FireWeaponUpdate ModuleTag_22231451254
    Weapon = ChinesePropagandaDecalWeapon
  End
  
  Behavior = HelixContain ModuleTag_06 ; EmperorBunker mod: was OverlordContain. Gattling rider lives in HelixContain's dedicated rider slot; infantry use the passenger seats.
    Slots                   = 8 ; zzz-ZZZZZZZKwaiPDL: was 10 - freed exit-cameo slot 9 for the PDL purchase button
    DamagePercentToUnits    = 15% ; PassengerSurvival (was 0%)
    AllowInsideKindOf       = INFANTRY
    ForbidInsideKindOf      = AIRCRAFT VEHICLE BOAT
    EnterSound              = GarrisonEnter
    ExitSound               = GarrisonExit
    ExitDelay               = 100
    NumberOfExitPaths       = 1
    PassengersAllowedToFire = Yes
  End

  Behavior = ObjectCreationUpgrade ModuleTag_07
    UpgradeObject = OCL_Tank_OverlordGattlingCannon
    TriggeredBy   = Upgrade_ChinaOverlordGattlingCannon
    ConflictsWith = Tank_Upgrade_KwaiPDL ; zzz-ZZZZZZZKwaiPDL: PDL pod owns the rider slot
  End

  Behavior = ProductionUpdate ModuleTag_10
     MaxQueueEntries = 1
  End

  Behavior = WeaponSetUpgrade ModuleTag_WeaponSetUpgrade01
    TriggeredBy = Upgrade_ChinaOverlordGattlingCannon
  End

  Behavior = PhysicsBehavior ModuleTag_14
    Mass = 50.0
  End
  
  Behavior        = PropagandaTowerBehavior ModulePropaganda_15
    Radius                        = 150.0
    DelayBetweenUpdates           = 2000 ; in milliseconds
    HealPercentEachSecond         = 1%   ; get this % of max health every second 
    PulseFX                       = FX_EmperorPropagandaPulse ;plays as often as DelayBetweenUpdates
    UpgradeRequired               = Upgrade_ChinaSubliminalMessaging
    UpgradedHealPercentEachSecond = 2%   ; get this % of max health every second 
    UpgradedPulseFX               = FX_EmperorPropagandaPulse ;plays as often as DelayBetweenUpdates
    AffectsSelf                   = Yes ; Needs this since Tower is not seperate object for Emperor
  End

  ; Just explode death
  Behavior = SlowDeathBehavior ModuleTag_16
    ProbabilityModifier = 25
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL    OCL_ChinaTankEmperorDebris
    FX  = FINAL    FX_OverlordExplosionOneFinal
  End
  Behavior = CreateCrateDie ModuleTag_17
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End

  Behavior = TransitionDamageFX ModuleTag_18
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_OverlordDamageTransition
  End

  ;Shtora Active Protection System -- ported from ShockWave Chaos (zzz-ZZZZChaosUnits)
  ;Auto path: FireWeaponWhenDamaged fires GolemTankShtoraAIWeapon (30s clip;
  ;this engine checks READY_TO_FIRE, so the cooldown IS respected) whose FireOCL
  ;launches 2 blinding grenades and spawns an 8s slaved defence object that
  ;pulses MASKED (untargetable) onto the tank.  Reaction weapons are per-body-
  ;state (engine onDamage), so the REALLYDAMAGED slot is also wired -- donor set
  ;only the DAMAGED slot, which would disarm the APS in red state.  The manual-
  ;ability module trio is kept for donor fidelity (no button: the set is full).
  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_ShtoraAuto01
    StartsActive  = Yes
    DamageTypes   = ALL
    ReactionWeaponDamaged       = GolemTankShtoraAIWeapon
    ReactionWeaponReallyDamaged = GolemTankShtoraAIWeapon
    DamageAmount    = 30  ; if damage is >= this value, fire the weapon
  End
  Behavior           = OCLSpecialPower ModuleTag_Shtora01
    SpecialPowerTemplate = SpecialAbilityRussianShtora
    OCL                  = OCL_UniversalAbbilityTrigger
    CreateLocation       = USE_OWNER_OBJECT
  End
  Behavior = FireWeaponCollide ModuleTag_Shtora02
    CollideWeapon  = GolemInvulnerabilityActivationWeapon
    RequiredStatus = USING_ABILITY
  End
  Behavior = MissileLauncherBuildingUpdate ModuleTag_Shtora03
    SpecialPowerTemplate = SpecialAbilityRussianShtora
    DoorOpenTime         = 1650
    DoorWaitOpenTime     = 1650
    DoorCloseTime        = 7000
  End
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Taunt02
    UpgradeObject = OCL_OverlordTauntObject
    TriggeredBy   = Upgrade_GLAWorkerFakeCommandSet
  End

  Behavior = ObjectCreationUpgrade ModuleTag_KPDL_Mount01 ; zzz-ZZZZZZZKwaiPDL: mounts the PDL pod (rider slot contested by the Gattling-cannon rider)
    UpgradeObject = Tank_OCL_KwaiPDLPod
    TriggeredBy   = Tank_Upgrade_KwaiPDL
    ConflictsWith = Upgrade_ChinaOverlordGattlingCannon
  End
  Behavior = CommandSetUpgrade ModuleTag_KPDL_CmdSet01 ; zzz-ZZZZZZZKwaiPDL: hide the gattling button once the PDL pod is mounted
    CommandSet  = Tank_ChinaTankEmperorPDLCommandSet
    TriggeredBy = Tank_Upgrade_KwaiPDL
  End
  Behavior = CommandSetUpgrade ModuleTag_KPDL_CmdSet02 ; zzz-ZZZZZZZKwaiPDL: hide the PDL button once the gattling cannon is mounted
    CommandSet  = Tank_ChinaTankEmperorGattlingCommandSet
    TriggeredBy = Upgrade_ChinaOverlordGattlingCannon
  End
  Behavior = EjectPilotDie ModuleTag_HijackerEmerge01
    DeathTypes = ALL -CRUSHED -SPLATTED
    RequiredStatus = HIJACKED
    VeterancyLevels =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList = OCL_HijackerEmergeViaParachute
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = ObjectCreationUpgrade ModuleTag_GP_Crew01 ; zzz-ZZZZZZZZZZZ0GrenadierResearch: Panzergrenadiers crew (2 Panzergrenadier + 2 Panzerjager)
    UpgradeObject = Tank_OCL_GrenadierCrewEmperor
    TriggeredBy   = Tank_Upgrade_GrenadierPanzergrenadiers
  End
  Behavior = ObjectCreationUpgrade ModuleTag_GP_Crew03 ; zzz-ZZZZZZZZZZZ0GrenadierResearch: Emperor's Guard crew (+1 Flame + 1 Shock + 1 Sharpshooter + 1 Minigunner -> fills the 8-slot bay)
    UpgradeObject = Tank_OCL_EmperorGuardCrew
    TriggeredBy   = Tank_Upgrade_GrenadierEmperorGuard
  End
  ; ------------------------------------------------------------------------------
  ; zzz-ZZZZZZZZZZZZ0EmperorDefense: Emperor Defense Suite -- 4 gated defensive systems (ADDED; all prior
  ; modules -- crew, Shtora, propaganda, gattling/PDL riders, doctrine -- preserved).
  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_EDS_PDL01 ; zzz-ZZZZZZZZZZZZ0EmperorDefense: System 1 Hull Point-Defense Laser (reactive anti-missile LASER burst; Shtora APS idiom)
    StartsActive  = No
    TriggeredBy   = Tank_Upgrade_EmperorPDL
    DamageTypes   = ALL
    ReactionWeaponPristine      = Tank_EmperorPDLWeapon
    ReactionWeaponDamaged       = Tank_EmperorPDLWeapon
    ReactionWeaponReallyDamaged = Tank_EmperorPDLWeapon
    DamageAmount    = 40  ; only heavy hits (rockets/missiles/shells) trigger the pulse
  End
  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_EDS_ABM01 ; zzz-ZZZZZZZZZZZZ0EmperorDefense: System 2 ABM Interceptor Array (stronger/wider, also anti-ballistic; requires PDL)
    StartsActive  = No
    TriggeredBy   = Tank_Upgrade_EmperorABM
    DamageTypes   = ALL
    ReactionWeaponPristine      = Tank_EmperorABMWeapon
    ReactionWeaponDamaged       = Tank_EmperorABMWeapon
    ReactionWeaponReallyDamaged = Tank_EmperorABMWeapon
    DamageAmount    = 25  ; wider trigger window -> more interceptor pulses
  End
  Behavior = MaxHealthUpgrade ModuleTag_EDS_Shield01 ; zzz-ZZZZZZZZZZZZ0EmperorDefense: System 3 Projected Energy Shield -- +2000 absorption buffer (Mammoth Energy-Shield idiom, scaled)
    TriggeredBy   = Tank_Upgrade_EmperorShield
    AddMaxHealth  = 2000.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End
  Behavior = AutoHealBehavior ModuleTag_EDS_Shield02 ; zzz-ZZZZZZZZZZZZ0EmperorDefense: System 3 shield recharge (Automated-Repair idiom)
    StartsActive  = No
    TriggeredBy   = Tank_Upgrade_EmperorShield
    HealingAmount = 40
    HealingDelay  = 1000
  End
  Behavior = PropagandaTowerBehavior ModuleTag_EDS_Fleet01 ; zzz-ZZZZZZZZZZZZ0EmperorDefense: System 4 Fleet Shield Projection -- gated regen field to nearby fleet (speaker-tower idiom; requires Shield)
    Radius                        = 200.0
    DelayBetweenUpdates           = 2000
    HealPercentEachSecond         = 0%   ; gated OFF until researched (UpgradeRequired toggles the upgraded rate)
    UpgradeRequired               = Tank_Upgrade_EmperorFleetShield
    UpgradedHealPercentEachSecond = 2%   ; projected shield regen once researched
    PulseFX                       = FX_EmperorPropagandaPulse
    UpgradedPulseFX               = FX_EmperorPropagandaPulse
    AffectsSelf                   = No
  End
  ; ------------------------------------------------------------------------------
  ; emperor-innate-pdl: INNATE always-on proactive Point-Defense Laser (ADDED; every prior
  ; module -- crew, HelixContain bay, Shtora APS, propaganda, gattling/PDL riders,
  ; doctrine armour, defense-suite EDS_* -- preserved). Direct vehicle module, the
  ; Avenger idiom: no upgrade gate, no rider pod, no contain slot. Reuses Kwai's
  ; PDL weapon so FX/sound match the rest of Kwai's point-defense lasers.
  Behavior = PointDefenseLaserUpdate ModuleTag_EmperorInnatePDL ; emperor-innate-pdl: always-on from spawn
    WeaponTemplate              = Tank_KwaiPDLLaserWeapon
    PrimaryTargetTypes          = BALLISTIC_MISSILE SMALL_MISSILE
    ScanRate                    = 0
    ScanRange                   = 160.0 ; > weapon AttackRange 100 (PointDefenseLaserUpdate engine assert); matches PDLPod
    PredictTargetVelocityFactor = 1.0
  End
  Geometry = BOX
  GeometryMajorRadius = 26.0
  GeometryMinorRadius = 13.0
  GeometryHeight = 15.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME     
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length

End