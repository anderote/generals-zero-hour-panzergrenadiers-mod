;;; zzz-ZZZZZZZKwaiPDL: Tank_ChinaPDLPod - invisible Point Defense Laser rider pod.
;;; Shape donor: ChinaBlackSharkMissileJammerModule (ShockWave's own
;;; PORTABLE_STRUCTURE rider with a PointDefenseLaserUpdate and Model = NONE
;;; - proof the module scans and fires while mounted/contained).
;;; Weapon: Avenger point-defense laser clone (beam + pulse sound).
;;; Deviations from the jammer donor (documented):
;;;   - VisionRange 200 -> 0 (must not extend the host vehicle's vision)
;;;   - no StealthDetectorUpdate (that is the jammer's ECM flavor; a mass
;;;     $500 pod granting stealth detection would be a balance leak)
;;;   - no FireWeaponUpdate radius-decal weapon (cosmetic ring dropped)
;;;   - PrimaryTargetTypes = SMALL_MISSILE per spec (Avenger also lists
;;;     BALLISTIC_MISSILE; SCUD-class interception is deliberately out)
;;; NO VeterancyBoost fields: the engine patch for that is not deployed
;;; yet - a follow-up layer flips it on once the engine supports it.
Object Tank_ChinaPDLPod

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    ConditionState = NONE
      Model = NONE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:KwaiPDLPod
  Side             = ChinaTankGeneral
  EditorSorting    = SYSTEM
  TransportSlotCount = 1

  ArmorSet
    Conditions     = None
    Armor          = InvulnerableAllArmor ; We can't be hurt on the field.  We share damage from the host with his damage module
  End
  VisionRange     = 0

  ; *** AUDIO Parameters ***
  UnitSpecificSounds
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound
    VoiceRapidFire  = NoSound
  End

  ; *** ENGINEERING Parameters ***
  KindOf            = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK CLICK_THROUGH IGNORED_IN_GUI
  Body            = StructureBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = PointDefenseLaserUpdate ModuleTag_KPDL_Laser01
    WeaponTemplate        = Tank_KwaiPDLLaserWeapon
    PrimaryTargetTypes    = SMALL_MISSILE
    ScanRate              = 0
    ScanRange             = 160.0 ; must exceed the weapon's 100 AttackRange (engine assert)
    PredictTargetVelocityFactor = 1.0
  End

  Behavior             = DestroyDie ModuleTag_04
    ;nothing
  End

  Geometry            = BOX
  GeometryMajorRadius = 8.0
  GeometryMinorRadius = 8.0
  GeometryHeight      = 9.0
  GeometryIsSmall     = No
  Shadow              = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length

End
