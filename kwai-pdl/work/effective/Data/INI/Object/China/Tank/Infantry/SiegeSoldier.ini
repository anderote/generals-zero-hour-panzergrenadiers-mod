; zzz-ZZZZZKwaiRoster: build stub letting China's Tank General (Kwai) produce
; the vanilla China Siege Soldier (mortar infantry; donor prereq
; ChinaBarracks translated to Tank_ChinaBarracks).
; Same BuildVariations idiom ShockWave uses for Tank_ChinaVehicleHackerVan,
; SupW_AmericaJetRaptor (aircraft) and AirF_AmericaInfantryPathfinder (infantry).

Object Tank_ChinaInfantrySiegeSoldier

  ; *** ART Parameters ***
  SelectPortrait         = SNSiegeSoldier_L
  ButtonImage            = SNConscript

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    DefaultConditionState
      Model               = AISTNG_SKN
    End
  End

  ; set cost and time fields here or else they won't work
  BuildCost       = 600
  BuildTime       = 8.0          ;in seconds

  Prerequisites
    Object = Tank_ChinaBarracks
  End

  Side = ChinaTankGeneral
  EditorSorting = INFANTRY
  BuildVariations = ChinaInfantrySiegeSoldier

  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS INFANTRY SCORE NO_GARRISON BOAT

End
