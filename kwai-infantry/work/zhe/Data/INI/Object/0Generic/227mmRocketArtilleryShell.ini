;------------------------------------------------------------------------------
Object 227mmHERocket

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = EX227mmRKT
      ParticleSysBone = None GenericMRLMissileStreakLenzflare
      ParticleSysBone = None GenericMRLMissileStreak
      ParticleSysBone = None GenericMRLMissileExhaust
    End
    ConditionState = JAMMED
      Model = EX227mmRKT
      ParticleSysBone = None SparksMedium
      ParticleSysBone = None GenericMRLMissileStreakLenzflare
      ParticleSysBone = None GenericMRLMissileStreak
      ParticleSysBone = None GenericMRLMissileExhaust
    End
  End

  ; *** AUDIO parameters ***
  SoundAmbient = MissilesIncomingWhistle

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:HERocket
  EditorSorting = SYSTEM
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    Armor = InterceptableProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_227mmHERocketHitWater
    Weapon = 227mmRocketArtilleryWaterCollideWeapon
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -DETONATED -FLOODED -EXPLODED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = NONE +EXPLODED
    FX = FX_MediumGenericProjectileDeath
  End
  ; ---- end Projectile death behaviors
  
  Behavior = DumbProjectileBehavior ModuleTag_Projectile01
    DetonateCallsKill = No
    FirstHeight = 175
    SecondHeight = 175
    FirstPercentIndent = 30%
    SecondPercentIndent = 70%
    FlightPathAdjustDistPerSecond = 0
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 10.0
    AllowCollideForce = No
    KillWhenRestingOnGround = Yes
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

