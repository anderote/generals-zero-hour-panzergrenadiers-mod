;------------------------------------------------------------------------------
Object 155mmArtilleryBarrageContainer

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0.0  
  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** AUDIO Parameters ***
  SoundMoveStart = ArtilleryBarrageActivationSound
  
  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf = PRELOAD CAN_ATTACK VEHICLE AIRCRAFT UNATTACKABLE IGNORED_IN_GUI
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 200.0
    InitialHealth = 200.0
  End

  Behavior = DestroyDie ModuleTag_Death01
  End
 
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 1.0
  End

  Behavior = DeliverPayloadAIUpdate ModuleTag_AI01
  End
  Locomotor = SET_NORMAL RocketAssistedArtilleryContainerLocomotor

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

;------------------------------------------------------------------------------
Object 155mmArtilleryBarrageShell

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = EX105mmSHL
      ParticleSysBone = None ArtilleryShellTrail
      ParticleSysBone = None ArtilleryShellExhaust
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0.0  
  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** AUDIO Parameters ***
  SoundAmbient = ArtilleryIncomingWhistle

  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf = PRELOAD PROJECTILE
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 75.0
    InitialHealth = 75.0
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_GenericArtilleryShellHitWater
    Weapon = 155mmArtilleryWaterCollideWeapon
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
    FX = FX_155mmArtilleryShellDetonation
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -DETONATED -FLOODED -EXPLODED
    OCL = OCL_155mmArtilleryWaterChecker
    FX = FX_155mmArtilleryShellDetonation
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = NONE +EXPLODED
    FX = FX_SmallGenericProjectileDeath
  End
  ; ---- end Projectile death behaviors

  Behavior = MissileAIUpdate ModuleTag_AI01
    DetonateCallsKill = Yes
    FuelLifetime = 60000
    InitialVelocity = 200
    IgnitionDelay = 0
  End
  Locomotor = SET_NORMAL RocketAssistedArtilleryShellLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    AllowCollideForce = No
    KillWhenRestingOnGround = Yes
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

