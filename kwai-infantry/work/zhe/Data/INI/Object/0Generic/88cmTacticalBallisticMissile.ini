;------------------------------------------------------------------------------
Object 88cmTacticalMissile

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TacticalBallisticMissile
  EditorSorting = SYSTEM
  VisionRange = 0.0  
  ArmorSet
    Conditions = None
    Armor = BallisticMissileArmor
    DamageFX = None
  End

  ; *** AUDIO parameters ***
  SoundAmbient = TacticalMissileIncomingWhistle

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE BALLISTIC_MISSILE
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 400.0
    InitialHealth = 400.0
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_88cmTacticalMissileHitWater
    Weapon = 88cmTacticalMissileWaterCollideWeapon
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -DETONATED -FLOODED -EXPLODED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = NONE +EXPLODED
    FX = FX_MediumGenericProjectileDeath
  End
  ; ---- end Projectile death behaviors
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 50.0
    AllowCollideForce = No
  End
  
  Behavior = MissileAIUpdate ModuleTag_AI01
    TryToFollowTarget = No 
    FuelLifetime = 30000
    IgnitionDelay = 0
    InitialVelocity = 50
    IgnitionFX = FX_CruiseMissileIgnition
    DistanceToTravelBeforeTurning = 750
    DistanceToTargetBeforeDiving = 750
  End
  Locomotor = SET_NORMAL TacticalBallisticMissileLocomotor

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
  Shadow = SHADOW_DECAL
  ShadowSizeX = 7
  ShadowSizeY = 30
  ShadowTexture = ShadowI
End

