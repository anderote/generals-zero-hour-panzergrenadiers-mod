Object 82mmMortarAnthraxShell_IndicatorObject

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = None
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    Armor = WaterCheckerArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = UNATTACKABLE IGNORED_IN_GUI

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Anthrax
    DeathWeapon = BM41AnthraxMortarWeapon_AnthraxDamage
    StartsActive = Yes
    ConflictsWith = Upgrade_GLAAnthraxGamma Upgrade_GLAAnthraxBeta
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Beta
    DeathWeapon = BM41AnthraxMortarWeapon_AnthraxBetaDamage
    StartsActive = No
    ConflictsWith = Upgrade_GLAAnthraxGamma
    TriggeredBy = Upgrade_GLAAnthraxBeta
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Gamma
    DeathWeapon = BM41AnthraxMortarWeapon_AnthraxDamage
    StartsActive = No
    ConflictsWith = Upgrade_GLAAnthraxBeta
    TriggeredBy = Upgrade_GLAAnthraxGamma
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 1.0
    AllowCollideForce = No
  End

  Behavior = LifetimeUpdate ModuleTag_Delete01
    MinLifetime = 1
    MaxLifetime = 1
  End

  Geometry = Cylinder
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 1.0
  GeometryIsSmall = Yes
End

