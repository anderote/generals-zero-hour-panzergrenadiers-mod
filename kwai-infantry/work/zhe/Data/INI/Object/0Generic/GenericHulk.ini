;------------------------------------------------------------------------------
Object GenericBikeHulk

  ; ***DESIGN parameters ***
  EditorSorting = DEBRIS

  ArmorSet
    Conditions = None
    Armor = DebrisArmor
    DamageFX = CrushableCarDamageFX
  End

  CrushableLevel = 1
  
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD IGNORED_IN_GUI EMP_HARDENED IMMUNE_TO_CAPTURE VEHICLE CLEARED_BY_BUILD

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 25.0
    InitialHealth = 25.0
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 10.0
    AllowBouncing = Yes
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL StationaryLocomotor
  
  Behavior = InstantDeathBehavior ModuleTag_Death01
    DeathTypes = ALL
    OCL = OCL_CrushedDebris
    FX = FX_HulkDie
  End

  Behavior = LifetimeUpdate ModuleTag_Death02
    MinLifetime = 900000
    MaxLifetime = 1200000
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Hulk01
    Weapon = SelfUnmanVehicleWeapon
  End

  Geometry = Box
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 7.5
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End

