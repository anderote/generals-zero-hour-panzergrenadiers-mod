;------------------------------------------------------------------------------
Object CleanupHazardProjectileStream

  ; *** ART Parameters ***
  Draw = W3DProjectileStreamDraw ModuleTag_W3D01
    Texture = EXCleanupStream.dds
    Width = 1.5
    TileFactor = 2.0
    ScrollRate = 6.0
    MaxSegments = 0
  End

  ; *** ENGINEERING Parameters ***
  KindOf = INERT
  Behavior = ProjectileStreamUpdate ModuleTag_StreamUpdate
  End
End

;------------------------------------------------------------------------------
Object CleanupStreamProjectile

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = None 
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0.0  
  ArmorSet
    Conditions = None
    Armor = UnsinkableProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = DestroyDie ModuleTag_Death01
  End
    
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 1
    AllowCollideForce = No
  End

  Behavior = MissileAIUpdate ModuleTag_AI01
    TryToFollowTarget = No 
    FuelLifetime = 500
    InitialVelocity = 120
    IgnitionDelay = 0
    DistanceToTravelBeforeTurning = 2
  End
  Locomotor = SET_NORMAL ToxinTruckStreamLocomotor

  Behavior = BoneFXUpdate ModuleTag_BoneFX01
    PristineParticleSystem1 = bone:None OnlyOnce:No  0  0 PSys:CleanupTrail01
    PristineParticleSystem2 = bone:None OnlyOnce:No  0  0 PSys:CleanupTrail02
  End

  Behavior = BoneFXDamage ModuleTag_BoneFX02
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2.0
End
