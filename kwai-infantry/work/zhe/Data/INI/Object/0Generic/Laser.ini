Object AvengerPointDefenseLaserBeam

  ; *** ART Parameters ***
  Draw = W3DLaserDraw ModuleTag_W3D01
    Texture = exlaser_1mid.tga
    NumBeams = 3
    InnerBeamWidth = 2
    InnerColor = R:255 G:255 B:255 A:100
    OuterBeamWidth = 0.5
    OuterColor = R:255 G:255 B:255 A:10
    Tile = Yes
    ScrollRate = -2500   
    Segments = 1
    SegmentOverlapRatio = 0
    TilingScalar = -3 
    MaxIntensityLifetime = 45 
    FadeLifetime = 95
  End

  KindOf = IMMOBILE INERT
  
  ClientUpdate = LaserUpdate ModuleTag_LaserUpdate
    MuzzleParticleSystem = PaladinPointDefenseLaserFlare
    TargetParticleSystem = AvengerDestroySmoke
  End

  Behavior = LifetimeUpdate ModuleTag_Delete01
    MinLifetime = 95
    MaxLifetime = 95
  End
  
  Behavior = DestroyDie ModuleTag_Death01
  End
End

