;------------------------------------------------------------------------------
Object 36cmGenericAirToGroundJetMissile

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0.0  

  ArmorSet
    Conditions = None
    Armor = SubualableProjectileArmor
    DamageFX = None
  End
  
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_GenericGroundMissileHitWater
    Weapon  = 36cmATGAntiTankRocketWaterCollideWeapon
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -FLOODED -DETONATED -EXPLODED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = NONE +EXPLODED
    FX = FX_SmallGenericProjectileDeath
  End
  ; ---- end Projectile death behaviors

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 3.0
    AllowCollideForce = No
    KillWhenRestingOnGround = Yes
  End
  
  Behavior = MissileAIUpdate ModuleTag_AI01
    DetonateOnNoFuel = Yes
    DetonateCallsKill = Yes
    TryToFollowTarget = Yes
    FuelLifetime = 3000
    InitialVelocity = 300
    IgnitionDelay = 100
    IgnitionFX = FX_GenericRocketIgnition
    DistanceScatterWhenJammed = 100
    DistanceToTargetBeforeDiving = 100
    DistanceToTravelBeforeTurning = 25
  End
  Locomotor = SET_NORMAL GenericAirToGroundMissileLocomotor

  Geometry = Sphere
  GeometryIsSmall = No
  GeometryMajorRadius = 1.0
End
