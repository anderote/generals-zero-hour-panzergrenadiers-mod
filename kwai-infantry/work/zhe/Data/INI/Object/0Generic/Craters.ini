;------------------------------------------------------------------------------
Object GenericBlasterCrater

  ; ***DESIGN parameters ***
  Side = ALL
  EditorSorting = SYSTEM
  
  ; *** ENGINEERING Parameters ***
  CrushableLevel = 1
  KindOf = STRUCTURE IMMOBILE BLAST_CRATER STICK_TO_TERRAIN_SLOPE EMP_HARDENED SHRUBBERY
  
  ArmorSet
    Conditions = None
    Armor = CraterArmor
    DamageFX = DefaultDamageFX
  End

  Body = ImmortalBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL
    SinkDelay = 0
    SinkRate = 1.0
    DestructionDelay = 10000
  End

  Shadow = SHADOW_VOLUME
End

