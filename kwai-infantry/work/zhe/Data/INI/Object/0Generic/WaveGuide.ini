; -----------------------------------------------------------------------------
Object WaveGuide
  
  ; *** DESIGN Parameters ***
  EditorSorting = SYSTEM

  ; *** ENGINEERING Parameters ***
  KindOf = WAVEGUIDE
  Body = ImmortalBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End  
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL WaterWaveLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 50.0
  End
  
  Behavior = WaveGuideUpdate ModuleTag_WaveGuide
    WaveDelay = 750
    YSize = 650.0
    LinearWaveSpacing = 15.0
    WaveBendMagnitude = 500.0
    WaterVelocity = 2.7
    PreferredHeight = 37.3
    ShorelineEffectDistance = 5.0
    DamageRadius = 25.0
    DamageAmount = 99999
    ToppleForce = 0.25
    RandomSplashSound = WaveRandomSplash
    RandomSplashSoundFrequency = 50
    BridgeParticle = WaveHitBridge01
    BridgeParticleAngleFudge = -95.0
    LoopingSound = DamBreakWaveLoop
  End
  
  Geometry = Sphere
  GeometryMajorRadius = 1.0
  GeometryIsSmall = Yes
End

