;------------------------------------------------------------------------------
Object FirestormSmall

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = None
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:FireStorm
  EditorSorting = SYSTEM
  KindOf = IMMOBILE NO_COLLIDE

  ; ***AUDIO parameters ***
  SoundAmbient= FireStormLoop

  ; *** ENGINEERING Parameters ***  
  Body = InactiveBody ModuleTag_Body01
  End
  Behavior = FirestormDynamicGeometryInfoUpdate ModuleTag_Firestorm
    InitialDelay = 800
    InitialHeight = 10.0
    InitialMajorRadius = 65.0
    FinalHeight = 10.0
    FinalMajorRadius = 75.0
    TransitionTime = 3000
    ReverseAtTransitionTime = Yes
    ParticleOffsetZ = 0.1
    ParticleSystem1 = FireStormMain
    ParticleSystem2 = FireStormMainRing
    ParticleSystem3 = FireStormSmoke
    ParticleSystem4 = FireStormSmokeAfter
    ParticleSystem5 = FireStormSmokeAfterField
    ParticleSystem6 = GenericHugeEmber
    FXList = FX_FireStorm
    DelayBetweenDamageFrames = 300
    DamageAmount = 320.0
  End

  Behavior = LifetimeUpdate ModuleTag_Delete01
    MinLifetime = 10000
    MaxLifetime = 10000
  End
  
  Geometry = Cylinder
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 1.0
  GeometryIsSmall = No
End

