;------------------------------------------------------------------------------
Object GenericRecoilessRifleShell

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ConditionState = NONE
      Model = EXGunShell
      ParticleSysBone = None TankShellTrail
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  ArmorSet
    Armor = ArmourPiercingShellArmor
  End
  VisionRange = 0.0  

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_GenericGroundMissileHitWater
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -FLOODED -DETONATED -EXPLODED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = NONE +EXPLODED
    FX = FX_SmallGenericProjectileDeath
  End
  ; ---- end Projectile death behaviors

  Behavior = DumbProjectileBehavior ModuleTag_Projectile01
    DetonateCallsKill = No
    FirstHeight = 1
    SecondHeight = 1
    FirstPercentIndent = 33% 
    SecondPercentIndent = 66%
    FlightPathAdjustDistPerSecond = 0
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    AllowCollideForce = No
    KillWhenRestingOnGround = Yes
  End

  Scale = 0.70
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

;------------------------------------------------------------------------------
Object GenericRecoilessRifleShellWaterChecker

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = None
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    Armor = WaterCheckerArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = UNATTACKABLE IGNORED_IN_GUI

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_GenericGroundMissileHitWater
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -FLOODED
    FX = FX_GenericGroundMissileHitGround
  End
  ; ---- end Projectile death behaviors
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 1.0
    AllowCollideForce = No
  End

  Behavior = LifetimeUpdate ModuleTag_Delete01
    MinLifetime = 1
    MaxLifetime = 1
  End

  Geometry = Cylinder
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 1.0
  GeometryIsSmall = Yes
End
