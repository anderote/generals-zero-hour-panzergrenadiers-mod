Object FireFieldMediumRandomizer

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  KindOf = IMMOBILE CLEANUP_HAZARD STICK_TO_TERRAIN_SLOPE INERT NO_COLLIDE

  ArmorSet
    Conditions = None
    Armor = HazardousMaterialArmor
  End

  ; *** ENGINEERING Parameters ***
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = LifetimeUpdate ModuleTag_Weapon01
    MinLifetime = 10
    MaxLifetime = 10
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Prob01
    DeathTypes = ALL -SUICIDED
    ProbabilityModifier = 10
    OCL = INITIAL OCL_FireFieldMedium
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Prob02
    DeathTypes = ALL -SUICIDED
    ProbabilityModifier = 90
  End

  Behavior = DestroyDie ModuleTag_Death01
    DeathTypes = NONE +SUICIDED
  End

  Geometry = Cylinder
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 1.0
  GeometryIsSmall = No
End

