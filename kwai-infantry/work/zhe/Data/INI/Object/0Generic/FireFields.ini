;------------------------------------------------------------------------------
Object FireFieldSmall

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = None
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  KindOf = IMMOBILE NO_COLLIDE STICK_TO_TERRAIN_SLOPE INERT

  ArmorSet
    Conditions = None
    Armor = HazardousMaterialArmor
  End

  ; *** AUDIO Parameters ***
  SoundAmbient = GenericFireSmallLoop

  ; *** ENGINEERING Parameters ***
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Weapon01
    Weapon = SmallFireFieldWeapon
  End

  Behavior = DeletionUpdate ModuleTag_Delete01
    MinLifetime = 15000
    MaxLifetime = 15000
  End
  
  ; Prevents stacking of fields with a small blast of cleaning at the core at startup
  Behavior = FireWeaponUpdate ModuleTag_Hazard01
    Weapon = 10Radius_HazardFieldCoreWeapon
  End

  Geometry = Cylinder
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 1.0
  GeometryIsSmall = No
End

