      ParticleSysBone = None FireWallSegmentSystem
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  KindOf = NO_COLLIDE UNATTACKABLE

  ; *** ENGINEERING Parameters ***  
  Body = ImmortalBody ModuleTag_Body01
