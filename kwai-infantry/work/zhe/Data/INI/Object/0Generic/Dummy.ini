Object GenericProjectile

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ConditionState = NONE
      Model = None
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0

  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE NO_COLLIDE

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  ; ---- begin death behaviors
  Behavior = DestroyDie ModuleTag_Death01
  End

  Behavior = DumbProjectileBehavior ModuleTag_Projectile01
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

