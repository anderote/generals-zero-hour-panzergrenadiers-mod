Object DragonTankFlameProjectile

  EditorSorting = SYSTEM
  BuildVariations = 0DragonFlame 0DragonFlame 0DragonFlame 0DragonFlame 0DragonFlame 0DragonFlame 0DragonFlame 0DragonFlame 0DragonFlame 1DragonFlame
End

;------------------------------------------------------------------------------
Object 0DragonFlame

; Explanation - Particles can't do damage, so this is a fast shooting low 
; damage invisible missile launcher with a flame trail for exhaust

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = None 
    End
  End
  ; Must have a draw module to be allowed to draw detonation FX

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0.0  
  ArmorSet
    Conditions = None
    Armor = UnsinkableProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = DestroyDie ModuleTag_Death01
  End
    
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 1.0
    AllowCollideForce = No
  End
  
  Behavior = MissileAIUpdate ModuleTag_AI01
    DetonateCallsKill = Yes
    TryToFollowTarget = No 
    FuelLifetime = 500
    DetonateOnNoFuel = Yes
    InitialVelocity = 250
    IgnitionDelay = 0
    DistanceToTravelBeforeTurning = 1
    DistanceToTargetForLock = 0
  End
  Locomotor = SET_NORMAL DragonTankFlameLocomotor

  Behavior = BoneFXUpdate ModuleTag_BoneFX01
    PristineParticleSystem1 = bone:None OnlyOnce:No 0 0 PSys:FlameThrowerTrail01
    PristineParticleSystem2 = bone:None OnlyOnce:No 0 0 PSys:FlameThrowerTrail02
    PristineParticleSystem3 = bone:None OnlyOnce:No 0 0 PSys:FlameThrowerTrail03
    PristineParticleSystem4 = bone:None OnlyOnce:No 0 0 PSys:FlameThrowerTrail04
    PristineParticleSystem5 = bone:None OnlyOnce:No 0 0 PSys:FlameThrowerTrail05
    PristineParticleSystem6 = bone:None OnlyOnce:No 0 0 PSys:FlameThrowerTrail06
    PristineParticleSystem7 = bone:None OnlyOnce:No 0 0 PSys:FlameThrowerTrail07
    PristineParticleSystem8 = bone:None OnlyOnce:No 0 0 PSys:FlameThrowerTrail08
  End

  Behavior = BoneFXDamage ModuleTag_BoneFX02
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

