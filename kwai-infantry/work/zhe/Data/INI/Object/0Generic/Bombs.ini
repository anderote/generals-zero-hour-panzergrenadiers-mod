;------------------------------------------------------------------------------
Object GenericLaserGuidedBomb

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 50.0
    InitialHealth = 50.0
  End
  
  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_2000lbLGBHitWater
    Weapon = 2000lbBombWaterCollideWeapon
  End
  Behavior = InstantDeathBehavior ModuleTag_Death01
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -FLOODED -DETONATED -EXPLODED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = NONE +EXPLODED
    FX = FX_MediumGenericProjectileDeath
  End
  ; ---- end Projectile death behaviors
  
  Behavior = DumbProjectileBehavior ModuleTag_AI01
    DetonateCallsKill = No
    FirstHeight = -20
    SecondHeight = -45
    FirstPercentIndent = 30%
    SecondPercentIndent = 70%
    FlightPathAdjustDistPerSecond = 240
  End
  
  Behavior = SmartBombTargetHomingUpdate ModuleTag_AI02
    CourseCorrectionScalar = 0.99
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 20.0
    AerodynamicFriction = 0.3
    ForwardFriction = 22
    PitchRollYawFactor = 0.1
    CenterOfMassOffset = 5
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

