;------------------------------------------------------------------------------
Object AnthraxFieldLarge

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  KindOf = IMMOBILE CLEANUP_HAZARD STICK_TO_TERRAIN_SLOPE INERT NO_COLLIDE
  ArmorSet
    Conditions = None
    Armor = HazardousMaterialArmor
  End

  ; ***AUDIO parameters ***
  SoundAmbient = ToxicPoolAmbientLoop

  ; *** ENGINEERING Parameters ***  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 400.0
    InitialHealth = 400.0
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Weapon01
    Weapon = LargeAnthraxFieldWeapon
  End

  Behavior = LifetimeUpdate ModuleTag_Delete01
    MinLifetime = 45000
    MaxLifetime = 45000
  End
  
  ; Prevents stacking of fields with a small blast of cleaning at the core at startup
  Behavior = FireWeaponUpdate ModuleTag_Hazard01
    Weapon = 30Radius_HazardFieldCoreWeapon
  End

  Behavior = DestroyDie ModuleTag_Death01
  End

  Behavior = FXListDie ModuleTag_07
    DeathFX = FX_ToxicPoolDie
  End
  
  Geometry = Cylinder
  GeometryMajorRadius = 70.0
  GeometryHeight = 1.0
  GeometryIsSmall = No
End

