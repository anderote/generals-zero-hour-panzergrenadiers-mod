  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Weapon01
    StartsActive = Yes
    DeathWeapon = C4SatchelChargeDetonationWeapon
  End

  Geometry = Cylinder
  GeometryMajorRadius = 8.0
  GeometryHeight = 8.0
  GeometryIsSmall = Yes
End

