;------------------------------------------------------------------------------
Object FlamingInfantry

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = CIBURN_SKN
      Animation = CIBURN_SKL.CIBURN_RNA 
      AnimationMode = LOOP
      Flags = RANDOMSTART
      ParticleSysBone = Bone_FX1 GenericFireField_Continuous
    End

    ConditionState = DYING
      Animation = CIBURN_SKL.CIBURN_FLA
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      ParticleSysBone = Bone_FX1 GenericFireField_Continuous
      AnimationSpeedFactorRange = 1.00 1.15
    End  
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:FlamingInfantry
  Side = Civilian
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  ArmorSet
    Conditions = None
    Armor = HumanArmor
    DamageFX = None
  End
  VisionRange = 0

  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf = CAN_CAST_REFLECTIONS INFANTRY UNATTACKABLE

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 50.0
    InitialHealth = 50.0
  End

  Behavior = WanderAIUpdate ModuleTag_AI01
  End
  Locomotor = SET_NORMAL PanicHumanLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
  End

  Behavior = SquishCollide ModuleTag_Physics02
  End

  Behavior = LifetimeUpdate ModuleTag_Delete01
    MinLifetime = 3000
    MaxLifetime = 3000
  End

  Behavior = SlowDeathBehavior ModuleTag_Death01
    SinkDelay = 12000
    SinkRate = 1.0
    DestructionDelay = 18500
  End

  Behavior = FXListDie ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_GIDie
  End
  
  Behavior = FXListDie ModuleTag_Death03
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_InfantryDieCrushed
  End

  Scale = 0.90
  Geometry = Cylinder
  GeometryMajorRadius = 3.0
  GeometryMinorRadius = 3.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
End

