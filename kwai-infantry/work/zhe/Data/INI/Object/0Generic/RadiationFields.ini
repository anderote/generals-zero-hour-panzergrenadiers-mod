
;------------------------------------------------------------------------------
Object RadiationFieldLarge

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = None
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  ; srj asks: should this also be STICK_TO_TERRAIN_SLOPE?
  KindOf = IMMOBILE CLEANUP_HAZARD INERT NO_COLLIDE STICK_TO_TERRAIN_SLOPE
  ArmorSet
    Conditions = None
    Armor = HazardousMaterialArmor
  End

  ; ***AUDIO parameters ***
  SoundAmbient = RadiationPoolAmbientLoop

  ; *** ENGINEERING Parameters ***  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 500.0
    InitialHealth = 500.0
  End
  Behavior = FireWeaponUpdate ModuleTag_FireWeapon01
    Weapon = LargeRadiationFieldWeapon
  End

  Behavior = LifetimeUpdate ModuleTag_Delete01
    MinLifetime = 180000
    MaxLifetime = 180000
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Hazard01
    Weapon = 30Radius_HazardFieldCoreWeapon
  End

  Behavior = DestroyDie ModuleTag_Death01
  End

  Behavior = FXListDie ModuleTag_07
    DeathFX = FX_RadiationPoolDie
  End
  
  Geometry = Cylinder
  GeometryMajorRadius = 100.0
  GeometryHeight = 1.0
  GeometryIsSmall = No
End

