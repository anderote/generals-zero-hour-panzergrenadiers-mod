;------------------------------------------------------------------------------
Object RallyPointMarker

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = SCMRally
      Animation = SCMRally.SCMRally
      AnimationMode = LOOP
    End
  End

  ; *** DESIGN parameters ***
  EditorSorting = SYSTEM
  KindOf = DRAWABLE_ONLY

  Scale = 0.80
End

