Object WaypointLine

  ; *** ART Parameters ***
  Draw = W3DLaserDraw ModuleTag_W3D01
    Texture = EXLaser.tga
    NumBeams = 4
    InnerBeamWidth = 0.5
    InnerColor = R:0 G:0 B:0 A:250
    OuterBeamWidth = 0.5
    OuterColor = R:0 G:0 B:0 A:150
  End

  ; *** DESIGN parameters ***
  EditorSorting = SYSTEM
  KindOf = DRAWABLE_ONLY
End

;------------------------------------------------------------------------------
Object VerticalArrow

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = SCMArrow
      Animation = SCMArrow.SCMArrow
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 0.5 0.5
    End
  End

  ; *** DESIGN parameters ***
  EditorSorting = SYSTEM
  KindOf = NO_COLLIDE INERT

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL ArrowLocomotor
End

