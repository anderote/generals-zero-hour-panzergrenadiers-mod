;------------------------------------------------------------------------------
Object ChinaTankECM

  ; *** ART Parameters ***
  SelectPortrait = SNbanshee_L
  ButtonImage = SNbanshee
  
  ;UpgradeCameo1 = NONE
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTankDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = NVZDD89
      Turret = Turret
      TurretPitch = TurretEL
      HideSubObject = Smoke_Launch Jammer_Pole01 Jammer_Pole02
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponFireFXBone = TERTIARY SL
      WeaponLaunchBone = TERTIARY SL
      TransitionKey = TRANS_None
    End
    
    ConditionState = MOVING
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_None
    End

    ConditionState = DAMAGED
      Model = NVZDD89_D
      TransitionKey = TRANS_None
    End

    ConditionState = DAMAGED MOVING
      Model = NVZDD89_D
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_None
    End

    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVZDD89_E
      Animation = NVZDD89_E.NVZDD89_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      TransitionKey = TRANS_ReallyDamaged
    End

    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = NVZDD89_E
      Animation = NVZDD89_E.NVZDD89_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_ReallyDamaged
    End

    TransitionState = TRANS_None TRANS_ReallyDamaged
      Model = NVZDD89_E1
      Animation = NVZDD89_E1.NVZDD89_E1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_ReallyDamaged TRANS_None
      Model = NVZDD89_E1
      Animation = NVZDD89_E1.NVZDD89_E1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    TrackMarks = NVTnkTracks2.dds
    TreadAnimationRate = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  Draw = W3DModelDraw ModuleTag_W3D02
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes
    IgnoreConditionStates = RIDER1
    
    DefaultConditionState
      Model = NVZDD89_A1
      Animation = NVZDD89_A1.NVZDD89_A1
      AnimationMode = MANUAL
      Turret = Turret
      TransitionKey = TRANS_Undeployed
    End
    
    ConditionState = RIDER2
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_Deployed
      ParticleSysBone = WeaponB01 ECMJammerSonar
      ParticleSysBone = None ECMJammerRadialSonar
    End
    AliasConditionState = RIDER4
    
    ConditionState = DAMAGED
      Model = NVZDD89_A1D
      Animation = NVZDD89_A1D.NVZDD89_A1D
      AnimationMode = MANUAL
      Turret = Turret
      TransitionKey = TRANS_Damaged_Undeployed
    End
    
    ConditionState = RIDER2 DAMAGED
      Model = NVZDD89_A1D
      Animation = NVZDD89_A1D.NVZDD89_A1D
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_Damaged_Deployed
      ParticleSysBone = WeaponB01 ECMJammerSonar
      ParticleSysBone = None ECMJammerRadialSonar
    End
    AliasConditionState = RIDER4 DAMAGED
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVZDD89_A1E
      Animation = NVZDD89_A1E.NVZDD89_A1E
      AnimationMode = MANUAL
      Turret = Turret
      TransitionKey = TRANS_ReallyDamaged_Undeployed
    End
    
    ConditionState = RIDER2 REALLYDAMAGED RUBBLE
      Model = NVZDD89_A1E
      Animation = NVZDD89_A1E.NVZDD89_A1E
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_ReallyDamaged_Deployed
      ParticleSysBone = WeaponB01 ECMJammerSonar
      ParticleSysBone = None ECMJammerRadialSonar
    End
    AliasConditionState = RIDER4 REALLYDAMAGED RUBBLE
    
    ; ------- Transition Animations
    TransitionState = TRANS_Undeployed TRANS_Deployed
      AnimationMode = ONCE
    End
    
    TransitionState = TRANS_Deployed TRANS_Undeployed
      AnimationMode = ONCE_BACKWARDS
    End
    
    TransitionState = TRANS_Damaged_Undeployed TRANS_Damaged_Deployed
      Model = NVZDD89_A1D
      Animation = NVZDD89_A1D.NVZDD89_A1D
      AnimationMode = ONCE
    End
    
    TransitionState = TRANS_Damaged_Deployed TRANS_Damaged_Undeployed
      Model = NVZDD89_A1D
      Animation = NVZDD89_A1D.NVZDD89_A1D
      AnimationMode = ONCE_BACKWARDS
    End
    
    TransitionState = TRANS_ReallyDamaged_Undeployed TRANS_ReallyDamaged_Deployed
      Model = NVZDD89_A1E
      Animation = NVZDD89_A1E.NVZDD89_A1E
      AnimationMode = ONCE
    End
    
    TransitionState = TRANS_ReallyDamaged_Deployed TRANS_ReallyDamaged_Undeployed
      Model = NVZDD89_A1E
      Animation = NVZDD89_A1E.NVZDD89_A1E
      AnimationMode = ONCE_BACKWARDS
    End
    ; -------
  End
    
  Draw = W3DModelDraw ModuleTag_Deploy
    DefaultConditionState
      Model = None
    End
    AliasConditionState = DAMAGED
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
    AliasConditionState = RIDER2 RUBBLE
    AliasConditionState = RIDER4 RUBBLE
    
    ConditionState = RIDER2
      Model = EXDeploy
    End
    AliasConditionState = RIDER4
    AliasConditionState = RIDER2 DAMAGED
    AliasConditionState = RIDER4 DAMAGED
    AliasConditionState = RIDER2 REALLYDAMAGED
    AliasConditionState = RIDER4 REALLYDAMAGED
  End
  
  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model = None
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:ECMTank
  Side = China
  EditorSorting = VEHICLE
  TransportSlotCount = 5

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY ECMTankVehicleDisabler
  End
  WeaponSet
    Conditions = WEAPON_RIDER1 
    Weapon = PRIMARY ECMTankVehicleDisabler
  End
  WeaponSet
    Conditions = WEAPON_RIDER2
    Weapon = PRIMARY ECMTankVehicleDisabler_JammerMode
  End
  WeaponSet
    Conditions = WEAPON_RIDER3
    Weapon = PRIMARY ECMTankVehicleDisabler
    Weapon = TERTIARY 8xVehicleSmokeGrenadeLaunchWeapon
    AutoChooseSources = TERTIARY NONE
  End
  WeaponSet
    Conditions = WEAPON_RIDER4
    Weapon = PRIMARY ECMTankVehicleDisabler_JammerMode
    Weapon = TERTIARY 8xVehicleSmokeGrenadeLaunchWeapon
    AutoChooseSources = TERTIARY NONE
  End

  ArmorSet
    Conditions = None
    Armor = APCArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 1500
  BuildTime = 30.0
  VisionRange = 150
  ShroudClearingRange = 150
  Prerequisites
    Object = ChinaWarFactory
    Object = ChinaResearchFacility
  End

  ExperienceValue = 50 50 100 150
  ExperienceRequired = 0 100 150 300
  IsTrainable = Yes
  CrusherLevel = 2
  CrushableLevel = 2
  CommandSet = ChinaVehicleECMTankCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = FrequencyJammerVoiceSelect
  VoiceMove = FrequencyJammerVoiceMove
  VoiceGuard = FrequencyJammerVoiceMove
  VoiceAttack = FrequencyJammerVoiceAttack
  SoundMoveLoop = TrackedIFVV2MoveLoop
  SoundAmbient = TrackedIFVV2AmbientLoop

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = FrequencyJammerVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    VoiceCrush = NoSound
    VoiceEnter = FrequencyJammerVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE HUGE_VEHICLE SCORE CANNOT_RETALIATE SALVAGER ATTACK_NEEDS_LINE_OF_SIGHT

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 240.0
    InitialHealth = 240.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      ControlledWeaponSlots = PRIMARY
      TurretTurnRate = 60
      TurretPitchRate = 60
      AllowsPitch = Yes
    End
    AutoAcquireEnemiesWhenIdle = Yes NotWhileAttacking
    MoodAttackCheckRate = 250
  End
  Locomotor = SET_NORMAL ZTD89Locomotor
  Locomotor = SET_SLUGGISH StationaryLocomotor
  
  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 40.0
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_ChinaTankECM_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL OCL_ChinaTankECM_DeathEffect_BlowUp
    FX = FINAL FX_GenericTankDeathExplosion
  End

  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 60
    DestructionDelay = 100
    DestructionDelayVariance  = 50
    OCL = FINAL OCL_ChinaTankECM_DeathEffect
    FX = FINAL FX_GenericTankDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 30000
    OCL = INITIAL OCL_ChinaTankECM_CatchFire
    FX = INITIAL FX_GenericTankCatchFire
    OCL = FINAL OCL_ChinaTankECM_DeathEffect
    FX = FINAL FX_GenericTankDeathExplosion
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End
  
  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = RiderChangeContain ModuleTag_Upgrade01
    Rider1 = UpgradeViaRiderSwitch1 RIDER1 WEAPON_RIDER1 STATUS_RIDER1 ChinaVehicleECMTankCommandSet SET_NORMAL
    Rider2 = UpgradeViaRiderSwitch2 RIDER2 WEAPON_RIDER2 STATUS_RIDER2 ChinaVehicleECMTankDeployedCommandSet SET_SLUGGISH
    Rider3 = UpgradeViaRiderSwitch3 RIDER3 WEAPON_RIDER3 STATUS_RIDER3 ChinaVehicleECMTankUpgradedCommandSet SET_NORMAL
    Rider4 = UpgradeViaRiderSwitch4 RIDER4 WEAPON_RIDER4 STATUS_RIDER4 ChinaVehicleECMTankDeployedUpgradedCommandSet SET_SLUGGISH

    InitialPayload = UpgradeViaRiderSwitch1 1
    ScuttleDelay = 0
    Slots = 1
    ScatterNearbyOnExit = No
    HealthRegen%PerSec = 0%
    DamagePercentToUnits = 0%
    BurnedDeathToUnits = No
    AllowInsideKindOf = INFANTRY
    ExitDelay = 0
    NumberOfExitPaths = 1
    GoAggressiveOnExit = No
    DoorOpenTime = 0
  End
  
  Behavior = OCLSpecialPower ModuleTag_Upgrade02
    SpecialPowerTemplate = SpecialAbilityUndeployMode
    OCL = OCL_UpgradeViaRiderSwitch1
  End

  Behavior = OCLSpecialPower ModuleTag_Upgrade03
    SpecialPowerTemplate = SpecialAbilityDeployMode
    OCL = OCL_UpgradeViaRiderSwitch2
  End

  Behavior = ObjectCreationUpgrade ModuleTag_Upgrade04
    TriggeredBy = Upgrade_SmokeScreenDischargerAddon
    UpgradeObject = OCL_UpgradeViaRiderSwitch3
  End
  
  Behavior = OCLSpecialPower ModuleTag_Upgrade05
    SpecialPowerTemplate = SpecialAbilityUndeployUpgraded1Mode
    OCL = OCL_UpgradeViaRiderSwitch3
  End

  Behavior = OCLSpecialPower ModuleTag_Upgrade06
    SpecialPowerTemplate = SpecialAbilityDeployUpgraded1Mode
    OCL = OCL_UpgradeViaRiderSwitch4
  End

  Behavior = FireWeaponUpdate ModuleTag_Move01
    Weapon = IngeniousTankMovementWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move02
    Weapon = IngeniousTankCheckerWeapon
  End
  
  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End
  
  Behavior = FireWeaponCollide ModuleTag_Jammer01
    CollideWeapon = ECMTankMissileJammer
    RequiredStatus = STATUS_RIDER2
    ForbiddenStatus = UNSELECTABLE
  End

  Behavior = SubObjectsUpgrade ModuleTag_Addon01
    TriggeredBy = Upgrade_SmokeScreenDischargerAddon
    ShowSubObjects = Smoke_Launch
  End

  Behavior = OCLSpecialPower ModuleTag_SmokeGenerator01
    SpecialPowerTemplate = SpecialAbilitySmokeScreenGenerator
    OCL = OCL_GenericVehicleSmokeGeneratorSmokeScreen
  End  

  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  ; --- end detector modules ---
  
  Geometry = Box
  GeometryMajorRadius = 19.0
  GeometryMinorRadius = 11.0
  GeometryHeight = 24.0     
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End
