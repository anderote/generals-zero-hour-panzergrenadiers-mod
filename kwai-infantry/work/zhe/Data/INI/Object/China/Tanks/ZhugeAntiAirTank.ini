    SpawnReplaceDelay = 0
    SpawnTemplateName = TankWaterCheckerSlaveContainer
    CanReclaimOrphans = No
    SpawnedRequireSpawner = Yes
    SlavesHaveFreeWill = No
  End

  Behavior = QueueProductionExitUpdate ModuleTag_Move02
    UnitCreatePoint = X:0.0 Y:0.0 Z:0.0
    NaturalRallyPoint = X:0.0 Y:0.0 Z:0.0
    InitialBurst = 1
  End
  
  Behavior = ProductionUpdate ModuleTag_Move03
    MaxQueueEntries = 1
  End
  
  Behavior = RiderChangeContain ModuleTag_Upgrade01
    Rider1 = UpgradeViaRiderSwitch1 RIDER1 WEAPON_RIDER1 STATUS_RIDER1 ChinaTankZhugeAntiAirAGModeCommandSet SET_NORMAL
    Rider2 = UpgradeViaRiderSwitch2 RIDER2 WEAPON_RIDER2 STATUS_RIDER2 ChinaTankZhugeAntiAirAAModeCommandSet SET_SLUGGISH

    InitialPayload = UpgradeViaRiderSwitch1 1
    ScuttleDelay = 0
    Slots = 1
    ScatterNearbyOnExit = No
    HealthRegen%PerSec = 0%
    DamagePercentToUnits = 0%
    BurnedDeathToUnits = No
    AllowInsideKindOf = INFANTRY
    ExitDelay = 0
    NumberOfExitPaths = 1
    GoAggressiveOnExit = No
    DoorOpenTime = 0
  End
  
  Behavior = OCLSpecialPower ModuleTag_Upgrade02
    SpecialPowerTemplate = SpecialAbilityAntiGroundMode
    OCL = OCL_UpgradeViaRiderSwitch1
  End

  Behavior = OCLSpecialPower ModuleTag_Upgrade03
    SpecialPowerTemplate = SpecialAbilityAntiAirMode
    OCL = OCL_UpgradeViaRiderSwitch2
  End

