Object ChinaTankZhugeAntiAir

  ; *** ART Parameters ***
  SelectPortrait = SNZhugeAA_L
  ButtonImage = SNZhugeAA
  
  UpgradeCameo1 = Upgrade_Nationalism
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTankDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes
    
    DefaultConditionState
      Model = NVPGZ95
      Turret = Turret
      TurretPitch = TurretEL
      HideSubObject = HouseColor12 Radar_Uplink Radar_Connect Radar_Legs Radar_Dish
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponRecoilBone = PRIMARY Barrel
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponFireFXBone = SECONDARY WeaponB
      WeaponMuzzleFlash = SECONDARY IgnitionFX
      WeaponLaunchBone = SECONDARY WeaponB
      WeaponFireFXBone = TERTIARY SL
      WeaponLaunchBone = TERTIARY SL
      TransitionKey = TRANS_None
    End
    
    ConditionState = MOVING
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_None
    End

    ConditionState = DAMAGED
      Model = NVPGZ95_D
      TransitionKey = TRANS_None
    End
    
    ConditionState = DAMAGED MOVING
      Model = NVPGZ95_D
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_None
    End

    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVPGZ95_E
      Animation = NVPGZ95_E.NVPGZ95_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      TransitionKey = TRANS_ReallyDamaged
    End
    
    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = NVPGZ95_E
      Animation = NVPGZ95_E.NVPGZ95_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_ReallyDamaged
    End

    ConditionState = RIDER2
      WeaponFireFXBone = TERTIARY WeaponA
      WeaponRecoilBone = TERTIARY Barrel
      WeaponMuzzleFlash = TERTIARY MuzzleFX
      WeaponLaunchBone = TERTIARY WeaponA
      WeaponFireFXBone = PRIMARY SL
      WeaponLaunchBone = PRIMARY SL
      TransitionKey = TRANS_None
    End
    
    ConditionState = RIDER2 MOVING
      ParticleSysBone = Engine01 VehicleSmoke
      WeaponFireFXBone = TERTIARY WeaponA
      WeaponRecoilBone = TERTIARY Barrel
      WeaponMuzzleFlash = TERTIARY MuzzleFX
      WeaponLaunchBone = TERTIARY WeaponA
      WeaponFireFXBone = PRIMARY SL
      WeaponLaunchBone = PRIMARY SL
      TransitionKey = TRANS_None
    End

    ConditionState = RIDER2 DAMAGED
      Model = NVPGZ95_D
      WeaponFireFXBone = TERTIARY WeaponA
      WeaponRecoilBone = TERTIARY Barrel
      WeaponMuzzleFlash = TERTIARY MuzzleFX
      WeaponLaunchBone = TERTIARY WeaponA
      WeaponFireFXBone = PRIMARY SL
      WeaponLaunchBone = PRIMARY SL
      TransitionKey = TRANS_None
    End
    
    ConditionState = RIDER2 DAMAGED MOVING
      Model = NVPGZ95_D
      ParticleSysBone = Engine01 VehicleSmoke
      WeaponFireFXBone = TERTIARY WeaponA
      WeaponRecoilBone = TERTIARY Barrel
      WeaponMuzzleFlash = TERTIARY MuzzleFX
      WeaponLaunchBone = TERTIARY WeaponA
      WeaponFireFXBone = PRIMARY SL
      WeaponLaunchBone = PRIMARY SL
      TransitionKey = TRANS_None
    End

    ConditionState = RIDER2 REALLYDAMAGED RUBBLE
      Model = NVPGZ95_E
      Animation = NVPGZ95_E.NVPGZ95_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      WeaponFireFXBone = TERTIARY WeaponA
      WeaponRecoilBone = TERTIARY Barrel
      WeaponMuzzleFlash = TERTIARY MuzzleFX
      WeaponLaunchBone = TERTIARY WeaponA
      WeaponFireFXBone = PRIMARY SL
      WeaponLaunchBone = PRIMARY SL
      TransitionKey = TRANS_ReallyDamaged
    End
    
    ConditionState = RIDER2 REALLYDAMAGED RUBBLE MOVING
      Model = NVPGZ95_E
      Animation = NVPGZ95_E.NVPGZ95_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Engine01 VehicleSmoke
      WeaponFireFXBone = TERTIARY WeaponA
      WeaponRecoilBone = TERTIARY Barrel
      WeaponMuzzleFlash = TERTIARY MuzzleFX
      WeaponLaunchBone = TERTIARY WeaponA
      WeaponFireFXBone = PRIMARY SL
      WeaponLaunchBone = PRIMARY SL
      TransitionKey = TRANS_ReallyDamaged
    End

    TransitionState = TRANS_None TRANS_ReallyDamaged
      Model = NVPGZ95_E1
      Animation = NVPGZ95_E1.NVPGZ95_E1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_ReallyDamaged TRANS_None
      Model = NVPGZ95_E1
      Animation = NVPGZ95_E1.NVPGZ95_E1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    ExtraPublicBone = TreadFX01
    ExtraPublicBone = TreadFX02
    ExtraPublicBone = TreadFX03
    ExtraPublicBone = TreadFX04
    
    RecoilSettleSpeed = 20
    MaxRecoilDistance = 2.0
    TrackMarks = NVTnkTracks2.dds
    TreadAnimationRate = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  Draw = W3DModelDraw ModuleTag_Radar
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = NVPGZ95_A1
      Animation = NVPGZ95_A1.NVPGZ95_A1
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
      Turret = Turret
    End
    
    ConditionState = DAMAGED
      Model = NVPGZ95_A1D
      Animation = NVPGZ95_A1D.NVPGZ95_A1D
    End
    
    ConditionState = REALLYDAMAGED
      Model = NVPGZ95_A1E
      Animation = NVPGZ95_A1E.NVPGZ95_A1E
    End
    
    ConditionState = RUBBLE
      Model = NVPGZ95_A1E
      Animation = NVPGZ95_A1E.NVPGZ95_A1E
      AnimationMode = MANUAL
    End
  End
    
  Draw = W3DModelDraw ModuleTag_Deploy
    DefaultConditionState
      Model = None
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
    AliasConditionState = RIDER1
    AliasConditionState = RIDER1 REALLYDAMAGED
    AliasConditionState = RIDER1 RUBBLE
    AliasConditionState = RIDER2 RUBBLE
    
    ConditionState = RIDER2
      Model = EXDeploy
    End
    AliasConditionState = RIDER2 REALLYDAMAGED
  End
  
  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model = None
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:ZhugeAntiAirTank
  Side = China
  EditorSorting = VEHICLE
  TransportSlotCount = 5
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY Type87AutoCannonWeapon
    Weapon = SECONDARY 4xQW2MissileWeapon
    Weapon = TERTIARY 8xVehicleSmokeGrenadeLaunchWeapon
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = TERTIARY NONE
  End
  WeaponSet
    Conditions = WEAPON_RIDER1 
    Weapon = PRIMARY Type87AutoCannonWeapon
    Weapon = SECONDARY 4xQW2MissileWeapon
    Weapon = TERTIARY 8xVehicleSmokeGrenadeLaunchWeapon
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = TERTIARY NONE
  End
  WeaponSet
    Conditions = WEAPON_RIDER2 
    Weapon = PRIMARY 8xVehicleSmokeGrenadeLaunchWeapon
    Weapon = SECONDARY 4xQW2MissileWeaponAir
    Weapon = TERTIARY Type87AutoCannonWeaponAir
    AutoChooseSources = PRIMARY NONE
  End

  ArmorSet
    Conditions = None
    Armor = APCArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 1100
  BuildTime = 30.0
  VisionRange = 500
  ShroudClearingRange = 150
  Prerequisites
    Object = ChinaWarFactory
    Object = ChinaPropagandaCenter
    Object = ChinaTier1DummyObject
  End

  ExperienceValue = 50 50 100 150
  ExperienceRequired = 0 80 200 300
  IsTrainable = Yes
  CrusherLevel = 2
  CrushableLevel = 2
  CommandSet = ChinaTankZhugeAntiAirAGModeCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = ZhugeAntiAirVoiceSelect
  VoiceMove = ZhugeAntiAirVoiceMove
  VoiceGuard = ZhugeAntiAirVoiceMove
  VoiceAttack = ZhugeAntiAirVoiceAttack
  SoundMoveLoop = ChinaTankV1MoveLoop
  SoundAmbient = ChinaTankV1AmbientLoop

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = ZhugeAntiAirVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    VoiceCrush = ZhugeAntiAirVoiceMove
    VoiceEnter = ZhugeAntiAirVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE HUGE_VEHICLE SCORE SALVAGER ATTACK_NEEDS_LINE_OF_SIGHT
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 200.0
    InitialHealth = 200.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      TurretTurnRate = 75
      TurretPitchRate = 75
      AllowsPitch = Yes
    End
    AutoAcquireEnemiesWhenIdle = Yes NotWhileAttacking
    MoodAttackCheckRate = 250
  End
  Locomotor = SET_NORMAL PGZ95Locomotor
  Locomotor = SET_SLUGGISH StationaryLocomotor
  
  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = HordeUpdate ModuleTag_Horde01
    RubOffRadius = 150
    UpdateRate = 1000
    Radius = 75
    KindOf = VEHICLE HUGE_VEHICLE
    AlliesOnly = Yes
    ExactMatch = No
    Count = 3
    Action = HORDE
  End

  Behavior = HordeUpdate ModuleTag_Horde02
    RubOffRadius = 150
    UpdateRate = 1000
    Radius = 75
    KindOf = INFANTRY 
    AlliesOnly = Yes
    ExactMatch = No
    Count = 5
    Action = HORDE
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 40.0
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_ChinaTankZhugeAntiAir_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL OCL_ChinaTankZhugeAntiAir_DeathEffect_BlowUp  
    FX = FINAL FX_GenericTankDeathExplosion
  End

  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 60
    DestructionDelay = 100
    DestructionDelayVariance  = 50
    OCL = FINAL OCL_ChinaTankZhugeAntiAir_DeathEffect  
    FX = FINAL FX_GenericTankDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 30000
    OCL = INITIAL OCL_ChinaTankZhugeAntiAir_CatchFire
    FX = INITIAL FX_GenericTankCatchFire
    OCL = FINAL OCL_ChinaTankZhugeAntiAir_DeathEffect  
    FX = FINAL FX_GenericTankDeathExplosion
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = SpawnBehavior ModuleTag_Move01
