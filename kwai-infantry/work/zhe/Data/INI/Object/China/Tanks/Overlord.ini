    ProbabilityModifier = 60
    DestructionDelay = 100
    DestructionDelayVariance  = 50
    OCL = FINAL OCL_ChinaTankOverlord_DeathEffect
    FX = FINAL FX_GenericHeavyTankDeathExplosion
  End

