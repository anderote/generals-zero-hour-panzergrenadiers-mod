Object Type84AntiTankMine_Deployed

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = NIType84ATMine
    End
  End

  Draw = W3DModelDraw ModuleTag_HousecolorDraw
    OkToChangeModelColor = Yes
    ReceivesDynamicLights = No
    DefaultConditionState
      Model = EXIndATMine
    End
  End
  
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Type84ATMine
  Side = China
  EditorSorting = SYSTEM
  VisionRange = 10
  ShroudClearingRange = 0
  
  WeaponSet
    ;The weapon set is used to determine detonation mode
    Conditions = None 
    Weapon = PRIMARY DummyWeapon
    Weapon = SECONDARY DummyWeapon
    Weapon = TERTIARY DummyWeapon
    AutoChooseSources = PRIMARY NONE
    AutoChooseSources = SECONDARY NONE
    AutoChooseSources = TERTIARY NONE
  End
  
  ArmorSet
    Conditions = None
    Armor = MineArmor
    DamageFX = EmptyDamageFX
  End

  BuildCost = 200
  BuildTime = 5.0
  CrushableLevel = 0

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE IMMUNE_TO_CAPTURE DEMOTRAP NO_HEAL_ICON CLEARED_BY_BUILD IGNORED_IN_GUI NO_COLLIDE UNATTACKABLE
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  
  Behavior = StealthUpdate ModuleTag_Stealth01
    StealthDelay = 0
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal = No
  End

  Behavior = DemoTrapUpdate ModuleTag_Detonation01
    DefaultProximityMode = Yes
    DetonationWeaponSlot = PRIMARY
    ProximityModeWeaponSlot = SECONDARY
    ManualModeWeaponSlot = TERTIARY
    TriggerDetonationRange = 25.0
    IgnoreTargetTypes = PROJECTILE UNATTACKABLE STRUCTURE INFANTRY
    AutoDetonationWithFriendsInvolved = Yes
  End

  Behavior = SlowDeathBehavior ModuleTag_Detonation02
    DeathTypes = ALL -EXTRA_2 -EXTRA_3 -EXTRA_4
    DestructionDelay = 0
    Weapon = FINAL Type84AntiTankMineDetonationWeapon
  End

  Behavior = SlowDeathBehavior ModuleTag_Detonation03 
    DeathTypes = NONE +EXTRA_2 +EXTRA_4
    DestructionDelay = 0
  End 

  Behavior = SlowDeathBehavior ModuleTag_Detonation04
    DeathTypes = NONE +EXTRA_3
    DestructionDelay = 0
    FX = FINAL FX_MineDisarming
  End 

  Behavior = FireWeaponUpdate ModuleTag_NoStack01
    Weapon = 5Radius_MineStackingPreventWeapon
  End

  Behavior = FlammableUpdate ModuleTag_Flame01
    AflameDuration = 5000
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End
 
  Geometry = Sphere 
  GeometryMajorRadius = 1.0
  GeometryIsSmall = Yes
End

