ObjectReskin KD88AirToGroundJetMissile 36cmGenericAirToGroundJetMissile

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = AVRaptor_M
      ParticleSysBone = None GenericMissileStreak
    End
    ConditionState = JAMMED
      Model = AVRaptor_M
      ParticleSysBone = None SparksMedium
