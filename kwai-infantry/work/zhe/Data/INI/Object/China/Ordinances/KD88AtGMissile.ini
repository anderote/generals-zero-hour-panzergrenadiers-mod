End

;------------------------------------------------------------------------------
; Based on KD-88
Object KD88AirToGroundJetMissile_CAS

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = AVRaptor_M
      ParticleSysBone = None GenericMissileStreak
    End
    ConditionState = JAMMED
      Model = AVRaptor_M
      ParticleSysBone = None SparksMedium
      ParticleSysBone = None GenericMissileStreak
    End
  End
  
  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  VisionRange = 0.0  
  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_GenericGroundMissileHitWater
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +LASERED
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = SlowDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -FLOODED -LASERED
    ProbabilityModifier = 25
    DestructionDelay = 1000
    FX = FINAL FX_ChinaFireStormOnCompleted
  End
  Behavior = SlowDeathBehavior DeathModuleTag_03
    DeathTypes = ALL -FLOODED -LASERED
    ProbabilityModifier = 75
    DestructionDelay = 0
  End
  ; ---- end Projectile death behaviors
 
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Weapon01
    DeathTypes = ALL -LASERED -FLOODED
    DeathWeapon = FireStormStrikerWeapon_NapalmFX
    StartsActive = Yes
    ConflictsWith = Upgrade_ChinaBlackNapalm   
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Weapon02
    DeathTypes = ALL -LASERED -FLOODED
    DeathWeapon = FireStormStrikerWeapon_BlackNapalmFX
    StartsActive = No
    TriggeredBy = Upgrade_ChinaBlackNapalm
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    AllowCollideForce = No
  End
  
  Behavior = MissileAIUpdate ModuleTag_AI01
    DetonateOnNoFuel = No
    DetonateCallsKill = Yes
    TryToFollowTarget = Yes
    FuelLifetime = 6000
    InitialVelocity = 100
    IgnitionDelay = 100
    IgnitionFX = FX_ChinaFireStormStrikerCommenceStrike
    DistanceScatterWhenJammed = 100
    DistanceToTargetBeforeDiving = 100
    DistanceToTravelBeforeTurning = 25
  End
  Locomotor = SET_NORMAL GenericAirToGroundMissileLocomotor

  Behavior = SpecialPowerCompletionDie ModuleTag_PowerReset
    SpecialPowerTemplate = China_SuperweaponFireStormStrike
  End
  
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
  Shadow = SHADOW_DECAL
End