;------------------------------------------------------------------------------
Object ChinaCarpetBombContainer

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  VisionRange = 300.0  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** AUDIO Parameters ***
  SoundFallingFromPlane = BombFallingWhistle

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL None

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 150.0
    AerodynamicFriction = 0.75
    ForwardFriction = 22
    CenterOfMassOffset = 10
  End

   Behavior = SlowDeathBehavior ModuleTag_05
    DestructionDelay = 33
    OCL = INITIAL OCL_ChinaCarpetBombDispenser
    FX = INITIAL FX_BombReleased
  End
  
  Behavior = HeightDieUpdate ModuleTag_HeightDie
    TargetHeight = 195.0
    TargetHeightIncludesStructures = No
  End
  
  Behavior = SpecialPowerCompletionDie ModuleTag_PowerReset
    SpecialPowerTemplate = China_SuperweaponCarpetBomb
  End

  Geometry = Cylinder
  GeometryMajorRadius = 5.0
  GeometryHeight = 15.0
  GeometryIsSmall = Yes
End

;------------------------------------------------------------------------------
Object ChinaCarpetBombFragment

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes
    
    ConditionState = NONE
      Model = EXUnGBomb01
      Animation = EXUnGBomb01.EXUnGBomb01
      AnimationMode = ONCE
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  VisionRange = 300.0  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 50.0
    InitialHealth = 50.0
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_500lbCarpetBombHitWater
    Weapon = 500lbBombWaterCollideWeapon
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = ALL -FLOODED
    FX = FX_500lbCarpetBombDetonation
    OCL = OCL_500lbBombWaterChecker
  End
  ; ---- end Projectile death behaviors
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL None

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    AerodynamicFriction = 0.3
    ForwardFriction = 22
    PitchRollYawFactor = 0.1
    CenterOfMassOffset = 5
  End

  Behavior = HeightDieUpdate ModuleTag_HeightDie
    TargetHeight = 1.0
    TargetHeightIncludesStructures = Yes
  End

  Behavior = SpecialPowerCompletionDie ModuleTag_PowerReset
    SpecialPowerTemplate = China_SuperweaponCarpetBomb
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Weapon01
    DeathWeapon = 500lbCarpetBombWeapon
    StartsActive = Yes
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
  Shadow = SHADOW_DECAL
  ShadowSizeX = 3
  ShadowSizeY = 2
  ShadowTexture = ShadowI
End
  