    ;-----pristine attacking----------------------
    ConditionState = ATTACKING 
      Model = NVSuperTank
      Animation = NVSuperTank.NVSuperTank
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 0.5 0.5 
    End

    ConditionState = CONTINUOUS_FIRE_SLOW ATTACKING
      Model = NVSuperTank
      Animation = NVSuperTank.NVSuperTank
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 0.8 0.8
    End

    ConditionState = CONTINUOUS_FIRE_MEAN ATTACKING
      Model = NVSuperTank
      Animation = NVSuperTank.NVSuperTank
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.5 1.5 
    End

    ConditionState = CONTINUOUS_FIRE_FAST ATTACKING
      Model = NVSuperTank
      Animation = NVSuperTank.NVSuperTank
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 3.0 3.0
    End
      
    ConditionState = CONTINUOUS_FIRE_FAST ATTACKING FIRING_B
      Model = NVSuperTank
      Animation = NVSuperTank.NVSuperTank
      AnimationMode = LOOP
      ParticleSysBone = WeaponA GattlingMuzzleSmoke
      ParticleSysBone = WeaponA SmokeStackHeat
      AnimationSpeedFactorRange = 3.0 3.0 
    End

    TrackMarks = EXTnkTrack.tga
    OkToChangeModelColor = Yes
    TreadAnimationRate = 1.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6 
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Overlord
  Side = China
  EditorSorting = VEHICLE
  TransportSlotCount = 0
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY SovereignTankGun
    Weapon = TERTIARY SovereignTankFlameWeapon
