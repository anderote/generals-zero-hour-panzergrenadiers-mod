    AutoChooseSources = TERTIARY NONE
  End
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  BuildCost = 2000
  BuildTime = 28.0  
  VisionRange = 200
  ShroudClearingRange = 200
  Prerequisites
    Object = ChinaWarFactory
    Object = ChinaPropagandaCenter
  End

  ExperienceValue = 200 200 400 600
  ExperienceRequired = 0 400 600 1200 
  IsTrainable = Yes 
  CrusherLevel = 4
  CrushableLevel = 4 
  CommandSet = ChinaTankSovereignCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = OverlordTankVoiceSelect
  VoiceMove = OverlordTankVoiceMove
  VoiceGuard = OverlordTankVoiceMove
  VoiceAttack = OverlordTankVoiceAttack
  SoundMoveLoop = ChinaHeavyTankMoveLoop
  SoundMoveLoopDamaged = ChinaHeavyTankMoveLoop

  UnitSpecificSounds
    VoiceCreate = OverlordTankVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    VoiceCrush = OverlordTankVoiceCrush
    VoiceEnter = OverlordTankVoiceMove
    VoiceUnload = OverlordTankVoiceUnload
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE HUGE_VEHICLE
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 4500.0
    InitialHealth = 4500.0
    SubdualDamageCap = 2200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 20
  End

  Behavior = TransportAIUpdate ModuleTag_03
    Turret
      TurretTurnRate = 15
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End

  Locomotor = SET_NORMAL SovereignLocomotor
  Locomotor = SET_NORMAL_UPGRADED SovereignLocomotor

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_04
    DeathWeapon = NuclearDeathWeapon_SuperheavyTank
    StartsActive = No 
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End
  Behavior = LocomotorSetUpgrade ModuleTag_05
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End

  Behavior = DefaultProductionExitUpdate ModuleTag_06
    UnitCreatePoint = X:-25.0 Y: 0.0 Z:5.0
    NaturalRallyPoint = X: -40.0 Y: 0.0 Z:0.0
  End
  
  Behavior = ProductionUpdate ModuleTag_Production
    ;NumDoorAnimations = 1
    ;DoorOpeningTime = 3000
    ;DoorWaitOpenTime = 3000
    ;DoorCloseTime = 3000
    ;ConstructionCompleteDuration = 1500
  End
  
  Behavior = PhysicsBehavior ModuleTag_14
    Mass = 500.0
    ShockResistance = 1.00
  End

  Behavior = WeaponBonusUpgrade ModuleTag_15
    TriggeredBy = Upgrade_ChinaUraniumShells
  End

  ; Smoke for a bit then explode
  Behavior = SlowDeathBehavior ModuleTag_16A
    ProbabilityModifier = 5
    DestructionDelay = 1500
    DestructionDelayVariance = 500
    FX = INITIAL FX_OverlordSmoke
    OCL = FINAL OCL_ChinaTankOverlord_DeathEffect
    FX = FINAL FX_OverlordExplosionOneFinal
  End
  
  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_16B
    ProbabilityModifier = 5
    DestructionDelay = 10000
    DestructionDelayVariance = 300
    FX = INITIAL FX_CrusaderCatchFire
    OCL = FINAL OCL_ChinaTankOverlord_DeathEffect
    FX = FINAL FX_OverlordExplosionOneFinal 
  End

  ; Just explode death
  Behavior = SlowDeathBehavior ModuleTag_16C
    ProbabilityModifier = 90
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL OCL_ChinaTankOverlord_DeathEffect
    FX = FINAL FX_OverlordExplosionOneFinal
  End
  
  Behavior = CreateCrateDie ModuleTag_17
    CrateData = SalvageCrateData
  End

  Behavior = TransitionDamageFX ModuleTag_18
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeMediumContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000 
    AflameDamageAmount = 3 
    AflameDamageDelay = 500 
  End

  Behavior = StealthUpdate ModuleTag_GPSStealth01
    StealthDelay = 2000
    StealthForbiddenConditions = FIRING_PRIMARY FIRING_SECONDARY FIRING_TERTIARY RIDERS_ATTACKING
    InnateStealth = Yes
    RequiredStatus = REASSIGN_PARKING
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End
  
  Geometry = Box
  GeometryMajorRadius = 40.0
  GeometryMinorRadius = 18.0
  GeometryHeight = 60.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME     
  ShadowSizeX = 45 
