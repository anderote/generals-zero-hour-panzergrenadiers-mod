Object ChinaJetCarpetBomber

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes 
    
    ConditionState = NONE
      Model = NVCBomber
      ParticleSysBone = Engine01 JetBlackTrailThin
      ParticleSysBone = Engine02 JetBlackTrailThin
      ParticleSysBone = Engine03 JetBlackTrailThin
      ParticleSysBone = Engine04 JetBlackTrailThin
      ParticleSysBone = WingTip01 JetContrailThin
      ParticleSysBone = WingTip02 JetContrailThin
    End
    ConditionState = DAMAGED
      Model = NVCBomber
      ParticleSysBone = Propeller03 JetBlackTrailThin
      ParticleSysBone = Propeller04 JetBlackTrailThin
      ParticleSysBone = WingTip01 JetContrailThin
      ParticleSysBone = WingTip02 JetContrailThin
    End
    ConditionState = REALLYDAMAGED
      Model = NVCBomber_D
      ParticleSysBone = Propeller03 JetBlackTrailThin
      ParticleSysBone = Propeller04 JetBlackTrailThin
      ParticleSysBone = WingTip01 JetContrailThin
      ParticleSysBone = WingTip02 JetContrailThin
    End
    ConditionState = RUBBLE
      Model = NVCBomber_D
    End
  End

  Draw = W3DModelDraw ModuleTag_Door
    DefaultConditionState
      Model = NVCargoPln_A2
      Animation = NVCargoPln_A2.NVCargoPln_A2
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    ConditionState = DOOR_1_OPENING
      Model = NVCargoPln_A2
      Animation = NVCargoPln_A2.NVCargoPln_A2
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    ConditionState = DOOR_1_CLOSING
      Model = NVCargoPln_A2
      Animation = NVCargoPln_A2.NVCargoPln_A2
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
  End

  ; Draw = W3DModelDraw ModuleTag_Bones
    ; DefaultConditionState
      ; Model = NVCBomber_F
      ; WeaponLaunchBone = PRIMARY WeaponA
      ; WeaponFireFXBone = PRIMARY WeaponA
    ; End
  ; End
  
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:XianH6
  EditorSorting = VEHICLE
  Side = China
  TransportSlotCount = 0 
  VisionRange = 0.0 
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = None
  End
  CommandSet = Command_ScriptedXianH6Drops
  ExperienceValue = 300 300 300 300

  ; *** AUDIO Parameters ***
  SoundAmbient = C130AmbientLoop
  SoundAmbientRubble = NoSound

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK VEHICLE SCORE TRANSPORT AIRCRAFT FORCEATTACKABLE IGNORED_IN_GUI EMP_HARDENED
