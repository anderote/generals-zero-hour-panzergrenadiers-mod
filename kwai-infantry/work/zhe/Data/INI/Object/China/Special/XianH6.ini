    ReallyDamagedParticleSystem2 = Bone:Smoke01 RandomBone:No PSys:JetFireLarge_FireSparks
    ReallyDamagedParticleSystem3 = Bone:Smoke01 RandomBone:No PSys:JetSmokeLarge
    ReallyDamagedParticleSystem4 = Bone:Smoke02 RandomBone:No PSys:JetFireLarge
    ReallyDamagedParticleSystem5 = Bone:Smoke02 RandomBone:No PSys:JetFireLarge_FireSparks
    ReallyDamagedParticleSystem6 = Bone:Smoke02 RandomBone:No PSys:JetSmokeLarge
    
    RubbleParticleSystem1 = Bone:Smoke01 RandomBone:No PSys:JetFireLarge
    RubbleParticleSystem2 = Bone:Smoke01 RandomBone:No PSys:JetFireLarge_FireSparks
    RubbleParticleSystem3 = Bone:Smoke01 RandomBone:No PSys:JetSmokeLarge
    RubbleParticleSystem4 = Bone:Smoke02 RandomBone:No PSys:JetFireLarge
    RubbleParticleSystem5 = Bone:Smoke02 RandomBone:No PSys:JetFireLarge_FireSparks
    RubbleParticleSystem6 = Bone:Smoke02 RandomBone:No PSys:JetSmokeLarge
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 40.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 30
