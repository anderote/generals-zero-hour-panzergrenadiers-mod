    OCL = SUPERWEAPON_EMPBomb
    CreateLocation = USE_OWNER_OBJECT
    ScriptedSpecialPowerOnly = Yes
  End 

  Behavior = OCLSpecialPower PropagandaWar01
    SpecialPowerTemplate = China_SuperweaponPropagandaWar
    OCL = SUPERWEAPON_PropagandaWar
    CreateLocation = USE_OWNER_OBJECT
    ScriptedSpecialPowerOnly = Yes
  End 
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
