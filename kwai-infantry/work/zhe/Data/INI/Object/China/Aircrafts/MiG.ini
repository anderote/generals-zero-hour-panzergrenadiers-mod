;------------------------------------------------------------------------------
Object ChinaJetVigorousDragon

  ; *** ART Parameters ***
  SelectPortrait = SNMig_L
  ButtonImage = SNMig
  
  UpgradeCameo1 = Upgrade_ChinaAircraftArmor
  UpgradeCameo2 = Upgrade_Countermeasures
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = NVMIG
      HideSubObject = BurnerFX01 BurnerFX02
      WeaponLaunchBone = TERTIARY WeaponA
    End
    ConditionState = JETEXHAUST
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = JETEXHAUST JETAFTERBURNER
      ShowSubObject = BurnerFX01 BurnerFX02
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
      ParticleSysBone = Engine01 GenericHeatEffect
      ParticleSysBone = Engine02 GenericHeatEffect
    End

    ConditionState = REALLYDAMAGED
      Model = NVMIG_D
    End
    ConditionState = REALLYDAMAGED JETEXHAUST
      Model = NVMIG_D
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = REALLYDAMAGED JETEXHAUST JETAFTERBURNER
      Model = NVMIG_D
      ShowSubObject = BurnerFX01 BurnerFX02
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
      ParticleSysBone = Engine01 GenericHeatEffect
      ParticleSysBone = Engine02 GenericHeatEffect
    End
    ConditionState = RUBBLE
      Model = NVMIG_D
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:MIG
  EditorSorting = VEHICLE
  Side = China
  TransportSlotCount = 0
  VisionRange = 200.0 
  ShroudClearingRange = 400
  Prerequisites
    Object = ChinaAirfield
    Object = ChinaPropagandaCenter
  End

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY GSh23TwinAutoCannon
    Weapon = SECONDARY 4xKD88MissileWeapon
    AutoChooseSources = PRIMARY FROM_AI
    AutoChooseSources = SECONDARY FROM_AI
    PreferredAgainst = PRIMARY INFANTRY
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY GSh23TwinAutoCannon_JetDogfight
    Weapon = SECONDARY 2xPL15BVRAAMWeapon
    Weapon = TERTIARY 2xPL10ASRWeapon
    AutoChooseSources = PRIMARY FROM_AI
    AutoChooseSources = SECONDARY FROM_AI
    AutoChooseSources = TERTIARY FROM_AI
  End
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = TankDamageFX
  End
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = AirplaneArmorUpgraded
    DamageFX = TankDamageFX
  End

  BuildCost = 1200
  BuildTime = 30.0
  ExperienceValue = 50 50 100 200
  ExperienceRequired = 0 200 400 800
  IsTrainable = Yes
  CrusherLevel = 1
  CrushableLevel = 2
  CommandSet = ChinaJetVigorousDragonATModeCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = MigVoiceSelect
  VoiceMove = MigVoiceMove
  VoiceAttack = MigVoiceAttack
  VoiceAttackAir = MigVoiceAttackAir
  VoiceGuard = MigVoiceAirPatrol
  SoundAmbient = MigAmbientLoop
  UnitSpecificSounds
    VoiceCreate = MigVoiceCreate
    Afterburner = RaptorAfterburner
    VoiceGarrison = MigVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 200.0
    InitialHealth = 200.0
  End

  Behavior = JetAIUpdate ModuleTag_AI01
    OutOfAmmoDamagePerSecond = 10%
    TakeoffDistForMaxLift = 0%
    TakeoffPause = 5000
    MinHeight = 5
    ParkingOffset = 3 
    ReturnToBaseIdleTime = 50000
    AutoAcquireEnemiesWhenIdle = YES ATTACK_BUILDINGS
  End
  Locomotor = SET_NORMAL J10Locomotor
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 500.0
    AllowCollideForce = No
  End

  Behavior = JetSlowDeathBehavior ModuleTag_Death01
    FXOnGroundDeath = FX_GenericTankDeathExplosion
    OCLOnGroundDeath = OCL_MIGDeathFinalBlowUp
    DestructionDelay = 10000
    RollRate = 0.2
    RollRateDelta = 1%
    PitchRate = 0.0
    FallHowFast = 110.0%
    FXInitialDeath = FX_MigDeathInitial
    OCLInitialDeath = OCL_MIGDeathInitial
    DelaySecondaryFromInitialDeath = 500
    FXSecondary = FX_JetDeathSecondary
    OCLSecondary = OCL_MIGDeathSecondary
    OCLHitGround = OCL_MIGDeathHitGround
    DelayFinalBlowUpFromHitGround = 1500
    FXFinalBlowUp = FX_GenericJetDeathExplosion
    OCLFinalBlowUp = OCL_MIGDeathFinalBlowUp
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = CountermeasuresBehavior ModuleTag_Countermeasures01
    TriggeredBy = Upgrade_Countermeasures
    FlareTemplateName = CountermeasureFlare
    FlareBoneBaseName = Flare
    VolleySize = 3
    VolleyArcAngle = 90.0
    VolleyVelocityFactor = 2.5
    DelayBetweenVolleys = 250
    NumberOfVolleys = 5
    ReloadTime = 10000
    EvasionRate = 33%
    ReactionLaunchLatency = 0
    MissileDecoyDelay = 50
  End

  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End

  Behavior = ArmorUpgrade ModuleTag_Armour01
    TriggeredBy = Upgrade_ChinaAircraftArmor
  End

  Behavior = WeaponSetUpgrade ModuleTag_Multirole01
    TriggeredBy = Upgrade_JetAnitAirMissileAddon
  End
  
  Behavior = CommandSetUpgrade ModuleTag_Multirole02
    TriggeredBy = Upgrade_JetAnitAirMissileAddon
    CommandSet = ChinaJetVigorousDragonAAModeCommandSet
  End

  ; Behavior = CommandSetUpgrade ModuleTag_Multirole03
    ; TriggeredBy = Upgrade_JetAnitTankMissileAddon
    ; CommandSet = ChinaJetVigorousDragonATModeCommandSet
    ; RemovesUpgrades = Upgrade_JetAnitAirMissileAddon
  ; End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke01 RandomBone:No PSys:JetEngineDamagedSmoke
    ReallyDamagedParticleSystem2 = Bone:Engine01 RandomBone:No PSys:JetSmoke
    RubbleParticleSystem1 = Bone:Smoke01 RandomBone:No PSys:JetEngineDamagedSmoke
    RubbleParticleSystem2 = Bone:Engine01 RandomBone:No PSys:JetSmoke
  End
    
  Geometry = Box
  GeometryIsSmall = Yes
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 5.0
  Shadow = SHADOW_VOLUME
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End
