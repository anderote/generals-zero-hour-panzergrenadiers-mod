;----------------------------------------------------------------------------------------------------------
Object ChinaVehicleHelix

  ; *** ART Parameters ***
  SelectPortrait = SNHelix_L
  ButtonImage = SNHelix
  
  UpgradeCameo1 = Upgrade_ChinaAircraftArmor
  UpgradeCameo2 = Upgrade_Countermeasures
  UpgradeCameo3 = Upgrade_ChinaBlackNapalm
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

    Draw = W3DOverlordAircraftDraw  ModuleTag_W3D01
      OkToChangeModelColor = Yes
      ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = NVHELIX
      Animation = NVHELIX.NVHELIX
      AnimationMode = LOOP
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY TurretFX
      WeaponLaunchBone = PRIMARY Muzzle
      HideSubObject = BOMB01 BOMB02
    End
    AliasConditionState = ATTACKING

    ConditionState = MOVING
      HideSubObject = BOMB01 BOMB02
    End
    AliasConditionState  = MOVING ATTACKING

    ConditionState = REALLYDAMAGED
      Model = NVHELIX_D
      Animation = NVHELIX_D.NVHELIX_D
      AnimationMode = LOOP
      ParticleSysBone = NONE HelicopterRotorWashRing
      HideSubObject = BOMB01 BOMB02
    End

    ConditionState = REALLYDAMAGED MOVING
      Model = NVHELIX_D
      Animation = NVHELIX_D.NVHELIX_D
      AnimationMode = LOOP
      HideSubObject = BOMB01 BOMB02
    End

    ConditionState = RUBBLE
      Model = NVHELIX_D1
      Animation = NVHELIX_D1.NVHELIX_D1
      AnimationMode = LOOP
      ParticleSysBone = NONE HelicopterRotorWashRing
      HideSubObject = BOMB01 BOMB02
    End

    ConditionState = RUBBLE MOVING
      Model = NVHELIX_D1
      Animation = NVHELIX_D1.NVHELIX_D1
      AnimationMode = LOOP
      HideSubObject = BOMB01 BOMB02
    End

    ConditionState = RUBBLE SPECIAL_DAMAGED
      Model = NVHELIX_D1
    End
  End

  Draw = W3DModelDraw ModuleTag_OverGround
    ConditionState = NONE
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterDustRest
    End
    ConditionState = MOVING
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterDustActive
    End
    
    ConditionState = SNOW
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterSnowRest
    End
    ConditionState = SNOW MOVING
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterSnowActive
    End
    
    ConditionState = OVER_WATER
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterWaterWaveRest
      ParticleSysBone = GROUNDEF HelicopterWaterRest
    End
    AliasConditionState = SNOW OVER_WATER
    ConditionState = OVER_WATER MOVING
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterWaterWaveActive
      ParticleSysBone = GROUNDEF HelicopterWaterActive
    End
    AliasConditionState = SNOW OVER_WATER MOVING
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Helix
  EditorSorting = VEHICLE
  Side = China
  TransportSlotCount = 0
  VisionRange = 200.0 
  ShroudClearingRange = 500
  BuildCost = 1500
  BuildTime = 30.0
  Prerequisites
    Object = ChinaAirfield
  End
  ExperienceValue = 50 100 150 200
  ExperienceRequired = 0 200 400 800
  IsTrainable = Yes  
  CommandSet = ChinaVehicleHelixCommandSet

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY Shipunov2A42ChaingunWeapon
  End
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = TankDamageFX
  End
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = AirplaneArmorUpgraded
    DamageFX = TankDamageFX
  End

  ; *** AUDIO Parameters ***
  VoiceSelect = HelixVoiceSelect
  VoiceMove = HelixVoiceMove
  VoiceAttack = HelixVoiceAttack
  SoundAmbient = HelixAmbientLoop
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit
  UnitSpecificSounds
    VoiceCreate = HelixVoiceCreate
    VoiceUnload = HelixVoiceUnload
    VoiceGarrison = HelixVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS SELECTABLE VEHICLE HUGE_VEHICLE TRANSPORT AIRCRAFT SCORE PRODUCED_AT_HELIPAD CAN_ATTACK 
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 150.0
    InitialHealth = 150.0
  End

  Behavior = HelixContain ModuleTag_Contain01
    Slots = 5
    DamagePercentToUnits = 100%
    AllowInsideKindOf = INFANTRY VEHICLE PORTABLE_STRUCTURE
    ForbidInsideKindOf = AIRCRAFT 
    ExitDelay = 100
    NumberOfExitPaths = 1
    PassengersAllowedToFire = No 
  End

  Behavior = ChinookAIUpdate ModuleTag_AI01
     AutoAcquireEnemiesWhenIdle = Yes 
     RotorWashParticleSystem = HelicopterRotorWashRing
  End
  Locomotor = SET_NORMAL HelixLocomotor
  Locomotor = SET_TAXIING BasicHelicopterTaxiLocomotor

  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 500.0
    AllowCollideForce = No
  End

  Behavior = FXListDie ModuleTag_Death01
    DeathFX = FX_HelicopterStartDeath
  End

  Behavior = HelicopterSlowDeathBehavior ModuleTag_Death02
    DestructionDelay = 10000
    SpiralOrbitTurnRate = 80.0
    SpiralOrbitForwardSpeed = 110.0
    SpiralOrbitForwardSpeedDamping = 0.9999
    MaxBraking = 210
    SoundDeathLoop = HelixDamagedLoop
    MinSelfSpin = 40
    MaxSelfSpin = 120
    SelfSpinUpdateDelay = 300
    SelfSpinUpdateAmount = 5
    FallHowFast = 8.0%
    MinBladeFlyOffDelay = 1000
    MaxBladeFlyOffDelay = 1000
    AttachParticle = SootySmokeTrail
    AttachParticleBone = Propeller02
    BladeObjectName = HelixBlades
    BladeBoneName = Propeller01    
    FXBlade = FX_HelicopterBladeExplosion
    OCLBlade = OCL_HelicopterBladeExplosion
    OCLHitGround = OCL_HelicopterHitGround
    FXFinalBlowUp = FX_GenericTankDeathExplosion
    OCLFinalBlowUp = OCL_HelixBlades
    DelayFromGroundToFinalDeath = 1000
    FinalRubbleObject = ChinaVehicleHelix_Rubble
  End

  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End

  Behavior = ArmorUpgrade ModuleTag_Armour01
    TriggeredBy = Upgrade_ChinaAircraftArmor
  End
 
  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
  End

  Behavior = CountermeasuresBehavior ModuleTag_Countermeasures01
    TriggeredBy = Upgrade_Countermeasures
    FlareTemplateName = CountermeasureFlare
    FlareBoneBaseName = Flare
    VolleySize = 3
    VolleyArcAngle = 60.0 
    VolleyVelocityFactor = 2.5 
    DelayBetweenVolleys = 250
    NumberOfVolleys = 5
    ReloadTime = 10000
    EvasionRate = 33%
    ReactionLaunchLatency = 0 
    MissileDecoyDelay = 50
  End
  
  Behavior = CommandSetUpgrade ModuleTag_NapalmBomb01
    CommandSet = ChinaHelixNapalmCommandSet
    TriggeredBy = Upgrade_ChinaBlackNapalm
  End
  
  Behavior = SpecialAbility ModuleTag_NapalmBomb02
    SpecialPowerTemplate = SpecialAbilityHelixNapalmBomb
    UpdateModuleStartsAttack = Yes
    StartsPaused = Yes
    InitiateSound = HelixVoiceAttack
  End

  Behavior = SpecialAbilityUpdate ModuleTag_NapalmBomb03
    SpecialPowerTemplate = SpecialAbilityHelixNapalmBomb
    StartAbilityRange = 3.0
    PreparationTime = 0
    SpecialObject = NapalmBomb
    SpecialObjectAttachToBone = BOMB
    MaxSpecialObjects = 1
    SpecialObjectsPersistWhenOwnerDies = Yes 
    SpecialObjectsPersistent = Yes
    UniqueSpecialObjectTargets = No
    UnpackTime = 500
    FlipOwnerAfterUnpacking = No
    FleeRangeAfterCompletion = 0.0
    LoseStealthOnTrigger = No
    ApproachRequiresLOS = No
    NeedToFaceTarget = No
    PersistentPrepTime = 100
    PersistenceRequiresRecharge = Yes
    UnpackSound = CarpetBombDrop
  End
 
  Behavior = UnpauseSpecialPowerUpgrade ModuleTag_NapalmBomb04
    SpecialPowerTemplate = SpecialAbilityHelixNapalmBomb
    TriggeredBy = Upgrade_HelixNapalmBomb
  End

  Behavior = SpecialAbility ModuleTag_NapalmBomb05
    SpecialPowerTemplate = SpecialAbilityHelixBlackNapalmBomb
    UpdateModuleStartsAttack = Yes
    StartsPaused = Yes
    InitiateSound = HelixVoiceAttack
  End
 
  Behavior = SpecialAbilityUpdate ModuleTag_NapalmBomb06
    SpecialPowerTemplate = SpecialAbilityHelixBlackNapalmBomb
    StartAbilityRange = 3.0
    PreparationTime = 0
    SpecialObject = BlackNapalmBomb
    SpecialObjectAttachToBone = BOMB
    MaxSpecialObjects = 1
    SpecialObjectsPersistWhenOwnerDies = Yes 
    SpecialObjectsPersistent = Yes
    UniqueSpecialObjectTargets = No
    UnpackTime = 500
    FlipOwnerAfterUnpacking = No
    FleeRangeAfterCompletion = 0.0
    LoseStealthOnTrigger = No
    ApproachRequiresLOS = No
    NeedToFaceTarget = No
    PersistentPrepTime = 100
    PersistenceRequiresRecharge = Yes
    UnpackSound = CarpetBombDrop
  End
 
  Behavior = UnpauseSpecialPowerUpgrade ModuleTag_NapalmBomb07
    SpecialPowerTemplate = SpecialAbilityHelixBlackNapalmBomb
    TriggeredBy = Upgrade_HelixNapalmBomb
  End

  Behavior = SubObjectsUpgrade ModuleTag_NapalmBomb08
    TriggeredBy = Upgrade_HelixNapalmBomb 
    ShowSubObjects = Bomb01 Bomb02
  End

  Scale = 0.9
  Geometry = Cylinder
  GeometryMajorRadius = 35.0
  GeometryHeight = 30.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 45
End

;------------------------------------------------------------------------------
Object NapalmBomb

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = EXCarptBmb
      ParticleSysBone = None CarpetBombTrail
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0.0
  TransportSlotCount = 1
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD UNATTACKABLE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
    ; we detonated normally.
    FX = FX_NapalmBombDetonation
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX = FX_NapalmBombDetonation
  End
  ; ---- end Projectile death behaviors

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 75.0
    AerodynamicFriction = 0.1
    ForwardFriction = 0.1
    CenterOfMassOffset = 0.13
    AllowCollideForce = No
  End

  Behavior = MissileAIUpdate ModuleTag_AI01
    TryToFollowTarget = No 
    FuelLifetime = 0
    IgnitionDelay = 0
    InitialVelocity = 0
    DistanceToTravelBeforeTurning = 0
    DistanceToTargetBeforeDiving = 0
  End
  Locomotor = SET_NORMAL None

  Behavior = HeightDieUpdate ModuleTag_HeightDie
    TargetHeight = 15.0
    TargetHeightIncludesStructures = Yes
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_FireWeapon01
    DeathWeapon = LT2NapalmLGBWeapon_SelfPosition
    StartsActive = Yes 
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

