;------------------------------------------------------------------------------
Object ChinaVehicleListeningOutpost

  ; *** ART Parameters ***
  SelectPortrait = NVLOutpost_L
  ButtonImage = NVLOutpost
  
  Draw = W3DTruckDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = NVHQ6AR
      HideSubObject = Door03 Door04 Door05
    End

    ConditionState = MOVING
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    ConditionState = DAMAGED
      Model = NVHQ6AR_D
    End

    ConditionState = DAMAGED MOVING
      Model = NVHQ6AR_D
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVHQ6AR_E
    End

    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = NVHQ6AR_E
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    LeftFrontTireBone = Wheel01
    RightFrontTireBone = Wheel03
    LeftRearTireBone = Wheel02
    RightRearTireBone = Wheel04
    
    ExtraPublicBone = TreadFX01
    ExtraPublicBone = TreadFX02
    ExtraPublicBone = TreadFX03
    ExtraPublicBone = TreadFX04
    
    TrackMarks = EXTireTrack.dds
    TireRotationMultiplier = 0.2
    PowerslideRotationAddition = 0
  End

  Draw = W3DModelDraw ModuleTag_Radar
    OkToChangeModelColor = Yes
    
    ConditionState = NONE
      Model = NVHQ6AR_A1
      Animation = NVHQ6AR_A1.NVHQ6AR_A1
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    ConditionState = DAMAGED
      Model = NVHQ6AR_A1D
      Animation = NVHQ6AR_A1D.NVHQ6AR_A1D
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVHQ6AR_A1E
      Animation = NVHQ6AR_A1E.NVHQ6AR_A1E
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    
    ConditionState = DEPLOYED
      Model = NVHQ6AR_A2
      Animation = NVHQ6AR_A2.NVHQ6AR_A2
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = RadarFX01 RadioVehicleRing
    End
    ConditionState = DEPLOYED DAMAGED
      Model = NVHQ6AR_A2D
      Animation = NVHQ6AR_A2D.NVHQ6AR_A2D
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = RadarFX01 RadioVehicleRing
    End
    ConditionState = DEPLOYED REALLYDAMAGED RUBBLE
      Model = NVHQ6AR_A2E
      Animation = NVHQ6AR_A2E.NVHQ6AR_A2E
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = RadarFX01 RadioVehicleRing
    End

    ConditionState = PACKING
      Model = NVHQ6AR_A1
      Animation = NVHQ6AR_A1.NVHQ6AR_A1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    ConditionState = PACKING DAMAGED
      Model = NVHQ6AR_A1D
      Animation = NVHQ6AR_A1D.NVHQ6AR_A1D
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    ConditionState = PACKING REALLYDAMAGED RUBBLE
      Model = NVHQ6AR_A1E
      Animation = NVHQ6AR_A1E.NVHQ6AR_A1E
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End

    ConditionState = UNPACKING
      Model = NVHQ6AR_A1
      Animation = NVHQ6AR_A1.NVHQ6AR_A1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    ConditionState = UNPACKING DAMAGED
      Model = NVHQ6AR_A1D
      Animation = NVHQ6AR_A1D.NVHQ6AR_A1D
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    ConditionState = UNPACKING REALLYDAMAGED RUBBLE
      Model = NVHQ6AR_A1E
      Animation = NVHQ6AR_A1E.NVHQ6AR_A1E
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
  End
    
  Draw = W3DModelDraw ModuleTag_Door01
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = NVHQ6AR_A3
      Animation = NVHQ6AR_A3.NVHQ6AR_A3
      AnimationMode = MANUAL
    End
    ConditionState = DOOR_1_OPENING
      AnimationMode = ONCE
    End
    ConditionState = DOOR_1_WAITING_OPEN
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = DOOR_1_CLOSING
      AnimationMode = ONCE_BACKWARDS
    End
    
    ConditionState = DAMAGED
      Model = NVHQ6AR_A3D
      Animation = NVHQ6AR_A3D.NVHQ6AR_A3D
      AnimationMode = MANUAL
    End
    ConditionState = DAMAGED DOOR_1_OPENING
      Model = NVHQ6AR_A3D
      Animation = NVHQ6AR_A3D.NVHQ6AR_A3D
      AnimationMode = ONCE
    End
    ConditionState = DAMAGED DOOR_1_WAITING_OPEN
      Model = NVHQ6AR_A3D
      Animation = NVHQ6AR_A3D.NVHQ6AR_A3D
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = DAMAGED DOOR_1_CLOSING
      Model = NVHQ6AR_A3D
      Animation = NVHQ6AR_A3D.NVHQ6AR_A3D
      AnimationMode = ONCE_BACKWARDS
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVHQ6AR_A3E
      Animation = NVHQ6AR_A3E.NVHQ6AR_A3E
      AnimationMode = MANUAL
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_OPENING
      Model = NVHQ6AR_A3E
      Animation = NVHQ6AR_A3E.NVHQ6AR_A3E
      AnimationMode = ONCE
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_WAITING_OPEN
      Model = NVHQ6AR_A3E
      Animation = NVHQ6AR_A3E.NVHQ6AR_A3E
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_CLOSING
      Model = NVHQ6AR_A3E
      Animation = NVHQ6AR_A3E.NVHQ6AR_A3E
      AnimationMode = ONCE_BACKWARDS
    End
  End

  Draw = W3DModelDraw ModuleTag_Deploy
    DefaultConditionState
      Model = None
    End
    AliasConditionState = DAMAGED
    AliasConditionState = REALLYDAMAGED RUBBLE
    AliasConditionState = DEPLOYED RUBBLE
    
    ConditionState = DEPLOYED
      Model = EXDeploy
    End
    AliasConditionState = DEPLOYED DAMAGED
    AliasConditionState = DEPLOYED REALLYDAMAGED
  End
  
  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model = None
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:ListeningOutpost
  Side = China
  EditorSorting = VEHICLE
  TransportSlotCount = 5
  BuildCost = 800
  BuildTime = 25.0
  VisionRange = 150
  ShroudClearingRange = 150
  Prerequisites
    Object = ChinaWarFactory
  End
  
  WeaponSet
    Conditions = None
    Weapon = TERTIARY 300Range_DeployWeapon
  End

  ArmorSet
    Conditions = None
    Armor = TruckArmor
    DamageFX = TruckDamageFX
  End
  
  CrusherLevel = 0W
  CrushableLevel = 2
  CommandSet = ChinaListeningOutpostCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = ListeningOutpostVoiceSelect
  VoiceMove = ListeningOutpostVoiceMove
  VoiceGuard = ListeningOutpostVoiceMove
  VoiceAttack = ListeningOutpostVoiceAttack
  SoundMoveLoop = TruckMoveLoop
  SoundAmbient = TruckAmbientLoop
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = ListeningOutpostVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    TruckLandingSound = NoSound
    TruckPowerslideSound = NoSound
    VoiceCrush = NoSound
    VoiceUnload = NoSound
    VoiceEnter = ListeningOutpostVoiceMove
    Deploy = NukeCannonDeploy
    Undeploy = NukeCannonUnDeploy
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS TRANSPORT VEHICLE SCORE REVEALS_ENEMY_PATHS CANNOT_RETALIATE SALVAGER
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 200.0
    InitialHealth = 200.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 480
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = DeployStyleAIUpdate ModuleTag_AI01
    Turret
      TurretTurnRate = 360
      TurretPitchRate = 360
      ControlledWeaponSlots = TERTIARY
      InitiallyDisabled = Yes
    End
    AutoAcquireEnemiesWhenIdle = No NotWhileAttacking
    PackTime = 2220
    UnpackTime = 2220
    TurretsFunctionOnlyWhenDeployed = Yes
    TurretsMustCenterBeforePacking = Yes
    ManualDeployAnimations = No
  End
  Locomotor = SET_NORMAL ListeningOutpostLocomotor
  
  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 30.0
  End
  
  Behavior = TransportContain ModuleTag_Contain01
    PassengersAllowedToFire = No
    Slots = 5
    InitialPayload = ChinaInfantryFieldEngineer 3
    ScatterNearbyOnExit = Yes
    HealthRegen%PerSec = 1
    DamagePercentToUnits = 100%
    AllowInsideKindOf = INFANTRY
    DoorOpenTime = 1350
    ExitDelay = 250
    NumberOfExitPaths = 3
    GoAggressiveOnExit = Yes
    ArmedRidersUpgradeMyWeaponSet = Yes
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_ChinaVehicleListeningOutpost_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 20000
    OCL = INITIAL OCL_ChinaVehicleListeningOutpost_CatchFire
    OCL = FINAL OCL_ChinaVehicleListeningOutpost_DeathEffect  
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 80
    ModifierBonusPerOverkillPercent = 20%
    DestructionDelay = 150
    DestructionDelayVariance = 250
    OCL = FINAL OCL_ChinaVehicleListeningOutpost_DeathEffect
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = SpawnBehavior ModuleTag_Collider01
    SpawnNumber = 1
    SpawnReplaceDelay = 0
    SpawnTemplateName = DummyInvisibleGroundCollider
    CanReclaimOrphans = No
    SpawnedRequireSpawner = Yes
    SlavesHaveFreeWill = No
  End

  Behavior = QueueProductionExitUpdate ModuleTag_Collider02
    UnitCreatePoint = X:0.0 Y:0.0 Z:0.0
    NaturalRallyPoint = X:0.0 Y:0.0 Z:0.0
    InitialBurst = 1
  End
  
  Behavior = ProductionUpdate ModuleTag_Collider03
    MaxQueueEntries = 1
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move01
    Weapon = Ingenious4WheelsVehicleMovementWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move02
    Weapon = IngeniousVehicleCheckerWeapon
  End
  
  Behavior = FireWeaponCollide ModuleTag_Radar01
    CollideWeapon = ListeningPostDeployedWeapon
    RequiredStatus = DEPLOYED
  End

  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_InfantryDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = INFANTRY
  End
  ; --- end detector modules ---
  
  Geometry = Box
  GeometryMajorRadius = 20.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 16.5  
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End