;------------------------------------------------------------------------------
Object ChinaVehicleDozer

  ; *** ART Parameters ***
  SelectPortrait = SNDozer_L
  ButtonImage = SNDozer
  
  ;UpgradeCameo1 = NONE
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DTankDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes 

    ConditionState = NONE
      Model = NVCONSTDOZ_A
      Animation = NVCONSTDOZ_A.NVCONSTDOZ_A
      AnimationMode = MANUAL
    End
    
    ConditionState = MOVING
      Model = NVCONSTDOZ_A
      Animation = NVCONSTDOZ_A.NVCONSTDOZ_A
      AnimationMode = MANUAL
      ParticleSysBone = Exhaust01 VehicleSmoke
    End
    
    ConditionState = ACTIVELY_CONSTRUCTING
      Model = NVCONSTDOZ_A
      Animation = NVCONSTDOZ_A.NVCONSTDOZ_A
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = DirtFX01 DozerDirtFall
      ParticleSysBone = DirtFX01 DozerDirtDust
      ParticleSysBone = Exhaust01 VehicleSmoke
    End

    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVCONSTDOZ_AD
      Animation = NVCONSTDOZ_AD.NVCONSTDOZ_AD
      AnimationMode = MANUAL
    End
    
    ConditionState = MOVING REALLYDAMAGED RUBBLE
      Model = NVCONSTDOZ_AD
      Animation = NVCONSTDOZ_AD.NVCONSTDOZ_AD
      AnimationMode = MANUAL
      ParticleSysBone = Exhaust01 VehicleSmoke
    End
    
    ConditionState = ACTIVELY_CONSTRUCTING REALLYDAMAGED RUBBLE
      Model = NVCONSTDOZ_AD
      Animation = NVCONSTDOZ_AD.NVCONSTDOZ_AD
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = DIRTFX01 DozerDirtFall
      ParticleSysBone = DirtFX01 DozerDirtDust
      ParticleSysBone = Exhaust01 VehicleSmoke
    End

    TrackMarks = NVTnkTracks2.dds
    TreadAnimationRate = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Dozer
  Side = China
  EditorSorting = VEHICLE
  TransportSlotCount = 5
  BuildCost = 1000
  BuildTime = 20.0
  VisionRange = 150
  ShroudClearingRange = 200

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY None
  End

  ArmorSet
    Conditions = None
    Armor = DozerArmor
    DamageFX= TankDamageFX
  End
  
  CrusherLevel = 2
  CrushableLevel = 2
  CommandSet = ChinaDozerCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = DozerChinaVoiceSelect
  VoiceMove = DozerChinaVoiceMove
  VoiceEnter = DozerChinaVoiceMove
  VoiceTaskComplete = DozerChinaVoiceBuildComplete
  SoundMoveLoop = DozerMoveLoop
  SoundAmbient = DozerAmbientLoop

  UnitSpecificSounds
    VoiceCreate = DozerChinaVoiceCreate
    VoiceCrush = DozerChinaVoiceCrush
    VoiceNoBuild = DozerChinaVoiceBuildNot
    VoiceRepair = DozerChinaVoiceRepair
    VoiceDisarm = DozerChinaVoiceClearMine
    VoiceEnter = DozerChinaVoiceMove
    VoiceBuildResponse = DozerChinaVoiceBuild
  End
 
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD VEHICLE SCORE SELECTABLE CAN_CAST_REFLECTIONS DOZER 
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 250.0
    InitialHealth= 250.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 500
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = DozerAIUpdate ModuleTag_AI01
    RepairHealthPercentPerSecond = 1.667%
    BoredTime = 5000
    BoredRange = 150
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor= SET_NORMAL ChinaVehicleDozerLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 40.0
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_ChinaVehicleDozer_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 70
    DestructionDelay = 100
    DestructionDelayVariance  = 50
    OCL = FINAL OCL_ChinaVehicleDozer_DeathEffect
    FX = FINAL FX_GenericTankDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 30
    DestructionDelay = 20000
    OCL = INITIAL OCL_ChinaVehicleDozer_CatchFire
    OCL = FINAL OCL_ChinaVehicleDozer_DeathEffect  
    FX = FINAL FX_GenericTankDeathExplosion
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3 
    AflameDamageDelay = 500
  End

  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End

  Behavior = FireWeaponUpdate ModuleTag_Move01
    Weapon = IngeniousVehicleMovementWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move02
    Weapon = IngeniousVehicleCheckerWeapon
  End
  
  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  ; --- end detector modules ---
  
  Geometry = Box
  GeometryMajorRadius = 17.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 15.0
  GeometryIsSmall= Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End
