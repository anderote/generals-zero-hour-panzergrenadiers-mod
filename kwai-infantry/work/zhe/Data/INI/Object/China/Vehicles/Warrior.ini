;------------------------------------------------------------------------------
Object ChinaVehicleWarrior

  ; *** ART Parameters ***
  SelectPortrait = SNWarriorLPV_L
  ButtonImage = SNWarriorLPV
  
  UpgradeCameo1 = Upgrade_Nationalism
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DTruckDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = NVCSK131
      HideSubObject = Door02 Door04 Door05 Hatch01 Hatch02
      TransitionKey = TRANS_None
    End

    ConditionState = MOVING
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = DAMAGED
      Model = NVCSK131_D
      TransitionKey = TRANS_None
    End
    
    ConditionState = DAMAGED MOVING
      Model = NVCSK131_D
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVCSK131_E
      Animation = NVCSK131_E.NVCSK131_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      TransitionKey = TRANS_ReallyDamaged
    End
    
    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = NVCSK131_E
      Animation = NVCSK131_E.NVCSK131_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_ReallyDamaged
    End
    
    TransitionState = TRANS_None TRANS_ReallyDamaged
      Model = NVCSK131_E1
      Animation = NVCSK131_E1.NVCSK131_E1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_ReallyDamaged TRANS_None
      Model = NVCSK131_E1
      Animation = NVCSK131_E1.NVCSK131_E1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    TrackMarks = EXTireTrack.dds
    LeftFrontTireBone = Wheel01
    RightFrontTireBone = Wheel03
    LeftRearTireBone = Wheel02
    RightRearTireBone = Wheel04
    TireRotationMultiplier = 0.2 
    PowerslideRotationAddition = 1.25 
  End
  
  Draw = W3DModelDraw ModuleTag_W3D02
    DefaultConditionState
      Model = NVCSK131_A2
      Animation = NVCSK131_A2.NVCSK131_A2
      AnimationMode = MANUAL
      TransitionKey = TRANS_None
    End
    ConditionState = ENEMYNEAR
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_EnemyNear
    End

    ConditionState = DAMAGED
      Model = NVCSK131_A2D
      Animation = NVCSK131_A2D.NVCSK131_A2D
      AnimationMode = MANUAL
      TransitionKey = TRANS_None
    End
    ConditionState = DAMAGED ENEMYNEAR
      Model = NVCSK131_A2D
      Animation = NVCSK131_A2D.NVCSK131_A2D
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_EnemyNear
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVCSK131_A2E
      Animation = NVCSK131_A2E.NVCSK131_A2E
      AnimationMode = MANUAL
      TransitionKey = TRANS_None
    End
    ConditionState = REALLYDAMAGED RUBBLE ENEMYNEAR
      Model = NVCSK131_A2E
      Animation = NVCSK131_A2E.NVCSK131_A2E
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_EnemyNear
    End
    
    TransitionState = TRANS_None TRANS_EnemyNear
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_EnemyNear TRANS_None
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    TransitionState = TRANS_Damaged TRANS_EnemyNear_Damaged
      Model = NVCSK131_A2D
      Animation = NVCSK131_A2D.NVCSK131_A2D
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_EnemyNear_Damaged TRANS_Damaged
      Model = NVCSK131_A2D
      Animation = NVCSK131_A2D.NVCSK131_A2D
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    TransitionState = TRANS_ReallyDamaged TRANS_EnemyNear_ReallyDamaged
      Model = NVCSK131_A2E
      Animation = NVCSK131_A2E.NVCSK131_A2E
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_EnemyNear_ReallyDamaged TRANS_ReallyDamaged
      Model = NVCSK131_A2E
      Animation = NVCSK131_A2E.NVCSK131_A2E
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
  End
    
  Draw = W3DModelDraw ModuleTag_Door01
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = NVCSK131_A1
      Animation = NVCSK131_A1.NVCSK131_A1
      AnimationMode = MANUAL
    End
    ConditionState = DOOR_1_OPENING
      AnimationMode = ONCE
    End
    ConditionState = DOOR_1_WAITING_OPEN
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = DOOR_1_CLOSING
      AnimationMode = ONCE_BACKWARDS
    End
    
    ConditionState = DAMAGED
      Model = NVCSK131_A1D
      Animation = NVCSK131_A1D.NVCSK131_A1D
      AnimationMode = MANUAL
    End
    ConditionState = DAMAGED DOOR_1_OPENING
      Model = NVCSK131_A1D
      Animation = NVCSK131_A1D.NVCSK131_A1D
      AnimationMode = ONCE
    End
    ConditionState = DAMAGED DOOR_1_WAITING_OPEN
      Model = NVCSK131_A1D
      Animation = NVCSK131_A1D.NVCSK131_A1D
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = DAMAGED DOOR_1_CLOSING
      Model = NVCSK131_A1D
      Animation = NVCSK131_A1D.NVCSK131_A1D
      AnimationMode = ONCE_BACKWARDS
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVCSK131_A1E
      Animation = NVCSK131_A1E.NVCSK131_A1E
      AnimationMode = MANUAL
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_OPENING
      Model = NVCSK131_A1E
      Animation = NVCSK131_A1E.NVCSK131_A1E
      AnimationMode = ONCE
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_WAITING_OPEN
      Model = NVCSK131_A1E
      Animation = NVCSK131_A1E.NVCSK131_A1E
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_CLOSING
      Model = NVCSK131_A1E
      Animation = NVCSK131_A1E.NVCSK131_A1E
      AnimationMode = ONCE_BACKWARDS
    End
  End

  Draw = W3DModelDraw ModuleTag_Turret01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = NVCSK131_MG
      Animation = NVCSK131_MG.NVCSK131_MG
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      Turret = TURRET
    End
  End

  Draw = W3DModelDraw ModuleTag_MuzzleFX01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = None
    End
    
    ConditionState = FIRING_A
      Model = NVCSK131_MGFX
      Turret = Turret
    End
    
    ConditionState = FIRING_B
      Model = NVCSK131_AAFX
      Turret = Turret
    End
  End

  Draw = W3DModelDraw ModuleTag_Gunner01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = NVCSK131_MG_SKN
      Turret = MAIN_ROOT
      IdleAnimation = CITMGINF_SKL.CITMGINF_STD
      AnimationMode = ONCE
      HideSubObject = MuzzleFX01
      WeaponFireFXBone = PRIMARY MuzzleMG
      WeaponLaunchBone = PRIMARY MuzzleMG
      WeaponFireFXBone = SECONDARY MuzzleMG
      WeaponLaunchBone = SECONDARY MuzzleMG
      TransitionKey = TRANS_Idle
    End
    AliasConditionState = TURRET_ROTATE
    
    ConditionState = USING_WEAPON_A
      Animation = CITMGINF_SKL.CITMGINF_ATA
      AnimationMode = LOOP
      TransitionKey = TRANS_FiringA
    End
    AliasConditionState = USING_WEAPON_A TURRET_ROTATE
    
    ConditionState = USING_WEAPON_B
      Animation = CITMGINF_SKL.CITMGINF_ATB
      AnimationMode = LOOP
      TransitionKey = TRANS_FiringB
    End
    AliasConditionState = USING_WEAPON_B TURRET_ROTATE
    
    TransitionState = TRANS_None TRANS_Idle
      Animation = CITMGINF_SKL.CITMGINF_STS
      AnimationMode = ONCE
    End
    
    TransitionState = TRANS_Idle TRANS_FiringB
      Animation = CITMGINF_SKL.CITMGINF_S2B
      AnimationMode = ONCE
    End
    
    TransitionState = TRANS_FiringB TRANS_Idle
      Animation = CITMGINF_SKL.CITMGINF_S2B
      AnimationMode = ONCE_BACKWARDS
    End
    
    TransitionState = TRANS_FiringA TRANS_FiringB
      Animation = CITMGINF_SKL.CITMGINF_S2B
      AnimationMode = ONCE
    End
    
    TransitionState = TRANS_FiringB TRANS_FiringA
      Animation = CITMGINF_SKL.CITMGINF_S2B
      AnimationMode = ONCE_BACKWARDS
    End
  End

  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model = None
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:WarriorARV
  Side = China
  EditorSorting = VEHICLE
  TransportSlotCount = 4 
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY QJC88HeavyMachineGunWeapon
    Weapon = SECONDARY QJC88HeavyMachineGunWeaponAir
  End
  
  ArmorSet
    Conditions = None
    Armor = HMMWVArmor
    DamageFX = TruckDamageFX
  End
  
  BuildCost = 600
  BuildTime = 25.0
  VisionRange = 150
  ShroudClearingRange = 200
  Prerequisites
    Object = ChinaWarFactory
  End
  
  ExperienceValue = 50 50 100 150 
  ExperienceRequired = 0 100 150 300 
  IsTrainable = Yes 
  CrusherLevel = 0
  CrushableLevel = 2 
  CommandSet = ChinaVehicleWarriorCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = WarriorARVVoiceSelect
  VoiceMove = WarriorARVVoiceMove
  VoiceGuard = WarriorARVVoiceMove
  VoiceAttack = WarriorARVVoiceAttack
  SoundMoveLoop = 4wVehicleV1MoveLoop
  SoundAmbient = 4wVehicleV1AmbientLoop
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit

  UnitSpecificSounds
    VoiceCreate = WarriorARVVoiceCreate
    TurretMoveLoop = NoSound
    TruckLandingSound = GenericVehicleLand
    TruckPowerslideSound = GenericVehiclePowerslide
    VoiceUnload = WarriorARVVoiceUnload
    VoiceEnter = WarriorARVVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE TRANSPORT SALVAGER ATTACK_NEEDS_LINE_OF_SIGHT
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 110.0
    InitialHealth = 110.0
    SubdualDamageCap = 480
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = TransportAIUpdate ModuleTag_AI01
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY
      TurretTurnRate = 64
      MinIdleScanAngle = 15
      MaxIdleScanAngle = 15
      MinIdleScanInterval = 2000
      MaxIdleScanInterval = 3000
      RecenterTime = 5000
      FiresWhileTurning = Yes
    End
    MoodAttackCheckRate = 250
    AutoAcquireEnemiesWhenIdle = Yes NotWhileAttacking
  End
  Locomotor = SET_NORMAL CSK131Locomotor
  
  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = HordeUpdate ModuleTag_Horde01
    RubOffRadius = 150
    UpdateRate = 1000
    Radius = 75
    KindOf = VEHICLE HUGE_VEHICLE
    AlliesOnly = Yes
    ExactMatch = No
    Count = 3
    Action = HORDE
  End

  Behavior = HordeUpdate ModuleTag_Horde02
    RubOffRadius = 150
    UpdateRate = 1000
    Radius = 75
    KindOf = INFANTRY 
    AlliesOnly = Yes
    ExactMatch = No
    Count = 5
    Action = HORDE
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 50.0
  End

  Behavior = EnemyNearUpdate ModuleTag_EnemyNear01
  End

  Behavior = TransportContain  ModuleTag_Contain01
    Slots = 5
    ScatterNearbyOnExit = Yes
    DamagePercentToUnits = 100%
    AllowInsideKindOf = INFANTRY
    DoorOpenTime = 1350
    ExitDelay = 250
    NumberOfExitPaths = 3
    GoAggressiveOnExit = Yes
    PassengersAllowedToFire = Yes
    WeaponBonusPassedToPassengers = Yes
  End

  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_ChinaVehicleWarrior_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 20000
    OCL = INITIAL OCL_ChinaVehicleWarrior_CatchFire
    OCL = FINAL OCL_ChinaVehicleWarrior_DeathEffect  
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 80
    ModifierBonusPerOverkillPercent = 20%
    DestructionDelay = 150
    DestructionDelayVariance = 250
    OCL = FINAL OCL_ChinaVehicleWarrior_DeathEffect
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = FireWeaponUpdate ModuleTag_Move01
    Weapon = Ingenious4WheelsVehicleMovementWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move02
    Weapon = IngeniousVehicleCheckerWeapon
  End
  
  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_InfantryDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = INFANTRY
  End
  ; --- end detector modules ---
  
  Behavior = WeaponBonusUpgrade ModuleTag_LoadedWeaponBonus01
    TriggeredBy = Upgrade_InherentBehaviour
  End

  Behavior = GrantUpgradeCreate ModuleTag_LoadedWeaponBonus02
    UpgradeToGrant = Upgrade_InherentBehaviour
  End
  
  Geometry = Box
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 11.0    
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45 
