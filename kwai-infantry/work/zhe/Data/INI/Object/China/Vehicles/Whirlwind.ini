;------------------------------------------------------------------------------
Object ChinaVehicleWhirlwind

  ; *** ART Parameters ***
  SelectPortrait = SNPHL11MRL_L
  ButtonImage = SNPHL11MRL

  ;UpgradeCameo1 = NONE
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DTruckDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = NVPHL11
      Turret = Turret
      TurretPitch = TurretEL
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponMuzzleFlash = PRIMARY IgnitionAFX
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponFireFXBone = SECONDARY WeaponB
      WeaponMuzzleFlash = SECONDARY IgnitionBFX
      WeaponLaunchBone = SECONDARY WeaponB
    End

    ConditionState = MOVING
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    ConditionState = DAMAGED
      Model = NVPHL11_D
    End
    
    ConditionState = DAMAGED MOVING
      Model = NVPHL11_D
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVPHL11_E
    End
    
    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = NVPHL11_E
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    ExtraPublicBone = TreadFX01
    ExtraPublicBone = TreadFX02
    ExtraPublicBone = TreadFX03
    ExtraPublicBone = TreadFX04
    
    LeftFrontTireBone = Wheel01
    RightFrontTireBone = Wheel04
    MidLeftRearTireBone = Wheel02
    MidRightRearTireBone = Wheel05
    LeftRearTireBone = Wheel03
    RightRearTireBone = Wheel06
    
    TrackMarks = EXTireTrack.dds
    TireRotationMultiplier = 0.2
    PowerslideRotationAddition  = 0.4
  End

  Draw = W3DModelDraw ModuleTag_FiringDeploy
    OkToChangeModelColor = Yes
    
    ConditionState = NONE
      Model = NVPHL11_A1
      Animation = NVPHL11_A1.NVPHL11_A1
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    ConditionState = DAMAGED
      Model = NVPHL11_A1D
      Animation = NVPHL11_A1D.NVPHL11_A1D
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVPHL11_A1E
      Animation = NVPHL11_A1E.NVPHL11_A1E
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    
    ConditionState = PACKING
      Model = NVPHL11_A1
      Animation = NVPHL11_A1.NVPHL11_A1
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    ConditionState = PACKING DAMAGED
      Model = NVPHL11_A1D
      Animation = NVPHL11_A1D.NVPHL11_A1D
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    ConditionState = PACKING REALLYDAMAGED RUBBLE
      Model = NVPHL11_A1E
      Animation = NVPHL11_A1E.NVPHL11_A1E
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    
    ConditionState = UNPACKING
      Model = NVPHL11_A1
      Animation = NVPHL11_A1.NVPHL11_A1
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    ConditionState = UNPACKING DAMAGED
      Model = NVPHL11_A1D
      Animation = NVPHL11_A1D.NVPHL11_A1D
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    ConditionState = UNPACKING REALLYDAMAGED RUBBLE
      Model = NVPHL11_A1E
      Animation = NVPHL11_A1E.NVPHL11_A1E
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    
    ConditionState = DEPLOYED
      Model = NVPHL11_A2
      Animation = NVPHL11_A2.NVPHL11_A2
      AnimationMode = MANUAL
    End
    ConditionState = DEPLOYED DAMAGED
      Model = NVPHL11_A2D
      Animation = NVPHL11_A2D.NVPHL11_A2D
      AnimationMode = MANUAL
    End
    ConditionState = DEPLOYED REALLYDAMAGED RUBBLE
      Model = NVPHL11_A2E
      Animation = NVPHL11_A2E.NVPHL11_A2E
      AnimationMode = MANUAL
    End
  End
    
  Draw = W3DModelDraw ModuleTag_Deploy
    DefaultConditionState
      Model = None
    End
    AliasConditionState = DAMAGED
    AliasConditionState = REALLYDAMAGED RUBBLE
    AliasConditionState = DEPLOYED RUBBLE
    
    ConditionState = DEPLOYED
      Model = EXDeploy
    End
    AliasConditionState = DEPLOYED DAMAGED
    AliasConditionState = DEPLOYED REALLYDAMAGED
  End
  
  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model = None
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:WhirlwindSPMRL
  Side = China
  EditorSorting = VEHICLE
  TransportSlotCount  = 6
  BuildCost = 1800
  BuildTime = 30.0
  VisionRange = 150
  ShroudClearingRange = 150
  Prerequisites
    Object = ChinaWarFactory
    Object = ChinaResearchFacility
  End

  WeaponSet
    Conditions = None
    Weapon = PRIMARY 40xSalvoPHL11MLRSWeapon
    Weapon = SECONDARY 20xSalvoPHL11MLRSWeapon
    Weapon = TERTIARY PHL11MLRSRangeIndicatorDummyWeapon
    AutoChooseSources = SECONDARY None
    AutoChooseSources = TERTIARY None
    ShareWeaponReloadTime = Yes
  End
  WeaponSet
    Conditions = HERO
    Weapon = PRIMARY 40xHeroicSalvoPHL11MLRSWeapon
    Weapon = SECONDARY 20xHeroicSalvoPHL11MLRSWeapon
    Weapon = TERTIARY PHL11MLRSRangeIndicatorDummyWeapon
    AutoChooseSources = SECONDARY None
    AutoChooseSources = TERTIARY None
    ShareWeaponReloadTime = Yes
  End
  
  ArmorSet
    Conditions = None
    Armor = TruckArmor
    DamageFX = TruckDamageFX
  End

  ExperienceValue = 110 125 150 200
  ExperienceRequired = 0 500 750 1250
  IsTrainable = Yes
  CrusherLevel = 0
  CrushableLevel = 2
  MaxSimultaneousOfType = 5
  MaxSimultaneousLinkKey = VehicleArtillery_Limit
  CommandSet = ChinaVehicleWhirlwindCommandSet
  
  ; *** AUDIO Parameters ***
  VoiceSelect = WhirlwindVoiceSelect
  VoiceMove = WhirlwindVoiceMove
  VoiceGuard = WhirlwindVoiceMove
  VoiceAttack = WhirlwindVoiceAttack
  SoundMoveLoop = TruckMoveLoop
  SoundAmbient = TruckAmbientLoop

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = WhirlwindVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    VoiceCrush = WhirlwindVoiceMove
    VoiceEnter = WhirlwindVoiceMove
    VoiceBombard = WhirlwindVoiceBombard
    Deploy = NukeCannonDeploy
    Undeploy = NukeCannonUnDeploy
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE CANNOT_RETALIATE SALVAGER

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 200.0
    InitialHealth = 200.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = DeployStyleAIUpdate ModuleTag_AI01
    Turret
      TurretTurnRate = 20
      TurretPitchRate = 10
      FirePitch = 30
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      InitiallyDisabled = Yes
    End
    AutoAcquireEnemiesWhenIdle = No NotWhileAttacking
    PackTime = 965
    UnpackTime = 965
    TurretsFunctionOnlyWhenDeployed = Yes
    TurretsMustCenterBeforePacking = Yes
    ManualDeployAnimations = Yes
  End
  Locomotor = SET_NORMAL BasicTruckLocomotor
  
  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 45.0
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_ChinaVehicleWarrior_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL OCL_ChinaVehicleWhirlwind_DeathEffect_BlowUp
    FX = FINAL FX_GenericVehicleDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 20000
    OCL = INITIAL OCL_ChinaVehicleWhirlwind_CatchFire
    OCL = FINAL OCL_ChinaVehicleWhirlwind_DeathEffect  
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 60
    ModifierBonusPerOverkillPercent = 20%
    DestructionDelay = 150
    DestructionDelayVariance = 250
    OCL = FINAL OCL_ChinaVehicleWhirlwind_DeathEffect
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = SpawnBehavior ModuleTag_Move01
    SpawnNumber = 1
    SpawnReplaceDelay = 0
    SpawnTemplateName = 4WheelsVehicleWaterCheckerSlaveContainer
    CanReclaimOrphans = No
    SpawnedRequireSpawner = Yes
    SlavesHaveFreeWill = No
  End

  Behavior = QueueProductionExitUpdate ModuleTag_Move02
    UnitCreatePoint = X:0.0 Y:0.0 Z:0.0
    NaturalRallyPoint = X:0.0 Y:0.0 Z:0.0
    InitialBurst = 1
  End
  
  Behavior = ProductionUpdate ModuleTag_Move03
    MaxQueueEntries = 1
  End
  
  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  ; --- end detector modules ---
  
  Geometry = Box
  GeometryMajorRadius = 20.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 16.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45 
End

;------------------------------------------------------------------------------
Object PHL11MLRSRangeIndicatorOCLUpdateObject

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = None
  End
  
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD NO_COLLIDE IGNORED_IN_GUI UNATTACKABLE IMMOBILE ALWAYS_VISIBLE 
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = DeletionUpdate ModuleTag_Delete01
    MinLifetime = 10
    MaxLifetime = 10
  End
  
  Behavior = OCLUpdate ModuleTag_OCL01
    OCL = OCL_PHL11MLRSRangeIndicatorDecal
    MinDelay = 0
    MaxDelay = 0
    CreateAtEdge = Yes
  End
End
