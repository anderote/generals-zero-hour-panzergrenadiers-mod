;------------------------------------------------------------------------------
Object ChinaVehicleTroopCrawler

  ; *** ART Parameters ***
  SelectPortrait = SNTransport_L
  ButtonImage = SNTransport
  
  UpgradeCameo1 = Upgrade_Nationalism
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTruckDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ExtraPublicBone = IRFX
    
    DefaultConditionState
      Model = NVZSL10
      HideSubObject = Door
      WeaponFireFXBone = TERTIARY SL
      WeaponLaunchBone = TERTIARY SL
      TransitionKey = TRANS_None
    End
    
    ConditionState = MOVING
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = DAMAGED
      Model = NVZSL10_D
      TransitionKey = TRANS_None
    End
    
    ConditionState = DAMAGED MOVING
      Model = NVZSL10_D
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVZSL10_E
      Animation = NVZSL10_E.NVZSL10_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      TransitionKey = TRANS_ReallyDamaged
    End
    
    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = NVZSL10_E
      Animation = NVZSL10_E.NVZSL10_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Engine01 VehicleSmoke
      TransitionKey = TRANS_ReallyDamaged
    End
    
    TransitionState = TRANS_None TRANS_ReallyDamaged
      Model = NVZSL10_E1
      Animation = NVZSL10_E1.NVZSL10_E1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_ReallyDamaged TRANS_None
      Model = NVZSL10_E1
      Animation = NVZSL10_E1.NVZSL10_E1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    ExtraPublicBone = TreadFX01
    ExtraPublicBone = TreadFX02
    ExtraPublicBone = TreadFX03
    ExtraPublicBone = TreadFX04
    
    LeftFrontTireBone = Wheel01
    RightFrontTireBone = Wheel05
    MidLeftFrontTireBone = Wheel02
    MidRightFrontTireBone = Wheel06
    MidLeftRearTireBone = Wheel03
    MidRightRearTireBone = Wheel07
    LeftRearTireBone = Wheel04
    RightRearTireBone = Wheel08

    TrackMarks = EXTireTrack.dds
    TireRotationMultiplier = 0.2
    PowerslideRotationAddition = 0
  End
  
  Draw = W3DModelDraw ModuleTag_Door01
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = NVZSL10_A2
      Animation = NVZSL10_A2.NVZSL10_A2
      AnimationMode = MANUAL
    End
    
    ConditionState = DOOR_1_OPENING
      AnimationMode = ONCE
    End
    ConditionState = DOOR_1_WAITING_OPEN
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = DOOR_1_CLOSING
      AnimationMode = ONCE_BACKWARDS
    End
    
    ConditionState = DAMAGED
      Model = NVZSL10_A2D
      Animation = NVZSL10_A2D.NVZSL10_A2D
      AnimationMode = MANUAL
    End
    ConditionState = DAMAGED DOOR_1_OPENING
      Model = NVZSL10_A2D
      Animation = NVZSL10_A2D.NVZSL10_A2D
      AnimationMode = ONCE
    End
    ConditionState = DAMAGED DOOR_1_WAITING_OPEN
      Model = NVZSL10_A2D
      Animation = NVZSL10_A2D.NVZSL10_A2D
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = DAMAGED DOOR_1_CLOSING
      Model = NVZSL10_A2D
      Animation = NVZSL10_A2D.NVZSL10_A2D
      AnimationMode = ONCE_BACKWARDS
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVZSL10_A2E
      Animation = NVZSL10_A2E.NVZSL10_A2E
      AnimationMode = MANUAL
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_OPENING
      Model = NVZSL10_A2E
      Animation = NVZSL10_A2E.NVZSL10_A2E
      AnimationMode = ONCE
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_WAITING_OPEN
      Model = NVZSL10_A2E
      Animation = NVZSL10_A2E.NVZSL10_A2E
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_CLOSING
      Model = NVZSL10_A2E
      Animation = NVZSL10_A2E.NVZSL10_A2E
      AnimationMode = ONCE_BACKWARDS
    End
  End

  Draw = W3DModelDraw ModuleTag_MuzzleFX01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = None
    End
    AliasConditionState = FIRING_A
    AliasConditionState = FIRING_B
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE FIRING_A
      Model = NVZSL10_MGFX
      Turret = Turret
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE FIRING_B
      Model = NVZSL10_AAFX
      Turret = Turret
    End
  End

  Draw = W3DModelDraw ModuleTag_Turret01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = None
    End
    AliasConditionState = DAMAGED
    AliasConditionState = REALLYDAMAGED RUBBLE
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      Model = NVZSL10_MG
      Animation = NVZSL10_MG.NVZSL10_MG
      AnimationMode = ONCE
      Turret = TURRET
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE DAMAGED
      Model = NVZSL10_MGD
      Animation = NVZSL10_MGD.NVZSL10_MGD
      AnimationMode = ONCE
      Turret = TURRET
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED RUBBLE
      Model = NVZSL10_MGE
      Animation = NVZSL10_MGE.NVZSL10_MGE
      AnimationMode = ONCE
      Turret = TURRET
    End
  End

  Draw = W3DModelDraw ModuleTag_Gunner01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = None
      TransitionKey = TRANS_None
    End
    AliasConditionState = TURRET_ROTATE
    AliasConditionState = USING_WEAPON_A
    AliasConditionState = USING_WEAPON_B
    AliasConditionState = USING_WEAPON_A TURRET_ROTATE
    AliasConditionState = USING_WEAPON_B TURRET_ROTATE
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      Model = NVZSL10_MG_SKN
      Turret = MAIN_ROOT
      IdleAnimation = CITMGINF_SKL.CITMGINF_STD
      AnimationMode = ONCE
      HideSubObject = MuzzleFX01
      WeaponFireFXBone = PRIMARY MuzzleMG
      WeaponLaunchBone = PRIMARY MuzzleMG
      TransitionKey = TRANS_Idle
    End
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE TURRET_ROTATE
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE USING_WEAPON_A
      Model = NVZSL10_MG_SKN
      Turret = MAIN_ROOT
      Animation = CITMGINF_SKL.CITMGINF_ATA
      AnimationMode = LOOP
      HideSubObject = MuzzleFX01
      WeaponFireFXBone = PRIMARY MuzzleMG
      WeaponLaunchBone = PRIMARY MuzzleMG
      TransitionKey = TRANS_FiringA
    End
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE USING_WEAPON_A TURRET_ROTATE
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE USING_WEAPON_B
      Model = NVZSL10_MG_SKN
      Turret = MAIN_ROOT
      Animation = CITMGINF_SKL.CITMGINF_ATB
      AnimationMode = LOOP
      HideSubObject = MuzzleFX01
      WeaponFireFXBone = SECONDARY MuzzleMG
      WeaponLaunchBone = SECONDARY MuzzleMG
      TransitionKey = TRANS_FiringB
    End
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE USING_WEAPON_B TURRET_ROTATE
    
    TransitionState = TRANS_None TRANS_Idle
      Model = NVZSL10_MG_SKN
      Turret = MAIN_ROOT
      Animation = CITMGINF_SKL.CITMGINF_STS
      AnimationMode = ONCE
      HideSubObject = MuzzleFX01
      WeaponFireFXBone = SECONDARY MuzzleMG
      WeaponLaunchBone = SECONDARY MuzzleMG
    End
    
    TransitionState = TRANS_Idle TRANS_FiringB
      Model = NVZSL10_MG_SKN
      Turret = MAIN_ROOT
      Animation = CITMGINF_SKL.CITMGINF_S2B
      AnimationMode = ONCE
      HideSubObject = MuzzleFX01
      WeaponFireFXBone = SECONDARY MuzzleMG
      WeaponLaunchBone = SECONDARY MuzzleMG
    End
    
    TransitionState = TRANS_FiringB TRANS_Idle
      Model = NVZSL10_MG_SKN
      Turret = MAIN_ROOT
      Animation = CITMGINF_SKL.CITMGINF_S2B
      AnimationMode = ONCE_BACKWARDS
      HideSubObject = MuzzleFX01
      WeaponFireFXBone = PRIMARY MuzzleMG
      WeaponLaunchBone = PRIMARY MuzzleMG
    End
    
    TransitionState = TRANS_FiringA TRANS_FiringB
      Model = NVZSL10_MG_SKN
      Turret = MAIN_ROOT
      Animation = CITMGINF_SKL.CITMGINF_S2B
      AnimationMode = ONCE
      HideSubObject = MuzzleFX01
      WeaponFireFXBone = SECONDARY MuzzleMG
      WeaponLaunchBone = SECONDARY MuzzleMG
    End
    
    TransitionState = TRANS_FiringB TRANS_FiringA
      Model = NVZSL10_MG_SKN
      Turret = MAIN_ROOT
      Animation = CITMGINF_SKL.CITMGINF_S2B
      AnimationMode = ONCE_BACKWARDS
      HideSubObject = MuzzleFX01
      WeaponFireFXBone = PRIMARY MuzzleMG
      WeaponLaunchBone = PRIMARY MuzzleMG
    End
  End

  Draw = W3DModelDraw ModuleMod_Amphibious01
    ConditionState = NONE
      Model = NVZSL10_A1
      Animation = NVZSL10_A1.NVZSL10_A1
      AnimationMode = MANUAL
    End
    AliasConditionState = MOVING
    
    ConditionState = OVER_WATER
      Model = NVZSL10_A1
      Animation = NVZSL10_A1.NVZSL10_A1
      AnimationMode = MANUAL
      ParticleSysBone = Wave04 AmphibWaveRest
      ParticleSysBone = Wave05 AmphibWaveRest
    End

    ConditionState = OVER_WATER MOVING
      Model = NVZSL10_A1
      Animation = NVZSL10_A1.NVZSL10_A1
      AnimationMode = LOOP
      ParticleSysBone = Turbine01 WaveSplashLeft01
      ParticleSysBone = Turbine02 WaveSplashRight01
      ParticleSysBone = Wave03 AmphibWaveActiveBase
      ParticleSysBone = Wave03 AmphibWaveActive
    End
  End
  
  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model = None
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TroopCrawler
  Side = China
  EditorSorting = VEHICLE
  TransportSlotCount = 10
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY 125Range_DeployWeapon
    Weapon = TERTIARY 12xVehicleSmokeGrenadeLaunchWeapon
    AutoChooseSources = TERTIARY None
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY QJC88HeavyMachineGunWeapon
    Weapon = SECONDARY QJC88HeavyMachineGunWeaponAir
    Weapon = TERTIARY 12xVehicleSmokeGrenadeLaunchWeapon
    AutoChooseSources = TERTIARY None
  End

  ArmorSet
    Conditions = None
    Armor = APCArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 1000
  BuildTime = 25.0
  VisionRange = 150
  ShroudClearingRange = 150
  Prerequisites
    Object = ChinaWarFactory
    Object = ChinaPropagandaCenter
  End
  
  ExperienceValue = 50 50 100 150 
  ExperienceRequired = 0 200 300 600 
  IsTrainable = Yes
  CrusherLevel = 0
  CrushableLevel = 2
  CommandSet = ChinaTroopCrawlerCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = TroopCrawlerVoiceSelect
  VoiceMove = TroopCrawlerVoiceMove
  VoiceGuard = TroopCrawlerVoiceMove
  VoiceAttack = TroopCrawlerVoiceAttack
  SoundMoveLoop = TruckMoveLoop
  SoundAmbient = TruckAmbientLoop
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = TroopCrawlerVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound
    TruckLandingSound = NoSound
    TruckPowerslideSound = NoSound
    VoiceCrush = TroopCrawlerVoiceCrush
    VoiceUnload = TroopCrawlerVoiceUnload
    VoiceEnter = TroopCrawlerVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS TRANSPORT VEHICLE HUGE_VEHICLE SCORE SALVAGER ATTACK_NEEDS_LINE_OF_SIGHT LOW_OVERLAPPABLE
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 250.0
    InitialHealth = 250.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 480
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = TransportAIUpdate ModuleTag_AI01
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY
      TurretTurnRate = 64
      MinIdleScanAngle = 15
      MaxIdleScanAngle = 15
      MinIdleScanInterval = 2000
      MaxIdleScanInterval = 3000
      RecenterTime = 5000
      FiresWhileTurning = Yes
    End
    MoodAttackCheckRate = 250
    AutoAcquireEnemiesWhenIdle = Yes NotWhileAttacking
  End
  Locomotor = SET_NORMAL ZSL10Locomotor ZSL10Locomotor_Water
  
  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = HordeUpdate ModuleTag_Horde01
    RubOffRadius = 150
    UpdateRate = 1000
    Radius = 75
    KindOf = VEHICLE HUGE_VEHICLE
    AlliesOnly = Yes
    ExactMatch = No
    Count = 3
    Action = HORDE
  End

  Behavior = HordeUpdate ModuleTag_Horde02
    RubOffRadius = 150
    UpdateRate = 1000
    Radius = 75
    KindOf = INFANTRY 
    AlliesOnly = Yes
    ExactMatch = No
    Count = 5
    Action = HORDE
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 30.0
  End
  
  Behavior = TransportContain ModuleTag_Contain01
    PassengersAllowedToFire = Yes
    Slots = 10
    ScatterNearbyOnExit = Yes
    DamagePercentToUnits = 100%
    AllowInsideKindOf = INFANTRY
    DoorOpenTime = 1350
    ExitDelay = 250
    NumberOfExitPaths = 1
    GoAggressiveOnExit = Yes
    WeaponBonusPassedToPassengers = Yes
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_ChinaVehicleTroopCrawler_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 20000
    OCL = INITIAL OCL_ChinaVehicleTroopCrawler_CatchFire
    OCL = FINAL OCL_ChinaVehicleTroopCrawler_DeathEffect  
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 80
    ModifierBonusPerOverkillPercent = 20%
    DestructionDelay = 150
    DestructionDelayVariance = 250
    OCL = FINAL OCL_ChinaVehicleTroopCrawler_DeathEffect
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = FireWeaponUpdate ModuleTag_Move01
    Weapon = Ingenious8WheelsVehicleMovementWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move02
    Weapon = IngeniousVehicleCheckerWeapon
  End
  
  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End
  
  Behavior = WeaponSetUpgrade ModuleTag_HMG01
    TriggeredBy = Upgrade_HMGAddon
  End
  
  Behavior = StatusBitsUpgrade ModuleTag_MassMobilisation01
    TriggeredBy = Upgrade_ChinaMassMobilisationAbility
    ConflictsWith = DummyObjectUpgradeOne
    StatusToSet = REASSIGN_PARKING
  End

  Behavior = GrantUpgradeCreate ModuleTag_MassMobilisation02
    UpgradeToGrant = DummyObjectUpgradeOne
    ExemptStatus = REASSIGN_PARKING
  End
  
  Behavior = FireWeaponCollide ModuleTag_MassMobilisation03
    CollideWeapon = ChinaVehicleTroopCrawlerOCLInjectorWeapon
    RequiredStatus = REASSIGN_PARKING
  End
  
  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_InfraredDetector01
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    LoudPingSound = IRPingLoud
    IRBrightParticleSysName = IRDetectSonarBrightRed
    IRGridParticleSysName = IRDetectGridRed
    IRBeaconParticleSysName = IRLenzflareRed
    IRParticleSysBone = IRFX
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
  End
  ; --- end detector modules ---
  
  Behavior = WeaponBonusUpgrade ModuleTag_LoadedWeaponBonus01
    TriggeredBy = Upgrade_InherentBehaviour
  End
  
  Behavior = GrantUpgradeCreate ModuleTag_LoadedWeaponBonus02
    UpgradeToGrant = Upgrade_InherentBehaviour
  End
  
  Geometry = Box
  GeometryMajorRadius = 23.0
  GeometryMinorRadius = 9.0
  GeometryHeight = 13.0     
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End
