  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = None
  End
  
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD NO_COLLIDE IGNORED_IN_GUI UNATTACKABLE IMMOBILE ALWAYS_VISIBLE 
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = DeletionUpdate ModuleTag_Delete01
    MinLifetime = 10
    MaxLifetime = 10
  End
  
  Behavior = OCLUpdate ModuleTag_OCL01
    OCL = OCL_WarhammerArtilleryRangeIndicatorDecal
    MinDelay = 0
    MaxDelay = 0
    CreateAtEdge = Yes
  End
End
