;------------------------------------------------------------------------------
Object ChinaVehicleWarhammerArtillery

  ; *** ART Parameters ***
  SelectPortrait = SNInferno_L
  ButtonImage = SNInferno
  
  ;UpgradeCameo1 = NONE
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DOverlordTankDraw ModuleTag_W3D01
    OkToChangeModelColor  = Yes
    
    DefaultConditionState
      Model = NVPLZ05
      Turret = Turret
      TurretPitch = TurretEL
      HideSubObject = Smoke_Launch Barrel01 HouseColor03 HouseColor04 MuzzleFX01
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponLaunchBone = PRIMARY Muzzle
      WeaponFireFXBone = SECONDARY Muzzle
      WeaponLaunchBone = SECONDARY Muzzle
      TransitionKey = TRANS_None
    End
    
    ConditionState = MOVING
      ParticleSysBone = Engine01 VehicleSmoke
      ParticleSysBone = Engine02 VehicleSmoke
      TransitionKey = TRANS_None
    End

    ConditionState = RELOADING_A
      ParticleSysBone = Muzzle01 TankRifleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      WeaponFireFXBone = SECONDARY SL
      WeaponLaunchBone = SECONDARY SL
      TransitionKey = TRANS_None
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE MOVING
      WeaponFireFXBone = SECONDARY SL
      WeaponLaunchBone = SECONDARY SL
      ParticleSysBone = Engine01 VehicleSmoke
      ParticleSysBone = Engine02 VehicleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE RELOADING_A
      WeaponFireFXBone = SECONDARY SL
      WeaponLaunchBone = SECONDARY SL
      ParticleSysBone = Muzzle01 TankRifleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = DAMAGED
      Model = NVPLZ05_D
      TransitionKey = TRANS_None
    End

    ConditionState = DAMAGED MOVING
      Model = NVPLZ05_D
      ParticleSysBone = Engine01 VehicleSmoke
      ParticleSysBone = Engine02 VehicleSmoke
      TransitionKey = TRANS_None
    End

    ConditionState = DAMAGED RELOADING_A
      Model = NVPLZ05_D
      ParticleSysBone = Muzzle01 TankRifleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE DAMAGED
      Model = NVPLZ05_D
      WeaponFireFXBone = SECONDARY SL
      WeaponLaunchBone = SECONDARY SL
      TransitionKey = TRANS_None
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE DAMAGED MOVING
      Model = NVPLZ05_D
      WeaponFireFXBone = SECONDARY SL
      WeaponLaunchBone = SECONDARY SL
      ParticleSysBone = Engine01 VehicleSmoke
      ParticleSysBone = Engine02 VehicleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE DAMAGED RELOADING_A
      Model = NVPLZ05_D
      WeaponFireFXBone = SECONDARY SL
      WeaponLaunchBone = SECONDARY SL
      ParticleSysBone = Muzzle01 TankRifleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVPLZ05_E
      Animation = NVPLZ05_E.NVPLZ05_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      TransitionKey = TRANS_ReallyDamaged
    End

    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = NVPLZ05_E
      Animation = NVPLZ05_E.NVPLZ05_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Engine01 VehicleSmoke
      ParticleSysBone = Engine02 VehicleSmoke
      TransitionKey = TRANS_ReallyDamaged
    End

    ConditionState = REALLYDAMAGED RUBBLE RELOADING_A
      Model = NVPLZ05_E
      Animation = NVPLZ05_E.NVPLZ05_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Muzzle01 TankRifleSmoke
      TransitionKey = TRANS_ReallyDamaged
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED RUBBLE
      Model = NVPLZ05_E
      Animation = NVPLZ05_E.NVPLZ05_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      WeaponFireFXBone = SECONDARY SL
      WeaponLaunchBone = SECONDARY SL
      TransitionKey = TRANS_ReallyDamaged
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED RUBBLE MOVING
      Model = NVPLZ05_E
      Animation = NVPLZ05_E.NVPLZ05_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      WeaponFireFXBone = SECONDARY SL
      WeaponLaunchBone = SECONDARY SL
      ParticleSysBone = Engine01 VehicleSmoke
      ParticleSysBone = Engine02 VehicleSmoke
      TransitionKey = TRANS_ReallyDamaged
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED RUBBLE RELOADING_A
      Model = NVPLZ05_E
      Animation = NVPLZ05_E.NVPLZ05_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      WeaponFireFXBone = SECONDARY SL
      WeaponLaunchBone = SECONDARY SL
      ParticleSysBone = Muzzle01 TankRifleSmoke
      TransitionKey = TRANS_ReallyDamaged
    End
    
    TransitionState = TRANS_None TRANS_ReallyDamaged
      Model = NVPLZ05_E1
      Animation = NVPLZ05_E1.NVPLZ05_E1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_ReallyDamaged TRANS_None
      Model = NVPLZ05_E1
      Animation = NVPLZ05_E1.NVPLZ05_E1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    ExtraPublicBone = TreadFX01
    ExtraPublicBone = TreadFX02
    ExtraPublicBone = TreadFX03
    ExtraPublicBone = TreadFX04
    
    TrackMarks = NVTnkTracks2.dds
    TreadAnimationRate = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  Draw = W3DModelDraw ModuleTag_W3D02
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = NVPLZ05_A1
      Turret = Turret
      TurretPitch = TurretEL
      HideSubObject = MuzzleFX01
    End
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE FIRING_B
    
    ConditionState = FIRING_A
      Animation = NVPLZ05_A1.NVPLZ05_A1
      AnimationMode = ONCE
      ShowSubObject = MuzzleFX01
    End
    AliasConditionState = FIRING_B
    
    ConditionState = DAMAGED
      Model = NVPLZ05_A1D
      HideSubObject = MuzzleFX01
    End
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE DAMAGED FIRING_B
    
    ConditionState = DAMAGED FIRING_A
      Model = NVPLZ05_A1D
      Animation = NVPLZ05_A1D.NVPLZ05_A1D
      AnimationMode = ONCE
      ShowSubObject = MuzzleFX01
    End
    AliasConditionState = DAMAGED FIRING_B
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVPLZ05_A1E
      HideSubObject = MuzzleFX01
    End
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED RUBBLE FIRING_B
    
    ConditionState = REALLYDAMAGED RUBBLE FIRING_A
      Model = NVPLZ05_A1E
      Animation = NVPLZ05_A1E.NVPLZ05_A1E
      AnimationMode = ONCE
      ShowSubObject = MuzzleFX01
    End
    AliasConditionState = REALLYDAMAGED RUBBLE FIRING_B
  End
    
  Draw = W3DModelDraw ModuleTag_Deploy
    DefaultConditionState
      Model = None
    End
    AliasConditionState = DAMAGED
    AliasConditionState = REALLYDAMAGED RUBBLE
    AliasConditionState = DEPLOYED RUBBLE
    
    ConditionState = DEPLOYED
      Model = EXDeploy
    End
    AliasConditionState = DEPLOYED DAMAGED
    AliasConditionState = DEPLOYED REALLYDAMAGED
  End
  
  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model = None
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:WarhammerArtillery
  Side = China
  EditorSorting = VEHICLE
  TransportSlotCount = 6 
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY PLL01HowitzerGun
    Weapon = SECONDARY PLL01HowitzerGun_BurstFiring
    Weapon = TERTIARY WarhammerArtilleryRangeIndicatorDummyWeapon
    AutoChooseSources = SECONDARY NONE
    AutoChooseSources = TERTIARY NONE
    ShareWeaponReloadTime = Yes
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY PLL01HowitzerGun
    Weapon = SECONDARY 8xVehicleSmokeGrenadeLaunchWeapon
    Weapon = TERTIARY WarhammerArtilleryRangeIndicatorDummyWeapon
    AutoChooseSources = SECONDARY NONE
    AutoChooseSources = TERTIARY NONE
  End
  
  ArmorSet
    Conditions = None
    Armor = APCArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 2000
  BuildTime = 40.0
  VisionRange = 150
  ShroudClearingRange = 150
  Prerequisites
    Object = ChinaWarFactory
    Object = ChinaResearchFacility
    Object = ChinaTier2DummyObject
    Science = China_SCIENCE_BreakthroughTactics
  End

  ExperienceValue = 110 125 150 200
  ExperienceRequired = 0 250 500 1000
  IsTrainable = Yes
  CrusherLevel = 2
  CrushableLevel = 2
  MaxSimultaneousOfType = 5
  MaxSimultaneousLinkKey = VehicleArtillery_Limit
  CommandSet = ChinaVehicleWarhammerArtilleryCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = InfernoCannonVoiceSelect
  VoiceMove = InfernoCannonVoiceMove
  VoiceGuard = InfernoCannonVoiceMove
  VoiceAttack = InfernoCannonVoiceAttack
  SoundMoveLoop = ChinaTankV1MoveLoop
  SoundAmbient = ChinaTankV1AmbientLoop

  UnitSpecificSounds
    VoiceCreate = InfernoCannonVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    VoiceCrush = InfernoCannonVoiceCrush
    VoiceEnter = InfernoCannonVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE HUGE_VEHICLE SCORE CANNOT_RETALIATE SALVAGER
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 250.0
    InitialHealth = 250.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 240
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = DeployStyleAIUpdate ModuleTag_AI01
    Turret
      TurretTurnRate = 25
      TurretPitchRate = 10
      AllowsPitch = Yes
      FirePitch = 20
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      InitiallyDisabled = Yes
    End
    AutoAcquireEnemiesWhenIdle = No NotWhileAttacking
    PackTime = 500
    UnpackTime = 500
    TurretsFunctionOnlyWhenDeployed = Yes
    TurretsMustCenterBeforePacking = Yes
    ManualDeployAnimations = No
  End
  Locomotor = SET_NORMAL PLZ05Locomotor
  
  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 125.0
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_ChinaVehicleWarhammerArtillery_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL OCL_ChinaVehicleWarhammerArtillery_DeathEffect_BlowUp
    FX = FINAL FX_GenericTankDeathExplosion
  End

  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 60
    DestructionDelay = 100
    DestructionDelayVariance  = 50
    OCL = FINAL OCL_ChinaVehicleWarhammerArtillery_DeathEffect
    FX = FINAL FX_GenericTankDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 30000
    OCL = INITIAL OCL_ChinaVehicleWarhammerArtillery_CatchFire
    FX = INITIAL FX_GenericTankCatchFire
    OCL = FINAL OCL_ChinaVehicleWarhammerArtillery_DeathEffect
    FX = FINAL FX_GenericTankDeathExplosion
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = SpawnBehavior ModuleTag_Move01
    SpawnNumber = 1
    SpawnReplaceDelay = 0
    SpawnTemplateName = TankWaterCheckerSlaveContainer
    CanReclaimOrphans = No
    SpawnedRequireSpawner = Yes
    SlavesHaveFreeWill = No
  End

  Behavior = QueueProductionExitUpdate ModuleTag_Move02
    UnitCreatePoint = X:0.0 Y:0.0 Z:0.0
    NaturalRallyPoint = X:0.0 Y:0.0 Z:0.0
    InitialBurst = 1
  End
  
  Behavior = ProductionUpdate ModuleTag_Move03
    MaxQueueEntries = 1
  End
  
  Behavior = SubObjectsUpgrade ModuleTag_Addon01
    TriggeredBy = Upgrade_HMGAddon
    HideSubObjects = TurretPort
  End

  Behavior = SubObjectsUpgrade ModuleTag_Addon02
    TriggeredBy = Upgrade_SmokeScreenDischargerAddon
    ShowSubObjects = Smoke_Launch
  End

  Behavior = ObjectCreationUpgrade ModuleTag_HMG01
    UpgradeObject = OCL_ChinaInfantryQJC88MachineGunner
    TriggeredBy = Upgrade_HMGAddon
  End
  
  Behavior = OverlordContain ModuleTag_HMG02
    Slots = 1
    DamagePercentToUnits = 100%
    AllowInsideKindOf = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret = Yes
    ExperienceSinkForRider = Yes
  End
  
  Behavior = OCLSpecialPower ModuleTag_SmokeGenerator01
    SpecialPowerTemplate = SpecialAbilitySmokeScreenGenerator
    OCL = OCL_GenericVehicleSmokeGeneratorSmokeScreen
  End  

  Behavior = CommandSetUpgrade ModuleTag_SmokeDischarger01
    TriggeredBy = Upgrade_SmokeScreenDischargerAddon
    CommandSet = ChinaVehicleWarhammerArtilleryUpgradedCommandSet
  End

  Behavior = WeaponSetUpgrade ModuleTag_SmokeDischarger02
    TriggeredBy = Upgrade_SmokeScreenDischargerAddon
  End

  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  ; --- end detector modules ---
  
  Geometry = Box
  GeometryMajorRadius = 20.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 16.5
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME 
  ShadowSizeX = 45
End

