;------------------------------------------------------------------------------
Object Grass01

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ConditionState = NONE
      Model = RealGrassL
    End

    ConditionState = AFLAME
      Model = RealGrassL
    End

    ConditionState = AFLAME SMOLDERING
      Model = RealGrassL_B
      ParticleSysBone = AFlame01 SmoulderTree
    End

    ConditionState = SMOLDERING
      Model = RealGrassL_B
      ParticleSysBone = Aflame01 SmoulderTree
      ParticleSysBone = Aflame05 SmoulderTree
    End
    AliasConditionState = SMOLDERING REALLYDAMAGED RUBBLE

    ConditionState = BURNED
      Model = RealGrassL_B
    End
    AliasConditionState = BURNED REALLYDAMAGED SNOW
    AliasConditionState = BURNED REALLYDAMAGED RUBBLE SNOW
    AliasConditionState = REALLYDAMAGED RUBBLE
    AliasConditionState = BURNED REALLYDAMAGED RUBBLE
    AliasConditionState = REALLYDAMAGED RUBBLE SNOW
 
    ConditionState = SNOW
      Model = RealGrassL_S
    End

    ConditionState = AFLAME SNOW
      Model = RealGrassL_S
    End

    ConditionState = AFLAME SMOLDERING SNOW
      Model = RealGrassL_B
      ParticleSysBone = AFlame01 SmoulderTree
    End

    ConditionState = SMOLDERING SNOW
      Model = RealGrassL_B
      ParticleSysBone = Aflame01 SmoulderTree
      ParticleSysBone = Aflame05 SmoulderTree
    End
    AliasConditionState = SMOLDERING REALLYDAMAGED RUBBLE SNOW
  End

  ; ***DESIGN parameters ***
  EditorSorting = SHRUBBERY
  CrushableLevel = 0
  ArmorSet
    Conditions = None
    Armor = GrassArmor
    DamageFX = GrassDamageFX
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD SHRUBBERY IMMOBILE IGNORED_IN_GUI NO_COLLIDE PROP
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 50.0
    InitialHealth = 50.0
  End

  ; Behavior = FireWeaponCollide ModuleTag_Fire01
    ; CollideWeapon = TreeFireDealDamageWeapon
    ; RequiredStatus = AFLAME
  ; End

  Behavior = FireSpreadUpdate ModuleTag_Fire02
    OCLEmbers = OCL_BurningEmbers
    MinSpreadDelay = 3000
    MaxSpreadDelay = 6000
    SpreadTryRange = 50
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 2
    FlameDamageExpiration = 0
    AflameDuration = 12000
    AflameDamageAmount = 5
    AflameDamageDelay = 1000 
    BurnedDelay = 12000
    BurningSoundName = GenericFireMediumLoop
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = NONE +BURNED
    SinkRate = 1.0
    SinkDelay = 120000
    DestructionDelay = 135000
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -BURNED
    SinkRate = 1.0
    SinkDelay = 60000
    DestructionDelay = 75000
  End

  Geometry = Cylinder
  GeometryIsSmall = Yes
  GeometryMajorRadius = 15.0
  GeometryHeight = 2.0
  InstanceScaleFuzziness = 0.1
End

