Object Bird

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = CIBird
      Animation = CIBird.CIBird
      AnimationMode = LOOP
    End
  End
  
  ; ***DESIGN parameters ***
  EditorSorting = MISC_NATURAL
  VisionRange = 50
  ArmorSet
    Conditions = None
    Armor = NoArmor
    DamageFX = None
  End
  
  ; *** ENGINEERING Parameters ***
  KindOf =  INFANTRY NO_SELECT IGNORED_IN_GUI
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 5.0
    InitialHealth = 5.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL BirdLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
  End
  
  Scale = 2.25
  Shadow = NONE
  Geometry = Sphere
  GeometryMajorRadius = 5.0
  GeometryHeight = 1.0
  GeometryIsSmall = Yes
End

