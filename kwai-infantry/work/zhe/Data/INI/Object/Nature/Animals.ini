Object Chicken

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = CUChicken_SKN
      IdleAnimation = CUChicken_SKL.CUChicken_PEKA
      IdleAnimation = CUChicken_SKL.CUChicken_PEKB
      AnimationMode = ONCE
    End
    ConditionState = MOVING PANICKING
      Animation = CUChicken_SKL.CUChicken_RUNA
      AnimationMode = LOOP
      Flags = RANDOMSTART
    End
    ConditionState = MOVING
      Animation = CUChicken_SKL.CUChicken_WLKA
      AnimationMode = LOOP
      Flags = RANDOMSTART
    End
    ConditionState = DYING
      Animation = CUChicken_SKL.CUCHicken_DIEA
      AnimationMode = ONCE
    End  
  End
  
  ; ***DESIGN parameters ***
  EditorSorting = MISC_NATURAL
  TransportSlotCount = 1
  VisionRange = 50
  CrushableLevel = 0
  ArmorSet
    Conditions = None
    Armor = NoArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf =  INFANTRY CAN_BE_REPULSED NO_SELECT IGNORED_IN_GUI
  Body = ActiveBody ModuleTag_Body01
   MaxHealth = 5.0
   InitialHealth = 5.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL ChickenLocomotor
  Locomotor = SET_WANDER ChickenWanderLocomotor
  Locomotor = SET_PANIC  ChickenPanicLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
  End
  
  Behavior = SquishCollide ModuleTag_Physics02
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL 
    SinkDelay = 2500
    SinkRate = 1.00
    DestructionDelay = 7500
  End
  
  Scale = 0.75
  Geometry = Cylinder
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 1.5
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 8.0
  ShadowSizeY = 4.0
  ShadowTexture = ShadowI
End

