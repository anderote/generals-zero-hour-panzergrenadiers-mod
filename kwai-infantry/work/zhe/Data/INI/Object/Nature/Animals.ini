Object OxPlow

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = CIox_SKN
      IdleAnimation = CIox_SKL.CIox_STD
      IdleAnimation = CIox_SKL.CIox_IDL
      AnimationMode = ONCE
    End
    ConditionState = MOVING
      Animation = CIox_SKL.CIox_WKA
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 2.00 2.00
    End
    ConditionState = MOVING PANICKING
      Animation = CIox_SKL.CIox_RUN 30
      AnimationSpeedFactorRange = 2.50 2.50
      AnimationMode = LOOP
      ParticleSysBone = None InfantryDustTrails
    End
    ConditionState = DYING
      Animation = CIox_SKL.CIox_DTA
      AnimationMode = ONCE
    End  
  End
  
  ; ***DESIGN parameters ***
  EditorSorting = MISC_NATURAL
  TransportSlotCount = 1
  VisionRange = 50
  CrushableLevel = 1
  CrusherLevel = 0
  ArmorSet
    Conditions = None
    Armor = HumanArmor
    DamageFX = InfantryDamageFX
  End
  
  ; *** AUDIO Parameters ***
  SoundAmbient = CowAmbience
  
  ; *** ENGINEERING Parameters ***
  RadarPriority = LOCAL_UNIT_ONLY
  KindOf =  INFANTRY CAN_BE_REPULSED NO_SELECT IGNORED_IN_GUI
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL
    SinkDelay = 5000
    SinkRate = 1.0
    DestructionDelay = 10000
  End
  
  Behavior = AIUpdateInterface ModuleTag_Ai01
  End
  Locomotor = SET_NORMAL BasicAnimalLocomotor
  Locomotor = SET_WANDER WanderAnimalLocomotor
  Locomotor = SET_PANIC PanicAnimalLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 30.0
  End
  
  Behavior = SquishCollide ModuleTag_Physics02
  End
  
  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End
  
   Behavior = PoisonedBehavior ModuleTag_Poison
    PoisonDamageInterval = 100
    PoisonDuration = 3000
  End
  
  Geometry = Box
  GeometryMajorRadius = 5.0
  GeometryMinorRadius = 5.0
  GeometryHeight = 10.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 21
  ShadowSizeY = 16
  ShadowTexture = ShadowI
End

