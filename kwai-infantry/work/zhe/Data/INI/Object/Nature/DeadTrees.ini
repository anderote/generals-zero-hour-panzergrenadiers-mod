; -----------------------------------------------------------------------------
; ---------------------- Dead Trees Object Codes ------------------------------
;------------------------------------------------------------------------------
Object TreeBurnedStump

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = PTStumpPine_B
    End
  End
  
  ; *** DESIGN parameters ***
  DisplayName = OBJECT:TreeStump
  EditorSorting = SHRUBBERY
  ArmorSet
    Conditions = None
    Armor = TreeArmor
    DamageFX = None
  End

  ; *** ENGINEERING parameters ***
  KindOf = PRELOAD SHRUBBERY IMMOBILE IGNORED_IN_GUI 
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 30.0
    InitialHealth = 30.0
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death01
    SinkRate = 1
    SinkDelay = 60000
    DestructionDelay = 69000
  End
  
  Behavior = LifetimeUpdate ModuleTag_Delete01
    MinLifetime = 60000
    MaxLifetime = 60000
  End

  Geometry = Cylinder
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
  GeometryHeight = 1.0
  ShadowSizeX = 10;
  ShadowSizeY = 10;
  ShadowTexture = ShadowI;
  InstanceScaleFuzziness = 0.1
End

;------------------------------------------------------------------------------
Object GenericDeadTree

  ; *** DESIGN parameters ***
  EditorSorting = SHRUBBERY
  CrusherLevel = 0
  CrushableLevel = 1
  ArmorSet
    Conditions = None
    Armor = DeadTreeArmor
    DamageFX = None
  End

  ; *** AUDIO Parameters ***
  SoundOnDamaged = TreeDamaged
  SoundOnReallyDamaged = TreeDamaged

  ; *** ENGINEERING parameters ***
  KindOf = PRELOAD IMMOBILE SHRUBBERY IGNORED_IN_GUI
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 150.0
    InitialHealth = 150.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL StationaryLocomotor

  Behavior = ToppleUpdate ModuleTag_Topple01
    ToppleFX = FX_ToppleTree
    StumpName = TreeBurnedStump
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 20.0
    AerodynamicFriction = 0.2
    ForwardFriction = 0.9 
    CenterOfMassOffset = -2
    ShockResistance = 1.0
    AllowCollideForce = No
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -TOPPLED -SPLATTED -CRUSHED
    FX = FX_WoodExplosionPuff
    OCL = OCL_WoodDeadExplosion
  End

  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = NONE +TOPPLED +SPLATTED +CRUSHED
    SinkRate = 1.00
    SinkDelay = 0
    DestructionDelay = 30000
    ProbabilityModifier = 1
    ModifierBonusPerOverkillPercent = 60%
    FX = FINAL None
  End

  Geometry = Cylinder
  GeometryIsSmall = Yes
  GeometryMajorRadius = 3.0
  GeometryHeight = 15.0
  Shadow = SHADOW_DECAL
  ShadowTexture = PTSha
End

;------------------------------------------------------------------------------
Object GenericDeadBush

  ; *** DESIGN parameters ***
  EditorSorting = SHRUBBERY
  CrusherLevel = 0
  CrushableLevel = 0
  ArmorSet
    Conditions = None
