;ZH trees become like Generals trees, only better - they can bbe damaged by more damage types
;Yet don't take much more CPU resources, in fact, possibly less than Generals trees

;DisplayName = OBJECT:Birch Fir MapleTree OakTree PalmTree PineTree SpruceTree
;But all say "Tree"

;stumps available for: TreeMapleStump TreeOakStump TreePalmStump TreePineStump TreeSpruceStump
;however only the spruce and palm stumps are useful. Others are too big.

;------------------------------------------------------------------------------
Object TreeFir01

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ConditionState = NONE
      Model = PTXFIR01
    End
    AliasConditionState = DAMAGED

    ; ConditionState placeholders
    ConditionState = AFLAME
      Model = PTXFir01
      ParticleSysBone = AFlame01 FireTree
      ParticleSysBone = AFlame01 FireTreeSparks
    End
    ConditionState = AFLAME SMOLDERING
      Model = PTXFir01_B
      ParticleSysBone = AFlame01 SmoulderTree
      ParticleSysBone = AFlame01 FireTreeSparks
    End
    AliasConditionState = AFLAME REALLYDAMAGED RUBBLE
    AliasConditionState = AFLAME SMOLDERING REALLYDAMAGED RUBBLE

    ConditionState = SNOW
      Model = PTXFir01_S
    End
    AliasConditionState = SNOW DAMAGED

    ConditionState = SNOW AFLAME
      Model = PTXFir01_S
      ParticleSysBone = AFlame01 FireTree
      ParticleSysBone = AFlame01 FireTreeSparks
    End
    ConditionState = SNOW AFLAME SMOLDERING
      Model = PTXFir01_B
      ParticleSysBone = AFlame01 SmoulderTree
      ParticleSysBone = AFlame01 FireTreeSparks
    End
    AliasConditionState = SNOW AFLAME REALLYDAMAGED RUBBLE
    AliasConditionState = SNOW AFLAME SMOLDERING REALLYDAMAGED RUBBLE

    ConditionState = SMOLDERING
      Model = PTXFir01_B
      ParticleSysBone = AFlame01 SmoulderTree
      ParticleSysBone = AFlame02 SmoulderTree
    End
    AliasConditionState = SMOLDERING REALLYDAMAGED RUBBLE

    ConditionState = BURNED
      Model = PTXFir01_B
    End
    AliasConditionState = REALLYDAMAGED RUBBLE
    AliasConditionState = BURNED REALLYDAMAGED RUBBLE

    ConditionState = SNOW SMOLDERING
      Model = PTXFir01_B
      ParticleSysBone = AFlame01 SmoulderTree
      ParticleSysBone = AFlame02 SmoulderTree
    End
    AliasConditionState = SNOW SMOLDERING REALLYDAMAGED RUBBLE

    ConditionState = SNOW BURNED
      Model = PTXFir01_BS
    End
    AliasConditionState = SNOW REALLYDAMAGED RUBBLE
    AliasConditionState = SNOW BURNED REALLYDAMAGED RUBBLE
    End

  ; *** DESIGN parameters ***
  EditorSorting = SHRUBBERY
  CrusherLevel = 0
  CrushableLevel = 1
  ArmorSet
    Conditions = None
    Armor = TreeArmor
    DamageFX = None
  End
  
  ; *** AUDIO Parameters ***
  SoundOnDamaged = TreeDamaged
  SoundOnReallyDamaged = TreeDamaged

  ; *** ENGINEERING parameters ***
  KindOf = PRELOAD SHRUBBERY IGNORED_IN_GUI

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 200.0
    InitialHealth = 200.0
  End

  Behavior = FireWeaponCollide ModuleTag_Fire01
    CollideWeapon = TreeFireDealDamageWeapon
    RequiredStatus = AFLAME
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 2
    FlameDamageExpiration = 0
    AflameDuration = 12000
    AflameDamageAmount = 5 
    AflameDamageDelay = 1000
    BurnedDelay = 12000
    BurningSoundName = GenericFireMediumLoop
  End

  Behavior = FireSpreadUpdate ModuleTag_Fire02
    OCLEmbers = OCL_BurningEmbers
    MinSpreadDelay = 3000
    MaxSpreadDelay = 6000
    SpreadTryRange = 50
  End

  ClientUpdate = SwayClientUpdate ModuleTag_Sway
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL StationaryLocomotor

  Behavior = ToppleUpdate ModuleTag_Topple01
    ToppleFX = FX_ToppleTree
    BounceFX = FX_TreeBounceWLeaves
    StumpName = TreeSpruceStump
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 20.0
    AerodynamicFriction = 0.2
    ForwardFriction = 0.9 
    CenterOfMassOffset = -2
    ShockResistance = 1.0
    AllowCollideForce = No
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -TOPPLED -SPLATTED -CRUSHED -BURNED
    FX = FX_WoodExplosionPuff
    OCL = OCL_WoodDeadExplosion
  End

  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = NONE +BURNED
    DestructionDelay = 10000
    OCL = FINAL OCL_DeadTreeFir01
  End

  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = NONE +TOPPLED +SPLATTED +CRUSHED
    SinkRate = 1.00
    SinkDelay = 0
    DestructionDelay = 30000
    ProbabilityModifier = 1
    ModifierBonusPerOverkillPercent = 60%
    FX = FINAL None
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedParticleSystem1 = Bone:AFlame RandomBone:Yes PSys:TreeDamagedLeaves
    ReallyDamagedParticleSystem1 = Bone:AFlame RandomBone:Yes PSys:TreeReallyDamagedLeaves
    RubbleParticleSystem1 = Bone:AFlame RandomBone:Yes PSys:TreeRubbleDebris
  End

  Geometry = Cylinder
  GeometryIsSmall = No
  GeometryMajorRadius = 3.0
  GeometryHeight = 15.0
  Shadow = SHADOW_DECAL
  ShadowTexture = PTSha;
  InstanceScaleFuzziness = 0.1
End

