;------------------------------------------------------------------------------
Locomotor BurningEmberLocomotor
  Surfaces = GROUND WATER CLIFF RUBBLE
  Speed = 15
  SpeedDamaged = 12
  MinSpeed = 8
  TurnRate = 180
  TurnRateDamaged = 90
  Acceleration = 100
  AccelerationDamaged = 80
  Lift = 120
  LiftDamaged = 80
  Braking = 100
  MinTurnSpeed = 8
  PreferredHeight = 8 
  AllowAirborneMotiveForce = Yes
  StickToGround = No
  ZAxisBehavior = SURFACE_RELATIVE_HEIGHT
  Appearance = HOVER
  PitchInDirectionOfZVelFactor = 0.3
  PitchStiffness = 0.05
  RollStiffness = 0.1
  PitchDamping = 0.3
  RollDamping = 0.3
  ForwardVelocityPitchFactor = -0.05
  LateralVelocityRollFactor = 0.1
  Apply2DFrictionWhenAirborne = Yes

  ; NOTE: The two wander parameters only apply to the TWO_LEGS appearance.
  WanderWidthFactor = 2.0
  WanderLengthFactor = 3.0
  WanderAboutPointRadius = 80.0
End

