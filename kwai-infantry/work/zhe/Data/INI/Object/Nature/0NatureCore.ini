;------------------------------------------------------------------------------
Object BurningEmber

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = PABLINKLITER
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = DEBRIS
  ArmorSet
    Conditions = None
    Armor = TreeArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf = CAN_CAST_REFLECTIONS INFANTRY

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 10.0
    InitialHealth = 10.0
  End

  Behavior = FireWeaponCollide ModuleTag_Fire
    CollideWeapon = BurningEmberWeapon
  End

  Behavior = WanderAIUpdate ModuleTag_AI01
  End
  Locomotor = SET_NORMAL BurningEmberLocomotor
  Locomotor = SET_WANDER BurningEmberLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 1.0
    AllowCollideForce = No
  End

  Behavior = LifetimeUpdate ModuleTag_Delete01
    MinLifetime = 400 
    MaxLifetime = 800
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DestructionDelay = 100
  End

  Geometry = Sphere
  GeometryIsSmall = No
  GeometryMajorRadius = 5.0
End

