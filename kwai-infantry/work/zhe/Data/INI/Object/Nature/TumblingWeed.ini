Object TumblingWeed

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = PMTmbWeed02
    End
    ConditionState = DAMAGED
      Model = PMTmbWeed02_D
    End
  End
  
  ; *** DESIGN parameters ***
  EditorSorting = SHRUBBERY
  CrusherLevel = 0
  CrushableLevel = 1
  ArmorSet
    Conditions = None
    Armor = TreeArmor
    DamageFX = None
  End
  
  ; *** AUDIO Parameters ***
  SoundOnDamaged = TreeDamaged
  SoundOnReallyDamaged = TreeDamaged

  ; *** ENGINEERING Parameters ***  
  KindOf = PRELOAD SHRUBBERY IGNORED_IN_GUI
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 25.0
    InitialHealth = 25.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    AllowBouncing = Yes
    AerodynamicFriction = 2
  End
  
  Behavior = FireWeaponCollide ModuleTag_Fire01
    CollideWeapon = TreeFireDealDamageWeapon
    RequiredStatus = AFLAME
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 2
    FlameDamageExpiration = 0
    AflameDuration = 12000
    AflameDamageAmount = 5 
    AflameDamageDelay = 1000
    BurnedDelay = 12000
    BurningSoundName = GenericFireMediumLoop
  End

  Behavior = FireSpreadUpdate ModuleTag_Fire02
    OCLEmbers = OCL_BurningEmbers
    MinSpreadDelay = 3000
    MaxSpreadDelay = 6000
    SpreadTryRange = 50
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    FX = FX_WoodExplosionPuff
    OCL = OCL_WoodDeadExplosion
  End
  
  Behavior = SquishCollide ModuleTag_Death02
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedParticleSystem1 = Bone:AFlame RandomBone:Yes PSys:TreeDamagedLeaves
    ReallyDamagedParticleSystem1 = Bone:AFlame RandomBone:Yes PSys:TreeReallyDamagedLeaves
    RubbleParticleSystem1 = Bone:AFlame RandomBone:Yes PSys:TreeRubbleDebris
  End
  
  Shadow = SHADOW_DECAL
End
