; -----------------------------------------------------------------------------
Object GLASneakAttackTunnelNetwork

  ; *** ART Parameters ***
  SelectPortrait = SUSneakAttack_L
  ButtonImage = SUSneakAttack
  
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    
    ; day ************************************
    ConditionState
      Model = UBSnkAtk
    End
    ConditionState = DAMAGED
      Model = UBSnkAtk_D
    End
    ConditionState = REALLYDAMAGED
      Model = UBSnkAtk_E
      ParticleSysBone = Mound SteamVent
    End
    ConditionState = RUBBLE
      Model = UBSnkAtk_R
      ParticleSysBone = Mound SteamVent
    End
    
    ; night  **********************************
    ConditionState = NIGHT
      Model = UBSnkAtk_N
    End
    ConditionState = DAMAGED NIGHT
      Model = UBSnkAtk_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = UBSnkAtk_EN
      ParticleSysBone = Mound SteamVent
    End    
    ConditionState = RUBBLE NIGHT
      Model = UBSnkAtk_R
      ParticleSysBone = Mound SteamVent
    End
    
    ; day snow ************************************
    ConditionState = SNOW
      Model = UBSnkAtk_S
    End
    ConditionState = DAMAGED SNOW
      Model = UBSnkAtk_DS
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = UBSnkAtk_ES
      ParticleSysBone = Mound SteamVent
    End
    ConditionState = RUBBLE SNOW
      Model = UBSnkAtk_RS
      ParticleSysBone = Mound SteamVent
    End
    
    ; night snow **********************************
    ConditionState = SNOW NIGHT
      Model = UBSnkAtk_NS
    End
    ConditionState = DAMAGED SNOW NIGHT
      Model = UBSnkAtk_DNS
    End
    ConditionState = REALLYDAMAGED SNOW NIGHT
      Model = UBSnkAtk_ENS
      ParticleSysBone = Mound SteamVent
    End
    ConditionState = RUBBLE SNOW NIGHT
      Model = UBSnkAtk_RS
      ParticleSysBone = Mound SteamVent
    End
  End

  PlacementViewAngle = -45

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TunnelNetwork
  Side = GLA
  EditorSorting = STRUCTURE
  EnergyProduction = 0
  VisionRange = 100.0
  ShroudClearingRange = 100
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY TunnelNetworkGunDummyWeapon
  End
  ArmorSet
    Conditions = None
    Armor = StructureArmor
    DamageFX = StructureDamageFXNoShake
  End
  
  CommandSet = GLASneakAttackTunnelCommandSet
  ExperienceValue = 100 100 100 100

  ; *** AUDIO Parameters ***
  VoiceSelect = TunnelNetworkSelect
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy
  SoundEnter = GarrisonEnter
  SoundExit = GarrisonExit

  ; *** ENGINEERING Parameters ***
  RadarPriority = STRUCTURE
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE FS_BASE_DEFENSE IMMUNE_TO_CAPTURE SCORE_CREATE AUTO_RALLYPOINT
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 1000.0
    InitialHealth = 1000.0
    SubdualDamageCap = 1200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End

  Behavior = TunnelContain ModuleTag_Contain01
    TimeForFullHeal = 5000
    AllowAlliesInside = Yes
  End

  Behavior = ProductionUpdate ModuleTag_Production
  End
  
  Behavior = DefaultProductionExitUpdate ModuleTag_ProductionUpdate
    UnitCreatePoint = X:10.0 Y:0.0 Z:0.0
    NaturalRallyPoint = X:70.0 Y:0.0 Z:0.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      TurretTurnRate = 180
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes Stealthed
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    OCL = OCL_TunnelNetworkDebris_NoCollapse
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 5
    AflameDamageDelay = 500 
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
  End

  Geometry = Cylinder
  GeometryMajorRadius = 25.0
  GeometryHeight = 20.0    
  GeometryIsSmall = No
  FactoryExtraBibWidth = 25.0
  Shadow = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER
End
