Object GPSScrambler_InvisibleMarker_Level1

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = EXJamRadius_L
      Animation = EXJamRadius_L.EXJamRadius_L
      AnimationMode = LOOP
      ParticleSysBone = None GPSMicrowaveScambler
      ParticleSysBone = None GPSScrambleRing
      ;ParticleSysBone = None GPSScrambleCloud
    End
  End
  
  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM

  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = None
  End

  ; *** AUDIO Parameters ***
  SoundAmbient = RadioJammerLoop
  
  ; *** ENGINEERING Parameters ***
  KindOf = NO_COLLIDE IMMOBILE UNATTACKABLE

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = ActiveShroudUpgrade ModuleTag_Shroud01
    TriggeredBy = Upgrade_UniversalInherentBehaviour
    NewShroudRange = 250.0
  End
  
  Behavior = FireWeaponUpdate ModuleTag_FireWeapon01
    Weapon = GLAGPSScrambleVOWeapon
    ExclusiveWeaponDelay = 60001
  End
  
  ; ActiveShroudUpgrade requires destroy die (deletion won't rid of shroud lol)
  Behavior = LifetimeUpdate ModuleTag_Death01
    MinLifetime = 20000
    MaxLifetime = 20000
  End
  
  Behavior = DestroyDie ModuleTag_Death02
  End
End

