;------------------------------------------------------------------------------
Object GLAVehicleToxinTruck

  ; *** ART Parameters ***
  SelectPortrait = SUToxinTractor_L
  ButtonImage = SUToxinTractor
  
  UpgradeCameo1 = Upgrade_GLAJunkRepair
  UpgradeCameo2 = Upgrade_GLAAnthraxBeta
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTruckDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    DefaultConditionState 
      Model = UVT40
      Turret = Turret
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponFireFXBone = SECONDARY WeaponB
      WeaponLaunchBone = SECONDARY WeaponB
    End

    ConditionState = MOVING
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    ConditionState = DAMAGED 
      Model = UVT40_D
    End

    ConditionState = DAMAGED MOVING
      Model = UVT40_D
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = UVT40_E
    End

    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = UVT40_E
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    TrackMarks = EXTireTrack.dds
    LeftFrontTireBone = Wheel01
    RightFrontTireBone = Wheel03
    LeftRearTireBone = Wheel02
    RightRearTireBone = Wheel04
    TireRotationMultiplier = 0.2
  End

  Draw = W3DModelDraw ModuleTag_W3D02
    OkToChangeModelColor = Yes
    
    ConditionState = NONE
      Model = UVT40_A1
      ParticleSysBone = Bone_FX01 ToxinAura
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      Model = UVT40_A1
      ParticleSysBone = Bone_FX01 AnthraxAura
    End
  End
    
  Draw = W3DModelDraw ModuleTag_W3D03
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = UVT40_A2
      HideSubObject = BumperUp Shield01 Shield02
    End
    
    ConditionState = ARMORSET_CRATEUPGRADE_ONE
      ShowSubObject = BumperUp Shield01
      HideSubObject = Shield02
    End
    
    ConditionState = ARMORSET_CRATEUPGRADE_TWO
      ShowSubObject = BumperUp Shield01 Shield02
    End
    
    ConditionState = DAMAGED
      Model = UVT40_A2D
      HideSubObject = BumperUp Shield01 Shield02
    End
    
    ConditionState = DAMAGED ARMORSET_CRATEUPGRADE_ONE
      Model = UVT40_A2D
      ShowSubObject = BumperUp Shield01
      HideSubObject = Shield02
    End
    
    ConditionState = DAMAGED ARMORSET_CRATEUPGRADE_TWO
      Model = UVT40_A2D
      ShowSubObject = BumperUp Shield01 Shield02
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = UVT40_A2E
      HideSubObject = BumperUp Shield01 Shield02
    End
    
    ConditionState = REALLYDAMAGED RUBBLE ARMORSET_CRATEUPGRADE_ONE
      Model = UVT40_A2E
      ShowSubObject = BumperUp Shield01
      HideSubObject = Shield02
    End
    
    ConditionState = REALLYDAMAGED RUBBLE ARMORSET_CRATEUPGRADE_TWO
      Model = UVT40_A2E
      ShowSubObject = BumperUp Shield01 Shield02
    End
  End
    
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:ToxinTruck
  Side = GLA
  EditorSorting = VEHICLE
  TransportSlotCount = 4
  WeaponSet 
    Conditions = None 
    Weapon = PRIMARY AnthraxToxinTruckGun
    Weapon = SECONDARY AnthraxToxinTruckSprayer
    AutoChooseSources = SECONDARY NONE
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY AnthraxBetaToxinTruckGun
    Weapon = SECONDARY AnthraxBetaToxinTruckSprayer
    AutoChooseSources = SECONDARY NONE
  End

  ArmorSet
    Conditions = None
    Armor = TruckArmor
    DamageFX = TruckDamageFX
  End
  ArmorSet
    Conditions = CRATE_UPGRADE_ONE
    Armor = TruckArmor_Salvage1
    DamageFX = TruckDamageFX
  End
  ArmorSet
    Conditions = CRATE_UPGRADE_TWO
    Armor = TruckArmor_Salvage2
    DamageFX = TruckDamageFX
  End
  
  BuildCost = 750
  BuildTime = 30.0
  VisionRange = 150
  ShroudClearingRange = 200
  Prerequisites
    Object = GLAScrapYard
    Object = GLAPalace
    Science = GLA_SCIENCE_UnconventionalTerrorTactics
  End

  ExperienceValue = 50 50 100 150
  ExperienceRequired = 0 200 300 600
  IsTrainable = Yes
  CrusherLevel = 0
  CrushableLevel = 2
  CommandSet = GLAVehicleToxinTruckCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = ToxinTractorVoiceSelect
  VoiceMove = ToxinTractorVoiceMove
  VoiceGuard = ToxinTractorVoiceMove
  VoiceAttack = ToxinTractorVoiceAttack
  SoundMoveLoop = 4wVehicleV2MoveLoop
  SoundAmbient = 4wVehicleV2AmbientLoop

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = ToxinTractorVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    TruckLandingSound = NoSound
    TruckPowerslideSound = NoSound
    VoiceCrush = ToxinTractorVoiceCrush
    VoiceEnter = ToxinTractorVoiceMove
    VoicePoisonLocation = ToxinTractorVoiceAttackContam
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SALVAGER ARMOR_SALVAGER SCORE

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 125.0
    InitialHealth = 125.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 480
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
    AutoAcquireEnemiesWhenIdle = Yes NotWhileAttacking
    Turret
      TurretTurnRate = 45
      TurretPitchRate = 45
      AllowsPitch = Yes
      TurretFireAngleSweep = PRIMARY 8
      TurretSweepSpeedModifier = PRIMARY 0.2
      TurretFireAngleSweep = SECONDARY 90
      TurretSweepSpeedModifier = SECONDARY 1.0
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
  End
  Locomotor = SET_NORMAL BasicTruckLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 50.0
  End

  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End

  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    ExemptStatus = REASSIGN_PARKING
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_GLAVehicleToxinTractorWithAnthrax_CrushEffect
  End
  
  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed02
    RequiredStatus = REASSIGN_PARKING
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_GLAVehicleToxinTractorWithAnthraxBeta_CrushEffect
  End
  
  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    ExemptStatus = REASSIGN_PARKING
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL OCL_GLAVehicleToxinTractor_DeathEffect_BlowUp
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 20000
    OCL = INITIAL OCL_GLAVehicleToxinTractor_CatchFire
    OCL = FINAL OCL_GLAVehicleToxinTractor_DeathEffect
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 60
    ModifierBonusPerOverkillPercent = 20%
    DestructionDelay = 150
    DestructionDelayVariance = 250
    OCL = FINAL OCL_GLAVehicleToxinTractor_DeathEffect
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 1
    AflameDamageDelay = 500
  End

  Behavior = FireWeaponUpdate ModuleTag_Move01
    Weapon = Ingenious4WheelsVehicleMovementWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move02
    Weapon = IngeniousVehicleCheckerWeapon
  End
  
  Behavior = WeaponSetUpgrade ModuleTag_AnthraxBeta01
    TriggeredBy = Upgrade_GLAAnthraxBeta
  End

  Behavior = StatusBitsUpgrade ModuleTag_AnthraxBeta02
    TriggeredBy = Upgrade_GLAAnthraxBeta
    StatusToSet = REASSIGN_PARKING
  End
  
  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_InfantryDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = INFANTRY
  End
  ; --- end detector modules ---
  
  Geometry = Box
  GeometryMajorRadius = 12.0
  GeometryMinorRadius = 6.0
  GeometryHeight = 18.0
  GeometryIsSmall = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End