;------------------------------------------------------------------------------
Object GLAVehicleSupplyBike

  ; *** ART Parameters ***
  SelectPortrait = SUSupplyBike_L
  ButtonImage = SUSupplyBike

  ;UpgradeCameo1 = NONE
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DTruckDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    ConditionState = NONE
      Model = UVSupBike
      HideSubObject = Supply
    End
    AliasConditionState MOVING
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = UVSupBike_D
      HideSubObject = Supply
    End
    AliasConditionState REALLYDAMAGED RUBBLE MOVING
    
    ConditionState = MOVING CENTER_TO_LEFT
      Model = UVSupBike_A1
      Animation = UVSupBike_A1.UVSupBike_A1
      AnimationMode = ONCE
      HideSubObject = Supply
    End

    ConditionState = MOVING CENTER_TO_LEFT REALLYDAMAGED RUBBLE
      Model = UVSupBike_A1D
      Animation = UVSupBike_A1D.UVSupBike_A1D
      AnimationMode = ONCE
      HideSubObject = Supply
    End

    ConditionState = MOVING LEFT_TO_CENTER
      Model = UVSupBike_A1
      Animation = UVSupBike_A1.UVSupBike_A1
      AnimationMode = ONCE_BACKWARDS
      HideSubObject = Supply
    End

    ConditionState = MOVING LEFT_TO_CENTER REALLYDAMAGED RUBBLE
      Model = UVSupBike_A1D
      Animation = UVSupBike_A1D.UVSupBike_A1D
      AnimationMode = ONCE_BACKWARDS
      HideSubObject = Supply
    End

    ConditionState = MOVING CENTER_TO_RIGHT
      Model = UVSupBike_A2
      Animation = UVSupBike_A2.UVSupBike_A2
      AnimationMode = ONCE
      HideSubObject = Supply
    End

    ConditionState = MOVING CENTER_TO_RIGHT REALLYDAMAGED RUBBLE
      Model = UVSupBike_A2D
      Animation = UVSupBike_A2D.UVSupBike_A2D
      AnimationMode = ONCE
      HideSubObject = Supply
    End

    ConditionState = MOVING RIGHT_TO_CENTER
      Model = UVSupBike_A2
      Animation = UVSupBike_A2.UVSupBike_A2
      AnimationMode = ONCE_BACKWARDS
      HideSubObject = Supply
    End

    ConditionState = MOVING RIGHT_TO_CENTER REALLYDAMAGED RUBBLE
      Model = UVSupBike_A2D
      Animation = UVSupBike_A2D.UVSupBike_A2D
      AnimationMode = ONCE_BACKWARDS
      HideSubObject = Supply
    End
    
    ConditionState = CARRYING
      Model = UVSupBike
      ShowSubObject = Supply
    End
    AliasConditionState CARRYING MOVING
    
    ConditionState = CARRYING REALLYDAMAGED RUBBLE
      Model = UVSupBike_D
      ShowSubObject = Supply
    End
    AliasConditionState CARRYING REALLYDAMAGED RUBBLE MOVING
    
    ConditionState = CARRYING MOVING CENTER_TO_LEFT
      Model = UVSupBike_A1
      Animation = UVSupBike_A1.UVSupBike_A1
      AnimationMode = ONCE
      ShowSubObject = Supply
    End

    ConditionState = CARRYING MOVING CENTER_TO_LEFT REALLYDAMAGED RUBBLE
      Model = UVSupBike_A1D
      Animation = UVSupBike_A1D.UVSupBike_A1D
      AnimationMode = ONCE
      ShowSubObject = Supply
    End

    ConditionState = CARRYING MOVING LEFT_TO_CENTER
      Model = UVSupBike_A1
      Animation = UVSupBike_A1.UVSupBike_A1
      AnimationMode = ONCE_BACKWARDS
      ShowSubObject = Supply
    End

    ConditionState = CARRYING MOVING LEFT_TO_CENTER REALLYDAMAGED RUBBLE
      Model = UVSupBike_A1D
      Animation = UVSupBike_A1D.UVSupBike_A1D
      AnimationMode = ONCE_BACKWARDS
      ShowSubObject = Supply
    End

    ConditionState = CARRYING MOVING CENTER_TO_RIGHT
      Model = UVSupBike_A2
      Animation = UVSupBike_A2.UVSupBike_A2
      AnimationMode = ONCE
      ShowSubObject = Supply
    End

    ConditionState = CARRYING MOVING CENTER_TO_RIGHT REALLYDAMAGED RUBBLE
      Model = UVSupBike_A2D
      Animation = UVSupBike_A2D.UVSupBike_A2D
      AnimationMode = ONCE
      ShowSubObject = Supply
    End

    ConditionState = CARRYING MOVING RIGHT_TO_CENTER
      Model = UVSupBike_A2
      Animation = UVSupBike_A2.UVSupBike_A2
      AnimationMode = ONCE_BACKWARDS
      ShowSubObject = Supply
    End

    ConditionState = CARRYING MOVING RIGHT_TO_CENTER REALLYDAMAGED RUBBLE
      Model = UVSupBike_A2D
      Animation = UVSupBike_A2D.UVSupBike_A2D
      AnimationMode = ONCE_BACKWARDS
      ShowSubObject = Supply
    End

    TrackMarks = EXTireTrack.dds
    LeftFrontTireBone = Tire01
    RightFrontTireBone = Tire02
    LeftRearTireBone = Tire03
    RightRearTireBone = Tire04
    TireRotationMultiplier = 0.2
    PowerslideRotationAddition = 2.5
  End

  Draw = W3DModelDraw ModuleTag_Driver01
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = UISBINF01_SKN
      Animation = CISBINF_SKL.CISBINF_STD
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_Idle
    End
    
    ConditionState = MOVING CENTER_TO_RIGHT
      Animation = CISBINF_SKL.CISBINF_CTR
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      TransitionKey = TRANS_Moving
    End
    
    ConditionState = MOVING RIGHT_TO_CENTER
      Animation = CISBINF_SKL.CISBINF_CTR
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_Moving
    End
    
    ConditionState = MOVING CENTER_TO_LEFT
      Animation = CISBINF_SKL.CISBINF_CTL
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      TransitionKey = TRANS_Moving
    End
    
    ConditionState = MOVING LEFT_TO_CENTER
      Animation = CISBINF_SKL.CISBINF_CTL
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_Moving
    End
  End
  
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:SupplyBike
  Side = GLA
  EditorSorting = VEHICLE
  TransportSlotCount = 2
  BuildCost = 400
  BuildTime = 20.0
  VisionRange = 150
  ShroudClearingRange = 300

  ArmorSet
    Conditions = None
    Armor = BikeArmor
    DamageFX = TankDamageFX
  End

  CrusherLevel = 0
  CrushableLevel = 2
  CommandSet = GLAVehicleSupplyBikeCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = WorkerToolVoiceSelect
  VoiceMove = WorkerToolVoiceMove
  VoiceAttack = WorkerToolVoiceMove
  VoiceGuard = WorkerToolVoiceMove
  SoundMoveLoop = 4wMotorcycleMoveLoop
  SoundAmbient = MotorcycleAmbientLoop
  
  UnitSpecificSounds
    VoiceCreate = WorkerToolVoiceSupply
    VoiceSupply = WorkerToolVoiceSupply
    VoiceEnter = WorkerToolVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK DONT_AUTO_CRUSH_INFANTRY CAN_CAST_REFLECTIONS VEHICLE SALVAGER SCORE CLIFF_JUMPER HARVESTER
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 150.0
    InitialHealth = 150.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 500
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = SupplyTruckAIUpdate ModuleTag_AI01
    MaxBoxes = 6
    SupplyCenterActionDelay = 25
    SupplyWarehouseActionDelay = 25
    SupplyWarehouseScanDistance = 700
    SuppliesDepletedVoice = WorkerVoiceSuppliesDepleted
  End
  Locomotor = SET_NORMAL SupplyBikeLocomotor SupplyBikeCliffLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 15.0
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End
    
  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_WorkerDie
    OCL = OCL_GLAVehicleSupplyBike_CrushEffect
  End
  
  ; Go into the air, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    ModifierBonusPerOverkillPercent = 1000%
    DestructionDelay = 200
    DestructionDelayVariance = 100
    FX = INITIAL FX_GenericUGVDeathExplosion
    OCL = INITIAL OCL_GLAVehicleSupplyBike_AerialDeathEffect_Start
    OCL = MIDPOINT OCL_GLAVehicleSupplyBike_AerialDeathEffect_End
  End
  
  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 80
    DestructionDelay = 150
    DestructionDelayVariance = 250
    FX = INITIAL FX_GenericUGVDeathExplosion
    OCL = FINAL OCL_GLAVehicleSupplyBike_DeathEffect
  End
  
  Behavior = AnimationSteeringUpdate ModuleTag_SteerUpdate
    MinTransitionTime = 300
  End

  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_InfantryDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = INFANTRY
  End
  ; --- end detector modules ---
  
  Geometry = Box
  GeometryMajorRadius = 17.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 15.0     
  GeometryIsSmall = NO
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45   
End