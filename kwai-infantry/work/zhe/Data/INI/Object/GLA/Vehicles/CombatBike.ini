      Flags = START_FRAME_LAST
      TransitionKey = TRANS_Moving
    End
    
    ConditionState = MOVING CENTER_TO_RIGHT FIRING_A
      Animation = CICBINF_SKL.CICBINF_CAR
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      TransitionKey = TRANS_Moving
    End
    AliasConditionState = MOVING CENTER_TO_RIGHT BETWEEN_FIRING_SHOTS_A
