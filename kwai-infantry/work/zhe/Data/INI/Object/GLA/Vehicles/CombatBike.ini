    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_A
    
    ConditionState = MOVING PREATTACK_A
      Animation = CICBINF_SKL.CICBINF_BTR
      TransitionKey = TRANS_MovingBetweenFiring
    End
    AliasConditionState = MOVING RELOADING_A
    
    TransitionState = TRANS_Idle TRANS_Moving
      Animation = CICBINF_SKL.CICBINF_S2R
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    
    TransitionState = TRANS_Moving TRANS_Idle
      Animation = CICBINF_SKL.CICBINF_R2S
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    
    TransitionState = TRANS_Idle TRANS_Firing
      Animation = CICBINF_SKL.CICBINF_S2A
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
