  VoiceMove = CombatCycleVoiceMove
  VoiceAttack = CombatCycleVoiceAttack
  VoiceGuard = CombatCycleVoiceMove
  SoundEnter = CombatCycleSwitchRider
  SoundMoveLoop = 2wMotorcycleMoveLoop
  SoundAmbient = MotorcycleAmbientLoop

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = CombatCycleVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound  
    TruckLandingSound = GenericVehicleLand
    TruckPowerslideSound = GenericVehiclePowerslide
    VoiceCrush = CombatCycleVoiceMove
    VoiceEnter = CombatCycleVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK DONT_AUTO_CRUSH_INFANTRY CAN_CAST_REFLECTIONS VEHICLE SALVAGER SCORE CLIFF_JUMPER ATTACK_NEEDS_LINE_OF_SIGHT

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 50.0
    InitialHealth = 50.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      TurretTurnRate = 0
      NaturalTurretAngle = 0
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = No
  End
  Locomotor = SET_NORMAL CombatBikeGroundLocomotor CombatBikeCliffLocomotor
  
  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 15.0
  End

  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_CombatCycleDie
    OCL = OCL_GLAVehicleCombatBike_CrushEffect
  End
  
  ; Go into the air, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    ModifierBonusPerOverkillPercent = 1000%
    DestructionDelay = 200
    DestructionDelayVariance = 100
    FX = INITIAL FX_GenericUGVDeathExplosion
    OCL = INITIAL OCL_GLAVehicleCombatBike_AerialDeathEffect_Start
    OCL = MIDPOINT OCL_GLAVehicleCombatBike_AerialDeathEffect_End
  End
  
  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 80
    DestructionDelay = 150
    DestructionDelayVariance = 250
    FX = INITIAL FX_GenericUGVDeathExplosion
    OCL = FINAL OCL_GLAVehicleCombatBike_DeathEffect
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End


  Behavior = FireWeaponUpdate ModuleTag_Move01
    Weapon = IngeniousMotorBikeMovementWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move02
    Weapon = IngeniousMotorBikeCheckerWeapon
  End
  
  Behavior = AnimationSteeringUpdate ModuleTag_SteerUpdate
    MinTransitionTime = 300
  End

  Behavior = OCLSpecialPower ModuleTag_CombatDrugs01
    SpecialPowerTemplate = SpecialAbilityCombatDrugs
    OCL = OCL_CombatDrugs_CombatBiker
  End

  Behavior = WeaponBonusUpgrade ModuleTag_HPBullets01
    TriggeredBy = Upgrade_GLAHPBullets
  End

  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
