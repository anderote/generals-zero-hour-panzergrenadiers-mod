    End
    
    TransitionState = TRANS_BetweenFiring TRANS_Idle
      Animation = CICBINF_SKL.CICBINF_S2A
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    TransitionState = TRANS_Idle TRANS_Reloading
      Animation = CICBINF_SKL.CICBINF_S2A
      AnimationMode = ONCE
