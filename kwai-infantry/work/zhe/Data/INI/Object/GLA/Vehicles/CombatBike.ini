      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_Moving
    End
    AliasConditionState = MOVING LEFT_TO_CENTER BETWEEN_FIRING_SHOTS_A
    AliasConditionState = MOVING LEFT_TO_CENTER PREATTACK_A
    AliasConditionState = MOVING LEFT_TO_CENTER RELOADING_A
    
    ConditionState = MOVING FIRING_A
      Animation = CICBINF_SKL.CICBINF_ATR
      TransitionKey = TRANS_MovingFiring
