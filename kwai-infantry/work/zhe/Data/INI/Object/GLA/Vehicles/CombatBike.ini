  ; ***DESIGN parameters ***
  DisplayName = OBJECT:CombatBike
  Side = GLA
  EditorSorting = VEHICLE
  TransportSlotCount = 2
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY UziSubMachineGunWeapon_Biker
  End
  
  ArmorSet
    Conditions = None
    Armor = BikeArmor
    DamageFX = CrushableCarDamageFX
  End
  
  BuildCost = 500
  BuildTime = 20.0  
  VisionRange = 150
  ShroudClearingRange = 200
  Prerequisites
  End

