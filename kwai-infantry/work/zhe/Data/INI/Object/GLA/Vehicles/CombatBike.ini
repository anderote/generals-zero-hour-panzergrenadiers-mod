      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponLaunchBone = PRIMARY Muzzle
      TransitionKey = TRANS_Idle
    End
    
    ConditionState = FIRING_A
      Animation = CICBINF_SKL.CICBINF_ATA
      TransitionKey = TRANS_Firing
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A
    
    ConditionState = PREATTACK_A
      Animation = CICBINF_SKL.CICBINF_BTA
      TransitionKey = TRANS_BetweenFiring
    End
    
    ConditionState = RELOADING_A
      Animation = CICBINF_SKL.CICBINF_RTA
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      TransitionKey = TRANS_Reloading
    End
    
    ConditionState = MOVING
      Animation = CICBINF_SKL.CICBINF_RNA
      TransitionKey = TRANS_Moving
    End
    
    ConditionState = MOVING CENTER_TO_RIGHT
      Animation = CICBINF_SKL.CICBINF_CTR
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      TransitionKey = TRANS_Moving
