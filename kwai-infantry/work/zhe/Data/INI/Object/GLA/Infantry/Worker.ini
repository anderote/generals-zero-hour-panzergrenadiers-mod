;------------------------------------------------------------------------------
Object GLAInfantryWorker

  ; *** ART Parameters ***
  SelectPortrait = SUWorker_L
  ButtonImage = SUWorker
  
  UpgradeCameo1 = Upgrade_GLAWorkerShoes
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes
    IgnoreConditionStates = USING_WEAPON_A USING_WEAPON_B USING_WEAPON_C
    
    ; ------- Standing Animations
    ConditionState = None
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_STD
      AnimationMode = LOOP
      Flags = RANDOMSTART MAINTAIN_FRAME_ACROSS_STATES
      TransitionKey = TRANS_Stand
    End
    AliasConditionState = RIDER1
    AliasConditionState = RIDER2
    
    ConditionState = MOVING 
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_RNA
      Animation = CIWRKR_SKL.CIWRKR_RNB
      Animation = CIWRKR_SKL.CIWRKR_RNC
      AnimationSpeedFactorRange = 1.00 1.05
      AnimationMode = LOOP
      Flags = RANDOMSTART
      ParticleSysBone = None FootstepRight
      ParticleSysBone = None FootstepLeft
      TransitionKey = TRANS_Moving
    End
    AliasConditionState = MOVING ACTIVELY_CONSTRUCTING
    AliasConditionState = RIDER1 MOVING
    AliasConditionState = RIDER1 MOVING ACTIVELY_CONSTRUCTING
    
    ConditionState = ACTIVELY_CONSTRUCTING 
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_CST1
      Animation = CIWRKR_SKL.CIWRKR_CST2
      Animation = CIWRKR_SKL.CIWRKR_CST3
      AnimationMode = LOOP
      Flags = RANDOMSTART
      ParticleSysBone = Bone_ShovelFX WorkerDirtFall
      TransitionKey = TRANS_Constructing
    End
    AliasConditionState = RIDER1 ACTIVELY_CONSTRUCTING
    AliasConditionState = RIDER2 ACTIVELY_CONSTRUCTING
    
    ; ------- I AM SPEED Animations
    ConditionState = RIDER2 MOVING 
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_ARNA
      AnimationSpeedFactorRange = 1.15 1.20
      AnimationMode = LOOP
      Flags = RANDOMSTART MAINTAIN_FRAME_ACROSS_STATES2
      ParticleSysBone = None FootstepRight
      ParticleSysBone = None FootstepLeft
      TransitionKey = TRANS_Moving
    End
    AliasConditionState = RIDER2 MOVING ACTIVELY_CONSTRUCTING
    ; -------
    
    ConditionState = DYING
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_DTA
      Animation = CIWRKR_SKL.CIWRKR_DTB
      Animation = CIWRKR_SKL.CIWRKR_DTC
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End
    AliasConditionState = RIDER1 DYING
    AliasConditionState = RIDER2 DYING
    
    ConditionState = DYING EXPLODED_FLAILING
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_FDTB
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End
    AliasConditionState = RIDER1 DYING EXPLODED_FLAILING
    AliasConditionState = RIDER2 DYING EXPLODED_FLAILING

    ConditionState = DYING EXPLODED_BOUNCING
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_FDTC
      AnimationMode = ONCE
      TransitionKey = None
    End
    AliasConditionState = DYING SPLATTED
    AliasConditionState = RIDER1 DYING EXPLODED_BOUNCING
    AliasConditionState = RIDER1 DYING SPLATTED
    AliasConditionState = RIDER2 DYING EXPLODED_BOUNCING
    AliasConditionState = RIDER2 DYING SPLATTED
    
    ; ------- Transition Animations
    TransitionState = TRANS_Stand TRANS_Constructing
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_S2CST
      AnimationMode = ONCE
    End
    
    TransitionState = TRANS_Constructing TRANS_Stand
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_S2CST
      AnimationMode = ONCE_BACKWARDS
    End
    
    TransitionState = TRANS_Moving TRANS_Constructing
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_S2CST
      AnimationMode = ONCE
    End
    
    TransitionState = TRANS_Constructing TRANS_Moving
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_S2CST
      AnimationMode = ONCE_BACKWARDS
    End
    
    TransitionState = TRANS_Dying TRANS_Flailing
      Model = UIWRKR_SKN
      Animation = CIWRKR_SKL.CIWRKR_FDTA
      AnimationMode = ONCE
    End
    ; -------
  End

  Draw = W3DModelDraw ModuleTag_HousecolorDraw
    OkToChangeModelColor = Yes
    ReceivesDynamicLights = No
    
    ConditionState = None
      Model = EXInfWrk
    End
    AliasConditionState = RIDER1
    
    ConditionState = RIDER2
      Model = EXInfWrk1
    End
    
    ConditionState = DYING
      Model = None
    End
    AliasConditionState = DYING EXPLODED_BOUNCING
    AliasConditionState = DYING EXPLODED_FLAILING
    AliasConditionState = DYING SPLATTED
    AliasConditionState = RIDER1 DYING
    AliasConditionState = RIDER1 DYING EXPLODED_BOUNCING
    AliasConditionState = RIDER1 DYING EXPLODED_FLAILING
    AliasConditionState = RIDER1 DYING SPLATTED
    AliasConditionState = RIDER2 DYING
    AliasConditionState = RIDER2 DYING EXPLODED_BOUNCING
    AliasConditionState = RIDER2 DYING EXPLODED_FLAILING
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Worker
  Side = GLA
  EditorSorting = INFANTRY
  TransportSlotCount = 1
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY None
  End

  ArmorSet
    Conditions = None
    Armor = HumanArmor
    DamageFX = InfantryDamageFX
  End
  
  VisionRange = 100
  ShroudClearingRange = 200
  BuildCost = 300
  BuildTime = 10.0
  CrushableLevel = 0  
  CommandSet = GLAWorkerCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = WorkerVoiceSelect
  VoiceMove = WorkerVoiceMove
  VoiceAttack = WorkerVoiceMove
  VoiceGuard = WorkerVoiceMove
  VoiceFear = WorkerVoiceFear
  VoiceTaskComplete = WorkerVoiceBuildComplete

  UnitSpecificSounds
    VoiceEnter = WorkerVoiceMoveUpgraded
    VoiceEnterHostile = WorkerVoiceMoveUpgraded
    VoiceGarrison = WorkerVoiceGarrison
    VoiceCreate = WorkerVoiceCreate
    VoiceSupply = WorkerVoiceSupply
    VoiceNoBuild = WorkerVoiceBuildNot
    VoiceRepair = WorkerVoiceRepair
    VoiceDisarm = WorkerVoiceClearMine
    VoiceBuildResponse = WorkerVoiceBuild
    VoiceGetHealed = WorkerVoiceMoveUpgraded
    VoiceMoveUpgraded = WorkerVoiceMoveUpgraded
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_CAST_REFLECTIONS INFANTRY DOZER SCORE SALVAGER
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 60.0
    InitialHealth = 60.0
  End

  Behavior = DozerAIUpdate ModuleTag_AI01
    RepairHealthPercentPerSecond = 1.667%
    BoredTime = 5000
    BoredRange = 150
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL BasicHumanLocomotor
  Locomotor = SET_NORMAL_UPGRADED BasicHumanLocomotor
  Locomotor = SET_SUPERSONIC ChargingHumanLocomotor
  Locomotor = SET_SLUGGISH SluggishHumanLocomotor
  
  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
  End

  Behavior = SquishCollide ModuleTag_Physics02
  End

  ; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay = 8000
    SinkRate = 0.5
    DestructionDelay = 12000
    FX = INITIAL FX_WorkerDie
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 8000
    SinkRate = 0.5
    DestructionDelay = 12000
    FX = INITIAL FX_InfantryDieCrushed
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = NONE +EXPLODED
    SinkDelay = 8000
    SinkRate = 0.5
    DestructionDelay = 12000
    FX = INITIAL FX_WorkerDie
    ProbabilityModifier = 75
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  
  Behavior = SlowDeathBehavior ModuleTag_DeathExplosion01
    DeathTypes = NONE +EXPLODED
    DestructionDelay = 0
    FX = INITIAL FX_InfantryDieExploded
    OCL = INITIAL OCL_InfantryDeadExplosion
    ModifierBonusPerOverkillPercent = 40%
    ProbabilityModifier = 25
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireGLA
    OCL = INITIAL OCL_FlamingInfantry
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinGLA
    OCL = INITIAL OCL_ToxicInfantry
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death06
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinGLA
    OCL = INITIAL OCL_ToxicInfantryBeta
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinGLA
    OCL = INITIAL OCL_ToxicInfantryGamma
  End
  ; --- end Death modules ---

  Behavior = PoisonedBehavior ModuleTag_Poison
    PoisonDamageInterval = 100
    PoisonDuration = 3000
  End

  Behavior = RiderChangeContain ModuleTag_Upgrade01
    Rider1 = UpgradeViaRiderSwitch1 RIDER1 WEAPON_RIDER1 STATUS_RIDER1 GLAWorkerCommandSet SET_NORMAL
    Rider2 = UpgradeViaRiderSwitch2 RIDER2 WEAPON_RIDER2 STATUS_RIDER2 GLAWorkerCommandSet SET_SUPERSONIC

    ScuttleDelay = 0
    Slots = 1
    ScatterNearbyOnExit = No
    HealthRegen%PerSec = 0%
    DamagePercentToUnits = 0%
    BurnedDeathToUnits = No
    AllowInsideKindOf = INFANTRY
    ExitDelay = 0
    NumberOfExitPaths = 1
    GoAggressiveOnExit = No
    DoorOpenTime = 0
  End
  
  Behavior = OCLSpecialPower ModuleTag_Upgrade02
    SpecialPowerTemplate = SpecialAbilitySwitchToMain
    OCL = OCL_UpgradeViaRiderSwitch1
  End

  Behavior = OCLSpecialPower ModuleTag_Upgrade03
    SpecialPowerTemplate = SpecialAbilityCharge
    OCL = OCL_UpgradeViaRiderSwitch2
  End
  
  Behavior = FireWeaponCollide ModuleTag_ChargeTimer01
    RequiredStatus = STEALTHED
    CollideWeapon = GenericInfantryRiderSwitch1ResetWeapon
  End

  Behavior = StealthUpdate ModuleTag_ChargeTimer02
    StealthDelay = 10000
    RequiredStatus = STATUS_RIDER2
    InnateStealth = Yes
    FriendlyOpacityMin = 100%
    FriendlyOpacityMax = 100%
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End

  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End

  Behavior = FireWeaponUpdate ModuleTag_Move01
    Weapon = IngeniousInfantryMovementWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move02
    Weapon = IngeniousInfantryCheckerWeapon
  End
  
  Behavior = MaxHealthUpgrade ModuleTag_Tier01
    TriggeredBy = Upgrade_GLARadicalJurisdiction
    AddMaxHealth = 3.0
    ChangeType = ADD_CURRENT_HEALTH_TOO
  End

  Behavior = LocomotorSetUpgrade ModuleTag_Shoes01
    TriggeredBy = Upgrade_GLAWorkerShoes
  End

  Behavior = MaxHealthUpgrade ModuleTag_Shoes02
    TriggeredBy = Upgrade_GLAWorkerShoes
    AddMaxHealth = 12.0
    ChangeType = ADD_CURRENT_HEALTH_TOO
  End

  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 25
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_InfantryDetector
    DetectionRate = 500
    DetectionRange = 10
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = INFANTRY
  End
  ; --- end detector modules ---
  
  Geometry = Cylinder
  GeometryMajorRadius = 4.0
  GeometryMinorRadius = 4.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowHI
  BuildCompletion = APPEARS_AT_RALLY_POINT
End
