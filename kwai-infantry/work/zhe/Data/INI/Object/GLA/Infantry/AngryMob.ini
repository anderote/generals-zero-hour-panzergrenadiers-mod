    End

    ; This transition allows him to put his gun away when he's finished attacking.
    TransitionState = TRANS_FIRING_AK TRANS_STAND_AK
      Animation = UIMOB01_SKL.UIMOB01_ATD1_ED
      AnimationMode = ONCE
    End

