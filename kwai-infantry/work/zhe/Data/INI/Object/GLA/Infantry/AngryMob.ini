    End
    AliasConditionState = PREATTACK_B FIRING_B WEAPONSET_PLAYER_UPGRADE
    AliasConditionState = PREATTACK_B BETWEEN_FIRING_SHOTS_B WEAPONSET_PLAYER_UPGRADE

