;------------------------------------------------------------------------------
;Note that we must have this GLA Hole defined before we do any of the
;object reskins with it later in this file
;------------------------------------------------------------------------------
Object GLAHole

  ; *** ART Parameters ***
  SelectPortrait = SUHole_L
  ButtonImage = SUHole_L
  Draw = W3DModelDraw  ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = UBHole
    End
    ConditionState = DAMAGED
      Model = UBHole_D
      ParticleSysBone = Smoke01 SteamVent
    End
    ConditionState = REALLYDAMAGED
      Model = UBHole_E
      ParticleSysBone = Smoke01 SteamVent
      ParticleSysBone = Smoke02 SteamVent
    End
  End
  
  ; ----------------- the door -------------------
  Draw = W3DModelDraw ModuleTag_Door01
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = UBHole_A1
      Animation = UBHole_A1.UBHole_A1
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_OpenedDoor
    End
    ConditionState = DAMAGED
      Model = UBHole_A1D
      Animation = UBHole_A1D.UBHole_A1D
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_DamagedOpenedDoor
    End
    ConditionState = REALLYDAMAGED
      Model = None
    End
    
    ConditionState = ENEMYNEAR
      Model = UBHole_A1
      Animation = UBHole_A1.UBHole_A1
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
      TransitionKey = TRANS_ClosedDoor
    End
    ConditionState = ENEMYNEAR DAMAGED
      Model = UBHole_A1D
      Animation = UBHole_A1D.UBHole_A1D
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
      TransitionKey = TRANS_DamagedClosedDoor
    End
    ConditionState = REALLYDAMAGED ENEMYNEAR
      Model = None
    End
    
    TransitionState = TRANS_ClosedDoor TRANS_OpenedDoor
      Model = UBHole_A1
      Animation = UBHole_A1.UBHole_A1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_OpenedDoor TRANS_ClosedDoor
      Model = UBHole_A1
      Animation = UBHole_A1.UBHole_A1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    TransitionState = TRANS_DamagedClosedDoor TRANS_DamagedOpenedDoor
      Model = UBHole_A1D
      Animation = UBHole_A1D.UBHole_A1D
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_DamagedOpenedDoor TRANS_DamagedClosedDoor
      Model = UBHole_A1D
      Animation = UBHole_A1D.UBHole_A1D
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    ConditionState = SOLD
      Model = None
    End   
    ConditionState = SOLD SNOW
       Model = None
    End    
    ConditionState = SOLD NIGHT
       Model = None
    End    
    ConditionState = SOLD NIGHT SNOW
       Model = None
    End
  End  

  PlacementViewAngle = -135

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:GLAHole
  Side = GLA
  EditorSorting = SYSTEM
  Prerequisites
    Object = GLACommandCenter
  End
  BuildCost = 100
  BuildTime = 10.0
  EnergyProduction = 0
  VisionRange = 200.0
  ShroudClearingRange = 50
  ArmorSet
    Conditions = None
    Armor = StructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** AUDIO Parameters ***
  VoiceSelect = TunnelNetworkSelect
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = STRUCTURE
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE REBUILD_HOLE CAN_SEE_THROUGH_STRUCTURE IMMUNE_TO_CAPTURE SCORE_DESTROY MP_COUNT_FOR_VICTORY
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 9999999.9
    InitialHealth = 9999999.9
  End
  
  Behavior = RebuildHoleBehavior ModuleTag_Hole01
    WorkerObjectName = GLAInfantryWorker
    WorkerRespawnDelay = 45000
    HoleHealthRegen%PerSecond = 0.1
  End 
  
  Behavior = EnemyNearUpdate ModuleTag_Hole02
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    RequiredStatus = UNDER_CONSTRUCTION
    OCL = OCL_SmallStructureDebris_NoCollapseUnderConstruction
  End

  Behavior = InstantDeathBehavior ModuleTag_Death02
    ExemptStatus = UNDER_CONSTRUCTION
    OCL = OCL_SmallStructureDebris_NoCollapse
  End

  Behavior = ModelConditionUpgrade ModuleTag_ArmorVisual01
    ConditionFlag = GARRISONED
    TriggeredBy = Upgrade_GLAFortifiedStructure
  End

  Geometry = Cylinder
  GeometryMajorRadius = 25.0
  GeometryHeight = 5.0    
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER
End
