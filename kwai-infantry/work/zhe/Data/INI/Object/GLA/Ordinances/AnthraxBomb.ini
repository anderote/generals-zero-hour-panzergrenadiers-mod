;------------------------------------------------------------------------------
Object AnthraxBomb

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = EXCarptBmb
      ParticleSysBone = None CarpetBombTrail
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:AnthraxBomb
  Side = GLA
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  VisionRange = 300.0  
  ShroudClearingRange = 0
  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** AUDIO Parameters ***
  SoundFallingFromPlane = BombFallingWhistle
    
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL None

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 75.0
    AerodynamicFriction = 1
    ForwardFriction = 22
    CenterOfMassOffset = 2
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Anthrax
    DeathWeapon = AnthraxBombWeapon
    StartsActive = Yes
    ConflictsWith = Upgrade_GLAAnthraxGamma Upgrade_GLAAnthraxBeta
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Beta
    DeathWeapon = AnthraxBetaBombWeapon
    StartsActive = No
    ConflictsWith = Upgrade_GLAAnthraxGamma
    TriggeredBy = Upgrade_GLAAnthraxBeta
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Gamma
    DeathWeapon = AnthraxGammaBombWeapon
    StartsActive = No
    ConflictsWith = Upgrade_GLAAnthraxBeta
    TriggeredBy = Upgrade_GLAAnthraxGamma
  End

  Behavior = HeightDieUpdate ModuleTag_HeightDie
    TargetHeight = 1.0
    TargetHeightIncludesStructures = Yes
  End

  Behavior = SpecialPowerCompletionDie ModuleTag_PowerReset
    SpecialPowerTemplate = GLA_SuperweaponAnthraxBomb
  End
  
  Behavior = DestroyDie ModuleTag_Death01
  End

  Geometry = Sphere
  GeometryIsSmall = No
  GeometryMajorRadius = 20.0
End
