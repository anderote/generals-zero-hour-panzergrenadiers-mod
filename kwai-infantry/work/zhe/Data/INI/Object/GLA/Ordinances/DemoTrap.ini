;------------------------------------------------------------------------------
Object GLAFieldEngineerDemoTrap_Egg

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = EXShovelFX01
      ParticleSysBone = Bone_ShovelFX EngineerDirtFall
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0.0
  
  ArmorSet
    Conditions = None
    Armor = MineArmor
    DamageFX = EmptyDamageFX
  End

  ; *** ENGINEERING Parameters ***
  KindOf = IGNORED_IN_GUI NO_COLLIDE

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 3.0
    InitialHealth = 3.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +EXTRA_2
