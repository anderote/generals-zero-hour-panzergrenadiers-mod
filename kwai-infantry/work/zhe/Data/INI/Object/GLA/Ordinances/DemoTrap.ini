    MaxLifetime = 4000
  End

  Geometry = Cylinder
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 1.0
  GeometryIsSmall = Yes
End

;------------------------------------------------------------------------------
Object GLAFieldEngineerDemoTrap

  ; *** ART Parameters ***
  SelectPortrait = SUDemoTrap_L
  ButtonImage = SUDemoTrap
  
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = EXHideBomb
    End
  End
  PlacementViewAngle = -45

  Draw = W3DModelDraw ModuleTag_HousecolorDraw
    OkToChangeModelColor = Yes
    ReceivesDynamicLights = No
    DefaultConditionState
      Model = EXIndATMine
    End
  End
  
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:DemoTrap
  Side = GLA
  EditorSorting = SYSTEM
  VisionRange = 10
  ShroudClearingRange = 0

  WeaponSet
    ;The weapon set is used to determine detonation mode
    Conditions = None 
    Weapon = PRIMARY DummyWeapon
    Weapon = SECONDARY DummyWeapon
    Weapon = TERTIARY DummyWeapon
    AutoChooseSources = PRIMARY NONE
    AutoChooseSources = SECONDARY NONE
    AutoChooseSources = TERTIARY NONE
  End
  
  ArmorSet
    Conditions = None
    Armor = DemoTrapArmor
    DamageFX = DefaultDamageFX
  End

  ExperienceValue = 50 50 50 50
  CommandSet = = GLADemoTrapCommandSet
  
  ; *** AUDIO Parameters ***
  VoiceSelect = FakeBuildingSelect
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy
  UnitSpecificSounds
    UnderConstruction = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = STRUCTURE
  KindOf = PRELOAD SELECTABLE STRUCTURE IMMOBILE IMMUNE_TO_CAPTURE DEMOTRAP NO_HEAL_ICON CLEARED_BY_BUILD IGNORED_IN_GUI NO_COLLIDE
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 50.0   
    InitialHealth = 50.0
  End

  Behavior = StealthUpdate ModuleTag_Stealth01
    StealthDelay = 0
    StealthForbiddenConditions = NONE
    OrderIdleEnemiesToAttackMeUponReveal = Yes
    RevealDistanceFromTarget = 17.5
  End

  Behavior = DemoTrapUpdate ModuleTag_Detonation01
    DefaultProximityMode = Yes
    DetonationWeaponSlot = PRIMARY
    ProximityModeWeaponSlot = SECONDARY
    ManualModeWeaponSlot = TERTIARY
    TriggerDetonationRange = 25.0
    IgnoreTargetTypes = PROJECTILE UNATTACKABLE STRUCTURE
    AutoDetonationWithFriendsInvolved = Yes
  End

  Behavior = SlowDeathBehavior ModuleTag_Detonation02
    ExemptStatus = UNDER_CONSTRUCTION
    DeathTypes = ALL -EXTRA_2 -EXTRA_3 -EXTRA_4
    DestructionDelay = 1000
    FX = INITIAL FX_GLADemoTrapWarning
    Weapon = FINAL 500lbDirtyBombDetonationWeapon
  End

  Behavior = SlowDeathBehavior ModuleTag_Detonation03 
    DeathTypes = NONE +EXTRA_2 +EXTRA_4
    DestructionDelay = 0
  End 

  Behavior = SlowDeathBehavior ModuleTag_Detonation04
    DeathTypes = NONE +EXTRA_3
    DestructionDelay = 0
    FX = FINAL FX_MineDisarming
  End 

  Behavior = FireWeaponUpdate ModuleTag_NoStack01
    Weapon = 10Radius_MineStackingPreventWeapon
  End

  Behavior = FlammableUpdate ModuleTag_Flame01
    AflameDuration = 20000
    AflameDamageAmount = 20
    AflameDamageDelay = 500
  End
 
  BuildCompletion = PLACED_BY_PLAYER
  Shadow = SHADOW_VOLUME
  Geometry = Cylinder
  GeometryMajorRadius = 4.0
  GeometryHeight = 9.0
  GeometryIsSmall = Yes 
End

;------------------------------------------------------------------------------
Object GLADemoTrap

  ; *** ART Parameters ***
  SelectPortrait = SUDemoTrap_L
  ButtonImage = SUDemoTrap
  
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    IgnoreConditionStates = DAMAGED REALLYDAMAGED RUBBLE SNOW NIGHT
    
    DefaultConditionState
      Model = EXHideBomb
    End
    
    ;**************************************************************************************************************************
    ;This block handles every possible case with construction process, selling process, awaiting construction, and sold states
    ;for this draw module
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = EXHideBomb
      Flags = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    
    ConditionState = AWAITING_CONSTRUCTION 
      Model = None
    End
    AliasConditionState = SOLD
    ;**************************************************************************************************************************
  End
  PlacementViewAngle = -45

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:DemoTrap
  Side = GLA
  EditorSorting = STRUCTURE
  Prerequisites
    Object = GLAArmsDealer
  End
  BuildCost = 200
  BuildTime = 10.0
  EnergyProduction = 0
  VisionRange = 0.0
  ShroudClearingRange = 0.0
  ExperienceValue = 50 50 50 50

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY DummyWeapon
    Weapon = SECONDARY DummyWeapon
    Weapon = TERTIARY DummyWeapon
    AutoChooseSources = PRIMARY NONE
    AutoChooseSources = SECONDARY NONE
    AutoChooseSources = TERTIARY NONE
  End
  
  ArmorSet
    Conditions = None
    Armor = BarrelArmor
    DamageFX = DefaultDamageFX
  End

  CommandSet = = GLADemoTrapCommandSet
  
  ; *** AUDIO Parameters ***
  VoiceSelect = FakeBuildingSelect
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy
  UnitSpecificSounds
    UnderConstruction = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = STRUCTURE
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE IMMUNE_TO_CAPTURE DEMOTRAP
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 50.0   
    InitialHealth = 50.0
  End

  Behavior = StealthUpdate ModuleTag_Stealth01
    StealthDelay = 0
    StealthForbiddenConditions = NONE
    OrderIdleEnemiesToAttackMeUponReveal = Yes
    RevealDistanceFromTarget = 17.5
  End

  Behavior = DemoTrapUpdate ModuleTag_DemoTrap01
    DefaultProximityMode = Yes
    DetonationWeaponSlot = PRIMARY
    ProximityModeWeaponSlot = SECONDARY
    ManualModeWeaponSlot = TERTIARY
    TriggerDetonationRange = 15.0
    IgnoreTargetTypes = PROJECTILE UNATTACKABLE
    AutoDetonationWithFriendsInvolved = Yes
    DetonateWhenKilled = Yes
  End

  Behavior = SlowDeathBehavior ModuleTag_Death01
    ExemptStatus = UNDER_CONSTRUCTION
    DestructionDelay = 1000
    FX = INITIAL FX_GLADemoTrapWarning
    Weapon = FINAL 500lbDirtyBombDetonationWeapon
  End

  Behavior = InstantDeathBehavior ModuleTag_Death02
    RequiredStatus = UNDER_CONSTRUCTION
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 60000
    AflameDamageAmount = 20
    AflameDamageDelay = 500
  End

  BuildCompletion = PLACED_BY_PLAYER
  Shadow = SHADOW_VOLUME
  Geometry = Cylinder
  GeometryMajorRadius = 4.0
  GeometryHeight = 9.0
  GeometryIsSmall = Yes 
End
