;------------------------------------------------------------------------------
Object ScudStormMissile

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = UBScudStrm_M
      ParticleSysBone = None TacticalMissileExhaust
      ParticleSysBone = None TacticalMissileStreak
    End
  End

  ; ***DESIGN parameters ***
  KindOf = PROJECTILE BALLISTIC_MISSILE
  EditorSorting = SYSTEM
  VisionRange = 300.0  
  ShroudClearingRange = 0
  TransportSlotCount = 10
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** AUDIO Parameters ***
  SoundAmbient = TacticalMissileIncomingWhistle
    
  ; *** ENGINEERING Parameters ***
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 400.0
    InitialHealth = 400.0
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 50.0
    AllowCollideForce = No
  End
  
  Behavior = MissileAIUpdate ModuleTag_AI01
    TryToFollowTarget = No 
    FuelLifetime = 0
    InitialVelocity = 50
    IgnitionFX = FX_CruiseMissileIgnition
    DistanceToTravelBeforeTurning = 750
    DistanceToTargetBeforeDiving = 250
  End
  Locomotor = SET_NORMAL TacticalBallisticMissileLocomotor

  Behavior = HeightDieUpdate ModuleTag_HeightDie
    TargetHeight = 15.0
    TargetHeightIncludesStructures = Yes
    OnlyWhenMovingDown = Yes
    SnapToGroundOnDeath = Yes
    InitialDelay = 1000
  End

  Behavior = DestroyDie ModuleTag_Death01
  End

  Behavior = SpecialPowerCompletionDie ModuleTag_PowerReset
    SpecialPowerTemplate = GLA_SuperweaponScudStorm
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Weapon01
    DeathWeapon = ScudStormAnthraxDamageWeapon
    StartsActive = Yes
    ConflictsWith = Upgrade_GLAAnthraxBeta      
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Weapon02
    DeathWeapon = ScudStormAnthraxBetaDamageWeapon
    StartsActive = No
    TriggeredBy = Upgrade_GLAAnthraxBeta         
  End

  Geometry = Cylinder
  GeometryIsSmall = Yes
  GeometryMajorRadius = 7.0
  GeometryHeight = 30.0
End
