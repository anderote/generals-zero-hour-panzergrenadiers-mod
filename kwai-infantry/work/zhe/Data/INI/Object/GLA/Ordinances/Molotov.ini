;------------------------------------------------------------------------------
Object MolotovCocktail
  EditorSorting = SYSTEM
  BuildVariations = 0MolotovCocktail 0MolotovCocktail 1MolotovCocktail
End

;------------------------------------------------------------------------------
Object 0MolotovCocktail

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ParticlesAttachedToAnimatedBones = Yes
    ConditionState = NONE
      Model = UIMolotov
      ParticleSysBone = BONE_FX MolotovBurningRag
      ParticleSysBone = BONE_FX MolotovLenzflare
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  ArmorSet
    Armor = ProjectileArmor
  End
  VisionRange = 0.0

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 10.0
    InitialHealth = 10.0
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_GrenadeHitWater
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -DETONATED -FLOODED -EXPLODED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = NONE +EXPLODED
    FX = FX_MolotovCocktailDetonation
    OCL = OCL_FireFieldMedium
  End
  ; ---- end Projectile death behaviors
  
  Behavior = DumbProjectileBehavior ModuleTag_Physics02
    TumbleRandomly = Yes
    DetonateCallsKill = No
    FirstHeight = 25
    SecondHeight = 50
    FirstPercentIndent = 30%
    SecondPercentIndent = 70%
    FlightPathAdjustDistPerSecond = 0
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 3.0
    AllowCollideForce = No
    KillWhenRestingOnGround = Yes
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL MidAirGrenadeLocomotor
  
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

