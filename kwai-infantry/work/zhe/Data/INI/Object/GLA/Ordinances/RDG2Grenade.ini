;------------------------------------------------------------------------------
Object RDG2Grenade

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = UIRDG1
      ParticleSysBone = BONE_FX GrenadeGenericTrail
    End
  End
  
  Draw = W3DModelDraw ModuleTag_HousecolorDraw
    ReceivesDynamicLights = No
    
    DefaultConditionState
      Model = EXIndSmkGnd
      Animation = EXIndSmkGnd.EXIndSmkGnd
      AnimationMode = MANUAL
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  ArmorSet
    Armor = ProjectileArmor
  End
  
  VisionRange = 0.0  

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 10.0
    InitialHealth = 10.0
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    OCL = OCL_FusedRDG2Grenade_Float
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -DETONATED -FLOODED -EXPLODED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = NONE +EXPLODED
    FX = FX_SmallGenericProjectileDeath
  End
  ; ---- end Projectile death behaviors
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 3.0
    AllowBouncing = Yes
  End

  Behavior = DumbProjectileBehavior ModuleTag_Physics02
    DetonateCallsKill = Yes
    FirstHeight = 25
    SecondHeight = 50
    FirstPercentIndent = 30%
    SecondPercentIndent = 70%
    FlightPathAdjustDistPerSecond = 0
  End
  
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

;------------------------------------------------------------------------------
Object FusedRDG2Grenade

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = UIRDG1
      ParticleSysBone = BONE_FX SmokeGrenadeGeyser
      ParticleSysBone = BONE_FX SmokeGrenadeLenzflare
      ParticleSysBone = BONE_FX GrenadeGenericTrail
      ParticleSysBone = BONE_FX SmokeGrenadeImpactGreyDust
    End
  End
  
  Draw = W3DModelDraw ModuleTag_HousecolorDraw
    ReceivesDynamicLights = No
    
    DefaultConditionState
      Model = EXIndSmkGnd
    End
  End

  ; *** AUDIO Parameters ***
  SoundAmbient = SmokeScreenLoop
  
  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  ArmorSet
    Armor = UnsinkableProjectileArmor
  End
  VisionRange = 0.0  

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 10.0
    InitialHealth = 10.0
  End
  
  Behavior = DestroyDie ModuleTag_Death01
  End
 
  Behavior = DeletionUpdate ModuleTag_Delete01
    MinLifetime = 22500
    MaxLifetime = 22500
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 3.0
  End

  Behavior = FireWeaponUpdate ModuleTag_Smoke01
    Weapon = GenericSmokeGrenadeDischargeWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Smoke2
    Weapon = GenericSmokeGrenadeStatusWeapon
    InitialDelay = 5000
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Smoke03
    Weapon = GenericSmokeGrenadeStatusWeapon_NoAttack
    InitialDelay = 5000
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

