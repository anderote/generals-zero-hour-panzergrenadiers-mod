;------------------------------------------------------------------------------
Object BigRig

  ; *** ART Parameters ***
  SelectPortrait = SSTerroristCarBomb_L
  ButtonImage = SSTerroristCarBomb

  Draw = W3DTruckDraw ModuleTag_W3D01
    ConditionState = NONE
      Model = CVBigRig
    End
    
    CabRotationMultiplier = 1.5
    TrailerRotationMultiplier = 0.2
    CabBone = CAB
    TrailerBone = TRAILER
    RotationDamping = 0.7

    RightFrontTireBone = Tire01
    LeftFrontTireBone = Tire02
    MidRightFrontTireBone = Tire03
    MidLeftFrontTireBone = Tire04
    MidRightMidTireBone = Tire05
    MidLeftMidTireBone = Tire06
    MidRightRearTireBone = Tire07
    MidLeftRearTireBone = Tire08
    RightRearTireBone = Tire09
    LeftRearTireBone = Tire10

    TireRotationMultiplier = 0.2
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:BigRig
  EditorSorting = VEHICLE
  TransportSlotCount = 3
  WeaponSet
    Conditions = None
    Weapon = PRIMARY None
  End
  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY TerroristSuicideWeapon
  End

  ArmorSet
    Armor = CivilianVehicleArmor
    DamageFX = CrushableCarDamageFX
  End
  
  CrusherLevel = 2
  CrushableLevel = 2
  CommandSet = CivilianCarBombCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = ConvoyTruckSelect
  SoundMoveLoop = TruckMoveLoop
  UnitSpecificSounds
    TruckPowerslideSound = NoSound
    TruckLandingSound = NoSound
  End

  ; *** ENGINEERING Parameters ***  
  KindOf = SELECTABLE CAN_ATTACK VEHICLE SHOW_PORTRAIT_WHEN_CONTROLLED
  RadarPriority = LOCAL_UNIT_ONLY

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 150.0
    InitialHealth = 150.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL BasicCarLocomotor
  Locomotor = SET_WANDER WanderCarLocomotor
  Locomotor = SET_PANIC PanicCarLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 30.0
  End
  
  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED -SUICIDED
    ProbabilityModifier = 80
    DestructionDelay = 100
    DestructionDelayVariance  = 50
    FX = INITIAL FX_GenericCarExplode
    OCL = INITIAL OCL_BigRig_DeathEffect
    ExemptStatus = IS_CARBOMB
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED -SUICIDED
    ProbabilityModifier = 20
    DestructionDelay = 20000
    DestructionDelayVariance = 3000
    OCL = INITIAL OCL_GenericVehicle_CatchFire
    FX = FINAL FX_GenericCarExplode
    OCL = FINAL OCL_BigRig_DeathEffect
    ExemptStatus = IS_CARBOMB
  End

  ; Suicide death
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = NONE +SUICIDED
    OCL = INITIAL OCL_GenericCar_DeathEffect_Overkill
    Weapon = INITIAL SuicideDynamitePack
    RequiredStatus = IS_CARBOMB
  End
  
  ; A crushing defeat
  Behavior = CrushDie ModuleTag_CrushDeath01
    DeathTypes = NONE +CRUSHED +SPLATTED
    TotalCrushSound = CarAlarm
    BackEndCrushSound = CarAlarm
    FrontEndCrushSound = CarAlarm
    TotalCrushSoundPercent = 50   
    BackEndCrushSoundPercent = 50
    FrontEndCrushSoundPercent = 50
  End

  Behavior = SlowDeathBehavior ModuleTag_CrushDeath02
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkRate = 2.0
    SinkDelay = 5000
    SinkDelayVariance = 2500
    DestructionDelay = 10000
    DestructionDelayVariance = 2500
    FX = INITIAL FX_CarCrush
    OCL = FINAL OCL_BigRig_DeathEffect
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000 
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End
  
  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 22.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 14.0
  Shadow = SHADOW_VOLUME
End