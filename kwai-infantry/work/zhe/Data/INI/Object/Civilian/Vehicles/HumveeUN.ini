;------------------------------------------------------------------------------
Object CivilianVehicleHumveeUN

  ; *** ART Parameters ***
  SelectPortrait = SAHummer_L
  ButtonImage = SAHummer

  Draw = W3DTruckDraw ModuleTag_W3D01

    ConditionState = NONE
      Model = CVHUMVEE
      Turret = Turret
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
    End
    ConditionState = REALLYDAMAGED
      Model = CVHUMVEE_D
      Turret = Turret
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
    End
    ConditionState = RUBBLE
      Model = CVHUMVEE_D
    End

    TrackMarks = EXTireTrack.dds
    OkToChangeModelColor = Yes

    LeftFrontTireBone = Tire01
    RightFrontTireBone = Tire02
    LeftRearTireBone = Tire03
    RightRearTireBone = Tire04
    TireRotationMultiplier = 0.2
    PowerslideRotationAddition = 2.5
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:UNHumvee
  Side = Civilian
  EditorSorting = VEHICLE
  TransportSlotCount = 4 
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY M240MachineGunWeapon_Gunner
  End

  ArmorSet
    Conditions = None
    Armor = HMMWVArmor
    DamageFX = TruckDamageFX
  End

  BuildCost = 700
  BuildTime = 25.0
  VisionRange = 150
  ShroudClearingRange = 200
  
  ExperienceValue = 50 50 100 150 
  ExperienceRequired = 0 100 150 300 
  IsTrainable = Yes 
  CrusherLevel = 0
  CrushableLevel = 2 
  CommandSet = GLAVehicleBattleBusCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = HumveeVoiceSelect
  VoiceMove = HumveeVoiceMove
  VoiceGuard = HumveeVoiceMove
  VoiceAttack = HumveeVoiceAttack
  SoundMoveStart = HumveeMoveStart
  SoundMoveStartDamaged = HumveeMoveStart
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = HumveeVoiceCreate
    TurretMoveLoop = TurretMoveLoop
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    VoiceCrush = HumveeVoiceCrush

  ; Required for the W3DTruckDraw module
    TruckLandingSound = GenericVehicleLand
    TruckPowerslideSound = GenericVehiclePowerslide
    VoiceUnload = HumveeVoiceUnload
    VoiceEnter = HumveeVoiceMove
  End

  ; *** ENGINEERING Parameters ***  
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE TRANSPORT SALVAGER ATTACK_NEEDS_LINE_OF_SIGHT

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 125.0
    InitialHealth = 125.0
    SubdualDamageCap = 480
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = TransportAIUpdate ModuleTag_AI01
    Turret
      ControlledWeaponSlots = PRIMARY
      TurretTurnRate = 64
      MinIdleScanAngle = 15
      MaxIdleScanAngle = 15
      MinIdleScanInterval = 2000
      MaxIdleScanInterval = 3000
      RecenterTime = 5000
      FiresWhileTurning = Yes
    End
    MoodAttackCheckRate = 250
    AutoAcquireEnemiesWhenIdle = Yes NotWhileAttacking
  End
  Locomotor = SET_NORMAL M1151Locomotor

  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 50.0
  End

  Behavior = TransportContain  ModuleTag_Contain01
    Slots = 5
    ScatterNearbyOnExit = Yes
    DamagePercentToUnits = 100%
    AllowInsideKindOf = INFANTRY
    DoorOpenTime = 1350
    ExitDelay = 250
    NumberOfExitPaths = 3
    GoAggressiveOnExit = Yes
    PassengersAllowedToFire = Yes
    WeaponBonusPassedToPassengers = Yes
  End

  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED -SUICIDED
    ProbabilityModifier = 80
    DestructionDelay = 100
    DestructionDelayVariance  = 50
    FX = INITIAL FX_GenericVehicleDeathExplosion
    OCL = INITIAL OCL_AmericaVehicleHumvee_DeathEffect
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED -SUICIDED
    ProbabilityModifier = 20
    DestructionDelay = 20000
    DestructionDelayVariance = 3000
    OCL = INITIAL OCL_AmericaVehicleHumvee_CatchFire
    FX = FINAL FX_GenericVehicleDeathExplosion
    OCL = FINAL OCL_AmericaVehicleHumvee_DeathEffect
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_CrushDeath01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_CarCrush
    OCL = OCL_AmericaVehicleHumvee_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_CratesChange
    CrateData = SalvageCrateData
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000 
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End

  Geometry = Box
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 11.5     
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME   
End
