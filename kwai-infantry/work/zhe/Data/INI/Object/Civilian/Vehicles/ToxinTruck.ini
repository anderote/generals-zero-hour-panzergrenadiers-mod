;-------------------------------------------------------------------
Object ToxicSupplyTruck

  ; *** ART Parameters ***
  SelectPortrait = SSTerroristCarBomb_L
  ButtonImage = SSTerroristCarBomb

  Draw = W3DTruckDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = CVToxSpplyTk
      HideSubObject = BOX04
    End

    ConditionState = REALLYDAMAGED
      Model = CVToxSpplyTk_D
    End

    ConditionState = RUBBLE
      Model = CVToxSpplyTk_D1
    End

    ConditionState = CARRYING
      Model = CVToxSpplyTk
      ShowSubObject = BOX04
    End

    ConditionState = REALLYDAMAGED CARRYING
      Model = CVToxSpplyTk_D
      ShowSubObject = BOX04
    End

    ConditionState = RUBBLE CARRYING
      Model = CVToxSpplyTk_D1
      ShowSubObject = BOX04
    End

    TrackMarks = EXTireTrack.dds
    LeftFrontTireBone = TIRE01
    RightFrontTireBone = TIRE02
    LeftRearTireBone = TIRE03
    RightRearTireBone = TIRE04
    TireRotationMultiplier = 0.2
    PowerslideRotationAddition = 2.5
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:SupplyTruck
  Side = Civilian
  EditorSorting = VEHICLE
  TransportSlotCount = 2
  BuildCost = 600
  BuildTime = 10.0
  VisionRange = 150
  ShroudClearingRange = 200
  Prerequisites
    Object = ToxinRepository
  End

  ArmorSet
    Conditions = None
    Armor = CivilianVehicleArmor
    DamageFX = TankDamageFX
  End

  CrusherLevel = 2
  CrushableLevel = 2
  CommandSet = ChinaSupplyTruckCommandSet
  ExperienceValue = 50 50 50 50

  ; *** AUDIO Parameters ***
  SoundMoveStart = SupplyTruckMoveStart
  SoundMoveStartDamaged = SupplyTruckMoveStart

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_CAST_REFLECTIONS VEHICLE HARVESTER SCORE

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 150.0
    InitialHealth = 150.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = SupplyTruckAIUpdate ModuleTag_AI01
    MaxBoxes = 4
    SupplyCenterActionDelay = 400
    SupplyWarehouseActionDelay = 1000
    SupplyWarehouseScanDistance = 700
    SuppliesDepletedVoice = SupplyTruckVoiceSuppliesDepleted
  End
  Locomotor = SET_NORMAL BasicTruckLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 50.0
  End

  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED -SUICIDED
    ProbabilityModifier = 80
    DestructionDelay = 100
    DestructionDelayVariance  = 50
    FX = INITIAL FX_GenericCarExplode
    OCL = INITIAL OCL_GLAToxicSupplyTruck_DeathEffect
    ExemptStatus = IS_CARBOMB
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED -SUICIDED
    ProbabilityModifier = 20
    DestructionDelay = 20000
    DestructionDelayVariance = 3000
    OCL = INITIAL OCL_GenericVehicle_CatchFire
    FX = FINAL FX_GenericCarExplode
    OCL = FINAL OCL_GLAToxicSupplyTruck_DeathEffect
    ExemptStatus = IS_CARBOMB
  End

  ; Suicide death
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = NONE +SUICIDED
    OCL = INITIAL OCL_GenericCar_DeathEffect_Overkill
    Weapon = INITIAL SuicideDynamitePack
    RequiredStatus = IS_CARBOMB
  End
  
  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_CrushDeath01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_CarCrush
    OCL = OCL_GLAToxicSupplyTruck_CrushEffect
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:SMOKE01 RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_09
    AflameDuration = 5000 
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Geometry = Box
  GeometryMajorRadius = 17.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 14.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End