;------------------------------------------------------------------------------
;This is an example of a landmark bridge.  The model has to be correctly centered
; as with normal game objects, and the Geometry must be box, and the extents correct
; as that specifies where the "bridgeness" will occur for pathfinding.  jba.
Object TsingMaLandmarkBridge

; note that the landmark bridge has to have a bridge entry in Roads.ini with the same
; name as the object, in order to specify the corner towers.  jba

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = No
    
    ExtraPublicBone = Explosion01
    ExtraPublicBone = Explosion02
    ExtraPublicBone = Explosion03
    ExtraPublicBone = Explosion04
    ExtraPublicBone = Explosion05
    ExtraPublicBone = Explosion06
    ExtraPublicBone = Explosion07
    ExtraPublicBone = Splash01
    ExtraPublicBone = Splash02
    ExtraPublicBone = Splash03
    ExtraPublicBone = Splash04
    ExtraPublicBone = Splash05
    ExtraPublicBone = Splash06
    
    ; day
    ConditionState = NONE
      Model = CMTsingMa
    End
    ConditionState = DAMAGED
      Model = CMTsingMa_E 
    End
    ConditionState = REALLYDAMAGED
      Model = CMTsingMa_E
    End
    ConditionState = RUBBLE
      Model = CMTsingMa_R
      Animation = CMTsingMa_R.CMTsingMa_R
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End

    ; night
    ConditionState = NIGHT
      Model = CMTsingMa_N
    End
    ConditionState = DAMAGED NIGHT
      Model = CMTsingMa_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CMTsingMa_EN
      ParticleSysBone = Sparks01 SparksMedium
      ParticleSysBone = Sparks02 BuildUpBlueSpark
      ParticleSysBone = Sparks03 BuildUpBlueSpark
      ParticleSysBone = Sparks04 SparksMedium
      ParticleSysBone = Sparks05 BuildUpBlueSpark
      ParticleSysBone = Sparks06 SparksMedium
      ParticleSysBone = Sparks07 SparksMedium
      ParticleSysBone = Sparks08 SparksMedium
    End
    ConditionState = RUBBLE NIGHT
      Model = CMTsingMa_R
      Animation = CMTsingMa_R.CMTsingMa_R
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = CivilianStructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  IsBridge = Yes
  RadarPriority = STRUCTURE
  KindOf = STRUCTURE IMMOBILE BRIDGE IGNORED_IN_GUI
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 2000.0
    InitialHealth = 2000.0
  End

  ;We use new rubble model and it needs readjusted time delays 
  ;to work correctly - Fincer
  Behavior = BridgeBehavior ModuleTag_Bridge
    LateralScaffoldSpeed = 100.0
    VerticalScaffoldSpeed = 70.0
    ; BridgeDieOCL = OCL:OCL_TsingMaTankColumn Delay: 0 Bone:ParentObject
    ; BridgeDieOCL = OCL:OCL_TsingMaInfantryColumn Delay: 0 Bone:ParentObject
    ; BridgeDieFX = FX:FX_TsingMaExplosion Delay: 520  Bone:Explosion01
    ; BridgeDieOCL = OCL:OCL_TsingMaExplosion Delay: 520 Bone:Explosion01
    ; BridgeDieFX = FX:FX_TsingMaExplosion Delay: 1520 Bone:Explosion02
    ; BridgeDieOCL = OCL:OCL_TsingMaExplosion Delay: 1520 Bone:Explosion02
    ; BridgeDieFX = FX:FX_TsingMaExplosion Delay: 2020 Bone:Explosion03
    ; BridgeDieOCL = OCL:OCL_TsingMaExplosion Delay: 2020 Bone:Explosion03
    ; BridgeDieFX = FX:FX_TsingMaExplosion Delay: 3020 Bone:Explosion04
    ; BridgeDieOCL = OCL:OCL_TsingMaExplosion Delay: 3020 Bone:Explosion04
    ; BridgeDieFX = FX:FX_TsingMaExplosion Delay: 3770 Bone:Explosion05
    ; BridgeDieOCL = OCL:OCL_TsingMaExplosion Delay: 3770 Bone:Explosion05
    ; BridgeDieFX = FX:FX_TsingMaExplosion Delay: 5020 Bone:Explosion06
    ; BridgeDieOCL = OCL:OCL_TsingMaExplosion Delay: 5020 Bone:Explosion06
    ; BridgeDieFX = FX:FX_TsingMaExplosion Delay: 5520 Bone:Explosion07
    ; BridgeDieOCL = OCL:OCL_TsingMaExplosion Delay: 5520 Bone:Explosion07   

    ; BridgeDieFX = FX:FX_TsingMaSplash Delay: 520  Bone:Splash01
    ; BridgeDieFX = FX:FX_TsingMaSplash Delay: 1520 Bone:Splash02
    ; BridgeDieFX = FX:FX_TsingMaSplash Delay: 2020 Bone:Splash03
    ; BridgeDieFX = FX:FX_TsingMaSplash Delay: 3020 Bone:Splash04
    ; BridgeDieFX = FX:FX_TsingMaSplash Delay: 3770 Bone:Splash05
    ; BridgeDieFX = FX:FX_TsingMaSplash Delay: 4920 Bone:Splash06
  End
  
  Geometry = Box
  GeometryMajorRadius = 1117.0
  GeometryMinorRadius = 25.0
  GeometryHeight = 3.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End
