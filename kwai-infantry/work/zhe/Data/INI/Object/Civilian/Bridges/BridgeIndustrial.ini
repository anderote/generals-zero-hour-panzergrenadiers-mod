;------------------------------------------------------------------------------
Object BridgeIndustrial

; note that the landmark bridge has to have a bridge entry in Roads.ini with the same
; name as the object, in order to specify the corner towers.  jba

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = No
    ReceivesDynamicLights = Yes

    ; day
    ConditionState = NONE
      Model = CBBridgeIn
    END
    ConditionState = SNOW
      Model = CBBridgeIn_S
    End
    ConditionState = DAMAGED
      Model = CBBridgeIn_D
    End
    ConditionState = DAMAGED SNOW
      Model = CBBridgeIn_DS
    End
    ConditionState = REALLYDAMAGED
      Model = CBBridgeIn_E
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = CBBridgeIn_ES
    End
    ConditionState = RUBBLE
      Model = CBBridgeIn_r
    End
    ConditionState = RUBBLE SNOW
      Model = CBBridgeIn_rS
    End
 End

  ; ***DESIGN parameters ***
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = BridgeArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  IsBridge = Yes
  RadarPriority = STRUCTURE
  KindOf = STRUCTURE IMMOBILE BRIDGE IGNORED_IN_GUI
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 2000.0
    InitialHealth = 2000.0
  End

  Behavior = BridgeBehavior ModuleTag_Bridge
    LateralScaffoldSpeed = 100.0
    VerticalScaffoldSpeed = 70.0
  End

  Behavior = KeepObjectDie ModuleTag_Death01
    ;<NO DATA>
  End

  Shadow = SHADOW_VOLUME
  Geometry = Box
  GeometryMajorRadius = 123.0
  GeometryMinorRadius = 30.0
  GeometryHeight = 1.0
  GeometryIsSmall = No
End