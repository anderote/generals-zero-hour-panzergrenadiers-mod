;------------------------------------------------------------------------------
; Bridge towers appear at the 4 corners of a bridge area
;------------------------------------------------------------------------------
Object GenericBridgeTower

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = TempBldgSm
    End    
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:BridgeTower
  EditorSorting = SYSTEM
  VisionRange = 20
  ShroudClearingRange = 20
  ArmorSet
    Conditions = None
    Armor = BridgeArmor
    DamageFX = StructureDamageFXNoShake
  End

  CommandSet = BridgeTowerCommandSet
  
  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf = STRUCTURE IMMOBILE SELECTABLE BRIDGE_TOWER TECH_BUILDING CAPTURABLE UNATTACKABLE

  Body = ImmortalBody ModuleTag_Body01
    MaxHealth = 2000.0
    InitialHealth = 2000.0
  End

  Behavior = BridgeTowerBehavior ModuleTag_Bridge
    ;<NO DATA>
  End
  
  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End

  Behavior = ObjectCreationUpgrade ModuleTag_Repair
    UpgradeObject = OCL_BridgeTowerRepairWeapon
    ;ConflictsWith = Upgrade_BridgeSabotage
    TriggeredBy = Upgrade_BridgeRepair
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Sabotage
    UpgradeObject = OCL_BridgeTowerSabotageWeapon
    ConflictsWith = Upgrade_BridgeRepair
    TriggeredBy = Upgrade_BridgeSabotage
  End
  
  Behavior = BoneFXUpdate ModuleTag_BoneFX01
    PristineOCL1 = bone:None OnlyOnce:Yes 0 0 OCL:OCL_BridgeSabotageUpgradeResetObject
    DamagedOCL1 = bone:None OnlyOnce:Yes 0 0 OCL:OCL_BridgeSabotageUpgradeResetObject
    RubbleOCL1 = bone:None OnlyOnce:Yes 0 0 OCL:OCL_BridgeRepairUpgradeResetObject
  End

  Behavior = BoneFXDamage ModuleTag_BoneFX02
  End

  Scale = 0.8
  Geometry = Box
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 30.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End

;------------------------------------------------------------------------------
Object BridgeRepairInivisibleObject

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = None
    End
  End

  PlacementViewAngle = 0
  
  ; ***DESIGN parameters ***
  VisionRange = 0.0
  EditorSorting = SYSTEM

  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = EmptyDamageFX
  End
  
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD IMMOBILE NO_COLLIDE IGNORED_IN_GUI UNATTACKABLE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = AutoHealBehavior ModuleTag_Repair
    HealingAmount = 5
    HealingDelay = 100
    Radius = 1.0f
    StartsActive = Yes
    KindOf = STRUCTURE
    SingleBurst = No
  End

  Behavior = UpgradeDie ModuleTag_UpgradeDie01
   DeathTypes = ALL
   UpgradeToRemove = Upgrade_BridgeRepair ModuleTag_BridgeRepair01
  End
  
  Behavior = UpgradeDie ModuleTag_UpgradeDie02
   DeathTypes = ALL
   UpgradeToRemove = Upgrade_BridgeSabotage ModuleTag_Sabotage01
  End
  
  Behavior = DestroyDie ModuleTag_Death01
    DeathTypes = ALL
  End

  Behavior = LifetimeUpdate ModuleTag_Delete01
    MinLifetime = 40000
    MaxLifetime = 40000
  End
End

