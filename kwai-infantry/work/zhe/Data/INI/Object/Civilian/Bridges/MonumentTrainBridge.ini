;------------------------------------------------------------------------------
Object MonumentTrainBridge 

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = No
    ParticlesAttachedToAnimatedBones = Yes 

    ; day
    ConditionState = NONE
      Model = CMTBridge_A1
      Animation = CMTBridge_A1.CMTBridge_A1
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    
    ConditionState = RUBBLE
      Model = CMTBridge_A1
      Animation = CMTBridge_A1.CMTBridge_A1
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    
    ; snow
    ConditionState = SNOW
      Model = CMTBridge_A1S
      Animation = CMTBridge_A1S.CMTBridge_A1S
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
    End
    
    ConditionState = SNOW RUBBLE
      Model = CMTBridge_A1S
      Animation = CMTBridge_A1S.CMTBridge_A1S
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = BridgeArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  IsBridge = Yes
  RadarPriority = STRUCTURE
  KindOf = STRUCTURE IMMOBILE BRIDGE IGNORED_IN_GUI
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 2000.0
    InitialHealth = 2000.0
  End

  Behavior = BridgeBehavior ModuleTag_Bridge
    LateralScaffoldSpeed = 100.0
    VerticalScaffoldSpeed = 70.0
  End
  
  Behavior = KeepObjectDie ModuleTag_Death01
    ;<NO DATA>
  End

  Shadow = SHADOW_VOLUME
  Geometry = Box
  GeometryMajorRadius = 200.0
  GeometryMinorRadius = 18.0
  GeometryHeight = 2.0
  GeometryIsSmall = No
End

