;------------------------------------------------------------------------------
Object UnexplodedMunition_PlacementRandomizer

  Draw = W3DModelDraw ModuleTag_HousecolorDraw
    OkToChangeModelColor = Yes
    ReceivesDynamicLights = No
    DefaultConditionState
      Model = EXExplosives
    End
  End
  
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:UnexplodedMunitions
  EditorSorting = SYSTEM
  VisionRange = 50
  ShroudClearingRange = 0
  
  ArmorSet
    Conditions = None
    Armor = MineArmor
    DamageFX = EmptyDamageFX
  End

  BuildCost = 200
  BuildTime = 5.0
  CrushableLevel = 0

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = STRUCTURE SELECTABLE IMMOBILE
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = LifetimeUpdate ModuleTag_Delete01
    MinLifetime = 1
    MaxLifetime = 1
  End

  Behavior = DestroyDie ModuleTag_Death01
  End
 
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Death02
    DeathWeapon = UnexplodedMunitionWeapon_PlacementRandomizer
    StartsActive = Yes
  End

  Shadow = SHADOW_VOLUME
  Geometry = Cylinder
  GeometryMajorRadius = 4.7
  GeometryHeight = 0.6 
  GeometryIsSmall = Yes 
End

;------------------------------------------------------------------------------
Object UnexplodedMunition_Dispenser

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  VisionRange = 50.0  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL None

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 10.0
  End

   Behavior = InstantDeathBehavior ModuleTag_Dispenser
    OCL = OCL_UnexplodedMunition
  End
  
  Behavior = HeightDieUpdate ModuleTag_HeightDie
    TargetHeight = 1.0
    TargetHeightIncludesStructures = Yes
  End
  
  Geometry = Cylinder
  GeometryMajorRadius = 5.0
  GeometryHeight = 15.0
  GeometryIsSmall = Yes
End

;------------------------------------------------------------------------------
Object UnexplodedMunition

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = AIM15Mine
    End
  End

  Draw = W3DModelDraw ModuleTag_HousecolorDraw
    OkToChangeModelColor = Yes
    ReceivesDynamicLights = No
    DefaultConditionState
      Model = EXExplosives
    End
  End
  
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:UnexplodedMunitions
  EditorSorting = SYSTEM
  VisionRange = 50
  ShroudClearingRange = 0
  
  ArmorSet
    Conditions = None
    Armor = SinkableMineArmor
    DamageFX = EmptyDamageFX
  End

  BuildCost = 200
  BuildTime = 5.0
  CrushableLevel = 0

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = STRUCTURE SELECTABLE IMMUNE_TO_CAPTURE NO_HEAL_ICON IGNORED_IN_GUI UNATTACKABLE CAN_ATTACK SHRUBBERY
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  ExperienceValue = 20 20 20 20

  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  
  Behavior = SquishCollide ModuleTag_Physics02
  End

  Behavior = StealthUpdate ModuleTag_Stealth01
    StealthDelay = 0
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal = No
  End

  Behavior = SlowDeathBehavior ModuleTag_Detonation02
    DeathTypes = ALL -EXTRA_2 -EXTRA_3 -EXTRA_4
    DestructionDelay = 0
    Weapon = FINAL UnexplodedMunitionDetonationWeapon
  End

  Behavior = SlowDeathBehavior ModuleTag_Detonation03 
    DeathTypes = NONE +EXTRA_2 +EXTRA_4
    DestructionDelay = 0
  End 

  Behavior = SlowDeathBehavior ModuleTag_Detonation04
    DeathTypes = NONE +EXTRA_3
    DestructionDelay = 0
    FX = FINAL FX_MineDisarming
  End 

  Behavior = FireWeaponUpdate ModuleTag_NoStack01
    Weapon = 10Radius_MineStackingPreventWeapon
  End

  Behavior = FlammableUpdate ModuleTag_Flame01
    AflameDuration = 5000
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End
 
  Shadow = SHADOW_VOLUME
  Geometry = Cylinder
  GeometryMajorRadius = 4.7
  GeometryHeight = 0.6 
  GeometryIsSmall = Yes 
End

