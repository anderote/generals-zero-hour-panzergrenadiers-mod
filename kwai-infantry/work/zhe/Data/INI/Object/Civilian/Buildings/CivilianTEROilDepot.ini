;------------------------------------------------------------------------------
Object CivilianTEROilDepot

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
  
    ; day
    ConditionState = NONE
      Model = CBTOilDepo
    End
    ConditionState = DAMAGED
      Model = CBTOilDepo_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBTOilDepo_E
    End
    ConditionState = RUBBLE
      Model = CBTOilDepo_R
    End

    ; day garrisoned
    ConditionState = GARRISONED
      Model = CBTOilDepo_G
      Animation = CBTOilDepo_G.CBTOilDepo_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED
      Model = CBTOilDepo_DG
      Animation = CBTOilDepo_DG.CBTOilDepo_DG
      AnimationMode = LOOP
    End
    
    ; night
    ConditionState = NIGHT
      Model = CBTOilDepo_N
    End
    ConditionState = DAMAGED NIGHT
      Model = CBTOilDepo_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CBTOilDepo_EN
    End
    ConditionState = RUBBLE NIGHT
      Model = CBTOilDepo_RN
    End

    ; night garrisoned
    ConditionState = NIGHT GARRISONED
      Model = CBTOilDepo_NG
      Animation = CBTOilDepo_NG.CBTOilDepo_NG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT GARRISONED
      Model = CBTOilDepo_DNG
      Animation = CBTOilDepo_DNG.CBTOilDepo_DNG
      AnimationMode = LOOP
    End
    
    ; snow
    ConditionState = SNOW
      Model = CBTOilDepo_S
    End
    ConditionState = DAMAGED SNOW
      Model = CBTOilDepo_DS
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = CBTOilDepo_ES
    End
    ConditionState = RUBBLE SNOW
      Model = CBTOilDepo_RS
    End
    
    ; snow garrisoned
    ConditionState = SNOW GARRISONED
      Model = CBTOilDepo_SG
      Animation = CBTOilDepo_SG.CBTOilDepo_SG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW GARRISONED
      Model = CBTOilDepo_DSG
      Animation = CBTOilDepo_DSG.CBTOilDepo_DSG
      AnimationMode = LOOP
    End
    
    ; night snow
    ConditionState = SNOW NIGHT
      Model = CBTOilDepo_SN
    End
    ConditionState = DAMAGED SNOW NIGHT
      Model = CBTOilDepo_DSN
    End
    ConditionState = REALLYDAMAGED SNOW NIGHT
      Model = CBTOilDepo_ESN
    End
    ConditionState = RUBBLE SNOW NIGHT
      Model = CBTOilDepo_RSN
    End
    
    ; night snow garrisoned
    ConditionState = SNOW NIGHT GARRISONED
      Model = CBTOilDepo_SNG
      Animation = CBTOilDepo_SNG.CBTOilDepo_SNG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW NIGHT GARRISONED
      Model = CBTOilDepo_DSNG
      Animation = CBTOilDepo_DSNG.CBTOilDepo_DSNG
      AnimationMode = LOOP
    End
  End
  
  ; *** AUDIO Parameters ***
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Structure
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = FlamableStructureArmor
    DamageFX = StructureDamageFXNoShake
  End

   ; *** ENGINEERING Parameters ***  
  RadarPriority = STRUCTURE
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 2000.0
    InitialHealth = 2000.0
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000  
    AflameDuration = 5000         
    AflameDamageAmount = 50       
    AflameDamageDelay = 500       
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_ReallyDamaged_FXObject
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    FX = FX_OilRefineryDie
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Death02
    DeathWeapon = MediumOilDetonationWeapon
    StartsActive = Yes
  End

  Behavior = KeepObjectDie ModuleTag_Death03
  End

  Geometry = Box
  GeometryMajorRadius = 38.0
  GeometryMinorRadius = 40.0
  GeometryHeight = 17.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End