;------------------------------------------------------------------------------
ObjectReskin MogadishuSmallApartment GenericGarrisonableSmallStructure

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
  
     ; day
    ConditionState = NONE
      Model = CBTSmlApt
    End
    ConditionState = DAMAGED
      Model = CBTSmlApt_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBTSmlApt_E
    End
    ConditionState = RUBBLE
      Model = CBTSmlApt_E
    End
    ConditionState = POST_COLLAPSE
      Model = CBTSmlApt_R
    End
    AliasConditionState = POST_COLLAPSE NIGHT

    ; day garrisoned
    ConditionState = GARRISONED
      Model = CBTSmlApt_G
      Animation = CBTSmlApt_G.CBTSmlApt_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED
      Model = CBTSmlApt_GD
      Animation = CBTSmlApt_GD.CBTSmlApt_GD
      AnimationMode = LOOP
    End
    
    ; night
    ConditionState = NIGHT
      Model = CBTSmlApt_N
    End
    ConditionState = DAMAGED NIGHT
      Model = CBTSmlApt_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CBTSmlApt_EN
    End
 
    ; night garrisoned
    ConditionState = NIGHT GARRISONED
      Model = CBTSmlApt_GN
      Animation = CBTSmlApt_GN.CBTSmlApt_GN
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT GARRISONED
      Model = CBTSmlApt_GDN
      Animation = CBTSmlApt_GDN.CBTSmlApt_GDN
      AnimationMode = LOOP
    End
  End
  
  Geometry = Box
  GeometryMajorRadius = 20.0
  GeometryMinorRadius = 20.0
  GeometryHeight = 20.0
  GeometryIsSmall = No
End

