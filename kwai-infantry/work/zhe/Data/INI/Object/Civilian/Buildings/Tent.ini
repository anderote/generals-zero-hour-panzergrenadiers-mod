;------------------------------------------------------------------------------
ObjectReskin Tent01 GenericGarrisonableTinyStructure

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
  
    ; day
    ConditionState = NONE
      Model = CBTTent01
    End
    ConditionState = DAMAGED
      Model = CBTTent01_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBTTent01_E
