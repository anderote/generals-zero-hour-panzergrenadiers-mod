;------------------------------------------------------------------------------
ObjectReskin Chalet GenericGarrisonableMediumStructure

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    ; day
    ConditionState = NONE
      Model = CBChalet
    End
    ConditionState = DAMAGED
      Model = CBChalet_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBChalet_E
    End
    ConditionState = RUBBLE
      Model = CBChalet_E
    End
    ConditionState = POST_COLLAPSE
      Model = CBChalet_R
    End
    AliasConditionState = POST_COLLAPSE NIGHT

   ; day garrisoned
    ConditionState = GARRISONED
      Model = CBChalet_G
      Animation = CBChalet_G.CBChalet_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED
      Model = CBChalet_DG
      Animation = CBChalet_DG.CBChalet_DG
      AnimationMode = LOOP
    End

    ; night
    ConditionState = NIGHT
      Model = CBChalet_N
    End
    ConditionState = DAMAGED NIGHT
      Model = CBChalet_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CBChalet_EN
    End
    ConditionState = RUBBLE NIGHT
      Model = CBChalet_EN
    End

    ; night garrisoned
    ConditionState = NIGHT GARRISONED
      Model = CBChalet_NG
      Animation = CBChalet_NG.CBChalet_NG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT GARRISONED
      Model = CBChalet_DNG
      Animation = CBChalet_DNG.CBChalet_DNG
      AnimationMode = LOOP
    End
      
    ; snow
    ConditionState = SNOW
      Model = CBChalet_S
    End
    ConditionState = DAMAGED SNOW
      Model = CBChalet_DS
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = CBChalet_ES
    End
    ConditionState = RUBBLE SNOW
      Model = CBChalet_ES
    End
    ConditionState = POST_COLLAPSE SNOW
      Model = CBChalet_RS
    End
    AliasConditionState = POST_COLLAPSE NIGHT SNOW

    ; snow garrisoned
    ConditionState = SNOW GARRISONED
      Model = CBChalet_SG
      Animation = CBChalet_SG.CBChalet_SG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW GARRISONED
      Model = CBChalet_DSG

      Animation = CBChalet_DSG.CBChalet_DSG
      AnimationMode = LOOP
    End

    ; night Snow
    ConditionState = SNOW NIGHT
      Model = CBChalet_SN
    End
    ConditionState = DAMAGED SNOW NIGHT
      Model = CBChalet_DSN
    End
    ConditionState = REALLYDAMAGED SNOW NIGHT
      Model = CBChalet_ESN
    End
    ConditionState = RUBBLE SNOW NIGHT
      Model = CBChalet_ESN
    End

    ; night snow garrisoned
    ConditionState = SNOW NIGHT GARRISONED
      Model = CBChalet_SNG
      Animation = CBChalet_SNG.CBChalet_SNG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW NIGHT GARRISONED
      Model = CBChalet_DSNG
      Animation = CBChalet_DSNG.CBChalet_DSNG
      AnimationMode = LOOP
    End
  End

  Geometry = Box
  GeometryMajorRadius = 25.0
  GeometryMinorRadius = 55.0
  GeometryHeight = 50.0
  GeometryIsSmall = No
End

