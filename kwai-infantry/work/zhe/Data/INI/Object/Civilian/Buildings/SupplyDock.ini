;------------------------------------------------------------------------------
Object SupplyDock

  ; *** ART Parameters ***
  SelectPortrait = SSupPile3
  ButtonImage = SSupPile3

  Draw = W3DModelDraw ModuleTag_W3D01 
    
    ; day **************************************************
    ConditionState = NONE
      Model = ZBSupplyDK
      ParticleSysBone = FX01 SupplyDockSmoke
    End
    ConditionState = DAMAGED
      Model = ZBSupplyDK_D
      ParticleSysBone = FX01 SupplyDockSmoke
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = ZBSupplyDK_E
      ParticleSysBone = FX01 SupplyDockSmoke
    End

    ; night *************************************************
    ConditionState = NIGHT
      Model = ZBSupplyDK_N
      ParticleSysBone = FX01 SupplyDockSmoke
    End
    ConditionState = DAMAGED NIGHT
      Model = ZBSupplyDK_DN
      ParticleSysBone = FX01 SupplyDockSmoke
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT
      Model = ZBSupplyDK_EN
      ParticleSysBone = FX01 SupplyDockSmoke
    End
    
    ; snow *************************************************************
    ConditionState = SNOW
      Model = ZBSupplyDK_S
      ParticleSysBone = FX01 SupplyDockSmoke
    End
    ConditionState = SNOW DAMAGED
      Model = ZBSupplyDK_DS
      ParticleSysBone = FX01 SupplyDockSmoke
    End
    ConditionState = SNOW REALLYDAMAGED RUBBLE
      Model = ZBSupplyDK_ES
      ParticleSysBone = FX01 SupplyDockSmoke
    End

    ; night snow *************************************************
    ConditionState = NIGHT SNOW
      Model = ZBSupplyDK_NS
      ParticleSysBone = FX01 SupplyDockSmoke
    End
    ConditionState = DAMAGED NIGHT SNOW
      Model = ZBSupplyDK_DNS
      ParticleSysBone = FX01 SupplyDockSmoke
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT SNOW
      Model = ZBSupplyDK_ENS
      ParticleSysBone = FX01 SupplyDockSmoke
    End
  End

  Draw = W3DSupplyDraw ModuleTag_W3D02 
    ExtraPublicBone = SUP
    ConditionState = NONE
      Model = ZBSupplyDK_B
    End
    ConditionState = DAMAGED
      Model = ZBSupplyDK_BD
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = ZBSupplyDK_BE
    End
    ConditionState = SNOW
      Model = ZBSupplyDK_BS
    End
    ConditionState = DAMAGED SNOW
      Model = ZBSupplyDK_BDS
    End
    ConditionState = REALLYDAMAGED RUBBLE SNOW
      Model = ZBSupplyDK_BES
    End
    ConditionState = NIGHT
      Model = ZBSupplyDK_BN
    End
    ConditionState = DAMAGED NIGHT
      Model = ZBSupplyDK_BDN
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT
      Model = ZBSupplyDK_BEN
    End
    ConditionState = NIGHT SNOW
      Model = ZBSupplyDK_BNS
    End
    ConditionState = DAMAGED NIGHT SNOW
      Model = ZBSupplyDK_BNDS
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT SNOW
      Model = ZBSupplyDK_BENS
    End
    SupplyBonePrefix = SUP
  End
  
  Draw = W3DModelDraw ModuleTag_W3D03
    AnimationsRequirePower = No
  
    DefaultConditionState
      Model = ZBSupplyDK_A1
      Animation = ZBSupplyDK_A1.ZBSupplyDK_A1
      AnimationMode = LOOP
    End
  End   

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:SupplyDock
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = StructureDamageFXNoShake
  End
  
    ; *** AUDIO Parameters ***
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  ; *** ENGINEERING Parameters ***  
  KindOf = PRELOAD STRUCTURE IMMOBILE SELECTABLE SUPPLY_SOURCE_ON_PREVIEW SUPPLY_SOURCE IGNORED_IN_GUI
  RadarPriority = STRUCTURE  
  Body = ImmortalBody ModuleTag_Body01
    MaxHealth = 1500.0
    InitialHealth = 1500.0
  End

  Behavior = SupplyWarehouseCreate ModuleTag_Supply02
  End

  Behavior = SupplyWarehouseDockUpdate ModuleTag_Supply03
    NumberApproachPositions = -1 
    AllowsPassthrough = No
    StartingBoxes = 600
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000  
    AflameDuration = 5000         
    AflameDamageAmount = 50       
    AflameDamageDelay = 500       
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_ReallyDamaged_FXObject
  End

  Geometry = Box
  GeometryMajorRadius = 50.0
  GeometryMinorRadius = 61.0
  GeometryHeight = 13.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End