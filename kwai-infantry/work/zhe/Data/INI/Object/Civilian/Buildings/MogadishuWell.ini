  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = CBMogWell2
    End
    ConditionState = DAMAGED
      Model = CBMogWell2_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBMogWell2_E
    End
    ConditionState = RUBBLE
      Model = CBMogWell2_R
    End
   End
 
   Draw = W3DModelDraw ModuleTag_WaterFountain
