;------------------------------------------------------------------------------
Object EgyptianPyramidLarge

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    
    ; day
    DefaultConditionState
      Model = CMGRPYRA
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = CMGRPYRA_D
    End
    
    ; snow
    ConditionState = SNOW
      Model = CMGRPYRA_S
    End
    ConditionState = REALLYDAMAGED RUBBLE SNOW
      Model = CMGRPYRA_DS
    End
  End

    ; *** AUDIO Parameters ***
  SoundOnReallyDamaged = WallStoneDie

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Structure
  EditorSorting = MISC_MAN_MADE
  ArmorSet
    Conditions = None
    Armor = StructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  KindOf = PRELOAD STRUCTURE IMMOBILE UNATTACKABLE IGNORED_IN_GUI
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 15000.0
    InitialHealth = 15000.0
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionLarge_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionLarge_ReallyDamaged_FXObject
  End

  Behavior = FXListDie ModuleTag_Death01
    DeathFX = FX_StonePropExplode
  End

  Behavior = KeepObjectDie ModuleTag_Death02 
  End

  Shadow = SHADOW_VOLUME
  Geometry = Box
  GeometryMajorRadius = 325
  GeometryMinorRadius = 325
  GeometryHeight = 240
  GeometryIsSmall = No
End

