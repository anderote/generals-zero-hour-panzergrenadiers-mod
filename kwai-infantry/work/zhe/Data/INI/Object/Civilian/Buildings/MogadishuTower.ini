      ParticleSysBone = Smoke01 SmolderingFire
      ParticleSysBone = Smoke02 SmolderingFire
      ParticleSysBone = Smoke03 SmolderingFire
   End
    ConditionState = POST_COLLAPSE
      Model = CBTower04_R
    End
    AliasConditionState = POST_COLLAPSE NIGHT
   
   ; day garrisoned
    ConditionState = GARRISONED
      Model = CBTower04_G
      Animation = CBTower04_G.CBTower04_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED
      Model = CBTower04_GD
      Animation = CBTower04_GD.CBTower04_GD
      AnimationMode = LOOP
    End

    ; night
    ConditionState = NIGHT
      Model = CBTower04_N
    End
    ConditionState = DAMAGED NIGHT
      Model = CBTower04_DN
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone = Smoke02 SmolderingSmoke
      ParticleSysBone = Smoke03 SmolderingSmoke
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CBTower04_E
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone = Smoke02 SmolderingSmoke
      ParticleSysBone = Smoke03 SmolderingSmoke
      ParticleSysBone = Smoke04 SmolderingSmoke
      ParticleSysBone = Smoke01 SmolderingFire
      ParticleSysBone = Smoke02 SmolderingFire
    End
    ConditionState = RUBBLE NIGHT
      Model = CBTower04_E
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone = Smoke02 SmolderingSmoke
      ParticleSysBone = Smoke03 SmolderingSmoke
      ParticleSysBone = Smoke01 SmolderingFire
      ParticleSysBone = Smoke02 SmolderingFire
      ParticleSysBone = Smoke03 SmolderingFire
    End

    ; night garrisoned
    ConditionState = NIGHT GARRISONED
      Model = CBTower04_GN
      Animation = CBTower04_GN.CBTower04_GN
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT GARRISONED
      Model = CBTower04_GDN
      Animation = CBTower04_GDN.CBTower04_GDN
