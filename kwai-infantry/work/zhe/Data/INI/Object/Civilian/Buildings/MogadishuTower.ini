  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
   
   ; day  
    ConditionState = NONE
      Model = CBTower04
    End   
    ConditionState = DAMAGED
      Model = CBTower04_D
      ParticleSysBone = Smoke01 SmolderingSmoke
