;------------------------------------------------------------------------------
Object StanOilTank01

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
  
    ; day
    ConditionState = NONE
      Model = CBTOilTnk1
    End
    ConditionState = DAMAGED
      Model = CBTOilTnk1_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBTOilTnk1_E
    End
    ConditionState = RUBBLE
      Model = CBTOilTnk1_R
    End

    ConditionState = SNOW
      Model = CBTOilTnk1_S
    End
    ConditionState = DAMAGED SNOW
      Model = CBTOilTnk1_DS
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = CBTOilTnk1_ES
    End
    ConditionState = RUBBLE SNOW
      Model = CBTOilTnk1_RS
    End

    ConditionState = NIGHT
      Model = CBTOilTnk1_N
    End
    ConditionState = DAMAGED NIGHT
      Model = CBTOilTnk1_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CBTOilTnk1_EN
    End
    ConditionState = RUBBLE NIGHT
      Model = CBTOilTnk1_RN
    End

    ConditionState = NIGHT SNOW
      Model = CBTOilTnk1_SN
    End
    ConditionState = DAMAGED NIGHT SNOW
      Model = CBTOilTnk1_DNS
    End
    ConditionState = REALLYDAMAGED NIGHT SNOW
      Model = CBTOilTnk1_ESN
    End
    ConditionState = RUBBLE NIGHT SNOW
      Model = CBTOilTnk1_RSN
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Structure
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = FlamableStructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE
  Body = StructureBody ModuleTag_02
    MaxHealth = 500.0
    InitialHealth = 500.0
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000  
    AflameDuration = 5000         
    AflameDamageAmount = 50       
    AflameDamageDelay = 500       
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_ReallyDamaged_FXObject
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    FX = FX_OilRefineryDie
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Death02
    DeathWeapon = MediumOilDetonationWeapon
    StartsActive = Yes
  End

  Behavior = KeepObjectDie ModuleTag_Death03
  End

  Geometry = Box
  GeometryMajorRadius = 38.0
  GeometryMinorRadius = 19.0
  GeometryHeight = 40.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End

