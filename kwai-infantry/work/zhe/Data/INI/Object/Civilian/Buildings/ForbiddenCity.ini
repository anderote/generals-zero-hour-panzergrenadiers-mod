;------------------------------------------------------------------------------
ObjectReskin ForbiddenCityGates GenericGarrisonableHugeStructure

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
  
    ; day
    ConditionState = NONE
      Model = CBNFCitySH
    End
    ConditionState = DAMAGED
      Model = CBNFCitySH_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBNFCitySH_E
    End
    ConditionState = RUBBLE
      Model = CBNFCitySH_E
    End
    ConditionState = POST_COLLAPSE
      Model = CBNFCitySH_R
    End
    AliasConditionState = POST_COLLAPSE NIGHT
  
    ; day garrisoned
    ConditionState = GARRISONED
      Model = CBNFCitySH_G
      Animation = CBNFCitySH_G.CBNFCitySH_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED
      Model = CBNFCitySH_GD
      Animation = CBNFCitySH_GD.CBNFCitySH_GD
      AnimationMode = LOOP
    End
  End
  
  Geometry = Box
  GeometryMajorRadius = 58.0
  GeometryMinorRadius = 85.0
  GeometryHeight = 70.0
  GeometryIsSmall = No
End

