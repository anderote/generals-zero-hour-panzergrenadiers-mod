;------------------------------------------------------------------------------
Object BaikonurRocketPad

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes 
    
    ConditionState = NONE
      Model = CBBaikRock_A1
      Animation = CBBaikRock_A1.CBBaikRock_A1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_FIRST
      ParticleSysBone = Smoke01 SteamRocketFuselage
      ParticleSysBone = Smoke02 SteamRocketFuselage
      ParticleSysBone = Smoke03 SteamRocketFuselage
      ParticleSysBone = Smoke04 SteamRocketFuselage
    End

    ConditionState = DOOR_1_OPENING
      Model = CBBaikRock_A1
      Animation = CBBaikRock_A1.CBBaikRock_A1
      AnimationMode = ONCE
      ParticleSysBone = Engine01 BaikonurRocketFlare
      ParticleSysBone = Engine02 BaikonurRocketFlare
      ParticleSysBone = Engine03 BaikonurRocketFlare
      ParticleSysBone = Engine04 BaikonurRocketFlare
      ParticleSysBone = Engine05 BaikonurRocketFlare
      ParticleSysBone = Engine06 BaikonurRocketFlare
      ParticleSysBone = ESmoke01 BaikonurRocketTrail
      ParticleSysBone = RootTransform None
    End
    
    ConditionState = DAMAGED
      Model = CBBaikRock_A1
      Animation = CBBaikRock_A1.CBBaikRock_A1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_FIRST
      ParticleSysBone = Smoke01 SteamRocketFuselage
      ParticleSysBone = Smoke02 SteamRocketFuselage
      ParticleSysBone = Smoke03 SteamRocketFuselage
      ParticleSysBone = Smoke04 SteamRocketFuselage
    End
    
    ConditionState = REALLYDAMAGED
      Model = CBBaikRock_A1
      Animation = CBBaikRock_A1.CBBaikRock_A1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_FIRST
      ParticleSysBone = Smoke01 SteamRocketFuselage
      ParticleSysBone = Smoke02 SteamRocketFuselage
      ParticleSysBone = Smoke03 SteamRocketFuselage
      ParticleSysBone = Smoke04 SteamRocketFuselage
    End
    
    ConditionState = RUBBLE
      Model = CBBaikRock_CR
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Structure
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = CivilianStructureArmor
    DamageFX = StructureDamageFXNoShake
  End
  CommandSet = BaikonurLaunchTowerCommandSet

  ;***AUDIO parameters ***
   SoundAmbient = BuildingNeutronMissileHiss

  ; *** ENGINEERING Parameters ***  
  KindOf = STRUCTURE SELECTABLE IMMOBILE AIRCRAFT_PATH_AROUND CAPTURABLE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 2000.0
    InitialHealth = 2000.0
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000  
    AflameDuration = 5000         
    AflameDamageAmount = 50       
    AflameDamageDelay = 500       
  End

  Behavior = KeepObjectDie ModuleTag_Death01
  End
    
  Behavior = InstantDeathBehavior ModuleTag_Death02
    ;FX = FX_NukeGLA
    OCL = OCL_AnthraxFieldLarge
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionLarge_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionLarge_ReallyDamaged_FXObject
  End

  Geometry = Box
  GeometryMajorRadius = 45.0
  GeometryMinorRadius = 46.0
  GeometryHeight = 160.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End

;------------------------------------------------------------------------------
Object BaikonurRocketPad_C

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
  
    ConditionState = NONE
      Model = CBBaikRock_C
    End
    ConditionState = POST_COLLAPSE
      Model = CBBaikRock_CR
    End
    AliasConditionState = POST_COLLAPSE NIGHT
    
    ConditionState = DAMAGED
      Model = CBBaikRock_CD
    End
    
    ConditionState = REALLYDAMAGED
      Model = CBBaikRock_CE
    End
    
    ConditionState = RUBBLE
      Model = CBBaikRock_CE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Structure
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = CivilianStructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  KindOf = STRUCTURE SELECTABLE IMMOBILE AIRCRAFT_PATH_AROUND CAPTURABLE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 2000.0
    InitialHealth = 2000.0
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000  
    AflameDuration = 5000         
    AflameDamageAmount = 50       
    AflameDamageDelay = 500       
  End

  Behavior = KeepObjectDie ModuleTag_Death01
  End
    
  Behavior = StructureCollapseUpdate ModuleTag_Collapse01
    MinCollapseDelay = 500
    MaxCollapseDelay = 1000
    CollapseDamping = 0.0
    MaxShudder = 0.6
    MinBurstDelay = 250
    MaxBurstDelay = 800
    BigBurstFrequency = 4
    OCL = INITIAL OCL_LargeStructureCollapseInitial
    OCL = DELAY OCL_LargeStructureCollapseDelay
    OCL = BURST OCL_LargeStructureCollapseBurst
    OCL = FINAL OCL_LargeStructureCollapseFinal
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionLarge_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionLarge_ReallyDamaged_FXObject
  End

  Geometry = Box
  GeometryMajorRadius = 37.0
  GeometryMinorRadius = 46.0
  GeometryHeight = 130.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End