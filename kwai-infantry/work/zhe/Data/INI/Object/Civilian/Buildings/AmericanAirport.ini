ObjectReskin AmericanAirport01 GenericGarrisonableHugeStructure

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    ; day
    ConditionState = NONE
      Model = CBAIRPORT
    End
    ConditionState = DAMAGED
      Model = CBAIRPORT_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBAIRPORT_E
    End
    ConditionState = RUBBLE
      Model = CBAIRPORT_E
    End
    ConditionState = POST_COLLAPSE
      Model = CBAIRPORT_R
    End
