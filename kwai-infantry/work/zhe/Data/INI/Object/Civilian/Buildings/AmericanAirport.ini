      Model = CBAIRPORT_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CBAIRPORT_EN
    End
    ConditionState = RUBBLE NIGHT
      Model = CBAIRPORT_EN
    End

    ; night garrisoned
    ConditionState = NIGHT GARRISONED
      Model = CBAIRPORT_NG
      Animation = CBAIRPORT_NG.CBAIRPORT_NG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT GARRISONED
      Model = CBAIRPORT_DNG
      Animation = CBAIRPORT_DNG.CBAIRPORT_DNG
      AnimationMode = LOOP
    End

    ; snow
    ConditionState = SNOW
      Model = CBAIRPORT
    End
    ConditionState = DAMAGED SNOW
      Model = CBAIRPORT_D
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = CBAIRPORT_E
    End
    ConditionState = RUBBLE SNOW
      Model = CBAIRPORT_E
    End
    ConditionState = POST_COLLAPSE SNOW
      Model = CBAIRPORT_R
    End
    AliasConditionState = POST_COLLAPSE NIGHT SNOW

    ; snow garrisoned
    ConditionState = SNOW GARRISONED
      Model = CBAIRPORT_G
      Animation = CBAIRPORT_G.CBAIRPORT_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW GARRISONED
      Model = CBAIRPORT_DG
      Animation = CBAIRPORT_DG.CBAIRPORT_DG
      AnimationMode = LOOP
    End

    ; night Snow
    ConditionState = SNOW NIGHT
      Model = CBAIRPORT_N
    End
    ConditionState = DAMAGED SNOW NIGHT
      Model = CBAIRPORT_DN
    End
    ConditionState = REALLYDAMAGED SNOW NIGHT
      Model = CBAIRPORT_EN
    End
    ConditionState = RUBBLE SNOW NIGHT
      Model = CBAIRPORT_EN
    End

    ; night snow garrisoned
    ConditionState = SNOW NIGHT GARRISONED
      Model = CBAIRPORT_NG
      Animation = CBAIRPORT_NG.CBAIRPORT_NG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW NIGHT GARRISONED
      Model = CBAIRPORT_DNG
      Animation = CBAIRPORT_DNG.CBAIRPORT_DNG
      AnimationMode = LOOP
    End
  End

  Geometry = Box
  GeometryMajorRadius = 44.0
  GeometryMinorRadius = 98.0
  GeometryHeight = 31.0
  GeometryIsSmall = No
End

