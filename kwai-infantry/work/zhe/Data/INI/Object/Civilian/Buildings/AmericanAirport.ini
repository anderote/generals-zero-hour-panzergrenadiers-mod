    ; day garrisoned
    ConditionState = GARRISONED
      Model = CBAIRPORT_G
      Animation = CBAIRPORT_G.CBAIRPORT_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED
      Model = CBAIRPORT_DG
      Animation = CBAIRPORT_DG.CBAIRPORT_DG
      AnimationMode = LOOP
    End

    ; night
