;------------------------------------------------------------------------------
ObjectReskin GasStation01 GenericGarrisonableSmallStructure

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
  
    ; day
    ConditionState = NONE
      Model = CBGasSttn
    End
    ConditionState = DAMAGED
      Model = CBGasSttn_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBGasSttn_E
    End
    ConditionState = RUBBLE
      Model = CBGasSttn_E
    End
    ConditionState = POST_COLLAPSE
      Model = CBGasSttn_R
    End
    AliasConditionState = POST_COLLAPSE NIGHT

    ; day garrisoned
    ConditionState = GARRISONED
      Model = CBGasSttn_G
      Animation = CBGasSttn_G.CBGasSttn_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED
      Model = CBGasSttn_DG
      Animation = CBGasSttn_DG.CBGasSttn_DG
      AnimationMode = LOOP
    End
    
    ; night
    ConditionState = NIGHT
      Model = CBGasSttn_N
    End
    ConditionState = DAMAGED NIGHT
      Model = CBGasSttn_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CBGasSttn_EN

    End
    ConditionState = RUBBLE NIGHT
      Model = CBGasSttn_EN
    End

    ; night garrisoned
    ConditionState = NIGHT GARRISONED
      Model = CBGasSttn_NG
      Animation = CBGasSttn_NG.CBGasSttn_NG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT GARRISONED
      Model = CBGasSttn_DNG
      Animation = CBGasSttn_DNG.CBGasSttn_DNG
      AnimationMode = LOOP
    End
    
    ; snow
    ConditionState = SNOW
      Model = CBGasSttn_S
    End
    ConditionState = DAMAGED SNOW
      Model = CBGasSttn_DS
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = CBGasSttn_ES
    End
    ConditionState = RUBBLE SNOW
      Model = CBGasSttn_ES
    End
    ConditionState = POST_COLLAPSE SNOW
      Model = CBGasSttn_RS
    End
    AliasConditionState = POST_COLLAPSE NIGHT SNOW
    
    ; snow garrisoned
    ConditionState = SNOW GARRISONED
      Model = CBGasSttn_SG
      Animation = CBGasSttn_SG.CBGasSttn_SG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW GARRISONED
      Model = CBGasSttn_DSG
      Animation = CBGasSttn_DSG.CBGasSttn_DSG
      AnimationMode = LOOP
    End
    
    ; night snow
    ConditionState = SNOW NIGHT
      Model = CBGasSttn_SN
    End
    ConditionState = DAMAGED SNOW NIGHT
      Model = CBGasSttn_DSN
    End
    ConditionState = REALLYDAMAGED SNOW NIGHT
      Model = CBGasSttn_ESN
    End
    ConditionState = RUBBLE SNOW NIGHT
      Model = CBGasSttn_ESN
    End
    
    ; night snow garrisoned
    ConditionState = SNOW NIGHT GARRISONED
      Model = CBGasSttn_SNG
      Animation = CBGasSttn_SNG.CBGasSttn_SNG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW NIGHT GARRISONED
      Model = CBGasSttn_DSNG
      Animation = CBGasSttn_DSNG.CBGasSttn_DSNG
      AnimationMode = LOOP
    End
  End
  
  Geometry = Box
  GeometryMajorRadius = 30.0
  GeometryMinorRadius = 30.0
  GeometryHeight = 20.0
  GeometryIsSmall = No
End

