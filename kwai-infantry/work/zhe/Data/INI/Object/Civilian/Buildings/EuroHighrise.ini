ObjectReskin EuroHighrise GenericGarrisonableLargeStructure

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

     ; day
    ConditionState = NONE
      Model = CBEuroCnd
    End
    ConditionState = DAMAGED
      Model = CBEuroCnd_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBEuroCnd_E
