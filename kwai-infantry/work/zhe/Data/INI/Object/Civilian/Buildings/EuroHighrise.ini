      Animation = CBEuroCnd_G.CBEuroCnd_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED
      Model = CBEuroCnd_DG
      Animation = CBEuroCnd_DG.CBEuroCnd_DG
      AnimationMode = LOOP
    End

    ; night
    ConditionState = NIGHT
      Model = CBEuroCnd_N
    End
    ConditionState = DAMAGED NIGHT
      Model = CBEuroCnd_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CBEuroCnd_EN
    End
    ConditionState = RUBBLE NIGHT
      Model = CBEuroCnd_EN
    End

    ; night garrisoned
    ConditionState = NIGHT GARRISONED
      Model = CBEuroCnd_NG
      Animation = CBEuroCnd_NG.CBEuroCnd_NG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT GARRISONED
      Model = CBEuroCnd_DNG
      Animation = CBEuroCnd_DNG.CBEuroCnd_DNG
      AnimationMode = LOOP
    End

    ; snow
    ConditionState = SNOW
      Model = CBEuroCnd_S
    End
    ConditionState = DAMAGED SNOW
      Model = CBEuroCnd_DS
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = CBEuroCnd_ES
    End
    ConditionState = RUBBLE SNOW
      Model = CBEuroCnd_ES
    End
    ConditionState = POST_COLLAPSE SNOW
      Model = CBEuroCnd_RS
    End
    AliasConditionState = POST_COLLAPSE NIGHT SNOW

    ; snow garrisoned
    ConditionState = GARRISONED SNOW
      Model = CBEuroCnd_SG
      Animation = CBEuroCnd_SG.CBEuroCnd_SG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED SNOW
      Model = CBEuroCnd_DSG
      Animation = CBEuroCnd_DSG.CBEuroCnd_DSG
      AnimationMode = LOOP
    End
    
    ; night snow
    ConditionState = NIGHT SNOW
      Model = CBEuroCnd_SN
    End
    ConditionState = DAMAGED NIGHT SNOW
      Model = CBEuroCnd_DSN
    End
    ConditionState = REALLYDAMAGED NIGHT SNOW
      Model = CBEuroCnd_ESN
    End
    ConditionState = RUBBLE NIGHT SNOW
      Model = CBEuroCnd_ESN
    End

    ; night garrisoned snow
    ConditionState = NIGHT GARRISONED SNOW
      Model = CBEuroCnd_SNG
      Animation = CBEuroCnd_SNG.CBEuroCnd_SNG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT GARRISONED SNOW
      Model = CBEuroCnd_DSNG
      Animation = CBEuroCnd_DSNG.CBEuroCnd_DSNG
      AnimationMode = LOOP
    End
  End

  Geometry = Box
  GeometryMajorRadius = 43.0
  GeometryMinorRadius = 36.0
  GeometryHeight = 100.0
  GeometryIsSmall = No
End

