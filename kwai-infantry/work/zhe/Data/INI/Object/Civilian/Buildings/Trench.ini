;-------------------------------------------------------------------
Object Trench01

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
  
    ExtraPublicBone = STATION01
    ExtraPublicBone = STATION02
    ExtraPublicBone = STATION03
    ExtraPublicBone = STATION04
    ExtraPublicBone = STATION05
    ExtraPublicBone = STATION06
    ExtraPublicBone = STATION07
    ExtraPublicBone = STATION08
    
    ; day
    ConditionState = NONE
      Model = CBTrench
    End
    ConditionState = DAMAGED
      Model = CBTrench_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBTrench_E
    End
    ConditionState = RUBBLE
      Model = CBTrench_R
    End
    
    ; snow
    ConditionState = SNOW
      Model = CBTrench_S
    End
    ConditionState = DAMAGED SNOW
      Model = CBTrench_DS
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = CBTrench_ES
    End
    ConditionState = RUBBLE SNOW
      Model = CBTrench_RS
    End
  End

  PlacementViewAngle = -45
  
    ; *** AUDIO Parameters ***
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Structure
  EditorSorting = STRUCTURE
  VisionRange = 0.0
  ShroudClearingRange = 0
  
  ArmorSet
    Conditions = None
    Armor = BunkerStructureArmor
    DamageFX = StructureDamageFXNoShake
  End
  CommandSet = GenericStructureCommandSet

  ; *** ENGINEERING Parameters ***  
  KindOf = SELECTABLE IMMOBILE STRUCTURE GARRISONABLE_UNTIL_DESTROYED UNATTACKABLE
  Body = HiveStructureBody ModuleTag_Body01
    MaxHealth = 1000.0
    InitialHealth = 1000.0
    PropagateDamageTypesToSlavesWhenExisting = None
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_ReallyDamaged_FXObject
  End

  Behavior = GarrisonContain ModuleTag_Contain01
    ContainMax = 8
    EnterSound = GarrisonEnter
    ExitSound = GarrisonExit
    ImmuneToClearBuildingAttacks = No
    DamagePercentToUnits = 90%
    IsEnclosingContainer = No
  End

  Behavior = FXListDie ModuleTag_Death01
    DeathFX = FX_BuildingDie
  End
  
  Behavior = KeepObjectDie ModuleTag_Death02
  End

  Geometry = Box
  GeometryMajorRadius = 30.0
  GeometryMinorRadius = 60.0
  GeometryHeight = 15.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End