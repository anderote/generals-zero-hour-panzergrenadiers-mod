;------------------------------------------------------------------------------
Object OilRefinery

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
  
    ; day
    ConditionState = NONE
      Model = CBOilRfny
    End
    ConditionState = DAMAGED
      Model = CBOilRfny_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBOilRfny_E
    End
    ConditionState = RUBBLE
      Model = CBOilRfny_R
    End

    ; day garrisoned
    ConditionState = GARRISONED
      Model = CBOilRfny_G
      Animation = CBOilRfny_G.CBOilRfny_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED
      Model = CBOilRfny_DG
      Animation = CBOilRfny_DG.CBOilRfny_DG
      AnimationMode = LOOP
    End
    
    ; night
    ConditionState = NIGHT
      Model = CBOilRfny_N
    End
    ConditionState = DAMAGED NIGHT
      Model = CBOilRfny_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CBOilRfny_EN
    End
    ConditionState = RUBBLE NIGHT
      Model = CBOilRfny_RN
    End

    ; night garrisoned
    ConditionState = NIGHT GARRISONED
      Model = CBOilRfny_NG
      Animation = CBOilRfny_NG.CBOilRfny_NG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT GARRISONED
      Model = CBOilRfny_DNG
      Animation = CBOilRfny_DNG.CBOilRfny_DNG
      AnimationMode = LOOP
    End
    
    ; snow
    ConditionState = SNOW
      Model = CBOilRfny_S
    End
    ConditionState = DAMAGED SNOW
      Model = CBOilRfny_DS
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = CBOilRfny_ES
    End
    ConditionState = RUBBLE SNOW
      Model = CBOilRfny_RS
    End
    
    ; snow garrisoned
    ConditionState = SNOW GARRISONED
      Model = CBOilRfny_SG
      Animation = CBOilRfny_SG.CBOilRfny_SG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW GARRISONED
      Model = CBOilRfny_DSG
      Animation = CBOilRfny_DSG.CBOilRfny_DSG
      AnimationMode = LOOP
    End
    
    ; night snow
    ConditionState = SNOW NIGHT
      Model = CBOilRfny_SN
    End
    ConditionState = DAMAGED SNOW NIGHT
      Model = CBOilRfny_DSN
    End
    ConditionState = REALLYDAMAGED SNOW NIGHT
      Model = CBOilRfny_ESN
    End
    ConditionState = RUBBLE SNOW NIGHT
      Model = CBOilRfny_RSN
    End
    
    ; night snow garrisoned
    ConditionState = SNOW NIGHT GARRISONED
      Model = CBOilRfny_SNG
      Animation = CBOilRfny_SNG.CBOilRfny_SNG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW NIGHT GARRISONED
      Model = CBOilRfny_DSNG
      Animation = CBOilRfny_DSNG.CBOilRfny_DSNG
      AnimationMode = LOOP
    End
  End

  ; *** AUDIO Parameters ***
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy
 
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Structure
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = FlamableStructureArmor
    DamageFX = StructureDamageFXNoShake
  End
  CommandSet = GenericStructureCommandSet

  ; ***AUDIO parameters ***
  SoundAmbient = CivIndustrialPlantAmbientLoop
  
  ; *** ENGINEERING Parameters ***  
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 3000.0
    InitialHealth = 3000.0
  End
  
  Behavior = GarrisonContain ModuleTag_Contain01
    ContainMax = 15
    EnterSound = GarrisonEnter
    ExitSound = GarrisonExit
    DamagePercentToUnits = 100%
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000  
    AflameDuration = 5000         
    AflameDamageAmount = 50       
    AflameDamageDelay = 500       
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionLarge_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionLarge_ReallyDamaged_FXObject
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    FX = FX_OilRefineryDie
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Death02
    DeathWeapon = MediumOilDetonationWeapon
    StartsActive = Yes
  End

  Behavior = KeepObjectDie ModuleTag_Death03
  End

  Geometry = Box
  GeometryMajorRadius = 66.0
  GeometryMinorRadius = 71.0
  GeometryHeight = 50.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End