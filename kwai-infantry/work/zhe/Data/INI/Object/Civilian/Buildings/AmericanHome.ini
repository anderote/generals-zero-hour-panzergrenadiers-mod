    End

    ; night garrisoned
     ConditionState = NIGHT GARRISONED
      Model = CMAMHOME1_GN
      Animation = CMAMHOME1_GN.CMAMHOME1_GN
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT GARRISONED
      Model = CMAMHOME1_DNG
      Animation = CMAMHOME1_DNG.CMAMHOME1_DNG
      AnimationMode = LOOP
    End

    ; snow
    ConditionState = SNOW
      Model = CMAMHOME1_S
    End
