    ; snow garrisoned
    ConditionState = SNOW GARRISONED
      Model = CMAMHOME1_GS
      Animation = CMAMHOME1_GS.CMAMHOME1_GS
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW GARRISONED
