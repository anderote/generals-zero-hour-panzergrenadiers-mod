;------------------------------------------------------------------------------
Object SupplyPileDriveThrough

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01 
  
    ; day **************************************************
    ConditionState = NONE
      Model = ZBSupplyPL
    End  
    ConditionState = DAMAGED
      Model = ZBSupplyPL_D
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = ZBSupplyPL_E
    End

    ; night *************************************************
    ConditionState = NIGHT
      Model = ZBSupplyPL_N
    End  
    ConditionState = DAMAGED NIGHT
      Model = ZBSupplyPL_DN
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT
      Model = ZBSupplyPL_EN
    End
    
    ; snow *************************************************************
    ConditionState = SNOW
      Model = ZBSupplyPL_S
    End  
    ConditionState = DAMAGED SNOW
      Model = ZBSupplyPL_DS
    End
    ConditionState = REALLYDAMAGED RUBBLE SNOW
      Model = ZBSupplyPL_ES
    End
    
    ; night snow *************************************************
    ConditionState = NIGHT SNOW
      Model = ZBSupplyPL_NS
    End  
    ConditionState = DAMAGED NIGHT SNOW
      Model = ZBSupplyPL_DNS
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT SNOW
      Model = ZBSupplyPL_ENS
    End
  End
  
  Draw = W3DSupplyDraw ModuleTag_W3D02 
    ExtraPublicBone = SUP
    ConditionState = NONE
      Model = ZBSupplyPL_B
    End
    ConditionState = DAMAGED
      Model = ZBSupplyPL_BD
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = ZBSupplyPL_BE
    End
    ConditionState = SNOW
      Model = ZBSupplyPL_BS
    End
    ConditionState = DAMAGED SNOW
      Model = ZBSupplyPL_BDS
    End
    ConditionState = REALLYDAMAGED RUBBLE SNOW
      Model = ZBSupplyPL_BES
    End
    ConditionState = NIGHT
      Model = ZBSupplyPL_BN
    End
    ConditionState = DAMAGED NIGHT
      Model = ZBSupplyPL_BDN
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT
      Model = ZBSupplyPL_BEN
    End
    ConditionState = NIGHT SNOW
      Model = ZBSupplyPL_BNS
    End
    ConditionState = DAMAGED NIGHT SNOW
      Model = ZBSupplyPL_BDNS
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT SNOW
      Model = ZBSupplyPL_BENS
    End
    SupplyBonePrefix = SUP
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:SupplyPile
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = StructureDamageFXNoShake
  End
  
    ; *** AUDIO Parameters ***
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  ; *** ENGINEERING Parameters ***  
  KindOf = STRUCTURE IMMOBILE SELECTABLE SUPPLY_SOURCE_ON_PREVIEW NO_COLLIDE SUPPLY_SOURCE IGNORED_IN_GUI
  RadarPriority = STRUCTURE  
  Body = ImmortalBody ModuleTag_Body01
    MaxHealth = 750.0
    InitialHealth = 750.0
  End
  
  Behavior = SupplyWarehouseCreate ModuleTag_Supply02
  End

  Behavior = SupplyWarehouseDockUpdate ModuleTag_Supply03
    NumberApproachPositions = 9 
    AllowsPassthrough = Yes
    StartingBoxes = 300
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000  
    AflameDuration = 5000         
    AflameDamageAmount = 50       
    AflameDamageDelay = 500       
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_ReallyDamaged_FXObject
  End

  Geometry = Box
  GeometryMajorRadius = 30.0
  GeometryMinorRadius = 32.0
  GeometryHeight = 16.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME

End