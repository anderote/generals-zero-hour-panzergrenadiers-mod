      Model = CBTAprtmn1_NG
      Animation = CBTAprtmn1_NG.CBTAprtmn1_NG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT GARRISONED
      Model = CBTAprtmn1_DNG
      Animation = CBTAprtmn1_DNG.CBTAprtmn1_DNG
      AnimationMode = LOOP
    End
    
    ; snow
    ConditionState = SNOW
