;------------------------------------------------------------------------------
Object SupplyPileBig

  ; *** ART Parameters ***
  SelectPortrait = SSupPile2
  ButtonImage = SSupPile2

  ; *** ART Parameters ***
  Draw = W3DSupplyDraw ModuleTag_W3D01
    ExtraPublicBone = SUP
    ConditionState = NONE
      Model = ZBBPile
    End
    ConditionState = DAMAGED
      Model = ZBBPile_D
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = ZBBPile_E
    End
    ConditionState = SNOW
      Model = ZBBPile_S
    End
    ConditionState = DAMAGED SNOW
      Model = ZBBPile_DS
    End
    ConditionState = REALLYDAMAGED RUBBLE SNOW
      Model = ZBBPile_ES
    End
    SupplyBonePrefix = SUP
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:SupplyPile
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = StructureDamageFXNoShake
  End
  
  ; *** AUDIO Parameters ***
  SoundOnDamaged = WoodenFenceBounce
  
  ; *** ENGINEERING Parameters *** 
  KindOf = STRUCTURE IMMOBILE SELECTABLE SUPPLY_SOURCE_ON_PREVIEW NO_COLLIDE SUPPLY_SOURCE IGNORED_IN_GUI
  RadarPriority = STRUCTURE   
  Body = ImmortalBody ModuleTag_Body01
    MaxHealth = 1500.0
    InitialHealth = 1500.0
  End
  
  Behavior = SupplyWarehouseCreate ModuleTag_Supply02
  End
  
  Behavior = SupplyWarehouseDockUpdate ModuleTag_Supply03
    NumberApproachPositions = -1 
    AllowsPassthrough = No
    StartingBoxes = 600
    DeleteWhenEmpty = Yes
  End

  Geometry = Box
  GeometryMajorRadius = 40.0
  GeometryMinorRadius = 51.0
  GeometryHeight = 13.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End

