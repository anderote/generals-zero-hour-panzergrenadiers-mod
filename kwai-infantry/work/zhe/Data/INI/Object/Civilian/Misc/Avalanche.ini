Object AvalancheChunk

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState 
      Model = EXSnow01
    End
    ConditionState = POST_COLLAPSE MOVING FREEFALL 
      ParticleSysBone = None AvalancheMistLight
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  ArmorSet
    Conditions = None
    Armor = AvalancheArmor
    DamageFX = EmptyDamageFX
  End

  ; *** ENGINEERING Parameters ***  
  KindOf = IGNORED_IN_GUI  

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = TensileFormationUpdate ModuleTag_Tensile01
    Enabled = No
    CrackSound = AvalancheCrack 
  End

  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_Weapon01
    StartsActive = Yes
    ContinuousWeaponDamaged = AvalancheWeapon
    ContinuousWeaponReallyDamaged = AvalancheWeapon
  End

  Geometry = Cylinder
  GeometryIsSmall = No
  GeometryMajorRadius = 30.0
  GeometryHeight = 20.0
End

