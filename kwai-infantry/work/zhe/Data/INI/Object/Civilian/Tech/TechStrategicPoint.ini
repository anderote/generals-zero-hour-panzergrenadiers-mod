;------------------------------------------------------------------------------
Object TechStrategicPoint

  ; ART Parameters 
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    IgnoreConditionStates = DAMAGED REALLYDAMAGED RUBBLE
    
    ; day **************************************************
    DefaultConditionState
      Model = CBFlagPole
      Animation = CBFlagPole.CBFlagPole
      AnimationMode = LOOP
      Flags = RANDOMSTART
      HideSubObject = SUPS
    End
    ConditionState = CAPTURED
      ParticleSysBone = None TechStrategicPointCapturedPulse
    End
    
    ; night *************************************************
    ConditionState = NIGHT
      Model = CBFlagPole_N
      Animation = CBFlagPole_N.CBFlagPole_N
      HideSubObject = SUPS LIGHT01 LIGHT02 LIGHT03 LIGHT04
    End
    ConditionState = NIGHT CAPTURED
      Model = CBFlagPole_N
      Animation = CBFlagPole_N.CBFlagPole_N
      ShowSubObject = LIGHT01 LIGHT02 LIGHT03 LIGHT04
      HideSubObject = SUPS 
      ParticleSysBone = None TechStrategicPointCapturedPulse
    End
    
    ; snow *************************************************************
    ConditionState = SNOW
      Model = CBFlagPole_S
      Animation = CBFlagPole_S.CBFlagPole_S
    End
    ConditionState = SNOW CAPTURED
      Model = CBFlagPole_S
      Animation = CBFlagPole_S.CBFlagPole_S
      ParticleSysBone = None TechStrategicPointCapturedPulse
    End
    
    ; night snow *************************************************
    ConditionState = NIGHT SNOW
      Model = CBFlagPole_NS
      Animation = CBFlagPole_NS.CBFlagPole_NS
      HideSubObject = SUPS LIGHT01 LIGHT02 LIGHT03 LIGHT04
    End
    ConditionState = NIGHT SNOW CAPTURED
      Model = CBFlagPole_NS
      Animation = CBFlagPole_NS.CBFlagPole_NS
      ShowSubObject = LIGHT01 LIGHT02 LIGHT03 LIGHT04
      HideSubObject = SUPS 
      ParticleSysBone = None TechStrategicPointCapturedPulse
    End
  End

  PlacementViewAngle = 45

  ;  AUDIO Parameters 
  SoundAmbient = FlagAmbientLoop
  
  ; DESIGN parameters 
  DisplayName = OBJECT:StrategicPoint
  EditorSorting = STRUCTURE
  KindOf = PRELOAD STRUCTURE CAPTURABLE IMMOBILE SELECTABLE TECH_BUILDING CONSERVATIVE_BUILDING UNATTACKABLE IGNORED_IN_GUI DEFENSIVE_WALL
  VisionRange = 100.0
  ShroudClearingRange = 100
  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = StructureDamageFXNoShake
  End
  
  CommandSet = TechStrategicPointCommandSet
  
  ; ENGINEERING Parameters   
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = TechBuildingBehavior ModuleTag_Tech
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    DeathTypes = ALL
    FX = FX_StrategicPointSabotaged
    OCL = OCL_TechStrategicPoint_SabotagedObject
  End

  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End

  Behavior = ObjectCreationUpgrade ModuleTag_Point
    UpgradeObject = OCL_SecurePointMoneyObject
    TriggeredBy = Upgrade_SecurePoint
  End
  
  Behavior = FireWeaponUpdate ModuleTag_PointKiller
    Weapon = TechStrategicPointMoneyObjectRemoverWeapon
  End
  
  Behavior = SpawnBehavior ModuleTag_Collider01
    SpawnNumber = 1
    SpawnReplaceDelay = 0
    SpawnTemplateName = DummyInvisibleGroundCollider
    CanReclaimOrphans = No
    SpawnedRequireSpawner = Yes
    SlavesHaveFreeWill = No
  End

  Behavior = QueueProductionExitUpdate ModuleTag_Collider02
    UnitCreatePoint = X:0.0 Y:0.0 Z:0.0
    NaturalRallyPoint = X:0.0 Y:0.0 Z:0.0
    InitialBurst = 1
  End
  
  Behavior = StatusBitsUpgrade ModuleTag_Sabotage01
    TriggeredBy = Upgrade_TechBuildingSabotage
    StatusToSet = REASSIGN_PARKING
  End
  
  Behavior = FireWeaponCollide ModuleTag_Sabotage02
    CollideWeapon = IngeniousSuicideWeapon
    RequiredStatus = REASSIGN_PARKING
  End

  Shadow = SHADOW_VOLUME
  Geometry = Cylinder
  GeometryIsSmall = No
  GeometryMajorRadius = 10.0
  GeometryHeight = 50.0
End

