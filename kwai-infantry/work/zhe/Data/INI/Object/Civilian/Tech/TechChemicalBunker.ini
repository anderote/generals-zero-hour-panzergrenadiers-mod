;------------------------------------------------------------------------------
Object ChemicalBunker

  ; *** ART Parameters ***
  SelectPortrait = SSChemBunk_L

  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
  
    ; day
    ConditionState = NONE
      Model = CBChemBunk
    End
    ConditionState = DAMAGED
      Model = CBChemBunk_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBChemBunk_E
    End
    ConditionState = RUBBLE
      Model = CBChemBunk_R
    End

    ; night
    ConditionState = NIGHT
      Model = CBChemBunk_N
    End
    ConditionState = DAMAGED NIGHT
      Model = CBChemBunk_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CBChemBunk_EN
    End
    ConditionState = RUBBLE NIGHT
      Model = CBChemBunk_RN
    End

    ; snow
    ConditionState = SNOW
      Model = CBChemBunk_S
    End
    ConditionState = DAMAGED SNOW
      Model = CBChemBunk_DS
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = CBChemBunk_ES
    End
    ConditionState = RUBBLE SNOW
      Model = CBChemBunk_RS
    End

    ; night snow
    ConditionState = SNOW NIGHT
      Model = CBChemBunk_SN
    End
    ConditionState = DAMAGED SNOW NIGHT
      Model = CBChemBunk_DSN
    End
    ConditionState = REALLYDAMAGED SNOW NIGHT
      Model = CBChemBunk_ESN
    End
    ConditionState = RUBBLE SNOW NIGHT
      Model = CBChemBunk_RSN
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Bunker
  EditorSorting = STRUCTURE

  ; ***AUDIO parameters ***
  SoundAmbientDamaged = ChemBunkerDamagedAmbientLoop
  SoundAmbientReallyDamaged = ChemBunkerDamagedAmbientLoop
  ArmorSet
    Conditions = None
    Armor = StructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  KindOf = STRUCTURE SELECTABLE IMMOBILE TECH_BUILDING CAPTURABLE CONSERVATIVE_BUILDING
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 2000.0
    InitialHealth = 2000.0
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_FireWeapon01
    DeathWeapon = AnthraxBombWeapon
    StartsActive = Yes
  End

  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_FireWeapon02
    StartsActive = Yes
    ContinuousWeaponDamaged = SmallAnthraxFieldWeapon
    ContinuousWeaponReallyDamaged = MediumAnthraxFieldWeapon
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000
    AflameDuration = 5000
    AflameDamageAmount = 25
    AflameDamageDelay = 500
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_ReallyDamaged_FXObject
  End

  Geometry = Box
  GeometryMajorRadius = 28.0
  GeometryMinorRadius = 36.0
  GeometryHeight = 22.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End

