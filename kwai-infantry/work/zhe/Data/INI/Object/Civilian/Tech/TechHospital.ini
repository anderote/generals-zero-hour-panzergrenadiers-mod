;------------------------------------------------------------------------------
Object TechHospital

  ; *** ART Parameters ***
  SelectPortrait = SSTechHospital_L
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    ; day **************************************************
    ConditionState = NONE
      Model = ZBHospital
      Animation = ZBHospital.ZBHospital
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED
      Model = ZBHospital_D
      Animation = ZBHospital_D.ZBHospital_D
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = ZBHospital_E
      Animation = ZBHospital_E.ZBHospital_E
      AnimationMode = LOOP
    End
    
    ; night *************************************************
    ConditionState = NIGHT
      Model = ZBHospital_N
      Animation = ZBHospital_N.ZBHospital_N
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT
      Model = ZBHospital_DN
      Animation = ZBHospital_DN.ZBHospital_DN
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT
      Model = ZBHospital_EN
      Animation = ZBHospital_EN.ZBHospital_EN
      AnimationMode = LOOP
    End

    ; snow *************************************************
    ConditionState = SNOW
      Model = ZBHospital_S
      Animation = ZBHospital_S.ZBHospital_S
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW
      Model = ZBHospital_DS
      Animation = ZBHospital_DS.ZBHospital_DS
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED RUBBLE SNOW
      Model = ZBHospital_ES
      Animation = ZBHospital_ES.ZBHospital_ES
      AnimationMode = LOOP
    End
    
    ; night snow *************************************************
    ConditionState = NIGHT SNOW
      Model = ZBHospital_NS
      Animation = ZBHospital_NS.ZBHospital_NS
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT SNOW
      Model = ZBHospital_DNS
      Animation = ZBHospital_DNS.ZBHospital_DNS
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT SNOW
      Model = ZBHospital_ENS
      Animation = ZBHospital_ENS.ZBHospital_ENS
      AnimationMode = LOOP
    End
    
    ;**************************************************************************************************************************
    ConditionState = POST_COLLAPSE
      Model = ZBHospital_R
    End
    AliasConditionState = POST_COLLAPSE NIGHT
    ConditionState = POST_COLLAPSE SNOW
      Model = ZBHospital_R
    End
    AliasConditionState = POST_COLLAPSE NIGHT SNOW
    ;**************************************************************************************************************************
  End

  Draw = W3DModelDraw ModuleTag_W3D02
    OkToChangeModelColor = Yes
    
    ; day **************************************************
    ConditionState = NONE
      Model = ZBHospital_F
      Animation = ZBHospital_F.ZBHospital_F
      AnimationMode = LOOP
    End
    AliasConditionState = DAMAGED
    ConditionState = REALLYDAMAGED
      Model = ZBHospital_FE
      Animation = ZBHospital_FE.ZBHospital_FE
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE
      Model = None
    End
    
    ;**************************************************************************************************************************
    ConditionState = POST_COLLAPSE
      Model = None
    End
    ;**************************************************************************************************************************
  End
  
  ; ------------ New Animations fence -----------------
  Draw = W3DModelDraw ModuleTag_LightingAnimations
    AnimationsRequirePower = No
  
    DefaultConditionState
      Model = ZBHospital_A1
      Animation = ZBHospital_A1.ZBHospital_A1
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED
      Model = ZBHospital_A1D
      Animation = ZBHospital_A1D.ZBHospital_A1D
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED
      Model = ZBHospital_A1E
      Animation = ZBHospital_A1E.ZBHospital_A1E
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE
      Model = None
    End
    
    ConditionState = POST_COLLAPSE
      Model = None
    End
  End
  
  ; *** AUDIO Parameters ***
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TechHospital
  EditorSorting = STRUCTURE
  ShroudClearingRange = 100
  ArmorSet
    Conditions = None
    Armor = StructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  KindOf = STRUCTURE SELECTABLE IMMOBILE CAPTURABLE TECH_BUILDING CONSERVATIVE_BUILDING HEAL_PAD
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 4000.0
    InitialHealth = 4000.0
  End

  Behavior = KeepObjectDie ModuleTag_Death01
  End
  
  Behavior = TechBuildingBehavior ModuleTag_Tech
  End

  Behavior = HealContain ModuleTag_Contain01
    ContainMax = 15
    TimeForFullHeal = 2000
    AllowInsideKindOf = INFANTRY
    AllowAlliesInside = Yes
    AllowNeutralInside = No
    AllowEnemiesInside = No
  End
  
  Behavior = StructureCollapseUpdate ModuleTag_Collapse01
    MinCollapseDelay = 500
    MaxCollapseDelay = 1000
    CollapseDamping = 0.0
    MaxShudder = 0.6
    MinBurstDelay = 250
    MaxBurstDelay = 800
    BigBurstFrequency = 4
    OCL = INITIAL OCL_MediumStructureCollapseInitial
    OCL = DELAY OCL_MediumStructureCollapseDelay
    OCL = BURST OCL_MediumStructureCollapseBurst
    OCL = FINAL OCL_MediumStructureCollapseFinal
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000 
    AflameDuration = 5000
    AflameDamageAmount = 25 
    AflameDamageDelay = 500
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_ReallyDamaged_FXObject
  End

  Geometry = Box
  GeometryMajorRadius = 35.0
  GeometryMinorRadius = 58.0
  GeometryHeight = 69.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End

;------------------------------------------------------------------------------
Object TechHospitalBib

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ConditionState = NONE
      Model = ZBHospibib
    End
    ConditionState = DAMAGED
      Model = ZBHospibib_D
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = ZBHospibib_E
    End
    ConditionState = SNOW
      Model = ZBHospibib_S
    End
    ConditionState = SNOW DAMAGED
      Model = ZBHospibib_DS
    End
    ConditionState = SNOW REALLYDAMAGED RUBBLE
      Model = ZBHospibib_ES
    End
  End

  Draw = W3DModelDraw ModuleTag_WaterFountain
    ConditionState = NONE
      Model = ZBHpWTR
    End
    ConditionState = NIGHT
      Model = ZBHpWTR_M
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Structure
  EditorSorting = STRUCTURE
  ArmorSet
    Conditions = None
    Armor = CivilianStructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 500.0
    InitialHealth = 500.0
  End

  Behavior = KeepObjectDie ModuleTag_Death02
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000  
    AflameDuration = 5000         
    AflameDamageAmount = 50       
    AflameDamageDelay = 500       
  End

  Shadow = SHADOW_VOLUME
  Geometry = Box
  GeometryMajorRadius = 70.0
  GeometryMinorRadius = 58.0
  GeometryHeight = 5.0
  GeometryIsSmall = No
End