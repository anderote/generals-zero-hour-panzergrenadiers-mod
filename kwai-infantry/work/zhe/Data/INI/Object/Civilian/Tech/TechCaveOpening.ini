; -----------------------------------------------------------------------------
Object TechCaveOpening

  ; *** ART Parameters ***
  SelectPortrait = SSTechCave_L

  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    ConditionState = NONE
      Model = ZBCave
    End
    ConditionState = DAMAGED
      Model = ZBCave_D
      ParticleSysBone = Smoke01 SmolderingSmoke
    End
    ConditionState = REALLYDAMAGED
      Model = ZBCave_E
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone = Fire01 SmolderingFire
    End
    ConditionState = RUBBLE
      Model = ZBCave_R
    End

    ConditionState = SNOW
      Model = ZBCave_S
    End
    ConditionState = DAMAGED SNOW
      Model = ZBCave_DS
      ParticleSysBone = Smoke01 SmolderingSmoke
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = ZBCave_ES
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone = Fire01 SmolderingFire
    End
    ConditionState = RUBBLE SNOW
      Model = ZBCave_RS
    End
  End
  PlacementViewAngle = -135

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TechCave
  EditorSorting = STRUCTURE
  VisionRange = 150.0
  ShroudClearingRange = 150.0
  ArmorSet
    Conditions = None
    Armor = StructureArmor
    DamageFX = StructureDamageFXNoShake
  End
  CommandSet = TechCaveCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = TunnelNetworkSelect
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy
  SoundEnter = GarrisonEnter
  SoundExit = GarrisonExit

  ; *** ENGINEERING Parameters ***
  RadarPriority = STRUCTURE
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE CONSERVATIVE_BUILDING AUTO_RALLYPOINT
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 2000.0
    InitialHealth = 2000.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 5200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End

  Behavior = CaveContain ModuleTag_Contain01
    ; This is an index where all caves with this number are connected.  You can change
    ; it with a script, or you can instance a second object and set it to 1.  Please use sequential integers
    ; to keep it fast.
    CaveIndex = 0
  End

  Behavior = DefaultProductionExitUpdate ModuleTag_ProductionUpdate
    UnitCreatePoint = X:5.0 Y:0.0 Z:0.0
    NaturalRallyPoint = X:35.0 Y:0.0 Z:0.0
  End


  Behavior = InstantDeathBehavior ModuleTag_Death01
    OCL = OCL_SmallStructureDebris
  End
  
  Behavior = KeepObjectDie ModuleTag_Death02
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_ReallyDamaged_FXObject
  End

  Geometry = Cylinder
  GeometryMajorRadius = 32.0
  GeometryHeight = 15.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End