;------------------------------------------------------------------------------
Object TechRadioStation

  ; *** ART Parameters ***
  SelectPortrait = SSTechRadioStation_L
  
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    
    ; day **************************************************
    ConditionState = NONE
      Model = ZBRadioStn
      Animation = ZBRadioStn.ZBRadioStn
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED
      Model = ZBRadioStn_D
      Animation = ZBRadioStn_D.ZBRadioStn_D
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED
      Model = ZBRadioStn_E
      Animation = ZBRadioStn_E.ZBRadioStn_E
      AnimationMode = LOOP
    End   
    ConditionState = RUBBLE
      Model = ZBRadioStn_E
    End

    ; night *************************************************
    ConditionState = NIGHT
      Model = ZBRadioStn_N
      Animation = ZBRadioStn_N.ZBRadioStn_N
      AnimationMode = LOOP
    End
    ConditionState = NIGHT DAMAGED
      Model = ZBRadioStn_DN
      Animation = ZBRadioStn_DN.ZBRadioStn_DN
      AnimationMode = LOOP
    End
    ConditionState = NIGHT REALLYDAMAGED 
      Model = ZBRadioStn_EN
      Animation = ZBRadioStn_EN.ZBRadioStn_EN
      AnimationMode = LOOP
    End
    ConditionState = NIGHT RUBBLE
      Model = ZBRadioStn_EN
    End

    ; snow *************************************************************
    ConditionState = SNOW
      Model = ZBRadioStn_S
      Animation = ZBRadioStn_S.ZBRadioStn_S
      AnimationMode = LOOP
    End
    ConditionState = SNOW DAMAGED
      Model = ZBRadioStn_DS
      Animation = ZBRadioStn_DS.ZBRadioStn_DS
      AnimationMode = LOOP
    End
    ConditionState = SNOW REALLYDAMAGED
      Model = ZBRadioStn_ES
      Animation = ZBRadioStn_ES.ZBRadioStn_ES
      AnimationMode = LOOP
    End
    ConditionState = SNOW RUBBLE
      Model = ZBRadioStn_ES
    End

    ; night snow *************************************************
    ConditionState = NIGHT SNOW
      Model = ZBRadioStn_NS
      Animation = ZBRadioStn_NS.ZBRadioStn_NS
      AnimationMode = LOOP
    End
    ConditionState = NIGHT SNOW DAMAGED
      Model = ZBRadioStn_DNS
      Animation = ZBRadioStn_DNS.ZBRadioStn_DNS
      AnimationMode = LOOP
    End
    ConditionState = NIGHT SNOW REALLYDAMAGED
      Model = ZBRadioStn_ENS
      Animation = ZBRadioStn_ENS.ZBRadioStn_ENS
      AnimationMode = LOOP
    End
    ConditionState = NIGHT SNOW RUBBLE
      Model = ZBRadioStn_ENS
    End
    
    ;**************************************************************************************************************************
    ConditionState = POST_COLLAPSE
      Model = ZBRadioStn_R
    End
    AliasConditionState = POST_COLLAPSE NIGHT
    ConditionState = POST_COLLAPSE SNOW
      Model = ZBRadioStn_RS
    End
    AliasConditionState = POST_COLLAPSE NIGHT SNOW
    ;**************************************************************************************************************************
  End

  Draw = W3DModelDraw ModuleTag_W3D02
    OkToChangeModelColor = Yes
    
    ; day **************************************************
    ConditionState = NONE
      Model = ZBRadioStn_F
      Animation = ZBRadioStn_F.ZBRadioStn_F
      AnimationMode = LOOP
    End
    AliasConditionState = DAMAGED
    ConditionState = REALLYDAMAGED
      Model = ZBRadioStn_FE
      Animation = ZBRadioStn_FE.ZBRadioStn_FE
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE
      Model = None
    End

    ;**************************************************************************************************************************
    ConditionState = POST_COLLAPSE
      Model = None
    End
    ;**************************************************************************************************************************
  End
  
  ; *** AUDIO Parameters ***
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TechRadioStation
  EditorSorting = STRUCTURE
  VisionRange = 150.0
  ShroudClearingRange = 150
  ArmorSet
    Conditions = None
    Armor = StructureArmor
    DamageFX = StructureDamageFXNoShake
  End
  CommandSet = TechRadioStationCommandSet

  ; *** ENGINEERING Parameters ***  
  KindOf = STRUCTURE SELECTABLE IMMOBILE CAPTURABLE TECH_BUILDING CONSERVATIVE_BUILDING
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 2000.0
    InitialHealth = 2000.0
    SubdualDamageCap = 2200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
  
  Behavior = KeepObjectDie ModuleTag_Death01
  End
  
  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000
    AflameDuration = 5000
    AflameDamageAmount = 25
    AflameDamageDelay = 500
  End

  Behavior = StructureCollapseUpdate ModuleTag_Collapse01
    MinCollapseDelay = 500
    MaxCollapseDelay = 1000
    CollapseDamping = 0.0
    MaxShudder = 0.6
    MinBurstDelay = 250
    MaxBurstDelay = 800
    BigBurstFrequency = 4
    OCL = INITIAL OCL_MediumStructureCollapseInitial
    OCL = DELAY OCL_MediumStructureCollapseDelay
    OCL = BURST OCL_MediumStructureCollapseBurst
    OCL = FINAL OCL_MediumStructureCollapseFinal
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionMedium_ReallyDamaged_FXObject
  End

  Behavior = TechBuildingBehavior ModuleTag_Tech
    PulseFX = FX_TechRadioStationOwnedPulse
    PulseFXRate = 2000
  End

  Behavior = OCLSpecialPower ModuleTag_SpecialPower01
    SpecialPowerTemplate = SuperweaponVehicleDrop
    UpgradeOCL = SCIENCE_AMERICA OCL_ReinforcementPadAmericaVehicle
    UpgradeOCL = SCIENCE_CHINA OCL_ReinforcementPadChinaVehicle
    UpgradeOCL = SCIENCE_GLA OCL_ReinforcementPadGLAVehicle
    OCL = OCL_ReinforcementPadAmericaVehicle
    CreateLocation = CREATE_AT_EDGE_NEAR_SOURCE
    StartsPaused = No
  End
  
  Behavior = OCLSpecialPower ModuleTag_SpecialPower02
    SpecialPowerTemplate = SuperweaponCrateDrop
    UpgradeOCL = SCIENCE_AMERICA OCL_RadioStationAmericaCrate
    UpgradeOCL = SCIENCE_CHINA OCL_RadioStationChinaCrate
    UpgradeOCL = SCIENCE_GLA OCL_RadioStationGLACrate
    OCL = OCL_RadioStationAmericaCrate
    CreateLocation = CREATE_AT_EDGE_NEAR_SOURCE
    StartsPaused = No
  End
  
  Geometry = Box
  GeometryMajorRadius = 37.0
  GeometryMinorRadius = 40.0
  GeometryHeight = 60.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End