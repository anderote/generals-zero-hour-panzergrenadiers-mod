;------------------------------------------------------------------------------
Object TechArtilleryPlatform

  ; *** ART Parameters ***
  SelectPortrait = SAArtillery_L
  ButtonImage = SAArtillery
  
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    
    ; day **************************************************
    DefaultConditionState
      Model = ZBARTPLAT
      WeaponLaunchBone = PRIMARY Muzzle
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponRecoilBone = PRIMARY Barrel
      Turret = Turret01
      TurretPitch = TurretEL
    End
    ConditionState = DAMAGED
      Model = ZBARTPLAT_D
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = ZBARTPLAT_E
    End

    ; night *************************************************
    ConditionState = NIGHT
      Model = ZBARTPLAT_N
    End
    ConditionState = DAMAGED NIGHT
      Model = ZBARTPLAT_D
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT
      Model = ZBARTPLAT_E
    End

    ; snow *************************************************************
    ConditionState = SNOW
      Model = ZBARTPLAT_S
    End
    ConditionState = DAMAGED SNOW
      Model = ZBARTPLAT_DS
    End
    ConditionState = REALLYDAMAGED RUBBLE SNOW
      Model = ZBARTPLAT_ES
    End

    ; night snow *************************************************
    ConditionState = NIGHT SNOW
      Model = ZBARTPLAT_NS
    End
    ConditionState = NIGHT SNOW DAMAGED
      Model = ZBARTPLAT_DNS
    End
    ConditionState = NIGHT SNOW REALLYDAMAGED RUBBLE
      Model = ZBARTPLAT_ENS
    End
    
    ;**************************************************************************************************************************
    ;This block handles every possible case with captured for this draw module
    
    ; day **************************************************
    ConditionState = CAPTURED
      Model = ZBARTPLAT
      Animation = ZBARTPLAT.ZBARTPLAT
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED CAPTURED
      Model = ZBARTPLAT_D
      Animation = ZBARTPLAT_D.ZBARTPLAT_D
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED RUBBLE CAPTURED
      Model = ZBARTPLAT_E
      Animation = ZBARTPLAT_E.ZBARTPLAT_E
      AnimationMode = LOOP
    End
    
    ; night *************************************************
    ConditionState = NIGHT CAPTURED
      Model = ZBARTPLAT_N
      Animation = ZBARTPLAT_N.ZBARTPLAT_N
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT CAPTURED
      Model = ZBARTPLAT_D
      Animation = ZBARTPLAT_D.ZBARTPLAT_D
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED RUBBLE NIGHT CAPTURED
      Model = ZBARTPLAT_E
      Animation = ZBARTPLAT_E.ZBARTPLAT_E
      AnimationMode = LOOP
    End
    
    ; snow *************************************************
    ConditionState = SNOW CAPTURED
      Model = ZBARTPLAT_S
      Animation = ZBARTPLAT_S.ZBARTPLAT_S
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW CAPTURED
      Model = ZBARTPLAT_DS
      Animation = ZBARTPLAT_DS.ZBARTPLAT_DS
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED RUBBLE SNOW CAPTURED
      Model = ZBARTPLAT_ES
      Animation = ZBARTPLAT_ES.ZBARTPLAT_ES
      AnimationMode = LOOP
    End
    
    ; night snow *************************************************
    ConditionState = SNOW NIGHT CAPTURED
      Model = ZBARTPLAT_NS
      Animation = ZBARTPLAT_NS.ZBARTPLAT_NS
      AnimationMode = LOOP
    End
    ConditionState = SNOW NIGHT DAMAGED CAPTURED
      Model = ZBARTPLAT_DNS
      Animation = ZBARTPLAT_DNS.ZBARTPLAT_DNS
      AnimationMode = LOOP
    End
    ConditionState = SNOW NIGHT REALLYDAMAGED RUBBLE CAPTURED
      Model = ZBARTPLAT_ENS
      Animation = ZBARTPLAT_ENS.ZBARTPLAT_ENS
      AnimationMode = LOOP
    End
    
    ;**************************************************************************************************************************
    ConditionState = POST_COLLAPSE
      Model = ZBARTPLAT_R
    End
    AliasConditionState = POST_COLLAPSE NIGHT
    ConditionState = POST_COLLAPSE SNOW
      Model = ZBARTPLAT_RS
    End
    AliasConditionState = POST_COLLAPSE NIGHT SNOW
    ;**************************************************************************************************************************
  End

  Draw = W3DModelDraw ModuleTag_W3D02
    OkToChangeModelColor = Yes
    
    ; day **************************************************
    ConditionState = NONE
      Model = ZBODerrick_F
      Animation = ZBODerrick_F.ZBODerrick_F
      AnimationMode = LOOP
    End
    AliasConditionState = DAMAGED
    ConditionState = REALLYDAMAGED
      Model = ZBODerrick_FE
      Animation = ZBODerrick_FE.ZBODerrick_FE
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE
      Model = None
    End
    
    ;**************************************************************************************************************************
    ConditionState = POST_COLLAPSE
      Model = None
    End
    ;**************************************************************************************************************************
  End
  
  ; *** AUDIO Parameters ***
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TechArtilleryPlatform
  EditorSorting = STRUCTURE
  VisionRange = 750.0
  ShroudClearingRange = 150
  ArmorSet
    Conditions = None
    Armor = StructureArmor
    DamageFX = StructureDamageFXNoShake
  End
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY M119HowitzerGun
  End
  CommandSet = GenericStopOnlyCommandSet
  
  ; *** ENGINEERING Parameters ***  
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE CAPTURABLE TECH_BUILDING CAN_ATTACK TECH_BASE_DEFENSE CONSERVATIVE_BUILDING
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1000.0
    InitialHealth = 1000.0
  End
  
  Behavior = KeepObjectDie ModuleTag_Death01
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      TurretTurnRate = 40 
      TurretPitchRate = 40
      AllowsPitch = Yes
      NaturalTurretPitch = 45   
      GroundUnitPitch = 20
      MinPhysicalPitch = -20
      ControlledWeaponSlots = PRIMARY
      MinIdleScanInterval = 250
      MaxIdleScanInterval = 250 
      MinIdleScanAngle = 0 
      MaxIdleScanAngle = 360 
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 250
  End

  Behavior = StructureCollapseUpdate ModuleTag_Collapse01
    MinCollapseDelay = 500
    MaxCollapseDelay = 1000
    CollapseDamping = 0.0
    MaxShudder = 0.6
    MinBurstDelay = 250
    MaxBurstDelay = 800
    BigBurstFrequency = 4
    OCL = INITIAL OCL_SmallStructureCollapseInitial
    OCL = DELAY OCL_SmallStructureCollapseDelay
    OCL = BURST OCL_SmallStructureCollapseBurst
    OCL = FINAL OCL_SmallStructureCollapseFinal
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000
    AflameDuration = 5000 
    AflameDamageAmount = 25 
    AflameDamageDelay = 500
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_ReallyDamaged_FXObject
  End

  Behavior = TechBuildingBehavior ModuleTag_Tech
  End
  
  Behavior = ProductionUpdate ModuleTag_Production
  End
  
  Geometry = Box
  GeometryMajorRadius = 23.0
  GeometryMinorRadius = 21.0
  GeometryHeight = 30.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End