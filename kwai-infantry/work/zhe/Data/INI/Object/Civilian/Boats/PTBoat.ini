;------------------------------------------------------------------------------
Object CivilianVehiclePTBoat

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ExtraPublicBone = Dum_Turret
    OkToChangeModelColor = Yes
    
    ConditionState = NONE
      Model = AVPTBoat
    End

    ConditionState = OVER_WATER
      Model = AVPTBoat
      ParticleSysBone = None AmphibWaveRest
    End

    ConditionState = MOVING OVER_WATER
      Model = AVPTBoat
      ParticleSysBone = TreadFX01 AmphibWave
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:PTBoat
  EditorSorting = VEHICLE
  CommandSet = GenericCommandSet
  WeaponSet
    Conditions = None
    Weapon = PRIMARY PTBoatGun
  End
  
  ArmorSet
    Armor = TruckArmor
    DamageFX = DefaultDamageFX
  End

  VisionRange = 150
  CrusherLevel = 0
  CrushableLevel = 3

  ; *** AUDIO Parameters ***
  SoundMoveLoop = AmphibiousTransportMoveLoop

  ; *** ENGINEERING Parameters ***  
  KindOf = SELECTABLE VEHICLE BOAT CAN_CAST_REFLECTIONS

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      TurretTurnRate = 180
      NaturalTurretAngle = 0
      MinIdleScanAngle = 30
      MaxIdleScanAngle = 60
      MinIdleScanInterval = 5000
      MaxIdleScanInterval = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL BasicBoatLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 30.0
  End
  
  Behavior = InstantDeathBehavior ModuleTag_Death01
    FX = FX_GenericCarExplode
    OCL = OCL_GenericCar_DeathEffect
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000 
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End

  Behavior = FloatUpdate UpdateTag_Float01
    Enabled = Yes
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 48.0
  GeometryMinorRadius = 12.0
  GeometryHeight = 14.0
  Shadow = SHADOW_VOLUME
End
