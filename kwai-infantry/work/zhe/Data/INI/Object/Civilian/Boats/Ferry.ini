      Model = CVFerry_n
      ParticleSysBone = Smoke01 FerrySmokeStop
      ParticleSysBone = TreadFX02 AmphibWaveRest
    End

    ConditionState = NIGHT MOVING OVER_WATER
      Model = CVFerry_n
      ParticleSysBone = Smoke01 FerrySmoke
