      Model = CVFerry_dn
      ParticleSysBone = TreadFX02 AmphibWaveRest
    End
    ConditionState = NIGHT DAMAGED OVER_WATER
      Model = CVFerry_dn
      ParticleSysBone = Smoke01 FerrySmokeStop
      ParticleSysBone = TreadFX02 AmphibWaveRest
    End

    ConditionState = NIGHT DAMAGED MOVING OVER_WATER
      Model = CVFerry_dn
      ParticleSysBone = Smoke01 FerrySmoke
      ParticleSysBone = TreadFX01 AmphibWave
      ParticleSysBone = TreadFX02 AmphibWave
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:AutoFerry
  EditorSorting = VEHICLE
  CommandSet = RailedTransportCommandSet
  WeaponSet
    Conditions = None
    Weapon = PRIMARY None
  End
  
  ArmorSet
    Armor = None
    DamageFX = DefaultDamageFX
  End
  VisionRange = 150
  CrushableLevel = 3

  ; *** AUDIO Parameters ***
  SoundMoveLoop = FerryMoveLoop
  SoundAmbient = Amb_UrbanDocksFoghorn

  ; *** ENGINEERING Parameters ***  
  RadarPriority = UNIT
  KindOf = SELECTABLE TRANSPORT 

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End 
  
  Behavior = RailedTransportAIUpdate ModuleTag_AI01
    PathPrefixName = Ferry
  End
  
  Behavior = RailedTransportDockUpdate ModuleTag_AI02
    NumberApproachPositions = 9
    PullInsideDuration = 4500
    PushOutsideDuration = 4500
    ToleranceDistance = 400.0
  End
  Locomotor = SET_NORMAL BasicBoatLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 200.0
  End
  
  Behavior = RailedTransportContain ModuleTag_Contain01
    Slots = 10
    AllowInsideKindOf = INFANTRY VEHICLE BOAT
    DoorOpenTime = 2000
    ScatterNearbyOnExit = No
  End
  
  Behavior = DestroyDie ModuleTag_Death01
    ;<NO DATA>
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000 
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End

  Behavior = FloatUpdate UpdateTag_Float01
    Enabled = No
  End

  Geometry = Box
  GeometryIsSmall = No
