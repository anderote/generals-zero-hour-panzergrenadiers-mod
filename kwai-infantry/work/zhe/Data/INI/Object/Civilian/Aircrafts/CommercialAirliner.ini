;------------------------------------------------------------------------------
Object CommercialAirliner

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ParticlesAttachedToAnimatedBones = Yes
    
    ConditionState = NONE
      Model = CVAirplane
      ParticleSysBone = Smoke01 JetBlackTrailThin
      ParticleSysBone = Smoke02 JetBlackTrailThin
    End
    
    ConditionState = DAMAGED
      Model = CVAirplane_D
      ParticleSysBone = Smoke01 JetBlackTrailThin
      ParticleSysBone = Smoke02 JetBlackTrailThin
    End
    
    ConditionState = REALLYDAMAGED
      Model = CVAirplane_D
      ParticleSysBone = Smoke01 JetBlackTrailThin
      ParticleSysBone = Smoke02 JetBlackTrailThin
    End
    
    ConditionState = RUBBLE
      Model = CVAirplane_D1
    End
  End

  Draw = W3DModelDraw ModuleTag_Wingtip
    ParticlesAttachedToAnimatedBones = Yes
    
    DefaultConditionState
      Model = CVAirplane_Bn
      ParticleSysBone = WingTip01 JetContrailThin
      ParticleSysBone = WingTip02 JetContrailThin
    End
   End
    
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Cessna
  EditorSorting = VEHICLE
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = TankDamageFX
  End
  
  CrusherLevel = 2
  CrushableLevel = 4

  ; *** AUDIO Parameters ***
  SoundAmbient = C130AmbientLoop
  SoundAmbientRubble = NoSound

  ; *** ENGINEERING Parameters ***  
  KindOf = PRELOAD CAN_ATTACK VEHICLE AIRCRAFT SCORE EMP_HARDENED

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1000.0
    InitialHealth = 1000.0
  End
  
  Behavior = JetSlowDeathBehavior ModuleTag_04
    DestructionDelay = 15000 
    RollRate = 0.2
    RollRateDelta = 1%
    PitchRate = 0.0
    FallHowFast = 80.0%
    FXInitialDeath = FX_GenericStrategicAircraftDeathInitial
    OCLInitialDeath = None
    DelaySecondaryFromInitialDeath = 500
    OCLSecondary = None
    OCLHitGround = OCL_A10DeathHitGround
    FXSecondary = FX_GenericStrategicAircraftDeathInitial
    FXFinalBlowUp = FX_GenericTankDeathExplosion
    DelayFinalBlowUpFromHitGround = 1000
    OCLFinalBlowUp = OCL_CommercialAirlinerDeathFinalBlowUp
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 1500.0
    AllowCollideForce = No
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL B52Locomotor

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End

  Scale = 0.75
  Geometry = Cylinder
  GeometryIsSmall = Yes
  GeometryMajorRadius = 7.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 7.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89
End