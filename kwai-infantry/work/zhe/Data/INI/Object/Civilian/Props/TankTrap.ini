;------------------------------------------------------------------------------
Object TankTrap01

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = PMTankTrap
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Prop
  EditorSorting = MISC_MAN_MADE
  KindOf = SELECTABLE IGNORED_IN_GUI STRUCTURE
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = EmptyDamageFX
  End

  CrushableLevel = 2
  
  ; *** ENGINEERING Parameters ***  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 500.0
    InitialHealth = 500.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL StationaryLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 999.0
    ShockMaxRoll = 0.001
    ShockMaxPitch = 0.001
    ShockMaxYaw = 0.001
    ShockResistance = 0.001
    AllowCollideForce = No
  End
  
  Behavior = InstantDeathBehavior ModuleTag_Death01
    DeathTypes = ALL
    FX = FX_StonePropExplode
    OCL = OCL_CreateTankTrapRubble
  End
  
  Shadow = SHADOW_VOLUME
  Geometry = Box
  GeometryMajorRadius = 24.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 4.0
  GeometryIsSmall = No
End

;------------------------------------------------------------------------------
ObjectReskin TankTrap01Rubble GenericRubbleTankTrap

  ; *** ART Parameters ***
