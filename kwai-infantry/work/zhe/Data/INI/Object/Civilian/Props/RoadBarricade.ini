;------------------------------------------------------------------------------
Object RoadBarricade01

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = PMBarRoad01
    End
    ConditionState = REALLYDAMAGED
      Model = PMBarRoad01_D
    End
    ConditionState = RUBBLE
      Model = PMBarRoad01_R
    End
    ConditionState = SNOW
      Model = PMBarRoad01_S
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = PMBarRoad01_DS
    End
    ConditionState = RUBBLE SNOW
      Model = PMBarRoad01_RS
    End
  End

  SoundOnReallyDamaged = WallStoneDie

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Prop
  EditorSorting = MISC_MAN_MADE
  KindOf = IMMOBILE

  ArmorSet
    Conditions = None
    Armor = PropArmor
    DamageFX = WoodDamageFX
  End

  ; *** ENGINEERING Parameters ***  
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 10.0
    InitialHealth = 10.0
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    FX = FX_WoodenPropExplode
    OCL = OCL_RoadBarricade1_DeathEffect
  End

  Behavior = KeepObjectDie ModuleTag_Death02
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 10         
    FlameDamageExpiration = 2000  
    AflameDuration = 5000         
    AflameDamageAmount = 25       
    AflameDamageDelay = 500       
  End
  
  Geometry = Box
  GeometryMajorRadius = 4.0
  GeometryMinorRadius = 16.0
  GeometryHeight = 4.0
  GeometryIsSmall = NO
End

