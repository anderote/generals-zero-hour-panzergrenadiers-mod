;------------------------------------------------------------------------------
Object Fountain01

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ConditionState = NONE
      Model = PMFountn
    End
    ConditionState = DAMAGED
      Model = PMFountn_D
    End
    AliasConditionState = REALLYDAMAGED RUBBLE
  End
  
  Draw = W3DModelDraw ModuleTag_WaterFountain
    ConditionState = NONE
      Model = PMFtnWTR
      ParticleSysBone = FounFX01 FountainWaveSmall
      ParticleSysBone = FounFX02 FountainWaveMedium
    End
    ConditionState = DAMAGED
      Model = PMFtnWTR_D
    End
    AliasConditionState = REALLYDAMAGED RUBBLE
    
    ConditionState = NIGHT
      Model = PMFtnWTR_M
      ParticleSysBone = FounFX01 FountainWaveSmall
      ParticleSysBone = FounFX02 FountainWaveMedium
    End
    ConditionState = DAMAGED NIGHT
      Model = PMFtnWTR_DM
    End
    AliasConditionState = REALLYDAMAGED RUBBLE NIGHT
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Prop
  EditorSorting = MISC_MAN_MADE
  KindOf = SHRUBBERY IGNORED_IN_GUI
  CrushableLevel = 1

  ArmorSet
    Conditions = None
    Armor = CivilianStructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** AUDIO Parameters ***
  SoundOnReallyDamaged = WallStoneDie 
  SoundAmbient = FountainAmbientLoop
  SoundAmbientDamaged = SilenceAmbientLoop
  SoundAmbientReallyDamaged = SilenceAmbientLoop

  ; *** ENGINEERING Parameters ***  
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 50.0
    InitialHealth = 50.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL StationaryLocomotor

  Behavior = ToppleUpdate ModuleTag_Topple01
    KillWhenStartToppling = Yes
  End
  
  Behavior = InstantDeathBehavior ModuleTag_Death01
    DeathTypes = ALL
    FX = FX_WaterPropExplodeLow
    OCL = OCL_TinyStructureDebris
  End
  
  Shadow = SHADOW_VOLUME
  Geometry = Cylinder
  GeometryMajorRadius = 11.0
  GeometryHeight = 21.5
  GeometryIsSmall = No
End

