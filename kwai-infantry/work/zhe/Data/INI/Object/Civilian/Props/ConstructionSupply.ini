;------------------------------------------------------------------------------
Object ConstructionSupply01

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = PMCONSUP01
    End
    ConditionState = REALLYDAMAGED
      Model = PMCONSUP01_D
    End
    ConditionState = SNOW
      Model = PMCONSUP01_S
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = PMCONSUP01_DS
    End
  End

  ; *** AUDIO Parameters ***
  SoundOnReallyDamaged = BuildingDamagedStateLight
  
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Prop
  EditorSorting = MISC_MAN_MADE
  KindOf = IMMOBILE

  ArmorSet
    Conditions = None
    Armor = CivilianStructureArmor
    DamageFX = WoodDamageFX
  End

  ; *** ENGINEERING Parameters ***  
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 50.0
    InitialHealth = 50.0
  End
  
  Behavior = InstantDeathBehavior ModuleTag_Death01
    FX = FX_WoodenPropExplode
    OCL = OCL_Consup01_DeathEffect
  End
  
  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 10         
    FlameDamageExpiration = 2000  
    AflameDuration = 5000         
    AflameDamageAmount = 25       
    AflameDamageDelay = 500       
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionTiny_Damaged_FXObject
  End

  Shadow = SHADOW_VOLUME
End

