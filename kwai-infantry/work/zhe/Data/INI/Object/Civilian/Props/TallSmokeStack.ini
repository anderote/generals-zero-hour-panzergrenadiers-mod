;------------------------------------------------------------------------------
Object TallSmokeStack

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = PMSmkStak
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = PMSmkStak_D
    End
    ConditionState = POST_COLLAPSE
      Model = PMSmkStak_R
    End
    
    ConditionState = SNOW
      Model = PMSmkStak_S
    End
    ConditionState = REALLYDAMAGED RUBBLE SNOW
      Model = PMSmkStak_DS
    End
    ConditionState = POST_COLLAPSE SNOW
      Model = PMSmkStak_RS
    End
  End

  ; *** AUDIO Parameters ***
  SoundOnReallyDamaged = WallStoneDie
  
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Prop
  EditorSorting = MISC_MAN_MADE
  KindOf = IMMOBILE

  ArmorSet
    Conditions = None
    Armor = CivilianStructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 250.0
    InitialHealth = 250.0
  End
 
  Behavior = KeepObjectDie ModuleTag_Death01
  End

  Behavior = StructureCollapseUpdate ModuleTag_Collapse01
    MinCollapseDelay = 500
    MaxCollapseDelay = 1000
    CollapseDamping = 0.0
    MaxShudder = 0.6
    MinBurstDelay = 250
    MaxBurstDelay = 800
    BigBurstFrequency = 4
    OCL = INITIAL OCL_SmallStructureCollapseInitial
    OCL = DELAY OCL_SmallStructureCollapseDelay
    OCL = BURST OCL_SmallStructureCollapseBurst
    OCL = FINAL OCL_SmallStructureCollapseFinal
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    FlameDamageLimit = 20
    FlameDamageExpiration = 2000  
    AflameDuration = 5000         
    AflameDamageAmount = 50       
    AflameDamageDelay = 500       
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_ReallyDamaged_FXObject
  End

  Geometry = Cylinder
  GeometryMajorRadius = 5.5
  GeometryHeight = 92.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End

;------------------------------------------------------------------------------
ObjectReskin TallSmokeStackSmoking TallSmokeStack

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = PMSmkStak
      ParticleSysBone = Smoke01 SmolderingSmokeLarge
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = PMSmkStak_D
      ParticleSysBone = Smoke01 SmolderingSmokeLarge
    End
    ConditionState = POST_COLLAPSE
      Model = PMSmkStak_R
    End
    
    ConditionState = SNOW
      Model = PMSmkStak_S
      ParticleSysBone = Smoke01 SmolderingSmokeLarge
    End
    ConditionState = REALLYDAMAGED RUBBLE SNOW
      Model = PMSmkStak_DS
      ParticleSysBone = Smoke01 SmolderingSmokeLarge
    End
    ConditionState = POST_COLLAPSE SNOW
      Model = PMSmkStak_RS
    End
  End

  Geometry = Cylinder
  GeometryMajorRadius = 5.5
  GeometryHeight = 92.0
  GeometryIsSmall = No
End
