;-------------------------------------------------------------------------
Object GLA_StatueLg

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = PMGLAStaLgANIM2
      Animation = PMGLAStaLgANIM2.PMGLAStaLgANIM2
      AnimationMode = ONCE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Prop
  EditorSorting = MISC_MAN_MADE
  KindOf = IMMOBILE

  ArmorSet
    Conditions = None
    Armor = CivilianStructureArmor
    DamageFX = EmptyDamageFX
  End

  ; *** ENGINEERING Parameters ***  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End
  
  Shadow = SHADOW_VOLUME
End

;------------------------------------------------------------------------------
Object GLA_StatueSm

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = PMGLAStaSm
    End
    ConditionState = DAMAGED
      Model = PMGLAStaSm_D
    End
    AliasConditionState = REALLYDAMAGED
    ConditionState = RUBBLE
      Model = PMGLAStaSm_D1
    End

    ConditionState = SNOW
      Model = PMGLAStaSm_S
    End
    ConditionState = DAMAGED SNOW
      Model = PMGLAStaSm_DS
    End
    AliasConditionState = REALLYDAMAGED SNOW
    ConditionState = RUBBLE SNOW
      Model = PMGLAStaSm_D1S
    End
  End

  ; *** AUDIO Parameters ***
  SoundOnReallyDamaged = WallStoneDie
  
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Prop
  EditorSorting = MISC_MAN_MADE
  KindOf = IMMOBILE
  ArmorSet
    Conditions = None
    Armor = CivilianStructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters *** 
  KindOf = SELECTABLE IMMOBILE 
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 200.0
    InitialHealth = 200.0
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_Damaged_FXObject
    ReallyDamagedOCL1 = Loc:X:0 Y:0 Z:0 OCL:OCL_StructureTransitionSmall_ReallyDamaged_FXObject
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    DeathTypes = ALL
    FX = FX_StonePropExplode
    OCL = OCL_SmallStructureDebris
  End
  
  Shadow = SHADOW_VOLUME
  Geometry = Box
  GeometryMajorRadius = 3.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 10.0
  GeometryIsSmall = No
End

