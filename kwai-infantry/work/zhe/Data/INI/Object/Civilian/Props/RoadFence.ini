;------------------------------------------------------------------------------
Object GenericRoadFence

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:ChainLinkFence
  EditorSorting = MISC_MAN_MADE
  KindOf = IMMOBILE FORCEATTACKABLE STRUCTURE

  ArmorSet
    Conditions = None
    Armor = PropArmor
    DamageFX = EmptyDamageFX
  End

  ; *** ENGINEERING Parameters ***  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = ToppleUpdate ModuleTag_Topple01
    ToppleFX = FX_ChainLinkFenceTopple
    BounceFX = FX_ChainLinkFenceBounce
    ToppleLeftOrRightOnly = Yes
    BounceVelocityPercent = 20%
    InitialAccelPercent = 3%
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death01
    SinkRate = 2
    SinkDelay = 5000
    DestructionDelay = 10000
  End
  
  Scale = 0.8
  Shadow = SHADOW_VOLUME
End

