;------------------------------------------------------------------------------
ObjectReskin Outhouse01 GenericProp

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
  
    ; day
    ConditionState = NONE
      Model = PMOuthouse01
    End
    ConditionState = DAMAGED
      Model = PMOuthouse01_D
    End
    ConditionState = REALLYDAMAGED
      Model = PMOuthouse01_E
    End
    ConditionState = RUBBLE
      Model = PMOuthouse01_E
    End

    ; day garrisoned
    ConditionState = GARRISONED
      Model = PMOuthouse01_G
      Animation = PMOuthouse01_G.PMOuthouse01_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED
      Model = PMOuthouse01_DG
      Animation = PMOuthouse01_DG.PMOuthouse01_DG
      AnimationMode = LOOP
    End

    ; snow
    ConditionState = SNOW
      Model = PMOuthouse01_S
    End
    ConditionState = DAMAGED SNOW
      Model = PMOuthouse01_DS
    End
    ConditionState = REALLYDAMAGED SNOW
      Model = PMOuthouse01_ES
    End
    ConditionState = RUBBLE SNOW
      Model = PMOuthouse01_ES
    End

    ; snow garrisoned
    ConditionState = GARRISONED SNOW
      Model = PMOuthouse01_GS
      Animation = PMOuthouse01_GS.PMOuthouse01_GS
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED GARRISONED SNOW
      Model = PMOuthous01_DGS
      Animation = PMOuthous01_DGS.PMOuthous01_DGS
      AnimationMode = LOOP
    End
  End

  Geometry = Box
  GeometryMajorRadius = 4.0
  GeometryMinorRadius = 3.0
  GeometryHeight = 15.0
  GeometryIsSmall = No
End

