;------------------------------------------------------------------------------
Object DecorationPool01

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    DefaultConditionState
      Model = PMDcrtPl01
    End
    ConditionState = RUBBLE
      Model = PMDcrtPl01_D
    End
  End
  
  Draw = W3DModelDraw ModuleTag_WaterFountain
    ConditionState = NONE
      Model = PMDcPl01WTR
    End
    ConditionState = NIGHT
      Model = PMDcPl01WTR_M
    End
    ConditionState = RUBBLE
      Model = None
    End
    AliasConditionState = NIGHT RUBBLE 
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Prop
  EditorSorting = MISC_MAN_MADE
  KindOf = SHRUBBERY IGNORED_IN_GUI
  CrushableLevel = 1

  ArmorSet
    Conditions = None
    Armor = CivilianStructureArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** AUDIO Parameters ***
  SoundOnReallyDamaged = WallStoneDie 

  ; *** ENGINEERING Parameters ***  
  Body = StructureBody ModuleTag_Body01
    MaxHealth = 25.0
    InitialHealth = 25.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL StationaryLocomotor

  Behavior = ToppleUpdate ModuleTag_Topple01
    KillWhenStartToppling = Yes
  End
  
  Behavior = InstantDeathBehavior ModuleTag_Death01
    DeathTypes = ALL
    FX = FX_WaterPropExplodeLow
    OCL = OCL_DecorationPool01_DeathEffect
  End
  
  Behavior = FireWeaponCollide ModuleTag_Water01
    CollideWeapon = FallIntoWaterDamageWeapon
  End
  
  Geometry = Box
  GeometryMajorRadius = 32.0
  GeometryMinorRadius = 6.5
  GeometryHeight = 2.5
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
End

