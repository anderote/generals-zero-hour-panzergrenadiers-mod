Object TrainRocketTransportWithRocket

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ConditionState = NONE
      Model = CVBaikTrans
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TrainCar
  EditorSorting = VEHICLE
  TransportSlotCount = 1

  ArmorSet
    Armor = TruckArmor
    DamageFX = CrushableCarDamageFX
  End
  CrusherLevel = 4
  CrushableLevel = 4
  CommandSet = CivilianCarBombCommandSet

  ; *** AUDIO Parameters ***
