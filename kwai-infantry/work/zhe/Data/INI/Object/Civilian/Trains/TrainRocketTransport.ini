;--------------------------------------------------------------------------
Object TrainRocketTransport

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ConditionState = NONE
      Model = CVBaikTransNR
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TrainCar
  EditorSorting = VEHICLE
  ArmorSet
    Armor = TruckArmor
    DamageFX = CrushableCarDamageFX
  End

  VisionRange = 300
  ShroudClearingRange = 300
  TransportSlotCount = 0
  CrusherLevel = 4
  CrushableLevel = 4

  ; *** ENGINEERING Parameters ***  
  KindOf = SELECTABLE CAN_ATTACK VEHICLE TRANSPORT

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL 18WheelerLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 30.0
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    FX = FX_TankerTruckExplode
    OCL = OCL_TankerTruck_DeathEffect
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Weapon01
    DeathWeapon = TankerTruckWeapon
    StartsActive = Yes
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000 
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 112.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 17.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End
