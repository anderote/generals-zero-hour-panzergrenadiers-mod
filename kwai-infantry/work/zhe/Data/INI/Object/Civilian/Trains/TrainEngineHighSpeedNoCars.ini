;------------------------------------------------------------------------------
Object TrainEngineHighSpeedNoCars

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    ConditionState = NONE
      Model = CVFsTrain
      ParticleSysBone = Steam01 LocomotiveSteam
    End
    ConditionState = OVER_WATER
      Model = CVFsTrain
    End
    ConditionState = DAMAGED
      Model = CVFsTrain_D
      ParticleSysBone = Steam01 LocomotiveSteam
    End
    ConditionState = OVER_WATER DAMAGED
      Model = CVFsTrain_D
    End
    ConditionState = REALLYDAMAGED
      Model = CVFsTrain_E
      ParticleSysBone = Steam01 VehicleSmoke
    End
    ConditionState = OVER_WATER REALLYDAMAGED
      Model = CVFsTrain_E
    End
    ConditionState = NIGHT
      Model = CVFsTrain_N
      ParticleSysBone = Steam01 LocomotiveSteam
    End
    ConditionState = OVER_WATER NIGHT
      Model = CVFsTrain_N
    End
    ConditionState = DAMAGED NIGHT
      Model = CVFsTrain_DN
      ParticleSysBone = Steam01 LocomotiveSteam
    End
    ConditionState = OVER_WATER DAMAGED NIGHT
      Model = CVFsTrain_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model = CVFsTrain_EN
      ParticleSysBone = Steam01 VehicleSmoke
    End
    ConditionState = OVER_WATER REALLYDAMAGED NIGHT
      Model = CVFsTrain_EN
    End
    ConditionState = RUBBLE
      Model = CVFsTrain_R
    End
    AliasConditionState = RUBBLE NIGHT
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TrainHighSpeed
  EditorSorting = VEHICLE
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  
  VisionRange = 300
  ShroudClearingRange = 300
  CrusherLevel = 4
  CrushableLevel = 4

  ; *** AUDIO Parameters ***
;  SoundMoveLoop = TruckMoveLoop
  SoundMoveLoop = ConvoyTruckMoveLoop
  SoundMoveLoopDamaged = ConvoyTruckMoveLoop

  ; *** ENGINEERING Parameters ***  
  KindOf = SELECTABLE VEHICLE TRANSPORT 

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 3000.0
    InitialHealth = 3000.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
  End

  Behavior = RailroadBehavior ModuleTag_AI02
    PathPrefixName = Railroad
    ;=== PARAMETERS FOR ALL CARRIAGES ===    
    RunningGarrisonSpeedMax = 1
    KillSpeedMin = 1
    Friction = 0.995
    BigMetalBounceSound = BuildingFallingMetal
    SmallMetalBounceSound = VehicleImpactHeavy
    MeatyBounceSound = InfantryCrush
    ClicketyClackSound = TrainClicketyClack
    ;=== PARAMETERS THAT ARE MEANINGFUL ONLY WHEN IsLocomotive = Yes
    IsLocomotive = Yes
    SpeedMax = 7
    Acceleration = 2.03
    WaitAtStationTime = 10000
    Braking = 0.57
    RunningSound = HighSpeedTrainRunningLoop
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    FX = FX_GenericVehicleDeathExplosion
    OCL = OCL_HSTrain_DeathEffect
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Weapon01
    DeathWeapon = TankerTruckWeapon
    StartsActive = Yes
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000 
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 40.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 20.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End
