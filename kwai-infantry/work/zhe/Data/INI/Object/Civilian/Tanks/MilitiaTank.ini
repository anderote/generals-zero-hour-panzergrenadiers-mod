;------------------------------------------------------------------------------
Object CivilianTankMilitiaTank

  ; *** ART Parameters ***
  Draw = W3DTankDraw ModuleTag_W3D01
    DefaultConditionState        
      Model = CVTank
      Turret = Turret01
      WeaponFireFXBone = PRIMARY MuzzleFX
      WeaponRecoilBone = PRIMARY Barrel
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponLaunchBone = PRIMARY MuzzleFX
    End
    
    ConditionState = REALLYDAMAGED
      Model = CVTank_D
    End
    
    ConditionState = RUBBLE
      Model = CVTank_D
    End

    TrackMarks = EXTnkTrack.tga
    OkToChangeModelColor = Yes
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:MilitiaTank
  Side = Civilian
  EditorSorting = VEHICLE
  TransportSlotCount = 3
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY 100mmD10TRifledGunWeapon
  End
  
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 500
  BuildTime = 12.0
  VisionRange = 150
  ShroudClearingRange = 200

  ExperienceValue = 100 100 200 400
  ExperienceRequired = 0 200 300 600
  IsTrainable = Yes
  CrusherLevel = 1
  CrushableLevel = 2
  CommandSet = GenericCommandSet
  
  ; *** AUDIO Parameters ***
  VoiceSelect = NoSound ; MilitiaTankVoiceSelect  ;make the sounds! from ra2 rhino tank
  VoiceMove = NoSound ; MilitiaTankVoiceMove
  VoiceAttack = NoSound ; MilitiaTankVoiceAttack
  SoundMoveStart = NoSound ; MilitiaTankMoveStart
  SoundMoveStartDamaged = NoSound
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE SALVAGER
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 480.0
    InitialHealth = 480.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      TurretTurnRate = 140
      ControlledWeaponSlots= PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL MilitiaTankLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 50.0
  End

  Behavior = ProductionUpdate ModuleTag_Production
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 500
    DestructionDelayVariance = 100
    OCL = MIDPOINT OCL_MilitiaTank_DeathEffect
    FX = FINAL    FX_GenericTankDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 2000
    DestructionDelayVariance = 300
    FX = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_MilitiaTank_DeathEffect  
    FX = FINAL    FX_GenericTankDeathExplosion 
  End
  
  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Death03
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_CarCrush
    OCL = OCL_AmericaTankCrusader_CrushEffect
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = CreateCrateDie ModuleTag_CratesChange
   CrateData = SalvageCrateData
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000 
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End

  Geometry = Box
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0     
  GeometryIsSmall = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End
