      AnimationMode = LOOP
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  ArmorSet
    Armor = UnsinkableProjectileArmor
  End
  
  VisionRange = 0.0  

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 10.0
    InitialHealth = 10.0
  End

  Behavior = LifetimeUpdate ModuleTag_Death01
    MinLifetime = 1000
    MaxLifetime = 1100
  End
  
  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_01
