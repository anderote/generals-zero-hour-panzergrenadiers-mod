;------------------------------------------------------------------------------
Object AGM65AirToGroundJetMissile

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = AVWarthog_M
      ParticleSysBone = None GenericMissileStreak
    End
    ConditionState = JAMMED
      Model = AVWarthog_M
      ParticleSysBone = None SparksMedium
      ParticleSysBone = None GenericMissileStreak
    End
  End

  ; ***DESIGN parameters ***
  Side = America
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  VisionRange = 0.0
  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD CAN_CAST_REFLECTIONS PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_GenericGroundMissileHitWater
    Weapon  = 30cmATGAntiTankRocketWaterCollideWeapon
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -FLOODED -DETONATED -EXPLODED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = NONE +EXPLODED
    FX = FX_SmallGenericProjectileDeath
  End
  ; ---- end Projectile death behaviors

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 6.0
    AllowCollideForce = No
    KillWhenRestingOnGround = Yes
  End
  
  Behavior = MissileAIUpdate ModuleTag_AI01
    DetonateCallsKill = Yes
    TryToFollowTarget = Yes 
    IgnitionFX = FX_JetMissileIgnition
    FuelLifetime = 3000
    InitialVelocity = 200
    IgnitionDelay = 0
    DistanceToTravelBeforeTurning = 25
    DistanceScatterWhenJammed = 100
    DistanceToTargetForLock = 100
    KillSelfDelay = 0
  End
  Locomotor = SET_NORMAL AGM65AtGMissileLocomotor
  
  Behavior = FireWeaponUpdate ModuleTag_MC
    Weapon = MissileControl
    ;-after engine ignition only
    InitialDelay = 2
  End
  
  Geometry = Sphere
  GeometryIsSmall = No
  GeometryMajorRadius = 1.0
End

;------------------------------------------------------------------------------
Object AGM65AirToGroundJetMissile_CAS

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = AVWarthog_M
      ParticleSysBone = None GenericMissileStreak
    End
    ConditionState = JAMMED
      Model = AVWarthog_M
      ParticleSysBone = None SparksMedium
      ParticleSysBone = None GenericMissileStreak
    End
  End

  ; ***DESIGN parameters ***
  Side = America
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD CAN_CAST_REFLECTIONS PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_GenericGroundMissileHitWater
    Weapon  = 30cmATGAntiTankRocketWaterCollideWeapon
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
  End
  Behavior = SlowDeathBehavior DeathModuleTag_02
    DeathTypes = ALL -FLOODED -LASERED
    ProbabilityModifier = 25
    DestructionDelay = 1000
    FX = FINAL FX_AmericaA10CASOnCompleted
  End
  Behavior = SlowDeathBehavior DeathModuleTag_03
    DeathTypes = ALL -FLOODED -LASERED
    ProbabilityModifier = 75
    DestructionDelay = 0
  End
  ; ---- end Projectile death behaviors

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 6.0
    AllowCollideForce = No
    KillWhenRestingOnGround = Yes
  End
  
  Behavior = MissileAIUpdate ModuleTag_AI01
    DetonateCallsKill = Yes
    TryToFollowTarget = Yes 
    IgnitionFX = FX_JetMissileIgnition
    FuelLifetime = 3000
    InitialVelocity = 200
    IgnitionDelay = 100
    IgnitionFX = FX_AmericaA10CASStrikerCommenceStrike
    DistanceToTravelBeforeTurning = 25
    DistanceScatterWhenJammed = 100
    DistanceToTargetForLock = 100
    KillSelfDelay = 0
  End
  Locomotor = SET_NORMAL AGM65AtGMissileLocomotor
  
  Behavior = FireWeaponUpdate ModuleTag_MC
    Weapon = MissileControl
    ;-after engine ignition only
    InitialDelay = 2
  End
  
  Behavior = FireWeaponUpdate ModuleTag_MIF
    Weapon = MissileIgnitionFocer
    ;-after engine ignition only
    InitialDelay = 102
  End
  
  Behavior = SpecialPowerCompletionDie ModuleTag_PowerReset
    SpecialPowerTemplate = America_SuperweaponA10ThunderboltCAS
  End

  Geometry = Sphere
  GeometryIsSmall = No
  GeometryMajorRadius = 1.0
End
