Object MOABGas

  ; *** ENGINEERING Parameters ***
  KindOf = IMMOBILE
  Body = ActiveBody ModuleTag_W3D01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 150.0
    AerodynamicFriction = 7 
    ForwardFriction = 200 
  End
  
  Behavior = HeightDieUpdate ModuleTag_HeightDie
    TargetHeight = 40.0
    TargetHeightIncludesStructures = Yes
    DestroyAttachedParticlesAtHeight = 41.0  
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DestructionDelay = 150
    DestructionDelayVariance = 33
    FX = INITIAL FX_MOABIgnite
    FX = FINAL FX_MOABFinalExplosion
    OCL = FINAL OCL_MOABBomb_SoundEffectContainer
    Weapon = MIDPOINT MOABFlameWeapon 
    Weapon = FINAL MOABDetonationWeapon
  End
End

