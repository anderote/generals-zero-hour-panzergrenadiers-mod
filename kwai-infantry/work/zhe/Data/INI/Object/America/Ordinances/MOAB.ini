;------------------------------------------------------------------------------
Object AmericaMOAB

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = PMMoab
      ParticleSysBone = None CarpetBombTrail
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:DaisyCutterBomb
  EditorSorting = SYSTEM
  TransportSlotCount = 10
  VisionRange = 300.0  
  ShroudClearingRange = 0
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** AUDIO Parameters ***
  SoundFallingFromPlane = BombFallingWhistle
  
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +NORMAL +DETONATED
    FX = FX_MOABExplode
    OCL = OCL_MOABExplode
  End

  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = NONE +LASERED
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End

  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = ALL -NORMAL -DETONATED -LASERED
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL None
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 75.0
    AerodynamicFriction = 1
    ForwardFriction = 33
    CenterOfMassOffset = 2 
  End

  Behavior = HeightDieUpdate ModuleTag_HeightDie
    TargetHeight = 50.0
    TargetHeightIncludesStructures = Yes
  End
  
  Behavior = SpecialPowerCompletionDie ModuleTag_PowerReset
    SpecialPowerTemplate = America_SuperweaponMOAB
  End

  Behavior = SmartBombTargetHomingUpdate ModuleTag_AI02
    CourseCorrectionScalar = 0.99
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 12.0
End

