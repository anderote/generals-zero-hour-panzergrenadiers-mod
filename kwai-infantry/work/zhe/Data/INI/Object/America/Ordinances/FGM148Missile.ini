Object FGM148Missile

  EditorSorting = SYSTEM
  BuildVariations = 0_FGM148Missile 1_FGM148Missile 1_FGM148Missile
End

;------------------------------------------------------------------------------
ObjectReskin 0_FGM148Missile 0_127mmGenericAntiTankMissile

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = AIFGM148_R
      Animation = AIFGM148_R.AIFGM148_R
      AnimationSpeedFactorRange = 1.50 1.50
      AnimationMode = ONCE
      ParticleSysBone = None GenericMissileStreak
      TransitionKey = TRANS_Thrusting
    End
    ConditionState = JAMMED
      Model = AIFGM148_R
      Animation = AIFGM148_R.AIFGM148_R
      AnimationSpeedFactorRange = 1.50 1.50
      AnimationMode = ONCE
      ParticleSysBone = None SparksMedium
      ParticleSysBone = None GenericMissileStreak
      TransitionKey = TRANS_Jammed
    End
  End

  Geometry = Sphere
  GeometryIsSmall = No
  GeometryMajorRadius = 1.0
End

