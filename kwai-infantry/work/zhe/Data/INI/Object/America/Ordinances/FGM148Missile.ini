;------------------------------------------------------------------------------
Object GuidedFGM148Missile

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = AIFGM148_R
      Animation = AIFGM148_R.AIFGM148_R
      AnimationSpeedFactorRange = 1.50 1.50
      AnimationMode = ONCE
      ParticleSysBone = None GenericMissileStreak
      TransitionKey = TRANS_Thrusting
    End
    ConditionState = JAMMED
      Model = AIFGM148_R
      Animation = AIFGM148_R.AIFGM148_R
      AnimationSpeedFactorRange = 1.50 1.50
      AnimationMode = ONCE
      ParticleSysBone = None SparksMedium
      ParticleSysBone = None GenericMissileStreak
      TransitionKey = TRANS_Jammed
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0.0  
  
  ArmorSet
    Conditions = None
    Armor = InterceptableSubualableProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_Wet01
    DeathTypes = NONE +FLOODED
    FX = FX_GenericGroundMissileHitWater
    Weapon = 127mmAntiTankRocketWaterCollideWeapon_TopDownAttack
  End
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = NONE +LASERED
    FX = FX_GenericProjectileShellRecoil
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = NONE +EXPLODED
    FX = FX_SmallGenericProjectileDeath
  End
  Behavior = InstantDeathBehavior DeathModuleTag_04
    DeathTypes = ALL -FLOODED -DETONATED -EXPLODED -LASERED
  End
  ; ---- end Projectile death behaviors

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 3.0
    AllowCollideForce = No
    KillWhenRestingOnGround = Yes
  End
  
  Behavior = MissileAIUpdate ModuleTag_AI01
    DetonateCallsKill = Yes
    TryToFollowTarget = Yes 
    ;IgnitionFX = FX_BuggyMissileIgnition
    FuelLifetime = 3000
    InitialVelocity = 100
    IgnitionDelay = 250
    DistanceToTravelBeforeTurning = 50
    DistanceToTargetBeforeDiving = 125
    DistanceScatterWhenJammed = 100
    DistanceToTargetForLock = 75
    KillSelfDelay = 0
  End
  Locomotor = SET_NORMAL JavelinMissileLocomotor
  
  Behavior = FireWeaponUpdate ModuleTag_MC
    Weapon = MissileControl
    ;-after engine ignition only
    InitialDelay = 2
  End

  Geometry = Sphere
  GeometryIsSmall = No
  GeometryMajorRadius = 1.0
End
