  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +NORMAL +DETONATED
    FX = FX_DaisyCutterExplode
