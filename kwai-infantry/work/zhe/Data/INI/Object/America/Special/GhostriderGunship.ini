;------------------------------------------------------------------------------
Object AmericaJetGhostriderGunship

  ; *** ART Parameters ***
  SelectPortrait = SASpGunshipSolo_L
  ButtonImage = SASpGunshipSolo
  
  Draw = W3DOverlordAircraftDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes 
  
    ConditionState = NONE
      Model = AVCargoPln
      Animation = AVCargoPln.AVCargoPln
      AnimationMode = LOOP
      ParticleSysBone = Engine01 JetBlackTrailThin
      ParticleSysBone = Engine02 JetBlackTrailThin
      ParticleSysBone = Engine03 JetBlackTrailThin
      ParticleSysBone = Engine04 JetBlackTrailThin
      ParticleSysBone = WingTip01 JetContrailThin
      ParticleSysBone = WingTip02 JetContrailThin
    End

    ConditionState = DAMAGED
      Model = AVCargoPln_D
      Animation = AVCargoPln_D.AVCargoPln_D
      AnimationMode = LOOP
      ParticleSysBone = Engine03 JetBlackTrailThin
      ParticleSysBone = Engine04 JetBlackTrailThin
      ParticleSysBone = WingTip01 JetContrailThin
      ParticleSysBone = WingTip02 JetContrailThin
    End

    ConditionState = REALLYDAMAGED
      Model = AVCargoPln_D
      Animation = AVCargoPln_D.AVCargoPln_D
      AnimationMode = LOOP
      ParticleSysBone = Engine03 JetBlackTrailThin
      ParticleSysBone = Engine04 JetBlackTrailThin
      ParticleSysBone = WingTip01 JetContrailThin
      ParticleSysBone = WingTip02 JetContrailThin
    End
    ConditionState = RUBBLE
      Model = AVCargoPln_D
      Animation = AVCargoPln_D.AVCargoPln_D
      AnimationMode = LOOP
    End
  End
  
  Draw = W3DModelDraw ModuleTag_Howitzer01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes 

    DefaultConditionState
      Model = AVGRHowitzer
      TurretPitch = Gun04
      WeaponFireFXBone = PRIMARY Muzzle04
      WeaponMuzzleFlash = PRIMARY MuzzleFX04
      WeaponLaunchBone = PRIMARY Muzzle04
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:GhostriderGunship
  EditorSorting = VEHICLE
  Side = America
  TransportSlotCount = 0
  VisionRange = 300.0 
  ShroudClearingRange = 300
  Prerequisites
    Object = AmericaAirfield
  End

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY M102HowitzerGun
  End

  ArmorSet
    Conditions = None
    Armor = GunshipArmor
    DamageFX = TankDamageFX
  End

  ExperienceValue = 500 500 500 500
  ExperienceRequired = 0 150 450 900
  IsTrainable = No

  ; *** AUDIO Parameters ***
  VoiceSelect = SpectreGunshipVoiceSelect
  VoiceAttack = SpectreGunshipVoiceAttack
  VoiceMove = SpectreGunshipVoiceMove
  VoiceFear = AmericaGhostriderGunshipOnDamaged
  SoundAmbient = SpectreGunshipAmbientLoop
  SoundAmbientRubble = NoSound
  UnitSpecificSounds
    Afterburner = SpectreGunshipAfterburnerLoop
    HowitzerFire = 105mmArtilleryRound
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_ATTACK VEHICLE AIRCRAFT SCORE SELECTABLE EMP_HARDENED

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1250.0
    InitialHealth = 1250.0
  End

  Behavior = JetSlowDeathBehavior ModuleTag_Death01
    DestructionDelay = 15000
    RollRate = 0.2
    RollRateDelta = 1%
    PitchRate = 0.0
    FallHowFast = 80.0%
    FXInitialDeath = FX_GenericStrategicAircraftDeathInitial
    OCLInitialDeath = None
    DelaySecondaryFromInitialDeath = 500
    OCLSecondary = None
    OCLHitGround = OCL_A10DeathHitGround
    FXSecondary = FX_GenericStrategicAircraftDeathInitial
    FXFinalBlowUp = FX_GenericHeavyTankDeathExplosion
    OCLHitGround = OCL_GenericStrategicAircraftDeathHitGround
    DelayFinalBlowUpFromHitGround = 1000
    OCLFinalBlowUp = OCL_GhostriderGunshipDeathFinalBlowUp
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 1500.0
    AllowCollideForce = No
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
    ForbidPlayerCommands = Yes
  End
  Locomotor = SET_PANIC GhostriderGunshipTransitLocomotor
  Locomotor = SET_NORMAL GhostriderGunshipOrbitLocomotor

  Behavior = SpecialAbility ModuleTag_SpectreGunship01
    SpecialPowerTemplate = America_SuperweaponGhostriderGunship
    UpdateModuleStartsAttack = Yes
  End

  Behavior = SpectreGunshipUpdate ModuleTag_SpectreGunship02
    GattlingStrafeFXParticleSystem = GhostriderGunship_TargetDesignator
    SpecialPowerTemplate = America_SuperweaponGhostriderGunship
    HowitzerWeaponTemplate = M102HowitzerGun
    GattlingTemplateName = GhostriderGunshipAutoCannon 
    RandomOffsetForHowitzer = 20     
    TargetingReticleRadius = 50
    OrbitInsertionSlope = 0.75
    GunshipOrbitRadius = 400
    HowitzerFiringRate = 6000
    HowitzerFollowLag = 150
    StrafingIncrement = 20
    AttackAreaRadius = 200
    OrbitTime = 60000
    AttackAreaDecal
      Texture = SCCSpecTarg
      Style = SHADOW_ALPHA_DECAL
      OpacityMin = 25%
      OpacityMax = 50%
      OpacityThrobTime = 1500
      Color = R:127 G:177 B:222 A:255 
      OnlyVisibleToOwningPlayer = Yes
    End
    TargetingReticleDecal
      Texture = SCCSpecRet
      Style = SHADOW_ALPHA_DECAL
      OpacityMin = 50%
      OpacityMax = 100%
      OpacityThrobTime = 300
      Color = R:127 G:177 B:222 A:255 
      OnlyVisibleToOwningPlayer = Yes
    End
  End

  Behavior = HelixContain ModuleTag_Contain01
    Slots = 1
    DamagePercentToUnits = 100%
    AllowInsideKindOf = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    ShouldDrawPips = No
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = CountermeasuresBehavior ModuleTag_Countermeasures01
    TriggeredBy = Upgrade_Countermeasures
    FlareTemplateName = CountermeasureFlare
    FlareBoneBaseName = Flare
    VolleySize = 6
    VolleyArcAngle = 90.0
    VolleyVelocityFactor = 2.5
    DelayBetweenVolleys = 250
    NumberOfVolleys = 5
    ReloadTime = 10000
    EvasionRate = 66%
    ReactionLaunchLatency = 0
    MissileDecoyDelay = 50 
  End

  Behavior = SpawnBehavior ModuleTag_Collider01
    SpawnNumber = 1
    SpawnTemplateName = DummyInvisibleAirCollider_GhostriderGunship
    CanReclaimOrphans = No
    SpawnedRequireSpawner = Yes
    SlavesHaveFreeWill = No
  End

  Behavior = QueueProductionExitUpdate ModuleTag_Collider02
    UnitCreatePoint = X:20.0 Y:0.0 Z:0.0
    NaturalRallyPoint = X:20.0 Y:0.0 Z:0.0
  End
  
  Behavior = ProductionUpdate ModuleTag_Collider03
    MaxQueueEntries = 1
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedParticleSystem1 = Bone:Smoke01 RandomBone:No PSys:JetFireLarge
    DamagedParticleSystem2 = Bone:Smoke01 RandomBone:No PSys:JetFireLarge_FireSparks
    DamagedParticleSystem3 = Bone:Smoke01 RandomBone:No PSys:JetSmokeLarge
    
    ReallyDamagedParticleSystem1 = Bone:Smoke01 RandomBone:No PSys:JetFireLarge
    ReallyDamagedParticleSystem2 = Bone:Smoke01 RandomBone:No PSys:JetFireLarge_FireSparks
    ReallyDamagedParticleSystem3 = Bone:Smoke01 RandomBone:No PSys:JetSmokeLarge
    ReallyDamagedParticleSystem4 = Bone:Smoke03 RandomBone:No PSys:JetFireLarge
    ReallyDamagedParticleSystem5 = Bone:Smoke03 RandomBone:No PSys:JetFireLarge_FireSparks
    ReallyDamagedParticleSystem6 = Bone:Smoke03 RandomBone:No PSys:JetSmokeLarge
    
    RubbleParticleSystem1 = Bone:Smoke01 RandomBone:No PSys:JetFireLarge
    RubbleParticleSystem2 = Bone:Smoke01 RandomBone:No PSys:JetFireLarge_FireSparks
    RubbleParticleSystem3 = Bone:Smoke01 RandomBone:No PSys:JetSmokeLarge
    RubbleParticleSystem4 = Bone:Smoke03 RandomBone:No PSys:JetFireLarge
    RubbleParticleSystem5 = Bone:Smoke03 RandomBone:No PSys:JetFireLarge_FireSparks
    RubbleParticleSystem6 = Bone:Smoke03 RandomBone:No PSys:JetSmokeLarge
    RubbleParticleSystem7 = Bone:Smoke06 RandomBone:No PSys:JetFireLarge
    RubbleParticleSystem8 = Bone:Smoke06 RandomBone:No PSys:JetFireLarge_FireSparks
    RubbleParticleSystem9 = Bone:Smoke06 RandomBone:No PSys:JetSmokeLarge
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 40.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 30
End

;------------------------------------------------------------------------------
Object DummyInvisibleAirCollider_GhostriderGunship

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = UNATTACKABLE IGNORED_IN_GUI

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  ; ---- begin death behaviors
  Behavior = DestroyDie ModuleTag_Death01
  End
  
  Behavior = AIUpdateInterface ModuleTag_AI01
  End
  Locomotor = SET_NORMAL CheckerContainerLocomotor_Ghostrider
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 1.0
    KillWhenRestingOnGround = No
    AllowBouncing = No
  End
  
  Behavior = SlavedUpdate ModuleTag_Slave01
    GuardMaxRange = 1
    GuardWanderRange = 0
    StayOnSameLayerAsMaster = Yes
  End

  Behavior = FireWeaponCollide ModuleTag_VO01
    CollideWeapon = AmericaJetGhostriderGunshipCommenceStrikeWeapon
  End

  Behavior = FireWeaponCollide ModuleTag_VO02
    CollideWeapon = AmericaJetGhostriderGunshipConcludeStrikeWeapon
    RequiredStatus = STEALTHED
  End

  Behavior = StealthUpdate ModuleTag_Timer01
    StealthDelay = 61000
    ForbiddenStatus = AIRBORNE_TARGET
    InnateStealth = Yes
    FriendlyOpacityMin = 100%
    FriendlyOpacityMax = 100%
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End

  Geometry = Sphere
  GeometryMajorRadius = 1.0
  GeometryIsSmall = Yes
End

;------------------------------------------------------------------------------
Object GhostriderGunshipAutoCannon

  ; *** ART Parameters ***
  Draw = W3DDependencyModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    AttachToBoneInContainer = CHASSIS
    ParticlesAttachedToAnimatedBones = Yes 

    DefaultConditionState
      Model = AVGRWS
      TurretPitch = TurretEL01
      AltTurretPitch = TurretEL02
      WeaponFireFXBone = PRIMARY Muzzle01
      WeaponMuzzleFlash = PRIMARY MuzzleFX01
      WeaponLaunchBone = PRIMARY Muzzle01
      WeaponFireFXBone = SECONDARY Muzzle02
      WeaponMuzzleFlash = SECONDARY MuzzleFX02
      WeaponLaunchBone = SECONDARY Muzzle02
      WeaponFireFXBone = TERTIARY Muzzle03
      WeaponMuzzleFlash = TERTIARY MuzzleFX03
      WeaponLaunchBone = TERTIARY Muzzle03
    End
  End

  ; ***DESIGN parameters ***
  Side = America
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY GAU23AAutoCannonWeapon
    Weapon = SECONDARY GAU12RotaryCannonWeapon
    Weapon = TERTIARY L60BoforsCannonWeapon
  End
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
  End
  VisionRange = 200

  ; *** AUDIO Parameters ***
  UnitSpecificSounds
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound
    VoiceRapidFire = NoSound
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK CLICK_THROUGH IGNORED_IN_GUI
    Body = StructureBody ModuleTag_02
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      TurretTurnRate = 180
      TurretPitchRate = 180
      AllowsPitch = Yes
    End
    AltTurret
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      TurretTurnRate = 180
      TurretPitchRate = 180
      AllowsPitch = Yes
    End
    TurretsLinked = Yes
    AutoAcquireEnemiesWhenIdle = No 
  End

  Behavior = DestroyDie ModuleTag_Death01
  End

  Geometry = Box
  GeometryMajorRadius = 20.0
  GeometryMinorRadius = 3.0
  GeometryHeight = 3.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End
