;------------------------------------------------------------------------------
Object AmericaTankCrusader

  ; *** ART Parameters ***
  SelectPortrait = SACLeopard_L
  ButtonImage = SACLeopard
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo2 = Upgrade_AmericaEMFSmoothbore
  UpgradeCameo3 = Upgrade_AmericaCompositeArmor
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DOverlordTankDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes
    
    DefaultConditionState
      Model = AVLEOPRD2A4
      Turret = Turret
      HideSubObject = Skirt Smoke_Launch MuzzleFX01 Barrel01 Housecolor04
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponLaunchBone = PRIMARY Muzzle
      WeaponFireFXBone = SECONDARY WeaponB
      WeaponMuzzleFlash = SECONDARY WeaponBFX
      WeaponLaunchBone = SECONDARY WeaponB
      WeaponFireFXBone = TERTIARY SL
      WeaponLaunchBone = TERTIARY SL
      TransitionKey = TRANS_None
    End
    
    ConditionState = MOVING
      ParticleSysBone = Engine01 VehicleSmoke
      ParticleSysBone = Engine02 VehicleSmoke
      TransitionKey = TRANS_None
    End

    ConditionState = RELOADING_A
      ParticleSysBone = Muzzle01 TankRifleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = DAMAGED
      Model = AVLEOPRD2A4_D
      TransitionKey = TRANS_None
    End
    
    ConditionState = DAMAGED MOVING
      Model = AVLEOPRD2A4_D
      ParticleSysBone = Engine01 VehicleSmoke
      ParticleSysBone = Engine02 VehicleSmoke
      TransitionKey = TRANS_None
    End

    ConditionState = DAMAGED RELOADING_A
      Model = AVLEOPRD2A4_D
      ParticleSysBone = Muzzle01 TankRifleSmoke
      TransitionKey = TRANS_None
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = AVLEOPRD2A4_E
      Animation = AVLEOPRD2A4_E.AVLEOPRD2A4_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      TransitionKey = TRANS_ReallyDamaged
    End
    
    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = AVLEOPRD2A4_E
      Animation = AVLEOPRD2A4_E.AVLEOPRD2A4_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Engine01 VehicleSmoke
      ParticleSysBone = Engine02 VehicleSmoke
      TransitionKey = TRANS_ReallyDamaged
    End
    
    ConditionState = REALLYDAMAGED RUBBLE RELOADING_A
      Model = AVLEOPRD2A4_E
      Animation = AVLEOPRD2A4_E.AVLEOPRD2A4_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Muzzle01 TankRifleSmoke
      TransitionKey = TRANS_ReallyDamaged
    End
    
    TransitionState = TRANS_None TRANS_ReallyDamaged
      Model = AVLEOPRD2A4_E1
      Animation = AVLEOPRD2A4_E1.AVLEOPRD2A4_E1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_ReallyDamaged TRANS_None
      Model = AVLEOPRD2A4_E1
      Animation = AVLEOPRD2A4_E1.AVLEOPRD2A4_E1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    TrackMarks = AVTnkTracks.dds
    TreadAnimationRate = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  Draw = W3DOverlordTankDraw ModuleTag_W3D02
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = AVLEOPRD2A4_A1
      Turret = Turret
      HideSubObject = MuzzleFX01
    End
    
    ConditionState = FIRING_A
      Animation = AVLEOPRD2A4_A1.AVLEOPRD2A4_A1
      AnimationMode = ONCE
      ShowSubObject = MuzzleFX01
    End
    
    ConditionState = DAMAGED
      Model = AVLEOPRD2A4_A1D
      HideSubObject = MuzzleFX01
    End
    
    ConditionState = DAMAGED FIRING_A
      Model = AVLEOPRD2A4_A1D
      Animation = AVLEOPRD2A4_A1D.AVLEOPRD2A4_A1D
      AnimationMode = ONCE
      ShowSubObject = MuzzleFX01
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = AVLEOPRD2A4_A1E
      HideSubObject = MuzzleFX01
    End
    
    ConditionState = REALLYDAMAGED RUBBLE FIRING_A
      Model = AVLEOPRD2A4_A1E
      Animation = AVLEOPRD2A4_A1E.AVLEOPRD2A4_A1E
      AnimationMode = ONCE
      ShowSubObject = MuzzleFX01
    End
  End
    
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Crusader
  Side = America
  EditorSorting = VEHICLE
  TransportSlotCount = 8
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY 120mmL44RheinmetallSmoothboreGunWeapon
    Weapon = SECONDARY M240CoaxialMachineGunWeapon
    Weapon = TERTIARY 16xVehicleSmokeGrenadeLaunchWeapon
    PreferredAgainst = PRIMARY HUGE_VEHICLE
    AutoChooseSources = TERTIARY NONE
  End
  
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = ImprovedCompositeTankArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 2000
  BuildTime = 30.0
  VisionRange = 150
  ShroudClearingRange = 150
  Prerequisites
    Object = AmericaWarFactory
    Object = AmericaStrategyCenter
    Object = AmericaTier1DummyObject
  End
  
  ExperienceValue = 100 100 200 400
  ExperienceRequired = 0 200 400 800
  IsTrainable = Yes
  CrusherLevel = 2
  CrushableLevel = 2
  CommandSet = AmericaTankCrusaderCommandSet
  
  ; *** AUDIO Parameters ***
  VoiceSelect = CrusaderTankVoiceSelect
  VoiceMove = CrusaderTankVoiceMove
  VoiceGuard = CrusaderTankVoiceMove
  VoiceAttack = CrusaderTankVoiceAttack
  SoundMoveLoop = AmericaTankV1MoveLoop
  SoundAmbient = AmericaTankV1AmbientLoop

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = CrusaderTankVoiceCreate
    VoiceEnter = CrusaderTankVoiceMove
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    VoiceCrush = CrusaderTankVoiceCrush
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE HUGE_VEHICLE SCORE SALVAGER ATTACK_NEEDS_LINE_OF_SIGHT
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 400.0
    InitialHealth = 400.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 900
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      TurretTurnRate = 40
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes NotWhileAttacking
  End
  Locomotor = SET_NORMAL Leopard2A4Locomotor
  Locomotor = SET_SUPERSONIC Leopard2A4Locomotor_Blitz
  
  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 200.0
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_AmericaTankCrusader_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL OCL_AmericaTankCrusader_DeathEffect_BlowUp
    FX = FINAL FX_GenericTankDeathExplosion
  End

  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 60
    DestructionDelay = 100
    DestructionDelayVariance  = 50
    OCL = FINAL OCL_AmericaTankCrusader_DeathEffect
    FX = FINAL FX_GenericTankDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 30000
    OCL = INITIAL OCL_AmericaTankCrusader_CatchFire
    FX = INITIAL FX_GenericTankCatchFire
    OCL = FINAL OCL_AmericaTankCrusader_DeathEffect
    FX = FINAL FX_GenericTankDeathExplosion
  End

  Behavior = EjectPilotDie ModuleTag_Death04
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
    ExemptStatus = HIJACKED IS_FIRING_WEAPON IS_AIMING_WEAPON USING_ABILITY AFLAME
    VeterancyLevels = ALL -REGULAR
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 1
    AflameDamageDelay = 500
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move01
    Weapon = IngeniousTankMovementWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move02
    Weapon = IngeniousTankCheckerWeapon
  End
  
  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End
  
  Behavior = SubObjectsUpgrade ModuleTag_Addon01
    TriggeredBy = Upgrade_GPMGAddon
    HideSubObjects = TurretPort
  End

  Behavior = SubObjectsUpgrade ModuleTag_Addon02
    TriggeredBy = Upgrade_SmokeScreenDischargerAddon
    ShowSubObjects = Smoke_Launch
  End

  Behavior = SubObjectsUpgrade ModuleTag_Addon03
    TriggeredBy = Upgrade_TankArmourSkirtAddon
    ShowSubObjects = Skirt
  End

  Behavior = ObjectCreationUpgrade ModuleTag_GPMG01
    UpgradeObject = OCL_AmericaInfantryM240MachineGunner
    TriggeredBy = Upgrade_GPMGAddon
  End
  
  Behavior = OverlordContain ModuleTag_GPMG02
    Slots = 1
    DamagePercentToUnits = 100%
    AllowInsideKindOf = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret = Yes
    ExperienceSinkForRider = No
  End
  
  Behavior = OCLSpecialPower ModuleTag_SmokeGenerator01
    SpecialPowerTemplate = SpecialAbilitySmokeScreenGenerator
    OCL = OCL_GenericVehicleSmokeGeneratorSmokeScreen
  End  

  Behavior = CommandSetUpgrade ModuleTag_SmokeDischarger01
    TriggeredBy = Upgrade_SmokeScreenDischargerAddon
    CommandSet = AmericaTankCrusaderUpgradedCommandSet
  End

  Behavior = ArmorUpgrade ModuleTag_Armour01
    TriggeredBy = Upgrade_AmericaCompositeArmor
  End
  
  Behavior = MaxHealthUpgrade ModuleTag_Armour02
    TriggeredBy = Upgrade_TankArmourSkirtAddon
    AddMaxHealth = 75.0
    ChangeType = PRESERVE_RATIO
  End
  
  Behavior = ExperienceScalarUpgrade ModuleTag_AdvTraining01
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 0.5
  End

  Behavior = WeaponBonusUpgrade ModuleTag_EMF01
    TriggeredBy = Upgrade_AmericaEMFSmoothbore
  End

  Behavior = PointDefenseLaserUpdate ModuleTag_Ricochet
    WeaponTemplate = Leopard2A4ArmourHardness
    PrimaryTargetTypes = SMALL_MISSILE PROJECTILE
    ScanRate = 0
    ScanRange = 60.0
    PredictTargetVelocityFactor = 1.0
  End
  
  Behavior = OCLSpecialPower ModuleTag_Blitzkrieg
    SpecialPowerTemplate = SpecialAbilityTankBlitzkriegTactics
    OCL = OCL_BlitzkriegTactics_InvisibleMarker
  End

  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  ; --- end detector modules ---
  
  Geometry = Box
  GeometryMajorRadius = 18.0
  GeometryMinorRadius = 8.0
  GeometryHeight = 14.0     
  GeometryIsSmall = No    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End
