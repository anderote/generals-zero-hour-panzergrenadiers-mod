;------------------------------------------------------------------------------
Object AmericaVehicleComanche

  ; *** ART Parameters ***
  SelectPortrait = SACCommanche_L
  ButtonImage = SACCommanche
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo2 = Upgrade_Countermeasures
  UpgradeCameo3 = Upgrade_ComancheRocketPods
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ProjectileBoneFeedbackEnabledSlots = SECONDARY

    DefaultConditionState
      Model = AVComanch
      Animation = AVComanch.AVComanch
      HideSubObject = MissileUpgrade
      AnimationMode = LOOP
      TurretPitch = Vulcan
      WeaponMuzzleFlash = PRIMARY TurretFX
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponLaunchBone = PRIMARY Muzzle
      WeaponFireFXBone = SECONDARY WeaponA
      WeaponLaunchBone = SECONDARY WeaponA
      WeaponFireFXBone = TERTIARY  WeaponB
      WeaponLaunchBone = TERTIARY  WeaponB
    End

    ConditionState = REALLYDAMAGED
      Model = AVComanch_D
      Animation = AVComanch_D.AVComanch_D
      AnimationMode = LOOP
    End

    ConditionState = RUBBLE
      Model = AVComanch_D
      Animation = AVComanch_D.AVComanch_D
      AnimationMode = LOOP
    End

    ConditionState = RUBBLE SPECIAL_DAMAGED
      Model = AVComanch_D
      AnimationMode = MANUAL
      HideSubObject = AVComanche_Prop
    End
  End

  Draw = W3DModelDraw ModuleTag_OverGround
    ConditionState = NONE
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterDustRest
    End
    ConditionState = MOVING
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterDustActive
    End
    
    ConditionState = SNOW
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterSnowRest
    End
    ConditionState = SNOW MOVING
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterSnowActive
    End
    
    ConditionState = OVER_WATER
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterWaterWaveRest
      ParticleSysBone = GROUNDEF HelicopterWaterRest
    End
    AliasConditionState = SNOW OVER_WATER
    ConditionState = OVER_WATER MOVING
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterWaterWaveActive
      ParticleSysBone = GROUNDEF HelicopterWaterActive
    End
    AliasConditionState = SNOW OVER_WATER MOVING
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Comanche
  EditorSorting = VEHICLE
  Side = America
  TransportSlotCount = 0
  VisionRange = 200.0 
  ShroudClearingRange = 500
  Prerequisites
    Object = AmericaAirfield
    Object = AmericaStrategyCenter
    Object = AmericaTier1DummyObject
  End

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY XM301RotaryCannonWeapon
    Weapon = SECONDARY AGM114HellfireAntiTankMissileWeapon
    Weapon = TERTIARY 2xHydra70RocketPodWeapon
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
    AutoChooseSources = SECONDARY FROM_PLAYER FROM_SCRIPT FROM_AI
    AutoChooseSources = TERTIARY None
  End
  WeaponSet
    Conditions = HERO 
    Weapon = PRIMARY XM301RotaryCannonWeapon
    Weapon = SECONDARY AGM114HellfireAntiTankMissileWeapon
    Weapon = TERTIARY 2xHeroicHydra70RocketPodWeapon
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
    AutoChooseSources = SECONDARY FROM_PLAYER FROM_SCRIPT FROM_AI
    AutoChooseSources = TERTIARY None
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY XM301RotaryCannonWeapon
    Weapon = SECONDARY AGM114HellfireAntiTankMissileWeapon
    Weapon = TERTIARY 2xHydra70RocketPodWeapon
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
    AutoChooseSources = SECONDARY FROM_PLAYER FROM_SCRIPT FROM_AI
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE HERO 
    Weapon = PRIMARY XM301RotaryCannonWeapon
    Weapon = SECONDARY AGM114HellfireAntiTankMissileWeapon
    Weapon = TERTIARY 2xHeroicHydra70RocketPodWeapon
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
    AutoChooseSources = SECONDARY FROM_PLAYER FROM_SCRIPT FROM_AI
  End
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 1500
  BuildTime = 30.0
  ExperienceValue = 50 50 100 200
  ExperienceRequired = 0 200 400 800
  IsTrainable = Yes
  CommandSet = AmericaVehicleComancheCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = ComancheVoiceSelect
  VoiceMove = ComancheVoiceMove
  VoiceGuard = ComancheVoiceMove
  VoiceAttack = ComancheVoiceAttack
  SoundAmbient = ComancheAmbientLoop
  SoundAmbientRubble = NoSound
  UnitSpecificSounds
    VoiceCreate = ComancheVoiceCreate
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    VoiceGarrison = ComancheVoiceMove
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT PRODUCED_AT_HELIPAD
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = JetAIUpdate ModuleTag_AI01
    Turret
      TurretPitchRate = 15
      MinPhysicalPitch = -70
      AllowsPitch = Yes
      TurretTurnRate = 60
      ControlledWeaponSlots = PRIMARY
    End
    MinHeight = 5
    NeedsRunway = No
    KeepsParkingSpaceWhenAirborne = No
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL RAH66Locomotor
  Locomotor = SET_TAXIING BasicHelicopterTaxiLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 250.0
    AllowCollideForce = No
  End

  Behavior = FXListDie ModuleTag_Death01
    DeathFX = FX_ComancheStartDeath
  End

  Behavior = HelicopterSlowDeathBehavior ModuleTag_Death02
    DestructionDelay = 10000 
    SpiralOrbitTurnRate = 140.0 
    SpiralOrbitForwardSpeed = 350.0
    SpiralOrbitForwardSpeedDamping = .9999
    MaxBraking = 190 
    SoundDeathLoop = ComancheDamagedLoop
    MinSelfSpin = 100
    MaxSelfSpin = 300 
    SelfSpinUpdateDelay = 100 
    SelfSpinUpdateAmount = 10    
    FallHowFast = 12.0%
    MinBladeFlyOffDelay = 1500
    MaxBladeFlyOffDelay = 1500
    AttachParticle = SootySmokeTrail
    AttachParticleBone = Propeller02
    BladeObjectName = ComancheBlades
    BladeBoneName = Propeller01    
    OCLEjectPilot = OCL_EjectPilotViaParachute
    FXBlade = FX_HelicopterBladeExplosion
    OCLBlade = OCL_HelicopterBladeExplosion
    OCLHitGround = OCL_HelicopterHitGround
    FXFinalBlowUp = FX_GenericTankDeathExplosion
    OCLFinalBlowUp = OCL_GroundedHelicopterBlowUp
    DelayFromGroundToFinalDeath = 1500
    FinalRubbleObject = AmericaVehicleComanche_Rubble
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = CountermeasuresBehavior ModuleTag_Countermeasures01
    TriggeredBy = Upgrade_Countermeasures
    FlareTemplateName = CountermeasureFlare
    FlareBoneBaseName = Flare
    VolleySize = 3
    VolleyArcAngle = 60.0 
    VolleyVelocityFactor = 2.5 
    DelayBetweenVolleys = 250
    NumberOfVolleys = 5 
    ReloadTime = 10000
    EvasionRate = 33%
    ReactionLaunchLatency = 0 
    MissileDecoyDelay = 50
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_AdvTraining01
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 0.5
  End

  Behavior = CommandSetUpgrade ModuleTag_RocketPods01
    TriggeredBy = Upgrade_ComancheRocketPods Upgrade_ComancheRocketPodsAddon
    CommandSet = AmericaVehicleComancheUpgradedCommandSet
  End
  
  Behavior = SubObjectsUpgrade ModuleTag_RocketPods03
    TriggeredBy = Upgrade_ComancheRocketPods Upgrade_ComancheRocketPodsAddon
    ShowSubObjects = MissileUpgrade
  End

  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End
  
  Behavior = WeaponSetUpgrade ModuleTag_AIOnly01
    TriggeredBy = Upgrade_CommandSet_AIOnly Upgrade_ComancheRocketPods
    RequiresAllTriggers = Yes
  End
  
  Behavior = WeaponSetUpgrade ModuleTag_AIOnly02
    TriggeredBy = Upgrade_CommandSet_AIOnly Upgrade_ComancheRocketPodsAddon
    RequiresAllTriggers = Yes
  End
  
  Geometry = Box
  GeometryMajorRadius = 20.0
  GeometryMinorRadius = 3.0
  GeometryHeight = 25.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 45
End
