;------------------------------------------------------------------------------
Object AmericaJetA10Thunderbolt

  ; *** ART Parameters ***
  SelectPortrait = SAWarthog_L
  ButtonImage = SAWarthog
 
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo2 = Upgrade_Countermeasures
  UpgradeCameo3 = Upgrade_AmericaLaserMissiles
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes 
    ProjectileBoneFeedbackEnabledSlots = SECONDARY
    ExtraPublicBone = WeaponA01
    ExtraPublicBone = WeaponA02
    ExtraPublicBone = WeaponA03
    ExtraPublicBone = WeaponA04

    DefaultConditionState
      Model = AVA10_A
      Animation = AVA10_A.AVA10_A    
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponLaunchBone = PRIMARY Muzzle
      WeaponFireFXBone = SECONDARY WeaponA
      WeaponLaunchBone = SECONDARY WeaponA
      WeaponFireFXBone = TERTIARY WeaponB
      WeaponLaunchBone = TERTIARY WeaponB
      TransitionKey = TRANS_Idle
    End
    ConditionState = JETEXHAUST
      Flags = START_FRAME_FIRST
      ParticleSysBone = Wingtip01 JetContrailThin
      ParticleSysBone = Wingtip02 JetContrailThin
      TransitionKey = TRANS_Fly
    End
    ConditionState = JETEXHAUST JETAFTERBURNER
      Flags = START_FRAME_FIRST
      ParticleSysBone = Exhaust01 JetBlackTrailThin
      ParticleSysBone = Exhaust02 JetBlackTrailThin
      ParticleSysBone = Wingtip01 JetContrailThin
      ParticleSysBone = Wingtip02 JetContrailThin
      TransitionKey = TRANS_Deploy
    End

    ConditionState = REALLYDAMAGED
      Model = AVA10_AD
      Animation = AVA10_AD.AVA10_AD
      TransitionKey = TRANS_IdleReallyDamaged
    End
    ConditionState = JETEXHAUST REALLYDAMAGED
      Model = AVA10_AD
      Animation = AVA10_AD.AVA10_AD
      Flags = START_FRAME_FIRST
      ParticleSysBone = Wingtip01 JetContrailThin
      ParticleSysBone = Wingtip02 JetContrailThin
      TransitionKey = TRANS_FlyReallyDamaged
    End
    ConditionState = JETEXHAUST JETAFTERBURNER REALLYDAMAGED
      Model = AVA10_AD
      Animation = AVA10_AD.AVA10_AD
      Flags = START_FRAME_FIRST
      ParticleSysBone = Exhaust01 JetBlackTrailThin
      ParticleSysBone = Exhaust02 JetBlackTrailThin
      ParticleSysBone = Wingtip01 JetContrailThin
      ParticleSysBone = Wingtip02 JetContrailThin
      TransitionKey = TRANS_DeployReallyDamaged
    End

    ConditionState = RUBBLE
      Model = AVA10_AD
      Animation = AVA10_AD.AVA10_AD
      TransitionKey = TRANS_IdleReallyDamaged
    End

    TransitionState = TRANS_Idle TRANS_Deploy
      AnimationMode = ONCE_BACKWARDS
    End
    TransitionState = TRANS_Fly TRANS_Idle
      AnimationMode = ONCE
    End
    TransitionState = TRANS_IdleReallyDamaged TRANS_DeployReallyDamaged
      Model = AVA10_AD
      Animation = AVA10_AD.AVA10_AD
      AnimationMode = ONCE_BACKWARDS
    End
    TransitionState = TRANS_DeployReallyDamaged TRANS_IdleReallyDamaged
      Model = AVA10_AD
      Animation = AVA10_AD.AVA10_AD
      AnimationMode = ONCE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:A10Thunderbolt
  EditorSorting = VEHICLE
  Side = America
  TransportSlotCount  = 0
  VisionRange = 200.0 
  ShroudClearingRange = 400
  Prerequisites
    Object = AmericaAirfield
    Object = AmericaAdvancedLaboratory
    Object = AmericaTier2DummyObject
    Science = America_SCIENCE_AirSuperiorityTactics
  End
  WeaponSet
