    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_AI
    AutoChooseSources = SECONDARY FROM_AI
    AutoChooseSources = TERTIARY FROM_AI
  End
  WeaponSet
    Conditions = HERO 
    Weapon = PRIMARY GAU8VulcanCannonWeapon
    Weapon = SECONDARY AGM65MissileWeapon
    Weapon = TERTIARY 2xHeroicHydra70RocketPodWeapon_RTB
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_AI
    AutoChooseSources = SECONDARY FROM_AI
    AutoChooseSources = TERTIARY FROM_AI
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY GAU8VulcanCannonWeapon
    Weapon = SECONDARY AGM65MissileWeapon_ILG
    Weapon = TERTIARY 2xHydra70RocketPodWeapon_RTB
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_AI
    AutoChooseSources = SECONDARY FROM_AI
    AutoChooseSources = TERTIARY FROM_AI
  End
  WeaponSet
    Conditions = HERO PLAYER_UPGRADE
    Weapon = PRIMARY GAU8VulcanCannonWeapon
    Weapon = SECONDARY AGM65MissileWeapon_ILG
    Weapon = TERTIARY 2xHeroicHydra70RocketPodWeapon_RTB
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_AI
    AutoChooseSources = SECONDARY FROM_AI
    AutoChooseSources = TERTIARY FROM_AI
  End
  
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = TankDamageFX
  End

  BuildCost = 3000
  BuildTime = 45.0
  ExperienceValue = 100 150 200 400
  ExperienceRequired = 0 200 400 800
  IsTrainable = Yes
  CommandSet = AmericaJetA10ThunderboltCommandSet
  
  ; *** AUDIO Parameters ***
  VoiceSelect = RaptorVoiceSelect
  VoiceMove = RaptorVoiceMove
  VoiceAttack = RaptorVoiceAttack
  VoiceAttackAir = RaptorVoiceAttackAir
  VoiceGuard = RaptorVoiceAirPatrol
  SoundAmbient = A10ThunderboltAmbientLoop
  SoundAmbientRubble = NoSound
  UnitSpecificSounds
    VoiceCreate = RaptorVoiceCreate
    Afterburner = RaptorAfterburner
    VoiceLowFuel = RaptorVoiceLowFuel
    VoiceGarrison = RaptorVoiceMove
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK VEHICLE AIRCRAFT SCORE SELECTABLE
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 400.0
    InitialHealth = 400.0
  End

  Behavior = JetAIUpdate ModuleTag_AI01
    OutOfAmmoDamagePerSecond  = 10%
    TakeoffDistForMaxLift = 0%
    TakeoffPause = 5000
    MinHeight = 5
    ParkingOffset = 3
    ReturnToBaseIdleTime = 50000
  End
  Locomotor = SET_NORMAL A10ThunderboltLocomotor
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 500.0
    AllowCollideForce = No
  End

  Behavior = JetSlowDeathBehavior ModuleTag_Death01
    FXOnGroundDeath = FX_GenericTankDeathExplosion
    OCLOnGroundDeath = OCL_A10DeathFinalBlowUp
    DestructionDelay = 10000
    RollRate = 0.2
    RollRateDelta = 1%
    PitchRate = 0.0
    FallHowFast = 110.0%
    FXInitialDeath = FX_GenericAircraftDeathInitial
    OCLInitialDeath = None
    DelaySecondaryFromInitialDeath = 500
    FXSecondary = FX_JetDeathSecondary
    OCLHitGround = OCL_A10DeathHitGround
    DelayFinalBlowUpFromHitGround = 1000
    FXFinalBlowUp = FX_GenericJetDeathExplosion
    OCLFinalBlowUp = OCL_A10DeathFinalBlowUp
  End
  
  Behavior = EjectPilotDie ModuleTag_Death02
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
    ExemptStatus = HIJACKED IS_FIRING_WEAPON IS_AIMING_WEAPON USING_ABILITY AFLAME
    VeterancyLevels = ALL -REGULAR
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = CountermeasuresBehavior ModuleTag_Countermeasures01
    TriggeredBy = Upgrade_Countermeasures
    FlareTemplateName = CountermeasureFlare
    FlareBoneBaseName = Flare
    VolleySize = 3
    VolleyArcAngle = 90.0
    VolleyVelocityFactor = 2.5
    DelayBetweenVolleys = 1000
    NumberOfVolleys = 3
    ReloadTime = 5000
    EvasionRate = 35%
    ReactionLaunchLatency = 0
    MissileDecoyDelay = 50
  End

  Behavior = WeaponSetUpgrade ModuleTag_LaserGuide01
    TriggeredBy = Upgrade_AmericaLaserMissiles
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_AdvTraining01
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 0.5
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Exhaust01 RandomBone:No PSys:JetEngineDamagedSmoke
    ReallyDamagedParticleSystem2 = Bone:Exhaust01 RandomBone:No PSys:JetSmoke
    RubbleParticleSystem1 = Bone:Exhaust01 RandomBone:No PSys:JetEngineDamagedSmoke
    RubbleParticleSystem2 = Bone:Exhaust01 RandomBone:No PSys:JetSmoke
  End
    
  Geometry = Box
  GeometryIsSmall = Yes
  GeometryMajorRadius = 21.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 5.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End
