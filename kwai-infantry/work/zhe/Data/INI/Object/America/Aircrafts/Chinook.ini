;------------------------------------------------------------------------------
Object AmericaVehicleChinook

  ; *** ART Parameters ***
  SelectPortrait = SAChinook_L
  ButtonImage = SAChinook
  
  UpgradeCameo1 = Upgrade_Countermeasures
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DModelDraw ModuleTag_W3D01
    ExtraPublicBone = RopeStart
    ExtraPublicBone = RopeEnd
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = AVChinook
      Animation = AVChinook.AVChinook
      AnimationSpeedFactorRange = 1.5 1.5
      AnimationMode = LOOP
    End

    ConditionState = MOVING
    End

    ConditionState = REALLYDAMAGED
      Model = AVChinook_D
      Animation = AVChinook_D.AVChinook_D
      AnimationSpeedFactorRange = 1.5 1.5
      AnimationMode = LOOP
    End

    ConditionState = REALLYDAMAGED MOVING
      Model = AVChinook_D
      Animation = AVChinook_D.AVChinook_D
      AnimationSpeedFactorRange = 1.5 1.5
      AnimationMode = LOOP
    End

    ConditionState = RUBBLE
      Model = AVChinook_D
      Animation = AVChinook_D.AVChinook_D
      AnimationSpeedFactorRange = 1.5 1.5
      AnimationMode = LOOP
    End

    ConditionState = RUBBLE SPECIAL_DAMAGED
      Model = AVChinook_D
      Animation = AVChinook_D.AVChinook_D
      AnimationSpeedFactorRange = 1.0 1.0
      AnimationMode = LOOP
    End
  End

  Draw = W3DModelDraw ModuleTag_CargoNet
    ConditionState = NONE
      Model = None
      TransitionKey = TRANS_Empty
      WaitForStateToFinishIfPossible = TRANS_Unloading
    End

    ConditionState = DYING 
      Model = None
    End
    AliasConditionState = RUBBLE
    AliasConditionState = CARRYING RUBBLE
    AliasConditionState = DOCKING RUBBLE
    AliasConditionState = DOCKING CARRYING RUBBLE
 
     ConditionState = CARRYING
      ;Carrying a full wobbly net of stuff
      Model = AVChinook_A
      Animation = AVChinook_A.AVChinook_A
      AnimationMode = LOOP
      TransitionKey = TRANS_Full
      WaitForStateToFinishIfPossible = TRANS_PickingUp
    End

    ConditionState = DOCKING
     ;Lowering an empty net, pulling up with stuff
      Model = AVChinook_A1MSH
      Animation = AVChinook_A1SK.AVChinook_A1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
      AnimationSpeedFactorRange = 1.00 1.00
      TransitionKey = TRANS_PickingUp
      WaitForStateToFinishIfPossible = TRANS_Unloading
    End

    ConditionState = DOCKING CARRYING
     ; Lowering a full net, letting stuff fall out, and pulling up an empty net
      Model = AVChinook_A1MSH
      Animation = AVChinook_A1SK.AVChinook_A1
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.50 1.50
      TransitionKey = TRANS_Unloading
      WaitForStateToFinishIfPossible = TRANS_PickingUp
    End
  End

  Draw = W3DModelDraw ModuleTag_OverGround
    ConditionState = NONE
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterDustRest
    End
    ConditionState = MOVING
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterDustActive
    End
    
    ConditionState = SNOW
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterSnowRest
    End
    ConditionState = SNOW MOVING
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterSnowActive
    End
    
    ConditionState = OVER_WATER
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterWaterWaveRest
      ParticleSysBone = GROUNDEF HelicopterWaterRest
    End
    AliasConditionState = SNOW OVER_WATER
    ConditionState = OVER_WATER MOVING
      Model = AVChinookG
      ParticleSysBone = GROUNDEF HelicopterWaterWaveActive
      ParticleSysBone = GROUNDEF HelicopterWaterActive
    End
    AliasConditionState = SNOW OVER_WATER MOVING
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Chinook
  EditorSorting = VEHICLE
  Side = America
  TransportSlotCount = 0
  VisionRange = 200.0 
  ShroudClearingRange = 400
  Prerequisites
    Object = AmericaSupplyCenter
  End
  
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = TankDamageFX
  End

  BuildCost = 1500
  BuildTime = 30.0 
  ExperienceValue = 50 50 50 50
  IsTrainable = No  
  CommandSet = AmericaVehicleChinookCommandSet
  
  ; *** AUDIO Parameters ***
  VoiceSelect = ChinookVoiceSelect
  VoiceMove = ChinookVoiceMove
  VoiceAttack = ChinookVoiceAttack
  SoundAmbient = ChinookAmbientLoop
  SoundAmbientRubble = NoSound
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit
  UnitSpecificSounds
    VoiceCreate = ChinookVoiceCreate
    VoiceSupply = ChinookVoiceSupply
    VoiceUnload = ChinookVoiceUnload
    VoiceCombatDrop = ChinookVoiceCombatDrop
    VoiceClearBuilding = RangerVoiceClearBuilding
    VoiceGarrison = ChinookVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS SELECTABLE VEHICLE TRANSPORT AIRCRAFT HARVESTER SCORE PRODUCED_AT_HELIPAD
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 200.0
    InitialHealth = 200.0
  End

  Behavior = TransportContain ModuleTag_Contain01
    Slots = 8
    DamagePercentToUnits = 100%
    AllowInsideKindOf = INFANTRY VEHICLE
    ForbidInsideKindOf = AIRCRAFT HUGE_VEHICLE
    ExitDelay = 100
    NumberOfExitPaths = 3
  End

  Behavior = ChinookAIUpdate ModuleTag_AI01
    MaxBoxes = 8
    SupplyCenterActionDelay = 4500
    SupplyWarehouseActionDelay = 750
    SupplyWarehouseScanDistance = 700
    SuppliesDepletedVoice = ChinookVoiceSuppliesDepleted
    NumRopes = 4
    PerRopeDelayMin = 900
    PerRopeDelayMax = 1500
    RopeWidth = 0.5
    RopeColor = R:0 G:0 B:0
    RopeWobbleLen = 10
    RopeWobbleAmplitude = 0.33
    RopeWobbleRate = 180
    RopeFinalHeight = 10
    RappelSpeed = 30
    MinDropHeight = 40
    UpgradedSupplyBoost = 80
  End
  Locomotor = SET_NORMAL ChinookLocomotor
  Locomotor = SET_TAXIING BasicHelicopterTaxiLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 350.0
    AllowCollideForce = No
  End
  
  Behavior = FXListDie ModuleTag_Death01
    DeathFX = FX_HelicopterStartDeath
  End

  Behavior = HelicopterSlowDeathBehavior ModuleTag_Death02
    DestructionDelay = 10000
    SpiralOrbitTurnRate = 140.0
    SpiralOrbitForwardSpeed = 350.0
    SpiralOrbitForwardSpeedDamping = .9999
    MaxBraking = 190
    SoundDeathLoop = ComancheDamagedLoop
    MinSelfSpin = 100
    MaxSelfSpin = 300
    SelfSpinUpdateDelay = 100
    SelfSpinUpdateAmount = 10
    FallHowFast = 12.0%
    MinBladeFlyOffDelay = 1500
    MaxBladeFlyOffDelay = 1500
    AttachParticle = SootySmokeTrail
    AttachParticleBone = Propeller02
    BladeObjectName = ComancheBlades
    BladeBoneName = Propeller01    
    FXBlade = FX_HelicopterBladeExplosion
    OCLBlade = OCL_HelicopterBladeExplosion
    OCLHitGround = OCL_HelicopterHitGround
    FXFinalBlowUp = FX_GenericTankDeathExplosion
    OCLFinalBlowUp = OCL_GroundedHelicopterBlowUp
    DelayFromGroundToFinalDeath = 1500
    FinalRubbleObject = AmericaVehicleChinook_Rubble
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = CountermeasuresBehavior ModuleTag_Countermeasures01
    TriggeredBy = Upgrade_Countermeasures
    FlareTemplateName = CountermeasureFlare
    FlareBoneBaseName = Flare
    VolleySize = 3
    VolleyArcAngle = 60.0
    VolleyVelocityFactor = 2.5
    DelayBetweenVolleys = 250
    NumberOfVolleys = 5
    ReloadTime = 10000
    EvasionRate = 33%
    ReactionLaunchLatency = 0
    MissileDecoyDelay = 50
  End

  Geometry = Box
  GeometryMajorRadius = 20.0
  GeometryMinorRadius = 6.0
  GeometryHeight = 12.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 45
End
