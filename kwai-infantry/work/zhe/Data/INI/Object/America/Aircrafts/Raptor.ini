;------------------------------------------------------------------------------
Object AmericaJetRaptor

  ; *** ART Parameters ***
  SelectPortrait = SACRaptor_L
  ButtonImage = SACRaptor
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo2 = Upgrade_Countermeasures
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes
 
    DefaultConditionState
      Model = AVRaptor
      HideSubObject = BurnerFX01 BurnerFX02
      WeaponLaunchBone = SECONDARY WeaponA
      WeaponLaunchBone = TERTIARY WeaponA
    End
    ConditionState = JETEXHAUST
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = JETEXHAUST JETAFTERBURNER
      ShowSubObject = BurnerFX01 BurnerFX02
      ParticleSysBone = Engine01 GenericHeatEffect
      ParticleSysBone = Engine02 GenericHeatEffect
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End

    ConditionState = REALLYDAMAGED
      Model = AVRaptor_D
    End
    ConditionState = REALLYDAMAGED JETEXHAUST
      Model = AVRaptor_D
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = REALLYDAMAGED JETEXHAUST JETAFTERBURNER
      Model = AVRaptor_D
      ShowSubObject = BurnerFX01 BurnerFX02
      ParticleSysBone = Engine01 GenericHeatEffect
      ParticleSysBone = Engine02 GenericHeatEffect
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End

    ConditionState = RUBBLE
      Model = AVRaptor_D1B
      HideSubObject = None 
      ShowSubObject = None
      ParticleSysBone = Wingtip01 None
      ParticleSysBone = Wingtip02 None
    End
    ConditionState = RUBBLE JETEXHAUST JETAFTERBURNER
      Model = AVRaptor_D1B    
      HideSubObject = None 
      ShowSubObject = None
      ParticleSysBone = Wingtip01 None
      ParticleSysBone = Wingtip02 None
      ParticleSysBone = Engine01 GenericHeatEffect
      ParticleSysBone = Engine02 GenericHeatEffect
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Raptor
  EditorSorting = VEHICLE
  Side = America
  TransportSlotCount = 0
  VisionRange = 200.0 
  ShroudClearingRange = 400
  Prerequisites
    Object = AmericaAirfield
    Object = AmericaStrategyCenter
    Object = AmericaTier1DummyObject
    Science = America_SCIENCE_AirSuperiorityTactics
  End
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY M61A2RotaryCannonWeapon
    Weapon = SECONDARY 6xAIM120AMRAAMWeapon
    Weapon = TERTIARY 2xAIM9SidewinderWeapon
    AutoChooseSources = PRIMARY FROM_AI
    AutoChooseSources = SECONDARY FROM_AI
    AutoChooseSources = TERTIARY FROM_AI
  End
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = TankDamageFX
  End

  BuildCost = 2000
  BuildTime = 30.0
  ExperienceValue = 50 50 100 200
  ExperienceRequired = 0 200 400 800
  IsTrainable = Yes
  CrusherLevel = 1
  CrushableLevel = 2
  CommandSet = AmericaJetRaptorCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = RaptorVoiceSelect
  VoiceMove = RaptorVoiceMove
  VoiceAttack = RaptorVoiceAttack
  VoiceAttackAir = RaptorVoiceAttackAir
  VoiceGuard = RaptorVoiceAirPatrol
  SoundAmbient = RaptorAmbientLoop
  SoundAmbientRubble = NoSound
  UnitSpecificSounds
    VoiceCreate = RaptorVoiceCreate
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    Afterburner = RaptorAfterburner
    VoiceLowFuel = RaptorVoiceLowFuel
    VoiceGarrison = RaptorVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 200.0
    InitialHealth = 200.0
  End

  Behavior = JetSlowDeathBehavior ModuleTag_Death01
    FXOnGroundDeath = FX_GenericTankDeathExplosion
    OCLOnGroundDeath = OCL_RaptorDeathFinalBlowUp
    DestructionDelay = 10000
    RollRate = 0.2
    RollRateDelta = 1%
    PitchRate = 0.0
    FallHowFast = 110.0%
    FXInitialDeath = FX_RaptorDeathInitial
    OCLInitialDeath = OCL_RaptorDeathInitial
    DelaySecondaryFromInitialDeath = 500
    FXSecondary = FX_JetDeathSecondary
    OCLHitGround = OCL_RaptorDeathHitGround
    DelayFinalBlowUpFromHitGround = 1000
    FXFinalBlowUp = FX_GenericJetDeathExplosion
    OCLFinalBlowUp = OCL_RaptorDeathFinalBlowUp
  End
  
  Behavior = EjectPilotDie ModuleTag_Death02
    ExemptStatus = HIJACKED IS_FIRING_WEAPON IS_AIMING_WEAPON USING_ABILITY AFLAME
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
    VeterancyLevels = ALL -REGULAR
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 300.0
    AllowCollideForce = No
  End

  Behavior = JetAIUpdate ModuleTag_AI01
    OutOfAmmoDamagePerSecond = 10% 
    TakeoffDistForMaxLift = 0%
    TakeoffPause = 5000
    MinHeight = 5
    ParkingOffset = 3
    ReturnToBaseIdleTime = 50000
  End
  Locomotor = SET_NORMAL F22ALocomotor
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = CountermeasuresBehavior ModuleTag_Countermeasures01
    TriggeredBy = Upgrade_Countermeasures
    FlareTemplateName = CountermeasureFlare
    FlareBoneBaseName = Flare
    VolleySize = 3
    VolleyArcAngle = 90.0
    VolleyVelocityFactor = 2.5
    DelayBetweenVolleys = 500
    NumberOfVolleys = 3
    ReloadTime = 5000
    EvasionRate = 35%
    ReactionLaunchLatency = 0
    MissileDecoyDelay = 50
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_AdvTraining01
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 0.5
  End

  Behavior = StealthUpdate ModuleTag_Stealth01
    StealthDelay = 2000
    RequiredStatus = AIRBORNE_TARGET
    StealthForbiddenConditions = FIRING_PRIMARY TAKING_DAMAGE
    RevealDistanceFromTarget = 200.0f
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke01 RandomBone:No PSys:JetEngineDamagedSmoke
    ReallyDamagedParticleSystem2 = Bone:Engine01 RandomBone:No PSys:JetSmoke
    RubbleParticleSystem1 = Bone:Smoke01 RandomBone:No PSys:JetEngineDamagedSmoke
    RubbleParticleSystem2 = Bone:Engine01 RandomBone:No PSys:JetSmoke
  End
    
  Geometry = Box
  GeometryIsSmall = Yes
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 5.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End

;------------------------------------------------------------------------------
