;------------------------------------------------------------------------------
Object AmericaVehicleAvenger

  ; *** ART Parameters ***
  SelectPortrait = SAAvnger_L
  ButtonImage = SAAvnger
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTruckDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = AVANTWQ1
      Turret = Turret
      TurretPitch = TurretAltEL
      AltTurretPitch = TurretEL
      HideSubObject = MuzzleFX01
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponLaunchBone = PRIMARY Muzzle
      WeaponFireFXBone = SECONDARY WeaponB
      WeaponMuzzleFlash = SECONDARY IgnitionFX
      WeaponLaunchBone = SECONDARY WeaponB
    End
    
    ConditionState = MOVING
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    ConditionState = DAMAGED
      Model = AVANTWQ1_D
    End
    
    ConditionState = DAMAGED MOVING
      Model = AVANTWQ1_D
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = AVANTWQ1_E
    End
    
    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = AVANTWQ1_E
      ParticleSysBone = Engine01 VehicleSmoke
    End
    
    ConditionState = RIDER2
      WeaponFireFXBone = TERTIARY Muzzle
      WeaponLaunchBone = TERTIARY Muzzle
    End
    
    ConditionState = RIDER2 MOVING
      ParticleSysBone = Engine01 VehicleSmoke
      WeaponFireFXBone = TERTIARY Muzzle
      WeaponLaunchBone = TERTIARY Muzzle
    End
    
    ConditionState = RIDER2 DAMAGED
      Model = AVANTWQ1_D
      WeaponFireFXBone = TERTIARY Muzzle
      WeaponLaunchBone = TERTIARY Muzzle
    End
    
    ConditionState = RIDER2 DAMAGED MOVING
      Model = AVANTWQ1_D
      ParticleSysBone = Engine01 VehicleSmoke
      WeaponFireFXBone = TERTIARY Muzzle
      WeaponLaunchBone = TERTIARY Muzzle
    End
    
    ConditionState = RIDER2 REALLYDAMAGED RUBBLE
      Model = AVANTWQ1_E
      WeaponFireFXBone = TERTIARY Muzzle
      WeaponLaunchBone = TERTIARY Muzzle
    End
    
    ConditionState = RIDER2 REALLYDAMAGED RUBBLE MOVING
      Model = AVANTWQ1_E
      ParticleSysBone = Engine01 VehicleSmoke
      WeaponFireFXBone = TERTIARY Muzzle
      WeaponLaunchBone = TERTIARY Muzzle
    End
    
    TrackMarks = EXTireTrack.dds
    LeftFrontTireBone = Wheel01
    RightFrontTireBone = Wheel03
    LeftRearTireBone = Wheel02
    RightRearTireBone = Wheel04
    TireRotationMultiplier = 0.2 
    PowerslideRotationAddition = 1.25 
  End

  Draw = W3DModelDraw ModuleTag_MuzzleFX01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = None
    End
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE
    AliasConditionState = RIDER2
    AliasConditionState = RIDER2 WEAPONSET_PLAYER_UPGRADE
    
    ConditionState = FIRING_A
      Model = AVANTWQ1_MGFX
      Turret = Turret
      TurretPitch = TurretAltEL
    End
    AliasConditionState = RIDER2 FIRING_C
  End

  Draw = W3DModelDraw ModuleTag_Deploy
    DefaultConditionState
      Model = None
    End
    AliasConditionState = DAMAGED
    AliasConditionState = REALLYDAMAGED RUBBLE
    AliasConditionState = RIDER2 RUBBLE
    
    ConditionState = RIDER2
      Model = EXDeploy
    End
    AliasConditionState = RIDER2 DAMAGED
    AliasConditionState = RIDER2 REALLYDAMAGED
  End
  
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Avenger
  Side = America
  EditorSorting = VEHICLE
  TransportSlotCount = 4
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY M2CoaxialHeavyMachineGunWeapon
    Weapon = SECONDARY 4xFIM92MissileWeapon
    PreferredAgainst = PRIMARY INFANTRY
  End
  WeaponSet
    Conditions = WEAPON_RIDER1 
    Weapon = PRIMARY M2CoaxialHeavyMachineGunWeapon
    Weapon = SECONDARY 4xFIM92MissileWeapon
    PreferredAgainst = PRIMARY INFANTRY
  End
  WeaponSet
    Conditions = WEAPON_RIDER2 
    Weapon = SECONDARY 4xFIM92MissileWeaponAir
    Weapon = TERTIARY M2CoaxialHeavyMachineGunWeaponAir
  End
  
  ArmorSet
    Conditions = None
    Armor = HMMWVArmor
    DamageFX = TruckDamageFX
  End
  
  BuildCost = 1200
  BuildTime = 25.0 
  VisionRange = 500
  ShroudClearingRange = 200
  Prerequisites
    Object = AmericaWarFactory
    Object = AmericaStrategyCenter
    Object = AmericaTier1DummyObject
  End
  ExperienceValue = 100 100 200 400 
  ExperienceRequired = 0 200 400 800
  IsTrainable = Yes
  CrusherLevel = 0
  CrushableLevel = 2
  CommandSet = AmericaVehicleAvengerCommandSet
    
  ; *** AUDIO Parameters ***
  VoiceSelect = AvengerVoiceSelect
  VoiceMove = AvengerVoiceMove
  VoiceGuard = AvengerVoiceMove
  VoiceAttack = AvengerVoicePaint
  VoiceAttackAir = AvengerVoiceAttack
  SoundMoveLoop = 4wVehicleV1MoveLoop
  SoundAmbient = 4wVehicleV1AmbientLoop

  UnitSpecificSounds
    VoiceCreate = AvengerVoiceCreate
    TurretMoveLoop = TurretMoveLoop
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    VoiceCrush = NoSound
    VoiceEnter = AvengerVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE SALVAGER ATTACK_NEEDS_LINE_OF_SIGHT
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
    SubdualDamageCap = 1000
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      ControlledWeaponSlots = PRIMARY TERTIARY
      TurretTurnRate = 90
      TurretPitchRate = 90
      AllowsPitch = Yes
      FiresWhileTurning = Yes
    End
    AltTurret
      ControlledWeaponSlots = SECONDARY
      TurretTurnRate = 90
      TurretPitchRate = 90
      AllowsPitch = Yes
      FiresWhileTurning = Yes
    End
    MoodAttackCheckRate = 250
    AutoAcquireEnemiesWhenIdle = Yes NotWhileAttacking
  End
  Locomotor = SET_NORMAL ANTWQ1Locomotor
  Locomotor = SET_SLUGGISH StationaryLocomotor
  
  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 50.0
  End
  
  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End

  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_AmericaVehicleAvenger_CrushEffect
  End
  
  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL OCL_AmericaVehicleAvenger_DeathEffect_BlowUp
    FX = FINAL FX_GenericVehicleDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 20000
    OCL = INITIAL OCL_AmericaVehicleAvenger_CatchFire
    OCL = FINAL OCL_AmericaVehicleAvenger_DeathEffect  
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 60
    ModifierBonusPerOverkillPercent = 20%
    DestructionDelay = 150
    DestructionDelayVariance = 250
    OCL = FINAL OCL_AmericaVehicleAvenger_DeathEffect
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 1
    AflameDamageDelay = 500
  End

  Behavior = FireWeaponUpdate ModuleTag_Move01
    Weapon = Ingenious4WheelsVehicleMovementWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move02
    Weapon = IngeniousVehicleCheckerWeapon
  End
  
  Behavior = RiderChangeContain ModuleTag_Upgrade01
    Rider1 = UpgradeViaRiderSwitch1 RIDER1 WEAPON_RIDER1 STATUS_RIDER1 AmericaVehicleAvengerAGModeCommandSet SET_NORMAL
    Rider2 = UpgradeViaRiderSwitch2 RIDER2 WEAPON_RIDER2 STATUS_RIDER2 AmericaVehicleAvengerAAModeCommandSet SET_SLUGGISH

    InitialPayload = UpgradeViaRiderSwitch1 1
    ScuttleDelay = 0
    Slots = 1
    ScatterNearbyOnExit = No
    HealthRegen%PerSec = 0%
    DamagePercentToUnits = 0%
    BurnedDeathToUnits = No
    AllowInsideKindOf = INFANTRY
    ExitDelay = 0
    NumberOfExitPaths = 1
    GoAggressiveOnExit = No
    DoorOpenTime = 0
  End
  
  Behavior = OCLSpecialPower ModuleTag_Upgrade02
    SpecialPowerTemplate = SpecialAbilityAntiGroundMode
    OCL = OCL_UpgradeViaRiderSwitch1
  End

  Behavior = OCLSpecialPower ModuleTag_Upgrade03
    SpecialPowerTemplate = SpecialAbilityAntiAirMode
    OCL = OCL_UpgradeViaRiderSwitch2
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_AdvTraining01
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 0.5
  End
  
  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  ; --- end detector modules ---
  
  Geometry = Box
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 14.0      
  GeometryIsSmall = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45 
End
