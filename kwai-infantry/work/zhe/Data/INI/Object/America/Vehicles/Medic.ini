    End
    ConditionState = PACKING REALLYDAMAGED RUBBLE
      Model = AVM1151M_A2E
      Animation = AVM1151M_A2E.AVM1151M_A2E
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    ConditionState = PACKING SNOW
      Model = AVM1151M_A2S
