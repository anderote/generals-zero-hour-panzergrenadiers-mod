    End
    ConditionState = DOOR_1_OPENING
      AnimationMode = ONCE
    End
    ConditionState = DOOR_1_WAITING_OPEN
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = DOOR_1_CLOSING
      AnimationMode = ONCE_BACKWARDS
    End
    
    ConditionState = DAMAGED
      Model = AVM1151_A1D
      Animation = AVM1151_A1D.AVM1151_A1D
      AnimationMode = MANUAL
    End
    ConditionState = DAMAGED DOOR_1_OPENING
      Model = AVM1151_A1D
      Animation = AVM1151_A1D.AVM1151_A1D
      AnimationMode = ONCE
    End
    ConditionState = DAMAGED DOOR_1_WAITING_OPEN
      Model = AVM1151_A1D
      Animation = AVM1151_A1D.AVM1151_A1D
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = DAMAGED DOOR_1_CLOSING
      Model = AVM1151_A1D
      Animation = AVM1151_A1D.AVM1151_A1D
      AnimationMode = ONCE_BACKWARDS
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = AVM1151_A1E
      Animation = AVM1151_A1E.AVM1151_A1E
      AnimationMode = MANUAL
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_OPENING
      Model = AVM1151_A1E
      Animation = AVM1151_A1E.AVM1151_A1E
      AnimationMode = ONCE
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_WAITING_OPEN
      Model = AVM1151_A1E
      Animation = AVM1151_A1E.AVM1151_A1E
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End
    ConditionState = REALLYDAMAGED RUBBLE DOOR_1_CLOSING
      Model = AVM1151_A1E
      Animation = AVM1151_A1E.AVM1151_A1E
      AnimationMode = ONCE_BACKWARDS
    End
  End

  Draw = W3DModelDraw ModuleTag_Deploy
    OkToChangeModelColor = Yes
    
    ConditionState = NONE
      Model = None
    End
    AliasConditionState = DAMAGED
    AliasConditionState = REALLYDAMAGED RUBBLE
    AliasConditionState = SNOW
    AliasConditionState = DAMAGED SNOW
    AliasConditionState = REALLYDAMAGED RUBBLE SNOW
    
    ConditionState = DEPLOYED
      Model = AVM1151M_A1
      Animation = AVM1151M_A1.AVM1151M_A1
      AnimationMode = LOOP
    End
    ConditionState = DEPLOYED DAMAGED
      Model = AVM1151M_A1D
      Animation = AVM1151M_A1D.AVM1151M_A1D
      AnimationMode = LOOP
    End
    ConditionState = DEPLOYED REALLYDAMAGED RUBBLE
      Model = AVM1151M_A1E
      Animation = AVM1151M_A1E.AVM1151M_A1E
      AnimationMode = LOOP
    End
    ConditionState = DEPLOYED SNOW
      Model = AVM1151M_A1S
