    DestructionDelay = 20000
    OCL = INITIAL OCL_AmericaVehicleStrykerICV_CatchFire
    OCL = FINAL OCL_AmericaVehicleStrykerICV_DeathEffect  
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 80
    ModifierBonusPerOverkillPercent = 20%
    DestructionDelay = 150
    DestructionDelayVariance = 250
    OCL = FINAL OCL_AmericaVehicleStrykerICV_DeathEffect
    FX = FINAL FX_GenericVehicleDeathExplosion
  End
  
