;----------------------------------------------------------
Object AmericaVehicleTomahawk

  ; *** ART Parameters ***
  SelectPortrait = SACTomahawk_L
  ButtonImage = SACTomahawk
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTankDraw ModuleTag_W3D01
    ProjectileBoneFeedbackEnabledSlots = PRIMARY SECONDARY
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = AVBGM109G
      Turret = Turret
      TurretPitch = TurretEL
      HideSubObject = IgnitionAFX01
      WeaponFireFXBone = PRIMARY WeaponAFX
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponHideShowBone = PRIMARY WeaponA01
      WeaponFireFXBone = SECONDARY WeaponAFX
      WeaponLaunchBone = SECONDARY WeaponA
      WeaponHideShowBone = SECONDARY WeaponA01
      TransitionKey = TRANS_None
    End
    
    ConditionState = MOVING
      ParticleSysBone = Engine01 VehicleSmokeWithExhaust
      TransitionKey = TRANS_None
    End
    
    ConditionState = DAMAGED
      Model = AVBGM109G_D
      TransitionKey = TRANS_None
    End
    
    ConditionState = DAMAGED MOVING
      Model = AVBGM109G_D
      ParticleSysBone = Engine01 VehicleSmokeWithExhaust
      TransitionKey = TRANS_None
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = AVBGM109G_E
      Animation = AVBGM109G_E.AVBGM109G_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      TransitionKey = TRANS_ReallyDamaged
    End
    
    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = AVBGM109G_E
      Animation = AVBGM109G_E.AVBGM109G_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Engine01 VehicleSmokeWithExhaust
      TransitionKey = TRANS_ReallyDamaged
    End
    
    TransitionState = TRANS_None TRANS_ReallyDamaged
      Model = AVBGM109G_E1
      Animation = AVBGM109G_E1.AVBGM109G_E1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_ReallyDamaged TRANS_None
      Model = AVBGM109G_E1
      Animation = AVBGM109G_E1.AVBGM109G_E1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    ExtraPublicBone = TreadFX01
    ExtraPublicBone = TreadFX02
    ExtraPublicBone = TreadFX03
    ExtraPublicBone = TreadFX04
    
    TrackMarks = AVTnkTracks.dds
    TreadAnimationRate = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  Draw = W3DModelDraw ModuleTag_W3D02
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = AVBGM109G_A1
      Turret = Turret
      TurretPitch = TurretEL
      HideSubObject = IgnitionAFX01
    End
    
    ConditionState = FIRING_A
      Model = AVBGM109G_A1
      Animation = AVBGM109G_A1.AVBGM109G_A1
      AnimationMode = ONCE
      ShowSubObject = IgnitionAFX01
    End
    AliasConditionState = FIRING_B
  End
    
  Draw = W3DModelDraw ModuleTag_Deploy
    DefaultConditionState
      Model = None
    End
    AliasConditionState = DAMAGED
    AliasConditionState = REALLYDAMAGED RUBBLE
    AliasConditionState = DEPLOYED RUBBLE
    
    ConditionState = DEPLOYED
      Model = EXDeploy
    End
    AliasConditionState = DEPLOYED DAMAGED
    AliasConditionState = DEPLOYED REALLYDAMAGED
  End
  
  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model = None
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Tomahawk
  Side = America
  EditorSorting = VEHICLE
  TransportSlotCount = 8 
  BuildCost = 3500
  BuildTime = 60.0 
  VisionRange = 150
  ShroudClearingRange = 150
  Prerequisites
    Object = AmericaWarFactory
    Object = AmericaAdvancedLaboratory
    Object = AmericaTier2DummyObject
    Science = America_SCIENCE_TomahawkLauncher
  End
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY BGM109GCruiseMissileWeapon_GPSGuided
    Weapon = SECONDARY BGM109GCruiseMissileWeapon
    Weapon = TERTIARY BGM109GELTRangeIndicatorDummyWeapon
    PreferredAgainst = PRIMARY VEHICLE
    PreferredAgainst = SECONDARY INFANTRY STRUCTURE AIRCRAFT
    AutoChooseSources = TERTIARY None
    ShareWeaponReloadTime = Yes
  End
 
  ArmorSet
    Conditions = None
    Armor = APCArmor
    DamageFX = TankDamageFX
  End
 
  ExperienceValue = 150 175 225 325
  ExperienceRequired = 0 750 1000 1500
  IsTrainable = Yes 
  CrusherLevel = 2 
  CrushableLevel = 2 
  MaxSimultaneousOfType = 2
  MaxSimultaneousLinkKey = HeavyVehicleArtillery_Limit
  CommandSet = AmericaVehicleTomahawkCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = TomahawkVoiceSelect
  VoiceMove = TomahawkVoiceMove
  VoiceGuard = TomahawkVoiceMove
  VoiceAttack = TomahawkVoiceAttack
  SoundMoveLoop = AmericaTankV1MoveLoop
  SoundAmbient = AmericaTankV1AmbientLoop
  
  UnitSpecificSounds
    VoiceCreate = TomahawkVoiceCreate
    TurretMoveLoop = TurretMoveLoop
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    VoiceCrush = TomahawkVoiceCrush
    VoiceEnter = TomahawkVoiceMove
    VoiceBombard = TomahawkVoiceAttack
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE DONT_AUTO_CRUSH_INFANTRY CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE HUGE_VEHICLE SCORE SALVAGER

  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 250.0
    InitialHealth = 250.0
    SubdualDamageCap = 360
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = DeployStyleAIUpdate ModuleTag_AI01
    Turret
      TurretTurnRate = 20 
      TurretPitchRate = 15
      FirePitch = 50
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      InitiallyDisabled = Yes
    End
    AutoAcquireEnemiesWhenIdle = No NotWhileAttacking
    PackTime = 50
    UnpackTime = 50
    TurretsFunctionOnlyWhenDeployed = Yes
    TurretsMustCenterBeforePacking = Yes
    ManualDeployAnimations = Yes
  End
  Locomotor = SET_NORMAL BGM190GTELLocomotor

  Behavior = CommandButtonHuntUpdate ModuleTag_AI02
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 75.0
  End

  ; A crushing defeat
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_AmericaVehicleTomahawk_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL OCL_AmericaVehicleTomahawk_DeathEffect_BlowUp
    FX = FINAL FX_GenericTankDeathExplosion
  End

  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 60
    DestructionDelay = 100
    DestructionDelayVariance  = 50
    OCL = FINAL OCL_AmericaVehicleTomahawk_DeathEffect
    FX = FINAL FX_GenericTankDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 30000
    OCL = INITIAL OCL_AmericaVehicleTomahawk_CatchFire
    FX = INITIAL FX_GenericTankCatchFire
    OCL = FINAL OCL_AmericaVehicleTomahawk_DeathEffect
    FX = FINAL FX_GenericTankDeathExplosion
  End

  Behavior = EjectPilotDie ModuleTag_Death04
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
    ExemptStatus = HIJACKED IS_FIRING_WEAPON IS_AIMING_WEAPON USING_ABILITY AFLAME
    VeterancyLevels = ALL -REGULAR
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000 
    AflameDamageAmount = 3 
    AflameDamageDelay = 500 
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_AdvTraining01
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 0.5
  End

  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  ; --- end detector modules ---
  
  Geometry = Box
  GeometryMajorRadius = 18.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 22.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME 
  ShadowSizeX = 45  
End

;------------------------------------------------------------------------------
Object BGM109GELTRangeIndicatorOCLUpdateObject

  ; ***DESIGN parameters ***
  EditorSorting = SYSTEM
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = None
  End
  
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD NO_COLLIDE IGNORED_IN_GUI UNATTACKABLE IMMOBILE ALWAYS_VISIBLE 
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = DeletionUpdate ModuleTag_Delete01
    MinLifetime = 10
    MaxLifetime = 10
  End
  
  Behavior = OCLUpdate ModuleTag_OCL01
    OCL = OCL_BGM109GELTRangeIndicatorDecal
    MinDelay = 0
    MaxDelay = 0
    CreateAtEdge = Yes
  End
End
