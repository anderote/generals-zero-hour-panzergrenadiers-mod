      TransitionKey = TRANS_None
    End
    AliasConditionState = DAMAGED FIRING_A
    AliasConditionState = DAMAGED BETWEEN_FIRING_SHOTS_A
    AliasConditionState = DAMAGED FIRING_B
    AliasConditionState = DAMAGED BETWEEN_FIRING_SHOTS_B
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = AVMRRecon_E
      Animation = AVMRRecon_E.AVMRRecon_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      TransitionKey = TRANS_ReallyDamaged
    End
    AliasConditionState = REALLYDAMAGED RUBBLE FIRING_A
    AliasConditionState = REALLYDAMAGED RUBBLE BETWEEN_FIRING_SHOTS_A
    AliasConditionState = REALLYDAMAGED RUBBLE FIRING_B
    AliasConditionState = REALLYDAMAGED RUBBLE BETWEEN_FIRING_SHOTS_B
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      Model = AVMRSentry
      HideSubObject = MuzzleFX01 Ammo02
