      HideSubObject = MuzzleFX01 Ammo02
      ShowSubObject = Ammo01
      TransitionKey = TRANS_Upgraded
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE DAMAGED FIRING_A
      Model = AVMRSentry_D
      HideSubObject = MuzzleFX01 Ammo01
      ShowSubObject = Ammo02
      TransitionKey = TRANS_Upgraded
    End
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE DAMAGED BETWEEN_FIRING_SHOTS_A
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE DAMAGED FIRING_B
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE DAMAGED BETWEEN_FIRING_SHOTS_B
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED RUBBLE
      Model = AVMRSentry_E
      Animation = AVMRSentry_E.AVMRSentry_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      HideSubObject = MuzzleFX01 Ammo02
      ShowSubObject = Ammo01
      TransitionKey = TRANS_Upgraded_ReallyDamaged
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED RUBBLE FIRING_A
      Model = AVMRSentry_E
      Animation = AVMRSentry_E.AVMRSentry_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      HideSubObject = MuzzleFX01 Ammo01
      ShowSubObject = Ammo02
      TransitionKey = TRANS_Upgraded_ReallyDamaged
    End
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED RUBBLE BETWEEN_FIRING_SHOTS_A
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED RUBBLE FIRING_B
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED RUBBLE BETWEEN_FIRING_SHOTS_B
    
    TransitionState = TRANS_None TRANS_ReallyDamaged
      Model = AVMRRecon_E1
      Animation = AVMRRecon_E1.AVMRRecon_E1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_ReallyDamaged TRANS_None
      Model = AVMRRecon_E1
      Animation = AVMRRecon_E1.AVMRRecon_E1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    TransitionState = TRANS_Upgraded TRANS_Upgraded_ReallyDamaged
      Model = AVMRSentry_E1
      Animation = AVMRSentry_E1.AVMRSentry_E1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      HideSubObject = MuzzleFX01 Ammo02
    End
    TransitionState = TRANS_Upgraded_ReallyDamaged TRANS_Upgraded
      Model = AVMRSentry_E1
      Animation = AVMRSentry_E1.AVMRSentry_E1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
      HideSubObject = MuzzleFX01 Ammo02
    End
    
    TrackMarks = AVTnkTracks.dds
    TreadAnimationRate = 1.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

