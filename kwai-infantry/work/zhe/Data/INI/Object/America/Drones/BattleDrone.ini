;------------------------------------------------------------------------------
Object AmericaVehicleBattleDrone

  ; *** ART Parameters ***
  SelectPortrait = SABattleDrone_L
  ButtonImage = SABattleDrone
  
  UpgradeCameo1 = Upgrade_AmericaDroneArmor
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  ;MAIN CHASSIS
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = AVBATTLEDR
      Animation = AVBATTLEDR.AVBATTLEDR
      AnimationMode = LOOP
      Turret = Turret01
      TurretPitch = TurretEL01
      WeaponMuzzleFlash = PRIMARY TurretFX01
      WeaponFireFXBone = PRIMARY Muzzle01
      WeaponLaunchBone = PRIMARY Muzzle01
    End

    ConditionState = REALLYDAMAGED
      Model = AVBATTLEDR_D
      Animation = AVBATTLEDR_D.AVBATTLEDR_D
      AnimationMode = LOOP
    End
  End

  ;EXTENDING ARM (FOR REPAIRING)
  Draw = W3DModelDraw ModuleTag_W3D02
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = AVBATTLEDR_A
    End

    ;Unloading the arm (before starting to repair)
    ConditionState = UNPACKING
      Animation = AVBATTLEDR_A1.AVBATTLEDR_A1
      AnimationMode = ONCE
    End

    ;Loading the arm (after reparing complete)
    ConditionState = PACKING
      Animation = AVBATTLEDR_A1.AVBATTLEDR_A1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End

    ;Repair extending animation 1 (using bogus condition states -- doesn't justify making a whole new set)
    ConditionState = FIRING_B
      Animation = AVBATTLEDR_A2.AVBATTLEDR_A2
      AnimationMode = ONCE
      ParticleSysBone = Turret01 RepairFlare
    End


    ;Repair retracting animation 1 (using bogus condition states -- doesn't justify making a whole new set)
    ConditionState = FIRING_C
      Animation = AVBATTLEDR_A2.AVBATTLEDR_A2
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End

  End


  ; ***DESIGN parameters ***
  DisplayName = OBJECT:BattleDrone
  Side = America
  EditorSorting = VEHICLE
  TransportSlotCount = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  ArmorSet
    Conditions = None
    Armor = DroneArmor
    DamageFX = TruckDamageFX
  End
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = DroneArmorUpgraded
    DamageFX = TruckDamageFX
  End

  BuildCost = 300
  BuildTime = 10.0          ;in seconds    
  VisionRange = 150
  ShroudClearingRange = 150
  Prerequisites
    Object = AmericaWarFactory
  End
  ExperienceValue = 10 10 10 10 ;Experience point value at each level
  IsTrainable = No
  
  ; *** AUDIO Parameters ***
  VoiceSelect = NoSound
  VoiceMove = NoSound
  VoiceAttack = NoSound
  SoundMoveStart = NoSound

  UnitSpecificSounds
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS VEHICLE SELECTABLE CAN_ATTACK DRONE NO_SELECT
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      TurretTurnRate = 360
      TurretPitchRate = 360
      MinPhysicalPitch = -75
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL BattleDroneLocomotor
  Locomotor = SET_PANIC BattleDronePanicLocomotor 
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 50.0
    KillWhenRestingOnGround = Yes
    AllowBouncing = No
  End

  Behavior = SlavedUpdate ModuleTag_07
    GuardMaxRange = 35  
    GuardWanderRange = 35 
    AttackRange = 10  
    AttackWanderRange = 10 
    ScoutRange = 35 
    ScoutWanderRange = 10
    RepairRange = 8
    RepairMinAltitude = 18.0 
    RepairMaxAltitude = 24.0 
    RepairRatePerSecond = 1.0
    RepairWhenBelowHealth% = 99
    RepairMinReadyTime = 300
    RepairMaxReadyTime = 750
    RepairMinWeldTime = 750
    RepairMaxWeldTime = 750
    RepairWeldingSys = RepairSparksFragments
    RepairWeldingFXBone = Turret01
    StayOnSameLayerAsMaster = Yes
  End

  Behavior = DestroyDie ModuleTag_Death01
    DeathTypes = ALL
  End
  
  Behavior = CreateObjectDie  ModuleTag_09
    DeathTypes = ALL
    CreationList = OCL_AmericaBattleDrone_DeathEffect
  End
  
  Behavior = TransitionDamageFX ModuleTag_10
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End
  
  Behavior = FXListDie ModuleTag_11
    DeathTypes = ALL
    ;DeathFX = FX_AmericaBattleDroneExplode
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3 
    AflameDamageDelay = 500 
  End
  
  Behavior = ArmorUpgrade ModuleTag_Armour01
    TriggeredBy = Upgrade_AmericaDroneArmor
  End


  Geometry = Cylinder
  GeometryMajorRadius = 5
  GeometryMinorRadius = 5
  GeometryHeight = 10.0     
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End