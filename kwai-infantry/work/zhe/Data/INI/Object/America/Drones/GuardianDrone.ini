;------------------------------------------------------------------------------
Object AmericaVehicleGuardianDrone

  ; *** ART Parameters ***
  SelectPortrait = SAGuardian_L
  ButtonImage = SAGuardian
  
  UpgradeCameo1 = Upgrade_AmericaDroneArmor
  UpgradeCameo2 = Upgrade_AmericaSelfSustainingBattery
  UpgradeCameo3 = Upgrade_AmericaSignalFailsafeProtocol
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DTankDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = AVMRGrdian
      Turret = Turret
      TurretPitch = TurretEL
      HideSubObject = MuzzleFX01 Barrel01 Housecolor03 Ammo02
      ShowSubObject = Ammo01
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponLaunchBone = PRIMARY Muzzle
      TransitionKey = TRANS_None
    End
    
    ConditionState = FIRING_A
      ShowSubObject = Ammo02
      TransitionKey = TRANS_None
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A
    
    ConditionState = DAMAGED
      Model = AVMRGrdian_D
      ShowSubObject = Ammo01
      TransitionKey = TRANS_None
    End
    
    ConditionState = DAMAGED FIRING_A
      Model = AVMRGrdian_D
      ShowSubObject = Ammo02
      TransitionKey = TRANS_None
    End
    AliasConditionState = DAMAGED BETWEEN_FIRING_SHOTS_A
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = AVMRGrdian_E
      Animation = AVMRGrdian_E.AVMRGrdian_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ShowSubObject = Ammo01
      TransitionKey = TRANS_ReallyDamaged
    End
    
    ConditionState = REALLYDAMAGED RUBBLE FIRING_A
      Model = AVMRGrdian_E
      Animation = AVMRGrdian_E.AVMRGrdian_E
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
      ShowSubObject = Ammo02
      TransitionKey = TRANS_ReallyDamaged
    End
    AliasConditionState = REALLYDAMAGED RUBBLE BETWEEN_FIRING_SHOTS_A
    
    TransitionState = TRANS_None TRANS_ReallyDamaged
      Model = AVMRGrdian_E1
      Animation = AVMRGrdian_E1.AVMRGrdian_E1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = TRANS_ReallyDamaged TRANS_None
      Model = AVMRGrdian_E1
      Animation = AVMRGrdian_E1.AVMRGrdian_E1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    TrackMarks = AVTnkTracks.dds
    TreadAnimationRate = 1.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End
  
  Draw = W3DModelDraw ModuleTag_W3D02
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = AVMRGrdian_A1
      Animation = AVMRGrdian_A1.AVMRGrdian_A1
      AnimationMode = MANUAL
      Turret = Turret
      TurretPitch = TurretEL
      HideSubObject = MuzzleFX01
    End
    
    ConditionState = FIRING_A
      AnimationMode = ONCE
      ShowSubObject = MuzzleFX01
    End
    
    ConditionState = DAMAGED
      Model = AVMRGrdian_A1D
      HideSubObject = MuzzleFX01
    End
    
    ConditionState = DAMAGED FIRING_A
      Model = AVMRGrdian_A1D
      Animation = AVMRGrdian_A1D.AVMRGrdian_A1D
      AnimationMode = ONCE
      ShowSubObject = MuzzleFX01
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = AVMRGrdian_A1E
      HideSubObject = MuzzleFX01
    End
    
    ConditionState = REALLYDAMAGED RUBBLE FIRING_A
      Model = AVMRGrdian_A1E
      Animation = AVMRGrdian_A1E.AVMRGrdian_A1E
      AnimationMode = ONCE
      ShowSubObject = MuzzleFX01
    End
  End
    
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:GuardianDrone
  Side = America
  EditorSorting = VEHICLE
  TransportSlotCount = 5
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY 30mmM230AutoCannonWeapon_UGV
    Weapon = TERTIARY DeployWeapon_StatusSelfPosition
    AutoChooseSources = TERTIARY NONE
  End
  
  ArmorSet
    Conditions = None
    Armor = DroneArmor
    DamageFX = DroneDamageFX
  End
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = DroneArmorUpgraded
    DamageFX = DroneDamageFX
  End
 
  BuildCost = 1150
  BuildTime = 25.0
  EnergyProduction = -1
  EnergyBonus = 1
  VisionRange = 150
  ShroudClearingRange = 200
  Prerequisites
    Object = AmericaSurveillanceCenter
    Object = AmericaStrategyCenter
  End

  ExperienceValue = 75 75 150 225
  ExperienceRequired = 0 250 400 750 
  IsTrainable = Yes 
  CrusherLevel = 0
  CrushableLevel = 1
  CommandSet = AmericaVehicleGuardianDroneCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = SentryDroneVoiceSelect
  VoiceMove = SentryDroneVoiceMove
  VoiceGuard = SentryDroneVoiceMove
  VoiceAttack = SentryDroneVoiceMove
  SoundMoveLoop = UGVMoveLoop
  SoundAmbient = UGVAmbientLoop

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = SentryDroneVoiceSelect
    TurretMoveLoop = TurretMoveLoop
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound
    VoiceEnter = NoSound
    Deploy = NoSound
    Undeploy = NoSound
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS SCORE DRONE SALVAGER ATTACK_NEEDS_LINE_OF_SIGHT POWERED
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 250.0
    InitialHealth = 250.0
    SubdualDamageCap = 480
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = DeployStyleAIUpdate ModuleTag_AI01
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      TurretTurnRate = 48
      TurretPitchRate = 36
      MinIdleScanAngle = 15
      MaxIdleScanAngle = 15
      MinIdleScanInterval = 2000
      MaxIdleScanInterval = 3000
      RecenterTime = 5000
      AllowsPitch = Yes
      FiresWhileTurning = Yes
      InitiallyDisabled = Yes
    End
    MoodAttackCheckRate = 250
    AutoAcquireEnemiesWhenIdle = Yes
    PackTime = 500
    UnpackTime = 500
    TurretsFunctionOnlyWhenDeployed = Yes
    TurretsMustCenterBeforePacking = Yes
  End
  Locomotor = SET_NORMAL HeavyUGVLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 20.0
  End
  
  Behavior = InstantDeathBehavior ModuleTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_TankCrush
    OCL = OCL_AmericaVehicleGuardianDrone_CrushEffect
  End
  
  Behavior = CreateCrateDie ModuleTag_Salvage01
    CrateData = SalvageCrateData
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL OCL_AmericaVehicleGuardianDrone_DeathEffect_BlowUp
    FX = FINAL FX_GenericUGVDeathExplosion
  End

  ; Explode death
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 60
    DestructionDelay = 100
    DestructionDelayVariance  = 50
    OCL = FINAL OCL_AmericaVehicleGuardianDrone_DeathEffect
    FX = FINAL FX_GenericUGVDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 20
    DestructionDelay = 30000
    OCL = INITIAL OCL_AmericaVehicleGuardianDrone_CatchFire
    OCL = FINAL OCL_AmericaVehicleGuardianDrone_DeathEffect
    FX = FINAL FX_GenericUGVDeathExplosion
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3 
    AflameDamageDelay = 500 
  End
  
  Behavior = ArmorUpgrade ModuleTag_Armour01
    TriggeredBy = Upgrade_AmericaDroneArmor
  End

  Behavior = PowerPlantUpgrade ModuleTag_Battery
    TriggeredBy = Upgrade_AmericaSelfSustainingBattery
  End

  ; --- begin suppression modules ---
  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_Supression01
    StartsActive = Yes
    ReactionWeaponPristine = UGVSignalLostReactionWeapon
    ReactionWeaponDamaged = UGVSignalLostReactionWeapon
    ReactionWeaponReallyDamaged = UGVSignalLostReactionWeapon
    ReactionWeaponRubble = UGVSignalLostReactionWeapon
    DamageTypes = NONE +AURORA_BOMB
    DamageAmount = 0.001
    ConflictsWith = Upgrade_AmericaSignalFailsafeProtocol
  End
  ; --- end suppression modules ---
  
  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 25
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_InfantryDetector
    DetectionRate = 500
    DetectionRange = 10
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = INFANTRY
  End
  ; --- end detector modules ---
  
  Geometry = Box
  GeometryMajorRadius = 8.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 14.5
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45 
End
