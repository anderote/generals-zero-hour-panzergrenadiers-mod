;------------------------------------------------------------------------------
Object AmericaVehicleSpyDrone

  ; *** ART Parameters ***
  SelectPortrait = SAScout_L
  ButtonImage = SAScout
  
  UpgradeCameo1 = Upgrade_AmericaDroneArmor
  UpgradeCameo2 = Upgrade_AmericaSelfSustainingBattery
  UpgradeCameo3 = Upgrade_AmericaSignalFailsafeProtocol
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    ConditionState = NONE
      Model = AVSpyDrone
      Animation = AVSpyDrone.AVSpyDrone
      AnimationMode = LOOP
    End

    ConditionState = REALLYDAMAGED
      Model = AVSpyDrone_d
      Animation = AVSpyDrone_d.AVSpyDrone_d
      AnimationMode = LOOP
    End
  End


  ; ***DESIGN parameters ***
  DisplayName = OBJECT:SpyDrone
  Side = America
  EditorSorting = VEHICLE
  TransportSlotCount = 0
  ArmorSet
    Conditions = None
    Armor = DroneArmor
    DamageFX = DroneDamageFX
  End
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = DroneArmorUpgraded
    DamageFX = DroneDamageFX
  End
  
  EnergyProduction = -1
  EnergyBonus = 1
  VisionRange = 150
  ShroudClearingRange = 0
  IsTrainable = No 
  
  ; *** AUDIO Parameters ***
  VoiceSelect = NoSound
  VoiceMove = NoSound
  VoiceAttack = NoSound
  SoundMoveStart = NoSound
  UnitSpecificSounds
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS VEHICLE SCORE DRONE NO_SELECT AIRCRAFT POWERED
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
    AutoAcquireEnemiesWhenIdle = No
  End
  Locomotor = SET_NORMAL SpyDroneLocomtor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 50.0
  End

  Behavior = InstantDeathBehavior ModuleTag_Death01
    DeathTypes = ALL
    FX = FX_GenericVehicleDeathExplosion
    OCL = OCL_AmericaScoutDrone_DeathEffect
  End
  
  Behavior = StealthUpdate ModuleTag_Stealth01
    StealthDelay = 0
    StealthForbiddenConditions = NONE
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 3 
    AflameDamageDelay = 500 
  End

  Behavior = DynamicShroudClearingRangeUpdate ModuleTag_ShroudClear
    FinalVision = 200.0 
    ChangeInterval = 50
    ShrinkDelay = 6000
    ShrinkTime = 4000
    GrowDelay = 0
    GrowTime = 1000
    GrowInterval = 10
  End

  Behavior = ArmorUpgrade ModuleTag_Armour01
    TriggeredBy = Upgrade_AmericaDroneArmor
  End

  Behavior = PowerPlantUpgrade ModuleTag_Battery
    TriggeredBy = Upgrade_AmericaSelfSustainingBattery
  End

  ; --- begin suppression modules ---
  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_Supression01
    StartsActive = Yes
    ReactionWeaponPristine = UGVSignalLostReactionWeapon
    ReactionWeaponDamaged = UGVSignalLostReactionWeapon
    ReactionWeaponReallyDamaged = UGVSignalLostReactionWeapon
    ReactionWeaponRubble = UGVSignalLostReactionWeapon
    DamageTypes = NONE +AURORA_BOMB
    DamageAmount = 0.001
    ConflictsWith = Upgrade_AmericaSignalFailsafeProtocol
  End
  ; --- end suppression modules ---
  
  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_Detector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    LoudPingSound = IRPingLoud
    IRBrightParticleSysName = IRDetectSonarBrightBlue
    IRGridParticleSysName = IRDetectGridBlue
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
  End
  ; --- end detector modules ---

  Geometry = Cylinder
  GeometryMajorRadius = 5.0
  GeometryMinorRadius = 6.0
  GeometryHeight = 3.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45 
End
