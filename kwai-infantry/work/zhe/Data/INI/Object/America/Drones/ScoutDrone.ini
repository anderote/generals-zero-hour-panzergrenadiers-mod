  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS VEHICLE SELECTABLE DRONE NO_SELECT
  
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 100.0
