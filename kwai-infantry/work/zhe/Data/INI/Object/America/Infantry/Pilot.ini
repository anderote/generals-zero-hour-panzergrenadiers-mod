;------------------------------------------------------------------------------
Object AmericaInfantryPilot

  ; *** ART Parameters ***
  SelectPortrait = SAPilot_L
  ButtonImage = SAPilot
  
  ;UpgradeCameo1 = NONE
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = AIRPlt_SKN
      IdleAnimation = AIRPlt_SKL.AIRPlt_STA 0 20
      IdleAnimation = AIRPlt_SKL.AIRPlt_IDA 
      IdleAnimation = AIRPlt_SKL.AIRPlt_IDB 
      AnimationMode = ONCE
      TransitionKey = TRANS_Stand
    End

    ConditionState = FREEFALL
      Animation = AIRPlt_SKL.AIRPLT_PFL
      AnimationMode = ONCE
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL DYING

    ConditionState = PARACHUTING
      Animation = AIRPlt_SKL.AIRPlt_PHG
      AnimationMode = LOOP
      TransitionKey = TRANS_Chute
      WaitForStateToFinishIfPossible = TRANS_Falling
    End
    AliasConditionState = PARACHUTING DYING

    ConditionState = MOVING
      Animation = AIRPlt_SKL.AIRPlt_RNA 
      AnimationMode = LOOP
      TransitionKey = TRANS_Stand
      ParticleSysBone = None InfantryDustTrails
      ParticleSysBone = None FootstepRight
      ParticleSysBone = None FootstepLeft
    End
    
    ConditionState = DYING
      Animation = AIRPlt_SKL.AIRPlt_DTA 
      Animation = AIRPlt_SKL.AIRPlt_DTB 
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = AIRPlt_SKL.AIRPlt_ADTE1
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = AIRPlt_SKL.AIRPlt_ADTE2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = AIRPlt_SKL.AIRPlt_ADTE3
      AnimationMode = ONCE
      TransitionKey = None
    End

    ConditionState = SPECIAL_CHEERING
      Animation = AIRPLT_SKL.AIRPLT_CHA
      AnimationMode = LOOP
    End

    TransitionState = TRANS_Chute TRANS_Stand
      Animation = AIRPlt_SKL.AIRPlt_PTD
      AnimationMode = ONCE
    End
  End

  Draw = W3DModelDraw ModuleTag_HousecolorDraw
    OkToChangeModelColor = Yes
    ReceivesDynamicLights = No
    
    DefaultConditionState
      Model = EXInfPlt
    End
    
    ConditionState = DYING
      Model = None
    End
    AliasConditionState = DYING EXPLODED_BOUNCING
    AliasConditionState = DYING EXPLODED_FLAILING
    AliasConditionState = DYING SPLATTED
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Pilot
  Side = America
  EditorSorting = INFANTRY
  TransportSlotCount = 1
  ExperienceValue = 10 10 10 10
  ExperienceRequired =  0 1 2 3
  IsTrainable = Yes
  CommandSet = AmericaInfantryPilotCommandSet
  ArmorSet
    Conditions = None
    Armor = HumanArmor
    DamageFX = InfantryDamageFX
  End

  VisionRange = 150
  ShroudClearingRange = 200
  CrushableLevel = 0 

  ; *** AUDIO Parameters ***
  VoiceSelect = PilotVoiceSelect
  VoiceMove = PilotVoiceMove
  VoiceAttack = PilotVoiceMove
  VoiceGarrison = PilotVoiceMove 
  VoiceFear = PilotVoiceFear

  UnitSpecificSounds
    VoiceEnter = PilotVoiceEnter
    VoiceEnterHostile = PilotVoiceEnter
    VoiceGetHealed = PilotVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_CAST_REFLECTIONS INFANTRY NO_GARRISON SCORE IGNORES_SELECT_ALL SALVAGER
  Body = ActiveBody ModuleTag_Body01
    MaxHealth = 60.0
    InitialHealth = 60.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL BasicHumanLocomotor

  Behavior = VeterancyGainCreate ModuleTag_Veterancy01
    StartingLevel = VETERAN
  End

  Behavior = VeterancyCrateCollide ModuleTag_Veterancy02
    RequiredKindOf = VEHICLE 
    ForbiddenKindOf = DOZER INFANTRY
    EffectRange = 0
    AddsOwnerVeterancy = Yes 
    IsPilot = Yes 
  End

  Behavior = PilotFindVehicleUpdate ModuleTag_PilotAI
    ScanRate = 1000 
    ScanRange = 300
    MinHealth = 0.5 
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
  End

  Behavior = SquishCollide ModuleTag_Physics02
  End

  ; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay = 8000
    SinkRate = 0.5  
    DestructionDelay = 12000
    FX = INITIAL FX_PilotDie
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 8000
    SinkRate = 0.5 
    DestructionDelay = 12000
    FX = INITIAL FX_InfantryDieCrushed
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = NONE +EXPLODED
    SinkDelay = 8000
    SinkRate = 0.5 
    DestructionDelay = 12000
    FX = INITIAL FX_PilotDie
    ProbabilityModifier = 75
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  
  Behavior = SlowDeathBehavior ModuleTag_DeathExplosion01
    DeathTypes = NONE +EXPLODED
    DestructionDelay = 0
    FX = INITIAL FX_InfantryDieExploded
    OCL = INITIAL OCL_InfantryDeadExplosion
    ModifierBonusPerOverkillPercent = 40%
    ProbabilityModifier = 25
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireUSA
    OCL = INITIAL OCL_FlamingInfantry
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantry
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death06
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantryBeta 
  End

  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantryGamma
  End
  ; --- end Death modules ---

  Behavior = PoisonedBehavior ModuleTag_Poison
    PoisonDamageInterval = 100 
    PoisonDuration = 3000 
  End
 
  Behavior = FireWeaponUpdate ModuleTag_Move01
    Weapon = IngeniousInfantryMovementWeapon
  End
  
  Behavior = FireWeaponUpdate ModuleTag_Move02
    Weapon = IngeniousInfantryCheckerWeapon
  End
  
  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 150
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 25
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = DRONE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_InfantryDetector
    DetectionRate = 500
    DetectionRange = 10
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    ExtraRequiredKindOf = INFANTRY
  End
  ; --- end detector modules ---
  
  Scale = 0.90
  Geometry = Cylinder
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowHI
  BuildCompletion = APPEARS_AT_RALLY_POINT
End
