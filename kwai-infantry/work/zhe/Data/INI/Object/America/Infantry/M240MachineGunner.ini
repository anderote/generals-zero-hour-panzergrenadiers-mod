;------------------------------------------------------------------------------
Object AmericaInfantryM240MachineGunner

  ; *** ART Parameters ***
  Draw = W3DDependencyModelDraw ModuleTag_Gunner01
    OkToChangeModelColor = Yes
    AttachToBoneInContainer = Firepoint01

    DefaultConditionState
      Model = AIM240_SKN
      Turret = MAIN_ROOT
      Animation = CILMGINF_SKL.CILMGINF_STS
      AnimationMode = ONCE
      WeaponFireFXBone = PRIMARY MuzzleMG
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponLaunchBone = PRIMARY MuzzleMG
      TransitionKey = TRANS_Idle
    End
    
    ConditionState = USING_WEAPON_A
      Animation = CILMGINF_SKL.CILMGINF_STD
      AnimationMode = LOOP
    End
    AliasConditionState = USING_WEAPON_B
    
    ConditionState = USING_WEAPON_A ATTACKING
      Animation = CILMGINF_SKL.CILMGINF_ATA
      AnimationMode = LOOP
      TransitionKey = TRANS_FiringA
    End
    
    ConditionState = USING_WEAPON_B ATTACKING
      Animation = CILMGINF_SKL.CILMGINF_ATB
      AnimationMode = LOOP
      TransitionKey = TRANS_FiringB
    End
    
    TransitionState = TRANS_Idle TRANS_FiringA
      Animation = CILMGINF_SKL.CILMGINF_S2A
      AnimationMode = ONCE
    End
    
    TransitionState = TRANS_FiringA TRANS_Idle
      Animation = CILMGINF_SKL.CILMGINF_S2A
      AnimationMode = ONCE_BACKWARDS
    End
    
    TransitionState = TRANS_Idle TRANS_FiringB
      Animation = CILMGINF_SKL.CILMGINF_S2B
      AnimationMode = ONCE
    End
    
    TransitionState = TRANS_FiringB TRANS_Idle
      Animation = CILMGINF_SKL.CILMGINF_S2B
      AnimationMode = ONCE_BACKWARDS
    End
  End
  
  Draw = W3DDependencyModelDraw ModuleTag_Hatch01
    OkToChangeModelColor = Yes
    AttachToBoneInContainer = Firepoint01

    DefaultConditionState
      Model = AVHatch
      Animation = AVHatch.AVHatch
      AnimationMode = ONCE
    End
  End

  ; ***DESIGN parameters ***
  Side = America
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY M240MachineGunWeapon_Gunner
    Weapon = SECONDARY M240MachineGunWeaponAir_Gunner
    ShareWeaponReloadTime = Yes
  End

  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
  End
  
  VisionRange = 150
  ShroudClearingRange = 150

  ExperienceValue = 10 10 15 25
  ExperienceRequired = 0 50 75 150
  IsTrainable = Yes
  
  ; *** AUDIO Parameters ***
  UnitSpecificSounds
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound
    VoiceRapidFire = NoSound
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD CAN_ATTACK CLICK_THROUGH IGNORED_IN_GUI PORTABLE_STRUCTURE
    Body = StructureBody ModuleTag_Body01
    MaxHealth = 90.0
    InitialHealth = 90.0
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY
      TurretTurnRate = 72
      MinIdleScanAngle = 15
      MaxIdleScanAngle = 15
      MinIdleScanInterval = 2000
      MaxIdleScanInterval = 3000
      RecenterTime = 5000
    End
    MoodAttackCheckRate = 250
    AutoAcquireEnemiesWhenIdle = Yes 
  End

  Behavior = DestroyDie ModuleTag_Death01
  End
  
  ; --- begin detector modules ---
  Behavior = StealthDetectorUpdate ModuleTag_StructureDetector
    DetectionRate = 500
    DetectionRange = 100
    CanDetectWhileGarrisoned = Yes
    CanDetectWhileContained = Yes
    ExtraForbiddenKindOf = DEMOTRAP MINE UNATTACKABLE BOOBY_TRAP
    ExtraRequiredKindOf = STRUCTURE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    CanDetectWhileGarrisoned = Yes
    CanDetectWhileContained = Yes
    ExtraRequiredKindOf = AIRCRAFT VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_VehicleDetector
    DetectionRate = 500
    DetectionRange = 50
    CanDetectWhileGarrisoned = Yes
    CanDetectWhileContained = Yes
    ExtraForbiddenKindOf = AIRCRAFT
    ExtraRequiredKindOf = VEHICLE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_DroneDetector
    DetectionRate = 500
    DetectionRange = 15
    CanDetectWhileGarrisoned = Yes
    CanDetectWhileContained = Yes
    ExtraRequiredKindOf = DRONE
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_InfantryDetector
    DetectionRate = 500
    DetectionRange = 5
    CanDetectWhileGarrisoned = Yes
    CanDetectWhileContained = Yes
    ExtraRequiredKindOf = INFANTRY
  End
  ; --- end detector modules ---
  
  Geometry = Cylinder
  GeometryMajorRadius = 4.0
  GeometryMinorRadius = 4.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
End

