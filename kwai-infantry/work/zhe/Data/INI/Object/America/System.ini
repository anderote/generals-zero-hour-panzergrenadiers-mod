    MaxLifetime = 2000
  End

  Behavior = StealthDetectorUpdate ModuleTag_Detector01
    DetectionRate = 500
    ExtraForbiddenKindOf = INERT MINE DEMOTRAP BOOBY_TRAP UNATTACKABLE
