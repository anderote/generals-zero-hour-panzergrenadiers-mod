Object SpySatellitePing

  ; ***DESIGN parameters ***
  VisionRange = 300.0
  EditorSorting = SYSTEM
  KindOf = NO_COLLIDE IMMOBILE UNATTACKABLE INERT

  ; *** ENGINEERING Parameters ***
  Body = ImmortalBody ModuleTag_Body01
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = DynamicShroudClearingRangeUpdate ModuleTag_ShroudClear
    FinalVision = 0.0 
    ShrinkDelay = 7500
    ShrinkTime = 2500
    ChangeInterval = 50
    GrowDelay = 0
    GrowTime = 500
    GrowInterval = 10
    GridDecalTemplate
      Texture = EXGrid
      Style = SHADOW_ALPHA_DECAL
      OpacityMin = 25%
      OpacityMax = 50%
      OpacityThrobTime = 500
      Color = R:0 G:0 B:255 A:48
    End
  End

  Behavior = DeletionUpdate ModuleTag_Delete01
    MinLifetime = 13000
    MaxLifetime = 13000   
  End

  Behavior = StealthDetectorUpdate ModuleTag_Detector01
    DetectionRate = 500
    ExtraForbiddenKindOf = INERT MINE DEMOTRAP BOOBY_TRAP UNATTACKABLE INFANTRY DRONE VEHICLE HUGE_VEHICLE AIRCRAFT STRUCTURE
    IRGridParticleSysName = IRDetectGridBlue
  End
End

