Object AmericaWall

  ; *** ART Parameters ***
  SelectPortrait = SAFence_L
  ButtonImage = SAFence
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    ; day
    ConditionState = NONE
      Model = ABSecWallY
    End
    ConditionState = DAMAGED
