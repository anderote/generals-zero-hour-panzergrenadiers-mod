Object AmericaCheckpoint

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_W3D01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = PMChkPnt02
      Animation = PMChkPnt02.PMChkPnt02
      AnimationMode = MANUAL
    End

    ConditionState = DOOR_1_OPENING
      Model = PMChkPnt02_A1  
      Animation = PMChkPnt02_A1.PMChkPnt02_A1
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End

    ConditionState = DOOR_1_WAITING_TO_CLOSE
      Model = PMChkPnt02_A1  
      Animation = PMChkPnt02_A1.PMChkPnt02_A1
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
    End

    ConditionState = DOOR_1_CLOSING
      Model = PMChkPnt02_A2               
      Animation = PMChkPnt02_A2.PMChkPnt02_A2
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Checkpoint
  Side = America
  EditorSorting = STRUCTURE

  BuildCost = 100
  BuildTime = 5.0
  VisionRange = 100.0
  ShroudClearingRange = 100

  ArmorSet
    Conditions = None
    Armor = InvulnerableArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** AUDIO Parameters ***
  VoiceSelect = NoSound

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD SELECTABLE IMMOBILE NO_COLLIDE
  Body = StructureBody ModuleTag_02
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = CheckpointUpdate ModuleTag_CheckpointUpdate
  End

  Behavior = DestroyDie ModuleTag_Death01
  End

  Behavior = CreateObjectDie ModuleTag_05
    CreationList = OCL_SmallStructureDebris
  End

  Behavior = FXListDie ModuleTag_06
    DeathFX = FX_SmallStructureDeath
  End

  Behavior = FlammableUpdate ModuleTag_Flammable
    AflameDuration = 5000
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End

  Geometry = Box
  GeometryMajorRadius = 3.0
  GeometryMinorRadius = 26.0
  GeometryHeight = 20.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER
End
