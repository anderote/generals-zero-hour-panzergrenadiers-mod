;Just so you know the choices available, here is part of Damage.h
;{
; "EXPLOSION", - General HE projectiles
; "CRUSH", 
; "ARMOR_PIERCING", - HEAT tank rounds/missiles
; "SMALL_ARMS", - Rifle rounds
; "GATTLING", - MG rounds/CIWS
; "RADIATION", 
; "FLAME", 
; "LASER", 
; "SNIPER", - Sniper rounds
; "POISON", 
; "HEALING", 
; "UNRESISTABLE", 
; "WATER", - Used by checker logic
; "DEPLOY", 
; "SURRENDER", - Used by digging logic
; "HACK", - Also used by mine clearing logic
; "KILL_PILOT", - Unmanning weapon
; "PENALTY", 
; "FALLING", 
; "MELEE", 
; "DISARM", 
; "HAZARD_CLEANUP", 
; "INFANTRY_MISSILE", - Small HEAT rockets/missiles
; "AURORA_BOMB", - Used by UGV logic
; "LAND_MINE", - Used by AED logic
; "JET_MISSILES", - Anti-air missiles
; "STEALTHJET_MISSILES", - Tank hardness
; "MOLOTOV_COCKTAIL", - HE/FRAG tank rounds/missiles
; "COMANCHE_VULCAN", - Jet rotary cannons
; "MICROWAVE", - Infantry suppression logic
; "SUBDUAL_MISSILE",
; "SUBDUAL_VEHICLE",
; "SUBDUAL_BUILDING",
;};

