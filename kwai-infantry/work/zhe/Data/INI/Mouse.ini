Mouse
  TooltipFontName = Karisma
  TooltipFontSize = 8
  TooltipFontIsBold = No
  ; does the background scroll out with the text?
  TooltipAnimateBackground = Yes
  ; time in milliseconds for text to scroll out
  TooltipFillTime = 250
  ; time in milliseconds for tooltip to appear
  TooltipDelayTime = 800
  TooltipTextColor = R:220 G:220 B:220 A:255
  TooltipHighlightColor = R:255 G:255 B:0 A:255
  TooltipShadowColor = R:0 G:0 B:0 A:255
  TooltipBorderColor = R:100 G:100 B:100 A:255
  TooltipBackgroundColor = R:20 G:20 B:20 A:255
  ; in percent screen width
  TooltipWidth = 20
  ; use player colors for tooltip text?
  UseTooltipAltTextColor = No
  ; use player colors for tooltip backgrounds?
  UseTooltipAltBackColor = Yes
  ; alter (brighten/darken) use player colors for tooltips?
  AdjustTooltipAltColor = Yes

  OrthoCamera = Yes
  OrthoZoom = 0.5

  ; How many pixels should we allow before it is a drag?
  DragTolerance = 25
  ; How many feet in worldspace should we allow before it is a drag?
  DragTolerance3D = 25
  ; if the mouse is held down for this long, we consider it a drag, not a click.
  DragToleranceMS = 250
End

