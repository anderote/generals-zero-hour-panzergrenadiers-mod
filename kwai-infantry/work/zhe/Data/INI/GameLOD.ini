;------------------------------------------------------------------------------
;Game Detail Levels
;
;Default StaticGameLOD levels are selected based on CPU performance at a simple
;processor benchmark.  Here's some sample scores:
;
;MinimumProcessorFps:
;P4-2.2 :  30 fps.
;
;Eventually this needs to be replaced by timing an actual map running on the system.
;------------------------------------------------------------------------------

StaticGameLOD = Low
  MinimumFPS = 10   
  MinimumProcessorFps = 0
  SampleCount2D = 6   
  SampleCount3D = 24   
  StreamCount = 2    
  MaxParticleCount = 1500  
  UseShadowVolumes = No   
  UseShadowDecals = No    
  UseCloudMap = No      
  UseLightMap = No    
  ShowSoftWaterEdge = No  
  MaxTankTrackEdges = 30    
  MaxTankTrackOpaqueEdges = 15  
  MaxTankTrackFadeDelay = 5000  
  UseBuildupScaffolds = No  
  UseTreeSway = No    
  UseEmissiveNightMaterials = No 
  TextureReductionFactor = 1
End

StaticGameLOD = Medium
  MinimumFPS = 15   
  MinimumProcessorFps = 20
  SampleCount2D = 6   
  SampleCount3D = 24   
  StreamCount = 2   
  MaxParticleCount = 3000  
  UseShadowVolumes = No   
  UseShadowDecals = Yes   
  UseCloudMap = Yes      
  UseLightMap = Yes    
  ShowSoftWaterEdge = Yes  
  MaxTankTrackEdges = 100  
  MaxTankTrackOpaqueEdges = 25  
  MaxTankTrackFadeDelay = 30000  
  UseBuildupScaffolds = Yes  
  UseTreeSway = Yes    
  UseEmissiveNightMaterials = Yes 
  TextureReductionFactor = 0
End

StaticGameLOD = High
  MinimumFPS = 25   
  MinimumProcessorFps = 29
