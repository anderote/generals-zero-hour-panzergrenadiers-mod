;// Language.ini ///
;// This file contains all declarations that are specific to a language.
;// for example, this is where we set the unicode font for a language

Language
  UnicodeFontName = "Arial Unicode MS"
  MilitaryCaptionSpeed = 1;       ;// the caption speed for the mission location type
  ;LocalFontFile = PLCC____.TTF  ;//When we add our game fonts... this is where we do it.
  ; //Used to display copyright at start of game
  CopyrightFont = Courier 12 Yes
  ; //Used for messages at top of screen.
  MessageFont   = Karisma 10 Yes
  ;Mission briefing text in bottom left corner.
  MilitaryCaptionTitleFont = "Courier New" 12 Yes
  ;Mission briefing text in bottom left corner.
  MilitaryCaptionFont = "Courier New" 12 No
  MilitaryCaptionDelayMS = 750
  ;superweapon countdown in top right
  SuperweaponCountdownNormalFont = Karisma 10 No
  ;superweapon countdown in top right
  SuperweaponCountdownReadyFont = Karisma 10 Yes
  ;mission specific timer
  NamedTimerCountdownNormalFont = Karisma 10 No
  ;mission specific timer
  NamedTimerCountdownReadyFont = Karisma 10 No
  ;captions over objects like construction percent.
  DrawableCaptionFont = Karisma 10 No
  ; default font used by windows that don't specify font.
  DefaultWindowFont = "Karisma" 14 No
  ;  default font used for strings that don't specify font.
  DefaultDisplayStringFont = "Karisma" 12 No
  ; mouse tooltips
  TooltipFontName = Karisma 8 No
  ;  used to display frame rate and other debug stats.
  NativeDebugDisplay = FixedSys 8 No
  ; used to diplay number of selection group to left of unit health bar.
  DrawGroupInfoFont = Karisma 10 No
  ; used to diplay number of selection group to left of unit health bar.
  CreditsTitleFont = Karisma 22 No
  ; used to diplay number of selection group to left of unit health bar.
  CreditsMinorTitleFont = Karisma 16 Yes
  ; used to diplay number of selection group to left of unit health bar.
  CreditsNormalFont = Karisma 14 No
  ; Fonts increase at 70% the rate the resolution increases.
  ResolutionFontAdjustment = 0.7
End