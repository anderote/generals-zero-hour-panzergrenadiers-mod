; zzz-ZZZZZKwaiRoster: build stub letting China's Tank General (Kwai) produce
; the vanilla China MiG Bomber (ChinaJetMIGBomber -- ShockWave's EMP MiG
; Bomber; donor prereq ChinaAirfield translated to Tank_ChinaAirfield).
; Same BuildVariations idiom ShockWave uses for Tank_ChinaVehicleHackerVan,
; SupW_AmericaJetRaptor (aircraft) and AirF_AmericaInfantryPathfinder (infantry).

Object Tank_ChinaJetMIGBomber

  ; *** ART Parameters ***
  SelectPortrait         = SNMiGBomber_L
  ButtonImage            = SNMiGBomber

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    DefaultConditionState
      Model               = NVMig37
    End
  End

  ; set cost and time fields here or else they won't work
  BuildCost       = 1500
  BuildTime       = 15          ;in seconds

  Prerequisites
    Object = Tank_ChinaAirfield
  End

  Side = ChinaTankGeneral
  EditorSorting = VEHICLE
  BuildVariations = ChinaJetMIGBomber

  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT

End
