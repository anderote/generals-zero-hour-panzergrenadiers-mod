; zzz-ZZZZZKwaiRoster: build stub letting China's Tank General (Kwai) produce
; the vanilla China MiG napalm fighter (ChinaJetMIG; Black Napalm upgrade
; applies -- Kwai researches it at his Propaganda Center since kwai-artillery).
; Name avoids Tank_ChinaJetMIG, which is Kwai's OWN Razor jet.
; Same BuildVariations idiom ShockWave uses for Tank_ChinaVehicleHackerVan,
; SupW_AmericaJetRaptor (aircraft) and AirF_AmericaInfantryPathfinder (infantry).

Object Tank_ChinaJetMIGFighter

  ; *** ART Parameters ***
  SelectPortrait         = SNMig_L
  ButtonImage            = SNMig

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    DefaultConditionState
      Model               = NVMIG
    End
  End

  ; set cost and time fields here or else they won't work
  BuildCost       = 1400
  BuildTime       = 10          ;in seconds

  Prerequisites
    Object = Tank_ChinaAirfield
  End

  Side = ChinaTankGeneral
  EditorSorting = VEHICLE
  BuildVariations = ChinaJetMIG

  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT

End
