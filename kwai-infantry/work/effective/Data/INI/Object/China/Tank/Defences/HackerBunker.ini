  ; *** ART Parameters ***
  SelectPortrait         = SNTankBunker_L
  ButtonImage            = SNIntCnt ; zzz-ZKwaiBunkers: internet-center cameo

  Draw = W3DModelDraw ModuleTag_01

    IgnoreConditionStates = NIGHT

    OkToChangeModelColor = Yes

    ExtraPublicBone = STATION01

