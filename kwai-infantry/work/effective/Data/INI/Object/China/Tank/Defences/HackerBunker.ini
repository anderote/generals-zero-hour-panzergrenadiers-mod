  ; ***DESIGN parameters ***
  DisplayName       = OBJECT:TankHackerBunker
  Side              = ChinaTankGeneral
  EditorSorting     = STRUCTURE
  Prerequisites
    Object = Tank_ChinaBarracks ; zzz-ZKwaiBunkers: hackers come from the Barracks
  End
  BuildCost        = 1000
  BuildTime        = 15.0          ; in seconds
  EnergyProduction = 0
  VisionRange    = 360.0           ; Shroud clearing distance AND targeting range
  ShroudClearingRange = 360
  ArmorSet
    Conditions      = None
    Armor           = FireBaseArmor
    DamageFX        = StructureDamageFXNoShake
  End
  CommandSet        = Tank_ChinaHackerBunkerCommandSet
  ExperienceValue     = 200 200 200 200  ; Experience point value at each level

  ; *** AUDIO Parameters ***
  VoiceSelect = TankBunkerSelectionSound
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  UnitSpecificSounds
  ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound ;These aren't playing properly, will revisit (mp) TurretMoveLoopLoud
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority   = STRUCTURE
  KindOf          = PRELOAD STRUCTURE SELECTABLE IMMOBILE SCORE FS_TECHNOLOGY FS_BASE_DEFENSE IMMUNE_TO_CAPTURE ; zzz-ZKwaiBunkers: non-combat contain structure


  Body                 = StructureBody ModuleTag_05; zzz-ZKwaiBunkers: no slaved weapons
    MaxHealth          = 3000
    InitialHealth      = 3000

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
    ;**Careful with these damage types -- because area damage types will already
    ;**damage slaves.
    ;PropagateDamageTypesToSlavesWhenExisting = NONE +SMALL_ARMS +SNIPER +POISON +RADIATION +SURRENDER
    ;SwallowDamageTypesIfSlavesNotExisting = NONE +SNIPER +POISON +SURRENDER; Take no damage if no one to pass this to
  End
  Behavior = AutoHealBehavior ModuleTag_KBT_Heal01 ; zzz-ZZKwaiBaseTech: Automated Repair Systems, 1%/s of base 3000
    StartsActive  = No
    HealingAmount = 30
    HealingDelay  = 1000 ; msec
    TriggeredBy   = Tank_Upgrade_KwaiAutoRepair
  End
  Behavior = MaxHealthUpgrade ModuleTag_KD_Armor1 ; zzz-KwaiDoctrine: +10% of base 3000 for Tank_ChinaBunker (inherited)
    TriggeredBy   = Tank_Upgrade_KwaiVehicleArmor1
    AddMaxHealth  = 300.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End
  Behavior = MaxHealthUpgrade ModuleTag_KD_Armor2 ; zzz-KwaiDoctrine: +10% of base 3000 for Tank_ChinaBunker (inherited)
    TriggeredBy   = Tank_Upgrade_KwaiVehicleArmor2
    AddMaxHealth  = 300.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End
  Behavior = MaxHealthUpgrade ModuleTag_KD_Armor3 ; zzz-KwaiDoctrine: +10% of base 3000 for Tank_ChinaBunker (inherited)
    TriggeredBy   = Tank_Upgrade_KwaiVehicleArmor3
    AddMaxHealth  = 300.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End
  Behavior = MaxHealthUpgrade ModuleTag_KD_Armor4 ; zzz-KwaiDoctrine: +10% of base 3000 for Tank_ChinaBunker (inherited)
    TriggeredBy   = Tank_Upgrade_KwaiVehicleArmor4
    AddMaxHealth  = 300.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End

  Behavior = InternetHackContain ModuleTag_KB_Hack01 ; zzz-ZKwaiBunkers: passengers auto-hack for cash (fast contained rate)
    PassengersAllowedToFire = No
    Slots                 = 4
    ScatterNearbyOnExit   = No
    HealthRegen%PerSec    = 10
    DamagePercentToUnits  = 50%
    AllowInsideKindOf     = MONEY_HACKER
    EnterSound            = GarrisonEnter
    ExitSound             = GarrisonExit
    ExitDelay             = 500
    NumberOfExitPaths     = 1 ; no ExitStart/ExitEnd bones in NBTnkBnk; engine falls back to object position
    GoAggressiveOnExit    = No
  End

  Behavior = ProductionUpdate ModuleTag_10
    ; nothing, but is required if we have any Object-level Upgrades!
  End

  Behavior = FlammableUpdate ModuleTag_12
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior             = CreateObjectDie ModuleTag_13
    CreationList  = OCL_LargeStructureDebris
  End
  Behavior             = FXListDie ModuleTag_14
    DeathFX       = FX_StructureSmallDeath
  End
  Behavior = DestroyDie ModuleTag_06
    ;nothing
  End

  Behavior = TransitionDamageFX ModuleTag_15
    ;-------------DESIGNED FOR SMALL SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
  End
  
