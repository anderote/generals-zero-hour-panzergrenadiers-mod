; zzz-ZZZZZKwaiRoster: build stub letting China's Tank General (Kwai) produce
; Leang's TOS-1 Buratino thermobaric MLRS (Spec_ChinaVehicleInfernoCannon;
; donor prereqs Spec_ WF+PropCenter translated to Tank_).
; Same BuildVariations idiom ShockWave uses for Tank_ChinaVehicleHackerVan,
; SupW_AmericaJetRaptor (aircraft) and AirF_AmericaInfantryPathfinder (infantry).

Object Tank_ChinaVehicleBuratino

  ; *** ART Parameters ***
  SelectPortrait         = NVTOS-1_L
  ButtonImage            = NVTOS-1

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    DefaultConditionState
      Model               = NVTOSM1
    End
  End

  ; set cost and time fields here or else they won't work
  BuildCost       = 1400
  BuildTime       = 16.0          ;in seconds

  Prerequisites
    Object = Tank_ChinaWarFactory
    Object = Tank_ChinaPropagandaCenter
  End

  Side = ChinaTankGeneral
  EditorSorting = VEHICLE
  BuildVariations = Spec_ChinaVehicleInfernoCannon

  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE

End
