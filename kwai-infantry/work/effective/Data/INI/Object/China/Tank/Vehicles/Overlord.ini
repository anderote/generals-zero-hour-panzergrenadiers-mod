; zzz-ZZZZZKwaiRoster: build stub letting China's Tank General (Kwai) produce
; the VANILLA China Overlord (bunker-capable variant; china-tank-buff 1320 HP
; and the Battle Bunker / Gattling / Propaganda turret options come along).
; Same BuildVariations idiom ShockWave uses for Tank_ChinaVehicleHackerVan,
; SupW_AmericaJetRaptor (aircraft) and AirF_AmericaInfantryPathfinder (infantry).

Object Tank_ChinaTankOverlord

  ; *** ART Parameters ***
  SelectPortrait         = SNOverlord_L
  ButtonImage            = SNOverlord

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    DefaultConditionState
      Model               = NVOvrlrd
    End
  End

  ; set cost and time fields here or else they won't work
  BuildCost       = 2000
  BuildTime       = 20.0          ;in seconds

  Prerequisites
    Object = Tank_ChinaWarFactory
    Object = Tank_ChinaPropagandaCenter
  End

  Side = ChinaTankGeneral
  EditorSorting = VEHICLE
  BuildVariations = ChinaTankOverlord

  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE HUGE_VEHICLE

End
