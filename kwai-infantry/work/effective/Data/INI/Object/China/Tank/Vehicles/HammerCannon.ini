; zzz-ZZZZZKwaiRoster: build stub letting China's Tank General (Kwai) produce
; Leang's Hammer Cannon (Spec_ChinaVehicleNukeLauncher).  Donor gate
; SCIENCE_HammerCannon DROPPED: Kwai's promotion tree cannot buy it
; (Tank_SCIENCE_CHINA_CommandSetRank1/3/8) -- kwai-artillery Nuke Cannon precedent.
; Same BuildVariations idiom ShockWave uses for Tank_ChinaVehicleHackerVan,
; SupW_AmericaJetRaptor (aircraft) and AirF_AmericaInfantryPathfinder (infantry).

Object Tank_ChinaVehicleHammerCannon

  ; *** ART Parameters ***
  SelectPortrait         = SNHammerCannon_L
  ButtonImage            = SNHammerCannon

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    DefaultConditionState
      Model               = NVHammer
    End
  End

  ; set cost and time fields here or else they won't work
  BuildCost       = 1800
  BuildTime       = 20.0          ;in seconds

  Prerequisites
    Object = Tank_ChinaWarFactory
    Object = Tank_ChinaPropagandaCenter
  End

  Side = ChinaTankGeneral
  EditorSorting = VEHICLE
  BuildVariations = Spec_ChinaVehicleNukeLauncher

  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE

End
