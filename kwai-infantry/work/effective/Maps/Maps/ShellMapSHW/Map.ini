Object AmericaVehicleSentryDrone

  RemoveModule ModuleTag_04     ;Removes Default AIUpdate settings
  RemoveModule ModuleTag_06     ;Removes Stealth settings

  AddModule                     ;Adds the new AIUpdate settings
  
    Behavior = AIUpdateInterface ModuleTag_04
    Turret
      TurretTurnRate        = 180
      TurretPitchRate       = 180
      FirePitch             = 0            ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch           = No
      RecenterTime          = 1000         ; how long to wait during idle before recentering
      ControlledWeaponSlots = PRIMARY TERTIARY
      NaturalTurretAngle    = 0
      InitiallyDisabled     = No
      MinIdleScanInterval   = 250    ; in milliseconds
      MaxIdleScanInterval   = 250    ; in milliseconds
      MinIdleScanAngle      = 0       ; in degrees off the natural turret angle
      MaxIdleScanAngle      = 360     ; in degrees off the natural turret angle
    End
    AutoAcquireEnemiesWhenIdle = Yes
   End
   
  End
  
  AddModule
  
   Behavior = GrantUpgradeCreate ModuleTag_ShellmapUpgrade01
      UpgradeToGrant           = Upgrade_AmericaSentryDroneGun
   End
   
  End
  
    
  AddModule
  
   Behavior = GrantUpgradeCreate ModuleTag_ShellmapUpgrade01
      UpgradeToGrant           = Upgrade_MammothRocketPods
   End
   
  End
  
End

