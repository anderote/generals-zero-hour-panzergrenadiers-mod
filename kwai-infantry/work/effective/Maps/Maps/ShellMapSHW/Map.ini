Object Spec_ChinaNuclearMissileLauncher

  RemoveModule ModuleTag_09

 AddModule                     ;Adds the new cannon open and close times
  
  Behavior = MissileLauncherBuildingUpdate ModuleTag_09
    SpecialPowerTemplate = SuperweaponEarthshaker
    DoorOpenTime         = 8910
    DoorWaitOpenTime     = 5000
    DoorCloseTime        = 8910

    ; FXLists to play at transitions:
    DoorOpeningFX        = TempleOFGaiaBlastDoors_Opening
    DoorOpenFX           = TempleOFGaiaBlastDoors_Opened
    DoorClosingFX        = TempleOFGaiaBlastDoors_Closing
    DoorClosedFX         = TempleOFGaiaBlastDoors_Closed
  End
  
 End

End

Object Spec_ChinaGattlingCannon

 RemoveModule ModuleTag_01     ;Removes Default art settings

AddModule                     ;Adds the new art settings
  
   Draw = W3DModelDraw ModuleTag_01

    OkToChangeModelColor = Yes

    DefaultConditionState
      Model             = NBSent_A
      Animation         = NBSent_A.NBSent_A
      AnimationMode     = MANUAL
      Turret            = TURRET01
      TurretPitch       = TURRETEL01
      WeaponFireFXBone  = PRIMARY MuzzleFX
      WeaponMuzzleFlash = PRIMARY MuzzleFX
    End
    AliasConditionState = NIGHT
    
    ConditionState      = DAMAGED
      Model             = NBSent_DA
    End
    AliasConditionState = NIGHT DAMAGED
    AliasConditionState = SNOW DAMAGED
    AliasConditionState = SNOW NIGHT DAMAGED
    
    ConditionState      = REALLYDAMAGED 
      Model             = NBSent_EA
    End
    AliasConditionState = NIGHT REALLYDAMAGED
    AliasConditionState = RUBBLE
    AliasConditionState = NIGHT RUBBLE
    AliasConditionState = SNOW REALLYDAMAGED
    AliasConditionState = SNOW NIGHT REALLYDAMAGED
    AliasConditionState = SNOW RUBBLE
    AliasConditionState = SNOW NIGHT RUBBLE 
    
    
;;;;Snow Conditionstate

    ConditionState      = SNOW
      Model             = NBSent_SA
    End
    AliasConditionState = SNOW NIGHT
    
   
    ;;Attacking States
    
;------------------------ First Spinup state ------------------------

    ConditionState      = ATTACKING
      Model             = NBSent_A
      Animation         = NBSent_A.NBSent_A
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 0.8 0.8
    End
    AliasConditionState = ATTACKING NIGHT
    
    ConditionState      = ATTACKING DAMAGED
      Model             = NBSent_DA
      Animation         = NBSent_DA.NBSent_DA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 0.8 0.8
    End
    AliasConditionState = ATTACKING NIGHT DAMAGED
    AliasConditionState = ATTACKING SNOW DAMAGED
    AliasConditionState = ATTACKING SNOW NIGHT DAMAGED
    
    ConditionState      = ATTACKING REALLYDAMAGED 
      Model             = NBSent_EA
      Animation         = NBSent_EA.NBSent_EA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 0.8 0.8
    End
    AliasConditionState = ATTACKING NIGHT REALLYDAMAGED
    AliasConditionState = ATTACKING RUBBLE
    AliasConditionState = ATTACKING NIGHT RUBBLE
    AliasConditionState = ATTACKING SNOW REALLYDAMAGED
    AliasConditionState = ATTACKING SNOW NIGHT REALLYDAMAGED
    AliasConditionState = ATTACKING SNOW RUBBLE
    AliasConditionState = ATTACKING SNOW NIGHT RUBBLE 
    
    
;;;;Snow Conditionstate

    ConditionState      = ATTACKING SNOW
      Model             = NBSent_SA
      Animation         = NBSent_SA.NBSent_SA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.0 1.0
    End
    AliasConditionState = ATTACKING SNOW NIGHT
    
    
;------------------------ Second Spinup state ------------------------

    ConditionState      = ATTACKING CONTINUOUS_FIRE_SLOW
      Model             = NBSent_A
      Animation         = NBSent_A.NBSent_A
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.0 1.0
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW NIGHT
    
    ConditionState      = ATTACKING CONTINUOUS_FIRE_SLOW DAMAGED
      Model             = NBSent_DA
      Animation         = NBSent_DA.NBSent_DA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.0 1.0
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW NIGHT DAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW SNOW DAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW SNOW NIGHT DAMAGED
    
    ConditionState      = ATTACKING CONTINUOUS_FIRE_SLOW REALLYDAMAGED 
      Model             = NBSent_EA
      Animation         = NBSent_EA.NBSent_EA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.0 1.0
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW NIGHT REALLYDAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW RUBBLE
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW NIGHT RUBBLE
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW SNOW REALLYDAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW SNOW NIGHT REALLYDAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW SNOW RUBBLE
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW SNOW NIGHT RUBBLE 
    
    
;;;;Snow Conditionstate

    ConditionState      = ATTACKING CONTINUOUS_FIRE_SLOW SNOW
      Model             = NBSent_SA
      Animation         = NBSent_SA.NBSent_SA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.0 1.0
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_SLOW SNOW NIGHT


;------------------------ Third Spinup state ------------------------

    ConditionState      = ATTACKING CONTINUOUS_FIRE_MEAN
      Model             = NBSent_A
      Animation         = NBSent_A.NBSent_A
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.2 1.2
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN NIGHT
    
    ConditionState      = ATTACKING CONTINUOUS_FIRE_MEAN DAMAGED
      Model             = NBSent_DA
      Animation         = NBSent_DA.NBSent_DA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.2 1.2
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN NIGHT DAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN SNOW DAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN SNOW NIGHT DAMAGED
    
    ConditionState      = ATTACKING CONTINUOUS_FIRE_MEAN REALLYDAMAGED 
      Model             = NBSent_EA
      Animation         = NBSent_EA.NBSent_EA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.2 1.2
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN NIGHT REALLYDAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN RUBBLE
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN NIGHT RUBBLE
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN SNOW REALLYDAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN SNOW NIGHT REALLYDAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN SNOW RUBBLE
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN SNOW NIGHT RUBBLE 
    
    
;;;;Snow Conditionstate

    ConditionState      = ATTACKING CONTINUOUS_FIRE_MEAN SNOW
      Model             = NBSent_SA
      Animation         = NBSent_SA.NBSent_SA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.2 1.2
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_MEAN SNOW NIGHT


;------------------------ Final Spinup state ------------------------

    ConditionState      = ATTACKING CONTINUOUS_FIRE_FAST
      Model             = NBSent_A
      Animation         = NBSent_A.NBSent_A
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.5 1.5
      ParticleSysBone    = MuzzleFX01 GattlingMuzzleSmoke
      ParticleSysBone    = MuzzleFX02 GattlingMuzzleSmoke
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST NIGHT
    
    ConditionState      = ATTACKING CONTINUOUS_FIRE_FAST DAMAGED
      Model             = NBSent_DA
      Animation         = NBSent_DA.NBSent_DA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.5 1.5
      ParticleSysBone    = MuzzleFX01 GattlingMuzzleSmoke
      ParticleSysBone    = MuzzleFX02 GattlingMuzzleSmoke
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST NIGHT DAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST SNOW DAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST SNOW NIGHT DAMAGED
    
    ConditionState      = ATTACKING CONTINUOUS_FIRE_FAST REALLYDAMAGED 
      Model             = NBSent_EA
      Animation         = NBSent_EA.NBSent_EA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.5 1.5
      ParticleSysBone    = MuzzleFX01 GattlingMuzzleSmoke
      ParticleSysBone    = MuzzleFX02 GattlingMuzzleSmoke
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST NIGHT REALLYDAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST RUBBLE
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST NIGHT RUBBLE
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST SNOW REALLYDAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST SNOW NIGHT REALLYDAMAGED
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST SNOW RUBBLE
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST SNOW NIGHT RUBBLE 
    
    
;;;;Snow Conditionstate

    ConditionState      = ATTACKING CONTINUOUS_FIRE_FAST SNOW
      Model             = NBSent_SA
      Animation         = NBSent_SA.NBSent_SA
      AnimationMode     = LOOP
      AnimationSpeedFactorRange = 1.5 1.5
      ParticleSysBone    = MuzzleFX01 GattlingMuzzleSmoke
      ParticleSysBone    = MuzzleFX02 GattlingMuzzleSmoke
    End
    AliasConditionState = ATTACKING CONTINUOUS_FIRE_FAST SNOW NIGHT
    
  End
   
End
  
  AddModule
  
   Behavior = GrantUpgradeCreate ModuleTag_ShellmapUpgrade01
      UpgradeToGrant           = Upgrade_ChinaWhiteNapalm
   End
   
  End
  
End

