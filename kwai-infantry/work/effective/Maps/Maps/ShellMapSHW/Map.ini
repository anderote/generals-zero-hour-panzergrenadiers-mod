Object GLAInfantryTunnelDefender

 AddModule                     ;Death module to prevent this unit from staying on the map forever when it doesn't get into firing range
 
  Behavior = LifetimeUpdate ModuleTag_Life01
    MinLifetime       = 30000 ;we will live for 30 seconds and then we just die
    MaxLifetime       = 30000
  End
  
 End

End

