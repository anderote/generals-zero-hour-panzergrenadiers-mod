Object AmericaVehicleHumvee

  RemoveModule ModuleTag_01   ;Removes Default Art settings

  AddModule                     ;Adds the new Art settings
  
   Draw = W3DOverlordAircraftDraw  ModuleTag_01

    ParticlesAttachedToAnimatedBones = Yes
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = NVHelixTG_S
      Animation = NVHelixTG_S.NVHelixTG_S
      AnimationMode = LOOP
      HideSubObject = Muzzle03 TurretFX03
    End

    ConditionState = MOVING
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End

    ConditionState = REALLYDAMAGED
      Model = NVHelixTG_S
      Animation = NVHelixTG_S.NVHelixTG_S
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED MOVING
      Model = NVHelixTG_S
      Animation = NVHelixTG_S.NVHelixTG_S
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End

    ConditionState = RUBBLE
      Model = NVHelixTG_S
      Animation = NVHelixTG_S.NVHelixTG_S
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE MOVING
      Model = NVHelixTG_S
      Animation = NVHelixTG_S.NVHelixTG_S
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End

    ConditionState = RUBBLE SPECIAL_DAMAGED
      Model = NVHelixTG_S 
    End
    
   End
   
  End
  
End


