; -----------------------------------------------------------------------------
; SagePatch - Casual QoL overrides for GeneralsX
;
; Loaded by the engine after the BIG-archived Data/INI/GameData.ini, so values
; here override (not append to) the originals.
; -----------------------------------------------------------------------------

GameData
  ; Force the ShockWave shellmap (our Kwai showcase override lives here). The base
  ; game GameData sets ShellMapMD and the mod's override wasn't taking effect, so
  ; pin it here where SagePatch overrides unconditionally (loaded after GameData).
  ShellMapName = Maps\ShellMapSHW\ShellMapSHW.map

  ; Slightly higher than vanilla (310); further out without seeing past the map border.
  ; Raised 350 -> 490 (2026-07-19): ~140% zoom-out for a wider battlefield view.
  MaxCameraHeight = 490.0
  ; Slightly lower than vanilla (120) so casual zoom-in feels useful.
  ; Lowered again 100 -> 80 (2026-07-19) for closer zoom.
  MinCameraHeight = 80.0
  ; Still soft-disabled so the user can push past max without a hard clamp.
  EnforceMaxCameraHeight = No
  ; Keyboard scroll - vanilla 0.5 is sluggish; doubled, then +15% (2026-07-11).
  KeyboardScrollSpeedFactor = 1.15
  ; ~5more terrain drawn at max zoom to fix terrain pop-in.
  ; Raised 1.05 -> 1.30 (2026-07-19) to match the 490 max camera height.
  TerrainDrawDistanceScale = 1.30
  UseFPSLimit = Yes
  FramesPerSecondLimit = 60

  ; --- Battlefield readability (engine batch 4, deployed 2026-07-11) ---
  ; Vehicle wrecks linger 3x longer before fading, so you can read where the
  ; fighting has been. Hulks only, never shortens; bit-identical across peers.
  WreckLifetimeScale = 3.0
  ; Draw subtle tracer streaks for weapons whose FireFX lacks one, so big
  ; firefights are legible. Client-side draw only, no logic/desync impact.
  ExtraTracers = Yes

  ; --- Veterancy overhaul (added 2026-07-10, +7.5% across the board same day) ---
  ; Vanilla: VET 110/120/120, ELITE 120/140/130, HERO 130/160/150 (dmg/rof/hp)
  WeaponBonus = VETERAN  DAMAGE        140%
  WeaponBonus = VETERAN  RATE_OF_FIRE  151%
  WeaponBonus = ELITE    DAMAGE        172%
  WeaponBonus = ELITE    RATE_OF_FIRE  177%
  WeaponBonus = HERO     DAMAGE        215%
  WeaponBonus = HERO     RATE_OF_FIRE  215%
  ; Garrisoned infantry (bunker bays, Overlord bunkers, buildings): more reach.
  ; Vanilla GARRISONED: RANGE 133%, DAMAGE 125% (damage left stock).
  ; Toned 175%->140% (2026-07-11 rebalance) so garrisoning is a solid bonus, not dominant.
  ; Bumped 140%->150% (2026-07-19) per play feel.
  WeaponBonus = GARRISONED RANGE 150%

  ; Range ramps linearly to 150% at heroic
  WeaponBonus = VETERAN  RANGE         117%
  WeaponBonus = ELITE    RANGE         133%
  WeaponBonus = HERO     RANGE         150%
  HealthBonus_Veteran = 161%
  HealthBonus_Elite   = 194%
  HealthBonus_Heroic  = 247%

  ; --- Ranks 5-8 (requires veterancy-8 engine build, deployed 2026-07-10) ---
  ; Health is absolute per rank; ends at 400% at max rank (level 8 / HEROIC5).
  HealthBonus_Heroic2 = 285%
  HealthBonus_Heroic3 = 325%
  HealthBonus_Heroic4 = 362%
  HealthBonus_Heroic5 = 400%
  ; HERO2..HERO5 weapon bonuses are MARGINAL (they stack multiplicatively on
  ; HERO and each other). Totals at level 8: ~350% damage, ~282% ROF, ~197% range.
  WeaponBonus = HERO2  DAMAGE        113%
  WeaponBonus = HERO3  DAMAGE        113%
  WeaponBonus = HERO4  DAMAGE        113%
  WeaponBonus = HERO5  DAMAGE        113%
  WeaponBonus = HERO2  RATE_OF_FIRE  107%
  WeaponBonus = HERO3  RATE_OF_FIRE  107%
  WeaponBonus = HERO4  RATE_OF_FIRE  107%
  WeaponBonus = HERO5  RATE_OF_FIRE  107%
  WeaponBonus = HERO2  RANGE         107%
  WeaponBonus = HERO3  RANGE         107%
  WeaponBonus = HERO4  RANGE         107%
  WeaponBonus = HERO5  RANGE         107%

  ; --- HEROIC6, the 9th rank (2026-07-19) ---
  ; Continues the absolute-HP ladder past Heroic5's 400%.
  HealthBonus_Heroic6 = 430%
  ; Marginal weapon bonuses, consistent with HERO2..HERO5.
  WeaponBonus = HERO6  DAMAGE        113%
  WeaponBonus = HERO6  RATE_OF_FIRE  107%
  WeaponBonus = HERO6  RANGE         107%
  ; The final rank costs x3 the normal extrapolation step (default 3.0; explicit for clarity).
  VeterancyFinalRankXPFactor = 3.0

  ; --- Max-rank (Heroic 6) perks (2026-07-19) ---
  ; Death-defiance: fallen max-rank units respawn at a friendly command center at 50% HP.
  VeterancyMaxRankRespawn = Yes
  VeterancyMaxRankRespawnHealthPercent = 50%
  ; Battle-hardened: max-rank self-heal rate (replaces the normal heroic pulse).
  VeterancyMaxRankRegenPercent = 3%
  ; Bounty: MaxRankBounty-flagged units (Battlemaster/Panzergrenadier/Red Guard) earn
  ; this share of the victim's build cost per kill at max rank.
  VeterancyMaxRankBountyPercent = 10%
  ; Mentor aura: max-rank units trickle XP to nearby friendlies.
  VeterancyMentorAura = Yes
  VeterancyMentorScanFrames = 60
  VeterancyMentorXP = 2
  VeterancyMentorRadius = 150
  ; Eagle-eye: top vision tier at max rank.
  VisionBonus_Heroic6 = 180%

  ; --- Hard-AI cash stipend (2026-07-19; engine >= batch 3) ---
  ; Every interval, each active HARD computer player receives the lump sum.
  AICashInjectionHard = 6000
  AICashInjectionHardSeconds = 45
End
