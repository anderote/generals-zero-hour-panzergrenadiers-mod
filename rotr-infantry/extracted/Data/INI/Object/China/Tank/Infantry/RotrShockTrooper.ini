      Model     = CITESLA_SKN
      Animation = CITESLA_SKN.CITESLA_SKN 
      AnimationMode = ONCE
      ParticleSysBone = NONE FireInfantrySmall
    End

  End

  ; ***DESIGN parameters ***
  Side = Civilian
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  ArmorSet
    Conditions      = None
    Armor           = InvulnerableArmorAll
    DamageFX        = None
  End
  VisionRange = 150
  DisplayName = OBJECT:FlamingInfantry

  ; *** AUDIO Parameters ***

  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf = CAN_CAST_REFLECTIONS INFANTRY

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 50.0
    InitialHealth   = 50.0
  End

  Behavior = WanderAIUpdate ModuleTag_03
  End
  
  Locomotor = SET_NORMAL PanicHumanLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 5.0
  End

  Behavior = LifetimeUpdate ModuleTag_05
    MinLifetime = 1 ; randomness for these means going out of sync of the animation and particles
    MaxLifetime = 1
  End

  Behavior = SlowDeathBehavior ModuleTag_06
    SinkDelay = 2500
    SinkRate = 1.5     ; in Dist/Sec
    DestructionDelay = 4500
  End
 
  Behavior = SquishCollide ModuleTag_07
  End

  Behavior = FXListDie ModuleTag_08
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_GIDie
  End
  
  Behavior = FXListDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_GIDieCrushed
  End

