;FILE: Armor.ini

; damage types and descriptions

; Bullet Weapons
; "SMALL_ARMS" - used by most bullet weapons
; "GATTLING" - used by gattling weapons
; "COMANCHE_VULCAN" - used by aircraft bullet weapons
; "SNIPER"

; Heavy Weapons
; "EXPLOSION" - used by heavy weapons
; "INFANTRY_MISSILE" - used by missile soldiers
; "ARMOR_PIERCING" - used by tanks
; "JET_MISSILES" - used by aircraft missile weapons
; "STEALTHJET_MISSILES"
; "AURORA_BOMB"

; Hazard Weapons
; "MICROWAVE" - microwave emitter weapon
; "POISON"
; "LAND_MINE"
; "RADIATION"

; Flame Weapons - Triggers the Flammable Update
; "PARTICLE_BEAM"
; "FLAME"

; disable weapons
; "SUBDUAL_BUILDING" - used by Microwave Tanks
; "SUBDUAL_MISSILE" - used by missile jammers
; "SUBDUAL_VEHICLE" - used by ECM Tanks

; Misc Weapons
; "UNRESISTABLE"
; "HEALING" - used for healing and repairinf
; "FALLING"
; "SURRENDER" - used by flashbangs
; "MELEE" - used by Burton
; "MOLOTOV_COCKTAIL" - used by Angry Mobs
; "KILL_PILOT" - used by Jarmen
; "CRUSH"
; "DISARM" - used by Workers/Dozers
; "HAZARD_CLEANUP" - used by Ambulance
; "LASER" - used by PDL weapons

; Unused Weapons
; "HACK"
; "PENALTY"
; "DEPLOY"
; "WATER"

; misc armors
Armor NoArmor
  Armor = DEFAULT 100%
  Armor = HAZARD_CLEANUP 0%
  Armor = SUBDUAL_MISSILE 0%
  Armor = SUBDUAL_VEHICLE 0%
  Armor = SUBDUAL_BUILDING 0%
End

Armor InvulnerableAllArmor
  Armor = DEFAULT 0%    
  Armor = UNRESISTABLE 100%
End

; This makes you nearly-invulnerable to everything except "KILL" damage.
; (We don't want to set the armor to 0%, because then things would realize
; they couldn't do any damage to us at all, and refuse to target us.)
Armor InvulnerableArmor     
  Armor = DEFAULT 1%
  Armor = HAZARD_CLEANUP 0%
  Armor = SURRENDER 0%
End

Armor HazMatHumanArmor
  Armor = CRUSH             200%    ;humans are easily crushed ["I'm crushing your head"]
  Armor = ARMOR_PIERCING    10%     ;humans don't get hit by tank rounds.  
  Armor = SNIPER            200%
  Armor = FLAME             25%     ;Hazmat's have a good resistance to fire.
  Armor = LASER             0% ;25%     ;Hazmat's can resist laser fire a bit better than infantry.
  Armor = POISON            0%      ;Unharmed by poison
  Armor = RADIATION         0%      ;Unharmed by radiation too
  Armor = MICROWAVE         0%      ;Unharmed by radiation too
  Armor = PARTICLE_BEAM     150%    ;humans don't fare well against orbital beams... even with hazmat protection!
  Armor = HAZARD_CLEANUP    0%      ;Not harmed by cleaning weapons
  Armor = KILL_PILOT        0%      ;Jarmen Kell uses against vehicles only.
  Armor = SURRENDER         100%    ;Capture type weapons are effective only against infantry.
  Armor = SUBDUAL_MISSILE   0%
  Armor = SUBDUAL_VEHICLE   0%
  Armor = SUBDUAL_BUILDING  0%
End



Armor TankArmor
  Armor = CRUSH              50%      ;tanks are extra-hard to crush
  Armor = SMALL_ARMS         25%
