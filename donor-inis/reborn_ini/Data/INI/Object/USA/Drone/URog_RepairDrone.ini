; USA Rogue Repair Drone
Object USARogue_AmericaVehicleRepairDrone

  ; *** ART PARAMETERS ***
  SelectPortrait         = SSRepairDrone2_L
  ButtonImage            = SSRepairDrone2
    
  Draw = W3DTruckDraw ModuleTag_01

    OkToChangeModelColor = Yes

    DefaultConditionState
      Model             = AVRepairDr
      WaitForStateToFinishIfPossible = TRANS_DIGGING
    End

    ConditionState = ACTIVELY_CONSTRUCTING
      Model = AVRepairDr
      Animation = AVREPAIRDR.AVREPAIRDR
      AnimationMode = ONCE
      ParticleSysBone = EXHAUSTFX01 DozerSmokeHeavy
      ParticleSysBone = DIRTFX01 DozerDirtFall
      TransitionKey = TRANS_DIGGING
    End

    ConditionState = PREATTACK_A 
      Model             = AVRepairDr
      ParticleSysBone   = EXHAUSTFX01 DozerSmokeHeavy
      ParticleSysBone   = DIRTFX01 DozerDirtFall ;gush of dirt
      TransitionKey     = TRANS_DIGGING
    End

    ConditionState = MOVING
      Model             = AVRepairDr
      WaitForStateToFinishIfPossible = TRANS_DIGGING
    End

    ConditionState      = RUBBLE
      Model             = AVSENTRY_D1
      ParticleSysBone   = EXHAUSTFX01 DozerSmokeHeavy
      WaitForStateToFinishIfPossible = TRANS_DIGGING_DAMAGED
    End

    TrackMarks            = EXTireTrack.tga
    Dust                  = RocketBuggyDust
    DirtSpray             = RocketBuggyDirtSpray

  End

  ; *** DESIGN PARAMETERS ***
  DisplayName         = OBJECT:RepairDrone
  Side                = AmericaRogueGeneral
  EditorSorting       = VEHICLE
  TransportSlotCount  = 2 ;how many "slots" we take in a transport (0 == not transportable)
  BuildCost           = 500
  BuildTime           = 5.0 ; in seconds
  VisionRange         = 300
  ShroudClearingRange = 200

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY None
  End
  WeaponSet
    Conditions = MINE_CLEARING_DETAIL 
    Weapon = PRIMARY DozerMineDisarmingWeapon
  End

  ArmorSet
    Conditions        = None
    Armor             = TankArmor 
    DamageFX          = TankDamageFX
  End
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet             = RepairDroneCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect           = SentryDroneVoiceSelect
  VoiceMove             = SentryDroneVoiceMove
  VoiceGuard            = SentryDroneVoiceMove
  VoiceAttack           = SentryDroneVoiceMove
  SoundMoveStart        = SentryDroneMoveStart
  VoiceTaskComplete   = EvaUSA_ConstructionComplete
  SoundMoveStartDamaged = NoSound
  UnitSpecificSounds
    VoiceRepair           = SentryDroneVoiceSelect
    VoiceDisarm           = SentryDroneVoiceMove
    TruckLandingSound     = NoSound
    TruckPowerslideSound  = NoSound
    VoiceBuildResponse    = EvaUSA_Building
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority       = UNIT
  KindOf              = PRELOAD VEHICLE SCORE SELECTABLE CAN_CAST_REFLECTIONS DOZER
 
  Body                = ActiveBody ModuleTag_02
    MaxHealth         = 300.0
    InitialHealth     = 300.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 500
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = DozerAIUpdate ModuleTag_03
    RepairHealthPercentPerSecond = 5%    ; % of max health to repair each second
    BoredTime                    = 5000  ; in milliseconds
    BoredRange                   = 500   ; when bored, we look this far away to do something
    ; the only "enemies" that workers can acquire are mines, to be disarmed...
    AutoAcquireEnemiesWhenIdle   = Yes
  End

  Locomotor = SET_NORMAL SentryLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 50.0
  End

  Behavior = StealthDetectorUpdate ModuleTag_67
    DetectionRate         = 500   ; how often to rescan for stealthed things in my sight (msec)
    ;DetectionRange       = ??? ;Dustin, enable this for independant balancing!
    CanDetectWhileGarrisoned  = No ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained   = No ;Contained means being in a transport or tunnel network.
    ExtraRequiredKindOf   = MINE  ; we can only detect MINES, not other stealthed things
  End

  Behavior                 = TransitionDamageFX ModuleTag_06
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = SlowDeathBehavior ModuleTag_62
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay  = 500
    DestructionDelayVariance  = 100
    FX  = INITIAL  FX_GenericTankDeathEffect
    OCL = MIDPOINT OCL_AmericaVehicleSentryDroneDie
    FX =  FINAL FX_AmericaVehicleTomahawkDeathExplosion
  End

  Behavior = CreateCrateDie ModuleTag_CratesChange
    CrateData = SalvageCrateData
  End
  
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior               = FXListDie ModuleTag_23
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX         = FX_CarCrush
  End

  Behavior = DestroyDie ModuleTag_24
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = AutoFindHealingUpdate   ModuleTag_05 ; This update will have the unit go to a healing station if injured. jba 
    ScanRate = 1000 ; once a second.
    ScanRange = 300 ;
    NeverHeal = 0.85 ;  don't heal if we are > 85% healthy.
    AlwaysHeal = 0.50 ; if we get below 25%, find healing right away.
  End

  Geometry            = BOX
  Scale = 0.95                            ;Scaling
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 10.0
  GeometryHeight      = 15.0     
  GeometryIsSmall     = Yes
  Shadow              = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length    

End