; Spy Drone
;------------------------------------------------------------------------------
Object AmericaVehicleSpyDrone

  ; *** ART PARAMETERS ***
  SelectPortrait = SAScout_L
  ButtonImage = SAScout
  
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = AVSpyDr
    End
    ConditionState = REALLYDAMAGED
      Model = AVSpyDr_D
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:SpyDrone
  
  Side = America
  EditorSorting = VEHICLE
  
  TransportSlotCount = 0
  
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = SmallTankDamageFX
  End
  
  VisionRange = 250
  ;ShroudClearingRange = 0 ; Dynamic range below
  
  IsTrainable = No 
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = SentryDroneVoiceSelect
  VoiceMove = SentryDroneVoiceMove
  SoundMoveStart = ScoutDroneMoveStart

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD VEHICLE SCORE DRONE SELECTABLE IGNORES_SELECT_ALL ;INERT NO_SELECT
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 200
    InitialHealth = 200
  End

  Behavior = AIUpdateInterface AITag_Normal
    AutoAcquireEnemiesWhenIdle = No
  End

  Locomotor = SET_NORMAL SpyDroneLocomtor

  Behavior = DynamicShroudClearingRangeUpdate ModuleTag_DynamicShroudClearingRange
    FinalVision = 250
    ChangeInterval = 50
    ShrinkDelay = 2000
    ShrinkTime = 1000
    GrowDelay = 0
    GrowTime = 1000
    GrowInterval = 10

    GridDecalTemplate
      Texture = EXGrid
      Style = SHADOW_ADDITIVE_DECAL
      OpacityMin = 50%
      OpacityMax = 100%
      OpacityThrobTime = 500
      Color = R:32 G:64 B:128 A:0 //dim blue, additive
    End
  End

  Behavior = StealthDetectorUpdate ModuleTag_SteathDetect
    DetectionRate = 500
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End
  
  ; Damage FX
  Behavior = TransitionDamageFX ModuleTag_TransDmg01
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleDroneDamageTransitionSmall
  End
  
  ; Death FX
  Behavior = InstantDeathBehavior DeathTag_All
    DeathTypes = ALL
    FX = FX_AmericaScoutDroneExplode
    OCL = OCL_AmericaScoutDroneExplode
  End

  Behavior = StealthUpdate ModuleTag_09
    StealthDelay = 2000
    StealthForbiddenConditions = TAKING_DAMAGE
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End
  
  ; Drone Armor
  Behavior = MaxHealthUpgrade ModuleTag_DroneArmor
    TriggeredBy = Upgrade_AmericaDroneArmor
    AddMaxHealth = 50
    ChangeType = ADD_CURRENT_HEALTH_TOO
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 5
  GeometryMinorRadius = 6
  GeometryHeight = 3
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89
End