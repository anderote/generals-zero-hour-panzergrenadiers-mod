Object Lazr_AmericaInfantryRanger

  ; *** ART PARAMETERS ***
  SelectPortrait         = Marine
  ButtonImage            = Marine

  UpgradeCameo1 = Upgrade_InfantryCaptureBuilding
  UpgradeCameo2 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo3 = Upgrade_AmericaChemicalSuits
  UpgradeCameo4 = Upgrade_AmericaC4Charges
  UpgradeCameo5 = Upgrade_AmericaHEGrenades

  Draw = W3DModelDraw ModuleTag_01

    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model             = CIUNSL_SKN
      IdleAnimation     = CIUNSL_SKL.CIUNSL_STA 0 21
      IdleAnimation     = CIUNSL_SKL.CIUNSL_ID1
      IdleAnimation     = CIUNSL_SKL.CIUNSL_ID2
      AnimationMode     = ONCE
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone  = SECONDARY Muzzle
      ;WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone  = TERTIARY Muzzle
      WeaponLaunchBone  = TERTIARY Muzzle
      ;WeaponMuzzleFlash = TERTIARY MuzzleFX
      TransitionKey     = TRANS_Stand
    End

    ConditionState      = FIRING_A 
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_LP
      AnimationMode     = LOOP
      TransitionKey     = TRANS_FiringA
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A
    AliasConditionState = RELOADING_A

    TransitionState     = TRANS_Stand TRANS_FiringA
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_ST
      AnimationMode     = ONCE
      AnimationSpeedFactorRange = 4 4
    End

    TransitionState     = TRANS_FiringA TRANS_Stand
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_ED
      AnimationMode     = ONCE
      AnimationSpeedFactorRange = 4 4
    End

    ; these aliases handle the attack-move case.
    AliasConditionState = MOVING FIRING_A
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_A
    AliasConditionState = MOVING RELOADING_A

   
    ConditionState      = FIRING_B 
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_LP
      AnimationMode     = LOOP
      TransitionKey     = TRANS_FiringA
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_B
    AliasConditionState = RELOADING_B

    TransitionState     = TRANS_Stand TRANS_FiringB
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_ST
      AnimationMode     = ONCE
      AnimationSpeedFactorRange = 4 4
    End

    TransitionState     = TRANS_FiringB TRANS_Stand
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_ED
      AnimationMode     = ONCE
      AnimationSpeedFactorRange = 4 4
    End

    ; these aliases handle the attack-move case.
    AliasConditionState = MOVING FIRING_B
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_B
    AliasConditionState = MOVING RELOADING_B

    ConditionState      = FIRING_C 
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_LP
      AnimationMode     = LOOP
      TransitionKey     = TRANS_FiringA
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_C
    AliasConditionState = RELOADING_C

    TransitionState     = TRANS_Stand TRANS_FiringC
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_ST
      AnimationMode     = ONCE
      AnimationSpeedFactorRange = 4 4
    End

    TransitionState     = TRANS_FiringC TRANS_Stand
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_ED
      AnimationMode     = ONCE
      AnimationSpeedFactorRange = 4 4
    End

    ; these aliases handle the attack-move case.
    AliasConditionState = MOVING FIRING_C
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_C
    AliasConditionState = MOVING RELOADING_C

    ConditionState      = FREEFALL
      Animation         = CIUNSL_SKL.CIUNSL_PFL
      AnimationMode     = LOOP
      TransitionKey     = TRANS_Falling
    End

    ConditionState      = PARACHUTING
      Animation         = CIUNSL_SKL.CIUNSL_PHG
      AnimationMode     = LOOP
      TransitionKey     = TRANS_Chute
    End
    AliasConditionState = PARACHUTING DYING

    ConditionState      = MOVING
      Animation         = CIUNSL_SKL.CIUNSL_RNA 
      AnimationMode     = LOOP
      Flags             = RANDOMSTART
      TransitionKey     = None
    End

    ConditionState      = DYING
      Animation         = CIUNSL_SKL.CIUNSL_DTA
      Animation         = CIUNSL_SKL.CIUNSL_DTB
      AnimationMode     = ONCE
      TransitionKey     = TRANS_Dying
    End

    TransitionState     = TRANS_Dying TRANS_Flailing
      Animation         = CIUNSL_SKL.CIUNSL_ADTA1
      AnimationMode     = ONCE
    End

    ConditionState      = DYING EXPLODED_FLAILING
      Animation         = CIUNSL_SKL.CIUNSL_ADTA2
      AnimationMode     = LOOP
      TransitionKey     = TRANS_Flailing
    End

    ConditionState      = DYING EXPLODED_BOUNCING
      Animation         = CIUNSL_SKL.CIUNSL_ADTA3
      AnimationMode     = ONCE
      TransitionKey     = None
    End
    AliasConditionState = DYING SPLATTED

    TransitionState     = TRANS_Falling TRANS_Chute
      Animation         = CIUNSL_SKL.CIUNSL_POP
      AnimationMode     = ONCE
    End

    TransitionState     = TRANS_Chute TRANS_Stand
      Animation         = CIUNSL_SKL.CIUNSL_PTD
      AnimationMode     = ONCE
    End

    ; --- RAPPELLING ANIMATIONS
    ConditionState      = RAPPELLING
      Animation         = CIUNSL_SKL.CIUNSL_PHG ;30
      AnimationMode     = LOOP
      Flags             = RANDOMSTART
      TransitionKey     = TRANS_Rappelling
    End
    AliasConditionState = MOVING RAPPELLING

    TransitionState     = TRANS_Rappelling TRANS_Stand
      Animation         = CIUNSL_SKL.CIUNSL_PHG
      AnimationMode     = ONCE
    End

    TransitionState     = TRANS_Rappelling TRANS_StandInjured
      Animation         = CIUNSL_SKL.CIUNSL_PHG
      AnimationMode     = ONCE
    End

  End

 ; *** DESIGN PARAMETERS ***
  DisplayName         = OBJECT:Marine
  Side                = AmericaLaserGeneral
  EditorSorting       = INFANTRY
  TransportSlotCount  = 1
  
  WeaponSet
    Conditions = None
    Weapon = PRIMARY MarineAssaultRifle
    Weapon = SECONDARY MarineShotgun
    AutoChooseSources = PRIMARY FROM_SCRIPT FROM_AI DEFAULT_SWITCH_WEAPON
    AutoChooseSources = SECONDARY FROM_SCRIPT FROM_AI
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY MarineAssaultRifle
    Weapon = SECONDARY MarineShotgun
    Weapon = TERTIARY MarineGrenadeLauncher
    AutoChooseSources = PRIMARY FROM_SCRIPT FROM_AI DEFAULT_SWITCH_WEAPON
    AutoChooseSources = SECONDARY FROM_SCRIPT FROM_AI
    AutoChooseSources = TERTIARY FROM_SCRIPT FROM_AI
  End
  
  ArmorSet
    Conditions      = None
    Armor           = HumanArmor
    DamageFX        = InfantryDamageFX
  End
  ArmorSet
    Conditions            = PLAYER_UPGRADE
    Armor                 = ChemSuitHumanArmor
    DamageFX              = None
  End
  VisionRange = 150
  ShroudClearingRange = 400
  BuildCost = 250
  BuildTime = 7.0          ;in seconds  
  
  ExperienceValue = 40 40 80 120    ;Experience point value at each level
  ExperienceRequired = 0 80 120 240  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrushableLevel      = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet          = AmericaInfantryMarineCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = RangerVoiceSelect
  VoiceMove = RangerVoiceMove
  VoiceGuard = RangerVoiceMove
  VoiceAttack = RangerVoiceAttack
  VoiceFear = RangerVoiceFear
  VoiceTaskComplete = RangerVoiceCaptureComplete

  UnitSpecificSounds
    VoiceEnter = RangerVoiceMove
    VoiceEnterHostile = RangerVoiceMove
    VoiceGarrison = RangerVoiceGarrison
    VoiceCreate         = MarineVoiceCreate;RangerVoiceCreate
    VoiceSubdue         = RangerVoiceSubdue
    VoiceClearBuilding  = RangerVoiceClearBuilding
    VoiceGetHealed      = RangerVoiceMove
    VoicePrimaryWeaponMode = RangerVoiceModeGun
    VoiceSecondaryWeaponMode = RangerVoiceModeGun
  End

  UnitSpecificFX
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    CombatDropKillFX = FX_RangerCombatDropKill
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS INFANTRY CAN_RAPPEL SCORE

  Behavior = CommandButtonHuntUpdate ModuleTag_02
  End

  Body = ActiveBody ModuleTag_03
    MaxHealth       = 220.0
    InitialHealth   = 220.0
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_04
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0 ;Increases experience gained by an additional 100%
  End

  Behavior = AutoFindHealingUpdate   ModuleTag_05 ; This update will have the unit go to a healing station if injured. jba 
    ScanRate = 1000 ; once a second.
    ScanRange = 300 ;
    NeverHeal = 0.85 ;  don't heal if we are > 85% healthy.
    AlwaysHeal = 0.25 ; if we get below 25%, find healing right away.
  End

  Behavior = AIUpdateInterface ModuleTag_06
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL MarineLocomotor

  Behavior = PhysicsBehavior ModuleTag_07
    Mass = 5.0
  End

  Behavior = ProductionUpdate ModuleTag_08
    ; nothing
  End

  Behavior = CommandButtonHuntUpdate  ModuleTag_09 ; allows use of command button hunt script with this unit. 
  End
  

; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_RangerDie
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_RangerDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireUSA
    OCL                 = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinUSA
    OCL                 = INITIAL OCL_ToxicInfantry
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death06 ; don't forget to give it a new, unique module tag
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinUSA
    OCL                 = INITIAL OCL_ToxicInfantryBeta ;you'll have to create this OCL and make it use the blue guys instead of green ones
  End

  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinUSA
    OCL                 = INITIAL OCL_ToxicInfantryGamma
  End
; --- end Death modules ---

  Behavior = SquishCollide ModuleTag_12
    ;nothing
  End
  Behavior                = ArmorUpgrade ModuleTag_Armor01
    TriggeredBy           = Upgrade_AmericaChemicalSuits
  End

  ; Behavior = PoisonedBehavior ModuleTag_17
    ; PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    ; PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  ; End
 
  Behavior = SpecialAbility ModuleTag_18
    SpecialPowerTemplate      = SpecialAbilityRangerCaptureBuilding
    UpdateModuleStartsAttack  = Yes
    StartsPaused              = Yes ; Unpaused by upgrade module
    InitiateSound         = RangerVoiceCapture
  End
  Behavior = SpecialAbilityUpdate ModuleTag_19
    SpecialPowerTemplate  = SpecialAbilityRangerCaptureBuilding
    StartAbilityRange     = 5.0
    UnpackTime            = 3000  ; (changing this will scale anim speed)
    PreparationTime       = 20000 ; time to complete hack once prepared (changing this will scale anim speed)
    PackTime              = 2000  ; (changing this will scale anim speed)
    DoCaptureFX           = Yes
    AwardXPForTriggering  = 15
    ;SkillPointsForTriggering = ???  -- Dustin, fill me out if you want different balance values.
  End

  Behavior = UnpauseSpecialPowerUpgrade ModuleTag_20
    SpecialPowerTemplate = SpecialAbilityRangerCaptureBuilding
    TriggeredBy = Upgrade_InfantryCaptureBuilding
  End

  Behavior = SpecialAbility ModuleTag_21
    SpecialPowerTemplate = SpecialAbilityColonelBurtonRemoteCharges
    UpdateModuleStartsAttack = Yes
    InitiateSound             = ColonelBurtonVoicePlantRemoteCharge
  End
 
  Behavior = SpecialAbilityUpdate ModuleTag_22
    SpecialPowerTemplate = SpecialAbilityColonelBurtonRemoteCharges
    StartAbilityRange = 0.0
    PreparationTime = 0
    SpecialObject = MarineRemoteC4Charge
    MaxSpecialObjects = 8
    SpecialObjectsPersistWhenOwnerDies = No ;Charges are removed instantly when owner dies (nobody can detonate).
    AlwaysValidateSpecialObjects = Yes      ;Coupled with the above setting, this one is necessary for code optimization.
    SpecialObjectsPersistent = Yes          ;Charges are persistent till lifetime expires or owner detonates them.
    UniqueSpecialObjectTargets = Yes        ;This prevents multiple charges placed on the same object.
    UnpackTime              = 1500          ;NOTE: Modifying this value will require modifying the delay for ColonelBurtonPlantCharge
    PackTime                = 0
    SkipPackingWithNoTarget = Yes           ;When yes, the packing/unpacking will be ignored when detonating charges.
    FlipOwnerAfterUnpacking = Yes
    FleeRangeAfterCompletion = 100.0         ;Runs away after finishing ability
    UnpackSound               = ColonelBurtonPlantCharge
  End
 
  Behavior = LockWeaponCreate ModuleTag_LockWeapon
    SlotToLock = PRIMARY
  End

  Behavior = WeaponSetUpgrade ModuleTag_24
    TriggeredBy = Upgrade_AmericaHEGrenade
  End 

  Geometry = CYLINDER
  Scale = 0.95
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14;
  ShadowSizeY = 14;
  ShadowTexture = ShadowI;
  BuildCompletion = APPEARS_AT_RALLY_POINT

End