; USA Heli Gen Officer
Object AirF_AmericaInfantryCO

  ; *** ART PARAMETERS ***
  SelectPortrait = Rank_Brigadier_USA
  ButtonImage = Rank_Brigadier_USA 

  UpgradeCameo1 = Upgrade_OfficerPromotion
 
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes

    ; Stand
    DefaultConditionState
      Model = AIOFCR_SKN
      IdleAnimation = AIOFCR_SKL.AIOFCR_STA 0 21
      IdleAnimation = AIOFCR_SKL.AIOFCR_IDA
      IdleAnimation = AIOFCR_SKL.AIOFCR_IDB
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      TransitionKey = TRANS_STAND
    End

    ; Move
    ConditionState = MOVING
      Animation = AIOFCR_SKL.AIOFCR_RNA
      AnimationMode = LOOP
      ParticleSysBone = None InfantryDustTrails
    End

    ; Attacking
    ConditionState = FIRING_A
      Animation = AIOFCR_SKL.AIOFCR_ATALP
      TransitionKey = TRANS_FIRING_A
    End
    
    ConditionState = BETWEEN_FIRING_SHOTS_A
      Animation = AIOFCR_SKL.AIOFCR_ATALP
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_FIRING_A
    End
    AliasConditionState = RELOADING_A
    
    TransitionState = TRANS_FIRING_A TRANS_STAND
      Animation = AIOFCR_SKL.AIOFCR_ATAED
    End
    
    ; Dying
    ConditionState = DYING
      Animation = AIOFCR_SKL.AIOFCR_DTA
      Animation = AIOFCR_SKL.AIOFCR_DTB
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = AIOFCR_SKL.AIOFCR_ADTE1
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = AIOFCR_SKL.AIOFCR_ADTE2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = AIOFCR_SKL.AIOFCR_ADTE3
    End

    ; Cheering
    ConditionState = SPECIAL_CHEERING
      Animation = AIOFCR_SKL.AIOFCR_CHA
      AnimationMode = LOOP
    End

    ; Parachuting
    ConditionState = PARACHUTING
      Animation = AIOFCR_SKL.AIOFCR_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING
    
    TransitionState = TRANS_Falling TRANS_Chute
      Animation = AIOFCR_SKL.AIOFCR_POP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
    End
    
    TransitionState = TRANS_Chute TRANS_Stand
      Animation = AIOFCR_SKL.AIOFCR_PTD
      AnimationMode = ONCE
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Officer
  
  Side = AmericaAirForceGeneral
  EditorSorting = INFANTRY
  
  TransportSlotCount = 1
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY AmericaOfficerPistol
  End
  
  ArmorSet
    Conditions = None
    Armor = HumanArmor
    DamageFX = InfantryDamageFX
  End
  
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = ChemSuitHumanArmor
    DamageFX = None
  End
  
  VisionRange = 200
  ShroudClearingRange = 400
  
  Prerequisites
    Object = AirF_AmericaStrategyCenter
  End
  
  BuildCost = 1500
  BuildTime = 15

  ExperienceValue = 40 80 120 160
  ExperienceRequired = 0 80 160 240
  IsTrainable = Yes
  
  CrushableLevel = 0
  
  CommandSet = AmericaInfantryOfficerCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = RangerVoiceSelect
  VoiceMove = RangerVoiceMove
  VoiceGuard = RangerVoiceMove
  VoiceAttack = RangerVoiceAttack
  VoiceFear = RangerVoiceFear
  
  UnitSpecificSounds
    VoiceCreate = RangerVoiceCreate
    VoiceEnter = RangerVoiceMove
    VoiceEnterHostile = RangerVoiceMove
    VoiceGarrison = RangerVoiceGarrison
    VoiceGetHealed = RangerVoiceMove
  End
  
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY SCORE PARACHUTABLE

  Body = ActiveBody BodyTag_Normal
    MaxHealth = 120
    InitialHealth = 120
  End

  Behavior = AIUpdateInterface AITag_Nromal
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End
  
  Behavior = AutoFindHealingUpdate ModuleTag_FindHealing
    ScanRate = 1000
    ScanRange = 300
    NeverHeal = 0.85
    AlwaysHeal = 0.25
  End

  Locomotor = SET_NORMAL BasicHumanLocomotor
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 5.0
  End
 
  Behavior = SquishCollide ModuleTag_07
    ;nothing
  End

  ; Death Modules
  Behavior = SlowDeathBehavior DeathTag_Normal
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RangerDie
  End
  Behavior = SlowDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior DeathTag_Exploded
    DeathTypes = NONE +EXPLODED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RangerDie
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  Behavior = SlowDeathBehavior DeathTag_Burned
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireUSA
    OCL = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned01
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned02
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantryBeta
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned03
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantryGamma
  End

  Behavior = PropagandaTowerBehavior ModuleTag_Propaganda
    Radius = 250
    DelayBetweenUpdates = 1500
    HealPercentEachSecond = 2%
    PulseFX = FX_OfficerPropagandaTowerPropagandaPulse
    UpgradeRequired = Upgrade_ChinaSubliminalMessaging
    UpgradedHealPercentEachSecond = 4%
    UpgradedPulseFX = FX_OfficerPropagandaTowerSubliminalPulse
  End

  ; Parabombs
  Behavior = OCLSpecialPower ModuleTag_Parabombs
    SpecialPowerTemplate = SuperweaponParaBombs
    OCL = SUPERWEAPON_ParaBombUSA
    CreateLocation = CREATE_AT_EDGE_NEAR_SOURCE
  End
 
  ; Airstrike
  Behavior = OCLSpecialPower ModuleTag_Airstrike
    SpecialPowerTemplate = SuperweaponAirStrike
    OCL = SUPERWEAPON_AirStrike
    CreateLocation = CREATE_AT_EDGE_NEAR_SOURCE
  End

  ; Delta Force
  Behavior = OCLSpecialPower ModuleTag_DeltaForce
    SpecialPowerTemplate = AbilityDeltaForceInsertion
    OCL = OCL_AmericaOfficerChinookSpawn
    CreateLocation = CREATE_AT_LOCATION
  End

  ; Officer Promotion
  Behavior = CommandSetUpgrade ModuleTag_OfficerPromotion
    TriggeredBy = Upgrade_OfficerPromotion
    CommandSet = AmericaInfantryOfficerCommandSetUpgraded
  End
  
  ; Chem Suits
  Behavior = ArmorUpgrade ModuleTag_ChemSuits
    TriggeredBy = Upgrade_AmericaChemicalSuits
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 10
  GeometryMinorRadius = 10
  GeometryHeight = 12
  GeometryIsSmall = Yes
  ;Scale = 0.95
  
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowI
  
  BuildCompletion = APPEARS_AT_RALLY_POINT
End