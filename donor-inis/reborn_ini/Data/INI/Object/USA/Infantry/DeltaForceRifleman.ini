; USA Delta Force Rifleman
Object AmericaInfantryDeltaForceRifleman

  ; *** ART PARAMETERS ***
  SelectPortrait = SpecialOpSoldier
  ButtonImage = SpecialOpSoldier
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo2 = Upgrade_AmericaChemicalSuits
  
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes

    ; Idle
    DefaultConditionState
      Model = MAREIN_SKN
      IdleAnimation = AIHERO_SKL.AIHERO_STA 0 25
      IdleAnimation = AIHERO_SKL.AIHERO_IDA
      IdleAnimation = AIHERO_SKL.AIHERO_IDB
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      TransitionKey = TRANS_Stand
      WeaponFireFXBone = PRIMARY MUZZLE
      WeaponMuzzleFlash = PRIMARY MUZZLEFX
    End

    ; Damaged
    ConditionState = REALLYDAMAGED
      IdleAnimation = AIHERO_SKL.AIHERO_ISTA 0 30
      IdleAnimation = AIHERO_SKL.AIHERO_IIDA
      IdleAnimation = AIHERO_SKL.AIHERO_IIDB
      TransitionKey = TRANS_StandInjured
    End

    TransitionState = TRANS_Stand TRANS_StandInjured
      Animation = AIHERO_SKL.AIHERO_ISTAHIT
      AnimationMode = ONCE
    End

    ; Moving
    ConditionState = MOVING
      Animation = AIHERO_SKL.AIHERO_RNA 26
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_Walking
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING ATTACKING
    
    ; Moving Damaged
    ConditionState = MOVING REALLYDAMAGED
      Animation = AIHERO_SKL.AIHERO_IRNA 26
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_WalkingInjured
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING REALLYDAMAGED ATTACKING

    ; Firing Gun
    ConditionState = FIRING_A
      Animation = AIHERO_SKL.AIHERO_ATA
      AnimationSpeedFactorRange = 1.5 1.5
      TransitionKey = TRANS_FiringA
    End

    ConditionState = BETWEEN_FIRING_SHOTS_A
      Animation = AIHERO_SKL.AIHERO_ATA
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_FiringA
    End
    AliasConditionState = RELOADING_A

    ; Firing Gun Damaged
    ConditionState = FIRING_A REALLYDAMAGED
      Animation = AIHERO_SKL.AIHERO_IATA
      AnimationSpeedFactorRange = 1.5 1.5
      TransitionKey = TRANS_FiringAInjured
    End

    ConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED
      Animation = AIHERO_SKL.AIHERO_IATA
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_FiringAInjured
    End
    AliasConditionState = RELOADING_A REALLYDAMAGED

    TransitionState = TRANS_FiringA TRANS_FiringAInjured
      Animation = AIHERO_SKL.AIHERO_IATAHIT
      AnimationMode = ONCE
    End

    ; Placing Charge
    ConditionState = UNPACKING
      Animation = AIHERO_SKL.AIHERO_ATB1
    End
    AliasConditionState = UNPACKING MOVING

    ; Placing Charge Damaged
    ConditionState = UNPACKING REALLYDAMAGED
      Animation = AIHERO_SKL.AIHERO_IATB1
    End
    AliasConditionState = UNPACKING REALLYDAMAGED MOVING

    ; Knife Attack
    ConditionState = PREATTACK_B
      Animation = AIHERO_SKL.AIHERO_ATC
      TransitionKey = TRANS_Stabbing
    End
    AliasConditionState = PREATTACK_B MOVING
    
    ConditionState = FIRING_B
      Animation = AIHERO_SKL.AIHERO_ATC
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_Stabbing
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_B
    AliasConditionState = RELOADING_B

    TransitionState = TRANS_Stabbing TRANS_Stand
      Animation = AIHERO_SKL.AIHERO_ATC2
    End

    ; Knife Attack Damaged
    ConditionState = PREATTACK_B REALLYDAMAGED
      Animation = AIHERO_SKL.AIHERO_IATC1
      TransitionKey = TRANS_StabbingInjured
    End
    AliasConditionState = PREATTACK_B REALLYDAMAGED MOVING
    
    ConditionState = FIRING_B REALLYDAMAGED
      Animation = AIHERO_SKL.AIHERO_IATC2
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_StabbingInjured
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_B REALLYDAMAGED
    AliasConditionState = RELOADING_B REALLYDAMAGED

    TransitionState = TRANS_StabbingInjured TRANS_StandInjured
      Animation = AIHERO_SKL.AIHERO_IATC2
    End

    ; Cheering
    ConditionState = SPECIAL_CHEERING
      Animation = AIHERO_SKL.AIHERO_CHA
      AnimationMode = ONCE
    End

    ; Cheering Damaged
    ConditionState = SPECIAL_CHEERING REALLYDAMAGED
      Animation = AIHERO_SKL.AIHERO_ICHA
      AnimationMode = ONCE
    End

    ; Death Anims
    ConditionState = DYING
      Animation = AIHERO_SKL.AIHERO_DTA
      Animation = AIHERO_SKL.AIHERO_DTB
      Animation = AIHero_SKL.AIHero_IDTA
      Animation = AIHero_SKL.AIHero_IDTB
      TransitionKey = TRANS_Dying
    End
    AliasConditionState = RAPPELLING DYING
    AliasConditionState = CLIMBING DYING

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = AIHERO_SKL.AIHERO_ADTG21
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = AIHERO_SKL.AIHERO_ADTG22
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = AIHERO_SKL.AIHERO_ADTG23
    End

    ; Misc
    ConditionState = FREEFALL
      Animation = AIHERO_SKL.AIHERO_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL DYING

    ConditionState = PARACHUTING
      Animation = AIHERO_SKL.AIHERO_PHG
      AnimationMode = LOOP
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING

    TransitionState = TRANS_Falling TRANS_Chute
      Animation = AIHERO_SKL.AIHERO_POP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
    End

    TransitionState = TRANS_Chute TRANS_Stand
      Animation = AIHERO_SKL.AIHERO_PTD
    End

    TransitionState = TRANS_Chute TRANS_StandInjured
      Animation = AIHERO_SKL.AIHERO_PTD
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:DeltaForceRifle
  
  Side = America
  EditorSorting = INFANTRY
  
  TransportSlotCount = 1
  
  VisionRange = 200
  ShroudClearingRange = 400
  
  ; This is a GP unit, but just incase:
  BuildCost = 675
  BuildTime = 15
  
  ExperienceValue = 0 40 80 120
  ExperienceRequired = 0 100 200 300
  IsTrainable = Yes
  
  CrushableLevel = 2
  
  CommandSet = AmericaInfantryDeltaForceRiflemanCommandSet
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY DeltaForceAssaultRifle
    Weapon = SECONDARY ColonelBurtonKnifeWeapon
    AutoChooseSources = SECONDARY NONE
  End
  
  ArmorSet
    Conditions = None
    Armor = HumanArmor
    DamageFX = InfantryDamageFX
  End
  
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = ChemSuitHumanArmor
    DamageFX = InfantryDamageFX
  End

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = RangerVoiceSelect
  VoiceMove = RangerVoiceMove
  VoiceGuard = RangerVoiceMove
  VoiceAttack = RangerVoiceAttack
  VoiceFear = RangerVoiceFear
  VoiceTaskComplete = RangerVoiceCaptureComplete
  SoundStealthOn = StealthOn
  SoundStealthOff = StealthOff

  UnitSpecificSounds
    VoiceCreate = RangerVoiceCreate
    VoiceMelee = RangerVoiceClearBuilding
    VoiceGarrison = RangerVoiceGarrison
    VoiceEnter = RangerVoiceMove
    VoiceEnterHostile = RangerVoiceMove
    VoiceGetHealed = RangerVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY SCORE HERO CANNOT_RETALIATE STEALTH_GARRISON

  ; 25% higher than Ranger
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 200
    InitialHealth = 200
  End

  Behavior = AIUpdateInterface AITag_Normal
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End

  Behavior = CommandButtonHuntUpdate ModuleTag_CommandHunt
  End

  Behavior = AutoFindHealingUpdate ModuleTag_FindHealing
    ScanRate = 1000
    ScanRange = 300
    NeverHeal = 0.85
    AlwaysHeal = 0.25
  End

  Locomotor = SET_NORMAL ColonelBurtonGroundLocomotor ColonelBurtonCliffLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 5
  End
  
  ; Chem Suits
  Behavior = ArmorUpgrade ModuleTag_ChemSuits
    TriggeredBy = Upgrade_AmericaChemicalSuits
  End

  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 2000
    StealthForbiddenConditions = FIRING_PRIMARY
    HintDetectableConditions = IS_FIRING_WEAPON 
    FriendlyOpacityMin = 50%
    FriendlyOpacityMax = 100%
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End

  ; Times Demo Charge
  Behavior = SpecialAbility ModuleTag_TimedCharge01
    SpecialPowerTemplate = SpecialAbilityColonelBurtonTimedCharges
    UpdateModuleStartsAttack = Yes
    ;InitiateSound = ColonelBurtonVoicePlantTimedCharge
  End
  Behavior = SpecialAbilityUpdate ModuleTag_TimedCharge02
    SpecialPowerTemplate = SpecialAbilityColonelBurtonTimedCharges
    StartAbilityRange = 0.0
    PreparationTime = 0
    SpecialObject = TimedC4Charge
    MaxSpecialObjects = 10
    SpecialObjectsPersistWhenOwnerDies = Yes 
    SpecialObjectsPersistent = Yes ; Charges stay until lifetime expires
    UniqueSpecialObjectTargets = Yes ; One charge per target
    UnpackTime = 5500
    FlipOwnerAfterUnpacking = Yes
    FleeRangeAfterCompletion = 100
    UnpackSound = ColonelBurtonPlantCharge
    LoseStealthOnTrigger = Yes
    PreTriggerUnstealthTime = 5000
  End
 
  ; Advanced Training
  Behavior = ExperienceScalarUpgrade ModuleTag_AdvTraining
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0
  End

  ; Death Modules
  Behavior = SlowDeathBehavior DeathTag_Normal
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RangerDie
  End
  Behavior = SlowDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior DeathTag_Exploded
    DeathTypes = NONE +EXPLODED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RangerDie
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  Behavior = SlowDeathBehavior DeathTag_Burned
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireUSA
    OCL = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned01
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned02
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantryBeta
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned03
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantryGamma
  End
  
  ; Auto Heal
  Behavior = AutoHealBehavior ModuleTag_AutoHeal
    HealingAmount = 4
    HealingDelay = 1000
    StartHealingDelay = 5000
    StartsActive = Yes
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 10
  GeometryMinorRadius = 10
  GeometryHeight = 12
  GeometryIsSmall = Yes
  ;Scale = 0.95
  
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowI
  
  BuildCompletion = APPEARS_AT_RALLY_POINT
End