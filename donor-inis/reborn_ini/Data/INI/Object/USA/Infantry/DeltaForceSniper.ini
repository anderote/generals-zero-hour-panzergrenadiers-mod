; Delta Force Sniper
Object AmericaInfantryDeltaForceSniper

    ; *** ART PARAMETERS ***
  SelectPortrait = SAPathfinder1_L
  ButtonImage = SAPathfinder1
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo2 = Upgrade_AmericaChemicalSuits
  
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    IgnoreConditionStates = REALLYDAMAGED

    ; Idle
    DefaultConditionState
      Model = GLASNP_SKN
      IdleAnimation = AIPFDR_SKL.AIPFDR_STA 
      IdleAnimation = AIPFDR_SKL.AIPFDR_IDA
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      TransitionKey = TRANS_Standing
    End

    ; Moving
    ConditionState = MOVING
      Animation = AIPFDR_SKL.AIPFDR_RNA 25
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_Standing
      ParticleSysBone = None InfantryDustTrails
    End

    ; Attacking
    ConditionState = FIRING_A 
      Animation = AIPFDR_SKL.AIPFDR_ATB
      TransitionKey = TRANS_FiringA
    End
    
    ConditionState = BETWEEN_FIRING_SHOTS_A
      Animation = AIPFDR_SKL.AIPFDR_ATBST
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_FiringA
    End
    AliasConditionState = RELOADING_A
    AliasConditionState = PREATTACK_A
    
    ; Death Modules
    ConditionState = DYING
      Animation = AIPFDR_SKL.AIPFDR_DTA
      TransitionKey = TRANS_Dying
    End
    
    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = AIPFDR_SKL.AIPFDR_ADTA1
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = AIPFDR_SKL.AIPFDR_ADTA2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = AIPFDR_SKL.AIPFDR_ADTA3
    End

    ; Parachuting
    ConditionState = FREEFALL
      Animation = AIPFDR_SKL.AIPFDR_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL DYING

    ConditionState = PARACHUTING
      Animation = AIPFDR_SKL.AIPFDR_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING DYING


    TransitionState = TRANS_Falling TRANS_Chute
      Animation = AIPFDR_SKL.AIPFDR_POP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  
    End

    TransitionState = TRANS_Chute TRANS_Standing
      Animation = AIPFDR_SKL.AIPFDR_PTD
    End
  End
  
  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:DeltaForceSniper
  
  Side = America
  EditorSorting = INFANTRY
  
  TransportSlotCount = 1
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY DeltaForceSniperRifle
  End
  
  ArmorSet
    Conditions = None
    Armor = HumanArmor
    DamageFX = InfantryDamageFX
  End
  
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = ChemSuitHumanArmor
    DamageFX = InfantryDamageFX
  End

  VisionRange = 350
  ShroudClearingRange = 400
  
  ; This is a GP unit, but just incase:
  BuildCost = 1800
  BuildTime = 15
  
  ExperienceValue = 50 100 150 200
  ExperienceRequired = 0 200 400 600
  IsTrainable = Yes
  
  CrushableLevel = 2
  
  CommandSet = GenericCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = PathfinderVoiceSelect
  VoiceMove = PathfinderVoiceMove
  VoiceGuard = PathfinderVoiceMove
  VoiceAttack = PathfinderVoiceAttack
  VoiceFear = PathfinderVoiceFear
  SoundStealthOn = StealthOn
  SoundStealthOff = StealthOff
  
  UnitSpecificSounds
    VoiceCreate = PathfinderVoiceCreate
    VoiceGarrison = PathfinderVoiceGarrison
    VoiceEnter = PathfinderVoiceMove
    VoiceEnterHostile =  PathfinderVoiceMove
    VoiceGetHealed = PathfinderVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS INFANTRY SCORE HERO STEALTH_GARRISON CANNOT_RETALIATE

  ; 25% higher than Pathfinder
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 140
    InitialHealth = 140
  End

  Behavior = AIUpdateInterface AITag_Normal
    AutoAcquireEnemiesWhenIdle = Yes ;Stealthed
    MoodAttackCheckRate = 0
  End
  
  ; Chemical Suits
  Behavior = ArmorUpgrade ModuleTag_ChemSuits
    TriggeredBy = Upgrade_AmericaChemicalSuits
  End

  Behavior = AutoFindHealingUpdate ModuleTag_FindHealing
    ScanRate = 1000
    ScanRange = 300
    NeverHeal = 0.85
    AlwaysHeal = 0.25
  End

  Locomotor = SET_NORMAL ColonelBurtonGroundLocomotor ColonelBurtonCliffLocomotor

  ; Advanced Training
  Behavior = ExperienceScalarUpgrade ModuleTag_AdvTraining
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0
  End

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 5
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_StealthDetect
    DetectionRate = 500
    CanDetectWhileGarrisoned = Yes
    CanDetectWhileContained = Yes
  End
  
  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 1000
    ;StealthForbiddenConditions = MOVING
    StealthForbiddenConditions = FIRING_PRIMARY
    HintDetectableConditions = IS_FIRING_WEAPON 
    FriendlyOpacityMin = 50%
    FriendlyOpacityMax = 100%
    ;PulseFrequency = 500
    ;MoveThresholdSpeed = 3
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End
 
  ; Death Modules
  Behavior = SlowDeathBehavior DeathTag_Normal
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_PathfinderDie
  End
  Behavior = SlowDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior DeathTag_Exploded
    DeathTypes = NONE +EXPLODED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_PathfinderDie
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  Behavior = SlowDeathBehavior DeathTag_Burned
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireUSA
    OCL = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned01
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned02
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantryBeta
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned03
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantryGamma
  End
  
  ; Auto Heal
  Behavior = AutoHealBehavior ModuleTag_AutoHeal
    HealingAmount = 4
    HealingDelay = 1000
    StartHealingDelay = 5000
    StartsActive = Yes
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 10
  GeometryMinorRadius = 10
  GeometryHeight = 12
  GeometryIsSmall = Yes
  ;Scale = 0.95
  
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowI
  BuildCompletion = APPEARS_AT_RALLY_POINT
End