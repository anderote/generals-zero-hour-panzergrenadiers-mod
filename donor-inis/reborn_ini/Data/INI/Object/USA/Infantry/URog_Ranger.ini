; USA Rogue Assault Ranger
Object AmericaInfantryRanger

  ; *** ART PARAMETERS ***
  SelectPortrait = XM29Upg
  ButtonImage = XM29Upg
  
  UpgradeCameo1 = Upgrade_InfantryCaptureBuilding
  UpgradeCameo2 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo3 = Upgrade_AmericaChemicalSuits
  
  Draw = W3DModelDraw DrawTag_Main

    OkToChangeModelColor = Yes

    ; Stand
    DefaultConditionState
      Model = AIRngr_SKN
      IdleAnimation = AIRngr_SKL.AIRngr_STA 0 35
      IdleAnimation = AIRngr_SKL.AIRngr_IDA
      IdleAnimation = AIRngr_SKL.AIRngr_IDB
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone = SECONDARY Muzzle
      WeaponLaunchBone = SECONDARY Muzzle
      WeaponFireFXBone = TERTIARY Muzzle     
      WeaponLaunchBone = TERTIARY Muzzle
      TransitionKey = TRANS_Stand
    End

    ConditionState = REALLYDAMAGED
      IdleAnimation = AIRngr_SKL.AIRngr_STB 0 35
      IdleAnimation = AIRngr_SKL.AIRngr_IDC
      IdleAnimation = AIRngr_SKL.AIRngr_IDD
      TransitionKey = TRANS_StandInjured
    End

    TransitionState = TRANS_Stand TRANS_StandInjured
      Animation = AIRngr_SKL.AIRngr_SA2SB
      AnimationMode = ONCE
    End

    ; Attacking - Rifle
    ConditionState = FIRING_A
      Animation = AIRngr_SKL.AIRngr_ATA
      TransitionKey = TRANS_FiringGun
    End
    AliasConditionState = FIRING_B
    
    ConditionState = BETWEEN_FIRING_SHOTS_A
      Animation = AIHERO_SKL.AIHERO_ATA
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_FiringGun
    End
    AliasConditionState = RELOADING_A
    AliasConditionState = PREATTACK_A
    AliasConditionState = BETWEEN_FIRING_SHOTS_B
    AliasConditionState = RELOADING_B
    AliasConditionState = PREATTACK_B
    
    ConditionState = FIRING_A REALLYDAMAGED
      Animation = AIRngr_SKL.AIRngr_ATA2
      TransitionKey = TRANS_FiringGunInjured
    End
    AliasConditionState = FIRING_B REALLYDAMAGED
    
    ConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED
      Animation = AIHERO_SKL.AIHERO_ATA
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_FiringGunInjured
    End
    AliasConditionState = RELOADING_A REALLYDAMAGED
    AliasConditionState = PREATTACK_A REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_B REALLYDAMAGED
    AliasConditionState = RELOADING_B REALLYDAMAGED
    AliasConditionState = PREATTACK_B REALLYDAMAGED

    TransitionState = TRANS_FiringGun TRANS_FiringGunInjured
      Animation = AIRngr_SKL.AIRngr_A2WAA
    End

    ; Attacking - Grenade Launcher
    ConditionState = FIRING_C
      Animation = AIRngr_SKL.AIRngr_ATBB
      TransitionKey = TRANS_FiringGrenade
    End

    ConditionState = BETWEEN_FIRING_SHOTS_C
      Animation = AIRngr_SKL.AIRngr_ATBB
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_FiringGrenade
    End
    AliasConditionState = RELOADING_C
    AliasConditionState = PREATTACK_C
    
    ConditionState = FIRING_C REALLYDAMAGED
      Animation = AIRngr_SKL.AIRngr_ATB2B
      TransitionKey = TRANS_FiringGrenadeInjured
    End

    ConditionState = BETWEEN_FIRING_SHOTS_C REALLYDAMAGED
      Animation = AIRngr_SKL.AIRngr_ATB2B
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_FiringGrenadeInjured
    End
    AliasConditionState = RELOADING_C REALLYDAMAGED
    AliasConditionState = PREATTACK_C REALLYDAMAGED

    ; Cross-attack Transitions
    TransitionState = TRANS_FiringGun TRANS_FiringGrenade
      Animation = AIRngr_SKL.AIRngr_ATA2AB
      AnimationSpeedFactorRange = 4 4
    End

    TransitionState = TRANS_FiringGrenade TRANS_FiringGun
      Animation = AIRngr_SKL.AIRngr_ATA2AB
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 4 4
    End
    
    TransitionState = TRANS_FiringGunInjured TRANS_FiringGrenadeInjured
      Animation = AIRngr_SKL.AIRngr_ATA2AB
      AnimationSpeedFactorRange = 4 4
    End

    TransitionState = TRANS_FiringGrenadeInjured TRANS_FiringGunInjured
      Animation = AIRngr_SKL.AIRngr_ATA2AB
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 4 4
    End

    ; Moving
    ConditionState = MOVING
      Animation = AIRngr_SKL.AIRngr_RNA 30
      AnimationMode = LOOP
      Flags = RANDOMSTART
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING ATTACKING

    ConditionState = MOVING REALLYDAMAGED
      Animation = AIRngr_SKL.AIRngr_RNB 30
      AnimationMode = LOOP
      Flags = RANDOMSTART
    End
    AliasConditionState = MOVING ATTACKING REALLYDAMAGED
    
    ; Dying
    ConditionState = DYING
      Animation = AIRngr_SKL.AIRngr_DTA
      Animation = AIRngr_SKL.AIRngr_DTB
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = AIRngr_SKL.AIRngr_ADTF1
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = AIRngr_SKL.AIRngr_ADTF2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = AIRngr_SKL.AIRngr_ADTF3
    End
    AliasConditionState = DYING SPLATTED

    ; Cheering
    ConditionState = SPECIAL_CHEERING
      Animation = AIRngr_SKL.AIRngr_CHA
      AnimationMode = LOOP
    End

    ConditionState = SPECIAL_CHEERING REALLYDAMAGED
      Animation = AIRngr_SKL.AIRngr_CHB
      AnimationMode = LOOP
    End

    ; Parachuting
    ConditionState = FREEFALL
      Animation = AIRngr_SKL.AIRngr_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL DYING
    
    ConditionState = PARACHUTING
      Animation = AIRngr_SKL.AIRngr_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING
    
    TransitionState = TRANS_Falling TRANS_Chute
      Animation = AIRngr_SKL.AIRngr_POP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
    End
    
    TransitionState = TRANS_Chute TRANS_Stand
      Animation = AIRngr_SKL.AIRngr_PTD
    End
    
    TransitionState = TRANS_Chute TRANS_StandInjured
      Animation = AIRngr_SKL.AIRngr_PTD
      AnimationMode = ONCE
    End

    ; Building Capture
    ConditionState = UNPACKING
      Model = AIRngr_F_SKN
      Animation = AIRngr_F_SKL.AIRngr_F_FDP1
    End
    AliasConditionState = UNPACKING REALLYDAMAGED

    ConditionState = RAISING_FLAG
      Model = AIRngr_F_SKN
      Animation = AIRngr_F_SKL.AIRngr_F_FDP2
      TransitionKey = TRANS_Raising
    End
    AliasConditionState = RAISING_FLAG REALLYDAMAGED

    ConditionState = PACKING
      Model = AIRngr_F_SKN
      Animation = AIRngr_F_SKL.AIRngr_F_FDP1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_Packing
    End
    AliasConditionState = PACKING REALLYDAMAGED

    TransitionState = TRANS_Raising TRANS_Packing
      Model = AIRngr_F_SKN
      Animation = AIRngr_F_SKL.AIRngr_F_FDP2
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End

    ; Rappelling
    ConditionState = RAPPELLING
      Animation = AIRngr_SKL.AIRngr_RPL1 ;30
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_Rappelling
    End
    AliasConditionState = MOVING RAPPELLING

    TransitionState = TRANS_Rappelling TRANS_Stand
      Animation = AIRngr_SKL.AIRngr_RPL2
    End

    TransitionState = TRANS_Rappelling TRANS_StandInjured
      Animation = AIRngr_SKL.AIRngr_RPL2
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:AssaultRanger
  
  Side = America
  EditorSorting = INFANTRY
  
  TransportSlotCount = 1
  
  WeaponSet
    Conditions = None
    Weapon = PRIMARY XM29RifleFullAuto
    Weapon = SECONDARY XM29RifleSemi
    Weapon = TERTIARY XM29AirBurstShell
    AutoChooseSources = PRIMARY FROM_SCRIPT FROM_AI DEFAULT_SWITCH_WEAPON
    AutoChooseSources = SECONDARY FROM_SCRIPT FROM_AI
    AutoChooseSources = TERTIARY FROM_SCRIPT FROM_AI
    WeaponLockSharedAcrossSets = Yes
  End
  
  ArmorSet
    Conditions = None
    Armor = HumanArmor
    DamageFX = InfantryDamageFX
  End
  
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = ChemSuitHumanArmor
    DamageFX = None
  End
  
  VisionRange = 200
  ShroudClearingRange = 400
  
  BuildCost = 230
  BuildTime = 6
  
  ; 25% higher than Ranger
  ExperienceValue = 25 50 75 100
  ExperienceRequired = 0 40 80 120
  IsTrainable = Yes
  
  CrushableLevel = 0
  
  CommandSet = AmericaInfantryAssaultRangerCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = RangerVoiceSelect
  VoiceMove = RangerVoiceMove
  VoiceGuard = RangerVoiceMove
  VoiceAttack = RangerVoiceAttack
  VoiceFear = RangerVoiceFear
  VoiceTaskComplete = RangerVoiceCaptureComplete

  UnitSpecificSounds
    VoiceCreate = RangerVoiceCreate
    VoiceEnter = RangerVoiceMove
    VoiceEnterHostile = RangerVoiceMove
    VoiceGarrison = RangerVoiceGarrison
    VoiceSubdue = RangerVoiceSubdue
    VoiceClearBuilding = RangerVoiceClearBuilding
    VoiceGetHealed = RangerVoiceMove
    VoicePrimaryWeaponMode = RangerVoiceModeGun
    VoiceSecondaryWeaponMode = RangerVoiceModeGun 
    VoiceTertiaryWeaponMode = RangerVoiceModeFlashBang
  End

  UnitSpecificFX
    CombatDropKillFX = FX_RangerCombatDropKill
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY CAN_RAPPEL SCORE

  Behavior = CommandButtonHuntUpdate ModuleTag_CommandHunt
  End

  Body = ActiveBody BodyTag_Normal
    MaxHealth = 180
    InitialHealth = 180
  End

  ; Advanced Training
  Behavior = ExperienceScalarUpgrade ModuleTag_AdvTraining
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0
  End

  Behavior = AutoFindHealingUpdate ModuleTag_FindHealing
    ScanRate = 1000
    ScanRange = 300
    NeverHeal = 0.85
    AlwaysHeal = 0.25
  End

  Behavior = AIUpdateInterface AITag_Normal
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End
  
  Locomotor = SET_NORMAL BasicHumanLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 5
  End

  ; Flashbangs
  Behavior = WeaponSetUpgrade ModuleTag_Flashbangs
    TriggeredBy = Upgrade_AmericaRangerFlashBangGrenade
  End
  
  ; Death Modules
  Behavior = SlowDeathBehavior DeathTag_Normal
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RangerDie
  End
  Behavior = SlowDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior DeathTag_Exploded
    DeathTypes = NONE +EXPLODED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RangerDie
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  Behavior = SlowDeathBehavior DeathTag_Burned
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireUSA
    OCL = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned01
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned02
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantryBeta
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned03
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinUSA
    OCL = INITIAL OCL_ToxicInfantryGamma
  End

  Behavior = SquishCollide ModuleTag_Squish
  End
  
  ; Chem Suits
  Behavior = ArmorUpgrade ModuleTag_ChemSuits
    TriggeredBy = Upgrade_AmericaChemicalSuits
  End

  ; Capture Building
  Behavior = SpecialAbility ModuleTag_CaptureBuilding01
    SpecialPowerTemplate = SpecialAbilityRangerCaptureBuilding
    UpdateModuleStartsAttack = Yes
    StartsPaused = Yes
    InitiateSound = RangerVoiceCapture
  End  
  Behavior = SpecialAbilityUpdate ModuleTag_CaptureBuilding02
    SpecialPowerTemplate = SpecialAbilityRangerCaptureBuilding
    StartAbilityRange = 5
    UnpackTime = 3000
    PreparationTime = 20000
    PackTime = 2000
    DoCaptureFX = Yes
    AwardXPForTriggering = 15
  End
  Behavior = UnpauseSpecialPowerUpgrade ModuleTag_CaptureBuilding03
    SpecialPowerTemplate = SpecialAbilityRangerCaptureBuilding
    TriggeredBy = Upgrade_InfantryCaptureBuilding
  End

  ; Needed for units with weapon switch
  Behavior = LockWeaponCreate ModuleTag_LockWeapon
    SlotToLock = PRIMARY
  End
  
  ; Stealth Detector
  Behavior = StealthDetectorUpdate ModuleTag_StealthDetect
    DetectionRate = 500
    CanDetectWhileGarrisoned = Yes
    CanDetectWhileContained = Yes
    ExtraRequiredKindOf = MINE FS_FAKE
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 7
  GeometryMinorRadius = 7
  GeometryHeight = 13
  GeometryIsSmall = Yes
  ;Scale = 0.95
  
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowI
  
  BuildCompletion = APPEARS_AT_RALLY_POINT
End