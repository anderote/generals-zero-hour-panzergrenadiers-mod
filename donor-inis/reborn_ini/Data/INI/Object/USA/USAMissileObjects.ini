; EMP Patriot Missile
Object PatriotMissileEMP

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = AVRaptor_M
    End
    ConditionState = JAMMED
      ParticleSysBone = None SparksMedium
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:PatriotMissile
  
  Side = AmericaSuperWeaponGeneral
  EditorSorting = SYSTEM
  
  ;VisionRange = 300
  ;ShroudClearingRange = 0

  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING PARAMETERS ***
  KindOf = PROJECTILE SMALL_MISSILE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
    ; Subdual Settings
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  ; Death FX
  Behavior = InstantDeathBehavior DeathTag_Detonated
    DeathTypes = NONE +DETONATED
    ;FX = None ;use detonation fx
  End
  Behavior = InstantDeathBehavior DeathTag_Lasered
    DeathTypes = NONE +LASERED
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_Normal
    DeathTypes = ALL -LASERED -DETONATED
    ;FX = FX_GenericMissileDeath
  End
    
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 1
  End
  
  Behavior = MissileAIUpdate ModuleTag_05
    TryToFollowTarget = No ;Yes 
    FuelLifetime = 10000
    InitialVelocity = 50
    IgnitionDelay = 0
    DistanceToTravelBeforeTurning = 5
    DistanceToTargetForLock = 100
  End
  
  Locomotor = SET_NORMAL PatriotMissileLocomotor

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2
End