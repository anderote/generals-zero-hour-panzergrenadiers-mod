; Assault Gen's Advanced Patriot
Object Lazr_AmericaPatriotBattery

  ; *** ART PARAMETERS ***
  SelectPortrait = SAPatriotSent_L
  ButtonImage = SAPatriotSent

  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    IgnoreConditionStates = NIGHT

    DefaultConditionState
      Model = ABPatriotSW
      Turret = TURRET01
      TurretPitch = TURRETEL
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponLaunchBone = SECONDARY WeaponA
      WeaponLaunchBone = TERTIARY WeaponA
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponFireFXBone = SECONDARY WeaponA
      WeaponFireFXBone = TERTIARY WeaponA
      Flags = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
    
    ConditionState = DAMAGED
      Model = ABPatriotSW_D
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
    
    ConditionState = REALLYDAMAGED
      Model = ABPatriotSW_E
    End
    AliasConditionState = RUBBLE
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED RUBBLE
    
    ConditionState = SNOW
      Model = ABPatriotSW_S
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
    
    ConditionState = SNOW DAMAGED
      Model = ABPatriotSW_DS
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW DAMAGED
    
    ConditionState = SNOW REALLYDAMAGED
      Model = ABPatriotSW_ES
    End
    AliasConditionState = SNOW RUBBLE
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW RUBBLE
    
    ConditionState = AWAITING_CONSTRUCTION 
      Model = NONE
    End
    AliasConditionState = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION SNOW
    AliasConditionState = AWAITING_CONSTRUCTION SNOW DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION SNOW REALLYDAMAGED
    AliasConditionState = SOLD
    AliasConditionState = SOLD DAMAGED
    AliasConditionState = SOLD REALLYDAMAGED
    AliasConditionState = SOLD SNOW
    AliasConditionState = SOLD SNOW DAMAGED
    AliasConditionState = SOLD SNOW REALLYDAMAGED
  End

  ; fence
  Draw = W3DModelDraw DrawTag_Fence
    AnimationsRequirePower = No
        
    DefaultConditionState
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    AliasConditionState = NIGHT
    AliasConditionState = SNOW
    AliasConditionState = SNOW NIGHT
    
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = ABPatriot_A4
      Animation = ABPatriot_A4.ABPatriot_A4
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_DAY
    End
    
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT
      Model = ABPatriot_A4N
      Animation = ABPatriot_A4N.ABPatriot_A4N
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_NIGHT
    End
    
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
      Model = ABPatriot_A4S
      Animation = ABPatriot_A4S.ABPatriot_A4S
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOW
    End
    
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT
      Model = ABPatriot_A4SN
      Animation = ABPatriot_A4SN.ABPatriot_A4SN
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOWNIGHT
    End
    
    TransitionState = DOWN_DEFAULT UP_DAY
      Model = ABPatriot_A4
      Animation = ABPatriot_A4.ABPatriot_A4
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    
    TransitionState = DOWN_DEFAULT UP_NIGHT
      Model = ABPatriot_A4N
      Animation = ABPatriot_A4N.ABPatriot_A4N
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    
    TransitionState = DOWN_DEFAULT UP_SNOW
      Model = ABPatriot_A4S
      Animation = ABPatriot_A4S.ABPatriot_A4S
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    
    TransitionState = DOWN_DEFAULT UP_SNOWNIGHT
      Model = ABPatriot_A4SN
      Animation = ABPatriot_A4SN.ABPatriot_A4SN
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    
    TransitionState = UP_DAY DOWN_DEFAULT
      Model = ABPatriot_A4
      Animation = ABPatriot_A4.ABPatriot_A4
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0
      Flags = START_FRAME_LAST
    End
    
    TransitionState = UP_NIGHT DOWN_DEFAULT
      Model = ABPatriot_A4N
      Animation = ABPatriot_A4N.ABPatriot_A4N
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0
      Flags = START_FRAME_LAST
    End
    
    TransitionState = UP_SNOW DOWN_DEFAULT
      Model = ABPatriot_A4S
      Animation = ABPatriot_A4S.ABPatriot_A4S
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOWNIGHT DOWN_DEFAULT
      Model = ABPatriot_A4SN
      Animation = ABPatriot_A4SN.ABPatriot_A4SN
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0
      Flags = START_FRAME_LAST
    End
  End

  ; scaffolding
  Draw = W3DModelDraw DrawTag_Scaffolding
    AnimationsRequirePower = No
    MinLODRequired = MEDIUM
    
    DefaultConditionState
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    AliasConditionState = NIGHT
    AliasConditionState = SNOW
    AliasConditionState = SNOW NIGHT
    
    ConditionState = PARTIALLY_CONSTRUCTED
      Model = ABPatriot_A6
      Animation = ABPatriot_A6.ABPatriot_A6
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_DAY
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    
    ConditionState = PARTIALLY_CONSTRUCTED NIGHT
      Model = ABPatriot_A6N
      Animation = ABPatriot_A6N.ABPatriot_A6N
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_NIGHT
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    
    ConditionState = PARTIALLY_CONSTRUCTED SNOW
      Model = ABPatriot_A6S
      Animation       = ABPatriot_A6S.ABPatriot_A6S
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOW
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    
    ConditionState = PARTIALLY_CONSTRUCTED SNOW NIGHT
      Model = ABPatriot_A6SN
      Animation = ABPatriot_A6SN.ABPatriot_A6SN
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOWNIGHT
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    
    TransitionState = DOWN_DEFAULT UP_DAY
      Model = ABPatriot_A6
      Animation = ABPatriot_A6.ABPatriot_A6
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    
    TransitionState = DOWN_DEFAULT UP_NIGHT
      Model = ABPatriot_A6N
      Animation = ABPatriot_A6N.ABPatriot_A6N
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    
    TransitionState = DOWN_DEFAULT UP_SNOW
      Model = ABPatriot_A6S
      Animation = ABPatriot_A6S.ABPatriot_A6S
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    
    TransitionState = DOWN_DEFAULT UP_SNOWNIGHT
      Model = ABPatriot_A6SN
      Animation = ABPatriot_A6SN.ABPatriot_A6SN
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    
    TransitionState = UP_DAY DOWN_DEFAULT
      Model = ABPatriot_A6
      Animation = ABPatriot_A6.ABPatriot_A6
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0
      Flags = START_FRAME_LAST
    End
    
    TransitionState   = UP_NIGHT DOWN_DEFAULT
      Model = ABPatriot_A6N
      Animation = ABPatriot_A6N.ABPatriot_A6N
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0
      Flags           = START_FRAME_LAST
    End
    
    TransitionState = UP_SNOW DOWN_DEFAULT
      Model = ABPatriot_A6S
      Animation = ABPatriot_A6S.ABPatriot_A6S
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0
      Flags = START_FRAME_LAST
    End
    
    TransitionState = UP_SNOWNIGHT DOWN_DEFAULT
      Model = ABPatriot_A6SN
      Animation = ABPatriot_A6SN.ABPatriot_A6SN
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0
      Flags = START_FRAME_LAST
    End
  End

  PlacementViewAngle = -45

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:AdvPatriot
  
  Side = AmericaLaserGeneral ; Assault Gen
  EditorSorting = STRUCTURE
  
  Prerequisites
    Object = Lazr_AmericaPowerPlant
  End
  
  BuildCost = 1200
  BuildTime = 30
  
  EnergyProduction = -3
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY Aslt_PatriotMissileWeapon
    
    Weapon = SECONDARY Aslt_PatriotMissileWeaponAir
    PreferredAgainst = SECONDARY BALLISTIC_MISSILE AIRCRAFT
    
    Weapon = TERTIARY Aslt_PatriotMissileAssistWeapon
    AutoChooseSources = TERTIARY NONE
    
    ShareWeaponReloadTime = Yes
  End
  
  VisionRange = 425
  ShroudClearingRange = 425
  
  ArmorSet
    Conditions = None
    Armor = BaseDefenseArmor
    DamageFX = StructureDamageFXNoShake
  End
  
  CommandSet = AmericaPatriotBatteryCommandSet
  
  ExperienceValue = 200 200 200 200
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = PatriotBatterySelect
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction = UnderConstructionLoop
  End
  
  ; *** ENGINEERING Parameters ***
  RadarPriority = STRUCTURE
  
  KindOf = PRELOAD STRUCTURE SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT IMMOBILE SCORE FS_TECHNOLOGY POWERED FS_BASE_DEFENSE IMMUNE_TO_CAPTURE EMP_HARDENED
  
  Body = StructureBody BodyTag_Structure
    MaxHealth = 1000
    InitialHealth = 1000
    ; Subdual Settings
    SubdualDamageCap = 1200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
 
  ; Stealth Detector
  Behavior = StealthDetectorUpdate ModuleTag_GroundDetector
    DetectionRate = 500
    DetectionRange = 200
    ExtraForbiddenKindOf = AIRCRAFT
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    DetectionRange = 350
    ExtraRequiredKindOf = AIRCRAFT
  End

  Behavior = BaseRegenerateUpdate ModuleTag_BaseRegen
  End
  
  Behavior = AIUpdateInterface AITag_Normal
    Turret
      TurretTurnRate = 180
      TurretPitchRate = 180
      AllowsPitch = Yes
      NaturalTurretPitch = 45   
      GroundUnitPitch = 40
      MinPhysicalPitch = -20
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      MinIdleScanInterval = 250
      MaxIdleScanInterval = 250
      MinIdleScanAngle = 0
      MaxIdleScanAngle = 360
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End

  Behavior = AssistedTargetingUpdate ModuleTag_Assist
    AssistingClipSize = 8
    AssistingWeaponSlot = TERTIARY
    LaserFromAssisted = PatriotBinaryDataStream
    LaserToTarget = PatriotBinaryDataStream
  End
  
  Behavior = DestroyDie DeathTag_All01
  End
  Behavior = CreateObjectDie DeathTag_All02
    CreationList = Lazr_OCL_AmericanRangerDebris03
    ExemptStatus = UNDER_CONSTRUCTION
  End
  Behavior = FXListDie DeathTag_All03
    DeathFX = FX_StructureTinyDeath
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionTinySmoke
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionTinySmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionTinyExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionTinyShockwave
  End

  Geometry = BOX
  GeometryMajorRadius = 12
  GeometryMinorRadius = 12
  GeometryHeight = 14
  GeometryIsSmall = No
  
  Shadow = SHADOW_VOLUME
  
  BuildCompletion = PLACED_BY_PLAYER
End