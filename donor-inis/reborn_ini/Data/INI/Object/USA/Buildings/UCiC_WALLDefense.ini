; USA CiC WALL Defense
Object SupW_AmericaPatriotBattery

  ; *** ART PARAMETERS ***
  SelectPortrait = SAWALLDefense_XL
  ButtonImage = SAWALLDefense_L
  
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    IgnoreConditionStates = NIGHT
    
    DefaultConditionState
      Model = ABWalTrt ;ABPatriotSW
      Turret = TURRET
      TurretPitch = TURRETEL
      Flags = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
      WeaponFireFXBone = PRIMARY WEAPONA
      WeaponLaunchBone = PRIMARY WEAPONA
      WeaponFireFXBone = SECONDARY WEAPONB
      WeaponLaunchBone = SECONDARY WEAPONB
      WeaponFireFXBone = TERTIARY WEAPONB
      WeaponLaunchBone = TERTIARY WEAPONB      
      ParticleSysBone = None SupW_DefenseEmitterParticles
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
    
    ConditionState = DAMAGED
      Model = ABWalTrt_D
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
    
    ConditionState = REALLYDAMAGED
      Model = ABWalTrt_E
    End
    AliasConditionState = RUBBLE
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED RUBBLE
    
    ; Snow
    ConditionState = SNOW
      Model = ABWalTrt_S
    End
    AliasConditionState = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
    
    ConditionState = SNOW DAMAGED
      Model = ABWalTrt_SD
    End
    AliasConditionState = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
    
    ConditionState = SNOW REALLYDAMAGED
      Model = ABWalTrt_SE
    End
    AliasConditionState = SNOW RUBBLE
    AliasConditionState = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
    AliasConditionState = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED RUBBLE
    
    ; Construction States
    ConditionState = AWAITING_CONSTRUCTION
      Model = NONE
    End
    AliasConditionState = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState = SOLD
    AliasConditionState = SOLD DAMAGED
    AliasConditionState = SOLD REALLYDAMAGED
    ; Snow
    AliasConditionState = SNOW AWAITING_CONSTRUCTION
    AliasConditionState = SNOW AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState = SNOW AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState = SNOW SOLD
    AliasConditionState = SNOW SOLD DAMAGED
    AliasConditionState = SNOW SOLD REALLYDAMAGED    
  End
  
  ; Fence
  Draw = W3DModelDraw DrawTag_Fence
    AnimationsRequirePower = No     ; Do not pause the construction anims when low power disabled
    DefaultConditionState
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    ConditionState = NIGHT
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    ConditionState = SNOW
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    ConditionState = SNOW NIGHT
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = ABPatriot_A4
      Animation = ABPatriot_A4.ABPatriot_A4
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_DAY
    End
    ConditionState = NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = ABPatriot_A4N
      Animation = ABPatriot_A4N.ABPatriot_A4N
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_NIGHT
    End
    ConditionState = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = ABPatriot_A4S
      Animation = ABPatriot_A4S.ABPatriot_A4S
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOW
    End
    ConditionState = SNOW NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = ABPatriot_A4SN
      Animation = ABPatriot_A4SN.ABPatriot_A4SN
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOWNIGHT
    End
    TransitionState = DOWN_DEFAULT UP_DAY
      Model = ABPatriot_A4
      Animation = ABPatriot_A4.ABPatriot_A4
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_NIGHT
      Model = ABPatriot_A4N
      Animation = ABPatriot_A4N.ABPatriot_A4N
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_SNOW
      Model = ABPatriot_A4S
      Animation = ABPatriot_A4S.ABPatriot_A4S
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_SNOWNIGHT
      Model = ABPatriot_A4SN
      Animation = ABPatriot_A4SN.ABPatriot_A4SN
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    TransitionState = UP_DAY DOWN_DEFAULT
      Model = ABPatriot_A4
      Animation = ABPatriot_A4.ABPatriot_A4
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0     ; play teardown animations more quickly
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_NIGHT DOWN_DEFAULT
      Model = ABPatriot_A4N
      Animation = ABPatriot_A4N.ABPatriot_A4N
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0     ; play teardown animations more quickly
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOW DOWN_DEFAULT
      Model = ABPatriot_A4S
      Animation = ABPatriot_A4S.ABPatriot_A4S
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0     ; play teardown animations more quickly
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOWNIGHT DOWN_DEFAULT
      Model = ABPatriot_A4SN
      Animation = ABPatriot_A4SN.ABPatriot_A4SN
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0     ; play teardown animations more quickly
      Flags = START_FRAME_LAST
    End
  End
  
  ; Scaffolding
  Draw = W3DModelDraw DrawTag_Scaffolding
    AnimationsRequirePower = No     ; Do not pause the construction anims when low power disabled
    MinLODRequired = MEDIUM
    DefaultConditionState
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    ConditionState = NIGHT
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    ConditionState = SNOW
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    ConditionState = SNOW NIGHT
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    ConditionState = PARTIALLY_CONSTRUCTED
      Model = ABPatriot_A6
      Animation = ABPatriot_A6.ABPatriot_A6
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_DAY
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    ConditionState = NIGHT PARTIALLY_CONSTRUCTED
      Model = ABPatriot_A6N
      Animation = ABPatriot_A6N.ABPatriot_A6N
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_NIGHT
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    ConditionState = SNOW PARTIALLY_CONSTRUCTED
      Model = ABPatriot_A6S
      Animation = ABPatriot_A6S.ABPatriot_A6S
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOW
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    ConditionState = SNOW NIGHT PARTIALLY_CONSTRUCTED
      Model = ABPatriot_A6SN
      Animation = ABPatriot_A6SN.ABPatriot_A6SN
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOWNIGHT
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    TransitionState = DOWN_DEFAULT UP_DAY
      Model = ABPatriot_A6
      Animation = ABPatriot_A6.ABPatriot_A6
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_NIGHT
      Model = ABPatriot_A6N
      Animation = ABPatriot_A6N.ABPatriot_A6N
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_SNOW
      Model = ABPatriot_A6S
      Animation = ABPatriot_A6S.ABPatriot_A6S
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_SNOWNIGHT
      Model = ABPatriot_A6SN
      Animation = ABPatriot_A6SN.ABPatriot_A6SN
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags = START_FRAME_FIRST
    End
    TransitionState = UP_DAY DOWN_DEFAULT
      Model = ABPatriot_A6
      Animation = ABPatriot_A6.ABPatriot_A6
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0     ; play teardown animations more quickly
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_NIGHT DOWN_DEFAULT
      Model = ABPatriot_A6N
      Animation = ABPatriot_A6N.ABPatriot_A6N
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0     ; play teardown animations more quickly
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOW DOWN_DEFAULT
      Model = ABPatriot_A6S
      Animation = ABPatriot_A6S.ABPatriot_A6S
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0     ; play teardown animations more quickly
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOWNIGHT DOWN_DEFAULT
      Model = ABPatriot_A6SN
      Animation = ABPatriot_A6SN.ABPatriot_A6SN
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0     ; play teardown animations more quickly
      Flags = START_FRAME_LAST
    End
  End
  
  PlacementViewAngle = -45
  
  ; *** DESIGN PARAMETERS ***
  
  DisplayName = OBJECT:TrumpDefense
  
  Side = AmericaSuperWeaponGeneral
  EditorSorting = STRUCTURE
  
  Prerequisites
    Object = SupW_AmericaPowerPlant
  End
  
  BuildCost = 1750 ;1000
  BuildTime = 30 ;25
  EnergyProduction = -5 ;-3
  
  WeaponSet
    Conditions = None
    Weapon = PRIMARY UCiC_WallLaserWeapon
    PreferredAgainst = PRIMARY INFANTRY
    Weapon = SECONDARY SupW_PatriotMissileWeapon
    Weapon = TERTIARY SupW_PatriotMissileWeaponAir
  End
  
  VisionRange = 425
  ShroudClearingRange = 425
  
  ArmorSet
    Conditions = None
    Armor = BaseDefenseArmor
    DamageFX = StructureDamageFXNoShake
  End
  
  CommandSet = SupW_AmericaPatriotBatteryCommandSet
  
  ExperienceValue = 250 250 250 250
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = PatriotBatterySelect
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy
  
  UnitSpecificSounds
    UnderConstruction = UnderConstructionLoop
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = STRUCTURE
  
  KindOf = PRELOAD STRUCTURE SELECTABLE CAN_ATTACK IMMOBILE SCORE FS_TECHNOLOGY POWERED FS_BASE_DEFENSE IMMUNE_TO_CAPTURE ATTACK_NEEDS_LINE_OF_SIGHT ;EMP_HARDENED
  
  Body = StructureBody BodyTag_Stucture
    MaxHealth = 1250
    InitialHealth = 1250
    ; Subdual Settings
    SubdualDamageCap = 1450
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
  
  ; Stealth Detector
  Behavior = StealthDetectorUpdate ModuleTag_GroundDetector
    DetectionRate = 500
    DetectionRange = 200
    ExtraForbiddenKindOf = AIRCRAFT
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    DetectionRange = 350
    ExtraRequiredKindOf = AIRCRAFT
  End
  
  Behavior = BaseRegenerateUpdate ModuleTag_BaseRegenerate
  End
  
  Behavior = AIUpdateInterface AITag_Normal
    Turret
      TurretTurnRate = 180
      TurretPitchRate = 180
      AllowsPitch = Yes
      NaturalTurretPitch = 30 ;45
      ;GroundUnitPitch = 40
      MinPhysicalPitch = -15 ;-20
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      MinIdleScanInterval = 250
      MaxIdleScanInterval = 250
      MinIdleScanAngle = 0
      MaxIdleScanAngle = 360
    End
    AutoAcquireEnemiesWhenIdle = Yes ATTACK_BUILDINGS ; GET OFF MY LAWN!
    MoodAttackCheckRate = 0 ;250 Ever vigilant!
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ; Damaged
    DamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionTinySmoke
    ; Really Damaged
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionTinySmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionTinyExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionTinyShockwave
  End
    
  ; Emitter Weapon
  ; PayloadTemplateName doesn't work unless it's a tank or a truck
  ; So we'll have to do this the old fashioned way - Zeke
  Behavior = OverlordContain ModuleTag_Emitter01
    Slots = 1
    DamagePercentToUnits = 100%
    AllowInsideKindOf = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret = No
    ExperienceSinkForRider = Yes ; not really sure if this even applies, but oh well
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Emitter02
    UpgradeObject = UCiC_OCL_EMPPatriot_EmitterWeaponObject
    TriggeredBy = Upgrade_GLAWorkerFakeCommandSet
  End
  
  Behavior = GrantUpgradeCreate ModuleTag_Emitter03
    UpgradeToGrant = Upgrade_GLAWorkerFakeCommandSet
    ExemptStatus = UNDER_CONSTRUCTION
  End
  
  Behavior = ProductionUpdate ModuleTag_Production
  End
  
  ; Death Modules  
  Behavior = DestroyDie ModuleTag_Die
  End
  
  Behavior = FXListDie ModuleTag_DeathFX
    DeathFX = FX_StructureTinyDeath
  End
  
  Behavior = CreateObjectDie ModuleTag_RangerDebris
    CreationList = OCL_AmericanRangerDebris03
    ExemptStatus = UNDER_CONSTRUCTION
  End
  
  Geometry = BOX
  GeometryMajorRadius = 12
  GeometryMinorRadius = 12
  GeometryHeight = 14
  GeometryIsSmall = No
  
  Shadow = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER
End

