; USA Rogue Laser Fence
Object URog_AmericaWall
  
  ; *** ART PARAMETERS ***
  SelectPortrait = SAFence_L
  ButtonImage    = SAFence

  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    IgnoreConditionStates = SNOW NIGHT

    DefaultConditionState
      Model = ABLazrWall
      ShowSubObject = Laser
      Flags = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState = DAMAGED
      Model = ABLazrWall_D
      ParticleSysBone = SparkS01 SparksSmall
      ParticleSysBone = SparkM01 SparksMedium
      ParticleSysBone = SparkM02 SparksMedium
    End
    ConditionState = REALLYDAMAGED
      Model = ABLazrWall_E
      ParticleSysBone = SparkM01 SparksMedium
      ParticleSysBone = SparkM02 SparksMedium
      ParticleSysBone = SparkM03 SparksMedium
    End
    AliasConditionState = RUBBLE

    ; Construction
    ConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      HideSubObject = Laser
    End
    ConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
      Model = ABLazrWall_D
      HideSubObject = Laser
    End
    ConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
      Model = ABLazrWall_E
      HideSubObject = Laser
    End
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED RUBBLE

    ConditionState = AWAITING_CONSTRUCTION
      Model = None
    End
    AliasConditionState = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION RUBBLE
    AliasConditionState = SOLD
    AliasConditionState = SOLD DAMAGED
    AliasConditionState = SOLD REALLYDAMAGED
    AliasConditionState = SOLD RUBBLE
  End

  ; Fence
  Draw = W3DModelDraw DrawTag_Fence
    AnimationsRequirePower = No
    IgnoreConditionStates = SNOW NIGHT DAMAGED REALLYDAMAGED RUBBLE

    DefaultConditionState
      Model = None
    End

    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = ABLazrWall_A4
    End

  End

  ; Scaffolding
  Draw = W3DModelDraw ModuleTag_Scaffolding
    AnimationsRequirePower = No
    IgnoreConditionStates = NIGHT DAMAGED REALLYDAMAGED RUBBLE

    DefaultConditionState
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    AliasConditionState = SNOW
    
    ConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = ABLazrWall_A6
      Animation = ABLazrWall_A6.ABLazrWall_A6
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_DAY
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    ConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
      Model = ABLazrWall_A6S
      Animation = ABLazrWall_A6S.ABLazrWall_A6S
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOW
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End

    TransitionState = DOWN_DEFAULT UP_DAY
      Model = ABLazrWall_A6
      Animation = ABLazrWall_A6.ABLazrWall_A6
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_SNOW
      Model = ABLazrWall_A6S
      Animation = ABLazrWall_A6S.ABLazrWall_A6S
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End

    TransitionState = UP_DAY DOWN_DEFAULT
      Model = ABLazrWall_A6
      Animation = ABLazrWall_A6.ABLazrWall_A6
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOW DOWN_DEFAULT
      Model = ABLazrWall_A6S
      Animation = ABLazrWall_A6S.ABLazrWall_A6S
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
  End

  ; Pickbox
  Draw = W3DModelDraw DrawTag_PickBox
    DefaultConditionState
      Model = ABLazrWall_B
    End
  End

  PlacementViewAngle = -135

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:SecurityFence
  
  Side = America
  EditorSorting = STRUCTURE
  
  Prerequisites
    Object = AmericaPowerPlant ;AmericaBarracks
  End
  
  BuildCost = 100
  BuildTime = 5
  
  VisionRange = 150
  ShroudClearingRange = 150
  
  ArmorSet
    Conditions = None
    Armor = WallArmor
    DamageFX = StructureDamageFXNoShake
  End
  
  ExperienceValue = 50 50 50 50
  
  CommandSet = StopOnlyGenericCommandSet
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = PatriotBatterySelect
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction = UnderConstructionLoop
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = STRUCTURE
  KindOf = PRELOAD STRUCTURE SELECTABLE STICK_TO_TERRAIN_SLOPE IMMOBILE IMMUNE_TO_CAPTURE DEFENSIVE_WALL

  Body = StructureBody BodyTag_Structure
    MaxHealth = 1000
    InitialHealth = 1000
  End
  
  Behavior = BaseRegenerateUpdate ModuleTag_AutoRepair
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    DamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionTinySmoke
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionTinySmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionTinyExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionTinyShockwave
  End

  Behavior = InstantDeathBehavior DeathTag_All
    OCL = OCL_ABStingerSiteDebris
    FX = FX_StructureTinyDeath
  End

  Geometry = BOX
  GeometryMajorRadius = 4
  GeometryMinorRadius = 26
  GeometryHeight = 12
  GeometryIsSmall = No
  
  Shadow = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER
End