; Patriot Battery Assist Laser
Object PatriotBinaryDataStream

  ; *** ART PARAMETERS ***
  Draw = W3DLaserDraw DrawTag_Main
    Texture = EXBinaryStream32.tga
    NumBeams = 1
    InnerBeamWidth = 4
    InnerColor = R:0 G:255 B:0 A:180
    Tile = Yes
    ScrollRate = -0.25
    Segments = 20
    ArcHeight = 30
    SegmentOverlapRatio = 0
    TilingScalar = 0.25
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = IMMOBILE
  
  ClientUpdate = LaserUpdate ModuleTag_Laser
  End

  Behavior = DeletionUpdate ModuleTag_Delete
    MinLifetime = 600
    MaxLifetime = 600
  End
End

; Laser Artillery Laser
Object LaserArtilleryBeam

  ; *** ART PARAMETERS ***
  Draw = W3DLaserDraw ModuleTag_01
    Texture = EXRedLaser.dds
    NumBeams = 1
    InnerBeamWidth = 10
    InnerColor = R:255 G:255 B:255 A:200
    Tile = Yes
    ScrollRate = -250
    Segments = 1
    SegmentOverlapRatio = 0
    TilingScalar = 1
  End

  ; *** ENGINEERING PARAMETERS ***
  KindOf = IMMOBILE INERT
  
  ClientUpdate = LaserUpdate ModuleTag_Laser
    MuzzleParticleSystem = LaserRedMuzzleFlare
    TargetParticleSystem = LaserRedTargetFlare
    PunchThroughScalar = 1.3
  End
  
  Behavior = LifetimeUpdate ModuleTag_Lifetime
    MinLifetime = 500 ;250
    MaxLifetime = 500 ;250
  End

  Behavior = DestroyDie ModuleTag_Die
  End
End
