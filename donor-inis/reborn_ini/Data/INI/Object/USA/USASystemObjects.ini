; Spy Satellite Reveal Object
Object SpySatellitePing

  ; *** DESIGN PARAMETERS ***
  VisionRange = 300
  ;ShroudClearingRange = 300
  
  Side = America
  EditorSorting = SYSTEM
  
  KindOf = NO_COLLIDE IMMOBILE UNATTACKABLE INERT

  ; *** ENGINEERING PARAMETERS ***
  Body = ImmortalBody BodyTag_Immortal
    MaxHealth = 1
    InitialHealth = 1
  End

  Behavior = DynamicShroudClearingRangeUpdate ModuleTag_DynamicShroudClearing
    GrowDelay = 0
    GrowTime = 1000
    GrowInterval = 10
    ChangeInterval = 80
    GridDecalTemplate
      Texture = EXGrid
      Style = SHADOW_ADDITIVE_DECAL
      OpacityMin = 50%
      OpacityMax = 100%
      OpacityThrobTime = 500
      Color = R:32 G:64 B:128 A:0
    End
    ShrinkDelay = 10000
    ShrinkTime = 5000
    FinalVision = 0 ; cut vision at the end
  End

  Behavior = DeletionUpdate ModuleTag_Delete
    MinLifetime = 13000
    MaxLifetime = 13000   
  End

  Behavior = StealthDetectorUpdate ModuleTag_StealthDetect
    DetectionRate = 500
  End
End

; EMP Patriot EMP Spheroid
Object EMPPatriotEffectSpheroid

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = EXEMPSphere
      Animation = EXEMPSphere.EXEMPSphere
    End
  End

  ; *** DESIGN PARAMETERS ***
  KindOf = NO_COLLIDE
  
  EditorSorting = SYSTEM
  
  Behavior = EMPUpdate ModuleTag_EMP
    DisabledDuration = 10000
    Lifetime = 500
    StartFadeTime = 100
    StartScale = 0.01  
    TargetScaleMin = 2.00
    TargetScaleMax = 3.00
    StartColor = R:0 G:255 B:255
    EndColor = R:0 G:128 B:128
    EffectRadius = 10
    DisableFXParticleSystem = EMPSparks
  End

  Geometry = SPHERE
  GeometryMajorRadius = 10
  GeometryIsSmall = No
End

; Ion Cannon Beacon Blast
Object IonCannonBlast

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = EXIonChrg
      Animation = EXIonChrg.EXIonChrg
      AnimationMode = ONCE
    End
  End

  ; *** DESIGN PARAMETERS ***
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
  End

  ; *** ENGINEERING Parameters ***
  KindOf = IMMOBILE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 1
    InitialHealth = 1
  End
  
  Behavior = FireWeaponUpdate ModuleTag_FireWeapon
    InitialDelay = 250
    Weapon = IonCannonBlastDamageWeapon
  End

  Behavior = LifetimeUpdate ModuleTag_Lifetime
    MinLifetime = 500
    MaxLifetime = 500
  End
End