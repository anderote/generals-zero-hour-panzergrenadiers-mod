; Col. Burton Demo Charges

; Remote
Object RemoteC4Charge

  ; *** DESIGN PARAMETERS ***
  Side = America
  EditorSorting = SYSTEM
  
  TransportSlotCount = 0
  
  VisionRange = 75 ; Allow the stickybomb to show itself to user
  ShroudClearingRange = 75
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
  End

  ; *** AUDIO PARAMETERS ***
  UnitSpecificSounds
    UnitBombPing = BombTickRemote
    StickyBombCreated = ColonelBurtonSetDemoCharge
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf =  PROJECTILE MINE NO_COLLIDE

  Body = HighlanderBody BodyTag_Highlander
    MaxHealth = 1
    InitialHealth = 1
  End

  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 0
    StealthForbiddenConditions = NONE
    FriendlyOpacityMin = 50%
    InnateStealth = Yes
  End

  Behavior = StickyBombUpdate ModuleTag_StockyBomb
    ; Keeps it attached properly to the intended target should it move.
  End

  Behavior = SlowDeathBehavior DeathTag_All
    DestructionDelay = 1
    FX = INITIAL WeaponFX_TNTStickyBombDetonation
    Weapon = FINAL BurtonC4ChargeWeapon
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 8
  GeometryHeight = 8
  GeometryIsSmall = Yes
End

; Timed
Object TimedC4Charge

  ; *** DESIGN PARAMETERS ***
  Side = America
  EditorSorting = SYSTEM
  
  TransportSlotCount = 0
  
  VisionRange = 75 ; Allow the stickybomb to show itself to user
  ShroudClearingRange = 75
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
  End

  ; *** AUDIO PARAMETERS ***
  UnitSpecificSounds
    UnitBombPing = BombTickRemote
    StickyBombCreated = ColonelBurtonSetDemoCharge
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf =  PROJECTILE MINE NO_COLLIDE

  Body = HighlanderBody BodyTag_Highlander
    MaxHealth = 1
    InitialHealth = 1
  End

  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 0
    StealthForbiddenConditions = NONE
    FriendlyOpacityMin = 50%
    InnateStealth = Yes
  End

  ; Determines how long the bomb timer is
  Behavior = LifetimeUpdate ModuleTag_04
    MinLifetime = 20000   ; min lifetime in msec
    MaxLifetime = 20000   ; max lifetime in msec
  End

  Behavior = StickyBombUpdate ModuleTag_StockyBomb
    ; Keeps it attached properly to the intended target should it move.
  End

  Behavior = SlowDeathBehavior DeathTag_All
    DestructionDelay = 1
    FX = INITIAL WeaponFX_TNTStickyBombDetonation
    Weapon = FINAL BurtonC4ChargeWeapon
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 8
  GeometryHeight = 8
  GeometryIsSmall = Yes
End

