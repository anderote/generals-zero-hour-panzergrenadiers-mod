; Ranger Flashbang Grenade
Object RangerFlashBangGrenade

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = NVMBuggy_m
      ParticleSysBone = NONE ArtilleryBarrageTrail
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:FlashBangGrenade
  
  Side = America
  EditorSorting = SYSTEM
  
  ArmorSet
    Armor = ProjectileArmor
  End
  
  ;VisionRange = 0
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = PROJECTILE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = DestroyDie ModuleTag_Death
  End
    
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 1
  End

  Behavior = DumbProjectileBehavior ModuleTag_DumbProjectile
    FirstHeight = 50
    SecondHeight = 150
    FirstPercentIndent = 30%
    SecondPercentIndent = 70%
    FlightPathAdjustDistPerSecond = 0
    GarrisonHitKillRequiredKindOf = INFANTRY
    GarrisonHitKillForbiddenKindOf = NONE
    GarrisonHitKillCount = 10
    GarrisonHitKillFX = FX_FlashBangGarrisonBuildingHit    
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1
End

