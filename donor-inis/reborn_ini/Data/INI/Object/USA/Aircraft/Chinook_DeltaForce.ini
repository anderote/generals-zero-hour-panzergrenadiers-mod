; Chinook used for Officer Delta Force Insertion

; Landing
Object AmericaOfficerChinook_Landing

  ; *** ART PARAMETERS ***
  SelectPortrait = SAChinook_L
  ButtonImage = SAChinook
    
  Draw = W3DModelDraw DrawTag_Main

    OkToChangeModelColor = Yes
    ;ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = AVChinook_S
      Animation = AVChinook_S.AVChinook_S
      AnimationMode = LOOP
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Chinook
  
  Side = America
  EditorSorting = SYSTEM
  
  TransportSlotCount = 0

  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
    DamageFX = None
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = PRELOAD NO_COLLIDE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 300
    InitialHealth = 300
  End

  ; *** AUDIO Parameters ***
  SoundAmbient = ChinookAmbientLoop

  Behavior = AIUpdateInterface AITag_Normal
  End
  Locomotor = SET_NORMAL ReinforcementsHelicopterLandingLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 5.0
  End

  Behavior = HeightDieUpdate ModuleTag_06
    TargetHeight = 1.0
    TargetHeightIncludesStructures = No
  End

  Behavior = InstantDeathBehavior ModuleTag_07
    DeathTypes = ALL
    FX = FX_AmericaOfficerChinookDropOff
    OCL = OCL_AmericaOfficerDeltaForceDrop
  End
  
  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 0
    ;StealthForbiddenConditions = FIRING_PRIMARY
    ;HintDetectableConditions = IS_FIRING_WEAPON 
    FriendlyOpacityMin = 50%
    FriendlyOpacityMax = 100%
    InnateStealth = Yes
    ;OrderIdleEnemiesToAttackMeUponReveal = Yes
  End
  
  Geometry = CYLINDER
  GeometryMajorRadius = 5
  GeometryMinorRadius = 5
  GeometryHeight = 10
  
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89
End

; Take Off
Object AmericaOfficerChinook_TakeOff

  ; *** ART PARAMETERS ***
  SelectPortrait = SAChinook_L
  ButtonImage = SAChinook
    
  Draw = W3DModelDraw DrawTag_Main

    OkToChangeModelColor = Yes
    ;ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = AVChinook_S
      Animation = AVChinook_S.AVChinook_S
      AnimationMode = LOOP
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Chinook
  
  Side = America
  EditorSorting = SYSTEM
  
  TransportSlotCount = 0

  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
    DamageFX = None
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = PRELOAD NO_COLLIDE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 300
    InitialHealth = 300
  End

  ; *** AUDIO Parameters ***
  SoundAmbient = ChinookAmbientLoop
  SoundStealthOn = StealthOn
  SoundStealthOff = StealthOff

  Behavior = AIUpdateInterface AITag_Normal
  End
  Locomotor = SET_NORMAL ReinforcementsHelicopterTakingOffLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 5.0
  End
  
  Behavior = LifetimeUpdate ModuleTag_0451
    MinLifetime = 30000
    MaxLifetime = 30000
  End
  
  Behavior = InstantDeathBehavior ModuleTag_07
    DeathTypes = ALL
  End
  
  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 1000
    FriendlyOpacityMin = 50%
    FriendlyOpacityMax = 100%
    InnateStealth = Yes
  End
  
  Geometry = CYLINDER
  GeometryMajorRadius = 5
  GeometryMinorRadius = 5
  GeometryHeight = 10
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89
End

; Officer Flare Object
Object OfficerDrop_Flare
  
  Draw = W3DModelDraw DrawTag_Main

    DefaultConditionState
      Model = None
      ParticleSysBone = None OfficerFlareSmoke
    End
  End
  
  ShroudClearingRange = 75
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = NO_COLLIDE IMMOBILE UNATTACKABLE INERT
  
  Body = ImmortalBody BodyTag_Immortal
    MaxHealth = 1    
    InitialHealth = 1
  End

  Behavior = DeletionUpdate ModuleTag_Delete
    MinLifetime = 10000
    MaxLifetime = 10000
  End  
End