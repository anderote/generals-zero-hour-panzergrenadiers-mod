; Assault Gen DPV
Object Lazr_AmericaVehicleHumvee

  ; *** ART PARAMETERS ***
  SelectPortrait = SAHummer_L
  ButtonImage = SAHummer
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  
  Draw = W3DTruckDraw DrawTag_Truck
    OkToChangeModelColor = Yes
  
    DefaultConditionState
      Model = AVDPV_2
      Animation = AVDPV_2.AVDPV_2
      AnimationMode = MANUAL
      Turret = Turret01
      TurretPitch = TurretEL01
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponLaunchBone = PRIMARY Muzzle
      HideSubObject = REDEYE JAVELIN BURTON COMMANDO SNIPER
    End
    
    ConditionState = REALLYDAMAGED 
      Model = AVDPV_2d
      Animation = AVDPV_2.AVDPV_2
    End
    
    ConditionState = ATTACKING
      AnimationMode = LOOP
    End

    ConditionState = ATTACKING REALLYDAMAGED
      Model = AVDPV_2d
      Animation = AVDPV_2.AVDPV_2
      AnimationMode = LOOP
    End

    TrackMarks = EXTireTrack.tga

    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = RocketBuggyDirtPowerSlide

    LeftFrontTireBone = TireL01
    RightFrontTireBone = TireR01
    LeftRearTireBone = TireL02
    RightRearTireBone = TireR02
    TireRotationMultiplier = 0.2
    PowerslideRotationAddition = 1.25

  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:DPV
  
  Side = AmericaLaserGeneral ; USA Assault Gen
  EditorSorting = VEHICLE
  
  TransportSlotCount = 3
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY DPVMinigun
  End
  
  ArmorSet
    Conditions = None
    Armor = HumveeArmor
    DamageFX = TruckDamageFX
  End
  
  BuildCost = 600
  BuildTime = 8
  
  VisionRange = 225
  ShroudClearingRange = 450
  
  ExperienceValue = 50 50 100 150
  ExperienceRequired = 0 100 150 300
  IsTrainable = Yes
  
  CrusherLevel = 2
  CrushableLevel = 2
  
  CommandSet = AmericaVehicleDPVCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = DPVVoiceSelect
  VoiceMove = DPVVoiceMove
  VoiceGuard = DPVVoiceMove
  VoiceAttack = DPVVoiceAttack
  VoiceAttackAir = DPVVoiceAttack
  VoiceFear = DPVVoiceFear
  VoiceTaskComplete = DPVVoiceCaptureComplete
  ; engine sounds
  SoundMoveStart = HumveeMoveStart
  SoundMoveStartDamaged = HumveeMoveStart
  ; transport sounds
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit

  UnitSpecificSounds
    VoiceCreate = DPVVoiceCreate
    VoiceCrush = DPVVoiceAttack
    ;VoiceUnload = None
    VoiceEnter = DPVVoiceMove
    ; pilot sounds
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    ; misc sounds
    TruckLandingSound = RocketBuggyLand
    TruckPowerslideSound = RocketBuggyPowerslide
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE TRANSPORT PARACHUTABLE

  Body = ActiveBody BodyTag_Normal
    MaxHealth = 240
    InitialHealth = 240
    ; subdual settings
    SubdualDamageCap = 480
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = TransportAIUpdate AITag_Transport
    Turret
      TurretTurnRate = 180
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End
  Locomotor = SET_NORMAL HumveeLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End

  Behavior = TransportContain ContainTag_Transport
    Slots = 3
    DamagePercentToUnits = 100%
    AllowInsideKindOf  = INFANTRY
    GoAggressiveOnExit = Yes
  End

  Behavior = ExperienceScalarUpgrade UpgradeTag_EXP
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1
  End

  Behavior = SlowDeathBehavior DeathTag_All
    DeathTypes = ALL
    DestructionDelay = 1
    OCL = INITIAL OCL_InitialHumveeDebris
    FX  = FINAL FX_BattleMasterExplosionOneFinal
    OCL = FINAL OCL_FinalHumveeDebris
  End

  Behavior = CreateCrateDie CrateTag_Salvage
    CrateData = SalvageCrateData
  End

  Behavior = EjectPilotDie ModuleTag_Pilot
    DeathTypes = ALL -CRUSHED -SPLATTED
    ExemptStatus = HIJACKED
    VeterancyLevels = ALL -REGULAR
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
  End

  Behavior = TransitionDamageFX TransitionTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_Fire
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End
  
  ; capture building
  Behavior = SpecialAbility ModuleTag_CaptureBuilding01
    SpecialPowerTemplate = SpecialAbilityRangerCaptureBuilding
    UpdateModuleStartsAttack  = Yes
    StartsPaused = Yes
    InitiateSound = DPVVoiceCapture
  End
  Behavior = SpecialAbilityUpdate ModuleTag_CaptureBuilding02
    SpecialPowerTemplate = SpecialAbilityRangerCaptureBuilding
    StartAbilityRange = 5
    UnpackTime = 1
    PreparationTime = 20000
    PackTime = 1
    DoCaptureFX = Yes
    AwardXPForTriggering = 15
  End
  Behavior = UnpauseSpecialPowerUpgrade ModuleTag_CaptureBuilding03
    SpecialPowerTemplate = SpecialAbilityRangerCaptureBuilding
    TriggeredBy = Upgrade_InfantryCaptureBuilding
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_StealthDetector
    DetectionRate = 500
    DetectionRange = 450
  End
  
  Behavior = AutoHealBehavior ModuleTag_AutoRepair
    StartsActive  = Yes
    HealingAmount = 5
    HealingDelay = 1000
    StartHealingDelay = 3000
  End

  Geometry = BOX
  GeometryMajorRadius = 15
  GeometryMinorRadius = 5.5
  GeometryHeight = 7.5
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End