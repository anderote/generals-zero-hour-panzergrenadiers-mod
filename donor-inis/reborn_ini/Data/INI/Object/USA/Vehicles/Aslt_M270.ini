; Assault Gen M270 MRLS
Object Lazr_AmericaVehicleTomahawk

  ; *** ART PARAMETERS ***
  SelectPortrait = SAMLRS_L
  ButtonImage = SAMLRS
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  ;UpgradeCameo2 = None
  ;UpgradeCameo3 = None
  ;UpgradeCameo4 = None
  ;UpgradeCameo5 = None
  
  Draw = W3DTankDraw DrawTag_Main
    OkToChangeModelColor = Yes
      
    DefaultConditionState
      Model = AVM270
      Turret = TURRET
      TurretPitch = TURRETEL
      WeaponLaunchBone = PRIMARY WEAPONA
      WeaponFireFXBone = PRIMARY WEAPONAFX
      WeaponLaunchBone = SECONDARY WEAPONB
      WeaponFireFXBone = SECONDARY WEAPONBFX
    End

    ConditionState = REALLYDAMAGED
      Model = AVM270
    End
    AliasConditionState = RUBBLE

    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:M270
  
  Side = AmericaLaserGeneral ; USA Assault Gen
  EditorSorting = VEHICLE
  
  TransportSlotCount = 3
  
  BuildCost = 1100
  BuildTime = 20
  
  VisionRange = 400
  ShroudClearingRange = 300
  
  Prerequisites
    Object = Lazr_AmericaStrategyCenter
  End
  
  ExperienceValue = 100 100 200 300
  ExperienceRequired = 0 200 400 800
  IsTrainable = Yes
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY M270RocketWeapon
  End
  
  ArmorSet
    Conditions = None
    Armor = TruckArmor
    DamageFX = TankDamageFX
  End
  
  CrusherLevel = 2
  CrushableLevel = 2
  
  CommandSet = Lazt_AmericaVehicleTomahawkCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = USAGenericArtilleryVoiceSelect
  VoiceMove = TomahawkVoiceMove
  VoiceGuard = TomahawkVoiceMove
  VoiceAttack = TomahawkVoiceAttack
  ; engine sounds
  SoundMoveStart = TomahawkMoveStart
  SoundMoveStartDamaged = TomahawkMoveStart
  
  UnitSpecificSounds
    VoiceCreate = TomahawkVoiceCreate
    VoiceCrush = TomahawkVoiceCrush
    VoiceEnter = TomahawkVoiceMove
    VoiceBombard = TomahawkVoiceAttack
    ; pilot sounds
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject    
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE DONT_AUTO_CRUSH_INFANTRY CAN_ATTACK VEHICLE SCORE

  Body = ActiveBody BodyTag_Normal
    MaxHealth = 180
    InitialHealth = 180
    ; subdual settings
    SubdualDamageCap = 360
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface AITag_Normal
    Turret
      TurretTurnRate = 90
      TurretPitchRate = 90
      FirePitch = 45
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY SECONDARY
    End    
    AutoAcquireEnemiesWhenIdle = No ;NotWhileAttacking
   End
  Locomotor = SET_NORMAL MLRSLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50.0
  End
  
  Behavior = SlowDeathBehavior DeathTag_All
    DeathTypes = ALL
    DestructionDelay = 1
    FX = INITIAL FX_GenericTankDeathEffect
    OCL = FINAL OCL_USATankMLRSDebris
    FX = FINAL FX_AmericaVehicleTomahawkDeathExplosion
  End

  Behavior = ExperienceScalarUpgrade UpgradeTag_EXP
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0
  End

  Behavior = EjectPilotDie ModuleTag_Pilot
    DeathTypes = ALL -CRUSHED -SPLATTED
    ExemptStatus = HIJACKED
    VeterancyLevels = ALL -REGULAR
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
  End
  
  Behavior = TransitionDamageFX TransitionTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  
  Behavior = FlammableUpdate ModuleTag_Fire
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End
  
  Behavior = AutoHealBehavior ModuleTag_AutoRepair
    StartsActive  = Yes
    HealingAmount = 5
    HealingDelay = 1000
    StartHealingDelay = 3000
  End

  Geometry = BOX
  GeometryMajorRadius = 18
  GeometryMinorRadius = 12
  GeometryHeight = 10
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME 
  ShadowSizeX = 45
End