Object SupW_AmericaVehicleTomahawk

  ; *** ART PARAMETERS ***
  SelectPortrait         = Crusader
  ButtonImage            = Crusader
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTankDraw ModuleTag_01
  
    OkToChangeModelColor  = Yes
    
    DefaultConditionState
      Model               = AVCrusie
      Turret              = TURRET01
      TurretPitch         = TURRETEL01
      WeaponFireFXBone    = PRIMARY MUZZLE01
      WeaponRecoilBone    = PRIMARY BARREL01
      WeaponMuzzleFlash   = PRIMARY MUZZLEFX01
      WeaponLaunchBone    = PRIMARY MUZZLE01
      HideSubObject       = TURRET01
      ShowSubObject       = FAKE_TURRET
    End
    
    ConditionState        = RUBBLE REALLYDAMAGED
      Model               = AVCrusie
    End
    
    ;*** UNPACKING STATE  -- preparing to fire ***
    ConditionState    = UNPACKING
      Animation       = AVCrusie.AVCrusie
      AnimationMode   = ONCE
      Flags           = START_FRAME_FIRST
    End

    ConditionState    = REALLYDAMAGED UNPACKING
      Model           = AVCrusie
      Animation       = AVCrusie.AVCrusie
      AnimationMode   = ONCE
      Flags           = START_FRAME_FIRST
    End

    ;*** PACKING STATE -- preparing to move ***
    ConditionState    = PACKING
      Animation       = AVCrusie.AVCrusie
      AnimationMode   = ONCE_BACKWARDS
      Flags           = START_FRAME_LAST
    End

    ConditionState    = REALLYDAMAGED PACKING
      Model           = AVCrusie
      Animation       = AVCrusie.AVCrusie
      AnimationMode   = ONCE_BACKWARDS
      Flags           = START_FRAME_LAST
    End

    ;*** DEPLOYED STATE -- ready to fire ***
    ConditionState  = DEPLOYED 
      Animation       = AVCrusie.AVCrusie
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      HideSubObject   = FAKE_TURRET
      ShowSubObject   = TURRET01
    End

    ConditionState  = DEPLOYED REALLYDAMAGED
      Model           = AVCrusie
      Animation       = AVCrusie.AVCrusie
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      HideSubObject   = FAKE_TURRET
      ShowSubObject   = TURRET01
    End
    
    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName        = OBJECT:Crusader
  Side               = AmericaSuperWeaponGeneral
  EditorSorting      = VEHICLE
  TransportSlotCount = 4                 ;how many "slots" we take in a transport (0 == not transportable)
  WeaponSet
    Conditions       = None 
    Weapon           = PRIMARY CrusaderCannon
  End
  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End
  BuildCost          = 1000
  BuildTime          = 10.0          ;in seconds    
  VisionRange        = 180
  ShroudClearingRange = 300
  Prerequisites
    Object           = SupW_AmericaStrategyCenter
  End

  ExperienceValue = 50 50 100 150    ;Experience point value at each level
  ExperienceRequired = 0 100 200 300  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet      = GenericCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect           = USAGenericTankVoiceSelect
  VoiceMove             = CrusaderTankVoiceMove
  VoiceGuard            = CrusaderTankVoiceMove
  VoiceAttack           = CrusaderTankVoiceAttack
  SoundMoveStart        = CrusaderTankMoveStart
  SoundMoveStartDamaged = CrusaderTankMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = CrusaderTankVoiceCreate
    VoiceEnter             = CrusaderTankVoiceMove
    TurretMoveStart     = NoSound
    TurretMoveLoop      = TurretMoveLoop
    SoundEject          = PilotSoundEject
    VoiceEject          = PilotVoiceEject
    VoiceCrush          = CrusaderTankVoiceCrush
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority     = UNIT
  KindOf            = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE
  
  Body              = ActiveBody ModuleTag_02
    MaxHealth       = 250.0
    InitialHealth   = 250.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 240
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End


  Behavior = DeployStyleAIUpdate AITag_Deploy
  ;; New system for artillery, they can now auto aquire targets. But they can't shoot while on the move - Zeke
    Turret
      TurretTurnRate        = 90
      TurretPitchRate       = 90
      FirePitch             = 0
      AllowsPitch           = Yes
      RecenterTime          = 2500
      ControlledWeaponSlots = PRIMARY
      NaturalTurretAngle    = 0
      InitiallyDisabled     = Yes
    End
    AutoAcquireEnemiesWhenIdle = Yes NOTWHILEATTACKING ATTACK_BUILDINGS
    PackTime = 1000
    UnpackTime = 1000
    TurretsFunctionOnlyWhenDeployed = Yes
    TurretsMustCenterBeforePacking = Yes
  End
  Locomotor = SET_NORMAL CrusaderLocomotor
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 50.0
  End

  ; A crushing defeat
  Behavior               = FXListDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX         = FX_CarCrush
  End
  Behavior               = CreateObjectDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList    = OCL_CrusaderTank_CrushEffect
  End
  Behavior = SlowDeathBehavior ModuleTag_08
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 2000
    DestructionDelayVariance = 300
    FX  = INITIAL  FX_CrusaderCatchFire  
    FX  = FINAL    FX_GenericTankDeathExplosion 
    OCL = FINAL    OCL_InfernoCannonDeathEffect
  End

  Behavior                 = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:-7 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior         = CreateCrateDie ModuleTag_10
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = DestroyDie ModuleTag_22
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_23
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0 ;Increases experience gained by an additional 100%
  End

  Geometry = BOX
  Scale           = 0.90
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 10.0
  GeometryHeight      = 15.0     
  GeometryIsSmall     = Yes
  Shadow              = SHADOW_VOLUME 
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length   

End