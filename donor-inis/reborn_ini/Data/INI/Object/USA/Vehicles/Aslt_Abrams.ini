; Assault Gen Abrams
Object Lazr_AmericaTankPaladin

  ; *** ART PARAMETERS ***
  SelectPortrait = SAAbrams_L
  ButtonImage = SAAbrams
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo2 = Upgrade_AmericaCompositeArmor
  UpgradeCameo3 = Upgrade_AmericaCompositeArmor2
  UpgradeCameo4 = Upgrade_AmericaChemRounds
  
  Draw = W3DOverlordTankDraw DrawTag_Overlord
    OkToChangeModelColor = Yes
  
    DefaultConditionState
      Model = M1A2Abrams
      Turret = TURRET01
      WeaponFireFXBone = PRIMARY MUZZLE01
      WeaponRecoilBone = PRIMARY BARREL01
      WeaponMuzzleFlash = PRIMARY MUZZLEFX01
      WeaponLaunchBone = PRIMARY MUZZLE01
    End
    ConditionState = REALLYDAMAGED
      Model = M1A2Abrams_d
    End
    ConditionState = RUBBLE
      Model = M1A2Abrams_d
    End

    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Abrams
  
  Side = AmericaLaserGeneral ; USA Assault Gen
  EditorSorting = VEHICLE
  
  TransportSlotCount = 3
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY AbramsTankGun
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY AbramsTankGun2
  End
  
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = UpgradedTankArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 1000
  BuildTime = 12
  
  VisionRange = 225
  ShroudClearingRange = 300
  
  Prerequisites
    Object = Lazr_AmericaStrategyCenter
  End
  
  ExperienceValue = 100 100 200 400
  ExperienceRequired = 0 200 300 600
  IsTrainable = Yes
  
  CrusherLevel = 2
  CrushableLevel = 2
  
  CommandSet = GenericCommandSet
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = AbramsTankVoiceSelect
  VoiceMove = AbramsTankVoiceMove
  VoiceGuard = AbramsTankVoiceGuard
  VoiceAttack = AbramsTankVoiceAttack
  ; engine sounds
  SoundMoveStart = AbramsTankMoveStart
  SoundMoveStartDamaged = AbramsTankMoveStart
  
  UnitSpecificSounds
    VoiceCreate = AbramsTankVoiceCreate
    VoiceCrush = AbramsTankVoiceCrush
    VoiceEnter = AbramsTankVoiceMove
    ; pilot voices
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject  
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 500
    InitialHealth = 500
    ; subdual settings
    SubdualDamageCap = 1000
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface AITag_Normal
    Turret
      TurretTurnRate = 180
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes NOTWHILEATTACKING
    MoodAttackCheckRate = 0
  End
  
  Locomotor = SET_NORMAL AbramsLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End

  Behavior = ExperienceScalarUpgrade UpgradeTag_EXP
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0
  End
  
  Behavior = ArmorUpgrade UpgradeTag_Armor
    TriggeredBy = Upgrade_AmericaCompositeArmor2
  End

  Behavior = SlowDeathBehavior DeathTag_All
    DeathTypes = ALL
    DestructionDelay = 1
    FX = INITIAL FX_GenericTankDeathExplosion
    OCL = INITIAL OCL_CrusaderTurret
  End

  Behavior = TransitionDamageFX TransitionTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = CreateCrateDie CrateTag_Salvage
   CrateData = SalvageCrateData
  End

  Behavior = EjectPilotDie ModuleTag_Pilot
    DeathTypes = ALL -CRUSHED -SPLATTED
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
    ExemptStatus = HIJACKED
    VeterancyLevels = ALL -REGULAR
  End

  Behavior = FlammableUpdate ModuleTag_Fire
    AflameDuration = 5000 
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End
  
  Behavior = WeaponSetUpgrade UpgradeTag_Weapon
    TriggeredBy = Upgrade_AmericaChemRounds
  End

  Behavior = VeterancyGainCreate GainTag_Veterancy
    StartingLevel = VETERAN
  End
  
  Behavior = OverlordContain ContainTag_Overlord
    Slots = 1
    DamagePercentToUnits = 100%
    AllowInsideKindOf = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret = Yes
    PayloadTemplateName = AmericaTankAbramsMachineGun
    ExperienceSinkForRider = Yes
  End
  
  Behavior = AutoHealBehavior ModuleTag_AutoRepair
    StartsActive  = Yes
    HealingAmount = 5
    HealingDelay = 1000
    StartHealingDelay = 3000
  End
  
  Behavior = MaxHealthUpgrade UpgradeTag_Health
    TriggeredBy = Upgrade_AmericaCompositeArmor
    AddMaxHealth = 100.0
    ChangeType = ADD_CURRENT_HEALTH_TOO
  End

  Geometry = BOX
  GeometryMajorRadius = 15
  GeometryMinorRadius = 10
  GeometryHeight = 10
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End

; Abrams Machine Gun -------------------------------------------------
Object AmericaTankAbramsMachineGun

  ; *** ART PARAMETERS ***
  Draw = W3DDependencyModelDraw DrawTag_Dependency
    OkToChangeModelColor = Yes
    AttachToBoneInContainer = FIREPOINT01

    DefaultConditionState
      Model = M1A1GunPod
      Turret = TURRET01
      WeaponFireFXBone = SECONDARY MUZZLEFX02
      WeaponMuzzleFlash = SECONDARY MUZZLEFX02
    End
  End

  ; *** DESIGN PARAMETERS ***
  Side = AmericaLaserGeneral
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY None
    Weapon = SECONDARY M1AbramsTankMachineGun
  End
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
  End
  
  VisionRange = 225

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CLICK_THROUGH IGNORED_IN_GUI
  
  Body = StructureBody BodyTag_Structure
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = AIUpdateInterface AITag_Normal
    Turret
      ControlledWeaponSlots = PRIMARY
      TurretTurnRate = 180
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End

  Behavior = DestroyDie DeathTag_All
  End

  Geometry = BOX
  GeometryMajorRadius = 1
  GeometryMinorRadius = 1
  GeometryHeight = 1
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End