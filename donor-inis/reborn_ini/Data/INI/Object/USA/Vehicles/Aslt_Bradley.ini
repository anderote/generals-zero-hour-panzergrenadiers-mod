; Assault Gen's Bradley
Object Lazr_AmericaTankCrusader

  ; *** ART PARAMETERS ***
  SelectPortrait = SABradley
  ButtonImage = SABradley_L
  
  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo2 = Upgrade_AmericaCompositeArmor
  UpgradeCameo3 = Upgrade_AmericaCompositeArmor2
  ;UpgradeCameo4 = None
  ;UpgradeCameo5 = None
  
  Draw = W3DTankDraw DrawTag_Tank
    OkToChangeModelColor = Yes
  
    DefaultConditionState
      Model = AVBradley
      Turret = TURRET01
      WeaponFireFXBone = PRIMARY MUZZLE01
      WeaponRecoilBone = PRIMARY TURRETEL01
      WeaponMuzzleFlash = PRIMARY MUZZLE01
      WeaponLaunchBone = PRIMARY MUZZLE01
      WeaponFireFXBone = SECONDARY WEAPONA
      WeaponLaunchBone = SECONDARY WEAPONA
      WeaponFireFXBone = TERTIARY MUZZLEMG01
      WeaponLaunchBone = TERTIARY MUZZLEMG01
    End
    ConditionState = REALLYDAMAGED
      Model = AVBradley_D
    End
    AliasConditionState = RUBBLE
    
    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Bradley
  
  Side = AmericaLaserGeneral ; USA Assault Gen
  EditorSorting = VEHICLE
  
  TransportSlotCount = 3
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY BradleyTankGun
    PreferredAgainst = PRIMARY INFANTRY
    Weapon = SECONDARY BradleyTOWMissile
  End
  
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = UpgradedTankArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 800
  BuildTime = 10
  VisionRange = 225
  ShroudClearingRange = 300
  
  ExperienceValue = 100 100 200 400
  ExperienceRequired = 0 200 300 600
  IsTrainable = Yes
  CrusherLevel = 2
  CrushableLevel = 2
  
  CommandSet = AmericaVehicleBradleyCommandSet
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = USAGenericTankVoiceSelect
  VoiceMove = CrusaderTankVoiceMove
  VoiceGuard = CrusaderTankVoiceMove
  VoiceAttack = CrusaderTankVoiceAttack
  ; engine sounds
  SoundMoveStart = CrusaderTankMoveStart
  SoundMoveStartDamaged = CrusaderTankMoveStart
  
  UnitSpecificSounds
    VoiceCreate = CrusaderTankVoiceCreate
    VoiceEnter = CrusaderTankVoiceMove
    VoiceCrush = CrusaderTankVoiceCrush
    ; pilot sounds
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE PARACHUTABLE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 480
    InitialHealth = 480
    ; subdual settings
    SubdualDamageCap = 960
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = TransportAIUpdate AITag_Normal
    Turret
      TurretTurnRate = 180
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes NOTWHILEATTACKING
    MoodAttackCheckRate = 0
  End
  Locomotor = SET_NORMAL BradleyLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End
     
  Behavior = ExperienceScalarUpgrade UpgradeTag_EXP
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0
  End
  
  Behavior = MaxHealthUpgrade UpgradeTag_Health
    TriggeredBy = Upgrade_AmericaCompositeArmor
    AddMaxHealth = 100.0
    ChangeType = ADD_CURRENT_HEALTH_TOO
  End

  Behavior = SlowDeathBehavior DeathTag_All
    DeathTypes = ALL
    DestructionDelay = 1
    FX  = INITIAL FX_GenericTankDeathEffect
    OCL = MIDPOINT OCL_GenericTankDeathEffect
    FX  = FINAL FX_GenericTankDeathExplosion
    OCL = FINAL OCL_CrusaderTurret
  End
  
  Behavior = TransitionDamageFX TransitionTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = CreateCrateDie CrateTag_Salvage
   CrateData = SalvageCrateData
  End

  Behavior = EjectPilotDie ModuleTag_Pilot
    DeathTypes = ALL -CRUSHED -SPLATTED
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
    ExemptStatus = HIJACKED
    VeterancyLevels = ALL -REGULAR
  End

  Behavior = FlammableUpdate ModuleTag_Fire
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End
  
  Behavior = TransportContain ContainTag_Transport
    Slots = 6
    ScatterNearbyOnExit = Yes
    HealthRegen%PerSec = 10
    DamagePercentToUnits = 50%
    AllowInsideKindOf = INFANTRY
    ExitDelay = 250
    NumberOfExitPaths = 3
    GoAggressiveOnExit = Yes
  End  

  Behavior = VeterancyGainCreate ModuleTag_23
    StartingLevel = VETERAN
  End
  
  Behavior = AutoHealBehavior ModuleTag_AutoRepair
    StartsActive  = Yes
    HealingAmount = 5
    HealingDelay = 1000
    StartHealingDelay = 3000
  End
  
  Behavior = ArmorUpgrade UpgradeTag_Armor
    TriggeredBy = Upgrade_AmericaCompositeArmor2
  End

  Geometry = BOX
  GeometryMajorRadius = 15
  GeometryMinorRadius = 10
  GeometryHeight = 10
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End