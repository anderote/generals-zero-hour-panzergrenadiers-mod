Object ScorpionTankShell

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw ModuleTag_01
    ConditionState = NONE
      Model = AVTankShel
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName       = OBJECT:TankShell
  EditorSorting     = SYSTEM
  ArmorSet
    Armor = ProjectileArmor
  End
  VisionRange = 0.0

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = DestroyDie ModuleTag_03
    ;nothing
  End
  
  Behavior = DumbProjectileBehavior ModuleTag_06
    DetonateCallsKill = Yes
    FirstHeight = 0
    SecondHeight = 0
    FirstPercentIndent = 33%
    SecondPercentIndent = 66%
    FlightPathAdjustDistPerSecond = 300
    DetonateCallsKill = Yes
  End

  Behavior = PhysicsBehavior ModuleTag_07
    Mass = 0.01 ; can't be zero, but we want it tiny so that it travels nearly straight
  End

  ; Death Weapons
  Behavior = FireWeaponWhenDeadBehavior DeathFXTag_Normal
    DeathWeapon = ScorpionTankGunFXWeapon
    StartsActive = Yes
    ConflictsWith = Upgrade_GLAToxinShells      
  End
  
  Behavior = FireWeaponWhenDeadBehavior DeathFXTag_Toxin01
    DeathWeapon = ToxinShellWeapon
    StartsActive = No
    TriggeredBy = Upgrade_GLAToxinShells          
    ConflictsWith = Upgrade_GLAAnthraxBeta Chem_Upgrade_GLAAnthraxGamma      
  End

  Behavior = FireWeaponWhenDeadBehavior DeathFXTag_Toxin02
    DeathWeapon = ToxinShellWeaponUpgraded
    StartsActive = No
    TriggeredBy = Upgrade_GLAToxinShells Upgrade_GLAAnthraxBeta
    RequiresAllTriggers = Yes
    ConflictsWith = Chem_Upgrade_GLAAnthraxGamma
  End

  Behavior = FireWeaponWhenDeadBehavior DeathFXTag_Toxin03
    DeathWeapon = Chem_ToxinShellWeaponGamma
    StartsActive = No
    TriggeredBy = Upgrade_GLAToxinShells Chem_Upgrade_GLAAnthraxGamma 
    RequiresAllTriggers = Yes
  End
  
  ; redundancy fix
  Behavior = FireWeaponWhenDeadBehavior DeathFXTag_Toxin04
    DeathWeapon = Chem_ToxinShellWeaponGamma
    StartsActive = No
    TriggeredBy = Upgrade_GLAToxinShells Upgrade_GLAAnthraxBeta Chem_Upgrade_GLAAnthraxGamma 
    RequiresAllTriggers = Yes
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End