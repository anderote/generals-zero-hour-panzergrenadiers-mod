; ------------------------------------------------------------------------------
Object GLAVehicleSupplyTruck
  ; *** ART PARAMETERS ***
  SelectPortrait = GLASupplyTruck_L
  ButtonImage = GLASupplyTruck
  ; UpgradeCameo1 = NONE
  ; UpgradeCameo2 = NONE
  ; UpgradeCameo3 = NONE
  ; UpgradeCameo4 = NONE
  ; UpgradeCameo5 = NONE
  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = uvsupplytk
      HideSubObject = Cargo01
    End
    ConditionState = REALLYDAMAGED
      Model = uvsupplytk_d
    End
    ConditionState = RUBBLE
      Model = uvsupplytk_d
    End
    ConditionState = CARRYING
      ShowSubObject = Cargo01
    End
    ConditionState = REALLYDAMAGED CARRYING
      Model = uvsupplytk_d
      ShowSubObject = Cargo01
    End
    ConditionState = RUBBLE CARRYING
      Model = uvsupplytk_d
      ShowSubObject = Cargo01
    End
    TrackMarks = EXTireTrack.tga
    LeftFrontTireBone = Tire01
    RightFrontTireBone = Tire02
    MidLeftRearTireBone = Tire03
    MidRightRearTireBone = Tire04
    LeftRearTireBone = Tire05
    RightRearTireBone = Tire06
    TireRotationMultiplier = 0.2     ; this * speed = rotation.
    PowerslideRotationAddition = 2.5     ; This speed is added to the rotation speed when powersliding.
    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = RocketBuggyDirtPowerSlide
  End
  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:SupplyTruck
  Side = GLA
  EditorSorting = VEHICLE
  TransportSlotCount = 2     ; how many "slots" we take in a transport (0 == not transportable)
  BuildCost = 1000
  BuildTime = 10.0     ; in seconds
  VisionRange = 150
  ShroudClearingRange = 300
  ArmorSet
    Conditions = None
    Armor = TruckArmor
    DamageFX = TankDamageFX
  End
  CrusherLevel = 2     ; What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = ChinaSupplyTruckCommandSet
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = BombTruckVoiceSelect
  VoiceMove = BombTruckVoiceMove
  VoiceGuard = BombTruckVoiceMove
  VoiceAttack = BombTruckVoiceAttack
  SoundMoveStart = BombTruckMoveStart
  SoundMoveStartDamaged = BombTruckMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = BombTruckVoiceMove
    TruckLandingSound = RocketBuggyLand
    TruckPowerslideSound = NoSound
    VoiceEnter = BombTruckVoiceMove
    VoiceSupply = BombTruckVoiceAttack
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_CAST_REFLECTIONS VEHICLE HARVESTER SCORE SALVAGER
  Body = ActiveBody ModuleTag_02
    MaxHealth = 300.0
    InitialHealth = 300.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = SupplyTruckAIUpdate ModuleTag_03
    MaxBoxes = 4
    SupplyCenterActionDelay = 500     ; ms for whole thing (one transaction)
    SupplyWarehouseActionDelay = 1000     ; ms per box (many small transactions)
    SupplyWarehouseScanDistance = 700     ; 350 ; Max distance to look for a warehouse, or we go home.  (Direct dock command on warehouse overrides, and no max on Center Scan)
    SuppliesDepletedVoice = BombTruckVoiceSelect
  End
  Locomotor = SET_NORMAL SupplyTruckLocomotor
  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 5.0
  End
  ExperienceValue = 50 50 50 50     ; Experience point value at each level
  Behavior = SlowDeathBehavior ModuleTag_05
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 200
    DestructionDelayVariance = 100
    FX = FINAL FX_SupplyTruckExplosionOneFinal
    OCL = FINAL OCL_BombTruckDeathEffect
  End
  Behavior = FXListDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_ChinaSupplyTruck_CrushEffect
  End
  Behavior = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End
  Behavior = FlammableUpdate ModuleTag_10
    AflameDuration = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay = 500     ; this often.
  End
  ; A crushing defeat
  Behavior = DestroyDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = CreateCrateDie ModuleTag_12
    CrateData = SalvageCrateData
  End
  
  ; stealth upgrade
  Behavior = StealthUpgrade ModuleTag_Stealth01
    TriggeredBy = Upgrade_GLAStealthSupplyTrucks
  End
  Behavior = StealthUpdate ModuleTag_Stealth02
    StealthDelay = 2500    
    MoveThresholdSpeed = 3
    InnateStealth = No
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End
  
  Geometry = BOX
  GeometryMajorRadius = 17.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 14.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45     ; minimum elevation angle above horizon. Used to limit shadow length
End