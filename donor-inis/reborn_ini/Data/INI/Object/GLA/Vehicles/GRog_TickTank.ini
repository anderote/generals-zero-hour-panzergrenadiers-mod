    AutoAcquireEnemiesWhenIdle = Yes Stealthed
    MoodAttackCheckRate = 0
  End
  
  ; Damage FXs
  Behavior = TransitionDamageFX FXTag_TransDmg
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransitionSmall
