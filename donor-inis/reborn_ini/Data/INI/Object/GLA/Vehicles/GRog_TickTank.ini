; GLA Rogue Tick Tank
Object GRog_GLATickTank

  ; *** ART PARAMETERS ***
  SelectPortrait = SUTickTank_XL
  ButtonImage = SUTickTank_L
  
  UpgradeCameo1 = Upgrade_GLAAPBullets
  UpgradeCameo2 = Upgrade_GLAAPRockets
  UpgradeCameo3 = Upgrade_GLAJunkRepair
  ; UpgradeCameo4 = 
  ; UpgradeCameo5 = 
  
  Draw = W3DTankDraw DrawTag_Main
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes
    
    ; Normal
    DefaultConditionState
      Model = UVTickT
      Animation = UVTickT.UVTickT
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
      Turret = TURRET
      WeaponFireFXBone = PRIMARY MUZZA
      WeaponLaunchBone = PRIMARY MUZZA
      WeaponRecoilBone = PRIMARY BARREL
      WeaponMuzzleFlash = PRIMARY MUZZFXA
      HideSubObject = TrdBak TArm
    End
    
    ConditionState = REALLYDAMAGED
      Model = UVTickT_D
      Animation = UVTickT_D.UVTickT_D
    End
    AliasConditionState = RUBBLE
        
    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2.0
  End
  
  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:TickTank
  
  Side = GLA
  EditorSorting = VEHICLE
  
  TransportSlotCount = 3
  
  WeaponSet
    Conditions = None
    Weapon = PRIMARY TickTankAutoCannonGun
    ; Deploy Weapons
    Weapon = SECONDARY TickTankDeployAtLocationWeapon
    AutoChooseSources = SECONDARY NONE
    Weapon = TERTIARY TickTankDeployWeapon
    AutoChooseSources = TERTIARY NONE
  End
    
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TickTankDamageFX
  End
  
  BuildCost = 600
  BuildTime = 7
  
  VisionRange = 200
  ShroudClearingRange = 400
  
  ExperienceValue = 60 60 120 200
  ExperienceRequired = 0 100 200 400
  IsTrainable = Yes
  
  CrusherLevel = 2
  CrushableLevel = 2
  
  CommandSet = GLATickTankCommandSet
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = TickTankVoiceSelect
  VoiceMove = TickTankVoiceMove
  VoiceAttack = TickTankVoiceAttack
  VoiceGuard = TickTankVoiceMove
  ; Engine Sounds
  SoundMoveStart = ScorpionTankMoveStart
  SoundMoveStartDamaged = ScorpionTankMoveStart
  
  UnitSpecificSounds
    VoiceCreate = TickTankVoiceCreate
    VoiceEnter = TickTankVoiceMove
  End
  
  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SALVAGER SCORE ;WEAPON_SALVAGER
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 400
    InitialHealth = 400
    ; Subdual Settings
    SubdualDamageCap = 800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 180
      RecenterTime = 5000
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End
  Locomotor = SET_NORMAL ScorpionLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End
  
  ; Damage FXs
  Behavior = TransitionDamageFX FXTag_TransDmg
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransitionSmall
  End
  
  ; Death Modules
  Behavior = SlowDeathBehavior DeathTag_Normal
    DeathTypes = ALL -CRUSHED -SPLATTED -SUICIDED
    DestructionDelay = 2000
    FX = INITIAL FX_CrusaderCatchFire
    OCL = FINAL OCL_TickTankDeathEffect
    FX = FINAL FX_BattleMasterExplosionOneFinal
  End
  
  Behavior = InstantDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_CarCrush
    OCL = OCL_TickTankDeathEffect
  End
  
  ; Salvage Crate
  Behavior = CreateCrateDie CrateTag_Salvage
    CrateData = SalvageCrateData
  End
  
  ; Deploy Codes
  Behavior = DestroyDie ModuleTag_Deploy01
    DeathTypes = NONE +SUICIDED
  End
  
  Behavior = CreateObjectDie ModuleTag_Deploy02
    DeathTypes = NONE +SUICIDED
    CreationList = OCL_TickTankTurretStart
    TransferPreviousHealth = Yes
  End
  
  ; Junk Repair
  Behavior = AutoHealBehavior HealTag_JunkRepair
    HealingAmount = 2
    HealingDelay = 1000
    TriggeredBy = Upgrade_GLAJunkRepair
  End
  
  Geometry = BOX
  GeometryMajorRadius = 12
  GeometryMinorRadius = 7.5
  GeometryHeight = 10
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End

; Tick Tank Turret Start
Object GRog_TickTankTurretStart

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
  
    OkToChangeModelColor = Yes
    IgnoreConditionStates = NIGHT SNOW

    DefaultConditionState
      Model = UVTickT
      Animation = UVTickT.UVTickT
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      WeaponMuzzleFlash = PRIMARY MUZZFXA
      ; Tread Animation
      HideSubObject = TrdBak
      ; Dig Particles
      ParticleSysBone = DIRT TickTankDigInDust
      ParticleSysBone = DIRT TickTankDigInDebris
    End
    
    ConditionState = REALLYDAMAGED
      Model = UVTickT_D
      Animation = UVTickT_D.UVTickT_D
    End
    AliasConditionState = RUBBLE
  End

  ; *** DESIGN PARAMETERS ***
  Side = GLA
  EditorSorting = SYSTEM
  
  VisionRange = 200
  ShroudClearingRange = 400
  
  WeaponSet
    Weapon = SECONDARY SuicideUnresistableWeapon
    AutoChooseSources = SECONDARY NONE
  End
  
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TickTankDamageFX
  End
  
  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD NO_SELECT CAN_ATTACK VEHICLE IMMOBILE ;SCORE_CREATE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 400
    InitialHealth = 400
    ; Subdual Settings
    SubdualDamageCap = 800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = AIUpdateInterface AITag_Normal
  End
  
  ExperienceValue = 60 60 120 200
  ExperienceRequired = 0 100 200 400
  IsTrainable = Yes
  
  CrushableLevel = 3
  
  ; Death Modules
  Behavior = SlowDeathBehavior DeathTag_Normal
    DeathTypes = ALL -SUICIDED
    DestructionDelay = 2000
    FX = INITIAL FX_CrusaderCatchFire
    OCL = FINAL OCL_TickTankDeathEffect
    FX = FINAL FX_BattleMasterExplosionOneFinal
  End
  
  ; Spawn Real Turret
  Behavior = OCLUpdate ModuleTag_SpawnTurret01
    MinDelay = 2667
    MaxDelay = 2667
    OCL = OCL_FireSecondary
  End
  
  Behavior = DestroyDie ModuleTag_SpawnTurret02
    DeathTypes = NONE +SUICIDED
  End
  
  Behavior = CreateObjectDie ModuleTag_SpawnTurret03
    DeathTypes = NONE +SUICIDED
    CreationList = OCL_TickTankTurret
    TransferPreviousHealth = Yes
  End
  
  ; Junk Repair
  Behavior = AutoHealBehavior HealTag_JunkRepair
    HealingAmount = 2
    HealingDelay = 1000
    TriggeredBy = Upgrade_GLAJunkRepair
  End
  
  Geometry = BOX
  GeometryMajorRadius = 8
  GeometryMinorRadius = 8
  GeometryHeight = 16
  GeometryIsSmall = Yes ;No
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
  
  BuildCompletion = PLACED_BY_PLAYER
End

