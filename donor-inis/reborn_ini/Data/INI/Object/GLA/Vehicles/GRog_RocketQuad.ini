; GLA Rogue Rocket Quad
Object GLAVehicleRocketBuggy
  ; *** ART PARAMETERS ***
  SelectPortrait = RocketQuad
  ButtonImage = RocketQuad
  UpgradeCameo1 = Upgrade_GLAAPRockets
  UpgradeCameo2 = Upgrade_GLAJunkRepair
  UpgradeCameo3 = Upgrade_GLATractionTreads
  ; UpgradeCameo5 = NONE
  
  Draw = W3DTankTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes
    
    ;; Second Salvage = Default
    DefaultConditionState
      Model = UVRockQuad
      Animation = UVRockQuad.UVRockQuad ; radar dish animation
      AnimationMode = LOOP
      Turret = TURRET
      TurretPitch = TURRETELC
      WeaponFireFXBone = PRIMARY WEAPONC
      WeaponLaunchBone = PRIMARY WEAPONC
      WeaponFireFXBone = SECONDARY WEAPONC
      WeaponLaunchBone = SECONDARY WEAPONC
      HideSubObject = TURRETB TURRETC ; I'll re eneable this eventually - Zeke
    End
    
    ConditionState = REALLYDAMAGED
      Model = UVRockQuad_D
      Animation = UVRockQuad_D.UVRockQuad_D ; radar dish animation
    End
    
    ConditionState = RUBBLE
      Model = UVRockQuad_D
      AnimationMode = MANUAL
    End

    TrackMarks = EXTnkTrack.tga

    TreadAnimationRate = 2.0;  amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.

    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
 
    ; These parameters are only used if the model has a separate suspension, 
    ; and the locomotor has HasSuspension = Yes.
    LeftFrontTireBone = Tire01
    RightFrontTireBone = Tire02
    TireRotationMultiplier = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition = 0   ; This unit doesn't powerslide.
  End
  
  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:RocketQuad
  Side = GLA
  EditorSorting = VEHICLE
  TransportSlotCount = 4     ; how many "slots" we take in a transport (0 == not transportable)
  WeaponSet
    Conditions = None
    Weapon = PRIMARY RocketQuad
    Weapon = SECONDARY RocketQuadAir
  End
  ArmorSet
    Conditions = None
    Armor = HumveeArmor
    DamageFX = TankDamageFX
  End
  BuildCost = 1100
  BuildTime = 10.0     ; in seconds
  VisionRange = 180
  ShroudClearingRange = 300
  Prerequisites
    Object = GLAPalace
  End
  ExperienceValue = 75 75 125 175     ; Experience point value at each level
  ExperienceRequired = 0 200 400 800     ; Experience points needed to gain each level
  IsTrainable = Yes     ; Can gain experience
  CrusherLevel = 2     ; What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = GLAVehicleQuadCannon
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = RocketBuggyVoiceSelect
  VoiceMove = RocketBuggyVoiceMove
  VoiceAttack = RocketBuggyVoiceAttack
  SoundMoveStart = RocketBuggyMoveStart
  SoundMoveStartDamaged = RocketBuggyMoveStart
  VoiceGuard = RocketBuggyVoiceMove
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = RocketBuggyVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    TruckLandingSound = RocketBuggyLand
    TruckPowerslideSound = RocketBuggyPowerslide
    VoiceCrush = RocketBuggyVoiceCrush
    VoiceEnter = RocketBuggyVoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK DONT_AUTO_CRUSH_INFANTRY ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SALVAGER SCORE
  Body = ActiveBody ModuleTag_02
    MaxHealth = 300
    InitialHealth = 300
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 240
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 180
      TurretPitchRate = 180
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL QuadCannonLocomotor
  Locomotor = SET_NORMAL_UPGRADED QuadCannonTractionLocomotor     ; QuadCannonLocomotor QuadCannonTractionLocomotor
  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 50.0
  End
  ; The pop up AirDeath
  Behavior = SlowDeathBehavior ModuleTag_05
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 5
    ModifierBonusPerOverkillPercent = 20%     ; negative means less likely to pick this in the face of much damage, positive means more likely
    DestructionDelay = 0
    OCL = FINAL OCL_QuadCannonDeathEffect
    FX = FINAL FX_BattleMasterExplosionOneFinal
  End
  Behavior = AutoHealBehavior ModuleTag_08
    HealingAmount = 2
    HealingDelay = 1000     ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End
  Behavior = DestroyDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  ; A crushing defeat
  Behavior = FXListDie ModuleTag_12
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_RocketBuggy_CrushEffect
  End
  Behavior = CreateCrateDie ModuleTag_14
    CrateData = SalvageCrateData
  ; CrateData = EliteTankCrateData
  ; CrateData = HeroicTankCrateData
  End
  Behavior = TransitionDamageFX ModuleTag_15
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay = 500     ; this often.
  End
  Behavior = LocomotorSetUpgrade ModuleTag_22
    TriggeredBy = Upgrade_GLATractionTreads
  End
  Geometry = BOX
  GeometryMajorRadius = 13.0
  GeometryMinorRadius = 9.0
  GeometryHeight = 7.5
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45     ; minimum elevation angle above horizon. Used to limit shadow length
End