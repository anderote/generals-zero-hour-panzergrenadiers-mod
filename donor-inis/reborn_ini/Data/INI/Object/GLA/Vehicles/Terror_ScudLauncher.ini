Object Chem_GLAVehicleScudLauncher

  ; *** ART PARAMETERS ***
  SelectPortrait         = SUTLScudLauncher
  ButtonImage            = SUTLScudLauncher

  UpgradeCameo1 = Upgrade_GLAJunkRepair
  UpgradeCameo2 = Upgrade_GLAAnthraxBeta
  UpgradeCameo3 = Chem_Upgrade_GLAAnthraxGamma ;AirBurst
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes

    ProjectileBoneFeedbackEnabledSlots = PRIMARY ;SECONDARY ; WeaponLaunchBone will be shown/hidden, not just used for firing offset
  
    DefaultConditionState
      Model = UVScudLchr
      Turret = TURRETUP02
      TurretPitch = TURRETEL02
      ShowSubObject = TURRETUP02
      HideSubObject = TURRET TURRETUP01
      WeaponLaunchBone = PRIMARY WeaponC
      WeaponLaunchBone = SECONDARY WeaponC
    End

    ConditionState = REALLYDAMAGED
      Model = UVScudLchr_d
      Turret = TURRETUP02
      TurretPitch = TURRETEL02
      ShowSubObject = TURRETUP02
      HideSubObject = TURRET TURRETUP01
      WeaponLaunchBone = PRIMARY WeaponC
      WeaponLaunchBone = SECONDARY WeaponC
    End
    AliasConditionState = RUBBLE

    TrackMarks = EXTireTrack.tga

    Dust = ScudLauncherDust
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = RocketBuggyDirtPowerSlide

    ; These parameters are only used if the model has a separate suspension, 
    ; and the locomotor has HasSuspension = Yes.
    LeftFrontTireBone = Tire01
    RightFrontTireBone = Tire05
    LeftRearTireBone = Tire04
    RightRearTireBone = Tire08
    MidLeftFrontTireBone = Tire02
    MidRightFrontTireBone = Tire06
    MidLeftRearTireBone = Tire03
    MidRightRearTireBone = Tire07

    TireRotationMultiplier = 0.2   ; this * speed = rotation.
    ;PowerslideRotationAddition = 0.0   ; This speed is added to the rotation speed when powersliding.

  End

  ; *** DESIGN PARAMETERS ***

  DisplayName      = OBJECT:TL_ScudLauncher
  Side = GLAToxinGeneral
  EditorSorting   = VEHICLE
  TransportSlotCount = 3                 ;how many "slots" we take in a transport (0 == not transportable)
  WeaponSet
    Conditions = None
    Weapon = PRIMARY Terror_ScudLauncherAirBurstWeapon
  End
  
  ArmorSet
    Conditions      = None
    Armor           = TruckArmor
    DamageFX        = TankDamageFX
  End
  BuildCost       = 1400
  BuildTime       = 15.0          ;in seconds    
  VisionRange     = 340
  ShroudClearingRange = 300
  Prerequisites
    Object = Chem_GLAArmsDealer
    Object = Chem_GLAPalace
    ;Science = SCIENCE_ScudLauncher
  End

  ExperienceValue = 50 50 100 150   ;Experience point value at each level
  ExperienceRequired = 0 100 200 400  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet           = Chem_GLAVehicleScudLauncherCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = ScudLauncherVoiceSelect
  VoiceMove = ScudLauncherVoiceMove
  VoiceGuard = ScudLauncherVoiceMove
  VoiceAttack = ScudLauncherVoiceAttack
  SoundMoveStart = ScudLauncherMoveStart
  SoundMoveStartDamaged = ScudLauncherMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate       = ScudLauncherVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    TruckLandingSound = NoSound
    TruckPowerslideSound = NoSound
    VoiceCrush = ScudLauncherVoiceCrush
    VoiceEnter = ScudLauncherVoiceMove
    VoicePrimaryWeaponMode = ScudLauncherVoiceModeHiEx
    VoiceSecondaryWeaponMode = ScudLauncherVoiceModeAnthrax
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK DONT_AUTO_CRUSH_INFANTRY CAN_CAST_REFLECTIONS VEHICLE SALVAGER SCORE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 180.0
    InitialHealth   = 180.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 360
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 0 ;60   ; turn rate, in degrees per sec
      TurretPitchRate = 60
      FirePitch = 90  ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY 
    End
    AutoAcquireEnemiesWhenIdle = No NotWhileAttacking
  End  

  Behavior = CommandButtonHuntUpdate  ModuleTag_04 ; allows use of command button hunt script with this unit. 
  End

  Locomotor = SET_NORMAL ScudLauncherLocomotor
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 40.0
  End

  Behavior = AutoHealBehavior ModuleTag_06
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_ScudLauncherDamageTransition
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_09
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 2000
    DestructionDelayVariance = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_SCUDLauncherDeathEffect  
    FX  = FINAL    FX_ScudLauncherExplosionOneFinal
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateObjectDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = DestroyDie ModuleTag_22
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Geometry = BOX
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 11.5     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME   
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length 

End

; the missile //////////////////////////////////////////////////////////////////////////////////////////////////////
Object Terror_ScudLauncherMissile

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ConditionState = None
      Model = UVScudLchr_C
      ParticleSysBone = None ScudMissileExhaustAnthraxBurst
    End
    ConditionState = JAMMED
      Model = UVScudLchr_C
      ParticleSysBone = None SparksMedium
      ParticleSysBone = None ScudMissileExhaustAnthraxBurst
    End
    ConditionState = USER_1
      Model = UVScudLchr_C
      ParticleSysBone = None ScudMissileExhaustGammaBurst
    End
    ConditionState = USER_1 JAMMED
      Model = UVScudLchr_C
      ParticleSysBone = None SparksMedium
      ParticleSysBone = None ScudMissileExhaustGammaBurst
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName      = OBJECT:SCUDMissile
  EditorSorting   = SYSTEM
  VisionRange = 40.0  
  ArmorSet
    Conditions      = None
    ;*Be careful with this type, use in conjunction with KindOf = BALLISTIC_MISSILE to restrict targeting
    ;*to select weapons, because ballistic missile armor is weak! Weapons capable of targeting must have
    ;*AntiBallisticMissile = Yes set in the Weapon.ini.
    Armor           = BallisticMissileArmor 
    DamageFX        = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE BALLISTIC_MISSILE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 250.0
    InitialHealth   = 250.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    ; A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = ALL -LASERED
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = NONE +LASERED
    FX  = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
    
  Behavior = PhysicsBehavior ModuleTag_06
    Mass = 1
  End
  Behavior = MissileAIUpdate ModuleTag_07
    TryToFollowTarget = No 
    FuelLifetime = 20000
    IgnitionDelay = 0
;   IgnitionFX = FX_ScudStormIgnition ;NOT WORKING
    InitialVelocity = 50                ; in dist/sec
    DistanceToTravelBeforeTurning = 200
    DistanceToTargetBeforeDiving = 200 ; When I hit this close to target, I ignore PreferredHeight.
  End
  Locomotor = SET_NORMAL SCUDMissileLocomotor

  Behavior = WeaponBonusUpgrade ModuleTag_08
    TriggeredBy = Upgrade_GLAAPRockets
  End
  
  Behavior = HeightDieUpdate ModuleTag_05
    TargetHeight                   = 70
    TargetHeightIncludesStructures = No
    OnlyWhenMovingDown             = Yes
    SnapToGroundOnDeath            = No
    InitialDelay                   = 1000
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DeathWeapon01
    DeathWeapon   = Terror_ScudLauncherDamageWeapon
    StartsActive  = Yes
    ConflictsWith = Chem_Upgrade_GLAAnthraxGamma
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DeathWeapon02
    DeathWeapon  = Terror_ScudLauncherDamageWeaponUpgraded
    StartsActive = No
    TriggeredBy  = Chem_Upgrade_GLAAnthraxGamma
  End
  
  Behavior = ModelConditionUpgrade CoolMissileTrailsTag_Gamma
    TriggeredBy = Chem_Upgrade_GLAAnthraxGamma
    ConditionFlag = USER_1
  End

  Geometry = Cylinder ; Since collision extents can't tilt, this is a little fake
  GeometryMajorRadius = 4.0
  GeometryHeight = 4.0
  GeometryIsSmall = Yes    

  Shadow = SHADOW_DECAL
End