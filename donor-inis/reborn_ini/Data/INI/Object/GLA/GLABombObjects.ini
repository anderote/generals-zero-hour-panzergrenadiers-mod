; GLA Anthrax Bomb
Object AnthraxBomb

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = AVBomber_B
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName         = OBJECT:AnthraxBomb
  Side                = GLA
  EditorSorting       = SYSTEM
  TransportSlotCount  = 1                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 300.0  
  ShroudClearingRange = 0
  ArmorSet
    Conditions      = None
    Armor           = ProjectileArmor
    DamageFX        = None
  End

  ; *** AUDIO PARAMETERS ***
  SoundFallingFromPlane = DaisyCutterWeapon
    
  ; *** ENGINEERING Parameters ***
  KindOf            = PROJECTILE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_03
  End
  Locomotor = SET_NORMAL None

  Behavior = PhysicsBehavior ModuleTag_04
    Mass                  = 75.0
    AerodynamicFriction   = 1  ; this is now friction-per-sec
    ForwardFriction       = 33     ; this is now friction-per-sec
    CenterOfMassOffset    = 2  ; Default of 0 means nothing tips as it falls.  Positive tips forward, negative tips back
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DeathWeaponBeta
    DeathWeapon = AnthraxBombWeapon
    StartsActive = Yes
    ConflictsWith = Chem_Upgrade_GLAAnthraxGamma
  End
  
  ; Gamma Upgrade
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DeathWeaponGamma
    DeathWeapon = AnthraxBombWeaponGamma
    StartsActive = No
    TriggeredBy = Chem_Upgrade_GLAAnthraxGamma          
  End

  Behavior = HeightDieUpdate ModuleTag_06
    TargetHeight = 40.0
    TargetHeightIncludesStructures = No
  End

  Behavior = SpecialPowerCompletionDie ModuleTag_07
    SpecialPowerTemplate = SuperweaponAnthraxBomb
  End
  Behavior = DestroyDie ModuleTag_08
    ;nothing
  End

  ; Behavior = FXListDie ModuleTag_09
    ; DeathFX = FX_AnthraxBomb
  ; End

End