; Rebel Molotov Cocktail
Object GLARebelMolotovCocktail

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = Mob_Botl
      ParticleSysBone = BONE_FX MolotovBurningRag
    End
  End

  ; *** DESIGN PARAMETERS ***
  Side = GLA  
  EditorSorting = SYSTEM
  
  ArmorSet
    Armor = ProjectileArmor
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = PROJECTILE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = DumbProjectileBehavior ModuleTag_DumbProjectile
    ;TumbleRandomly = Yes ; not implemented, alas
    DetonateCallsKill = Yes
    FirstHeight = 10
    SecondHeight = 10
    FirstPercentIndent = 33%
    SecondPercentIndent = 66%
    FlightPathAdjustDistPerSecond = 0 ;100
    GarrisonHitKillRequiredKindOf = INFANTRY
    GarrisonHitKillForbiddenKindOf = NONE
    GarrisonHitKillCount = 1 ;10
    GarrisonHitKillFX = FX_DragonFlameGarrisonBuildingHit
  End

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 0.1
  End

  Behavior = DestroyDie ModuleTag_Die
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

