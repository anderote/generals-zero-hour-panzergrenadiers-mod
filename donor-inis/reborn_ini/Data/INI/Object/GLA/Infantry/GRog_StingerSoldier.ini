; GLA Rogue Stinger Soldier
Object GLAInfantryStingerSoldier

  ; *** ART PARAMETERS ***
  SelectPortrait = StingerSoldier_L
  ButtonImage = StingerSoldier

  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes

    ; idle
    DefaultConditionState
      Model = UISmsd_SKN
      IdleAnimation = UISmsd_SKL.UISmsd_STA 0 45
      IdleAnimation = UISmsd_SKL.UISmsd_IDA 
      IdleAnimation = UISmsd_SKL.UISmsd_IDB 
      IdleAnimation = UISmsd_SKL.UISmsd_IDC 
      IdleAnimation = UISmsd_SKL.UISmsd_IDD 
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone = PRIMARY Exhaust
      WeaponLaunchBone = PRIMARY Muzzle
      WeaponFireFXBone = SECONDARY Exhaust
      WeaponLaunchBone = SECONDARY Muzzle
    End
    
    ; attacking
    ConditionState = FIRING_A
      Animation = UISmsd_SKL.UISmsd_ATA
      AnimationSpeedFactorRange = 1.3 1.3
      TransitionKey = TRANS_FIRING
    End
    AliasConditionState = FIRING_B
    
    ConditionState = RELOADING_A
      Animation = UISmsd_SKL.UISmsd_ATA
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_FIRING
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A
    AliasConditionState = RELOADING_B
    AliasConditionState = BETWEEN_FIRING_SHOTS_B
    
    ; moving
    ConditionState = MOVING
      Animation = UISmsd_SKL.UISmsd_WKB 25
      AnimationMode = LOOP
    End

    ; dying
    ConditionState = DYING
      Animation = UISmsd_SKL.UISmsd_DTA 
      Animation = UISmsd_SKL.UISmsd_DTB 
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = UISmsd_SKL.UISmsd_ADTF1
      Animation = UISmsd_SKL.UISmsd_ADTG21
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = UISmsd_SKL.UISmsd_ADTF2
      Animation = UISmsd_SKL.UISmsd_ADTG22
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = UISmsd_SKL.UISmsd_ADTF3
      Animation = UISmsd_SKL.UISmsd_ADTG23
      AnimationMode = ONCE
    End

    ; cheering
    ConditionState = SPECIAL_CHEERING
      Animation = UISMSD_SKL.UISMSD_CHA
      AnimationMode = LOOP
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:StingerSoldier
  
  Side = GLA
  EditorSorting = INFANTRY
  
  TransportSlotCount = 1
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY StingerMissileWeapon
    
    Weapon = SECONDARY StingerMissileWeaponAir
    PreferredAgainst = SECONDARY BALLISTIC_MISSILE AIRCRAFT
  End
  
  ArmorSet
    Conditions = None
    Armor = StingerSoldierArmor
    DamageFX = None
  End
  
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = StingerSoldierArmorFortified
    DamageFX = None
  End
  
  VisionRange = 425
  ShroudClearingRange = 425
  
  ;BuildCost = 1
  ;BuildTime = 1
  
  ExperienceValue = 20 40 60 80
  ExperienceRequired = 0 200 400 600
  IsTrainable = Yes
  
  CrushableLevel = 0 ; 0 = for infantry, 1 = for trees, 2 = general vehicles

  ; CommandSet = GLAInfantryRebelCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = StingerSoldierVoiceSelect
  VoiceMove = StingerSoldierVoiceMove
  VoiceAttack = StingerSoldierVoiceAttack

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY SALVAGER CLICK_THROUGH SPAWNS_ARE_THE_WEAPONS

  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
  End
  
  ; Stealth Detector
  Behavior = StealthDetectorUpdate ModuleTag_GroundDetector
    DetectionRate = 500
    DetectionRange = 200
    ExtraForbiddenKindOf = AIRCRAFT
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_AirDetector
    DetectionRate = 500
    DetectionRange = 350
    ExtraRequiredKindOf = AIRCRAFT
  End

  Behavior = AIUpdateInterface AITag_Normal
    AutoAcquireEnemiesWhenIdle = Yes Stealthed ;ATTACK_BUILDINGS
    MoodAttackCheckRate = 0
  End
  
  Locomotor = SET_NORMAL BasicHumanLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 5
  End
  
  Behavior = SlavedUpdate ModuleTag_Slaved
  End

  Behavior = SquishCollide ModuleTag_Squish
  End

  ; Camo Net
  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 2500
    StealthForbiddenConditions = ATTACKING USING_ABILITY
    MoveThresholdSpeed = 3
    InnateStealth = No
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End
  
  Behavior = StealthUpgrade ModuleTag_CamoNet
    TriggeredBy = Upgrade_GLACamoNetting
  End
  
  ; Death Modules
  Behavior = SlowDeathBehavior DeathTag_Normal
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_StingerSoldierDie
  End
  Behavior = SlowDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior DeathTag_Exploded
    DeathTypes = NONE +EXPLODED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_StingerSoldierDie
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  Behavior = SlowDeathBehavior DeathTag_Burned
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireGLA
    OCL = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned01
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinGLA
    OCL = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned02
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinGLA
    OCL = INITIAL OCL_ToxicInfantryBeta
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned03
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinGLA
    OCL = INITIAL OCL_ToxicInfantryGamma
  End
  
  ; Upgrades
  
  ; Kevlar Armor
  Behavior = MaxHealthUpgrade ModuleTag_KevlarArmor
    TriggeredBy = Upgrade_GLAKevArmor
    AddMaxHealth = 50
    ChangeType = ADD_CURRENT_HEALTH_TOO
  End
  
  ; Fortified Structures
  Behavior = ArmorUpgrade ModuleTag_FortifiedStructures
    TriggeredBy = Upgrade_GLAFortifiedStructure
  End
 
  Geometry = CYLINDER
  GeometryMajorRadius = 10
  GeometryMinorRadius = 10
  GeometryHeight = 12
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowI
  
  BuildCompletion = APPEARS_AT_RALLY_POINT
End