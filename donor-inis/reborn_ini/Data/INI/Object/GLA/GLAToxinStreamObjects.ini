; GLA Toxin Stream Projectiles

; Default
Object ToxinTruckStreamProjectile

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = NONE 
    End
  End
  
  ; *** DESIGN PARAMETERS ***
  EditorSorting = SYSTEM
  VisionRange = 0
  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING PARAMETERS ***
  KindOf = PROJECTILE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = DestroyDie ModuleTag_Die
  End
    
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 1
    AllowCollideForce = No ; toxins collide, but never apply forces when they do so
  End

  Behavior = MissileAIUpdate AITag_Missile
    TryToFollowTarget = No 
    FuelLifetime = 1500 ;500
    InitialVelocity = 120
    IgnitionDelay = 0
    DistanceToTravelBeforeTurning = 3
    GarrisonHitKillRequiredKindOf = INFANTRY
    GarrisonHitKillCount = 2
    GarrisonHitKillFX = FX_ToxinStreamGarrisonBuildingHit
  End

  Locomotor = SET_NORMAL ToxinTruckStreamLocomotor

  Behavior = BoneFXUpdate ModuleTag_BoneFXUpdate
    PristineParticleSystem1 = bone:NULL OnlyOnce:Yes 0 0 PSys:ToxinTrail01 ; Covers gap at beginning of line
  End

  Behavior = BoneFXDamage ModuleTag_BoneFXDamage
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2
End

