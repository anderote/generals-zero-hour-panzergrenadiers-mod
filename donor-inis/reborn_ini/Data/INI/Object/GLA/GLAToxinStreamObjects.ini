; GLA Toxin Stream

; Default
Object ToxinTruckProjectileStream

  ; *** ART PARAMETERS ***
  Draw = W3DProjectileStreamDraw DrawTag_Main
    Texture = EXToxinStream.tga
    Width = 1.5
    TileFactor = 2
    ScrollRate = 6
    MaxSegments = 14
  End

  ; *** ENGINEERING Parameters ***
  KindOf = INERT
  
  Behavior = ProjectileStreamUpdate ModuleTag_ProjectileStream
  End
End

