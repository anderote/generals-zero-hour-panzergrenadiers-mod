; GLA Rogue Stinger Site
Object GLAStingerSite

  ; *** ART PARAMETERS ***
  SelectPortrait = SUStinger_L
  ButtonImage = SUStinger
  
  UpgradeCameo1 = Upgrade_GLACamoNetting
  UpgradeCameo2 = Upgrade_GLAKevArmor
  UpgradeCameo3 = Upgrade_GLAFortifiedStructure
  UpgradeCameo4 = Upgrade_GLAAPRockets
  
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    
    ; Day
    DefaultConditionState
      Model = UBStingerS
      Flags = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
    
    ConditionState = DAMAGED
      Model = UBStingerS_D
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
    
    ConditionState = REALLYDAMAGED
      Model = UBStingerS_E
    End
    AliasConditionState = RUBBLE
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED RUBBLE
    
    ; Night
    ConditionState = NIGHT
      Model = UBStingerS_N
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT
    
    ConditionState = NIGHT DAMAGED
      Model = UBStingerS_DN
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT DAMAGED
    
    ConditionState = NIGHT REALLYDAMAGED
      Model = UBStingerS_EN
    End
    AliasConditionState = NIGHT RUBBLE
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT RUBBLE
    
    ; Snow
    ConditionState = SNOW
      Model = UBStingerS_S
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
    
    ConditionState = SNOW DAMAGED
      Model = UBStingerS_DS
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW DAMAGED
    
    ConditionState = SNOW REALLYDAMAGED
      Model = UBStingerS_ES
    End
    AliasConditionState = SNOW RUBBLE
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW RUBBLE
    
    ; Snow Night
    ConditionState = SNOW NIGHT
      Model = UBStingerS_NS
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT
    
    ConditionState = SNOW NIGHT DAMAGED
      Model = UBStingerS_DNS
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT DAMAGED
    
    ConditionState = SNOW NIGHT REALLYDAMAGED
      Model = UBStingerS_ENS
    End
    AliasConditionState = SNOW NIGHT RUBBLE
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT RUBBLE

    ConditionState = AWAITING_CONSTRUCTION
      Model = NONE
    End
    AliasConditionState = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION NIGHT
    AliasConditionState = AWAITING_CONSTRUCTION NIGHT DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION NIGHT REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION SNOW
    AliasConditionState = AWAITING_CONSTRUCTION SNOW DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION SNOW REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION SNOW NIGHT
    AliasConditionState = AWAITING_CONSTRUCTION SNOW NIGHT DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION SNOW NIGHT REALLYDAMAGED
    AliasConditionState = SOLD
    AliasConditionState = SOLD DAMAGED
    AliasConditionState = SOLD REALLYDAMAGED
    AliasConditionState = SOLD NIGHT
    AliasConditionState = SOLD NIGHT DAMAGED
    AliasConditionState = SOLD NIGHT REALLYDAMAGED
    AliasConditionState = SOLD SNOW
    AliasConditionState = SOLD SNOW DAMAGED
    AliasConditionState = SOLD SNOW REALLYDAMAGED
    AliasConditionState = SOLD SNOW NIGHT
    AliasConditionState = SOLD SNOW NIGHT DAMAGED
    AliasConditionState = SOLD SNOW NIGHT REALLYDAMAGED
  End
  
  ; Construction Zone Fence
  Draw = W3DModelDraw ModuleTag_Fence
  
    AnimationsRequirePower = No
    IgnoreConditionStates = DAMAGED REALLYDAMAGED RUBBLE

    ; Down
    DefaultConditionState
      Model = None
      TransitionKey = DOWN_DEFAULT
    End
    AliasConditionState = NIGHT
    AliasConditionState = SNOW
    AliasConditionState = SNOW NIGHT
    
    ; Up
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = UBStingerS_A4
      Animation = UBStingerS_A4.UBStingerS_A4
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_DAY
    End
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT
      Model = UBStingerS_A4N
      Animation = UBStingerS_A4N.UBStingerS_A4N
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_NIGHT
    End
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
      Model = UBStingerS_A4S
      Animation = UBStingerS_A4S.UBStingerS_A4S
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOW
    End
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT
      Model = UBStingerS_A4SN
      Animation = UBStingerS_A4SN.UBStingerS_A4SN
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOWNIGHT
    End
    
    ; Going Up
    TransitionState = DOWN_DEFAULT UP_DAY
      Model = UBStingerS_A4
      Animation = UBStingerS_A4.UBStingerS_A4
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_NIGHT
      Model = UBStingerS_A4N
      Animation = UBStingerS_A4N.UBStingerS_A4N
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_SNOW
      Model = UBStingerS_A4S
      Animation = UBStingerS_A4S.UBStingerS_A4S
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_SNOWNIGHT
      Model = UBStingerS_A4SN
      Animation = UBStingerS_A4SN.UBStingerS_A4SN
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    
    ; Going Down
    TransitionState = UP_DAY DOWN_DEFAULT
      Model = UBStingerS_A4
      Animation = UBStingerS_A4.UBStingerS_A4
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_NIGHT DOWN_DEFAULT
      Model = UBStingerS_A4N
      Animation = UBStingerS_A4N.UBStingerS_A4N
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOW DOWN_DEFAULT
      Model = UBStingerS_A4S
      Animation = UBStingerS_A4S.UBStingerS_A4S
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOWNIGHT DOWN_DEFAULT
      Model = UBStingerS_A4SN
      Animation = UBStingerS_A4SN.UBStingerS_A4SN
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End    
  End
  
  ; Scaffolding
  Draw = W3DModelDraw ModuleTag_Scaffold
    
    AnimationsRequirePower = No
    MinLODRequired = MEDIUM
    IgnoreConditionStates = DAMAGED REALLYDAMAGED RUBBLE
    
    ; Down
    DefaultConditionState
      Model = NONE
      TransitionKey = DOWN_DEFAULT
    End
    AliasConditionState = NIGHT
    AliasConditionState = SNOW
    AliasConditionState = SNOW NIGHT
    
    ; Up
    ConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = UBStingerS_A6
      Animation = UBStingerS_A6.UBStingerS_A6
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_DAY
      ParticleSysBone = Smoke01 BuildUpSmoke
      ParticleSysBone = Smoke02 BuildUpSmoke
      ParticleSysBone = Smoke03 BuildUpSmoke
    End
    ConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT
      Model = UBStingerS_A6N
      Animation = UBStingerS_A6N.UBStingerS_A6N
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_NIGHT
      ParticleSysBone = Smoke01 BuildUpSmoke
      ParticleSysBone = Smoke02 BuildUpSmoke
      ParticleSysBone = Smoke03 BuildUpSmoke
    End
    ConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
      Model = UBStingerS_A6S
      Animation = UBStingerS_A6S.UBStingerS_A6S
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOW
      ParticleSysBone = Smoke01 BuildUpSnowSmoke
      ParticleSysBone = Smoke02 BuildUpSnowSmoke
      ParticleSysBone = Smoke03 BuildUpSnowSmoke
    End
    ConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT
      Model = UBStingerS_A6SN
      Animation = UBStingerS_A6SN.UBStingerS_A6SN
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOWNIGHT
      ParticleSysBone = Smoke01 BuildUpNightSnowSmoke
      ParticleSysBone = Smoke02 BuildUpNightSnowSmoke
      ParticleSysBone = Smoke03 BuildUpNightSnowSmoke
    End
    
    ; Going Up
    TransitionState = DOWN_DEFAULT UP_DAY
     Model = UBStingerS_A6
      Animation = UBStingerS_A6.UBStingerS_A6
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_NIGHT
     Model = UBStingerS_A6N
      Animation = UBStingerS_A6N.UBStingerS_A6N
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_SNOW
     Model = UBStingerS_A6S
      Animation = UBStingerS_A6S.UBStingerS_A6S
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_SNOWNIGHT
     Model = NBGattling_A6SN
      Animation = NBGattling_A6SN.NBGattling_A6SN
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    
    ; Going Down
    TransitionState = UP_DAY DOWN_DEFAULT
      Model = UBStingerS_A6
      Animation = UBStingerS_A6.UBStingerS_A6
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_NIGHT DOWN_DEFAULT
      Model = UBStingerS_A6N
      Animation = UBStingerS_A6N.UBStingerS_A6N
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOW DOWN_DEFAULT
      Model = UBStingerS_A6S
      Animation = UBStingerS_A6S.UBStingerS_A6S
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOWNIGHT DOWN_DEFAULT
      Model = UBStingerS_A6SN
      Animation = UBStingerS_A6SN.UBStingerS_A6SN
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
  End
  
  PlacementViewAngle = -45
  
  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:StingerSite
  
  Side = GLA
  EditorSorting = STRUCTURE
  
  Prerequisites
    Object = GLABarracks
  End
  
  BuildCost = 900
  BuildTime = 15
  
  EnergyProduction = 0
  
  VisionRange = 425
  ; We lose vision when stinger dudes die
  ShroudClearingRange = 40 ;425
  
  ArmorSet
    Conditions = None
    Armor = StingerSiteArmor
    DamageFX = StructureDamageFXNoShake
  End
  
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = StingerSiteArmorFortified
    DamageFX = StructureDamageFXNoShake
  End
  
  CommandSet = GLAStingerSiteCommandSet
  
  ; Since stinger dudes give EXP now, need to reduce the building EXP
  ExperienceValue = 140 140 140 140
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = StingerSiteSelect
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy
  UnitSpecificSounds
    UnderConstruction = UnderConstructionLoop
  End
  
  ; *** ENGINEERING Parameters ***
  RadarPriority = STRUCTURE
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE FS_BASE_DEFENSE IMMUNE_TO_CAPTURE SPAWNS_ARE_THE_WEAPONS SCORE_CREATE
  
  Body = HiveStructureBody BodyTag_Hive
    MaxHealth = 1000
    InitialHealth = 1000
    ; Slave Settingss
    PropagateDamageTypesToSlavesWhenExisting = NONE +SMALL_ARMS +SURRENDER +MELEE +SNIPER +FLAME +MICROWAVE +RADIATION +POISON +PARTICLE_BEAM
    SwallowDamageTypesIfSlavesNotExisting = NONE +SURRENDER +MELEE +SNIPER +MICROWAVE +RADIATION +POISON
    ; Subdual Settings
    SubdualDamageCap = 1200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
  
  ; Stinger Dudes
  Behavior = SpawnPointProductionExitUpdate ModuleTag_SpawnPoint
    SpawnPointBoneName = SpawnPoint
  End
  Behavior = SpawnBehavior ModuleTag_Spawn
    SpawnNumber = 3
    SpawnReplaceDelay = 30000
    SpawnTemplateName = GLAInfantryStingerSoldier
    CanReclaimOrphans = No
    SpawnedRequireSpawner = Yes
    SlavesHaveFreeWill = No
  End
  
  ; GLA Hole
  Behavior = RebuildHoleExposeDie ModuleTag_Hole
    HoleName = GLAHoleStingerSite
    HoleMaxHealth = 500
  End
  
  ; Death FX
  Behavior = InstantDeathBehavior DeathTag_All
    DeathTypes = ALL
    FX = FX_StructureSmallDeath
    OCL = OCL_ABStingerSiteDebris
    Weapon = StingerSiteDeathConcussion
  End
  
  ; Camo Net
  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 2500
    StealthForbiddenConditions = ATTACKING USING_ABILITY TAKING_DAMAGE
    InnateStealth = No
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End
  Behavior = StealthUpgrade ModuleTag_CamoNet
    TriggeredBy = Upgrade_GLACamoNetting
  End
  
  Behavior = ProductionUpdate ModuleTag_Production
  End
  
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ; Damaged
    DamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ; Really Damaged
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
  End
  
  ; Stinger Dude Heal
  Behavior = AutoHealBehavior ModuleTag_AutoHeal
    HealingAmount = 4
    HealingDelay = 1000
    Radius = 30
    StartsActive = Yes
    KindOf = INFANTRY
  End
  
  ; Air Raid
  Behavior = OCLSpecialPower ModuleTag_AirRaid
    SpecialPowerTemplate = AbilityGLAStingerSiteAirRaidSiren
    OCL = ABILITY_StingerSiteAirRaidSiren
    CreateLocation = CREATE_AT_LOCATION
  End
  
  ; Fortified Structures
  Behavior = ArmorUpgrade ModuleTag_FortifiedStructures
    TriggeredBy = Upgrade_GLAFortifiedStructure
  End
  
  Geometry = BOX
  GeometryMajorRadius = 36
  GeometryMinorRadius = 36
  GeometryHeight = 9
  GeometryIsSmall = No
  
  Shadow = SHADOW_VOLUME
  
  BuildCompletion = PLACED_BY_PLAYER
End

; GLA Stinger Site Hole
ObjectReskin GLAHoleStingerSite GLAHole

  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = UBHole
    End
    
    ConditionState = DAMAGED
      Model = UBHole_D
      ParticleSysBone = Smoke01 SteamVent
    End
    
    ConditionState = REALLYDAMAGED
      Model = UBHole_E
      ParticleSysBone = Smoke01 SteamVent
      ParticleSysBone = Smoke02 SteamVent
      ParticleSysBone = Fire01 GLAPowerPlantFlame
      ParticleSysBone = Fire02 GLAPowerPlantFlame
      ParticleSysBone = Fire03 GLAPowerPlantFlame
    End
  End
  
  Draw = W3DModelDraw DrawTag_HoleBits
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = UBStingerS_R
    End
    AliasConditionState = DAMAGED
    AliasConditionState = REALLYDAMAGED
  End
End