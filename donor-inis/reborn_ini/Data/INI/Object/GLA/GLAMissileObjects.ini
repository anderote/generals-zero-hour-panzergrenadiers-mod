; GLA Rocket Buggy Rocket
Object RocketBuggyMissile

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = UVRockBug_m
    End
    ConditionState = JAMMED
      ParticleSysBone = None SparksMedium
    End
  End

  ; *** DESIGN PARAMETERS ***
  EditorSorting     = SYSTEM
  VisionRange       = 0.0  
  ArmorSet
    Conditions      = None
    Armor           = ProjectileArmor
    DamageFX        = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    ; A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  ; Death Behaviours
  Behavior = InstantDeathBehavior DeathTag_Normal
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathMTag_Lasered
    DeathTypes = NONE +LASERED
    FX  = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathTag_Else
    DeathTypes = ALL -LASERED -DETONATED
    FX = FX_GenericMissileDeath
  End
  ; End Death Behaviours
  
  Behavior = PhysicsBehavior ModuleTag_06
    Mass = 1
  End
  Behavior = MissileAIUpdate ModuleTag_07
    TryToFollowTarget               = Yes
    FuelLifetime                    = 3500
    InitialVelocity                 = 150                ; in dist/sec
    IgnitionDelay                   = 0
    DistanceToTravelBeforeTurning   = 3
    IgnitionFX                      = FX_BuggyMissileIgnition
    DistanceScatterWhenJammed       = 100
  End
  Locomotor = SET_NORMAL RocketBuggyMissileLocomotor

  Behavior = WeaponBonusUpgrade ModuleTag_08
    TriggeredBy = Upgrade_GLAAPRockets
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2.0

End

; GLA Terror Leader Rocker Buggy Rocket
Object Terror_RocketBuggyMissile

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ConditionState = None
      Model = UVRockBug_m
      ParticleSysBone = None MissileExhaust
    End
    ConditionState = USER_1
      Model = UVRockBug_m
      ParticleSysBone = None Chem_InfantryStingerMissileExhaust
    End
    ConditionState = USER_2
      Model = UVRockBug_m
      ParticleSysBone = None Chem_InfantryStingerMissileExhaustGamma
    End
    ConditionState = JAMMED
      Model = UVRockBug_m
      ParticleSysBone = None SparksMedium
      ParticleSysBone = None MissileExhaust
    End
    ConditionState = JAMMED USER_1
      Model = UVRockBug_m
      ParticleSysBone = None SparksMedium
      ParticleSysBone = None Chem_InfantryStingerMissileExhaust
    End
    ConditionState = JAMMED USER_2
      Model = UVRockBug_m
      ParticleSysBone = None SparksMedium
      ParticleSysBone = None Chem_InfantryStingerMissileExhaustGamma
    End
  End

  ; *** DESIGN PARAMETERS ***
  EditorSorting     = SYSTEM
  VisionRange       = 0.0  
  ArmorSet
    Conditions      = None
    Armor           = ProjectileArmor
    DamageFX        = None
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0

    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  ; Death Weapons
  Behavior = FireWeaponWhenDeadBehavior DeathTag_ToxinFX01
    DeathWeapon = ToxinShellWeapon
    StartsActive = Yes
    ConflictsWith = Upgrade_GLAAnthraxBeta Chem_Upgrade_GLAAnthraxGamma      
  End
  Behavior = FireWeaponWhenDeadBehavior DeathTag_ToxinFX02
    DeathWeapon = ToxinShellWeaponUpgraded
    StartsActive = No
    TriggeredBy = Upgrade_GLAAnthraxBeta      
    ConflictsWith = Chem_Upgrade_GLAAnthraxGamma
  End  
  Behavior = FireWeaponWhenDeadBehavior DeathTag_ToxinFX03
    DeathWeapon = Chem_ToxinShellWeaponGamma
    StartsActive = No
    TriggeredBy = Chem_Upgrade_GLAAnthraxGamma
  End
  ; redundancy fix
  Behavior = FireWeaponWhenDeadBehavior DeathTag_ToxinFX04
    DeathWeapon = Chem_ToxinShellWeaponGamma
    StartsActive  = No
    TriggeredBy = Upgrade_GLAAnthraxBeta Chem_Upgrade_GLAAnthraxGamma
    RequiresAllTriggers = Yes
  End

  ; Death FX
  Behavior = InstantDeathBehavior DeathTag_Normal
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathMTag_Lasered
    DeathTypes = NONE +LASERED
    FX  = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathTag_Else
    DeathTypes = ALL -LASERED -DETONATED
    FX = FX_GenericMissileDeath
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 1
  End
  
  Behavior = MissileAIUpdate ModuleTag_07
    TryToFollowTarget               = Yes
    FuelLifetime                    = 3500
    InitialVelocity                 = 150                ; in dist/sec
    IgnitionDelay                   = 0
    DistanceToTravelBeforeTurning   = 3
    IgnitionFX                      = FX_BuggyMissileIgnition
    DistanceScatterWhenJammed       = 100
  End
  Locomotor = SET_NORMAL RocketBuggyMissileLocomotor

  Behavior = WeaponBonusUpgrade ModuleTag_08
    TriggeredBy = Upgrade_GLAAPRockets
  End
  
  Behavior = ModelConditionUpgrade CoolMissileTrailsTag_Beta
    TriggeredBy = Upgrade_GLAAnthraxBeta
    ConflictsWith = Chem_Upgrade_GLAAnthraxGamma
    ConditionFlag = USER_1
  End
  
  Behavior = ModelConditionUpgrade CoolMissileTrailsTag_Gamma
    TriggeredBy = Chem_Upgrade_GLAAnthraxGamma
    ConditionFlag = USER_2
  End
  
  ; redundancy fix
  Behavior = ModelConditionUpgrade CoolMissileTrailsTag_All
    TriggeredBy = Upgrade_GLAAnthraxBeta Chem_Upgrade_GLAAnthraxGamma
    RequiresAllTriggers = Yes
    ConditionFlag = USER_2
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2.0

End