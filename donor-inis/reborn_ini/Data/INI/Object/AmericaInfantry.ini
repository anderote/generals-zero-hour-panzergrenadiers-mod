    AliasConditionState = MOVING RELOADING_B

    ConditionState      = FIRING_C 
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_LP
      AnimationMode     = LOOP
      TransitionKey     = TRANS_FiringA
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_C
    AliasConditionState = RELOADING_C

    TransitionState     = TRANS_Stand TRANS_FiringC
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_ST
      AnimationMode     = ONCE
      AnimationSpeedFactorRange = 4 4
    End

    TransitionState     = TRANS_FiringC TRANS_Stand
      Animation         = CIUNSL_SKL.CIUNSL_ATA1_ED
      AnimationMode     = ONCE
      AnimationSpeedFactorRange = 4 4
    End

    ; these aliases handle the attack-move case.
    AliasConditionState = MOVING FIRING_C
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_C
    AliasConditionState = MOVING RELOADING_C

    ConditionState      = FREEFALL
      Animation         = CIUNSL_SKL.CIUNSL_PFL
      AnimationMode     = LOOP
      TransitionKey     = TRANS_Falling
    End

    ConditionState      = PARACHUTING
      Animation         = CIUNSL_SKL.CIUNSL_PHG
      AnimationMode     = LOOP
      TransitionKey     = TRANS_Chute
    End
    AliasConditionState = PARACHUTING DYING

    ConditionState      = MOVING
      Animation         = CIUNSL_SKL.CIUNSL_RNA 
      AnimationMode     = LOOP
      Flags             = RANDOMSTART
      TransitionKey     = None
    End

    ConditionState      = DYING
      Animation         = CIUNSL_SKL.CIUNSL_DTA 
      Animation         = CIUNSL_SKL.CIUNSL_DTB
      AnimationMode     = ONCE
      TransitionKey     = TRANS_Dying
    End

    TransitionState     = TRANS_Dying TRANS_Flailing
      Animation         = CIUNSL_SKL.CIUNSL_ADTA1
      AnimationMode     = ONCE
    End

    ConditionState      = DYING EXPLODED_FLAILING
      Animation         = CIUNSL_SKL.CIUNSL_ADTA2
      AnimationMode     = LOOP
      TransitionKey     = TRANS_Flailing
    End

    ConditionState      = DYING EXPLODED_BOUNCING
      Animation         = CIUNSL_SKL.CIUNSL_ADTA3
      AnimationMode     = ONCE
      TransitionKey     = None
    End
    AliasConditionState = DYING SPLATTED

    TransitionState     = TRANS_Falling TRANS_Chute
      Animation         = CIUNSL_SKL.CIUNSL_POP
      AnimationMode     = ONCE
    End

    TransitionState     = TRANS_Chute TRANS_Stand
      Animation         = CIUNSL_SKL.CIUNSL_PTD
      AnimationMode     = ONCE
    End

    ; --- RAPPELLING ANIMATIONS
    ConditionState      = RAPPELLING
      Animation         = CIUNSL_SKL.CIUNSL_PHG ;30
      AnimationMode     = LOOP
      Flags             = RANDOMSTART
      TransitionKey     = TRANS_Rappelling
