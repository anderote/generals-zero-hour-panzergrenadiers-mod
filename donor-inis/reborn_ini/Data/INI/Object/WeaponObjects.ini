Object USACruiseMissile

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = AVWingedMisl
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName      = OBJECT:Missile
  Side = China
  EditorSorting   = SYSTEM
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange = 0.0  
  ArmorSet
    Conditions      = None
    Armor           = ProjectileArmor
    DamageFX        = None
  End


  ; *** AUDIO PARAMETERS ***
  SoundAmbient = ArtilleryBarrageIncomingWhistle


  ; *** ENGINEERING Parameters ***
  KindOf            = PRELOAD CAN_CAST_REFLECTIONS PROJECTILE 
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 100000000.0
    InitialHealth   = 100000000.0
  End

; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_01
    DeathTypes = NONE +DETONATED
    ; we detonated normally.  No effect, since it is in weapon.  Don't want to double.
    ; FX        = FX_ArtilleryBarrage
  End
  Behavior = InstantDeathBehavior DeathModuleTag_02
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX         = FX_GenericMissileDisintegrate
    OCL        = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_03
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX         = FX_GenericMissileDeath
  End
; ---- end Projectile death behaviors

  Behavior = PhysicsBehavior ModuleTag_08
    Mass = 1
  End
  Behavior = MissileAIUpdate ModuleTag_09
    TryToFollowTarget = Yes 
    FuelLifetime = 10000
    InitialVelocity = 30                ; in dist/sec
    IgnitionDelay = 0
  End

  Locomotor = SET_NORMAL A10ThunderboltMissileLocomotor

  Geometry = Sphere
  Scale = 0.90
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0

End

