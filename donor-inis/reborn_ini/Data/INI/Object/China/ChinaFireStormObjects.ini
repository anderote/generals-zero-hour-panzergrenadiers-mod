; China Fire Storm Objects

; Default
Object Firestorm

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = NONE
    End
  End

  ; *** DESIGN PARAMETERS ***
  KindOf = IMMOBILE NO_COLLIDE

  ; *** AUDIO PARAMETERS ***
  SoundAmbient = FireStormLoop

  ; *** ENGINEERING PARAMETERS ***  
  Body = InactiveBody BodyTag_Inactive
  End
  
  Behavior = FirestormDynamicGeometryInfoUpdate ModuleTag_Firestorm
    InitialDelay = 1000
    InitialHeight = 10
    InitialMajorRadius = 30
    FinalHeight = 100
    FinalMajorRadius = 100
    TransitionTime = 3000
    ReverseAtTransitionTime = Yes
    ScorchSize = 100
    ParticleOffsetZ = 1
    ; particles
    ParticleSystem1 = FireStorm_Main
    ParticleSystem2 = FireStorm_Ring
    ParticleSystem3 = FireStorm_Smoke
    ; sound
    FXList = FX_FireStormStart
    ; damage
    DelayBetweenDamageFrames = 500
    DamageAmount = 100
  End

  Behavior = LifetimeUpdate ModuleTag_Lifetime
    MinLifetime = 6000
    MaxLifetime = 6000
  End
  
  Geometry = CYLINDER
  GeometryMajorRadius = 1
  GeometryMinorRadius = 1
  GeometryHeight = 1
  GeometryIsSmall = No  
End

