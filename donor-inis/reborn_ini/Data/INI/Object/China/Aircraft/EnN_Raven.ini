; China EMP and Napalm Gen Raven Strike Fighter
Object EnN_ChinaJetRaven

  ; *** ART PARAMETERS ***
  SelectPortrait = SNRaven_XL
  ButtonImage = SNRaven_L
  
  UpgradeCameo1 = Upgrade_ChinaAircraftArmor
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DModelDraw DrawTag_Main

    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = NVBeagle
      HideSubObject = BurnerFX01 BurnerFX02
      WeaponLaunchBone = PRIMARY WeaponA
    End
    
    ConditionState = REALLYDAMAGED
      Model = NVBeagle_d
    End

    ConditionState = JETEXHAUST
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    
    ConditionState = JETEXHAUST REALLYDAMAGED
      Model = NVBeagle_d
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End

    ConditionState = JETEXHAUST JETAFTERBURNER
      ShowSubObject = BurnerFX01 BurnerFX02
      ParticleSysBone = Exhaust01 JetExhaust
      ParticleSysBone = Exhaust02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End

    ConditionState = JETEXHAUST JETAFTERBURNER REALLYDAMAGED
      Model = NVBeagle_d
      ShowSubObject = BurnerFX01 BurnerFX02
      ParticleSysBone = Exhaust01 JetExhaust
      ParticleSysBone = Exhaust02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    
    ConditionState = RUBBLE
      Model = NVBeagle_d
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Raven
  
  EditorSorting = VEHICLE
  Side = ChinaTankGeneral
  
  TransportSlotCount = 0
  
  VisionRange = 350
  ShroudClearingRange = 400

  Prerequisites
    Object = Tank_ChinaPropagandaCenter
    Science = SCIENCE_Raven
  End

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY EnN_ChinaRavenShockCannon
  End
  
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = None
  End
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = ChinaUpgradedAirplaneArmor
    DamageFX = None
  End

  BuildCost = 2500
  BuildTime = 25
  
  ExperienceValue = 100 100 200 300
  ExperienceRequired = 0 200 300 500
  IsTrainable = Yes
  
  CrusherLevel = 1
  CrushableLevel = 2
  
  CommandSet = ChinaJetJ10CommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = MigVoiceMove
  VoiceMove = MigVoiceMove
  VoiceAttack = MigVoiceAttack
  VoiceAttackAir = MigVoiceAttackAir
  VoiceGuard = MigVoiceAirPatrol
  SoundAmbient = MigAmbientLoop
  UnitSpecificSounds
    VoiceCreate = MigVoiceCreate
    VoiceGarrison = MigVoiceMove
    Afterburner = RaptorAfterburner
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT EMP_HARDENED
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 250
    InitialHealth = 250
  End

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 500
  End

  Behavior = JetAIUpdate AITag_Jet
    OutOfAmmoDamagePerSecond = 10%
    TakeoffDistForMaxLift = 0%
    TakeoffPause = 500
    MinHeight = 5
    ReturnToBaseIdleTime = 10000
  End

  Locomotor = SET_NORMAL RavenLocomotor
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor
  
  ; missile jammer
  Behavior = FireWeaponUpdate ModuleTag_MissileJammer
    Weapon = RavenMissileJammer
    ExclusiveWeaponDelay = 1500
  End

  ; Damage FX
  Behavior = TransitionDamageFX FXTag_TransDmg
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes Psys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_MIGDamageTransition
  End
  
  ; Death FX
  Behavior = JetSlowDeathBehavior DeathTag_All
    FXOnGroundDeath = FX_JetOnGroundDeath
    OCLOnGroundDeath = OCL_MIGDeathFinalBlowUp
    DestructionDelay = 999999
    RollRate = 0.2
    RollRateDelta = 100%
    PitchRate = 0
    FallHowFast = 110%
    FXInitialDeath = FX_MigDeathInitial
    OCLInitialDeath = OCL_MIGDeathInitial
    DelaySecondaryFromInitialDeath = 500
    FXSecondary = FX_JetDeathSecondary
    OCLSecondary = OCL_MIGDeathSecondary
    FXHitGround = FX_JetDeathHitGround
    OCLHitGround = OCL_MIGDeathHitGround
    DelayFinalBlowUpFromHitGround = 200
    FXFinalBlowUp = FX_JetDeathFinalBlowUp
    ;OCLFinalBlowUp = OCL_MIGDeathFinalBlowUp
  End
  
  ; Upgrades
  
  ; Special Weapons Training
  Behavior = VeterancyGainCreate CreateTag_Veterancy
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_SpecWeapTraining
  End

  ; Mig Armor
  Behavior = ArmorUpgrade UpgradeTag_Armor
    TriggeredBy = Upgrade_ChinaAircraftArmor
  End

  Geometry = Box
  GeometryIsSmall = Yes
  GeometryMajorRadius = 14
  GeometryMinorRadius = 7
  GeometryHeight = 5
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89
End