; Helix used for general power drops
Object ChinaVehicleHelixCargoPlane

  ; *** ART PARAMETERS ***
  SelectPortrait = SNHelix_L
  ButtonImage = SNHelix
    
  Draw = W3DOverlordAircraftDraw  DrawTag_Main

    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = NVHelix
      Animation = NVHelix.NVHelix
      AnimationMode = LOOP
      WeaponFireFXBone = PRIMARY MUZZLE
      WeaponMuzzleFlash = PRIMARY TURRETFX
      TurretPitch = MINIGUN
      HideSubObject = BOMBWING
    End
    ConditionState = MOVING
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End

    ConditionState = REALLYDAMAGED
      Model = NVHelix_D
      Animation = NVHelix_D.NVHelix_D
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED MOVING
      Model = NVHelix_D
      Animation = NVHelix_D.NVHelix_D
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End

    ConditionState = RUBBLE
      Model = NVHelix_D
      Animation = NVHelix_D.NVHelix_D
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE MOVING
      Model = NVHelix_D
      Animation = NVHelix_D.NVHelix_D
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End

    ConditionState = RUBBLE SPECIAL_DAMAGED
      Model = NVHelix_D
      HideSubObject = NVHelix_Props01
      HideSubObject = NVHelix_Props02
    End

  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Helix
  
  EditorSorting = VEHICLE
  Side = China
  
  TransportSlotCount = 0
  
  VisionRange = 0
  
  ArmorSet
    Conditions = None
    Armor = ChinookArmor
    DamageFX = None
  End
  
  CommandSet = Command_ScriptedTransportDrops

  ; *** AUDIO PARAMETERS ***
  SoundAmbient = HelixAmbientLoop
  SoundExit = HumveeExit
  
  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf = PRELOAD CAN_CAST_REFLECTIONS VEHICLE TRANSPORT AIRCRAFT SCORE IGNORED_IN_GUI CAN_ATTACK EMP_HARDENED UNATTACKABLE ;FORCEATTACKABLE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 300
    InitialHealth = 300
  End

  ExperienceValue = 50 50 50 50
 
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End

  Behavior = DeliverPayloadAIUpdate ModuleTag_Payload
    DoorDelay = 0
    MaxAttempts = 4
    DropOffset = X:0 Y:0 Z:-1
    DropDelay = 0
    ;PutInContainer = AmericaParachute
    DeliveryDistance = 150
  End
  Locomotor = SET_NORMAL HelixLocomotor

  Behavior = TransportContain ContainTag_Transport
    Slots = 100
    ScatterNearbyOnExit = Yes ;No
    OrientLikeContainerOnExit = Yes
    KeepContainerVelocityOnExit = Yes
    ExitPitchRate = 0
    ;ExitBone = WeaponA01
    AllowInsideKindOf = INFANTRY VEHICLE PROJECTILE DOZER PARACHUTABLE
    DoorOpenTime = 0
    NumberOfExitPaths = 0
    DestroyRidersWhoAreNotFreeToExit = Yes
  End
  
  ; damage fx
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_ComancheDamageTransition
  End
    
  ; death fx
  Behavior = HelicopterSlowDeathBehavior ModuleTag_DeathFX
    DestructionDelay = 99999999
    SpiralOrbitTurnRate = 80 ; in degrees per second, bigger # = tighter spiral
    SpiralOrbitForwardSpeed = 110 ; bigger # = larger spiral
    SpiralOrbitForwardSpeedDamping = .9999 ; smaller #'s = slow down faster
    MaxBraking = 210 ; max braking we can use during death spiral (lower num = wilder spiral)    
    SoundDeathLoop = HelixDamagedLoop
    MinSelfSpin = 40 ; in degrees per second
    MaxSelfSpin = 120 ; in degrees per second
    SelfSpinUpdateDelay = 300 ; in milliseconds
    SelfSpinUpdateAmount = 5 ; in degrees   
    FallHowFast = 8.0% ; fraction of gravity, lower = take longer to fall
    MinBladeFlyOffDelay = 1000 ; in milliseconds
    MaxBladeFlyOffDelay = 1000 ; in milliseconds
    AttachParticle = SootySmokeTrail
    AttachParticleBone = Propeller02
    BladeObjectName = HelixBlades
    BladeBoneName = Propeller01    
    FXBlade = FX_HelicopterBladeExplosion
    OCLBlade = OCL_HelicopterBladeExplosion
    FXHitGround = FX_HelicopterHitGround
    OCLHitGround = OCL_HelicopterHitGround
    FXFinalBlowUp = FX_HelixHelicopterBlowUpBig
    OCLFinalBlowUp = OCL_HelixBlades
    DelayFromGroundToFinalDeath = 30
    FinalRubbleObject = HelixRubbleHull
  End
  
  ; support powers
  Behavior = OCLSpecialPower ModuleTag_OfficerReinforcements
    SpecialPowerTemplate = SuperweaponParadropAmerica
    OCL = SUPERWEAPON_Paradrop1
    CreateLocation = USE_OWNER_OBJECT
    ScriptedSpecialPowerOnly = Yes
  End 

  Geometry = CYLINDER
  GeometryMajorRadius = 35
  GeometryHeight = 30  
  GeometryIsSmall = No
  
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 89

End