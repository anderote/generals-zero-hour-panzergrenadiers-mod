; China Artillery Gen Helix
Object Nuke_ChinaVehicleHelix

  ; *** ART PARAMETERS ***
  SelectPortrait = SNHelix_L
  ButtonImage = SNHelix
  
  UpgradeCameo1 = Upgrade_HelixNapalmBomb
  UpgradeCameo2 = Upgrade_ChinaBlackNapalm
  UpgradeCameo3 = Upgrade_ChinaHelixGattlingCannon
  UpgradeCameo4 = Upgrade_ChinaHelixPropagandaTower
  UpgradeCameo5 = Upgrade_ChinaHelixBattleBunker
    
  Draw = W3DOverlordAircraftDraw DrawTag_Main

    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = NVHelix
      Animation = NVHelix.NVHelix
      AnimationMode = LOOP
      WeaponFireFXBone = PRIMARY MUZZLE
      WeaponMuzzleFlash = PRIMARY TURRETFX
      TurretPitch = MINIGUN
      HideSubObject = BOMBWING
    End
    ConditionState = MOVING
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End

    ConditionState = REALLYDAMAGED
      Model = NVHelix_D
      Animation = NVHelix_D.NVHelix_D
    End
    AliasConditionState = RUBBLE
    
    ConditionState = REALLYDAMAGED MOVING
      Model = NVHelix_D
      Animation = NVHelix_D.NVHelix_D
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End
    AliasConditionState = RUBBLE MOVING
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Helix
  
  EditorSorting = VEHICLE
  Side = ChinaNukeGeneral
  
  TransportSlotCount = 0
  
  VisionRange = 200
  ShroudClearingRange = 600
  
  BuildCost = 1750
  BuildTime = 25
  
  ExperienceValue = 50 100 150 200
  ExperienceRequired = 0 100 200 400
  IsTrainable = Yes
  
  CommandSet = Nuke_ChinaVehicleHelixCommandSet

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY HelixMinigunWeapon
  End

  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY HelixMinigunWeapon
    Weapon = SECONDARY GattlingBuildingGunAirDummy
    PreferredAgainst = SECONDARY BALLISTIC_MISSILE AIRCRAFT
  End
  
  ArmorSet
    Conditions = None
    Armor = ChinookArmor
    DamageFX = None
  End
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = HelixVoiceSelect
  VoiceMove = HelixVoiceMove
  VoiceAttackAir = HelixVoiceAttack
  VoiceAttack = HelixVoiceAttack
  SoundAmbient = HelixAmbientLoop
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit
  UnitSpecificSounds
    VoiceCreate = HelixVoiceCreate
    VoiceUnload = HelixVoiceUnload
    VoiceGarrison = HelixVoiceMove
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE VEHICLE HUGE_VEHICLE TRANSPORT AIRCRAFT SCORE PRODUCED_AT_HELIPAD CAN_ATTACK ;EMP_HARDENED

  Body = ActiveBody BodyTag_Normal
    MaxHealth = 300
    InitialHealth = 300
  End

  Behavior = ChinookAIUpdate AITag_Chinook
     AutoAcquireEnemiesWhenIdle = Yes 
     RotorWashParticleSystem = HelixRotorWashRing
  End
  Locomotor = SET_NORMAL HelixLocomotor
  Locomotor = SET_TAXIING BasicHelicopterTaxiLocomotor


  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End
  
  ; Damage FX
  Behavior = TransitionDamageFX FXTag_TransDamage
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_ComancheDamageTransition
  End
  
  ; Death FX
  Behavior = FXListDie FXTag_Die
    DeathFX = FX_HelicopterStartDeath
  End

  Behavior = HelicopterSlowDeathBehavior DeathTag_All
    DestructionDelay = 99999999
    SpiralOrbitTurnRate = 60
    SpiralOrbitForwardSpeed = 30
    SpiralOrbitForwardSpeedDamping = 0.99
    MaxBraking = 0
    SoundDeathLoop = HelixDamagedLoop
    MinSelfSpin = 0
    MaxSelfSpin = 360
    SelfSpinUpdateDelay = 100
    SelfSpinUpdateAmount = 3
    FallHowFast = 15%
    AttachParticle = SootySmokeTrail
    AttachParticleBone = Propeller02
    FXHitGround = FX_HelicopterHitGround
    OCLHitGround = OCL_HelicopterHitGround
    FXFinalBlowUp = FX_HelixHelicopterBlowUpBig
    OCLFinalBlowUp = OCL_HelixBlades
    DelayFromGroundToFinalDeath = 0
    FinalRubbleObject = HelixRubbleHull
  End

  ; helix upgrades
  Behavior = HelixContain ContainTag_Helix
    Slots = 5
    DamagePercentToUnits = 100%
    AllowInsideKindOf = INFANTRY VEHICLE PORTABLE_STRUCTURE
    ForbidInsideKindOf = AIRCRAFT 
    ExitDelay = 100
    NumberOfExitPaths = 1
    PassengersAllowedToFire = No
  End

  ; gattling cannon
  Behavior = ObjectCreationUpgrade ModuleTag_GattCannon01
    UpgradeObject = OCL_HelixGattlingCannon
    TriggeredBy = Upgrade_ChinaHelixGattlingCannon
    ConflictsWith = Upgrade_ChinaHelixPropagandaTower Upgrade_ChinaHelixBattleBunker
  End
  Behavior = CommandSetUpgrade ModuleTag_GattCannon02
    CommandSet = Nuke_ChinaHelixGattlingCannonCommandSet
    TriggeredBy = Upgrade_ChinaHelixGattlingCannon
    ConflictsWith = Upgrade_ChinaHelixPropagandaTower Upgrade_ChinaHelixBattleBunker
  End
  Behavior = WeaponSetUpgrade ModuleTag_GattCannon03
    TriggeredBy = Upgrade_ChinaHelixGattlingCannon
  End
  
  ; speaker tower
  Behavior = ObjectCreationUpgrade ModuleTag_Speaker01
    UpgradeObject = OCL_HelixPropagandaTower
    TriggeredBy   = Upgrade_ChinaHelixPropagandaTower
    ConflictsWith = Upgrade_ChinaHelixGattlingCannon Upgrade_ChinaHelixBattleBunker
  End
  Behavior = CommandSetUpgrade ModuleTag_Speaker02
    CommandSet = Nuke_ChinaHelixPropagandaTowerCommandSet
    TriggeredBy = Upgrade_ChinaHelixPropagandaTower
    ConflictsWith = Upgrade_ChinaHelixGattlingCannon Upgrade_ChinaHelixBattleBunker
  End
  
  ; bunker
  Behavior = ObjectCreationUpgrade ModuleTag_Bunker01
    UpgradeObject = OCL_HelixBattleBunker
    TriggeredBy   = Upgrade_ChinaHelixBattleBunker
    ConflictsWith = Upgrade_ChinaHelixGattlingCannon Upgrade_ChinaHelixPropagandaTower
  End
  Behavior = CommandSetUpgrade ModuleTag_Bunker02
    CommandSet = Nuke_ChinaHelixBattleBunkerCommandSet
    TriggeredBy = Upgrade_ChinaHelixBattleBunker
    ConflictsWith = Upgrade_ChinaHelixGattlingCannon Upgrade_ChinaHelixPropagandaTower
  End
  Behavior = PassengersFireUpgrade ModuleTag_Bunker03
    TriggeredBy = Upgrade_ChinaHelixBattleBunker
  End
  
  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End

  ; Napalm Bomb
  Behavior = SpecialAbility ModuleTag_NapalmBomb01
    SpecialPowerTemplate = Nuke_SpecialAbilityHelixNukeBomb
    UpdateModuleStartsAttack = Yes
    StartsPaused = Yes
    InitiateSound = HelixVoiceAttack
  End
  
  Behavior = SpecialAbilityUpdate NapalmBomb02
    SpecialPowerTemplate = Nuke_SpecialAbilityHelixNukeBomb
    StartAbilityRange = 3.0
    PreparationTime = 0
    SpecialObject = NukeBomb
    MaxSpecialObjects = 1
    SpecialObjectsPersistWhenOwnerDies = Yes 
    SpecialObjectsPersistent = Yes
    UniqueSpecialObjectTargets = No
    UnpackTime = 500
    FlipOwnerAfterUnpacking = No
    FleeRangeAfterCompletion = 0
    UnpackSound = NoSound
    LoseStealthOnTrigger = No
    ApproachRequiresLOS = No ; we are a helicopter, we can see everything
    NeedToFaceTarget = No ; can drop the bomb at any angle to target
    PersistentPrepTime = 100
    PersistenceRequiresRecharge = Yes
  End
  Behavior = UnpauseSpecialPowerUpgrade NapalmBomb03
    SpecialPowerTemplate = Nuke_SpecialAbilityHelixNukeBomb
    TriggeredBy = Nuke_Upgrade_HelixNukeBomb
  End
  Behavior = SubObjectsUpgrade NapalmBomb04
    TriggeredBy = Nuke_Upgrade_HelixNukeBomb 
    ShowSubObjects = BombWing 
  End
  
  ; Upgrades and Bonuses
  
  ; None ATM

  Geometry = CYLINDER
  GeometryMajorRadius = 35
  GeometryHeight = 30
  GeometryIsSmall = No
  
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 89
End