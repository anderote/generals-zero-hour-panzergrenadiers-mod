; China Rogue Leopard Bomber
Object CRog_ChinaJetLeopard

  ; *** ART PARAMETERS ***
  SelectPortrait = SNMig31_L
  ButtonImage = SNMig31
  
  UpgradeCameo1 = Upgrade_ChinaAircraftArmor
  UpgradeCameo2 = Upgrade_ChinaBlackNapalm
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DModelDraw DrawTag_Main

    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = NVMig31
      HideSubObject = BURNERFX01 BURNERFX02
      WeaponLaunchBone = PRIMARY WEAPONA
      ;WeaponHideShowBone = PRIMARY MISSILE
    End

    ConditionState = JETEXHAUST
      ParticleSysBone = WINGTIP01 JetContrail
      ParticleSysBone = WINGTIP02 JetContrail
    End

    ConditionState = JETEXHAUST JETAFTERBURNER
      ShowSubObject = BURNERFX01 BURNERFX02
      ParticleSysBone = EXHAUST01 JetExhaust
      ParticleSysBone = EXHAUST02 JetExhaust
      ParticleSysBone = WINGTIP01 JetContrail
      ParticleSysBone = WINGTIP02 JetContrail
    End

    ConditionState = REALLYDAMAGED
      Model = NVMig31_D
    End
    AliasConditionState = RUBBLE
    
    ConditionState = REALLYDAMAGED JETEXHAUST
      Model = NVMig31_D
      ParticleSysBone = WINGTIP01 JetContrail
      ParticleSysBone = WINGTIP02 JetContrail
    End
    AliasConditionState = RUBBLE JETEXHAUST

    ConditionState = REALLYDAMAGED JETEXHAUST JETAFTERBURNER
      Model = NVMig31_D
      ShowSubObject = BURNERFX01 BURNERFX02
      ParticleSysBone = EXHAUST01 JetExhaust
      ParticleSysBone = EXHAUST02 JetExhaust
      ParticleSysBone = WINGTIP01 JetContrail
      ParticleSysBone = WINGTIP02 JetContrail
    End
    AliasConditionState = RUBBLE JETEXHAUST JETAFTERBURNER

  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:LeopardBomber
  
  EditorSorting = VEHICLE
  Side = China
  
  TransportSlotCount = 0
  
  VisionRange = 400
  ShroudClearingRange = 350

  Prerequisites
    Object = ChinaPropagandaCenter
  End

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY LeopardNapalmBomb
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY LeopardNapalmBombUpgraded
  End

  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = None
  End

  BuildCost = 2000
  BuildTime = 20   
  
  ExperienceValue = 50 50 100 150
  ExperienceRequired = 0 100 200 400
  IsTrainable = Yes
  
  CrusherLevel = 1
  CrushableLevel = 2
  
  CommandSet = ChinaJetMIGCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = LeopardVoiceSelect
  VoiceMove = LeopardVoiceMove
  VoiceAttack = LeopardVoiceAttack
  VoiceGuard = LeopardVoiceGuard
  SoundAmbient = MigAmbientLoop
  UnitSpecificSounds
    VoiceCreate = LeopardVoiceCreate
    Afterburner = RaptorAfterburner
    VoiceGarrison = LeopardVoiceMove
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 320
    InitialHealth = 320
  End

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 500
  End

  Behavior = JetAIUpdate AITag_Jet
    OutOfAmmoDamagePerSecond  = 10%
    TakeoffDistForMaxLift = 0%
    TakeoffPause = 500
    MinHeight = 5
    ReturnToBaseIdleTime = 10000
  End

  Locomotor = SET_NORMAL LeopardLocomotor
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor

  ; damage fx
  Behavior = TransitionDamageFX FXTag_TransDamage
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes Psys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_MIGDamageTransition
  End
  
  ; death fx
  Behavior = JetSlowDeathBehavior DeathTag_All
    FXOnGroundDeath = FX_JetOnGroundDeath
    OCLOnGroundDeath = OCL_LeopardDeathFinalBlowUp
    DestructionDelay = 999999
    RollRate = 0.2
    RollRateDelta = 100%
    PitchRate = 0
    FallHowFast = 110%
    FXInitialDeath = FX_LeopardDeathInitial
    OCLInitialDeath = OCL_LeopardDeathInitial
    FXHitGround = FX_JetDeathHitGround
    DelayFinalBlowUpFromHitGround = 200
    FXFinalBlowUp = FX_JetDeathFinalBlowUp
    OCLFinalBlowUp = OCL_LeopardDeathFinalBlowUp
  End

  ; upgrades
  
  ; mig armor
  Behavior = MaxHealthUpgrade UpgradeTag_HP
    TriggeredBy = Upgrade_ChinaAircraftArmor
    AddMaxHealth = 80
    ChangeType = ADD_CURRENT_HEALTH_TOO
  End
  
  ; enhanced black napalm
  Behavior = WeaponSetUpgrade UpgradeTag_Weapon
    TriggeredBy = Upgrade_ChinaBlackNapalm
  End

  Geometry = Box
  GeometryIsSmall = Yes
  GeometryMajorRadius = 30
  GeometryMinorRadius = 16
  GeometryHeight = 9
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89

End