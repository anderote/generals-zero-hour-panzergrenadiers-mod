; China Commander in Chief J10
Object CCiC_ChinaJetJ10

  ; *** ART PARAMETERS ***
  SelectPortrait = SNJ10_L
  ButtonImage = SNJ10
  
  UpgradeCameo1 = Upgrade_ChinaAircraftArmor
  ;UpgradeCameo2 = None
  ;UpgradeCameo3 = None
  ;UpgradeCameo4 = None
  ;UpgradeCameo5 = None
  
  Draw = W3DModelDraw DrawTag_Main

    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = NVJ10
      WeaponLaunchBone = PRIMARY WEAPONA
      HideSubObject = BURNERFX01
    End

    ConditionState = JETEXHAUST
      ParticleSysBone = WINGTIP01 JetContrail
      ParticleSysBone = WINGTIP02 JetContrail
    End

    ConditionState = JETEXHAUST JETAFTERBURNER
      ShowSubObject = BURNERFX01
      ParticleSysBone = ENGINE01 JetExhaust
      ParticleSysBone = WINGTIP01 JetContrail
      ParticleSysBone = WINGTIP02 JetContrail
    End

    ConditionState = REALLYDAMAGED
      Model = NVJ10_D
    End
    
    ConditionState = REALLYDAMAGED JETEXHAUST
      Model = NVJ10_D
      ParticleSysBone = WINGTIP01 JetContrail
      ParticleSysBone = WINGTIP02 JetContrail
    End
    
    ConditionState = REALLYDAMAGED JETEXHAUST JETAFTERBURNER
      Model = NVJ10_D
      ShowSubObject = BURNERFX01
      ParticleSysBone = ENGINE01 JetExhaust
      ParticleSysBone = WINGTIP01 JetContrail
      ParticleSysBone = WINGTIP02 JetContrail
    End

    ConditionState = RUBBLE
      Model = NVJ10_D1
    End

  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:J10
  
  EditorSorting = VEHICLE
  Side = ChinaInfantryGeneral
  
  TransportSlotCount = 0
  
  VisionRange = 350
  ShroudClearingRange = 400
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY J10MissileWeapon
  End

  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = None
  End

  BuildCost = 1600
  BuildTime = 15  
  
  ExperienceValue = 50 50 150 200
  ExperienceRequired = 0 100 200 400
  IsTrainable = Yes
  
  CrusherLevel = 1
  CrushableLevel = 2
  
  CommandSet = ChinaJetJ10CommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = J10VoiceSelect
  VoiceMove = J10VoiceMove
  VoiceAttack = J10VoiceAttack
  VoiceAttackAir = J10VoiceAttackAir
  VoiceGuard = J10VoiceGuard
  SoundAmbient = MigAmbientLoop
  UnitSpecificSounds
    VoiceCreate = J10VoiceCreate
    Afterburner = RaptorAfterburner
    VoiceGarrison = J10VoiceReload
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 210
    InitialHealth = 210
  End

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 500
  End

  Behavior = JetAIUpdate ModuleTag_06
    OutOfAmmoDamagePerSecond  = 10%
    TakeoffDistForMaxLift = 0%
    TakeoffPause = 500
    MinHeight = 5
    ReturnToBaseIdleTime = 10000
  End

  Locomotor = SET_NORMAL MIGLocomotor
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor

  ; damage fx
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes Psys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_MIGDamageTransition
  End
  
  ; death fx
  Behavior = JetSlowDeathBehavior ModuleTag_03
    FXOnGroundDeath = FX_JetOnGroundDeath
    OCLOnGroundDeath = OCL_J10DeathFinalBlowUp
    DestructionDelay = 999999
    RollRate = 0.2
    RollRateDelta = 100%
    PitchRate = 0
    FallHowFast = 110%
    FXInitialDeath = FX_J10DeathInitial
    OCLInitialDeath = OCL_J10DeathInitial
    FXHitGround = FX_JetDeathHitGround
    DelayFinalBlowUpFromHitGround = 200
    FXFinalBlowUp = FX_JetDeathFinalBlowUp
    OCLFinalBlowUp = OCL_J10DeathFinalBlowUp
  End

  ; Upgrades
  
  ; Mig Armor
  Behavior = ArmorUpgrade UpgradeTag_Armor
    TriggeredBy = Upgrade_ChinaAircraftArmor
  End

  Geometry = Box
  GeometryIsSmall = Yes
  
  GeometryMajorRadius = 17
  GeometryMinorRadius = 10
  GeometryHeight = 8
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89

End