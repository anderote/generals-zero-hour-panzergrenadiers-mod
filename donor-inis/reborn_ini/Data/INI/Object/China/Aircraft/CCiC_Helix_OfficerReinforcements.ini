; China CiC Helix used for Officer Reinforcements
Object CCiC_ChinaOfficerHelix_Landing

  ; *** ART PARAMETERS ***
  SelectPortrait = SNHelix_L
  ButtonImage = SNHelix
    
  Draw = W3DOverlordAircraftDraw DrawTag_Main

    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = NVHelix
      Animation = NVHelix.NVHelix
      AnimationMode = LOOP
      HideSubObject = TURRETFX BOMBWING
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Helix
  
  Side = China
  EditorSorting = SYSTEM
  
  TransportSlotCount = 0

  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
    DamageFX = None
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = PRELOAD NO_COLLIDE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 300
    InitialHealth = 300
  End

  ; *** AUDIO Parameters ***
  SoundAmbient = HelixAmbientLoop

  Behavior = AIUpdateInterface AITag_Normal
  End
  Locomotor = SET_NORMAL ReinforcementsHelicopterLandingLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 5.0
  End

  Behavior = HeightDieUpdate ModuleTag_06
    TargetHeight = 1.0
    TargetHeightIncludesStructures = No
  End

  Behavior = InstantDeathBehavior ModuleTag_07
    DeathTypes = ALL
    FX  = FX_ChinaOfficerHelixDropOff
    OCL = CCiC_OCL_OfficerReinforcements
  End
  
  Geometry = CYLINDER
  GeometryMajorRadius = 5
  GeometryMinorRadius = 5
  GeometryHeight = 10
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  

End

Object CCiC_ChinaOfficerHelix_TakeOff

