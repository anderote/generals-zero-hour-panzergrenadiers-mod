; China Rogue Viper Light Tank
Object ChinaTankBattleMaster

  ; *** ART PARAMETERS ***
  SelectPortrait         = SNViper_L
  ButtonImage            = SNViper

  UpgradeCameo1 = Upgrade_Nationalism
  UpgradeCameo2 = Upgrade_ChinaTDCannon
  UpgradeCameo3 = Upgrade_ChinaNuclearTanks
  ;UpgradeCameo4 = Upgrade_ChinaNanoArmor

  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model               = NVLight
      Turret              = Turret01
      WeaponFireFXBone    = PRIMARY TurretFx
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle

      WeaponFireFXBone    = SECONDARY HOUSECOLOR03

      ShowSubObject       = Turret01
      HideSubObject       = TurretUp01 BarrelUp01 Housecolor06 MuzzleFXUp01
    End
    ConditionState        = REALLYDAMAGED
      Model               = NVLight_D
      Turret              = Turret01
      WeaponFireFXBone    = PRIMARY TurretFx
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle

      WeaponFireFXBone    = SECONDARY HOUSECOLOR03
    End
    ConditionState        = RUBBLE
      Model               = NVLight_D
      Turret              = Turret01
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      Model = NVLight
      Turret = TurretUp01
      HideSubObject = Turret01 MuzzleFX01 Barrel01 Housecolor03
      ShowSubObject = TurretUp01 Housecolor06 BarrelUp01 MuzzleFxUp01
      WeaponRecoilBone = PRIMARY BarrelUp
      WeaponFireFXBone = PRIMARY TurretFxUp
      WeaponMuzzleFlash = PRIMARY MuzzleFXUp
      WeaponLaunchBone  = PRIMARY TURRETMSUP01

      WeaponFireFXBone    = SECONDARY TURRETUP01
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED
      Model = NVLight_D
      Turret = TurretUp01
      HideSubObject = Turret01 MuzzleFX01 Barrel01 Housecolor03
      ShowSubObject = TurretUp01 Housecolor06 BarrelUp01 MuzzleFxUp01
      WeaponRecoilBone = PRIMARY BarrelUp
      WeaponFireFXBone = PRIMARY TurretFxUp
      WeaponMuzzleFlash = PRIMARY MuzzleFXUp
      WeaponLaunchBone  = PRIMARY TURRETMSUP01

      WeaponFireFXBone    = SECONDARY TURRETUP01
    End

    TrackMarks              = EXTnkTrack.tga
    TreadAnimationRate = 2.0;  amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName      = OBJECT:LightTank
  Side = ChinaRogueGeneral
  EditorSorting   = VEHICLE
  TransportSlotCount = 2                 ;how many "slots" we take in a transport (0 == not transportable)
  WeaponSet
    Conditions = None
    Weapon = PRIMARY ChinaLightTankGun
    Weapon = SECONDARY ViperMachineGun
  End
  
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY ChinaTankDestroyerGun
    Weapon = SECONDARY ViperMachineGun
  End
  
   ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End
  BuildCost       = 900
  BuildTime       = 8.0          ;in seconds
  VisionRange     = 200
  ShroudClearingRange = 300
  ExperienceValue = 100 100 200 300    ;Experience point value at each level
  ExperienceRequired = 0 150 300 500 ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet       = ChinaLightTankCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = ChinaGenericTankVoiceSelect
  VoiceMove = BattleMasterTankVoiceMove
  VoiceGuard = BattleMasterTankVoiceMove
  VoiceAttack = BattleMasterTankVoiceAttack
  SoundMoveStart = BattleMasterTankMoveStart
  SoundMoveStartDamaged = BattleMasterTankMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate          = BattleMasterTankVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    VoiceCrush = BattleMasterTankVoiceCrush
    VoiceEnter = BattleMasterTankVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE

  Body = ActiveBody ModuleTag_0221
    MaxHealth       = 520.0
    InitialHealth   = 520.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 160   ; turn rate, in degrees per sec
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End

  Locomotor = SET_NORMAL BattlelordLocomotor
  Locomotor = SET_NORMAL_UPGRADED NuclearBattlelordLocomotor

  Behavior = HordeUpdate ModuleTag_04
    RubOffRadius = 150    ; if I am this close to a real hordesman, I will get to be an honorary hordesman
    UpdateRate = 1000     ; how often to recheck horde status (msec)
    Radius = 75           ; how close other units must be to us to count towards our horde-ness (~30 feet or so)
    KindOf = VEHICLE      ; what KindOf's must match to count towards horde-ness
    AlliesOnly = Yes      ; do we only count allies towards horde status?
    ExactMatch = Yes      ; do we only count units of our exact same type towards horde status? (overrides kindof)
    Count = 5             ; how many units must be within Radius to grant us horde-ness
    Action = HORDE        ; when horde-ing, grant us the HORDE bonus
  End

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 30.0
  End

  Behavior = LocomotorSetUpgrade ModuleTag_0721
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End
  
  ; A crushing defeat
  Behavior = DestroyDie ModuleTag_08
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = FXListDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End
  Behavior = CreateCrateDie ModuleTag_11
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End

  ;Behavior = AutoHealBehavior ModuleTag_1521
    ;HealingAmount = 5
    ;HealingDelay = 500 ; msec
    ;TriggeredBy = Upgrade_ChinaNanoArmor
  ;End

  Behavior = SlowDeathBehavior ModuleTag_12
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 25
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL    OCL_ChinaTankBattleMasterDebris
    FX  = FINAL    FX_BattleMasterExplosionOneFinal
  End

  Behavior = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  
  Behavior = WeaponSetUpgrade ModuleTag_20
    TriggeredBy = Upgrade_ChinaTDCannon
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = VeterancyGainCreate ModuleTag_02
    ; omit the "ScienceRequired" so that this upgrade always occurs.
    ; Pilots should never (repeat, never) be less than VETERAN status.
    StartingLevel = VETERAN
  End

  Behavior = VeterancyGainCreate ModuleTag_1421
    StartingLevel = ELITE
    ScienceRequired = SCIENCE_BattlelordTraining2
  End

  Behavior = ProductionUpdate ModuleTag_22
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End

  Geometry = BOX
  GeometryMajorRadius = 12.0
  GeometryMinorRadius = 8.0
  GeometryHeight = 11
  Scale = 1.06
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End