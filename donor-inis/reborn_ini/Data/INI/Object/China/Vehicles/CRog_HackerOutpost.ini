Object ChinaVehicleHackerOutpost 

  ; *** ART PARAMETERS ***
  SelectPortrait = SNHackerVan_XL
  ButtonImage = SNHackerVan_L

  Draw = W3DTankTruckDraw DrawTag_Main
    OkToChangeModelColor = Yes 
   
    DefaultConditionState
      Model = NVHackerTruck
      Animation = NVHackerTruck.NVHackerTruck
      AnimationMode = LOOP
    End    

    ConditionState = REALLYDAMAGED
      Model = NVHackerTruck_D
      Animation = NVHackerTruck_D.NVHackerTruck_D
      AnimationMode = LOOP
    End
   
    ConditionState = RUBBLE
      Model = NVHackerTruck_D
      Animation = NVHackerTruck_D.NVHackerTruck_D
      AnimationMode = MANUAL
    End
    
    TrackMarks = EXTnkTrack.tga

    TreadAnimationRate = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6

    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
 
    LeftFrontTireBone = Tire01
    RightFrontTireBone = Tire02
    TireRotationMultiplier = 0.2
    PowerslideRotationAddition = 0
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:HackerOutpost
  
  Side = China
  EditorSorting = VEHICLE
  
  TransportSlotCount = 3
  
  VisionRange = 200
  ShroudClearingRange = 300

  ArmorSet
    Conditions = None
    Armor = HackerOutpostArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 1000
  BuildTime = 12
  
  ExperienceValue = 50 50 50 50
  
  CrusherLevel = 2
  CrushableLevel = 2
  
  CommandSet = ChinaHackerOutpostCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = ListeningOutpostVoiceSelect
  VoiceMove = ListeningOutpostVoiceMove
  VoiceGuard = ListeningOutpostVoiceMove
  VoiceAttack = ListeningOutpostVoiceAttack
  SoundMoveStart = RadarVanMoveStart
  SoundMoveStartDamaged = RadarVanMoveStart
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit
  UnitSpecificSounds
    VoiceCreate = ListeningOutpostVoiceCreate
    VoiceCrush = ListeningOutpostVoiceMove
    VoiceUnload = NoSound ; nothing recorded
    VoiceEnter = ListeningOutpostVoiceMove
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE VEHICLE TRANSPORT SCORE REVEALS_ENEMY_PATHS CANNOT_RETALIATE ;CAN_ATTACK
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 400
    InitialHealth = 400
    ; Subdual Settings
    SubdualDamageCap = 800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface AITag_Normal
  End
  
  Locomotor = SET_NORMAL HackerOutpostLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End
  
  ; Stealth
  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 1000
    StealthForbiddenConditions = MOVING
    FriendlyOpacityMin = 50%
    FriendlyOpacityMax = 100%
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End

  ; 1337 Hacks
  Behavior = InternetHackContain ModuleTag_Hacks
    PassengersAllowedToFire = No
    Slots = 2
    ScatterNearbyOnExit = No
    HealthRegen%PerSec = 10
    DamagePercentToUnits = 25% 
    AllowInsideKindOf = MONEY_HACKER
    ExitDelay = 250
    NumberOfExitPaths = 2
    GoAggressiveOnExit = No
  End

  ; Spy Stuff
  Behavior = SpyVisionSpecialPower SupplyHack01
    SpecialPowerTemplate = SuperweaponHackVanSupplySpy
    BaseDuration = 10000
    ;BonusDurationPerCaptured = 10000
    MaxDuration = 10000
  End
  Behavior = SpyVisionUpdate SpyTag_SupplyHack02
    NeedsUpgrade = No
    SelfPowered = No
    ;SelfPoweredDuration = 10000
    ;SelfPoweredInterval = 120000
    SpyOnKindof = FS_SUPPLY_CENTER
  End

  ; Damage FX
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End
  
  ; Death FX
  Behavior = InstantDeathBehavior DeathTag_Normal
    DeathTypes = ALL -CRUSHED -SPLATTED
    FX = FX_SupplyTruckExplosionOneFinal
    OCL = OCL_InitialListeningOutpostDebris
  End
  
  Behavior = InstantDeathBehavior ModuleTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_CarCrush
    OCL = OCL_InitialListeningOutpostDebris
  End

  ; Salvage Crate
  Behavior = CreateCrateDie CrateTag_Salvage
    CrateData = SalvageCrateData
  End

  Geometry = BOX
  GeometryMajorRadius = 18
  GeometryMinorRadius = 8
  GeometryHeight = 14   
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End