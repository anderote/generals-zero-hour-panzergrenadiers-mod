; EMP and Napalm Gen's Battlemaster
Object Tank_ChinaTankBattleMaster

  ; *** ART PARAMETERS ***
  SelectPortrait = SNBattlemaster_L
  ButtonImage = SNBattlemaster
  
  UpgradeCameo1 = Upgrade_Nationalism
  UpgradeCameo2 = Upgrade_ChinaNuclearTanks
  UpgradeCameo3 = Upgrade_ChinaEnhancedBlackNapalm
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DOverlordTankDraw DrawTag_Overlord
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = NVBtMstr
      Turret = TURRET01
      WeaponLaunchBone = PRIMARY MUZZLE01
      WeaponFireFXBone = PRIMARY MUZZLE01
      WeaponRecoilBone = PRIMARY BARREL01
      WeaponMuzzleFlash = PRIMARY MUZZLEFX01      
      HideSubObject = FAKE
    End
    ConditionState = REALLYDAMAGED
      Model = NVBtMstr_D
    End
    AliasConditionState = RUBBLE
    
    ConditionState = DISGUISED
      ShowSubObject = FAKE
    End
    ConditionState = DISGUISED REALLYDAMAGED
      Model = NVBtMstr_D
      ShowSubObject = FAKE
    End    
    
    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:NapalmBattleMaster
  
  Side = ChinaTankGeneral ; EMP and Napalm General
  EditorSorting = VEHICLE
  
  TransportSlotCount = 3
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY NapalmBattleMasterTankGun
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY NapalmBattleMasterTankGun_Upgraded
  End
  
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 800
  BuildTime = 10
  
  VisionRange = 200
  ShroudClearingRange = 300
  
  ExperienceValue = 100 100 200 400
  ExperienceRequired = 0 200 300 600
  IsTrainable = Yes
  
  CrusherLevel = 2
  CrushableLevel = 2
  
  CommandSet = Tank_ChinaVehicleBattleMasterCommandSet
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = NapalmBattleMasterTankVoiceSelect
  VoiceMove = NapalmBattleMasterTankVoiceMove
  VoiceGuard = NapalmBattleMasterTankVoiceMove
  VoiceAttack = NapalmBattleMasterTankVoiceAttack
  ; engine sounds
  SoundMoveStart = BattleMasterTankMoveStart
  SoundMoveStartDamaged = BattleMasterTankMoveStart

  UnitSpecificSounds
    VoiceCreate = NapalmBattleMasterTankVoiceCreate
    VoiceCrush = NapalmBattleMasterTankVoiceMove
    VoiceEnter = NapalmBattleMasterTankVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE

  Body = ActiveBody ModuleTag_02
    MaxHealth = 400
    InitialHealth = 400
    ; subdual settings
    SubdualDamageCap = 800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 120
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes NOTWHILEATTACKING
    MoodAttackCheckRate = 0
  End

  Locomotor = SET_NORMAL BattleMasterLocomotor
  Locomotor = SET_NORMAL_UPGRADED NuclearBattleMasterLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 40
  End

  ; Machine Gun
  Behavior = OverlordContain ContainTag_Overlord
    Slots = 1
    DamagePercentToUnits = 100%
    AllowInsideKindOf = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret = Yes
    PayloadTemplateName = Tank_ChinaBattleMasterMachineGun
    ExperienceSinkForRider = Yes
  End

  ; Damage FX
  Behavior = TransitionDamageFX TransitionTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  
  ; Death FX
  Behavior = SlowDeathBehavior DeathTag_All
    DeathTypes = ALL
    DestructionDelay = 1
    OCL = FINAL OCL_ChinaTankBattleMasterDebris
    FX  = FINAL FX_BattleMasterExplosionOneFinal
  End
  
  ; Salvage Crate
  Behavior = CreateCrateDie CrateTag_Salvage
    CrateData = SalvageCrateData
  End
  
  ; Upgrades and Bonuses
  
  ; Horde Bonus
  Behavior = HordeUpdate ModuleTag_Horde
    RubOffRadius = 150
    UpdateRate = 1000
    Radius = 75
    KindOf = VEHICLE
    AlliesOnly = Yes
    ExactMatch = Yes
    Count = 5
    Action = HORDE
  End
  
  ; Special Weapons Training
  Behavior = VeterancyGainCreate CreateTag_Veterancy
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_SpecWeapTraining
  End
  
  ; Enhanced Black Napalm
  Behavior = WeaponSetUpgrade UpgradeTag_Weapon
    TriggeredBy = Upgrade_ChinaEnhancedBlackNapalm
  End

  ; Nuclear Tanks
  Behavior = LocomotorSetUpgrade UpgradeTag_Locomotor
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_NuclearDeath
    DeathWeapon = NuclearTankDeathWeapon
    StartsActive  = No
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End
  
  Geometry = BOX
  GeometryMajorRadius = 16
  GeometryMinorRadius = 10
  GeometryHeight = 7
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 45
End

; Battlemaster Machine Gun -------------------------------------------------
Object Tank_ChinaBattleMasterMachineGun

  ; *** ART PARAMETERS ***
  Draw = W3DDependencyModelDraw DrawTag_Dependency
    OkToChangeModelColor = Yes
    AttachToBoneInContainer = FIREPOINT01

    DefaultConditionState
      Model = NVBtMstr_G
      Turret = TURRETB01
      WeaponFireFXBone = SECONDARY MUZZLEB01
      WeaponMuzzleFlash = SECONDARY MUZZLEFXB01
    End
  End

  ; *** DESIGN PARAMETERS ***
  Side = ChinaTankGeneral ; EMP and Napalm General
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY None
    Weapon = SECONDARY BattlemasterTankMachineGun
  End
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
  End
  
  VisionRange = 225

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CLICK_THROUGH IGNORED_IN_GUI
  
  Body = StructureBody BodyTag_Structure
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = AIUpdateInterface AITag_Normal
    Turret
      ControlledWeaponSlots = PRIMARY
      TurretTurnRate = 120
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End

  Behavior = DestroyDie DeathTag_All
  End

  Geometry = BOX
  GeometryMajorRadius = 1
  GeometryMinorRadius = 1
  GeometryHeight = 1
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End