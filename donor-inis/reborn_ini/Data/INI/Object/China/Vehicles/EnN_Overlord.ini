; EMP and Napalm Overlord
Object Tank_ChinaTankOverlord

  ; *** ART PARAMETERS ***
  SelectPortrait = SNOverlord_L
  ButtonImage = SNOverlord
  
  UpgradeCameo1 = Upgrade_ChinaNuclearTanks
  UpgradeCameo2 = Upgrade_ChinaOverlordBattleBunker
  UpgradeCameo3 = Upgrade_ChinaOverlordGattlingCannon
  UpgradeCameo4 = Upgrade_ChinaOverlordPropagandaTower
  
  
  Draw = W3DOverlordTankDraw DrawTag_Main
    OkToChangeModelColor = Yes
  
    DefaultConditionState
      Model = NVOvrlrdZ
      Animation = NVOvrlrdZ.NVOvrlrdZ
      AnimationMode = LOOP
      Turret = TURRET01
      WeaponFireFXBone = PRIMARY MUZZLE
      WeaponLaunchBone = PRIMARY MUZZLE
      WeaponRecoilBone = PRIMARY BARREL
      WeaponMuzzleFlash = PRIMARY MUZZLEFX
    End
    ConditionState = REALLYDAMAGED
      Model = NVOvrlrd_d
      Animation = NVOvrlrd_d.NVOvrlrd_d
      AnimationMode = LOOP
    End
    AliasConditionState = RUBBLE

    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2.0
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Overlord
  
  Side = ChinaTankGeneral
  EditorSorting = VEHICLE
  
  TransportSlotCount = 4
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY EnN_OverlordTankGun
  End
  
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY EnN_OverlordTankGun
    Weapon = SECONDARY GattlingBuildingGunAirDummy
    PreferredAgainst = SECONDARY BALLISTIC_MISSILE AIRCRAFT
  End
  
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 1500
  BuildTime = 20
  
  VisionRange = 200
  ShroudClearingRange = 300
  
  Prerequisites
    Object = Tank_ChinaPropagandaCenter
  End

  ExperienceValue = 200 200 400 600
  ExperienceRequired = 0 400 600 1200
  IsTrainable = Yes
  
  CrusherLevel = 3
  CrushableLevel = 3
  
  CommandSet = ChinaTankOverlordDefaultCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = OverlordTankVoiceSelect
  VoiceMove = OverlordTankVoiceMove
  VoiceGuard = OverlordTankVoiceMove
  VoiceAttack = OverlordTankVoiceAttack
  ; engine sounds
  SoundMoveStart = OverlordTankMoveStart
  SoundMoveStartDamaged = OverlordTankMoveStart

  UnitSpecificSounds
    VoiceCreate = OverlordTankVoiceCreate
    VoiceCrush = OverlordTankVoiceCrush
    VoiceEnter = OverlordTankVoiceMove
    VoiceUnload = OverlordTankVoiceUnload
    TurretMoveLoop = OverlordTankTurretMoveLoop
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE HUGE_VEHICLE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 1100
    InitialHealth = 1100

    ; subdual settings
    SubdualDamageCap = 2200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = TransportAIUpdate AITag_Transport
    Turret
      TurretTurnRate = 60
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End

  Locomotor = SET_NORMAL OverlordLocomotor
  Locomotor = SET_NORMAL_UPGRADED NuclearOverlordLocomotor

  Behavior = OverlordContain ContainTag_Overlord
    Slots = 2
    DamagePercentToUnits = 100%
    AllowInsideKindOf = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret = Yes
    ExperienceSinkForRider = Yes
  End

  ; overlord upgrades
  
  ; gattling cannon
  Behavior = ObjectCreationUpgrade ModuleTag_GattlingCannon01
    UpgradeObject = Tank_OCL_OverlordGattlingCannon
    TriggeredBy   = Upgrade_ChinaOverlordGattlingCannon
    ConflictsWith = Upgrade_ChinaOverlordPropagandaTower Upgrade_ChinaOverlordBattleBunker
  End
  Behavior = WeaponSetUpgrade ModuleTag_GattlingCannon02
    TriggeredBy = Upgrade_ChinaOverlordGattlingCannon
    ConflictsWith = Upgrade_ChinaOverlordPropagandaTower Upgrade_ChinaOverlordBattleBunker
  End
  Behavior = CommandSetUpgrade ModuleTag_GattlingCannon03
    CommandSet = ChinaTankOverlordGattlingCannonCommandSet
    TriggeredBy = Upgrade_ChinaOverlordGattlingCannon
    ConflictsWith = Upgrade_ChinaOverlordPropagandaTower Upgrade_ChinaOverlordBattleBunker
  End
  
  ; bunker
  Behavior = ObjectCreationUpgrade ModuleTag_Bunker01
    UpgradeObject = OCL_OverlordPropagandaTower
    TriggeredBy = Upgrade_ChinaOverlordPropagandaTower
    ConflictsWith = Upgrade_ChinaOverlordGattlingCannon Upgrade_ChinaOverlordBattleBunker
  End
  Behavior = CommandSetUpgrade ModuleTag_Bunker02
    CommandSet = ChinaTankOverlordBattleBunkerCommandSet
    TriggeredBy = Upgrade_ChinaOverlordBattleBunker
    ConflictsWith = Upgrade_ChinaOverlordGattlingCannon Upgrade_ChinaOverlordPropagandaTower
  End
  
  ; speaker tower
  Behavior = ObjectCreationUpgrade ModuleTag_PropTower01
    UpgradeObject = OCL_OverlordBattleBunker
    TriggeredBy = Upgrade_ChinaOverlordBattleBunker
    ConflictsWith = Upgrade_ChinaOverlordGattlingCannon Upgrade_ChinaOverlordPropagandaTower
  End
  Behavior = CommandSetUpgrade ModuleTag_PropTower02
    CommandSet = ChinaTankOverlordPropagandaTowerCommandSet
    TriggeredBy = Upgrade_ChinaOverlordPropagandaTower
    ConflictsWith = Upgrade_ChinaOverlordGattlingCannon Upgrade_ChinaOverlordBattleBunker
  End  
  
  Behavior = ProductionUpdate ModuleTag_10
    MaxQueueEntries = 1
  End

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End
  
  ; damage fx
  Behavior = TransitionDamageFX FXTag_TransDamage
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_OverlordDamageTransition
  End

  ; death module
  Behavior = SlowDeathBehavior DeathTag_All
    DestructionDelay = 200
    DestructionDelayVariance = 100
    FX = FINAL FX_OverlordExplosionOneFinal
    OCL = FINAL OCL_ChinaTankOverlordDebris
  End
  
  ; salvage crate
  Behavior = CreateCrateDie CrateTag_Salvage
    CrateData = SalvageCrateData
  End
  
  ; Upgrades and Bonuses
  
  ; Special Weapons Training
  Behavior = VeterancyGainCreate CreateTag_Veterancy
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_SpecWeapTraining
  End

  ; nuclear tanks
  Behavior = LocomotorSetUpgrade ModuleTag_NuclearTanks01
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_NuclearTanks02
    DeathWeapon = NuclearTankDeathWeapon
    StartsActive = No
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End

  Geometry = BOX
  GeometryMajorRadius = 26.0
  GeometryMinorRadius = 13.0
  GeometryHeight = 15.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME     
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length

End

; EMP and Napalm General Overlord Gattling Cannon
Object Tank_ChinaTankOverlordGattlingCannon

  ; *** ART PARAMETERS ***
  Draw = W3DDependencyModelDraw DrawTag_Main
  
    OkToChangeModelColor = Yes
    AttachToBoneInContainer = FIREPOINT01

    ; Idle
    DefaultConditionState 
      Model = NVOvrlrdZ_G
      Animation = NVOvrlrdZ_G.NVOvrlrdZ_G
      AnimationMode = MANUAL
      Flags = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
      Turret = TURRET
      TurretPitch = TURRETEL
      WeaponFireFXBone = PRIMARY MUZZLE
      WeaponLaunchBone = PRIMARY MUZZLE
      WeaponMuzzleFlash = PRIMARY MUZZFXA
      WeaponFireFXBone = SECONDARY MUZZLE
      WeaponLaunchBone = SECONDARY MUZZLE
      WeaponMuzzleFlash = SECONDARY MUZZFXB
      ShowSubObject = B_Static
      HideSubObject = B_Fire HFX01 HFX02
      ParticleSysBone = TURRETEL EnN_EcmGattlingCannon_MissileJammerRing
    End
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE
    
    ConditionState = REALLYDAMAGED
      Model = NVOvrlrdZ_GD
      Animation = NVOvrlrdZ_GD.NVOvrlrdZ_GD
      ParticleSysBone = TURRETEL SmokeFactionMedium
      ParticleSysBone = TURRETEL SparksMedium
    End
    AliasConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED
    
    ; Firing Slow
    ConditionState = CONTINUOUS_FIRE_SLOW
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 0.5 0.5
      HideSubObject = B_Static
      ShowSubObject = B_Fire
    End
    AliasConditionState = CONTINUOUS_FIRE_SLOW WEAPONSET_PLAYER_UPGRADE
    
    ConditionState = CONTINUOUS_FIRE_SLOW REALLYDAMAGED
      Model = NVOvrlrdZ_GD
      Animation = NVOvrlrdZ_GD.NVOvrlrdZ_GD
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 0.5 0.5
      HideSubObject = B_Static
      ShowSubObject = B_Fire
      ParticleSysBone = TURRETEL SmokeFactionMedium
      ParticleSysBone = TURRETEL SparksMedium
    End
    AliasConditionState = CONTINUOUS_FIRE_SLOW WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED
    
    ; Firing Mean
    ConditionState = CONTINUOUS_FIRE_MEAN
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1 1
      HideSubObject = B_Static
      ShowSubObject = B_Fire
    End
    AliasConditionState = CONTINUOUS_FIRE_MEAN WEAPONSET_PLAYER_UPGRADE
    
    ConditionState = CONTINUOUS_FIRE_MEAN REALLYDAMAGED 
      Model = NVOvrlrdZ_GD
      Animation = NVOvrlrdZ_GD.NVOvrlrdZ_GD
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1 1
      HideSubObject = B_Static
      ShowSubObject = B_Fire
      ParticleSysBone = TURRETEL SmokeFactionMedium
      ParticleSysBone = TURRETEL SparksMedium
    End
    AliasConditionState = CONTINUOUS_FIRE_MEAN WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED
    
    ; Firing Fast
    ConditionState = CONTINUOUS_FIRE_FAST
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 2 2
      HideSubObject = B_Static
      ShowSubObject = B_Fire
      ParticleSysBone = MUZZLE01 GattlingMuzzleSmoke
      ParticleSysBone = MUZZLE02 GattlingMuzzleSmoke
    End
    
    ConditionState = CONTINUOUS_FIRE_FAST REALLYDAMAGED 
      Model = NVOvrlrdZ_GD
      Animation = NVOvrlrdZ_GD.NVOvrlrdZ_GD
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 2 2
      HideSubObject = B_Static
      ShowSubObject = B_Fire
      ParticleSysBone = MUZZLE01 GattlingMuzzleSmoke
      ParticleSysBone = MUZZLE02 GattlingMuzzleSmoke
      ParticleSysBone = TURRETEL SmokeFactionMedium
      ParticleSysBone = TURRETEL SparksMedium
    End
    
    ; Heat Rounds Firing Fast
    ConditionState = WEAPONSET_PLAYER_UPGRADE CONTINUOUS_FIRE_FAST
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 2 2
      HideSubObject = B_Static
      ShowSubObject = B_Fire HFX01 HFX02
      ParticleSysBone = MUZZLE01 GattlingMuzzleSmoke
      ParticleSysBone = MUZZLE02 GattlingMuzzleSmoke
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE CONTINUOUS_FIRE_FAST REALLYDAMAGED
      Model = NVOvrlrdZ_GD
      Animation = NVOvrlrdZ_GD.NVOvrlrdZ_GD
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 2 2
      HideSubObject = B_Static
      ShowSubObject = B_Fire HFX01 HFX02
      ParticleSysBone = MUZZLE01 GattlingMuzzleSmoke
      ParticleSysBone = MUZZLE02 GattlingMuzzleSmoke
      ParticleSysBone = TURRETEL SmokeFactionMedium
      ParticleSysBone = TURRETEL SparksMedium
    End
  End
  
  ; *** DESIGN PARAMETERS ***
  Side = ChinaTankGeneral
  EditorSorting = SYSTEM
  
  TransportSlotCount = 1
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY GattlingBuildingGun
    Weapon = SECONDARY GattlingBuildingGunAir
    PreferredAgainst = SECONDARY BALLISTIC_MISSILE AIRCRAFT
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY GattlingBuildingGunUpgraded
    Weapon = SECONDARY GattlingBuildingGunAirUpgraded
    PreferredAgainst = SECONDARY BALLISTIC_MISSILE AIRCRAFT
  End
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
  End
  
  VisionRange = 425
  
  ; *** AUDIO PARAMETERS ***
  UnitSpecificSounds
    VoiceRapidFire = HeavyVoiceRapidFire
  End

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD PORTABLE_STRUCTURE CLICK_THROUGH IGNORED_IN_GUI CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT FS_FAKE
  
  Body = StructureBody BodyTag_Structure
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = AIUpdateInterface AITag_Normal
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY
      TurretTurnRate = 180
      TurretPitchRate = 180
      AllowsPitch = Yes
      NaturalTurretPitch = 45
      MinIdleScanInterval = 250
      MaxIdleScanInterval = 250
      MinIdleScanAngle = 0
      MaxIdleScanAngle = 360
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_StealthDetector
    DetectionRate = 500
    CanDetectWhileContained = Yes
  End

  Behavior = DestroyDie DeathTag_All
  End

  ; Upgrades
  
  ; Chain Guns
  Behavior = WeaponBonusUpgrade ModuleTag_ChainGuns
    TriggeredBy = Upgrade_ChinaChainGuns
  End

  ; Heat Rounds
  Behavior = WeaponSetUpgrade ModuleTag_HeatRounds
    TriggeredBy = Upgrade_ChinaHeatRounds
  End
  
  ; ECM Decal
  ShadowTexture = SCC_ECM
  ShadowSizeX = 310
  ShadowSizeY = 310
End

