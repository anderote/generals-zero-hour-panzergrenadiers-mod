; China Rogue Dual Gattling Tank
Object ChinaTankGattling

  ; *** ART PARAMETERS ***
  SelectPortrait = DualGat
  ButtonImage = DualGat
  
  UpgradeCameo1 = Upgrade_ChinaChainGuns
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DOverlordTankDraw DrawTag_Main
    OkToChangeModelColor = Yes
    
    ; Idle
    DefaultConditionState        
      Model = NVDGatTank
      Animation = NVDGatTank.NVDGatTank
      AnimationMode = MANUAL
      Turret = TURRET
      TurretPitch = TURRETEL
      WeaponMuzzleFlash = PRIMARY MUZZLEFX01
      WeaponFireFXBone = PRIMARY MUZZLE01
      HideSubObject = TURRET_F
    End

    ConditionState = REALLYDAMAGED RUBBLE         
      Model = NVDGatTank_D
    End

    ; Attacking
    ConditionState = ATTACKING CONTINUOUS_FIRE_SLOW
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 0.5 0.5
    End

    ConditionState = ATTACKING CONTINUOUS_FIRE_MEAN
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1 1
    End

    ConditionState = ATTACKING CONTINUOUS_FIRE_FAST
      AnimationMode = LOOP
      ParticleSysBone = MUZZLE01 GattlingMuzzleSmoke
      AnimationSpeedFactorRange = 2 2
    End

    ; Attacking Damaged
    ConditionState = ATTACKING CONTINUOUS_FIRE_SLOW REALLYDAMAGED
      Model = NVDGatTank_D
      Animation = NVDGatTank_D.NVDGatTank_D
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 0.5 0.5
    End
    ConditionState = ATTACKING CONTINUOUS_FIRE_MEAN REALLYDAMAGED
      Model = NVDGatTank_D
      Animation = NVDGatTank_D.NVDGatTank_D
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1 1
    End

    ConditionState = ATTACKING CONTINUOUS_FIRE_FAST REALLYDAMAGED
      Model = NVDGatTank_D
      Animation = NVDGatTank_D.NVDGatTank_D
      AnimationMode = LOOP
      ParticleSysBone = MUZZLE01 GattlingMuzzleSmoke
      AnimationSpeedFactorRange = 2 2
    End

    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:DualGattlingTank
  
  Side = China
  EditorSorting = VEHICLE
  
  TransportSlotCount = 4

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY GattlingTankGun
    Weapon = SECONDARY GattlingTankGunAirDummy
    PreferredAgainst = SECONDARY AIRCRAFT
  End

  ArmorSet
    Conditions = None
    Armor = AntiAirVehicle
    DamageFX = TankDamageFX
  End
  
  BuildCost = 1100
  BuildTime = 10
  
  VisionRange = 225
  ShroudClearingRange = 400
  
  ExperienceValue = 75 75 125 176
  ExperienceRequired = 0 100 150 300
  IsTrainable = Yes
  
  CrusherLevel = 2 ; 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2 ; 0 = for infantry, 1 = for trees, 2 = general vehicles
  
  CommandSet = ChinaVehicleGattlingTankCommandSet


  ; *** AUDIO PARAMETERS ***
  VoiceSelect = GattlingTankVoiceSelect
  VoiceMove = GattlingTankVoiceMove
  VoiceGuard = GattlingTankVoiceMove
  VoiceAttack = GattlingTankVoiceAttack
  SoundMoveStart = GattlingTankMoveStart
  SoundMoveStartDamaged = GattlingTankMoveStart

  UnitSpecificSounds
    VoiceCreate = GattlingTankVoiceCreate
    VoiceCrush = GattlingTankVoiceCrush
    VoiceEnter = GattlingTankVoiceMove
    VoiceRapidFire  = GattlingTankVoiceRapid
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 400
    InitialHealth = 400
    ; Subdual Settings
    SubdualDamageCap = 800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = AIUpdateInterface ATTag_Normal
    Turret
      ControlledWeaponSlots = PRIMARY
      TurretTurnRate = 180
      TurretPitchRate = 180
      AllowsPitch = Yes
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End
  
  Locomotor = SET_NORMAL GattlingTankLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 40
  End
  
  ; Anti-air Gun
  Behavior = OverlordContain ContainTag_Overlord
    Slots = 1
    DamagePercentToUnits = 100%
    AllowInsideKindOf = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret = Yes
    PayloadTemplateName = ChinaGattlingTankTurretAir
    ExperienceSinkForRider = Yes
  End  
  
  ; Damage FX
  Behavior = TransitionDamageFX ModuleTag_DanageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
    
  ; Death FX
  Behavior = SlowDeathBehavior DeathTag_All
    ProbabilityModifier = 19
    DestructionDelay = 200
    DestructionDelayVariance = 100
    SinkRate = 0.5
    OCL = FINAL OCL_ChinaTankGattlingDebris
    FX  = FINAL FX_GattlingExplosionOneFinal
  End

  Behavior = CreateCrateDie CrateTag_Salvage
    CrateData = SalvageCrateData
  End

  ; Upgrades
  
  ; Chainguns
  Behavior = WeaponBonusUpgrade ModuleTag_Chainguns
    TriggeredBy = Upgrade_ChinaChainGuns
  End

  Geometry = BOX
  GeometryMajorRadius = 15
  GeometryMinorRadius = 10

  GeometryHeight = 15
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End

; Anti-air turret
Object ChinaGattlingTankTurretAir

  ; *** ART PARAMETERS ***
  Draw = W3DDependencyModelDraw DrawTag_Dependency
    OkToChangeModelColor = Yes
    AttachToBoneInContainer = FIREPOINT01

    DefaultConditionState
      Model = NVDGatTank_G
      Animation = NVDGatTank_G.NVDGatTank_G
      AnimationMode = MANUAL
      Turret = TURRETB
      TurretPitch = TURRETELB
      WeaponFireFXBone = SECONDARY MUZZLEB01
      WeaponMuzzleFlash = SECONDARY MUZZLEFXB01
    End
  
    ; Attacking
    ConditionState = ATTACKING CONTINUOUS_FIRE_SLOW
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 0.5 0.5
    End

    ConditionState = ATTACKING CONTINUOUS_FIRE_MEAN
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1 1
    End

    ConditionState = ATTACKING CONTINUOUS_FIRE_FAST
      AnimationMode = LOOP
      ParticleSysBone = MUZZLEB01 GattlingMuzzleSmoke
      AnimationSpeedFactorRange = 2 2
    End

    ; Attacking Damaged
    ConditionState = ATTACKING CONTINUOUS_FIRE_SLOW REALLYDAMAGED
      Model = NVDGatTank_GD
      Animation = NVDGatTank_GD.NVDGatTank_GD
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 0.5 0.5
    End
    ConditionState = ATTACKING CONTINUOUS_FIRE_MEAN REALLYDAMAGED
      Model = NVDGatTank_GD
      Animation = NVDGatTank_GD.NVDGatTank_GD
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1 1
    End

    ConditionState = ATTACKING CONTINUOUS_FIRE_FAST REALLYDAMAGED
      Model = NVDGatTank_GD
      Animation = NVDGatTank_GD.NVDGatTank_GD
      AnimationMode = LOOP
      ParticleSysBone = MUZZLEB01 GattlingMuzzleSmoke
      AnimationSpeedFactorRange = 2 2
    End
  End

  ; *** DESIGN PARAMETERS ***
  Side = China
  EditorSorting = SYSTEM
  
  TransportSlotCount = 1
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY None    
    Weapon = SECONDARY GattlingTankGunAir
    PreferredAgainst = SECONDARY AIRCRAFT
  End
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
  End
  
  VisionRange = 400

  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CLICK_THROUGH IGNORED_IN_GUI
  
  Body = StructureBody BodyTag_Structure
    MaxHealth = 400
    InitialHealth = 400
    ; Subdual Settings
    SubdualDamageCap = 800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface AITag_Normal
    Turret
      ControlledWeaponSlots = SECONDARY
      TurretTurnRate = 180
      TurretPitchRate = 180
      AllowsPitch = Yes
      NaturalTurretPitch = 45
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End

  Behavior = DestroyDie DeathTag_All
  End

  Geometry = BOX
  GeometryMajorRadius = 1
  GeometryMinorRadius = 1
  GeometryHeight = 1
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End