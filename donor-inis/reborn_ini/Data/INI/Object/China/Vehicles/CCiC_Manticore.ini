; China Commander In Chief Manticore
Object CCiC_ChinaVehicleManticore

  ; *** ART Parameters ***
  SelectPortrait = SNManticore_XL
  ButtonImage = SNManticore_L
  
  UpgradeCameo1 = Upgrade_ChinaManticoreHydraAssaultPackage
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DModelDraw DrawTag_Main
    
    OkToChangeModelColor = Yes
    
    InitialRecoilSpeed = 100
    RecoilSettleSpeed = 4
    MaxRecoilDistance = 3

    ; Default
    DefaultConditionState
      Model = NVManticore
      Animation = NVMntcr_STA.NVMntcr_STA
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST
      WeaponFireFXBone = PRIMARY WEAPONA
      WeaponRecoilBone = PRIMARY Barrel
      WeaponLaunchBone = PRIMARY WEAPONA
      TurretPitch = TURRETEL
      WeaponFireFXBone = SECONDARY MUZZLE
      WeaponMuzzleFlash = SECONDARY MUZZLEFX
      WeaponLaunchBone = SECONDARY MUZZLE
      TransitionKey = TRANS_Stand
      HideSubObject = UPGRADE
    End
    
    ConditionState = REALLYDAMAGED
      Model = NVManticore_D
      TransitionKey = TRANS_Stand_D
    End

    ; Moving
    ConditionState = MOVING
      Animation = NVMntcr_WLK.NVMntcr_WLK ; 30
      AnimationMode = LOOP
      Flags = RANDOMSTART
      AnimationSpeedFactorRange = 1.5 1.5
      TransitionKey = TRANS_Walk
    End
    AliasConditionState = MOVING ATTACKING
    
    ConditionState = MOVING REALLYDAMAGED
      Model = NVManticore_D
      Animation = NVMntcr_WLK.NVMntcr_WLK ; 30
      AnimationMode = LOOP
      Flags = RANDOMSTART
      AnimationSpeedFactorRange = 1.5 1.5
      TransitionKey = TRANS_Walk_D
    End
    AliasConditionState = MOVING ATTACKING REALLYDAMAGED
    
    ; Attacking
    ConditionState = FIRING_A
      Animation = NVMntcr_ATA.NVMntcr_ATA
      AnimationMode = ONCE
      TransitionKey = TRANS_Fire
    End
    ConditionState = BETWEEN_FIRING_SHOTS_A
      Animation = NVMntcr_ATA.NVMntcr_ATA
      AnimationMode = MANUAL
      WaitForStateToFinishIfPossible = TRANS_Fire
    End
    AliasConditionState = PREATTACK_A
    AliasConditionState = RELOADING_A
    AliasConditionState = FIRING_B
    AliasConditionState = BETWEEN_FIRING_SHOTS_B
    AliasConditionState = PREATTACK_B
    AliasConditionState = RELOADING_B
    
    ConditionState = FIRING_A REALLYDAMAGED
      Model = NVManticore_D
      Animation = NVMntcr_ATA.NVMntcr_ATA
      AnimationMode = ONCE
      TransitionKey = TRANS_Fire_D
    End
    ConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED
      Model = NVManticore_D
      Animation = NVMntcr_ATA.NVMntcr_ATA
      AnimationMode = MANUAL
      WaitForStateToFinishIfPossible = TRANS_Fire_D
    End
    AliasConditionState = PREATTACK_A REALLYDAMAGED
    AliasConditionState = RELOADING_A REALLYDAMAGED
    AliasConditionState = FIRING_B REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_B REALLYDAMAGED
    AliasConditionState = PREATTACK_B REALLYDAMAGED
    AliasConditionState = RELOADING_B REALLYDAMAGED
    
    ;Turn animations
    ConditionState = MOVING CENTER_TO_LEFT
      Animation = NVMntcr_TL.NVMntcr_TL ; 30
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = MOVING CENTER_TO_LEFT ATTACKING
    AliasConditionState = MOVING LEFT_TO_CENTER
    AliasConditionState = MOVING LEFT_TO_CENTER ATTACKING
    
    ConditionState = MOVING CENTER_TO_RIGHT
      Animation = NVMntcr_TR.NVMntcr_TR ; 30
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = MOVING CENTER_TO_RIGHT ATTACKING
    AliasConditionState = MOVING RIGHT_TO_CENTER
    AliasConditionState = MOVING RIGHT_TO_CENTER ATTACKING
    
    ConditionState = MOVING CENTER_TO_LEFT REALLYDAMAGED
      Model = NVManticore_D
      Animation = NVMntcr_TL.NVMntcr_TL ; 30
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = MOVING CENTER_TO_LEFT REALLYDAMAGED ATTACKING
    AliasConditionState = MOVING LEFT_TO_CENTER REALLYDAMAGED
    AliasConditionState = MOVING LEFT_TO_CENTER REALLYDAMAGED ATTACKING
    
    ConditionState = MOVING CENTER_TO_RIGHT REALLYDAMAGED
      Model = NVManticore_D
      Animation = NVMntcr_TR.NVMntcr_TR ; 30
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = MOVING CENTER_TO_RIGHT REALLYDAMAGED ATTACKING
    AliasConditionState = MOVING RIGHT_TO_CENTER REALLYDAMAGED
    AliasConditionState = MOVING RIGHT_TO_CENTER REALLYDAMAGED ATTACKING
  End
  
  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Manticore
  
  Side = ChinaInfantryGeneral
  EditorSorting = VEHICLE
  
  TransportSlotCount = 3
  
  WeaponSet
    Conditions = None
    Weapon = PRIMARY ManticoreCannon
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
  End
  
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY ManticoreCannon
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
    Weapon = SECONDARY ManticoreMachineGun
    PreferredAgainst = SECONDARY INFANTRY
    AutoChooseSources = SECONDARY FROM_PLAYER FROM_SCRIPT FROM_AI
  End
  
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 1000
  BuildTime = 14
  
  VisionRange = 150
  ShroudClearingRange = 300
  
  ExperienceValue = 100 100 200 400
  ExperienceRequired = 0 150 300 600
  IsTrainable = Yes
  
  CrusherLevel = 2 ; 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2 ; 0 = for infantry, 1 = for trees, 2 = general vehicles
  
  CommandSet = ChinaVehicleManticoreCommandSet
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = ChinaDroneVoiceSelect
  VoiceMove = ChinaDroneVoiceSelect
  VoiceGuard = ChinaDroneVoiceSelect
  VoiceAttack = ChinaDroneVoiceSelect
  ; Engine Sounds
  SoundMoveStart = ManticoreMoveStart
  SoundMoveStartDamaged = ManticoreMoveStart
  UnitSpecificSounds
    VoiceCreate = ChinaDroneVoiceCreate
    VoiceCrush = ChinaDroneVoiceSelect
    VoiceEnter = ChinaDroneVoiceSelect
  End
  
  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 600
    InitialHealth = 600
    ; Subdual Settings
    SubdualDamageCap = 1200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
    
  Behavior = AIUpdateInterface AITag_Normal
    Turret
      TurretTurnRate = 0
      TurretPitchRate = 180
      AllowsPitch = Yes
      MinPhysicalPitch = -45
      NaturalTurretAngle = 0
      ControlledWeaponSlots = SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End
  Locomotor = SET_NORMAL ManticoreLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 40
  End
  
  Behavior = AnimationSteeringUpdate ModuleTag_AnimSteer
    MinTransitionTime = 0
  End
  
  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End
  
  Behavior = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  
  ; Death FX
  Behavior = SlowDeathBehavior ModuleTag_12
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 25
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL OCL_ManticoreDeathEffect
    FX = FINAL FX_BattleMasterExplosionOneFinal
  End
  
  Behavior = InstantDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_CarCrush
    OCL = OCL_CrusaderTank_CrushEffect
  End
  
  ; Salvage Crate
  Behavior = CreateCrateDie CrateTag_Salvage
    CrateData = SalvageCrateData
  End  
  
  Behavior = FlammableUpdate ModuleTag_Fire
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End
  
  ; Hydra Upgrade
  Behavior = WeaponSetUpgrade ModuleTag_Hydra1
    TriggeredBy = Upgrade_ChinaManticoreHydraAssaultPackage
  End
  Behavior = SubObjectsUpgrade ModuleTag_Hydra2
    TriggeredBy = Upgrade_ChinaManticoreHydraAssaultPackage
    HideSubObjects = ANTENNA
    ShowSubObjects = UPGRADE
  End
  
  Geometry = BOX
  GeometryMajorRadius = 13
  GeometryMinorRadius = 9
  GeometryHeight = 10
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End