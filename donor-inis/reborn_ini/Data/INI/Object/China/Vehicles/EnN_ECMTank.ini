; China EMP and Napalm Gen ECM Tank
Object Tank_ChinaTankECM

  ; *** ART PARAMETERS ***
  SelectPortrait = SNbanshee_L
  ButtonImage = SNbanshee
  
  Draw = W3DTankDraw DrawTag_Main
    OkToChangeModelColor = Yes
    
    ExtraPublicBone = WEAPONA01

    DefaultConditionState
      Model = NVBANSHEE
      Turret = TURRET01
    End
    ConditionState = REALLYDAMAGED
      Model = NVBANSHEE_D
    End
    AliasConditionState = RUBBLE
    
    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 4
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:ECMTank
  
  Side = ChinaTankGeneral
  EditorSorting = VEHICLE
  
  TransportSlotCount = 3

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY  ECMTankVehicleDisabler
  End

  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 800
  BuildTime = 10
  
  VisionRange = 200
  ShroudClearingRange = 300
  
  ExperienceValue = 50 50 100 150
  ExperienceRequired = 0 100 150 300
  IsTrainable = Yes
  
  CrusherLevel = 2
  CrushableLevel = 2
  
  CommandSet = Tank_ChinaVehicleECMTankCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = FrequencyJammerVoiceSelect
  VoiceMove = FrequencyJammerVoiceMove
  VoiceGuard = FrequencyJammerVoiceMove
  VoiceAttack = FrequencyJammerVoiceAttack
  ; engine sounds
  SoundMoveStart  = MicrowaveTankMoveStart
  SoundMoveStartDamaged = MicrowaveTankMoveStart

  UnitSpecificSounds
    VoiceCreate = FrequencyJammerVoiceCreate
    VoiceCrush = FrequencyJammerVoiceMove
    VoiceEnter = FrequencyJammerVoiceMove
    TurretMoveLoop = TurretMoveLoopLoud    
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE CANNOT_RETALIATE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 300
    InitialHealth = 300

    ; subdual settings
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = AIUpdateInterface AITag_Normal
    Turret
      ControlledWeaponSlots = PRIMARY
      TurretTurnRate = 180
      FiresWhileTurning = No
      MinIdleScanInterval = 0
      MaxIdleScanInterval = 0
      RecenterTime = 0
      MinIdleScanAngle = 180
      MaxIdleScanAngle = 180
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End
  
  Locomotor = SET_NORMAL GattlingTankLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 40
  End
    
  Behavior = CommandButtonHuntUpdate ModuleTag_Hunt
  End
  
  ; missile jammer
  Behavior = FireWeaponUpdate ModuleTag_MissileJammer
    Weapon = ECMTankMissileJammer
    ExclusiveWeaponDelay = 1000
  End
  
  ; Radius Decal
  Behavior = OverlordContain ContainTag_Decal01
    Slots = 1
    DamagePercentToUnits = 100%
    AllowInsideKindOf = PORTABLE_STRUCTURE
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Decal02
    UpgradeObject = OCL_ECMTank_JammerRadiusDecal
    TriggeredBy = Upgrade_GLAWorkerFakeCommandSet
  End
  
  Behavior = GrantUpgradeCreate ModuleTag_Decal03
    UpgradeToGrant = Upgrade_GLAWorkerFakeCommandSet
    ExemptStatus = UNDER_CONSTRUCTION
  End

  ; damage fx
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  
  ; death fx
  Behavior = SlowDeathBehavior DeathTag_All
    DestructionDelay = 200
    DestructionDelayVariance = 100
    SinkRate = 0.5
    OCL = FINAL OCL_ChinaTankECMDebris
    FX = FINAL FX_GattlingExplosionOneFinal
  End

  ; salvage
  Behavior = CreateCrateDie CrateTag_Salvage
    CrateData = SalvageCrateData
  End
  
  ; Upgrade and Bonuses
  
  ; Special Weapons Training
  Behavior = VeterancyGainCreate CreateTag_Veterancy
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_SpecWeapTraining
  End
 
  Geometry = BOX
  GeometryMajorRadius = 15
  GeometryMinorRadius = 10
  GeometryHeight = 15
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45

End

; ECM Missile Jammer Radius Decal
Object ECMTank_JammerRadiusDecal

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    
    DefaultConditionState
      Model = EXDecal
    End

  End

  ; *** DESIGN PARAMETERS ***
  Side = China
  EditorSorting = SYSTEM
  
  TransportSlotCount = 1
    
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
  End
  
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD PORTABLE_STRUCTURE CLICK_THROUGH IGNORED_IN_GUI FS_FAKE
  
  Body = StructureBody BodyTag_Structure
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = AIUpdateInterface AITag_Normal
  End
  
  Behavior = DestroyDie DeathTag_All
  End

  Geometry = BOX
  GeometryMajorRadius = 1
  GeometryMinorRadius = 1
  GeometryHeight = 1
  GeometryIsSmall = No
  
  ; Shadow = SHADOW_VOLUME
  ; ShadowSizeX = 45
  
  ShadowTexture = SCC_ECM
  ShadowSizeX = 310
  ShadowSizeY = 310

End