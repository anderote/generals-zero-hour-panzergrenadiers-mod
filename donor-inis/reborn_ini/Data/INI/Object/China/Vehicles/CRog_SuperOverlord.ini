; China Rogue Super Overlord
Object ChinaTankOverlord ;Uberlord

  ; *** ART PARAMETERS ***
  SelectPortrait = SuperOverlord
  ButtonImage = SuperOverlord
  
  UpgradeCameo1 = Upgrade_ChinaHeatRounds
  UpgradeCameo2 = Upgrade_ChinaUraniumShells
  UpgradeCameo3 = Upgrade_ChinaNuclearTanks
  
  Draw = W3DOverlordTankDraw DrawTag_Main
    DefaultConditionState
      Model = Uberlord
      Animation = Uberlord.Uberlord
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 0.5 0.5
      Turret = Turret01
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponRecoilBone = PRIMARY Barrel
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponLaunchBone = PRIMARY Muzzle
      WeaponFireFXBone = SECONDARY MuzzleGat
      WeaponLaunchBone = SECONDARY MuzzleGat
      WeaponMuzzleFlash = SECONDARY MuzzleFXGat
      WeaponFireFXBone = TERTIARY MuzzleGat
      WeaponLaunchBone = TERTIARY MuzzleGat
    End
    AliasConditionState = ATTACKING
    
    ; Attacking with Gatt
    ConditionState = ATTACKING USING_WEAPON_B
      AnimationMode = LOOP
    End
    AliasConditionState = ATTACKING USING_WEAPON_B CONTINUOUS_FIRE_SLOW
    AliasConditionState = ATTACKING USING_WEAPON_B CONTINUOUS_FIRE_MEAN
    AliasConditionState = ATTACKING USING_WEAPON_B CONTINUOUS_FIRE_FAST
    
    ConditionState = ATTACKING USING_WEAPON_C
      AnimationMode = LOOP
      WeaponMuzzleFlash = TERTIARY MuzzleFXGat
    End
    AliasConditionState = ATTACKING USING_WEAPON_C CONTINUOUS_FIRE_SLOW
    AliasConditionState = ATTACKING USING_WEAPON_C CONTINUOUS_FIRE_MEAN
    AliasConditionState = ATTACKING USING_WEAPON_C CONTINUOUS_FIRE_FAST
    
    ; Damaged
    ConditionState = REALLYDAMAGED
      Model = Uberlord_D
      Animation = Uberlord_D.Uberlord_D
    End
    AliasConditionState = REALLYDAMAGED ATTACKING
    
    ; Damaged Attacking with Gatt
    ConditionState = REALLYDAMAGED ATTACKING USING_WEAPON_B
      Model = Uberlord_D
      Animation = Uberlord_D.Uberlord_D
      AnimationMode = LOOP
    End
    AliasConditionState = REALLYDAMAGED ATTACKING USING_WEAPON_B CONTINUOUS_FIRE_SLOW
    AliasConditionState = REALLYDAMAGED ATTACKING USING_WEAPON_B CONTINUOUS_FIRE_MEAN
    AliasConditionState = REALLYDAMAGED ATTACKING USING_WEAPON_B CONTINUOUS_FIRE_FAST
    
    ConditionState = REALLYDAMAGED ATTACKING USING_WEAPON_C
      Model = Uberlord_D
      Animation = Uberlord_D.Uberlord_D
      AnimationMode = LOOP
      WeaponMuzzleFlash = TERTIARY MuzzleFXGat
    End
    AliasConditionState = REALLYDAMAGED ATTACKING USING_WEAPON_C CONTINUOUS_FIRE_SLOW
    AliasConditionState = REALLYDAMAGED ATTACKING USING_WEAPON_C CONTINUOUS_FIRE_MEAN
    AliasConditionState = REALLYDAMAGED ATTACKING USING_WEAPON_C CONTINUOUS_FIRE_FAST

    ConditionState = RUBBLE
      Model = NVOvrlrdT_D1
      WeaponMuzzleFlash = SECONDARY MuzzleFXGat
      WeaponMuzzleFlash = TERTIARY MuzzleFXGat
    End

    TrackMarks = EXTnkTrack.tga
    OkToChangeModelColor = Yes
    TreadAnimationRate = 2
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.6
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:SuperOverlord
  
  Side = China
  EditorSorting = VEHICLE
  
  TransportSlotCount = 5
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY SuperOverlordTankGun
    Weapon = SECONDARY GattlingBuildingGun
    Weapon = TERTIARY GattlingBuildingGunAir
    ;PreferredAgainst = TERTIARY BALLISTIC_MISSILE AIRCRAFT
  End
  
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY SuperOverlordTankGun
    Weapon = SECONDARY GattlingBuildingGunUpgraded
    Weapon = TERTIARY GattlingBuildingGunAirUpgraded
    ;PreferredAgainst = SECONDARY BALLISTIC_MISSILE AIRCRAFT
  End
  
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 3000
  BuildTime = 35
  
  VisionRange = 200
  ShroudClearingRange = 250
  
  Prerequisites
    Object = ChinaPropagandaCenter
  End

  ExperienceValue = 250 250 500 750   ;Experience point value at each level
  ExperienceRequired = 0 500 750 1500  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 3  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 3  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = SuperOverlordCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = EmperorTankVoiceSelect
  SoundMoveStart = OverlordTankMoveStart
  SoundMoveStartDamaged = OverlordTankMoveStart
  VoiceMove = EmperorTankVoiceMove
  VoiceGuard = EmperorTankVoiceMove
  VoiceAttack = OverlordTankVoiceAttack

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate          = OverlordTankVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = OverlordTankTurretMoveLoop
    VoiceCrush = OverlordTankVoiceCrush
    VoiceEnter = EmperorTankVoiceMove
    VoiceUnload     = OverlordTankVoiceUnload
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE HUGE_VEHICLE
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 2200.0
    InitialHealth   = 2200.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 2200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = TransportAIUpdate ModuleTag_03
    Turret
      TurretTurnRate = 80 ;30 ;15   // turn rate, in degrees per sec
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End

  Locomotor = SET_NORMAL OverlordLocomotor
  Locomotor = SET_NORMAL_UPGRADED NuclearOverlordLocomotor

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_04
    DeathWeapon   = NuclearTankDeathWeapon
    StartsActive  = No                        ; turned on by upgrade
    TriggeredBy   = Upgrade_ChinaNuclearTanks
  End
 
  Behavior = LocomotorSetUpgrade ModuleTag_05
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End

  ;Behavior = OverlordContain ModuleTag_06 ; Like Transport, but when full, passes transport queries along to first passenger (redirects like tunnel) 
    ;Slots                 = 1
    ;DamagePercentToUnits  = 100%
    ;AllowInsideKindOf     = PORTABLE_STRUCTURE
    ;PassengersAllowedToFire = Yes
    ;PassengersInTurret = Yes ; My passengers ride in my turret, that's where the Firepoint bones are
    ;ExperienceSinkForRider = Yes ; I get the Exp for things my turret friend kills
  ;End

  Behavior = PhysicsBehavior ModuleTag_14
    Mass = 50.0
  End
  
  Behavior        = PropagandaTowerBehavior ModuleTag_22 ;ModulePropaganda_04
    Radius                = 100
    DelayBetweenUpdates   = 2000 ; in milliseconds
    HealPercentEachSecond = 3%   ; get this % of max health every second 
    PulseFX               = FX_PropagandaTowerPropagandaPulse ;plays as often as DelayBetweenUpdates
    UpgradeRequired       = Upgrade_ChinaSubliminalMessaging
    UpgradedHealPercentEachSecond = 5%   ; get this % of max health every second 
    UpgradedPulseFX       = FX_PropagandaTowerSubliminalPulse ;plays as often as DelayBetweenUpdates
    AffectsSelf           = Yes ; Needs this since Tower is not seperate object for Emperor
  End

  ; Just explode death
  Behavior = SlowDeathBehavior ModuleTag_16
    ProbabilityModifier = 25
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL    OCL_ChinaTankOverlordDebris
    FX  = FINAL    FX_OverlordExplosionOneFinal
  End
  Behavior = CreateCrateDie ModuleTag_17
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End

  Behavior = TransitionDamageFX ModuleTag_18
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_OverlordDamageTransition
  End

  Behavior = TransportContain  ModuleTag_19
    PassengersAllowedToFire = Yes
    Slots               = 5
    EnterSound          = GarrisonEnter
    ExitSound           = GarrisonExit
    DamagePercentToUnits = 100% 
    AllowInsideKindOf  = INFANTRY
    ExitDelay = 100
    NumberOfExitPaths = 3 ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit = Yes ; AI Will tell people to set their mood to Aggressive on exiting
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  ; Heat Rounds
  Behavior = WeaponSetUpgrade ModuleTag_HeatRounds
    TriggeredBy = Upgrade_ChinaHeatRounds
  End

  Geometry = BOX
  GeometryMajorRadius = 26.0
  GeometryMinorRadius = 13.0
  GeometryHeight = 15.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME     
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length

End