; EMP and Napalm Gen Dragon Tank
Object Tank_ChinaTankDragon

  ; *** ART PARAMETERS ***
  SelectPortrait = SNRageDragon_XL
  ButtonImage = SNRageDragon_L
  
  UpgradeCameo1 = Upgrade_ChinaEnhancedBlackNapalm
  ;UpgradeCameo2 = None
  ;UpgradeCameo3 = None
  ;UpgradeCameo4 = None
  ;UpgradeCameo5 = None
  
  Draw = W3DTankDraw DrawTag_Main
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = NVRgDragon
      Turret = TURRET
      TurretPitch = TURRETEL
      WeaponFireFXBone = PRIMARY WEAPONA01
      WeaponLaunchBone = PRIMARY WEAPONA01
      WeaponFireFXBone = SECONDARY WEAPONA01
      WeaponLaunchBone = SECONDARY WEAPONA01
    End
    ConditionState = REALLYDAMAGED
      Model = NVRgDragon_D
    End
    AliasConditionState = RUBBLE
    
    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2
    TreadDriveSpeedFraction = 0.3
    TreadPivotSpeedFraction = 0.7
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:RagingDragonTank
  
  Side = ChinaTankGeneral
  EditorSorting = VEHICLE
  
  TransportSlotCount = 3

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY Tank_DragonTankFlameWeapon
    Weapon = SECONDARY DragonTankFireWallWeaponUpgraded
    AutoChooseSources = SECONDARY NONE
  End
  
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY Tank_DragonTankFlameWeaponUpgraded
    Weapon = SECONDARY DragonTankFireWallWeaponEnhanced
    AutoChooseSources = SECONDARY NONE
    WeaponLockSharedAcrossSets = Yes
  End

  ArmorSet
    Conditions = None
    Armor = DragonTankArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 800
  BuildTime = 10
  
  VisionRange = 125
  ShroudClearingRange = 300
  
  ExperienceValue = 50 50 100 150
  ExperienceRequired = 0 100 150 300
  IsTrainable = Yes
  
  CrusherLevel = 2
  CrushableLevel = 2
  
  CommandSet = ChinaTankDragonCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = DragonTankVoiceSelect
  VoiceMove = DragonTankVoiceMove
  VoiceGuard = DragonTankVoiceMove
  VoiceAttack = DragonTankVoiceAttack
  ; Engine Sounds
  SoundMoveStart = DragonTankMoveStart
  SoundMoveStartDamaged = DragonTankMoveStart

  UnitSpecificSounds
    VoiceCreate = DragonTankVoiceCreate
    VoiceEnter = DragonTankVoiceMove
    VoiceFlameLocation = DragonTankVoiceFireStorm
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE
  
  Body = ActiveBody ModuleTag_02
    MaxHealth = 300
    InitialHealth = 300
    ; Subdual Settings
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface AITag_Normal
    Turret
      TurretTurnRate = 120
      TurretPitchRate = 120
      AllowsPitch = Yes
      MinPhysicalPitch = -15
      ; Turret Sweep
      TurretFireAngleSweep = PRIMARY 10
      TurretFireAngleSweep = SECONDARY 60
      TurretSweepSpeedModifier = PRIMARY 0.5
      TurretSweepSpeedModifier = SECONDARY 2.0
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End
  
  Locomotor = SET_NORMAL DragonLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End
  
  ; Damage FX
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem2 = Bone:Smoke RandomBone:Yes Psys:DragonTransitionFire
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_DragonDamageTransition
  End

  ; Death FX
  Behavior = SlowDeathBehavior DeathTag_All
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 500
    DestructionDelayVariance = 500
    FX = INITIAL FX_BattleMasterExplosionOneFinal
    OCL = FINAL OCL_DragonDebris
    FX = FINAL FX_DragonTankDeathExplosionFinal
  End
  
  Behavior = InstantDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FX_CarCrush
    OCL = OCL_CrusaderTank_CrushEffect
  End
  
  ; Salvage Crate
  Behavior = CreateCrateDie CrateTag_Salvage
    CrateData = SalvageCrateData
  End
  
  ; Upgrades

  ; Special Weapons Training
  Behavior = VeterancyGainCreate VeterancyTag_SpecWeapTraining
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_SpecWeapTraining
  End

  ; Enhanced Black Napalm
  Behavior = WeaponSetUpgrade UpgradeTag_PureNapalm
    TriggeredBy = Upgrade_ChinaEnhancedBlackNapalm
  End

  Geometry = BOX
  GeometryMajorRadius = 15
  GeometryMinorRadius = 10
  GeometryHeight = 11
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 45
End