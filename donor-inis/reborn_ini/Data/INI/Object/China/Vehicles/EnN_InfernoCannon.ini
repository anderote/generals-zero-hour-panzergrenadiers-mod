; EMP and Napalm Inferno Cannon
Object EnN_ChinaVehicleInfernoCannon

  ; *** ART PARAMETERS ***
  SelectPortrait = SNInferno_L
  ButtonImage = SNInferno
  
  UpgradeCameo1 = Upgrade_ChinaEnhancedBlackNapalm
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTankDraw DrawTag_Main
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = NVInferno
      Turret = TURRET
      TurretPitch = TURRETEL
      WeaponFireFXBone = PRIMARY MUZZLE
      WeaponRecoilBone = PRIMARY BARREL
      WeaponMuzzleFlash = PRIMARY MUZZLEFX
      WeaponLaunchBone = PRIMARY MUZZLE
    End
    
    ConditionState = REALLYDAMAGED
      Model = NVInferno_D
    End
    AliasConditionState = RUBBLE
    
    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:InfernoCannon
  
  Side = ChinaTankGeneral
  EditorSorting = VEHICLE
  
  TransportSlotCount = 3
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY InfernoCannonGun_Upgraded
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY InfernoCannonGun_Enhanced
  End
  
  ArmorSet
    Conditions = None
    Armor = TankArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 900
  BuildTime = 15
  
  VisionRange = 200
  ShroudClearingRange = 200
  
  Prerequisites
    Object = Tank_ChinaPropagandaCenter
  End

  ExperienceValue = 50 50 100 150
  ExperienceRequired = 0 100 200 400
  IsTrainable = Yes
  
  CrusherLevel = 2
  CrushableLevel = 2
  
  CommandSet = ChinaVehicleInfernoCannonCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = InfernoCannonVoiceSelect
  VoiceMove = InfernoCannonVoiceMove
  VoiceGuard = InfernoCannonVoiceMove
  VoiceAttack = InfernoCannonVoiceAttack
  ; engine sounds
  SoundMoveStart = InfernoCannonMoveStart
  SoundMoveStartDamaged = InfernoCannonMoveStart
  
  UnitSpecificSounds
    VoiceCreate = InfernoCannonVoiceCreate
    VoiceCrush = InfernoCannonVoiceCrush
    VoiceEnter = InfernoCannonVoiceMove
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK VEHICLE SCORE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 120
    InitialHealth = 120
    ; subdual settings
    SubdualDamageCap = 240
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = DeployStyleAIUpdate AITag_Deploy
  ;; New system for artillery, they can now auto aquire targets. But they can't shoot while on the move - Zeke
    Turret
      TurretTurnRate = 100
      TurretPitchRate = 100
      FirePitch = 45
      AllowsPitch = Yes
      RecenterTime = 3000
      ControlledWeaponSlots = PRIMARY SECONDARY
      InitiallyDisabled = Yes
    End
    AutoAcquireEnemiesWhenIdle = Yes NOTWHILEATTACKING ATTACK_BUILDINGS
    PackTime = 1
    UnpackTime = 1
    TurretsFunctionOnlyWhenDeployed = Yes
    TurretsMustCenterBeforePacking = Yes
  End
  Locomotor = SET_NORMAL InfernoLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End
  
  ; damage fxs
  Behavior = TransitionDamageFX FXTag_TransDamage
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:-7 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  ; unit deaths
  
  ; default death
  Behavior = SlowDeathBehavior DeathTag_All
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 2000
    DestructionDelayVariance = 500
    FX = INITIAL FX_CrusaderCatchFire  
    FX = FINAL FX_GenericTankDeathExplosion 
    OCL = FINAL OCL_InfernoCannonDeathEffect
  End
  
  ; crushed death
  Behavior = InstantDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    FX = FINAL FX_CarCrush
    OCL = FINAL OCL_CrusaderTank_CrushEffect
  End
  
  ; salvage crate
  Behavior = CreateCrateDie CrateTag_Salvage
    CrateData = SalvageCrateData
  End
  
  ; Upgrades and Bonuses
  
  ; Artillery Training
  Behavior = VeterancyGainCreate VeterancyTag_ArtyTraining
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_ArtilleryTraining
  End
  
  ; Special Weapons Training
  Behavior = VeterancyGainCreate VeterancyTag_SpecTraining
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_SpecWeapTraining
  End
  
  ; Enhanced Black Napalm
  Behavior = WeaponSetUpgrade UpgradeTag_Weapon
    TriggeredBy = Upgrade_ChinaEnhancedBlackNapalm
  End

  Geometry = BOX
  GeometryMajorRadius = 15
  GeometryMinorRadius = 10
  GeometryHeight = 15
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_VOLUME 
  ShadowSizeX = 45

End