; China Commander In Chief Troop Crawler
Object Infa_ChinaVehicleTroopCrawler

  ; *** ART PARAMETERS ***
  SelectPortrait = SNAsltTroop_L
  ButtonImage = SNAsltTroop
  
  ;UpgradeCameo1 = NONE
  
  Draw = W3DTruckDraw DrawTag_Main
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = NVTClrI
    End
    
    ConditionState = REALLYDAMAGED
      Model = NVTClrI_D
    End
    AliasConditionState = RUBBLE

    TrackMarks = EXTireTrack.tga

    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    
    LeftFrontTireBone = Wheel01
    RightFrontTireBone = Wheel08
    LeftRearTireBone = Wheel03
    RightRearTireBone = Wheel05
    MidLeftFrontTireBone = Wheel02
    MidRightFrontTireBone = Wheel07
    MidLeftRearTireBone = Wheel04
    MidRightRearTireBone = Wheel06

    TireRotationMultiplier = 0.2
    PowerslideRotationAddition = 0
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:AssaultTroopTransport
  
  Side = ChinaInfantryGeneral
  EditorSorting = VEHICLE
  
  TransportSlotCount = 8
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY ChinaVehicleTroopCrawlerDummyWeapon
  End
  
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY Infa_ChinaVehicleTroopCrawlerDummyWeapon
  End
  
  ArmorSet
    Conditions = None
    Armor = AssaultCrawlerArmor
    DamageFX = TankDamageFX
  End
  
  BuildCost = 1200 ;2000
  BuildTime = 15 ;20
  
  VisionRange = 200 ;175
  ShroudClearingRange = 400
  
  ExperienceValue = 50 100 150 200
  ExperienceRequired = 0 40 80 120
  IsTrainable = Yes
  
  CrusherLevel = 2 ; 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2 ; 0 = for infantry, 1 = for trees, 2 = general vehicles
  
  CommandSet = Infa_ChinaTroopCrawlerCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = AssaultTroopCrawlerVoiceSelect
  VoiceMove = TroopCrawlerVoiceMove
  VoiceGuard = TroopCrawlerVoiceMove
  VoiceAttack = AssaultTroopCrawlerVoiceAttack
  ; Engine Sounds
  SoundMoveStart = TroopCrawlerMoveStart
  SoundMoveStartDamaged = TroopCrawlerMoveStart
  ; Transport Sounds
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit
  UnitSpecificSounds
    VoiceCreate = AssaultTroopCrawlerVoiceCreate
    VoiceCrush = TroopCrawlerVoiceCrush
    VoiceUnload = TroopCrawlerVoiceUnload
    VoiceEnter = TroopCrawlerVoiceMove
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK TRANSPORT VEHICLE SCORE
  
  Body = ActiveBody BodyTag_Main
    MaxHealth = 360
    InitialHealth = 360
    ; Subdual Settings
    SubdualDamageCap = 720
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_StealthDetect
    DetectionRate = 900
    DetectionRange = 350 ; normal defense anti-ground range (275) +75
    CanDetectWhileGarrisoned = No
    CanDetectWhileContained = No
    PingSound = IRPing
    LoudPingSound = IRPingLoud
    IRParticleSysName = IRDetectSonar
    IRBrightParticleSysName = IRDetectSonarBright
    ;IRGridParticleSysName = IRDetectGrid
    IRBeaconParticleSysName = IRLenzflare
    IRParticleSysBone = IRFX
  End

  Behavior = TransportAIUpdate AITag_Transport
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 250
  End

  Locomotor = SET_NORMAL TroopCrawlerLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End
  
  Behavior = TransportContain ModuleTag_06
    PassengersAllowedToFire = Yes
    Slots = 8
    InitialPayload = Infa_ChinaInfantryMiniGunner 4 ;8
    ScatterNearbyOnExit = Yes
    HealthRegen%PerSec = 10
    DamagePercentToUnits = 50% ;10%
    AllowInsideKindOf = INFANTRY
    ExitDelay = 250
    NumberOfExitPaths = 3
    GoAggressiveOnExit = Yes
    ArmedRidersUpgradeMyWeaponSet = Yes
  End

  Behavior = SlowDeathBehavior DeathTag_All
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 1
    FX  = FINAL FX_SupplyTruckExplosionOneFinal
    OCL = FINAL OCL_FinalAssaultTroopCrawlerDebris
  End
  
  Behavior = SlowDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    DestructionDelay = 1
    FX = FINAL FX_CarCrush
    OCL = FINAL OCL_FinalTroopCrawlerDebris
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End

  ; Salvage Crate
  Behavior = CreateCrateDie ModuleTag_Salvage
    CrateData = SalvageCrateData
  End

  Behavior = PropagandaTowerBehavior ModuleTag_Propaganda
    Radius = 100
    DelayBetweenUpdates = 2500
    HealPercentEachSecond = 2%
    PulseFX = FX_PropagandaTowerPropagandaPulse
    UpgradeRequired = Upgrade_ChinaSubliminalMessaging
    UpgradedHealPercentEachSecond = 4%
    UpgradedPulseFX = FX_PropagandaTowerSubliminalPulse
  End

  Geometry = BOX
  GeometryMajorRadius = 22
  GeometryMinorRadius = 9
  GeometryHeight = 13   
  GeometryIsSmall = No
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End