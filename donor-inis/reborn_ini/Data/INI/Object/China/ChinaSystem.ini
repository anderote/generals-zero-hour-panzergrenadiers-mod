; China EMP Mine Spheroid
Object EMPMineEffectSpheroid

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = None
    End
  End
  
  ; *** DESIGN PARAMETERS ***
  KindOf = NO_COLLIDE

  Behavior = EMPUpdate ModuleTag_02
    DisabledDuration = 5000
    Lifetime = 33
    StartFadeTime = 1
    EffectRadius = 10
    DisableFXParticleSystem = EMPSparks
    DoesNotAffect = ALLIES ; To prevent repairing Dozers from getting stuck
  End

  Geometry = SPHERE
  GeometryMajorRadius = 10
  GeometryIsSmall = No
End

