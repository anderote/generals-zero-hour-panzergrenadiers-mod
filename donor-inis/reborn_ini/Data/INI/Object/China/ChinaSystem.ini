; China Neutron Blast Object
Object NeutronBlastObject

  ; *** DESIGN PARAMETERS ***
  EditorSorting = SYSTEM
  
  KindOf = UNATTACKABLE
  
  ; *** ENGINEERING Parameters ***
  Body = ActiveBody ModuleTag_02
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = HeightDieUpdate ModuleTag_04
    TargetHeight = 1
    TargetHeightIncludesStructures = No
    OnlyWhenMovingDown = No
    SnapToGroundOnDeath = Yes
    InitialDelay = 0
  End
  
  Behavior = NeutronBlastBehavior ModuleTag_06
    BlastRadius = 20
    AffectAirborne = No
    AffectAllies = No
  End

  ; Behavior = FXListDie ModuleTag_07
    ; DeathFX = Neutron_WeaponFX_Mine
    ; OrientToObject = Yes
  ; End

  Geometry = CYLINDER
  GeometryMajorRadius = 20
  GeometryHeight = 1
  GeometryIsSmall = No
End

; Officer Patriotism Spirit Object
Object PatrioticSpirit_InvisibleMarker
  
  Draw = W3DModelDraw DrawTag_Main

    DefaultConditionState
      Model = None
      ParticleSysBone = None FrenzyCloud
    End
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = NO_COLLIDE IMMOBILE UNATTACKABLE INERT
  
  Body = ImmortalBody BodyTag_Immortal
    MaxHealth = 1    
    InitialHealth = 1
  End

  ; Apply frenzy level 1 bonus ...
  Behavior = WeaponBonusUpdate ModuleTag_BeAMan01
    RequiredAffectKindOf = CAN_ATTACK
    ForbiddenAffectKindOf = STRUCTURE
    BonusDuration = 10000
    BonusDelay = 67 ; one pulse
    BonusRange = 150
    BonusConditionType = FRENZY_ONE
  End
  
  ; ... and heal infantry to full ...
  Behavior = AutoHealBehavior ModuleTag_BeAMan02
    HealingAmount = 200
    HealingDelay = 67 ; one pulse
    Radius = 150
    StartsActive = Yes
    KindOf = VEHICLE INFANTRY
    SingleBurst = Yes
  End

  ; ... then quietly delete ourselves after 1 frame.
  Behavior = DeletionUpdate ModuleTag_Delete
    MinLifetime = 33
    MaxLifetime = 33
  End  
End

; China Officer Field Promotion Crate
Object ChinaOfficerFieldPromotionCrate

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = None
      ParticleSysBone = None glitter
      ParticleSysBone = None glitter2
    End
  End

  ; *** ENGINEERING PARAMETERS ***  
  KindOf = CRATE
  
  Behavior = SalvageCrateCollide CrateTag_Salvage
    PickupScience = SCIENCE_CHINA ; troops can only be promoted by officers from their own faction
    RequiredKindOf = CAN_ATTACK
    ForbiddenKindOf = STRUCTURE PROJECTILE
    LevelChance = 100%
    WeaponChance = 0%
    MoneyChance = 0%
    MinMoney = 0
    MaxMoney = 0
  End   
  
  Behavior = DeletionUpdate ModuleTag_Delete
    MinLifetime = 100   
    MaxLifetime = 100
  End
  
  Geometry = CYLINDER
  GeometryMajorRadius = 40
  GeometryMinorRadius = 40
  GeometryHeight = 10
  GeometryIsSmall = No  
End