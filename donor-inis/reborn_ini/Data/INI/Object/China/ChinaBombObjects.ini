    End
  End

  ; *** DESIGN PARAMETERS ***
  TransportSlotCount = 1
  VisionRange = 300
  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** AUDIO PARAMETERS ***
  SoundFallingFromPlane = DaisyCutterWeapon

  ; *** ENGINEERING PARAMETERS ***
  KindOf = PROJECTILE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 2000
    InitialHealth = 2000
  End

  Behavior = AIUpdateInterface AITag_Normal
  End
  
  ;Locomotor = SET_NORMAL None

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 75
    AerodynamicFriction = 1
    ForwardFriction = 33
    CenterOfMassOffset = 2
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_05
    DeathWeapon = ChinaCarpetBombWeapon
    StartsActive = Yes
  End

  ; Die Die Die
  Behavior = HeightDieUpdate ModuleTag_Die01
    TargetHeight = 1.0
    TargetHeightIncludesStructures = No
  End

  Behavior = SpecialPowerCompletionDie ModuleTag_Die02
    SpecialPowerTemplate = SuperweaponChinaCarpetBomb
  End

  Behavior = DestroyDie ModuleTag_Die03
  End
End

