; China Cluster Mine Bomb
Object ClusterMinesBomb

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = EXAMine_A
    End
  End

  ; *** DESIGN PARAMETERS ***
  TransportSlotCount = 1
  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** AUDIO PARAMETERS ***
  SoundFallingFromPlane = DaisyCutterWeapon
  
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
  End

  ; alas, this DOES need ai...
  Behavior = AIUpdateInterface AITag_Normal
  End

  Locomotor = SET_NORMAL None

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 75
    AerodynamicFriction = 1
    ForwardFriction = 33
    CenterOfMassOffset = 2
  End
  
  ; Airburst Death
  Behavior = HeightDieUpdate DeathTag_AirDeath01
    TargetHeight = 60.0
    TargetHeightIncludesStructures = No
  End

  Behavior = DestroyDie DeathTag_AirDeath02
  End

  ; Mine Deployment
  Behavior = GenerateMinefieldBehavior ModuleTag_GenerateMines
    MineName = ChinaClusterMine
    DistanceAroundObject = 80
    GenerateOnlyOnDeath = Yes
    SmartBorder = Yes
    SmartBorderSkipInterior = No
    AlwaysCircular = Yes
    GenerationFX = WeaponFX_ClusterMineImpact
  End  

  Geometry = SPHERE 
  GeometryMajorRadius = 1
  GeometryMinorRadius = 1
  GeometryHeight = 1
  GeometryIsSmall = Yes
End

