; Helix Napalm Bomb
Object NapalmBomb

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = AVBomber_B
    End
  End

  ; *** DESIGN PARAMETERS ***
  VisionRange = 0
  
  TransportSlotCount = 1
  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  
  ; *** AUDIO PARAMETERS ***
  SoundAmbient = BombIncomingWhistle

  ; *** ENGINEERING PARAMETERS ***
  KindOf = PRELOAD NO_COLLIDE UNATTACKABLE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 75
    AerodynamicFriction = 0.1
    ForwardFriction = 0.1
    CenterOfMassOffset = 0.05 ;0.15
  End
  
  ; Death Modules
  Behavior = DestroyDie DeathTag_All
    DeathTypes = ALL
  End

  Behavior = HeightDieUpdate DeathTag_HeightDie
    TargetHeight = 1.0
    TargetHeightIncludesStructures = No
  End

  ; Firestorm Weapons
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DeathWeapon01
    DeathWeapon = NapalmBombWeapon
    StartsActive = Yes
    ConflictsWith = Upgrade_ChinaBlackNapalm Upgrade_ChinaEnhancedBlackNapalm
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DeathWeapon02
    DeathWeapon = NapalmBombWeapon_Upgraded
    StartsActive = No
    TriggeredBy = Upgrade_ChinaBlackNapalm
    ConflictsWith = Upgrade_ChinaEnhancedBlackNapalm
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DeathWeapon03
    DeathWeapon = NapalmBombWeapon_Enhanced
    StartsActive = No
    TriggeredBy = Upgrade_ChinaEnhancedBlackNapalm
    ConflictsWith = Upgrade_ChinaBlackNapalm
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DeathWeapon04
    DeathWeapon = NapalmBombWeapon_Enhanced
    StartsActive = No
    TriggeredBy = Upgrade_ChinaBlackNapalm Upgrade_ChinaEnhancedBlackNapalm
    RequiresAllTriggers = Yes
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
  Scale = 0.7
End

; Leopard Bomber Bomb
Object LeopardNapalmBomb

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = AVBomber_B
    End
  End

  ; *** DESIGN PARAMETERS ***
  VisionRange = 0.0 ; Projectiles can't see, but superweapons may need to
  TransportSlotCount  = 1 ; since Napalm Strike carries us as payload, not weapon
  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = PRELOAD PROJECTILE NO_COLLIDE
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 1
  End

  Behavior = MissileAIUpdate AITag_Missile
    TryToFollowTarget = No
    FuelLifetime = 0
    IgnitionDelay = 0
    InitialVelocity = 120 ; same as locomotor min speed
    DistanceToTravelBeforeTurning = 0
    DistanceToTargetBeforeDiving  = 0
  End
 
  Locomotor = SET_NORMAL GenericAircraftBombLocomotor

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2
  Scale = 0.7
End

; China Carpet Bomb
Object ChinaCarpetBomb

  ; *** ART PARAMETERS ***
