; inferno cannon shells

; default
Object InfernoTankShell

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = AVTankShel
      ParticleSysBone = None InfernoTrail_Fire
      ParticleSysBone = None InfernoTrail_Smoke
    End
  End

  ; *** AUDIO PARAMETERS ***
  SoundAmbient = InfernoCannonIncomingWhistle

  ; *** DESIGN PARAMETERS ***
  ArmorSet
    Armor = ProjectileArmor
  End
  
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE NO_COLLIDE ; we detonate on the ground, because fire field
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = DumbProjectileBehavior ModuleTag_DumbProjectile
    FirstHeight = 75
    SecondHeight = 175
    FirstPercentIndent = 30%
    SecondPercentIndent = 70%
    FlightPathAdjustDistPerSecond = 0
  End

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 10
  End
  
  Behavior = DestroyDie DeathTag_All
  End
  
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0

End

