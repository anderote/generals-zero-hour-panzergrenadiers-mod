; napalm battle master shell 

Object NapalmBattleMasterTankShell

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    ConditionState = None
      Model = AVTankShel
      ParticleSysBone = None InfernoTrail_FireUpgraded
      ParticleSysBone = None InfernoTrail_Smoke
    End
    ConditionState = USER_1
      Model = AVTankShel
      ParticleSysBone = None InfernoTrail_FireEnhanced
      ParticleSysBone = None InfernoTrail_Smoke
    End
  End

  ; *** DESIGN PARAMETERS ***
  ArmorSet
    Armor = ProjectileArmor
  End
  VisionRange = 0.0  

  ; *** ENGINEERING PARAMETERS ***
  KindOf = PROJECTILE NO_COLLIDE ; we detonate on the ground, because fire field
  Body = ActiveBody ModuleTag_02
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = DestroyDie ModuleTag_03
    ;nothing
  End
    
  Behavior = DumbProjectileBehavior ModuleTag_04
    ; To tweak a Bezier path, please see GS
    ;FirstHeight = 10
    ;SecondHeight = 10
    ;FirstPercentIndent = 50%
    ;SecondPercentIndent = 90%
    FirstHeight = 0
    SecondHeight = 0
    FirstPercentIndent = 33%
    SecondPercentIndent = 66%
    FlightPathAdjustDistPerSecond = 100
  End

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 0.01   ; we can't have a zero mass, but we want it pretty tiny...
  End

  Behavior = WeaponBonusUpgrade ModuleTag_06 
    TriggeredBy = Upgrade_ChinaUraniumShells
  End
  
  Behavior = ModelConditionUpgrade ModuleTag_ShellTrailUpgrade01
    ConditionFlag = USER_1
    TriggeredBy = Upgrade_ChinaEnhancedBlackNapalm
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0

End

; napalm overlord shell 

Object EnN_OverlordTankShell

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    ConditionState = None
      Model = AVTankShel
      ParticleSysBone = None InfernoTrail_FireUpgraded
      ParticleSysBone = None InfernoTrail_Smoke
    End
    ConditionState = USER_1
      Model = AVTankShel
      ParticleSysBone = None InfernoTrail_FireEnhanced
      ParticleSysBone = None InfernoTrail_Smoke
    End
  End

  ; *** DESIGN PARAMETERS ***
  ArmorSet
    Armor = ProjectileArmor
  End
  VisionRange = 0.0  

  ; *** ENGINEERING PARAMETERS ***
  KindOf = PROJECTILE NO_COLLIDE ; we detonate on the ground, because fire field
  Body = ActiveBody ModuleTag_02
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = DestroyDie ModuleTag_03
    ;nothing
  End
    
  Behavior = DumbProjectileBehavior ModuleTag_04
    DetonateCallsKill = Yes
    FirstHeight = 0
    SecondHeight = 0
    FirstPercentIndent = 30%
    SecondPercentIndent = 70%
    FlightPathAdjustDistPerSecond = 100
  End

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 0.01   ; we can't have a zero mass, but we want it pretty tiny...
  End

  Behavior = WeaponBonusUpgrade ModuleTag_06 
    TriggeredBy = Upgrade_ChinaUraniumShells
  End
  
  Behavior = ModelConditionUpgrade ModuleTag_ShellTrailUpgrade01
    ConditionFlag = USER_1
    TriggeredBy = Upgrade_ChinaEnhancedBlackNapalm
  End
  
  ; Death Weapons
  Behavior = FireWeaponWhenDeadBehavior DeathFXTag_Normal
    DeathWeapon = EnN_OverlordShell_FireFieldWeapon
    StartsActive = Yes
    ConflictsWith = Upgrade_ChinaEnhancedBlackNapalm      
  End
  
  Behavior = FireWeaponWhenDeadBehavior DeathFXTag_Toxin01
    DeathWeapon = EnN_OverlordShell_FireFieldWeapon_Upgraded
    StartsActive = No
    TriggeredBy = Upgrade_ChinaEnhancedBlackNapalm
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0

End

