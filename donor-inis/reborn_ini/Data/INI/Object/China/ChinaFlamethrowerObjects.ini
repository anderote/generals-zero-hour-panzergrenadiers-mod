; Flamethrower Projectile

; Default
Object DragonTankFlameProjectile

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = NULL 
    End
  End
  
  ; *** DESIGN PARAMETERS ***
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = PROJECTILE
  
  Behavior = MissileAIUpdate AITag_Missile
    TryToFollowTarget = No
    FuelLifetime = 0
    InitialVelocity = 150
    IgnitionDelay = 0
    DistanceToTravelBeforeTurning = 3
    DistanceToTargetForLock = 0
    GarrisonHitKillRequiredKindOf = INFANTRY
    GarrisonHitKillForbiddenKindOf = NONE
    GarrisonHitKillCount = 2
    GarrisonHitKillFX = FX_DragonFlameGarrisonBuildingHit
  End
  
  Locomotor = SET_NORMAL DragonTankFlameLocomotor
  
  Behavior = BoneFXUpdate FXTag_Bone
    PristineParticleSystem1 = bone:NULL OnlyOnce:Yes 0 0 PSys:Z_FlameThrowerFlare
    PristineParticleSystem2 = bone:NULL OnlyOnce:Yes 0 0 PSys:Z_FlameThrowerFire
    PristineParticleSystem3 = bone:NULL OnlyOnce:Yes 0 0 PSys:Z_FlameThrowerSmoke
  End
  
  Behavior = BoneFXDamage DamageTag_BoneFX
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 1
    AllowCollideForce = No
  End
  
  Behavior = DestroyDie DeathTag_All
  End
  
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 3
End

