; Firewall Object

; Default
Object FireWallSegment

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = NONE
      ParticleSysBone = None Z_FireWallSegmentFire
      ParticleSysBone = None Z_FireWallSegmentFlare
      ParticleSysBone = None Z_FireWallSegmentSmoke
    End
  End
  
  ; *** AUDIO PARAMETERS ***
  SoundAmbient = FireFieldLoop

  ; *** ENGINEERING PARAMETERS ***
  KindOf = NO_COLLIDE UNATTACKABLE
  
  Body = ImmortalBody BodyTag_Immortal
    MaxHealth = 100
    InitialHealth = 100
  End
  
  Behavior = WanderAIUpdate AITag_Wander
  End
  
  Locomotor = SET_NORMAL InchForwardLocomotor

  Behavior = FireWeaponUpdate ModuleTag_05
    Weapon = FireWallSegmentWeapon
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 50
  End

  Behavior = DeletionUpdate ModuleTag_Delete
    MinLifetime = 4000
    MaxLifetime = 4000
  End
  
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1  
End

