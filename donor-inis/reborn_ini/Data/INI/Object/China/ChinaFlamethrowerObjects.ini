; Flamethrower Stream Object

; Default
Object FlamethrowerProjectileStream

  ; *** ART PARAMETERS ***
  Draw = W3DProjectileStreamDraw DrawTag_Stream
    Texture = EXNapalmStream.dds
    Width = 5
    TileFactor = 1
    ScrollRate = 0.3
    MaxSegments = 5
  End

  ; *** ENGINEERING PARAMETERS ***
  KindOf = INERT
  
  Behavior = ProjectileStreamUpdate UpdateTag_ProjectileStream
  End
End

