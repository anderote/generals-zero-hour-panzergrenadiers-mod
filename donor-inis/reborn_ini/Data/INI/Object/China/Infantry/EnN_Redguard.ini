; China EMP and Napalm Gen Redguard
Object Tank_ChinaInfantryRedguard

  ; *** ART PARAMETERS ***
  SelectPortrait = SNRedGuard_L  
  ButtonImage = SNRedGuard_L
  
  UpgradeCameo1 = Upgrade_Nationalism
  UpgradeCameo2 = Upgrade_InfantryCaptureBuilding
  UpgradeCameo3 = Upgrade_ChinaRifleUpgrade
  
  Draw = W3DModelDraw DrawTag_Main

    OkToChangeModelColor = Yes

    ; Idle
    DefaultConditionState
      Model = NICNSC_SKN
      IdleAnimation = NICNSC_SKL.NICNSC_STA 0 35
      IdleAnimation = NICNSC_SKL.NICNSC_IDA
      IdleAnimation = NICNSC_SKL.NICNSC_IDB
      AnimationMode = ONCE
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      TransitionKey = TRANS_Stand
    End

    ConditionState = REALLYDAMAGED
      IdleAnimation = NICNSC_SKL.NICNSC_STB
      AnimationMode = ONCE
      TransitionKey = TRANS_StandDamaged
    End
    
    TransitionState = TRANS_Stand TRANS_StandDamaged 
      Animation = NICNSC_SKL.NICNSC_AA2SA
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 4 5
      Flags = START_FRAME_LAST
    End

    ; Rifle Animations
    ConditionState = FIRING_A 
      Animation = NICNSC_SKL.NICNSC_ATA
      AnimationMode = ONCE
      TransitionKey = TRANS_Firing
    End
    
    ConditionState = BETWEEN_FIRING_SHOTS_A 
      Animation = NICNSC_SKL.NICNSC_ATA
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
      WaitForStateToFinishIfPossible = TRANS_Firing
    End
    AliasConditionState = RELOADING_A

    ConditionState = FIRING_A REALLYDAMAGED
      Animation = NICNSC_SKL.NICNSC_ATC
      AnimationMode = ONCE
      TransitionKey = TRANS_Firing_Damaged
    End
    
    ConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED
      Animation = NICNSC_SKL.NICNSC_ATC
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
      WaitForStateToFinishIfPossible = TRANS_Firing_Damaged
    End
    AliasConditionState = RELOADING_A REALLYDAMAGED

    ; Bayonet Animations
    ConditionState = PREATTACK_C 
      Animation = NICNSC_SKL.NICNSC_ATB1
      AnimationMode = ONCE
      TransitionKey = TRANS_Stab
    End
    
    ConditionState = FIRING_C
      Animation = NICNSC_SKL.NICNSC_ATB2
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      WaitForStateToFinishIfPossible = TRANS_Stab
      TransitionKey = TRANS_Stabbed
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_C 
    AliasConditionState = RELOADING_C
    
    TransitionState = TRANS_Stabbed TRANS_Stand
      Animation = NICNSC_SKL.NICNSC_ATB2
      AnimationMode = ONCE
    End
    
    ; Parachuting Animations
    ConditionState = FREEFALL
      Animation = NICNSC_SKL.NICNSC_POP
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL DYING

    ConditionState = PARACHUTING
      Animation = NICNSC_SKL.NICNSC_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING

    TransitionState = TRANS_Falling TRANS_Chute
      Animation = NICNSC_SKL.NICNSC_POP
      AnimationMode = ONCE
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
    End

    TransitionState = TRANS_Chute TRANS_Stand
      Animation = NICNSC_SKL.NICNSC_PTD
      AnimationMode = ONCE
    End

    ; Movement Animations
    ConditionState = MOVING
      Animation = NICNSC_SKL.NICNSC_RNA 26
      AnimationMode = LOOP
      Flags = RANDOMSTART
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING ATTACKING

    ConditionState = MOVING REALLYDAMAGED
      Animation = NICNSC_SKL.NICNSC_RNB 28
      AnimationMode = LOOP
      Flags = RANDOMSTART
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING ATTACKING REALLYDAMAGED

    ; Building Capture Animations
    ConditionState = UNPACKING
      Model = NICNSC_F_SKN
      Animation = NICNSC_F_SKL.NICNSC_F_FDP1
      AnimationMode = ONCE
    End
    AliasConditionState = UNPACKING REALLYDAMAGED

    ConditionState = RAISING_FLAG
      Model = NICNSC_F_SKN
      Animation = NICNSC_F_SKL.NICNSC_F_FDP2
      AnimationMode = ONCE
      TransitionKey = TRANS_Raising
    End
    AliasConditionState = RAISING_FLAG REALLYDAMAGED

    ConditionState = PACKING
      Model = NICNSC_F_SKN
      Animation = NICNSC_F_SKL.NICNSC_F_FDP1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_Packing
    End
    AliasConditionState = PACKING REALLYDAMAGED

    TransitionState = TRANS_Raising TRANS_Packing
      Model = NICNSC_F_SKN
      Animation = NICNSC_F_SKL.NICNSC_F_FDP2
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
    
    ; Cheering Animations
    ConditionState = SPECIAL_CHEERING
      Animation = NICNSC_SKL.NICNSC_CHA
      AnimationMode = LOOP
    End

    ; Dying Animations
    ConditionState = DYING
      Animation = NICNSC_SKL.NICNSC_DTA
      Animation = NICNSC_SKL.NICNSC_DTB
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = NICNSC_SKL.NICNSC_ATDE1
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = NICNSC_SKL.NICNSC_ATDE2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = NICNSC_SKL.NICNSC_ATDE3
      AnimationMode = ONCE
      TransitionKey = None
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Redguard
  
  Side = ChinaTankGeneral
  EditorSorting = INFANTRY
  
  TransportSlotCount = 1
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY RedguardMachineGun
    Weapon = TERTIARY RedguardBayonet
    AutoChooseSources = TERTIARY NONE
  End
  
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY RedguardMachineGunUpgraded
    Weapon = TERTIARY RedguardBayonet
    AutoChooseSources = TERTIARY NONE
  End
  
  ArmorSet
    Conditions = None
    Armor = HumanArmor
    DamageFX = InfantryDamageFX
  End
  
  VisionRange = 200
  ShroudClearingRange = 400
  
  BuildCost = 350
  BuildTime = 12

  ExperienceValue = 5 5 10 20
  ExperienceRequired = 0 40 80 120
  IsTrainable = Yes
  
  CrushableLevel = 0
  
  CommandSet = ChinaInfantryRedguardCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = RedGuardVoiceSelect
  VoiceMove = RedGuardVoiceMove
  VoiceGuard = RedGuardVoiceMove
  VoiceAttack = RedGuardVoiceAttack
  VoiceGroupSelect = BattleCrySound
  VoiceFear = RedGuardVoiceFear
  VoiceTaskComplete = RedGuardVoiceCaptureComplete
  UnitSpecificSounds
    VoiceCreate = RedGuardVoiceCreate
    VoiceMelee = RedGuardVoiceAttackBayonet
    VoiceGarrison = RedGuardVoiceGarrison
    VoiceSubdue = RedGuardVoiceSubdue
    VoiceEnter = RedGuardVoiceMove
    VoiceEnterHostile = RedGuardVoiceMove
    VoiceGetHealed = RedGuardVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY SCORE PARACHUTABLE SALVAGER

  Body = ActiveBody BodyTag_Normal
    MaxHealth = 120
    InitialHealth = 120
  End

  ; Redguard Training
  Behavior = VeterancyGainCreate ModuleTag_RedguardTraining
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_RedGuardTraining
  End

  Behavior = AIUpdateInterface AITag_Normal
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End

  Behavior = CommandButtonHuntUpdate ModuleTag_CommandButtonHunt
  End

  Locomotor = SET_NORMAL RedguardLocomotor

  ; Horde
  Behavior = HordeUpdate ModuleTag_Horde
    RubOffRadius = 60
    UpdateRate = 1000
    Radius = 30
    KindOf = INFANTRY
    AlliesOnly = Yes
    ExactMatch = No
    Count = 5
    Action = HORDE
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 5.0
  End

  Behavior = SquishCollide ModuleTag_Squish
  End
  
  ; Death Modules
  Behavior = SlowDeathBehavior DeathTag_Normal
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RedGuardDie
  End
  Behavior = SlowDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior DeathTag_Exploded
    DeathTypes = NONE +EXPLODED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RedGuardDie
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  Behavior = SlowDeathBehavior DeathTag_Burned
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireChina
    OCL = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned01
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned02
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantryBeta
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned03
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantryGamma
  End

  ; Capture Building
  Behavior = SpecialAbility ModuleTag_CaptureBuilding01
    SpecialPowerTemplate = SpecialAbilityRedGuardCaptureBuilding
    UpdateModuleStartsAttack = Yes
    StartsPaused = Yes
    InitiateSound = RedGuardVoiceCapture
  End
  Behavior = SpecialAbilityUpdate ModuleTag_CaptureBuilding02
    SpecialPowerTemplate = SpecialAbilityRedGuardCaptureBuilding
    StartAbilityRange = 5
    UnpackTime = 3000
    PreparationTime = 20000
    PackTime = 2000
    DoCaptureFX = Yes
    AwardXPForTriggering = 15
  End
  Behavior = UnpauseSpecialPowerUpgrade ModuleTag_CaptureBuilding03
    SpecialPowerTemplate = SpecialAbilityRedGuardCaptureBuilding
    TriggeredBy = Upgrade_InfantryCaptureBuilding
  End

  ; Redguard Rifle Upgrade
  Behavior = WeaponSetUpgrade ModuleTag_19
    TriggeredBy = Upgrade_ChinaRifleUpgrade
  End 

  Geometry = CYLINDER
  GeometryMajorRadius = 7
  GeometryMinorRadius = 7
  GeometryHeight = 12
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowI
  
  BuildCompletion = APPEARS_AT_RALLY_POINT
End