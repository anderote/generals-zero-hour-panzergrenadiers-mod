; China Rogue Officer
Object ChinaInfantryCO ; Different name as to not confilct with the campaign one

  ; *** ART PARAMETERS ***
  SelectPortrait = SNOfficer_L
  ButtonImage = SNOfficer
  
  UpgradeCameo1 = Upgrade_ChinaSubliminalMessaging
  UpgradeCameo2 = Upgrade_Nationalism
  UpgradeCameo3 = Upgrade_OfficerPromotion
  
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes

    ; Idle
    DefaultConditionState
      Model = NIOFCR_SKN
      IdleAnimation = NIOFCR_SKL.NIOFCR_STA 0 21
      IdleAnimation = NIOFCR_SKL.NIOFCR_IDA
      IdleAnimation = NIOFCR_SKL.NIOFCR_IDB
      AnimationMode = ONCE
      WeaponFireFXBone = PRIMARY MUZZLE
      WeaponMuzzleFlash = PRIMARY MUZZLEFX
      TransitionKey = TRANS_STAND
    End
    
    ; Moving
    ConditionState = MOVING
      Animation = NIOFCR_SKL.NIOFCR_RNA
      AnimationMode = LOOP
      ParticleSysBone = None InfantryDustTrails
    End

    ; Pistol Attack
    ConditionState = FIRING_A
      Animation = NIOFCR_SKL.NIOFCR_ATALP
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
      TransitionKey = TRANS_FIRING_A
    End
            
    ConditionState = BETWEEN_FIRING_SHOTS_A
      Animation = NIOFCR_SKL.NIOFCR_ATALP
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      WaitForStateToFinishIfPossible = TRANS_FIRING_A
    End
    AliasConditionState = RELOADING_A

    ; Cheering
    ConditionState = SPECIAL_CHEERING
      Animation = NIOFCR_SKL.NIOFCR_CHA
      AnimationMode = LOOP
    End

    ; Parachuting
    ConditionState = PARACHUTING
      Animation = AIOFCR_SKL.AIOFCR_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING

    TransitionState = TRANS_Falling TRANS_Chute
      Animation = AIOFCR_SKL.AIOFCR_POP
      AnimationMode = ONCE
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
    End
    TransitionState = TRANS_Chute TRANS_Stand
      Animation = AIOFCR_SKL.AIOFCR_PTD
      AnimationMode = ONCE
    End
    
    ; Death Animations
    ConditionState = DYING
      Animation = NIOFCR_SKL.NIOFCR_DTA
      Animation = NIOFCR_SKL.NIOFCR_DTB
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = NIOFCR_SKL.NIOFCR_ADTE1
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = NIOFCR_SKL.NIOFCR_ADTE2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = NIOFCR_SKL.NIOFCR_ADTE3
      AnimationMode = ONCE
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Officer
  
  Side = China
  EditorSorting = INFANTRY
  
  TransportSlotCount  = 1
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY ChinaOfficerPistol
  End
  
  ArmorSet
    Conditions = None
    Armor = HumanArmor
    DamageFX = InfantryDamageFX
  End
  
  VisionRange = 200
  ShroudClearingRange = 400
  
  Prerequisites
    Object = ChinaPropagandaCenter
  End
  
  BuildCost = 1500
  BuildTime = 20

  ExperienceValue = 40 80 120 160
  ExperienceRequired = 0 80 160 240
  IsTrainable = Yes
  
  CrushableLevel = 0
  
  CommandSet = ChinaInfantryOfficerCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = ChinaOfficerVoiceSelect
  VoiceMove = ChinaOfficerVoiceMove
  VoiceGuard = ChinaOfficerVoiceMove
  VoiceAttack = ChinaOfficerVoiceAttack
  
  UnitSpecificSounds
    VoiceGarrison = ChinaOfficerVoiceMove
    VoiceCreate = ChinaOfficerVoiceCreate
    VoiceEnter = ChinaOfficerVoiceMove
    VoiceEnterHostile = ChinaOfficerVoiceMove
    VoiceGetHealed = ChinaOfficerVoiceMove
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY SCORE PARACHUTABLE

  Body = ActiveBody BodyTag_Normal
    MaxHealth = 200
    InitialHealth = 200
  End

  Behavior = AIUpdateInterface AITag_Normal
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End

  Behavior = CommandButtonHuntUpdate ModuleTag_Hunt
  End

  Locomotor = SET_NORMAL RedguardLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 5.0
  End 
  
  ; Horde Bits
  Behavior = HordeUpdate ModuleTag_Horde
    UpdateRate = 1000
    RubOffRadius = 150 ;60
    Radius = 75 ;30
    KindOf = INFANTRY
    AlliesOnly = Yes
    ExactMatch = No
    Count = 5
    Action = HORDE
  End
  
  ; Propaganda Bits
  Behavior = PropagandaTowerBehavior ModuleTag_Propaganda
    Radius = 150
    DelayBetweenUpdates = 2000
    HealPercentEachSecond = 2%
    PulseFX = FX_OfficerPropagandaTowerPropagandaPulse
    UpgradeRequired = Upgrade_ChinaSubliminalMessaging
    UpgradedHealPercentEachSecond = 4%
    UpgradedPulseFX = FX_OfficerPropagandaTowerSubliminalPulse
    AffectsSelf = yes
  End
  
  ; Radius Decal
  ; PayloadTemplateName doesn't work unless it's a tank or a truck
  ; So we'll have to do this the old fashioned way - Zeke
  Behavior = OverlordContain ModuleTag_Decal01
    Slots = 1
    DamagePercentToUnits = 100%
    AllowInsideKindOf = FS_FAKE
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Decal02
    UpgradeObject = OCL_SpeakerTowerRadiusDecal
    TriggeredBy = Upgrade_GLAWorkerFakeCommandSet
  End
  
  Behavior = GrantUpgradeCreate ModuleTag_Decal03
    UpgradeToGrant = Upgrade_GLAWorkerFakeCommandSet
    ExemptStatus = UNDER_CONSTRUCTION
  End

  ; Death FX
  Behavior = SlowDeathBehavior DeathTag_Normal
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RedGuardDie
  End
  
  Behavior = SlowDeathBehavior DeathTag_Exploded
    DeathTypes = NONE +EXPLODED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RedGuardDie
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  
  Behavior = SlowDeathBehavior DeathTag_Burned
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireChina
    OCL = INITIAL OCL_FlamingInfantry
  End
  
  Behavior = SlowDeathBehavior DeathTag_Poisoned01
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned02
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantryBeta
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned03
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantryGamma
  End
  
  Behavior = SlowDeathBehavior DeathTag_Crushed01
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_GIDieCrushed
  End  
  Behavior = SquishCollide ModuleTag_Crushed02
  End
  
  ; Special Powers
  
  ; Patriotic Spirit
  Behavior = OCLSpecialPower ModuleTag_PatrioticSpirit
    SpecialPowerTemplate = AbilityChinaOfficerPatrioticSpirit
    OCL = ABILITY_ChinaOfficerPatrioticSpirit
    CreateLocation = CREATE_AT_LOCATION
  End
  
  ; Minigunner Drop
  Behavior = OCLSpecialPower ModuleTag_MinigunnerDrop
    SpecialPowerTemplate = AbilityChinaOfficerMinigunnerParadrop
    OCL = ABILITY_ChinaOfficerMinigunnerParadrop
    CreateLocation = CREATE_AT_EDGE_NEAR_SOURCE
    OCLAdjustPositionToPassable = Yes
  End 
  
  ; Tank Paradrop
  Behavior = OCLSpecialPower ModuleTag_TankParadrop
    SpecialPowerTemplate = AbilityChinaOfficerTankParadrop
    OCL = CRog_ABILITY_ChinaOfficerTankParadrop
    CreateLocation = CREATE_AT_EDGE_NEAR_SOURCE
    OCLAdjustPositionToPassable = Yes
  End
  
  ; Upgrades
  
  ; Officer Promotion
  Behavior = CommandSetUpgrade ModuleTag_OfficerPromotion
    TriggeredBy = Upgrade_OfficerPromotion
    CommandSet = ChinaInfantryOfficerCommandSetUpgraded
  End
  
  Geometry = CYLINDER
  GeometryMajorRadius = 7
  GeometryMinorRadius = 7
  GeometryHeight = 12
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowI
  
  BuildCompletion = APPEARS_AT_RALLY_POINT
End