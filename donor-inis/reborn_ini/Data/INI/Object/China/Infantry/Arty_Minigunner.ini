; China Artillery Minigunner
Object Arty_ChinaInfantryMiniGunner

  ; *** ART PARAMETERS ***
  SelectPortrait = SNMiniGunner_L  
  ButtonImage = SNMiniGunner
  
  UpgradeCameo1 = Upgrade_ChinaChainGuns
  UpgradeCameo2 = Upgrade_Fanaticism
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DModelDraw DrawTag_Main

    OkToChangeModelColor = Yes
    IgnoreConditionStates = PREATTACK_A FIRING_A BETWEEN_FIRING_SHOTS_A RELOADING_A

    ; Stand 
    DefaultConditionState
      Model = NICNSCI_SKN
      IdleAnimation = NICNSC_SKL.NICNSC_STA 0 35
      IdleAnimation = NICNSC_SKL.NICNSC_IDA
      IdleAnimation = NICNSC_SKL.NICNSC_IDB
      AnimationMode = ONCE
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone = SECONDARY Muzzle
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      TransitionKey = TRANS_Stand
    End

    ConditionState = REALLYDAMAGED
      IdleAnimation = NICNSC_SKL.NICNSC_STB
      TransitionKey = TRANS_StandDamaged
    End

    ; Attacking
    ConditionState = USING_WEAPON_A
      Animation = NICNSC_SKL.NICNSC_ATA
      AnimationMode = LOOP
      ;TransitionKey = TRANS_Firing
    End

    ConditionState = USING_WEAPON_A REALLYDAMAGED
      Animation = NICNSC_SKL.NICNSC_ATC
      AnimationMode = LOOP
      ;TransitionKey = TRANS_FiringDamaged
    End

    ConditionState = USING_WEAPON_B
      Animation = NICNSC_SKL.NICNSC_ATA2
      AnimationMode = LOOP
    End

    ConditionState = USING_WEAPON_B REALLYDAMAGED
      Animation = NICNSC_SKL.NICNSC_ATC2
      AnimationMode = LOOP
    End

    ; Damage Transitions
    TransitionState = TRANS_StandDamaged TRANS_RunDamaged
      Animation = NICNSC_SKL.NICNSC_AA2AC
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 2 2
    End
    TransitionState = TRANS_RunDamaged TRANS_StandDamaged 
      Animation = NICNSC_SKL.NICNSC_AA2AC
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
    TransitionState = TRANS_Stand TRANS_StandDamaged 
      Animation = NICNSC_SKL.NICNSC_AA2SA
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 4 5
      Flags = START_FRAME_LAST
    End

    ; Parachuting
    ConditionState = FREEFALL
      Animation = NICNSC_SKL.NICNSC_POP
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL DYING

    ConditionState = PARACHUTING
      Animation = NICNSC_SKL.NICNSC_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING

    TransitionState = TRANS_Falling TRANS_Chute
      Animation = NICNSC_SKL.NICNSC_POP
      AnimationMode = ONCE
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
    End

    TransitionState = TRANS_Chute TRANS_Stand
      Animation = NICNSC_SKL.NICNSC_PTD
      AnimationMode = ONCE
    End

    ; Moving
    ConditionState = MOVING
      Animation = NICNSC_SKL.NICNSC_RNA 26
      AnimationMode = LOOP
      Flags = RANDOMSTART
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING ATTACKING

    ConditionState = MOVING REALLYDAMAGED
      Animation = NICNSC_SKL.NICNSC_RNB 28
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_RunDamaged
    End
    AliasConditionState = MOVING REALLYDAMAGED ATTACKING

    ; Dying
    ConditionState = DYING
      Animation = NICNSC_SKL.NICNSC_DTA
      Animation = NICNSC_SKL.NICNSC_DTB
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = NICNSC_SKL.NICNSC_ATDE1
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = NICNSC_SKL.NICNSC_ATDE2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = NICNSC_SKL.NICNSC_ATDE3
      AnimationMode = ONCE
    End

    ; Cheering
    ConditionState = SPECIAL_CHEERING
      Animation = NICNSC_SKL.NICNSC_CHA
      AnimationMode = LOOP
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:MiniGunner
  
  Side = ChinaNukeGeneral
  EditorSorting = INFANTRY
  
  TransportSlotCount = 1
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY Infa_MiniGunnerGun
    Weapon = SECONDARY Infa_MiniGunnerGunAir    
    PreferredAgainst = SECONDARY AIRCRAFT
  End
  
  ArmorSet
    Conditions = None
    Armor = InfGen_HumanArmor
    DamageFX = InfantryDamageFX
  End
  
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = HazMatHumanArmor
    DamageFX = InfantryDamageFX
  End
  
  VisionRange = 100
  ShroudClearingRange = 200
    
  BuildCost = 300
  BuildTime = 8

  ExperienceValue = 5 5 10 20
  ExperienceRequired = 0 20 40 80
  IsTrainable = Yes
  
  CrushableLevel = 0 ; 0 = for infantry, 1 = for trees, 2 = general vehicles
  
  CommandSet = Arty_ChinaInfantryMiniGunnerCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = RedMinigunnerVoiceSelect
  VoiceMove = RedGuardVoiceMove
  VoiceGuard = RedGuardVoiceMove
  VoiceAttack = RedMinigunnerVoiceAttack
  VoiceGroupSelect = BattleCrySound
  VoiceFear = RedGuardVoiceFear
  UnitSpecificSounds
    VoiceGarrison = RedGuardVoiceGarrison
    VoiceCreate = RedMinigunnerVoiceCreate
    VoiceEnter = RedGuardVoiceMove
    VoiceEnterHostile = RedGuardVoiceMove
    VoiceGetHealed = RedGuardVoiceMove
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY SCORE PARACHUTABLE

  Body = ActiveBody BodyTag_Normal
    MaxHealth = 120
    InitialHealth = 120
  End

  Behavior = VeterancyGainCreate ModuleTag_Veterancy
    StartingLevel = VETERAN
    ScienceRequired = Infa_SCIENCE_RedGuardTraining
  End

  Behavior = AIUpdateInterface AITag_Normal
    AutoAcquireEnemiesWhenIdle = Yes
  End

  Locomotor = SET_NORMAL RedguardLocomotor

  Behavior = HordeUpdate ModuleTag_06
    RubOffRadius = 100
    UpdateRate = 1000
    Radius = 30
    KindOf = INFANTRY
    AlliesOnly = Yes
    ExactMatch = No
    Count = 5
    Action = HORDE
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 5
  End

  ; Death Modules
  Behavior = SlowDeathBehavior DeathTag_Normal
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RedGuardDie
  End
  Behavior = SlowDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior DeathTag_Exploded
    DeathTypes = NONE +EXPLODED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_RedGuardDie
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  Behavior = SlowDeathBehavior DeathTag_Burned
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireChina
    OCL = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned01
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned02
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantryBeta
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned03
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantryGamma
  End

  ; Upgrades
  
  ; Chainguns
  Behavior = WeaponBonusUpgrade ModuleTag_19
    TriggeredBy = Upgrade_ChinaChainGuns
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 7
  GeometryMinorRadius = 7
  GeometryHeight = 12
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowI
  
  BuildCompletion = APPEARS_AT_RALLY_POINT
End