; EMP and Napalm General Mortar Soldier
Object EnN_ChinaInfantryMortarSoldier

  SelectPortrait = SNMortard_L
  ButtonImage = SNMortard

  UpgradeCameo1 = Upgrade_Nationalism
  UpgradeCameo2 = Upgrade_ChinaEnhancedBlackNapalm
  ;UpgradeCameo3 = None
  ;UpgradeCameo4 = None
  ;UpgradeCameo5 = None

  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = NIMortar_SKN
      IdleAnimation = AISTNG_SKL.AISTNG_STA 0 30
      IdleAnimation = AISTNG_SKL.AISTNG_IDA
      IdleAnimation = AISTNG_SKL.AISTNG_IDB
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 0.8 1.2
      TransitionKey = TRANS_Stand
      WeaponMuzzleFlash = PRIMARY MUZZLEFX01
      WeaponFireFXBone = PRIMARY MUZZLE01
      WeaponLaunchBone = PRIMARY MUZZLE01
    End
    AliasConditionState = REALLYDAMAGED
    
    ; attacking
    ConditionState = PREATTACK_A
      Animation = AISTNG_SKL.AISTNG_ATA 
      AnimationMode = ONCE
      TransitionKey = TRANS_Firing
    End
    AliasConditionState = PREATTACK_A REALLYDAMAGED
    
    ConditionState = FIRING_A
      Animation = AISTNG_SKL.AISTNG_ATA2
      AnimationMode = MANUAL
      TransitionKey = TRANS_Fired
      Flags = START_FRAME_LAST
    End
    AliasConditionState = FIRING_A REALLYDAMAGED
    AliasConditionState = RELOADING_A
    AliasConditionState = RELOADING_A REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_A
    AliasConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED

    TransitionState = TRANS_Firing TRANS_Fired
      Animation = AISTNG_SKL.AISTNG_ATA2
      AnimationMode = ONCE
    End

    ; deploying
    TransitionState = TRANS_Moving TRANS_Stand
      Animation = AISTNG_SKL.AISTNG_RD2
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 2.0 2.0
    End

    TransitionState = TRANS_Moving TRANS_Firing
      Animation = AISTNG_SKL.AISTNG_RD2
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 2.0 2.0
    End

    ; moving
    ConditionState = MOVING
      Animation = AISTNG_SKL.AISTNG_RNA
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_Moving
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING REALLYDAMAGED
    AliasConditionState = MOVING ATTACKING
    AliasConditionState = MOVING ATTACKING REALLYDAMAGED
    
    ; dying
    ConditionState = DYING
      Animation = AISTNG_SKL.AISTNG_DTA
      Animation = AISTNG_SKL.AISTNG_DTB
      AnimationSpeedFactorRange = 0.9 1.25
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End
    
    ConditionState = DYING MOVING
      Animation = AISTNG_SKL.AISTNG_DTC
      AnimationSpeedFactorRange = 0.9 1.25
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = AISTNG_SKL.AISTNG_ADTF1
      AnimationMode = ONCE
    End

    ; exploded
    ConditionState = DYING EXPLODED_FLAILING
      Animation = AISTNG_SKL.AISTNG_ADTF2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = AISTNG_SKL.AISTNG_ADTF3
      AnimationMode = ONCE
      TransitionKey = None
    End

    ; falling
    ConditionState = FREEFALL
      Animation = AISTNG_SKL.AISTNG_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL DYING

    ; parachuting
    ConditionState = PARACHUTING
      Animation = AISTNG_SKL.AISTNG_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING

    TransitionState = TRANS_Falling TRANS_Chute
      Animation = AISTNG_SKL.AISTNG_POP
      AnimationMode = ONCE
    End

    TransitionState = TRANS_Chute TRANS_Stand
      Animation = AISTNG_SKL.AISTNG_PTD
      AnimationMode = ONCE
    End

    ; cheering
    ConditionState = SPECIAL_CHEERING
      Animation = AISTNG_SKL.AISTNG_CHA
      AnimationMode = ONCE
    End
    
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:NapalmMortarSoldier
  
  Side = ChinaTankGeneral
  EditorSorting = INFANTRY
  
  TransportSlotCount = 2

  WeaponSet
    Conditions = None
    Weapon = PRIMARY EnN_MortarSoldierMortar
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY EnN_MortarSoldierMortar_Upgraded
  End
  
  ArmorSet
    Conditions = None
    Armor = HumanArmor
    DamageFX = InfantryDamageFX
  End
  
  Prerequisites
    Object = Tank_ChinaPropagandaCenter
  End
  
  VisionRange = 200
  ShroudClearingRange = 200
  
  BuildCost = 600
  BuildTime = 10

  ExperienceValue = 25 25 50 100
  ExperienceRequired = 0 100 200 400
  IsTrainable = Yes
  
  CrushableLevel = 0

  CommandSet = ChinaInfantryMortarSoldierCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect = MortarVoiceSelect
  VoiceMove = MortarVoiceMove
  VoiceAttack = MortarVoiceAttack
  VoiceAttackAir = MortarVoiceAttack
  VoiceGuard = MortarVoiceMove
  VoiceFear = TankHunterVoiceFear
  UnitSpecificSounds
    VoiceCreate = MortarVoiceCreate
    VoiceGarrison = MortarVoiceMove
    VoiceEnter = MortarVoiceMove
    VoiceEnterHostile = MortarVoiceMove
    VoiceGetHealed = MortarVoiceMove
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK INFANTRY SCORE

  Body = ActiveBody BodyTag_Normal
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = AIUpdateInterface AITag_Normal
    AutoAcquireEnemiesWhenIdle = Yes
  End

  Locomotor = SET_NORMAL MissileDefenderLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 5.0
  End
 
  Behavior = SquishCollide ModuleTag_Squish
    ;nothing
  End

  ; death fx
  Behavior = SlowDeathBehavior DeathTag_Normal
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_TankHunterDie
  End
  Behavior = SlowDeathBehavior DeathTag_Crushed
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior DeathTag_Exploded
    DeathTypes = NONE +EXPLODED
    SinkDelay = 3000
    SinkRate = 0.5
    DestructionDelay = 8000
    FX = INITIAL FX_TankHunterDie
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  Behavior = SlowDeathBehavior DeathTag_Burned
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireChina
    OCL = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned01
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned02
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantryBeta
  End
  Behavior = SlowDeathBehavior DeathTag_Poisoned03
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinChina
    OCL = INITIAL OCL_ToxicInfantryGamma
  End
  
  ; Upgrades and Bonuses
  
  Behavior = HordeUpdate ModuleTag_Horde
    UpdateRate = 1000
    RubOffRadius = 60
    Radius = 30
    KindOf = INFANTRY
    AlliesOnly = Yes
    ExactMatch = No
    Count = 5
    Action = HORDE
  End
  
  ; Special Weapons Training
  Behavior = VeterancyGainCreate CreateTag_Veterancy
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_SpecWeapTraining
  End

  ; Enhanced Black Napalm
  Behavior = WeaponSetUpgrade UpgradeTag_Weapon
    TriggeredBy = Upgrade_ChinaEnhancedBlackNapalm
  End
 
  Geometry = CYLINDER
  GeometryMajorRadius = 10
  GeometryMinorRadius = 10
  GeometryHeight = 12
  GeometryIsSmall = Yes
  
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowI
  
  BuildCompletion = APPEARS_AT_RALLY_POINT

End