; China Fire Fields

; Small Fire Fields
; Used by Inferno Cannons and Migs

; Default
Object FireFieldSmall

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    DefaultConditionState
      Model = NONE
      ParticleSysBone = None FireFieldSmall_Fire
      ParticleSysBone = None FireFieldSmall_Flare
      ParticleSysBone = None FireFieldSmall_Smoke
    End
  End

  ; *** DESIGN PARAMETERS ***
  EditorSorting = SYSTEM
  KindOf = IMMOBILE NO_COLLIDE
  
  ; *** AUDIO PARAMETERS ***
  SoundAmbient = FireFieldLoop

  ; *** ENGINEERING Parameters ***  
  Body = InactiveBody BodyTag_Inactive
    ;nothing
  End
  Behavior = FireWeaponUpdate ModuleTag_FireWeapon
    Weapon = SmallFireFieldWeapon
  End

  Behavior = DeletionUpdate ModuleTag_Delete
    MinLifetime = 3000 ;2500
    MaxLifetime = 3000 ;2500
  End
  
  Geometry = CYLINDER
  GeometryMajorRadius = 30
  GeometryMinorRadius = 30
  GeometryHeight = 1
  GeometryIsSmall = No  
End

