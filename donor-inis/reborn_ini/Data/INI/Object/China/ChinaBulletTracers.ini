; Invisible Dummy Projectile
Object DummyProjectileInvisible

  ; ***DESIGN PARAMETERS ***
  ArmorSet
    Armor = ProjectileArmor
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = PROJECTILE NO_COLLIDE
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
  End
  
  Behavior = DumbProjectileBehavior ModuleTag_DPB
    FirstHeight = 0
    SecondHeight = 0
    FirstPercentIndent = 33%
    SecondPercentIndent = 66%
    FlightPathAdjustDistPerSecond = 100
  End
  
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 0.01
  End
  
  Behavior = DestroyDie DeathTag_All
  End
  
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End

; China Gattling Cannon Heat Rounds
Object ChinaHeatRoundTracer

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    ConditionState = None
      Model = EXNpmTrcr
      Animation = EXNpmTrcr.EXNpmTrcr
      AnimationSpeedFactorRange = 1.9 2.1 ;1 = 300, 2 = 600
    End
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = DRAWABLE_ONLY
End

; Raven Shock Cannon Tracer
Object RavenShockCannonTracer
  
  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    ParticlesAttachedToAnimatedBones = Yes
    DefaultConditionState
      Model = EXRvnSht
      Animation = EXRvnSht.EXRvnSht
      AnimationSpeedFactorRange = 2 2 ;1 = 300, 2 = 600
      ParticleSysBone = FX RavenShockPulse_Flare
      ParticleSysBone = FX RavenShockPulse_Trail
    End
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = DRAWABLE_ONLY
End