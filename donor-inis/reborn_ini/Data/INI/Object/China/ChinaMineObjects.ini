; China Mine
Object ChinaStandardMine

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    ;OkToChangeModelColor = Yes
    ; NOTE: ParticleSysBone doesn't work correctly with DefaultConditionState!
    ; Fix someday! (srj)
    ConditionState = NONE
      Model = EXAMineGroup
      ParticleSysBone = Mine01 MineFX
      ParticleSysBone = Mine02 MineFX
      ParticleSysBone = Mine03 MineFX
      ParticleSysBone = Mine04 MineFX
      ParticleSysBone = Mine05 MineFX
      ParticleSysBone = Mine06 MineFX
      ParticleSysBone = Mine07 MineFX
      ParticleSysBone = Mine08 MineFX
    End
    ConditionState = RUBBLE
      Model = None
    End
  End

  ; *** DESIGN PARAMETERS ***
  KindOf = STICK_TO_TERRAIN_SLOPE IMMOBILE MINE NO_HEAL_ICON
  
  ArmorSet
    Conditions = None
    Armor = MineArmor
    DamageFX = None
  End

  ; *** ENGINEERING PARAMETERS ***  
  Body = ActiveBody BodyTag_Normal
    MaxHealth = 100
    InitialHealth = 100
  End
  
  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 0
    StealthForbiddenConditions = None
    FriendlyOpacityMin = 0%
    FriendlyOpacityMax = 0%
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal = No
  End

  ; This is a misleading name, since it's really single-Mine Behavior...
  Behavior = MinefieldBehavior ModuleTag_Minefield
    DetonationWeapon = StructureMineWeapon
    DetonatedBy = ENEMIES NEUTRAL ;ALLIES ; for testing purposes
    ; We no longer want the "scoot" behavior. it looks funky with current art. (srj)
    ;ScootFromStartingPointTime = 500
    RepeatDetonateMoveThresh = 5
    NumVirtualMines = 16
    Regenerates = Yes
    StopsRegenAfterCreatorDies = Yes
    DegenPercentPerSecondAfterCreatorDies = 20% ; take about 5 seconds to die
  End

  ; Standard mines DO heal.
  Behavior = AutoHealBehavior ModuleTag_Heal
    StartsActive = Yes
    HealingAmount = 2
    HealingDelay = 5000
    StartHealingDelay = 15000 ; wait this long after we are damaged to start healing
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 30
  GeometryHeight = 1
  GeometryIsSmall = No  
End

