; tank hunter missile
Object TankHunterMissile

  ; *** ART PARAMETERS ***
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = EXStinger01
    End
    ConditionState = JAMMED
      ParticleSysBone = None SparksMedium
    End
  End

  ; *** DESIGN PARAMETERS ***
  EditorSorting = SYSTEM
  
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End

  ; *** ENGINEERING PARAMETERS ***
  KindOf = PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_02
    MaxHealth = 100
    InitialHealth = 100

    ; subdual settings
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End

  ; death fx
  Behavior = InstantDeathBehavior DeathTag_Detonated
    DeathTypes = NONE +DETONATED
  End
  Behavior = InstantDeathBehavior DeathTag_Lasered
    DeathTypes = NONE +LASERED
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathTag_Misc
    DeathTypes = ALL -LASERED -DETONATED
    FX = WeaponFX_RocketBuggyMissileDetonation
  End
    
  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 1
  End
  
  Behavior = MissileAIUpdate AITag_Missile
    TryToFollowTarget = Yes
    FuelLifetime = 3500
    InitialVelocity = 125
    IgnitionDelay = 0
    DistanceToTravelBeforeTurning = 3
    DetonateOnNoFuel = Yes
  End
  Locomotor = SET_NORMAL TankHunterMissileLocomotor

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2.0

End

