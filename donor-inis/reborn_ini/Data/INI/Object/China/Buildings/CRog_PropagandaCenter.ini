; China Rogue Propaganda Center
Object ChinaPropagandaCenter

  ; *** ART PARAMETERS ***
  SelectPortrait = SNPropCentr_L
  ButtonImage = SNPropCentr
  
  ; Main Building
  Draw = W3DModelDraw DrawTag_Main
    OkToChangeModelColor = Yes
    
    ; Day
    DefaultConditionState
      Model = NBPCenter
      Animation = NBPCenter.NBPCenter
      AnimationMode = LOOP
      Flags = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
    
    ConditionState = DAMAGED
      Model = NBPCenter_D
      Animation = NBPCenter_D.NBPCenter_D
    End
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
    
    ConditionState = REALLYDAMAGED
      Model = NBPCenter_E
      Animation = NBPCenter_E.NBPCenter_E
    End
    AliasConditionState = RUBBLE
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED RUBBLE
    
    ; Night
    ConditionState = NIGHT
      Model = NBPCenter_N
      Animation = NBPCenter_N.NBPCenter_N
    End
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT
    
    ConditionState = NIGHT DAMAGED
      Model = NBPCenter_DN
      Animation = NBPCenter_DN.NBPCenter_DN
    End
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT DAMAGED
    
    ConditionState = NIGHT REALLYDAMAGED
      Model = NBPCenter_EN
      Animation = NBPCenter_EN.NBPCenter_EN
    End
    AliasConditionState = NIGHT RUBBLE
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT REALLYDAMAGED
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT RUBBLE
    
    ; Snow
    ConditionState = SNOW
      Model = NBPCenter_S
      Animation = NBPCenter_S.NBPCenter_S
    End
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
    
    ConditionState = SNOW DAMAGED
      Model = NBPCenter_DS
      Animation = NBPCenter_DS.NBPCenter_DS
    End
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW DAMAGED
    
    ConditionState = SNOW REALLYDAMAGED
      Model = NBPCenter_ES
      Animation = NBPCenter_ES.NBPCenter_ES
    End
    AliasConditionState = SNOW RUBBLE
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW REALLYDAMAGED
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW RUBBLE
    
    ; Snow Night
    ConditionState = SNOW NIGHT
      Model = NBPCenter_NS
      Animation = NBPCenter_NS.NBPCenter_NS
    End
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT
    
    ConditionState = SNOW NIGHT DAMAGED
      Model = NBPCenter_DNS
      Animation = NBPCenter_DNS.NBPCenter_DNS
    End
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT DAMAGED
    
    ConditionState = SNOW NIGHT REALLYDAMAGED
      Model = NBPCenter_ENS
      Animation = NBPCenter_ENS.NBPCenter_ENS
    End
    AliasConditionState = SNOW NIGHT RUBBLE
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT REALLYDAMAGED
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT RUBBLE
    
    ; None Zone
    ConditionState = AWAITING_CONSTRUCTION
      Model = None
    End
    AliasConditionState = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION RUBBLE
    AliasConditionState = AWAITING_CONSTRUCTION NIGHT
    AliasConditionState = AWAITING_CONSTRUCTION NIGHT DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION NIGHT REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION NIGHT RUBBLE
    AliasConditionState = AWAITING_CONSTRUCTION SNOW
    AliasConditionState = AWAITING_CONSTRUCTION SNOW DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION SNOW REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION SNOW RUBBLE
    AliasConditionState = AWAITING_CONSTRUCTION SNOW NIGHT
    AliasConditionState = AWAITING_CONSTRUCTION SNOW NIGHT DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION SNOW NIGHT REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION SNOW NIGHT RUBBLE
    AliasConditionState = SOLD
    AliasConditionState = SOLD DAMAGED
    AliasConditionState = SOLD REALLYDAMAGED
    AliasConditionState = SOLD RUBBLE
    AliasConditionState = SOLD NIGHT
    AliasConditionState = SOLD NIGHT DAMAGED
    AliasConditionState = SOLD NIGHT REALLYDAMAGED
    AliasConditionState = SOLD NIGHT RUBBLE
    AliasConditionState = SOLD SNOW
    AliasConditionState = SOLD SNOW DAMAGED
    AliasConditionState = SOLD SNOW REALLYDAMAGED
    AliasConditionState = SOLD SNOW RUBBLE
    AliasConditionState = SOLD SNOW NIGHT
    AliasConditionState = SOLD SNOW NIGHT DAMAGED
    AliasConditionState = SOLD SNOW NIGHT REALLYDAMAGED
    AliasConditionState = SOLD SNOW NIGHT RUBBLE
  
  End
  
  ; Factory Door 
  Draw = W3DModelDraw DrawTag_Door
  
    IgnoreConditionStates = DAMAGED REALLYDAMAGED RUBBLE NIGHT SNOW
    
    DefaultConditionState
      Model = NBPCenter_A1
      Animation = NBPCenter_A1.NBPCenter_A1
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    AliasConditionState = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
    
    ConditionState = DOOR_1_OPENING
      Model = NBPCenter_A1
      Animation = NBPCenter_A1.NBPCenter_A1
      AnimationMode = ONCE
    End
    
    ConditionState = DOOR_1_WAITING_OPEN
      Model = NBPCenter_A1
      Animation = NBPCenter_A1.NBPCenter_A1
      Flags = START_FRAME_LAST
    End
    
    ConditionState = DOOR_1_CLOSING
      Model = NBPCenter_A1
      Animation = NBPCenter_A1.NBPCenter_A1
      AnimationMode = ONCE_BACKWARDS
      Flags = START_FRAME_LAST
    End
  
    ; None Zone
    ConditionState = AWAITING_CONSTRUCTION
      Model = NONE
    End
    AliasConditionState = SOLD
  End
    
  ; Flashing Lights
  Draw = W3DModelDraw ModuleTag_FlashingLights
  
    IgnoreConditionStates = DAMAGED REALLYDAMAGED RUBBLE NIGHT SNOW
  
    DefaultConditionState
      Model = NBPCenter_A2
      Animation = NBPCenter_A2.NBPCenter_A2
      AnimationMode = LOOP
      Flags = START_FRAME_FIRST
    End
    
    ; None Zone
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = None
    End
    AliasConditionState = SOLD    
  End
  
  ; Construction Zone Fence
  Draw = W3DModelDraw ModuleTag_fence
  
    AnimationsRequirePower = No
    IgnoreConditionStates = DAMAGED REALLYDAMAGED RUBBLE
    
    ; Down
    DefaultConditionState
      Model = NONE
      TransitionKey = DOWN_DEFAULT
    End
    AliasConditionState = NIGHT
    AliasConditionState = SNOW
    AliasConditionState = SNOW NIGHT
    
    ; Up
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model = NBPCenter_A4
      Animation = NBPCenter_A4.NBPCenter_A4
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_DAY
    End
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT
      Model = NBPCenter_A4N
      Animation = NBPCenter_A4N.NBPCenter_A4N
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_NIGHT
    End
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
      Model = NBPCenter_A4S
      Animation = NBPCenter_A4S.NBPCenter_A4S
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOW
    End
    ConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT
      Model = NBPCenter_A4SN
      Animation = NBPCenter_A4SN.NBPCenter_A4SN
      AnimationMode = MANUAL
      Flags = START_FRAME_LAST
      TransitionKey = UP_SNOWNIGHT
    End
    
    ; Going Up
    TransitionState = DOWN_DEFAULT UP_DAY
      Model = NBPCenter_A4
      Animation = NBPCenter_A4.NBPCenter_A4
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_NIGHT
      Model = NBPCenter_A4N
      Animation = NBPCenter_A4N.NBPCenter_A4N
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_SNOW
      Model = NBPCenter_A4S
      Animation = NBPCenter_A4S.NBPCenter_A4S
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    TransitionState = DOWN_DEFAULT UP_SNOWNIGHT
      Model = NBPCenter_A4SN
      Animation = NBPCenter_A4SN.NBPCenter_A4SN
      AnimationMode = ONCE
      Flags = START_FRAME_FIRST
    End
    
    ; Going Down
    TransitionState = UP_DAY DOWN_DEFAULT
      Model = NBPCenter_A4
      Animation = NBPCenter_A4.NBPCenter_A4
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_NIGHT DOWN_DEFAULT
      Model = NBPCenter_A4N
      Animation = NBPCenter_A4N.NBPCenter_A4N
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOW DOWN_DEFAULT
      Model = NBPCenter_A4S
      Animation = NBPCenter_A4S.NBPCenter_A4S
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End
    TransitionState = UP_SNOWNIGHT DOWN_DEFAULT
      Model = NBPCenter_A4SN
      Animation = NBPCenter_A4SN.NBPCenter_A4SN
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2 2
      Flags = START_FRAME_LAST
    End    
  End
  
  ; Scaffolding
  Draw = W3DModelDraw ModuleTag_Scaffolding
  
