  PlacementViewAngle = -45
  
  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:PropagandaCenter
  
  Side = China
  EditorSorting = STRUCTURE
  
  Prerequisites
    Object = ChinaWarFactory
  End
  
  BuildCost = 2000
  BuildTime = 45
  
  EnergyProduction = -2
  
  VisionRange = 200
  ShroudClearingRange = 200
  
  MaxSimultaneousOfType = 1
  
  ArmorSet
    Conditions = None
    Armor = StructureArmor
    DamageFX = StructureDamageFXNoShake
  End
  
  CommandSet = ChinaPropagandaCenterCommandSet
  
  ExperienceValue = 200 200 200 200
  
  ; *** AUDIO PARAMETERS ***
  VoiceSelect = PropagandaCenterSelect
  SoundOnDamaged = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy
  
  UnitSpecificSounds
    UnderConstruction = UnderConstructionLoop
  End
  
  ; *** ENGINEERING PARAMETERS ***
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE SCORE CAPTURABLE FS_TECHNOLOGY MP_COUNT_FOR_VICTORY FS_ADVANCED_TECH FS_FACTORY AUTO_RALLYPOINT
  
  Body = StructureBody BodyTag_Structure
    MaxHealth = 1000
    InitialHealth = 1000
    ; Subdual Settings
    SubdualDamageCap = 1200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
  
  ; Factory Modules
  Behavior = ProductionUpdate ModuleTag_Factory01
    NumDoorAnimations = 1
    DoorOpeningTime = 3250
    DoorWaitOpenTime = 3000
    DoorCloseTime = 4000
    ConstructionCompleteDuration = 1500
  End
  
  Behavior = DefaultProductionExitUpdate ModuleTag_Factory02
    UnitCreatePoint = X:0 Y:45 Z:0
    NaturalRallyPoint = X:57 Y:45 Z:0
  End
  
  ; Lies and Propaganda
  Behavior = PropagandaTowerBehavior ModuleTag_Propaganda01
    Radius = 150
    DelayBetweenUpdates = 2000
    HealPercentEachSecond = 2%
    PulseFX = FX_PropagandaCenterPulse
    UpgradeRequired = Upgrade_ChinaSubliminalMessaging
    UpgradedHealPercentEachSecond = 4%
    UpgradedPulseFX = FX_PropagandaCenterSubliminalPulse
  End
  
  ; Radius Decal
  Behavior = OverlordContain ModuleTag_Decal01
    Slots = 1
    DamagePercentToUnits = 100%
    AllowInsideKindOf = FS_FAKE
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Decal02
    UpgradeObject = OCL_SpeakerTowerRadiusDecal
    TriggeredBy = Upgrade_GLAWorkerFakeCommandSet
  End
  
  Behavior = GrantUpgradeCreate ModuleTag_Decal03
    UpgradeToGrant = Upgrade_GLAWorkerFakeCommandSet
    ExemptStatus = UNDER_CONSTRUCTION
  End
  
  ; Mine Field
  Behavior = GenerateMinefieldBehavior ModuleTag_MineField01
    TriggeredBy = Upgrade_ChinaMines
    MineName = ChinaStandardMine
    SmartBorder = Yes
    AlwaysCircular = Yes
    Upgradable = Yes
    UpgradedTriggeredBy = Upgrade_ChinaEMPMines
    UpgradedMineName = ChinaEMPMine
  End  
  Behavior = CommandSetUpgrade ModuleTag_MineField02
    CommandSet = ChinaPropagandaCenterCommandSetUpgrade
    TriggeredBy = Upgrade_ChinaMines
  End
  Behavior = ArmorUpgrade ModuleTag_MineField03
    TriggeredBy = Upgrade_ChinaEMPMines
  End

  
  ; Damage FX
  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ; Damage
    DamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ; Really Damaged
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionMediumExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionMediumShockwave
  End
  
  ; Death FX
  Behavior = InstantDeathBehavior DeathTag_All
    DeathTypes = All
    FX = FX_StructureMediumDeath
    OCL = OCL_LargeStructureDebris
  End
  
  ; Abilities
  
  ; Defector
  Behavior = DefectorSpecialPower ModuleTag_Defector
    SpecialPowerTemplate = SpecialPowerDefector
  End
  
  Geometry = BOX
  GeometryMajorRadius = 33
  GeometryMinorRadius = 57
  GeometryHeight = 40
  GeometryIsSmall = No
  
  Shadow = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER
  
End