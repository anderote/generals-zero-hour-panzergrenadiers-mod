  VisionRange     = 0.0
  EditorSorting   = SYSTEM

  Draw = W3DModelDraw ModuleTag_NOTREALLYADRAW

    DefaultConditionState
      Model = None
      ParticleSysBone = None FrenzyCloud
    End
  End


  KindOf = NO_COLLIDE IMMOBILE UNATTACKABLE INERT

  ; *** ENGINEERING Parameters ***
  Body = ImmortalBody ModuleTag_01
    MaxHealth = 1    
    InitialHealth = 1
  End

  Behavior = WeaponBonusUpdate ModuleTag_02
    RequiredAffectKindOf = CAN_ATTACK ; Must be set
    ForbiddenAffectKindOf = STRUCTURE ; Must be clear
    BonusDuration = 15000             ; How long effect lasts
    BonusDelay = 100000               ; How often to pulse (short lifetime will trump, of course)
    BonusRange = 200                  ; Keep in line with radius cursor size in special power template
    BonusConditionType = FRENZY_ONE   ; And which bonus to give
  End

  Behavior = DeletionUpdate ModuleTag_03 ; Not LifetimeUpdate, since I can't die.  This will DestroyObject me. 
    MinLifetime = 1 ;one pulse
    MaxLifetime = 1   
  End

  Behavior = AutoHealBehavior ModuleTag_04
    HealingAmount     = 400
    HealingDelay      = 1 ; msec ; essentially sleep forever, since lifetime is 0, below
    Radius            = 200.0f
    StartsActive      = Yes
    KindOf            = VEHICLE INFANTRY
    SingleBurst       = Yes
  End
End

