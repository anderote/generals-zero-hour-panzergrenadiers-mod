;// Language.ini ///
;// This file contains all declarations that are specific to a language.
;// for example, this is where we set the unicode font for a language

Language
  UnicodeFontName = "Comic Sans MS"
  MilitaryCaptionSpeed = 1                                ;the caption speed for the mission location type
  ;LocalFontFile = PLCC____.TTF                           ;When we add our game fonts... this is where we do it.
  CopyrightFont = "Comic Sans MS" 12 Yes                  ;Used to display copyright at start of game
  MessageFont   = "Comic Sans MS" 10 Yes                  ;Used for messages at top of screen.
  MilitaryCaptionTitleFont = "Comic Sans MS" 12 Yes       ;Mission briefing text in bottom left corner.
  MilitaryCaptionFont = "Comic Sans MS" 12 No             ;Mission briefing text in bottom left corner.
  SuperweaponCountdownNormalFont = "Comic Sans MS" 10 No  ;superweapon countdown in top right
  SuperweaponCountdownReadyFont = "Comic Sans MS" 10 Yes  ;superweapon countdown in top right
  NamedTimerCountdownNormalFont = "Comic Sans MS" 10 No   ;mission specific timer
  NamedTimerCountdownReadyFont = "Comic Sans MS" 10 No    ;mission specific timer
  DrawableCaptionFont = "Comic Sans MS" 10 No             ;captions over objects like construction percent.
  DefaultWindowFont = "Comic Sans MS" 14 No               ;default font used by windows that don't specify font.
  DefaultDisplayStringFont = "Comic Sans MS" 12 No        ;default font used for strings that don't specify font.
  TooltipFontName = "Comic Sans MS" 8 No                  ;mouse tooltips
  NativeDebugDisplay = FixedSys 8 No                      ;used to display frame rate and other debug stats.
  DrawGroupInfoFont = "Comic Sans MS" 10 No               ;used to diplay number of selection group to left of unit health bar.
  CreditsTitleFont = "Comic Sans MS" 24 No                ;used to diplay number of selection group to left of unit health bar.
  CreditsMinorTitleFont = "Comic Sans MS" 16 Yes          ;used to diplay number of selection group to left of unit health bar.
  CreditsNormalFont = "Comic Sans MS" 14 No               ;used to diplay number of selection group to left of unit health bar.
  ResolutionFontAdjustment = 0.7                          ;Fonts increase at 70% the rate the resolution increases.
End