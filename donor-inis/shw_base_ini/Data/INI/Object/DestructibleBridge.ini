Object BridgeEuropeanDestructible
; Thanks, Vector <3
; note that the landmark bridge has to have a bridge entry in Roads.ini with the same
; name as the object, in order to specify the corner towers.  jba

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = No
    ReceivesDynamicLights = Yes

    ; day
    ConditionState = NONE
      Model = CBBridgeArc
    End
    ConditionState = DAMAGED
      Model = CBBridgeArc_D
    End
    ConditionState = REALLYDAMAGED
      Model = CBBridgeArc_E
    End
    ConditionState = RUBBLE
      Model = CBBridgeArc_R
    End

    ; snow
    ConditionState = SNOW
      Model = CBBridgeArc_S
    End
    ConditionState = SNOW DAMAGED
      Model = CBBridgeArc_DS
    End
    ConditionState = SNOW REALLYDAMAGED
      Model = CBBridgeArc_ES
    End
    ConditionState = SNOW RUBBLE
      Model = CBBridgeArc_RS
    End
 End

 ; ***DESIGN parameters ***
  DisplayName   = ThingTemplate:EuropeanTowerBridge01
  EditorSorting = STRUCTURE

  ArmorSet
    Conditions = None
    Armor = DestructibleBridgeArmor
    DamageFX = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  IsBridge = Yes
  RadarPriority = NOT_ON_RADAR
  KindOf = PRELOAD STRUCTURE IMMOBILE IGNORED_IN_GUI BRIDGE ;SELECTABLE

  Body            = StructureBody ModuleTag_07
    MaxHealth       = 2000.0
    InitialHealth   = 2000.0
  End

  Behavior = BridgeBehavior ModuleTag_03
    ;<NO DATA>
  End
  
  Behavior = KeepObjectDie ModuleTag_04
    ;<NO DATA>
  End

  Behavior = AutoHealBehavior ModuleTag_Repair01
    HealingAmount     = 10
    StartHealingDelay = 3000
    HealingDelay      = 1000 ; msec
    StartsActive      = Yes
  End

  Shadow = SHADOW_VOLUME
  Geometry = BOX
  GeometryMajorRadius = 105.0
  GeometryMinorRadius = 40.0
  GeometryHeight = 1.0
  GeometryIsSmall = No
End