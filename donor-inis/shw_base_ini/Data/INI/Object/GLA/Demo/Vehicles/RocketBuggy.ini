Object Demo_GLAVehicleRocketBuggy

  ; *** ART Parameters ***
  SelectPortrait         = SURocketBuggy_L
  ButtonImage            = SURocketBuggy
  
  UpgradeCameo1 = Upgrade_GLABuggyAmmo
  UpgradeCameo2 = Upgrade_GLAAPRockets
  UpgradeCameo3 = Upgrade_GLAJunkRepair
  UpgradeCameo4 = Demo_Upgrade_SuicideBomb
  UpgradeCameo5 = Upgrade_SuperSuicideBomb
  
  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes
    IgnoreConditionStates = NIGHT

    ConditionState = NONE
      Model = UVRkBgy
      Turret = Turret
      HideSubObject = Turret02 Turret03 TurretUp01 TurretUp02 TurretUp03
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
      HideSubObject    = HEADLIGHT01
    End
    ConditionState = REALLYDAMAGED
      Model = UVRkBgy_D
      Turret = Turret
      HideSubObject = Turret02 Turret03 TurretUp01 TurretUp02 TurretUp03
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
      HideSubObject    = HEADLIGHT01
    End
    ConditionState = RUBBLE
      Model = UVRkBgy_D
      Turret = Turret
      HideSubObject = Turret02 Turret03 TurretUp01 TurretUp02 TurretUp03
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
      HideSubObject    = HEADLIGHT01
    End

;;;;Weaponset Upgrade
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      Model = UVSRockBug
      Turret = Turret
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
      HideSubObject    = HEADLIGHT01
    End
    ConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED
      Model = UVSRockBug_D
      Turret = Turret
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
      HideSubObject    = HEADLIGHT01
    End
    ConditionState = WEAPONSET_PLAYER_UPGRADE RUBBLE
      Model = UVSRockBug_D
      Turret = Turret
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
      HideSubObject    = HEADLIGHT01
    End

    TrackMarks = EXTireTrack.tga
    Dust                        = RocketBuggyDust
    DirtSpray                   = RocketBuggyDirtSpray
    PowerslideSpray             = RocketBuggyDirtPowerSlide

    ; These parameters are only used if the model has a separate suspension, 
    ; and the locomotor has HasSuspension = Yes.
    LeftFrontTireBone           = Tire01
    RightFrontTireBone          = Tire02
    LeftRearTireBone            = Tire03
    RightRearTireBone           = Tire04
    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 2.5   ; This speed is added to the rotation speed when powersliding.
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:RocketBuggy
  Side                = GLA
  EditorSorting       = VEHICLE
  TransportSlotCount  = 3                 ;how many "slots" we take in a transport (0 == not transportable)
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY BuggyRocketWeapon
  End

  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY InsaneBuggyRocketWeapon
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End
  WeaponSet
    Conditions = CARBOMB PLAYER_UPGRADE
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions      = None
    Armor           = TruckArmor
    DamageFX        = TankDamageFX
  End

  BuildCost       = 900
  BuildTime       = 10.0          ;in seconds    

  VisionRange         = 180
  ShroudClearingRange = 300

  Prerequisites
    Object = Demo_GLAPalace
  End

  ExperienceValue       = 45 90 130 175    ;Experience point value at each level
  ExperienceRequired    = 0 180 455 875  ;Experience points needed to gain each level
  IsTrainable           = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet            = GLAVehicleRocketBuggyCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = RocketBuggyVoiceSelect
  VoiceMove             = RocketBuggyVoiceMove
  VoiceAttack           = RocketBuggyVoiceAttack
  SoundMoveStart        = RocketBuggyMoveStart
  SoundMoveStartDamaged = RocketBuggyMoveStart
  VoiceGuard            = RocketBuggyVoiceMove
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate          = RocketBuggyVoiceCreate
    TurretMoveStart      = NoSound
    TurretMoveLoop       = TurretMoveLoop  
  ; Required for the W3DTruckDraw module
    TruckLandingSound    = RocketBuggyLand
    TruckPowerslideSound = RocketBuggyPowerslide
    VoiceCrush           = RocketBuggyVoiceCrush
    VoiceEnter           = RocketBuggyVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK DONT_AUTO_CRUSH_INFANTRY CAN_CAST_REFLECTIONS VEHICLE SALVAGER SCORE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 120
    InitialHealth   = 120

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 240
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 90
      ControlledWeaponSlots = PRIMARY
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL RocketBuggyLocomotor
  Locomotor = SET_NORMAL_UPGRADED RocketBuggyLocomotorUpgraded

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 50.0
  End

; The pop up AirDeath 
  Behavior = SlowDeathBehavior ModuleTag_05
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 5
    ModifierBonusPerOverkillPercent = 20%  ; negative means less likely to pick this in the face of much damage, positive means more likely
    DestructionDelay = 0
    FX = INITIAL FX_BuggyNewDeathExplosion
    OCL = FINAL OCL_RocketBuggyAirDeathStart
    ExemptStatus = WET
  End
  Behavior = StatusBitsUpgrade ModuleTag_UpgradedDeath01
    TriggeredBy = Upgrade_GLABuggyAmmo
    StatusToSet = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_UpgradedDeath02
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 5
    ModifierBonusPerOverkillPercent = 20%  ; negative means less likely to pick this in the face of much damage, positive means more likely
    DestructionDelay = 0
    FX = INITIAL FX_BuggyNewDeathExplosion
    OCL = FINAL OCL_RocketBuggyAirDeathStartUpgraded
    RequiredStatus = WET
  End

  Behavior = AutoHealBehavior ModuleTag_08
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = WeaponSetUpgrade ModuleTag_09
    TriggeredBy = Upgrade_GLABuggyAmmo
  End
  Behavior = LocomotorSetUpgrade ModuleTag_SmoothRide01
    TriggeredBy = Upgrade_GLABuggyAmmo
  End

  Behavior = DestroyDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_12
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_RocketBuggy_CrushEffect
  End
  Behavior = CreateCrateDie ModuleTag_14
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End
  
  Behavior                 = TransitionDamageFX ModuleTag_15
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = CommandSetUpgrade ModuleTag_19
    CommandSet  = GLAVehicleRocketBuggyUpgradedCommandSet
    TriggeredBy = Upgrade_GLABuggyAmmo
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = VeterancyGainCreate ModuleTag_Veteran01
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_TechnicalTraining
  End
  
  Behavior = ProductionUpdate ModuleTag_Horn01
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Horn02
    UpgradeObject = OCL_BuggyHornDummyObject
    TriggeredBy   = Upgrade_GLAWorkerFakeCommandSet
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_George 
    DeathWeapon   = Demo_SuicideDynamitePackPlusFire
    StartsActive  = No
    TriggeredBy   = Demo_Upgrade_SuicideBomb
  End

  Behavior = CommandSetUpgrade ModuleTag_12419
    CommandSet  = Demo_GLAVehicleRocketBuggyCommandSetUpgrade
    TriggeredBy = Demo_Upgrade_SuicideBomb
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DemoTrap01
    DeathWeapon  = Demo_CreateAdvancedDemoTrap
    StartsActive = No                      ; turned on by upgrade
    TriggeredBy  = Demo_Upgrade_SuicideBomb
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DemoTrap02
    DeathWeapon  = Demo_CreateSuperAdvancedDemoTrap
    StartsActive = No                      ; turned on by upgrade
    TriggeredBy  = Upgrade_SuperSuicideBomb
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Behavior = EjectPilotDie ModuleTag_Crew00
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet0
    AirCreationList = OCL_TankCrewVet0
    VeterancyLevels = NONE +REGULAR
  End
  Behavior = EjectPilotDie ModuleTag_Crew01
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet1
    AirCreationList = OCL_TankCrewVet1
    VeterancyLevels = NONE +VETERAN
  End
  Behavior = EjectPilotDie ModuleTag_Crew02
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet2
    AirCreationList = OCL_TankCrewVet2
    VeterancyLevels = NONE +ELITE
  End
  Behavior = EjectPilotDie ModuleTag_Crew03
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet3
    AirCreationList = OCL_TankCrewVet3
    VeterancyLevels = NONE +HEROIC
  End

  Geometry = BOX
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 8     
  GeometryIsSmall = Yes    

  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End
