    OCL                 = INITIAL OCL_NeutronRadiationDeathInfantry
    FX                  = INITIAL FX_GIDieVirus
    FX                  = FINAL   FX_DieByToxinGLA
    ExemptStatus        = WET
  End

; --- end Death modules ---


  Behavior = StealthDetectorUpdate ModuleTag_12
    DetectionRate         = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange        = 160 ;Dustin, enable this for independant balancing!
    CanDetectWhileGarrisoned  = No ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained   = No ;Contained means being in a transport or tunnel network.
    ExtraRequiredKindOf   = MINE  ; we can only detect MINES, not other stealthed things
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_1012
    DetectionRate         = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange        = 160
    CanDetectWhileGarrisoned  = No ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained   = No ;Contained means being in a transport or tunnel network.
    ExtraRequiredKindOf   = DEMOTRAP  ; we can only detect MINES, not other stealthed things
  End

  Behavior = PoisonedBehavior ModuleTag_13
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  End

  Behavior = CommandSetUpgrade ModuleTag_Defend01
    TriggeredBy = Upgrade_GLAWorkerFakeCommandSet
    RemovesUpgrades = Upgrade_GLAWorkerFakeCommandSet Upgrade_GLAWorkerRealCommandSet Upgrade_TertiaryCommandSet
    CommandSet = Slth_GLAWorkerBaseDefenseCommandSet
  End
 
  Behavior = CommandSetUpgrade ModuleTag_Defend02
    TriggeredBy = Upgrade_GLAWorkerRealCommandSet
    RemovesUpgrades = Upgrade_GLAWorkerFakeCommandSet Upgrade_GLAWorkerRealCommandSet Upgrade_TertiaryCommandSet
    CommandSet = Slth_GLAWorkerCommandSet
  End

  ;Goes to the magical page of trees
  Behavior = CommandSetUpgrade ModuleTag_TreeMagic01
    TriggeredBy = Upgrade_TertiaryCommandSet
    RemovesUpgrades = Upgrade_GLAWorkerFakeCommandSet Upgrade_GLAWorkerRealCommandSet Upgrade_TertiaryCommandSet
    CommandSet = GLAWorkerTreeCommandSet
  End
 
  Behavior = ProductionUpdate ModuleTag_16
    MaxQueueEntries = 1; For the command set switching upgrade
  End

  Behavior = SpecialAbility ModuleTag_444
    SpecialPowerTemplate      = SpecialAbilityBoobyTrap
    UpdateModuleStartsAttack  = Yes
    StartsPaused              = Yes
  End
  Behavior = SpecialAbilityUpdate ModuleTag_445
    SpecialPowerTemplate = SpecialAbilityBoobyTrap
    StartAbilityRange = 5.0
    PreparationTime = 0
    SpecialObject = BoobyTrap
