Object Slth_GLAInfantryWorker

  ; *** ART Parameters ***
  SelectPortrait         = SUStealthWorker_L
  ButtonImage            = SUStealthWorker
  
  UpgradeCameo1 = Upgrade_GLAWorkerShoes
  UpgradeCameo2 = Upgrade_AdvancedGapGenerators
  UpgradeCameo3 = Upgrade_GLAJunkRepair
  UpgradeCameo4 = Upgrade_GLAInfantryRebelBoobyTrapAttack

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    IgnoreConditionStates = REALLYDAMAGED

    DefaultConditionState
      Model         = UIWkrSlth_SKN
      IdleAnimation = UIWRKR_SKL.UIWRKR_STA 0 9
      IdleAnimation = UIWRKR_SKL.UIWRKR_IDA
      AnimationMode = ONCE
      TransitionKey = TRANS_Stand
      HideSubObject = OMGL33TSHOES
      WaitForStateToFinishIfPossible = DroppingCrate
    End

    ConditionState  = MOVING
      Animation     = UIWRKR_SKL.UIWRKR_RNA 16
      AnimationMode = LOOP
      Flags         = RANDOMSTART
      TransitionKey = TRANS_Moving
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = ACTIVELY_CONSTRUCTING MOVING

    ConditionState = ATTACKING
      ShowSubObject = MINED_SKIN
      Animation = UIWRKR_SKL.UIWRKR_MS
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_MetalDetector_Standing
    End

    ConditionState = MOVING ATTACKING
      Animation = UIWRKR_SKL.UIWRKR_MSW 50
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_MetalDetector_Moving
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING ATTACKING CARRYING

    TransitionState = TRANS_Stand TRANS_MetalDetector_Standing    ;STANDING -> ATTACKING
      Animation     = UIWRKR_SKL.UIWRKR_TRB1;take out standing
      AnimationMode = ONCE
    End
    TransitionState = TRANS_MetalDetector_Standing TRANS_Stand    ;ATTACKING -> STANDING
      Animation     = UIWRKR_SKL.UIWRKR_TRB2;put away standing
      AnimationMode = ONCE
    End

    TransitionState = TRANS_Carry TRANS_MetalDetector_Standing    ;CARRYING -> ATTACKING
      Animation     = UIWRKR_SKL.UIWRKR_TRB1;take out standing
      AnimationMode = ONCE
    End
    TransitionState = TRANS_MetalDetector_Standing TRANS_Carry    ;ATTACKING -> CARRYING
      ShowSubObject = MINED_SKIN
      Animation     = UIWRKR_SKL.UIWRKR_TRB2;put away standing
      AnimationMode = ONCE
    End
    TransitionState = TRANS_Carry TRANS_MetalDetector_Moving      ;CARRYING -> MOVING ATTACKING
      Animation     = UIWRKR_SKL.UIWRKR_TRC1;take out moving [NEW NON-SKATING ANIMATION]
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 2.0 2.0
    End

    TransitionState = TRANS_MetalDetector_Moving TRANS_Stand      ;MOVING ATTACKING -> STANDING
      Animation     = UIWRKR_SKL.UIWRKR_TRB2;put away moving
      AnimationMode = ONCE
    End
    TransitionState = TRANS_Stand TRANS_MetalDetector_Moving      ;STANDING -> MOVING ATTACKING
      Animation     = UIWRKR_SKL.UIWRKR_TRC1;take out moving [NEW NON-SKATING ANIMATION]
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 2.0 2.0
    End

    TransitionState = TRANS_Moving TRANS_MetalDetector_Standing   ;MOVING -> ATTACKING [STANDING]
      Animation     = UIWRKR_SKL.UIWRKR_TRB1;take out standing
      AnimationMode = ONCE
    End
    TransitionState = TRANS_MetalDetector_Standing TRANS_Moving   ;ATTACKING [STANDING] -> MOVING
      Animation     = UIWRKR_SKL.UIWRKR_TRC2;put away moving [NEW NON-SKATING ANIMATION]
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 2.0 2.0
    End

    TransitionState = TRANS_Moving TRANS_MetalDetector_Moving     ;MOVING -> MOVING ATTACKING
      Animation     = UIWRKR_SKL.UIWRKR_TRC1;take out moving [NEW NON-SKATING ANIMATION]
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 2.0 2.0
    End
    TransitionState = TRANS_MetalDetector_Moving TRANS_Moving     ;MOVING ATTACKING -> MOVING
      Animation     = UIWRKR_SKL.UIWRKR_TRC2;put away moving [NEW NON-SKATING ANIMATION]
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 2.0 2.0
    End


    ConditionState = MOVING CARRYING
      ShowSubObject = BOX
      Animation = UIWRKR_SKL.UIWRKR_CARY 12
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_Carry
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = ACTIVELY_CONSTRUCTING MOVING CARRYING

    ConditionState = CARRYING
      Animation = UIWRKR_SKL.UIWRKR_CARST 30 
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_Carry
    End

    ConditionState = DYING
      Animation = UIWRKR_SKL.UIWRKR_DTA
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End
    AliasConditionState = DYING CARRYING

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = UIWRKR_SKL.UIWRKR_ADTE1
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = UIWRKR_SKL.UIWRKR_ADTE2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = UIWRKR_SKL.UIWRKR_ADTE3
      AnimationMode = ONCE
      TransitionKey = None
    End

    ConditionState  = SPECIAL_CHEERING
      Animation     = UIWRKR_SKL.UIWRKR_CHA
      AnimationMode = ONCE
    End
    
    ConditionState  = ACTIVELY_CONSTRUCTING
      Animation     = UIWRKR_SKL.UIWRKR_BDA
      AnimationMode = LOOP
      TransitionKey = TRANS_Constructing
    End
    AliasConditionState = ACTIVELY_CONSTRUCTING CARRYING

    ; --------------------
    ConditionState = DOCKING
      Animation     = UIWRKR_SKL.UIWRKR_PIK
      AnimationMode = ONCE
      TransitionKey = DroppingCrate
    End

    ConditionState = DOCKING CARRYING
      Animation     = UIWRKR_SKL.UIWRKR_PIK
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.3 2.3
      Flags         = START_FRAME_LAST
      TransitionKey = DroppingCrate
    End
    
    TransitionState = TRANS_Stand TRANS_Constructing
      Animation     = UIWRKR_SKL.UIWRKR_TRA1
      AnimationMode = ONCE
    End

    TransitionState = TRANS_Constructing TRANS_Stand
      Animation     = UIWRKR_SKL.UIWRKR_TRA2
      AnimationMode = ONCE
    End

    ConditionState = USER_1
      Model = None
    End
    AliasConditionState = USER_1 MOVING
    AliasConditionState = USER_1 MOVING ACTIVELY_CONSTRUCTING
    AliasConditionState = USER_1 MOVING CARRYING
    AliasConditionState = USER_1 MOVING ACTIVELY_CONSTRUCTING CARRYING
    AliasConditionState = USER_1 ATTACKING
    AliasConditionState = USER_1 ATTACKING MOVING
    AliasConditionState = USER_1 ATTACKING MOVING CARRYING
    AliasConditionState = USER_1 ACTIVELY_CONSTRUCTING
    AliasConditionState = USER_1 CARRYING
    AliasConditionState = USER_1 ACTIVELY_CONSTRUCTING CARRYING
    AliasConditionState = USER_1 DOCKING
    AliasConditionState = USER_1 DOCKING CARRYING
    AliasConditionState = USER_1 DOCKING MOVING
    AliasConditionState = USER_1 DYING
    AliasConditionState = USER_1 DYING CARRYING
    AliasConditionState = USER_1 DYING EXPLODED_FLAILING
    AliasConditionState = USER_1 DYING EXPLODED_BOUNCING
  End

  ; *** FORKLIFT MODE ON ***
  
  ; No model without upgrade
  Draw = W3DTruckDraw ModuleTag_ForkU
    OkToChangeModelColor = Yes

    ;Thanks for the touch-ups, Zeke :D
    DefaultConditionState
      Model = ExJammerRadius
      ; No model
      ; but insert animation
      Animation = UVForklift.UVForklift
      AnimationMode = MANUAL
      Flags = START_FRAME_FIRST
      ; also hide box by default
      HideSubObject = BOX BOX01
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = CARRYING
    AliasConditionState = CARRYING REALLYDAMAGED
    AliasConditionState = MOVING
    AliasConditionState = MOVING REALLYDAMAGED
    AliasConditionState = MOVING CARRYING
    AliasConditionState = MOVING CARRYING REALLYDAMAGED
    AliasConditionState = ACTIVELY_CONSTRUCTING
    AliasConditionState = ACTIVELY_CONSTRUCTING REALLYDAMAGED
    AliasConditionState = ACTIVELY_CONSTRUCTING CARRYING
    AliasConditionState = ACTIVELY_CONSTRUCTING CARRYING REALLYDAMAGED
    AliasConditionState = ACTIVELY_CONSTRUCTING MOVING
    AliasConditionState = ACTIVELY_CONSTRUCTING MOVING REALLYDAMAGED
    AliasConditionState = ACTIVELY_CONSTRUCTING CARRYING MOVING
    AliasConditionState = ACTIVELY_CONSTRUCTING CARRYING MOVING REALLYDAMAGED
    AliasConditionState = ATTACKING
    AliasConditionState = ATTACKING REALLYDAMAGED
    AliasConditionState = ATTACKING MOVING
    AliasConditionState = ATTACKING MOVING REALLYDAMAGED
    AliasConditionState = ATTACKING MOVING CARRYING
    AliasConditionState = ATTACKING MOVING CARRYING REALLYDAMAGED
    AliasConditionState = DOCKING
    AliasConditionState = DOCKING REALLYDAMAGED
    AliasConditionState = DOCKING CARRYING
    AliasConditionState = DOCKING CARRYING REALLYDAMAGED
    AliasConditionState = DOCKING MOVING
    AliasConditionState = DOCKING MOVING REALLYDAMAGED
    AliasConditionState = DOCKING MOVING CARRYING
    AliasConditionState = DOCKING MOVING CARRYING REALLYDAMAGED
    AliasConditionState = DYING
    AliasConditionState = DYING CARRYING
    AliasConditionState = DYING EXPLODED_FLAILING
    AliasConditionState = DYING EXPLODED_BOUNCING
    AliasConditionState = SPECIAL_CHEERING
    AliasConditionState = SPECIAL_CHEERING REALLYDAMAGED

    ; idle
    ConditionState = USER_1
      Model = UVForklift
      WaitForStateToFinishIfPossible = DroppingCrate
    End
    AliasConditionState = USER_1 MOVING
    AliasConditionState = USER_1 SPECIAL_CHEERING
    
    ConditionState = USER_1 REALLYDAMAGED
      Model = UVForklift_D
      Animation = UVForklift_D.UVForklift_D
      ParticleSysBone = SMOKE01 DozerSmokeLight
      WaitForStateToFinishIfPossible = DroppingCrateDamaged
    End
    AliasConditionState = USER_1 MOVING REALLYDAMAGED
    AliasConditionState = USER_1 SPECIAL_CHEERING REALLYDAMAGED
        
    ; idle with box
    ConditionState = USER_1 CARRYING
      Model = UVForklift
      Flags = START_FRAME_LAST
      ShowSubObject = BOX BOX01
    End
    AliasConditionState = USER_1 CARRYING MOVING
    
    ConditionState = USER_1 CARRYING REALLYDAMAGED
      Model = UVForklift_D
      Animation = UVForklift_D.UVForklift_D
      Flags = START_FRAME_LAST
      ShowSubObject = BOX BOX01
      ParticleSysBone = SMOKE01 DozerSmokeLight
    End
    AliasConditionState = USER_1 CARRYING MOVING REALLYDAMAGED
    
    ; *** CONSTRUCTING STATES ***
    
    ; building stuff
    ConditionState = USER_1 ACTIVELY_CONSTRUCTING
      Model = UVForklift
      AnimationMode = LOOP_PINGPONG
    End
    AliasConditionState = USER_1 ACTIVELY_CONSTRUCTING MOVING
    AliasConditionState = USER_1 ACTIVELY_CONSTRUCTING CARRYING
    AliasConditionState = USER_1 ACTIVELY_CONSTRUCTING CARRYING MOVING
    AliasConditionState = USER_1 ATTACKING
    AliasConditionState = USER_1 ATTACKING MOVING
    
    ConditionState = USER_1 ACTIVELY_CONSTRUCTING REALLYDAMAGED
      Model = UVForklift_D
      Animation = UVForklift_D.UVForklift_D
      AnimationMode = LOOP_PINGPONG
      ParticleSysBone = SMOKE01 DozerSmokeLight
    End
    AliasConditionState = USER_1 ACTIVELY_CONSTRUCTING MOVING REALLYDAMAGED
    AliasConditionState = USER_1 ACTIVELY_CONSTRUCTING CARRYING REALLYDAMAGED
    AliasConditionState = USER_1 ACTIVELY_CONSTRUCTING CARRYING MOVING REALLYDAMAGED
    AliasConditionState = USER_1 ATTACKING REALLYDAMAGED
    AliasConditionState = USER_1 ATTACKING MOVING REALLYDAMAGED
    
    ; *** COLLECTING STATES ***
    
    ; I pick things up
    ConditionState = USER_1 DOCKING
      Model = UVForklift
      AnimationMode = ONCE
      ShowSubObject = BOX BOX01
      TransitionKey = DroppingCrate
      TransitionKey = PickingCrate
    End
    AliasConditionState = USER_1 DOCKING MOVING

    ConditionState = USER_1 DOCKING REALLYDAMAGED
      Model = UVForklift_D
      Animation = UVForklift_D.UVForklift_D
      AnimationMode = ONCE
      ShowSubObject = BOX BOX01
      ParticleSysBone = SMOKE01 DozerSmokeLight
      TransitionKey = DroppingCrateDamaged
      TransitionKey = PickingCrateDamaged
    End
    AliasConditionState = USER_1 DOCKING MOVING REALLYDAMAGED

    ;And I put them down
    ConditionState = USER_1 DOCKING CARRYING
      Model                     = UVForklift
      AnimationMode             = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 1.5 1.5
      Flags                     = START_FRAME_LAST MAINTAIN_FRAME_ACROSS_STATES
      ShowSubObject             = BOX BOX01
      TransitionKey             = DroppingCrate
      WaitForStateToFinishIfPossible = PickingCrate
    End
    AliasConditionState = USER_1 DOCKING CARRYING MOVING

    ConditionState = USER_1 DOCKING CARRYING REALLYDAMAGED
      Model                     = UVForklift_D
      Animation                 = UVForklift_D.UVForklift_D
      AnimationMode             = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 1.5 1.5
      Flags                     = START_FRAME_LAST MAINTAIN_FRAME_ACROSS_STATES
      ShowSubObject             = BOX BOX01
      ParticleSysBone           = SMOKE01 DozerSmokeLight
      TransitionKey             = DroppingCrateDamaged
      WaitForStateToFinishIfPossible = PickingCrateDamaged
    End
    AliasConditionState = USER_1 DOCKING CARRYING MOVING REALLYDAMAGED

    ConditionState = USER_1 DYING
      Model = NONE
    End
    AliasConditionState = USER_1 DYING CARRYING
    AliasConditionState = USER_1 DYING EXPLODED_FLAILING
    AliasConditionState = USER_1 DYING EXPLODED_BOUNCING
    
    ;;;TrackMarks = EXTireTrack2.tga
    Dust = RocketBuggyDust

    LeftFrontTireBone  = Tire04
    RightFrontTireBone = Tire03
    LeftRearTireBone   = Tire02
    RightRearTireBone  = Tire01
    TireRotationMultiplier = 0.4 ; this * speed = rotation.
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Worker
  Side = GLAStealthGeneral
  EditorSorting = INFANTRY
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)


  WeaponSet
    Conditions = None 
    Weapon = PRIMARY None
  End
  WeaponSet
    Conditions = MINE_CLEARING_DETAIL 
    Weapon = PRIMARY WorkerMineDisarmingWeapon
  End


  ArmorSet
    Conditions      = None
    Armor           = HumanArmor
    DamageFX        = InfantryDamageFX
  End
  ArmorSet
    Conditions      = PLAYER_UPGRADE
    Armor           = GLAForkliftArmor ;mine protection
    DamageFX        = TruckDamageFX
  End

  VisionRange = 100
  ShroudClearingRange = 200

  ExperienceValue = 5 5 5 5    ;Experience point value at each level
  ExperienceRequired = 0 9999 9999 9999  ;More than realistic. Crates basically required
  IsTrainable = No  ;(Caused a weird art bug with Forklifts when = Yes) ;Yes             ;Can gain experience

  BuildCost = 200
  BuildTime = 3.0          ;in seconds    
  CrushableLevel         = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = Slth_GLAWorkerCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = WorkerVoiceSelect
  VoiceMove = WorkerVoiceMove
  VoiceAttack = WorkerVoiceMove
  VoiceGuard = WorkerVoiceMove
  VoiceFear = WorkerVoiceFear
  VoiceTaskComplete = WorkerVoiceBuildComplete
  UnitSpecificSounds
    VoiceEnter        = WorkerVoiceMoveUpgraded
    VoiceEnterHostile = WorkerVoiceMoveUpgraded
    VoiceGarrison     = WorkerVoiceGarrison
    VoiceCreate       = WorkerVoiceCreate
    VoiceSupply       = WorkerVoiceSupply
    VoiceNoBuild      = WorkerVoiceBuildNot
    VoiceRepair       = WorkerVoiceRepair
    VoiceDisarm       = WorkerVoiceClearMine
    VoiceBuildResponse = WorkerVoiceBuild
    VoiceGetHealed    = WorkerVoiceMoveUpgraded
    VoiceMoveUpgraded = WorkerVoiceMoveUpgraded
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_CAST_REFLECTIONS INFANTRY SALVAGER DOZER HARVESTER SCORE STEALTH_GARRISON BLAST_CRATER ;This is to avoid demotrap targeting

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = WorkerAIUpdate ModuleTag_03
    RepairHealthPercentPerSecond  = 10%    ; % of max health to repair each second
    BoredTime                     = 5000  ; in milliseconds
    BoredRange                    = 150   ; when bored, we look this far away to do something 
    MaxBoxes                      = 1
    UpgradedSupplyBoost           = 75    ; gives this much more cash for every box collected
    SupplyCenterActionDelay       = 75    ; ms for whole thing (one transaction)
    SupplyWarehouseActionDelay    = 150   ; ms per box (many small transactions)
    SupplyWarehouseScanDistance   = 700   ; Max distance to look for a warehouse, or we go home.  (Direct dock command on warehouse overrides, and no max on Center Scan)
    SuppliesDepletedVoice = WorkerVoiceSuppliesDepleted
    ; the only "enemies" that workers can acquire are mines, to be disarmed...
    AutoAcquireEnemiesWhenIdle    = Yes
  End
  Locomotor = SET_NORMAL FastHumanLocomotor
  Locomotor = SET_NORMAL_UPGRADED WorkerForkliftLocomotor
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    ShockResistance = 1.0
  End
 
  Behavior = SquishCollide ModuleTag_06
    ;nothing
  End
  Behavior = LocomotorSetUpgrade ModuleTag_07
    TriggeredBy = Upgrade_GLAWorkerShoes
  End
  Behavior = ArmorUpgrade ModuleTag_SubtleForklift01
    TriggeredBy = Upgrade_GLAWorkerShoes
  End

  Behavior = VeterancyGainCreate ModuleTag_860
    StartingLevel = VETERAN
    ScienceRequired = Slth_SCIENCE_GLAInfantryTraining
  End

; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6 -EXTRA_7 -EXTRA_8
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_WorkerDie
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_WorkerDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
