Object Slth_GLAVehicleUnderminer
  ;yoooo thanks mp
  ; *** ART Parameters ***
  SelectPortrait         = SUUndrmnr
  ButtonImage            = SUUndrmnr
  
  UpgradeCameo1 = Upgrade_GLAJunkRepair

  ;BONES:
  ;STEAM01 - 08: The vents on the top of the drill
  ;EXHAUST01 - 04: Smoke exhausts on engine block
  ;EXHAUST05 - 06: Smoke exhaust on tailpipes
  ;TREADFX01 - 02: The usual track dirt bones

  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model           = UVUndMiner
      ParticleSysBone = EXHAUST01 DozerSmokeLight
      ParticleSysBone = EXHAUST02 DozerSmokeLight
      ParticleSysBone = EXHAUST03 DozerSmokeLight
      ParticleSysBone = EXHAUST04 DozerSmokeLight
    End

    ConditionState = MOVING
      ParticleSysBone = EXHAUST05 DozerSmokeHeavy
      ParticleSysBone = EXHAUST06 DozerSmokeHeavy
    End

    ConditionState = REALLYDAMAGED
      Model           = UVUndMiner_D
      ParticleSysBone = EXHAUST01 DozerSmokeLight
      ParticleSysBone = EXHAUST02 DozerSmokeLight
      ParticleSysBone = EXHAUST03 DozerSmokeLight
      ParticleSysBone = EXHAUST04 DozerSmokeLight
    End

    ConditionState = REALLYDAMAGED MOVING
      Model           = UVUndMiner_D
      ParticleSysBone = EXHAUST05 DozerSmokeHeavy
      ParticleSysBone = EXHAUST06 DozerSmokeHeavy
    End

    ConditionState = RUBBLE
      Model           = UVUndMiner_D1
    End

    ConditionState = UNPACKING
      Animation     = UVUndMiner.UVUndMiner
      AnimationMode = MANUAL
    End
    AliasConditionState = UNPACKING FIRING_B

    ConditionState = PACKING
      Animation     = UVUndMiner.UVUndMiner
      AnimationMode = MANUAL
    End
    AliasConditionState = PACKING FIRING_B

    ConditionState  = DEPLOYED 
      Model         = UVUndMiner_ATK
      Animation     = UVUndMiner_ATK.UVUndMiner_ATK
      AnimationMode = MANUAL
      ParticleSysBone = STEAM01 CombatBikeSmokeLight
      ParticleSysBone = STEAM02 CombatBikeSmokeLight
      ParticleSysBone = STEAM03 CombatBikeSmokeLight
      ParticleSysBone = STEAM04 CombatBikeSmokeLight
      ParticleSysBone = STEAM05 CombatBikeSmokeLight
      ParticleSysBone = STEAM06 CombatBikeSmokeLight
      ParticleSysBone = STEAM07 CombatBikeSmokeLight
      ParticleSysBone = STEAM08 CombatBikeSmokeLight
    End
    AliasConditionState = FIRING_B
    AliasConditionState = RELOADING_B
    AliasConditionState = DEPLOYED RELOADING_B

    ConditionState  = DEPLOYED PREATTACK_B
      Model         = UVUndMiner_ATK
      Animation     = UVUndMiner_ATK.UVUndMiner_ATK
      AnimationMode = ONCE
      ParticleSysBone = STEAM01 DozerSmokeHeavy
      ParticleSysBone = STEAM02 DozerSmokeHeavy
      ParticleSysBone = STEAM03 DozerSmokeHeavy
      ParticleSysBone = STEAM04 DozerSmokeHeavy
      ParticleSysBone = STEAM05 DozerSmokeHeavy
      ParticleSysBone = STEAM06 DozerSmokeHeavy
      ParticleSysBone = STEAM07 DozerSmokeHeavy
      ParticleSysBone = STEAM08 DozerSmokeHeavy
    End


    ;REALLYDAMAGED States
    ConditionState = UNPACKING REALLYDAMAGED
      Animation     = UVUndMiner_D.UVUndMiner_D
      AnimationMode = MANUAL
    End
    AliasConditionState = UNPACKING REALLYDAMAGED FIRING_B

    ConditionState = PACKING REALLYDAMAGED
      Animation     = UVUndMiner_D.UVUndMiner_D
      AnimationMode = MANUAL
    End
    AliasConditionState = PACKING REALLYDAMAGED FIRING_B

    ConditionState  = REALLYDAMAGED DEPLOYED 
      Model         = UVUndMiner_ATKD
      Animation     = UVUndMiner_ATKD.UVUndMiner_ATKD
      AnimationMode = MANUAL
      ParticleSysBone = STEAM01 CombatBikeSmokeLight
      ParticleSysBone = STEAM02 CombatBikeSmokeLight
      ParticleSysBone = STEAM03 CombatBikeSmokeLight
      ParticleSysBone = STEAM04 CombatBikeSmokeLight
      ParticleSysBone = STEAM05 CombatBikeSmokeLight
      ParticleSysBone = STEAM06 CombatBikeSmokeLight
      ParticleSysBone = STEAM07 CombatBikeSmokeLight
      ParticleSysBone = STEAM08 CombatBikeSmokeLight
    End
    AliasConditionState = REALLYDAMAGED FIRING_B
    AliasConditionState = REALLYDAMAGED RELOADING_B
    AliasConditionState = REALLYDAMAGED DEPLOYED RELOADING_B

    ConditionState  = REALLYDAMAGED DEPLOYED PREATTACK_B
      Model         = UVUndMiner_ATKD
      Animation     = UVUndMiner_ATKD.UVUndMiner_ATKD
      AnimationMode = ONCE
      ParticleSysBone = STEAM01 DozerSmokeHeavy
      ParticleSysBone = STEAM02 DozerSmokeHeavy
      ParticleSysBone = STEAM03 DozerSmokeHeavy
      ParticleSysBone = STEAM04 DozerSmokeHeavy
      ParticleSysBone = STEAM05 DozerSmokeHeavy
      ParticleSysBone = STEAM06 DozerSmokeHeavy
      ParticleSysBone = STEAM07 DozerSmokeHeavy
      ParticleSysBone = STEAM08 DozerSmokeHeavy
    End

    TrackMarks              = EXTnkTrack.tga
    TreadAnimationRate      = 4.0  ; amount of tread texture to move per second
  End

  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:Underminer
  Side                  = GLAStealthGeneral
  EditorSorting         = VEHICLE
  TransportSlotCount    = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY DummyWeapon
    Weapon = SECONDARY UnderminerTestWeapon
    AutoChooseSources = SECONDARY NONE
  End

  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End

  Prerequisites
    Object = Slth_GLAPalace
  End

  BuildCost           = 4000
  BuildTime           = 75.0          ;in seconds    
  VisionRange         = 125
  ShroudClearingRange = 250

  ExperienceValue    = 2500 2500 2500 2500    ;Experience point value at each level
  IsTrainable        = No             ;Can gain experience
  CrusherLevel       = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel     = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet         = GLATankUnderminerCommandSet

  MaxSimultaneousOfType = DeterminedBySuperweaponRestriction ; Normally unlimited, but can be selected by players in multiplayer games
  MaxSimultaneousLinkKey = Superweapon  ; Count all superweapons **AND THE GLA SCUD STORM REBUILD HOLE** as one "type" for MaxSimultaneousOfType

  ; *** AUDIO Parameters ***
  VoiceSelect           = UMVoiceSelect
  VoiceMove             = UMVoiceMove
  VoiceGuard            = UMVoiceMove
  VoiceAttack           = NoSound      ;Button location sound
  VoiceFear             = UMVoiceFear
  SoundMoveStart        = NukeCannonMoveStart
  SoundMoveStartDamaged = NukeCannonMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = UMVoiceCreate
    VoiceEnter          = UMVoiceMove
    Deploy              = NukeCannonDeploy
    Undeploy            = NukeCannonUnDeploy
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK VEHICLE HUGE_VEHICLE SALVAGER SCORE CANNOT_RETALIATE FS_SUPERWEAPON FS_TECHNOLOGY HERO IMMUNE_TO_CAPTURE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 1200.0
    InitialHealth   = 1200.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 3500
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = DeployStyleAIUpdate ModuleTag_03
    Turret
      TurretTurnRate        = 0
      TurretPitchRate       = 0
      FirePitch             = 0            ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch           = Yes
      RecenterTime          = 5000         ; how long to wait during idle before recentering
      ControlledWeaponSlots = SECONDARY
      NaturalTurretAngle    = 0
      InitiallyDisabled     = Yes
    End

    AutoAcquireEnemiesWhenIdle = NotWhileAttacking No
    PackTime   = 3333
    UnpackTime = 3333
    TurretsFunctionOnlyWhenDeployed = Yes
    TurretsMustCenterBeforePacking  = Yes
    ManualDeployAnimations          = Yes
  End
  Locomotor = SET_NORMAL ScorpionLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 500.0
  End

  Behavior = AutoHealBehavior ModuleTag_05
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_06
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 2000
    DestructionDelayVariance = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_ScorpionTankDeathEffect 
    FX  = FINAL    FX_BattleMasterExplosionOneFinal
  End

  Behavior = DestroyDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateObjectDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End

  Behavior = CreateCrateDie ModuleTag_12
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End
  
  Behavior                 = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = StealthUpdate ModuleTag_999
    StealthDelay                = 2500 ; msec
    StealthForbiddenConditions  = ATTACKING USING_ABILITY TAKING_DAMAGE MOVING
    InnateStealth               = Yes ;doesnt Require upgrade first
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End

  Behavior = ProductionUpdate ModuleTag_Superweapon00
    DisabledTypesToProcess = DISABLED_HELD DISABLED_UNDERPOWERED
  End

  Behavior = OCLSpecialPower ModuleTag_Superweapon01
    SpecialPowerTemplate = SuperweaponUnderminer
    OCL                  = SUPERWEAPON_Underminer
  End
  Behavior = SpecialPowerCreate ModuleTag_Superweapon02
    ; nothing
  End
  Behavior = RadiusDecalUpdate ModuleTag_Superweapon03
    ; nothing
  End

  Geometry = BOX
  GeometryMajorRadius = 18.0
  GeometryMinorRadius = 12.0
  GeometryHeight = 18.0   
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME   
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End