  PlacementViewAngle  = -45

  ; ***DESIGN parameters ***
  DisplayName   = OBJECT:PowerPlant
  Side          = GLA
  EditorSorting = STRUCTURE

  BuildCost = 1000
  BuildTime = 25.0

  EnergyProduction = 2

  Prerequisites
    Object = AmericaCommandTruckStructure  ;Command Truck/Bus/Tank, same thing. Any Command Truck will suffice.
  End

  VisionRange         = 250
  ShroudClearingRange = 250

  WeaponSet
    Conditions = None
    Weapon     = PRIMARY GLAWindmillShockwaveThing
  End

  ArmorSet
    Conditions = None
    Armor      = StructureArmor
    DamageFX   = StructureDamageFXNoShake
  End

  ExperienceValue = 700 700 700 700 ; Experience point value at each level

  CommandSet = AmericaPatriotBatteryCommandSet ;sell and stop buttons only. Stop does nothing, but I'm lazy

  ; *** AUDIO Parameters ***
  VoiceSelect          = UndergroundGeneratorSelect
  SoundOnDamaged       = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = STRUCTURE
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE SCORE_CREATE CAPTURABLE FS_POWER MP_COUNT_FOR_VICTORY CAN_ATTACK

  Body = StructureBody ModuleTag_05
    MaxHealth     = 800.0
    InitialHealth = 800.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 2000
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End

  Behavior = AIUpdateInterface ModuleTag_AI01
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate        = 250
  End

  ; ===== Factory and Upgrades =====
  Behavior = ProductionUpdate ModuleTag_10
    ; nothing, but is required if we have any Object-level Upgrades!
  End

  ; --- Power Plant
  Behavior = PowerPlantUpdate ModuleTag_11
    ; nothing as of yet
  End

  ; ===== Damage and Death FX =====
  Behavior = FlammableUpdate ModuleTag_14
    AflameDuration     = 5000    ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay  = 500     ; this often.
  End

  Behavior = TransitionDamageFX ModuleTag_15    ; SMALL SIZED FACTION BUILDING
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
  End

  Behavior = InstantDeathBehavior ModuleTag_07
    OCL    = OCL_SmallStructureDebris
    FX     = FX_StructureSmallDeath
  End
  Behavior = CreateObjectDie ModuleTag_06
    CreationList = OCL_GLAPowerPlantDeathFinal
    ExemptStatus = UNDER_CONSTRUCTION
  End

  Behavior = RebuildHoleExposeDie ModuleTag_12
    HoleName      = GLAHolePowerPlant
    HoleMaxHealth = 500.0
  End

  Behavior = AutoHealBehavior ModuleTag_JunkInTheTrunk01
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    StartsActive = No
    TriggeredBy = Upgrade_GLAJunkRepair
  End

