Object SovietFieldCommandCenter
  ;shhhh... :]
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
  OkToChangeModelColor = Yes
  
    ; day
    ConditionState = NONE
      Model         = CBNShack_G
      Animation     = CBNShack_G.CBNShack_G
      AnimationMode = LOOP
    End
    AliasConditionState = DAMAGED

    ConditionState = REALLYDAMAGED
      Model         = CBNShack_DG
      Animation     = CBNShack_DG.CBNShack_DG
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE
      Model         = CBNShack_R
    End

    ; night garrisoned
    ConditionState = NIGHT
      Model         = CBNShack_NG
      Animation     = CBNShack_NG.CBNShack_NG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT
      Model         = CBNShack_DNG
      Animation     = CBNShack_DNG.CBNShack_DNG
      AnimationMode = LOOP
    End
    AliasConditionState = REALLYDAMAGED NIGHT

    ; snow garrisoned
    ConditionState = SNOW
      Model         = CBNShack_SG
      Animation     = CBNShack_SG.CBNShack_SG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW
      Model         = CBNShack_DSG
      Animation     = CBNShack_DSG.CBNShack_DSG
      AnimationMode = LOOP
    End
    AliasConditionState = REALLYDAMAGED SNOW
    
    ; night snow garrisoned
    ConditionState = SNOW NIGHT
      Model         = CBNShack_SNG
      Animation     = CBNShack_SNG.CBNShack_SNG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW NIGHT
      Model         = CBNShack_DSNG
      Animation     = CBNShack_DSNG.CBNShack_DSNG
      AnimationMode = LOOP
    End
    AliasConditionState REALLYDAMAGED SNOW NIGHT
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:FieldCommand
  EditorSorting    = STRUCTURE
  ArmorSet
    Conditions      = None
    Armor           = StructureArmor
    DamageFX        = StructureDamageFXNoShake
  End

  VisionRange = 180.0
  ShroudClearingRange = 180.0

  CommandSet = SovietFieldCommandCommandSet

  VoiceSelect = LockonTick

  ; *** ENGINEERING Parameters ***  
  KindOf                = PRELOAD STRUCTURE SELECTABLE IMMOBILE COMMANDCENTER SCORE CAPTURABLE FS_FACTORY MP_COUNT_FOR_VICTORY GARRISONABLE_UNTIL_DESTROYED
  Body                  = StructureBody ModuleTag_02
    MaxHealth       = 1000.0
    InitialHealth   = 1000.0
  End
  Behavior = GarrisonContain ModuleTag_03
    ContainMax          = 5
    EnterSound        = GarrisonEnter
    ExitSound         = GarrisonExit
  End

  Behavior = ProductionUpdate ModuleTag_04
    ;magic
  End

  Behavior = FlammableUpdate ModuleTag_05
    FlameDamageLimit = 20         ;Catch fire if I take this much fire damage...
    FlameDamageExpiration = 2000  ;in a span of this long
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 25       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = TransitionDamageFX ModuleTag_06
    ;-------------DESIGNED FOR SMALL SIZED CIVILIAN BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1          = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
    ;---------------------------------------------------------------------------------------
    RubbleParticleSystem1              = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    RubbleParticleSystem2              = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    RubbleParticleSystem3              = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
    RubbleParticleSystem4              = Bone:None RandomBone:No PSys:StructureTransitionSmallFlare    
  End

  Behavior             = CreateObjectDie ModuleTag_07
    CreationList  = OCL_LargeStructureDebris
  End

  Behavior = DestroyDie ModuleTag_08
    ;nada
  End

  Behavior           = OCLSpecialPower ModuleTag_Recon01
    SpecialPowerTemplate = SuperweaponPo2ReconPlane
    OCL                  = SUPERWEAPON_Po2ReconRun
    CreateLocation       = CREATE_AT_EDGE_NEAR_SOURCE
  End
  
  Geometry              = BOX
  GeometryMajorRadius   = 12.0
  GeometryMinorRadius   = 16.0
  GeometryHeight        = 14.0
  GeometryIsSmall       = No
  Shadow                = SHADOW_VOLUME

End