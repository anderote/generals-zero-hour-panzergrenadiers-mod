;Ovie bone point:
;FIREPOINT01

;Engine exhaust:
;EXHAUST01
;EXHAUST02

;Turret: TURRETA01
;Default gun:
;TURRETELA01 - gun elevator
;BARRELA01 - gun barrel
;WEAPONA01 - launchbone
;MUZZLEFXA01 - flash model

;Salvage gun:
;BARRELB01 - gun barrel
;WEAPONB01 - launchbone
;MUZZLEFXB01 - flash model

;AA FLAK GUN:
;TURRETELC01 - gun elevator
;TURRETC01
;BARRELC01 to 04  - gun barrel
;WEAPONC01 to 04  - launchbone
;MUZZLEFXC01 to 04 - flash model
;Ha ha, big panzer go boom

Object GLATankE100
  ; *** ART Parameters ***
  SelectPortrait         = SUE100_L
  ButtonImage            = SUE100_L

  UpgradeCameo1 = Upgrade_GLAAPBullets
  
  Draw = W3DOverlordTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ExtraPublicBone = FIREPOINT01
  
    DefaultConditionState
      Model               = UVE100Tnk
      Turret              = TURRETA01
      TurretPitch         = TURRETELA01
      HideSubObject       = BARRELB01

      WeaponFireFXBone    = PRIMARY MUZZLEFXA01
      WeaponRecoilBone    = PRIMARY BARRELA01
      WeaponMuzzleFlash   = PRIMARY MUZZLEFXA01
      WeaponLaunchBone    = PRIMARY WEAPONA01

      WeaponFireFXBone    = SECONDARY MUZZLEFXA01
      WeaponRecoilBone    = SECONDARY BARRELA01
      WeaponMuzzleFlash   = SECONDARY MUZZLEFXA01
      WeaponLaunchBone    = SECONDARY WEAPONA01
      ParticleSysBone     = EXHAUST01 DozerSmokeHeavy
      ParticleSysBone     = EXHAUST02 DozerSmokeHeavy
    End

    ConditionState = REALLYDAMAGED
      Model               = UVE100Tnk_D
      Turret              = TURRETA01
      TurretPitch         = TURRETELA01
      HideSubObject       = BARRELB01
    End

    ConditionState = WEAPONSET_CRATEUPGRADE_ONE
      Model = UVE100Tnk
      Turret            = TURRETA01
      TurretPitch       = TURRETELA01
      HideSubObject     = BARRELA01
      ShowSubObject     = BARRELB01

      WeaponFireFXBone    = PRIMARY MUZZLEFXB01
      WeaponRecoilBone    = PRIMARY BARRELB01
      WeaponMuzzleFlash   = PRIMARY MUZZLEFXB01
      WeaponLaunchBone    = PRIMARY WEAPONB01

      WeaponFireFXBone    = SECONDARY MUZZLEFXB01
      WeaponRecoilBone    = SECONDARY BARRELB01
      WeaponMuzzleFlash   = SECONDARY MUZZLEFXB01
      WeaponLaunchBone    = SECONDARY WEAPONB01
    End
    AliasConditionState = WEAPONSET_CRATEUPGRADE_TWO

    ConditionState = WEAPONSET_CRATEUPGRADE_ONE REALLYDAMAGED
      Model = UVE100Tnk_D
      Turret            = TURRETA01
      TurretPitch       = TURRETELA01
      HideSubObject     = BARRELA01
      ShowSubObject     = BARRELB01

      WeaponFireFXBone    = PRIMARY MUZZLEFXB01
      WeaponRecoilBone    = PRIMARY BARRELB01
      WeaponMuzzleFlash   = PRIMARY MUZZLEFXB01
      WeaponLaunchBone    = PRIMARY WEAPONB01

      WeaponFireFXBone    = SECONDARY MUZZLEFXB01
      WeaponRecoilBone    = SECONDARY BARRELB01
      WeaponMuzzleFlash   = SECONDARY MUZZLEFXB01
      WeaponLaunchBone    = SECONDARY WEAPONB01
    End
    AliasConditionState = WEAPONSET_CRATEUPGRADE_TWO REALLYDAMAGED

    ConditionState = RUBBLE
      Model = UVE100Tnk_D
    End

  ; --------Tank Tracks & Tread Movement -----------------------
    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate      = 2.0 ; texture to move per second
    TreadDriveSpeedFraction = 0.3 ; treads stop moving.
    TreadPivotSpeedFraction = 0.6 ; allow pivoting.
  ; ------------------------------------------------------------
    InitialRecoilSpeed = 112
    MaxRecoilDistance = 2.2
    RecoilSettleSpeed = 3
    RecoilDamping = 0.7
  End

  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:E100
  Side                  = GLA
  EditorSorting         = VEHICLE
  TransportSlotCount    = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  MaxSimultaneousOfType  = 3
  MaxSimultaneousLinkKey = E100

  ;The weapons are flipped so the Maus will fire the 75mm on the move instead of the 128, starting its long reload. Also when force firing.
  WeaponSet
    Conditions = None 
    Weapon               = PRIMARY 150mmCannonAP
    AutoChooseSources    = PRIMARY   FROM_PLAYER FROM_SCRIPT FROM_AI
    Weapon               = SECONDARY 150mmCannonHE
    AutoChooseSources    = SECONDARY NONE
    Weapon               = TERTIARY E100DummyWeapon
    ShareWeaponReloadTime = Yes
    WeaponLockSharedAcrossSets = Yes
  End
  WeaponSet
    Conditions = CRATEUPGRADE_ONE 
    Weapon               = PRIMARY 150mmCannonAPUpgradeOne
    AutoChooseSources    = PRIMARY   FROM_PLAYER FROM_SCRIPT FROM_AI
    Weapon               = SECONDARY 150mmCannonHEUpgradeOne
    AutoChooseSources    = SECONDARY NONE
    Weapon               = TERTIARY E100DummyWeapon
    ShareWeaponReloadTime = Yes
    WeaponLockSharedAcrossSets = Yes
  End
  WeaponSet
    Conditions = CRATEUPGRADE_TWO 
    Weapon               = PRIMARY 150mmCannonAPUpgradeTwo
    AutoChooseSources    = PRIMARY   FROM_PLAYER FROM_SCRIPT FROM_AI
    Weapon               = SECONDARY 150mmCannonHEUpgradeTwo
    AutoChooseSources    = SECONDARY NONE
    Weapon               = TERTIARY E100DummyWeapon
    ShareWeaponReloadTime = Yes
    WeaponLockSharedAcrossSets = Yes
  End


  ;TODO
  WeaponSet
    Conditions = CARBOMB
    Weapon               = PRIMARY Infected75mmCannon
    Weapon               = SECONDARY 128mmCannon
    ShareWeaponReloadTime = No
  End
  WeaponSet
    Conditions = CARBOMB CRATEUPGRADE_ONE 
    Weapon               = PRIMARY Infected75mmCannon
    Weapon               = SECONDARY 128mmCannonCrateUpgradeOne
    ShareWeaponReloadTime = No
  End
  WeaponSet
    Conditions = CARBOMB CRATEUPGRADE_TWO 
    Weapon               = PRIMARY Infected75mmCannon
    Weapon               = SECONDARY 128mmCannonCrateUpgradeTwo
    ShareWeaponReloadTime = No
  End

  ArmorSet
    Conditions      = None
    Armor           = E100Armor   ;Slightly weaker overall, but the intended counters aren't as strong [JET_MISSILES is only 95% here, not 125% like on Maus]
    DamageFX        = TankEraDamageFX
  End

  BuildCost       = 3000
  BuildTime       = 60.0    ; ;in seconds

  VisionRange     = 200
  ShroudClearingRange = 250

  ExperienceValue = 400 800 1200 1600    ;Experience point value at each level
  ExperienceRequired = 0 1600 4200 8000  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 3  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet      = GLATankE100CommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect    = MausTankVoiceSelect
  VoiceMove      = MausTankVoiceMove
  VoiceGuard     = MausTankVoiceMove
  VoiceAttack    = MausTankVoiceAttack
  VoiceAttackAir = MausTankVoiceAttack
  VoiceGuard     = MausTankVoiceMove

  SoundMoveLoop         = SturmtigerBetterMoveLoop

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = MobileDemoTrapVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = NewTurretMoveLoop
    VoiceEnter      = MausTankVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf        = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE HUGE_VEHICLE SCORE SALVAGER WEAPON_SALVAGER DRONE ;(DRONE = immune to hijacking)

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 1900.0
    InitialHealth   = 1900.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 2800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate  = 22
      TurretPitchRate = 20
      AllowsPitch     = Yes
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
  End
  Locomotor = SET_NORMAL E100Locomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 5000.0
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_blitzexplode
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 100
    DestructionDelay = 900
    DestructionDelayVariance = 600
    OCL = FINAL    OCL_PanzerMausExplode
    ;FX  = FINAL    FX_HowitzerExplosion
    Weapon = FINAL MausTankExplodeWeapon
  End  

  Behavior = DestroyDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End
  Behavior = CreateCrateDie ModuleTag_12
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End
  
  Behavior                 = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = VeterancyGainCreate ModuleTag_Vet01
    StartingLevel = VETERAN
    ScienceRequired = Slth_SCIENCE_GLAVehicleTraining
  End

  Behavior = EjectPilotDie ModuleTag_Crew00
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet0
    AirCreationList = OCL_TankCrewVet0
    VeterancyLevels = NONE +REGULAR
  End
  Behavior = EjectPilotDie ModuleTag_Crew01
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet1
    AirCreationList = OCL_TankCrewVet1
    VeterancyLevels = NONE +VETERAN
  End
  Behavior = EjectPilotDie ModuleTag_Crew02
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet2
    AirCreationList = OCL_TankCrewVet2
    VeterancyLevels = NONE +ELITE
  End
  Behavior = EjectPilotDie ModuleTag_Crew03
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet3
    AirCreationList = OCL_TankCrewVet3
    VeterancyLevels = NONE +HEROIC
  End

  Behavior = OverlordContain ModuleTag_Gun01
    Slots                   = 1
    DamagePercentToUnits    = 100%
    AllowInsideKindOf       = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret      = Yes
    PayloadTemplateName     = GLATankE100FlakPlatform
    ExperienceSinkForRider  = No ; Turret receives gun upgrades as well
  End

  Behavior = StealthDetectorUpdate ModuleTag_StealthDetect01
    DetectionRate            = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange           = 180   ; Dustin, enable this for independant balancing!
    ExtraForbiddenKindOf     = AIRCRAFT MINE DEMOTRAP
    CanDetectWhileGarrisoned = Yes    ; Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained  = Yes    ; Contained means being in a transport or tunnel network.
  End

  Geometry = BOX
  GeometryMajorRadius = 22.0
  GeometryMinorRadius = 12.0
  GeometryHeight      = 20.0    
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME   
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End







Object GLATankE100FlakPlatform
  Draw                    = W3DDependencyModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    AttachToBoneInContainer = FIREPOINT01

    DefaultConditionState 
      Model         = UVE10FlkGn
      Turret              = TURRETC01
      TurretPitch         = TURRETELC01
      WeaponFireFXBone    = PRIMARY MUZZLEFXC
      WeaponRecoilBone    = PRIMARY BARRELC
      WeaponMuzzleFlash   = PRIMARY MUZZLEFXC
      WeaponLaunchBone    = PRIMARY BARRELC

      WeaponFireFXBone    = SECONDARY MUZZLEFXC
      WeaponRecoilBone    = SECONDARY BARRELC
      WeaponMuzzleFlash   = SECONDARY MUZZLEFXC
      WeaponLaunchBone    = SECONDARY BARRELC

      WeaponFireFXBone    = TERTIARY MUZZLEFXC
      WeaponRecoilBone    = TERTIARY BARRELC
      WeaponMuzzleFlash   = TERTIARY MUZZLEFXC
      WeaponLaunchBone    = TERTIARY BARRELC
    End

    ConditionState = REALLYDAMAGED
      Model         = UVE10FlkGn_D
      Turret              = TURRETC01
      TurretPitch         = TURRETELC01
    End
    AliasConditionState = RUBBLE
  End

  ; ***DESIGN parameters ***
  Side             = GLA
  EditorSorting    = SYSTEM
  TransportSlotCount = 1

  ExperienceValue     = 0 0 0 0   ; Experience point value at each level
  ExperienceRequired  = 0 0 0 0   ; Experience points needed to gain each level
  IsTrainable         = No             ; Can gain experience
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY 2cmE100FlakGunWeaponGround
    Weapon = SECONDARY 2cmE100FlakGunWeaponAir
    PreferredAgainst = SECONDARY AIRCRAFT
    Weapon = TERTIARY 2cmE100FlakGunWeaponGroundVehicles
    ShareWeaponReloadTime = Yes
  End

  ArmorSet
    Conditions     = None
    Armor          = InvulnerableAllArmor ; We can't be hurt on the field.  We share damage from the Avenger with his damage module
  End
  ShroudClearingRange = 280
  VisionRange         = 400

  ; *** ENGINEERING Parameters ***
  KindOf            = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT SALVAGER CLICK_THROUGH IGNORED_IN_GUI

  Body            = StructureBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      TurretTurnRate      = 160
      TurretPitchRate     = 120
      AllowsPitch         = Yes
      NaturalTurretPitch  = 15
      MinIdleScanInterval = 1000    ; in milliseconds
      MaxIdleScanInterval = 3000    ; in milliseconds
      MinIdleScanAngle    = 0       ; in degrees off the natural turret angle
      MaxIdleScanAngle    = 180     ; in degrees off the natural turret angle
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes 
    MoodAttackCheckRate = 67 ; default is 2000
  End

  Behavior             = DestroyDie ModuleTag_04
    ;<No Data>
  End

  Behavior = WeaponBonusUpgrade ModuleTag_Bonus01
    TriggeredBy = Upgrade_GLAAPBullets
  End

  Behavior = StealthDetectorUpdate ModuleTag_StealthDetect01
    DetectionRate            = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange           = 370   ; Dustin, enable this for independant balancing!
    ExtraRequiredKindOf      = AIRCRAFT
    CanDetectWhileGarrisoned = Yes    ; Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained  = Yes    ; Contained means being in a transport or tunnel network.
  End

  Geometry            = BOX
  GeometryMajorRadius = 4.0
  GeometryMinorRadius = 4.0
  GeometryHeight      = 4.0
  GeometryIsSmall     = No      
  Shadow              = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End