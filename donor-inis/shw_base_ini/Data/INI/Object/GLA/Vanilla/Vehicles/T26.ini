;Siege Chopper voices for this unit?
;thanks to blitz r3 dudes for letting me use a few models <3

Object SovietTankT26
  ; *** ART Parameters ***
  SelectPortrait         = RussianT26Portrait
  ButtonImage            = RussianT26Cameo
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model               = SovietT-26
      Turret              = Turret
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
      WeaponLaunchBone    = PRIMARY Muzzle
      WeaponFireFXBone    = SECONDARY Muzzle
      WeaponRecoilBone    = SECONDARY Barrel
      WeaponMuzzleFlash   = SECONDARY MuzzleFX
      WeaponLaunchBone    = SECONDARY Muzzle
    End
    ConditionState = REALLYDAMAGED
      Model               = SovietT-26_D
      Turret              = Turret
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
      WeaponFireFXBone    = SECONDARY Muzzle
      WeaponRecoilBone    = SECONDARY Barrel
      WeaponMuzzleFlash   = SECONDARY MuzzleFX
      WeaponLaunchBone    = SECONDARY Muzzle
    End
    ConditionState = RUBBLE
      Model = SovietT-26_R
    End
  
    ;Having issues with muzzlefx on the snow model. So no snow model for right now
    ;ConditionState = SNOW
      ;Model               = SovietT-26_S
      ;Turret              = Turret
      ;HideSubObject       = MUZZLEFX
      ;WeaponFireFXBone    = PRIMARY Muzzle
      ;WeaponRecoilBone    = PRIMARY Barrel
      ;WeaponMuzzleFlash   = PRIMARY MuzzleFX
      ;WeaponLaunchBone    = PRIMARY Muzzle
      ;WeaponLaunchBone    = PRIMARY Muzzle
      ;WeaponFireFXBone    = SECONDARY Muzzle
      ;WeaponRecoilBone    = SECONDARY Barrel
      ;WeaponMuzzleFlash   = SECONDARY MuzzleFX
      ;WeaponLaunchBone    = SECONDARY Muzzle
    ;End
    ;ConditionState = SNOW REALLYDAMAGED
      ;Model               = SovietT-26_D_S
      ;Turret              = Turret
      ;HideSubObject       = MUZZLEFX
      ;WeaponFireFXBone    = PRIMARY Muzzle
      ;WeaponRecoilBone    = PRIMARY Barrel
      ;WeaponMuzzleFlash   = PRIMARY MuzzleFX
      ;WeaponLaunchBone    = PRIMARY Muzzle
      ;WeaponFireFXBone    = SECONDARY Muzzle
      ;WeaponRecoilBone    = SECONDARY Barrel
      ;WeaponMuzzleFlash   = SECONDARY MuzzleFX
      ;WeaponLaunchBone    = SECONDARY Muzzle
    ;End
    ;ConditionState = SNOW RUBBLE
      ;Model = SovietT-26_R_S
      ;HideSubObject       = MUZZLEFX
    ;End

; --------Tank Tracks & Tread Movement -----------------------
    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate      = 2.0 ; texture to move per second
    TreadDriveSpeedFraction = 0.3 ; treads stop moving.
    TreadPivotSpeedFraction = 0.6 ; allow pivoting.
; ------------------------------------------------------------
  End

  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:SovietT26
  Side                  = GLA
  EditorSorting         = VEHICLE
  TransportSlotCount    = 1                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon               = PRIMARY T26Cannon
    Weapon = TERTIARY T26CrewExitWeapon
    AutoChooseSources = TERTIARY NONE
  End

  ArmorSet
    Conditions      = None
    Armor           = T26TankArmor
    DamageFX        = TankDamageFX
  End

  BuildCost       = 200
  BuildTime       = 8.0    ;in seconds

  VisionRange         = 120
  ShroudClearingRange = 370

  ExperienceValue = 50 80 120 150    ;Experience point value at each level
  ExperienceRequired = 0 160 420 750  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 0  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet      = SovietTankT26CommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect   = SovietT26VoiceSelect
  VoiceMove     = SovietT26VoiceMove
  VoiceGuard    = SovietT26VoiceMove
  VoiceAttack   = SovietT26VoiceAttack
  VoiceGuard    = SovietT26VoiceMove
  VoiceFear     = SovietT26VoiceFear

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = SovietT26VoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound
    VoiceEnter      = SovietT26VoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf        = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE DONT_AUTO_CRUSH_INFANTRY SALVAGER

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 270.0
    InitialHealth   = 270.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 50
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL SovietTankT26Locomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 50.0
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_blitzexplode
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 100
    DestructionDelay = 700
    DestructionDelayVariance = 600
    OCL = FINAL    OCL_LOSATMissileMetalImpact
    FX  = FINAL    FX_HowitzerExplosion
  End  

  Behavior = DestroyDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End
  Behavior = CreateCrateDie ModuleTag_12
    CrateData = SalvageCrateData
  End
  
  Behavior                 = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = ObjectCreationUpgrade  ModuleTag_GETOUTOMFG01
    UpgradeObject = OCL_T26DecrewObject
    TriggeredBy   = Upgrade_GLAWorkerFakeCommandSet
  End

  Behavior = ProductionUpdate ModuleTag_GETOUTOMFG02
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End

  Behavior = VeterancyGainCreate ModuleTag_860
    StartingLevel = VETERAN
    ScienceRequired = Slth_SCIENCE_GLAVehicleTraining
  End

  Geometry = BOX
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 10.0
  GeometryHeight      = 15.0    
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME   
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End


