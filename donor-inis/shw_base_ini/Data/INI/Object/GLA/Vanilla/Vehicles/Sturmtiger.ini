; It lives once again
;Mad props to Stalker for allowing me to import this <3

;Sturmtiger has been merged with ROTR Topol-Missile-Purchasing code.
;Big rockets cost big money.
Object GLATankSturmtiger
  ; *** ART Parameters ***
  SelectPortrait = SUKingSturm_L
  ButtonImage = SUKingSturm
  UpgradeCameo1 = Upgrade_GLAJunkRepair
  ;UpgradeCameo2 = Upgrade_SturmtigerRocketUpgrade  ;Does not get visually enabled/disabled so no point to having it here.
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE

  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ; no crate upgrade

    DefaultConditionState
      Model = UVKingSturm
      Animation = UVKingSturm.UVKingSturm
      AnimationMode = LOOP
      ;HideSubObject = TurretUp01 TurretUp02
      ; ----- weapon bones -----
      TurretPitch = TurretEL
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponFireFXBone = SECONDARY WeaponA
      WeaponLaunchBone = SECONDARY WeaponA
      WeaponFireFXBone = TERTIARY WeaponA
      WeaponLaunchBone = TERTIARY WeaponA
      HideSubObject = ARMOR01 ARMOR02
    End
    AliasConditionState = RIDER1
    AliasConditionState = RIDER2

    ConditionState = REALLYDAMAGED RUBBLE
      Model = UVKingSturm_d
    End
    AliasConditionState = RIDER1 REALLYDAMAGED RUBBLE
    AliasConditionState = RIDER2 REALLYDAMAGED RUBBLE

    ;-----
    ConditionState = ARMORSET_CRATEUPGRADE_ONE
      ShowSubObject = ARMOR01
      HideSubObject = ARMOR02
    End
    AliasConditionState = ARMORSET_CRATEUPGRADE_ONE RIDER1
    AliasConditionState = ARMORSET_CRATEUPGRADE_ONE RIDER2

    ConditionState = REALLYDAMAGED RUBBLE ARMORSET_CRATEUPGRADE_ONE
      Model = UVKingSturm_d
      ShowSubObject = ARMOR01
      HideSubObject = ARMOR02
    End
    AliasConditionState = REALLYDAMAGED RUBBLE ARMORSET_CRATEUPGRADE_ONE RIDER1
    AliasConditionState = REALLYDAMAGED RUBBLE ARMORSET_CRATEUPGRADE_ONE RIDER2
    
    ;-----
    ConditionState = ARMORSET_CRATEUPGRADE_TWO
      ShowSubObject = ARMOR01 ARMOR02
      ;HideSubObject = NONE
    End
    AliasConditionState = ARMORSET_CRATEUPGRADE_TWO RIDER1
    AliasConditionState = ARMORSET_CRATEUPGRADE_TWO RIDER2

    ConditionState = REALLYDAMAGED RUBBLE ARMORSET_CRATEUPGRADE_TWO
      Model = UVKingSturm_d
      ShowSubObject = ARMOR01 ARMOR02
      ;HideSubObject = NONE
    End
    AliasConditionState = REALLYDAMAGED RUBBLE ARMORSET_CRATEUPGRADE_TWO RIDER1
    AliasConditionState = REALLYDAMAGED RUBBLE ARMORSET_CRATEUPGRADE_TWO RIDER2
    
    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2.0     ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3     ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6     ; fraction of locomotor speed below which we allow pivoting.
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:X_Sturmtiger
  Side               = GLA
  EditorSorting      = VEHICLE
  TransportSlotCount = 5     ; how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = WEAPON_RIDER1
    Weapon = PRIMARY NONE
    Weapon = SECONDARY NONE
  End
  WeaponSet
    Conditions = WEAPON_RIDER2
    Weapon = PRIMARY NONE
    Weapon = SECONDARY X_SturmtigerCannonWeapon
    AutoChooseSources = SECONDARY NONE
  End

  ArmorSet
    Conditions = None
    Armor = SturmtigerArmor
    DamageFX = TankDamageFX
  End
  ArmorSet
    Conditions = CRATE_UPGRADE_ONE
    Armor = SturmtigerArmorPlusOne
    DamageFX = TankDamageFX
  End
  ArmorSet
    Conditions = CRATE_UPGRADE_TWO
    Armor = SturmtigerArmorPlusTwo
    DamageFX = TankDamageFX
  End

  BuildCost = 1600
  BuildTime = 16.0     ; in seconds
  VisionRange = 125
  ShroudClearingRange = 300

  ExperienceValue = 800 800 800 800   ;Experience point value at each level
  IsTrainable = No
  CrusherLevel = 2     ; What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 3     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

    ; *** AUDIO Parameters ***
  ;HAPPY BIRTHDAY. HEH HEH HEH HEH.
  VoiceSelect    = SturmtigerVoiceSelect
  VoiceMove      = SturmtigerVoiceMove
  VoiceAttack    = SturmtigerVoiceAttack
  VoiceGuard     = SturmtigerVoiceMove

  ;SoundMoveStart        = OverlordTankMoveStart
  ;SoundMoveStartDamaged = OverlordTankMoveStart
  SoundMoveLoop         = SturmtigerBetterMoveLoop   ;;;;;SturmtigerMoveLoop  ;It doesn't loop properly :( But it sounds so nice.

  UnitSpecificSounds
    VoiceCreate       = GadflyVoiceCreate
    VoiceGarrison     = SturmtigerVoiceMove
    VoiceEnter        = SturmtigerVoiceMove
    VoiceEnterHostile = SturmtigerVoiceMove
    VoiceGetHealed    = SturmtigerVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS SALVAGER ARMOR_SALVAGER VEHICLE SCORE CANNOT_RETALIATE HUGE_VEHICLE GARRISONABLE_UNTIL_DESTROYED IMMUNE_TO_CAPTURE ;REJECT_UNMANNED

  Body = ActiveBody ModuleTag_02
    MaxHealth = 700.0
    InitialHealth = 700.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking No
    Turret
      TurretTurnRate = 0     ; turn rate, in degrees per sec
      TurretPitchRate = 40
      FirePitch = 35  ;;12     ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
  End
  Locomotor = SET_NORMAL SturmtigerLocomotor

  ;*************************************
  ;******Transformation Code Start********
  ;*************************************

  ;It self destructs when it has veterancy and completes the upgrade :(
  Behavior = RiderChangeContain ModuleTag_MissileRearm01
  
    Rider1 = GenericFakeRider1_Default_Rank RIDER1 WEAPON_RIDER1 STATUS_RIDER1 SturmtigerCommandSet         SET_NORMAL
    Rider2 = GenericFakeRider2_Default_Rank RIDER2 WEAPON_RIDER2 STATUS_RIDER2 SturmtigerCommandSetUpgraded SET_NORMAL

    ;Rider3 = GenericFakeRider1_Veteran_Rank RIDER1 WEAPON_RIDER1 STATUS_RIDER1 SturmtigerCommandSet         SET_NORMAL
    ;Rider4 = GenericFakeRider2_Veteran_Rank RIDER2 WEAPON_RIDER2 STATUS_RIDER2 SturmtigerCommandSetUpgraded SET_NORMAL

    ;Rider5 = GenericFakeRider1_Elite_Rank RIDER1 WEAPON_RIDER1 STATUS_RIDER1 SturmtigerCommandSet         SET_NORMAL
    ;Rider6 = GenericFakeRider2_Elite_Rank RIDER2 WEAPON_RIDER2 STATUS_RIDER2 SturmtigerCommandSetUpgraded SET_NORMAL

    ;Rider7 = GenericFakeRider1_Heroic_Rank RIDER1 WEAPON_RIDER1 STATUS_RIDER1 SturmtigerCommandSet         SET_NORMAL
    ;Rider8 = GenericFakeRider2_Heroic_Rank RIDER2 WEAPON_RIDER2 STATUS_RIDER2 SturmtigerCommandSetUpgraded SET_NORMAL

    ;Standard TransportContain stuff
    Slots                 = 1
    InitialPayload        = GenericFakeRider1_Default_Rank 1
    DamagePercentToUnits  = 100%
    BurnedDeathToUnits    = No
    AllowInsideKindOf     = CAN_ATTACK    
    ScuttleDelay          = 100
    ScuttleStatus         = TOPPLED
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_MissileRearm02
    UpgradeObject = OCL_SturmtigerShellUpgrade
    TriggeredBy   = Upgrade_SturmtigerRocketUpgrade
  End

  Behavior = ProductionUpdate ModuleTag_103451
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End

  ;*************************************
  ;******Transformation Code End ********
  ;*************************************

  ;These 'sort of' work. Supposed to be a tell when the sturmtiger is loaded or empty. A shot of either 'full' or 'empty' animations every 5 sec.
  ;But I'm stupid. It works sometimes, but not at a constant 5 second interval.
  ;Behavior = FireWeaponCollide  ModuleTag_Ammo1
    ;CollideWeapon   = SturmtigerEmptyAmmoDecalWeapon
    ;RequiredStatus  = STATUS_RIDER1
    ;ForbiddenStatus = STATUS_RIDER2
  ;End
  ;Behavior = FireWeaponCollide  ModuleTag_Ammo2
    ;CollideWeapon   = SturmtigerFullAmmoDecalWeapon
    ;RequiredStatus  = STATUS_RIDER2
    ;ForbiddenStatus = STATUS_RIDER1
  ;End

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 200.0
  End
  Behavior = AutoHealBehavior ModuleTag_05
    HealingAmount = 5
    HealingDelay = 1000     ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End
  
  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_06
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 1000
    DestructionDelayVariance = 300
    FX = INITIAL FX_CrusaderCatchFire
    OCL = FINAL OCL_SturmtigerDeathEffect
    FX = FINAL FX_BattleMasterExplosionOneFinal
  End
  Behavior = CreateCrateDie ModuleTag_07
    CrateData = SalvageCrateData
  ; CrateData = EliteTankCrateData
  ; CrateData = HeroicTankCrateData
  End
  Behavior = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  ; A crushing defeat
  Behavior = FXListDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay = 500     ; this often.
  End
  
  Geometry = BOX
  GeometryMajorRadius = 20.0
  GeometryMinorRadius = 12.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45     ; minimum elevation angle above horizon. Used to limit shadow length

End