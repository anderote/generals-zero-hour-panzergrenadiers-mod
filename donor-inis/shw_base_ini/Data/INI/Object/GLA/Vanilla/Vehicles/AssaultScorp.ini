Object GLATankLeech

  ; *** ART Parameters ***
  SelectPortrait         = SULeech
  ButtonImage            = SULeech

  UpgradeCameo1 = Upgrade_GLAAnthraxBeta
  UpgradeCameo2 = Upgrade_GLAJunkRepair
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model               = NVScorpian
      Turret              = BOX01
      WeaponFireFXBone    = PRIMARY MUZZLE01
      WeaponRecoilBone    = PRIMARY BARREL01
      WeaponMuzzleFlash   = PRIMARY MUZZLE01
      WeaponLaunchBone    = PRIMARY MUZZLE01
      WeaponFireFXBone    = SECONDARY MUZZLE02
      WeaponRecoilBone    = SECONDARY BARREL02
      WeaponMuzzleFlash   = SECONDARY MUZZLE02
      WeaponLaunchBone    = SECONDARY MUZZLE02
      HideSubObject       = CYLINDER03 ;Unusable for anything. Not a show/hide bone for an actual rocket.
    End
    ConditionState = REALLYDAMAGED
      Model               = NVScorpian
      Turret              = BOX01
      WeaponFireFXBone    = PRIMARY MUZZLE01
      WeaponRecoilBone    = PRIMARY BARREL01
      WeaponMuzzleFlash   = PRIMARY MUZZLE01
      WeaponLaunchBone    = PRIMARY MUZZLE01
      WeaponFireFXBone    = SECONDARY MUZZLE02
      WeaponRecoilBone    = SECONDARY BARREL02
      WeaponMuzzleFlash   = SECONDARY MUZZLE02
      WeaponLaunchBone    = SECONDARY MUZZLE02
      ParticleSysBone     = SMOKE01 DozerSmokeHeavy
      HideSubObject       = CYLINDER03
    End
    ConditionState = RUBBLE
      Model               = None
    End

    TrackMarks              = EXTnkTrack.tga
    TreadAnimationRate = 2.0;  amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  Draw = W3DModelDraw ModuleTag_ParachutePlate01
  
    DefaultConditionState
      Model             = NONE
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model             = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
    
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:GLALeech
  Side               = GLA
  EditorSorting      = VEHICLE
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY LeechTankGunRight
    Weapon = SECONDARY LeechTankGunLeft
    ShareWeaponReloadTime = No
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY LeechTankGunRight
    Weapon = SECONDARY LeechTankGunLeftBeta
    ShareWeaponReloadTime = No
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End
  WeaponSet
    Conditions = CARBOMB PLAYER_UPGRADE
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions      = None
    Armor           = GLALeechArmor
    DamageFX        = TankDamageFX
  End

  BuildCost       = 700
  BuildTime       = 15.0          ;in seconds    
  VisionRange     = 100
  ShroudClearingRange = 170

  Prerequisites
    Science = SCIENCE_GLALeechTank
  End

  ExperienceValue    = 50 80 110 140    ;Experience point value at each level
  ExperienceRequired = 0 160 385 700 ;Experience points needed to gain each level
  IsTrainable        = Yes             ;Can gain experience
  CrusherLevel       = 0  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel     = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet         = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = T28VoiceSelect
  VoiceMove             = T28TankVoiceMove
  VoiceGuard            = T28TankVoiceMove
  VoiceAttack           = T28VoiceAttack
  SoundMoveStart        = CameleonMoveStart
  SoundMoveStartDamaged = CameleonMoveStart
  SoundStealthOn        = StealthOn
  SoundStealthOff       = StealthOff

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate    = T28TankVoiceCreate
    VoiceCrush     = T28TankVoiceMove
    VoiceEnter     = T28TankVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE SALVAGER

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 320.0
    InitialHealth   = 320.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 350
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 5
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate        = 280   ; turn rate, in degrees per sec
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 90
      MinIdleScanInterval   = 3000
      MaxIdleScanInterval   = 7000
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End

  Locomotor = SET_NORMAL GLALeechTankLocomotor

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 80.0
  End

  Behavior = CreateCrateDie ModuleTag_12
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  ;Kind of comical, but there's no hulk model for the alpha scorp model. *Poof* and its gone.
  Behavior = InstantDeathBehavior ModuleTag_13
    DeathTypes = ALL
    FX         = FX_PropExplode          ;FX_HowitzerExplosion
    OCL        = OCL_GenericCarExplode   ;OCL_LOSATMissileMetalImpact
  End

  Behavior = WeaponSetUpgrade ModuleTag_Beta01
    TriggeredBy = Upgrade_GLAAnthraxBeta
  End

  Behavior = AutoHealBehavior ModuleTag_JunkInTheTrunk
    HealingAmount = 2
    HealingDelay  = 1000 ; msec
    TriggeredBy   = Upgrade_GLAJunkRepair
  End

  Behavior = TransitionDamageFX ModuleTag_14
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration     = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay  = 500       ; this often.
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes     = ALL -CRUSHED -SPLATTED
    DeathFX        = FX_HijackerEmerge
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Behavior = VeterancyGainCreate ModuleTag_Vet01
    StartingLevel = VETERAN
    ScienceRequired = Slth_SCIENCE_GLAVehicleTraining
  End

  Behavior = EjectPilotDie ModuleTag_Crew00
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet0
    AirCreationList = OCL_TankCrewVet0
    VeterancyLevels = NONE +REGULAR
  End
  Behavior = EjectPilotDie ModuleTag_Crew01
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet1
    AirCreationList = OCL_TankCrewVet1
    VeterancyLevels = NONE +VETERAN
  End
  Behavior = EjectPilotDie ModuleTag_Crew02
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet2
    AirCreationList = OCL_TankCrewVet2
    VeterancyLevels = NONE +ELITE
  End
  Behavior = EjectPilotDie ModuleTag_Crew03
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet3
    AirCreationList = OCL_TankCrewVet3
    VeterancyLevels = NONE +HEROIC
  End

  Geometry = BOX
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 6.0
  GeometryHeight = 5     
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length

End