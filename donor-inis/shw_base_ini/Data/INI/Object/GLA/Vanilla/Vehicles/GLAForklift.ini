Object GLAVehicleForklift

  ; *** ART Parameters ***
  SelectPortrait = SUShoes
  ButtonImage    = SUShoes

  ;UpgradeCameo1 = Nada

  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes

    ConditionState = NONE
      Model = CVFKLT
    End

    ConditionState = MOVING
      Model = CVFKLT
      ParticleSysBone = TREADFX01 RocketBuggyDust
      ParticleSysBone = TREADFX02 RocketBuggyDust
    End

    ConditionState = REALLYDAMAGED
      Model = CVFKLT
      ParticleSysBone = SMOKE01 DozerSmokeLight
      ParticleSysBone = SMOKE02 DozerSmokeLight
    End

    ConditionState = REALLYDAMAGED MOVING
      Model = CVFKLT
      ParticleSysBone = SMOKE01 DozerSmokeLight
      ParticleSysBone = SMOKE02 DozerSmokeLight
      ParticleSysBone = TREADFX01 RocketBuggyDust
      ParticleSysBone = TREADFX02 RocketBuggyDust
    End

    ConditionState = RUBBLE
      Model = CVFKLT
      ParticleSysBone = SMOKE01 DozerSmokeHeavy
      ParticleSysBone = SMOKE02 DozerSmokeHeavy
    End

    TrackMarks = EXTireTrack.tga
  End

  Draw                    = W3DModelDraw ModuleTag_Turret01
    OkToChangeModelColor  = Yes
    AttachToBoneInAnotherModule = CHASSIS

    DefaultConditionState
      Model               = AVRoboTank
      Turret              = Turret
      WeaponFireFXBone    = PRIMARY TurretMS01
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY TurretFX01
      WeaponLaunchBone    = PRIMARY TurretMS01
      HideSubObject       = BOX01 BOX02 CHASSIS
      ShowSubObject       = TURRET BARREL
    End
    ConditionState        = REALLYDAMAGED
      Model               = AVRoboTank_D
      HideSubObject       = BOX01 BOX02 CHASSIS
      ShowSubObject       = TURRET BARREL
    End
    ConditionState        = RUBBLE
      Model               = AVRoboTank_D
      HideSubObject       = BOX01 BOX02 CHASSIS
      ShowSubObject       = TURRET BARREL
    End
  End

  ; ***DESIGN parameters ***
  DisplayName   = OBJECT:SmallForklift
  Side          = GLA
  EditorSorting = VEHICLE
 
  TransportSlotCount  = 1                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY 20mmForkliftAuto
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Armor           = TruckArmor
    DamageFX        = CrushableCarDamageFX
  End

  VisionRange         = 200
  ShroudClearingRange = 250

  BuildCost        = 10
  BuildTime        = 2.0   

  CrusherLevel   = 0  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 1  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet     = GenericCommandSet

  ; *** AUDIO Parameters ***
  SoundMoveStart = CarMoveStart

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE GARRISONABLE_UNTIL_DESTROYED DONT_AUTO_CRUSH_INFANTRY

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 150.0
    InitialHealth   = 150.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 250
    SubdualDamageHealRate = 100
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_0123
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY
      TurretTurnRate        = 220   // turn rate, in degrees per sec
      TurretPitchRate       = 220
      MinIdleScanAngle      = 0
      MaxIdleScanAngle      = 360
      MinIdleScanInterval   = 2000
      MaxIdleScanInterval   = 2000
      RecenterTime          = 500
    End
    AutoAcquireEnemiesWhenIdle = Yes 
    MoodAttackCheckRate = 500
  End
  Locomotor = SET_NORMAL WorkerForkliftLocomotor

  Behavior = PhysicsBehavior ModuleTag_10
    Mass = 60.0
  End

; --- begin Forklift Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_ForkliftMemes04
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -EXTRA_3 -EXTRA_4 -EXTRA_5  -EXTRA_8
    SinkDelay           = 3000
    SinkRate            = 3.0     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_WorkerDie
  End
  Behavior = SlowDeathBehavior ModuleTag_ForkliftMemes05
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 3.0     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_ForkliftMemes06
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 3.0     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_WorkerDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_ForkliftMemes07 ;Brutal kill with lots of blood and no death scream
    DeathTypes          = NONE +EXTRA_4
    SinkDelay           = 3000
    SinkRate            = 3.0     ; in Dist/Sec
    DestructionDelay    = 8000
    OCL                 = INITIAL OCL_LOSATMissileMetalImpact
    FX                  = INITIAL FX_KeneticMissileImpactExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_ForkliftMemes08 ;Gore death explosion
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 30
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_LOSATMissileMetalImpact
    FX                  = FINAL   FX_KeneticMissileImpactExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_ForkliftMemes09
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 70
    SinkDelay           = 3000
    SinkRate            = 3.0     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_KeneticMissileImpactExplosion
    OCL                 = INITIAL OCL_LOSATMissileMetalImpact
    FlingForce          = 3
    FlingForceVariance  = 1
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
; --- end Forklift Death modules ---

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Geometry        = BOX
  GeometryIsSmall = Yes
  GeometryMajorRadius = 11.0
  GeometryMinorRadius = 4.0
  GeometryHeight  = 7.0
  Shadow          = SHADOW_VOLUME
End