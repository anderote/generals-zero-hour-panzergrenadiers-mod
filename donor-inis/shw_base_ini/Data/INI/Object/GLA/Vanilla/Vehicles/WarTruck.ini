  End

  Behavior = WeaponBonusUpgrade ModuleTag_11 ; Not a full weapon set switch, just a number tweak reflected in a weapon. 
    TriggeredBy = Upgrade_GLAAPBullets
  End 

  Behavior = SlowDeathBehavior ModuleTag_Death01
