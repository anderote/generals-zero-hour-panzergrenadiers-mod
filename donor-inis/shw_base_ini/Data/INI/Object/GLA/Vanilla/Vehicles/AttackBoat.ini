Object GLAVehicleAttackBoat

  SelectPortrait = SABattleship_L
  ButtonImage    = SABattleship

  UpgradeCameo1 = Upgrade_GLAJunkRepair
  UpgradeCameo2 = Upgrade_GLAAPRockets

  ; *** ART Parameters ***
  Draw              = W3DModelDraw ModuleTag_01 ; Boat 
    OkToChangeModelColor = Yes
    ConditionState  = NONE
      Model         = AVPTBoat
      Animation     = AVPTBoat.AVPTBoat
      AnimationMode = LOOP
    End
    AliasConditionState = MOVING

    ConditionState  = OVER_WATER
      Model         = AVPTBoat
      Animation     = AVPTBoat.AVPTBoat
      AnimationMode = LOOP
    End

    ConditionState  = MOVING OVER_WATER
      Model         = AVPTBoat
      ParticleSysBone = TreadFX01 AmphibWave
      Animation     = AVPTBoat.AVPTBoat
      AnimationMode = LOOP
    End

    ConditionState  = REALLYDAMAGED
      Model         = AVPTBoat
      Animation     = AVPTBoat.AVPTBoat
      AnimationMode = LOOP
      ParticleSysBone  = TOWER DozerSmokeHeavy
      ParticleSysBone  = LIGHT01 DozerSmokeHeavy
      ParticleSysBone  = DUM_TURRET DozerSmokeHeavy
    End
    AliasConditionState = REALLYDAMAGED MOVING

    ConditionState  = MOVING OVER_WATER REALLYDAMAGED
      Model         = AVPTBoat
      ParticleSysBone = TreadFX01 AmphibWave
      Animation     = AVPTBoat.AVPTBoat
      AnimationMode = LOOP
      ParticleSysBone  = TOWER DozerSmokeHeavy
      ParticleSysBone  = LIGHT01 DozerSmokeHeavy
      ParticleSysBone  = DUM_TURRET DozerSmokeHeavy
    End
  End

  Draw = W3DModelDraw ModuleTag_02

    OkToChangeModelColor        = Yes
    AttachToBoneInAnotherModule = DUM_TURRET
    InitialRecoilSpeed   = 70
    RecoilSettleSpeed    = 10

    DefaultConditionState
      Model             = ABPatriotAG
      Turret            = TURRET
      TurretPitch       = TURRETEL
      WeaponLaunchBone  = PRIMARY     WeaponA
      WeaponLaunchBone  = SECONDARY   WeaponA
      WeaponLaunchBone  = TERTIARY    WeaponA
      WeaponFireFXBone  = PRIMARY     WeaponA
      WeaponFireFXBone  = SECONDARY   WeaponA
      WeaponFireFXBone  = TERTIARY    WeaponA
    End
    AliasConditionState = NIGHT
    
    ConditionState      = DAMAGED
      Model             = ABPatriotAG_D
    End
    AliasConditionState = DAMAGED NIGHT
    
    ConditionState      = REALLYDAMAGED RUBBLE
      Model             = ABPatriotAG_E
    End
    AliasConditionState = REALLYDAMAGED RUBBLE NIGHT
  End

  ; ***DESIGN parameters ***
  DisplayName       = OBJECT:PTBoat
  Side              = GLA
  EditorSorting     = VEHICLE
  CommandSet        = ChinaVehicleGattlingTankCommandSet

  WeaponSet
    Conditions = None
    Weapon     = PRIMARY GLAAttackBoatMissileWeaponGround
    Weapon     = SECONDARY GLAAttackBoatMissileWeapon
    PreferredAgainst = SECONDARY AIRCRAFT
    ShareWeaponReloadTime = Yes
  End
  
  ArmorSet
    Conditions      = None
    Armor           = AntiAirBoatArmor
    DamageFX        = TankDamageFX
  End

  VisionRange         = 290
  ShroudClearingRange = 420
  CrusherLevel        = 1  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel      = 3  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  TransportSlotCount  = 0

  BuildCost = 1900
  BuildTime = 15.0          ;in seconds  
  
  ExperienceValue = 80 110 140 170    ;Experience point value at each level
  ExperienceRequired = 0 220 490 850  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience

  ; *** AUDIO Parameters ***
  VoiceSelect           = GadflyVoiceSelect
  VoiceMove             = GadflyVoiceMove
  VoiceGuard            = GadflyVoiceMove
  VoiceAttack           = GadflyVoiceAttack
  VoiceAttackAir        = GadflyVoiceAttack
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = GadflyVoiceCreate
    TurretMoveStart     = NoSound
    TurretMoveLoop      = NoSound
    VoiceEnter          = GadflyVoiceMove
  End
  SoundMoveLoop = AmphibiousTransportMoveLoop

  ; *** ENGINEERING Parameters ***  
  RadarPriority = UNIT
  KindOf        = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS SALVAGER VEHICLE SCORE BOAT IMMUNE_TO_CAPTURE

  Body              = ActiveBody ModuleTag_03
    MaxHealth       = 400.0
    InitialHealth   = 400.0
  End
  
  Behavior               = DestroyDie ModuleTag_04
    ;nothing
  End
  Behavior       = CreateObjectDie ModuleTag_05
    DeathTypes   = ALL
    CreationList = OCL_GenericCarExplode
  End
  Behavior     = FXListDie ModuleTag_06
    DeathTypes = ALL -FLOODED
    DeathFX    = FX_GenericCarExplode
  End


  Behavior = AIUpdateInterface ModuleTag_23406
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY
      TurretTurnRate      = 0
      TurretPitchRate     = 60
      AllowsPitch         = Yes
      FiresWhileTurning   = Yes
      NaturalTurretPitch  = 20
      FirePitch           = 90
    End
    AutoAcquireEnemiesWhenIdle = Yes ;ATTACK_BUILDINGS; defensive weapon
    MoodAttackCheckRate        = 250
  End
  Locomotor       = SET_NORMAL AdvancedBoatLocomotor

  Behavior          = PhysicsBehavior ModuleTag_08
    Mass            = 100.0
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = FloatUpdate UpdateTag_01
    Enabled = No ; 'no' because we dont want to be lifted by this update, just swayed around like a buoy
  End

  Behavior = AutoHealBehavior ModuleTag_Upgrade02
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = CreateCrateDie ModuleTag_14
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = EjectPilotDie ModuleTag_HijackerEmerge01
    DeathTypes = ALL -CRUSHED -SPLATTED
    RequiredStatus = HIJACKED
    VeterancyLevels =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList = OCL_HijackerEmergeViaParachute
  End
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = WeaponBonusUpgrade ModuleTag_Upgrade01
    TriggeredBy = Upgrade_GLAAPRockets
  End

  Behavior = StealthDetectorUpdate ModuleTag_Detection01
    DetectionRate             = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange            = 500 ;John, enable this for independant balancing!
    ExtraRequiredKindOf       = AIRCRAFT
    CanDetectWhileGarrisoned  = No ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained   = No ;Contained means being in a transport or tunnel network.
    PingSound                 = IRPing
    LoudPingSound             = IRPingLoud
    IRParticleSysName         = IRDetectSonar
    IRBrightParticleSysName   = IRDetectSonarBright
    IRGridParticleSysName     = IRDetectGrid
    IRParticleSysBone         = LIGHT01
  End

  Geometry            = BOX
  Scale = 1.0                            ;Scaling
  GeometryIsSmall     = No
  GeometryMajorRadius = 48.0
  GeometryMinorRadius = 12.0
  GeometryHeight      = 14.0
  Shadow              = SHADOW_VOLUME

End










Object GLAVehicleAttackBoatFX

  Draw = W3DDependencyModelDraw ModuleTag_01

    OkToChangeModelColor        = Yes
    AttachToBoneInContainer = LIGHT01

    DefaultConditionState
      Model = PABLINKLITER
    End
  End

  ; ***DESIGN parameters ***
  Side             = GLA
  EditorSorting    = SYSTEM
  TransportSlotCount = 1
  
  ArmorSet
    Conditions     = None
    Armor          = InvulnerableAllArmor ; We can't be hurt on the field.  We share damage from the Overlord with his damage module
  End
  VisionRange     = 400

  ; *** AUDIO Parameters ***
  UnitSpecificSounds
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound ;TurretMoveLoop
    VoiceRapidFire  = NoSound
  End

  ; *** ENGINEERING Parameters ***
  KindOf            = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CLICK_THROUGH IGNORED_IN_GUI
    Body            = StructureBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    ;nada
  End

  Behavior             = DestroyDie ModuleTag_04
    ;nothing
  End

  Behavior = FireWeaponUpdate ModuleTag_233563
    Weapon = GLAAttackBoatFXWeapon
    ExclusiveWeaponDelay = 1000
  End

  Geometry            = BOX
  GeometryMajorRadius = 8.0
  GeometryMinorRadius = 8.0
  GeometryHeight      = 9.0
  GeometryIsSmall     = No      
  Shadow              = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length

End

Object GLAVehicleAttackBoatGunner

  Draw = W3DDependencyModelDraw ModuleTag_02

    OkToChangeModelColor        = Yes
    AttachToBoneInContainer     = DUM_TURRET
    InitialRecoilSpeed   = 70
    RecoilSettleSpeed    = 10

    ConditionState = NONE
      Model = UVRkBgy
      Turret = TurretUp03
      HideSubObject = Turret Turret02 Turret03 TurretUp01 TurretUp02
      WeaponFireFXBone = PRIMARY WeaponG
      WeaponLaunchBone = PRIMARY WeaponG
    End
    
    ConditionState = REALLYDAMAGED
      Model = UVRkBgy_D
      Turret = TurretUp03
      HideSubObject = Turret Turret02 Turret03 TurretUp01 TurretUp02
      WeaponFireFXBone = PRIMARY WeaponG
      WeaponLaunchBone = PRIMARY WeaponG
    End
    
    ConditionState = RUBBLE
      Model = UVRkBgy_D
      Turret = TurretUp03
      HideSubObject = Turret Turret02 Turret03 TurretUp01 TurretUp02
      WeaponFireFXBone = PRIMARY WeaponG
      WeaponLaunchBone = PRIMARY WeaponG
    End
  End

  ; ***DESIGN parameters ***
  Side             = GLA
  EditorSorting    = SYSTEM
  TransportSlotCount = 1
  
  WeaponSet
    Conditions = None
    Weapon = PRIMARY GLAAttackBoatMissileWeapon
  End
  
  ArmorSet
    Conditions     = None
    Armor          = InvulnerableAllArmor ; We can't be hurt on the field.  We share damage from the Overlord with his damage module
  End
  VisionRange     = 400

  ; *** AUDIO Parameters ***
  UnitSpecificSounds
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound ;TurretMoveLoop
    VoiceRapidFire  = NoSound
  End

  ; *** ENGINEERING Parameters ***
  KindOf            = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK CLICK_THROUGH IGNORED_IN_GUI
    Body            = StructureBody ModuleTag_062
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_06
    Turret
      TurretTurnRate = 120
      ControlledWeaponSlots = PRIMARY
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
    End
    AutoAcquireEnemiesWhenIdle = Yes ;ATTACK_BUILDINGS; defensive weapon
    MoodAttackCheckRate        = 250
  End

  Behavior             = DestroyDie ModuleTag_04
    ;nothing
  End

  Geometry            = BOX
  GeometryMajorRadius = 8.0
  GeometryMinorRadius = 8.0
  GeometryHeight      = 9.0
  GeometryIsSmall     = No      
  Shadow              = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
  Scale = 1.05

End