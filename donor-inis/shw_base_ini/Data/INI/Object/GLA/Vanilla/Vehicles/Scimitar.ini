  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:Scimitar
  Side               = GLA
  EditorSorting      = VEHICLE
  TransportSlotCount = 5     ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon    = PRIMARY ScimitarCannonWeapon
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  InfectedScimitarCannonWeapon
  End

  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = HeavyTankDamageFX
  End
  ArmorSet
    Conditions      = CRATE_UPGRADE_ONE
    Armor           = TankArmor_SalvageOne
    DamageFX        = HeavyTankDamageFX
  End
  ArmorSet
    Conditions      = CRATE_UPGRADE_TWO
    Armor           = TankArmor_SalvageTwo
    DamageFX        = HeavyTankDamageFX
  End

  BuildCost           = 1500
  BuildTime           = 18.0          ;in seconds    
  VisionRange         = 180
  ShroudClearingRange = 270

  ExperienceValue    = 120 150 180 210    ;Experience point value at each level
  ExperienceRequired = 0 300 630 1050  ;Experience points needed to gain each level
  IsTrainable        = Yes             ;Can gain experience
  CrusherLevel       = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel     = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet         = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = GLAScimitarVoiceSelect
  VoiceMove             = GLAScimitarVoiceMove
  VoiceGuard            = GLAScimitarVoiceMove
  VoiceAttack           = GLAScimitarVoiceAttack
  SoundMoveStart        = MarauderTankMoveStart
  SoundMoveStartDamaged = MarauderTankMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = GLAScimitarVoiceCreate
    TurretMoveLoop  = OverlordTankTurretMoveLoop
    VoiceSalvage    = GLAScimitarVoiceMove      
    VoiceCrush      = GLAScimitarVoiceMove
    VoiceEnter      = GLAScimitarVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS SALVAGER ARMOR_SALVAGER VEHICLE SCORE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 900.0
    InitialHealth   = 900.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1250
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 25
  End
  
   Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate        = 120
      ControlledWeaponSlots = PRIMARY
    End
      AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
   End
  Locomotor = SET_NORMAL GLAScimitarLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 150.0
  End
  Behavior = AutoHealBehavior ModuleTag_05
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_06
    DeathTypes = ALL
    ProbabilityModifier = 50
    DestructionDelay    = 1000
    DestructionDelayVariance = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_GLAScimitarTankDeath  
    FX  = FINAL    FX_BattleMasterExplosionOneFinal
  End

  Behavior = CreateCrateDie ModuleTag_07
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End
  
  Behavior                 = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End

  Behavior = VeterancyGainCreate ModuleTag_Vet01
    StartingLevel = VETERAN
    ScienceRequired = Slth_SCIENCE_GLAVehicleTraining
  End

  Behavior = EjectPilotDie ModuleTag_Crew00
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet0
    AirCreationList = OCL_TankCrewVet0
    VeterancyLevels = NONE +REGULAR
  End
  Behavior = EjectPilotDie ModuleTag_Crew01
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet1
    AirCreationList = OCL_TankCrewVet1
    VeterancyLevels = NONE +VETERAN
  End
  Behavior = EjectPilotDie ModuleTag_Crew02
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet2
    AirCreationList = OCL_TankCrewVet2
    VeterancyLevels = NONE +ELITE
  End
  Behavior = EjectPilotDie ModuleTag_Crew03
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet3
    AirCreationList = OCL_TankCrewVet3
    VeterancyLevels = NONE +HEROIC
  End

