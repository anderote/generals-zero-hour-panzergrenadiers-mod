      WeaponMuzzleFlash = PRIMARY MuzzleFXUpB01
      WeaponRecoilBone  = PRIMARY BarrelUpB01
      WeaponFireFXBone = TERTIARY WeaponC01
      WeaponLaunchBone = TERTIARY WeaponC01
      WeaponHideShowBone = TERTIARY WeaponC01
    End

    ;ReallyDamaged states
    ConditionState = REALLYDAMAGED
      Model = UVChonk90_D
      Turret = TURRET01
      TurretPitch = TURRETEL01
      WeaponFireFXBone  = PRIMARY   MuzzleFXA01
      WeaponMuzzleFlash = PRIMARY   MuzzleFXA01
      WeaponRecoilBone  = PRIMARY   BarrelA01
      WeaponFireFXBone = TERTIARY WeaponC01
      WeaponLaunchBone = TERTIARY WeaponC01
      WeaponHideShowBone = TERTIARY WeaponC01
      HideSubObject = BarrelUpA01 BarrelUpB01
    End

    ConditionState = WEAPONSET_CRATEUPGRADE_ONE REALLYDAMAGED
      Model = UVChonk90_D
      Turret = TURRET01
      TurretPitch = TURRETEL01
      ShowSubObject = BarrelUpA01
      HideSubObject = BarrelA01 BarrelUpB01
      WeaponFireFXBone  = PRIMARY MuzzleFXUpA01
      WeaponMuzzleFlash = PRIMARY MuzzleFXUpA01
      WeaponRecoilBone  = PRIMARY BarrelUpA01
      WeaponFireFXBone = TERTIARY WeaponC01
      WeaponLaunchBone = TERTIARY WeaponC01
      WeaponHideShowBone = TERTIARY WeaponC01
    End

    ConditionState = WEAPONSET_CRATEUPGRADE_TWO REALLYDAMAGED
      Model = UVChonk90_D
      Turret = TURRET01
      TurretPitch = TURRETEL01
      ShowSubObject = BarrelUpB01
      HideSubObject = BarrelA01 BarrelUpA01
      WeaponFireFXBone  = PRIMARY MuzzleFXUpB01
      WeaponMuzzleFlash = PRIMARY MuzzleFXUpB01
