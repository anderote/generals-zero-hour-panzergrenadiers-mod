;The Marauder Tank, for the Warlord General.  
;From GenX
;ULTRAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
Object GLATankMegaMarauder
  ; *** ART Parameters ***
  SelectPortrait         = SUMegaMardr_L
  ButtonImage            = SUMegaMardr_L
  
  UpgradeCameo1 = Upgrade_GLAAPRockets
  UpgradeCameo2 = Upgrade_GLAJunkRepair
  ;UpgradeCameo3 = Upgrade_GLAToxinShells
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes

    ConditionState = NONE
      Model = UVMEGATANK
      Turret = TURRETC01
      ShowSubObject = TURRETC01 BARRELC01 BARRELC02 BARRELC03 BARRELMSC01 BARRELMSC02 BARRELMSC03
      HideSubObject = TURET01 BARREL01 BARRELMS01 TURRETB01 BARRELB01 BARRELB02 BARRELMSB01 BARRELMSB02
      WeaponFireFXBone = PRIMARY BARRELMSC
      WeaponRecoilBone = PRIMARY BARRELC
      WeaponLaunchBone = PRIMARY BARRELMSC
      WeaponLaunchBone = SECONDARY WEAPONB
      WeaponLaunchBone = TERTIARY WEAPONB
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE

    ;;;;;TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2.0;  amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model             = NONE
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model             = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:MegaMarauder
  Side                  = GLA
  EditorSorting         = VEHICLE
  TransportSlotCount    = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY MarauderTankGunUpgradeFour
    Weapon = SECONDARY MegaMarauderRocketLauncherWeapon
    ShareWeaponReloadTime = No
  End
  WeaponSet
    Conditions = CARBOMB 
    Weapon = PRIMARY InfectedMarauderTankGunUpgradeFour
    Weapon = SECONDARY MegaMarauderRocketLauncherWeapon
    ShareWeaponReloadTime = No
  End

  ArmorSet
    Conditions      = None
    Armor           = MegaMarauderTankArmor
    DamageFX        = TankDamageFX
  End

  BuildCost       = 5000
  BuildTime       = 60.0          ;in seconds    
  VisionRange     = 125
  ShroudClearingRange = 300

  ExperienceValue = 300 600 900 1200    ;Experience point value at each level
  ExperienceRequired = 0 10 20 30  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 3  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet           = MegaMarauderCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = MarauderTankVoiceSelect
  VoiceMove = MarauderTankVoiceMove
  VoiceGuard = MarauderTankVoiceMove
  VoiceAttack = MarauderTankVoiceAttack
  SoundMoveStart = MarauderTankMoveStart
  SoundMoveStartDamaged = MarauderTankMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = MarauderTankVoiceCreate
    ;TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    VoiceSalvage = MarauderTankVoiceSalvage      
    VoiceCrush = MarauderTankVoiceCrush
    VoiceEnter = MarauderTankVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS SALVAGER WEAPON_SALVAGER VEHICLE SCORE HUGE_VEHICLE DRONE ; no hijacks

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 1800.0
    InitialHealth   = 1800.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 2500
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 25
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL MegaMarauderLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 250.0
  End
  Behavior = AutoHealBehavior ModuleTag_05
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  ;Kind of comical, but there's no hulk model for the alpha scorp model. *Poof* and its gone.
  Behavior = InstantDeathBehavior ModuleTag_13123
    DeathTypes = ALL
    FX         = FX_HowitzerExplosion
    OCL        = OCL_LOSATMissileMetalImpact
  End

  Behavior = CreateCrateDie ModuleTag_07
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End
  
  Behavior                 = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  
  ; A crushing defeat
  Behavior = FXListDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = WeaponBonusUpgrade ModuleTag_Upgrade01
    TriggeredBy = Upgrade_GLAAPRockets
  End

  Behavior = VeterancyGainCreate ModuleTag_Upgrade02
    StartingLevel = HEROIC
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon   = MausTankExplodeWeapon
    StartsActive  = Yes
    RequiredStatus = IS_CARBOMB
  End

  Behavior = EjectPilotDie ModuleTag_Crew03
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet3
    AirCreationList = OCL_TankCrewVet3
    VeterancyLevels = ALL
  End

  Geometry = BOX
  GeometryMajorRadius = 24.0
  GeometryMinorRadius = 17.0
  GeometryHeight = 15.0     
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME   
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End