  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SALVAGER WEAPON_SALVAGER SCORE DONT_AUTO_CRUSH_INFANTRY

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 370.0
    InitialHealth   = 370.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 740
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate        = 100
      RecenterTime          = 5000   ; how long to wait during idle before recentering
      ControlledWeaponSlots = PRIMARY SECONDARY
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
  End
  Locomotor = SET_NORMAL ScorpionLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 100.0
  End
  Behavior = AutoHealBehavior ModuleTag_05
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = WeaponBonusUpgrade ModuleTag_06
    TriggeredBy = Upgrade_GLAAPRockets
  End

  ;Kind of comical, but there's no hulk model for this. *Poof* and its gone.
  Behavior = InstantDeathBehavior ModuleTag_07
