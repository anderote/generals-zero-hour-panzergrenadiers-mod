Object GLAForklift_Assault
  ; *** ART Parameters ***
  SelectPortrait         = SUGunLift_L
  ButtonImage            = SUGunLift
  
  UpgradeCameo1 = Upgrade_GLAJunkRepair
  UpgradeCameo2 = Upgrade_GLAAPBullets
  ;UpgradeCameo3 = 
  
  ; No model without upgrade
  Draw = W3DTruckDraw ModuleTag_ForkU
    OkToChangeModelColor = Yes

    ; idle
    DefaultConditionState
      Model = UVForkMG
      Turret            = TURRET
      TurretPitch       = TURRETEL
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponLaunchBone  = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponRecoilBone  = PRIMARY BARREL
    End
    
    ConditionState = REALLYDAMAGED RUBBLE
      Model = UVForkMG_D
    End
    
    ;;;TrackMarks = EXTireTrack2.tga
    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = RocketBuggyDirtPowerSlide

    LeftFrontTireBone  = Tire04
    RightFrontTireBone = Tire03
    LeftRearTireBone   = Tire02
    RightRearTireBone  = Tire01
    TireRotationMultiplier = 0.4 ; this * speed = rotation.
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:AssaultForklift
  Side               = GLA
  EditorSorting      = VEHICLE
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon     = PRIMARY BRDM2MachineGunWeapon
  End

  ArmorSet
    Conditions = None
    Armor      = GLAAssaultForkliftArmor
    DamageFX   = TruckDamageFX
  End

  VisionRange = 250.0
  ShroudClearingRange = 300

  BuildCost = 500
  BuildTime = 4.0  ;in seconds  
  
  ExperienceValue = 75 100 125 150   ;Experience point value at each level
  ExperienceRequired = 0 200 437 750  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience

  CrusherLevel   = 0  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet     = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = CombatCycleVoiceSelect
  VoiceMove = CombatCycleVoiceMove
  VoiceAttack = CombatCycleVoiceAttack
  VoiceGuard = CombatCycleVoiceMove

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = CombatCycleVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = TurretMoveLoop  
  ; Required for the W3DTruckDraw module
    TruckLandingSound = RocketBuggyLand
    TruckPowerslideSound = CombatBikeMoveStart
    VoiceEnter = CombatCycleVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT SALVAGER VEHICLE SCORE DRONE

  Body = ActiveBody ModuleTag_03
    MaxHealth       = 150.0
    InitialHealth   = 150.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 450
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_05
    Turret
      TurretTurnRate = 180       ; turn rate, in degrees per sec
      NaturalTurretAngle = 0
      MinIdleScanAngle = 30      ; in degrees off the natural turret angle
      MaxIdleScanAngle = 60      ; in degrees off the natural turret angle
      MinIdleScanInterval = 3000 ; in milliseconds
      MaxIdleScanInterval = 7000 ; in milliseconds
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL WorkerForkliftLocomotor

  Behavior = PhysicsBehavior ModuleTag_06
    Mass = 110.0
  End

  Behavior = AutoHealBehavior ModuleTag_07
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = FlammableUpdate ModuleTag_09
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = TransitionDamageFX ModuleTag_10
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = WeaponBonusUpgrade ModuleTag_11 ; Not a full weapon set switch, just a number tweak reflected in a weapon. 
    TriggeredBy = Upgrade_GLAAPBullets
  End 


; --- begin Forklift Death modules ---
  Behavior = InstantDeathBehavior ModuleTag_ForkliftMemes00
    DeathTypes     = ALL -EXTRA_5
    OCL            = OCL_GLADeadForklift
    FX             = FX_WorkerDie
  End
  Behavior = InstantDeathBehavior ModuleTag_ForkliftMemes01
    DeathTypes     = NONE +EXTRA_5
    OCL            = OCL_GLADeadForklift
    FX             = FX_KeneticMissileImpactExplosion
  End
; --- end Forklift Death modules ---

  Geometry = BOX
  GeometryMajorRadius = 8.0
  GeometryMinorRadius = 5.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End

