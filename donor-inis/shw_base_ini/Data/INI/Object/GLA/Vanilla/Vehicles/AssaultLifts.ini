Object ForkliftMortarShell
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    ConditionState = NONE
      Model = UVChonk90_M
      ParticleSysBone     = NONE CamelMissileExhaust
    End
  End

  ; ***DESIGN parameters ***
  DisplayName       = OBJECT:TankShell
  EditorSorting     = SYSTEM
  ArmorSet
    Armor = ProjectileArmor
  End
  VisionRange = 0.0
  ShroudClearingRange = 80.0 

  ; *** AUDIO Parameters ***
  SoundAmbient = IncomingShellWhistle

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 10000.0
    InitialHealth   = 10000.0
  End

  Behavior = DestroyDie ModuleTag_03
    ;nothing
  End
    
  Behavior = DumbProjectileBehavior ModuleTag_04
    FirstHeight = 200  ; Height of Bezier control points above highest intervening terrain
    SecondHeight = 350
    FirstPercentIndent = 18% ; Percentage of shot distance control points are placed
    SecondPercentIndent = 88%
    FlightPathAdjustDistPerSecond   = 0 ; Can allow a max speed this can attempt to follow a target. Units are their velocity we can tag.
  End

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 0.01   ; we can't have a zero mass, but we want it pretty tiny...
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2.0
End