Object GLAJetGladiator
  ;GLA Vanilla Tier II air unit
  ;This is a Soviet-era plane, so it needs Soviet-era voices
  ;Logic.
  UpgradeCameo1 = Upgrade_GLAJunkRepair
  UpgradeCameo2 = Upgrade_GLAAPBullets

  ; *** ART Parameters ***
  SelectPortrait         = TU2Strike1
  ButtonImage            = TU2Strike1

  Draw = W3DModelDraw ModuleTag_01
    ParticlesAttachedToAnimatedBones = Yes 
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model           = UVTU2
      Animation       = UVTU2.UVTU2
      AnimationMode   = LOOP
      ParticleSysBone = PROP01 JetBlackTrail
      ParticleSysBone = PROP02 JetBlackTrail
      WeaponLaunchBone = PRIMARY WEAPONA01
      WeaponFireFXBone = PRIMARY WEAPONA01
      WeaponLaunchBone = SECONDARY NONE
      WeaponFireFXBone = SECONDARY NONE
    End
    ConditionState = DAMAGED
      Model           = UVTU2_D
      Animation       = UVTU2_D.UVTU2_D
      ParticleSysBone = PROP01 JetSmokeLarge
    End
    
    ConditionState = REALLYDAMAGED
      Model           = UVTU2_D
      Animation       = UVTU2_D.UVTU2_D
      ParticleSysBone = PROP01 JetSmokeLarge
      ParticleSysBone = PROP02 JetSmokeLarge
    End
    ConditionState = RUBBLE
      Model           = UVTU2_D1
      Animation       = UVTU2_D1.UVTU2_D1
    End
  End
  
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:GLAJetGladiator
  EditorSorting       = VEHICLE
  Side                = GLA
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange          = 210.0 
  ShroudClearingRange  = 320.0
  
  BuildCost               = 1500
  BuildTime               = 25.0
  ExperienceValue         = 80 120 160 200  ;Experience point value at each level
  ExperienceRequired      = 0 640 1560 3000   ;Experience points needed to gain each level
  IsTrainable             = Yes             ;Can gain experience

  Prerequisites
    Object = GLAPalace
  End
  
  WeaponSet
    Conditions = None
    Weapon = PRIMARY GLAJetBomberWeapon             ;Ground only
    Weapon = SECONDARY GLAJetGladiatorAutoCannonWeapon  ;Air only
    ShareWeaponReloadTime = No
  End
  
  ArmorSet
    Conditions      = None
    Armor           = GLAJetBomberArmor
    DamageFX        = TankEraDamageFX
  End
  CommandSet          = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect        = TechnicalVoiceSelect
  VoiceMove          = TechnicalVoiceMove
  VoiceGuard         = TechnicalVoiceMove
  VoiceAttack        = TechnicalVoiceAttack
  VoiceAttackAir     = TechnicalVoiceAttack
  SoundAmbient       = ME262AmbientLoop
  SoundAmbientRubble = NoSound

  UnitSpecificSounds
  ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate          = TechnicalVoiceCreate
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_ATTACK VEHICLE SCORE AIRCRAFT SELECTABLE PRODUCED_AT_HELIPAD

  Body = ActiveBody ModuleTag_03
    MaxHealth       = 500.0
    InitialHealth   = 500.0
  End
 
  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 500.0
  End

  Behavior = AIUpdateInterface ModuleTag_05
    Turret
      TurretTurnRate = 999   ; turn rate, in degrees per sec
      TurretPitchRate = 60
      FirePitch = -20  ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
  End
  Locomotor = SET_NORMAL GLAJetBomberLocomotor
  
  ;Rubble model: UVTU2_D1
  Behavior                          = JetSlowDeathBehavior ModuleTag_10
    FXOnGroundDeath                 = FX_JetOnGroundDeath
    OCLOnGroundDeath                = OCL_GLABomberDeathFinalBlowUp
    DestructionDelay                = 99999999  ;destruction will happen when we
    RollRate                        = 0.2
    RollRateDelta                   = 50% ;100 ;each frame, rollrate = rollrate * rollrateDelta
    PitchRate                       = 1.5
    FallHowFast                     = 50.0%  ;Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath                  = FX_DesertFlyDeathInitial
    OCLInitialDeath                 = OCL_RaptorDeathInitial
    DelaySecondaryFromInitialDeath  = 500  ; in milliseconds
    FXSecondary                     = FX_JetDeathSecondary
    OCLSecondary                    = OCL_RaptorDeathSecondary
    FXHitGround                     = FX_JetDeathHitGround
    OCLHitGround                    = OCL_RaptorDeathHitGround
    DelayFinalBlowUpFromHitGround   = 200 ; in milliseconds
    FXFinalBlowUp                   = FX_JetDeathFinalBlowUp
    OCLFinalBlowUp                  = OCL_GLABomberDeathFinalBlowUp
  End

  Behavior = AutoHealBehavior ModuleTag_JunkRepair08
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = TransitionDamageFX ModuleTag_12
    DamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
  End

  Behavior = WeaponBonusUpgrade ModuleTag_13
    TriggeredBy = Upgrade_GLAAPBullets
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 40.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
  BuildCompletion = APPEARS_AT_RALLY_POINT
End