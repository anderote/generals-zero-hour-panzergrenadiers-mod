;UVBpln
;UVBpln_d
;UVBpln_d1
;Sleipnir's model thread to the max
Object GLAVehicleAdvancedBiplane

  SelectPortrait         = SUSwagplane_L
  ButtonImage            = SUSwagplane_L

  UpgradeCameo1 = Upgrade_GLAAPBullets
  UpgradeCameo2 = Upgrade_GLAJunkRepair

  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model             = UVBpln
      Animation         = UVBpln.UVBpln
      AnimationMode     = LOOP    
         ;ParticleSysBone   = WINGTIP01 JetBlackTrail  ;These bones aren't attached to the model. So when the plane turns, the particles don't stick to the wingtips :(
         ;ParticleSysBone   = WINGTIP02 JetBlackTrail
         ;ParticleSysBone   = WINGTIP03 JetBlackTrail
         ;ParticleSysBone   = WINGTIP04 JetBlackTrail
      ParticleSysBone   = None JetBlackTrail
      WeaponFireFXBone  = SECONDARY   MUZZLEFX
      WeaponLaunchBone  = SECONDARY   MUZZLE
      WeaponMuzzleFlash = SECONDARY   MUZZLEFX
      WeaponFireFXBone  = PRIMARY   WEAPONA
      WeaponLaunchBone  = PRIMARY   WEAPONA
      WeaponMuzzleFlash = PRIMARY   WEAPONA
    End 
    ConditionState = REALLYDAMAGED
      Model           = UVBpln_d
      Animation       = UVBpln_d.UVBpln_d
      AnimationMode   = LOOP
      ParticleSysBone   = None JetFireLarge
      ParticleSysBone   = None JetBlackTrailThin
      ParticleSysBone   = None JetSmokeLarge
      WeaponFireFXBone  = SECONDARY   MUZZLEFX
      WeaponLaunchBone  = SECONDARY   MUZZLE
      WeaponMuzzleFlash = SECONDARY   MUZZLEFX
      WeaponFireFXBone  = PRIMARY   WEAPONA
      WeaponLaunchBone  = PRIMARY   WEAPONA
      WeaponMuzzleFlash = PRIMARY   WEAPONA
    End
    ConditionState = RUBBLE
      Model           = UVBpln_d1
      Animation       = UVBpln_d1.UVBpln_d1
      AnimationMode   = LOOP
      HideSubObject   = PILOT
      ParticleSysBone   = None JetFireLarge
      ParticleSysBone   = None JetBlackTrailThin
      ParticleSysBone   = None JetSmokeLarge
    End
    OkToChangeModelColor = Yes
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:GLABiplane
  EditorSorting       = VEHICLE
  Side                = GLA
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange             = 270.0 
  ShroudClearingRange     = 550.0

  WeaponSet
    Conditions            = None 
    Weapon                = PRIMARY   GLABiplaneMissilePods
    Weapon                = SECONDARY GLABiplaneDualMachineGuns
    ShareWeaponReloadTime = No
  End

  ArmorSet
    Conditions      = None
    Armor           = AirplaneArmor
    DamageFX        = None
  End
  CommandSet          = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect    = GLABiplaneVoiceSelect
  VoiceMove      = GLABiplaneVoiceMove
  VoiceAttack    = GLABiplaneVoiceAttack
  VoiceAttackAir = GLABiplaneVoiceAttack
  VoiceFear      = NoSound                           ;Used during ejecting
  VoiceGuard     = TerroristVoiceMove
  SoundAmbient   = CropDusterAmbientLoop
  UnitSpecificSounds
    VoiceCreate           = TerroristVoiceCreate
  End

  BuildCost               = 1000
  BuildTime               = 20.0
  ExperienceValue         = 50 50 120 180  ;Experience point value at each level
  ExperienceRequired      = 0 120 250 500   ;Experience points needed to gain each level
  IsTrainable             = Yes             ;Can gain experience

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK VEHICLE SCORE AIRCRAFT EMP_HARDENED PRODUCED_AT_HELIPAD

  Body = ActiveBody ModuleTag_03
    MaxHealth       = 420.0 ;500.0
    InitialHealth   = 420.0 ;500.0
  End
 
  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_09
    AutoAcquireEnemiesWhenIdle    = Yes NotWhileAttacking
  End
  Locomotor = SET_NORMAL GLABiplaneLocomotor

  Behavior = AutoHealBehavior ModuleTag_JunkRepair08
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = StealthUpdate ModuleTag_56732
    StealthDelay                = 1500 ; msec
    StealthForbiddenConditions  = ATTACKING TAKING_DAMAGE
    MoveThresholdSpeed          = 3
    InnateStealth               = No ;Requires upgrade first
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End

  Behavior = StealthUpgrade ModuleTag_10
    TriggeredBy = Upgrade_Veterancy_HEROIC
  End

  Behavior = WeaponBonusUpgrade ModuleTag_09232
    TriggeredBy = Upgrade_GLAAPBullets
  End

  Behavior                          = JetSlowDeathBehavior ModuleTag_11
    DestructionDelay                = 2500
    RollRate                        = 0.0
    RollRateDelta                   = 100%      ;each frame, rollrate = rollrate * rollrateDelta
    PitchRate                       = 0
    FallHowFast                     = 15.0% ;25.0%    ;Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath                  = FX_JetBigDeathInitial
    OCLInitialDeath                 = OCL_AmericaJetCargoDeathStart
    DelaySecondaryFromInitialDeath  = 2500       ; in milliseconds     This guy won't hit the ground, so this time equals the above time
    OCLSecondary                    = OCL_AmericaJetCargoHulkDeath
    FXSecondary                     = FX_BigPlaneDeath
  End

  Behavior = TransitionDamageFX ModuleTag_12
    DamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 40.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
  BuildCompletion = APPEARS_AT_RALLY_POINT
End



