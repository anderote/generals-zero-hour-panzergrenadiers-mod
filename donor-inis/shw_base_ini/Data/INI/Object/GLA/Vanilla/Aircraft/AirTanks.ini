  SelectPortrait         = SUBRDM1_L
  ButtonImage            = SURoach

  UpgradeCameo1 = Upgrade_GLAAPRockets
  UpgradeCameo2 = Upgrade_GLAJunkRepair

  Draw = W3DModelDraw ModuleTag_01
