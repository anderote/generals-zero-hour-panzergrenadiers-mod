;**********
;COBRA
;**********

Object GLAFlyingTank
  ; *** ART Parameters ***
  SelectPortrait         = WheeledScorpion_L
  ButtonImage            = WheeledScorpion
  
  UpgradeCameo1 = Upgrade_GLAAPRockets
  UpgradeCameo2 = Upgrade_GLAToxinShells
  UpgradeCameo3 = Upgrade_GLAJunkRepair

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = UVBomb_A
      HideSubObject      = CYLINDER05 TORUS01 TORUS02
    End

    ConditionState = RUBBLE
      Model = NONE
    End
  End

  Draw = W3DTruckDraw ModuleTag_02
    OkToChangeModelColor = Yes
    ProjectileBoneFeedbackEnabledSlots = PRIMARY
   
    ConditionState = NONE
      Model = UVCobra
      Turret = Turret
      HideSubObject = MissleRack02 BARRELUP01
      ShowSubObject = MissleRack01
      WeaponFireFXBone  = SECONDARY Muzzle
      WeaponLaunchBone  = SECONDARY Muzzle
      WeaponRecoilBone  = SECONDARY Barrel
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone  = PRIMARY WeaponA
      WeaponLaunchBone  = PRIMARY WeaponA
    End

    ConditionState = REALLYDAMAGED
      Model = UVCobra_D
      Turret = Turret
      HideSubObject = MissleRack02 BARRELUP01
      ShowSubObject = MissleRack01
      WeaponFireFXBone  = SECONDARY Muzzle
      WeaponLaunchBone  = SECONDARY Muzzle
      WeaponRecoilBone  = SECONDARY Barrel
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone  = PRIMARY WeaponA
      WeaponLaunchBone  = PRIMARY WeaponA
    End
    AliasConditionState = RUBBLE

    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = RocketBuggyDirtPowerSlide
    
    RightFrontTireBone          = Wheel01
    LeftFrontTireBone           = Wheel02
    RightRearTireBone           = Wheel03
    LeftRearTireBone            = Wheel04
    
    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 2.5   ; This speed is added to the rotation speed when powersliding.

    RotationDamping = 0.7
    TrackMarks = EXTireTrack.tga
  End

  DisplayName               = OBJECT:Cobra
  Side                      = GLA
  EditorSorting             = VEHICLE
  TransportSlotCount        = 0            ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None
    Weapon = PRIMARY ScorpionMissileWeaponAir
    Weapon = SECONDARY ScorpionTankGunAir
  End

  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End

  Prerequisites
    Object = GLAArmsDealer
  End

  BuildCost       = 850
  BuildTime       = 8.0          ;in seconds    
  VisionRange     = 160
  ShroudClearingRange = 400


  ExperienceValue = 90 110 130 150    ;Experience point value at each level
  ExperienceRequired = 0 220 455 750  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet      = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = GenericGLATankVoiceSelect
  VoiceMove             = GenericGLATankVoiceMove
  VoiceAttack           = ScorpionTankVoiceModeRocket
  VoiceAttackAir        = GenericGLATankVoiceAttack
  SoundMoveStart        = ScorpionTankMoveStart
  SoundMoveStartDamaged = ScorpionTankMoveStart
  VoiceGuard            = ScorpionTankVoiceMove

  UnitSpecificSounds
    VoiceCreate    = GenericGLATankVoiceCreate
    TurretMoveLoop = TurretMoveLoop
    VoiceEnter     = GenericGLATankVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS SELECTABLE SALVAGER VEHICLE AIRCRAFT SCORE PRODUCED_AT_HELIPAD CAN_ATTACK SALVAGER

  Body = ActiveBody ModuleTag_202
    MaxHealth       = 300.0
    InitialHealth   = 300.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 840
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 100
      RecenterTime = 5000   ; how long to wait during idle before recentering
      ControlledWeaponSlots = PRIMARY SECONDARY
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL BalloonLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    VehicleCrashesIntoBuildingWeaponTemplate = SmallAircraftCrashingIntoBuildingWeapon
    Mass = 50.0
  End
  Behavior = AutoHealBehavior ModuleTag_05
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = VeterancyGainCreate ModuleTag_860
    StartingLevel = VETERAN
    ScienceRequired = Slth_SCIENCE_GLAVehicleTraining
  End

  Behavior = HelicopterSlowDeathBehavior ModuleTag_11
    DestructionDelay                = 99999999        ; the destruction delay
    SpiralOrbitTurnRate             = 250.0           ; in degrees per second, bigger # = tighter spiral
    SpiralOrbitForwardSpeed         = 10.0           ; bigger # = larger spiral
    SpiralOrbitForwardSpeedDamping  = .9999           ; smaller #'s = slow down faster
    MaxBraking                      = 250   ; max braking we can use during death spiral (lower num = wilder spiral)    
    SoundDeathLoop                  = DaisyCutterGas
    MinSelfSpin                     = 35                     ; in degrees per second
    MaxSelfSpin                     = 90                     ; in degrees per second
    SelfSpinUpdateDelay             = 300                     ; in milliseconds
    SelfSpinUpdateAmount            = 5                      ; in degrees   
    FallHowFast                     = 110.0%                   ; fraction of gravity, lower = take longer to fall
    MinBladeFlyOffDelay             = 500                    ; in milliseconds
    MaxBladeFlyOffDelay             = 500                    ; in milliseconds
    AttachParticle                  = SootySmokeTrail
    AttachParticleBone              = Propeller02
    BladeObjectName                 = None
    BladeBoneName                   = Propeller01    
    FXBlade                         = None
    OCLBlade                        = None
    FXHitGround                     = FX_HelicopterHitGround
    OCLHitGround                    = OCL_GLATankCobraDebrisCommander
    FXFinalBlowUp                   = FX_GroundedHelicopterBlowUp
    OCLFinalBlowUp                  = None
    DelayFromGroundToFinalDeath     = 30
    FinalRubbleObject               = GLAVehicleCobraDeadHull
  End

  Behavior = DestroyDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior        = CreateObjectDie ModuleTag_DeathFX01 ;The balloon pop fx
    CreationList  = OCL_FlakShellExplosion04
  End
  
  Behavior                 = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = EjectPilotDie ModuleTag_HijackerEmerge01
    DeathTypes = ALL -CRUSHED -SPLATTED
    RequiredStatus = HIJACKED
    VeterancyLevels =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList = OCL_HijackerEmergeViaParachute
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  ;;;Behavior = CreateCrateDie ModuleTag_MagicFloatingBoxes01
    ;;;CrateData = AirborneCrateData
  ;;;End

  Geometry = BOX
  GeometryMajorRadius = 18.0
  GeometryMinorRadius = 12.0
  GeometryHeight = 13.5    
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME   
  ShadowSizeX = 80  ; minimum elevation angle above horizon. Used to limit shadow length

End

