;SCUD
;**********

Object GLAFlyingScudLauncher
  ; *** ART Parameters ***
  SelectPortrait         = SUScudLauncher_L
  ButtonImage            = SUScudLauncher

  UpgradeCameo1 = Upgrade_GLAAPRockets
  UpgradeCameo2 = Upgrade_GLAJunkRepair
  UpgradeCameo3 = Upgrade_GLAAnthraxBeta

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = UVBomb_A
      HideSubObject      = CYLINDER05 TORUS01 TORUS02
    End

    ConditionState = RUBBLE
      Model = NONE
    End
  End

  Draw = W3DTruckDraw ModuleTag_101
    OkToChangeModelColor = Yes
    ProjectileBoneFeedbackEnabledSlots = PRIMARY SECONDARY ; WeaponLaunchBone will be shown/hidden, not just used for firing offset
  
    DefaultConditionState
      Model = UVScudLchr
      HideSubObject = TURRET TURRETUP01 TURRETUP02
    End

    ConditionState = REALLYDAMAGED
      Model = UVScudLchr_d
      HideSubObject = TURRET TURRETUP01 TURRETUP02
    End
    AliasConditionState = RUBBLE

    TrackMarks = EXTireTrack.tga

    Dust = ScudLauncherDust
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = RocketBuggyDirtPowerSlide

    ; These parameters are only used if the model has a separate suspension, 
    ; and the locomotor has HasSuspension = Yes.
    LeftFrontTireBone = Tire01
    RightFrontTireBone = Tire05
    LeftRearTireBone = Tire04
    RightRearTireBone = Tire08
    MidLeftFrontTireBone = Tire02
    MidRightFrontTireBone = Tire06
    MidLeftRearTireBone = Tire03
    MidRightRearTireBone = Tire07

    TireRotationMultiplier = 0.2   ; this * speed = rotation.
  End

  Draw = W3DModelDraw ModuleTag_ExtraSalvage01
    OkToChangeModelColor = Yes
    ProjectileBoneFeedbackEnabledSlots = PRIMARY SECONDARY ; WeaponLaunchBone will be shown/hidden, not just used for firing offset
  
    DefaultConditionState
      Model = UVScudS3
      Turret = TURRETEL03
      TurretPitch = TURRETEL03
      WeaponLaunchBone = PRIMARY WeaponD
      WeaponLaunchBone = SECONDARY WeaponD
    End

    ConditionState = REALLYDAMAGED
      Model = UVScudS3_D
      Turret = TURRETEL03
      TurretPitch = TURRETEL03
      WeaponLaunchBone = PRIMARY WeaponD
      WeaponLaunchBone = SECONDARY WeaponD
    End
    AliasConditionState = RUBBLE
  End

  ; ***DESIGN parameters ***

  DisplayName        = OBJECT:ScudLauncher
  Side               = GLA
  EditorSorting      = VEHICLE
  TransportSlotCount = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None
    Weapon = PRIMARY    AdvancedSCUDLauncherGunExplosive
    Weapon = SECONDARY  AdvancedSCUDLauncherGunToxin
    AutoChooseSources = PRIMARY FROM_SCRIPT FROM_AI DEFAULT_SWITCH_WEAPON
    AutoChooseSources = SECONDARY FROM_SCRIPT FROM_AI
    PreferredAgainst  = SECONDARY INFANTRY
    ShareWeaponReloadTime = Yes
  End
  
  ArmorSet
    Conditions      = None
    Armor           = TruckArmor
    DamageFX        = TankDamageFX
  End

  Prerequisites
    Object = GLAArmsDealer
    Object = GLAPalace
  End

  BuildCost       = 1500
  BuildTime       = 20.0          ;in seconds
  VisionRange     = 250
  ShroudClearingRange = 400

  ExperienceValue = 100 135 185 260   ;Experience point value at each level
  ExperienceRequired = 0 270 647 1300  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet             = GLAVehicleScudLauncherAplhaCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = ScudLauncherVoiceSelect
  VoiceMove             = ScudLauncherVoiceMove
  VoiceGuard            = ScudLauncherVoiceMove
  VoiceAttack           = ScudLauncherVoiceAttack
  SoundMoveStart        = ScudLauncherMoveStart
  SoundMoveStartDamaged = ScudLauncherMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = ScudLauncherVoiceCreate
    TurretMoveStart     = NoSound
    TurretMoveLoop      = TurretMoveLoop
    TruckLandingSound   = NoSound
    TruckPowerslideSound = NoSound
    VoiceCrush          = ScudLauncherVoiceCrush
    VoiceEnter          = ScudLauncherVoiceMove
    VoicePrimaryWeaponMode   = ScudLauncherVoiceModeHiEx
    VoiceSecondaryWeaponMode = ScudLauncherVoiceModeAnthrax
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS SELECTABLE VEHICLE AIRCRAFT SCORE PRODUCED_AT_HELIPAD CAN_ATTACK SALVAGER

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 180.0
    InitialHealth   = 180.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 360
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate        = 0 ;60   ; turn rate, in degrees per sec
      TurretPitchRate       = 60 ;50
      FirePitch             = 0  ;It needs to fire the missile straight out or else it will hit the balloon!
      AllowsPitch           = Yes
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = No NotWhileAttacking
  End  

  Behavior = CommandButtonHuntUpdate  ModuleTag_04 ; allows use of command button hunt script with this unit. 
  End
  Locomotor = SET_NORMAL BalloonLocomotor

  Behavior = PhysicsBehavior ModuleTag_05
    VehicleCrashesIntoBuildingWeaponTemplate = SmallAircraftCrashingIntoBuildingWeapon
    Mass = 40.0
  End

  Behavior = AutoHealBehavior ModuleTag_06
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_ScudLauncherDamageTransition
  End

  Behavior = HelicopterSlowDeathBehavior ModuleTag_11
    DestructionDelay                = 99999999        ; the destruction delay
    SpiralOrbitTurnRate             = 250.0           ; in degrees per second, bigger # = tighter spiral
    SpiralOrbitForwardSpeed         = 10.0           ; bigger # = larger spiral
    SpiralOrbitForwardSpeedDamping  = .9999           ; smaller #'s = slow down faster
    MaxBraking                      = 250   ; max braking we can use during death spiral (lower num = wilder spiral)    
    SoundDeathLoop                  = DaisyCutterGas
    MinSelfSpin                     = 35                     ; in degrees per second
    MaxSelfSpin                     = 90                     ; in degrees per second
    SelfSpinUpdateDelay             = 300                     ; in milliseconds
    SelfSpinUpdateAmount            = 5                      ; in degrees   
    FallHowFast                     = 160.0%                   ; fraction of gravity, lower = take longer to fall
    MinBladeFlyOffDelay             = 500                    ; in milliseconds
    MaxBladeFlyOffDelay             = 500                    ; in milliseconds
    AttachParticle                  = SootySmokeTrail
    AttachParticleBone              = TURRET
    BladeObjectName                 = None
    BladeBoneName                   = Propeller01    
    FXBlade                         = None
    OCLBlade                        = None
    FXHitGround                     = FX_CrusaderCatchFire
    OCLHitGround                    = OCL_LOSATMissileMetalImpact
    FXFinalBlowUp                   = FX_ScudLauncherExplosionOneFinal
    OCLFinalBlowUp                  = None
    DelayFromGroundToFinalDeath     = 30
    FinalRubbleObject               = DeadSCUDLauncherHulk
  End

  Behavior = CommandSetUpgrade ModuleTag_14
    CommandSet    = GLAVehicleScudLauncherBetaCommandSet
    TriggeredBy   = Upgrade_GLAAnthraxBeta
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = DestroyDie ModuleTag_22
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = LockWeaponCreate ModuleTag_24
    SlotToLock = PRIMARY ; Prevents indeterminate state plus two unpickable weapons equaling no attack.
  End

  Behavior        = CreateObjectDie ModuleTag_DeathFX01 ;The balloon pop fx
    CreationList  = OCL_FlakShellExplosion04
  End

  Behavior = EjectPilotDie ModuleTag_HijackerEmerge01
    DeathTypes = ALL -CRUSHED -SPLATTED
    RequiredStatus = HIJACKED
    VeterancyLevels =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList = OCL_HijackerEmergeViaParachute
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Geometry = BOX
  GeometryMajorRadius = 17.0
  GeometryMinorRadius = 9.0
  GeometryHeight = 14.5     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME   
  ShadowSizeX = 80  ; minimum elevation angle above horizon. Used to limit shadow length 
End

