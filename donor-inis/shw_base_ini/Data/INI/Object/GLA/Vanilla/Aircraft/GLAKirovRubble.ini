Object GLAVehicleAirshipDying
  ;testing to fix 'vanishing when landing on buildings'
  Draw = W3DOverlordAircraftDraw ModuleTag_01
    ExtraPublicBone = WeaponA
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model           = UVAirship_DC
      Animation       = UVAirship_DC.UVAirship_DC
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      ParticleSysBone = Fire01 SmolderingFire
      ParticleSysBone = Fire01 SmolderingFlameCore
      ParticleSysBone = Fire03 SmolderingFire
      ParticleSysBone = Fire03 SmolderingFlameCore
      ParticleSysBone = SMOKE01 SmokeSmallContinuousDown
      ParticleSysBone = SMOKE02 SmokeSmallContinuousDown
      ParticleSysBone = FIRE02 AirshipBurningTrail
    End      
    OkToChangeModelColor = Yes
  End

  Draw = W3DModelDraw ModuleTag_Autocannon01
    AttachToBoneInAnotherModule = WeaponA
    InitialRecoilSpeed    = 200
    MaxRecoilDistance    = 1.0
    RecoilSettleSpeed    = 50
    RecoilDamping        = 0.25
    DefaultConditionState
      Model = UVAirship_TD
      Turret = TURRET01
      TurretPitch = TURRETEL01
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone = SECONDARY Muzzle
      WeaponRecoilBone = SECONDARY Barrel
      WeaponLaunchBone = SECONDARY Muzzle
    End
  End

  Draw = W3DModelDraw ModuleTag_Autocannon02
    AttachToBoneInAnotherModule = Firepoint01
    InitialRecoilSpeed    = 200
    MaxRecoilDistance    = 1.0
    RecoilSettleSpeed    = 50
    RecoilDamping        = 0.25
    DefaultConditionState
      Model = UVAirship_TD
      Turret = TURRET01
      TurretPitch = TURRETEL01
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone = SECONDARY Muzzle
      WeaponRecoilBone = SECONDARY Barrel
      WeaponLaunchBone = SECONDARY Muzzle
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:GLAAirship
  EditorSorting       = SYSTEM
  Side                = GLA
  TransportSlotCount  = 0     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 100.0
  ShroudClearingRange = 200

  ArmorSet
    Conditions     = None
    Armor          = InvulnerableAllArmor ; We can't be hurt on the field.  We share damage from the Overlord with his damage module
    DamageFX       = EmptyDamageFX   ; just to avoid an assert
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf        = PRELOAD EMP_HARDENED SALVAGER NO_COLLIDE NO_SELECT UNATTACKABLE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 3000.0
    InitialHealth   = 3000.0
    
    SubdualDamageCap        = 4000
    SubdualDamageHealRate   = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = ChinookAIUpdate ModuleTag_03
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY
      TurretTurnRate      = 180     ; turn rate, in degrees per sec
      TurretPitchRate     = 180
      AllowsPitch         = Yes
      MinPhysicalPitch    = -89
      NaturalTurretPitch  = -45
      NaturalTurretAngle  = 180
      FiresWhileTurning   = Yes
      MinIdleScanAngle    = 10
      MaxIdleScanAngle    = 180
      MinIdleScanInterval = 3000
      MaxIdleScanInterval = 8000
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate     = 100     ; default is 2000
    RotorWashParticleSystem = HelixRotorWashRing
  End
  Locomotor = SET_NORMAL GLAAirshipDyingLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 50.0
    ShockResistance = 1.0
    KillWhenRestingOnGround = Yes
    AllowBouncing = No
  End

  Behavior = CreateObjectDie ModuleTag_05
    CreationList = OCL_GLAAirshipRubbleOnGround
  End

  ;in case something goes horribly wrong and I cant reach the ground
  Behavior = LifetimeUpdate ModuleTag_06
    MinLifetime = 10000   ; min lifetime in msec
    MaxLifetime = 10000   ; max lifetime in msec
  End

  Behavior = HeightDieUpdate ModuleTag_07
    TargetHeight                    = 1.0
    TargetHeightIncludesStructures  = No
    OnlyWhenMovingDown              = Yes
    SnapToGroundOnDeath             = Yes
  End

  Behavior = DestroyDie ModuleTag_08
    ;nothing
  End

  Behavior = FXListDie ModuleTag_09
    DeathFX = FX_HelixHelicopterBlowUpBig
  End

  Geometry = BOX
  GeometryMajorRadius = 48.0
  GeometryMinorRadius = 16.0
  GeometryHeight = 36.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89     ; minimum elevation angle above horizon. Used to limit shadow length
End