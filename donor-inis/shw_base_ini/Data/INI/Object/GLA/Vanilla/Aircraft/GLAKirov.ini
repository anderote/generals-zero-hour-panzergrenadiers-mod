;<3 Thanks mate.
; GLA + Battlefield 1 + Kirov
Object GLAVehicleAirship
  ; *** ART Parameters ***
  SelectPortrait = SUAirship_L
  ButtonImage    = SUAirship

  UpgradeCameo1 = Upgrade_GLAAPBullets
  UpgradeCameo2 = Upgrade_GLAJunkRepair
  UpgradeCameo3 = Upgrade_GLAToxinShells
  UpgradeCameo4 = Upgrade_GLAAnthraxBeta

  Draw = W3DOverlordAircraftDraw ModuleTag_01
    ExtraPublicBone = WeaponA
    ParticlesAttachedToAnimatedBones = Yes
    ;Normal
    DefaultConditionState
      Model                     = UVAirship
      Animation                 = UVAirship.UVAirship
      AnimationMode             = LOOP
      AnimationSpeedFactorRange = 2.0 2.0
      ;Bombs
      ;Sprayer
      WeaponLaunchBone = PRIMARY WeaponB
      WeaponFireFXBone = PRIMARY WeaponB
    End

    ConditionState = REALLYDAMAGED
      Model           = UVAirship_D
      Animation       = UVAirship_D.UVAirship_D
      ParticleSysBone = Fire01 SmolderingFire
      ParticleSysBone = Fire01 SmolderingFlameCore
      ParticleSysBone = TOX01 AnthraxLeakDown
    End

    ConditionState = RUBBLE
      Model           = UVAirship_DC
      Animation       = UVAirship_DC.UVAirship_DC
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      ParticleSysBone = Fire01 SmolderingFire
      ParticleSysBone = Fire01 SmolderingFlameCore
      ParticleSysBone = Fire03 SmolderingFire
      ParticleSysBone = Fire03 SmolderingFlameCore
      ParticleSysBone = SMOKE01 SmokeSmallContinuousDown
      ParticleSysBone = SMOKE02 SmokeSmallContinuousDown
      ParticleSysBone = FIRE02 AirshipBurningTrail
    End      
    OkToChangeModelColor = Yes
  End

  Draw = W3DModelDraw ModuleTag_Autocannon01
    AttachToBoneInAnotherModule = WeaponA
    InitialRecoilSpeed    = 200
    MaxRecoilDistance    = 1.0
    RecoilSettleSpeed    = 50
    RecoilDamping        = 0.25
    DefaultConditionState
      Model = UVAirship_T
      Turret = TURRET01
      TurretPitch = TURRETEL01
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone = SECONDARY Muzzle
      WeaponRecoilBone = SECONDARY Barrel
      WeaponLaunchBone = SECONDARY Muzzle
    End
    ConditionState = REALLYDAMAGED
      Model = UVAirship_TD
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:GLAAirship
  EditorSorting       = VEHICLE
  Side                = GLA
  TransportSlotCount  = 0     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 180.0
  ShroudClearingRange = 400

  BuildCost           = 4000
  BuildTime           = 60.0     ; in seconds

  Prerequisites
    Object = GLAPalace GLAWarFactory
    Science = SCIENCE_Rank5
  End

  ExperienceValue     = 400 800 1200 1600   ; Experience point value at each level
  ExperienceRequired  = 0 1600 4200 8000   ; Experience points needed to gain each level
  IsTrainable         = Yes             ; Can gain experience

  CommandSet = GLAAirshipCommandSet

  ArmorSet
    Conditions = None
    Armor = KirovArmor
    DamageFX = TankEraDamageFX
  End

  WeaponSet
    Conditions = None
    Weapon = SECONDARY GenericGLAAirshipAutoCannon
    Weapon = TERTIARY GLAAirshipMarauderWeapon
    AutoChooseSources = TERTIARY NONE
  End
  
  ; *** AUDIO Parameters ***
  VoiceSelect      = AssaultAirshipVoiceSelect
  VoiceMove        = AssaultAirshipVoiceMove
  VoiceGuard       = AssaultAirshipVoiceMove
  VoiceAttack      = AssaultAirshipVoiceAttack
  SoundMoveStart   = KirovMoveStart

  UnitSpecificSounds
    VoiceCreate    = AssaultAirshipVoiceCreate
    VoiceGetHealed = AssaultAirshipVoiceMove    ;Healed, repaired, same thing.
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf        = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE EMP_HARDENED PRODUCED_AT_HELIPAD HERO SALVAGER AIRCRAFT

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 3000.0
    InitialHealth   = 3000.0
    
    SubdualDamageCap        = 4000
    SubdualDamageHealRate   = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = ChinookAIUpdate ModuleTag_03
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY
      TurretTurnRate      = 180     ; turn rate, in degrees per sec
      TurretPitchRate     = 180
      AllowsPitch         = Yes
      MinPhysicalPitch    = -89
      NaturalTurretPitch  = -45
      NaturalTurretAngle  = 180
      FiresWhileTurning   = Yes
      MinIdleScanAngle    = 10
      MaxIdleScanAngle    = 180
      MinIdleScanInterval = 3000
      MaxIdleScanInterval = 8000
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate     = 100     ; default is 2000
    RotorWashParticleSystem = HelixRotorWashRing
  End
  Locomotor = SET_NORMAL GLAAirshipLocomotor
  Locomotor = SET_TAXIING BasicHelicopterTaxiLocomotor
  
  Behavior = OverlordContain ModuleTag_OC
    Slots                   = 1
    DamagePercentToUnits    = 100%
    AllowInsideKindOf       = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PayloadTemplateName     = GLAVehicleAirshipTurret
    ExperienceSinkForRider  = No     ;Yes     ; I get the Exp for things my turret friend kills
  End

  Behavior = GrantUpgradeCreate ModuleTag_Plane01
    UpgradeToGrant = Upgrade_ReplaceAirDefender
  End

  Behavior = ObjectCreationUpgrade ModuleTag_Plane02
    UpgradeObject = OCL_GLAAirshipAirDefender
    TriggeredBy   = Upgrade_ReplaceAirDefender
  End

  Behavior = PhysicsBehavior ModuleTag_04
    VehicleCrashesIntoBuildingWeaponTemplate = AirshipCrashingIntoBuildingWeapon
    Mass = 50.0
  End

  Behavior = TransitionDamageFX ModuleTag_05
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_ComancheDamageTransition
  End

  Behavior = FXListDie ModuleTag_06
    DeathFX = FX_KirovAirshipStartDeath
  End

  Behavior = AutoHealBehavior ModuleTag_07
    HealingAmount = 10  ; offset by the 75% reduction to all damage types, including healing
    HealingDelay  = 1000 ; msec
    TriggeredBy   = Upgrade_GLAJunkRepair
  End

  Behavior = HelicopterSlowDeathBehavior ModuleTag_D1
    DestructionDelay            = 99999999     ; the destruction delay
    SpiralOrbitTurnRate         = 10.0     ; in degrees per second, bigger # = tighter spiral
    SpiralOrbitForwardSpeed     = 20.0     ; bigger # = larger spiral
    SpiralOrbitForwardSpeedDamping = .99    ; smaller #'s = slow down faster
    MaxBraking                  = 200     ; max braking we can use during death spiral (lower num = wilder spiral)
    MinSelfSpin                 = 3     ; in degrees per second
    MaxSelfSpin                 = 9     ; in degrees per second
    SelfSpinUpdateDelay         = 500     ; in milliseconds
    SelfSpinUpdateAmount        = 1     ; in degrees
    FallHowFast                 = 17.5%     ; fraction of gravity, lower = take longer to fall
    MinBladeFlyOffDelay         = 30     ; in milliseconds
    MaxBladeFlyOffDelay         = 30     ; in milliseconds
    FXHitGround                 = FX_HelixHelicopterBlowUpBig
    OCLHitGround                = OCL_AirshipDeathFinalGeneric
    DelayFromGroundToFinalDeath = 1 ;30
    FinalRubbleObject           = AirshipRubbleHull
  End

  ;Behavior                    = InstantDeathBehavior  ModuleTag_DeathTestFix01
    ;DeathTypes                = ALL
    ;FX                        = FX_KirovAirshipStartDeath
    ;OCL                       = OCL_GLAAirshipDying
  ;End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration     = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay  = 500     ; this often.
  End

  Behavior = ProductionUpdate ModuleTag_Taunt01
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Taunt02
    UpgradeObject = OCL_AssaultAirshipTaunt
    TriggeredBy   = Upgrade_GLAWorkerFakeCommandSet
  End

  Behavior = WeaponBonusUpgrade ModuleTag_SoulPiercingAmmo01
    TriggeredBy = Upgrade_GLAAPBullets
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DeathTest01  ;This is to kill the slaved air defender, instead of having it fall to the ground and be ugly.
    DeathWeapon     = GLAAirDefenderKillSelfWeapon
    StartsActive    = Yes
    DeathTypes      = ALL
  End

  Geometry = BOX
  GeometryMajorRadius = 48.0
  GeometryMinorRadius = 16.0
  GeometryHeight = 36.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89     ; minimum elevation angle above horizon. Used to limit shadow length
End



