Object Slth_GLAAirshipAirDefender
  ; *** ART Parameters ***
  SelectPortrait         = SABattleDrone_L
  ButtonImage            = SABattleDrone
  
  ; *** ART Parameters ***
  SelectPortrait         = SUDesertFly_L
  ButtonImage            = SUDesertFly

  Draw                   = W3DOverlordAircraftDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes
    DefaultConditionState
      Model               = UVBomber
      Animation           = UVBomber.UVBomber
      AnimationMode       = LOOP
      HideSubObject       = WeaponA01 WeaponA02 WeaponA03 WeaponA04 WeaponA05 WeaponA06
      ParticleSysBone     = Exhaust01 JetBlackTrail
      ParticleSysBone     = Exhaust02 JetBlackTrail
      WeaponFireFXBone    = PRIMARY   MUZZLEFX
      WeaponLaunchBone    = PRIMARY   MUZZLEFX
      WeaponMuzzleFlash   = PRIMARY   MUZZLEFX
      WeaponFireFXBone    = SECONDARY   MUZZLEFX
      WeaponLaunchBone    = SECONDARY   MUZZLEFX
      WeaponMuzzleFlash   = SECONDARY   MUZZLEFX
    End
    ConditionState        = REALLYDAMAGED
      Model               = UVBomber_D
      Animation           = UVBomber_D.UVBomber_D
      AnimationMode       = LOOP
      ParticleSysBone     = PROP01 SmolderingFire
      ParticleSysBone     = PROP01 SmolderingSmoke
    End
    ConditionState        = RUBBLE
      Model               = UVBomber_D1B
      Animation           = UVBomber_D1B.UVBomber_D1B
      ParticleSysBone     = PROP01 SmolderingFire
      ParticleSysBone     = PROP01 SmolderingSmoke
      ParticleSysBone     = PROP02 SmolderingFire
      ParticleSysBone     = PROP02 SmolderingSmoke
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:BattleDrone
  Side                = GLA
  EditorSorting       = VEHICLE
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions            = None 
    Weapon                = PRIMARY GLAAirDefenderMachineGunWeapon
  End

  ArmorSet
    Conditions        = None
    Armor             = GLAAirDefenderArmor
    DamageFX          = SmallTankDamageFX
  End

  BuildCost           = 200
  BuildTime           = 5.0          ;in seconds    
  VisionRange         = 300
  ShroudClearingRange = 300

  ExperienceValue         = 25 50 75 100  ;Experience point value at each level
  ExperienceRequired      = 0 100 262 500   ;Experience points needed to gain each level
  IsTrainable             = Yes             ;Can gain experience
  
  ; *** AUDIO Parameters ***
  SoundAmbient       = TU2AmbientLoop

  UnitSpecificSounds
  ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    TurretMoveStart   = NoSound
    TurretMoveLoop    = TurretMoveLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority       = UNIT
  KindOf = PRELOAD VEHICLE SELECTABLE CAN_ATTACK DRONE IGNORES_SELECT_ALL NO_SELECT NO_HEAL_ICON SALVAGER
  Body = ActiveBody ModuleTag_03
    MaxHealth       = 550.0
    InitialHealth   = 550.0
  End

  Behavior = AIUpdateInterface ModuleTag_09001
    Turret
      TurretTurnRate = 0
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes 
    MoodAttackCheckRate = 250
  End
  Locomotor = SET_NORMAL GLAAirDefenderLocomotor

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 50.0
    KillWhenRestingOnGround = Yes  ;If the Airships death weapon doesnt kill the air defender, this will. It won't look pretty though.
    AllowBouncing = No
  End

  Behavior = OverlordContain ModuleTag_BallTurret01
    Slots                   = 1
    DamagePercentToUnits    = 100%
    AllowInsideKindOf       = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PayloadTemplateName     = GLAAirDefenderBallTurret
    ExperienceSinkForRider = Yes ; I get the Exp for things my turret friend kills
  End

  Behavior = WeaponBonusUpgrade ModuleTag_09232
    TriggeredBy = Upgrade_GLAAPBullets
  End

  Behavior = AutoHealBehavior ModuleTag_JunkRepair01
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = SlavedUpdate ModuleTag_07
    GuardMaxRange = 50      ;How far away from master I'm allowed when master is idle (doesn't wander)
    GuardWanderRange = 50   ;How far away I'm allowed to wander from master while guarding.
    AttackRange = 60        ;How far away from master I'm allowed when master is attacking a target.
    AttackWanderRange = 60  ;How far I'm allowed to wander from target.
    ScoutRange = 50         ;How far away from master I'm allowed when master is moving.
    ScoutWanderRange = 50   ;How far I'm allowed to wander from scout point.
    StayOnSameLayerAsMaster = Yes
  End

  Behavior = StealthDetectorUpdate ModuleTag_Detector01
    DetectionRate         = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange        = 150 ;Dustin, enable this for independant balancing!
    CanDetectWhileGarrisoned  = No ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained   = No ;Contained means being in a transport or tunnel network.
    ExtraRequiredKindOf   = AIRCRAFT  ; we can only detect MINES, not other stealthed things
  End

  Behavior                          = JetSlowDeathBehavior ModuleTag_Death01
    FXOnGroundDeath                 = FX_JetOnGroundDeath
    OCLOnGroundDeath                = OCL_DesertFlyDeathFinalBlowUp
    DestructionDelay                = 99999999; destruction will happen when we
    RollRate                        = 0.1
    RollRateDelta                   = 100% ;each frame, rollrate = rollrate * rollrateDelta
    PitchRate                       = 0.0
    FallHowFast                     = 110.0%  ;Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath                  = FX_DesertFlyDeathInitial
    OCLInitialDeath                 = OCL_RaptorDeathInitial
    DelaySecondaryFromInitialDeath  = 500  ; in milliseconds
    FXSecondary                     = FX_JetDeathSecondary
    OCLSecondary                    = OCL_RaptorDeathSecondary
    FXHitGround                     = FX_JetDeathHitGround
    OCLHitGround                    = OCL_RaptorDeathHitGround
    DelayFinalBlowUpFromHitGround   = 200 ; in milliseconds
    FXFinalBlowUp                   = FX_JetDeathFinalBlowUp
    OCLFinalBlowUp                  = OCL_DesertFlyDeathFinalBlowUp
  End

  Behavior = UpgradeDie  ModuleTag_PlaneDead01
   DeathTypes = ALL
   UpgradeToRemove      = Upgrade_ReplaceAirDefender ModuleTag_Plane02
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 5
  GeometryMinorRadius = 5
  GeometryHeight = 10.0     
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End

