; GLA Derginfry
;Thanks Zeke <3
;A heavy transport helicopter for GLA
;Command_ConstructGLAVehicleDragonfly
Object GLAVehicleDragonfly
  ; *** ART Parameters ***
  SelectPortrait = SUDragonfly_L
  ButtonImage = SUDragonfly
  
  UpgradeCameo1 = Upgrade_GLAAPBullets
  UpgradeCameo2 = Upgrade_GLAAPRockets  
  UpgradeCameo3 = Upgrade_GLAJunkRepair  
  
  Draw = W3DOverlordAircraftDraw DrawTag_Main
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model = UVDFLY
      Animation = UVDFLY.UVDFLY
      AnimationMode = LOOP
      WeaponFireFXBone = PRIMARY WEAPONA
      WeaponLaunchBone = PRIMARY WEAPONA
      ShowSubObject = RPOD
    End

    ConditionState = REALLYDAMAGED
      Model = UVDFLY_D
      Animation = UVDFLY_D.UVDFLY_D
    End
    AliasConditionState = RUBBLE
    
    ConditionState = RUBBLE SPECIAL_DAMAGED
      Model = UVDFLY_D
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName = OBJECT:Dragonfly
  
  EditorSorting = VEHICLE
  Side = GLA
  
  TransportSlotCount = 0
  
  VisionRange = 225
  ShroudClearingRange = 600
  
  BuildCost = 1500
  BuildTime = 20
  
  Prerequisites
    Object = GLAPalace
  End
  
  ExperienceValue     = 100 150 200 250 ;Experience point value at each level
  ExperienceRequired  = 0 250 1000 2500  ;Experience points needed to gain each level
  IsTrainable         = Yes
  
  CommandSet = GLAVehicleDragonflyCommandSet

  ArmorSet
    Conditions = None
    Armor = ChinookArmor
    DamageFX = None
  End

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY DragonflyRocketPodWeapon
  End

  ; *** AUDIO Parameters ***
  VoiceSelect           = KCobraVoiceSelect
  VoiceMove             = KCobraVoiceMove
  VoiceAttack           = KCobraVoiceAttack
  SoundMoveStart        = ScorpionTankMoveStart
  SoundMoveStartDamaged = ScorpionTankMoveStart
  VoiceGuard            = KCobraVoiceMove
  SoundAmbient          = HelixAmbientLoop
  SoundEnter            = HumveeEnter
  SoundExit             = HumveeExit

  UnitSpecificSounds
    VoiceCreate    = KCobraVoiceCreate
    VoiceEnter     = KCobraVoiceMove
    VoiceUnload    = NoSound
    VoiceGarrison  = KCobraVoiceMove
  End

  ; *** ENGINEERING PARAMETERS ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE VEHICLE HUGE_VEHICLE TRANSPORT AIRCRAFT SCORE PRODUCED_AT_HELIPAD CAN_ATTACK 

  Body = ActiveBody BodyTag_Normal
    MaxHealth = 400.0
    InitialHealth = 400.0
  End

  Behavior = FXListDie ModuleTag_DieFX
    DeathFX = FX_HelicopterStartDeath
  End

  Behavior = TransitionDamageFX ModuleTag_DamageFX
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_ComancheDamageTransition
  End

  Behavior = ChinookAIUpdate AITag_Chinook
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 1000
    RotorWashParticleSystem = HelixRotorWashRing
  End
  Locomotor = SET_NORMAL DragonflyLocomotor
  Locomotor = SET_TAXIING BasicHelicopterTaxiLocomotor


  Behavior = PhysicsBehavior ModuleTag_Physics
    VehicleCrashesIntoBuildingWeaponTemplate = BigAircraftCrashingIntoBuildingWeapon
    Mass = 500.0
  End

  Behavior = HelicopterSlowDeathBehavior ModuleTag_HeliDeath
    DestructionDelay = 99999
    SpiralOrbitTurnRate = 80
    SpiralOrbitForwardSpeed = 110
    SpiralOrbitForwardSpeedDamping = 0.9999
    MaxBraking = 210
    SoundDeathLoop = HelixDamagedLoop
    MinSelfSpin = 40
    MaxSelfSpin = 120
    SelfSpinUpdateDelay = 300
    SelfSpinUpdateAmount = 5
    FallHowFast = 8.0%
    AttachParticle = SootySmokeTrail
    AttachParticleBone = PropL
    FXHitGround = FX_HelicopterHitGround
    OCLHitGround = OCL_HelicopterHitGround
    FXFinalBlowUp = FX_HelixHelicopterBlowUpBig
    DelayFromGroundToFinalDeath = 30
    FinalRubbleObject = DragonflyRubbleHull
  End

  Behavior = FlammableUpdate ModuleTag_Fire
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = ProductionUpdate ModuleTag_Production
    MaxQueueEntries = 1
  End

  ; Dragonfly Autocannons
  Behavior = ObjectCreationUpgrade ModuleTag_AutoCannons01
    UpgradeObject = OCL_DragonflyAutoCannon
    TriggeredBy = Upgrade_GLAWorkerFakeCommandSet
  End
  
  Behavior = GrantUpgradeCreate ModuleTag_AutoCannons02
    UpgradeToGrant = Upgrade_GLAWorkerFakeCommandSet
  End
  
  Behavior = HelixContain ContainTag_Helix
    Slots = 8
    DamagePercentToUnits = 100%
    AllowInsideKindOf = INFANTRY VEHICLE PORTABLE_STRUCTURE
    ForbidInsideKindOf = AIRCRAFT 
    ExitDelay = 100
    NumberOfExitPaths = 1
    PassengersAllowedToFire = No 
  End
  
  ; Junk Repair
  Behavior = AutoHealBehavior ModuleTag_JunkRepair
    HealingAmount = 2
    HealingDelay = 1000
    TriggeredBy = Upgrade_GLAJunkRepair
  End
  
  ; AP Rockets
  Behavior = WeaponBonusUpgrade ModuleTag_APRockets
    TriggeredBy = Upgrade_GLAAPRockets
  End
  
  Geometry = CYLINDER
  GeometryMajorRadius = 41
  GeometryHeight = 20  
  GeometryIsSmall = No
  
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 89
End

; GLA Dragonfly Auto Cannons
Object GLADragonflyAutoCannons
  ; *** ART PARAMETERS ***
  SelectPortrait = SNGatTower_L
  ButtonImage = SNGatTower
  
  Draw = W3DDependencyModelDraw DrawTag_Main
    OkToChangeModelColor  = Yes
    AttachToBoneInContainer = CHASSISBONE

    DefaultConditionState
      Model = UVDFLY_G
      Turret = TURRETB
      TurretPitch = TURRETELB
      AltTurret = TURRETC
      AltTurretPitch = TURRETELC
      WeaponFireFXBone  = SECONDARY MUZZLEB
      WeaponMuzzleFlash = SECONDARY MUZZLEFXB
      WeaponLaunchBone  = SECONDARY MUZZLEB
      WeaponFireFXBone  = TERTIARY MUZZLEC
      WeaponMuzzleFlash = TERTIARY MUZZLEFXC
      WeaponLaunchBone  = TERTIARY MUZZLEC
    End
    
    ConditionState = REALLYDAMAGED 
      Model = UVDFLY_GD
    End
  End

  ; *** DESIGN PARAMETERS ***
  Side = GLA
  EditorSorting = SYSTEM
  
  TransportSlotCount = 1
  
  WeaponSet
    Conditions = None
    Weapon = PRIMARY None
    Weapon = SECONDARY DragonflyAutoCannons
    Weapon = TERTIARY DragonflyAutoCannons
    ShareWeaponReloadTime = No
  End
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
  End
  
  VisionRange = 225

  ; *** ENGINEERING PARAMETERS ***
  KindOf = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK CLICK_THROUGH IGNORED_IN_GUI
  
  Body = StructureBody BodyTag_Structure
    MaxHealth = 100
    InitialHealth = 100
  End

  Behavior = AIUpdateInterface AITag_Normal
    Turret
      ControlledWeaponSlots = SECONDARY
      TurretTurnRate = 60
      TurretPitchRate = 60
      MinPhysicalPitch = -85
      AllowsPitch = Yes
      MinIdleScanInterval   = 1000    ; in milliseconds
      MaxIdleScanInterval   = 2500    ; in milliseconds
      MinIdleScanAngle      = 0       ; in degrees off the natural turret angle
      MaxIdleScanAngle      = 360     ; in degrees off the natural turret angle
    End
    AltTurret
      ControlledWeaponSlots = TERTIARY
      TurretTurnRate = 60
      TurretPitchRate = 60
      MinPhysicalPitch = -85
      AllowsPitch = Yes
      MinIdleScanInterval   = 1000    ; in milliseconds
      MaxIdleScanInterval   = 2500    ; in milliseconds
      MinIdleScanAngle      = 0       ; in degrees off the natural turret angle
      MaxIdleScanAngle      = 360     ; in degrees off the natural turret angle
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 0
  End

  Behavior = DestroyDie ModuleTag_Die
  End
  
  ; AP Bullets
  Behavior = WeaponBonusUpgrade ModuleTag_APBullets
    TriggeredBy = Upgrade_GLAAPBullets
  End 

  Geometry = BOX
  GeometryMajorRadius = 1
  GeometryMinorRadius = 1
  GeometryHeight = 1
  GeometryIsSmall = No
  
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89
End