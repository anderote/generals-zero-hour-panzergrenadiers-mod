Object Chem_GLAVehicleChemicalBomber
  ;Fuck it.
  ; *** ART Parameters ***
  SelectPortrait         = SUChemBomber_L
  ButtonImage            = SUChemBomber_L

  UpgradeCameo1 = Chem_Upgrade_GLAAnthraxGamma
  UpgradeCameo2 = Upgrade_GLAAPBullets
  UpgradeCameo3 = Upgrade_GLAJunkRepair

  Draw = W3DOverlordAircraftDraw ModuleTag_01
    ParticlesAttachedToAnimatedBones = Yes
    ExtraPublicBone = FIREPOINT02

    DefaultConditionState
      Model           = UVCargoPln
      Animation       = UVCargoPln.UVCargoPln
      AnimationMode   = LOOP
      ParticleSysBone = Engine01 JetBlackTrail
      ParticleSysBone = Engine02 JetBlackTrail
      ParticleSysBone = Engine03 JetBlackTrail
      ParticleSysBone = Engine04 JetBlackTrail      
    End
    ConditionState = DAMAGED
      Model           = UVCargoPln_D
      Animation       = UVCargoPln_D.UVCargoPln_D
      ParticleSysBone = Smoke01 JetFireLarge
      ParticleSysBone = Smoke02 JetFireLarge
      ParticleSysBone = Propeller03 JetBlackTrailThin
      ParticleSysBone = Propeller04 JetBlackTrailThin
      ParticleSysBone = Smoke01 JetSmokeLarge
      ParticleSysBone = Smoke02 JetSmokeLarge
      ParticleSysBone = Smoke03 JetSmokeLarge
    End
    ConditionState = REALLYDAMAGED
      Model           = UVCargoPln_D
      Animation       = UVCargoPln_D.UVCargoPln_D
      ParticleSysBone = Smoke01 JetFireLarge
      ParticleSysBone = Smoke02 JetFireLarge
      ParticleSysBone = Propeller03 JetBlackTrailThin
      ParticleSysBone = Propeller04 JetBlackTrailThin
      ParticleSysBone = Smoke01 JetSmokeLarge
      ParticleSysBone = Smoke02 JetSmokeLarge
      ParticleSysBone = Smoke03 JetSmokeLarge
    End
    ConditionState = RUBBLE
      Model           = UVCargoPln_D1
      ParticleSysBone = Smoke01 JetFireLarge
      ParticleSysBone = Smoke02 JetFireLarge
      ParticleSysBone = Smoke03 JetFireLarge
      ParticleSysBone = Smoke04 JetFireLarge
      ParticleSysBone = Smoke01 JetSmokeLarge
      ParticleSysBone = Smoke02 JetSmokeLarge
      ParticleSysBone = Smoke03 JetSmokeLarge
      ParticleSysBone = Smoke04 JetSmokeLarge
    End

    ConditionState      = NIGHT
      Model             = UVCargoPln_N
    End
    ConditionState      = DAMAGED NIGHT
      Model             = UVCargoPln_DN
    End
    
    OkToChangeModelColor = Yes
  End

  Draw = W3DModelDraw ModuleTag_02
    DefaultConditionState
      Model           = UVCargoPln_A2
      Animation       = UVCargoPln_A2.UVCargoPln_A2
      AnimationMode   = MANUAL
      Flags           = START_FRAME_FIRST
    End
    ConditionState = DOOR_1_OPENING
      Model           = UVCargoPln_A2
      Animation       = UVCargoPln_A2.UVCargoPln_A2
      AnimationMode   = ONCE
      Flags           = START_FRAME_FIRST
    End
    ConditionState = DOOR_1_CLOSING
      Model           = UVCargoPln_A2
      Animation       = UVCargoPln_A2.UVCargoPln_A2
      AnimationMode   = ONCE_BACKWARDS
      Flags           = START_FRAME_LAST
    End
  End

  Draw                    = W3DModelDraw ModuleTag_Turret01
    OkToChangeModelColor  = Yes
    AttachToBoneInAnotherModule = FIREPOINT01

    DefaultConditionState
      Model              = UVCargoPln_T1
      Turret             = TURRETB01
      TurretPitch        = TURRETELB01
      WeaponFireFXBone   = SECONDARY MUZZLEFXB
      WeaponRecoilBone   = SECONDARY MUZZLEFXB
      WeaponMuzzleFlash  = SECONDARY MUZZLEFXB
    End

    ConditionState        = REALLYDAMAGED 
      Model               = UVCargoPln_T1D
    End
  End
  
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:GLAChemicalBomber
  EditorSorting       = VEHICLE
  Side                = GLAToxinGeneral
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 180.0 
  ShroudClearingRange = 550.0

  WeaponSet
    Conditions          = None
    Weapon              = PRIMARY GLAJetChemicalBomberCarpetBombWeapon
    Weapon              = SECONDARY GLAChemicalBomberAntiAirWeapon
    ShareWeaponReloadTime = No
  End

  ArmorSet
    Conditions      = None
    Armor           = GLAChemicalBomberArmor
    DamageFX        = None
  End

  Prerequisites
   Object = Chem_GLAPalace
   Object = Chem_GLAChemicalBunker
  End

  CommandSet          = GenericCommandSet

  BuildCost = 3000
  BuildTime = 40.0          ;in seconds 

  ExperienceValue     = 400 550 750 1000  ; Experience point value at each level
  ExperienceRequired  = 0 400 1000 4000     ;Experience points needed to gain each level
  IsTrainable         = Yes             ;Can gain experience

  ; *** AUDIO Parameters ***
  VoiceSelect    = GLAChemBomberVoiceSelect
  VoiceMove      = GLAChemBomberVoiceMove
  VoiceAttack    = GLAChemBomberVoiceAttack
  VoiceAttackAir = GLAChemBomberVoiceAttackAir
  VoiceFear      = GLAChemBomberVoiceFear
  VoiceGuard     = GLAChemBomberVoiceMove
  SoundAmbient   = ChemicalBomberAmbientLoop
  SoundAmbientRubble    = NoSound
  UnitSpecificSounds
    VoiceCreate           = GLAChemBomberVoiceCreate
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf                 = PRELOAD CAN_ATTACK SELECTABLE VEHICLE AIRCRAFT SCORE PRODUCED_AT_HELIPAD

  Body = ActiveBody ModuleTag_AI01
    MaxHealth       = 1000.0
    InitialHealth   = 1000.0
  End
 
  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 500.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate     = 500
      TurretPitchRate    = 180
      AllowsPitch        = Yes
      FirePitch          = 5
      RecenterTime       = 5000       ; how long to wait during idle before recentering
      MinIdleScanAngle      = 30
      MaxIdleScanAngle      = 110
      MinIdleScanInterval   = 3000
      MaxIdleScanInterval   = 7000
      ControlledWeaponSlots = SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes ;Order IS important for these. This prevents it from using the AA weapon on ground targets on way to shoot said air target
    MoodAttackCheckRate = 66
  End
  Locomotor = SET_NORMAL GLAChemicalBomberLocomotor

  Behavior = OverlordContain ModuleTag_Overlord01
    Slots                   = 1
    DamagePercentToUnits    = 100%
    AllowInsideKindOf       = PORTABLE_STRUCTURE
    ForbidInsideKindOf      = AIRCRAFT INFANTRY VEHICLE
    PassengersAllowedToFire = Yes
    PayloadTemplateName     = Chem_GLAChemicalBomberTurret
    ExperienceSinkForRider  = Yes ; I get the Exp for things my turret friend kills
  End

  Behavior = InstantDeathBehavior ModuleTag_DIE
    DeathTypes = ALL
    OCL        = OCL_GLACargoJetDeath
  End

  Behavior = TransitionDamageFX ModuleTag_12
    DamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
  End

  Behavior = WeaponBonusUpgrade ModuleTag_Upgrade01
    TriggeredBy = Upgrade_GLAAPBullets
  End

  Behavior = AutoHealBehavior ModuleTag_Upgrade02
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 40.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End






Object Chem_GLAChemicalBomberTurret
  Draw                    = W3DDependencyModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    AttachToBoneInContainer = FIREPOINT02

    DefaultConditionState
      Model              = UVCargoPln_T1
      Turret             = TURRETB01
      TurretPitch        = TURRETELB01
      WeaponFireFXBone   = PRIMARY MUZZLEFXB
      WeaponRecoilBone   = PRIMARY MUZZLEFXB
      WeaponMuzzleFlash  = PRIMARY MUZZLEFXB
    End

    ConditionState        = REALLYDAMAGED 
      Model               = UVCargoPln_T1D
    End
  End

  ; ***DESIGN parameters ***
  Side             = GLA
  EditorSorting    = SYSTEM
  TransportSlotCount = 1

  VisionRange     = 300

  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY GLAChemicalBomberAntiAirWeapon
  End
  
  ArmorSet
    Conditions     = None
    Armor          = InvulnerableAllArmor ; We can't be hurt on the field.  We share damage from the Overlord with his damage module
  End

  ; *** ENGINEERING Parameters ***
  KindOf            = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK CLICK_THROUGH IGNORED_IN_GUI
  
  Body            = StructureBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate     = 500
      TurretPitchRate    = 180
      AllowsPitch        = Yes
      FirePitch          = 5
      RecenterTime       = 5000       ; how long to wait during idle before recentering
      MinIdleScanAngle      = 30
      MaxIdleScanAngle      = 110
      MinIdleScanInterval   = 3000
      MaxIdleScanInterval   = 7000
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = YES
    MoodAttackCheckRate = 66
  End

  Behavior             = DestroyDie ModuleTag_04
  End

  Behavior = WeaponBonusUpgrade ModuleTag_Upgrade01
    TriggeredBy = Upgrade_GLAAPBullets
  End 

  Geometry            = BOX
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight      = 1.0
  GeometryIsSmall     = No      
  Shadow              = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End