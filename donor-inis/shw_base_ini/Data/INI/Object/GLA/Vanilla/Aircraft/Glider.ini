Object GLATerroristGlider

  SelectPortrait         = SUViralStrike1     ;SUDesertFly_L
  ButtonImage            = SUViralStrike1     ;SUDesertFly

  Draw = W3DModelDraw ModuleTag_01

    DefaultConditionState
      Model           = UVTerGlider  
      Animation       = UVTerGlider.UVTerGlider
      AnimationMode   = LOOP
    End 

    ConditionState = REALLYDAMAGED
      Model           = UVTerGlider_d
      Animation       = UVTerGlider_d.UVTerGlider_d
    End

    OkToChangeModelColor = Yes

  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:GLABiplane
  EditorSorting       = VEHICLE
  Side                = GLA
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange             = 270.0 
  ShroudClearingRange     = 550.0

  WeaponSet
    Conditions            = None 
    Weapon                = PRIMARY   BiplaneGrenadeTossWeapon    ;GLABiplaneMachinegunWeapon
    Weapon                = TERTIARY BiplaneDemoTrapDropWeapon
    AutoChooseSources     = TERTIARY NONE
  End

  ArmorSet
    Conditions      = None
    Armor           = AirplaneArmor
    DamageFX        = None
  End
  CommandSet          = GLAVehicleBiplaneCommandSet   ;For GuardAir option and dropping traps

  ; *** AUDIO Parameters ***
  VoiceSelect    = TerroristVoiceSelect
  VoiceMove      = TerroristVoiceMove
  VoiceAttack    = TerroristVoiceAttack
  VoiceAttackAir = TerroristVoiceAttack
  VoiceFear      = NoSound                           ;Used during ejecting
  VoiceGuard     = TerroristVoiceMove
  SoundAmbient   = CropDusterAmbientLoop
  UnitSpecificSounds
    VoiceCreate           = TerroristVoiceCreate
  End

  BuildCost               = 100
  BuildTime               = 10.0
  ExperienceValue         = 50 50 100 150  ;Experience point value at each level
  ExperienceRequired      = 0 100 200 400   ;Experience points needed to gain each level
  IsTrainable             = Yes             ;Can gain experience
  CrusherLevel            = 1  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel          = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_CAST_REFLECTIONS CAN_ATTACK VEHICLE SCORE AIRCRAFT EMP_HARDENED PRODUCED_AT_HELIPAD
  Body = ActiveBody ModuleTag_03
    MaxHealth       = 100.0 ;500.0
    InitialHealth   = 100.0 ;500.0
  End
 
  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 10.0
  End

  Behavior = AIUpdateInterface ModuleTag_09
    Turret
      TurretTurnRate = 999
      TurretPitchRate = 999
      AllowsPitch = Yes
      NaturalTurretPitch = -25
      ControlledWeaponSlots = PRIMARY
    End
    AltTurret
      TurretTurnRate      = 0
      TurretPitchRate     = 180
      AllowsPitch         = Yes
      FiresWhileTurning   = Yes
      NaturalTurretPitch  = 0
      ControlledWeaponSlots = SECONDARY
    End
    AutoAcquireEnemiesWhenIdle    = Yes NotWhileAttacking
  End
  Locomotor = SET_NORMAL GLABiplaneLocomotor

  Behavior = AutoHealBehavior ModuleTag_JunkRepair08
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = StealthUpdate ModuleTag_56732
    StealthDelay                = 2500 ; msec
    StealthForbiddenConditions  = ATTACKING TAKING_DAMAGE
    MoveThresholdSpeed          = 3
    InnateStealth               = No ;Requires upgrade first
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End

  Behavior = StealthUpgrade ModuleTag_10
    TriggeredBy = Upgrade_Veterancy_HEROIC
  End

  Behavior                          = JetSlowDeathBehavior ModuleTag_11
    DestructionDelay                = 3000    ;2000 
    RollRate                        = 0.0
    RollRateDelta                   = 100%      ;each frame, rollrate = rollrate * rollrateDelta
    PitchRate                       = 0
    FallHowFast                     = 15.0% ;25.0%    ;Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath                  = FX_JetBigDeathInitial
    OCLInitialDeath                 = OCL_AmericaJetCargoDeathStart
    DelaySecondaryFromInitialDeath  = 3000       ; in milliseconds     This guy won't hit the ground, so this time equals the above time
    OCLSecondary                    = OCL_AmericaJetCargoHulkDeath
    FXSecondary                     = FX_BigPlaneDeath
  End

  Behavior = TransitionDamageFX ModuleTag_12
    DamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
  End

  Behavior = ObjectCreationUpgrade ModuleTag_Eject01
    UpgradeObject = OCL_BiplaneEjectObject
    TriggeredBy   = Upgrade_GLAWorkerFakeCommandSet
  End

  Behavior                    = EjectPilotDie ModuleTag_Eject02
    ExemptStatus         = HIJACKED
    GroundCreationList = OCL_EjectBiplanePilot
    AirCreationList = OCL_EjectBiplanePilotParachute
    VeterancyLevels =  ALL ;He must complete his mission!
  End

  Behavior = ProductionUpdate ModuleTag_Eject03
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 40.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
  BuildCompletion = APPEARS_AT_RALLY_POINT
End
