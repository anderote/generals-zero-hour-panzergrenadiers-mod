Object Demo_GLAJetHellfireBomber
  ;This is Demo Generals Tier II air unit
  SelectPortrait = UVHeckFire_L
  ButtonImage    = UVHeckFire

  UpgradeCameo1 = Upgrade_GLAJunkRepair
  UpgradeCameo2 = Upgrade_DemoHEShells
  UpgradeCameo3 = Demo_Upgrade_SuicideBomb
  UpgradeCameo4 = Upgrade_SuperSuicideBomb

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model = UVKamikaze
      Animation = UVKamikaze.UVKamikaze
      AnimationMode = ONCE
      WeaponFireFXBone  = PRIMARY   WeaponA
      WeaponLaunchBone  = PRIMARY   WeaponA
      WeaponMuzzleFlash = PRIMARY   WeaponA
      WeaponLaunchBone  = SECONDARY WeaponA
      WeaponFireFXBone  = SECONDARY WeaponA
      WeaponMuzzleFlash = SECONDARY WeaponA
      ParticleSysBone   = NONE JetBlackTrail
    End
  End
  
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:GLAJetHellfire
  EditorSorting       = VEHICLE
  Side                = GLADemolitionGeneral
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 150.0
  ShroudClearingRange = 340.0

  Prerequisites
    Object = Demo_GLAPalace
  End
  
  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY GLAJetRocketDemoTrapWeapon
    Weapon              = SECONDARY GLAJetMissileGliderWeapon
    ShareWeaponReloadTime = No
  End

  ArmorSet
    Conditions      = None
    Armor           = GLAHellfireArmor
    DamageFX        = None
  End

  ; *** AUDIO Parameters ***
  VoiceSelect    = FundamentalistVoiceSelect
  VoiceMove      = FundamentalistVoiceMove
  VoiceAttack    = FundamentalistVoiceAttack
  VoiceAttackAir = FundamentalistVoiceAttack
  VoiceGuard     = FundamentalistVoiceMove
  SoundAmbient   = CropDusterAmbientLoop
  UnitSpecificSounds
    VoiceCreate           = FundamentalistVoiceReady
  End

  BuildCost               = 2000
  BuildTime               = 25.0

  ExperienceValue         = 90 130 170 210  ;Experience point value at each level
  ExperienceRequired      = 0 460 1095 2050   ;Experience points needed to gain each level
  IsTrainable             = Yes             ;Can gain experience
  CrusherLevel            = 1  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel          = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  
  CommandSet = GenericGroundAttackCommandSet
  
  ; *** ENGINEERING Parameters ***
  RadarPriority   = UNIT
  KindOf          = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT PRODUCED_AT_HELIPAD
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 350.0
    InitialHealth   = 350.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle    = NotWhileAttacking Yes
  End
  Locomotor = SET_NORMAL GLAHellfireJetLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 500.0
  End

  Behavior = CreateObjectDie ModuleTag_Death02
    CreationList = OCL_HellfireJetDeathVoice
  End

  Behavior = InstantDeathBehavior DeathModuleTag_TEST01
    DeathTypes = ALL
    OCL        = OCL_HellfireJetDying
  End

  Behavior = AutoHealBehavior ModuleTag_JunkRepair01
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = TransitionDamageFX ModuleTag_12
    DamagedFXList1 = Loc: X:0 Y:2 Z:0 FXList:FX_JetBigDamageTransition
    ReallyDamagedFXList1 = Loc: X:2 Y:0 Z:0 FXList:FX_JetBigDamageTransition
  End

  Behavior = WeaponBonusUpgrade Upgrade_13
    TriggeredBy = Upgrade_DemoHEShells
  End

  Geometry                 = Box
  GeometryIsSmall          = Yes
  GeometryMajorRadius      = 8.0
  GeometryMinorRadius      = 8.0
  GeometryHeight           = 1.0
  Shadow                   = SHADOW_VOLUME
  ShadowSizeX = 89
End

Object Demo_GLAJetHellfireBomberDeathDummy
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model = UVKamikaze
      Animation = UVKamikaze.UVKamikaze
      AnimationMode = ONCE
      ParticleSysBone   = NONE JetBlackTrail
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:GLAJetHellfire
  EditorSorting       = VEHICLE
  Side                = GLADemolitionGeneral
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 90.0
  ShroudClearingRange = 120.0

  IsTrainable             = No             ;Can gain experience

  ; *** ENGINEERING Parameters ***
  RadarPriority   = NOT_ON_RADAR
  KindOf          = PRELOAD VEHICLE AIRCRAFT NO_SELECT IGNORED_IN_GUI UNATTACKABLE
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 35000.0
    InitialHealth   = 35000.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
  End
  Locomotor = SET_NORMAL GLAHellfireJetDeathLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass                = 200.0
    AerodynamicFriction = 1  ; this is now friction-per-sec
    ForwardFriction     = 33 ; this is now friction-per-sec
    CenterOfMassOffset  = 2  ; Default of 0 means nothing tips as it falls.  Positive tips forward, negative tips back
  End

  Behavior = HeightDieUpdate ModuleTag_05
    TargetHeight = 15.0
    TargetHeightIncludesStructures = Yes
  End
  
  Behavior = DestroyDie ModuleTag_06
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DemoTrap00
    DeathWeapon  = GLAHellfireDetonationWeapon
    StartsActive = Yes                      ; turned on by upgrade
  End

  Behavior = FXListDie ModuleTag_07
    DeathFX = WeaponFX_BombTruckDefaultBombDetonation
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DemoTrap01
    DeathWeapon  = Demo_CreateAdvancedDemoTrap
    StartsActive = No                      ; turned on by upgrade
    TriggeredBy  = Upgrade_SuperSuicideBomb
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_DemoTrap02
    DeathWeapon  = Demo_CreateAdvancedDemoTrap
    StartsActive = No                      ; turned on by upgrade
    TriggeredBy  = Demo_Upgrade_SuicideBomb
  End

  Behavior = LifetimeUpdate ModuleTag_Woops01
    MinLifetime = 2500
    MaxLifetime = 3500
  End
End