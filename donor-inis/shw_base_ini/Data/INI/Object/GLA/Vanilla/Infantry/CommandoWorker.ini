Object GLAInfantryCommandoWorker

  ; *** ART Parameters ***
  SelectPortrait         = SUCommandoWorker_L
  ButtonImage            = SUCommandoWorker_L
  
  UpgradeCameo1 = Upgrade_GLAWorkerShoes

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model         = UIWRKRKV_SKN
      IdleAnimation = UIWRKR_SKL.UIWRKR_STA 0 9
      IdleAnimation = UIWRKR_SKL.UIWRKR_IDA
      AnimationMode = ONCE
      TransitionKey = TRANS_Stand
      HideSubObject = OMGL33TSHOES
    End

    ConditionState  = MOVING
      Animation     = UIWRKR_SKL.UIWRKR_RNA 16
      AnimationMode = LOOP
      Flags         = RANDOMSTART
      TransitionKey = TRANS_Moving
      ParticleSysBone = None InfantryDustTrails
    End

    ConditionState = ATTACKING
      Animation = UIWRKR_SKL.UIWRKR_BDA
      AnimationMode = LOOP
      TransitionKey = TRANS_MetalDetector_Standing
    End

    TransitionState = TRANS_Stand TRANS_MetalDetector_Standing    ;STANDING -> ATTACKING
      Animation     = UIWRKR_SKL.UIWRKR_TRA1
      AnimationMode = ONCE
    End
    TransitionState = TRANS_MetalDetector_Standing TRANS_Stand    ;ATTACKING -> STANDING
      Animation     = UIWRKR_SKL.UIWRKR_TRA2
      AnimationMode = ONCE
    End

    ConditionState = DYING
      Animation = UIWRKR_SKL.UIWRKR_DTA
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = UIWRKR_SKL.UIWRKR_ADTE1
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = UIWRKR_SKL.UIWRKR_ADTE2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = UIWRKR_SKL.UIWRKR_ADTE3
      AnimationMode = ONCE
      TransitionKey = None
    End

    ConditionState  = SPECIAL_CHEERING
      Animation     = UIWRKR_SKL.UIWRKR_CHA
      AnimationMode = ONCE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Worker
  Side = GLA
  EditorSorting = INFANTRY
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions        = None
    Weapon            = PRIMARY   WorkerCommandoWeapon
    AutoChooseSources = PRIMARY   FROM_PLAYER FROM_SCRIPT FROM_AI
    Weapon            = SECONDARY WorkerAssassinWeapon
    AutoChooseSources = SECONDARY NONE
    Weapon            = TERTIARY WorkerCommandoSmashWeapon
    AutoChooseSources = TERTIARY NONE
  End

  ArmorSet
    Conditions      = None
    Armor           = CommandoWorkerArmor
    DamageFX        = InfantryDamageFX
  End
  ArmorSet
    Conditions      = CRATE_UPGRADE_ONE
    Armor           = CommandoWorkerArmorPlusOne
    DamageFX        = InfantryDamageFX
  End
  ArmorSet
    Conditions      = CRATE_UPGRADE_TWO
    Armor           = CommandoWorkerArmorPlusTwo
    DamageFX        = InfantryDamageFX
  End
  
  VisionRange = 150
  ShroudClearingRange = 230

  BuildCost = 1500
  BuildTime = 10.0          ;in seconds    
  CrushableLevel         = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  
  Prerequisites
    Object = GLAPalace
  End
  
  ExperienceValue     = 100 150 200 250    ;Experience point value at each level
  ExperienceRequired  = 0 300 700 1250    ;Experience points needed to gain each level
  IsTrainable         = Yes            ;Can gain experience
  
  CommandSet = CommandoWorkerCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect       = GLASniperSelect
  VoiceMove         = GLASniperVoiceMove
  VoiceGuard        = GLASniperVoiceMove
  VoiceAttack       = GLASniperVoiceAttack
  SoundStealthOn    = StealthOn
  SoundStealthOff   = StealthOff
  
  UnitSpecificSounds
    VoiceCreate          = GLASniperVoiceReady
    VoiceGarrison        = GLASniperVoiceMove
    VoiceEnter           = GLASniperVoiceMove
    VoiceEnterHostile    = GLASniperVoiceMove
    VoiceGetHealed       = GLASniperVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_CAST_REFLECTIONS INFANTRY SALVAGER SCORE ARMOR_SALVAGER

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 320.0
    InitialHealth   = 320.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL FastHumanLocomotor ColonelBurtonCliffLocomotor
  Locomotor = SET_NORMAL_UPGRADED WorkerShoesLocomotor ColonelBurtonCliffLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    ShockResistance = 1.0
  End
  
  Behavior = LocomotorSetUpgrade ModuleTag_36
    TriggeredBy = Upgrade_GLAWorkerShoes
  End

  Behavior = StealthUpdate ModuleTag_40
    StealthDelay                = 2000 ; msec
    StealthForbiddenConditions  = FIRING_PRIMARY FIRING_TERTIARY TAKING_DAMAGE
    FriendlyOpacityMin          = 50.0%
    FriendlyOpacityMax          = 100.0%
    InnateStealth               = Yes
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End
 
  Behavior = SquishCollide ModuleTag_06
    ;nothing
  End

; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6 -EXTRA_7 -EXTRA_8
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_WorkerDie
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_WorkerDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireGLA
    OCL                 = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death06 ; don't forget to give it a new, unique module tag
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantryBeta ;you'll have to create this OCL and make it use the blue guys instead of green ones
  End
  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantryGamma
  End
  Behavior = SlowDeathBehavior ModuleTag_Death08 ;new and shiney microwave death effect
    DeathTypes          = NONE +EXTRA_2
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireGLA
    OCL                 = INITIAL OCL_MicrowavedInfantry 
  End
  Behavior = SlowDeathBehavior ModuleTag_DeathTesla01
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireGLA
    FX                  = FINAL   FX_IfantryTeslaDie
    OCL                 = INITIAL OCL_TeslaDeathInfantry    
  End
  Behavior = SlowDeathBehavior ModuleTag_Death045 ;Brutal kill with lots of blood and no death scream
    DeathTypes          = NONE +EXTRA_4
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FX                  = INITIAL FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_036 ;Gore death explosion
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 30
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_BloodyGoreExplosion
    FX                  = FINAL   FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_Death0323
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 70
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_WorkerDie
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_03241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_6
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_RadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_DieByToxinGLA
  End
  Behavior = SlowDeathBehavior ModuleTag_0323241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_7
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_NeutronRadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_DieByToxinGLA
  End

; --- end Death modules ---

  Behavior = StealthDetectorUpdate ModuleTag_12
    DetectionRate            = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange           = 225 ;Dustin, enable this for independant balancing!
    CanDetectWhileGarrisoned  = No ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained   = No ;Contained means being in a transport or tunnel network.
  End

  Behavior = PoisonedBehavior ModuleTag_13
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  End
 
  Behavior = ProductionUpdate ModuleTag_16
    MaxQueueEntries = 1; For the command set switching upgrade
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Taunt01
    UpgradeObject = OCL_CommandoWorkerTauntObject
    TriggeredBy   = Upgrade_GLAWorkerFakeCommandSet
  End

  Behavior = SubObjectsUpgrade ModuleTag_ShoeVissual01
    TriggeredBy    = Upgrade_GLAWorkerShoes
    ShowSubObjects = OMGL33TSHOES
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14;
  ShadowSizeY = 14;
  ShadowTexture = ShadowI;
  BuildCompletion = APPEARS_AT_RALLY_POINT
End

