Object GLAInfantryEngineer
  ; *** ART Parameters ***
  SelectPortrait         = SUSabocool_L
  ButtonImage            = SUSabocool

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    ;NORMAL STANDING
    DefaultConditionState
      Model = UISaby
      HideSubObject = BRIBE WIRECUT01 WIRCUT02 NIAGNT_SKN
      IdleAnimation = NIAgnt_SKL.NIAgnt_STA
      ;Regular spice animations
      IdleAnimation = NIAgnt_SKL.NIAgnt_IDA
      IdleAnimation = NIAgnt_SKL.NIAgnt_IDB
      AnimationMode = ONCE
      TransitionKey = TRANS_Stand
    End
    AliasConditionState = REALLYDAMAGED

    ; SECONDARY ATTACK (Building cool shit)
    ConditionState      = ACTIVELY_CONSTRUCTING ;CI05B
      ParticleSysBone   = PICKBOX EngineerSparksSmall
      ParticleSysBone   = PICKBOX EngineerSparksSmall
      Animation         = NIAgnt_SKL.NIAgnt_ATA
      AnimationMode     = LOOP_PINGPONG
      TransitionKey     = TRANS_Building
    End
    AliasConditionState = ACTIVELY_CONSTRUCTING REALLYDAMAGED

    TransitionState     = TRANS_Building TRANS_Stand ;CI05B
      Animation         = NIAgnt_SKL.NIAgnt_ATA2
      AnimationMode     = ONCE
    End

    ConditionState = MOVING
      Animation = NIAgnt_SKL.NIAgnt_RNA 46.67 ;CI05B
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = None
      ParticleSysBone     = None InfantryDustTrails
    End
    AliasConditionState = ACTIVELY_CONSTRUCTING MOVING

    ConditionState = MOVING REALLYDAMAGED
      Animation = NIAgnt_SKL.NIAgnt_RNA 37.33 ;CI05B
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = None
      ParticleSysBone     = None InfantryDustTrails
    End
    AliasConditionState = ACTIVELY_CONSTRUCTING REALLYDAMAGED MOVING

    ConditionState = DYING
      Animation = NIAgnt_SKL.NIAgnt_DTA
      Animation = NIAgnt_SKL.NIAgnt_DTB
      AnimationMode = ONCE
      TransitionKey = None
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = NIAgnt_SKL.NIAgnt_ADTE1
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = NIAgnt_SKL.NIAgnt_ADTE2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = NIAgnt_SKL.NIAgnt_ADTE3
      AnimationMode = ONCE
      TransitionKey = None
    End

    ConditionState = SPECIAL_CHEERING
      Animation = NIAgnt_SKL.NIAgnt_CHA
      AnimationMode = LOOP
    End

    ;PARACHUTING ANIMATIONS
    ConditionState = FREEFALL
      Animation = NIAgnt_SKL.NIAgnt_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL DYING

    ConditionState = PARACHUTING
      Animation = NIAgnt_SKL.NIAgnt_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  ; our bone positions should come from the last frame, rather than the first
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING

    TransitionState = TRANS_Falling TRANS_Chute
      Animation = NIAgnt_SKL.NIAgnt_POP
      AnimationMode = ONCE
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  ; our bone positions should come from the last frame, rather than the first
    End

    TransitionState = TRANS_Chute TRANS_Stand
      Animation = NIAgnt_SKL.NIAgnt_PTD
      AnimationMode = ONCE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:GLAEngineer
  Side               = GLA
  EditorSorting      = INFANTRY
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)

  ArmorSet
    Conditions      = None
    Armor           = HumanArmor
    DamageFX        = InfantryDamageFX
  End

  VisionRange = 100
  ShroudClearingRange = 200

  BuildCost = 500
  BuildTime = 8.0          ;in seconds    
  CrushableLevel         = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect       = GLAEngineerVoiceSelect
  VoiceMove         = GLAEngineerVoiceMove
  VoiceTaskComplete = GLAEngineerVoiceBuildComplete
  UnitSpecificSounds
    VoiceEnter         = GLAEngineerVoiceMove
    VoiceEnterHostile  = GLAEngineerVoiceMove
    VoiceGarrison      = GLAEngineerVoiceMove
    VoiceCreate        = GLAEngineerVoiceCreate
    VoiceNoBuild       = NoSound
    VoiceRepair        = GLAEngineerVoiceRepair
    VoiceBuildResponse = GLAEngineerVoiceBuild
    VoiceGetHealed     = GLAEngineerVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE INFANTRY SALVAGER SCORE CAN_ATTACK BLAST_CRATER ;This is to avoid demotrap targeting

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 125.0
    InitialHealth   = 125.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = No
  End
  Locomotor = SET_NORMAL FastHumanLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    ShockResistance = 1.0
  End

; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6 -EXTRA_7 -EXTRA_8
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_WorkerDie
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_WorkerDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireGLA
    OCL                 = INITIAL OCL_FlamingInfantry
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantry
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_Death06 ; don't forget to give it a new, unique module tag
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantryBeta ;you'll have to create this OCL and make it use the blue guys instead of green ones
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantryGamma
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_Death08 ;new and shiney microwave death effect
    DeathTypes          = NONE +EXTRA_2
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireGLA
    OCL                 = INITIAL OCL_MicrowavedInfantry 
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_DeathTesla01
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireGLA
    FX                  = FINAL   FX_IfantryTeslaDie
    OCL                 = INITIAL OCL_TeslaDeathInfantry    
  End
  Behavior = SlowDeathBehavior ModuleTag_Death045 ;Brutal kill with lots of blood and no death scream
    DeathTypes          = NONE +EXTRA_4
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FX                  = INITIAL FX_InfantryGoreExplosion
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_036 ;Gore death explosion
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 30
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_BloodyGoreExplosion
    FX                  = FINAL   FX_InfantryGoreExplosion
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_Death0323
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 70
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_WorkerDie
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_03241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_6
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_RadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_DieByToxinGLA
    ExemptStatus        = WET
  End
  Behavior = SlowDeathBehavior ModuleTag_0323241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_7
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_NeutronRadiationDeathInfantry
    FX                  = INITIAL FX_GIDieVirus
    FX                  = FINAL   FX_DieByToxinGLA
    ExemptStatus        = WET
  End

; --- end Death modules ---

  Behavior = PoisonedBehavior ModuleTag_13
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  End

  Behavior = FireWeaponCollide ModuleTag_Engineering01
    CollideWeapon  = EngineerBuildingRepairWeapon
    RequiredStatus = MASKED      ; Any unit inside a transport or structure sets MASKED status
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14;
  ShadowSizeY = 14;
  ShadowTexture = ShadowI;
  BuildCompletion = APPEARS_AT_RALLY_POINT
End