;the madlad with the uzi
Object GLAInfantryTankCrew
  ; *** ART Parameters ***  ;Temporary
  SelectPortrait         = SUFundamentalists_L
  ButtonImage            = SUFundamentalists

  UpgradeCameo1 = Upgrade_GLAAPBullets

  Draw = W3DModelDraw ModuleTag_0331
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = UIPART_SKN
      IdleAnimation = UIPART_SKL.UIPART_STA
      IdleAnimation = UIPART_SKL.UIPART_IDA 
      IdleAnimation = UIPART_SKL.UIPART_IDB 
      IdleAnimation = UIPART_SKL.UIPART_CHA
      IdleAnimation = UIPART_SKL.UIPART_CHA
      IdleAnimation = UIPART_SKL.UIPART_CHA
      WeaponFireFXBone = PRIMARY   Muzzle
      WeaponLaunchBone = PRIMARY   Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone = SECONDARY Muzzle
      WeaponLaunchBone = SECONDARY Muzzle
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone = TERTIARY  Muzzle
      WeaponLaunchBone = TERTIARY  Muzzle
      WeaponMuzzleFlash = TERTIARY MuzzleFX
      TransitionKey = TRANS_Stand
    End
    AliasConditionState = REALLYDAMAGED
    
    ConditionState = MOVING
      Animation = UIPART_SKL.UIPART_RNA
      AnimationMode = LOOP
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING FIRING_A
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_A
    AliasConditionState = MOVING RELOADING_A
    AliasConditionState = MOVING FIRING_B
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_B
    AliasConditionState = MOVING RELOADING_B
    AliasConditionState = MOVING FIRING_C
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_C
    AliasConditionState = MOVING RELOADING_C
    
    ConditionState = MOVING REALLYDAMAGED
      Animation = UIPART_SKL.UIPART_RNA
      AnimationMode = LOOP
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING FIRING_A REALLYDAMAGED
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_A REALLYDAMAGED
    AliasConditionState = MOVING RELOADING_A REALLYDAMAGED
    AliasConditionState = MOVING FIRING_B REALLYDAMAGED
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_B REALLYDAMAGED
    AliasConditionState = MOVING RELOADING_B REALLYDAMAGED
    AliasConditionState = MOVING FIRING_C REALLYDAMAGED
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_C REALLYDAMAGED
    AliasConditionState = MOVING RELOADING_C REALLYDAMAGED
    
    ConditionState = DYING
      Animation = UIPART_SKL.UIPART_DTA 
      Animation = UIPART_SKL.UIPART_DTB 
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End
    
    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = UIPART_SKL.UIPART_ADTD1
      AnimationMode = ONCE
    End
    
    ConditionState = DYING EXPLODED_FLAILING
      Animation = UIPART_SKL.UIPART_ADTD2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End
    
    ConditionState = DYING EXPLODED_BOUNCING
      Animation = UIPART_SKL.UIPART_ADTD3
      AnimationMode = ONCE
    End
    
    ConditionState = FIRING_A
      Animation = UIPART_SKL.UIPART_ATA
      AnimationMode = LOOP
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A
    AliasConditionState = RELOADING_A
    AliasConditionState = BETWEEN_FIRING_SHOTS_B
    AliasConditionState = RELOADING_B
    AliasConditionState = BETWEEN_FIRING_SHOTS_C
    AliasConditionState = RELOADING_C
    
    ConditionState = FIRING_A REALLYDAMAGED
      Animation = UIPART_SKL.UIPART_ATA
      AnimationMode = LOOP
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED
    AliasConditionState = RELOADING_A REALLYDAMAGED
    
    ConditionState = FREEFALL
      Animation = UIPART_SKL.UIPART_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL DYING
    
    ConditionState = PARACHUTING
      Animation = UIPART_SKL.UIPART_PHG
      AnimationMode = LOOP
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING
    
    TransitionState = TRANS_Falling TRANS_Chute
      Animation = UIPART_SKL.UIPART_POP
      AnimationMode = ONCE
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME
    End
    
    TransitionState = TRANS_Chute TRANS_Stand
      Animation = UIPART_SKL.UIPART_PTD
      AnimationMode = ONCE
    End
    
    ConditionState = SPECIAL_CHEERING
      Animation = UIPART_SKL.UIPART_CHA
      AnimationMode = ONCE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:TankCrew
  Side                = GLA
  EditorSorting       = INFANTRY
  TransportSlotCount  = 1                 ;how many "slots" we take in a transport (0 == not transportable)
 
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY TankCrewSubmachineGun
  End

  ArmorSet
    Conditions      = None
    Armor           = HumanArmor
    DamageFX        = InfantryDamageFX
  End

  VisionRange         = 130
  ShroudClearingRange = 190

  ExperienceValue     = 30 40 50 60     ;Experience point value at each level
  ExperienceRequired  = 0 80 175 300     ;Experience points needed to gain each level
  IsTrainable         = Yes             ;Can gain experience
  CrushableLevel      = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet          = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect       = GLASniperSelect
  VoiceMove         = GLASniperVoiceMove
  VoiceGuard        = GLASniperVoiceMove
  VoiceAttack       = GLASniperVoiceAttack
  VoiceFear         = None
  
  UnitSpecificSounds
    VoiceCreate          = GLASniperVoiceReady
    VoiceGarrison        = GLASniperVoiceMove
    VoiceEnter           = GLASniperVoiceMove
    VoiceEnterHostile    = GLASniperVoiceMove
    VoiceGetHealed       = GLASniperVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS INFANTRY SALVAGER SCORE 

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 110.0
    InitialHealth   = 110.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL FastHumanLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    ShockResistance = 1.0
  End

  Behavior = WeaponBonusUpgrade ModuleTag_09
    TriggeredBy = Upgrade_GLAAPBullets
  End

  Behavior = SquishCollide ModuleTag_11
    ;nothing
  End

  ; --- begin commong death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireGLA
    OCL                 = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death06 ; don't forget to give it a new, unique module tag
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantryBeta ;you'll have to create this OCL and make it use the blue guys instead of green ones
  End
  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantryGamma
  End
  Behavior = SlowDeathBehavior ModuleTag_Death08 ;new and shiney microwave death effect
    DeathTypes          = NONE +EXTRA_2
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireGLA
    OCL                 = INITIAL OCL_MicrowavedInfantry 
  End
  Behavior = SlowDeathBehavior ModuleTag_Death09
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireGLA
    FX                  = FINAL   FX_IfantryTeslaDie
    OCL                 = INITIAL OCL_TeslaDeathInfantry    
  End
  Behavior = SlowDeathBehavior ModuleTag_Death045 ;Brutal kill with lots of blood and no death scream
    DeathTypes          = NONE +EXTRA_4
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FX                  = INITIAL FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_03241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_6
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_RadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_DieByToxinGLA
  End
  Behavior = SlowDeathBehavior ModuleTag_0323241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_7
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_NeutronRadiationDeathInfantry
    FX                  = INITIAL FX_GIDieVirus
    FX                  = FINAL   FX_DieByToxinGLA
  End

  Behavior = SlowDeathBehavior ModuleTag_Death021
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6 -EXTRA_7
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_CivilianArabMaleDie
  End
  Behavior = SlowDeathBehavior ModuleTag_Death0232
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_CivilianArabMaleDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_0346 ;Gore death explosion
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 30
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_BloodyGoreExplosion
    FX                  = FINAL   FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03236
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 70
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_CivilianArabMaleDie
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End

  Behavior = PoisonedBehavior ModuleTag_16
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  End

  ;;Behavior = PilotFindVehicleUpdate   ModuleTag_Crew01 ; This update will have the unit go to a vehicle. jba 
    ;;ScanRate = 1000 ; once a second.
    ;;ScanRange = 80 ;
    ;;MinHealth = 0.5 ;  don't enter a vehicle less than 50% healthy.
  ;;End

  Behavior = VeterancyCrateCollide       ModuleTag_Crew02
    RequiredKindOf = VEHICLE      ; we only give our bonus to VEHICLEs we collide with
    ForbiddenKindOf = DOZER AIRCRAFT       ; He's a TANK driver, not a plane driver, ya silly head
    EffectRange = 0               ; 0=="affect only the thing you collide with"
    AddsOwnerVeterancy = Yes      ; we add our own veterancy to the target (rather than just +1 level)
    IsPilot = Yes                 ; set the pilot flag because it's different than the veterancy crate and has extra checking
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14;
  ShadowSizeY = 14;
  ShadowTexture = ShadowI;
  BuildCompletion = APPEARS_AT_RALLY_POINT
End