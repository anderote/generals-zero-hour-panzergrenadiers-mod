;Credit Goes to the BFME Dev team for the Animal models.
;Chicken audio from csgo
Object FarmChicken
  ; *** ART Parameters ***
  SelectPortrait         = Chicken
  ButtonImage            = Chicken

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model             = CUChicken_SKN
      IdleAnimation     = CUChicken_SKL.CUChicken_PEKA
      IdleAnimation     = CUChicken_SKL.CUChicken_PEKB
      AnimationMode     = ONCE
      AnimationSpeedFactorRange = 0.8 0.8        ;Slow this up just a little bit. It looks better
    End

    ConditionState = MOVING ATTACKING
      Animation = CUChicken_SKL.CUChicken_RUNA
      AnimationMode = LOOP
      Flags = RANDOMSTART
    End

    ConditionState = MOVING
      Animation = CUChicken_SKL.CUChicken_WLKA
      AnimationMode = LOOP
      Flags = RANDOMSTART
      AnimationSpeedFactorRange = 1.3 1.3        ;And speed this up just a little bit.
    End

    ConditionState = DYING
      Animation = CUChicken_SKL.CUCHicken_DIEA
      AnimationMode = ONCE
    End

    ConditionState = EXPLODED_BOUNCING
      Animation = CUChicken_SKL.CUCHicken_DIEA
      AnimationMode = ONCE
      ParticleSysBone = NONE GoreBloodTrail
    End
    AliasConditionState = DYING EXPLODED_BOUNCING

    ConditionState = EXPLODED_FLAILING
      Animation = CUChicken_SKL.CUCHicken_DIEA
      AnimationMode = ONCE
      ParticleSysBone = NONE GoreBloodTrail
    End
    AliasConditionState = DYING EXPLODED_FLAILING
  End


  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:CluckCluckChicken
  EditorSorting      = MISC_NATURAL
  TransportSlotCount = 1

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY TerroristSuicideWeapon 
    Weapon = TERTIARY  TerroristAttackMove_Dummy
  End

  ArmorSet
    Conditions      = None
    Armor           = ChickenArmor
    DamageFX        = InfantryDamageFX
  End

  BuildCost = 10
  BuildTime = 1.0          ;in seconds 

  VisionRange = 70
  ShroudClearingRange = 150
  CrushableLevel = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  ExperienceValue     = 1 1 1 1  ; Experience point value at each level

  CommandSet = CivilianCarBombCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = ChickenVoiceSelect
  VoiceMove   = ChickenVoiceMove
  VoiceGuard  = ChickenVoiceMove
  VoiceAttack = NoSound
  VoiceFear   = NoSound

  UnitSpecificSounds
    VoiceEnter        = ChickenVoiceMove
    VoiceEnterHostile = ChickenVoiceMove
    VoiceGarrison     = ChickenVoiceMove
    VoiceCreate       = NoSound
    VoiceGetHealed    = ChickenVoiceMove
  End

  ; *** ENGINEERING Parameters ***  
  RadarPriority = LOCAL_UNIT_ONLY
  KindOf = PRELOAD SELECTABLE CAN_ATTACK INFANTRY SCORE CANNOT_RETALIATE

  Body = ActiveBody ModuleTag_02
   MaxHealth = 30.0
   InitialHealth = 30.0
  End

  Behavior = AIUpdateInterface ModuleTagWanderAround
    AutoAcquireEnemiesWhenIdle = No
  End
  Locomotor = SET_NORMAL ChickenLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    ShockResistance = 1.0
  End

  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes       = ALL -EXTRA_5 -EXPLODED -SUICIDED -CRUSHED -BURNED -LASERED
    SinkDelay        = 3000
    SinkRate         = 0.70     ; in Dist/Sec
    DestructionDelay = 8000
    FX               = INITIAL FX_ChickenDie
  End

  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +EXTRA_5 +CRUSHED +SUICIDED +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_ChickenDieSuicide
    OCL                 = INITIAL OCL_ChickenExplosion
    Weapon              = INITIAL SkyrimChickenWeapon
    FlingForce          = 80
    FlingForceVariance  = 10
    FlingPitch          = 90
    FlingPitchVariance  = 25
  End

  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED +LASERED
    DestructionDelay    = 0
    FX                  = INITIAL FX_ChickenDieSuicide
    OCL                 = INITIAL OCL_ChickenExplosion
    Weapon              = INITIAL SkyrimChickenWeapon
    FlingForce          = 80
    FlingForceVariance  = 10
    FlingPitch          = 90
    FlingPitchVariance  = 25
  End

  Behavior = SquishCollide ModuleTag_06
  End

  Behavior = FireWeaponUpdate ModuleTag_NormalChicken01
    Weapon = ThisIsJustATreeWeapon
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 1.5
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 8.0
  ShadowSizeY = 4.0
  ShadowTexture = ShadowI
End