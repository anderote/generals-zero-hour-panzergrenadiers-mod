  Behavior = AIUpdateInterface ModuleTag_AI01
    Turret
      TurretTurnRate        = 40
      TurretPitchRate       = 80
      AllowsPitch           = Yes
      FiresWhileTurning     = Yes
      NaturalTurretPitch    = 45
      FirePitch             = 45
      ControlledWeaponSlots = PRIMARY
      RecenterTime          = 9999999
    End
    AutoAcquireEnemiesWhenIdle = Yes STEALTHED
    MoodAttackCheckRate        = 333
  End  

  Body                 = HiveStructureBody ModuleTag_04 ;Requires SpawnBehavior!
    MaxHealth          = 1000.0
    InitialHealth      = 1000.0
    ;**Careful with these damage types -- because area damage types will already
    ;**damage slaves.
    PropagateDamageTypesToSlavesWhenExisting = NONE +SMALL_ARMS +SNIPER +POISON +RADIATION +SURRENDER +MICROWAVE
    SwallowDamageTypesIfSlavesNotExisting = NONE +SNIPER +POISON +SURRENDER; Take no damage if no one to pass this to

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1700
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End

  Behavior = SpawnPointProductionExitUpdate ModuleTag_05
    SpawnPointBoneName = SpawnPoint
  End

  Behavior                = SpawnBehavior ModuleTag_06
    SpawnNumber           = 4
    SpawnReplaceDelay     = 18000 ;msec
    SpawnTemplateName     = GLAInfantryFlakEmplacementTrooper
    CanReclaimOrphans     = No
    SpawnedRequireSpawner = Yes
    SlavesHaveFreeWill = No
  End

  Behavior        = RebuildHoleExposeDie ModuleTag_08
    HoleName      = GLAHoleStingerSite
    HoleMaxHealth = 500.0
  End

  Behavior        = DestroyDie ModuleTag_09
    ;<NO DATA>
  End

  Behavior = SlowDeathBehavior DeathTag_Death01
    DeathTypes = ALL
    DestructionDelay = 0
    FX = INITIAL FX_BuggyNewDeathExplosion
    OCL = INITIAL OCL_LargeStructureDebris
    OCL = FINAL OCL_CombatBikeAirDeathStart
  End
 
  Behavior = DestroyDie ModuleTag_Death02
    DeathTypes = NONE +CRUSHED +SPLATTED +TOPPLED
  End

  Behavior = StealthUpdate ModuleTag_13
    StealthDelay                = 2500 ; msec
    StealthForbiddenConditions  = ATTACKING USING_ABILITY TAKING_DAMAGE
    MoveThresholdSpeed          = 3
    InnateStealth               = Yes
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End

  Behavior = ProductionUpdate ModuleTag_15
  End

  Behavior                = FlammableUpdate ModuleTag_16
    AflameDuration        = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount    = 5       ; taking this much damage...
    AflameDamageDelay     = 500       ; this often.
  End

  Behavior = TransitionDamageFX ModuleTag_17
    ;-------------DESIGNED FOR SMALL SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:Yes PSys:StructureTransitionSmallSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:Yes PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:Yes PSys:StructureTransitionSmallExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:Yes PSys:StructureTransitionSmallShockwave
  End

  Behavior = MaxHealthUpgrade ModuleTag_Armor01Data
    TriggeredBy   = Upgrade_GLAFortifiedStructure
    AddMaxHealth  = 500.0 
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End

  Behavior = AutoHealBehavior ModuleTag_JunkInTheTrunk01
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Geometry            = CYLINDER
  GeometryMajorRadius = 36.0
  GeometryHeight      = 9.0    
  GeometryIsSmall     = No
  Shadow              = SHADOW_VOLUME
  BuildCompletion     = PLACED_BY_PLAYER
End

