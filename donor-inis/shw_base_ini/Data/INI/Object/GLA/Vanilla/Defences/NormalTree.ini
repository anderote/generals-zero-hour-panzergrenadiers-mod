Object TotallyNormalTree ;just a tree. move along

  ; *** ART Parameters ***
  ButtonImage = NormalTree
  SelectPortrait = NormalTree

  Draw                  = W3DModelDraw ModuleTag_01
    IgnoreConditionStates = NIGHT
    DefaultConditionState
      Model             = PTDogwod01
      WeaponLaunchBone  = PRIMARY   AFlame01
      WeaponLaunchBone  = SECONDARY AFlame01
      WeaponLaunchBone  = TERTIARY  AFlame01
      WeaponFireFXBone  = PRIMARY   AFlame01
      WeaponFireFXBone  = SECONDARY AFlame01
      WeaponFireFXBone  = TERTIARY  AFlame01
      WeaponMuzzleFlash = PRIMARY   AFlame01
    End
    AliasConditionState = DAMAGED
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE

    ConditionState      = AFLAME ;Currently on fire
      Model             = PTDogwod01
      ParticleSysBone   = AFlame01 FireTreeSmall
      ParticleSysBone   = AFlame01 SmoulderTree1
      ParticleSysBone   = AFlame01 FireTreeSparks
    End
    AliasConditionState = AFLAME DAMAGED
    AliasConditionState = AFLAME REALLYDAMAGED
    AliasConditionState = AFLAME RUBBLE

    ConditionState      = AFLAME SMOLDERING ;at the end of on fire, still has flames, but skeleton is burned
      Model             = PTDogwod01_B
      ParticleSysBone   = AFlame01 FireTreeSmaller
      ParticleSysBone   = AFlame01 SmoulderTree1
      ParticleSysBone   = AFlame01 FireTreeSparks
    End
    AliasConditionState = AFLAME SMOLDERING DAMAGED
    AliasConditionState = AFLAME SMOLDERING REALLYDAMAGED
    AliasConditionState = AFLAME SMOLDERING RUBBLE
    AliasConditionState = SNOW AFLAME SMOLDERING
    AliasConditionState = SNOW AFLAME SMOLDERING DAMAGED
    AliasConditionState = SNOW AFLAME SMOLDERING REALLYDAMAGED
    AliasConditionState = SNOW AFLAME SMOLDERING RUBBLE

    ConditionState      = SMOLDERING; will never catch fire again.  burned out
      Model             = PTDogwod01_B
      ParticleSysBone   = AFlame01 SmoulderTree2
      ParticleSysBone   = AFlame01 SmoulderTree3
    End
    AliasConditionState = SMOLDERING DAMAGED
    AliasConditionState = SMOLDERING REALLYDAMAGED
    AliasConditionState = SMOLDERING RUBBLE
    AliasConditionState = SNOW SMOLDERING
    AliasConditionState = SNOW SMOLDERING DAMAGED
    AliasConditionState = SNOW SMOLDERING REALLYDAMAGED
    AliasConditionState = SNOW SMOLDERING RUBBLE

    ConditionState      = BURNED; all burned and black and no effects
      Model             = PTDogwod01_B
    End
    AliasConditionState = BURNED DAMAGED
    AliasConditionState = BURNED REALLYDAMAGED
    AliasConditionState = BURNED RUBBLE
    AliasConditionState = SNOW BURNED
    AliasConditionState = SNOW BURNED DAMAGED
    AliasConditionState = SNOW BURNED REALLYDAMAGED
    AliasConditionState = SNOW BURNED RUBBLE

    ConditionState      = SNOW
      Model             = PTDogwod01_S
    End
    AliasConditionState = DAMAGED SNOW
    AliasConditionState = REALLYDAMAGED SNOW
    AliasConditionState = RUBBLE SNOW

    ConditionState      = SNOW AFLAME ;Currently on fire
      Model             = PTDogwod01_S
      ParticleSysBone   = AFlame01 FireTreeSmall
      ParticleSysBone   = AFlame01 SmoulderTree1
      ParticleSysBone   = AFlame01 FireTreeSparks
    End
    AliasConditionState = AFLAME DAMAGED SNOW
    AliasConditionState = AFLAME REALLYDAMAGED SNOW
    AliasConditionState = AFLAME RUBBLE SNOW

    ;**************************************************************************************************************************
    ;This block handles every possible case with construction process, selling process, awaiting construction, and sold states
    ;for this draw module
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model              = PTDogwod01
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    AliasConditionState  = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
    
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
      Model              = PTDogwod01
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    AliasConditionState  = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED SNOW
    
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
      Model              = PTDogwod01
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    AliasConditionState  = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED SNOW
    
    ConditionState       = AWAITING_CONSTRUCTION 
      Model              = NONE
    End
    AliasConditionState  = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState  = SOLD DAMAGED
    AliasConditionState  = SOLD REALLYDAMAGED
    ;**************************************************************************************************************************
  End

  ; ------------ construction-zone fence -----------------
  Draw = W3DModelDraw ModuleTag_056
  AnimationsRequirePower = No
    DefaultConditionState
      Model           = None
      HideSubObject   = CYLINDER01
      TransitionKey   = DOWN_DEFAULT
    End
    AliasConditionState = NIGHT
    AliasConditionState = SNOW
    AliasConditionState = SNOW NIGHT

    ConditionState    = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = UBDmTrp_AB
      Animation       = UBDmTrp_AB.UBDmTrp_AB
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_DAY
    End
    AliasConditionState = NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED

    ConditionState    = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = UBDmTrp_ABS
      Animation       = UBDmTrp_ABS.UBDmTrp_ABS
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOW
    End
    AliasConditionState = SNOW NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED

    TransitionState   = DOWN_DEFAULT UP_DAY
      Model           = UBDmTrp_AB
      Animation       = UBDmTrp_AB.UBDmTrp_AB
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOW
      Model           = UBDmTrp_ABS
      Animation       = UBDmTrp_ABS.UBDmTrp_ABS
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = UP_DAY DOWN_DEFAULT
      Model           = UBDmTrp_AB
      Animation       = UBDmTrp_AB.UBDmTrp_AB
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOW DOWN_DEFAULT
      Model           = UBDmTrp_ABS
      Animation       = UBDmTrp_ABS.UBDmTrp_ABS
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
  End

  ; *** DESIGN parameters ***
  DisplayName      = OBJECT:DogwoodTree
  Side             = GLA
  EditorSorting    = STRUCTURE
  CrushableLevel   = 1
  CommandSet       = RegularTreeCommandSet

  BuildCost        = 50
  BuildTime        = 2.0           ; in seconds

  ArmorSet
    Conditions     = None
    Armor          = TotallyNormalTreeArmor
    DamageFX       = EmptyDamageFX   ; just to avoid an assert
  End

  WeaponSet
    Conditions = None 
    Weapon              = PRIMARY     TreeHoldFireDummyWeapon 
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon              = PRIMARY   TreeHoldFireDummyWeapon 
    Weapon              = SECONDARY TreeMachineGun
    AutoChooseSources   = SECONDARY NONE
  End

  VisionRange         = 450.0           ; Shroud clearing distance
  ShroudClearingRange = 450

  ; *** ENGINEERING Parameters ***  
  KindOf        = PRELOAD SELECTABLE STRUCTURE IMMOBILE SHOW_PORTRAIT_WHEN_CONTROLLED CLEARED_BY_BUILD IMMUNE_TO_CAPTURE NO_HEAL_ICON CAN_SEE_THROUGH_STRUCTURE ;UNATTACKABLE ;Unreliable     ;SHRUBBERY ;This means can't click to garrison     ;CLEARED_BY_BUILD ;This is broken/unstable but I use it anyways.
  RadarPriority = LOCAL_UNIT_ONLY

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 75.0
    InitialHealth   = 75.0
  End

  Behavior = FireWeaponCollide ModuleTag_03
    CollideWeapon  = TreeFireDealDamageWeapon
    RequiredStatus = AFLAME       ; I can only fire if I am on fire
  End

  Behavior = AIUpdateInterface ModuleTag_TreeAI01
    Turret
      TurretTurnRate        = 180
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      RecenterTime          = 2000
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate        = 1000
  End

  Behavior = FlammableUpdate ModuleTag_04
    FlameDamageLimit = 2
    FlameDamageExpiration = 0
    BurnedDelay      = 2500
    AflameDuration   = 120000
    AflameDamageAmount = 5
    AflameDamageDelay = 500
    BurningSoundName = GenericFireMediumLoop
  End

  Behavior = FireSpreadUpdate ModuleTag_05
    OCLEmbers        = OCL_BurningEmbers
    MinSpreadDelay   = 1000
    MaxSpreadDelay   = 2000
    SpreadTryRange   = 50 ; A non-zero entry means fires will be set explicitly without relying on embers
                          ; The closest flammable thing will be set on fire automatically.
  End

  Behavior = DestroyDie ModuleTag_Deforested01
    DeathTypes = ALL -TOPPLED
  End

  ClientUpdate = SwayClientUpdate ModuleTag_06
    ;nothing
  End
  Behavior = ToppleUpdate ModuleTag_07
    ToppleFX         = FX_ToppleTree
    BounceFX         = FX_TreeBounce
    StumpName        = TreeSpruceStump
  End
  Behavior = SlowDeathBehavior ModuleTag_08
    DeathTypes = NONE +TOPPLED
    SinkRate          = 2     ; in Dist/Sec
    SinkDelay         = 14000
    DestructionDelay  = 20000
    ExemptStatus      = UNDER_CONSTRUCTION
  End
  Behavior = InstantDeathBehavior ModuleTag_ToppleFix01
    DeathTypes = NONE +TOPPLED
    RequiredStatus = UNDER_CONSTRUCTION
  End

  Behavior = TransportContain  ModuleTag_09
    PassengersAllowedToFire = No
    Slots                   = 3
    DamagePercentToUnits    = 100%
    AllowInsideKindOf       = INFANTRY
    ForbidInsideKindOf      = BOAT
    EnterSound              = TreeEnter
    ExitSound               = TreeExit
    ScatterNearbyOnExit     = Yes
    GoAggressiveOnExit      = No
    ExitDelay               = 250
    ArmedRidersUpgradeMyWeaponSet = Yes
    BurnedDeathToUnits      = No
  End

  Behavior = FireWeaponUpdate ModuleTag_10
    Weapon = ThisIsJustATreeWeapon
  End

  Behavior = AutoHealBehavior ModuleTag_AutoRepair
    StartsActive  = Yes   
    HealingAmount = 1
    HealingDelay = 1000
  End

  Behavior = FlammableUpdate ModuleTag_ForestFire01
    AflameDuration = 99999         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior                 = FXListDie ModuleTag_DeathFX01
    DeathTypes = ALL -TOPPLED
    DeathFX           = FX_AmericaScoutDroneExplode
  End

  ;This *should* fix the issue where the AI attacks the tree before its completed
  ;The stealth will go away once it is completed
  Behavior = StealthUpdate ModuleTag_AIFix01
    StealthDelay = 0 ; msec
    StealthForbiddenConditions = NONE
    FriendlyOpacityMin = 50.0%
    OrderIdleEnemiesToAttackMeUponReveal = No
    RequiredStatus = UNDER_CONSTRUCTION
  End

  Geometry            = CYLINDER
  GeometryIsSmall     = Yes
  GeometryMajorRadius = 4.0
  GeometryHeight      = 15
  Shadow              = SHADOW_DECAL
  InstanceScaleFuzziness = 0.1
End



