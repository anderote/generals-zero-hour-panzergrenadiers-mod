  ExperienceValue = 200 400 600 1000    ;Experience point value at each level
  ExperienceRequired = 0 800 2100 5000  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrushableLevel         = 0  ;What am I?:        2 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet          = Slth_GLAInfantryFundamentalistCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect         = FundamentalistVoiceSelect
  VoiceMove           = FundamentalistVoiceMove
  VoiceGuard          = FundamentalistVoiceMove
  VoiceAttack         = FundamentalistVoiceAttack
  VoiceAttackAir      = FundamentalistVoiceAttack
  UnitSpecificSounds
    VoiceCreate       = FundamentalistVoiceReady
    VoiceGarrison     = FundamentalistVoiceMove
    VoiceEnter        = FundamentalistVoiceMove
  End

;**** ENGINEERING Parameters *** ;MOB02
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS INFANTRY SALVAGER  ;NO_COLLIDE ;Lorenzen disables 

