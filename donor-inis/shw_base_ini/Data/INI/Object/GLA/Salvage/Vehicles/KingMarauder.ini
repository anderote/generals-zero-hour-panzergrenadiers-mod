    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2.0     ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3     ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6     ; fraction of locomotor speed below which we allow pivoting.
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:Marauder
  Side               = GLASalvageGeneral
  EditorSorting      = VEHICLE
  TransportSlotCount = 4     ; how many "slots" we take in a transport (0 == not transportable)
 
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY KingMarauderTankGun
  End
  WeaponSet
    Conditions = CRATEUPGRADE_ONE
    Weapon = PRIMARY KingMarauderTankGunUpgradeOne
  End
  WeaponSet
    Conditions = CRATEUPGRADE_TWO 
    Weapon = PRIMARY KingMarauderTankGunUpgradeTwo
  End

  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY KingMarauderTankGun_WP
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE CRATEUPGRADE_ONE
    Weapon = PRIMARY KingMarauderTankGunUpgradeOne_WP
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE CRATEUPGRADE_TWO 
    Weapon = PRIMARY KingMarauderTankGunUpgradeTwo_WP
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  InfectedMarauderTankGunUpgradeOne
  End
  WeaponSet
    Conditions = CARBOMB CRATEUPGRADE_ONE
    Weapon = PRIMARY  InfectedMarauderTankGunUpgradeOne
  End
  WeaponSet
    Conditions = CARBOMB CRATEUPGRADE_TWO
    Weapon = PRIMARY  InfectedMarauderTankGunUpgradeOne
  End

  WeaponSet
    Conditions = PLAYER_UPGRADE CARBOMB
    Weapon = PRIMARY  InfectedMarauderTankGunUpgradeOne
  End
