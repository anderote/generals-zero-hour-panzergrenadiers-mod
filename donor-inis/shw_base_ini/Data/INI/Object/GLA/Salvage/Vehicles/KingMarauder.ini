      TurretPitch = TurretELUp02
      ShowSubObject = TurretUp02
      HideSubObject = Turret01 TurretUp01 BarrelUp02FX01 BarrelUp02FX02
      WeaponFireFXBone = PRIMARY BarrelUp02MS
