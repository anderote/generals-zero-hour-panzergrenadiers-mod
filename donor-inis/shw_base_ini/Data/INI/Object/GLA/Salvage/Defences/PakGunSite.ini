  Body                 = HiveStructureBody ModuleTag_04 ;Requires SpawnBehavior!
    MaxHealth          = 1000.0
    InitialHealth      = 1000.0
    ;**Careful with these damage types -- because area damage types will already
    ;**damage slaves.
    PropagateDamageTypesToSlavesWhenExisting = NONE +EXPLOSION +POISON +RADIATION +ARMOR_PIERCING +SNIPER
    SwallowDamageTypesIfSlavesNotExisting = NONE +POISON +SNIPER ; Take no damage if no one to pass this to

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 2000
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End

