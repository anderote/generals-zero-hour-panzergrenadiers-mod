;;;Salv_Command_ConstructGLAJetME262
Object Salv_GLAJetME262Fighter

  ; *** ART Parameters ***
  SelectPortrait         = SUMe262_L
  ButtonImage            = SUMe262_L

  UpgradeCameo1 = Upgrade_GLAAPBullets
  ;;;;;UpgradeCameo2 = Upgrade_DragonFlyPhosphorusBombs
  UpgradeCameo2 = Upgrade_GLAJunkRepair

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    ParticlesAttachedToAnimatedBones = Yes 
    OkToChangeModelColor = Yes

    ProjectileBoneFeedbackEnabledSlots = PRIMARY ; WeaponLaunchBone will be shown/hidden

    DefaultConditionState
      Model           = UVME262
      WeaponLaunchBone  = PRIMARY   WEAPONA01
      WeaponFireFXBone  = SECONDARY   CYLINDER03
      WeaponLaunchBone  = SECONDARY   CYLINDER03
      WeaponMuzzleFlash = SECONDARY   CYLINDER03
      WeaponLaunchBone  = TERTIARY    CYLINDER04
      WeaponFireFXBone  = TERTIARY    CYLINDER04
      WeaponMuzzleFlash = TERTIARY    CYLINDER04
      ParticleSysBone = EGINE01  V1EngineFlame
      ParticleSysBone = EGINE01  EMissileExhaust
      ParticleSysBone = EGINE02  V1EngineFlame
      ParticleSysBone = EGINE02   EMissileExhaust
      HideSubObject   = WEAPONA01
    End
    
    ConditionState = DAMAGED
      Model           = UVME262_D
      Animation       = UVME262_D.UVME262_D
      ParticleSysBone = EGINE01 JetSmokeLarge
    End
    
    ConditionState = REALLYDAMAGED
      Model           = UVME262_D
      Animation       = UVME262_D.UVME262_D
      ParticleSysBone = EGINE01  JetSmokeLarge
      ParticleSysBone = EGINE02  JetSmokeLarge
    End
    
    ConditionState = RUBBLE
      Model           = UVME262_D1
      ParticleSysBone = EGINE02  V1EngineFlame
      ParticleSysBone = EGINE02  EMissileExhaust
      ParticleSysBone = EGINE02  JetSmokeLarge
    End

    ConditionState = USER_1
      ShowSubObject = WEAPONA01
    End

    ConditionState = USER_1 RELOADING_A
      HideSubObject = WEAPONA01
    End
    AliasConditionState = USER_1 BETWEEN_FIRING_SHOTS_A
  End
  
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:GLAJetMe262
  EditorSorting       = VEHICLE
  Side                = GLA
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange          = 200.0 
  ShroudClearingRange  = 400.0

  ;So, I know this Me262 model has the large (500kg probably) bomb underneath
  ;I cannot get a decent WeaponSet order. Since this unit has no left or right barrel designation, I had to use CYLINDER objects for it
  ;And make two weapons, one with a slight delay, to make it look like it's alternating fire from both sides
  ;The anti-air weapons CANNOT be the primary weapon because you can force fire, ignoring any target restrictions

  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY DummyWeapon
    Weapon              = SECONDARY GLAJetME262CannonLeft
    Weapon              = TERTIARY GLAJetME262CannonRight
    ShareWeaponReloadTime = No
  End
  ;WeaponSet
    ;Conditions          = PLAYER_UPGRADE 
    ;Weapon              = PRIMARY GLAJetME262BombWeapon
    ;Weapon              = SECONDARY GLAJetME262CannonLeft
    ;Weapon              = TERTIARY  GLAJetME262CannonRight
    ;ShareWeaponReloadTime = No
  ;End
  
  ArmorSet
    Conditions      = None
    Armor           = Me262Armor
    DamageFX        = None
  End

  Prerequisites
    Object = Salv_GLAPalace
  End

  CommandSet          = GenericGuardAirCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect    = GLAMe262VoiceSelect
  VoiceMove      = GLAMe262VoiceMove
  VoiceAttack    = GLAMe262VoiceAttack
  VoiceAttackAir = GLAMe262VoiceAttack
  VoiceFear      = GLAMe262VoiceFear
  VoiceGuard     = GLAMe262VoiceMove
  SoundAmbient          = ME262AmbientLoopNew   ;;ME262AmbientLoop
  SoundAmbientRubble    = NoSound
  UnitSpecificSounds
    VoiceCreate           = GLAMe262VoiceCreate
  End

  BuildCost               = 1200
  BuildTime               = 20.0
  ExperienceValue         = 90 130 170 210  ;Experience point value at each level
  ExperienceRequired      = 0 360 795 1550   ;Experience points needed to gain each level
  IsTrainable             = Yes             ;Can gain experience

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf          = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT PRODUCED_AT_HELIPAD

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 400.0
    InitialHealth   = 400.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle    = NotWhileAttacking Yes
  End
  Locomotor = SET_NORMAL GLAJetMe262Locomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 500.0
  End

  Behavior                          = JetSlowDeathBehavior ModuleTag_10
    DestructionDelay                = 2000 
    RollRate                        = 0.1
    RollRateDelta                   = 100%      ;each frame, rollrate = rollrate * rollrateDelta
    PitchRate                       = 0.1
    FallHowFast                     = 25.0%    ;Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath                  = FX_JetBigDeathInitial
    OCLInitialDeath                 = OCL_AmericaJetCargoDeathStart
    DelaySecondaryFromInitialDeath  = 2000       ; in milliseconds     This guy won't hit the ground, so this time equals the above time
    OCLSecondary                    = OCL_AmericaJetCargoHulkDeath
    FXSecondary                     = FX_BigPlaneDeath
  End

  Behavior = TransitionDamageFX ModuleTag_12
    DamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
  End

  Behavior = AutoHealBehavior ModuleTag_JunkRepair08
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Behavior = WeaponBonusUpgrade ModuleTag_09232
    TriggeredBy = Upgrade_GLAAPBullets
  End

  ;Behavior        = ModelConditionUpgrade ModuleTag_BombVisual01
    ;ConditionFlag = USER_1
    ;TriggeredBy   = Upgrade_DragonFlyPhosphorusBombs
  ;End

  ;Behavior = WeaponSetUpgrade ModuleTag_Weapon01
    ;TriggeredBy = Upgrade_DragonFlyPhosphorusBombs
  ;End

  Behavior = StealthDetectorUpdate ModuleTag_AirCombat01
    DetectionRate            = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange           = 350   ; Dustin, enable this for independant balancing!
    ExtraRequiredKindOf      = AIRCRAFT
    CanDetectWhileGarrisoned = No    ; Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained  = No    ; Contained means being in a transport or tunnel network.
  End

  Behavior = CountermeasuresBehavior ModuleTag_MissileDodge01
    TriggeredBy           = Upgrade_GLAJunkRepair
    FlareTemplateName     = MiGDodger
    FlareBoneBaseName     = Flare ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize            = 10     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle        = 90.0  ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor  = 2.0   ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys   = 400   ; Time between flare volleys
    NumberOfVolleys       = 5     ; Number of times the volleys will fire before reloading
    ReloadTime            = 33.33 ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate           = 25%   ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 33.33 ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay     = 33.33 ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 15.0   ;40.0
  GeometryMinorRadius = 15.0   ;10.0
  GeometryHeight = 5.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End