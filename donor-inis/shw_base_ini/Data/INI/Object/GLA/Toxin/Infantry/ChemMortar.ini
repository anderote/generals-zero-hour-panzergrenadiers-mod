Object Chem_GLAInfantryMortar
  ;For House Ordos :3
  SelectPortrait = GLAChemMortar_L
  ButtonImage    = GLAChemMortar_L  

  UpgradeCameo1 = Chem_Upgrade_GLAAnthraxGamma

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = AISTNG_SKN
      IdleAnimation             = AISTNG_SKL.AISTNG_STA 0 30
      IdleAnimation             = AISTNG_SKL.AISTNG_IDA
      IdleAnimation             = AISTNG_SKL.AISTNG_IDB
      AnimationMode             = ONCE
      AnimationSpeedFactorRange = 0.8 1.2
      TransitionKey             = TRANS_Stand
      WeaponMuzzleFlash         = PRIMARY MuzzleFX
      WeaponMuzzleFlash         = SECONDARY MuzzleFX
      WeaponMuzzleFlash         = TERTIARY MuzzleFX
    End
    AliasConditionState = REALLYDAMAGED

    ConditionState      = PREATTACK_A
      Animation         = AISTNG_SKL.AISTNG_ATA 
      AnimationMode     = ONCE
      TransitionKey     = TRANS_Firing
    End
    AliasConditionState = PREATTACK_B

    AliasConditionState = PREATTACK_A REALLYDAMAGED
    ConditionState      = FIRING_A 
      Animation         = NITHNT_SKL.NITHNT_ATA2
      AnimationMode     = ONCE
      TransitionKey     = TRANS_Fired
    End
    AliasConditionState = FIRING_A REALLYDAMAGED
    AliasConditionState = RELOADING_A
    AliasConditionState = RELOADING_A REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_A
    AliasConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED
    AliasConditionState = FIRING_B REALLYDAMAGED
    AliasConditionState = RELOADING_B
    AliasConditionState = RELOADING_B REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_B
    AliasConditionState = BETWEEN_FIRING_SHOTS_B REALLYDAMAGED

    TransitionState     = TRANS_Firing TRANS_Fired
      Animation         = AISTNG_SKL.AISTNG_ATA2
      AnimationMode     = ONCE
    End

    TransitionState             = TRANS_Stand TRANS_Moving
      Animation                 = AISTNG_SKL.AISTNG_DR1
      AnimationMode             = ONCE
      AnimationSpeedFactorRange = 5.0 5.0
    End

    TransitionState             = TRANS_Moving TRANS_Stand
      Animation                 = AISTNG_SKL.AISTNG_RD2
      AnimationMode             = ONCE
      AnimationSpeedFactorRange = 2.0 2.0
    End

    TransitionState             = TRANS_Moving TRANS_Firing
      Animation                 = AISTNG_SKL.AISTNG_RD2
      AnimationMode             = ONCE
      AnimationSpeedFactorRange = 2.0 2.0
    End

    TransitionState             = TRANS_Firing TRANS_Moving
      Animation                 = AISTNG_SKL.AISTNG_DR1
      AnimationMode             = ONCE
      AnimationSpeedFactorRange = 5.0 5.0
    End

    ConditionState    = MOVING
      Animation       = AISTNG_SKL.AISTNG_RNA
      AnimationMode   = LOOP
      Flags           = RANDOMSTART
      TransitionKey   = TRANS_Moving
      ParticleSysBone = None InfantryDustTrails
    End

    AliasConditionState         = MOVING REALLYDAMAGED
    ConditionState              = MOVING DYING
      Animation                 = AISTNG_SKL.AISTNG_DTC
      AnimationSpeedFactorRange = 0.9 1.25
      AnimationMode             = ONCE
      TransitionKey             = TRANS_Dying
    End

    ConditionState              = DYING
      Animation                 = AISTNG_SKL.AISTNG_DTA
      Animation                 = AISTNG_SKL.AISTNG_DTB
      AnimationSpeedFactorRange = 0.9 1.25
      AnimationMode             = ONCE
      TransitionKey             = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation     = AISTNG_SKL.AISTNG_ADTF1
      AnimationMode = ONCE
    End

    ConditionState  = DYING EXPLODED_FLAILING
      Animation     = AISTNG_SKL.AISTNG_ADTF2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState  = DYING EXPLODED_BOUNCING
      Animation     = AISTNG_SKL.AISTNG_ADTF3
      AnimationMode = ONCE
      TransitionKey = None
    End

    ConditionState  = FREEFALL
      Animation     = AISTNG_SKL.AISTNG_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL DYING

    ConditionState  = PARACHUTING
      Animation     = AISTNG_SKL.AISTNG_PHG
      AnimationMode = LOOP
      Flags         = PRISTINE_BONE_POS_IN_FINAL_FRAME
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING

    TransitionState = TRANS_Falling TRANS_Chute
      Animation     = AISTNG_SKL.AISTNG_POP
      AnimationMode = ONCE
    End

    TransitionState = TRANS_Chute TRANS_Stand
      Animation     = AISTNG_SKL.AISTNG_PTD
      AnimationMode = ONCE
    End

    ConditionState  = SPECIAL_CHEERING
      Animation     = AISTNG_SKL.AISTNG_CHA
      AnimationMode = ONCE
    End
  End

  Draw = W3DModelDraw ModuleTag_MortarFireBone
    DefaultConditionState
      Model             = NVMortar_B
      WeaponFireFXBone  = PRIMARY MORTARMUZZLE
      WeaponLaunchBone  = PRIMARY MORTARMUZZLE
      WeaponFireFXBone  = SECONDARY MORTARMUZZLE
      WeaponLaunchBone  = SECONDARY MORTARMUZZLE
      WeaponFireFXBone  = TERTIARY MORTARMUZZLE
      WeaponLaunchBone  = TERTIARY MORTARMUZZLE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:GLAChemMortar
  Side = GLAToxinGeneral
  EditorSorting = INFANTRY
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions          = None
    Weapon              = PRIMARY GLAChemicalMortarGun
    Weapon              = SECONDARY GLAChemicalMortarGarrisonEvacWeapon
    AutoChooseSources   = SECONDARY NONE
    ShareWeaponReloadTime = No
  End

  WeaponSet
    Conditions          = PLAYER_UPGRADE
    Weapon              = PRIMARY GLAChemicalMortarGunGamma
    Weapon              = SECONDARY GLAChemicalMortarGarrisonEvacWeapon
    AutoChooseSources   = SECONDARY NONE
    ShareWeaponReloadTime = No
  End

  ArmorSet
    Conditions      = None
    Armor           = ChemReb_HumanArmor
    DamageFX        = InfantryDamageFX
  End

  VisionRange = 150
  ShroudClearingRange = 220

  BuildCost = 600
  BuildTime = 15.0          ;in seconds    

  ExperienceValue = 15 25 35 50    ;Experience point value at each level
  ExperienceRequired = 0 50 122 300  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrushableLevel         = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet      = Chem_GLAChemMortarCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect        = GLAChemMortarVoiceSelect
  VoiceMove          = GLAChemMortarVoiceMove
  VoiceAttack        = GLAChemMortarVoiceAttack
  VoiceGuard         = GLAChemMortarVoiceMove
  UnitSpecificSounds
    VoiceCreate        = GLAChemMortarVoiceCreate
    VoiceGarrison      = GLAChemMortarVoiceMove
    VoiceEnter         = GLAChemMortarVoiceMove
    VoiceEnterHostile  = GLAChemMortarVoiceMove
    VoiceGetHealed     = GLAChemMortarVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf        = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS INFANTRY SCORE NO_HEAL_ICON SALVAGER

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 70.0
    InitialHealth   = 70.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 0
      TurretPitchRate = 100
      AllowsPitch = Yes
      FirePitch = 55
      NaturalTurretPitch = 0
      ControlledWeaponSlots = SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL GLAChemicalMortarLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    ShockResistance = 1.0
  End

  Behavior = AutoHealBehavior ModuleTag_AutoRepair01
    StartsActive  = Yes   
    HealingAmount = 1
    HealingDelay = 200
  End

  Behavior = WeaponSetUpgrade ModuleTag_08
    TriggeredBy = Chem_Upgrade_GLAAnthraxGamma
  End

  Behavior = SquishCollide ModuleTag_09
    ;nothing
  End

; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6 -EXTRA_7 -EXTRA_8
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_ChemMortarDie
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_ChemMortarDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_ChemMortarDieByFire
    OCL                 = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death06 ; don't forget to give it a new, unique module tag
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantryBeta ;you'll have to create this OCL and make it use the blue guys instead of green ones
  End

  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantryGamma
  End
  Behavior = SlowDeathBehavior ModuleTag_Death08 ;new and shiney microwave death effect
    DeathTypes          = NONE +EXTRA_2
    DestructionDelay    = 0
    FX                  = INITIAL FX_ChemMortarDieByFire
    OCL                 = INITIAL OCL_MicrowavedInfantry 
  End
  Behavior = SlowDeathBehavior ModuleTag_Death09
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_ChemMortarDieByFire
    FX                  = FINAL   FX_IfantryTeslaDie
    OCL                 = INITIAL OCL_TeslaDeathInfantry    
  End
  Behavior = SlowDeathBehavior ModuleTag_Death045 ;Brutal kill with lots of blood and no death scream
    DeathTypes          = NONE +EXTRA_4
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FX                  = INITIAL FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_036 ;Gore death explosion
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 30
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_BloodyGoreExplosion
    FX                  = FINAL   FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_Death0323
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 70
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_ChemMortarDie
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_03241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_6
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_RadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_DieByToxinGLA
  End
  Behavior = SlowDeathBehavior ModuleTag_0323241156 ;Virus weapon
    DeathTypes          = NONE +EXTRA_7
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_NeutronRadiationDeathInfantry
    FX                  = INITIAL FX_GIDieVirus
    FX                  = FINAL   FX_DieByToxinGLA
  End
; --- end Death modules ---

  Behavior = PoisonedBehavior ModuleTag_13
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 1000       ; ... for this long after last hit by poison damage
  End

  Behavior         = GrantUpgradeCreate ModuleTag_06
    UpgradeToGrant = Upgrade_AmericaBattleDrone
  End
 
  Geometry = CYLINDER
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14;
  ShadowSizeY = 14;
  ShadowTexture = ShadowI_2;
  BuildCompletion = APPEARS_AT_RALLY_POINT
End