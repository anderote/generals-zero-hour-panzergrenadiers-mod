Object Chem_GLAToxinTankDragon
  ;BLARARGHGHGH
  ; *** ART Parameters ***
  SelectPortrait         = SUGastruck_L
  ButtonImage            = SUGastruck_L
  
  UpgradeCameo1 = Upgrade_GLAJunkRepair
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTankTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = UVGasTrack
      Turret = TURRET
      TurretPitch = TURRETEL
      WeaponFireFXBone = PRIMARY MUZZLE
      WeaponLaunchBone = PRIMARY MUZZLE
      WeaponFireFXBone = SECONDARY MUZZLE
      WeaponLaunchBone = SECONDARY MUZZLE
      WeaponFireFXBone = TERTIARY MUZZLE
      WeaponLaunchBone = TERTIARY MUZZLE
      HideSubObject    = HOUSECOLOR06 HOUSECOLOR05 ;06 is skirt01     05 is skirt02
    End

    ConditionState = REALLYDAMAGED
      Model = UVGasTrack_D
      ParticleSysBone = SMOKE01 DozerSmokeLight
      ParticleSysBone = SMOKE02 DozerSmokeLight
      ParticleSysBone = SMOKE03 DozerSmokeLight
      ParticleSysBone = SMOKE04 DozerSmokeHeavy
      HideSubObject    = HOUSECOLOR06 HOUSECOLOR05 ;06 is skirt01     05 is skirt02
    End

    ConditionState = ARMORSET_CRATEUPGRADE_ONE
      ShowSubObject    = HOUSECOLOR06
      HideSubObject    = HOUSECOLOR05
    End
    ConditionState = ARMORSET_CRATEUPGRADE_ONE REALLYDAMAGED
      Model = UVGasTrack_D
      ParticleSysBone = SMOKE01 DozerSmokeLight
      ParticleSysBone = SMOKE02 DozerSmokeLight
      ParticleSysBone = SMOKE03 DozerSmokeLight
      ParticleSysBone = SMOKE04 DozerSmokeHeavy
      ShowSubObject    = HOUSECOLOR06
      HideSubObject    = HOUSECOLOR05
    End

    ConditionState = ARMORSET_CRATEUPGRADE_TWO
      ShowSubObject    = HOUSECOLOR06 HOUSECOLOR05
    End
    ConditionState = ARMORSET_CRATEUPGRADE_TWO REALLYDAMAGED
      Model = UVGasTrack_D
      ParticleSysBone = SMOKE01 DozerSmokeLight
      ParticleSysBone = SMOKE02 DozerSmokeLight
      ParticleSysBone = SMOKE03 DozerSmokeLight
      ParticleSysBone = SMOKE04 DozerSmokeHeavy
      ShowSubObject    = HOUSECOLOR06 HOUSECOLOR05
    End

    ConditionState = RUBBLE
      Model = UVGasTrack_D1
      ParticleSysBone = SMOKE01 DozerSmokeLight
      ParticleSysBone = SMOKE02 DozerSmokeLight
      ParticleSysBone = SMOKE03 DozerSmokeLight
      ParticleSysBone = SMOKE04 DozerSmokeHeavy
      HideSubObject    = HOUSECOLOR06 HOUSECOLOR05 ;06 is skirt01     05 is skirt02
    End

    ConditionState = RUBBLE ARMORSET_CRATEUPGRADE_ONE
      Model = UVGasTrack_D1
      ParticleSysBone = SMOKE01 DozerSmokeLight
      ParticleSysBone = SMOKE02 DozerSmokeLight
      ParticleSysBone = SMOKE03 DozerSmokeLight
      ParticleSysBone = SMOKE04 DozerSmokeHeavy
      ShowSubObject    = HOUSECOLOR06
      HideSubObject    = HOUSECOLOR05
    End

    ConditionState = RUBBLE ARMORSET_CRATEUPGRADE_TWO
      Model = UVGasTrack_D1
      ParticleSysBone = SMOKE01 DozerSmokeLight
      ParticleSysBone = SMOKE02 DozerSmokeLight
      ParticleSysBone = SMOKE03 DozerSmokeLight
      ParticleSysBone = SMOKE04 DozerSmokeHeavy
      ShowSubObject    = HOUSECOLOR06 HOUSECOLOR05
    End

    TrackMarks = EXTnkTrack.tga

    TreadAnimationRate = 2.0;  amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.

    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
 
    ; These parameters are only used if the model has a separate suspension, 
    ; and the locomotor has HasSuspension = Yes.
    LeftFrontTireBone    = WHEEL02
    RightFrontTireBone   = WHEEL01
    RightRearTireBone = WHEEL03
    LeftRearTireBone  = WHEEL04
    TireRotationMultiplier = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition = 0   ; This unit doesn't powerslide.
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:ToxinDragon
  Side = GLAToxinGeneral
  EditorSorting   = VEHICLE
  TransportSlotCount = 4                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY ToxinDragonTankFlameWeapon
    Weapon = SECONDARY ToxinDragonTankFireWallWeapon
    ;;;;AutoChooseSources = SECONDARY NONE
    Weapon = TERTIARY GastrackCannisterWeapon
    ShareWeaponReloadTime = Yes
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions      = None
    Armor           = ToxinDragonTankArmor
    DamageFX        = TankDamageFX
  End
  ArmorSet
    Conditions      = CRATE_UPGRADE_ONE
    Armor           = ToxinDragonTankArmor
    DamageFX        = TankDamageFX
  End
  ArmorSet
    Conditions      = CRATE_UPGRADE_TWO
    Armor           = ToxinDragonTankArmor
    DamageFX        = TankDamageFX
  End

  BuildCost       = 1000
  BuildTime       = 15.0          ;in seconds    
  VisionRange     = 120
  ShroudClearingRange = 240

  ExperienceValue = 100 140 180 220    ;Experience point value at each level
  ExperienceRequired = 0 280 630 1100  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet    = VirusTankCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect         = VirusTankVoiceSelect
  VoiceMove           = VirusTankVoiceMove
  VoiceGuard          = VirusTankVoiceMove
  VoiceAttack         = VirusTankVoiceAttack
  SoundMoveStart      = DragonTankMoveStart
  SoundMoveStartDamaged = DragonTankMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = VirusTankVoiceCreate
    TurretMoveStart     = NoSound
    TurretMoveLoop      = NoSound
    TruckLandingSound    = NoSound
    TruckPowerslideSound = NoSound
    VoiceCrush           = VirusTankVoiceMove
    VoiceEnter           = VirusTankVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE SALVAGER ARMOR_SALVAGER
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 420.0
    InitialHealth   = 420.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 650
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 160
      TurretPitchRate = 160
      AllowsPitch = Yes
      MinPhysicalPitch = -6

      TurretFireAngleSweep = PRIMARY 7
      TurretFireAngleSweep = SECONDARY 55
      TurretSweepSpeedModifier = PRIMARY 0.3    ; Sweep slower than you turn (aim for 30 for art)
      TurretSweepSpeedModifier = SECONDARY 1.7  ; Sweep faster than you turn
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 40 ; default is 2000
  End
  Locomotor = SET_NORMAL GastrackLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 95.0
  End

  ; A crushing defeat
  Behavior = DestroyDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = FXListDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_08
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End
  Behavior = CreateCrateDie ModuleTag_09
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = AutoHealBehavior ModuleTag_121123
    HealingAmount   = 2
    HealingDelay    = 1000 ; msec
    TriggeredBy     = Upgrade_GLAJunkRepair
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_17
    DeathTypes = ALL
    DestructionDelay = 1000
    DestructionDelayVariance = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_GasTrackDeathEffect
    FX  = FINAL    FX_BattleMasterExplosionOneFinal
  End
  
  Behavior = FlammableUpdate ModuleTag_12
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior                 = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  
  ClientUpdate         = AnimatedParticleSysBoneClientUpdate ModuleTag_reallyimportant
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Behavior = VeterancyGainCreate ModuleTag_860
    StartingLevel = VETERAN
    ScienceRequired = Slth_SCIENCE_GLAVehicleTraining
  End

  Behavior = LockWeaponCreate ModuleTag_Durdur01
    SlotToLock = PRIMARY ; Prevents indeterminate state plus two unpickable weapons equaling no attack.
  End

  Geometry = BOX
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 11.0   ; Height set to allow clear clipping of projectile stream  
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End