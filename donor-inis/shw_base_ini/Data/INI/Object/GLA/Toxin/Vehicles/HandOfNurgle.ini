Object Chem_GLAVehicleHandOfNurgle
  ;Good job, MP ~<3
  ; *** ART Parameters ***
  SelectPortrait         = SUNurgle_L
  ButtonImage            = SUNurgle_L
  
  UpgradeCameo1 = Chem_Upgrade_GLAAnthraxGamma
  UpgradeCameo2 = Upgrade_GLAVirusUpgrade
  UpgradeCameo3 = Upgrade_GLAAPRockets
  UpgradeCameo4 = Upgrade_GLAJunkRepair
  UpgradeCameo5 = Upgrade_GLAAPBullets

  Draw = W3DOverlordTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ExtraPublicBone = FIREPOINT01
    ProjectileBoneFeedbackEnabledSlots = PRIMARY SECONDARY TERTIARY

    DefaultConditionState
      Model = UVHON
      TurretPitch        = TURRETEL
      WeaponLaunchBone   = PRIMARY MUZZLE
      WeaponHideShowBone = PRIMARY WEAPONA01
      WeaponLaunchBone   = SECONDARY MUZZLE
      WeaponHideShowBone = SECONDARY WEAPONA01
      WeaponLaunchBone   = TERTIARY MUZZLE
      WeaponHideShowBone = TERTIARY WEAPONA01
      ParticleSysBone = ROCKETFX01 None
      ParticleSysBone = ROCKETFX02 None
      ParticleSysBone = ROCKETFX03 None
      ParticleSysBone = ROCKETFX04 None
      ParticleSysBone = EXHAUST01 None
      ParticleSysBone = EXHAUST02 None
      ParticleSysBone = EXHAUST03 None
      ParticleSysBone = EXHAUST04 None
      ParticleSysBone = EXHAUST05 None
      ParticleSysBone = EXHAUST06 None
    End

    ConditionState    = REALLYDAMAGED
      Model           = UVHON_D
      Animation       = UVHON.UVHON
      AnimationMode   = ONCE_BACKWARDS
      Flags           = START_FRAME_FIRST
      ParticleSysBone = EXHAUST01 None
      ParticleSysBone = EXHAUST02 None
      ParticleSysBone = EXHAUST03 None
      ParticleSysBone = EXHAUST04 None
      ParticleSysBone = EXHAUST05 None
      ParticleSysBone = EXHAUST06 None
    End
    AliasConditionState = REALLYDAMAGED BETWEEN_FIRING_SHOTS_A

    ;*** PACKED STATE -- ready to move ***
    ConditionState    = MOVING
      Animation       = UVHON.UVHON
      AnimationMode   = ONCE_BACKWARDS
      Flags           = START_FRAME_FIRST
      ParticleSysBone    = EXHAUST01 DozerSmokeLight
      ParticleSysBone    = EXHAUST02 DozerSmokeLight
      ParticleSysBone    = EXHAUST03 DozerSmokeLight
      ParticleSysBone    = EXHAUST04 DozerSmokeLight
      ParticleSysBone    = EXHAUST05 DozerSmokeLight
      ParticleSysBone    = EXHAUST06 DozerSmokeLight
    End
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_A ;Very long shot delay -- possibly moving
    AliasConditionState = BETWEEN_FIRING_SHOTS_A

    ConditionState    = REALLYDAMAGED MOVING
      Model           = UVHON_D
      Animation       = UVHON.UVHON
      AnimationMode   = ONCE_BACKWARDS
      Flags           = START_FRAME_FIRST
      ParticleSysBone    = EXHAUST01 DozerSmokeLight
      ParticleSysBone    = EXHAUST02 DozerSmokeLight
      ParticleSysBone    = EXHAUST03 DozerSmokeLight
      ParticleSysBone    = EXHAUST04 DozerSmokeLight
      ParticleSysBone    = EXHAUST05 DozerSmokeLight
      ParticleSysBone    = EXHAUST06 DozerSmokeLight
    End
    AliasConditionState = REALLYDAMAGED MOVING BETWEEN_FIRING_SHOTS_A ;Very long shot delay -- possibly moving

    ;*** UNPACKING STATE  -- preparing to fire ***
    ConditionState    = UNPACKING
      Animation       = UVHON.UVHON
      AnimationMode   = MANUAL
    End
    AliasConditionState = UNPACKING BETWEEN_FIRING_SHOTS_A ;Very long shot delay

    ConditionState    = REALLYDAMAGED UNPACKING
      Model           = UVHON_D
      Animation       = UVHON.UVHON
      AnimationMode   = MANUAL
    End
    AliasConditionState = REALLYDAMAGED UNPACKING BETWEEN_FIRING_SHOTS_A ;Very long shot delay

    ;*** PACKING STATE -- preparing to move ***
    ConditionState    = PACKING
      Animation       = UVHON.UVHON
      AnimationMode   = MANUAL
    End

    AliasConditionState = PACKING BETWEEN_FIRING_SHOTS_A ;Very long shot delay

    ConditionState    = REALLYDAMAGED PACKING
      Model           = UVHON_D
      Animation       = UVHON.UVHON
      AnimationMode   = MANUAL
    End
    AliasConditionState = REALLYDAMAGED PACKING BETWEEN_FIRING_SHOTS_A ;Very long shot delay

    ;*** DEPLOYED STATE -- ready to fire ***
    ConditionState  = DEPLOYED 
      Animation       = UVHON.UVHON
      AnimationMode   = ONCE
      Flags           = START_FRAME_LAST
      TransitionKey   = TRANS_FIRING_A
    End
    AliasConditionState = DEPLOYED FIRING_A
    AliasConditionState = DEPLOYED BETWEEN_FIRING_SHOTS_A
    AliasConditionState = DEPLOYED RELOADING_A
    AliasConditionState = DEPLOYED MOVING

    ConditionState  = DEPLOYED REALLYDAMAGED
      Model           = UVHON_D
      Animation       = UVHON.UVHON
      AnimationMode   = ONCE
      Flags           = START_FRAME_LAST
      TransitionKey   = TRANS_FIRING_A
    End
    AliasConditionState = DEPLOYED REALLYDAMAGED FIRING_A
    AliasConditionState = DEPLOYED REALLYDAMAGED BETWEEN_FIRING_SHOTS_A
    AliasConditionState = DEPLOYED REALLYDAMAGED RELOADING_A
    AliasConditionState = DEPLOYED REALLYDAMAGED MOVING

    ;;;TrackMarks           = EXTnkTrack.tga
    TreadDebrisLeft      = SentryDroneTrackDebrisDirtLeft
    TreadDebrisRight     = SentryDroneTrackDebrisDirtRight
    TreadAnimationRate   = 2.0 ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:Chem_GLAVehicleHandOfNurgle
  Side               = GLAToxinGeneral
  EditorSorting      = VEHICLE
  TransportSlotCount = 5                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY NurgleAnthraxMissileWeapon
    Weapon = SECONDARY NurgleViralAcidWeapon
    ;;;;;Weapon = TERTIARY NurgleAntiAirMissileWeapon    ;This is fully functional, but due to a bug, it can be used against ground and air targets. SAGE...
    AutoChooseSources = SECONDARY NONE
    ShareWeaponReloadTime = Yes
  End

  WeaponSet
    Conditions = CARBOMB 
    Weapon = PRIMARY SuicideCarBomb
    Weapon = SECONDARY SuicideCarBomb
    AutoChooseSources = SECONDARY NONE
    ShareWeaponReloadTime = Yes
  End

  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End

  Prerequisites
    Science = SCIENCE_ChemScudLauncher
  End

  BuildCost       = 1500
  BuildTime       = 18.0          ;in seconds   
  
  VisionRange         = 250
  ShroudClearingRange = 350

  ExperienceValue    = 100 130 160 190  ;Experience point value at each level
  ExperienceRequired = 0 520 1680 3500  ;Experience points needed to gain each level
  IsTrainable     = Yes    ;Can gain experience
  CrusherLevel    = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel  = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet = HandOfNurgleCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = HandOfNurgleVoiceSelect
  VoiceMove             = HandOfNurgleVoiceMove
  VoiceGuard            = HandOfNurgleVoiceMove
  VoiceAttack           = HandOfNurgleVoiceAttack
  SoundMoveStart        = ScudLauncherMoveStart
  SoundMoveStartDamaged = ScudLauncherMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = MobileDemoTrapVoiceCreate
    VoiceEnter          = HandOfNurgleVoiceMove
    VoiceGetHealed      = HandOfNurgleVoiceMove
    VoiceBombard        = HandOfNurgleVoiceAttack
    Deploy              = NukeCannonDeploy
    Undeploy            = NukeCannonUnDeploy
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK VEHICLE SCORE SALVAGER CANNOT_RETALIATE
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 325.0
    InitialHealth   = 325.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 550
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 25
  End

  Behavior = DeployStyleAIUpdate ModuleTag_03
    Turret
      TurretTurnRate        = 0
      TurretPitchRate       = 0
      FirePitch             = 0            ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch           = Yes
      RecenterTime          = 5000         ; how long to wait during idle before recentering
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      NaturalTurretAngle    = 0
      InitiallyDisabled     = Yes
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking No
    PackTime = 2000
    UnpackTime = 2000
    TurretsFunctionOnlyWhenDeployed = Yes
    TurretsMustCenterBeforePacking = Yes
    ManualDeployAnimations = Yes
  End
  Locomotor = SET_NORMAL HandOfNurgleLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 185.0
  End

  ; Change the destruction OCL depending on which anthrax upgrade it is
  Behavior = SlowDeathBehavior ModuleTag_NurgleDeath00
    ExemptStatus   = WET
    ProbabilityModifier      = 25
    DestructionDelay         = 200
    DestructionDelayVariance = 100
    FX  = INITIAL  FX_GenericTankDeathEffect
    ;;;OCL = MIDPOINT OCL_GLANurgleLauncherExplodeBlue
    FX  = FINAL    FX_GenericTankDeathExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_NurgleDeath01
    RequiredStatus = WET
    ProbabilityModifier      = 25
    DestructionDelay         = 200
    DestructionDelayVariance = 100
    FX  = INITIAL  FX_GenericTankDeathEffect
    ;;;OCL = MIDPOINT OCL_GLANurgleLauncherExplodePurple
    FX  = FINAL    FX_GenericTankDeathExplosion
  End
  Behavior = StatusBitsUpgrade ModuleTag_NurgleDeath02
    TriggeredBy = Chem_Upgrade_GLAAnthraxGamma
    StatusToSet = WET
  End
    
  ; A crushing defeat
  Behavior = FXListDie ModuleTag_Death01
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_Death02
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End
  Behavior = CreateCrateDie ModuleTag_Death03
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior                 = TransitionDamageFX ModuleTag_Death04
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End

  Behavior = DestroyDie ModuleTag_Death05
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = FlammableUpdate ModuleTag_Death06
    AflameDuration     = 5000    ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay  = 500     ; this often.
  End

  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = EjectPilotDie ModuleTag_Crew00
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet0
    AirCreationList = OCL_TankCrewVet0
    VeterancyLevels = NONE +REGULAR
  End
  Behavior = EjectPilotDie ModuleTag_Crew01
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet1
    AirCreationList = OCL_TankCrewVet1
    VeterancyLevels = NONE +VETERAN
  End
  Behavior = EjectPilotDie ModuleTag_Crew02
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet2
    AirCreationList = OCL_TankCrewVet2
    VeterancyLevels = NONE +ELITE
  End
  Behavior = EjectPilotDie ModuleTag_Crew03
    DeathTypes = ALL -CRUSHED
    ExemptStatus = HIJACKED IS_CARBOMB
    GroundCreationList = OCL_TankCrewVet3
    AirCreationList = OCL_TankCrewVet3
    VeterancyLevels = NONE +HEROIC
  End

  Behavior = OverlordContain ModuleTag_Gun01
    Slots                   = 1
    DamagePercentToUnits    = 100%
    AllowInsideKindOf       = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PayloadTemplateName     = Chem_GLAHandOfNurgleGunTurret
    ExperienceSinkForRider  = No ; Turret receives gun upgrades as well
  End

  Behavior = WeaponBonusUpgrade ModuleTag_Bonus01
    TriggeredBy = Upgrade_GLAAPRockets
  End

  Behavior = LockWeaponCreate ModuleTag_LockWeapon01
    SlotToLock = PRIMARY ; Prevents indeterminate state plus two unpickable weapons equaling no attack.
  End

  Behavior = CommandSetUpgrade ModuleTag_ButtonChange01
    CommandSet = HandOfNurgleCommandSetUpgraded
    TriggeredBy = Chem_Upgrade_GLAAnthraxGamma
  End

  Behavior = AutoHealBehavior ModuleTag_Repair01
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End

  Geometry = BOX
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 9.0
  GeometryHeight = 14.0    
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME   
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End



