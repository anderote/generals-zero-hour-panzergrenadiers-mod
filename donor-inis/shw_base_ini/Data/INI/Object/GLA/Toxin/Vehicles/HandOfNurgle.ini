Object Chem_GLAHandOfNurgleGunTurret
  Draw                    = W3DDependencyModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    AttachToBoneInContainer = FIREPOINT01

    DefaultConditionState 
      Model         = UVHON_MG
      Turret              = TURRET
      TurretPitch         = TURRETEL
      WeaponFireFXBone    = PRIMARY MGMUZZLE
      WeaponRecoilBone    = PRIMARY TURRETEL
      WeaponMuzzleFlash   = PRIMARY MGMUZZLEFX
      WeaponLaunchBone    = PRIMARY MGMUZZLE
      WeaponFireFXBone    = SECONDARY MGMUZZLE
      WeaponRecoilBone    = SECONDARY TURRETEL
      WeaponMuzzleFlash   = SECONDARY MGMUZZLEFX
      WeaponLaunchBone    = SECONDARY MGMUZZLE
    End

    ConditionState = REALLYDAMAGED
      Model         = UVHON_MGD
      Turret              = TURRET
      TurretPitch         = TURRETEL
    End
  End

  ; ***DESIGN parameters ***
  Side             = GLAToxinGeneral
  EditorSorting    = SYSTEM
  TransportSlotCount = 1

  ExperienceValue     = 0 0 0 0   ; Experience point value at each level
  ExperienceRequired  = 0 100 200 500   ; Experience points needed to gain each level
  IsTrainable         = Yes             ; Can gain experience
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY NurgleGunTurretGround
  End
  WeaponSet
    Conditions = HERO
    Weapon = PRIMARY NurgleGunTurretGroundPlusOne
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY NurgleGunTurretGroundPlusOne
  End
  WeaponSet
    Conditions = HERO PLAYER_UPGRADE 
    Weapon = PRIMARY NurgleGunTurretGroundPlusTwo
  End

  ArmorSet
    Conditions     = None
    Armor          = InvulnerableAllArmor ; We can't be hurt on the field.  We share damage from the Avenger with his damage module
  End
  VisionRange     = 350

  ; *** ENGINEERING Parameters ***
  KindOf            = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CLICK_THROUGH IGNORED_IN_GUI SALVAGER WEAPON_SALVAGER

  Body            = StructureBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY
      TurretTurnRate      = 150
      TurretPitchRate     = 150
      AllowsPitch         = Yes
      NaturalTurretPitch  = 0
      MinIdleScanInterval = 1000    ; in milliseconds
      MaxIdleScanInterval = 3000    ; in milliseconds
      MinIdleScanAngle    = 0       ; in degrees off the natural turret angle
      MaxIdleScanAngle    = 90     ; in degrees off the natural turret angle
    End
    AutoAcquireEnemiesWhenIdle = Yes 
    MoodAttackCheckRate = 500 ; default is 2000
  End

  Behavior             = DestroyDie ModuleTag_04
    ;<No Data>
  End

  Behavior = WeaponBonusUpgrade ModuleTag_Bonus01
    TriggeredBy = Upgrade_GLAAPBullets
  End

  ;Scrap isn't passed from the parent unit to this unit. Using Geometry to make this larger than the parent unit looks funny when trying to build over it (red square)
  Behavior = WeaponSetUpgrade ModuleTag_CrateFix01
    TriggeredBy   = Upgrade_GLAAPBullets
  End

  Geometry            = BOX
  GeometryMajorRadius = 4.0
  GeometryMinorRadius = 4.0
  GeometryHeight      = 4.0
  GeometryIsSmall     = No      
  Shadow              = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End



