Object Chem_GLAVehicleAcidTruck

  ; *** ART Parameters ***
  SelectPortrait         = SSTerroristCarBomb_L
  ButtonImage            = SSTerroristCarBomb

  UpgradeCameo1 = Upgrade_GLAJunkRepair

  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model           = CVToxSpplyTk
      ShowSubObject   = BOX04
    End
     
    ConditionState    = REALLYDAMAGED
      Model           = CVToxSpplyTk_D
      ShowSubObject   = BOX04
    End

    ConditionState    = RUBBLE
      Model           = CVToxSpplyTk_D1
      ShowSubObject   = BOX04
    End

    TrackMarks              = EXTireTrack.tga

    LeftFrontTireBone           = TIRE01
    RightFrontTireBone          = TIRE02
    LeftRearTireBone            = TIRE03
    RightRearTireBone           = TIRE04
    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 2.5   ; This speed is added to the rotation speed when powersliding.

    Dust                    = RocketBuggyDust
    DirtSpray               = RocketBuggyDirtSpray
    PowerslideSpray         = RocketBuggyDirtPowerSlide

  End

  ; ***DESIGN parameters ***
  DisplayName   = OBJECT:WMDTruck
  Side          = GLAToxinGeneral
  EditorSorting = VEHICLE
  TransportSlotCount  = 5                 ;how many "slots" we take in a transport (0 == not transportable)
  BuildCost           = 3000
  BuildTime           = 30.0      ;in seconds
  VisionRange         = 100
  ShroudClearingRange = 110
  Prerequisites
    Object = Chem_GLAChemicalBunker
  End
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY ChemTruckSuicideWeapon_Buildings
  End
  WeaponSet
    Conditions = CARBOMB 
    Weapon = PRIMARY ChemTruckSuicideWeapon_Buildings
  End

  ArmorSet
    Conditions      = None
    Armor           = TruckArmor
    DamageFX        = TankDamageFX
  End

  CrusherLevel            = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel          = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet              = AcidTruckCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect             = DemolitionTruckVoiceSelect
  VoiceMove               = DemolitionTruckVoiceMove
  VoiceAttack             = DemolitionTruckVoiceAttack
  SoundMoveStart          = SupplyTruckMoveStart
  SoundMoveStartDamaged   = SupplyTruckMoveStart
  UnitSpecificSounds
    VoiceCreate           = DemolitionTruckVoiceCreate
    TruckLandingSound     = NoSound
    TruckPowerslideSound  = NoSound
    VoiceEnter            = DemolitionTruckVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE SALVAGER CANNOT_RETALIATE DISGUISER

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 300.0
    InitialHealth   = 300.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 500
    SubdualDamageHealRate = 300
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = No
  End
  Locomotor = SET_NORMAL SupplyTruckLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 100.0
  End

  ExperienceValue    = 400 400 400 400 ;Experience point value at each level

  Behavior = FXListDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior                       = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:SMOKE01 RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_09
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  ; A crushing defeat
  Behavior = DestroyDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior        = CreateCrateDie ModuleTag_11
    CrateData     = SalvageCrateData
  End

  Behavior = AutoHealBehavior ModuleTag_12
    HealingAmount = 2
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_GLAJunkRepair
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Bomb01
    DeathTypes = ALL
    ProbabilityModifier = 5
    ModifierBonusPerOverkillPercent = 20%  ; negative means less likely to pick this in the face of much damage, positive means more likely
    DestructionDelay = 2000
    DestructionDelayVariance = 100
    FX = INITIAL FX_Chem_WMDMist
    FX = FINAL FX_BuggyNewDeathExplosion
    OCL = FINAL OCL_GLAAcidTruckDeathEffect
  End

  Behavior = SpecialAbility ModuleTag_Disguise01
    SpecialPowerTemplate = SpecialAbilityDisguiseAsVehicle
    UpdateModuleStartsAttack = Yes
  End
  Behavior = SpecialAbilityUpdate ModuleTag_Disguise02
    SpecialPowerTemplate = SpecialAbilityDisguiseAsVehicle
    StartAbilityRange = 40000.0
  End
  Behavior = StealthUpdate ModuleTag_Disguise03
    StealthDelay                          = 1
    DisguisesAsTeam                       = Yes
    RevealDistanceFromTarget              = 100.0f
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
    DisguiseFX                            = FX_BombTruckDisguise
    DisguiseRevealFX                      = FX_BombTruckDisguiseReveal
    InnateStealth                         = Yes
    DisguiseTransitionTime                = 2000
    DisguiseRevealTransitionTime          = 1000 
  End

  Geometry = BOX
  GeometryMajorRadius = 17.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 14.0     
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length    

End