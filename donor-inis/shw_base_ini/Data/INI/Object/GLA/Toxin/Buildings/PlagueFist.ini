;Combination missile/structure I guess
;Thanks mp

Object PlagueFistMissile
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    ConditionState = NONE
      Model = UVHON_M
      ParticleSysBone = ROCKETFX01 TOSMissileLenzflare
      ParticleSysBone = ROCKETFX02 TOSMissileExhaust
      ParticleSysBone = ROCKETFX03 TOSMissileFlame
      ParticleSysBone = ROCKETFX04 TOSMissileLenzflare
    End
    ConditionState = RUBBLE
      Model = NONE
    End
  End
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:FuelAirBomb
  EditorSorting       = SYSTEM
  TransportSlotCount  = 1                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 75.0
  ShroudClearingRange = 75.0

  ArmorSet
    Conditions      = None
    Armor           = ProjectileArmor
    DamageFX        = EmptyDamageFX
  End
  
  ; *** ENGINEERING Parameters ***
  KindOf            = PRELOAD PROJECTILE UNATTACKABLE OBSTACLE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 100000.0
    InitialHealth   = 100000.0
  End

  Behavior = PhysicsBehavior ModuleTag_05
    Mass                = 90.0
    AerodynamicFriction = 1  ; this is now friction-per-sec
    ForwardFriction     = 33     ; this is now friction-per-sec
    CenterOfMassOffset  = 2  ; Default of 0 means nothing tips as it falls.  Positive tips forward, negative tips back
  End
  
  Behavior = MissileAIUpdate ModuleTag_06
    TryToFollowTarget   = No 
    FuelLifetime        = 0
    IgnitionDelay       = 0
    InitialVelocity     = 0                ; in dist/sec
    DistanceToTravelBeforeTurning = 0
    DistanceToTargetBeforeDiving  = 0
    DetonateCallsKill     = Yes
  End
  Locomotor = SET_NORMAL PlagueFistMissileLocomotor   ; yes, that's right.

  Behavior = DestroyDie ModuleTag_558
    ;nothing
  End

  ;---------- Begin DeathType testing ----------
  ;This should call DeathType NORMAL
  Behavior = HeightDieUpdate ModuleTag_Death00
    TargetHeight        = 2.0
    TargetHeightIncludesStructures = No
    OnlyWhenMovingDown  = Yes
    SnapToGroundOnDeath = Yes
    InitialDelay        = 500 ; Can't explode in the first second so we don't explode on the pad
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Death02
    DeathTypes    = NONE +DETONATED
    DeathWeapon   = PlagueFistDetonationWeaponGamma
    StartsActive  = Yes                        ; turned on by upgrade
  End

  ;These are commented out due to later issues with FireWeapons and Anthrax types
  ;I hit a structure
  ;Behavior = FireWeaponWhenDeadBehavior ModuleTag_Death01
    ;DeathTypes    = NONE +DETONATED
    ;DeathWeapon   = PlagueFistDetonationWeapon
    ;StartsActive  = Yes                        ; turned on by upgrade
    ;ConflictsWith = Chem_Upgrade_GLAAnthraxGamma
  ;End
  ;Behavior = FireWeaponWhenDeadBehavior ModuleTag_Death02
    ;DeathTypes    = NONE +DETONATED
    ;DeathWeapon   = PlagueFistDetonationWeaponGamma
    ;StartsActive  = No                        ; turned on by upgrade
    ;TriggeredBy   = Chem_Upgrade_GLAAnthraxGamma
  ;End

  ;I did not hit a structure. So I embed into the ground
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Death03
    DeathTypes    = NONE +NORMAL     ;ALL -DETONATED
    DeathWeapon   = PlagueFistEmbedWeapon
    StartsActive  = Yes
    ;ConflictsWith not required. Anthrax determined on the embedded missile
  End
  ;----------  End DeathType testing  ----------

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 6.0
End

