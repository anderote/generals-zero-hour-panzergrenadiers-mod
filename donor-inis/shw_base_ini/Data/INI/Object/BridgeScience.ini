;Maybe it will work after 1,000 other attempts
Object DestructibleBridge 
  ; *** ART Parameters ***

  Draw                 = W3DSupplyDraw ModuleTag_01    ;W3DModelDraw
    OkToChangeModelColor = No

    ; day
    ConditionState     = NONE
      Model            = CMFldBrdg
    End

    ConditionState     = DAMAGED
      Model            = CBBridgeArc_d
    End

    ConditionState         = REALLYDAMAGED
      Model                = CBBridgeArc_e
    End
    
    ConditionState         = RUBBLE
      Model                = CBBridgeArc_r
    End
  End

  ; ***DESIGN parameters ***
  DisplayName          = OBJECT:RailroadBridge
  EditorSorting        = STRUCTURE

  ArmorSet
    Conditions        = None
    Armor             = StructureArmor
    DamageFX          = EmptyDamageFX
  End

  ; *** ENGINEERING Parameters ***  
  IsBridge             = Yes
  RadarPriority        = STRUCTURE

  KindOf               = STRUCTURE IMMOBILE BRIDGE LANDMARK_BRIDGE SUPPLY_SOURCE NO_HEAL_ICON

  Body                 = StructureBody ModuleTag_02
    MaxHealth          = 2000.0
    InitialHealth      = 2000.0
  End

  Behavior                = BridgeBehavior ModuleTag_03
    LateralScaffoldSpeed  = 100.0
    VerticalScaffoldSpeed = 70.0
  End
  Behavior            = BridgeTowerBehavior ModuleTag_04
    ;No Data
  End
  Behavior            = BridgeScaffoldBehavior ModuleTag_05
    ;<NO DATA>
  End

  Behavior              = SupplyWarehouseCripplingBehavior ModuleTag_Build01
    SelfHealSupression  = 20000  ; Time since last damage until I can start to heal
    SelfHealDelay       = 500   ; Once I am okay to heal, how often to do so
    SelfHealAmount      = 5     ; And how much
    ; The Crippling part is tied to ReallyDamaged, or 30% health.
  End
  Behavior = SupplyWarehouseCreate ModuleTag_Build02
    ;nothing
  End
  Behavior = SupplyWarehouseDockUpdate ModuleTag_Build03
    AllowsPassthrough       = No ;You can't drive through this guy while docking.  Use this when the dock points are all outside
    NumberApproachPositions = -1 ; This is a Boneless dock, so this means infinite can approach
    StartingBoxes           = 0 ; Even if you use a script to set the cash value, this will determine graphically what "full" is.
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Death01
    DeathWeapon   = Demo_BombTruckNuclearBombDamage
    StartsActive  = Yes
  End

  Geometry            = BOX
  GeometryMajorRadius = 105.0
  GeometryMinorRadius = 40.0
  GeometryHeight      = 5.0
  GeometryIsSmall     = No
End