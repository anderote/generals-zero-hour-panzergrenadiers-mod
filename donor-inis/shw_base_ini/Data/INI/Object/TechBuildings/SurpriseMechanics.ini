Object BattleRoyaleAlien
  ; *** ART Parameters ***
  SelectPortrait         = SAWarpRift_L
  ButtonImage            = SAWarpRift_L
  
  UpgradeCameo1 = Upgrade_AmericaDroneArmor
  UpgradeCameo2 = Upgrade_USAFucusingCrystal
  
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model                           = AVLsrDrone
      Animation                       = AVLsrDrone.AVLsrDrone
      AnimationMode                   = LOOP
      Turret                          = TURRET
      ;Goes side-to-side and not up-down :( SWR Pls ;;;;TurretPitch                     = BARREL01
      WeaponMuzzleFlash               = PRIMARY   TURRETMS01
      WeaponFireFXBone                = PRIMARY   TURRETMS01
      WeaponLaunchBone                = PRIMARY   BARREL01
    End
    ConditionState = REALLYDAMAGED
      Model                           = AVLsrDrone_D
      Animation                       = AVLsrDrone_D.AVLsrDrone_D
    End
    ConditionState = RUBBLE
      Model                           = AVLsrDrone_D
      Animation                       = AVLsrDrone_D.AVLsrDrone_D
      AnimationMode                   = LOOP
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:IxInfiltrator
  EditorSorting       = VEHICLE
  Side                = Tech_Buildings
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 100.0 
  ShroudClearingRange = 600

  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY BattleRoyaleAlienLaserWeapon
    Weapon              = SECONDARY SuicideWeapon
    AutoChooseSources   = SECONDARY NONE
  End

  ArmorSet
    Conditions      = None
    Armor           = IxDroneArmor
    DamageFX        = None
  End

  BuildCost           = 2000
  BuildTime           = 20              ; in seconds  
  ExperienceValue     = 300 300 300 300 ; Experience point value at each level
  IsTrainable         = No             ; Can gain experience
  CommandSet          = IxInfiltratorCommandSetGround

  ; *** AUDIO Parameters ***
  VoiceSelect           = IxVoiceSelect
  VoiceMove             = IxVoiceSelect
  VoiceGuard            = IxVoiceSelect
  VoiceAttack           = IxVoiceAttack
  SoundAmbient          = WarpRiftAmbientLoop
  SoundAmbientRubble    = NoSound
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = IxVoiceCreate
    TurretMoveStart     = NoSound
    TurretMoveLoop      = NoSound
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority   = UNIT
  KindOf          = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT PRODUCED_AT_HELIPAD DRONE

  Body = ActiveBody ModuleTag_04
    MaxHealth       = 120.0
    InitialHealth   = 120.0
    
    SubdualDamageCap = 100
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 30
  End

  Behavior = ChinookAIUpdate ModuleTag_06
    Turret
      TurretTurnRate = 360
      ;TurretPitchRate = 360
      ;AllowsPitch = Yes
      ;MinPhysicalPitch      = 45
      ;FiresWhileTurning     = Yes
      ControlledWeaponSlots = PRIMARY
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
    End
    AutoAcquireEnemiesWhenIdle = No Stealthed
    MoodAttackCheckRate        = 250
  End
  Locomotor = SET_NORMAL IxDroneLocomotorAir

  Behavior = PhysicsBehavior ModuleTag_07
    Mass = 50.0
  End

  Behavior = StealthUpdate ModuleTag_Ix01
    StealthDelay                = 1500 ; msec
    StealthForbiddenConditions  = ATTACKING USING_ABILITY
    MoveThresholdSpeed          = 3
    InnateStealth               = Yes ;doesnt Require upgrade first
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End

  Behavior = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_ComancheDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = MaxHealthUpgrade ModuleTag_13345
    TriggeredBy   = Upgrade_AmericaDroneArmor
    AddMaxHealth  = 50.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO   ;Choices are PRESERVE_RATIO, ADD_CURRENT_HEALTH_TOO, and SAME_CURRENTHEALTH
  End

  Behavior = CreateObjectDie ModuleTag_IxDeath01
    DeathTypes = ALL
    CreationList = OCL_IxDroneDeathStart
  End

  Behavior = SlowDeathBehavior ModuleTag_04366
    DeathTypes = ALL
    DestructionDelay = 1
  End

  Geometry = BOX
  GeometryMajorRadius = 8.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 4.0     
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End









Object BattleRoyaleHeadquarters
  SelectPortrait         = SUPOWTruck_L
  ButtonImage            = SUPOWTruck

  Draw = W3DTruckDraw ModuleTag_01
    ConditionState = NONE
      Model = CVSoftTrk
    End
    
    ConditionState = REALLYDAMAGED
      Model = CVSoftTrk
    End
    
    ConditionState = RUBBLE
      Model = CVSoftTrk
    End

    TrackMarks              = EXTireTrack.tga

    LeftFrontTireBone           = Tire01
    RightFrontTireBone          = Tire02
    MidLeftRearTireBone         = Tire03
    MidRightRearTireBone        = Tire04
    LeftRearTireBone            = Tire05
    RightRearTireBone           = Tire06
    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 2.5   ; This speed is added to the rotation speed when powersliding.

    Dust                    = RocketBuggyDust
    DirtSpray               = RocketBuggyDirtSpray
    PowerslideSpray         = RocketBuggyDirtPowerSlide
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:BattleRoyaleHeadquarters
  EditorSorting    = VEHICLE
  Side             = Tech_Buildings

  BuildCost       = 2000
  BuildTime       = 20.0          ;in seconds    
  VisionRange     = 180
  ShroudClearingRange = 300
  TransportSlotCount  = 5                 ;how many "slots" we take in a transport (0 == not transportable)

  ExperienceValue = 150 150 150 150    ;Experience point value at each level
  IsTrainable = No            ;Cant gain experience

  ArmorSet
    Armor           = TruckArmor
    DamageFX        = CrushableCarDamageFX     ;But it's not crushable in this mode.
  End
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet        = CivilianVehicleLimoCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = BattleRoyaleHQVoiceSelect
  VoiceMove   = BattleRoyaleHQVoiceMove
  VoiceGuard  = BattleRoyaleHQVoiceMove
  SoundEnter  = POWTruckEnter
  SoundExit   = POWTruckExit
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate           = SentryDroneVoiceCreate   ;Generic 'unit ready'
    SoundMoveStart        = POWTruckUSAMoveStart
    SoundMoveStartDamaged = POWTruckUSAMoveStart

    TruckLandingSound     = RocketBuggyLand
    TruckPowerslideSound  = POWTruckUSAMoveStart
    VoiceEnter            = BattleRoyaleHQVoiceMove
  End

  ; *** ENGINEERING Parameters ***  
  KindOf          = PRELOAD SELECTABLE CAN_ATTACK VEHICLE TRANSPORT SCORE IGNORES_SELECT_ALL MP_COUNT_FOR_VICTORY CANNOT_RETALIATE COMMANDCENTER DRONE HERO ;No hijacks
  RadarPriority   = UNIT

  Body            = ActiveBody ModuleTag_02
    MaxHealth       = 1000.0
    InitialHealth   = 1000.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
  End
  Locomotor = SET_NORMAL BattleRoyaleHQLocomotor

  Behavior = TransportContain ModuleTag_04
    PassengersAllowedToFire = No
    Slots                 = 12
    ScatterNearbyOnExit   = Yes
    HealthRegen%PerSec    = 5
    DamagePercentToUnits  = 0%
    AllowInsideKindOf     = INFANTRY
    ForbidInsideKindOf    = BOAT
    ExitDelay         = 250
    NumberOfExitPaths = 3 ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit = Yes ; AI Will tell people to set their mood to Aggressive on exiting
  End

  Behavior = SlowDeathBehavior ModuleTag_05
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 2800
    FX = INITIAL FX_WindowsMechDeath
    Weapon = FINAL WindowsOneDeathWeapon
  End

  Behavior = CrushDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
    TotalCrushSound     = CarAlarm
    BackEndCrushSound   = CarAlarm
    FrontEndCrushSound  = CarAlarm
    TotalCrushSoundPercent    = 50   
    BackEndCrushSoundPercent  = 50
    FrontEndCrushSoundPercent = 50
  End
  Behavior = SlowDeathBehavior ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    DestructionDelay = 2800
    FX = INITIAL FX_WindowsMechDeath
    Weapon = FINAL WindowsOneDeathWeapon
  End

  Behavior = FXListDie ModuleTag_08
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_09
    DeathTypes = ALL -CRUSHED -SPLATTED
    CreationList = OCL_GenericCarExplode
  End
  Behavior = FXListDie ModuleTag_10
    DeathTypes = ALL -CRUSHED -SPLATTED -FLOODED
    DeathFX = FX_GenericCarExplode
  End
  Behavior = CreateObjectDie ModuleTag_11
    DeathTypes = NONE +SUICIDED
    CreationList = OCL_BurnedCarHull
  End

  Behavior = PhysicsBehavior ModuleTag_12
    Mass = 1000.0
  End

  Behavior = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:No PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_LimoDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_14
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = CreateCrateDie ModuleTag_CratesChange
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = GrantUpgradeCreate ModuleTag_Tech01
    UpgradeToGrant     = Upgrade_ChinaRadar
  End
  Behavior        = RadarUpgrade ModuleTag_Tech02
    TriggeredBy   = Upgrade_ChinaRadar
    DisableProof  = Yes ; Won't be disabled by power low
  End

  ;These two modules spawn an invisible drone that is a type of STRUCTURE and MP_COUNT_FOR_VICTORY
  ;(Scenario is with 0 other buildings.) When the Mobile CC is destroyed, the invisible drone falls to the ground and then dies like a normal battle drone
  ;When the drone dies, it is the last STRUCTURE you own, and thus you lose.
  Behavior = GrantUpgradeCreate ModuleTag_StructureConditions01
    UpgradeToGrant = Upgrade_AmericaBattleDrone
  End

  Behavior = ObjectCreationUpgrade ModuleTag_StructureConditions02
    UpgradeObject = OCL_AmericaCommandTankIsStructure
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End

  Behavior = AutoHealBehavior ModuleTag_Repair01
    StartsActive    = Yes
    HealingAmount   = 2
    HealingDelay    = 1000 ; msec
  End

  Geometry        = BOX
  GeometryIsSmall = Yes
  GeometryMajorRadius = 20.0
  GeometryMinorRadius = 8.0
  GeometryHeight  = 10.0
  Shadow          = SHADOW_VOLUME
End