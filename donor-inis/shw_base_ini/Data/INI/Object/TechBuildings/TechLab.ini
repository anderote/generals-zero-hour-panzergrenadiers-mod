    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End

  Behavior               = OCLSpecialPower ModuleTag_Lab03
    SpecialPowerTemplate = SuperweaponTechLabNapalmStrike
    OCL                  = SUPERWEAPON_TechLabNapalmStrike
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End
  Behavior               = OCLSpecialPower ModuleTag_Lab04
    SpecialPowerTemplate = SuperweaponTechLabClusterMines
    OCL                  = SUPERWEAPON_TechLabClusterMines
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End

  Behavior               = OCLSpecialPower ModuleTag_Lab05
    SpecialPowerTemplate = SuperweaponTechLabAnthraxBomb
    OCL                  = SUPERWEAPON_TechLabAnthraxBomb
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End
  Behavior               = OCLSpecialPower ModuleTag_Lab06
    SpecialPowerTemplate = SuperweaponTechLabRebelAmbush
    OCL                  = SUPERWEAPON_RebelAmbush2
    CreateLocation       = CREATE_AT_LOCATION
  End


  Behavior               = OCLSpecialPower ModuleTag_Lab07
    SpecialPowerTemplate = SuperweaponTechLabHyperSonicTerrorists
    OCL                  = SUPERWEAPON_TechLabTerroristStrike
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End
  Behavior               = OCLSpecialPower ModuleTag_Lab08
    SpecialPowerTemplate = SuperweaponTechLabPlasmaBomb
    OCL                  = SUPERWEAPON_TechLabPlasmaBomb
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End

  ;THAT WAS A FUN RIDE NO?
  Behavior           = OCLSpecialPower ModuleTag_Lab10
    SpecialPowerTemplate = SuperweaponGlaHijackerStrike
    OCL                  = SUPERWEAPON_HijackerStrike
    ReferenceObject      = ScavangedSalvageDecalObject
    CreateLocation       = CREATE_AT_LOCATION
  End

  Behavior = CommandSetUpgrade ModuleTag_CommandSetUpgrade01
    CommandSet = TechScienceLabCommandSetUpgraded
    TriggeredBy = Upgrade_TechLabTechnology
  End

  Behavior = CommandSetUpgrade ModuleTag_CommandSetUpgrade666
    CommandSet = TechScienceLabCommandSetUpgradedEasterEgg
    TriggeredBy = Upgrade_TechLabTechnology Upgrade_AmericaSentryDroneGun Upgrade_GLANerveGas Upgrade_ChinaHEShells
    RequiresAllTriggers = Yes
  End

  Behavior        = ModelConditionUpgrade ModuleTag_Armor01Visual
    ConditionFlag = USER_1
    TriggeredBy   = Upgrade_TechLabTechnology
  End

  Behavior = ProductionUpdate ModuleTag_Production01
    ; nothing
  End
  Behavior = DefaultProductionExitUpdate ModuleTag_Production02
    UnitCreatePoint   = X: 50.0  Y:0.0   Z:0.0
