Object TechNukeLab
  ;aka: the tall lab model, not the short one with the round roof.

  SelectPortrait       = SSSeekDestroy
  ButtonImage          = SSSeekDestroy

  UpgradeCameo1 = Upgrade_TechLabTechnology

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
  OkToChangeModelColor = Yes

    ; day
    ConditionState = NONE
      Model         = CBSECRTLAB
    End
    ConditionState = DAMAGED
      Model         = CBSECRTLAB_D
    End
    ConditionState = REALLYDAMAGED
      Model         = CBSECRTLAB_E
    End
    ConditionState = RUBBLE
      Model         = CBSECRTLAB_R
    End

    ; day garrisoned
    ConditionState = USER_1
      Model         = CBSECRTLAB_G
      Animation     = CBSECRTLAB_G.CBSECRTLAB_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED USER_1
      Model         = CBSECRTLAB_DG
      Animation     = CBSECRTLAB_DG.CBSECRTLAB_DG
      AnimationMode = LOOP
    End

    ; night
    ConditionState = NIGHT
      Model         = CBSECRTLAB_N
    End
    ConditionState = DAMAGED NIGHT
      Model         = CBSECRTLAB_DN
    End
    ConditionState = REALLYDAMAGED NIGHT
      Model         = CBSECRTLAB_EN
    End
    ConditionState = RUBBLE NIGHT
      Model         = CBSECRTLAB_RN
    End

        ; Night Upgraded
    ConditionState = NIGHT USER_1
      Model         = CBSECRTLAB_NG
      Animation     = CBSECRTLAB_NG.CBSECRTLAB_NG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT USER_1
      Model         = CBSECRTLAB_DNG
      Animation     = CBSECRTLAB_DNG.CBSECRTLAB_DNG
      AnimationMode = LOOP
    End
    ; Snow
    ConditionState = SNOW
      Model         = CBSECRTLAB_S
    End
    ConditionState = DAMAGED SNOW
      Model         = CBSECRTLAB_DS
    End
    ConditionState = REALLYDAMAGED SNOW
      Model         = CBSECRTLAB_ES
    End
    ConditionState = RUBBLE SNOW
      Model         = CBSECRTLAB_RS
    End
    ; snow garrisoned
    ConditionState = SNOW USER_1
      Model         = CBSECRTLAB_SG
      Animation     = CBSECRTLAB_SG.CBSECRTLAB_SG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW USER_1
      Model         = CBSECRTLAB_DSG
      Animation     = CBSECRTLAB_DSG.CBSECRTLAB_DSG
      AnimationMode = LOOP
    End
    ; night snow
    ConditionState = SNOW NIGHT
      Model         = CBSECRTLAB_SN
    End
    ConditionState = DAMAGED SNOW NIGHT
      Model         = CBSECRTLAB_DSN
    End
    ConditionState = REALLYDAMAGED SNOW NIGHT
      Model         = CBSECRTLAB_ESN
    End
    ConditionState = RUBBLE SNOW NIGHT
      Model         = CBSECRTLAB_RSN
    End
    ; night snow garrisoned
    ConditionState = SNOW NIGHT USER_1
      Model         = CBSECRTLAB_SNG
      Animation     = CBSECRTLAB_SNG.CBSECRTLAB_SNG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW NIGHT USER_1
      Model         = CBSECRTLAB_DSNG
      Animation     = CBSECRTLAB_DSNG.CBSECRTLAB_DSNG
      AnimationMode = LOOP
    End
  End

  ; *** AUDIO Parameters ***
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:TechScienceLab
  EditorSorting   = STRUCTURE
  Side = Tech_Buildings
  VisionRange    = 300.0
  ShroudClearingRange = 300

  CommandSet = TechScienceLabCommandSet

  ; *** ENGINEERING Parameters ***  
  KindOf            = PRELOAD STRUCTURE SELECTABLE IMMOBILE CAPTURABLE TECH_BUILDING CAN_ATTACK CONSERVATIVE_BUILDING
  Body              = ActiveBody ModuleTag_02
    MaxHealth       = 1000.0
    InitialHealth   = 1000.0
  End
  ArmorSet
    Conditions      = None
    Armor           = StructureArmor
    DamageFX        = StructureDamageFXNoShake
  End

  Behavior = FlammableUpdate ModuleTag_05
    FlameDamageLimit = 20         ;Catch fire if I take this much fire damage...
    FlameDamageExpiration = 2000  ;in a span of this long
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 25       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = TransitionDamageFX ModuleTag_06
    ;-------------DESIGNED FOR MEDIUM SIZED CIVILIAN BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1          = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionMediumExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionMediumShockwave
    ;--------------------------------------------------------------------------------------
    RubbleParticleSystem1              = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    RubbleParticleSystem2              = Bone:None RandomBone:No PSys:StructureTransitionMediumExplosion
    RubbleParticleSystem3              = Bone:None RandomBone:No PSys:StructureTransitionMediumShockwave
    RubbleParticleSystem4              = Bone:None RandomBone:No PSys:StructureTransitionMediumFlare 
  End

  Behavior = AIUpdateInterface ModuleTag_07
    AutoAcquireEnemiesWhenIdle = NO
  End

  Behavior = TechBuildingBehavior ModuleTag_09
  End
  
  Behavior = FXListDie ModuleTag_10
    DeathFX = FX_BuildingDie
  End

  Behavior = BaseRegenerateUpdate ModuleTag_11
  End 
  
  Behavior = KeepObjectDie ModuleTag_IWantRubble
  End

  Behavior = ProductionUpdate ModuleTag_123
  End
  
  Behavior        = CreateObjectDie ModuleTag_162
    CreationList  = OCL_LargeStructureDebris
  End

  Behavior        = FXListDie ModuleTag_182
    DeathFX       = FX_StructureMediumDeath
  End

  ;SpecialPower shenanigans here
