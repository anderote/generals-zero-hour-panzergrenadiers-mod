;------------------------------------------------------------------------------
Object TechArtilleryPlatform

  ; *** ART Parameters ***

  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      ; give it a model so it'll show up in WB
      Model = ZBARTPLAT
    End
  End

  BuildTime       = 0.0          ;in seconds    

  Side = Tech_Buildings
  EditorSorting = STRUCTURE
  BuildVariations = TechArtilleryPlatformMissile TechArtilleryPlatformNuke TechArtilleryPlatformHoming

  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE CAPTURABLE TECH_BUILDING CAN_ATTACK TECH_BASE_DEFENSE CONSERVATIVE_BUILDING
End

Object TechArtilleryPlatformMissile
  ; *** ART Parameters ***
  SelectPortrait         = SSRocketAttack ;SAArtillery_L
  ButtonImage            = SSRocketAttack ;SAArtillery
  
  ; ========================= Main Model ===============================
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ; DAY **************************************************************
    DefaultConditionState
      Model                           = ZBARTPLAT
      WeaponLaunchBone                = PRIMARY Muzzle
      WeaponMuzzleFlash               = PRIMARY MuzzleFX
      WeaponFireFXBone                = PRIMARY Muzzle
      WeaponRecoilBone                = PRIMARY Barrel
      Turret                          = Turret01
      TurretPitch                     = TurretEL
    End
    ConditionState  = CAPTURED
      Model         = ZBARTPLAT
    End
    
    ; DAMAGED **********************************************************
    ConditionState  = DAMAGED
      Model         = ZBARTPLAT_D
    End
    ConditionState  = DAMAGED CAPTURED
      Model         = ZBARTPLAT_D
    End
    
    ; REALLYDAMAGED ****************************************************
    ConditionState  = REALLYDAMAGED
      Model         = ZBARTPLAT_E
    End
    ConditionState  = REALLYDAMAGED CAPTURED
      Model         = ZBARTPLAT_E
      AnimationMode = LOOP
    End

    ; RUBBLE ***********************************************************
    ConditionState  = RUBBLE
      Model         = ZBARTPLAT_R
    End

    ; NIGHT ************************************************************
    ConditionState  = NIGHT
      Model         = ZBARTPLAT_N
    End
    ConditionState  = NIGHT CAPTURED
      Model         = ZBARTPLAT_N
    End
    
    ; NIGHT DAMAGED ****************************************************
    ConditionState  = DAMAGED NIGHT
      Model         = ZBARTPLAT_D
    End
    ConditionState  = DAMAGED NIGHT CAPTURED
      Model         = ZBARTPLAT_D
    End
    
    ; NIGHT REALLYDAMAGED **********************************************
    ConditionState  = REALLYDAMAGED NIGHT
      Model         = ZBARTPLAT_E
    End
    ConditionState  = REALLYDAMAGED NIGHT CAPTURED
      Model         = ZBARTPLAT_E
    End

    ; NIGHT RUBBLE *****************************************************
    ConditionState  = NIGHT RUBBLE
      Model         = ZBARTPLAT_R
    End
    
    ; SNOW *************************************************************
    ConditionState  = SNOW
      Model         = ZBARTPLAT_S
    End
    ConditionState  = SNOW CAPTURED
      Model         = ZBARTPLAT_S
    End
    
    ; SNOW DAMAGED *****************************************************
    ConditionState  = DAMAGED SNOW
      Model         = ZBARTPLAT_DS
    End
    ConditionState  = DAMAGED SNOW CAPTURED
      Model         = ZBARTPLAT_DS
    End
    
    ; SNOW REALLYDAMAGED ***********************************************
    ConditionState  = REALLYDAMAGED SNOW
      Model         = ZBARTPLAT_ES
    End
    ConditionState  = REALLYDAMAGED SNOW CAPTURED
      Model         = ZBARTPLAT_ES
    End

    ; SNOW RUBBLE ******************************************************
    ConditionState  = SNOW RUBBLE
      Model         = ZBARTPLAT_RS
    End
    
    ; SNOW NIGHT *******************************************************
    ConditionState  = SNOW NIGHT
      Model         = ZBARTPLAT_NS
    End
    ConditionState  = SNOW NIGHT CAPTURED
      Model         = ZBARTPLAT_NS
    End
    
    ; SNOW NIGHT DAMAGED ***********************************************
    ConditionState  = SNOW NIGHT DAMAGED
      Model         = ZBARTPLAT_DNS
    End
    ConditionState  = SNOW NIGHT DAMAGED CAPTURED
      Model         = ZBARTPLAT_DNS
    End
    
    ; SNOW NIGHT REALLYDAMAGED *****************************************
    ConditionState  = SNOW NIGHT REALLYDAMAGED
      Model         = ZBARTPLAT_ENS
    End
    ConditionState  = SNOW NIGHT REALLYDAMAGED CAPTURED
      Model         = ZBARTPLAT_ENS
    End
    
    ; SNOW NIGHT RUBBLE ************************************************
    ConditionState  = SNOW NIGHT RUBBLE
      Model         = ZBARTPLAT_RS
    End
    
  End

  ; ========================= Flag Model ===============================
  Draw = W3DModelDraw ModuleTag_02
    OkToChangeModelColor = Yes
    
    ; DEFAULT & DAMAGED ************************************************
    ConditionState  = NONE
      Model         = ZBODerrick_F
      Animation     = ZBODerrick_F.ZBODerrick_F
      AnimationMode = LOOP
    End
    AliasConditionState = DAMAGED
    
    ; REALLYDAMAGED*****************************************************
    ConditionState  = REALLYDAMAGED
      Model         = ZBODerrick_FE
      Animation     = ZBODerrick_FE.ZBODerrick_FE
      AnimationMode = LOOP
    End
    
    ; RUBBLE ***********************************************************
    ConditionState  = RUBBLE
      Model         = None
    End
  End
 ; *** AUDIO Parameters ***
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy
  
  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:TechArtilleryPlatformMissile
  EditorSorting   = STRUCTURE
  Side = Tech_Buildings
  VisionRange    = 360.0
  ShroudClearingRange = 360
  ; *** ENGINEERING Parameters ***  
  KindOf            = PRELOAD STRUCTURE SELECTABLE IMMOBILE CAPTURABLE TECH_BUILDING CAN_ATTACK TECH_BASE_DEFENSE CONSERVATIVE_BUILDING
  Body              = ActiveBody ModuleTag_03
    MaxHealth       = 2000.0
    InitialHealth   = 2000.0
    SubdualDamageCap        = 2400
    SubdualDamageHealRate   = 700
    SubdualDamageHealAmount = 100
  End
  ArmorSet
    Conditions      = None
    Armor           = StructureArmor
    DamageFX        = StructureDamageFXNoShake
  End
  WeaponSet
    Conditions           = None 
    Weapon               = PRIMARY ArtilleryPlatformGunMissile
  End
  CommandSet = ArtilleryPlatformCommandSet
  Behavior                = FlammableUpdate ModuleTag_05
    FlameDamageLimit      = 20    ; Catch fire if I take this much fire damage...
    FlameDamageExpiration = 2000  ; in a span of this long
    AflameDuration        = 5000  ; If I catch fire, I'll burn for this long...
    AflameDamageAmount    = 25    ; taking this much damage...
    AflameDamageDelay     = 500   ; this often.
  End
  Behavior = AIUpdateInterface ModuleTag_06
    Turret
      TurretTurnRate        = 180   // turn rate, in degrees per sec
      TurretPitchRate       = 180
      AllowsPitch           = Yes
      NaturalTurretPitch    = 45   
      GroundUnitPitch       = 10
      MinPhysicalPitch      = -20
      ControlledWeaponSlots = PRIMARY
      MinIdleScanInterval   = 250    ; in milliseconds
      MaxIdleScanInterval   = 250    ; in milliseconds
      MinIdleScanAngle      = 0       ; in degrees off the natural turret angle
      MaxIdleScanAngle      = 360     ; in degrees off the natural turret angle
    End
    AutoAcquireEnemiesWhenIdle = Yes ;ATTACK_BUILDINGS; defensive weapon
    MoodAttackCheckRate        = 250
  End

  Behavior             = FXListDie ModuleTag_07
    DeathFX            = WeaponFX_BombTruckDefaultBombDetonation
  End
  Behavior = BaseRegenerateUpdate ModuleTag_11
  End 
  Behavior = TransitionDamageFX ModuleTag_08
    ;-------------DESIGNED FOR MEDIUM SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
  End
  Behavior = TechBuildingBehavior ModuleTag_09
  End
  Behavior = FXListDie ModuleTag_10
    DeathFX = FX_BuildingDie
  End
  Behavior = KeepObjectDie ModuleTag_IWantRubble
  End

  Behavior = ProductionUpdate ModuleTag_12
  End
  Geometry              = BOX
  GeometryMajorRadius   = 23.0
  GeometryMinorRadius   = 21.0
  GeometryHeight        = 30.0
  GeometryIsSmall       = No
  Shadow                = SHADOW_VOLUME
End

