;Use Junk Fortification fence if this is made buildable
Object TechChickenCoop
  ; *** ART Parameters ***
  SelectPortrait         = Chicken
  ButtonImage            = Chicken

  Draw = W3DModelDraw ModuleTag_01
  OkToChangeModelColor = Yes
  
    ; day
    ConditionState = NONE
      Model         = CBNBarnCoo_G
      Animation     = CBNBarnCoo_G.CBNBarnCoo_G
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED
      Model         = CBNBarnCoo_DG
      Animation     = CBNBarnCoo_DG.CBNBarnCoo_DG
      AnimationMode = LOOP
    End
    AliasConditionState = REALLYDAMAGED

    ConditionState = RUBBLE
      Model         = CBNBarnCoo_R
    End
    
    ; night
    ConditionState = NIGHT
      Model         = CBNBarnCoo_NG
      Animation     = CBNBarnCoo_NG.CBNBarnCoo_NG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED NIGHT
      Model         = CBNBarnCoo_DNG
      Animation     = CBNBarnCoo_DNG.CBNBarnCoo_DNG
      AnimationMode = LOOP
    End
    AliasConditionState = REALLYDAMAGED NIGHT

    ConditionState = RUBBLE NIGHT
      Model         = CBNBarnCoo_RN
    End 
      
    ; Snow
    ConditionState = SNOW
      Model         = CBNBarnCoo_SG
      Animation     = CBNBarnCoo_SG.CBNBarnCoo_SG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW
      Model         = CBNBarnCoo_DSG
      Animation     = CBNBarnCoo_DSG.CBNBarnCoo_DSG
      AnimationMode = LOOP
    End
    AliasConditionState = REALLYDAMAGED SNOW

    ConditionState = RUBBLE SNOW
      Model         = CBNBarnCoo_RS
    End
    
    ; night snow
    ConditionState = SNOW NIGHT
      Model         = CBNBarnCoo_SNG
      Animation     = CBNBarnCoo_SNG.CBNBarnCoo_SNG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW NIGHT
      Model         = CBNBarnCoo_DSNG
      Animation     = CBNBarnCoo_DSNG.CBNBarnCoo_DSNG
      AnimationMode = LOOP
    End
    AliasConditionState = REALLYDAMAGED SNOW NIGHT

    ConditionState = RUBBLE SNOW NIGHT
      Model         = CBNBarnCoo_RSN
    End
  End

  ; ========================= Flag Model ===============================
  Draw = W3DModelDraw ModuleTag_Flag01
    OkToChangeModelColor = Yes
    
    ; DEFAULT & DAMAGED ************************************************
    ConditionState  = NONE
      Model         = ZBODerrick_F
      Animation     = ZBODerrick_F.ZBODerrick_F
      AnimationMode = LOOP
    End
    AliasConditionState = DAMAGED
    
    ; REALLYDAMAGED*****************************************************
    ConditionState  = REALLYDAMAGED
      Model         = ZBODerrick_FE
      Animation     = ZBODerrick_FE.ZBODerrick_FE
      AnimationMode = LOOP
    End
    
    ; RUBBLE ***********************************************************
    ConditionState  = RUBBLE
      Model         = None
    End
  End

  ; ***DESIGN parameters ***
  DisplayName   = OBJECT:TechChickenCoop
  EditorSorting = STRUCTURE
  Side          = Tech_Buildings

  ShroudClearingRange = 120

  ArmorSet
    Conditions      = None
    Armor           = StructureArmor
    DamageFX        = StructureDamageFXNoShake
  End

  ; ***AUDIO parameters ***
  SoundAmbient          = FarmAmbientLoop
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  CommandSet = TechChickenCoopCommandSet

  ; *** ENGINEERING Parameters ***
  RadarPriority       = STRUCTURE
  KindOf              = STRUCTURE SELECTABLE IMMOBILE CAPTURABLE TECH_BUILDING CONSERVATIVE_BUILDING AUTO_RALLYPOINT

  Body                  = StructureBody ModuleTag_02
    MaxHealth       = 2000.0
    InitialHealth   = 2000.0
  End

  Behavior = FlammableUpdate ModuleTag_04
    FlameDamageLimit      = 20         ;Catch fire if I take this much fire damage...
    FlameDamageExpiration = 2000  ;in a span of this long
    AflameDuration        = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount    = 25       ; taking this much damage...
    AflameDamageDelay     = 500       ; this often.
  End
  
  Behavior = TransitionDamageFX ModuleTag_05
    ;-------------DESIGNED FOR SMALL SIZED CIVILIAN BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1          = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
    ;---------------------------------------------------------------------------------------
    RubbleParticleSystem1              = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    RubbleParticleSystem2              = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    RubbleParticleSystem3              = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
    RubbleParticleSystem4              = Bone:None RandomBone:No PSys:StructureTransitionSmallFlare   
  End

  Behavior = FXListDie ModuleTag_06
    DeathFX = FX_BuildingDie
  End

  Behavior = TechBuildingBehavior ModuleTag_07
    ;<NO DATA>
  End

  Behavior = ProductionUpdate ModuleTag_08
    ;nada
  End
  Behavior = DefaultProductionExitUpdate ModuleTag_09
    UnitCreatePoint   = X:15.0  Y:-15.0   Z:0.0
    NaturalRallyPoint = X:26.0  Y:-15.0   Z:0.0 ;NaturalRallyPointX must always match GeometryMajorRadius! -ML
  End

  Behavior = KeepObjectDie ModuleTag_IWantRubble
  End

  Geometry              = BOX
  GeometryMajorRadius   = 26.0
  GeometryMinorRadius   = 34.0
  GeometryHeight        = 19.0
  GeometryIsSmall       = No
  Shadow                = SHADOW_VOLUME
End