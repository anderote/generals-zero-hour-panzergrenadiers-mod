Object MordorBalrog
  ;Moria was overrated

  SelectPortrait = MordorBalrog_L
  ButtonImage    = MordorBalrog_L

  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ParticlesAttachedToAnimatedBones = Yes 
    IgnoreConditionStates = REALLYDAMAGED

    DefaultConditionState
      Model             = mubalrog_skn
      IdleAnimation     = mubalrog_skl.mubalrog_idla 0 10
      IdleAnimation     = mubalrog_skl.mubalrog_idlb
      IdleAnimation     = mubalrog_skl.mubalrog_idlc
      AnimationMode     = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      TransitionKey     = TRANS_Stand
      WeaponMuzzleFlash = PRIMARY SWORDBONE
      WeaponFireFXBone  = PRIMARY SWORDBONE
      WeaponLaunchBone  = PRIMARY SWORDBONE
      WeaponMuzzleFlash = SECONDARY SWORDBONE
      WeaponFireFXBone  = SECONDARY SWORDBONE
      WeaponLaunchBone  = SECONDARY SWORDBONE
      WeaponMuzzleFlash = TERTIARY SWORDBONE
      WeaponFireFXBone  = TERTIARY SWORDBONE
      WeaponLaunchBone  = TERTIARY SWORDBONE

      ParticleSysBone = SWORDBONE BalrogSwordFlare   ;SWORD
      ParticleSysBone = SWORDBONE BalrogSwordEmbers  ;SWORD
      ParticleSysBone = MANEBONE BalrogManeFlare
      ParticleSysBone = MANEBONE BalrogManeEmbers
      ParticleSysBone = MANEBONE BalrogManeFire
      ParticleSysBone = RTWINGBONE DozerSmokeLight   ;BalrogWingSmokeLite
      ParticleSysBone = LFWINGBONE DozerSmokeLight   ;BalrogWingSmokeLite
      ParticleSysBone = RTWINGBONE BalrogWingEmbers
      ParticleSysBone = LFWINGBONE BalrogWingEmbers
      ParticleSysBone = BALROGSCREAM DozerSmokeHeavy

      ;ParticleSysBone = ZZZPassengerBon balrogHandSqueezeFlames FollowBone:Yes
      ;ParticleSysBone = ZZZPassengerBon balrogHandSqueezeFlames2 FollowBone:Yes
      ;ParticleSysBone = ZZZPassengerBon balrogHandSqueezeFlamesFinal FollowBone:Yes
      ;ParticleSysBone = ZZZPassengerBon BalrogHandSqueezeFlash FollowBone:Yes
      ;ParticleSysBone = ZZZPassengerBon BalrogHandSmoke FollowBone:Yes
      ;ParticleSysBone = RING_2_L balrogHandAsh FollowBone:Yes
      ;ParticleSysBone = RING_2_L balrogHandAshSmall FollowBone:Yes

      ;These are for the roar ability
      ;ParticleSysBone = BAT_JAW balrogFireBreath FollowBone:Yes
      ;ParticleSysBone = BAT_JAW balrogBreathEmbers FollowBone:Yes
      ;ParticleSysBone = BAT_JAW balrogBreathSmoke FollowBone:Yes
      ;ParticleSysBone = BAT_JAW balrogBreathProxy FollowBone:Yes

      WaitForStateToFinishIfPossible = TRANS_ReloadingA
      WaitForStateToFinishIfPossible = TRANS_ReloadingB
    End

    ConditionState      = MOVING
      Animation         = mubalrog_skl.mubalrog_wlka
      AnimationMode     = LOOP
      TransitionKey     = TRANS_Walking
      ;WaitForStateToFinishIfPossible = NONE
    End
    AliasConditionState = MOVING RELOADING_A
    AliasConditionState = MOVING RELOADING_B



    ;Ignore the a and b anims flipped. Force fire should be the horizontal swipe
    ConditionState = PREATTACK_A
      Model         = mubalrog_skn
      Animation     = balrog2_skl.balrog2_atb1                                      ;mubalrog_skl.mubalrog_atkb      ;Horizontal swipe
      AnimationMode = ONCE                                                          ;LOOP
      Flags         = START_FRAME_FIRST
      WaitForStateToFinishIfPossible = TRANS_ReloadingA
    End
    AliasConditionState = PREATTACK_A FIRING_A
    AliasConditionState = PREATTACK_A MOVING
    AliasConditionState = PREATTACK_A BETWEEN_FIRING_SHOTS_A
    AliasConditionState = CENTER_TO_LEFT PREATTACK_A FIRING_A
    AliasConditionState = CENTER_TO_LEFT PREATTACK_A MOVING
    AliasConditionState = CENTER_TO_LEFT PREATTACK_A BETWEEN_FIRING_SHOTS_A
    AliasConditionState = LEFT_TO_CENTER PREATTACK_A FIRING_A
    AliasConditionState = LEFT_TO_CENTER PREATTACK_A MOVING
    AliasConditionState = LEFT_TO_CENTER PREATTACK_A BETWEEN_FIRING_SHOTS_A

    ConditionState = RELOADING_A
      Model         = mubalrog_skn
      Animation     = balrog2_skl.balrog2_atb2                                      ;mubalrog_skl.mubalrog_atka      ;Horizontal swipe
      AnimationMode = ONCE
      TransitionKey = TRANS_ReloadingA
    End

    ConditionState = PREATTACK_B
      Model         = mubalrog_skn
      Animation     = balrog2_skl.balrog2_ata1                                      ;mubalrog_skl.mubalrog_atka      ;Overhead chop
      AnimationMode = ONCE                                                          ;LOOP
      Flags         = START_FRAME_FIRST
      WaitForStateToFinishIfPossible = TRANS_ReloadingB
    End
    AliasConditionState = PREATTACK_B FIRING_B
    AliasConditionState = PREATTACK_B MOVING
    AliasConditionState = PREATTACK_B BETWEEN_FIRING_SHOTS_B
    AliasConditionState = CENTER_TO_LEFT PREATTACK_B FIRING_B
    AliasConditionState = CENTER_TO_LEFT PREATTACK_B MOVING
    AliasConditionState = CENTER_TO_LEFT PREATTACK_B BETWEEN_FIRING_SHOTS_B
    AliasConditionState = LEFT_TO_CENTER PREATTACK_B FIRING_B
    AliasConditionState = LEFT_TO_CENTER PREATTACK_B MOVING
    AliasConditionState = LEFT_TO_CENTER PREATTACK_B BETWEEN_FIRING_SHOTS_B

    ConditionState = RELOADING_B
      Model         = mubalrog_skn
      Animation     = balrog2_skl.balrog2_ata2                                      ;mubalrog_skl.mubalrog_atka      ;Overhead chop
      AnimationMode = ONCE
      TransitionKey = TRANS_ReloadingB
    End

    ;maybe use packing/unpacking here with split anim?
    ConditionState = ATTACKING USING_WEAPON_C
      Model         = mubalrog_skn
      Animation     = mubalrog_skl.mubalrog_fira
      AnimationMode = LOOP
    End


    ;------------------------------------------------------------------
    ;Turning left codes
    ConditionState = CENTER_TO_LEFT
      Model = mubalrog_skn
      Animation = mubalrog_skl.MUBalrog_TRNB
      AnimationMode = LOOP
      ;AnimationSpeedFactorRange = 0.5 0.5
      ;TransitionKey = TRANS_Turn
      ;Flags = MAINTAIN_FRAME_ACROSS_STATES2
    End
    AliasConditionState = MOVING CENTER_TO_LEFT

    ConditionState = LEFT_TO_CENTER
      Model = mubalrog_skn
      Animation = mubalrog_skl.MUBalrog_TRNB
      AnimationMode = ONCE
      ;AnimationSpeedFactorRange = 0.5 0.5
      ;TransitionKey = TRANS_Turn
      ;Flags = MAINTAIN_FRAME_ACROSS_STATES2
    End
    AliasConditionState = MOVING LEFT_TO_CENTER


    ;------------------------------------------------------------------
    ;Turning right codes
    ConditionState = CENTER_TO_RIGHT
      Model = mubalrog_skn
      Animation = mubalrog_skl.MUBalrog_TRNA
      AnimationMode = LOOP
      ;AnimationSpeedFactorRange = 1.25 1.25
      ;TransitionKey = TRANS_Turn
      ;Flags = MAINTAIN_FRAME_ACROSS_STATES3
    End
    AliasConditionState = MOVING CENTER_TO_RIGHT    
    
    ConditionState = RIGHT_TO_CENTER
      Model = mubalrog_skn
      Animation = mubalrog_skl.MUBalrog_TRNA
      AnimationMode = ONCE
      ;AnimationSpeedFactorRange = 1.25 1.25
      ;TransitionKey = TRANS_Turn
      ;Flags = MAINTAIN_FRAME_ACROSS_STATES3
    End
    AliasConditionState = MOVING RIGHT_TO_CENTER


    ConditionState = DYING
      Animation = mubalrog_skl.mubalrog_diea
      AnimationMode = ONCE
      WaitForStateToFinishIfPossible = NONE
    End
    AliasConditionState = DYING CENTER_TO_RIGHT
    AliasConditionState = DYING RIGHT_TO_CENTER
    AliasConditionState = DYING CENTER_TO_LEFT
    AliasConditionState = DYING LEFT_TO_CENTER
    AliasConditionState = DYING MOVING CENTER_TO_RIGHT
    AliasConditionState = DYING MOVING RIGHT_TO_CENTER
    AliasConditionState = DYING MOVING CENTER_TO_LEFT
    AliasConditionState = DYING MOVING LEFT_TO_CENTER
  End

  ; ***DESIGN parameters ***
  DisplayName   = OBJECT:MordorBalrog
  Side          = Civilian
  EditorSorting = INFANTRY
  TransportSlotCount = 0     ; how many "slots" we take in a transport (0 == not transportable)

  MaxSimultaneousOfType = 1
  MaxSimultaneousLinkKey = Balroggy

  WeaponSet
    Conditions = None
    Weapon = PRIMARY MordorBalrogSwordSwipeWeapon
    Weapon = SECONDARY MordorBalrogSwordChopWeapon
    AutoChooseSources = PRIMARY FROM_SCRIPT FROM_AI DEFAULT_SWITCH_WEAPON
    AutoChooseSources = SECONDARY FROM_SCRIPT FROM_AI
    PreferredAgainst = SECONDARY STRUCTURE
    ShareWeaponReloadTime = Yes
  End

  ArmorSet
    Conditions      = None
    Armor           = MordorBalrogArmor
    DamageFX        = EmptyDamageFX
  End

  VisionRange = 400
  ShroudClearingRange = 666

  BuildCost = 50000
  BuildTime = 100.0     ; in seconds

  ExperienceValue    = 5000 10000 15000 20000     ; Experience point value at each level
  ExperienceRequired = 0 5000 15000 35000     ; Experience points needed to gain each level
  IsTrainable = Yes                     ; Can gain experience

  CrusherLevel   = 1      ;5      ; What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles     ;Set to 1 to avoid potential issues with attacking
  CrushableLevel = 10     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet = BalrogCommandSet

  ; *** AUDIO Parameters ***

  VoiceSelect           = BalrogVoiceSelect
  VoiceMove             = BalrogVoiceMove
  VoiceGuard            = BalrogVoiceMove
  VoiceAttack           = BalrogVoiceAttack
  SoundMoveLoop         = BalrogFootstep
  SoundMoveLoopDamaged  = BalrogFootstep
  SoundAmbient          = BalrogAmbientLoop
  SoundAmbientRubble    = NoSound
  UnitSpecificSounds
    VoiceCreate       = BalrogVoiceSelect
    VoiceBombard      = BalrogVoiceAttack
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK SCORE HERO NO_HEAL_ICON NO_GARRISON BOAT HUGE_VEHICLE DRONE IMMUNE_TO_CAPTURE EMP_HARDENED OBSTACLE MP_COUNT_FOR_VICTORY

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 5000.0
    InitialHealth   = 5000.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 0     ; turn rate, in degrees per sec
      NaturalTurretAngle = 0
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes ATTACK_BUILDINGS
  End
  Locomotor = SET_NORMAL BalrogLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 5000.0
    ShockResistance = 1.0
  End

  ; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 20000
    FX                  = INITIAL FX_MordorBalrogDie
  End
  ; --- end Death modules ---

  ClientUpdate         = AnimatedParticleSysBoneClientUpdate ModuleTag_Extra01
    ;no params
  End

  Behavior = AnimationSteeringUpdate ModuleTag_Turning01
    MinTransitionTime = 333
  End

  ;Behavior = GrantUpgradeCreate ModuleTag_Heat01
    ;UpgradeToGrant           = Upgrade_AmericaBattleDrone
  ;End

  ;Behavior = ObjectCreationUpgrade ModuleTag_Heat02
    ;UpgradeObject = OCL_MordorBalrogHeatFX
    ;TriggeredBy   = Upgrade_AmericaBattleDrone
  ;End

  Behavior = CommandButtonHuntUpdate  ModuleTag_Hunt01 ; allows use of command button hunt script with this unit. 
  End

  Behavior = StealthDetectorUpdate ModuleTag_ISeeYou01
    DetectionRate            = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange           = 400   ;Dustin, enable this for independant balancing!
  End

  Geometry               = CYLINDER
  GeometryMajorRadius    = 50.0  ;30.0
  GeometryMinorRadius    = 50.0  ;30.0   ;added
  GeometryHeight         = 75.0  ;70.0
  GeometryIsSmall        = No
  Shadow                 = SHADOW_DECAL    ; SHADOW_VOLUME has trouble with his wings.  Possibly because of the transparent bits
  ShadowSizeX            = 89  ; minimum elevation angle above horizon. Used to limit shadow length
  ShadowSizeY            = 89
  ShadowTexture          = ShadowI
End


;Holds FireWeaponUpdate for radius heat effect
;As well as stuff for the demoralize radius
Object MordorBalrogFXHelper
  ;MAIN CHASSIS
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = NONE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:BattleDrone
  Side                = Civilian
  EditorSorting       = SYSTEM
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  ArmorSet
    Conditions        = None
    Armor             = InvulnerableArmorForFlamingAndToxinIfnantry
    DamageFX          = EmptyDamageFX
  End
    
  VisionRange         = 150
  ShroudClearingRange = 150
  IsTrainable         = No

  ; *** ENGINEERING Parameters ***
  RadarPriority       = NOT_ON_RADAR
  KindOf = PRELOAD VEHICLE CAN_ATTACK DRONE NO_SELECT UNATTACKABLE

  Body = ActiveBody ModuleTag_03
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_04
    AutoAcquireEnemiesWhenIdle = No
  End
  Locomotor = SET_NORMAL BattleDroneLocomotor

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 50.0
    KillWhenRestingOnGround = Yes
    AllowBouncing = No
  End

  Behavior = SlavedUpdate ModuleTag_07
    GuardMaxRange = 5      ;How far away from master I'm allowed when master is idle (doesn't wander)
    GuardWanderRange = 5   ;How far away I'm allowed to wander from master while guarding.
    AttackRange = 5        ;How far away from master I'm allowed when master is attacking a target.
    AttackWanderRange = 5  ;How far I'm allowed to wander from target.
    ScoutRange = 5         ;How far away from master I'm allowed when master is moving.
    ScoutWanderRange = 5   ;How far I'm allowed to wander from scout point.
    StayOnSameLayerAsMaster = Yes
  End

  Behavior = DestroyDie ModuleTag_08
    DeathTypes = ALL
  End

  Behavior = FireWeaponUpdate ModuleTag_HeatFX01    ;Breaks the attacking animations if on Balrog :(
    Weapon = BalrogAmbientHeatWeapon
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 1
  GeometryMinorRadius = 1
  GeometryHeight = 1.0     
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End

Object BalrogDemoralizeCrate
  DisplayName = OBJECT:Crate 
  EditorSorting = SYSTEM
  KindOf = PARACHUTABLE CRATE
  Behavior = UnitCrateCollide ModuleTag_02
    ForbiddenKindOf = STRUCTURE PROJECTILE
    UnitCount = 1
    UnitName = BalrogDemoralizeInvisibleObject
  End
  Behavior = DeletionUpdate ModuleTag_03
    MinLifetime = 500
    MaxLifetime = 500
  End
  Geometry = CYLINDER
  GeometryMajorRadius = 250.0
  GeometryIsSmall = No
End

Object BalrogDemoralizeInvisibleObject
  VisionRange = 0.0
  EditorSorting = SYSTEM

  KindOf = NO_COLLIDE IMMOBILE UNATTACKABLE INERT

  Body = ImmortalBody ModuleTag_01
    MaxHealth = 1
    InitialHealth = 1
  End

  Behavior = WeaponBonusUpdate ModuleTag_2Spooky
    RequiredAffectKindOf  = CAN_ATTACK
    ForbiddenAffectKindOf = STRUCTURE DRONE
    BonusDuration         = 750
    BonusDelay            = 333
    BonusRange            = 100  ;250
    BonusConditionType    = DEMORALIZED_OBSOLETE
  End

  Behavior = DeletionUpdate ModuleTag_03
    MinLifetime = 1
    MaxLifetime = 1
  End
End

Object EBFDPlanetarium
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
  OkToChangeModelColor = Yes

    DefaultConditionState
      Model           = CINE_PlanetDune
    End
  End

  ; ***DESIGN parameters ***
  DisplayName     = OBJECT:Structure
  EditorSorting   = SYSTEM    ;GET IT? SYSTEM? LIKE, LIKE A SOLAR SYSTEM?
  ArmorSet
    Conditions    = None
    Armor         = StructureArmor
    DamageFX      = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***  
  KindOf                = STRUCTURE IMMOBILE NO_SELECT NO_HEAL_ICON
  Body                  = ActiveBody ModuleTag_02
    MaxHealth       = 2000.0
    InitialHealth   = 2000.0
  End

  Behavior = DestroyDie ModuleTag_03
    ;nothing
  End

  Geometry              = BOX
  GeometryMajorRadius   = 1.0
  GeometryMinorRadius   = 1.0
  GeometryHeight        = 1.0
  GeometryIsSmall       = No
  Shadow                = None
End