    Weapon              = PRIMARY   SpectreGattlingGunUnit
    Weapon              = SECONDARY SpectreHowitzerGunUnit
  End

  CommandSet = GenericCommandSet

  ExperienceValue = 250 360 470 580    ;Experience point value at each level
  ExperienceRequired = 0 720 1645 2900  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience

  BuildCost = 3500
  BuildTime = 45.0          ;in seconds


  ; *** AUDIO Parameters ***
  VoiceSelect    = SpectreGunshipVoiceSelect
  VoiceMove      = SpectreGunshipVoiceMove
  VoiceGuard     = SpectreGunshipVoiceMove
  VoiceAttack    = SpectreGunshipVoiceAttack
  VoiceAttackAir = SpectreGunshipVoiceAttack
  SoundAmbient   = SpectreGunshipAmbientLoop
  SoundAmbientRubble    = NoSound
  UnitSpecificSounds
    Afterburner    = SpectreGunshipAfterburnerLoop
    HowitzerFire   = SpectreHowitzerWeapon
    SoundEject     = PilotSoundEject
    VoiceEject     = PilotVoiceEject
    VoiceCreate    = SpectreGunshipVoiceCreate
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_ATTACK VEHICLE AIRCRAFT SCORE SELECTABLE ;EMP_HARDENED

  Body = ActiveBody ModuleTag_03
    MaxHealth       = 400.0
    InitialHealth   = 400.0
  End

  Behavior                          = JetSlowDeathBehavior ModuleTag_04
    DestructionDelay                = 99999999  ; destruction will happen when we
    RollRate                        = 0.5
    RollRateDelta                   = 100%      ;each frame, rollrate = rollrate * rollrateDelta
    PitchRate                       = 0.5
    FallHowFast                     = 110.0%    ;Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath                  = FX_SpectreGunshipExplosionLight
    OCLInitialDeath                 = None
    DelaySecondaryFromInitialDeath  = 500       ; in milliseconds
    FXSecondary                     = FX_spectreDeathExplosion
    OCLSecondary                    = None
    FXHitGround                     = FX_spectreGunshipDeathExplosion
    OCLHitGround                    = OCL_A10DeathHitGround
    DelayFinalBlowUpFromHitGround   = 200       ; in milliseconds
  ; FXFinalBlowUp                   = FX_spectreGunshipDeathExplosion
    OCLFinalBlowUp                  = OCL_SpectreDeathFinalBlowUp
  End

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 500.0
  End

  Behavior = JetAIUpdate ModuleTag_07
    Turret
      RecenterTime = 1
      TurretTurnRate = 360
      TurretPitchRate = 280
      MinPhysicalPitch = -70
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY
    End
    AltTurret
      RecenterTime = 1
      TurretTurnRate = 360
      TurretPitchRate = 280
      MinPhysicalPitch = -70
      AllowsPitch = Yes
      ControlledWeaponSlots = SECONDARY TERTIARY
    End
    TurretsLinked = Yes
    AutoAcquireEnemiesWhenIdle = Yes
    
    OutOfAmmoDamagePerSecond  = 10%  ; amount of damage to take per SEC (not per frame) when out of ammo
    TakeoffDistForMaxLift     = 0%   ; larger numbers give more lift sooner when taking off
    TakeoffPause              = 500
    MinHeight                 = 2
    ReturnToBaseIdleTime      = 10000         ; if idle for this long, return to base, even if not out of ammo
  End
  Locomotor = SET_NORMAL UnitSpectreGunshipOrbitLocomotor ;RaptorJetLocomotor
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor

  Behavior = EjectPilotDie ModuleTag_663
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
    ExemptStatus = HIJACKED
    VeterancyLevels =  ALL -REGULAR ;only vet+ gives pilot
  End

  Behavior = VeterancyGainCreate ModuleVet_664
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_PilotEliteTraining
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_665
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0 ;Increases experience gained by an additional 100%
  End

  Behavior = GrantUpgradeCreate ModuleTag_PilotEnter666
    UpgradeToGrant = Upgrade_AmericaCountermeasures
  End

  Behavior = FlammableUpdate ModuleTag_08
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior                = ArmorUpgrade ModuleTag_Armor01
    TriggeredBy           = Upgrade_AmericaCountermeasures
  End

  Behavior                = CountermeasuresBehavior ModuleTag_11
    TriggeredBy           = Upgrade_AmericaCountermeasures
    FlareTemplateName     = CountermeasureFlare
    FlareBoneBaseName     = Flare ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize            = 4     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle        = 90.0  ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor  = 2.0   ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys   = 1000  ; Time between flare volleys
    NumberOfVolleys       = 5     ; Number of times the volleys will fire before reloading
    ReloadTime            = 0     ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate           = 30%   ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 0     ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay     = 200   ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End

  Behavior = StealthUpdate ModuleTag_Stealth01
    StealthDelay                          = 1500 ; msec
    StealthForbiddenConditions            = FIRING_PRIMARY FIRING_SECONDARY ATTACKING TAKING_DAMAGE
    FriendlyOpacityMin                    = 50.0%
    FriendlyOpacityMax                    = 100.0%
    InnateStealth                         = No
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End

  Behavior = StealthUpgrade ModuleTag_Stealth02
    TriggeredBy = AirF_Upgrade_StealthComanche
  End

;;;;;;;;  ClientUpdate             = AnimatedParticleSysBoneClientUpdate ModuleTag_Client01
;;;;;;;;  End                  ; This allows the wingtip trails to stay stuck to the retractable wings
  

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 30.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 8.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
  Scale = 0.70
End