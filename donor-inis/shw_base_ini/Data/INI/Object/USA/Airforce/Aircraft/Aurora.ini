      ShowSubObject     = VULCAN01 VULCAN02
      ParticleSysBone   = WingTip01 SpectreContrail
      ParticleSysBone   = WingTip02 SpectreContrail
    End

    ConditionState    = MOVING
      Model           = AVSpectre                 
      Flags           = MAINTAIN_FRAME_ACROSS_STATES
