      ParticleSysBone = Engine02 SpectreEngineFlare
      ParticleSysBone = Engine03 SpectreEngineFlare
      ParticleSysBone = Engine04 SpectreEngineFlare
    End

    ConditionState = RUBBLE
      Model           = AVSpectre_D1
