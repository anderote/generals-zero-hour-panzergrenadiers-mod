;Originally by AnusPanda.
;Improved and changed for Chaos Mod
Object Lazr_AmericaTankBigLaserTank
  ; *** ART Parameters ***
  SelectPortrait         = 12AmericaBigLaserTank_L
  ButtonImage            = 12AmericaBigLaserTank
  
  UpgradeCameo1 = Upgrade_AmericaBattleDrone
  UpgradeCameo2 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo3 = Upgrade_USAFucusingCrystal
  ;UpgradeCameo4 = 
  ;UpgradeCameo5 = 
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    InitialRecoilSpeed = 100
    MaxRecoilDistance = 3.2
    RecoilDamping = 1.6
    RecoilSettleSpeed = 12

    DefaultConditionState
      Model = AVBLTnk
      WeaponFireFXBone = PRIMARY MUZZLE01
      ;;;WeaponRecoilBone = PRIMARY BARREL01    ;Looks... wrong with this recoiling
      WeaponLaunchBone = PRIMARY NONE   ;;MUZZLE01
    End

    ConditionState = REALLYDAMAGED
      Model = AVBLTnk_D
    End

    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = -2.0
    TreadDriveSpeedFraction = 0.2
    TreadPivotSpeedFraction = 0.4
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:USBLT
  Side                   = AmericaLaserGeneral
  EditorSorting          = VEHICLE
  TransportSlotCount     = 6

  WeaponSet
    Conditions           = None
    Weapon               = PRIMARY BLTParticleCannonWeapon
  End
  WeaponSet
    Conditions           = CARBOMB 
    Weapon               = PRIMARY BLTParticleCannonWeapon
  End

  ArmorSet
    Conditions           = None
    Armor                = BLTArmor
    DamageFX             = TankDamageFX
  End

  BuildCost              = 2500
  BuildTime              = 25
  VisionRange            = 200
  ShroudClearingRange    = 300

  EnergyProduction = -4

  Prerequisites
    Object = Lazr_AmericaParticleCannonUplink Lazr_AmericaParticleBombLauncher     ;|| OR
  End

  ExperienceValue    = 350 700 1150 1500    ;Experience point value at each level
  ExperienceRequired = 0 1500 4500 10000     ;Experience points needed to gain each level
  IsTrainable            = Yes
  CrusherLevel           = 2
  CrushableLevel         = 2
  CommandSet             = AmericaTankAvengerCommandSet    ;Has Battle Drone but no IR Smoke
  
  ; *** AUDIO Parameters ***
  VoiceSelect           = AmericaBLTVoiceSelect
  VoiceMove             = AmericaBLTVoiceMove
  VoiceGuard            = AmericaBLTVoiceMove
  VoiceAttack           = AmericaBLTVoiceAttack
  SoundMoveStart        = CrusaderTankMoveStart
  SoundMoveStartDamaged = CrusaderTankMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = AmericaBLTVoiceCreate
    VoiceEnter          = AmericaBLTVoiceMove
    SoundEject          = PilotSoundEject
    VoiceEject          = PilotVoiceEject
    VoiceCrush          = AmericaBLTVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority          = UNIT
  KindOf                 = PRELOAD SELECTABLE CAN_ATTACK VEHICLE SCORE POWERED
  
  Body                   = ActiveBody ModuleTag_02
    MaxHealth       = 550.0
    InitialHealth   = 550.0
    SubdualDamageCap = 1000
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 25
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking No
  End
  Locomotor = SET_NORMAL 12AmericaBLTLoco

  Behavior = PhysicsBehavior ModuleTag_04
    Mass                 = 350.0
  End

  Behavior = ObjectCreationUpgrade ModuleTag_05
    UpgradeObject = OCL_AmericanBattleDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_06
    UpgradeObject = OCL_AmericanScoutDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_20
    UpgradeObject = OCL_AmericanHellfireDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ProductionUpdate ModuleTag_07
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_08
    TriggeredBy   = Upgrade_AmericaAdvancedTraining
    AddXPScalar   = 1.0 ;Increases experience gained by an additional 100%
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_10
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 500
    DestructionDelayVariance  = 100
    FX  = INITIAL  FX_GenericTankDeathEffect
    OCL = MIDPOINT OCL_LaserTankDeathEffect
    FX  = FINAL    FX_GenericTankDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 2000
    DestructionDelayVariance  = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_LaserTankDeathEffect  
    FX  = FINAL    FX_GenericTankDeathExplosion
  End

  Behavior                 = TransitionDamageFX ModuleTag_12
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = DestroyDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_14
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateObjectDie ModuleTag_15
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End

  Behavior                    = CreateCrateDie ModuleTag_CratesChange
   CrateData             = SalvageCrateData
   CrateData             = EliteTankCrateData
   CrateData             = HeroicTankCrateData
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000
    AflameDamageAmount = 3
    AflameDamageDelay = 500
  End

  Behavior = EjectPilotDie ModuleTag_17
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
    ExemptStatus = HIJACKED
    VeterancyLevels =  ALL -REGULAR ;only vet+ gives pilot
  End

  Behavior = EjectPilotDie ModuleTag_HijackerEmerge01
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Geometry               = BOX
  GeometryMajorRadius    = 15.0
  GeometryMinorRadius    = 10.0
  GeometryHeight         = 10.0     
  GeometryIsSmall        = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End