Object Lazr_AmericaVehicleIxDrone
;list of bones on this model:
;ANIMATIONBONE
;BARREL01
;CYLINDER01 "03 "04 "05 "07
;HOUSECOLOR01 "02
;TUBE01
;TURRET
;TURRETMS01
;

  ; *** ART Parameters ***
  SelectPortrait         = SAWarpRift_L
  ButtonImage            = SAWarpRift_L
  
  UpgradeCameo1 = Upgrade_AmericaDroneArmor
  UpgradeCameo2 = Upgrade_USAFucusingCrystal
  
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model                           = AVLsrDrone
      Animation                       = AVLsrDrone.AVLsrDrone
      AnimationMode                   = LOOP
      Turret                          = TURRET
      ;Goes side-to-side and not up-down :( SWR Pls ;;;;TurretPitch                     = BARREL01
      WeaponMuzzleFlash               = PRIMARY   TURRETMS01
      WeaponFireFXBone                = PRIMARY   TURRETMS01
      WeaponLaunchBone                = PRIMARY   BARREL01
    End
    ConditionState = REALLYDAMAGED
      Model                           = AVLsrDrone_D
      Animation                       = AVLsrDrone_D.AVLsrDrone_D
    End
    ConditionState = RUBBLE
      Model                           = AVLsrDrone_D
      Animation                       = AVLsrDrone_D.AVLsrDrone_D
      AnimationMode                   = LOOP
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:IxInfiltrator
  EditorSorting       = VEHICLE
  Side                = AmericaLaserGeneral
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 200.0 
  ShroudClearingRange = 600

  Prerequisites
    Object            = Lazr_AmericaAirfield
    Object            = Lazr_AmericaStrategyCenter
  End

  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY IxLaserWeapon
    Weapon              = SECONDARY SuicideWeapon
    AutoChooseSources   = SECONDARY NONE
  End
  WeaponSet
    Conditions          = PLAYER_UPGRADE
    Weapon              = PRIMARY IxLaserWeaponUpgraded
    Weapon              = SECONDARY SuicideWeapon
    AutoChooseSources   = SECONDARY NONE
  End

  ArmorSet
    Conditions      = None
    Armor           = IxDroneArmor
    DamageFX        = None
  End

  BuildCost           = 2000
  BuildTime           = 20              ; in seconds  
  ExperienceValue     = 300 300 300 300 ; Experience point value at each level
  IsTrainable         = No             ; Can gain experience
  CommandSet          = IxInfiltratorCommandSetGround

  ; *** AUDIO Parameters ***
  VoiceSelect           = IxVoiceSelect
  VoiceMove             = IxVoiceSelect
  VoiceGuard            = IxVoiceSelect
  VoiceAttack           = IxVoiceAttack
  SoundAmbient          = WarpRiftAmbientLoop
  SoundAmbientRubble    = NoSound
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = IxVoiceCreate
    TurretMoveStart     = NoSound
    TurretMoveLoop      = NoSound
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority   = UNIT
  KindOf          = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT PRODUCED_AT_HELIPAD DRONE

  Body = ActiveBody ModuleTag_04
    MaxHealth       = 120.0
    InitialHealth   = 120.0
    
    SubdualDamageCap = 100
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 30
  End

  Behavior = ChinookAIUpdate ModuleTag_06
    Turret
      TurretTurnRate = 360
      ;TurretPitchRate = 360
      ;AllowsPitch = Yes
      ;MinPhysicalPitch      = 45
      ;FiresWhileTurning     = Yes
      ControlledWeaponSlots = PRIMARY
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
    End
    AutoAcquireEnemiesWhenIdle = No Stealthed
    MoodAttackCheckRate        = 250
  End
  Locomotor = SET_NORMAL IxDroneLocomotorAir

  Behavior = PhysicsBehavior ModuleTag_07
    Mass = 50.0
  End

  Behavior = StealthUpdate ModuleTag_Ix01
    StealthDelay                = 1500 ; msec
    StealthForbiddenConditions  = ATTACKING USING_ABILITY
    MoveThresholdSpeed          = 3
    InnateStealth               = Yes ;doesnt Require upgrade first
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End

  Behavior = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_ComancheDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = WeaponSetUpgrade ModuleTag_Crystal01
    TriggeredBy = Upgrade_USAFucusingCrystal
  End

  Behavior = WeaponBonusUpgrade ModuleTag_Crystal02
    TriggeredBy = Upgrade_USAFucusingCrystal
  End

  Behavior = MaxHealthUpgrade ModuleTag_13345
    TriggeredBy   = Upgrade_AmericaDroneArmor
    AddMaxHealth  = 50.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO   ;Choices are PRESERVE_RATIO, ADD_CURRENT_HEALTH_TOO, and SAME_CURRENTHEALTH
  End

  Behavior = CreateObjectDie ModuleTag_IxDeath01
    DeathTypes = ALL
    CreationList = OCL_IxDroneDeathStart
  End

  Behavior = SlowDeathBehavior ModuleTag_04366
    DeathTypes = ALL
    DestructionDelay = 1
  End

  Geometry = BOX
  GeometryMajorRadius = 8.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 4.0     
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length

End

