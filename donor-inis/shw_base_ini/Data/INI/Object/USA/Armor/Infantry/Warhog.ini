Object Warhog  ;Its a hog crank hog world
  ; *** ART Parameters ***
  SelectPortrait         = Warhog_L
  ButtonImage            = Warhog

  Draw = W3DOverlordTruckDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    DefaultConditionState 
      Model             = AIWarhog_SKN
      IdleAnimation     = AIWarhog_SKL.AIWarhog_IDLEA 0 5
      ;IdleAnimation     = AIWarhog_SKL.AIWarhog_IDLEB 0 5
      AnimationMode     = ONCE
      Turret            = Turret
      ;WeaponMuzzleFlash = PRIMARY MUZZLEFX
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponLaunchBone  = PRIMARY Muzzle
      HideSubObject = MUZZLEFX
    End

    ConditionState      = MOVING
      Animation         = AIWarhog_SKL.AIWarhog_RUNA 30
      AnimationMode     = LOOP
      Flags             = RANDOMSTART
      ParticleSysBone   = None InfantryDustTrails
    End
    AliasConditionState = MOVING FIRING_A

    ConditionState = USING_WEAPON_A
      Animation         = AIWarhog_SKL.AIWarhog_ATKA
      AnimationMode     = LOOP
    End
    AliasConditionState = FIRING_A


    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = None
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:Warhog
  Side                = AmericaArmorGeneral
  EditorSorting       = VEHICLE
  TransportSlotCount  = 2                 ;how many "slots" we take in a transport (0 == not transportable)
  
  WeaponSet
    Weapon            = PRIMARY WarhogMinigunWeapon
  End

  ArmorSet
    Conditions        = None
    Armor             = TruckArmor
    DamageFX          = HeavyTankDamageFX
  End

  Prerequisites
    Object = Armor_AmericaStrategyCenter
  End

  BuildCost       = 2500
  BuildTime       = 24.0          ;in seconds    
  VisionRange     = 250
  ShroudClearingRange = 300

  ExperienceValue    = 200 250 325 400 ;Experience point value at each level
  ExperienceRequired = 0 500 1137 2000 ;Experience points needed to gain each level
  IsTrainable        = Yes             ;Can gain experience
  CrusherLevel       = 0  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel     = 1  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet         = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = OverlordTankVoiceSelect
  VoiceMove = OverlordTankVoiceMove
  VoiceGuard = OverlordTankVoiceMove
  VoiceAttack = OverlordTankVoiceAttack

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = OverlordTankVoiceCreate
    VoiceEnter = OverlordTankVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE EMP_HARDENED DRONE IMMUNE_TO_CAPTURE
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 400.0
    InitialHealth   = 400.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 100  ;Hog cannot be shutdown
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 0
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL WarhogLocomotor

  Behavior = OverlordContain ModuleTag_Gun01
    Slots                   = 1
    DamagePercentToUnits    = 100%
    AllowInsideKindOf       = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret      = No
    PayloadTemplateName     = WarhogMissilePods
    ExperienceSinkForRider  = Yes ; Turret receives gun upgrades as well
  End

  Behavior = PhysicsBehavior ModuleTag_14
    Mass = 200.0
  End

  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 0
    ;FX                  = INITIAL FX_RangerDie
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FX                  = FINAL FX_BarrelDeathExplosion
    Weapon              = FINAL BarrelWeapon
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End

  Behavior = TransitionDamageFX ModuleTag_18
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_OverlordDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Geometry = BOX
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0     
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 20;
  ShadowSizeY = 20;
  ShadowTexture = ShadowI
  BuildCompletion = APPEARS_AT_RALLY_POINT
End

Object WarhogMissilePods
  Draw = W3DDependencyModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    AttachToBoneInContainer = FIREPOINT01

    DefaultConditionState 
      Model = AIWarhog_POD
      WeaponFireFXBone   = PRIMARY WeaponA
      WeaponLaunchBone   = PRIMARY WeaponA
    End
  End

  ; ***DESIGN parameters ***
  Side             = AmericaArmorGeneral
  EditorSorting    = SYSTEM
  TransportSlotCount = 1

  ExperienceValue     = 0 0 0 0   ; Experience point value at each level
  ExperienceRequired  = 0 0 0 0   ; Experience points needed to gain each level
  IsTrainable         = No             ; Can gain experience
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY WarhogMissilePodWeapon
  End

  ArmorSet
    Conditions     = None
    Armor          = InvulnerableAllArmor ; We can't be hurt on the field.  We share damage from the Avenger with his damage module
  End
  ShroudClearingRange = 280
  VisionRange         = 400

  ; *** ENGINEERING Parameters ***
  KindOf            = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK SALVAGER CLICK_THROUGH IGNORED_IN_GUI

  Body            = StructureBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes 
    MoodAttackCheckRate = 1000 ; default is 2000
  End

  Behavior             = DestroyDie ModuleTag_04
    ;<No Data>
  End

  Geometry            = BOX
  GeometryMajorRadius = 4.0
  GeometryMinorRadius = 4.0
  GeometryHeight      = 4.0
  GeometryIsSmall     = No      
  Shadow              = None
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End