;You should play that mod too
;I've cleaned this ini up as well. God damn OFS is like a dumpster fire on the inside <3
Object Armor_AmericaRocketeer
  ; *** ART Parameters ***
  SelectPortrait = SARocketeer_L
  ButtonImage = SARocketeer

  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo2 = Upgrade_AmericaCountermeasures

  Draw = W3DModelDraw ModuleTag_01
    InitialRecoilSpeed = 10
    MaxRecoilDistance = 1.3
    RecoilSettleSpeed = 5
   ; ----
    ConditionState = NONE
      Model = AIRocketeer 
     ; --
     Turret = Turret
     TurretPitch = TurretEl
     ; --
     WeaponMuzzleFlash = PRIMARY MuzzleFX
     WeaponFireFXBone = PRIMARY Muzzle
     WeaponLaunchBone = PRIMARY Muzzle
     WeaponRecoilBone = PRIMARY Barrel
     ; --
     ParticleSysBone = ENGINE01 RocketeerEngineExhaust
     ParticleSysBone = ENGINE02 RocketeerEngineExhaust
    End
   AliasConditionState = REALLYDAMAGED
   
    ConditionState = USING_WEAPON_B
     Model = AIRocketeer 
     ; --
     Turret = Turret
     TurretPitch = TurretEl
     ; --
     WeaponMuzzleFlash = SECONDARY MuzzleFX
     WeaponFireFXBone = SECONDARY Muzzle
     WeaponLaunchBone = SECONDARY Muzzle
     WeaponRecoilBone = SECONDARY Barrel
     ; --
     ParticleSysBone = ENGINE01 RocketeerEngineExhaust
     ParticleSysBone = ENGINE02 RocketeerEngineExhaust
    End
   AliasConditionState = USING_WEAPON_B REALLYDAMAGED
   
   ParticlesAttachedToAnimatedBones = Yes
   OkToChangeModelColor = Yes
  End

  ; ***DESIGN parameters ***
  DisplayName = OBJECT:OFSRocketeer
  EditorSorting = VEHICLE
  Side = AmericaArmorGeneral
  TransportSlotCount = 0     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange = 190.0
  ShroudClearingRange = 450

  Prerequisites
    Object = Armor_AmericaAirfield
    Object = Armor_AmericaBarracks   
  End
  WeaponSet
    Conditions = None
    Weapon = PRIMARY RocketeerCannonWeapon
  End
  ArmorSet
    Conditions = None
    Armor = RocketeerArmor
    DamageFX = InfantryDamageFX
  End
 
  BuildCost = 600
  BuildTime = 7     ; in seconds
  ExperienceValue = 50 70 120 200     ; Experience point value at each level
  ExperienceRequired = 0 125 500 1500     ; Experience points needed to gain each level
  IsTrainable = Yes     ; Can gain experience
  CommandSet = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect        = RocketeerVoiceSelect
  VoiceMove          = RocketeerVoiceMove
  VoiceGuard         = RocketeerVoiceMove
  VoiceAttack        = RocketeerVoiceAttack
  VoiceAttackAir     = RocketeerVoiceAttack
  VoiceFear          = RocketeerVoiceFear
  SoundAmbient       = RaptorAmbientLoop
  SoundAmbientRubble = NoSound
  ;SoundMoveLoop = RocketeerAmbientLoop
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = RocketeerVoiceCreate
    SoundEject      = PilotSoundEject
    VoiceEject      = PilotVoiceEject
    Afterburner     = RaptorAfterburner
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT PRODUCED_AT_HELIPAD

  Body = ActiveBody ModuleTag_02
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes
    ; note that comanches do not return to base when idle
    ; this is a bit of a trick... normally, units cannot move-and-fire at
    ; the same time. we need the comanche to be able to. so we give it
    ; a "turret" (invisible) and put the two main weapons on it, but with
    ; no turn rate. voila!
    Turret
      TurretTurnRate = 180     
      TurretPitchRate = 180     
      AllowsPitch = Yes
      MinPhysicalPitch = -35
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    MoodAttackCheckRate = 600
  End
  Locomotor = SET_NORMAL RocketeerLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 25.0
  End

  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = ALL
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireUSA
    OCL = INITIAL OCL_DeadRocketeer
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_AdvancedTraining
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0     ; Increases experience gained by an additional 100%
  End

  Behavior                = CountermeasuresBehavior ModuleTag_Countermeasures01
    TriggeredBy           = Upgrade_AmericaCountermeasures
    FlareTemplateName     = CountermeasureFlare
    FlareBoneBaseName     = Flare ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize            = 3     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle        = 90.0  ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor  = 1.0   ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys   = 1000  ; Time between flare volleys
    NumberOfVolleys       = 3     ; Number of times the volleys will fire before reloading
    ReloadTime            = 4000  ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate           = 25%   ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 0     ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay     = 200   ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End

  Geometry = BOX
  GeometryMajorRadius = 13.0
  GeometryMinorRadius = 13.0
  GeometryHeight = 15.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 15     ; 
  ShadowSizeY = 15     ; 
  ShadowTexture = ShadowI     ; 
  BuildCompletion = APPEARS_AT_RALLY_POINT
End

Object DeadRocketeer 
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = AIRocketeer_d2
      Animation = AIRngr_SKL.AIRngr_ADTF2
      AnimationMode = LOOP
    End
    ; --- dying anims ---------------------------------
    ConditionState = DYING EXPLODED_FLAILING
      Model = AIRocketeer_d2
      Animation = AIRngr_SKL.AIRngr_ADTF2
      AnimationMode = LOOP
      ;TransitionKey = TRANS_Flailing
    End
    ConditionState = DYING EXPLODED_BOUNCING
      Model = AIRocketeer_d2
      Animation = AIRngr_SKL.AIRngr_ADTF3
      AnimationMode = ONCE
      ;TransitionKey = None
    End
    AliasConditionState = DYING SPLATTED
    ; -------------------------------------------------
  End

  ; ***DESIGN parameters ***
  Side = AmericaArmorGeneral
  EditorSorting = SYSTEM
  TransportSlotCount = 0     ; how many "slots" we take in a transport (0 == not transportable)
  ; *** AUDIO Parameters ***
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = IMMOBILE NO_COLLIDE HULK

  Body = ActiveBody ModuleTag_02
    MaxHealth = 1.0
    InitialHealth = 1.0
  End

  Behavior = PhysicsBehavior ModuleTag_03
    Mass = 5
    AllowBouncing = Yes
  End

  Behavior = LifetimeUpdate ModuleTag_04
    MinLifetime = 0     ; min lifetime in msec
    MaxLifetime = 0     ; max lifetime in msec
  End

  Behavior = SlowDeathBehavior ModuleTag_05
    SinkDelay = 6000
    SinkRate = 3     ; in Dist/Sec
    DestructionDelay = 10000
  End

  Behavior = TransitionDamageFX ModuleTag_06
    RubbleParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
  End

  Geometry = BOX
  GeometryMajorRadius = 9.0
  GeometryMinorRadius = 6.0
  GeometryHeight = 7.5
  GeometryIsSmall = Yes
End