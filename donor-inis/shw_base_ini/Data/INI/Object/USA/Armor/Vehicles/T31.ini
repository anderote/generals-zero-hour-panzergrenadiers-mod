;SMOKE01 to SMOKE04 - Smoke bones for damaged state
;MUZZLEA - 75mm cannon
;MUZZLEB01 and MUZZLEB02 - rocket launchers
;MUZZLEC - Flamer
;BARRELA
;BARRELB01 and BARRELB02
;BARRELC
;CHASSIS
;MUZZLEFX - muzzle fx for the 75mm
;AVDemoman
;AVDemoman_D
;AVDemoman_D1 hull
;AVDemoman_D2 turret
;AVDemoman_D3 a rocket barrel
;Why would America make this? Why did we add this?
Object Armor_T31DemolitionTank
  ; *** ART Parameters ***
  SelectPortrait = T31Tank_L
  ButtonImage    = T31Tank
  
  UpgradeCameo1 = Upgrade_AmericaBattleDrone
  UpgradeCameo2 = Upgrade_AmericaAdvancedTraining
  
  Draw = W3DTankDraw ModuleTag_01
    DefaultConditionState
      Model              = AVDemoman
      Turret             = Turret
      ;75mm gun
      WeaponFireFXBone   = PRIMARY MUZZLEFXA
      WeaponRecoilBone   = PRIMARY BARRELA
      WeaponMuzzleFlash  = PRIMARY MUZZLEFXA
      WeaponLaunchBone   = PRIMARY MUZZLEA

      ;Rockets
      WeaponFireFXBone   = SECONDARY ROCKETFX
      WeaponRecoilBone   = SECONDARY BARRELB
      WeaponMuzzleFlash  = SECONDARY MUZZLEB
      WeaponLaunchBone   = SECONDARY MUZZLEB

      ;Flamethrower
      WeaponFireFXBone   = TERTIARY MUZZLEC
      WeaponLaunchBone   = TERTIARY BARRELC
    End
    AliasConditionState  = NIGHT
    
    ConditionState       = REALLYDAMAGED
      Model              = AVDemoman_D
    End
    AliasConditionState  = NIGHT REALLYDAMAGED
    
    ConditionState       = RUBBLE
      Model              = AVDemoman_D
    End

    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
    OkToChangeModelColor = Yes
  End

  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model             = NONE
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model             = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:T31DemolitionTank
  Side               = AmericaArmorGeneral
  EditorSorting      = VEHICLE
  TransportSlotCount = 6

  WeaponSet
    Conditions = None 
    Weapon     = PRIMARY T31MainCannonWeapon
    Weapon     = SECONDARY T31RocketWeapon
    Weapon     = TERTIARY T31FlameWeapon
    AutoChooseSources = SECONDARY NONE
    AutoChooseSources = TERTIARY NONE
  End

  WeaponSet
    Conditions = CARBOMB 
    Weapon     = PRIMARY InfectedCrusaderTankGun
    Weapon     = SECONDARY T31RocketWeapon
    Weapon     = TERTIARY T31FlameWeapon
  End

  ArmorSet
    Conditions           = None
    Armor                = TankArmor
    DamageFX             = TankDamageFX
  End

  Prerequisites
    Object = Armor_AmericaStrategyCenter
  End

  BuildCost           = 1300
  BuildTime           = 15.0          ;in seconds    
  VisionRange         = 180
  ShroudClearingRange = 400

  ExperienceValue     = 200 250 475 750 ;Experience point value at each level
  ExperienceRequired  = 0 1100 2500 4500 ;Experience points needed to gain each level
  IsTrainable         = Yes  ;Can gain experience
  CrusherLevel        = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel      = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet          = T31CommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = T31DTVoiceSelect
  VoiceMove             = T31DTVoiceMove
  VoiceGuard            = T31DTVoiceMove
  VoiceAttack           = T31DTVoiceAttack
  SoundMoveStart        = VanillaCrusaderTankMoveStart
  SoundMoveStartDamaged = VanillaCrusaderTankMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = T31DTVoiceCreate
    VoiceEnter      = T31DTVoiceMove
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound
    SoundEject      = PilotSoundEject
    VoiceEject      = PilotVoiceEject
    VoiceCrush      = NoSound
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf        = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE

  Body = ActiveBody ModuleTag_02
    MaxHealth    = 400.0
    InitialHealth = 400.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate        = 90 ;   // turn rate, in degrees per sec
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
  End
  Locomotor = SET_NORMAL CrusaderLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 1000.0
  End

  Behavior = ObjectCreationUpgrade ModuleTag_05
    UpgradeObject = OCL_AmericanBattleDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_06
    UpgradeObject = OCL_AmericanScoutDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_20
    UpgradeObject = OCL_AmericanHellfireDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ProductionUpdate ModuleTag_07
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_08
    TriggeredBy   = Upgrade_AmericaAdvancedTraining
    AddXPScalar   = 1.0 ;Increases experience gained by an additional 100%
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_10
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 500
    DestructionDelayVariance  = 100
    FX  = INITIAL  FX_GenericTankDeathEffect
    OCL = MIDPOINT OCL_T31Death
    FX  = FINAL    FX_GenericTankDeathExplosion
    OCL = FINAL    OCL_T31Turret
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 2000
    DestructionDelayVariance  = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_T31Death  
    FX  = FINAL    FX_GenericTankDeathExplosion
  End

  Behavior                 = TransitionDamageFX ModuleTag_12
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = DestroyDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_14
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateObjectDie ModuleTag_15
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End

  Behavior                    = CreateCrateDie ModuleTag_CratesChange
   CrateData             = SalvageCrateData
   CrateData             = EliteTankCrateData
   CrateData             = HeroicTankCrateData
  End

  Behavior = EjectPilotDie ModuleTag_17
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
    ExemptStatus = HIJACKED
    VeterancyLevels =  ALL -REGULAR ;only vet+ gives pilot
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = EjectPilotDie ModuleTag_HijackerEmerge01
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  ;Behavior = LockWeaponCreate ModuleTag_Durdur01
  ;  SlotToLock = PRIMARY ; Prevents indeterminate state plus two unpickable weapons equaling no attack.
  ;End

  Geometry               = BOX
  GeometryMajorRadius    = 15.0
  GeometryMinorRadius    = 10.0
  GeometryHeight         = 10.0     
  GeometryIsSmall        = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End