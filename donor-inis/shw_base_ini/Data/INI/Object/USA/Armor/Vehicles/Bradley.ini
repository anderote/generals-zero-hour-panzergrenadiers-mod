Object Armor_AmericaVehicleHumvee

  ; *** ART Parameters ***
  SelectPortrait         = SAAPC_L
  ButtonImage            = SAAPC
  
  UpgradeCameo1 = Upgrade_AmericaBattleDrone
  UpgradeCameo2 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo3 = Upgrade_AmericaTOWMissile
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes

    ConditionState = NONE
      Model = AVBrad
      Turret = Turret
      HideSubObject = ROCKETPOD
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponLaunchBone  = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone  = SECONDARY WEAPONA
      WeaponLaunchBone  = SECONDARY WEAPONA
      WeaponFireFXBone  = TERTIARY WEAPONA
      WeaponLaunchBone  = TERTIARY WEAPONA
    End

    ConditionState = REALLYDAMAGED
      Model = AVBrad_D
      Turret = Turret
      HideSubObject = ROCKETPOD
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponLaunchBone  = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone  = SECONDARY WEAPONA
      WeaponLaunchBone  = SECONDARY WEAPONA
      WeaponFireFXBone  = TERTIARY WEAPONA
      WeaponLaunchBone  = TERTIARY WEAPONA
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      Model = AVBrad
      Turret = Turret
      ShowSubObject = ROCKETPOD
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponLaunchBone  = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone  = SECONDARY WEAPONA
      WeaponLaunchBone  = SECONDARY WEAPONA
      WeaponFireFXBone  = TERTIARY WEAPONA
      WeaponLaunchBone  = TERTIARY WEAPONA
    End

    ConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED
      Model = AVBrad_D
      Turret = Turret
      ShowSubObject = ROCKETPOD
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponLaunchBone  = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone  = SECONDARY WEAPONA
      WeaponLaunchBone  = SECONDARY WEAPONA
      WeaponFireFXBone  = TERTIARY WEAPONA
      WeaponLaunchBone  = TERTIARY WEAPONA
    End

    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
    OkToChangeModelColor = Yes
  End

  Draw = W3DModelDraw ModuleTag_Door
    ConditionState = NONE
      Model         = AVBradA
      Animation     = AVBradA.AVBradA
      AnimationMode = MANUAL
    End

    ConditionState  = REALLYDAMAGED
      Model         = AVBradA_D
      Animation     = AVBradA_D.AVBradA_D
      AnimationMode = MANUAL
    End

    ConditionState  = DOOR_1_OPENING
      Model         = AVBradA
      Animation     = AVBradA.AVBradA
      AnimationMode = ONCE
    End
    ConditionState  = DOOR_1_CLOSING
      Model         = AVBradA
      Animation     = AVBradA.AVBradA
      AnimationMode = ONCE_BACKWARDS
    End

    ConditionState  = REALLYDAMAGED DOOR_1_OPENING
      Model         = AVBradA_D
      Animation     = AVBradA_D.AVBradA_D
    End
    ConditionState  = REALLYDAMAGED DOOR_1_CLOSING
      Model         = AVBradA_D
      Animation     = AVBradA_D.AVBradA_D
      AnimationMode = ONCE_BACKWARDS
    End
  End

  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model             = NONE
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model             = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:Bradley
  Side                  = AmericaArmorGeneral
  EditorSorting         = VEHICLE
  TransportSlotCount    = 3                 ;how many "slots" we take in a transport (0 == not transportable)
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY APCGun
  End
  
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon = PRIMARY APCGun
    Weapon = SECONDARY HumveeMissileWeapon
    Weapon = TERTIARY HumveeMissileWeaponAir
    PreferredAgainst = TERTIARY AIRCRAFT
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End
  WeaponSet
    Conditions = CARBOMB PLAYER_UPGRADE
    Weapon = PRIMARY  SuicideCarBomb
  End
  
  WeaponSet
    Conditions = HERO PLAYER_UPGRADE 
    Weapon = PRIMARY APCGunHeroic
    Weapon = SECONDARY HumveeMissileWeapon
    Weapon = TERTIARY HumveeMissileWeaponAir
    PreferredAgainst = TERTIARY AIRCRAFT
  End
  
  ArmorSet
    Conditions      = None
    Armor           = HumveeArmor
    DamageFX        = TruckDamageFX
  End
  
  BuildCost       = 850
  BuildTime       = 10.0          ;in seconds    
  VisionRange     = 200
  ShroudClearingRange = 320

  ExperienceValue = 100 125 150 175   ;Experience point value at each level
  ExperienceRequired = 0 250 525 875  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet      = USA_AmericaVehicleHumveeCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = BradleyVoiceSelect
  VoiceMove = BradleyVoiceMove
  VoiceGuard = BradleyVoiceMove
  VoiceAttack = BradleyVoiceAttack
  VoiceAttackAir = BradleyVoiceAttackTOW
  SoundMoveStart = BradleyMoveStart
  SoundMoveStartDamaged = BradleyMoveStart
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    ;TurretMoveStart    = NoSound
    VoiceCreate         = BradleyVoiceCreate
    TurretMoveLoop      = TurretMoveLoop
    SoundEject          = PilotSoundEject
    VoiceEject          = PilotVoiceEject
    VoiceCrush          = HumveeVoiceCrush
  ; Required for the W3DTruckDraw module
    TruckLandingSound = RocketBuggyLand
    TruckPowerslideSound = RocketBuggyPowerslide
    VoiceUnload = BradleyVoiceUnload
    VoiceEnter = BradleyVoiceMove
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE TRANSPORT

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 400.0
    InitialHealth   = 400.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = TransportAIUpdate ModuleTag_03
    Turret
      TurretTurnRate = 180
      RecenterTime = 5000   ; how long to wait during idle before recentering
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate        = 250
  End
  Locomotor = SET_NORMAL BradleyLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 50.0
  End
  
  Behavior = CommandSetUpgrade ModuleTag_CommandSetUpgrade01
    CommandSet = USA_AmericaVehicleHumveeUpgradedCommandSet
    TriggeredBy = Upgrade_AmericaTOWMissile
  End

  Behavior = TransportContain  ModuleTag_05
    PassengersAllowedToFire = No
    Slots             = 5
    DamagePercentToUnits = 50%
    AllowInsideKindOf  = INFANTRY
    ExitDelay = 250
    NumberOfExitPaths = 1 ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit = Yes ; AI Will tell people to set their mood to Aggressive on exiting
  End
  
  Behavior = CreateObjectDie ModuleTag_Invulnerability01
    CreationList = OCL_InfantryEmergingFromTransportInvulnerability
  End

  Behavior = ObjectCreationUpgrade ModuleTag_06
    UpgradeObject = OCL_AmericanBattleDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_07
    UpgradeObject = OCL_AmericanScoutDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_14
    UpgradeObject = OCL_AmericanHellfireDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End

  Behavior = ProductionUpdate ModuleTag_08
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End

  Behavior = WeaponSetUpgrade ModuleTag_09
    TriggeredBy = Upgrade_AmericaTOWMissile
  End
  Behavior = ExperienceScalarUpgrade ModuleTag_10
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0 ;Increases experience gained by an additional 100%
  End

  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 25
    DestructionDelay = 1
    OCL = INITIAL  OCL_InitialAPCDebris
    FX  = FINAL    FX_BattleMasterExplosionOneFinal
  End

  Behavior = DestroyDie ModuleTag_12
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = FXListDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateCrateDie ModuleTag_CratesChange
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = TransitionDamageFX ModuleTag_17
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

 ;IR Smoke Active defence
  Behavior           = OCLSpecialPower ModuleTag_IRSmoke01
    SpecialPowerTemplate = SpecialAbilityAmericaIRSmoke
    OCL                  = OCL_UniversalAbbilityTrigger
    CreateLocation       = USE_OWNER_OBJECT
  End
  
  Behavior = FireWeaponCollide ModuleTag_IRSmoke02
    CollideWeapon  = IRSmokeInvulnerabilityActivationWeapon
    RequiredStatus = USING_ABILITY
  End
  
  Behavior = MissileLauncherBuildingUpdate ModuleTag_IRSmoke03
    SpecialPowerTemplate = SpecialAbilityAmericaIRSmoke
    DoorOpenTime         = 10
    DoorWaitOpenTime     = 10
    DoorCloseTime        = 70
  End

  Behavior = EjectPilotDie ModuleTag_Infection01
    DeathTypes         = ALL -CRUSHED -SPLATTED
    ExemptStatus       = HIJACKED IS_CARBOMB
    VeterancyLevels    =  ALL -REGULAR ;only vet+ gives pilot
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList    = OCL_EjectPilotViaParachute
  End
  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Geometry = BOX
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 11.5     
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length

End