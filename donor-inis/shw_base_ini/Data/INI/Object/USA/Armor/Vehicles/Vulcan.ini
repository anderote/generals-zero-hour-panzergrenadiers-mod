  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:VulcanTank
  Side                  = AmericaArmorGeneral
  EditorSorting         = VEHICLE
  TransportSlotCount    = 3                 ;how many "slots" we take in a transport (0 == not transportable)
  
  WeaponSet
    Conditions = None 
    
    Weapon           = PRIMARY VulcanTankWeapon_Infantry
    PreferredAgainst = PRIMARY INFANTRY
    
    Weapon           = SECONDARY VulcanTankWeapon_Structure
    PreferredAgainst = SECONDARY STRUCTURE
    
    Weapon           = TERTIARY VulcanTankWeapon_Vehicle
    PreferredAgainst = TERTIARY VEHICLE
    
    ShareWeaponReloadTime = Yes
  End
  
  WeaponSet
    Conditions = HERO
    
    Weapon           = PRIMARY VulcanTankWeapon_InfantryHeroic
    PreferredAgainst = PRIMARY INFANTRY
    
    Weapon           = SECONDARY VulcanTankWeapon_StructureHeroic
    PreferredAgainst = SECONDARY STRUCTURE
    
    Weapon           = TERTIARY VulcanTankWeapon_VehicleHeroic
    PreferredAgainst = TERTIARY VEHICLE
    
    ShareWeaponReloadTime = Yes
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End
  WeaponSet
    Conditions = CARBOMB HERO
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions           = None
    Armor                = VulcanTankArmor
    DamageFX             = TankDamageFX
  End
  
  BuildCost       = 950
  BuildTime       = 10.0          ;in seconds    
  VisionRange     = 150
  ShroudClearingRange = 320

  ExperienceValue = 80 100 130 180   ;Experience point value at each level
  ExperienceRequired = 0 200 455 900  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet      = Armor_AmericaTankCrusaderCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = VulcanVoiceSelect
  VoiceMove = VulcanVoiceMove
  VoiceGuard = VulcanVoiceMove
  VoiceAttack = VulcanVoiceAttack
  SoundMoveStart = GattlingTankMoveStart
  SoundMoveStartDamaged = GattlingTankMoveStart

  UnitSpecificSounds
    VoiceCreate         = VulcanVoiceCreate
    TurretMoveLoop      = TurretMoveLoop
    SoundEject          = PilotSoundEject
    VoiceEject          = PilotVoiceEject
    VoiceCrush          = VulcanVoiceMove
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE TRANSPORT

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 400.0
    InitialHealth   = 400.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = TransportAIUpdate ModuleTag_03
    Turret
      TurretTurnRate = 180
      RecenterTime = 5000   ; how long to wait during idle before recentering
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate        = 250
  End
  Locomotor = SET_NORMAL GattlingTankLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 50.0
  End

  Behavior = ObjectCreationUpgrade ModuleTag_06
    UpgradeObject = OCL_AmericanBattleDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_07
    UpgradeObject = OCL_AmericanScoutDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_14
    UpgradeObject = OCL_AmericanHellfireDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End

  Behavior = ProductionUpdate ModuleTag_08
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_10
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0 ;Increases experience gained by an additional 100%
  End

  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 25
    DestructionDelay = 1
    OCL = INITIAL  OCL_InitialVulcanTankDebris
    FX  = FINAL    FX_BattleMasterExplosionOneFinal
  End

  Behavior = DestroyDie ModuleTag_12
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = FXListDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateCrateDie ModuleTag_CratesChange
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = TransitionDamageFX ModuleTag_17
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

 ;IR Smoke Active defence
  Behavior           = OCLSpecialPower ModuleTag_IRSmoke01
    SpecialPowerTemplate = SpecialAbilityAmericaIRSmoke
    OCL                  = OCL_UniversalAbbilityTrigger
    CreateLocation       = USE_OWNER_OBJECT
  End
  
  Behavior = FireWeaponCollide ModuleTag_IRSmoke02
    CollideWeapon  = IRSmokeInvulnerabilityActivationWeapon
    RequiredStatus = USING_ABILITY
  End
  
  Behavior = MissileLauncherBuildingUpdate ModuleTag_IRSmoke03
    SpecialPowerTemplate = SpecialAbilityAmericaIRSmoke
    DoorOpenTime         = 10
    DoorWaitOpenTime     = 10
    DoorCloseTime        = 70
  End

  Behavior = EjectPilotDie ModuleTag_Infection01
    DeathTypes         = ALL -CRUSHED -SPLATTED
    ExemptStatus       = HIJACKED IS_CARBOMB
    VeterancyLevels    =  ALL -REGULAR ;only vet+ gives pilot
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList    = OCL_EjectPilotViaParachute
  End
  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Geometry               = BOX
  GeometryMajorRadius    = 15.0
  GeometryMinorRadius    = 10.0
  GeometryHeight         = 10.0     
  GeometryIsSmall        = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length

