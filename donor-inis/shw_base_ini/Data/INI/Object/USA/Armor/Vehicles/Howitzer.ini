Object Armor_ArmericaVehicleHowitzer
  ; *** ART Parameters ***
  SelectPortrait         = AVMM_L
  ButtonImage            = AVMM
  
  UpgradeCameo1 = Upgrade_AmericaBattleDrone
  UpgradeCameo2 = Upgrade_AmericaAdvancedTraining
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
      
    ProjectileBoneFeedbackEnabledSlots = PRIMARY ; WeaponLaunchBone will be shown/hidden, not just used for firing offset
    
    DefaultConditionState 
      Model = AVMattress
      Turret = TURRET
      TurretPitch = TURRETEL
      WeaponFireFXBone   = PRIMARY WeaponA
      WeaponLaunchBone   = PRIMARY WeaponA
    End

    ConditionState = REALLYDAMAGED
      Model = AVMattress_D
    End
    AliasConditionState = RUBBLE
    
    TrackMarks           = EXTnkTrack.tga
    OkToChangeModelColor = Yes
    TreadAnimationRate = 2.0;  amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:MammothMattress
  Side                  = AmericaArmorGeneral
  EditorSorting         = VEHICLE
  TransportSlotCount    = 6                ;how many "slots" we take in a transport (0 == not transportable)
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY MammothMattressWeapon
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End
  
  ArmorSet
    Conditions      = None
    Armor           = TruckArmor
    DamageFX        = TruckDamageFX
  End

  BuildCost           = 2000
  BuildTime           = 15.0          ;in seconds    
  VisionRange         = 230
  ShroudClearingRange = 300

  Prerequisites
    Object = Armor_AmericaStrategyCenter
    Science = SCIENCE_Howitzer
  End

  ExperienceValue = 200 400 800 1500    ;Experience point value at each level
  ExperienceRequired = 0 2000 4500 9001  ;Experience points needed to gain each level
  IsTrainable        = Yes             ;Can gain experience
  CrusherLevel       = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel     = 3  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet         = GenericGroundAttackCommandSet_BattleDrone

  ; *** AUDIO Parameters ***
  VoiceSelect       = HowitzerVoiceSelect
  VoiceMove         = HowitzerVoiceMove
  VoiceGuard        = HowitzerVoiceMove
  VoiceAttack       = HowitzerVoiceAttack
  SoundMoveStart        = InfernoCannonMoveStart
  SoundMoveStartDamaged = InfernoCannonMoveStart
  UnitSpecificSounds
    VoiceCreate     = HowitzerVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound
    VoiceCrush      = HowitzerVoiceMove
    VoiceEnter      = HowitzerVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE DONT_AUTO_CRUSH_INFANTRY CAN_ATTACK VEHICLE SCORE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 600.0
    InitialHealth   = 600.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate  = 60
      TurretPitchRate = 30
      AllowsPitch     = Yes
      FirePitch       = 30
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 30
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking No
  End
  Locomotor = SET_NORMAL MammothLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 220.0
  End

  Behavior = SlowDeathBehavior ModuleTag_16
    DeathTypes = ALL
    ProbabilityModifier  = 50
    DestructionDelay  = 500
    DestructionDelayVariance  = 100
    FX  = INITIAL  FX_GenericTankDeathEffect
    OCL = MIDPOINT OCL_MammothTankDeathEffect
    FX  = FINAL    FX_GenericTankDeathExplosion
  End

  Behavior = ProductionUpdate ModuleTag_08
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_09
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0 ;Increases experience gained by an additional 100%
  End
  
  Behavior = TransitionDamageFX ModuleTag_14
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = CreateCrateDie ModuleTag_Salvage
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = EjectPilotDie ModuleTag_Infection01
    DeathTypes         = ALL -CRUSHED -SPLATTED
    ExemptStatus       = HIJACKED IS_CARBOMB
    VeterancyLevels    =  ALL -REGULAR ;only vet+ gives pilot
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList    = OCL_EjectPilotViaParachute
  End
  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  ;Yes, I'm still too lazy to just combine these into one OCL. It's been like six years
  Behavior = ObjectCreationUpgrade ModuleTag_Drone01
    UpgradeObject = OCL_AmericanBattleDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_Drone02
    UpgradeObject = OCL_AmericanScoutDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_Drone03
    UpgradeObject = OCL_AmericanHellfireDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End

  Geometry = BOX
  GeometryMajorRadius = 26.0
  GeometryMinorRadius = 18.0
  GeometryHeight = 12.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME     
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length 
End

Object MammothMattressMissile
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = AVMattress_M
      ParticleSysBone = ROCKETFX01 MissileDefenderMissileExhaust
    End
  End

  ; ***DESIGN parameters ***
  DisplayName       = OBJECT:TankShell
  EditorSorting     = SYSTEM
  ArmorSet
    Armor = ProjectileArmor
  End
  VisionRange = 0.0  

  ; *** AUDIO Parameters ***
  SoundAmbient = MissileFlyby

  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = DestroyDie ModuleTag_03
    DeathTypes = ALL -LASERED
  End

  Behavior = InstantDeathBehavior DeathModuleTag_MissileDeaths01
    DeathTypes = NONE +LASERED
    FX         = FX_GenericMissileDisintegrate
    OCL        = OCL_GenericMissileDisintegrate
  End
    
  Behavior = DumbProjectileBehavior ModuleTag_04
    ; To tweak a Bezier path, please see GS
    FirstHeight = 50  ; Height of Bezier control points above highest intervening terrain
    SecondHeight = 150
    FirstPercentIndent = 30% ; Percentage of shot distance control points are placed
    SecondPercentIndent = 70%
    FlightPathAdjustDistPerSecond   = 0 ; Can allow a max speed this can attempt to follow a target. Units are their velocity we can tag.
  End

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 0.01   ; we can't have a zero mass, but we want it pretty tiny...
  End

  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2.0
End