Object AmericaAirControl
  ;USA USA USA USA
  ;GONNA BOMB THE SHIT OUT OF EM
  ;AFTER I GET THIS ONE UPGRADE, THOUGH
  ; *** ART Parameters ***
  SelectPortrait         = SNListeningPost_L
  ButtonImage            = SNListeningPost

  UpgradeCameo1 = Upgrade_AmericaAirSuperiority

  Draw = W3DModelDraw ModuleTag_01
  OkToChangeModelColor = Yes

    ; Daytime
    ConditionState = NONE
      Model         = CBNUKEC_G
      Animation     = CBNUKEC_G.CBNUKEC_G
      AnimationMode = LOOP
    End
    AliasConditionState = NIGHT
    AliasConditionState = SNOW NIGHT

    ConditionState = DAMAGED
      Model         = CBNUKEC_DG
      Animation     = CBNUKEC_DG.CBNUKEC_DG
      AnimationMode = LOOP
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = DAMAGED NIGHT
    AliasConditionState = REALLYDAMAGED NIGHT

    ConditionState = RUBBLE
      Model         = CBNUKEC_D
    End
    AliasConditionState = RUBBLE NIGHT

    ; Snow
    ConditionState = SNOW
      Model         = CBNUKEC_SG
      Animation     = CBNUKEC_SG.CBNUKEC_SG
      AnimationMode = LOOP
    End
    ConditionState = DAMAGED SNOW
      Model         = CBNUKEC_DSG
      Animation     = CBNUKEC_DSG.CBNUKEC_DSG
      AnimationMode = LOOP
    End
    AliasConditionState = REALLYDAMAGED SNOW
    AliasConditionState = DAMAGED SNOW NIGHT
    AliasConditionState = REALLYDAMAGED SNOW NIGHT

    ConditionState = RUBBLE SNOW
      Model         = CBNUKEC_DS
    End
    AliasConditionState = RUBBLE SNOW NIGHT

    ;**************************************************************************************************************************
    ;This block handles every possible case with construction process, selling process, awaiting construction, and sold states
    ;for this draw module
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model              = CBNUKEC_G
      Animation          = CBNUKEC_G.CBNUKEC_G
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT DAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT SNOW

    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
      Model              = CBNUKEC_DG
      Animation          = CBNUKEC_DG.CBNUKEC_DG
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT REALLYDAMAGED

    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
      Model              = CBNUKEC_SG
      Animation          = CBNUKEC_SG.CBNUKEC_SG
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW DAMAGED
      Model              = CBNUKEC_DSG
      Animation          = CBNUKEC_DSG.CBNUKEC_DSG
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End
    AliasConditionState  = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW REALLYDAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT SNOW DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT SNOW REALLYDAMAGED

    ConditionState       = AWAITING_CONSTRUCTION 
      Model              = NONE
    End
    AliasConditionState  = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION NIGHT
    AliasConditionState  = AWAITING_CONSTRUCTION NIGHT DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION NIGHT REALLYDAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW REALLYDAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION NIGHT SNOW
    AliasConditionState  = AWAITING_CONSTRUCTION NIGHT SNOW DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION NIGHT SNOW REALLYDAMAGED
    AliasConditionState  = SOLD 
    AliasConditionState  = SOLD DAMAGED
    AliasConditionState  = SOLD REALLYDAMAGED
    AliasConditionState  = SOLD NIGHT
    AliasConditionState  = SOLD NIGHT DAMAGED
    AliasConditionState  = SOLD NIGHT REALLYDAMAGED
    AliasConditionState  = SOLD SNOW
    AliasConditionState  = SOLD SNOW DAMAGED
    AliasConditionState  = SOLD SNOW REALLYDAMAGED
    AliasConditionState  = SOLD NIGHT SNOW
    AliasConditionState  = SOLD NIGHT SNOW DAMAGED
    AliasConditionState  = SOLD NIGHT SNOW REALLYDAMAGED
    ;**************************************************************************************************************************
  End

  ; ------------ construction-zone fence -----------------
  Draw = W3DModelDraw ModuleTag_02
    AnimationsRequirePower = No
    DefaultConditionState
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupplyCT_A4
      Animation       = ABSupplyCT_A4.ABSupplyCT_A4
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_DAY
      ParticleSysBone = SmokeS01 SmokeBuildingSmall
      ParticleSysBone = SparksS01 LiveWireSparks02
    End
    ConditionState    = NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupplyCT_A4N
      Animation       = ABSupplyCT_A4N.ABSupplyCT_A4N
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_NIGHT
      ParticleSysBone = SmokeS01 SmokeBuildingSmall
      ParticleSysBone = SparksS01 LiveWireSparks02
    End
    ConditionState    = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupplyCT_A4S
      Animation       = ABSupplyCT_A4S.ABSupplyCT_A4S
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOW
      ParticleSysBone = SmokeS01 SmokeBuildingSmall
      ParticleSysBone = SparksS01 LiveWireSparks02
    End
    ConditionState    = SNOW NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupplyCT_A4SN
      Animation       = ABSupplyCT_A4SN.ABSupplyCT_A4SN
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOWNIGHT
      ParticleSysBone = SmokeS01 SmokeBuildingSmall
      ParticleSysBone = SparksS01 LiveWireSparks02
    End
    TransitionState   = DOWN_DEFAULT UP_DAY
      Model           = ABSupplyCT_A4
      Animation       = ABSupplyCT_A4.ABSupplyCT_A4
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_NIGHT
      Model           = ABSupplyCT_A4N
      Animation       = ABSupplyCT_A4N.ABSupplyCT_A4N
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOW
      Model           = ABSupplyCT_A4S
      Animation       = ABSupplyCT_A4S.ABSupplyCT_A4S
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOWNIGHT
      Model           = ABSupplyCT_A4SN
      Animation       = ABSupplyCT_A4SN.ABSupplyCT_A4SN
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = UP_DAY DOWN_DEFAULT
      Model           = ABSupplyCT_A4
      Animation       = ABSupplyCT_A4.ABSupplyCT_A4
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_NIGHT DOWN_DEFAULT
      Model           = ABSupplyCT_A4N
      Animation       = ABSupplyCT_A4N.ABSupplyCT_A4N
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOW DOWN_DEFAULT
      Model           = ABSupplyCT_A4S
      Animation       = ABSupplyCT_A4S.ABSupplyCT_A4S
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOWNIGHT DOWN_DEFAULT
      Model           = ABSupplyCT_A4SN
      Animation       = ABSupplyCT_A4SN.ABSupplyCT_A4SN
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
  End

  ; ***DESIGN parameters ***
  DisplayName   = OBJECT:AmericaAirControlCenter
  Side          = America
  EditorSorting = STRUCTURE

  Prerequisites
    Object = AmericaCommandTruckStructure
    Science = SCIENCE_Rank5                 ;All American factions can access the Turbo Spectre. Vanilla just has the best deal
  End

  CommandSet          = AmericaAirControlCommandSet

  BuildCost           = 3000
  BuildTime           = 70.0           ; in seconds
  EnergyProduction    = -5
  VisionRange         = 400.0           ; Shroud clearing distance

  MaxSimultaneousOfType = 1

  ShroudClearingRange = 400

  ArmorSet
    Conditions      = None
    Armor           = StructureArmor
    DamageFX        = StructureDamageFXNoShake
  End

  ExperienceValue     = 2500 2500 2500 2500  ; Experience point value at each level

  ; *** AUDIO Parameters ***
  VoiceSelect          = ListeningPostSelect
  SoundOnDamaged       = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***  
  KindOf                = PRELOAD STRUCTURE SELECTABLE IMMOBILE SCORE CAPTURABLE FS_TECHNOLOGY MP_COUNT_FOR_VICTORY POWERED

  Body                  = ActiveBody ModuleTag_03
    MaxHealth       = 2000.0
    InitialHealth   = 2000.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 2200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End

  Behavior = ProductionUpdate ModuleTag_04
    DisabledTypesToProcess = DISABLED_HELD DISABLED_UNDERPOWERED
  End


  Behavior = BaseRegenerateUpdate ModuleTag_05
    ;No data
  End 

  Behavior = FlammableUpdate ModuleTag_06
    FlameDamageLimit = 20         ;Catch fire if I take this much fire damage...
    FlameDamageExpiration = 2000  ;in a span of this long
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 25       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = TransitionDamageFX ModuleTag_07
    ;-------------DESIGNED FOR MEDIUM SIZED CIVILIAN BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1          = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionMediumExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionMediumShockwave
    ;--------------------------------------------------------------------------------------
    RubbleParticleSystem1              = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    RubbleParticleSystem2              = Bone:None RandomBone:No PSys:StructureTransitionMediumExplosion
    RubbleParticleSystem3              = Bone:None RandomBone:No PSys:StructureTransitionMediumShockwave
    RubbleParticleSystem4              = Bone:None RandomBone:No PSys:StructureTransitionMediumFlare
  End

  Behavior             = CreateObjectDie ModuleTag_08
    CreationList  = OCL_LargeStructureDebris
  End
  Behavior             = FXListDie ModuleTag_09
    DeathFX       = FX_StructureSmallDeath
  End

  Behavior = StructureCollapseUpdate ModuleTag_CollapseModule01
    MinCollapseDelay        = 400
    MaxCollapseDelay        = 800
    CollapseDamping         = 0.0
    MaxShudder              = 0.8 
    MinBurstDelay           = 400
    MaxBurstDelay           = 800
    BigBurstFrequency       = 6
    OCL                     = INITIAL   OCL_StructureCollapseInitial
    OCL                     = DELAY     OCL_StructureCollapseDelay
    OCL                     = FINAL     OCL_StructureCollapseFinal
    FXList                  = INITIAL   FX_StructureCollapseInitial
    FXList                  = DELAY     FX_StructureCollapseDelay
    FXList                  = BURST     FX_StructureCollapseBurst
    FXList                  = FINAL     FX_StructureCollapseFinal
    ExemptStatus            = UNDER_CONSTRUCTION
  End
  
  Behavior = SlowDeathBehavior ModuleTag_CollapseModule02
    DeathTypes                    = ALL
    DestructionDelay              = 1500   
  End
  
  Behavior = InstantDeathBehavior ModuleTag_CollapseModule03
    RequiredStatus = UNDER_CONSTRUCTION
  End

  Behavior = CommandSetUpgrade ModuleTag_TurboSpectre00
    TriggeredBy = Upgrade_AmericaAirSuperiority
    CommandSet = AmericaAirControlCommandSetUpgraded
  End

  Behavior = GrantScienceUpgrade ModuleTag_Science01
    GrantScience = SCIENCE_SuperSpectreGunship
    TriggeredBy = Upgrade_AmericaAirSuperiority
  End

  Behavior = SpecialAbility ModuleTag_TurboSpectre01
    SpecialPowerTemplate = SuperweaponSuperSpectreGunship
    UpdateModuleStartsAttack = Yes
  End

  Behavior           = SpectreGunshipDeploymentUpdate ModuleTag_TurboDeath01
    RequiredScience      = SCIENCE_SuperSpectreGunship
    SpecialPowerTemplate = SuperweaponSuperSpectreGunship
    GunshipTemplateName  = AmericaJetSpectreSkyKing
    AttackAreaRadius     = 300
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
                           ;other choices are: *NEAR_SOURCE *FARTHEST_FROM_SOURCE *NEAR_TARGET
  End

  Geometry              = BOX
  GeometryMajorRadius   = 40.0
  GeometryMinorRadius   = 45.0
  GeometryHeight        = 40.0
  GeometryIsSmall       = No
  Shadow                = SHADOW_VOLUME
End