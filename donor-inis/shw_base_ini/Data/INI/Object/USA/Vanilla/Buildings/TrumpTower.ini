  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:TrumpTower
  Side                  = America
  EditorSorting         = STRUCTURE
  PlacementViewAngle    = -135

  ArmorSet
    Conditions      = None
    Armor           = StructureArmorTough
    DamageFX        = StructureDamageFXNoShake
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority   = STRUCTURE
  KindOf          = PRELOAD STRUCTURE IMMOBILE     
  Body            = StructureBody ModuleTag_07
    MaxHealth       = 400000.0
    InitialHealth   = 400000.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 4200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End

  Behavior                  = StructureCollapseUpdate ModuleTag_CollapseModule01
    MinCollapseDelay        = 500
    MaxCollapseDelay        = 1000
    CollapseDamping         = 0.0
    MaxShudder              = 0.6
    MinBurstDelay           = 250
    MaxBurstDelay           = 800
    BigBurstFrequency       = 4
    OCL                     = INITIAL   OCL_StructureCollapseInitial
    OCL                     = DELAY     OCL_StructureCollapseDelay
    OCL                     = FINAL     OCL_StructureCollapseFinal
    FXList                  = INITIAL   FX_StructureCollapseInitial
    FXList                  = DELAY     FX_StructureCollapseDelay
    FXList                  = BURST     FX_StructureCollapseBurst
    FXList                  = FINAL     FX_StructureCollapseFinal
    ExemptStatus            = UNDER_CONSTRUCTION
  End
