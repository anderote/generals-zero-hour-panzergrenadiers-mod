    DeathTypes                    = ALL
    DestructionDelay              = 3200   
  End
  Behavior = InstantDeathBehavior ModuleTag_CollapseModule03
    RequiredStatus = UNDER_CONSTRUCTION
  End
  
  Behavior = LifetimeUpdate ModuleTag_DIE01
    MinLifetime = 1
    MaxLifetime = 1
  End

  Geometry              = BOX
  GeometryMajorRadius   = 46.0   ;Original values are 43.0
  GeometryMinorRadius   = 46.0
  GeometryHeight        = 170.0
  GeometryIsSmall       = No
  Shadow                = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER
End