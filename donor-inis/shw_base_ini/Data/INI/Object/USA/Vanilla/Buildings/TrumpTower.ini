Object TrumpTower
  ;MAGA

  ;Make CollapseBuildingDummy for this since it's stupid

  ButtonImage = SAPowerPointY
  SelectPortrait = SAPowerPointY

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    IgnoreConditionStates = SNOW NIGHT
    OkToChangeModelColor = Yes
    ;day
    ConditionState  = NONE
      Model         = CBNHongK01_G
      Animation     = CBNHongK01_G.CBNHongK01_G
      AnimationMode = LOOP
      WeaponLaunchBone  = PRIMARY   BOX04
      WeaponLaunchBone  = SECONDARY BOX04
      WeaponLaunchBone  = TERTIARY  BOX04
      WeaponFireFXBone  = PRIMARY   BOX04
      WeaponFireFXBone  = SECONDARY BOX04
      WeaponFireFXBone  = TERTIARY  BOX04
    End
    AliasConditionState = DAMAGED

    ConditionState = REALLYDAMAGED
      Model         = CBNHongK01_GD
      Animation     = CBNHongK01_GD.CBNHongK01_GD
      AnimationMode = LOOP
      WeaponLaunchBone  = PRIMARY   BOX04
      WeaponLaunchBone  = SECONDARY BOX04
      WeaponLaunchBone  = TERTIARY  BOX04
      WeaponFireFXBone  = PRIMARY   BOX04
      WeaponFireFXBone  = SECONDARY BOX04
      WeaponFireFXBone  = TERTIARY  BOX04
    End
    AliasConditionState = RUBBLE

    ConditionState = POST_COLLAPSE
      Model         = None
    End

    ;ConditionState = POST_COLLAPSE
      ;Model         = CBNHongK01_R
    ;End

   ;**************************************************************************************************************************
    ;This block handles every possible case with construction process, selling process, awaiting construction, and sold states
    ;for this draw module
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model              = CBNHongK01_G
      Animation          = CBNHongK01_G.CBNHongK01_G
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
      Model              = CBNHongK01_GD
      Animation          = CBNHongK01_GD.CBNHongK01_GD
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End
    AliasConditionState = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED

    ConditionState       = AWAITING_CONSTRUCTION 
      Model              = NONE
    End
    AliasConditionState  = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState  = SOLD 
    AliasConditionState  = SOLD DAMAGED
    AliasConditionState  = SOLD REALLYDAMAGED
    ;**************************************************************************************************************************
  End

  ; ------------ construction-zone fence -----------------
  Draw = W3DModelDraw ModuleTag_02
  AnimationsRequirePower = No
    DefaultConditionState
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupplyCT_A4
      Animation       = ABSupplyCT_A4.ABSupplyCT_A4
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_DAY
      ParticleSysBone = SmokeS01 SmokeBuildingSmall
      ParticleSysBone = SparksS01 LiveWireSparks02
    End
    ConditionState    = NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupplyCT_A4N
      Animation       = ABSupplyCT_A4N.ABSupplyCT_A4N
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_NIGHT
      ParticleSysBone = SmokeS01 SmokeBuildingSmall
      ParticleSysBone = SparksS01 LiveWireSparks02
    End
    ConditionState    = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupplyCT_A4S
      Animation       = ABSupplyCT_A4S.ABSupplyCT_A4S
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOW
      ParticleSysBone = SmokeS01 SmokeBuildingSmall
      ParticleSysBone = SparksS01 LiveWireSparks02
    End
    ConditionState    = SNOW NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupplyCT_A4SN
      Animation       = ABSupplyCT_A4SN.ABSupplyCT_A4SN
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOWNIGHT
      ParticleSysBone = SmokeS01 SmokeBuildingSmall
      ParticleSysBone = SparksS01 LiveWireSparks02
    End
    TransitionState   = DOWN_DEFAULT UP_DAY
      Model           = ABSupplyCT_A4
      Animation       = ABSupplyCT_A4.ABSupplyCT_A4
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_NIGHT
      Model           = ABSupplyCT_A4N
      Animation       = ABSupplyCT_A4N.ABSupplyCT_A4N
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOW
      Model           = ABSupplyCT_A4S
      Animation       = ABSupplyCT_A4S.ABSupplyCT_A4S
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOWNIGHT
      Model           = ABSupplyCT_A4SN
      Animation       = ABSupplyCT_A4SN.ABSupplyCT_A4SN
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = UP_DAY DOWN_DEFAULT
      Model           = ABSupplyCT_A4
      Animation       = ABSupplyCT_A4.ABSupplyCT_A4
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_NIGHT DOWN_DEFAULT
      Model           = ABSupplyCT_A4N
      Animation       = ABSupplyCT_A4N.ABSupplyCT_A4N
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOW DOWN_DEFAULT
      Model           = ABSupplyCT_A4S
      Animation       = ABSupplyCT_A4S.ABSupplyCT_A4S
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOWNIGHT DOWN_DEFAULT
      Model           = ABSupplyCT_A4SN
      Animation       = ABSupplyCT_A4SN.ABSupplyCT_A4SN
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
  End

  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:TrumpTower
  Side                  = America
  EditorSorting         = STRUCTURE
  PlacementViewAngle    = -135

  BuildCost             = 50000
  BuildTime             = 180.0           ; in seconds
  EnergyProduction      = 10   ;Command Center should be free

  CommandSet            = TrumpTowerPowerCommandSet

  VisionRange           = 400.0           ; Shroud clearing distance
  ShroudClearingRange   = 800

  WeaponSet
    Conditions = NONE
    Weapon = PRIMARY   TrumpTowerMachineGunWeapon
    Weapon = SECONDARY TrumpTowerJavelinMissileWeapon
    Weapon = TERTIARY  TrumpTowerAntiAirWeapon
    PreferredAgainst = PRIMARY   INFANTRY
    PreferredAgainst = SECONDARY VEHICLE
    ShareWeaponReloadTime = No
  End

  ArmorSet
    Conditions          = None
    Armor               = GLAUpgradedStructureArmorTough
    DamageFX            = StructureDamageFXNoShake
  End

  ExperienceValue       = 9001 9001 9001 9001 ; Experience point value at each level

  MaxSimultaneousOfType  = 1
  MaxSimultaneousLinkKey = MagaTower


  ; *** AUDIO Parameters ***
  VoiceSelect           = CommandCenterUSASelect
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority       = STRUCTURE
  KindOf              = PRELOAD STRUCTURE SELECTABLE IMMOBILE COMMANDCENTER CAN_ATTACK SCORE MP_COUNT_FOR_VICTORY GARRISONABLE_UNTIL_DESTROYED AIRCRAFT_PATH_AROUND FS_BASE_DEFENSE IMMUNE_TO_CAPTURE AUTO_RALLYPOINT

  Body                = StructureBody ModuleTag_08
    MaxHealth         = 10000.0
    InitialHealth     = 10000.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap        = 20000
    SubdualDamageHealRate   = 500
    SubdualDamageHealAmount = 100
  End

  Behavior = AIUpdateInterface ModuleTag_Guns
    Turret
      TurretTurnRate = 360
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AltTurret
      TurretTurnRate      = 360
      ControlledWeaponSlots = TERTIARY
    End
    TurretsLinked = No
    AutoAcquireEnemiesWhenIdle = Yes ;ATTACK_BUILDINGS; defensive weapon
    MoodAttackCheckRate        = 250
  End

  Behavior = GrantUpgradeCreate ModuleTag_09
    UpgradeToGrant = Upgrade_ChinaRadar
    ExemptStatus   = UNDER_CONSTRUCTION
  End
  Behavior = ProductionUpdate ModuleTag_11
    ;nada
  End

  Behavior = DefaultProductionExitUpdate ModuleTag_America01
    UnitCreatePoint   = X: 60.0  Y: 0.0   Z:0.0
    NaturalRallyPoint = X: 60.0  Y: 0.0   Z:0.0  ;NaturalRallyPointX must always match GeometryMajorRadius! -ML
  End

  Behavior = RadarUpdate ModuleTag_12
    RadarExtendTime = 4000     ;in mSeconds
  End

  Behavior = BaseRegenerateUpdate ModuleTag_14
    ;No data
  End

  Behavior             = CreateObjectDie ModuleTag_16
    CreationList  = OCL_LargeStructureDebris
  End
  Behavior             = CreateObjectDie ModuleTag_17
    CreationList  = OCL_AmericanOfficerDebris10
    ExemptStatus  = UNDER_CONSTRUCTION
  End
  Behavior             = CreateObjectDie ModuleTag_17AndAHalf
    CreationList  = OCL_AmericanOfficerDebris10
    ExemptStatus  = UNDER_CONSTRUCTION
  End

  Behavior         = RadarUpgrade ModuleTag_19
    TriggeredBy   = Upgrade_ChinaRadar
  End

  Behavior = TransitionDamageFX ModuleTag_07
   ;-------------DESIGNED FOR LARGE SIZED CIVILIAN BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1          = Bone:None RandomBone:No PSys:StructureTransitionLargeSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionLargeSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionLargeExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionLargeShockwave
    ;---------------------------------------------------------------------------------------
    RubbleParticleSystem1              = Bone:None RandomBone:No PSys:StructureTransitionLargeSmoke
    RubbleParticleSystem2              = Bone:None RandomBone:No PSys:StructureTransitionLargeExplosion
    RubbleParticleSystem3              = Bone:None RandomBone:No PSys:StructureTransitionLargeShockwave
    RubbleParticleSystem4              = Bone:None RandomBone:No PSys:StructureTransitionLargeFlare
  End

  Behavior = InstantDeathBehavior ModuleTag_CollapseModule03
    RequiredStatus = UNDER_CONSTRUCTION
  End

  Behavior = DestroyDie ModuleTag_0236
  End

  Behavior = GarrisonContain ModuleTag_Trump08
    ContainMax                    = 10
    EnterSound                    = GarrisonEnter
    ExitSound                     = GarrisonExit
    ImmuneToClearBuildingAttacks  = Yes
    DamagePercentToUnits          = 0%
    IsEnclosingContainer          = Yes
    AllowEnemiesInside            = No
  End

  Behavior = TechBuildingBehavior ModuleTag_Trump09
    PulseFX = FX_TechRadioStationOwnedPulse
    PulseFXRate = 2000
  End
  
  Behavior = StealthDetectorUpdate ModuleTag_Trump10
    DetectionRate             = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange            = 400   ;John, enable this for independant balancing!
    PingSound                 = IRPing
    LoudPingSound             = IRPingLoud
    IRBrightParticleSysName   = IRDetectSonarBright
    IRGridParticleSysName     = IRDetectGrid
  End

  Behavior = AutoDepositUpdate ModuleTag_Trump11
    DepositTiming       = 1500   ; in milliseconds
    DepositAmount       = 20   ; cash amount to deposit every DepositTiming
    InitialCaptureBonus = 0  ; no initial bonus
  End

  Behavior = AutoDepositUpdate ModuleTag_Trump12
    DepositTiming       = 1830   ; in milliseconds
    DepositAmount       = 50   ; cash amount to deposit every DepositTiming
    InitialCaptureBonus = 0  ; no initial bonus
  End

  Behavior = AutoDepositUpdate ModuleTag_Trump13
    DepositTiming       = 2234   ; in milliseconds
    DepositAmount       = 100   ; cash amount to deposit every DepositTiming
    InitialCaptureBonus = 0  ; no initial bonus
  End

  Behavior = CommandSetUpgrade ModuleTag_CommandSetPowers01
    TriggeredBy = Upgrade_GLAWorkerFakeCommandSet
    RemovesUpgrades = Upgrade_GLAWorkerRealCommandSet
    CommandSet = TrumpTowerPowerCommandSet
  End
  
  Behavior = CommandSetUpgrade ModuleTag_CommandSetPowers02
    TriggeredBy = Upgrade_GLAWorkerRealCommandSet
    RemovesUpgrades = Upgrade_GLAWorkerFakeCommandSet Upgrade_GLAWorkerRealCommandSet
    CommandSet = TrumpTowerGarrisonCommandSet
  End

  ;SpecialPower shenanigans here
  ;NOTE -- All of these use the SPECIAL_BATTLESHIP_BOMBARDMENT Enum. Apparently it allows that.
  ;NOTE -- New Cargo Planes, Carriers, Etc below are used to seperate for SpecialPowerCompletionDie. I could've stuck it on the original planes, but I'd get confused.
  Behavior               = OCLSpecialPower ModuleTag_Lab01
    SpecialPowerTemplate = SuperweaponTechLabCarpetBomb
    OCL                  = SUPERWEAPON_TechLabCarpetBomb
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End
  Behavior               = OCLSpecialPower ModuleTag_Lab02
    SpecialPowerTemplate = SuperweaponTechLabA10ThunderboltMissileStrike
    OCL                  = SUPERWEAPON_TechLabRodsFromGod2
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End

  Behavior               = OCLSpecialPower ModuleTag_Lab03
    SpecialPowerTemplate = SuperweaponTechLabNapalmStrike
    OCL                  = SUPERWEAPON_TechLabNapalmStrike
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End
  Behavior               = OCLSpecialPower ModuleTag_Lab04
    SpecialPowerTemplate = SuperweaponTechLabClusterMines
    OCL                  = SUPERWEAPON_TechLabClusterMines
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End

  Behavior               = OCLSpecialPower ModuleTag_Lab08
    SpecialPowerTemplate = SuperweaponTechLabPlasmaBomb
    OCL                  = SUPERWEAPON_TechLabPlasmaBomb
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End

  Behavior        = CreateObjectDie ModuleTag_Collapse01
    CreationList  = OCL_TrumpTowerDummyCollapse
    ExemptStatus  = UNDER_CONSTRUCTION
  End

  Behavior               = OCLSpecialPower ModuleTag_Maga01
    SpecialPowerTemplate = SuperweaponMagaFreedomBombing
    OCL                  = SUPERWEAPON_MAGA
    CreateLocation       = CREATE_AT_EDGE_FARTHEST_FROM_TARGET
  End

  Geometry              = BOX
  GeometryMajorRadius   = 46.0   ;Original values are 43.0
  GeometryMinorRadius   = 46.0
  GeometryHeight        = 170.0
  GeometryIsSmall       = No
  Shadow                = SHADOW_VOLUME
  BuildCompletion       = PLACED_BY_PLAYER
End

