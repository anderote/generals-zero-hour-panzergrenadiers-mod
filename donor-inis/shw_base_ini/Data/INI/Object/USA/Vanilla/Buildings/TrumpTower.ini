      AnimationMode = LOOP
      WeaponLaunchBone  = PRIMARY   BOX04
      WeaponLaunchBone  = SECONDARY BOX04
      WeaponLaunchBone  = TERTIARY  BOX04
      WeaponFireFXBone  = PRIMARY   BOX04
      WeaponFireFXBone  = SECONDARY BOX04
      WeaponFireFXBone  = TERTIARY  BOX04
