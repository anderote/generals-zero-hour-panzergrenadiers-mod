Object AmericaInfantryBillGates
    ;Micro$oft
    ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = CINMCIV01_SKN
      IdleAnimation = CINMCIV01_SKL.CINMCIV01_STA 0 30
      IdleAnimation = CINMCIV01_SKL.CINMCIV01_IDA
      IdleAnimation = CINMCIV01_SKL.CINMCIV01_IDB
      IdleAnimation = CINMCIV01_SKL.CINMCIV01_IDC
      IdleAnimation = CINMCIV01_SKL.CINMCIV01_IDD
      AnimationMode = ONCE
    End

    ConditionState = MOVING
      Animation = CINMCIV01_SKL.CINMCIV01_PKA
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_STAND
    End

    ConditionState = DYING
      Animation = CINMCIV01_SKL.CINMCIV01_DTA
      Animation = CINMCIV01_SKL.CINMCIV01_DTB
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = CINMCIV01_SKL.CINMCIV01_ADTA1
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = CINMCIV01_SKL.CINMCIV01_ADTA2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = CINMCIV01_SKL.CINMCIV01_ADTA3
      AnimationMode = ONCE
      TransitionKey = None
    End

  End

  ; ***DESIGN parameters ***
  Side = America
  EditorSorting = INFANTRY
  TransportSlotCount = 1

  ArmorSet
    Conditions      = None
    Armor           = HumanArmor
    DamageFX        = None
  End

  VisionRange = 150
  ShroudClearingRange = 180
  DisplayName = OBJECT:BillyGates
  CrushableLevel = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  ; *** AUDIO Parameters ***

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD INFANTRY SELECTABLE CANNOT_RETALIATE HERO

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 50000.0
    InitialHealth   = 50000.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
  End
  Locomotor = SET_NORMAL BasicHumanLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    ShockResistance = 1.0
  End
  Behavior = SlowDeathBehavior ModuleTag_05
    DeathTypes = ALL -POISONED_BETA -POISONED -BURNED -POISONED_GAMMA
    SinkDelay = 3000
    SinkRate = 0.5     ; in Dist/Sec
    DestructionDelay = 8000
  End

  Behavior = FXListDie ModuleTag_07
    DeathTypes = ALL -CRUSHED -SPLATTED -POISONED_BETA -POISONED -BURNED -POISONED_GAMMA -EXTRA_3
    DeathFX = FX_CivilianChinaMaleDie
  End
  Behavior = FXListDie ModuleTag_08
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death06 
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinChina
    OCL                 = INITIAL OCL_ToxicInfantryBeta 
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinChina
    OCL                 = INITIAL OCL_ToxicInfantry
  End
  
  Behavior = SlowDeathBehavior ModuleTag_DeathBurned
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireChina
    OCL                 = INITIAL OCL_FlamingInfantry
  End

  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinChina
    OCL                 = INITIAL OCL_ToxicInfantryGamma
  End
  Behavior = SlowDeathBehavior ModuleTag_DeathTesla01
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireChina
    FX                  = FINAL   FX_IfantryTeslaDie
    OCL                 = INITIAL OCL_TeslaDeathInfantry    
  End

  Behavior = PoisonedBehavior ModuleTag_09
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  End
 
  Geometry = CYLINDER
  GeometryMajorRadius = 3.0
  GeometryMinorRadius = 3.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14;
  ShadowSizeY = 14;
  ShadowTexture = ShadowI;

End

