    ConditionState = WEAPONSET_HERO ENEMYNEAR
      Model = AISwatGuy_SKN
      IdleAnimation = gumaarms_skl.gumaarms_idla 0 30
      IdleAnimation = gumaarms_skl.gumaarms_idlb
      IdleAnimation = gumaarms_skl.gumaarms_idlc
      IdleAnimation = gumaarms_skl.gumaarms_idle
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 0.99 1.0
      TransitionKey = TRANS_Stand
      WaitForStateToFinishIfPossible = NONE
      WeaponMuzzleFlash = PRIMARY FORGED_BLADE
      WeaponFireFXBone  = PRIMARY FORGED_BLADE
      WeaponLaunchBone  = PRIMARY FORGED_BLADE
      ParticleSysBone   = FORGED_BLADE SparksLarge
    End

    ConditionState = WEAPONSET_HERO ACTIVELY_CONSTRUCTING ;SPECIAL_CHEERING
      Animation = gumaarms_skl.gumanmocap_tntb 1 2  ;40
      Animation = gumaarms_skl.gumanmocap_tntc
      AnimationMode = LOOP
      TransitionKey = Trans_Taunting
      ParticleSysBone   = FORGED_BLADE SparksLarge
    End
