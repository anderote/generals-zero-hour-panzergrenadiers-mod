      Model = AISwatGuy_SKN
      Animation = gumaarms_skl.gumaarms_runa 0 120
      Animation = gumaarms_skl.gumanmocap_runa 0 120
      AnimationMode = LOOP
      WaitForStateToFinishIfPossible = NONE
      ParticleSysBone   = FORGED_BLADE SparksLarge
    End
    AliasConditionState = WEAPONSET_HERO ENEMYNEAR MOVING ATTACKING

    ConditionState = WEAPONSET_HERO ATTACKING USING_WEAPON_A
      Model = AISwatGuy_SKN
      Animation = gumaarms_skl.gumaarms_atka
      Animation = gumaarms_skl.gumaarms_atkb
