      WaitForStateToFinishIfPossible = NONE
    End
    AliasConditionState = ENEMYNEAR DYING EXPLODED_FLAILING
    AliasConditionState = WEAPONSET_HERO DYING EXPLODED_FLAILING
    AliasConditionState = WEAPONSET_HERO ENEMYNEAR DYING EXPLODED_FLAILING

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = gumaarms_skl.gumaarms_lnda
      AnimationMode = ONCE
      WaitForStateToFinishIfPossible = NONE
    End
    AliasConditionState = ENEMYNEAR DYING EXPLODED_BOUNCING
    AliasConditionState = WEAPONSET_HERO DYING EXPLODED_BOUNCING
    AliasConditionState = WEAPONSET_HERO ENEMYNEAR DYING EXPLODED_BOUNCING


    ConditionState = WEAPONSET_HERO
      Model = AISwatGuy_SKN
      IdleAnimation = gumaarms_skl.gumanmocap_idlb 0 66
      IdleAnimation = gumaarms_skl.gumanmocap_idlb
      IdleAnimation = gumaarms_skl.gumanmocap_idlf
      IdleAnimation = gumaarms_skl.gumanmocap_idlg
      IdleAnimation = gumaarms_skl.gumanmocap_idlj
      IdleAnimation = gumaarms_skl.gumanmocap_idlk
