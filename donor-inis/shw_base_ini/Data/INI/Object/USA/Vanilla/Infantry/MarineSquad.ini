Object AmericaInfantryMarineSqadNexus 

;**** ART Parameters **************************
  SelectPortrait = SASEAL_L
  ButtonImage    = SASEAL
  
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = None
    End
  End


;****DESIGN parameters **************************

  DisplayName      = OBJECT:AngryMobNexus
  Side = America

  RadarPriority       = NOT_ON_RADAR

  EditorSorting   = INFANTRY
  TransportSlotCount = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY USASquadHarmlessWeapon
    Weapon = SECONDARY USASquadHarmlessWeapon
    Weapon = TERTIARY USASquadHarmlessWeapon
  End

  ArmorSet
    Conditions      = None
    Armor           = InvulnerableAllArmor
    DamageFX        = None
  End

  BuildCost       = 1800
  BuildTime       = 15.0          ;in seconds    
  VisionRange     = 180  ; it can scout for the spawn
  ShroudClearingRange = 0

  Prerequisites
    Object = AmericaStrategyCenter
  End

  ExperienceValue    = 5 5 5 5 ;Experience point value at each level

  IsTrainable     = No

  CommandSet    = GLAInfantryAngryMobCommandSet;

;**** AUDIO Parameters *****************************
  VoiceSelect           = MarineVoiceSelect
  VoiceMove             = MarineVoiceMove
  VoiceGuard            = MarineVoiceMove
  VoiceAttack           = MarineVoiceAttack
  VoiceFear             = MarineVoiceFear

  UnitSpecificSounds
    VoiceEnter          = MarineVoiceMove
    VoiceEnterHostile   = MarineVoiceMove
    VoiceGarrison       = MarineVoiceMove
    VoiceCreate         = MarineVoiceReady
    VoiceGetHealed      = MarineVoiceMove
  End

;**** ENGINEERING Parameters ******************************

  RadarPriority = UNIT
  KindOf = PRELOAD CAN_ATTACK INFANTRY MOB_NEXUS ATTACK_NEEDS_LINE_OF_SIGHT NO_COLLIDE SELECTABLE SCORE
  Body = ImmortalBody ModuleTag_02
    MaxHealth       = 99999.0
    InitialHealth   = 99999.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes
  End

  Locomotor = SET_NORMAL BasicHumanLocomotor ;Important! don't make the Nexus any faster!
  Locomotor = SET_WANDER BasicHumanLocomotor ;Important! don't make the Nexus any faster!
  Locomotor = SET_PANIC BasicHumanLocomotor ;Important! don't make the Nexus any faster!

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    ShockResistance = 1.0
  End

  Behavior            = SpawnBehavior ModuleTag_05
    SpawnNumber       = 10
    SpawnReplaceDelay = 30000 ; 20 seconds

        SpawnTemplateName = AmericaInfantryMarineSquadUnit
        SpawnTemplateName = AmericaInfantryMarineSquadUnit
        SpawnTemplateName = AmericaInfantryMissileDefenderSquadUnit
        SpawnTemplateName = AmericaInfantryMarineSquadUnit
        SpawnTemplateName = AmericaInfantryMarineSquadUnit
        SpawnTemplateName = AmericaInfantryMissileDefenderSquadUnit
        SpawnTemplateName = AmericaInfantryMissileDefenderSquadUnit

    ExitByBudding = Yes;!
    InitialBurst = 15 ; the first set of 5 will not delay
    OneShot     = No
    AggregateHealth = Yes
    SlavesHaveFreeWill = No
  End

  Behavior = QueueProductionExitUpdate ModuleTag_06
    UnitCreatePoint   = X:0.0  Y:0.0  Z:0.0
    NaturalRallyPoint = X:0.0  Y:0.0  Z:0.0
    ExitDelay     = 5000 ; 5 sec
    InitialBurst  = 5 ; the first set of 5 will not delay
  End

  Behavior = DestroyDie ModuleTag_07
    DeathTypes = ALL
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 1.0     
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME

End

