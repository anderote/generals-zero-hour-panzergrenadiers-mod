Object AmericaInfantryChronoSoldier

  ; *** ART Parameters ***
  SelectPortrait = SAChronoInfantry_L
  ButtonImage    = SAChronoInfantry_L

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    AnimationsRequirePower = Yes

    ; ------- Standing-Around Animations
    DefaultConditionState
      Model             = NIDsltr_SKN
      IdleAnimation = WIPRET_SKL.WIPRET_IDA 0 35
      IdleAnimation = WIPRET_SKL.WIPRET_IDB
      AnimationMode = ONCE
      WeaponFireFXBone = PRIMARY MUZZA
      WeaponLaunchBone = PRIMARY MUZZA
      WeaponFireFXBone = SECONDARY MUZZA
      WeaponLaunchBone = SECONDARY MUZZA
      WeaponFireFXBone = TERTIARY MUZZA
      WeaponLaunchBone = TERTIARY MUZZA
    End

    ; ------- Attack Animations
    ConditionState = FIRING_A
      Animation = WIPRET_SKL.WIPRET_ATA
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 0.5 0.5
      Flags         = START_FRAME_FIRST
    End    
    AliasConditionState = FIRING_B
    AliasConditionState = FIRING_C

    ConditionState = ATTACKING
      Animation = WIPRET_SKL.WIPRET_IDA
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 0.5 0.5
      Flags         = START_FRAME_FIRST
    End
    AliasConditionState = RELOADING_A
    AliasConditionState = RELOADING_B
    AliasConditionState = RELOADING_C

    ; ------- Movement Animations
    ConditionState = MOVING
      Animation = WIPRET_SKL.WIPRET_RNA
      AnimationMode = LOOP
      Flags = RANDOMSTART
      ParticleSysBone = None InfantryDustTrails
    End
    AliasConditionState = MOVING ATTACKING

    ; ------- Dying Animations
    ConditionState = DYING
      Animation = WIPRET_SKL.WIPRET_DIA
      Animation = WIPRET_SKL.WIPRET_DIB
      AnimationMode = ONCE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:ChronoSoldier
  Side               = America
  EditorSorting      = INFANTRY
  TransportSlotCount = 2     ; how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None
    Weapon = PRIMARY ChronoInfantryRiftWeapon
    Weapon = SECONDARY ChronoInfantryLaserWeapon
    ShareWeaponReloadTime = No 
  End

  ArmorSet
    Conditions = None
    Armor      = ChronoInfantryArmor
    DamageFX   = TruckDamageFX
  End

  Prerequisites
    Object = AmericaParticleCannonUplink
  End

  VisionRange = 100
  ShroudClearingRange = 350

  BuildCost = 1650
  BuildTime = 30.0     ; in seconds

  EnergyProduction = -2

  ExperienceValue = 150 200 250 300     ; Experience point value at each level
  ExperienceRequired = 0 400 875 1500     ; Experience points needed to gain each level
  IsTrainable = Yes     ; Can gain experience
  CrushableLevel = 2     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect    = ChronoSoldierVoiceSelect
  VoiceMove      = ChronoSoldierVoiceMove
  VoiceGuard     = ChronoSoldierVoiceMove
  VoiceAttack    = ChronoSoldierVoiceAttack
  
  UnitSpecificSounds
    VoiceGarrison  = ChronoSoldierVoiceMove
    VoiceCreate    = ChronoSoldierVoiceCreate
    VoiceEnter     = ChronoSoldierVoiceMove
    VoiceGetHealed = ChronoSoldierVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY SCORE PARACHUTABLE POWERED

  Body = ActiveBody ModuleTag_02
    MaxHealth = 360.0
    InitialHealth = 360.0
  End

  Behavior = AIUpdateInterface ModuleTag_04
    TurretsLinked = Yes
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL FastHumanLocomotor

  Behavior = CommandButtonHuntUpdate ModuleTag_05     ; allows use of command button hunt script with this unit.
  End

  Behavior = PhysicsBehavior ModuleTag_07
    Mass = 150.0
    ShockResistance = 1.0
  End

  ; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6 -EXTRA_7 -EXTRA_8
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_RangerDie
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_RangerDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireUSA
    OCL                 = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinUSA
    OCL                 = INITIAL OCL_ToxicInfantry
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death06 ; don't forget to give it a new, unique module tag
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinUSA
    OCL                 = INITIAL OCL_ToxicInfantryBeta ;you'll have to create this OCL and make it use the blue guys instead of green ones
  End

  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinUSA
    OCL                 = INITIAL OCL_ToxicInfantryGamma
  End
  Behavior = SlowDeathBehavior ModuleTag_Death08 ;new and shiney microwave death effect
    DeathTypes          = NONE +EXTRA_2
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireUSA
    OCL                 = INITIAL OCL_MicrowavedInfantry 
  End
  Behavior = SlowDeathBehavior ModuleTag_Death09
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireUSA
    FX                  = FINAL   FX_IfantryTeslaDie
    OCL                 = INITIAL OCL_TeslaDeathInfantry    
  End
  Behavior = SlowDeathBehavior ModuleTag_Death045 ;Brutal kill with lots of blood and no death scream
    DeathTypes          = NONE +EXTRA_4
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FX                  = INITIAL WeaponFX_PlasmaImpact        ;;;;;FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_036 ;Gore death explosion
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 30
    DestructionDelay    = 0
    FX                  = INITIAL WeaponFX_PlasmaImpact
    OCL                 = INITIAL OCL_BloodyGoreExplosion
    FX                  = FINAL   FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_Death0323
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 70
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL WeaponFX_PlasmaImpact            ;;;;;FX_RangerDie
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_03241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_6
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_RadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_DieByToxinUSA
  End
  Behavior = SlowDeathBehavior ModuleTag_0323241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_7
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_NeutronRadiationDeathInfantry
    FX                  = INITIAL FX_GIDieVirus
    FX                  = FINAL   FX_DieByToxinUSA
  End
  ; --- end Death modules ---

  Geometry = CYLINDER
  GeometryMajorRadius = 9.0
  GeometryMinorRadius = 9.0
  GeometryHeight = 16.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 17     ; 
  ShadowSizeY = 17     ; 
  ShadowTexture = ShadowI     ; 
  BuildCompletion = APPEARS_AT_RALLY_POINT
End


