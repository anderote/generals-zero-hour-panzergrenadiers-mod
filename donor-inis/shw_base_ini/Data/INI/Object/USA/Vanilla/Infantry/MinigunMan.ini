;Epic shoutout to SkyMix_RMT on the C&C Labs Forums for the biohazard minigun guy. Originally his code, but I have improved it slightly.
Object AmericaInfantryHeavy

  SelectPortrait = SRBorisMG_L
  ButtonImage    = SRBorisMG

  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining

    ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    ;NORMAL STANDING
    DefaultConditionState
      Model               = AITECH_SKN
      IdleAnimation       = AITECH_SKL.AITECH_STA 0 21
      IdleAnimation       = AITECH_SKL.AITECH_IDA
      IdleAnimation       = AITECH_SKL.AITECH_IDB 
      AnimationMode       = ONCE
      WeaponMuzzleFlash   = PRIMARY BIOGUNFX
      WeaponFireFXBone    = PRIMARY BIOGUNFX
      WeaponLaunchBone    = PRIMARY BIOGUNFX
      WeaponRecoilBone    = PRIMARY BIOGUNFX
      WeaponMuzzleFlash   = SECONDARY BIOGUNFX
      WeaponFireFXBone    = SECONDARY BIOGUNFX
      WeaponLaunchBone    = SECONDARY BIOGUNFX
      WeaponRecoilBone    = SECONDARY BIOGUNFX
      TransitionKey       = TRANS_Standing
    End

    ConditionState        = REALLYDAMAGED
      IdleAnimation       = AITECH_SKL.AITECH_STA 0 21
      IdleAnimation       = AITECH_SKL.AITECH_IDA
      IdleAnimation       = AITECH_SKL.AITECH_IDB 
      AnimationMode       = ONCE
      TransitionKey       = TRANS_StandingHurt
    End
 
    ; ---- moving
    ConditionState        = MOVING
      Animation           = AITECH_SKL.AITECH_WKA 15
      AnimationMode       = LOOP
      Flags               = RANDOMSTART
      TransitionKey       = TRANS_Walking
      ParticleSysBone     = None InfantryDustTrails
    End
 
    ConditionState        = MOVING REALLYDAMAGED
      Animation           = AITECH_SKL.AITECH_WKA 15
      AnimationMode       = LOOP
      TransitionKey       = TRANS_WalkingHurt
      ParticleSysBone     = None InfantryDustTrails
    End

    ConditionState = FIRING_A
      Animation = AITECH_SKL.AITECH_IDA
      AnimationMode = MANUAL  ;LOOP
      TransitionKey = TRANS_FiringA
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A
    AliasConditionState = RELOADING_A
    AliasConditionState = FIRING_A REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED
    AliasConditionState = RELOADING_A REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_B
    AliasConditionState = RELOADING_B
    AliasConditionState = FIRING_B REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_B REALLYDAMAGED
    AliasConditionState = RELOADING_B REALLYDAMAGED

    ; ---- firing
    ConditionState = USING_WEAPON_A
      Animation = AITECH_SKL.AITECH_IDA
      AnimationMode = MANUAL  ;LOOP
      TransitionKey = TRANS_Firing
    End
 
    ConditionState = USING_WEAPON_A REALLYDAMAGED
      Animation = AITECH_SKL.AITECH_IDA
      AnimationMode = MANUAL  ;LOOP
      TransitionKey = TRANS_FiringHurt
    End
 
    TransitionState = TRANS_Standing TRANS_Firing
      Animation = AITECH_SKL.AITECH_IDA
      AnimationMode = ONCE
    End
 
    TransitionState = TRANS_Firing TRANS_Standing
      Animation = AITECH_SKL.AITECH_IDA
      AnimationMode = ONCE
    End
 
    TransitionState = TRANS_StandingHurt TRANS_FiringHurt
      Animation = AITECH_SKL.AITECH_IDA
      AnimationMode = ONCE_BACKWARDS
    End
 
    TransitionState = TRANS_FiringHurt TRANS_StandingHurt
      Animation = AITECH_SKL.AITECH_IDA
      AnimationMode = ONCE
    End
 
    TransitionState = TRANS_Standing TRANS_StandingHurt
      Animation = AITECH_SKL.AITECH_IDA
      AnimationMode = ONCE
    End

    ConditionState = DYING
      Animation = AITECH_SKL.AITECH_DTA
      Animation = AITECH_SKL.AITECH_DTB
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = AITECH_SKL.AITECH_ADTD1
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = AITECH_SKL.AITECH_ADTD2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = AITECH_SKL.AITECH_ADTD3
      AnimationMode = ONCE
      TransitionKey = None
    End

    ConditionState = SPECIAL_CHEERING
      Animation = AITECH_SKL.AITECH_CHA
      AnimationMode = LOOP
    End

    ;PARACHUTING ANIMATIONS
    ConditionState = FREEFALL
      Animation = AITECH_SKL.AITECH_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL DYING
    ConditionState = PARACHUTING
      Animation = AITECH_SKL.AITECH_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  ; our bone positions should come from the last frame, rather than the first
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING
    TransitionState = TRANS_Falling TRANS_Chute
      Animation = AITECH_SKL.AITECH_POP
      AnimationMode = ONCE
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  ; our bone positions should come from the last frame, rather than the first
    End
    TransitionState = TRANS_Chute TRANS_Stand
      Animation = AITECH_SKL.AITECH_PDN
      AnimationMode = ONCE
    End

  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:AmericaHeavyInfantry
  Side                = America
  EditorSorting       = INFANTRY
  TransportSlotCount  = 1                 ;how many "slots" we take in a transport (0 == not transportable)
  
  WeaponSet 
    Conditions        = None 
    Weapon            = PRIMARY HeavyWeaponsMiniGunInfantry
    Weapon            = SECONDARY HeavyWeaponsMiniGunTank
    PreferredAgainst  = SECONDARY VEHICLE
    ShareWeaponReloadTime = Yes
  End
  ArmorSet
    Conditions      = None
    Armor           = HeavyInfantryArmor
    DamageFX        = TruckDamageFX
  End

  VisionRange = 150
  ShroudClearingRange = 350

  Prerequisites
    Object = AmericaStrategyCenter
  End

  BuildCost = 1000
  BuildTime = 18.0          ;in seconds  
  
  ExperienceValue    = 80 120 160 200    ;Experience point value at each level
  ExperienceRequired = 0 240 560 1000  ;Experience points needed to gain each level
  IsTrainable        = Yes             ;Can gain experience
  CrushableLevel     = 1  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet         = AmericaInfantryHeavyCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect    = HeavyInfantryVoiceSelect
  VoiceMove      = HeavyInfantryVoiceMove
  VoiceGuard     = HeavyInfantryVoiceMove
  VoiceAttack    = HeavyInfantryVoiceAttack
  VoiceFear      = HeavyInfantryVoiceFear
  
  UnitSpecificSounds
    VoiceGarrison  = HeavyInfantryVoiceMove
    VoiceCreate    = HeavyInfantryVoiceCreate
    VoiceEnter     = HeavyInfantryVoiceMove
    VoiceGetHealed = HeavyInfantryVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY SCORE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 300.0
    InitialHealth   = 300.0
  End

  Behavior = AIUpdateInterface ModuleTag_05
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL HeavyWeaponsInfantryLocomotor

  Behavior = AutoFindHealingUpdate   ModuleTag_06 ; This update will have the unit go to a healing station if injured. jba 
    ScanRate = 1000 ; once a second.
    ScanRange = 300 ;
    NeverHeal = 0.85 ;  don't heal if we are > 85% healthy.
    AlwaysHeal = 0.25 ; if we get below 25%, find healing right away.
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_07
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0 ;Increases experience gained by an additional 100%
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    ShockResistance = 1.0
  End

  Behavior = SquishCollide ModuleTag_10
    ;nothing
  End

  Behavior = CommandButtonHuntUpdate  ModuleTag_11
    ;nada
  End

; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6 -EXTRA_7 -EXTRA_8
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_HeavyInfantryDie
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_HeavyInfantryDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_HeavyInfantryDie
    OCL                 = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_HeavyInfantryDie
    OCL                 = INITIAL OCL_ToxicInfantry
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death06 ; don't forget to give it a new, unique module tag
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_HeavyInfantryDie
    OCL                 = INITIAL OCL_ToxicInfantryBeta ;you'll have to create this OCL and make it use the blue guys instead of green ones
  End

  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_HeavyInfantryDie
    OCL                 = INITIAL OCL_ToxicInfantryGamma
  End
  Behavior = SlowDeathBehavior ModuleTag_Death08 ;new and shiney microwave death effect
    DeathTypes          = NONE +EXTRA_2
    DestructionDelay    = 0
    FX                  = INITIAL FX_HeavyInfantryDie
    OCL                 = INITIAL OCL_MicrowavedInfantry 
  End
  Behavior = SlowDeathBehavior ModuleTag_Death09
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_HeavyInfantryDie
    FX                  = FINAL   FX_IfantryTeslaDie
    OCL                 = INITIAL OCL_TeslaDeathInfantry    
  End
  Behavior = SlowDeathBehavior ModuleTag_Death045 ;Brutal kill with lots of blood and no death scream
    DeathTypes          = NONE +EXTRA_4
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FX                  = INITIAL FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_036 ;Gore death explosion
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 30
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_BloodyGoreExplosion
    FX                  = FINAL   FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_Death0323
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 70
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_HeavyInfantryDie
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_03241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_6
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_RadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_HeavyInfantryDie
  End
  Behavior = SlowDeathBehavior ModuleTag_0323241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_7
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_NeutronRadiationDeathInfantry
    FX                  = INITIAL FX_GIDieVirus
    FX                  = FINAL   FX_HeavyInfantryDie
  End
; --- end Death modules ---

  Behavior = ProductionUpdate ModuleTag_Taunt01
    ; nothing
  End

  Behavior = ObjectCreationUpgrade ModuleTag_Taunt02
    UpgradeObject = OCL_HeavyTauntObject
    TriggeredBy   = Upgrade_GLAWorkerFakeCommandSet
  End

  ClientUpdate = SwayClientUpdate ModuleTag_Sway01
    ;Helps make infantry look a bit more organic
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 7.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 7.0

  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14;
  ShadowSizeY = 14;
  ShadowTexture = ShadowI;
  BuildCompletion = APPEARS_AT_RALLY_POINT
End

Object AirF_AmericaInfantryHeavy

  ; *** ART Parameters ***
  SelectPortrait = SRBorisMG_L
  ButtonImage    = SRBorisMG

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    DefaultConditionState
      Model               = AITECH_SKN
