Object AmericaVehicleBattleShipReal

  SelectPortrait         = SABattleship_L
  ButtonImage            = SABattleship

  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining

  ; *** ART Parameters ***
  Draw                   = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    InitialRecoilSpeed   = 120
    MaxRecoilDistance    = 8
    RecoilSettleSpeed    = 6
    ConditionState       = NONE
      Model              = avbattlesh
      Animation          = avbattlesh.avbattlesh
      AnimationMode      = LOOP
      Turret             = Turret01
      TurretPitch        = TurretEL01
      TurretArtAngle     = 180  ; this turret has art pointed 180 degrees backward
      AltTurret          = Turret02
      AltTurretPitch     = TurretEL02
      WeaponFireFXBone   = PRIMARY Tur1Muzzle
      WeaponRecoilBone   = PRIMARY Tur1Barrel
      WeaponFireFXBone   = SECONDARY Tur2Muzzle
      WeaponRecoilBone   = SECONDARY Tur2Barrel
      ParticleSysBone   = TreadFX02 BattleShipWaterRipples
      ParticleSysBone   = TreadFX03 BattleShipWaterRipples
      ParticleSysBone   = TreadFX04 BattleShipWaterRipples
    End
    ConditionState       = DAMAGED
      Model              = avbattlesh_D
      Animation          = avbattlesh_D.avbattlesh_D
      AnimationMode      = LOOP
      Turret             = Turret01
      TurretPitch        = TurretEL01
      TurretArtAngle     = 180  ; this turret has art pointed 180 degrees backward
      AltTurret          = Turret02
      AltTurretPitch     = TurretEL02
      WeaponFireFXBone   = PRIMARY Tur1Muzzle
      WeaponRecoilBone   = PRIMARY Tur1Barrel
      WeaponFireFXBone   = SECONDARY Tur2Muzzle
      WeaponRecoilBone   = SECONDARY Tur2Barrel
      ParticleSysBone   = TreadFX02 BattleShipWaterRipples
      ParticleSysBone   = TreadFX03 BattleShipWaterRipples
      ParticleSysBone   = TreadFX04 BattleShipWaterRipples
    End
    ConditionState       = REALLYDAMAGED RUBBLE
      Model              = avbattlesh_D1
      Animation          = avbattlesh_D1.avbattlesh_D1
      AnimationMode      = LOOP
      Turret             = Turret01
      TurretPitch        = TurretEL01
      TurretArtAngle     = 180  ; this turret has art pointed 180 degrees backward
      AltTurret          = Turret02
      AltTurretPitch     = TurretEL02
      WeaponFireFXBone   = PRIMARY Tur1Muzzle
      WeaponRecoilBone   = PRIMARY Tur1Barrel
      WeaponFireFXBone   = SECONDARY Tur2Muzzle
      WeaponRecoilBone   = SECONDARY Tur2Barrel
      ParticleSysBone   = TreadFX02 BattleShipWaterRipples
      ParticleSysBone   = TreadFX03 BattleShipWaterRipples
      ParticleSysBone   = TreadFX04 BattleShipWaterRipples
    End
  End


  ; ***DESIGN parameters ***
  DisplayName            = OBJECT:Battleship
  Side                   = America
  EditorSorting          = VEHICLE
  TransportSlotCount     = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  CommandSet = GenericCommandSet

  ArmorSet
    Conditions           = None
    Armor                = StructureArmorTough
  End

  VisionRange            = 400
  ShroudClearingRange    = 400
  ;Unneeded because its moved to a science
  BuildCost           = 10000
  BuildTime           = 30.0    

  ExperienceValue        = 250 500 1000 2000 ;Experience point value at each level
  ExperienceRequired     = 0 1400 2700 4200 ;Experience points needed to gain each level
  IsTrainable            = Yes  ;Can gain experience
  ;CrusherLevel           = 3  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  ;CrushableLevel         = 3  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  

  ; *** AUDIO Parameters ***
  VoiceSelect = BattleshipVoiceSelect
  VoiceMove = BattleshipVoiceMove
  VoiceGuard = BattleshipVoiceMove
  VoiceAttack = BattleshipVoiceAttack
  VoiceAttackAir = BattleshipVoiceAttack
  SoundAmbient = BattleshipAmbientLoop

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    TurretMoveLoop       = TurretMoveLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority          = UNIT
  KindOf                 = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT PRODUCED_AT_HELIPAD ;BOAT ;Irony.

  Body = ActiveBody ModuleTag_02
    MaxHealth            = 3000.0
    InitialHealth        = 3000.0
  End
  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate     = 80
      TurretPitchRate    = 80
      FirePitch          = 15            ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch        = Yes
      RecenterTime       = 5000       ; how long to wait during idle before recentering
      ControlledWeaponSlots = PRIMARY
      NaturalTurretAngle = 180  ; this turret points backwards normally
    End
    AltTurret
      TurretTurnRate     = 80
      TurretPitchRate    = 80
      FirePitch          = 15          ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch        = Yes
      RecenterTime       = 5000     ; how long to wait during idle before recentering
      ControlledWeaponSlots = SECONDARY
    End
;    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL HelixLocomotor ;They move now ;)
  Locomotor = SET_TAXIING   BasicHelicopterTaxiLocomotor

  Behavior = AutoHealBehavior ModuleTag_900
    HealingAmount = 4
    HealingDelay = 1000 ; msec
    TriggeredBy = Upgrade_Veterancy_ELITE
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_11
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0 ;Increases experience gained by an additional 100%
  End

  Behavior               = PhysicsBehavior ModuleTag_04
    Mass                 = 100.0 ;1000.0
  End

  Geometry               = BOX
  GeometryMajorRadius    = 150.0
  GeometryMinorRadius    = 15.0
  GeometryHeight         = 30     
  GeometryIsSmall        = No 
  Shadow                 = SHADOW_VOLUME   
  ;Scale = 0.75
End