Object AmericaVehicleSwatVan
  ; *** ART Parameters ***
  SelectPortrait = SCCopVan_L
  ButtonImage    = SCCopVan

  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      ; give it a model so it'll show up in WB
      Model = cvswatvan
    End
  End

  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model             = NONE
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model             = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  ; set cost and time fields here or else they won't work
  BuildCost = 1500
  BuildTime = 25.0

  Side = America
  EditorSorting = VEHICLE
  BuildVariations = AmericaVehicleSwatVanVar1 AmericaVehicleSwatVanVar2

  KindOf = PRELOAD SELECTABLE VEHICLE CAN_ATTACK TRANSPORT SCORE DONT_AUTO_CRUSH_INFANTRY ATTACK_NEEDS_LINE_OF_SIGHT
End

;MURICA! FUCK YEAH!
Object AmericaVehicleSwatVanVar1
  SelectPortrait = SCCopVan_L
  ButtonImage    = SCCopVan

  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = cvswatvan
    End

    ConditionState = REALLYDAMAGED RUBBLE
      Model = cvswatvan_D
    End

    TrackMarks         = EXTireTrack.tga
    Dust               = RocketBuggyDust
    DirtSpray          = RocketBuggyDirtSpray
    PowerslideSpray    = RocketBuggyDirtPowerSlide
    LeftFrontTireBone  = Tire02
    RightFrontTireBone = Tire01
    LeftRearTireBone   = Tire04
    RightRearTireBone  = Tire03
  End

  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model             = NONE
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model             = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End

  DisplayName        = OBJECT:EuroPoliceVan
  Side               = America
  EditorSorting      = VEHICLE
  TransportSlotCount = 4

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY TroopCrawlerAssault
  End

  ArmorSet
    Conditions = None
    Armor = SWATVanArmor
    DamageFX = TankDamageFX
  End

  BuildCost = 1500
  BuildTime = 25.0

  IsTrainable = Yes
  ExperienceValue = 50 50 50 50
  ExperienceRequired = 0 125 175 250

  VisionRange = 150
  ShroudClearingRange = 250

  CrusherLevel = 2
  CrushableLevel = 2

  CommandSet = SquadVanCommandSet

  VoiceSelect           = POWTruckUSAVoiceSelect
  VoiceMove             = POWTruckUSAVoiceMove
  VoiceGuard            = POWTruckUSAVoiceMove
  SoundMoveStart        = MantisTankMoveStart
  SoundMoveStartDamaged = MantisTankMoveStart
  UnitSpecificSounds
    VoiceCreate = POWTruckUSAVoiceCreate
    SoundEject  = PilotSoundEject
    VoiceCrush  = POWTruckUSAVoiceCrush
    VoiceEnter  = POWTruckUSAVoiceMove
  End

  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE VEHICLE CAN_ATTACK TRANSPORT SCORE DONT_AUTO_CRUSH_INFANTRY ATTACK_NEEDS_LINE_OF_SIGHT

  Body = ActiveBody ModuleTag_02
    MaxHealth = 550.0
    InitialHealth = 550.0
    SubdualDamageCap = 600
    SubdualDamageHealRate = 555
    SubdualDamageHealAmount = 45
  End

  Behavior = AssaultTransportAIUpdate ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes ; let the contained do it for themselves
    MembersGetHealedAtLifeRatio = 0.5
    ClearRangeRequiredToContinueAttackMove = 75
  End

  Behavior = TransportContain ModuleTag_04
    Slots                   = 8
    InitialPayload          = AmericaInfantryPoliceOfficer 8
    HealthRegen%PerSec      = 10%
    DamagePercentToUnits    = 100%
    PassengersAllowedToFire = No
    AllowInsideKindOf       = INFANTRY
    ForbidInsideKindOf      = VEHICLE BOAT
    ExitDelay               = 250
    NumberOfExitPaths       = 3
    ScatterNearbyOnExit     = Yes
    GoAggressiveOnExit      = Yes
    EnterSound              = EnterPOWTruck
    ExitSound               = ExitPOWTruck
  End

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 90.0
  End
  Locomotor = SET_NORMAL HumveeLocomotor

  Behavior = InstantDeathBehavior ModuleTag_06
    DeathTypes = ALL
    FX = FX_BattleMasterExplosionOneFinal  
    OCL = OCL_PoliceCarExplode
  End

  Behavior = TransitionDamageFX ModuleTag_07
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_08
    AflameDuration = 5000
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End

  Behavior = FireWeaponUpdate ModuleTag_09
    Weapon = AmbulanceHealDecalWeapon
  End

  Behavior = AutoHealBehavior ModuleTag_10
    HealingAmount     = 4
    HealingDelay      = 1000 ; msec
    Radius            = 100.0
    StartsActive      = Yes
    KindOf            = INFANTRY
  End

  Behavior = ProductionUpdate ModuleTag_11
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End

  Behavior = ObjectCreationUpgrade ModuleTag_12
    UpgradeObject = OCL_AmericanBattleDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_13
    UpgradeObject = OCL_AmericanScoutDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_14
    UpgradeObject = OCL_AmericanHellfireDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End

  Geometry = BOX
  GeometryIsSmall = Yes
  GeometryMajorRadius = 14
  GeometryMinorRadius = 7
  GeometryHeight = 12
  Shadow = SHADOW_VOLUME 
End

