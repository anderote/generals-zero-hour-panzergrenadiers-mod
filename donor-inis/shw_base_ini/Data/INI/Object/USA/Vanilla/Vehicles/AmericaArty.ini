;give him love.
Object AmericaVehicleDualM198

  SelectPortrait         = AVM198_L
  ButtonImage            = AVM198

  UpgradeCameo1 = Upgrade_AmericaAdvancedTraining

  Draw = W3DTankDraw ModuleTag_01
    InitialRecoilSpeed   = 120
    MaxRecoilDistance    = 8
    RecoilSettleSpeed    = 6

    OkToChangeModelColor = Yes

    ExtraPublicBone = Turret01
    ExtraPublicBone = Barrel

    DefaultConditionState
      Model                           = ArtilleryT
      WeaponLaunchBone                = PRIMARY TurretMS
      WeaponMuzzleFlash               = PRIMARY TurretFX
      WeaponFireFXBone                = PRIMARY TurretMS
      WeaponRecoilBone                = PRIMARY Barrel
      WeaponLaunchBone                = SECONDARY TurretMS
      WeaponMuzzleFlash               = SECONDARY TurretFX
      WeaponFireFXBone                = SECONDARY TurretMS
      WeaponRecoilBone                = SECONDARY Barrel
      Turret                          = Turret01
      TurretPitch                     = TurretEL
    End
    ConditionState                    = RUBBLE
      Model                           = ArtilleryT_D1
      WeaponLaunchBone                = PRIMARY TurretMS
      WeaponMuzzleFlash               = PRIMARY TurretFX
      WeaponFireFXBone                = PRIMARY TurretMS
      WeaponRecoilBone                = PRIMARY Barrel
      WeaponLaunchBone                = SECONDARY TurretMS
      WeaponMuzzleFlash               = SECONDARY TurretFX
      WeaponFireFXBone                = SECONDARY TurretMS
      WeaponRecoilBone                = SECONDARY Barrel
      Turret                          = Turret01
      TurretPitch                     = TurretEL
    End

    ;*** PACKED STATE -- ready to move ***
    ConditionState    = MOVING
      Animation       = ArtilleryT.ArtilleryT
      AnimationMode   = ONCE_BACKWARDS
      Flags           = START_FRAME_FIRST
    End
    AliasConditionState = MOVING BETWEEN_FIRING_SHOTS_A ;Very long shot delay -- possibly moving
    AliasConditionState = BETWEEN_FIRING_SHOTS_A
    ;***
    ConditionState    = REALLYDAMAGED MOVING
      Model           = ArtilleryT_D
      Animation       = ArtilleryT_D.ArtilleryT_D
      AnimationMode   = ONCE_BACKWARDS
      Flags           = START_FRAME_FIRST
    End
    AliasConditionState = REALLYDAMAGED MOVING BETWEEN_FIRING_SHOTS_A ;Very long shot delay -- possibly moving

    ;*** UNPACKING STATE  -- preparing to fire ***
    ConditionState    = UNPACKING
      Animation       = ArtilleryT.ArtilleryT
      AnimationMode   = MANUAL
    End
    AliasConditionState = UNPACKING BETWEEN_FIRING_SHOTS_A ;Very long shot delay
    ;***
    ConditionState    = REALLYDAMAGED UNPACKING
      Model           = ArtilleryT_D
      Animation       = ArtilleryT_D.ArtilleryT_D
      AnimationMode   = MANUAL
    End
    AliasConditionState = REALLYDAMAGED UNPACKING BETWEEN_FIRING_SHOTS_A ;Very long shot delay

    ;*** PACKING STATE -- preparing to move ***
    ConditionState    = PACKING
      Animation       = ArtilleryT.ArtilleryT
      AnimationMode   = MANUAL
    End
    AliasConditionState = PACKING BETWEEN_FIRING_SHOTS_A ;Very long shot delay
    ;***
    ConditionState    = REALLYDAMAGED PACKING
      Model           = ArtilleryT
      Animation       = ArtilleryT.ArtilleryT
      AnimationMode   = MANUAL
    End
    AliasConditionState = REALLYDAMAGED PACKING BETWEEN_FIRING_SHOTS_A ;Very long shot delay

    ;*** DEPLOYED STATE -- ready to fire ***
    ConditionState  = DEPLOYED 
      Animation       = ArtilleryT.ArtilleryT
      AnimationMode   = ONCE
      Flags           = START_FRAME_LAST
      TransitionKey   = TRANS_FIRING_A
      WeaponLaunchBone                = PRIMARY TurretMS
      WeaponMuzzleFlash               = PRIMARY TurretFX
      WeaponFireFXBone                = PRIMARY TurretMS
      WeaponRecoilBone                = PRIMARY Barrel
      WeaponLaunchBone                = SECONDARY TurretMS
      WeaponMuzzleFlash               = SECONDARY TurretFX
      WeaponFireFXBone                = SECONDARY TurretMS
      WeaponRecoilBone                = SECONDARY Barrel
      Turret                          = Turret01
      TurretPitch                     = TurretEL
    End
    AliasConditionState = DEPLOYED FIRING_A
    AliasConditionState = DEPLOYED BETWEEN_FIRING_SHOTS_A
    AliasConditionState = DEPLOYED RELOADING_A
    AliasConditionState = DEPLOYED MOVING

    ConditionState  = DEPLOYED REALLYDAMAGED
      Model           = ArtilleryT_D
      Animation       = ArtilleryT_D.ArtilleryT_D
      AnimationMode   = ONCE
      Flags           = START_FRAME_LAST
      TransitionKey   = TRANS_FIRING_A
      WeaponLaunchBone                = PRIMARY TurretMS
      WeaponMuzzleFlash               = PRIMARY TurretFX
      WeaponFireFXBone                = PRIMARY TurretMS
      WeaponRecoilBone                = PRIMARY Barrel
      WeaponLaunchBone                = SECONDARY TurretMS
      WeaponMuzzleFlash               = SECONDARY TurretFX
      WeaponFireFXBone                = SECONDARY TurretMS
      WeaponRecoilBone                = SECONDARY Barrel
      Turret                          = Turret01
      TurretPitch                     = TurretEL
    End
    AliasConditionState = DEPLOYED REALLYDAMAGED FIRING_A
    AliasConditionState = DEPLOYED REALLYDAMAGED BETWEEN_FIRING_SHOTS_A
    AliasConditionState = DEPLOYED REALLYDAMAGED RELOADING_A
    AliasConditionState = DEPLOYED REALLYDAMAGED MOVING
    
    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate = 2.0;  amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:AmericaM198
  Side               = America
  EditorSorting      = VEHICLE
  TransportSlotCount = 8                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon            = PRIMARY   M198HowitzerGun
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End
  
  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End
  BuildCost       = 2000
  BuildTime       = 25.0          ;in seconds  
  
  VisionRange     = 200
  ShroudClearingRange = 420

  Prerequisites
    Object = AmericaStrategyCenter
  End

  ExperienceValue = 120 140 170 220    ;Experience point value at each level
  ExperienceRequired = 0 280 595 1100  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 3  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet    = AmericaVehicleM198CommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect       = M198ArtilleryVoiceSelect
  VoiceMove         = M198ArtilleryVoiceMove
  VoiceGuard        = M198ArtilleryVoiceMove
  VoiceAttack       = M198ArtilleryVoiceAttack
  SoundMoveStart        = InfernoCannonMoveStart
  SoundMoveStartDamaged = InfernoCannonMoveStart
  UnitSpecificSounds
    VoiceCreate     = M198ArtilleryVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound
    VoiceCrush      = M198ArtilleryVoiceMove
    VoiceEnter      = M198ArtilleryVoiceMove
    Deploy              = NukeCannonDeploy
    Undeploy            = NukeCannonUnDeploy
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK VEHICLE HUGE_VEHICLE SCORE CANNOT_RETALIATE
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 300.0
    InitialHealth   = 300.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 480
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = DeployStyleAIUpdate ModuleTag_04
    Turret
      TurretTurnRate        = 35             ; Turret is off-centered for two barrels.
      TurretPitchRate       = 40
      FirePitch             = 45            ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch           = Yes
      RecenterTime          = 5000         ; how long to wait during idle before recentering
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY
      NaturalTurretAngle    = 0
      InitiallyDisabled     = Yes
    End
    AutoAcquireEnemiesWhenIdle = Yes
    PackTime = 3333
    UnpackTime = 3333
    TurretsFunctionOnlyWhenDeployed = Yes
    TurretsMustCenterBeforePacking = Yes
    ManualDeployAnimations = Yes
  End
  Locomotor = SET_NORMAL ChinaNukeCannonLocomotor_Upgraded

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 150.0
  End

  Behavior = SlowDeathBehavior ModuleTag_06
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay  = 400
    DestructionDelayVariance  = 100
    FX  = INITIAL  FX_BattleMasterExplosionOneFinal
    OCL = MIDPOINT OCL_ArtilleryCannonDeathEffect
    ;FX  = FINAL    FX_ChinaVehicleNukeCannonDeathExplosion
  End

  Behavior = ObjectCreationUpgrade ModuleTag_Drone01
    UpgradeObject = OCL_AmericanBattleDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_Drone02
    UpgradeObject = OCL_AmericanScoutDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_Drone03
    UpgradeObject = OCL_AmericanHellfireDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End

  Behavior = ProductionUpdate ModuleTag_Drone04
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End
    
  ; A crushing defeat
  Behavior = FXListDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_08
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End
  Behavior = CreateCrateDie ModuleTag_09
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior                 = TransitionDamageFX ModuleTag_10
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End

  Behavior = DestroyDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = EjectPilotDie ModuleTag_Infection01
    DeathTypes         = ALL -CRUSHED -SPLATTED
    ExemptStatus       = HIJACKED IS_CARBOMB
    VeterancyLevels    =  ALL -REGULAR ;only vet+ gives pilot
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList    = OCL_EjectPilotViaParachute
  End
  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = ExperienceScalarUpgrade ModuleTag_EXP01
    TriggeredBy   = Upgrade_AmericaAdvancedTraining
    AddXPScalar   = 1.0 ;Increases experience gained by an additional 100%
  End

  Geometry = BOX
  GeometryMajorRadius = 32.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 17.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length    
End


Object SupW_AmericaVehicleDualM198

  ; *** ART Parameters ***
  SelectPortrait         = AVM198_L
  ButtonImage            = AVM198

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    DefaultConditionState
      Model = ArtilleryT
    End
  End

  ; set cost and time fields here or else they won't work
  BuildCost       = 2000
  BuildTime       = 25.0          ;in seconds      

  Prerequisites
    Object = SupW_AmericaStrategyCenter
  End

  Side            = AmericaSuperWeaponGeneral
  EditorSorting   = VEHICLE
  BuildVariations = AmericaVehicleDualM198

  KindOf = PRELOAD SELECTABLE CAN_ATTACK VEHICLE HUGE_VEHICLE SCORE CANNOT_RETALIATE

End

