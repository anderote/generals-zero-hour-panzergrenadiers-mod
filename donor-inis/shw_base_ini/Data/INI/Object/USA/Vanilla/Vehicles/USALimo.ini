Object GLAVehicleFancyLimo

  ; *** ART Parameters ***
  SelectPortrait         = SSLimoDriver_L
   ButtonImage           = SSLimoDriver

  Draw = W3DTruckDraw ModuleTag_01      ;W3DModelDraw ModuleTag_01
    ConditionState = NONE
      Model = CVShkLimo
    End
    ConditionState  = REALLYDAMAGED
      Model = CVShkLimo_D
    End
    ConditionState  = RUBBLE
      Model = CVShkLimo_D1
    End
    
    TrackMarks = EXTireTrack.tga
    Dust                        = RocketBuggyDust
    DirtSpray                   = RocketBuggyDirtSpray
    PowerslideSpray             = RocketBuggyDirtPowerSlide

    ; These parameters are only used if the model has a separate suspension, 
    ; and the locomotor has HasSuspension = Yes.
    LeftFrontTireBone = Tire01
    RightFrontTireBone = Tire02
    LeftRearTireBone = Tire03
    RightRearTireBone = Tire04
    TireRotationMultiplier = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition = 1.25   ; This speed is added to the rotation speed when powersliding.
  End

  ; ***DESIGN parameters ***
  DisplayName     = OBJECT:Limo
  Side            = GLA
  EditorSorting   = VEHICLE

  BuildCost       = 1000
  BuildTime       = 10.0          ;in seconds    
  VisionRange     = 180
  ShroudClearingRange = 200

  ExperienceValue = 50 50 50 50    ;Experience point value at each level
  IsTrainable = No            ;Cant gain experience

  WeaponSet
    Conditions = None
    Weapon = PRIMARY  DummyWeapon
  End
  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions      = None
    Armor           = TruckArmor
    DamageFX        = LimoDamageFX
  End

  CommandSet        = CivilianVehicleLimoCommandSet

  TransportSlotCount  = 4                 ;how many "slots" we take in a transport (0 == not transportable)
  CrusherLevel        = 0  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel      = 1  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  ; *** AUDIO Parameters ***
  VoiceSelect = BattleBusVoiceSelect
  VoiceMove = BattleBusVoiceMove
  VoiceGuard = BattleBusVoiceMove
  VoiceAttack = BattleBusVoiceAttack
  SoundMoveStart = BattleBusMoveStart
  SoundMoveStartDamaged = BattleBusMoveStart
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate= BattleBusVoiceCreate
    TurretMoveStart               = NoSound
    TurretMoveLoop                = NoSound
    TruckLandingSound             = RocketBuggyLand
    TruckPowerslideSound          = NoSound
    VoiceUnload                   = BattleBusVoiceUnload
  End

  ; *** ENGINEERING Parameters ***  
  KindOf          = PRELOAD SELECTABLE VEHICLE TRANSPORT SCORE
  RadarPriority   = UNIT

  Body            = ActiveBody ModuleTag_02
    MaxHealth       = 500.0
    InitialHealth   = 500.0
  End
  
  Behavior = PhysicsBehavior ModuleTag_03
    Mass = 50.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_04
  End
  Locomotor = SET_NORMAL LimoLocomotor
  
  Behavior = TransportContain ModuleTag_05
    PassengersAllowedToFire = No
    Slots                 = 12
    ScatterNearbyOnExit   = Yes
    HealthRegen%PerSec    = 50
    DamagePercentToUnits  = 0%
    AllowInsideKindOf     = INFANTRY
    ForbidInsideKindOf    = BOAT
    ExitDelay         = 250
    NumberOfExitPaths = 3 ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit = Yes ; AI Will tell people to set their mood to Aggressive on exiting
  End

  Behavior = DestroyDie ModuleTag_06
    DeathTypes = ALL -CRUSHED -SPLATTED
  End
  Behavior = CrushDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    TotalCrushSound     = CarAlarm
    BackEndCrushSound   = CarAlarm
    FrontEndCrushSound  = CarAlarm
    TotalCrushSoundPercent    = 50   
    BackEndCrushSoundPercent  = 50
    FrontEndCrushSoundPercent = 50
  End
  Behavior = SlowDeathBehavior ModuleTag_08
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 14000
    SinkRate = 2     ; in Dist/Sec
    DestructionDelay = 20000
  End

  Behavior = FXListDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_10
    DeathTypes = ALL -CRUSHED -SPLATTED
    CreationList = OCL_LimoExplode
  End
  Behavior = FXListDie ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED -FLOODED
    DeathFX = FX_LimoExplode
  End

  Behavior = PhysicsBehavior ModuleTag_12
    Mass = 30.0
  End

  Behavior = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:No PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_LimoDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_14
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = CreateCrateDie ModuleTag_CratesChange
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Geometry        = BOX
  GeometryIsSmall = Yes
  GeometryMajorRadius = 19.0
  GeometryMinorRadius = 5.0
  GeometryHeight  = 7.0
  Shadow          = SHADOW_VOLUME

End












Object HijackerLogicTestUnit
  ; *** ART Parameters ***
  SelectPortrait         = SABattleDrone_L
  ButtonImage            = SABattleDrone
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = AVFrbsDrn
      Animation = AVFrbsDrn.AVFrbsDrn
      AnimationMode = LOOP
      Turret = TURRET
    End
    ConditionState = REALLYDAMAGED
      Model = AVFrbsDrn_d
      Animation = AVFrbsDrn_d.AVFrbsDrn_d
      AnimationMode = LOOP
      Turret = TURRET
    End
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:LeechDrone
  Side = America
  EditorSorting = VEHICLE
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)

  ArmorSet
    Conditions      = None
    Armor           = NoArmor         ;NanomachineArmor ; This is the same, just immune to LAND_MINE DamageType
    DamageFX        = TankDamageFX
  End

  VisionRange = 100
  ShroudClearingRange = 200

  BuildCost = 400
  BuildTime = 10.0          ;in seconds

  ExperienceValue = 50 100 150 400    ;Experience point value at each level
  ExperienceRequired  = 0 40 60 120     ;Experience points needed to gain each level
  IsTrainable = Yes                   ;Can gain experience
  CrushableLevel         = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet    = HijackerLogicCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = RepairDroneVoiceSelect
  VoiceMove             = RepairDroneVoiceMove
  VoiceGuard            = RepairDroneVoiceMove
  VoiceAttack           = RepairDroneVoiceMove
  SoundMoveStart        = RocketBuggyMoveStart
  SoundMoveStartDamaged = RocketBuggyMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = SentryDroneVoiceCreate
    VoiceEnterHostile   = RepairDroneVoiceMove
    TurretMoveStart     = NoSound
    TurretMoveLoop      = NoSound
    VoiceEnter          = NoSound
    Deploy              = NoSound
    Undeploy            = NoSound
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  EnterGuard = Yes
  HijackGuard = Yes
  KindOf = PRELOAD SELECTABLE CAN_CAST_REFLECTIONS INFANTRY SALVAGER SCORE STEALTH_GARRISON EMP_HARDENED

  Body = ActiveBody ModuleTag_03
    MaxHealth       = 150.0
    InitialHealth   = 150.0
  End

  Behavior = HijackerUpdate ModuleTag_04
    ParachuteName = GLAParachute
  End

  Behavior = AIUpdateInterface ModuleTag_05
    AutoAcquireEnemiesWhenIdle = Yes
  End
  
  Behavior = CommandButtonHuntUpdate  ModuleTag_CBH01 ; allows use of command button hunt script with this unit. 
  End
  Locomotor = SET_NORMAL LeechDroneLocomotor

  Behavior = PhysicsBehavior ModuleTag_06
    Mass = 500.0
  End

  Behavior = ConvertToCarBombCrateCollide       ModuleTag_06123
    RequiredKindOf    = VEHICLE      ; we only give our bonus to VEHICLEs we collide with
    ForbiddenKindOf   = BLAST_CRATER COMMANDCENTER IMMUNE_TO_CAPTURE  ;This forbids it from working on Dozers and Command Vehicles (I think), as well as ExoSuits
    FXList            = FX_MakeCarBombSuccess
  End
  
  Behavior = StealthUpdate ModuleTag_07
    StealthDelay                = 0
    StealthForbiddenConditions  = NONE
    MoveThresholdSpeed          = 3
    InnateStealth               = Yes ;Requires upgrade first
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End

  Behavior = SquishCollide ModuleTag_09
  End

; --- begin Death modules ---
  Behavior = DestroyDie ModuleTag_Death01
    DeathTypes = ALL
  End
  Behavior = CreateObjectDie ModuleTag_Death02
    DeathTypes   = ALL
    CreationList = OCL_AmericaScoutDroneExplode
  End
  Behavior = FXListDie ModuleTag_Death03
    DeathTypes = ALL
    DeathFX    = FX_AmericaScoutDroneExplode
  End

; --- end Death modules ---
  Behavior = PoisonedBehavior ModuleTag_14
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  End

  Behavior = CommandButtonHuntUpdate  ModuleTag_Hunt01 ; allows use of command button hunt script with this unit. 
  End

  ;This goes on unit to allow it to plant leeches
  ;It creates basically a TimedC4Charge with no timer
  ;The SpecialObject has a FireWeaponUpdate (same weapon as below)
  ;It will damage the unit it is stuck to, eventually killing it (if armor allows)
  Behavior = SpecialAbility ModuleTag_SpecialPower01
    SpecialPowerTemplate = SpecialAbilityLeechInfection
    UpdateModuleStartsAttack = Yes
    InitiateSound = NoSound
  End

  Behavior = SpecialAbilityUpdate ModuleTag_SpecialPower02
    SpecialPowerTemplate = SpecialAbilityLeechInfection
    StartAbilityRange = 1.0   ;2.0 works most of the time
    PreparationTime = 1
    SpecialObject = LeechInfectionOnUnit
    MaxSpecialObjects = 100
    SpecialObjectsPersistWhenOwnerDies = Yes
    SpecialObjectsPersistent = Yes          ;Charges are persistent till lifetime expires or owner detonates them..
  End

  ;When you use the button to plant the charge, the test unit will also Hijack the target vehicle
  ;Essentially turning it into an on-the-fly car bomb
  Behavior = SpecialAbility ModuleTag_SpecialPower03
    SpecialPowerTemplate = SpecialAbilityHijackerCarBomb
    UpdateModuleStartsAttack = Yes
    InitiateSound = NoSound
  End

  Behavior = SpecialAbilityUpdate ModuleTag_SpecialPower04
    SpecialPowerTemplate = SpecialAbilityHijackerCarBomb
    StartAbilityRange = 1.0
    PreparationTime = 1
    SpecialObject = HijackerCarBomb
    MaxSpecialObjects = 100
    SpecialObjectsPersistWhenOwnerDies = Yes
    SpecialObjectsPersistent = Yes          ;Charges are persistent till lifetime expires or owner detonates them..
  End

  ;This module is carried over by the Hijacker to whatever unit he hijacks.
  ;This test unit is immune to the DamageType (LAND_MINE)
  ;A hijacked unit will take damage and eventually kill itself with this (if the targets armor allows)
  ;Behavior = FireWeaponUpdate ModuleTag_0666
    ;Weapon = LeechInfectionDamageOverTime
  ;End

  Geometry = CYLINDER
  GeometryMajorRadius = 4.0
  GeometryMinorRadius = 5.0
  GeometryHeight = 3.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
  Scale = 0.93
End






Object MobileSupplyGatherer
  ; *** ART Parameters ***
  
  SelectPortrait         = SNSupplyTruck_L
  ButtonImage            = SNSupplyTruck
  
  UpgradeCameo1 = Upgrade_Nationalism
  ;UpgradeCameo2 = NONE
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes
    
    DefaultConditionState
      Model           = NVSSUPPLYTK
      HideSubObject   = Cargo01
    End
    
    ConditionState    = REALLYDAMAGED
      Model           = NVSSUPPLYTK_D
    End
    
    ConditionState    = RUBBLE
      Model           = NVSSUPPLYTK_D
    End
    
    ConditionState    = CARRYING
      ShowSubObject   = Cargo01
    End
    
    ConditionState    = REALLYDAMAGED CARRYING
      Model           = NVSSUPPLYTK_D
      ShowSubObject   = Cargo01
    End
    
    ConditionState    = RUBBLE CARRYING
      Model           = NVSSUPPLYTK_D
      ShowSubObject   = Cargo01
    End
    
    TrackMarks              = EXTireTrack.tga

    LeftFrontTireBone           = Tire01
    RightFrontTireBone          = Tire02
    MidLeftRearTireBone         = Tire03
    MidRightRearTireBone        = Tire04
    LeftRearTireBone            = Tire05
    RightRearTireBone           = Tire06
    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 2.5   ; This speed is added to the rotation speed when powersliding.

    Dust                    = RocketBuggyDust
    DirtSpray               = RocketBuggyDirtSpray
    PowerslideSpray         = RocketBuggyDirtPowerSlide
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:SupplyTruck
  Side                = China
  EditorSorting       = VEHICLE
  TransportSlotCount  = 2                 ;how many "slots" we take in a transport (0 == not transportable)
  BuildCost           = 600
  BuildTime           = 10.0      ;in seconds
  VisionRange         = 150
  ShroudClearingRange = 300

  ExperienceValue    = 50 50 50 50 ;Experience point value at each level

  ArmorSet
    Conditions      = None
    Armor           = TruckArmor
    DamageFX        = TankDamageFX
  End
  CrusherLevel            = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel          = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet              = ChinaSupplyTruckCommandSet
  ; *** AUDIO Parameters ***
  VoiceSelect             = SupplyTruckVoiceSelect
  VoiceMove               = SupplyTruckVoiceMove
  VoiceAttack             = SupplyTruckVoiceAttack
  SoundMoveStart          = SupplyTruckMoveStart
  SoundMoveStartDamaged = SupplyTruckMoveStart
  UnitSpecificSounds
    VoiceCreate           = SupplyTruckVoiceCreate
    TruckLandingSound     = NoSound
    TruckPowerslideSound  = NoSound
    VoiceSupply           = SupplyTruckVoiceSupply
    VoiceCrush            = SupplyTruckVoiceCrush
    VoiceEnter            = SupplyTruckVoiceMove

  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT

  KindOf = PRELOAD SELECTABLE VEHICLE HARVESTER SCORE CASH_GENERATOR FS_SUPPLY_CENTER
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 300.0
    InitialHealth   = 300.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = SupplyTruckAIUpdate ModuleTag_03
    MaxBoxes                    = 8
    SupplyCenterActionDelay     = 400    ; ms for whole thing (one transaction)
    SupplyWarehouseActionDelay  = 1200   ; ms per box (many small transactions)
    SupplyWarehouseScanDistance = 700    ; Max distance to look for a warehouse, or we go home.  (Direct dock command on warehouse overrides, and no max on Center Scan)
    SuppliesDepletedVoice = SupplyTruckVoiceSuppliesDepleted
  End
  Locomotor = SET_NORMAL SupplyTruckLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 1000.0
  End

  Behavior = SlowDeathBehavior ModuleTag_05
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 200
    DestructionDelayVariance = 100
    FX  = FINAL    FX_SupplyTruckExplosionOneFinal
    OCL = FINAL    OCL_ChinaSupplyTruckDeathEffect
  End
    
  Behavior = FXListDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  
  Behavior = CreateObjectDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_ChinaSupplyTruck_CrushEffect
  End

  Behavior                       = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_10
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  ; A crushing defeat
  Behavior = DestroyDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = SupplyCenterCreate ModuleTag_Supp01
    ;nothing
  End
  Behavior = SupplyCenterDockUpdate ModuleTag_Supp02
    AllowsPassthrough = Yes
    NumberApproachPositions = -1
  End

  Geometry = BOX
  GeometryMajorRadius = 17.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 14.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length    
End