Object ORLaserTank   ;SCIENCE
  ; *** ART Parameters ***
  SelectPortrait         = SAAdvancedCrusader_L
  ButtonImage            = SAAdvancedCrusader

  Draw                   = W3DModelDraw ModuleTag_fakeBones   ;Station bone
    OkToChangeModelColor = Yes
    ExtraPublicBone = STATION01

    ConditionState       = NONE
      Model              = UVWARTRACK
      HideSubObject      = UVWARTRACK Chassis Headlight01 Headlight02 Housecolor01 Object02 Tire01 Tire02 Tire03 Tire04 Tire05 Tire06 Truckup Truckup01 Truckup02
    End
  End
  
  Draw = W3DOverlordTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
  
    DefaultConditionState
      Model               = AVWraith
      Turret              = Turret
      WeaponFireFXBone    = PRIMARY TurretMS
      WeaponLaunchBone    = PRIMARY TurretMS
      TurretPitch         = ROCKETPOD
      HideSubObject       = ROCKETPOD 
    End

    ConditionState   = REALLYDAMAGED
      Model               = AVWraith_D
    End
    AliasConditionState   = RUBBLE

    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:Wraith
  Side                   = America
  EditorSorting          = VEHICLE
  TransportSlotCount     = 3

  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY ORLaserTankWeapon
  End

  ArmorSet
    Conditions           = None
    Armor                = ORLaserTankArmor
    DamageFX             = TankDamageFX
  End

  BuildCost              = 700
  BuildTime              = 10.0          ;in seconds    
  VisionRange            = 150
  ShroudClearingRange = 300
  
  ExperienceValue        = 150 170 210 300 ;Experience point value at each level
  ExperienceRequired     = 0 300 735 1500 ;Experience points needed to gain each level
  IsTrainable            = Yes  ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet             = Armor_AmericaTankCrusaderCommandSet
  
  ; *** AUDIO Parameters ***
  VoiceSelect           = AirforceCrusaderTankVoiceSelect
  VoiceMove             = AirforceCrusaderTankVoiceMove
  VoiceGuard            = AirforceCrusaderTankVoiceMove
  VoiceAttack           = AirforceCrusaderTankVoiceAttack
  SoundMoveStart        = WraithTankMoveStart
  SoundMoveStartDamaged = WraithTankMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = CrusaderTankVoiceCreate
    VoiceEnter             = CrusaderTankVoiceMove
    TurretMoveStart     = NoSound
    TurretMoveLoop      = TurretMoveLoop
    SoundEject          = PilotSoundEject
    VoiceEject          = PilotVoiceEject
    VoiceCrush          = CrusaderTankVoiceCrush
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority          = UNIT
  KindOf                 = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE GARRISONABLE_UNTIL_DESTROYED
  
  Body                 = HiveStructureBody ModuleTag_02 ;Requires SpawnBehavior!
    MaxHealth          = 200.0
    InitialHealth      = 200.0
    ;**Careful with these damage types -- because area damage types will already
    ;**damage slaves.
    PropagateDamageTypesToSlavesWhenExisting = ALL -HEALING -FLAME -LAND_MINE -POISON -RADIATION -SUBDUAL_VEHICLE
    SwallowDamageTypesIfSlavesNotExisting = NONE +KILL_GARRISONED     ;Take no damage if no one to pass this to

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 500
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate        = 120 ;60   // turn rate, in degrees per sec
      TurretPitchRate       = 100
      AllowsPitch           = Yes
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor            = SET_NORMAL WraithLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass                 = 120.0
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_10
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 500
    DestructionDelayVariance  = 100
    FX  = INITIAL  FX_GenericTankDeathEffect
    OCL = MIDPOINT OCL_WraithTankDeathEffect
    FX  = FINAL    FX_GenericTankDeathExplosion
    OCL = FINAL    OCL_WraithTurret
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 2000
    DestructionDelayVariance  = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_WraithTankDeathEffect
    FX  = FINAL    FX_GenericTankDeathExplosion
  End

  Behavior                 = TransitionDamageFX ModuleTag_12
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = DestroyDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_14
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateObjectDie ModuleTag_15
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = GarrisonContain ModuleTag_Shield04
    ContainMax                    = 1
    MobileGarrison                = Yes
    EnterSound                    = NoSound
    ExitSound                     = NoSound
    ImmuneToClearBuildingAttacks  = Yes
    DamagePercentToUnits          = 100%
    AllowInsideKindOf             = PORTABLE_STRUCTURE
    ForbidInsideKindOf            = INFANTRY VEHICLE BOAT
    IsEnclosingContainer          = No
  End

  Behavior = FireWeaponUpdate ModuleTag_ShieldRecharge01
    Weapon = ShieldRechargeWeapon
  End
  
  Geometry               = BOX
  GeometryMajorRadius    = 18.0
  GeometryMinorRadius    = 12.0
  GeometryHeight         = 15.0     
  GeometryIsSmall        = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End





Object ORLaserTankShield
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model               = EXShield
      Animation           = EXShield.EXShield
      AnimationMode       = LOOP
      AnimationSpeedFactorRange = 1.0 1.0
    End

    ConditionState = DAMAGED
      Model               = EXShield
      Animation           = EXShield.EXShield
      AnimationMode       = LOOP
      AnimationSpeedFactorRange = 0.50 0.50
    End

    ConditionState = REALLYDAMAGED
      Model               = EXShield
      Animation           = EXShield.EXShield
      AnimationMode       = LOOP
      AnimationSpeedFactorRange = 0.1 0.1
    End

    ConditionState = RUBBLE
      Model               = NONE
    End
  End


  ; ***DESIGN parameters ***
  Side = America
  TransportSlotCount = 1
  EditorSorting = SYSTEM
  KindOf = PRELOAD PORTABLE_STRUCTURE NO_HEAL_ICON CANNOT_RETALIATE CLICK_THROUGH IGNORED_IN_GUI

  ArmorSet
    Conditions      = None
    Armor           = ORLaserTankShieldArmor
  End

  ; *** ENGINEERING Parameters ***  
  Body = ActiveBody ModuleTag_02
    MaxHealth        = 175.0
    InitialHealth    = 25.0
  End

  Behavior = AutoHealBehavior ModuleTag_Heal01
    StartsActive = Yes
    HealingAmount = 1
    HealingDelay = 100 ; msec
    StartHealingDelay = 1000  ;Do not start healing immediately. Wait this long
  End
  
  Behavior = DestroyDie ModuleTag_07
    DeathTypes = ALL
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Death00
    DeathWeapon  = ORShieldLaserDeathWeapon
    StartsActive = Yes                      ; turned on by upgrade
    DeathTypes   = NONE +EXTRA_8
  End

  Scale = 0.8
  Geometry = BOX
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 1.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End