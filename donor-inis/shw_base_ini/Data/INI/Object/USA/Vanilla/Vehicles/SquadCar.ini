;LCPD!
Object AmericaVehiclePoliceCarVar1
  SelectPortrait = SACrownVic_L
  ButtonImage    = SACrownVic_L

  Draw = W3DPoliceCarDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = cvcopvic
    End

    ConditionState = REALLYDAMAGED RUBBLE
      Model = cvcopvic_d
    End

    TrackMarks = EXTireTrack.tga
    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = RocketBuggyDirtPowerSlide
    LeftFrontTireBone = Tire02
    RightFrontTireBone = Tire01
    LeftRearTireBone = Tire04
    RightRearTireBone = Tire03
  End

  Draw = W3DModelDraw ModuleTag_FirePointBones
    OkToChangeModelColor = Yes

    ExtraPublicBone = FIREPOINT01
    ExtraPublicBone = FIREPOINT02
    ExtraPublicBone = FIREPOINT03
    ExtraPublicBone = FIREPOINT04
    ExtraPublicBone = FIREPOINT05

    DefaultConditionState
      Model = cvcopvic_fp

      ;The driver side window
      WeaponLaunchBone  = PRIMARY   FIREPOINT03
      WeaponLaunchBone  = SECONDARY FIREPOINT03
      WeaponLaunchBone  = TERTIARY  FIREPOINT03
      WeaponFireFXBone  = PRIMARY   FIREPOINT03
      WeaponFireFXBone  = SECONDARY FIREPOINT03
      WeaponFireFXBone  = TERTIARY  FIREPOINT03
    End
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:PoliceCar
  Side               = America
  EditorSorting      = VEHICLE
  TransportSlotCount = 2

  ;PRIMARY uses Vehicle/General voices
  ;SECONDARY uses Infantry/General voices
  WeaponSet
    Conditions = None
    Weapon = PRIMARY AmericaPoliceOfficerSubdueWeapon
    Weapon = SECONDARY AmericaPoliceCarHandgunWeapon
    PreferredAgainst  = PRIMARY    INFANTRY
    ;AutoChooseSources = PRIMARY FROM_SCRIPT FROM_AI DEFAULT_SWITCH_WEAPON
    ;AutoChooseSources = SECONDARY FROM_SCRIPT FROM_AI
    ShareWeaponReloadTime = Yes
  End

  ArmorSet
    Conditions = None
    Armor      = TruckArmor
    DamageFX   = TankDamageFX
  End

  BuildCost = 500
  BuildTime = 8

  VisionRange = 200
  ShroudClearingRange = 300

  ExperienceValue    = 50 75 100 125
  ExperienceRequired = 0 150 400 750
  IsTrainable        = Yes
  CrusherLevel       = 1  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel     = 1  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet = AmericaVehiclePoliceCarCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = AmericaPoliceCarVoiceSelect
  VoiceMove             = AmericaPoliceCarVoiceMove
  VoiceGuard            = AmericaPoliceCarVoiceMove
  VoiceAttack           = AmericaPoliceCarVoiceAttack
  VoiceFear             = AmericaPoliceCarVoiceFear
  SoundAmbient          = PoliceCarSirenLoop
  SoundAmbientRubble    = NoSound
  SoundMoveStart        = HumveeMoveStart
  SoundMoveStartDamaged = HumveeMoveStart
  UnitSpecificSounds
    VoiceCreate         = SentryDroneVoiceCreate
    VoiceEnter          = AmericaPoliceCarVoiceMove
    VoiceSubdue         = AmericaPoliceCarVoiceSubdue
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf =  PRELOAD SELECTABLE VEHICLE CAN_ATTACK TRANSPORT SCORE DONT_AUTO_CRUSH_INFANTRY ATTACK_NEEDS_LINE_OF_SIGHT

  Body = ActiveBody ModuleTag_02
    MaxHealth               = 180.0
    InitialHealth           = 180.0
    SubdualDamageCap        = 490
    SubdualDamageHealRate   = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_05
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL AmericaPoliceCarLocomotor

  Behavior = TransportContain ModuleTag_06
    Slots                   = 3
    HealthRegen%PerSec      = 10%
    DamagePercentToUnits    = 100%
    PassengersAllowedToFire = Yes
    AllowInsideKindOf       = INFANTRY
    ExitDelay               = 250
    NumberOfExitPaths       = 0
    ScatterNearbyOnExit     = Yes
    GoAggressiveOnExit      = Yes
    InitialPayload          = AmericaInfantryPoliceOfficer 3
    EnterSound              = EnterPOWTruck
    ExitSound               = ExitPOWTruck
  End

  Behavior = PhysicsBehavior ModuleTag_Physics
    Mass = 70
  End

  Behavior = InstantDeathBehavior ModuleTag_07
    DeathTypes = ALL
    FX = FX_BattleMasterExplosionOneFinal  
    OCL = OCL_PoliceCarExplode
  End

  Behavior = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000
    AflameDamageAmount = 5
    AflameDamageDelay = 500
  End

  Geometry = BOX
  GeometryIsSmall = Yes
  GeometryMajorRadius = 13
  GeometryMinorRadius = 5
  GeometryHeight = 9
  Shadow = SHADOW_VOLUME
End

ObjectReskin AmericaVehiclePoliceCarVar2 AmericaVehiclePoliceCarVar1
  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = cvcopvic2
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = cvcopvic2_d
    End
    TrackMarks = EXTireTrack.tga
    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = RocketBuggyDirtPowerSlide
    LeftFrontTireBone = Tire02
    RightFrontTireBone = Tire01
    LeftRearTireBone = Tire04
    RightRearTireBone = Tire03
  End
  Draw = W3DModelDraw ModuleTag_FirePointBones
    OkToChangeModelColor = Yes

    ExtraPublicBone = FIREPOINT01
    ExtraPublicBone = FIREPOINT02
    ExtraPublicBone = FIREPOINT03
    ExtraPublicBone = FIREPOINT04
    ExtraPublicBone = FIREPOINT05

    DefaultConditionState
      Model = cvcopvic_fp

      ;The driver side window
      WeaponLaunchBone  = PRIMARY   FIREPOINT03
      WeaponLaunchBone  = SECONDARY FIREPOINT03
      WeaponLaunchBone  = TERTIARY  FIREPOINT03
      WeaponFireFXBone  = PRIMARY   FIREPOINT03
      WeaponFireFXBone  = SECONDARY FIREPOINT03
      WeaponFireFXBone  = TERTIARY  FIREPOINT03
    End
  End
End