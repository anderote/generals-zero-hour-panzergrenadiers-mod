Object MoneyTransferTruck
  ;Made specifically for online play
  ;Since selling doesn't give you money
  ;You may run out
  ;Your ally can build this and detonate it in your base
  ;Get the crates and build stuff again

  SelectPortrait = NVLargeSupplyTruck_L
  ButtonImage    = NVLargeSupplyTruck

  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes    
    DefaultConditionState
      Model = NVSUPPLYTK
    End    
    ConditionState = REALLYDAMAGED
      Model = NVSUPPLYTK_D
    End    
    ConditionState = RUBBLE
      Model = NVSUPPLYTK_D
    End    
    CabBone = CAB
    TrailerBone = TRAILER
    CabRotationMultiplier = 1.5
    TrailerRotationMultiplier = 0.2

    LeftFrontTireBone           = Tire01
    RightFrontTireBone          = Tire02
    MidLeftRearTireBone         = Tire03
    MidRightRearTireBone        = Tire04
    LeftRearTireBone            = Tire05
    RightRearTireBone           = Tire06
    LeftRearTireBone            = Tire07
    RightRearTireBone           = Tire08
    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 2.5   ; This speed is added to the rotation speed when powersliding.

    RotationDamping = 0.7
    TrackMarks = EXTireTrack.tga
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:MoneyTruck
  Side                = America
  EditorSorting       = VEHICLE
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  BuildCost           = 3000
  BuildTime           = 30.0      ;in seconds
  VisionRange         = 90
  ShroudClearingRange = 120

  ExperienceValue    = 250 250 250 250 ;Experience point value at each level

  WeaponSet
    Conditions        = None 
    Weapon            = PRIMARY SuicideWeapon
    AutoChooseSources = PRIMARY None
  End
  WeaponSet
    Conditions        = CARBOMB 
    Weapon            = PRIMARY SuicideWeapon
    AutoChooseSources = PRIMARY None
  End

  ArmorSet
    Conditions       = None
    Armor            = TruckArmor
    DamageFX         = TankDamageFX
  End

  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet             = MoneyTransferTruckCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect            = MoneyTruckVoiceSelect
  VoiceMove              = MoneyTruckVoiceMove
  VoiceAttack            = NoSound
  SoundMoveStart         = SupplyTruckMoveStart
  SoundMoveStartDamaged  = SupplyTruckMoveStart
  UnitSpecificSounds
    VoiceCreate          = MoneyTruckVoiceCreate
    TruckLandingSound    = NoSound
    TruckPowerslideSound = NoSound
    VoiceEnter           = MoneyTruckVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE VEHICLE SCORE CANNOT_RETALIATE CAN_ATTACK
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 500.0
    InitialHealth   = 500.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 900
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = No
  End
  Locomotor = SET_NORMAL LargeSupplyTruckLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 120.0
  End

  Behavior = SlowDeathBehavior ModuleTag_05
    DeathTypes               = ALL -CRUSHED -SPLATTED
    DestructionDelay         = 200
    DestructionDelayVariance = 100
    FX  = FINAL    FX_SupplyTruckExplosionOneFinal
    OCL = FINAL    OCL_ChinaLargeSupplyTruckDeathEffect
  End
    
  Behavior = FXListDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  
  Behavior = CreateObjectDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_ChinaLargeSupplyTruck_CrushEffect
  End

  Behavior = CreateObjectDie ModuleTag_08
    DeathTypes   = ALL
    CreationList = OCL_MoneyTransferTruckFunds
  End

  Behavior                       = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_10
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  ; A crushing defeat
  Behavior = DestroyDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Geometry = BOX
  GeometryMajorRadius = 22.0
  GeometryMinorRadius = 12.0
  GeometryHeight = 14.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End