Object AlliedTankR35
  ;HON HON HON
  ; *** ART Parameters ***
  SelectPortrait         = AlliedR35Portrait
  ButtonImage            = AlliedR35Cameo
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model               = AlliedR35
      Turret              = TURRET
      WeaponMuzzleFlash   = PRIMARY MUZZLEFX
      WeaponRecoilBone    = PRIMARY BARREL
      WeaponLaunchBone    = PRIMARY MUZZLE
      WeaponFireFXBone    = PRIMARY MUZZLE
      WeaponFireFXBone    = SECONDARY Coax
      WeaponMuzzleFlash   = SECONDARY CoaxFX
      WeaponLaunchBone    = SECONDARY Coax
      WeaponLaunchBone    = SECONDARY MUZZLE
    End
    ConditionState = REALLYDAMAGED
      Model               = AlliedR35_d
      Turret              = TURRET
      WeaponMuzzleFlash   = PRIMARY MUZZLEFX
      WeaponRecoilBone    = PRIMARY BARREL
      WeaponLaunchBone    = PRIMARY MUZZLE
      WeaponFireFXBone    = PRIMARY MUZZLE
      WeaponFireFXBone    = SECONDARY Coax
      WeaponMuzzleFlash   = SECONDARY CoaxFX
      WeaponLaunchBone    = SECONDARY Coax
      WeaponLaunchBone    = SECONDARY MUZZLE
    End
    ConditionState = RUBBLE
      Model               = AlliedR35_r
      Turret              = TURRET
    End

    ;ConditionState = SNOW
      ;Model               = AlliedR35_s
      ;AnimationMode       = ONCE
      ;Turret              = TURRET
      ;WeaponMuzzleFlash   = PRIMARY MUZZLEFX
      ;WeaponRecoilBone    = PRIMARY BARREL
      ;WeaponLaunchBone    = PRIMARY MUZZLE
      ;WeaponFireFXBone    = PRIMARY MUZZLE
      ;WeaponFireFXBone    = SECONDARY Coax
      ;WeaponMuzzleFlash   = SECONDARY CoaxFX
      ;WeaponLaunchBone    = SECONDARY Coax
      ;WeaponLaunchBone    = SECONDARY MUZZLE
    ;End
    ;ConditionState = SNOW REALLYDAMAGED
      ;Model               = AlliedR35_d_S
      ;Turret              = TURRET
      ;WeaponMuzzleFlash   = PRIMARY MUZZLEFX
      ;WeaponRecoilBone    = PRIMARY BARREL
      ;WeaponLaunchBone    = PRIMARY MUZZLE
      ;WeaponFireFXBone    = PRIMARY MUZZLE
      ;WeaponFireFXBone    = SECONDARY Coax
      ;WeaponMuzzleFlash   = SECONDARY CoaxFX
      ;WeaponLaunchBone    = SECONDARY Coax
      ;WeaponLaunchBone    = SECONDARY MUZZLE
    ;End
    ;ConditionState = SNOW RUBBLE
      ;Model               = AlliedR35_r_s
      ;Turret              = TURRET
    ;End

    TrackMarks              = EXTnkTrack.tga
    TreadAnimationRate      = 1.0  ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:R35
  Side               = America
  EditorSorting      = VEHICLE
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions =  NONE
    Weapon                = PRIMARY R35Cannon
    PreferredAgainst      = PRIMARY VEHICLE STRUCTURE AIRCRAFT
    AutoChooseSources     = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI

    Weapon                = SECONDARY R35MachineGun
    PreferredAgainst      = SECONDARY INFANTRY
    AutoChooseSources     = SECONDARY FROM_PLAYER FROM_SCRIPT FROM_AI
    ShareWeaponReloadTime = No
  End

  ArmorSet
    Conditions      = None
    Armor           = T26TankArmor
    DamageFX        = TankDamageFX
  End

  BuildCost = 30
  BuildTime = 15.0          ;in seconds

  VisionRange         = 100
  ShroudClearingRange = 125

  ExperienceValue    = 55 55 110 190    ;Experience point value at each level
  ExperienceRequired = 0 120 300 480  ;Experience points needed to gain each level

  IsTrainable    = Yes             ;Can gain experience
  CrusherLevel   = 0  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet     = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect   = MBTVoiceSelect
  VoiceMove     = MBTVoiceMove
  VoiceGuard    = MBTVoiceMove
  VoiceAttack   = MBTVoiceAttack
  VoiceGuard    = MBTVoiceMove

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = MBTVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = OverlordTankTurretMoveLoop
    VoiceEnter      = MBTVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE DONT_AUTO_CRUSH_INFANTRY

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 115.0
    InitialHealth   = 115.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 40    ; turn rate, in degrees per sec
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End

  Locomotor = SET_NORMAL AlliedTankR35Locomotor

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 50.0
  End

  ; A crushing defeat
  Behavior = DestroyDie ModuleTag_08
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = FXListDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End
  Behavior = CreateCrateDie ModuleTag_11
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_blitzexplode
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 100
    DestructionDelay = 700
    DestructionDelayVariance = 600
    OCL = FINAL    OCL_LOSATMissileMetalImpact
    FX  = FINAL    FX_HowitzerExplosion
  End

  Behavior = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Geometry = BOX
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 5.0
  GeometryHeight = 10     
  GeometryIsSmall = Yes
End


