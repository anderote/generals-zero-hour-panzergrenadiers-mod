;This is just me fucking around with a potential Emperor: Battle for Dune concept
;The WormPlaceholder is... the worm. It is *not* allowed on rocky terrain, ONLY SAND

;***The worm will be kept on the sand via scripting, most likely. The invisible walls had undesirable results.***

;The Dozer is allowed to move between rocky and sandy parts
;The invisible wall is placed via Worldbuilder at 0% HP, as a rubble object.
;The dozer may pass through, the worm may not
;Also the sand blocks construction. See texture entry for more info

Object EBFDWormPlaceholder
  Draw = W3DTankDraw ModuleTag_01
    DefaultConditionState
      Model              = AVLeopard                       ;AVLeopard_H
      Turret             = Turret
      WeaponFireFXBone   = PRIMARY TurretMS
      WeaponRecoilBone   = PRIMARY Barrel
      WeaponMuzzleFlash  = PRIMARY TurretFX
      WeaponLaunchBone   = PRIMARY TurretMS
      TransitionKey      = TRANS_NORMAL
    End
    AliasConditionState  = NIGHT
    
    ConditionState       = REALLYDAMAGED
      Model              = AVLeopard_D                     ;AVLeopard_HD
    End
    AliasConditionState  = NIGHT REALLYDAMAGED
    
    ConditionState       = RUBBLE
      Model              = AVLeopard_D                     ;AVLeopard_HD1
    End

    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
    OkToChangeModelColor = Yes
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:Crusader
  Side                   = America
  EditorSorting          = VEHICLE
  TransportSlotCount     = 0

  WeaponSet
    Conditions           = None 
    Weapon               = PRIMARY EBFDWormTestWeapon
  End

  ArmorSet
    Conditions           = None
    Armor                = TankArmor
    DamageFX             = TankDamageFX
  End

  BuildCost              = 5000
  BuildTime              = 10.0          ;in seconds    
  VisionRange            = 180     ;250 was a bit too much   ;75   ;9999
  ShroudClearingRange    = 9999

  IsTrainable            = No  ;Can gain experience
  CrusherLevel           = 3  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 5  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  ; *** ENGINEERING Parameters ***
  RadarPriority          = UNIT
  KindOf                 = PRELOAD SELECTABLE CAN_ATTACK VEHICLE SCORE HUGE_VEHICLE
  
  Body                   = ActiveBody ModuleTag_02
    MaxHealth       = 1000.0
    InitialHealth   = 1000.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 960
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate        = 250
  End
  Locomotor = SET_NORMAL EBFDWormLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_04
    Mass            = 10000.0
    ShockResistance = 1.0
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_10
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 500
    DestructionDelayVariance  = 100
    FX  = INITIAL  FX_GenericTankDeathEffect
    OCL = MIDPOINT OCL_GenericTankDeathEffect
    FX  = FINAL    FX_GenericTankDeathExplosion
    OCL = FINAL    OCL_CrusaderTurret
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 2000
    DestructionDelayVariance  = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_GenericTankDeathEffect  
    FX  = FINAL    FX_GenericTankDeathExplosion
  End

  Behavior = DestroyDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_14
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateObjectDie ModuleTag_15
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End

  Behavior = FireWeaponUpdate ModuleTag_Rally01
    Weapon = EBFDWormFireWeaponUpdateWeapon
  End
  
  Geometry               = BOX
  GeometryMajorRadius    = 7.5
  GeometryMinorRadius    = 7.0
  GeometryHeight         = 10.0     
  GeometryIsSmall        = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End






