Object AmericaFieldHospital
  ;HEAL EM UP HEAL EM UP HEAL EM UP!
  ; *** ART Parameters ***
  SelectPortrait         = SAMedicTent_L
  ButtonImage            = SAMedicTent

  UpgradeCameo1 = Upgrade_AmericaBattleDrone
  UpgradeCameo2 = Upgrade_AmbulanceRepairCrew

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
  OkToChangeModelColor = Yes
    ; day
    ConditionState = NONE
      Model         = CBTTent03_G
      Animation     = CBTTent03_G.CBTTent03_G
      AnimationMode = LOOP
    End
    AliasConditionState = DAMAGED

    ConditionState = REALLYDAMAGED
      Model         = CBTTent03_DG
      Animation     = CBTTent03_DG.CBTTent03_DG
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE
      Model         = CBTTent03_R
    End
    
    ; night
    ConditionState = NIGHT
      Model         = CBTTent03_NG
      Animation     = CBTTent03_NG.CBTTent03_NG
      AnimationMode = LOOP
    End
    AliasConditionState = NIGHT DAMAGED

    ConditionState = REALLYDAMAGED NIGHT
      Model         = CBTTent03_DNG
      Animation     = CBTTent03_DNG.CBTTent03_DNG
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE NIGHT
      Model         = CBTTent03_RN
    End
    
    ; Snow
    ConditionState = SNOW
      Model         = CBTTent03_SG
      Animation     = CBTTent03_SG.CBTTent03_SG
      AnimationMode = LOOP
    End
    AliasConditionState = SNOW DAMAGED

    ConditionState = REALLYDAMAGED SNOW
      Model         = CBTTent03_DSG
      Animation     = CBTTent03_DSG.CBTTent03_DSG
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE SNOW
      Model         = CBTTent03_RS
    End
    
    ; night snow
    ConditionState = SNOW NIGHT
      Model         = CBTTent03_SNG
      Animation     = CBTTent03_SNG.CBTTent03_SNG
      AnimationMode = LOOP
    End
    AliasConditionState = SNOW NIGHT DAMAGED

    ConditionState = REALLYDAMAGED SNOW NIGHT
      Model         = CBTTent03_DSNG
      Animation     = CBTTent03_DSNG.CBTTent03_DSNG
      AnimationMode = LOOP
    End

    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model              = CBTTent03_G
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
      Model              = CBTTent03_G
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
      Model              = CBTTent03_DG
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End

    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED NIGHT
      Model              = CBTTent03_NG
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED NIGHT
      Model              = CBTTent03_NG
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED NIGHT
      Model              = CBTTent03_DNG
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End

    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
      Model              = CBTTent03_SG
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED SNOW
      Model              = CBTTent03_SG
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED SNOW
      Model              = CBTTent03_DSG
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End

    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW NIGHT
      Model              = CBTTent03_SNG
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED SNOW NIGHT
      Model              = CBTTent03_SNG
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState       = PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED SNOW NIGHT
      Model              = CBTTent03_DSNG
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End

    
    ConditionState       = AWAITING_CONSTRUCTION 
      Model              = NONE
    End
    AliasConditionState  = AWAITING_CONSTRUCTION NIGHT
    AliasConditionState  = AWAITING_CONSTRUCTION NIGHT DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION NIGHT REALLYDAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW REALLYDAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW NIGHT
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW NIGHT DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW NIGHT REALLYDAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState  = SOLD 
    AliasConditionState  = SOLD DAMAGED
    AliasConditionState  = SOLD REALLYDAMAGED
  End

  ; ------------ construction-zone fence -----------------
  Draw                = W3DModelDraw ModuleTag_Fence01
  AnimationsRequirePower = No
    DefaultConditionState
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupDrop_A4
      Animation       = ABSupDrop_A4.ABSupDrop_A4
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_DAY
    End
    ConditionState    = NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupDrop_A4N
      Animation       = ABSupDrop_A4N.ABSupDrop_A4N
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_NIGHT
    End
    ConditionState    = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupDrop_A4S
      Animation       = ABSupDrop_A4S.ABSupDrop_A4S
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
      TransitionKey   = UP_SNOW
    End
    ConditionState    = SNOW NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABSupDrop_A4SN
      Animation       = ABSupDrop_A4SN.ABSupDrop_A4SN
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOWNIGHT
    End
    TransitionState   = DOWN_DEFAULT UP_DAY
      Model           = ABSupDrop_A4
      Animation       = ABSupDrop_A4.ABSupDrop_A4
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_NIGHT
      Model           = ABSupDrop_A4N
      Animation       = ABSupDrop_A4N.ABSupDrop_A4N
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOW
      Model           = ABSupDrop_A4S
      Animation       = ABSupDrop_A4S.ABSupDrop_A4S
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOWNIGHT
      Model           = ABSupDrop_A4SN
      Animation       = ABSupDrop_A4SN.ABSupDrop_A4SN
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = UP_DAY DOWN_DEFAULT
      Model           = ABSupDrop_A4
      Animation       = ABSupDrop_A4.ABSupDrop_A4
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_NIGHT DOWN_DEFAULT
      Model           = ABSupDrop_A4N
      Animation       = ABSupDrop_A4N.ABSupDrop_A4N
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOW DOWN_DEFAULT
      Model           = ABSupDrop_A4S
      Animation       = ABSupDrop_A4S.ABSupDrop_A4S
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOWNIGHT DOWN_DEFAULT
      Model           = ABSupDrop_A4SN
      Animation       = ABSupDrop_A4SN.ABSupDrop_A4SN
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:FieldHospital
  EditorSorting    = STRUCTURE
  Side             = America

  PlacementViewAngle = -45  

  ArmorSet
    Conditions      = None
    Armor           = StructureArmor
    DamageFX        = StructureDamageFXNoShake
  End

  BuildCost       = 250
  BuildTime       = 7.0          ;in seconds    

  VisionRange     = 100
  ShroudClearingRange = 250

  CommandSet          = AmericaFieldHospitalCommandSet
  ExperienceValue     = 200 200 200 200  ; Experience point value at each level

  ; *** ENGINEERING Parameters ***  
  KindOf          = PRELOAD STRUCTURE SELECTABLE IMMOBILE SCORE FS_TECHNOLOGY FS_BASE_DEFENSE IMMUNE_TO_CAPTURE

  Body                  = ActiveBody ModuleTag_02
    MaxHealth       = 400.0
    InitialHealth   = 400.0
  End

  Behavior = AIUpdateInterface ModuleTag_02AndAHalf
    AutoAcquireEnemiesWhenIdle = No ;?
  End

  Behavior = HealContain ModuleTag_03
    ContainMax          = 4
    TimeForFullHeal     = 1000   ;(in milliseconds)
    AllowInsideKindOf   = INFANTRY
    AllowAlliesInside   = Yes
    AllowNeutralInside  = No
    AllowEnemiesInside  = No
  End

  ;50% larger than Ambo with slightly faster heal amount
  Behavior = AutoHealBehavior ModuleTag_04
    HealingAmount     = 6
    HealingDelay      = 500 ; msec
    Radius            = 150.0
    StartsActive      = Yes
    KindOf            = INFANTRY
  End

  ;50% larger than Ambo with slightly slower heal amount
  Behavior = AutoHealBehavior ModuleTag_05
    HealingAmount      = 4
    HealingDelay       = 1000 ; msec
    Radius             = 150.0
    KindOf             = VEHICLE
    ForbiddenKindOf    = AIRCRAFT
    SkipSelfForHealing = Yes
    StartsActive       = No
    TriggeredBy        = Upgrade_AmbulanceRepairCrew
  End

  Behavior = FlammableUpdate ModuleTag_06
    FlameDamageLimit = 20         ;Catch fire if I take this much fire damage...
    FlameDamageExpiration = 2000  ;in a span of this long
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 25       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = TransitionDamageFX ModuleTag_07
    ;-------------DESIGNED FOR SMALL SIZED CIVILIAN BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1          = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
    ;---------------------------------------------------------------------------------------
    RubbleParticleSystem1              = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    RubbleParticleSystem2              = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    RubbleParticleSystem3              = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
    RubbleParticleSystem4              = Bone:None RandomBone:No PSys:StructureTransitionSmallFlare
  End

  Behavior = BaseRegenerateUpdate ModuleTag_08
    ;nada
  End 

  Behavior = FXListDie ModuleTag_09
    DeathFX = FX_StructureTinyDeath
  End

  Behavior = DestroyDie ModuleTag_10
    ;nothing
  End

  Behavior = BaseRegenerateUpdate ModuleTag_11
    ;nada
  End 

  Behavior = ObjectCreationUpgrade ModuleTag_Drone01
    UpgradeObject = OCL_AmericanBattleDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_Drone02
    UpgradeObject = OCL_AmericanScoutDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_Drone03
    UpgradeObject = OCL_AmericanHellfireDrone
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = ProductionUpdate ModuleTag_12
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End
  
  Geometry              = BOX
  GeometryMajorRadius   = 15.0
  GeometryMinorRadius   = 13.0
  GeometryHeight        = 8.0
  GeometryIsSmall       = No
  Shadow                = SHADOW_VOLUME
End