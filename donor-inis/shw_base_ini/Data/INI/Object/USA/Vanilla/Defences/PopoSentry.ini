Object AmericaPopoSentryGun
  ;pew pew

  SelectPortrait         = SAPopoSentry_L
  ButtonImage            = SAPopoSentry_L

  UpgradeCameo1 = Upgrade_AmericaDroneArmor

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model             = AVSntryGn
      Animation         = AVSntryGn.AVSntryGn
      AnimationMode     = ONCE_BACKWARDS
      Flags             = MAINTAIN_FRAME_ACROSS_STATES
      Turret            = TURRET
      TurretPitch       = TURRETEL
      WeaponLaunchBone  = PRIMARY   MUZZLEFX
      WeaponFireFXBone  = PRIMARY   MUZZLEFX
      WeaponRecoilBone  = PRIMARY   MUZZLEFX
      WeaponMuzzleFlash = PRIMARY   MUZZLEFX
    End

    ConditionState      = REALLYDAMAGED
      Model             = AVSntryGn_D
    End

    ConditionState      = RUBBLE
      Model             = AVSntryGn_D1
      Animation         = AVSntryGn_D1.AVSntryGn_D1
      AnimationMode     = ONCE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName            = OBJECT:PopoSentry
  Side                   = America
  EditorSorting          = STRUCTURE
  TransportSlotCount     = 0

  WeaponSet
    Conditions           = None 
    Weapon               = PRIMARY PopoSentryWeapon
  End

  ArmorSet
    Conditions      = None
    Armor           = BaseDefenseArmor
    DamageFX        = StructureDamageFXNoShake
  End

  BuildTime              = 5.0          ;in seconds    
  VisionRange            = 150
  ShroudClearingRange    = 160

  ExperienceValue        = 20 20 20 20 ;Experience point value at each level
  ExperienceRequired     = 0 0 0 0 ;Experience points needed to gain each level
  IsTrainable            = No  ;Can gain experience
  CrusherLevel           = 1  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet             = StopOnlyGenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = SentryDroneVoiceSelect
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority   = UNIT
  KindOf          = PRELOAD SELECTABLE CAN_ATTACK IMMOBILE SCORE FS_BASE_DEFENSE NO_HEAL_ICON IGNORES_SELECT_ALL DRONE ATTACK_NEEDS_LINE_OF_SIGHT

  Body            = StructureBody ModuleTag_02
    MaxHealth     = 75.0
    InitialHealth = 75.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 175
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 25
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate        = 270    ;// turn rate, in degrees per sec
      MinIdleScanAngle      = 10
      MinIdleScanInterval   = 250    ; in milliseconds
      MaxIdleScanInterval   = 750    ; in milliseconds
      MinIdleScanAngle      = 0       ; in degrees off the natural turret angle
      MaxIdleScanAngle      = 360     ; in degrees off the natural turret angle
      ControlledWeaponSlots = PRIMARY
      RecenterTime          = 5000
    End
    AutoAcquireEnemiesWhenIdle = Yes Stealthed
    MoodAttackCheckRate        = 250
  End
  Locomotor            = SET_NORMAL None

  Behavior = LifetimeUpdate ModuleTag_04
    MinLifetime = 118000   ; min lifetime in msec
    MaxLifetime = 122000   ; max lifetime in msec
  End

  Behavior = StealthDetectorUpdate ModuleTag_07
    DetectionRate     = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange   =  160 ;Dustin, enable this for independant balancing!
    CanDetectWhileGarrisoned  = No ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained   = No ;Contained means being in a transport or tunnel network.
    ExtraRequiredKindOf = INFANTRY
  End

  Behavior = BaseRegenerateUpdate ModuleTag_08
    ;No data
  End

  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes       = ALL
    DestructionDelay = 1000
    DestructionDelayVariance = 100
    FX               = FINAL FX_BarrelDeathExplosion
    Weapon           = FINAL BarrelWeapon
  End

  Behavior = StealthUpdate ModuleTag_12
    StealthDelay                = 2500 ; msec
    StealthForbiddenConditions  = ATTACKING TAKING_DAMAGE
    MoveThresholdSpeed          = 3
    InnateStealth               = Yes
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End

  Behavior = MaxHealthUpgrade ModuleTag_13
    TriggeredBy   = Upgrade_AmericaDroneArmor
    AddMaxHealth  = 25.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO   ;Choices are PRESERVE_RATIO, ADD_CURRENT_HEALTH_TOO, and SAME_CURRENTHEALTH
  End

  Geometry = BOX
  GeometryMajorRadius = 5.0
  GeometryMinorRadius = 5.0
  GeometryHeight = 5.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
End







Object AmericaPopoSentryGunStructure
  ;pew pew
  ; *** ART Parameters ***
  SelectPortrait         = SAPillbox_L
  ButtonImage            = SAPillbox
  
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model             = ABPillBox
      Animation         = ABPillBox.ABPillBox
      AnimationMode     = ONCE_BACKWARDS
      Flags             = START_FRAME_FIRST
      Turret            = TURRET
      WeaponLaunchBone  = PRIMARY   Muzzle
      WeaponLaunchBone  = SECONDARY Muzzle
      WeaponLaunchBone  = TERTIARY  Muzzle
      WeaponFireFXBone  = PRIMARY   Muzzle
      WeaponFireFXBone  = SECONDARY Muzzle
      WeaponFireFXBone  = TERTIARY  Muzzle
      WeaponMuzzleFlash = PRIMARY   MuzzleFX
    End
    
    ConditionState      = DAMAGED
      Model             = ABPillBox_D
      Animation         = ABPillBox_D.ABPillBox_D
    End
    
    ConditionState      = REALLYDAMAGED RUBBLE
      Model             = ABPillBox_E
      Animation         = ABPillBox_E.ABPillBox_E
    End
    
    
    ConditionState      = SNOW
      Model             = ABPillBox_S
      Animation         = ABPillBox_S.ABPillBox_S
    End
    
    ConditionState      = DAMAGED SNOW
      Model             = ABPillBox_SD
      Animation         = ABPillBox_SD.ABPillBox_SD
    End
    
    ConditionState      = REALLYDAMAGED RUBBLE SNOW
      Model             = ABPillBox_SE
      Animation         = ABPillBox_SE.ABPillBox_SE
    End

    ;**************************************************************************************************************************
    ;This block handles every possible case with construction process, selling process, awaiting construction, and sold states
    ;for this draw module
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model              = ABPillBox
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End

    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
      Model              = ABPillBox_S
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End

    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
      Model              = ABPillBox_D
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End

    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED SNOW
      Model              = ABPillBox_SD
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End

    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
      Model              = ABPillBox_E
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED SNOW
      Model              = ABPillBox_SE
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End

    ConditionState       = AWAITING_CONSTRUCTION 
      Model              = NONE
    End
    AliasConditionState  = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW REALLYDAMAGED
    AliasConditionState  = SOLD DAMAGED
    AliasConditionState  = SOLD REALLYDAMAGED
    AliasConditionState  = SOLD SNOW
    AliasConditionState  = SOLD SNOW DAMAGED
    AliasConditionState  = SOLD SNOW REALLYDAMAGED
    ;**************************************************************************************************************************    
  End
  
    ; ------------ under-construction scaffolding -----------------
  Draw = W3DModelDraw ModuleTag_03
    AnimationsRequirePower = No ; Do not pause the construction anims when low power disabled
    MinLODRequired = MEDIUM
    DefaultConditionState
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = PARTIALLY_CONSTRUCTED
      Model           = ABPillBox_A1
      Animation       = ABPillBox_A1.ABPillBox_A1
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_DAY
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    ConditionState    = NIGHT PARTIALLY_CONSTRUCTED
      Model           = ABPillBox_A1
      Animation       = ABPillBox_A1.ABPillBox_A1
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_NIGHT
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    ConditionState    = SNOW PARTIALLY_CONSTRUCTED
      Model           = ABPillBox_SA1
      Animation       = ABPillBox_SA1.ABPillBox_SA1
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOW
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    ConditionState    = SNOW NIGHT PARTIALLY_CONSTRUCTED
      Model           = ABPillBox_SA1
      Animation       = ABPillBox_SA1.ABPillBox_SA1
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOWNIGHT
      ParticleSysBone = Sparks01 BuildUpBlueSpark
      ParticleSysBone = Sparks02 BuildUpBlueSpark
    End
    TransitionState   = DOWN_DEFAULT UP_DAY
      Model           = ABPillBox_A1
      Animation       = ABPillBox_A1.ABPillBox_A1
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_NIGHT
      Model           = ABPillBox_A1
      Animation       = ABPillBox_A1.ABPillBox_A1
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOW
      Model           = ABPillBox_SA1
      Animation       = ABPillBox_SA1.ABPillBox_SA1
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOW NIGHT
      Model           = ABPillBox_SA1
      Animation       = ABPillBox_SA1.ABPillBox_SA1
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = UP_DAY DOWN_DEFAULT
      Model           = ABPillBox_A1
      Animation       = ABPillBox_A1.ABPillBox_A1
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_NIGHT DOWN_DEFAULT
      Model           = ABPillBox_A1
      Animation       = ABPillBox_A1.ABPillBox_A1
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOW DOWN_DEFAULT
      Model           = ABPillBox_SA1
      Animation       = ABPillBox_SA1.ABPillBox_SA1
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOWNIGHT DOWN_DEFAULT
      Model           = ABPillBox_SA1
      Animation       = ABPillBox_SA1.ABPillBox_SA1
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
  End

    ; ------------ construction-zone fence -----------------
  Draw = W3DModelDraw ModuleTag_02
    AnimationsRequirePower = No ; Do not pause the construction anims when low power disabled
    DefaultConditionState
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABPillBox_A2
      Animation       = ABPillBox_A2.ABPillBox_A2
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_DAY
    End
    ConditionState    = NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABPillBox_A2
      Animation       = ABPillBox_A2.ABPillBox_A2
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_NIGHT
    End
    ConditionState    = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABPillBox_SA2
      Animation       = ABPillBox_SA2.ABPillBox_SA2
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOW
    End
    ConditionState    = SNOW NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = ABPillBox_SA2
      Animation       = ABPillBox_SA2.ABPillBox_SA2
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOWNIGHT
    End
    TransitionState   = DOWN_DEFAULT UP_DAY
      Model           = ABPillBox_A2
      Animation       = ABPillBox_A2.ABPillBox_A2
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_NIGHT
      Model           = ABPillBox_A2
      Animation       = ABPillBox_A2.ABPillBox_A2
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOW
      Model           = ABPillBox_SA2
      Animation       = ABPillBox_SA2.ABPillBox_SA2
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOWNIGHT
      Model           = ABPillBox_SA2
      Animation       = ABPillBox_SA2.ABPillBox_SA2
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = UP_DAY DOWN_DEFAULT
      Model           = ABPillBox_A2
      Animation       = ABPillBox_A2.ABPillBox_A2
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_NIGHT DOWN_DEFAULT
      Model           = ABPillBox_SA2
      Animation       = ABPillBox_SA2.ABPillBox_SA2
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOW DOWN_DEFAULT
      Model           = ABPillBox_SA2
      Animation       = ABPillBox_SA2.ABPillBox_SA2
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOW NIGHT DOWN_DEFAULT
      Model           = ABPillBox_SA2
      Animation       = ABPillBox_SA2.ABPillBox_SA2
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
  End

  ; ***DESIGN parameters ***
  DisplayName       = OBJECT:Pillbox
  Side              = America
  EditorSorting     = STRUCTURE

  BuildCost        = 100
  BuildTime        = 10.0 ;8.0           ; in seconds
  
  WeaponSet
    Conditions = None 
    Weapon              = PRIMARY     PillBoxMachineGun
  End
  
  VisionRange    = 360.0           ; Shroud clearing distance AND targeting range
  ShroudClearingRange = 360

  ArmorSet
    Conditions      = None
    Armor           = BaseDefenseArmor
    DamageFX        = StructureDamageFXNoShake
  End

  CommandSet        = AmericaPatriotBatteryCommandSet
  ExperienceValue   = 75 75 75 75  ; Experience point value at each level

  ; *** AUDIO Parameters ***
  VoiceSelect           = PillboxSelect
  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy

  UnitSpecificSounds
    UnderConstruction     = UnderConstructionLoop
  End

  UnitSpecificSounds
  ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound ;These aren't playing properly, will revisit (mp) TurretMoveLoopLoud
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority   = STRUCTURE
  KindOf          = PRELOAD STRUCTURE SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT IMMOBILE FS_TECHNOLOGY FS_BASE_DEFENSE IMMUNE_TO_CAPTURE CAN_SEE_THROUGH_STRUCTURE
  Body            = StructureBody ModuleTag_04
    MaxHealth     = 700.0
    InitialHealth = 700.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_06
    Turret
      TurretTurnRate        = 180   // turn rate, in degrees per sec
      ControlledWeaponSlots = PRIMARY
      RecenterTime          = 5000
      MinIdleScanInterval   = 350    ; in milliseconds
      MaxIdleScanInterval   = 750    ; in milliseconds
      MinIdleScanAngle      = 0       ; in degrees off the natural turret angle
      MaxIdleScanAngle      = 360     ; in degrees off the natural turret angle
    End

    AutoAcquireEnemiesWhenIdle = Yes ;ATTACK_BUILDINGS; defensive weapon
    MoodAttackCheckRate        = 250
  End
  
  Behavior = DestroyDie ModuleTag_08
    ;nothing
  End
  
  Behavior = FXListDie ModuleTag_10
    DeathFX    = FX_StructureTinyDeath
    DeathTypes = ALL
  End

  Behavior = FlammableUpdate ModuleTag_12
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = TransitionDamageFX ModuleTag_14
    ;-------------DESIGNED FOR TINY SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionTinySmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionTinySmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionTinyExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionTinyShockwave
  End
  
  Behavior = ProductionUpdate ModuleTag_Upgrade01
  End
  
  Behavior = DefaultProductionExitUpdate ModuleTag_13
    UnitCreatePoint   = X:0.0  Y:0.0   Z:0.0
    NaturalRallyPoint = X:0.0  Y:0.0   Z:0.0
  End
  
  Geometry            = CYLINDER
  GeometryMajorRadius = 30.0
  GeometryMinorRadius = 1.0
  GeometryHeight      = 15.0
  GeometryIsSmall     = No
  Shadow          = SHADOW_VOLUME
  BuildCompletion = PLACED_BY_PLAYER
End