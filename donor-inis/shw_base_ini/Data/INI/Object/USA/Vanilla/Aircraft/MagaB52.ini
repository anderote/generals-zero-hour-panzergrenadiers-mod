Object TrumpMagaMoneyPlane
  ;I'm really rich
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model = avbomber_g
      ParticleSysBone = Engine00 JetBlackTrailThin
      ParticleSysBone = Engine02 JetBlackTrailThin
      ParticleSysBone = Engine03 JetBlackTrailThin
      ParticleSysBone = Engine04 JetBlackTrailThin
      ParticleSysBone = WingTip01 JetContrailThin
      ParticleSysBone = WingTip02 JetContrailThin
    End
    ConditionState = DAMAGED
      Model = avbomber_gd
      ParticleSysBone = Smoke01 JetFireLarge
      ParticleSysBone = Smoke02 JetFireLarge
      ParticleSysBone = Engine00 JetBlackTrailThin
      ParticleSysBone = Engine02 JetBlackTrailThin
      ParticleSysBone = Engine03 JetBlackTrailThin
      ParticleSysBone = Engine04 JetBlackTrailThin
      ParticleSysBone = Smoke01 JetSmokeLarge
      ParticleSysBone = Smoke02 JetSmokeLarge
    End
    ConditionState = REALLYDAMAGED
      Model = avbomber_gd
      ParticleSysBone = Smoke01 JetFireLarge
      ParticleSysBone = Smoke02 JetFireLarge
      ParticleSysBone = Engine00 JetBlackTrailThin
      ParticleSysBone = Engine02 JetBlackTrailThin
      ParticleSysBone = Engine03 JetBlackTrailThin
      ParticleSysBone = Engine04 JetBlackTrailThin
      ParticleSysBone = Smoke01 JetSmokeLarge
      ParticleSysBone = Smoke02 JetSmokeLarge
    End
    ConditionState = RUBBLE
      Model = avbomber_gd1
      ParticleSysBone = Smoke01 JetFireLarge
      ParticleSysBone = Smoke02 JetFireLarge
      ParticleSysBone = Smoke01 JetSmokeLarge
      ParticleSysBone = Smoke02 JetSmokeLarge
    End
    OkToChangeModelColor = Yes
  End
  
  Draw = W3DModelDraw ModuleTag_02
    DefaultConditionState
      Model           = AVBomber_A2U
      Animation       = AVBomber_A2K.AVBomber_A2
      AnimationMode   = MANUAL
      Flags           = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState = DOOR_1_OPENING
      Animation       = AVBomber_A2K.AVBomber_A2
      AnimationMode   = ONCE
      Flags           = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState = DOOR_1_CLOSING
      Animation       = AVBomber_A2K.AVBomber_A2
      AnimationMode   = ONCE_BACKWARDS
      Flags           = START_FRAME_LAST MAINTAIN_FRAME_ACROSS_STATES
    End

    ConditionState = REALLYDAMAGED
      Model           = AVBomber_A2DU
      Animation       = AVBomber_A2K.AVBomber_A2
      AnimationMode   = MANUAL
      Flags           = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState = DOOR_1_OPENING REALLYDAMAGED
      Model           = AVBomber_A2DU
      Animation       = AVBomber_A2K.AVBomber_A2
      AnimationMode   = ONCE
      Flags           = START_FRAME_FIRST MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState = DOOR_1_CLOSING REALLYDAMAGED
      Model           = AVBomber_A2DU
      Animation       = AVBomber_A2K.AVBomber_A2
      AnimationMode   = ONCE_BACKWARDS
      Flags           = START_FRAME_LAST MAINTAIN_FRAME_ACROSS_STATES
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:B52
  EditorSorting       = VEHICLE
  Side                = America
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  ShroudClearingRange = 300.0
  VisionRange         = 0.0 

  ArmorSet
    Conditions      = None
    Armor           = AirplaneArmor
    DamageFX        = TankDamageFX
  End
  ArmorSet
    Conditions            = PLAYER_UPGRADE
    Armor                 = CountermeasuresAirplaneArmor
    DamageFX              = None
  End

  CommandSet        = Command_ScriptedTransportDrops

  ; *** AUDIO Parameters ***
  SoundAmbient = B52AmbientLoop
  SoundAmbientRubble    = NoSound

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_ATTACK  VEHICLE SCORE TRANSPORT AIRCRAFT IGNORED_IN_GUI EMP_HARDENED

  Body = ActiveBody ModuleTag_03
    MaxHealth       = 2020.0
    InitialHealth   = 2020.0
  End

  ExperienceValue     = 50 50 50 50  ; Experience point value at each level

  ;SCRIPTED SUPPORT: These special powers are triggered directly 
  ;from the transport without creating a transport. This is done 
  ;via new code support and CreateLocation USE_OWNER_OBJECT -- 
  ;which also prevents creating the payload transport.
  Behavior    = OCLSpecialPower ModuleTag_06
    SpecialPowerTemplate = SuperweaponCarpetBomb
    OCL                  = SUPERWEAPON_CarpetBomb
    CreateLocation       = USE_OWNER_OBJECT
    ScriptedSpecialPowerOnly = Yes
  End 
   
  Behavior = PhysicsBehavior ModuleTag_07
    Mass = 500.0
  End

  Behavior = DeliverPayloadAIUpdate ModuleTag_08
    DoorDelay         = 500
    MaxAttempts       = 4
    DropOffset        = X:0 Y:0 Z:-10
    DropDelay         = 400     ; time in between each item dropped (if more than one)
    PutInContainer    = AmericaParachute
    DeliveryDistance  = 150
  End
  Locomotor = SET_NORMAL BarrelBombDeliveryPlaneLocomotor

  Behavior = TransportContain ModuleTag_09
    Slots                       = 100                     ; hey, it's a BIG transport
    ScatterNearbyOnExit         = No
    OrientLikeContainerOnExit   = Yes
    KeepContainerVelocityOnExit = Yes
    ExitPitchRate               = 30
    ExitBone                    = WeaponA01
    AllowInsideKindOf           = INFANTRY VEHICLE PROJECTILE DOZER PARACHUTABLE
    DoorOpenTime                = 0                ; this prevents the Contain module from messing with the doors, since we want DeliverPayload to handle 'em
    NumberOfExitPaths           = 0
    DestroyRidersWhoAreNotFreeToExit = Yes  ; 'destroy' as opposed to 'kill'
  End

  Behavior                    = InstantDeathBehavior  ModuleTag_InstantDeath01
    DeathTypes                = ALL
    FX                        = FX_BigPlaneDeath
    OCL                       = OCL_AmericaJetCargoHulkDeath
  End

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money00
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money01
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money02
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money03
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money04
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money05
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money06
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money07
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money08
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money09
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money10
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money11
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money12
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money13
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Money14
    DeathWeapon   = GoldB52CrateWeapon
    StartsActive  = Yes
  End

  Behavior = TransitionDamageFX ModuleTag_11
    DamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_JetBigDamageTransition
  End

  Behavior                = ArmorUpgrade ModuleTag_Armor01
    TriggeredBy           = Upgrade_AmericaCountermeasures
  End

  Behavior                = CountermeasuresBehavior ModuleTag_12
    TriggeredBy           = Upgrade_AmericaCountermeasures
    FlareTemplateName     = CountermeasureFlare
    FlareBoneBaseName     = Flare ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize            = 4     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle        = 90.0  ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor  = 2.0   ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys   = 1000  ; Time between flare volleys
    NumberOfVolleys       = 5     ; Number of times the volleys will fire before reloading
    ReloadTime            = 0     ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate           = 30%   ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 0     ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay     = 200   ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 60.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End

Object 1500DollarMagaCrate
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model = PMUNCrate03        ;***Plug model here
      Animation       = PMUNCrate03.PMUNCrate03    
      AnimationMode   = LOOP
      ParticleSysBone = FX1 glitter2  
    End
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:Crate
  EditorSorting      = MISC_MAN_MADE
  TransportSlotCount = 1                 

  ; *** ENGINEERING Parameters ***  
  KindOf = PARACHUTABLE CRATE 

  Behavior = MoneyCrateCollide      ModuleTag_ForbiddenChanges
    ForbiddenKindOf = PROJECTILE
    MoneyProvided         = 1500
    BuildingPickup        = Yes
    ExecuteAnimation      = MoneyPickUp
    ExecuteAnimationTime  = 4.0    ; In seconds
    ExecuteAnimationZRise = 15.0   ; Z world units per second to rise
    ExecuteAnimationFades = Yes    ; Animation does/doesn't fade out            
  End

  Behavior = SquishCollide ModuleTag_03
    ;nothing
  End

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 75.0
    KillWhenRestingOnGround = No
    AllowBouncing   = No
    ShockResistance = 1.0
  End

  Behavior = DumbProjectileBehavior ModuleTag_05
    TumbleRandomly                = Yes
    FirstHeight                   = 20  ; Height of Bezier control points above highest intervening terrain
    SecondHeight                  = 55
    FirstPercentIndent            = 30% ; Percentage of shot distance control points are placed
    SecondPercentIndent           = 60%
    FlightPathAdjustDistPerSecond = 0 ; Can allow a max speed this can attempt to follow a target. Units are their velocity we can tag.
  End

  Geometry = BOX
  GeometryMajorRadius = 12.0
  GeometryMinorRadius = 12.0
  GeometryHeight = 12.0     
  GeometryIsSmall = Yes    
  Shadow              = SHADOW_VOLUME
End