;The child plane with the death loop sound
;cool audio bro

;https://www.youtube.com/watch?v=LympZCCRRCU

Object GLAJetCargoPlaneDying
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model           = UVCargoPln_D
      Animation       = UVCargoPln_D.UVCargoPln_D
      ParticleSysBone = Smoke01 JetFireLarge
      ParticleSysBone = Smoke02 JetFireLarge
      ParticleSysBone = Propeller03 JetBlackTrailThin
      ParticleSysBone = Propeller04 JetBlackTrailThin
      ParticleSysBone = Smoke01 JetSmokeLarge
      ParticleSysBone = Smoke02 JetSmokeLarge
      ParticleSysBone = Smoke03 JetSmokeLarge
    End
    OkToChangeModelColor = Yes
  End
  
  Draw = W3DModelDraw ModuleTag_02
    DefaultConditionState
      Model           = UVCargoPln_A2
      Animation       = UVCargoPln_A2.UVCargoPln_A2
      AnimationMode   = MANUAL
      Flags           = START_FRAME_FIRST
    End
    ConditionState = DOOR_1_OPENING
      Model           = UVCargoPln_A2
      Animation       = UVCargoPln_A2.UVCargoPln_A2
      AnimationMode   = ONCE
      Flags           = START_FRAME_FIRST
    End
    ConditionState = DOOR_1_CLOSING
      Model           = UVCargoPln_A2
      Animation       = UVCargoPln_A2.UVCargoPln_A2
      AnimationMode   = ONCE_BACKWARDS
      Flags           = START_FRAME_LAST
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:CargoPlane
  EditorSorting       = VEHICLE
  Side                = GLA
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  VisionRange         = 0.0 
  ShroudClearingRange = 250.0

  ArmorSet
    Conditions      = None
    Armor           = InvulnerableArmorForFlamingAndToxinIfnantry
    DamageFX        = TankDamageFX
  End
  ArmorSet
    Conditions            = PLAYER_UPGRADE
    Armor                 = InvulnerableArmorForFlamingAndToxinIfnantry
    DamageFX              = None
  End
  CommandSet        = Command_ScriptedTransportDrops

  ; *** AUDIO Parameters ***
  SoundAmbient          = PlaneGoingDownLoop
  SoundAmbientRubble    = NoSound

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS VEHICLE SCORE TRANSPORT AIRCRAFT IGNORED_IN_GUI EMP_HARDENED
  Body = ActiveBody ModuleTag_03
    MaxHealth       = 100000.0
    InitialHealth   = 100000.0
  End

  ExperienceValue     = 50 50 50 50  ; Experience point value at each level 
   
  Behavior = PhysicsBehavior ModuleTag_07
    Mass = 500.0
    AerodynamicFriction   = 1     ; this is now friction-per-sec
    ForwardFriction       = 33    ; this is now friction-per-sec
    CenterOfMassOffset    = 1     ; Default of 0 means nothing tips as it falls.  Positive tips forward, negative tips back
  End

  Behavior = DeliverPayloadAIUpdate ModuleTag_08
    DoorDelay         = 500
    MaxAttempts       = 4
    DropOffset        = X:0 Y:0 Z:-10
    DropDelay         = 300     ; time in between each item dropped (if more than one)
    PutInContainer    = AmericaParachute
    DeliveryDistance  = 150
  End
  Locomotor = SET_NORMAL DeadB52Locomotor

  ;Weird shit
  Behavior = LifetimeUpdate ModuleTag_Death01
    MinLifetime = 7500
    MaxLifetime = 8500
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = ALL
    DestructionDelay    = 1
    FX                  = FINAL FX_HighAltitudePlaneDeathFinal
  End
  ;No more weird shit

  Geometry = Box
  GeometryIsSmall = No
  GeometryMajorRadius = 60.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 10.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End

