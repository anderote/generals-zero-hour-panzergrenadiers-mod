Object NeedlesKaneSweetTooth
  ;KANE
  ; *** ART Parameters ***
  SelectPortrait = TWSweetTooth
  ButtonImage    = TWSweetTooth

  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model            = SweetTooth2 
      WeaponFireFXBone = PRIMARY MuzzleFX
      WeaponLaunchBone = PRIMARY MuzzleFX
      WeaponLaunchBone = SECONDARY HEAD01
      WeaponFireFXBone = SECONDARY HEAD01
      ParticleSysBone  = FIRE01 FireFactionMedium  ;FireFactionSmall
      ParticleSysBone  = FIRE02 FireFactionMedium  ;FireFactionSmall
      ParticleSysBone  = FIRE03 FireFactionMedium  ;FireFactionSmall
    End
    
    ConditionState = MOVING
      Model            = SweetTooth2
      Animation        = SweetTooth2.SweetTooth2
      AnimationMode    = ONCE 
      WeaponFireFXBone = PRIMARY MuzzleFX
      WeaponLaunchBone = PRIMARY MuzzleFX
      WeaponLaunchBone = SECONDARY HEAD01
      WeaponFireFXBone = SECONDARY HEAD01
      ParticleSysBone  = FIRE01 FireFactionMedium  ;FireFactionSmall
      ParticleSysBone  = FIRE02 FireFactionMedium  ;FireFactionSmall
      ParticleSysBone  = FIRE03 FireFactionMedium  ;FireFactionSmall
      ParticleSysBone  = EXHAUST01 FireFactionSmall
      ParticleSysBone  = EXHAUST02 FireFactionSmall
    End

    ConditionState = REALLYDAMAGED
      Model = SweetTooth2_D
      WeaponFireFXBone = PRIMARY MuzzleFX
      WeaponLaunchBone = PRIMARY MuzzleFX
      WeaponLaunchBone = SECONDARY HEAD01
      WeaponFireFXBone = SECONDARY HEAD01
      ParticleSysBone  = FIRE01 FireFactionMedium  ;FireFactionSmall
      ParticleSysBone  = FIRE02 FireFactionMedium  ;FireFactionSmall
      ParticleSysBone  = FIRE03 FireFactionMedium  ;FireFactionSmall
    End
    
    ConditionState = REALLYDAMAGED MOVING
      Model            = SweetTooth2_D
      Animation        = SweetTooth2_D.SweetTooth2_D
      AnimationMode    = ONCE
      WeaponFireFXBone = PRIMARY MuzzleFX
      WeaponLaunchBone = PRIMARY MuzzleFX
      WeaponLaunchBone = SECONDARY HEAD01
      WeaponFireFXBone = SECONDARY HEAD01
      ParticleSysBone  = FIRE01 FireFactionMedium  ;FireFactionSmall
      ParticleSysBone  = FIRE02 FireFactionMedium  ;FireFactionSmall
      ParticleSysBone  = FIRE03 FireFactionMedium  ;FireFactionSmall
      ParticleSysBone  = EXHAUST01 FireFactionSmall
      ParticleSysBone  = EXHAUST02 FireFactionSmall
    End

    ConditionState = RUBBLE
      Model = SweetTooth2_D
      WeaponFireFXBone = PRIMARY MuzzleFX
    End

    TrackMarks = EXTireTrack.tga
    Dust                        = RocketBuggyDust
    DirtSpray                   = RocketBuggyDirtSpray
    PowerslideSpray             = RocketBuggyDirtPowerSlide

    ; These parameters are only used if the model has a separate suspension, 
    ; and the locomotor has HasSuspension = Yes.
    LeftFrontTireBone           = Tire01
    RightFrontTireBone          = Tire02
    LeftRearTireBone            = Tire03
    RightRearTireBone           = Tire04
    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 2.5   ; This speed is added to the rotation speed when powersliding.
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:SweetTooth
  Side             = GLA
  EditorSorting    = VEHICLE
  TransportSlotCount = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  
  ;Standard Weaponsets
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY SweetToothGun
    Weapon = SECONDARY SweetToothWeapon
  End

  ArmorSet
    Conditions      = None
    Armor           = QuadCannonArmor
    DamageFX        = TankDamageFX
  End

  BuildCost       = 1000
  BuildTime       = 10.0          ;in seconds    
  VisionRange     = 200
  ShroudClearingRange = 300

  CommandSet          = GenericCommandSet

  ExperienceValue = 150 350 650 1000    ;Experience point value at each level
  ExperienceRequired = 0 2000 3500 5000  ;Experience points needed to gain each level
  IsTrainable            = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  ; *** AUDIO Parameters ***
  ;@self - do this later
  ;VoiceSelect           = QuadCannonVoiceSelect
  ;VoiceMove             = QuadCannonVoiceMove
  ;VoiceAttack           = QuadCannonVoiceAttack
  ;VoiceAttackAir        = QuadCannonVoiceAttackAir
  ;SoundMoveStart        = QuadCannonMoveStart
  ;SoundMoveStartDamaged = QuadCannonMoveStart
  ;VoiceGuard             = QuadCannonVoiceMove
  ;UnitSpecificSounds
   ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
   ;VoiceCreate         = QuadCannonVoiceCreate
   ;TurretMoveStart      = NoSound
   ;TurretMoveLoop       = TurretMoveLoop
   ; Required for the W3DTruckDraw module
   ;TruckLandingSound    = NoSound
   ;TruckPowerslideSound = NoSound
   ;VoiceSalvage         = QuadCannonVoiceSalvage
   ;VoiceCrush           = QuadCannonVoiceCrush
   ;VoiceEnter             = QuadCannonVoiceMove
  ;End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT SALVAGER VEHICLE SCORE DRONE SALVAGER ;So the Rank-up ability works

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 500.0
    InitialHealth   = 500.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 700
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate        = 250
  End
  Locomotor = SET_NORMAL SweettoothLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 1000.0
  End

  Behavior = AutoHealBehavior ModuleTag_06
    HealingAmount = 2
    HealingDelay = 1000 ; msec
  End

  Behavior = SlowDeathBehavior  ModuleTag_08
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 5
    ModifierBonusPerOverkillPercent = 20%  ; negative means less likely to pick this in the face of much damage, positive means more likely
    DestructionDelay = 0
    DestructionDelayVariance = 1000
    FX = FINAL FX_HowitzerExplosion
    OCL = FINAL OCL_LOSATMissileMetalImpact
  End

  Behavior                 = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateCrateDie ModuleTag_11
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End

  Behavior = DestroyDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = EjectPilotDie ModuleTag_HijackerEmerge01
    DeathTypes = ALL -CRUSHED -SPLATTED
    RequiredStatus = HIJACKED
    VeterancyLevels =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList = OCL_HijackerEmergeViaParachute
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Geometry = BOX
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 11.5     
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End