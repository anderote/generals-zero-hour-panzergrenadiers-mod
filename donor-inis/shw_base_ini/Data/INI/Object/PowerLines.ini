Object PowerLine
  ;test junk
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model = PMPWRTower
    End
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:StreetLamp
  EditorSorting    = MISC_MAN_MADE
  CrushableLevel   = 3

  ; *** ENGINEERING parameters ***
  KindOf           = IMMOBILE IGNORED_IN_GUI CLEARED_BY_BUILD

  Body            = ActiveBody ModuleTag_02
    MaxHealth       = 1.0
    InitialHealth   = 1.0
  End

  Behavior = ToppleUpdate ModuleTag_08
    ToppleFX = FX_ToppleLampPost
    BounceFX = FX_LampPostBounce
  End
  Behavior = SlowDeathBehavior ModuleTag_09
    DeathTypes = NONE +EXTRA_5 +EXPLODED
    SinkRate          = 2     ; in Dist/Sec
    SinkDelay         = 14000
    DestructionDelay  = 20000
  End
  Behavior = DestroyDie ModuleTag_05
    DeathTypes = ALL -EXTRA_5 -EXPLODED
  End
  ; An Explosive Death
  Behavior = FXListDie ModuleTag_10
    DeathTypes = ALL -EXTRA_5 -EXPLODED
    DeathFX = FX_PropExplode
  End

  Geometry            = CYLINDER
  GeometryIsSmall     = Yes
  GeometryMajorRadius = 4.0
  GeometryHeight      = 0.0
End