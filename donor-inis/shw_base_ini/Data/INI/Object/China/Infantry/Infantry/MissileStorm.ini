Object Infa_ChinaInfantryMissileStorm
  ;Thanks MPP ~<3
  ;BRRRRRRRRRT
  ;This unit starts with Radiation Suits because of weird stuff with fire weapon modules
  ; *** FART Parameters ***
  SelectPortrait         = SNMissleStorm_L
  ButtonImage            = SNMissleStorm_L

  UpgradeCameo1 = Upgrade_Fanaticism

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    ; --- idle
    DefaultConditionState
      Model             = RIBmbdrEli_SKN
      IdleAnimation     = NIHERO_SKL.NIHERO_STA 0 17
      AnimationMode     = ONCE
      TransitionKey     = TRANS_Stand
      WeaponFireFXBone  = PRIMARY   MUZZA
      WeaponLaunchBone  = PRIMARY   MUZZA
      WeaponFireFXBone  = SECONDARY MUZZA
      WeaponLaunchBone  = SECONDARY MUZZA
    End

    ; --- moving
    ConditionState      = MOVING
      Animation         = NIHero_SKL.RIBmbdrEli_MOV ;16
      AnimationMode     = LOOP
      Flags             = RANDOMSTART
      TransitionKey     = TRANS_MOVING
      ParticleSysBone   = None InfantryDustTrails
    End

    ; --- attacking
    ConditionState      = FIRING_A
      Model             = RIBmbdrEli_ASKN
      Animation         = RIBmbdrEli_ASKL.RIBmbdrEli_ATK
      AnimationMode     = ONCE
      Flags             = START_FRAME_FIRST
      TransitionKey     = TRANS_START_FIRING_A
      AnimationSpeedFactorRange = 1.0 1.0 ;2.2 2.2
    End
    AliasConditionState = FIRING_B
    
    ConditionState      = BETWEEN_FIRING_SHOTS_A
      Model             = RIBmbdrEli_ASKN
      Animation         = RIBmbdrEli_ASKL.RIBmbdrEli_ATK
      AnimationMode     = MANUAL
      Flags             = START_FRAME_LAST
      TransitionKey     = TRANS_RELOADING_A
      WaitForStateToFinishIfPossible = TRANS_START_FIRING_A
    End
    AliasConditionState = RELOADING_A
    AliasConditionState = BETWEEN_FIRING_SHOTS_B
    AliasConditionState = RELOADING_B

    ConditionState      = PREATTACK_A
      Model             = RIBmbdrEli_ASKN
      Animation         = RIBmbdrEli_ASKL.RIBmbdrEli_ATK
      AnimationMode     = ONCE
      Flags             = START_FRAME_LAST
      TransitionKey     = TRANS_PREATTACK_A
      WaitForStateToFinishIfPossible = TRANS_START_FIRING_A
    End
    AliasConditionState = PREATTACK_B

    ; --- dying states
    ConditionState      = DYING
      Model             = RIBmbdrEli_DSKN
      Animation         = UISmsd_SKL.UISmsd_DTA 
      Animation         = UISmsd_SKL.UISmsd_DTB 
      AnimationMode     = ONCE
      TransitionKey     = TRANS_Dying
      WaitForStateToFinishIfPossible = NONE ; We got a Key from Default state, but Death does not need to wait for firing to finish
    End

    TransitionState     = TRANS_Dying TRANS_Flailing
      Model             = RIBmbdrEli_DSKN
      HideSubObject     = CYLINDER02
      Animation         = UISmsd_SKL.UISmsd_ADTF1
      Animation         = UISmsd_SKL.UISmsd_ADTG21
      AnimationMode     = ONCE
    End

    ConditionState      = DYING EXPLODED_FLAILING
      Model             = RIBmbdrEli_DSKN
      HideSubObject     = CYLINDER02
      Animation         = UISmsd_SKL.UISmsd_ADTF2
      Animation         = UISmsd_SKL.UISmsd_ADTG22
      AnimationMode     = LOOP
      TransitionKey     = TRANS_Flailing
      WaitForStateToFinishIfPossible = NONE ; We got a Key from Default state, but Death does not need to wait for firing to finish
    End

    ConditionState      = DYING EXPLODED_BOUNCING
      Model             = RIBmbdrEli_DSKN
      HideSubObject     = CYLINDER02
      Animation         = UISmsd_SKL.UISmsd_ADTF3
      Animation         = UISmsd_SKL.UISmsd_ADTG23
      AnimationMode     = ONCE
      TransitionKey     = TRANS_EXPLODED_BOUNCING
      WaitForStateToFinishIfPossible = NONE ; We got a Key from Default state, but Death does not need to wait for firing to finish
    End

    ; --- parachuting states
    ConditionState      = FREEFALL
      Animation         = NIHero_SKL.NIHero_PFL
      AnimationMode     = LOOP
      TransitionKey     = TRANS_Falling
    End
    AliasConditionState = FREEFALL DYING

    ConditionState      = PARACHUTING
      Animation         = NIHero_SKL.NIHero_PHG
      AnimationMode     = LOOP
      TransitionKey     = TRANS_Chute
    End
    AliasConditionState = PARACHUTING DYING

    TransitionState     = TRANS_Falling TRANS_Chute
      Animation         = NIHero_SKL.NIHero_POP
      AnimationMode     = ONCE
      Flags             = PRISTINE_BONE_POS_IN_FINAL_FRAME  ; our bone positions should come from the last frame, rather than the first
    End

    TransitionState     = TRANS_Chute TRANS_Stand
      Animation         = NIHero_SKL.NIHero_PTD
      AnimationMode     = ONCE
    End

    TransitionState     = TRANS_Chute TRANS_StandInjured
      Animation         = NIHero_SKL.NIHero_PTD
      AnimationMode     = ONCE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:ChinaInfantryMissileStorm
  Side                = ChinaInfantryGeneral
  EditorSorting       = INFANTRY
  TransportSlotCount  = 1                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions        = NONE
    Weapon            = PRIMARY   MissileStormGroundWeaponRegular
    Weapon            = SECONDARY MissileStormAntiAirWeaponRegular
    PreferredAgainst  = SECONDARY AIRCRAFT
    ShareWeaponReloadTime = Yes
  End

  WeaponSet
    Conditions        = HERO
    Weapon            = PRIMARY   MissileStormGroundWeaponHeroic
    Weapon            = SECONDARY MissileStormAntiAirWeaponHeroic
    PreferredAgainst  = SECONDARY AIRCRAFT
    ShareWeaponReloadTime = Yes
  End

  ArmorSet
    Conditions      = None
    Armor           = MissileStormInfantryArmorUpgraded
    DamageFX        = TruckDamageFX
  End

  VisionRange         = 250
  ShroudClearingRange = 320

  Prerequisites
    Object = Infa_ChinaPropagandaCenter
  End

  BuildCost = 900
  BuildTime = 14.0          ;in seconds

  ExperienceValue    = 110 140 170 250 ;Experience point value at each level
  ExperienceRequired = 0 620 1200 2500  ;Experience points needed to gain each level
  IsTrainable        = Yes             ;Can gain experience
  CrushableLevel     = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet         = GenericCommandSet

  ; *** AUDIO Parameters ***
  ;Technically these voices are from Harkonnen Infantry in Battle for Dune
  VoiceSelect           = MortarMarauderVoiceSelect
  VoiceMove             = MortarMarauderVoiceMove
  VoiceGuard            = MortarMarauderVoiceMove
  VoiceAttack           = MortarMarauderVoiceAttack
  VoiceAttackAir        = MortarMarauderVoiceAttack

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate      = MortarMarauderVoiceCreate
    VoiceGetHealed   = MortarMarauderVoiceMove
    VoiceEnter       = MortarMarauderVoiceMove
    VoiceGarrison    = MortarMarauderVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK INFANTRY SCORE BOAT NO_GARRISON CANNOT_RETALIATE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 240.0
    InitialHealth   = 240.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
    MoodAttackCheckRate = 1500
  End
  Locomotor = SET_NORMAL MissileStormInfantryLocomotor

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    ShockResistance = 1.0
  End

; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6 -EXTRA_7 -EXTRA_8
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_ChemMortarDie
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_ChemMortarDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_ChemMortarDieByFire
    OCL                 = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death06 ; don't forget to give it a new, unique module tag
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantryBeta ;you'll have to create this OCL and make it use the blue guys instead of green ones
  End

  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinGLA
    OCL                 = INITIAL OCL_ToxicInfantryGamma
  End
  Behavior = SlowDeathBehavior ModuleTag_Death08 ;new and shiney microwave death effect
    DeathTypes          = NONE +EXTRA_2
    DestructionDelay    = 0
    FX                  = INITIAL FX_ChemMortarDieByFire
    OCL                 = INITIAL OCL_MicrowavedInfantry 
  End
  Behavior = SlowDeathBehavior ModuleTag_Death09
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_ChemMortarDieByFire
    FX                  = FINAL   FX_IfantryTeslaDie
    OCL                 = INITIAL OCL_TeslaDeathInfantry    
  End
  Behavior = SlowDeathBehavior ModuleTag_Death045 ;Brutal kill with lots of blood and no death scream
    DeathTypes          = NONE +EXTRA_4
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FX                  = INITIAL FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_036 ;Gore death explosion
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 30
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_BloodyGoreExplosion
    FX                  = FINAL   FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_Death0323
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 70
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_ChemMortarDie
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_03241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_6
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_RadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_DieByToxinGLA
  End
  Behavior = SlowDeathBehavior ModuleTag_0323241156 ;Virus weapon
    DeathTypes          = NONE +EXTRA_7
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_NeutronRadiationDeathInfantry
    FX                  = INITIAL FX_GIDieVirus
    FX                  = FINAL   FX_DieByToxinGLA
  End
; --- end Death modules ---

  Behavior = PoisonedBehavior ModuleTag_16
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  End

  ;Original feature! Shh...
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_ROTR01
    DeathWeapon   = Infa_NotAROTRCopyWeapon
    StartsActive  = Yes
    ExemptStatus  = MASKED
  End

  Behavior = HordeUpdate ModuleTag_HoardsOfHorde
    RubOffRadius = 100    ; if I am this close to a real hordesman, I will get to be an honorary hordesman
    UpdateRate = 1000    ; how often to recheck horde status (msec)
    Radius = 30          ; how close other units must be to us to count towards our horde-ness (~30 feet or so)
    KindOf = INFANTRY    ; what KindOf's must match to count towards horde-ness
    AlliesOnly = Yes     ; do we only count allies towards horde status? 
    ExactMatch = No      ; do we only count units of our exact same type towards horde status? (overrides kindof)
    Count = 5            ; how many units must be within Radius to grant us horde-ness
    Action = HORDE       ; when horde-ing, grant us the HORDE bonus
  End

  Behavior = SquishCollide ModuleTag_Splat01
    ;nothing
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14;
  ShadowSizeY = 14;
  ShadowTexture = ShadowI
  BuildCompletion = APPEARS_AT_RALLY_POINT
End