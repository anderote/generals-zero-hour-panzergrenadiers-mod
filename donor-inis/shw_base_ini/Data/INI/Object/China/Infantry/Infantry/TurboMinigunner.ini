Object Infa_ChinaInfantryTurboMinigunner
  ;BRRRRRRRRRRT
  ; *** ART Parameters ***
  SelectPortrait = SNTurboGunner_L
  ButtonImage = SNTurboGunner_L

  UpgradeCameo1 = Upgrade_ChinaChainGuns
  UpgradeCameo2 = Upgrade_Fanaticism
  UpgradeCameo3 = Upgrade_ChinaChemicalSuits

  ; *** ART Parameters ***
  ;Muzzle Flash
  Draw = W3DModelDraw ModuleTag_MFX
    DefaultConditionState
      Model = NIMGunner_MFX
      HideSubObject = MUZZLEFXB01
      WeaponMuzzleFlash = PRIMARY MUZZLEFXA
      WeaponMuzzleFlash = SECONDARY MUZZLEFXA
      WeaponMuzzleFlash = TERTIARY MUZZLEFXA
      WeaponLaunchBone = PRIMARY MUZZLEFXA
      WeaponLaunchBone = SECONDARY MUZZLEFXA
      WeaponLaunchBone = TERTIARY MUZZLEFXA
    End
  End  
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    ;STANDING
    DefaultConditionState
      Model = NIMGunner
      IdleAnimation = AITECH_SKL.AITECH_STA 0 21
      ;Regular spice animations
      IdleAnimation = AITECH_SKL.AITECH_IDA
      IdleAnimation = AITECH_SKL.AITECH_IDB
      AnimationMode = ONCE
      TransitionKey = TRANS_Stand
      
      HideSubObject = MUZZLEFX01
      WeaponLaunchBone = PRIMARY MUZZLE
      WeaponFireFXBone = PRIMARY MUZZLE
      WeaponLaunchBone = SECONDARY MUZZLE
      WeaponFireFXBone = SECONDARY MUZZLE 
      WeaponLaunchBone = TERTIARY MUZZLE
      WeaponFireFXBone = TERTIARY MUZZLE 
    End

    ; GROUND ATTACK
    ConditionState = FIRING_A
      Model = NIMGunner_A
      Animation = NIMGunner_A_SKL.NIMGunner_A_ATA
      AnimationMode = LOOP
      TransitionKey = TRANS_FiringA
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A
    AliasConditionState = RELOADING_A
    AliasConditionState = FIRING_A REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED
    AliasConditionState = RELOADING_A REALLYDAMAGED
    AliasConditionState = FIRING_B
    AliasConditionState = BETWEEN_FIRING_SHOTS_B
    AliasConditionState = RELOADING_B
    AliasConditionState = FIRING_B REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_B REALLYDAMAGED
    AliasConditionState = RELOADING_B REALLYDAMAGED
    AliasConditionState = FIRING_C
    AliasConditionState = BETWEEN_FIRING_SHOTS_C
    AliasConditionState = RELOADING_C
    AliasConditionState = FIRING_C REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_C REALLYDAMAGED
    AliasConditionState = RELOADING_C REALLYDAMAGED
    
     ; AIR ATTACK
    ;ConditionState = FIRING_B
      ;Model = NIMGunner_A
      ;Animation = NIMGunner_A_SKL.NIMGunner_A_ATB
      ;AnimationMode = LOOP
      ;TransitionKey = TRANS_FiringA
    ;End
    ;AliasConditionState = BETWEEN_FIRING_SHOTS_B
    ;AliasConditionState = RELOADING_B
    ;AliasConditionState = FIRING_B REALLYDAMAGED
    ;AliasConditionState = BETWEEN_FIRING_SHOTS_B REALLYDAMAGED
    ;AliasConditionState = RELOADING_B REALLYDAMAGED

    ConditionState = MOVING
      Animation = AITECH_SKL.AITECH_WKA 15
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = None
      ParticleSysBone     = None InfantryDustTrails
    End

    ConditionState = DYING
      Model = NIMGunner_NB
      Animation = AITECH_SKL.AITECH_DTA
      Animation = AITECH_SKL.AITECH_DTB
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Model = NIMGunner_NB
      Animation = AITECH_SKL.AITECH_ADTD1
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Model = NIMGunner_NB
      Animation = AITECH_SKL.AITECH_ADTD2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Model = NIMGunner_NB
      Animation = AITECH_SKL.AITECH_ADTD3
      AnimationMode = ONCE
      TransitionKey = None
    End

    ConditionState = SPECIAL_CHEERING
      Animation = AITECH_SKL.AITECH_CHA
      AnimationMode = LOOP
    End

    ;PARACHUTING ANIMATIONS
    ConditionState = FREEFALL
      Model = NIMGunner_NB
      Animation = AITECH_SKL.AITECH_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL DYING

    ConditionState = PARACHUTING
      Model = NIMGunner_NB
      Animation = AITECH_SKL.AITECH_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  ; our bone positions should come from the last frame, rather than the first
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING

    TransitionState = TRANS_Falling TRANS_Chute
      Model = NIMGunner_NB
      Animation = AITECH_SKL.AITECH_POP
      AnimationMode = ONCE
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  ; our bone positions should come from the last frame, rather than the first
    End

    TransitionState = TRANS_Chute TRANS_Stand
      Model = NIMGunner_NB
      Animation = AITECH_SKL.AITECH_PDN
      AnimationMode = ONCE
    End
  End
  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:MiniGunner
  Side               = ChinaInfantryGeneral
  EditorSorting      = INFANTRY
  TransportSlotCount = 1     ; how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None
    Weapon = PRIMARY TurboMinigunnerWeapon1
    Weapon = SECONDARY TurboMinigunnerWeapon2
    Weapon = TERTIARY TurboMinigunnerWeapon3
    ;PreferredAgainst = SECONDARY AIRCRAFT
    ShareWeaponReloadTime = No
  End
  WeaponSet
    Conditions = HERO   ;PLAYER_UPGRADE
    Weapon = PRIMARY TurboMinigunnerWeapon1Heroic
    Weapon = SECONDARY TurboMinigunnerWeapon2Heroic
    Weapon = TERTIARY TurboMinigunnerWeapon3Heroic
    ShareWeaponReloadTime = No
  End

  ArmorSet
    Conditions      = None
    Armor           = InfGen_HumanArmor
    DamageFX        = InfantryDamageFX
  End
  ArmorSet
    Conditions            = PLAYER_UPGRADE
    Armor                 = Nuke_ChemSuitHumanArmor
    DamageFX              = InfantryDamageFX
  End

  VisionRange         = 190
  ShroudClearingRange = 270

  Prerequisites
    Object = Infa_ChinaPropagandaCenter
  End

  BuildCost = 1000
  BuildTime = 10.0     ; in seconds

  ExperienceValue = 70 100 130 200   ;Experience point value at each level
  ExperienceRequired = 0 200 390 1000  ;Experience points needed to gain each level
  IsTrainable = Yes     ; Can gain experience

  CrushableLevel = 0     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect       = TurboMiniGunnerVoiceSelect
  VoiceMove         = TurboMiniGunnerVoiceMove
  VoiceGuard        = TurboMiniGunnerVoiceMove
  VoiceAttack       = TurboMiniGunnerVoiceAttack
  VoiceGroupSelect  = BattleCrySound
  VoiceFear         = NoSound
  UnitSpecificSounds
    VoiceGarrison = TurboMiniGunnerVoiceMove
    VoiceCreate   = TurboMiniGunnerVoiceCreate
    VoiceEnter    = TurboMiniGunnerVoiceMove
    VoiceEnterHostile = TurboMiniGunnerVoiceMove
    VoiceGetHealed    = TurboMiniGunnerVoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS INFANTRY SCORE PARACHUTABLE

  Body = ActiveBody ModuleTag_02
    MaxHealth = 220.0
    InitialHealth = 220.0
  End

  Behavior = AIUpdateInterface ModuleTag_04
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL RedguardLocomotor

  Behavior = CommandButtonHuntUpdate ModuleTag_05     ; allows use of command button hunt script with this unit.
    ; nada
  End

  Behavior = HordeUpdate ModuleTag_06
    RubOffRadius = 100     ; if I am this close to a real hordesman, I will get to be an honorary hordesman
    UpdateRate   = 1000     ; how often to recheck horde status (msec)
    Radius       = 50     ; how close other units must be to us to count towards our horde-ness (~50 feet or so)
    KindOf       = INFANTRY     ; what KindOf's must match to count towards horde-ness
    AlliesOnly   = Yes     ; do we only count allies towards horde status?
    ExactMatch   = No     ; do we only count units of our exact same type towards horde status? (overrides kindof)
    Count        = 5     ; how many units must be within Radius to grant us horde-ness
    Action       = HORDE     ; when horde-ing, grant us the HORDE bonus
  End

  Behavior = PhysicsBehavior ModuleTag_07
    Mass = 5.0
    ShockResistance = 1.0  ; Testing infantry immune to excessive shockwave values, like Windmills
  End

  Behavior = SquishCollide ModuleTag_10
    ; nothing
  End

  ; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6 -EXTRA_7 -EXTRA_8
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_RedGuardDie
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_RedGuardDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireChina
    OCL                 = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinChina
    OCL                 = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death06 ; don't forget to give it a new, unique module tag
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinChina
    OCL                 = INITIAL OCL_ToxicInfantryBeta ;you'll have to create this OCL and make it use the blue guys instead of green ones
  End
  
  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinChina
    OCL                 = INITIAL OCL_ToxicInfantryGamma
  End
  Behavior = SlowDeathBehavior ModuleTag_Death08 ;new and shiney microwave death effect
    DeathTypes          = NONE +EXTRA_2
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireChina
    OCL                 = INITIAL OCL_MicrowavedInfantry 
  End
  Behavior = SlowDeathBehavior ModuleTag_Death09
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireChina
    FX                  = FINAL   FX_IfantryTeslaDie
    OCL                 = INITIAL OCL_TeslaDeathInfantry    
  End
  Behavior = SlowDeathBehavior ModuleTag_Death045 ;Brutal kill with lots of blood and no death scream
    DeathTypes          = NONE +EXTRA_4
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FX                  = INITIAL FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_036 ;Gore death explosion
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 30
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_BloodyGoreExplosion
    FX                  = FINAL   FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_Death0323
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 70
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_RedGuardDie
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_03241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_6
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_RadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_DieByToxinChina
  End
  Behavior = SlowDeathBehavior ModuleTag_0323241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_7
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_NeutronRadiationDeathInfantry
    FX                  = INITIAL FX_GIDieVirus
    FX                  = FINAL   FX_DieByToxinChina
  End
  ; --- end Death modules ---

  Behavior = PoisonedBehavior ModuleTag_15
    PoisonDamageInterval = 100     ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000     ; ... for this long after last hit by poison damage
  End

  Behavior                = ArmorUpgrade ModuleTag_ChemSuit01
    TriggeredBy           = Upgrade_ChinaChemicalSuits
  End

  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_ChemSuit02
    StartsActive  = No
    TriggeredBy   = Upgrade_ChinaChemicalSuits
    DamageTypes   = ALL
    ;Effectively all the time when set to zero which we want in this case
    DamageAmount  = 0
    ContinuousWeaponPristine      = ChinaChemDecalWeapon
    ContinuousWeaponDamaged       = ChinaChemDecalWeapon
    ContinuousWeaponReallyDamaged = ChinaChemDecalWeapon
  End

  Behavior = VeterancyGainCreate ModuleTag_Vet01
    StartingLevel = VETERAN
  End

  Behavior = WeaponBonusUpgrade ModuleTag_ChainGuns
    TriggeredBy = Upgrade_ChinaChainGuns
  End

  ;Original feature! Shh...
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_ROTR01
    DeathWeapon   = Infa_NotAROTRCopyWeapon
    StartsActive  = Yes
    ExemptStatus  = MASKED
  End

  ;Behavior = WeaponSetUpgrade ModuleTag_Meme01
    ;TriggeredBy = Upgrade_Veterancy_HEROIC
  ;End

  ClientUpdate = SwayClientUpdate ModuleTag_Sway01
    ;Helps make infantry look a bit more organic
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 7.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14;
  ShadowSizeY = 14;
  ShadowTexture = ShadowI;
  BuildCompletion = APPEARS_AT_RALLY_POINT
End