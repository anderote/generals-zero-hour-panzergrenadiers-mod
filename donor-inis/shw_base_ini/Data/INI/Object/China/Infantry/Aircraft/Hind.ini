Object Infa_ChinaVehicleHind
  ;The Overlord of the sky
  ; *** ART Parameters ***
  SelectPortrait         = SRHind_L
  ButtonImage            = SRHind_L
  
  UpgradeCameo1 = Upgrade_HelixArmor
  
  Draw = W3DOverlordAircraftDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ExtraPublicBone = EXHAUST01 EXHAUST02

    DefaultConditionState
      Model                           = RVHind
      Animation                       = RVHind.RVHind
      AnimationMode                   = LOOP
      HideSubObject                   = TURRET
      WeaponFireFXBone                = TERTIARY WeaponA
      WeaponLaunchBone                = TERTIARY WeaponA
      WeaponFireFXBone                = SECONDARY  WeaponB
      WeaponLaunchBone                = SECONDARY  WeaponB
    End
    
    ConditionState                    = MOVING
      ParticleSysBone                 = EXHAUST01 HelixExhaust
      ParticleSysBone                 = EXHAUST02 HelixExhaust
    End

    ConditionState                    = REALLYDAMAGED
      Model                           = RVHind_d
      Animation                       = RVHind_d.RVHind_d
    End
    
    ConditionState                    = REALLYDAMAGED MOVING
      Model                           = RVHind_d
      Animation                       = RVHind_d.RVHind_d
      ParticleSysBone                 = EXHAUST01 HelixExhaust
      ParticleSysBone                 = EXHAUST02 HelixExhaust
    End
    AliasConditionState = RUBBLE
  End
  
  Draw = W3DModelDraw ModuleTag_NoseGun01
    DefaultConditionState
      Model                           = RVHindGun
      Animation                       = RVHindGun.RVHindGun
      AnimationMode                   = ONCE
      Flags                           = MAINTAIN_FRAME_ACROSS_STATES
      Turret                          = TURRET
      TurretPitch                     = TURRETEL
      WeaponFireFXBone                = PRIMARY Muzzle
      WeaponLaunchBone                = PRIMARY Muzzle
    End
    
    ConditionState = ATTACKING
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.5 1.5
    End

    ConditionState = REALLYDAMAGED
      Model = RVHindGun_D
      Animation = RVHindGun_D.RVHindGun_D
    End
    AliasConditionState = RUBBLE
    
    ConditionState = REALLYDAMAGED ATTACKING
      Model = RVHindGun_D
      Animation = RVHindGun_D.RVHindGun_D
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.5 1.5
    End
  End
  
  Draw = W3DModelDraw ModuleTag_MuzzleFlash01
  
    DefaultConditionState
      Model                           = RVHind_Mzl
      Animation                       = RVHind_Mzl.RVHind_Mzl
      AnimationMode                   = LOOP
      Flags                           = MAINTAIN_FRAME_ACROSS_STATES
      Turret                          = TURRET
      TurretPitch                     = TURRETEL
      HideSubObject                   = MUZZLEFX01
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
    
    ConditionState = FIRING_A
     ShowSubObject                   = MUZZLEFX01
    End
    AliasConditionState = REALLYDAMAGED FIRING_A
  End
  
  Draw                    = W3DModelDraw ModuleTag_RandomBits01
    OkToChangeModelColor  = Yes

    DefaultConditionState
      Model               = RVHindPart1
    End
    
    ConditionState        = REALLYDAMAGED 
      Model               = RVHindPart1_D
    End
  End
  
  Draw                    = W3DModelDraw ModuleTag_GoliathBits01
    OkToChangeModelColor  = Yes

    DefaultConditionState
      Model               = NVDeva_U2
    End    
    AliasConditionState = REALLYDAMAGED 
    AliasConditionState = RUBBLE

    ConditionState = USER_1
      Model               = RVHind_U
    End    
    
   ConditionState = USER_1 REALLYDAMAGED 
      Model               = RVHind_UD
    End    
    AliasConditionState = USER_1 RUBBLE
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:ChinaVehicleHind
  EditorSorting       = VEHICLE
  Side                = ChinaInfantryGeneral
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 250.0 
  ShroudClearingRange = 300.0
  
  Prerequisites
    Object            = Infa_ChinaPropagandaCenter
  End
  
  WeaponSet
    Conditions          = NONE 
    Weapon              = PRIMARY    Hind20mmGattlingCannonWeapon
    PreferredAgainst    = PRIMARY    INFANTRY
    Weapon              = SECONDARY  HindAirToGroundMissileWeapon
    Weapon              = TERTIARY   HindMissilePodWeapon
    AutoChooseSources   = TERTIARY   NONE
    ShareWeaponReloadTime = No
  End
  
  ArmorSet
    Conditions      = None
    Armor           = HindGunshipArmor
    DamageFX        = HeavyTankDamageFX
  End
  ArmorSet
    Conditions      = PLAYER_UPGRADE
    Armor           = HindGunshipArmorUpgraded
    DamageFX        = HeavyTankEraDamageFX
  End
  
  BuildCost           = 2800
  BuildTime           = 30              ; in seconds

  ExperienceValue     = 150 250 350 500 ;Experience point value at each level
  ExperienceRequired  = 0 750 1600 3000  ;Experience points needed to gain each level
  IsTrainable         = Yes             ; Can gain experience
  CommandSet          = Infa_ChinaVehicleHindCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = TigerVoiceSelect
  VoiceMove             = TigerVoiceMove
  VoiceGuard            = TigerVoiceGuard
  VoiceAttack           = TigerVoiceAttack
  VoiceAttackAir        = TigerVoiceAttackAir
  SoundAmbient          = HelixAmbientLoop
  SoundAmbientRubble    = NoSound
  SoundEnter      = HumveeEnter
  SoundExit       = HumveeExit
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = ChinaGenericUnitReady
    VoiceGarrison       = TigerVoiceMove
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority   = UNIT
  KindOf          = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT PRODUCED_AT_HELIPAD TRANSPORT
  
  Body = ActiveBody ModuleTag_04
    MaxHealth       = 420.0
    InitialHealth   = 420.0
    
    SubdualDamageCap       = 900
    SubdualDamageHealRate  = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = FXListDie ModuleTag_05
    DeathFX = FX_HelicopterStartDeath
  End

  Behavior = ChinookAIUpdate ModuleTag_06
    Turret
      TurretTurnRate = 180     ; this "turret" does not turn
      TurretPitchRate = 180   
      MinPhysicalPitch = -89 ; If allows pitch, the lowest I can dip down to shoot.  defaults to 0 (horizontal)
      NaturalTurretPitch = -7.0
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY
    End
    AltTurret
      TurretTurnRate = 0     ; this "turret" does not turn
      ControlledWeaponSlots = SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
    RotorWashParticleSystem    = HelixRotorWashRing
  End
  Locomotor = SET_NORMAL  HindLocomotor
  Locomotor = SET_TAXIING BasicHelicopterTaxiLocomotor

  Behavior = PhysicsBehavior ModuleTag_07
    VehicleCrashesIntoBuildingWeaponTemplate = MediumAircraftCrashingIntoBuildingWeapon
    Mass = 300.0
  End

  Behavior = HelicopterSlowDeathBehavior ModuleTag_08
    DestructionDelay                = 99999999        ; the destruction delay
    SpiralOrbitTurnRate             = 100.0           ; in degrees per second, bigger # = tighter spiral
    SpiralOrbitForwardSpeed         = 180.0           ; bigger # = larger spiral
    SpiralOrbitForwardSpeedDamping  = .9999           ; smaller #'s = slow down faster
    MaxBraking                      = 500   ; max braking we can use during death spiral (lower num = wilder spiral)    
    SoundDeathLoop                  = HelixDamagedLoop
    MinSelfSpin                     = 60                     ; in degrees per second
    MaxSelfSpin                     = 120                     ; in degrees per second
    SelfSpinUpdateDelay             = 100             ; in milliseconds
    SelfSpinUpdateAmount            = 25             ; in degrees     
    FallHowFast                     = 12.0%  ; fraction of gravity, lower = take longer to fall
    MinBladeFlyOffDelay             = 1500            ; in milliseconds
    MaxBladeFlyOffDelay             = 1500            ; in milliseconds
    AttachParticle                  = SootySmokeTrail
    AttachParticleBone              = Propeller02
    BladeObjectName                 = ComancheBlades
    BladeBoneName                   = Propeller01    
    FXHitGround                     = FX_HelicopterHitGround
    OCLHitGround                    = OCL_HindHitGround
    FXFinalBlowUp                   = FX_GroundedHindBlowUp
    OCLFinalBlowUp                  = OCL_GroundedHelicopterBlowUp
    DelayFromGroundToFinalDeath     = 0
    FinalRubbleObject               = Infa_ChinaVehicleHindHulk
  End

  Behavior = TransportContain ModuleTag_09
    Slots                 = 8
    DamagePercentToUnits  = 100%
    AllowInsideKindOf     = INFANTRY
    ForbidInsideKindOf    = VEHICLE
    ExitDelay             = 100
    NumberOfExitPaths     = 1
    PassengersAllowedToFire = No
  End

  Behavior = ObjectCreationUpgrade ModuleTag_Payload01
    UpgradeObject = OCL_InfaHindInfantry
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = GrantUpgradeCreate ModuleTag_Payload02
    UpgradeToGrant = Upgrade_AmericaBattleDrone
  End
  
  Behavior = TransitionDamageFX ModuleTag_10
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_ComancheDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior                = ArmorUpgrade ModuleTag_Armor01
    TriggeredBy           = Upgrade_HelixArmor
  End

  Behavior = PointDefenseLaserUpdate ModuleTag_ECM01
    WeaponTemplate        = HindECMSmokeWeapon01
    PrimaryTargetTypes    = BALLISTIC_MISSILE SMALL_MISSILE
    ScanRate              = 10
    ScanRange             = 200.0
    PredictTargetVelocityFactor = 2.0
  End
  Behavior = PointDefenseLaserUpdate ModuleTag_ECM02
    WeaponTemplate        = HindECMSmokeWeapon02
    PrimaryTargetTypes    = BALLISTIC_MISSILE SMALL_MISSILE
    ScanRate              = 20
    ScanRange             = 200.0
    PredictTargetVelocityFactor = 1.0
  End

  Geometry = BOX
  GeometryMajorRadius = 30.0
  GeometryMinorRadius = 5.0
  GeometryHeight = 25.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End