Object Infa_ChinaVehicleTroopCrawler

  ; *** ART Parameters ***
  SelectPortrait         = SNAsltTroop_L
  ButtonImage            = SNAsltTroop
  
  UpgradeCameo1 = Upgrade_Fanaticism
  UpgradeCameo2 = Upgrade_ChinaSubliminalMessaging
  
  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes

    ConditionState       = NONE
      Model              = NVPropCrwl
    End

    ConditionState       = REALLYDAMAGED RUBBLE
      Model              = NVPropCrwl_D
    End

    TrackMarks = EXTireTrack.tga

    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray
    ; PowerslideSpray = RocketBuggyDirtPowerSlide doesn't powerslide

    ; These parameters are only used if the model has a separate suspension, 
    ; and the locomotor has HasSuspension = Yes.
    LeftFrontTireBone     = Wheel01
    RightFrontTireBone    = Wheel08
    LeftRearTireBone      = Wheel03
    RightRearTireBone     = Wheel05
    MidLeftFrontTireBone  = Wheel02
    MidRightFrontTireBone = Wheel07
    MidLeftRearTireBone   = Wheel04
    MidRightRearTireBone  = Wheel06

    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 0   ; This vehicle doesn't powerslide.

  End

  Draw = W3DModelDraw ModuleMod_OverWater
    DefaultConditionState
      Model = NVTCrawler_W
    End
    AliasConditionState  = MOVING
    ConditionState       = OVER_WATER
      ParticleSysBone    = TreadFX01 AmphibWaveRest
      ParticleSysBone    = TreadFX02 AmphibWaveRest
    End   
    ConditionState       = OVER_WATER MOVING
      ParticleSysBone    = TreadFX01 AmphibWave
      ParticleSysBone    = TreadFX02 AmphibWave
    End
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:AssaultTroopTransport
  Side = ChinaInfantryGeneral
  EditorSorting   = VEHICLE
  TransportSlotCount = 8                 ;Just enough to fit into a Chinook.
  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY     None
  End
  WeaponSet
    Conditions          = PLAYER_UPGRADE 
    Weapon              = PRIMARY     Infa_ChinaVehicleTroopCrawlerDummyWeapon
  End 

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End
  WeaponSet
    Conditions = CARBOMB PLAYER_UPGRADE
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions      = None
    Armor           = Crazy_AssaultCrawlerArmor
    DamageFX        = TankDamageFX
  End
  BuildCost       = 2300
  BuildTime       = 25.0          ;in seconds    
  VisionRange     = 175           ;Needs to see farther and match it's weapon range -- else troop crawlers will get slaughtered against tanks!
  ShroudClearingRange = 400

  ExperienceValue     = 75 75 75 75 ;Experience point value at each level
  IsTrainable         = No  

  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = Infa_ChinaTroopCrawlerCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = AssaultTroopCrawlerVoiceSelect
  VoiceMove = TroopCrawlerVoiceMove
  VoiceGuard = TroopCrawlerVoiceMove
  VoiceAttack = AssaultTroopCrawlerVoiceAttack
  SoundMoveStart = TroopCrawlerMoveStart
  SoundMoveStartDamaged = TroopCrawlerMoveStart
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = AssaultTroopCrawlerVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = TurretMoveLoop
    TruckLandingSound = NoSound ;RocketBuggyLand
    TruckPowerslideSound = NoSound ;RocketBuggyPowerslide
    VoiceCrush = TroopCrawlerVoiceCrush
    VoiceUnload   = TroopCrawlerVoiceUnload
    VoiceEnter = TroopCrawlerVoiceMove
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS TRANSPORT VEHICLE SCORE
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 240.0
    InitialHealth   = 240.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 480
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = StealthDetectorUpdate ModuleTag_03
    DetectionRate             = 900   ; how often to rescan for stealthed things in my sight (msec)
    ;DetectionRange           = ??? ;Dustin, enable this for independant balancing!
    CanDetectWhileGarrisoned  = No ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained   = No ;Contained means being in a transport or tunnel network.
    PingSound                 = IRPing
    LoudPingSound             = IRPingLoud
    ;IRParticleSysName         = IRDetectSonar
    IRBrightParticleSysName   = IRDetectSonarBright
    IRGridParticleSysName     = IRDetectGrid
    IRBeaconParticleSysName   = IRLenzflare
    IRParticleSysBone         = IRFX
  End

  Behavior = TransportAIUpdate ModuleTag_CorrectAI
  End

  Locomotor = SET_NORMAL TroopCrawlerLocomotor TroopCrawlerWaterLocomotor
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 120.0
  End
  Behavior = TransportContain ModuleTag_06
    PassengersAllowedToFire = Yes
    Slots                 = 10
    ;;InitialPayload        = Infa_ChinaInfantryMiniGunner 8
    ScatterNearbyOnExit   = Yes
    HealthRegen%PerSec    = 10
    DamagePercentToUnits  = 10%
    AllowInsideKindOf     = INFANTRY
    ForbidInsideKindOf    = BOAT
    ExitDelay         = 250
    NumberOfExitPaths = 3 ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit = Yes ; AI Will tell people to set their mood to Aggressive on exiting
    ArmedRidersUpgradeMyWeaponSet = Yes
  End

  Behavior = ObjectCreationUpgrade ModuleTag_Payload01
    UpgradeObject = OCL_InfaTroopCrawlerInfantry
    TriggeredBy   = Upgrade_AmericaBattleDrone
  End
  Behavior = GrantUpgradeCreate ModuleTag_Payload02
    UpgradeToGrant = Upgrade_AmericaBattleDrone
  End

  Behavior = SlowDeathBehavior ModuleTag_07
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 1
    FX  = FINAL    FX_SupplyTruckExplosionOneFinal
    OCL = FINAL    OCL_FinalAssaultTroopCrawlerDebris
  End

  Behavior                 = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End

  Behavior = DestroyDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = FXListDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateCrateDie ModuleTag_12
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior        = PropagandaTowerBehavior ModuleTag_22
    Radius                = 150
    DelayBetweenUpdates   = 4000 ; in milliseconds
    HealPercentEachSecond = 2%   ; get this % of max health every second 
    PulseFX               = FX_OverlordPropagandaTowerSubliminalPulse ;plays as often as DelayBetweenUpdates
    UpgradeRequired       = Upgrade_ChinaSubliminalMessaging
    UpgradedHealPercentEachSecond = 3%   ; get this % of max health every second 
    UpgradedPulseFX       = FX_TroopCrawlerPropagandaTowerSubliminalPulse ;plays as often as DelayBetweenUpdates
    AffectsSelf           = Yes ; Needs this since Tower is not seperate object for crawler
  End

  Behavior = FireWeaponUpdate ModuleTag_22231451254
    Weapon = ChinesePropagandaDecalWeapon
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Behavior = HordeUpdate ModuleTag_Horde01
    RubOffRadius = 150    ; if I am this close to a real hordesman, I will get to be an honorary hordesman
    UpdateRate = 1000     ; how often to recheck horde status (msec)
    Radius = 75           ; how close other units must be to us to count towards our horde-ness (~30 feet or so)
    KindOf = VEHICLE INFANTRY     ; what KindOf's must match to count towards horde-ness
    AlliesOnly = Yes      ; do we only count allies towards horde status? 
    Count = 5             ; how many units must be within Radius to grant us horde-ness
    Action = HORDE        ; when horde-ing, grant us the HORDE bonus
  End

  Geometry = BOX
  GeometryMajorRadius = 22.0
  GeometryMinorRadius = 9.0
  GeometryHeight = 13.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length    

End

