Object Spec_ChinaInfantryPangolin
  ;Infantry based anti-air, yay
  ; *** ART Parameters ***
  SelectPortrait         = SNPngln_L
  ButtonImage            = SNPngln_L

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = NIATTr_SKN
      Turret = NIATTr_SKN
      IdleAnimation = NITHNT_SKL.NITHNT_STA 0 30
      IdleAnimation = NITHNT_SKL.NITHNT_IDA
      IdleAnimation = NITHNT_SKL.NITHNT_IDB
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 0.8 1.2
      TransitionKey = TRANS_Stand
      ;WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponLaunchBone = PRIMARY Muzzle
      WeaponRecoilBone = PRIMARY FX_EXHAUST_  ;<--- This is for the totally realistic shell eject thing
    End

    AliasConditionState = REALLYDAMAGED
    ConditionState = FIRING_A
      Animation = NITHNT_SKL.NITHNT_ATA
      AnimationMode = ONCE
      TransitionKey = TRANS_START_FIRING
    End
    AliasConditionState = FIRING_A REALLYDAMAGED

    ConditionState = BETWEEN_FIRING_SHOTS_A
      Animation = NITHNT_SKL.NITHNT_STA
      AnimationMode = ONCE
      ; this is basically a trick: this guy has a nontrivial animation for firing,
      ; and a long recycle time between shots. we want him to finish his fire animation
      ; (unless he's ordered to do something else), so this is just a handy trick that
      ; says, "if the previous state had this transition key, allow it to finish before
      ; switching to us, if possible".
      WaitForStateToFinishIfPossible = TRANS_START_FIRING
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED

    ConditionState = MOVING
      Animation = NITHNT_SKL.NITHNT_RNA 20
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = None
      ParticleSysBone = None InfantryDustTrails
      WaitForStateToFinishIfPossible = NONE
    End
    AliasConditionState = MOVING REALLYDAMAGED

    ConditionState = RELOADING_A
      Animation = NITHNT_SKL.NITHNT_ATA 10
      AnimationMode = ONCE
      WaitForStateToFinishIfPossible = NONE
    End
    AliasConditionState = MOVING RELOADING_A
    AliasConditionState = MOVING RELOADING_A REALLYDAMAGED

    ConditionState = DYING
      Animation = NITHNT_SKL.NITHNT_DTA
      Animation = NITHNT_SKL.NITHNT_DTB
      AnimationSpeedFactorRange = 0.9 1.25
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End

    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = NITHNT_SKL.NITHNT_ADTA1
      AnimationMode = ONCE
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = NITHNT_SKL.NITHNT_ADTA2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = NITHNT_SKL.NITHNT_ADTA3
      AnimationMode = ONCE
      TransitionKey = None
    End

    ; PARACHUTING ANIMATIONS
    ConditionState = FREEFALL
      Animation = NITHNT_SKL.NITHNT_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_Falling
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL DYING

    ConditionState = PARACHUTING
      Animation = NITHNT_SKL.NITHNT_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME     ; our bone positions should come from the last frame, rather than the first
      TransitionKey = TRANS_Chute
    End
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING DYING

    TransitionState = TRANS_Falling TRANS_Chute
      Animation = NITHNT_SKL.NITHNT_POP
      AnimationMode = ONCE
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME     ; our bone positions should come from the last frame, rather than the first
    End

    TransitionState = TRANS_Chute TRANS_Stand
      Animation = NITHNT_SKL.NITHNT_PTD
      AnimationMode = ONCE
    End
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:Spec_ChinaInfantryPangolin
  Side               = ChinaSpecialWeaponsGeneral
  EditorSorting      = INFANTRY
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon = PRIMARY ChinaInfantryPangolinWeapon
  End

  ArmorSet
    Conditions      = None
    Armor           = InfGen_HumanArmor
    DamageFX        = InfantryDamageFX
  End

  VisionRange         = 180
  ShroudClearingRange = 400

  Prerequisites
    Object = Spec_ChinaWarFactory
  End

  BuildCost = 500
  BuildTime = 8.0          ;in seconds    

  ExperienceValue    = 25 45 65 85    ;Experience point value at each level
  ExperienceRequired = 0 125 350 900  ;Experience points needed to gain each level
  IsTrainable        = Yes            ;Can gain experience

  CrushableLevel         = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet      = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect    = ChinaPangolinVoiceSelect
  VoiceMove      = ChinaPangolinVoiceMove
  VoiceAttack    = ChinaPangolinVoiceAttack
  VoiceAttackAir = ChinaPangolinVoiceAttack
  VoiceGuard     = ChinaPangolinVoiceMove
  VoiceFear      = NoSound
  UnitSpecificSounds
    VoiceCreate       = ChinaGenericUnitReady
    VoiceGarrison     = ChinaPangolinVoiceMove
    VoiceEnter        = ChinaPangolinVoiceMove
    VoiceEnterHostile = ChinaPangolinVoiceMove
    VoiceGetHealed    = ChinaPangolinVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK INFANTRY SCORE ATTACK_NEEDS_LINE_OF_SIGHT

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 0   ; turn rate, in degrees per sec
      TurretPitchRate = 0
      FirePitch = 0        ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch = Yes
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL BasicHumanLocomotorPlus25

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 5.0
    ShockResistance = 1.0
  End
 
  Behavior = SquishCollide ModuleTag_09
    ;nothing
  End

  ; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6 -EXTRA_7 -EXTRA_8
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_TankHunterDie
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_TankHunterDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireChina
    OCL                 = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinChina
    OCL                 = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death06 ; don't forget to give it a new, unique module tag
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinChina
    OCL                 = INITIAL OCL_ToxicInfantryBeta ;you'll have to create this OCL and make it use the blue guys instead of green ones
  End
  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinChina
    OCL                 = INITIAL OCL_ToxicInfantryGamma
  End
  Behavior = SlowDeathBehavior ModuleTag_Death08 ;new and shiney microwave death effect
    DeathTypes          = NONE +EXTRA_2
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireChina
    OCL                 = INITIAL OCL_MicrowavedInfantry 
  End
  Behavior = SlowDeathBehavior ModuleTag_Death09
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireChina
    FX                  = FINAL   FX_IfantryTeslaDie
    OCL                 = INITIAL OCL_TeslaDeathInfantry    
  End
  Behavior = SlowDeathBehavior ModuleTag_Death045 ;Brutal kill with lots of blood and no death scream
    DeathTypes          = NONE +EXTRA_4
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FX                  = INITIAL FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_036 ;Gore death explosion
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 30
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_BloodyGoreExplosion
    FX                  = FINAL   FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_Death0323
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 70
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_TankHunterDie
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_03241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_6
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_RadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_DieByToxinChina
  End
  Behavior = SlowDeathBehavior ModuleTag_0323241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_7
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_NeutronRadiationDeathInfantry
    FX                  = INITIAL FX_GIDieVirus
    FX                  = FINAL   FX_DieByToxinChina
  End
  ; --- end Death modules ---

  Behavior = PoisonedBehavior ModuleTag_12
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  End
 
  Geometry            = CYLINDER
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight      = 12.0
  GeometryIsSmall     = Yes
  Shadow              = SHADOW_DECAL
  ShadowSizeX         = 14
  ShadowSizeY         = 14
  ShadowTexture       = ShadowI
  BuildCompletion     = APPEARS_AT_RALLY_POINT
End