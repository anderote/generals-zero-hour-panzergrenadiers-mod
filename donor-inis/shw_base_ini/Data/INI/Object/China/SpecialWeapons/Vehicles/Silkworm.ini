;Repurposed from Beng's Laser Demo Nuke mod
;May Beng return one day and lead us to greatness
Object Spec_ChinaTankSilkworm

  ; *** ART Parameters ***
  SelectPortrait         = Silkworm_L
  ButtonImage            = Silkworm

  UpgradeCameo1 = Upgrade_DoctrineIronDragon
  UpgradeCameo2 = Upgrade_DoctrineWarWolf

  Draw                      = W3DTankDraw ModuleTag_01
    OkToChangeModelColor    = Yes
    ParticlesAttachedToAnimatedBones = Yes
    ExtraPublicBone = MISSILE
    ProjectileBoneFeedbackEnabledSlots = PRIMARY SECONDARY ; WeaponLaunchBone will be shown/hidden, not just used for firing offset

    DefaultConditionState
      Model               = NVsilkworm
      Turret              = TURRET
      TurretPitch         = TURRETEL
      WeaponFireFXBone    = PRIMARY ENGINE01
      WeaponLaunchBone    = PRIMARY WeaponA
      WeaponHideShowBone  = PRIMARY MISSILE
      WeaponFireFXBone    = SECONDARY ENGINE01
      WeaponLaunchBone    = SECONDARY WeaponA
      WeaponHideShowBone  = SECONDARY MISSILE
      ;WeaponLaunchBone    = PRIMARY   MISSILE
      ;WeaponLaunchBone    = SECONDARY MISSILE
    End

    ConditionState        = DAMAGED
      Model               = NVsilkworm_D
    End

    ConditionState        = REALLYDAMAGED RUBBLE
      Model               = NVsilkworm_E
    End

    TrackMarks              = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:SilkwormLauncher
  Side                = ChinaSpecialWeaponsGeneral
  EditorSorting       = VEHICLE
  TransportSlotCount  = 3            ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None
    Weapon     = PRIMARY   SilkwormMissileLauncherWeapon
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End
  ArmorSet
    Conditions      = PLAYER_UPGRADE
    Armor           = IronDragonDoctrineTankArmor
    DamageFX        = TankEraDamageFX
  End

  BuildCost       = 1600
  BuildTime       = 20.0          ;in seconds    
  VisionRange     = 250
  ShroudClearingRange = 400

  ExperienceValue    = 100 130 160 190  ;Experience point value at each level
  ExperienceRequired = 0 520 1680 5000  ;Experience points needed to gain each level
  IsTrainable = Yes    ;Can gain experience
  CrusherLevel    = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel  = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet = Spec_ChinaSilkwormCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect       = TyphoonArtilleryVoiceSelect
  VoiceMove         = TyphoonArtilleryVoiceMove
  VoiceGuard        = TyphoonArtilleryVoiceMove
  VoiceAttack       = TyphoonArtilleryVoiceAttack
  SoundMoveStart    = InfernoCannonMoveStart
  SoundMoveStartDamaged = InfernoCannonMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = TyphoonArtilleryVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound
    VoiceCrush         = TyphoonArtilleryVoiceMove
    VoiceEnter         = TyphoonArtilleryVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority     = UNIT
  KindOf            = PRELOAD SELECTABLE CAN_ATTACK VEHICLE SCORE DONT_AUTO_CRUSH_INFANTRY TRANSPORT SALVAGER ;So the rank up ability works

  Body              = ActiveBody ModuleTag_02
    MaxHealth       = 160.0
    InitialHealth   = 160.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 400
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 25
  End

  Behavior = VeterancyGainCreate ModuleTag_Vet01
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_ArtilleryEliteTraining
  End

  Behavior = TransportAIUpdate ModuleTag_03
    Turret
      ControlledWeaponSlots = PRIMARY SECONDARY
      TurretTurnRate      = 120   ; turn rate, in degrees per sec
      TurretPitchRate     = 90
      AllowsPitch         = Yes
      NaturalTurretPitch  = 5
      GroundUnitPitch     = 60
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
  End
  Locomotor = SET_NORMAL GrinderTankDestroyerLocomotor
  Locomotor = SET_NORMAL_UPGRADED WarWolfDoctrineGrinderTankDestroyerLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass   = 150.0
  End

  Behavior = TransportContain ModuleTag_Ctn
    Slots                 = 5
    PassengersAllowedToFire = Yes
    DamagePercentToUnits  = 100%
    HealthRegen%PerSec    = 10
    AllowInsideKindOf     = INFANTRY
    ExitDelay             = 200
    NumberOfExitPaths     = 2
    ScatterNearbyOnExit   = No
    GoAggressiveOnExit    = Yes ; AI Will tell people to set their mood to Aggressive on exiting
    BurnedDeathToUnits    = Yes
  End

  Behavior = SlowDeathBehavior ModuleTag_05
    DestructionDelay = 800
    DestructionDelayVariance = 100
    FX  = INITIAL FX_QuadCannonCatchFire
    FX  = FINAL FX_AmericaVehicleTomahawkDeathExplosion
    OCL = FINAL OCL_ChinaTankSilkwormDebris
  End

  Behavior = CreateCrateDie ModuleTag_06
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End

  Behavior = TransitionDamageFX ModuleTag_07
    DamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    DamagedFXList1 = Loc: X:0 Y:0 Z:5 FXList:FX_BattleMasterDamageTransition

    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:FireFactionSmall
    ReallyDamagedParticleSystem2 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous02
    ReallyDamagedParticleSystem3 = Bone:Smoke RandomBone:Yes PSys:LiveWireSparks02
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:5 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_08
    AflameDuration = 5000   ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3  ; taking this much damage...
    AflameDamageDelay = 500 ; this often.
  End

  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Behavior = ArmorUpgrade ModuleTag_Armor_DoctrineIronDragon01
    TriggeredBy  = Upgrade_DoctrineIronDragon
  End

  Behavior = AutoHealBehavior ModuleTag_IronDragonDoctrine02
    HealingAmount = 2
    HealingDelay  = 1000 ; msec
    StartsActive  = No
    TriggeredBy   = Upgrade_DoctrineIronDragon
  End

  Behavior = WeaponBonusUpgrade ModuleTag_IronDragonDoctrine03
    TriggeredBy = Upgrade_DoctrineIronDragon
  End

  Behavior = LocomotorSetUpgrade ModuleTag_WarWolfDoctrine01
    TriggeredBy = Upgrade_DoctrineWarWolf
  End

  Geometry            = BOX
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 9.5
  GeometryHeight      = 13.2
  GeometryIsSmall     = Yes
  Shadow              = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End


;------------------------------------------------------------------------------
