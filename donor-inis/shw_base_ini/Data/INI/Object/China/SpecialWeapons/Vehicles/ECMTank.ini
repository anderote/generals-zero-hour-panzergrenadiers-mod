Object Spec_ChinaTankECM

  ; *** ART Parameters ***
  SelectPortrait         = SNbanshee_L
  ButtonImage            = SNbanshee

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    DefaultConditionState
      Model               = NVBANSHEE
    End
  End

  ; set cost and time fields here or else they won't work
  BuildCost           = 800
  BuildTime           = 10.0

  Prerequisites
    Object        = Spec_ChinaWarFactory
    Object        = Spec_ChinaPropagandaCenter
  End
  
  Side = ChinaSpecialWeaponsGeneral
  EditorSorting = VEHICLE
  BuildVariations = ChinaTankECM

  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE CANNOT_RETALIATE

End

;MBT HERE
Object Spec_ChinaVehicleMBT

  SelectPortrait         = MainBattleTank
  ButtonImage            = MainBattleTank

  UpgradeCameo1 = Upgrade_DoctrineIronDragon
  UpgradeCameo2 = Upgrade_DoctrineWarWolf

  ; *** ART Parameters ***
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model               = NVBmstV2
      Turret              = Turret01
      TurretPitch         = BARREL
      WeaponFireFXBone    = PRIMARY MuzzleFX
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY MuzzleFX
      WeaponFireFXBone    = SECONDARY MuzzleFX
      WeaponRecoilBone    = SECONDARY Barrel
      WeaponMuzzleFlash   = SECONDARY MuzzleFX
      WeaponLaunchBone    = SECONDARY MuzzleFX
      HideSubObject       = UPGRADE01 UPGRADE02 OBJECT02
    End
    ConditionState       = REALLYDAMAGED
      Model              = NVBmstV2_D
    End
    ConditionState       = RUBBLE
      Model              = NVBmstV2_D
      HideSubObject      = MuzzleFX01
    End

    TrackMarks              = EXTnkTrack.tga
    TreadAnimationRate = 2.0;  amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:MainBattleTank
  Side                   = ChinaSpecialWeaponsGeneral
  EditorSorting          = VEHICLE
  TransportSlotCount     = 4
  WeaponSet
    Conditions        = None
    Weapon            = PRIMARY   MBTCannonAP
    AutoChooseSources = PRIMARY   FROM_PLAYER FROM_SCRIPT FROM_AI
    Weapon            = SECONDARY MBTCannonHE
    AutoChooseSources = SECONDARY NONE
    ShareWeaponReloadTime = Yes
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon            = PRIMARY   InfectedMBTCannonAP
    AutoChooseSources = PRIMARY   FROM_PLAYER FROM_SCRIPT FROM_AI
    Weapon            = SECONDARY InfectedMBTCannonHE
    AutoChooseSources = SECONDARY NONE
    ShareWeaponReloadTime = Yes
  End

  ArmorSet
    Conditions           = None
    Armor                = MBTTankArmor ;Main Battle Tank Tank Armor :P
    DamageFX             = TankDamageFX
  End
  ArmorSet
    Conditions           = PLAYER_UPGRADE
    Armor                = IronDragonDoctrineMBTTankArmor ;Main Battle Tank Tank Armor :P
    DamageFX             = TankEraDamageFX
  End

  BuildCost              = 1900
  BuildTime              = 25.0          ;in seconds    
  VisionRange            = 180
  ShroudClearingRange = 320
  Prerequisites
    Object = Spec_ChinaPropagandaCenter
  End

  ExperienceValue        = 150 200 250 300 ;Experience point value at each level
  ExperienceRequired     = 0 400 875 1500 ;Experience points needed to gain each level
  IsTrainable            = Yes  ;Can gain experience
  CrusherLevel           = 1  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet             = ChinaMBTCommandSet
  
  ; *** AUDIO Parameters ***
  VoiceSelect = MBTVoiceSelect
  VoiceMove = MBTVoiceMove
  VoiceGuard = MBTVoiceMove
  VoiceAttack = MBTVoiceAttack
  SoundMoveStart = WarMasterTankMoveStart
  SoundMoveStartDamaged = WarMasterTankMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = MBTVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = TurretMoveLoop
    VoiceCrush     = MBTVoiceMove
    VoiceEnter     = MBTVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority          = UNIT
  KindOf                 = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE SALVAGER ;So the Rank-up ability works
  
  Body                   = ActiveBody ModuleTag_02
    MaxHealth       = 880
    InitialHealth   = 880

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1000
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 120   ; turn rate, in degrees per sec
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor            = SET_NORMAL MainBattleTankLocomotor
  Locomotor = SET_NORMAL_UPGRADED WarWolfDoctrineMainBattleTankLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass                 = 120.0
  End

  Behavior = ProductionUpdate ModuleTag_05
    ; nothing
  End

  ; Turret fly off death
  Behavior = SlowDeathBehavior ModuleTag_06
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50
    DestructionDelay  = 500
    DestructionDelayVariance  = 100
    FX  = INITIAL  FX_GenericTankDeathEffect
    OCL = MIDPOINT OCL_MilitiaTankDeathEffect
    FX  = FINAL    FX_GenericTankDeathExplosion
  End

  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_07
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier  = 50

    DestructionDelay  = 2000
    DestructionDelayVariance  = 300
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_MilitiaTankDeathEffect  
    FX  = FINAL    FX_GenericTankDeathExplosion 
  End

  Behavior                 = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_CrusaderDamageTransition
  End

  Behavior = DestroyDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = CreateObjectDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End

  Behavior = CreateCrateDie ModuleTag_1777
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior           = OCLSpecialPower ModuleTag_SmokeGrenade01
    SpecialPowerTemplate = SpecialAbilityScarabSmokeGrenades
    OCL                  = OCL_UniversalAbbilityTrigger
    CreateLocation       = USE_OWNER_OBJECT
  End
  
  Behavior = FireWeaponCollide ModuleTag_SmokeGrenade02
    CollideWeapon  = SpawnSmokeGrenadeLauncherWeapon
    RequiredStatus = USING_ABILITY
  End

  Behavior = ArmorUpgrade ModuleTag_Armor_DoctrineIronDragon01
    TriggeredBy  = Upgrade_DoctrineIronDragon
  End

  Behavior = AutoHealBehavior ModuleTag_IronDragonDoctrine02
    HealingAmount = 2
    HealingDelay  = 1000 ; msec
    StartsActive  = No
    TriggeredBy   = Upgrade_DoctrineIronDragon
  End

  Behavior = WeaponBonusUpgrade ModuleTag_IronDragonDoctrine03
    TriggeredBy = Upgrade_DoctrineIronDragon
  End 

  Behavior = LocomotorSetUpgrade ModuleTag_WarWolfDoctrine01
    TriggeredBy = Upgrade_DoctrineWarWolf
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End

  Geometry               = BOX
  GeometryMajorRadius    = 15.0
  GeometryMinorRadius    = 10.0
  GeometryHeight         = 10.0     
  GeometryIsSmall        = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
  Scale = 1.05
End