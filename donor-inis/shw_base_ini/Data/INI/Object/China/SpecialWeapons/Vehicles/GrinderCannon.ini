  End

  Behavior = VeterancyGainCreate ModuleTag_Vet01
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_ArtilleryEliteTraining
  End

  Behavior = WeaponSetUpgrade ModuleTag_99999
    TriggeredBy = Upgrade_ChinaWhiteNapalm
  End

  Behavior                    = SlowDeathBehavior  ModuleTag_05
    DeathTypes                = ALL -CRUSHED -SPLATTED
    ProbabilityModifier       = 5
    ModifierBonusPerOverkillPercent = 20%  ; negative means less likely to pick this in the face of much damage, positive means more likely
    DestructionDelay          = 900
    DestructionDelayVariance  = 200
    FX  = INITIAL  FX_CrusaderCatchFire
    OCL = FINAL    OCL_GLACamelDeathEffect
    FX  = FINAL    FX_ScudLauncherExplosionOneFinal
  End
  
  Behavior                    = InstantDeathBehavior  ModuleTag_06
    DeathTypes                = NONE +CRUSHED +SPLATTED
    FX                        = FX_CarCrush
    OCL                       = OCL_CrusaderTank_CrushEffect
  End
    
  Behavior = CreateCrateDie ModuleTag_07
    CrateData   = SalvageCrateData
  End

  Behavior                          = TransitionDamageFX ModuleTag_11
    ReallyDamagedParticleSystem1  = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1          = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration          = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount      = 3       ; taking this much damage...
    AflameDamageDelay       = 500       ; this often.
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = ArmorUpgrade ModuleTag_Armor_DoctrineIronDragon01
    TriggeredBy  = Upgrade_DoctrineIronDragon
  End

  Behavior = AutoHealBehavior ModuleTag_IronDragonDoctrine02
    HealingAmount = 2
    HealingDelay  = 1000 ; msec
    StartsActive  = No
    TriggeredBy   = Upgrade_DoctrineIronDragon
  End

  Behavior = WeaponBonusUpgrade ModuleTag_IronDragonDoctrine03
    TriggeredBy = Upgrade_DoctrineIronDragon
  End 

  Behavior = LocomotorSetUpgrade ModuleTag_WarWolfDoctrine01
    TriggeredBy = Upgrade_DoctrineWarWolf
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Geometry = BOX
  GeometryMajorRadius = 13.0
  GeometryMinorRadius = 9.0
  GeometryHeight = 10.0   ; set to make the projectile stream look right  
  GeometryIsSmall = Yes    
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End