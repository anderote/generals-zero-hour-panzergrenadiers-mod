Object Spec_ChinaVehicleGrinderCannon

  ; *** ART Parameters ***
  SelectPortrait         = SNGrinderCannon_L
  ButtonImage            = SNGrinderCannon
  
  UpgradeCameo1 = Upgrade_ChinaRamjetShells
  UpgradeCameo2 = Upgrade_ChinaTankAutoLoader
  UpgradeCameo3 = Upgrade_DoctrineIronDragon
  UpgradeCameo4 = Upgrade_DoctrineWarWolf
  
  Draw                    = W3DTankDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    ConditionState        = NONE
      Model               = NVGrinder
      Turret              = Turret
      TurretPitch         = TurretEL
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
      WeaponFireFXBone    = SECONDARY Muzzle
      WeaponRecoilBone    = SECONDARY Barrel
      WeaponMuzzleFlash   = SECONDARY MuzzleFX
      WeaponLaunchBone    = SECONDARY Muzzle
      WeaponFireFXBone    = TERTIARY Muzzle
      WeaponRecoilBone    = TERTIARY Barrel
      WeaponMuzzleFlash   = TERTIARY MuzzleFX
      WeaponLaunchBone    = TERTIARY Muzzle
    End
    
    ConditionState        = REALLYDAMAGED
      Model               = NVGrinder_D
      Turret              = Turret
      TurretPitch         = TurretEL
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
      WeaponFireFXBone    = SECONDARY Muzzle
      WeaponRecoilBone    = SECONDARY Barrel
      WeaponMuzzleFlash   = SECONDARY MuzzleFX
      WeaponLaunchBone    = SECONDARY Muzzle
      WeaponFireFXBone    = TERTIARY Muzzle
      WeaponRecoilBone    = TERTIARY Barrel
      WeaponMuzzleFlash   = TERTIARY MuzzleFX
      WeaponLaunchBone    = TERTIARY Muzzle
    End

    ConditionState        = RUBBLE
      Model               = NVGrinder_D
      Turret              = Turret
      TurretPitch         = TurretEL
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
      WeaponFireFXBone    = SECONDARY Muzzle
      WeaponRecoilBone    = SECONDARY Barrel
      WeaponMuzzleFlash   = SECONDARY MuzzleFX
      WeaponLaunchBone    = SECONDARY Muzzle
      WeaponFireFXBone    = TERTIARY Muzzle
      WeaponRecoilBone    = TERTIARY Barrel
      WeaponMuzzleFlash   = TERTIARY MuzzleFX
      WeaponLaunchBone    = TERTIARY Muzzle
    End
    
    TrackMarks           = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:GrinderCannon
  Side               = ChinaSpecialWeaponsGeneral
  EditorSorting      = VEHICLE
  TransportSlotCount = 3                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions        = None 
    Weapon            = PRIMARY   GrinderCannonGun
    Weapon            = SECONDARY GrinderCannonMineLayerGun
    AutoChooseSources = SECONDARY NONE
    WeaponLockSharedAcrossSets = Yes
    ShareWeaponReloadTime = Yes
  End
  WeaponSet
    Conditions        = PLAYER_UPGRADE 
    Weapon            = PRIMARY   GrinderCannonGunUpgraded
    Weapon            = SECONDARY GrinderCannonMineLayerGunUpgraded
    AutoChooseSources = SECONDARY NONE
    WeaponLockSharedAcrossSets = Yes
    ShareWeaponReloadTime = Yes
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End
  WeaponSet
    Conditions = CARBOMB PLAYER_UPGRADE
    Weapon = PRIMARY  SuicideCarBomb
  End
  
  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End
  ArmorSet
    Conditions      = PLAYER_UPGRADE
    Armor           = IronDragonDoctrineTankArmor
    DamageFX        = TankEraDamageFX
  End
  
  BuildCost           = 800
  BuildTime           = 15.0          ;in seconds    
  VisionRange         = 250
  ShroudClearingRange = 400

  ExperienceValue = 70 100 130 160    ;Experience point value at each level
  ExperienceRequired = 0 200 700 1500  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet      = Spec_ChinaVehicleInfernoCannonCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect       = SiegeCannonVoiceSelect
  VoiceMove         = SiegeCannonVoiceMove
  VoiceGuard        = SiegeCannonVoiceMove
  VoiceAttack       = SiegeCannonVoiceAttack
  SoundMoveStart    = InfernoCannonMoveStart
  SoundMoveStartDamaged = InfernoCannonMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = SiegeCannonVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound
    VoiceCrush          = SiegeCannonVoiceMove
    VoiceEnter         = SiegeCannonVoiceMove
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority     = UNIT
  KindOf            = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE SALVAGER ;So the Rank-up ability works
  
  Body              = ActiveBody ModuleTag_02
    MaxHealth       = 195.0
    InitialHealth   = 195.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 300
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = VeterancyGainCreate ModuleTag_Vet01
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_ArtilleryEliteTraining
  End

  Behavior = AIUpdateInterface ModuleTag_04
    Turret
      TurretTurnRate = 100
      TurretPitchRate = 100
      AllowsPitch = Yes
      FirePitch = 70
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
  End
  Locomotor = SET_NORMAL GrinderTankDestroyerLocomotor
  Locomotor = SET_NORMAL_UPGRADED WarWolfDoctrineGrinderTankDestroyerLocomotor

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 120.0
  End

  ; A crushing defeat
  Behavior               = FXListDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX         = FX_CarCrush
  End
  
  Behavior               = CreateObjectDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList    = OCL_CrusaderTank_CrushEffect
  End
  
  Behavior = SlowDeathBehavior ModuleTag_08
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 2000
    DestructionDelayVariance = 300
    FX  = INITIAL  FX_CrusaderCatchFire  
    FX  = FINAL    FX_GenericTankDeathExplosion 
    OCL = FINAL    OCL_GrinderCannonDeathEffect
  End

  Behavior                 = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:-7 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = CreateCrateDie ModuleTag_10
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = DestroyDie ModuleTag_22
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  
  Behavior = WeaponBonusUpgrade ModuleTag_2222
    TriggeredBy = Upgrade_ChinaRamjetShells
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = ArmorUpgrade ModuleTag_Armor_DoctrineIronDragon01
    TriggeredBy  = Upgrade_DoctrineIronDragon
  End

  Behavior = AutoHealBehavior ModuleTag_IronDragonDoctrine02
    HealingAmount = 2
    HealingDelay  = 1000 ; msec
    StartsActive  = No
    TriggeredBy   = Upgrade_DoctrineIronDragon
  End

  Behavior = LocomotorSetUpgrade ModuleTag_WarWolfDoctrine01
    TriggeredBy = Upgrade_DoctrineWarWolf
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End

  Behavior = WeaponSetUpgrade ModuleTag_99999
    TriggeredBy = Upgrade_ChinaTankAutoLoader
  End

  Behavior = LockWeaponCreate ModuleTag_666
    SlotToLock = PRIMARY ; Prevents indeterminate state plus two unpickable weapons equaling no attack.
  End

  Geometry            = BOX
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 10.0
  GeometryHeight      = 15.0     
  GeometryIsSmall     = Yes
  Shadow              = SHADOW_VOLUME 
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length   
End





;Crazy - ADDED SPEC ARTILLERY UNIT HERE
Object Spec_ChinaVehicleWalkingStuka

  UpgradeCameo1 = Upgrade_ChinaWhiteNapalm

  ; *** ART Parameters ***
  SelectPortrait         = SUCamel_L
  ButtonImage            = SUCamel

  UpgradeCameo1 = Upgrade_ChinaWhiteNapalm
  UpgradeCameo2 = Upgrade_DoctrineIronDragon
  UpgradeCameo3 = Upgrade_DoctrineWarWolf
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model                           = UVCamel
    End
    ConditionState                    = REALLYDAMAGED
      Model                           = UVCamel_D
    End
    ConditionState                    = RUBBLE
      Model                           = UVCamel_D
    End

    TrackMarks              = EXTnkTrack.tga
    TreadDebrisLeft         = SentryDroneTrackDebrisDirtLeft
    TreadDebrisRight        = SentryDroneTrackDebrisDirtRight
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
  End

  Draw = W3DModelDraw ModuleTag_Weapons01
    OkToChangeModelColor = Yes
    ProjectileBoneFeedbackEnabledSlots = PRIMARY

    DefaultConditionState
      Model = UVCamelS1
      WeaponLaunchBone = PRIMARY WEAPONA
      WeaponFireFXBone = PRIMARY WEAPONA
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE

  End

  Draw = W3DTruckDraw ModuleTag_Wheels01
  
    DefaultConditionState
      Model                           = UVCamelW
    End
    
    ConditionState                    = REALLYDAMAGED
      Model                           = UVCamelW_D
    End
    
    ConditionState                    = RUBBLE
      Model                           = UVCamelW_D
    End
    
    TrackMarks = EXTireTrack.tga

    Dust = Nada
    DirtSpray = RocketBuggyDirtSpray
    PowerslideSpray = RocketBuggyDirtPowerSlide


    LeftFrontTireBone     = Wheel01
    RightFrontTireBone    = Wheel02
    MidLeftFrontTireBone  = Wheel03
    MidRightFrontTireBone = Wheel04

    TireRotationMultiplier = 0.2   ; this * speed = rotation.

  End
  
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:Spec_Stuka
  Side                = ChinaSpecialWeaponsGeneral
  EditorSorting       = VEHICLE
  TransportSlotCount  = 3                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet 
    Conditions        = None 
    Weapon            = PRIMARY Crazy_SpecChinaStukaRockets
  End

  WeaponSet 
    Conditions        = PLAYER_UPGRADE 
    Weapon            = PRIMARY Crazy_SpecChinaStukaRockets_Upgraded
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End
  WeaponSet
    Conditions = CARBOMB PLAYER_UPGRADE
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions        = None
    Armor             = StukaTruckArmor
    DamageFX          = TruckDamageFX
  End
  ArmorSet
    Conditions        = PLAYER_UPGRADE
    Armor             = IronDragonDoctrineStukaTruckArmor
    DamageFX          = TankEraDamageFX
  End

  BuildCost           = 1600
  BuildTime           = 25.0          ;in seconds    
  VisionRange         = 300
  ShroudClearingRange = 330
  
  Prerequisites
    Object = Spec_ChinaPropagandaCenter
  End

  ExperienceValue = 70 100 130 160    ;Experience point value at each level
  ExperienceRequired = 0 200 700 1500  ;Experience points needed to gain each level
  IsTrainable         = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet          = GenericGroundAttackCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = CamelVoiceSelect
  VoiceMove             = CamelVoiceMove
  VoiceGuard            = CamelVoiceMove
  VoiceAttack           = CamelVoiceAttack
  SoundMoveStart        = QuadCannonMoveStart
  SoundMoveStartDamaged = QuadCannonMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate          = CamelVoiceCreate
    VoiceCrush           = CamelVoiceMove
    VoiceEnter           = CamelVoiceMove

  End

  ; *** ENGINEERING Parameters ***
  RadarPriority         = UNIT
  KindOf                = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE DONT_AUTO_CRUSH_INFANTRY SALVAGER ;So the Rank-up ability works

  Body = ActiveBody ModuleTag_02
    MaxHealth           = 300.0
    InitialHealth       = 300.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 500
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor             = SET_NORMAL CamelLocomotor
  Locomotor = SET_NORMAL_UPGRADED WarWolfDoctrineCamelLocomotor

  Behavior              = PhysicsBehavior ModuleTag_04
