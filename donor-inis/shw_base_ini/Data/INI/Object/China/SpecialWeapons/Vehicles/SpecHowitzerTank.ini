Object Spec_ChinaTankHowitzer
  ;Cluster Tank from Reborn
  ; *** ART PARAMETERS ***
  SelectPortrait         = SNKobraHowitzer_L
  ButtonImage            = SNKobraHowitzer_L
  
  UpgradeCameo1 = Upgrade_DoctrineIronDragon
  UpgradeCameo2 = Upgrade_DoctrineWarWolf
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ExtraPublicBone = FLAG01

    ConditionState = NONE
      Model             = ClusterTank
      Turret            = Turret
      TurretPitch       = TURRETEL01
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponMuzzleFlash = PRIMARY MUZZLEFX
      WeaponLaunchBone  = PRIMARY Muzzle
    End

    ConditionState = ATTACKING USING_WEAPON_A
      Model             = ClusterTank
      Turret            = Turret
      TurretPitch       = TURRETEL01
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponMuzzleFlash = PRIMARY MUZZLEFX
      WeaponLaunchBone  = PRIMARY Muzzle
    End

    ConditionState = ATTACKING USING_WEAPON_B
      Model             = ClusterTank
      Turret            = Turret
      TurretPitch       = TURRETEL01
      WeaponFireFXBone  = SECONDARY Muzzle
      WeaponRecoilBone  = SECONDARY Barrel
      WeaponMuzzleFlash = SECONDARY MUZZLEFX
      WeaponLaunchBone  = SECONDARY Muzzle
    End

    ConditionState = REALLYDAMAGED
      Model             = ClusterTank_D
      Turret            = Turret
      TurretPitch       = TURRETEL01
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponMuzzleFlash = PRIMARY MUZZLEFX
      WeaponLaunchBone  = PRIMARY Muzzle
    End

    ConditionState = ATTACKING USING_WEAPON_A REALLYDAMAGED
      Model             = ClusterTank_D
      Turret            = Turret
      TurretPitch       = TURRETEL01
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponRecoilBone  = PRIMARY Barrel
      WeaponMuzzleFlash = PRIMARY MUZZLEFX
      WeaponLaunchBone  = PRIMARY Muzzle
    End

    ConditionState = ATTACKING USING_WEAPON_B REALLYDAMAGED
      Model             = ClusterTank_D
      Turret            = Turret
      TurretPitch       = TURRETEL01
      WeaponFireFXBone  = SECONDARY Muzzle
      WeaponRecoilBone  = SECONDARY Barrel
      WeaponMuzzleFlash = SECONDARY MUZZLEFX
      WeaponLaunchBone  = SECONDARY Muzzle
    End

    ConditionState = RUBBLE
      Model = ClusterTank_D
      HideSubObject = MUZZLEFX01
    End
    AliasConditionState = RUBBLE ATTACKING USING_WEAPON_A
    AliasConditionState = RUBBLE ATTACKING USING_WEAPON_B
    TrackMarks = EXTnkTrack.tga
    TreadAnimationRate = 2
    InitialRecoilSpeed = 125
    MaxRecoilDistance = 2.2
    RecoilSettleSpeed = 4
    RecoilDamping = 0.5
  End

  Draw = W3DModelDraw ModuleTag_HordeFlag01
    AttachToBoneInAnotherModule = FLAG01

    ConditionState = NONE
      Model = EXHrdFlag_B
      Animation = EXHrdFlag_B.EXHrdFlag_B
      AnimationMode = ONCE
      Flags = START_FRAME_LAST
      TransitionKey = TRANS_Stand
    End
    AliasConditionState = REALLYDAMAGED

    ConditionState = MOVING
      Model = EXHrdFlag_A
      Animation = EXHrdFlag_A.EXHrdFlag_A
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.8 1.8
      TransitionKey = TRANS_Moving
    End
    AliasConditionState = MOVING REALLYDAMAGED

    TransitionState = TRANS_Stand TRANS_Moving
      Model = EXHrdFlag_B
      Animation = EXHrdFlag_B.EXHrdFlag_B
      AnimationMode = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 1.8 1.8
    End

    TransitionState = TRANS_Moving TRANS_Stand
      Model = EXHrdFlag_B
      Animation = EXHrdFlag_B.EXHrdFlag_B
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.8 1.8
    End

    ConditionState = RUBBLE
      Model = None
    End
  End

  ; *** DESIGN PARAMETERS ***
  DisplayName        = OBJECT:CobraHowitzerTank
  Side               = ChinaSpecialWeaponsGeneral
  EditorSorting      = VEHICLE
  TransportSlotCount = 3                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions       = None 
    Weapon           = PRIMARY SpecKobraHowitzerGunHE             ;Deals EXPLOSION damage
    Weapon           = SECONDARY SpecKobraHowitzerGunBunkerBuster ;Deals STEALTHJET_MISSILE for base defenses. Kills a number of garrisoned units if direct hit
    AutoChooseSources = SECONDARY NONE
    Weapon           = TERTIARY KobraHowitzerHoldFireDummyWeapon
    AutoChooseSources = TERTIARY NONE
    ShareWeaponReloadTime = Yes
  End
  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End
  ArmorSet
    Conditions      = PLAYER_UPGRADE
    Armor           = IronDragonDoctrineTankArmor
    DamageFX        = TankEraDamageFX
  End

  BuildCost          = 1300
  BuildTime          = 11.0          ;in seconds    
  VisionRange        = 190
  ShroudClearingRange = 350

  ExperienceValue = 90 120 150 180    ;Experience point value at each level
  ExperienceRequired = 0 850 2000 4000  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience

  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet      = Spec_ChinaKobraHowitzerCommandSet

  ; *** AUDIO PARAMETERS ***
  VoiceSelect       = SpecKobraVoiceSelect
  VoiceMove         = SpecKobraVoiceMove
  VoiceGuard        = SpecKobraVoiceMove
  VoiceAttack       = SpecKobraVoiceAttack
  SoundMoveStart    = InfernoCannonMoveStart
  SoundMoveStartDamaged = InfernoCannonMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = ChinaGenericUnitReady
    VoiceEnter         = SpecKobraVoiceMove
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority     = UNIT
  KindOf            = PRELOAD SELECTABLE DONT_AUTO_CRUSH_INFANTRY CAN_ATTACK VEHICLE SCORE SALVAGER ;for rank up ability

  Body              = ActiveBody ModuleTag_02
    MaxHealth       = 290.0
    InitialHealth   = 290.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 340
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = VeterancyGainCreate ModuleTag_03
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_ArtilleryEliteTraining
  End

  Behavior = AIUpdateInterface ModuleTag_04
    Turret
      TurretTurnRate        = 0
      TurretPitchRate       = 110
      AllowsPitch           = Yes
      FirePitch             = 45
      NaturalTurretPitch    = 15
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
  End
  Locomotor = SET_NORMAL KobraHowitzerLocomotor
  Locomotor = SET_NORMAL_UPGRADED WarWolfDoctrineKobraHowitzerLocomotor

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 150.0
  End

  ; A crushing defeat
  Behavior               = FXListDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX         = FX_CarCrush
  End
  Behavior               = CreateObjectDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList    = OCL_CrusaderTank_CrushEffect
  End
  Behavior = SlowDeathBehavior ModuleTag_08
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 2000
    DestructionDelayVariance = 300
    FX  = INITIAL  FX_CrusaderCatchFire  
    FX  = FINAL    FX_GenericTankDeathExplosion 
    OCL = FINAL    OCL_InfernoCannonDeathEffect
  End

  Behavior                 = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:-7 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior         = CreateCrateDie ModuleTag_10
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = DestroyDie ModuleTag_22
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Behavior = LocomotorSetUpgrade ModuleTag_WarWolfDoctrine01
    TriggeredBy = Upgrade_DoctrineWarWolf
  End

  Behavior = ArmorUpgrade ModuleTag_Armor_DoctrineIronDragon01
    TriggeredBy  = Upgrade_DoctrineIronDragon
  End

  Behavior = AutoHealBehavior ModuleTag_IronDragonDoctrine02
    HealingAmount = 2
    HealingDelay  = 1000 ; msec
    StartsActive  = No
    TriggeredBy   = Upgrade_DoctrineIronDragon
  End

  Behavior = WeaponBonusUpgrade ModuleTag_IronDragonDoctrine03
    TriggeredBy = Upgrade_DoctrineIronDragon
  End 

  Geometry            = BOX
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 10.0
  GeometryHeight      = 15.0     
  GeometryIsSmall     = Yes
  Shadow              = SHADOW_VOLUME 
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length   
End