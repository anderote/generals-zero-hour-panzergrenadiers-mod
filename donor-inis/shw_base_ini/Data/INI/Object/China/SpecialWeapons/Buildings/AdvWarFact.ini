;repurposed from Beng's mod, Laser Demo Nuke mod.
;May Beng return one day
; :(

Object Spec_ChinaAdvancedWarFactory
  ; *** ART Parameters ***
  SelectPortrait = UOreFacG_L
  ButtonImage    = UOreFacS

  ; ----------------- the toxin repository -------------------
  Draw = W3DModelDraw ModuleTag_01

    OkToChangeModelColor = Yes

    ConditionState = NONE
      Model           = UoreRef
      HideSubObject   = GLOW
      Animation       = UoreRef.UoreRef
      AnimationMode   = LOOP     ;MANUAL
      Flags           = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = STEAM01 LocomotiveSteamLeft
      ParticleSysBone = STEAM02 LocomotiveSteamRight
      ParticleSysBone = STEAM03 BigMissileSteam
      ParticleSysBone = SMOKE01 SteamVent
;BigMissileSteam - going down, when nuke waiting to launch
;LocomotiveSteam - good, thin small stream of steam
;SteamSmall - too small, ok for infantry size objects
;SteamMedium - ok
;SteamVentTower - invisible
;SteamVent
    End
    AliasConditionState = DAMAGED

    ConditionState = REALLYDAMAGED
      Model           = UoreRef_d
      HideSubObject   = GLOW
      Animation       = UoreRef_d.UoreRef_d
      AnimationMode   = LOOP
      Flags           = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = STEAM01 LocomotiveSteamLeft
      ParticleSysBone = STEAM02 LocomotiveSteamRight
      ParticleSysBone = STEAM03 BigMissileSteam
      ParticleSysBone = SMOKE01 SteamVent
    End
    AliasConditionState = RUBBLE

    ConditionState    = ACTIVELY_CONSTRUCTING
      Model           = UoreRef
      ShowSubObject   = GLOW
      Animation       = UoreRef.UoreRef
      AnimationMode   = LOOP
      Flags           = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = STEAM01 LocomotiveSteamLeft
      ParticleSysBone = STEAM02 LocomotiveSteamRight ;LocomotiveSteam ;SteamVent
      ParticleSysBone = STEAM03 BigMissileSteam
      ParticleSysBone = SMOKE01 SootySmokeColumn02
      ParticleSysBone = SPARKS04 FireTreeSmaller
      ParticleSysBone = SPARKS05 LiveWireSparks02
      ParticleSysBone = SPARKS06 FireTreeSparks
    End
    AliasConditionState = ACTIVELY_CONSTRUCTING DAMAGED

    ConditionState    = ACTIVELY_CONSTRUCTING REALLYDAMAGED
      Model           = UoreRef_d
      ShowSubObject   = GLOW
      Animation       = UoreRef_d.UoreRef_d
      AnimationMode   = LOOP
      Flags           = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = STEAM01 LocomotiveSteamLeft
      ParticleSysBone = STEAM02 LocomotiveSteamRight ;LocomotiveSteam ;SteamVent
      ParticleSysBone = STEAM03 BigMissileSteam
      ParticleSysBone = SMOKE01 SootySmokeColumn02
      ParticleSysBone = SPARKS04 FireTreeSmaller
      ParticleSysBone = SPARKS05 LiveWireSparks02
      ParticleSysBone = SPARKS06 FireTreeSparks
    End
    AliasConditionState = ACTIVELY_CONSTRUCTING RUBBLE

    ;**************************************************************************************************************************
    ;This block handles every possible case with construction process, selling process, awaiting construction, and sold states
    ;for this draw module
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model              = UoreRef
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    AliasConditionState  = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED

    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
      Model              = UoreRef_d
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End

    ConditionState       = AWAITING_CONSTRUCTION
      Model              = NONE
    End
    AliasConditionState  = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState  = SOLD
    AliasConditionState  = SOLD DAMAGED
    AliasConditionState  = SOLD REALLYDAMAGED
    ;**************************************************************************************************************************
  End

  ; ----------------- the conveyor belt -------------------
  Draw                   = W3DModelDraw ModuleTag_02
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model           = NBWarFact_A7
      Animation       = NBWarFact_A7.NBWarFact_A7
      AnimationMode   = LOOP
    End

    ConditionState    = ACTIVELY_CONSTRUCTING
      Model           = NBWarFact_A7
      Animation       = NBWarFact_A7.NBWarFact_A7
      AnimationMode   = LOOP
    End

    ;**************************************************************************************************************************
    ;This block handles every possible case with construction process, selling process, awaiting construction, and sold states
    ;for this draw module
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model              = NBWarFact_A7
      Animation          = NBWarFact_A7.NBWarFact_A7
      AnimationMode      = MANUAL
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End

    ConditionState       = AWAITING_CONSTRUCTION
      Model              = NONE
    End
    AliasConditionState  = SOLD
    ;**************************************************************************************************************************
  End

  ; ------------ construction-zone fence -----------------
  Draw                = W3DModelDraw ModuleTag_03
  AnimationsRequirePower = No
    DefaultConditionState
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = NBWarFact_A4
      Animation       = NBWarFact_A4.NBWarFact_A4
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_DAY
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone =  Fire01 SmolderingFire
      ParticleSysBone = Smoke02 SmolderingSmoke
      ParticleSysBone =  Fire02 SmolderingFire
    End
    ConditionState    = NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = NBWarFact_A4N
      Animation       = NBWarFact_A4N.NBWarFact_A4N
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_NIGHT
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone =  Fire01 SmolderingFire
      ParticleSysBone = Smoke02 SmolderingSmoke
      ParticleSysBone =  Fire02 SmolderingFire
    End
    ConditionState    = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = NBWarFact_A4S
      Animation       = NBWarFact_A4S.NBWarFact_A4S
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOW
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone =  Fire01 SmolderingFire
      ParticleSysBone = Smoke02 SmolderingSmoke
      ParticleSysBone =  Fire02 SmolderingFire
    End
    ConditionState    = SNOW NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = NBWarFact_A4SN
      Animation       = NBWarFact_A4SN.NBWarFact_A4SN
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOWNIGHT
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone =  Fire01 SmolderingFire
      ParticleSysBone = Smoke02 SmolderingSmoke
      ParticleSysBone =  Fire02 SmolderingFire
    End
    TransitionState   = DOWN_DEFAULT UP_DAY
      Model           = NBWarFact_A4
      Animation       = NBWarFact_A4.NBWarFact_A4
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_NIGHT
      Model           = NBWarFact_A4N
      Animation       = NBWarFact_A4N.NBWarFact_A4N
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOW
      Model           = NBWarFact_A4S
      Animation       = NBWarFact_A4S.NBWarFact_A4S
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOWNIGHT
      Model           = NBWarFact_A4SN
      Animation       = NBWarFact_A4SN.NBWarFact_A4SN
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = UP_DAY DOWN_DEFAULT
      Model           = NBWarFact_A4
      Animation       = NBWarFact_A4.NBWarFact_A4
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_NIGHT DOWN_DEFAULT
      Model           = NBWarFact_A4N
      Animation       = NBWarFact_A4N.NBWarFact_A4N
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOW DOWN_DEFAULT
      Model           = NBWarFact_A4S
      Animation       = NBWarFact_A4S.NBWarFact_A4S
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOWNIGHT DOWN_DEFAULT
      Model           = NBWarFact_A4SN
      Animation       = NBWarFact_A4SN.NBWarFact_A4SN
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
      Flags           = START_FRAME_LAST
    End
  End

  PlacementViewAngle  = -45

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:Spec_AdvWarFactory
  Side                = ChinaSpecialWeaponsGeneral
  EditorSorting       = STRUCTURE

  BuildCost           = 2500
  BuildTime           = 45.0   ; in seconds

  EnergyProduction    = -3
  VisionRange         = 200.0
  ShroudClearingRange = 200

  ArmorSet
    Conditions        = None
    Armor             = StructureArmor
    DamageFX          = StructureDamageFXNoShake
  End

  CommandSet          = Spec_ChinaAdvancedWarFactoryCommandSet
  ExperienceValue     = 1000 1000 1000 1000 ; Experience point value at each level

  Prerequisites
    Object = Spec_ChinaPropagandaCenter
    Object = Spec_ChinaWarFactory
  End

  ; *** AUDIO Parameters ***
  VoiceSelect = UndergroundGeneratorSelect
  SoundAmbient = OilDerrickAmbientLoop
  SoundOnDamaged       = BuildingDamagedStateLight
  SoundOnReallyDamaged = BuildingDestroy
  SoundAmbientRubble   = NoSound
  UnitSpecificSounds
    UnderConstruction  = UnderConstructionLoop
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = STRUCTURE
  KindOf = PRELOAD STRUCTURE SELECTABLE IMMOBILE SCORE FS_TECHNOLOGY MP_COUNT_FOR_VICTORY FS_FACTORY IMMUNE_TO_CAPTURE AUTO_RALLYPOINT

  Body            = StructureBody ModuleTag_07
    MaxHealth     = 2300.0
    InitialHealth = 2300.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1500
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End

  Behavior = ProductionUpdate ModuleTag_09
    NumDoorAnimations            = 1
    DoorOpeningTime              = 100  ;in mSeconds
    DoorWaitOpenTime             = 100  ;in mSeconds
    DoorCloseTime                = 100  ;in mSeconds
    ConstructionCompleteDuration = 500  ;in mSeconds
  End
  Behavior = DefaultProductionExitUpdate ModuleTag_10
    UnitCreatePoint   = X:  35.0  Y:-26.0   Z:0.0
    NaturalRallyPoint = X: 70.0  Y:-26.0   Z:0.0;NaturalRallyPointX must always match GeometryMajorRadius! -ML
  End

  Behavior = SlowDeathBehavior ModuleTag_12
    ExemptStatus = UNDER_CONSTRUCTION
    DeathTypes        = ALL
    DestructionDelay  = 2990
    SinkDelay         = 1490
    SinkRate          = 40     ; in Dist/Sec height is 60
    FX                = INITIAL  FX_StructureMediumDeath
    FX                = MIDPOINT FX_StructureCollapseBurst ;FX_StructureCollapseDelay
    FX                = FINAL    FX_StructureCollapseFinal ;FX_StructureLargeDeath
    OCL               = MIDPOINT OCL_LargeStructureDebris
  End

  Behavior = InstantDeathBehavior ModuleTag_13
    ; if we are under construction, use this death instead
    RequiredStatus = UNDER_CONSTRUCTION
    FX = FX_SmallStructureDeath
    OCL = OCL_SmallStructureDebris
  End

  Behavior = FlammableUpdate ModuleTag_15
    FlameDamageLimit = 20        ;Catch fire if I take this much fire damage...
    FlameDamageExpiration = 2000 ;in a span of this long
    AflameDuration     = 5000    ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 5       ; taking this much damage...
    AflameDamageDelay  = 500     ; this often.
  End

  Behavior = TransitionDamageFX ModuleTag_16
    ;-------------DESIGNED FOR MEDIUM SIZED FACTION BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1       = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionMediumSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionMediumExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionMediumShockwave
  End

  Behavior = BaseRegenerateUpdate ModuleTag_17
  End

  Behavior = GenerateMinefieldBehavior     ModuleTag_Landmine01
    TriggeredBy           = Upgrade_ChinaMines
    MineName              = Spec_ChinaGrinderLandmine
    SmartBorder           = Yes
    AlwaysCircular        = Yes

    Upgradable            = No
  End

  Geometry            = BOX
  GeometryMajorRadius = 57.0  ;;46.0
  GeometryMinorRadius = 61.0  ;;51.0
  GeometryHeight      = 45.0  ;;48.0
  GeometryIsSmall     = No
  ;;;;;FactoryExtraBibWidth = 18.0
  Shadow              = SHADOW_VOLUME
  ShadowSizeX         = 89  ; minimum elevation angle above horizon. Used to limit shadow length
  BuildCompletion     = PLACED_BY_PLAYER
End