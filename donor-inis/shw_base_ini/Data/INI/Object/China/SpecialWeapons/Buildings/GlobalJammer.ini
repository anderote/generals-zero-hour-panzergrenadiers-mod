Object Spec_ChinaRadarJamHeadquarters
  SelectPortrait = SNGlobalJam_L
  ButtonImage    = SNGlobalJam

  ; *** ART Parameters ***
  Draw                 = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    IgnoreConditionStates = NIGHT SNOW

    ; day
    ConditionState     = NONE
      Model            = CBNSpypost
    End  
    ; damaged
    ConditionState     = DAMAGED
      Model            = CBNSpypost_D
    End
    ; reallydamaged
    ConditionState     = REALLYDAMAGED
      Model            = CBNSpypost_E
    End

    ;**************************************************************************************************************************
    ;This block handles every possible case with construction process, selling process, awaiting construction, and sold states
    ;for this draw module
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model              = CBNSpypost
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
      Model              = CBNSpypost_D
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
      Model              = CBNSpypost_E
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT
    End
    ConditionState       = AWAITING_CONSTRUCTION 
      Model              = NONE
    End
    AliasConditionState  = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState  = SOLD 
    AliasConditionState  = SOLD DAMAGED
    AliasConditionState  = SOLD REALLYDAMAGED
    ;************************************************************************************************************************** 
  End

  ; ------------ construction-zone fence -----------------
  Draw = W3DModelDraw ModuleTag_02
  AnimationsRequirePower = No
    DefaultConditionState
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = SNOW NIGHT
      Model           = None
      TransitionKey   = DOWN_DEFAULT
    End
    ConditionState    = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = NBBarracks_A4
      Animation       = NBBarracks_A4.NBBarracks_A4
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_DAY
    End
    ConditionState    = NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = NBBarracks_A4N
      Animation       = NBBarracks_A4N.NBBarracks_A4N
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_NIGHT
    End
    ConditionState    = SNOW AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = NBBarracks_A4S
      Animation       = NBBarracks_A4S.NBBarracks_A4S
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOW
    End
    ConditionState    = SNOW NIGHT AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model           = NBBarracks_A4SN
      Animation       = NBBarracks_A4SN.NBBarracks_A4SN
      AnimationMode   = MANUAL
      Flags           = START_FRAME_LAST
      TransitionKey   = UP_SNOWNIGHT
    End
    TransitionState   = DOWN_DEFAULT UP_DAY
      Model           = NBBarracks_A4
      Animation       = NBBarracks_A4.NBBarracks_A4
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_NIGHT
      Model           = NBBarracks_A4N
      Animation       = NBBarracks_A4N.NBBarracks_A4N
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOW
      Model           = NBBarracks_A4S
      Animation       = NBBarracks_A4S.NBBarracks_A4S
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = DOWN_DEFAULT UP_SNOWNIGHT
      Model           = NBBarracks_A4SN
      Animation       = NBBarracks_A4SN.NBBarracks_A4SN
      AnimationMode   = ONCE
      AnimationSpeedFactorRange = 1.0 1.0
      Flags           = START_FRAME_FIRST
    End
    TransitionState   = UP_DAY DOWN_DEFAULT
      Model           = NBBarracks_A4
      Animation       = NBBarracks_A4.NBBarracks_A4
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
     Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_NIGHT DOWN_DEFAULT
      Model           = NBBarracks_A4N
      Animation       = NBBarracks_A4N.NBBarracks_A4N
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
     Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOW DOWN_DEFAULT
      Model           = NBBarracks_A4S
      Animation       = NBBarracks_A4S.NBBarracks_A4S
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
     Flags           = START_FRAME_LAST
    End
    TransitionState   = UP_SNOWNIGHT DOWN_DEFAULT
      Model           = NBBarracks_A4SN
      Animation       = NBBarracks_A4SN.NBBarracks_A4SN
      AnimationMode   = ONCE_BACKWARDS
      AnimationSpeedFactorRange = 2.0 2.0   ; play teardown animations more quickly
     Flags           = START_FRAME_LAST
    End
  End

  Draw                   = W3DModelDraw ModuleTag_ExtraTrash01
    OkToChangeModelColor = Yes
    IgnoreConditionStates = NIGHT

    ; day
    ConditionState = NONE
      Model         = NBListPost
      Animation     = NBListPost.NBListPost
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState = DAMAGED
      Model         = NBListPost_D
      Animation     = NBListPost_D.NBListPost_D
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone = Fire01 SmolderingFire
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model         = NBListPost_E
      Animation     = NBListPost_E.NBListPost_E
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone = Fire01 SmolderingFire
    End
    
    ; day Snow
    ConditionState  =  SNOW
      Model         = NBListPost_S
      Animation     = NBListPost_S.NBListPost_S
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState  = DAMAGED SNOW
      Model         = NBListPost_SD
      Animation     = NBListPost_SD.NBListPost_SD
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone = Fire01 SmolderingFire
    End
    ConditionState  = REALLYDAMAGED RUBBLE SNOW
      Model         = NBListPost_SE
      Animation     = NBListPost_SE.NBListPost_SE
      AnimationMode = LOOP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone = Fire01 SmolderingFire
    End
    
    ;**************************************************************************************************************************
    ;This block handles every possible case with construction process, selling process, awaiting construction, and sold states
    ;for this draw module
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED
      Model              = NBListPost
      Animation          = NBListPost.NBListPost
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED DAMAGED
      Model              = NBListPost_D
      Animation          = NBListPost_D.NBListPost_D
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED REALLYDAMAGED
      Model              = NBListPost_E
      Animation          = NBListPost_E.NBListPost_E
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End

    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW
      Model              = NBListPost_S
      Animation          = NBListPost_S.NBListPost_S
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW DAMAGED
      Model              = NBListPost_SD
      Animation          = NBListPost_SD.NBListPost_SD
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End
    ConditionState       = AWAITING_CONSTRUCTION PARTIALLY_CONSTRUCTED ACTIVELY_BEING_CONSTRUCTED SNOW REALLYDAMAGED
      Model              = NBListPost_SE
      Animation          = NBListPost_SE.NBListPost_SE
      AnimationMode      = LOOP
      Flags              = ADJUST_HEIGHT_BY_CONSTRUCTION_PERCENT MAINTAIN_FRAME_ACROSS_STATES
    End

    ConditionState       = AWAITING_CONSTRUCTION 
      Model              = NONE
    End
    AliasConditionState  = AWAITING_CONSTRUCTION DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION REALLYDAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW DAMAGED
    AliasConditionState  = AWAITING_CONSTRUCTION SNOW REALLYDAMAGED
    AliasConditionState  = SOLD 
    AliasConditionState  = SOLD DAMAGED
    AliasConditionState  = SOLD REALLYDAMAGED
    AliasConditionState  = SOLD SNOW
    AliasConditionState  = SOLD SNOW DAMAGED
    AliasConditionState  = SOLD SNOW REALLYDAMAGED

    ;**************************************************************************************************************************   
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJET:Spec_RadarJammer
  EditorSorting       = STRUCTURE
  Side                = ChinaSpecialWeaponsGeneral

  MaxSimultaneousOfType  = 1
  MaxSimultaneousLinkKey = GlobalJammer

  BuildCost           = 2500
  BuildTime           = 15.0          ;in seconds

  VisionRange         = 350.0
  ShroudClearingRange = 350

  Prerequisites
    Science = SCIENCE_ChinaGlobalJammer
  End

  CommandSet = Spec_ChinaRadarJammerCommandSet

  ExperienceValue     = 2500 2500 2500 2500 ; Experience point value at each level

  ArmorSet
    Conditions        = None
    Armor             = StructureArmor
    DamageFX          = StructureDamageFXNoShake
  End

  SoundOnDamaged        = BuildingDamagedStateLight
  SoundOnReallyDamaged  = BuildingDestroy
  VoiceSelect           = RadarOn
  UnitSpecificSounds
    VoiceCreate = GlobalJammerVoiceCreate
  End  

  ; *** ENGINEERING Parameters ***  
  KindOf            = PRELOAD STRUCTURE SELECTABLE IMMOBILE MP_COUNT_FOR_VICTORY CAPTURABLE SCORE
  Body                  = StructureBody ModuleTag_03
    MaxHealth       = 1800.0
    InitialHealth   = 1800.0
    SubdualDamageCap        = 2500
    SubdualDamageHealRate   = 700
    SubdualDamageHealAmount = 100
  End
  
  Behavior = TransitionDamageFX ModuleTag_04
    ;-------------DESIGNED FOR SMALL SIZED CIVILIAN BUILDING TRANSITIONS-------------------
    DamagedParticleSystem1          = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ;---------------------------------------------------------------------------------------
    ReallyDamagedParticleSystem1 = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    ReallyDamagedParticleSystem2 = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    ReallyDamagedParticleSystem3 = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
    ;---------------------------------------------------------------------------------------
    RubbleParticleSystem1              = Bone:None RandomBone:No PSys:StructureTransitionSmallSmoke
    RubbleParticleSystem2              = Bone:None RandomBone:No PSys:StructureTransitionSmallExplosion
    RubbleParticleSystem3              = Bone:None RandomBone:No PSys:StructureTransitionSmallShockwave
    RubbleParticleSystem4              = Bone:None RandomBone:No PSys:StructureTransitionSmallFlare    
  End
  
  Behavior = FXListDie ModuleTag_05
    DeathFX = FX_BuildingDie
  End

  Behavior = BaseRegenerateUpdate ModuleTag_06
  End 

  Behavior = DestroyDie ModuleTag_07
  End

  Behavior = FlammableUpdate ModuleTag_08
    FlameDamageLimit = 20         ;Catch fire if I take this much fire damage...
    FlameDamageExpiration = 2000  ;in a span of this long
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 25       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior             = CreateObjectDie ModuleTag_09
    CreationList  = OCL_LargeStructureDebris
  End
  
  Behavior             = FXListDie ModuleTag_10
    DeathFX       = FX_StructureMediumDeath
  End

  Behavior        = ProductionUpdate ModuleTag_11
    ;nada
  End

  Behavior = GrantUpgradeCreate ModuleTag_Jam01
    UpgradeToGrant = Upgrade_AmericaBattleDrone
  End

  Behavior = ActiveShroudUpgrade ModuleTag_Jam02
    TriggeredBy = Upgrade_AmericaBattleDrone
    NewShroudRange = 5000
  End

  ;SSSSSSSSSSSSSSSS
  Behavior = GrantUpgradeCreate ModuleTag_Snek01
    UpgradeToGrant = Upgrade_AmericaBattleDrone
  End
  Behavior = StealthUpdate ModuleStealth_Snek02
    StealthDelay                = 2500 ; msec
    StealthForbiddenConditions  = TAKING_DAMAGE RIDERS_ATTACKING
    InnateStealth               = No ;Requires upgrade first
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End
  Behavior = StealthUpgrade ModuleTag_Snek03
    TriggeredBy = Upgrade_AmericaBattleDrone
  END

  Behavior = GenerateMinefieldBehavior     ModuleTag_Landmine01
    TriggeredBy           = Upgrade_ChinaMines
    MineName              = Spec_ChinaGrinderLandmine
    SmartBorder           = Yes
    AlwaysCircular        = Yes

    Upgradable            = No
  End

  Behavior = ObjectCreationUpgrade ModuleTag_BuildingComplete01
    UpgradeObject = OCL_GlobalRadarJammerCreated
    TriggeredBy = Upgrade_AmericaBattleDrone
  End

  Geometry             = BOX
  GeometryMajorRadius  = 22.0
  GeometryMinorRadius  = 19.0
  GeometryHeight       = 60.0     ;;;53.0
  GeometryIsSmall      = No
  Shadow               = SHADOW_VOLUME
End