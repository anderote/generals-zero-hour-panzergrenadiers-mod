;stuff
Object ChinaVehicleTyphoon
  ; *** ART Parameters ***
  SelectPortrait         = SNTyphoon
  ButtonImage            = SNTyphoon

  UpgradeCameo1 = Upgrade_Nationalism
  UpgradeCameo2 = Upgrade_ChinaTankAutoLoader
  UpgradeCameo3 = Nuke_Upgrade_ChinaFusionReactors
  
  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ProjectileBoneFeedbackEnabledSlots = PRIMARY

    ConditionState = NONE
      Model = NVTyphoon
      Turret = TURRET01
      TurretPitch = TURRETEL01
      HideSubObject = TUBESUP01 TURRETUP01
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
    End
    
    ConditionState = REALLYDAMAGED
      Model = NVTyphoon_d
      Turret = TURRET01
      TurretPitch = TURRETEL01
      HideSubObject = TUBESUP01 TURRETUP01
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
    End
    
    ConditionState = RUBBLE
      Model = NVTyphoon_d
      Turret = TURRET01
      TurretPitch = TURRETEL01
      HideSubObject = TUBESUP01 TURRETUP01
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
    End

    ConditionState = WEAPONSET_PLAYER_UPGRADE
      Model = NVTyphoon
      Turret = TurretUp01
      TurretPitch = TurretElUp01
      HideSubObject = TUBES01 TURRET01
      ShowSubObject    = TUBESUP01 TURRETUP01
      WeaponFireFXBone = PRIMARY WeaponB
      WeaponLaunchBone = PRIMARY WeaponB
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE REALLYDAMAGED
      Model = NVTyphoon_d
      Turret = TurretUp01
      TurretPitch = TurretElUp01
      HideSubObject = TUBES01 TURRET01
      ShowSubObject    = TUBESUP01 TURRETUP01
      WeaponFireFXBone = PRIMARY WeaponB
      WeaponLaunchBone = PRIMARY WeaponB
    End
    
    ConditionState = WEAPONSET_PLAYER_UPGRADE RUBBLE
      Model = NVTyphoon_d
      Turret = TurretUp01
      TurretPitch = TurretElUp01
      HideSubObject = TUBES01 TURRET01
      ShowSubObject    = TUBESUP01 TURRETUP01
      WeaponFireFXBone = PRIMARY WeaponB
      WeaponLaunchBone = PRIMARY WeaponB
    End

    TrackMarks = EXTireTrack.tga

    Dust            = RocketBuggyDust
    DirtSpray       = RocketBuggyDirtSpray

    ; These parameters are only used if the model has a separate suspension, 
    ; and the locomotor has HasSuspension = Yes.
    LeftFrontTireBone       = Tire02
    RightFrontTireBone      = Tire01
    MidRightFrontTireBone   = Tire03
    MidLeftFrontTireBone    = Tire04
    MidLeftMidTireBone      = Tire05
    MidRightMidTireBone     = Tire06
    MidLeftRearTireBone     = Tire07
    MidRightRearTireBone    = Tire08
    TireRotationMultiplier  = 0.2   ; this * speed = rotation.
  End

  DisplayName        = OBJECT:ChinaTyphoon
  Side               = ChinaNukeGeneral
  EditorSorting      = VEHICLE
  TransportSlotCount = 5                 ;how many "slots" we take in a transport (0 == not transportable)
  
  WeaponSet
    Conditions       = None 
    Weapon           = PRIMARY TyphoonAirBurstWeapon
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY TyphoonAirBurstWeaponUpgraded
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End
  WeaponSet
    Conditions = CARBOMB PLAYER_UPGRADE
    Weapon = PRIMARY  SuicideCarBomb
  End
  
  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End
  ArmorSet
    Conditions      = PLAYER_UPGRADE
    Armor           = TyphoonArtilleryArmor
    DamageFX        = TankDamageFX
  End

  BuildCost          = 1300
  BuildTime          = 20.0          ;in seconds   
 
  VisionRange        = 190
  ShroudClearingRange = 340

  Prerequisites
    Object           = Nuke_ChinaNuclearResearchPlant
  End

  ExperienceValue 50 75 100 125       ;Experience point value at each level
  ExperienceRequired = 0 150 350 625  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet      = GenericGroundAttackCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect       = TyphoonArtilleryVoiceSelect
  VoiceMove         = TyphoonArtilleryVoiceMove
  VoiceGuard        = TyphoonArtilleryVoiceMove
  VoiceAttack       = TyphoonArtilleryVoiceAttack
  SoundMoveStart    = InfernoCannonMoveStart
  SoundMoveStartDamaged = InfernoCannonMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = TyphoonArtilleryVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = NoSound
    VoiceCrush         = TyphoonArtilleryVoiceMove
    VoiceEnter         = TyphoonArtilleryVoiceMove
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority     = UNIT
  KindOf            = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE CANNOT_RETALIATE SALVAGER ;So the Rank-up ability works
  
  Body              = ActiveBody ModuleTag_02
    MaxHealth       = 120.0
    InitialHealth   = 120.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 100
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 20
  End

  Behavior = VeterancyGainCreate ModuleTag_03
    StartingLevel = VETERAN
    ScienceRequired = SCIENCE_Nuke_ArtilleryTraining
  End

  Behavior = AIUpdateInterface ModuleTag_04
    Turret
      TurretTurnRate = 0  ;90
      TurretPitchRate = 91
      AllowsPitch = Yes
      FirePitch = 90    ;55 - looks nice  ;90 - gameplay practical
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = No NotWhileAttacking
  End
  Locomotor = SET_NORMAL TyphoonLocomotor
  Locomotor = SET_NORMAL_UPGRADED TyphoonLocomotorUpgraded

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 100.0
  End

  ; A crushing defeat
  Behavior               = FXListDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX         = FX_CarCrush
  End
  Behavior               = CreateObjectDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList    = OCL_CrusaderTank_CrushEffect
  End
  Behavior = SlowDeathBehavior ModuleTag_08
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 2000
    DestructionDelayVariance = 300
    FX  = INITIAL  FX_CrusaderCatchFire  
    FX  = FINAL    FX_GenericTankDeathExplosion 
  End

  Behavior                 = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:-7 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior         = CreateCrateDie ModuleTag_10
    CrateData = SalvageCrateData
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = DestroyDie ModuleTag_22
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = HordeUpdate ModuleTag_Stuff01
    RubOffRadius = 150    ; if I am this close to a real hordesman, I will get to be an honorary hordesman
    UpdateRate = 1000     ; how often to recheck horde status (msec)
    Radius = 75           ; how close other units must be to us to count towards our horde-ness (~30 feet or so)
    KindOf = VEHICLE      ; what KindOf's must match to count towards horde-ness
    AlliesOnly = Yes      ; do we only count allies towards horde status? 
    Count = 5             ; how many units must be within Radius to grant us horde-ness
    Action = HORDE        ; when horde-ing, grant us the HORDE bonus
  End

  Behavior = WeaponSetUpgrade ModuleTag_Stuff02
    TriggeredBy = Upgrade_ChinaTankAutoLoader
  End

  Behavior = LocomotorSetUpgrade ModuleTag_Stuff03
    TriggeredBy = Nuke_Upgrade_ChinaFusionReactors
  End

  Behavior = MaxHealthUpgrade ModuleTag_Stuff04
    TriggeredBy   = Upgrade_Veterancy_ELITE Upgrade_Veterancy_HEROIC
    RequiresAllTriggers = No
    AddMaxHealth  = 130.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO   ;Choices are PRESERVE_RATIO, ADD_CURRENT_HEALTH_TOO, and SAME_CURRENTHEALTH
  End

  Behavior = ArmorUpgrade ModuleTag_Stuff05
    TriggeredBy         = Upgrade_Veterancy_ELITE Upgrade_Veterancy_HEROIC
    RequiresAllTriggers = No
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Geometry            = BOX
  GeometryMajorRadius = 18.0
  GeometryMinorRadius = 14.0
  GeometryHeight      = 15.0 
  GeometryIsSmall     = Yes
  Shadow              = SHADOW_VOLUME 
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length   

End