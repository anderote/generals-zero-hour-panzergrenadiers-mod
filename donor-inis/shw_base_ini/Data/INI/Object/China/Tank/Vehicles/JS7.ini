; Also known as the IS-7.
;------------------------------------------------------------------------------
Object Tank_ChinaTankJS7
  ; *** ART Parameters ***
  SelectPortrait         = SRIosif_L
  ButtonImage            = SRIosif
  
  UpgradeCameo1 = Upgrade_Nationalism
  UpgradeCameo2 = Upgrade_TankLightArmor
  UpgradeCameo3 = Upgrade_ChinaUraniumShells
  UpgradeCameo4 = Upgrade_ChinaNuclearTanks
  UpgradeCameo5 = Tank_Upgrade_ChinaTankAutoLoader
  
  Draw = W3DOverlordTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    MaxRecoilDistance    = 2
    RecoilSettleSpeed    = 10

    ;Normal Conditions
    ConditionState = NONE
      Model             = RVIS7
      Turret            = Turret
      TurretPitch       = TurretEL
      HideSubObject     = REDLIGHT01 MUZZLEFX01 SKIRT
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponLaunchBone  = PRIMARY Muzzle
      WeaponRecoilBone  = SECONDARY MgBarrel
      WeaponFireFXBone  = SECONDARY MgMzzl
      WeaponLaunchBone  = SECONDARY MgMzzl
      WeaponMuzzleFlash = SECONDARY MgMzzlFX
      WeaponRecoilBone  = TERTIARY  MgBarrel
      WeaponFireFXBone  = TERTIARY  MgMzzl
      WeaponLaunchBone  = TERTIARY  MgMzzl
      WeaponMuzzleFlash = TERTIARY  MgMzzlFX
      WaitForStateToFinishIfPossible = TRANS_FIRING_A
    End
    
    ConditionState = FIRING_A
      Model             = RVIS7
      Turret            = Turret
      TurretPitch       = TurretEL
      HideSubObject     = REDLIGHT01 MUZZLEFX01 SKIRT
      ;ShowSubObject     = MUZZLEFX01
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponLaunchBone  = PRIMARY Muzzle
      WeaponRecoilBone  = SECONDARY MgBarrel
      WeaponFireFXBone  = SECONDARY MgMzzl
      WeaponLaunchBone  = SECONDARY MgMzzl
      WeaponMuzzleFlash = SECONDARY MgMzzlFX
      WeaponRecoilBone  = TERTIARY  MgBarrel
      WeaponFireFXBone  = TERTIARY  MgMzzl
      WeaponLaunchBone  = TERTIARY  MgMzzl
      WeaponMuzzleFlash = TERTIARY  MgMzzlFX
      TransitionKey     = TRANS_FIRING_A
    End

    ;Reallydamaged conditions
    ConditionState = REALLYDAMAGED
      Model             = RVIS7_D
      Turret            = Turret
      TurretPitch       = TurretEL
      HideSubObject     = REDLIGHT01 MUZZLEFX01 SKIRT
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponLaunchBone  = PRIMARY Muzzle
      WeaponRecoilBone  = SECONDARY MgBarrel
      WeaponFireFXBone  = SECONDARY MgMzzl
      WeaponLaunchBone  = SECONDARY MgMzzl
      WeaponMuzzleFlash = SECONDARY MgMzzlFX
      WeaponRecoilBone  = TERTIARY  MgBarrel
      WeaponFireFXBone  = TERTIARY  MgMzzl
      WeaponLaunchBone  = TERTIARY  MgMzzl
      WeaponMuzzleFlash = TERTIARY  MgMzzlFX
      WaitForStateToFinishIfPossible = TRANS_DAMAGED_FIRING_A
    End
    AliasConditionState = RUBBLE
    
    ConditionState = REALLYDAMAGED FIRING_A
      Model             = RVIS7_D
      Turret            = Turret
      TurretPitch       = TurretEL
      HideSubObject     = REDLIGHT01 MUZZLEFX01 SKIRT
      ;ShowSubObject     = MUZZLEFX01
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponLaunchBone  = PRIMARY Muzzle
      WeaponRecoilBone  = SECONDARY MgBarrel
      WeaponFireFXBone  = SECONDARY MgMzzl
      WeaponLaunchBone  = SECONDARY MgMzzl
      WeaponMuzzleFlash = SECONDARY MgMzzlFX
      WeaponRecoilBone  = TERTIARY  MgBarrel
      WeaponFireFXBone  = TERTIARY  MgMzzl
      WeaponLaunchBone  = TERTIARY  MgMzzl
      WeaponMuzzleFlash = TERTIARY  MgMzzlFX
      TransitionKey     = TRANS_DAMAGED_FIRING_A
    End

    TrackMarks             = EXGolemTrack.tga
    TreadAnimationRate      = 2.0  ;  amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  Draw = W3DModelDraw ModuleTag_Headlight01
    ConditionState = NONE
      Model = RVIS7_N
    End
    AliasConditionState = REALLYDAMAGED
    
    ConditionState = RUBBLE
      Model = NONE
    End    
  End
  
  Draw = W3DModelDraw ModuleTag_ShtoraEffect01
    ParticlesAttachedToAnimatedBones = Yes
    DefaultConditionState
      Model = RVIS7_A1
      Animation = RVIS7_A1.RVIS7_A1
      AnimationMode = LOOP
      Turret = Turret
      HideSubObject = REDLIGHT01
    End
    AliasConditionState = DOOR_1_OPENING
    
    ConditionState = DOOR_1_WAITING_OPEN
      Model = RVIS7_A1
      Animation = RVIS7_A1.RVIS7_A1
      AnimationMode = LOOP
      Turret = Turret
      ShowSubObject = REDLIGHT01
    End
    
    ConditionState = DOOR_1_CLOSING
      Model = RVGolem_A2
      Animation = RVGolem_A2.RVGolem_A2
      AnimationMode = ONCE
      Turret = Turret
      ParticleSysBone = REDEYE01 GolemShtoraActiveEffect
      ParticleSysBone = REDEYE02 GolemShtoraActiveEffect
    End 
    AliasConditionState = DOOR_1_WAITING_TO_CLOSE
  End
  
  ; ***DESIGN parameters ***
  DisplayName           = OBJECT:JS7
  Side                  = ChinaTankGeneral
  EditorSorting         = VEHICLE
  TransportSlotCount    = 6                 ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions = None 
    Weapon           = PRIMARY   JS7TankGun
    Weapon           = SECONDARY GolemHeavyMachineGunGun
    Weapon           = TERTIARY  GolemHeavyMachineGunGunAir
    PreferredAgainst = TERTIARY  AIRCRAFT
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE 
    Weapon           = PRIMARY   JS7TankGunUpgraded
    Weapon           = SECONDARY GolemHeavyMachineGunGun
    Weapon           = TERTIARY  GolemHeavyMachineGunGunAir
    PreferredAgainst = TERTIARY  AIRCRAFT
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon           = PRIMARY   InfectedJS7TankGun
    Weapon           = SECONDARY GolemHeavyMachineGunGun
    Weapon           = TERTIARY  GolemHeavyMachineGunGunAir
    PreferredAgainst = TERTIARY  AIRCRAFT
  End
  WeaponSet
    Conditions = CARBOMB PLAYER_UPGRADE
    Weapon           = PRIMARY   InfectedJS7TankGun
    Weapon           = SECONDARY GolemHeavyMachineGunGun
    Weapon           = TERTIARY  GolemHeavyMachineGunGunAir
    PreferredAgainst = TERTIARY  AIRCRAFT
  End

  ArmorSet
    Conditions      = None
    Armor           = JS7TankArmor
    DamageFX        = TankDamageFX
  End
  ArmorSet
    Conditions      = PLAYER_UPGRADE
    Armor           = LolGitGudFuckerPlayMoreIS7
    DamageFX        = TankEraDamageFX
  End
  
  BuildCost       = 1800
  BuildTime       = 30.0          ;in seconds    
  VisionRange     = 190
  ShroudClearingRange = 210
  
  Prerequisites
    Object = Tank_ChinaIndustrialPlant Tank_ChinaPropagandaCenter
  End
  
  ExperienceValue    = 200 300 400 500   ;Experience point value at each level
  ExperienceRequired = 0 600 1000 2500  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 4  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  
  CommandSet      = RussianTankGolemCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect   = SovietT26VoiceSelect
  VoiceMove     = SovietT26VoiceMove
  VoiceGuard    = SovietT26VoiceMove
  VoiceAttack   = SovietT26VoiceAttack
  VoiceGuard    = SovietT26VoiceMove
  VoiceFear     = NoSound
  VoiceAttackAir = SovietT26VoiceAttack
  
  SoundMoveStart = WarMasterTankMoveStart
  SoundMoveStartDamaged = WarMasterTankMoveStart

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = SovietT26VoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop  = NewTurretMoveLoop
    VoiceEnter      = SovietT26VoiceMove
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE GARRISONABLE_UNTIL_DESTROYED SALVAGER

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 950.0
    InitialHealth   = 950.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 2000
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
  
  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate        = 50
      TurretPitchRate       = 50
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      AllowsPitch           = Yes
      NaturalTurretPitch    = 20
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
    MoodAttackCheckRate        = 250
  End
  Locomotor = SET_NORMAL JS7Locomotor
  Locomotor = SET_NORMAL_UPGRADED JS7LocomotorUpgraded

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 250.0
  End

  Behavior = SlowDeathBehavior ModuleTag_11
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 2500
    DestructionDelayVariance = 1000
    FX  = INITIAL  FX_CrusaderCatchFire
    FX  = FINAL    FX_GenericTankDeathExplosion
    OCL = FINAL    OCL_JS7TankDeathEffect
  End

  Behavior = DestroyDie ModuleTag_12
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = FXListDie ModuleTag_13
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  
  Behavior = CreateObjectDie ModuleTag_14
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End

  Behavior = TransitionDamageFX ModuleTag_17
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  
  Behavior = SubObjectsUpgrade ModuleTag_18
    TriggeredBy    = Upgrade_TankLightArmor 
    HideSubObjects = NONE
    ShowSubObjects = SKIRT SKIRT_ARMOR 
  End
  
  Behavior = ArmorUpgrade ModuleTag_20
    TriggeredBy  = Upgrade_TankLightArmor
  End

  Behavior = WeaponBonusUpgrade ModuleTag_424242
    TriggeredBy = Upgrade_ChinaUraniumShells
  End

  Behavior = WeaponSetUpgrade ModuleTag_4242424
    TriggeredBy = Tank_Upgrade_ChinaTankAutoLoader
  End

  Behavior = LocomotorSetUpgrade ModuleTag_0734356
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End

  Behavior = VeterancyGainCreate ModuleTag_l33t
    StartingLevel = VETERAN
  End

  Behavior = HordeUpdate ModuleTag_1337
    RubOffRadius = 150    ; if I am this close to a real hordesman, I will get to be an honorary hordesman
    UpdateRate = 1000     ; how often to recheck horde status (msec)
    Radius = 75           ; how close other units must be to us to count towards our horde-ness (~30 feet or so)
    KindOf = VEHICLE      ; what KindOf's must match to count towards horde-ness
    AlliesOnly = Yes      ; do we only count allies towards horde status? 
    Count = 5             ; how many units must be within Radius to grant us horde-ness
    Action = HORDE        ; when horde-ing, grant us the HORDE bonus
  End
  
  ;Shtora Active defence
  Behavior           = OCLSpecialPower ModuleTag_Shtora01
    SpecialPowerTemplate = SpecialAbilityRussianShtora
    OCL                  = OCL_UniversalAbbilityTrigger
    CreateLocation       = USE_OWNER_OBJECT
  End
  
  Behavior = FireWeaponCollide ModuleTag_Shtora02
    CollideWeapon  = GolemInvulnerabilityActivationWeapon
    RequiredStatus = USING_ABILITY
  End
  
  Behavior = MissileLauncherBuildingUpdate ModuleTag_Shtora03
    SpecialPowerTemplate = SpecialAbilityRussianShtora
    DoorOpenTime         = 1650
    DoorWaitOpenTime     = 1650
    DoorCloseTime        = 7000
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Geometry = BOX
  GeometryMajorRadius = 24.0
  GeometryMinorRadius = 14.0
  GeometryHeight = 11.0     
  GeometryIsSmall = Yes 
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End