Object Tank_ChinaVehicleSupplyTruck
  ; *** ART Parameters ***
  SelectPortrait         = SNWarMiner
  ButtonImage            = SNWarMiner
  
  UpgradeCameo1 = Upgrade_Nationalism
  UpgradeCameo2 = Upgrade_TankLightArmor
  ;UpgradeCameo3 = NONE
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model           = NVWarMiner
      HideSubObject   = ARMOR01 Cargo01
      Turret              = Turret01
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
    End
    
    ConditionState    = REALLYDAMAGED
      Model           = NVWarMiner_d
    End
    
    ConditionState    = RUBBLE
      Model           = NVWarMiner_d1
    End
    
    ConditionState    = CARRYING
      ShowSubObject       = Cargo01
    End
    
    ConditionState    = REALLYDAMAGED CARRYING
      Model               = NVWarMiner_d
      ShowSubObject       = Cargo01
    End
    
    ConditionState    = RUBBLE CARRYING
      Model               = NVWarMiner_d1
      ShowSubObject       = Cargo01
    End
    TrackMarks              = EXTireTrack.tga
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:WarMiner
  Side                = ChinaTankGeneral
  EditorSorting       = VEHICLE
  TransportSlotCount  = 4                 ;how many "slots" we take in a transport (0 == not transportable)
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY 20mmAuto
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End
  
  BuildCost           = 650
  BuildTime           = 13.0      ;in seconds
  VisionRange         = 150
  ShroudClearingRange = 200

  ExperienceValue       = 75 95 115 135    ;Experience point value at each level
  ExperienceRequired    = 0 150 300 500  ;Experience points needed to gain each level
  IsTrainable           = Yes             ;Can gain experience

  CrusherLevel            = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel          = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet              = ChinaVehicleBattleMasterCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect             = ChinaWarMinerVoiceSelect
  VoiceMove               = ChinaWarMinerVoiceMove
  VoiceAttack             = ChinaWarMinerVoiceAttack
  SoundMoveStart          = SupplyTruckMoveStart
  SoundMoveStartDamaged   = SupplyTruckMoveStart
  UnitSpecificSounds
    VoiceCreate           = ChinaWarMinerVoiceCreate
    TruckLandingSound     = NoSound
    TruckPowerslideSound  = NoSound
    VoiceSupply           = ChinaWarMinerVoiceSupply
    VoiceCrush            = ChinaWarMinerVoiceMove
    VoiceEnter            = ChinaWarMinerVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK VEHICLE HARVESTER SCORE ATTACK_NEEDS_LINE_OF_SIGHT
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 850.0
    InitialHealth   = 850.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 1100
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 40
  End

  Behavior = SupplyTruckAIUpdate ModuleTag_03
    MaxBoxes                    = 10
    SupplyCenterActionDelay     = 500    ; ms for whole thing (one transaction)
    SupplyWarehouseActionDelay  = 1250   ; ms per box (many small transactions)
    SupplyWarehouseScanDistance = 700    ; Max distance to look for a warehouse, or we go home.  (Direct dock command on warehouse overrides, and no max on Center Scan)
    SuppliesDepletedVoice = NoSound   ;;SupplyTruckVoiceSuppliesDepleted
    Turret
      TurretTurnRate = 120   ; turn rate, in degrees per sec
      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 50
  End
  Locomotor = SET_NORMAL WarMinerLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 130.0
  End

  Behavior = VeterancyGainCreate ModuleTag_Vet01
    StartingLevel = VETERAN
  End

  Behavior = MaxHealthUpgrade ModuleTag_Armor01
    TriggeredBy   = Upgrade_TankLightArmor
    AddMaxHealth  = 250.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End

  Behavior = SlowDeathBehavior ModuleTag_05
    DeathTypes = ALL -CRUSHED -SPLATTED
    OCL = FINAL    OCL_GenericTankDeathEffect
    FX  = FINAL    FX_GenericTankDeathExplosion
  End
    
  Behavior = FXListDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  
  Behavior = CreateObjectDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_ChinaSupplyTruck_CrushEffect
  End

  Behavior                       = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_10
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  ; A crushing defeat
  Behavior = DestroyDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = CreateCrateDie ModuleTag_Crate01
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = HordeUpdate ModuleTag_Horde01
    RubOffRadius = 150    ; if I am this close to a real hordesman, I will get to be an honorary hordesman
    UpdateRate = 1000     ; how often to recheck horde status (msec)
    Radius = 75           ; how close other units must be to us to count towards our horde-ness (~30 feet or so)
    KindOf = VEHICLE      ; what KindOf's must match to count towards horde-ness
    AlliesOnly = Yes      ; do we only count allies towards horde status? 
    Count = 5             ; how many units must be within Radius to grant us horde-ness
    Action = HORDE        ; when horde-ing, grant us the HORDE bonus
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Behavior = SubObjectsUpgrade ModuleTag_NewArmor01
    TriggeredBy    = Upgrade_TankLightArmor 
    ShowSubObjects = Armor01
  End

  Geometry = BOX
  GeometryMajorRadius = 17.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 14.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length    
End