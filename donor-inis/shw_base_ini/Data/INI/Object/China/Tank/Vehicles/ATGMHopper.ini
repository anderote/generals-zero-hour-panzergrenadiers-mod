Object Tank_ChinaTankATGMHopper
  ;Thanks mp!
  ;AKA the Grasshopper
  ; *** ART Parameters ***
  SelectPortrait         = SNATGMHPR
  ButtonImage            = SNATGMHPR
  
  UpgradeCameo1 = Upgrade_Nationalism
  UpgradeCameo2 = Upgrade_ChinaUraniumShells
  UpgradeCameo3 = Upgrade_ChinaNuclearTanks
  ;UpgradeCameo4 = NONE
  ;UpgradeCameo5 = NONE
  
  Draw = W3DTankDraw ModuleTag_01
    OkToChangeModelColor = Yes
    MaxRecoilDistance    = 1
    
    DefaultConditionState
      Model               = NVATGMHpper
      Turret              = Turret
      TurretPitch         = TurretEL
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY BARREL
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
    End

    ConditionState = REALLYDAMAGED
      Model               = NVATGMHpper_D
    End
    AliasConditionState = RUBBLE

    TrackMarks         = EXTnkTrack.tga
    TreadDebrisLeft    = RocketBuggyDust
    TreadDebrisRight   = Nada
    TreadAnimationRate = 2.0       ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End
  
  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:ATGMHopper
  Side               = ChinaTankGeneral
  EditorSorting      = VEHICLE
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY  ATGMHopperWeapon
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  InfectedATGMHopperWeapon
  End
  
  ArmorSet
    Conditions      = None
    Armor           = TankArmor
    DamageFX        = TankDamageFX
  End

  Prerequisites
    Object            = Tank_ChinaWarFactory
  End
  
  BuildCost       = 300
  BuildTime       = 7.0         ;in seconds    
  VisionRange     = 200
  ShroudClearingRange = 230

  ExperienceValue    = 30 40 50 70    ;Experience point value at each level
  ExperienceRequired = 0 300 900 2000  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 0  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet       = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect    = HopperTankVoiceSelect
  VoiceMove      = HopperTankVoiceMove
  VoiceGuard     = HopperTankVoiceMove
  VoiceAttack    = HopperTankVoiceAttack
  SoundMoveStart = ScorpionTankMoveStart
  SoundMoveStartDamaged = ScorpionTankMoveStart

  UnitSpecificSounds
    VoiceCreate     = HopperTankVoiceCreate
    VoiceCrush      = HopperTankVoiceMove
    VoiceEnter      = HopperTankVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE SCORE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 190.0
    InitialHealth   = 190.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 300
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 25
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 270   ; turn rate, in degrees per sec
      ControlledWeaponSlots = PRIMARY
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 50
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate        = 500
  End
  Locomotor = SET_NORMAL HopperTankLocomotor
  Locomotor = SET_NORMAL_UPGRADED NuclearHopperTankLocomotor

  Behavior = HordeUpdate ModuleTag_04
    RubOffRadius = 150    ; if I am this close to a real hordesman, I will get to be an honorary hordesman
    UpdateRate = 1000     ; how often to recheck horde status (msec)
    Radius = 120           ; how close other units must be to us to count towards our horde-ness (~30 feet or so)
    KindOf = VEHICLE      ; what KindOf's must match to count towards horde-ness
    AlliesOnly = Yes      ; do we only count allies towards horde status?
    Count = 5             ; how many units must be within Radius to grant us horde-ness
    Action = HORDE        ; when horde-ing, grant us the HORDE bonus
  End

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 90.0
  End

  Behavior = LocomotorSetUpgrade ModuleTag_07
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End

  Behavior = VeterancyGainCreate ModuleTag_Vet01
    StartingLevel = VETERAN
  End

  ; A crushing defeat
  Behavior = DestroyDie ModuleTag_08
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = FXListDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End
  Behavior = CreateCrateDie ModuleTag_11
    CrateData = SalvageCrateData
    ;CrateData = EliteTankCrateData
    ;CrateData = HeroicTankCrateData
  End

  Behavior = SlowDeathBehavior ModuleTag_12
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 25
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL    OCL_ChinaTankHopperDebris
    FX  = FINAL    FX_BattleMasterExplosionOneFinal
  End

  Behavior = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = WeaponBonusUpgrade ModuleTag_Bonus01
    TriggeredBy = Upgrade_ChinaUraniumShells
    RequiresAllTriggers = No
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  
  Geometry = BOX
  GeometryMajorRadius = 9.5
  GeometryMinorRadius = 7.5
  GeometryHeight = 13
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End