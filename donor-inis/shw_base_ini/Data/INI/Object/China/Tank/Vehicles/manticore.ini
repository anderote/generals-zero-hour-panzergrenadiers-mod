;Thanks Andi :D
Object ChinaVehicleManticore
  ; *** ART Parameters ***
  SelectPortrait = SNManticore_L
  ButtonImage    = SNManticore

  ;-----
  Draw = W3DTruckDraw ModuleTag_01
    InitialRecoilSpeed = 100
    RecoilSettleSpeed = 4.0
    MaxRecoilDistance = 3.0
    ParticlesAttachedToAnimatedBones = Yes
    IgnoreConditionStates = ATTACKING USING_WEAPON_A PREATTACK_A RELOADING_A BETWEEN_FIRING_SHOTS_A USING_WEAPON_B FIRING_B PREATTACK_B RELOADING_B BETWEEN_FIRING_SHOTS_B
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = NVManticore
      Animation = NVMntcr_STA.NVMntcr_STA
      AnimationMode = LOOP
      Turret = UPGRADE ;Test
      TurretPitch = TURRETEL
      WeaponFireFXBone = PRIMARY WEAPONA
      WeaponRecoilBone = PRIMARY Barrel
      WeaponLaunchBone = PRIMARY WEAPONA   
      WeaponFireFXBone = SECONDARY MUZZLE
      WeaponMuzzleFlash = SECONDARY MUZZLEFX
      WeaponLaunchBone = SECONDARY MUZZLE   
      TransitionKey = TRANS_Stand
      WaitForStateToFinishIfPossible = TRANS_Fire TRANS_Fire_D ;TRANS_Turn
      ;HideSubObject = UPGRADE
    End
    
    ConditionState = MOVING
      Model = NVManticore
      Animation = NVMntcr_WLK.NVMntcr_WLK ; 30
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.25 1.25
      TransitionKey = TRANS_Walk
      Flags = MAINTAIN_FRAME_ACROSS_STATES ;RANDOMSTART
    End
    
    TransitionState = TRANS_Stand TRANS_Walk
      Animation = NVMntcr_S2W.NVMntcr_S2W
      AnimationSpeedFactorRange = 1.75 1.75
      AnimationMode = ONCE
    End
    TransitionState = TRANS_Walk TRANS_Stand
      Animation = NVMntcr_W2S.NVMntcr_W2S
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.75 1.75
      Flags = MAINTAIN_FRAME_ACROSS_STATES
    End
    
    ConditionState = FIRING_A
      Animation = NVMntcr_ATA.NVMntcr_ATA
      AnimationMode = ONCE
      TransitionKey = TRANS_Fire
    End
    
    ;Turn animations
    ;---------------------------
    ConditionState = CENTER_TO_LEFT
      Model = NVManticore
      Animation = NVMntcr_TL.NVMntcr_TL ; 30
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = MOVING CENTER_TO_LEFT
    
    ConditionState = LEFT_TO_CENTER
      Model = NVManticore
      Animation = NVMntcr_TL.NVMntcr_TL ; 30
      AnimationMode = ONCE ;LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = MOVING LEFT_TO_CENTER
    
    ConditionState = CENTER_TO_RIGHT
      Model = NVManticore
      Animation = NVMntcr_TR.NVMntcr_TR ; 30
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = MOVING CENTER_TO_RIGHT    
    
    ConditionState = RIGHT_TO_CENTER
      Model = NVManticore
      Animation = NVMntcr_TR.NVMntcr_TR ; 30
      AnimationMode = ONCE ;LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = MOVING RIGHT_TO_CENTER
    
    ;---------
    ;DAMAGED STATES
    ;---
    ConditionState = REALLYDAMAGED
      Model = NVManticore_D
      TransitionKey = TRANS_Stand_D
      WaitForStateToFinishIfPossible = TRANS_Fire_D
    End
    
    ConditionState = REALLYDAMAGED MOVING
      Model = NVManticore_D
      Animation = NVMntcr_WLK.NVMntcr_WLK ; 30
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.25 1.25
      TransitionKey = TRANS_Walk_D
      Flags = MAINTAIN_FRAME_ACROSS_STATES2 ;RANDOMSTART
    End
    
    TransitionState = TRANS_Stand_D TRANS_Walk_D
      Model = NVManticore_D
      Animation = NVMntcr_S2W.NVMntcr_S2W
      AnimationSpeedFactorRange = 1.75 1.75
      AnimationMode = ONCE
    End
    TransitionState = TRANS_Walk_D TRANS_Stand_D
      Model = NVManticore_D
      Animation = NVMntcr_W2S.NVMntcr_W2S
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 1.75 1.75
      Flags = MAINTAIN_FRAME_ACROSS_STATES2
    End
    
    ConditionState = REALLYDAMAGED FIRING_A
      Model = NVManticore_D
      Animation = NVMntcr_ATA.NVMntcr_ATA
      AnimationMode = ONCE
      TransitionKey = TRANS_Fire_D
    End
    
    ;Turn animations
    ;---------------------------
    ConditionState = REALLYDAMAGED CENTER_TO_LEFT
      Model = NVManticore_D
      Animation = NVMntcr_TL.NVMntcr_TL ; 30
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = REALLYDAMAGED MOVING CENTER_TO_LEFT
    
    ConditionState = REALLYDAMAGED LEFT_TO_CENTER
      Model = NVManticore_D
      Animation = NVMntcr_TL.NVMntcr_TL ; 30
      AnimationMode = ONCE ;LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = REALLYDAMAGED MOVING LEFT_TO_CENTER
    
    ConditionState = REALLYDAMAGED CENTER_TO_RIGHT
      Model = NVManticore_D
      Animation = NVMntcr_TR.NVMntcr_TR ; 30
      AnimationMode = LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = REALLYDAMAGED MOVING CENTER_TO_RIGHT    
    
    ConditionState = REALLYDAMAGED RIGHT_TO_CENTER
      Model = NVManticore_D
      Animation = NVMntcr_TR.NVMntcr_TR ; 30
      AnimationMode = ONCE ;LOOP
      AnimationSpeedFactorRange = 1.25 1.25
    End
    AliasConditionState = REALLYDAMAGED MOVING RIGHT_TO_CENTER
  End

  Draw = W3DModelDraw ModuleTag_ParachutePlate01
    DefaultConditionState
      Model             = NONE
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE
  
    ConditionState = FREEFALL
      Model             = EXParaPlate
    End
    AliasConditionState = FREEFALL REALLYDAMAGED
    AliasConditionState = FREEFALL RUBBLE
    AliasConditionState = PARACHUTING
    AliasConditionState = PARACHUTING REALLYDAMAGED
    AliasConditionState = PARACHUTING RUBBLE
  End
  
  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:Manticore
  Side               = China
  EditorSorting      = VEHICLE
  TransportSlotCount = 3     ; how many "slots" we take in a transport (0 == not transportable)
  
  WeaponSet
    Conditions        = None
    Weapon            = PRIMARY ManticoreTankGun
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
    Weapon            = SECONDARY ManticoreMachineGun
    PreferredAgainst  = SECONDARY INFANTRY
    AutoChooseSources = SECONDARY FROM_PLAYER FROM_SCRIPT FROM_AI
  End
  
  ArmorSet
    Conditions = None
    Armor      = SpiderTankManticoreArmor
    DamageFX   = TankEraDamageFX
  End

  BuildCost   = 2300
  BuildTime   = 12.0     ; in seconds
  VisionRange = 170
  ShroudClearingRange = 300

  ;Learning AI can learn
  ExperienceValue    = 250 400 550 700       ; Experience point value at each level
  ExperienceRequired = 0 600 1200 3500       ; Experience points needed to gain each level
  IsTrainable         = Yes                  ; Can gain experience

  CrusherLevel   = 2     ; What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = ChinaSpoderTonkVoiceSelMove
  VoiceMove             = ChinaSpoderTonkVoiceSelMove
  VoiceGuard            = ChinaSpoderTonkVoiceSelMove
  VoiceAttack           = ChinaSpoderTonkVoiceAttack
  VoiceAttackAir        = ChinaSpoderTonkVoiceAttack
  VoiceFear             = ManticoreEmergencyBeep
  SoundMoveStart        = ManticoreMoveStart
  SoundMoveStartDamaged = ManticoreMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = ChinaGenericUnitReady
    VoiceCrush  = ChinaSpoderTonkVoiceSelMove
    VoiceEnter  = ChinaSpoderTonkVoiceSelMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE DRONE SCORE

  Body = ActiveBody ModuleTag_02
    MaxHealth     = 1200.0
    InitialHealth = 1200.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap        = 2200
    SubdualDamageHealRate   = 500
    SubdualDamageHealAmount = 25
  End
  ;--------------------------
  
  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate        = 0     ; turn rate, in degrees per sec
      TurretPitchRate       = 180
      AllowsPitch           = Yes
      MinPhysicalPitch      = -45
      NaturalTurretAngle    = 0
      ControlledWeaponSlots = SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 1000
  End
  Locomotor = SET_NORMAL ManticoreLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 200.0
  End

  Behavior = AnimationSteeringUpdate ModuleTag_Steering01
    MinTransitionTime = 0
  End
  
  Behavior = ProductionUpdate ModuleTag_05
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End
  
  Behavior = AutoHealBehavior ModuleTag_06
    HealingAmount = 4        ;~0.67%
    HealingDelay  = 1000     ; msec
    StartsActive  = Yes
  End

  ;----- Begin Death Things -----
  ; A crushing defeat
  Behavior = DestroyDie ModuleTag_Death01
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = FXListDie ModuleTag_Death02
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_Death03
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_CrusaderTank_CrushEffect
  End

  Behavior = InstantDeathBehavior ModuleTag_CreateRogue01
    DeathTypes   = ALL -CRUSHED -SPLATTED
    OCL = OCL_SpiderTankGoRogueOhNo
  End
  ;----- End Death Things -----

  Behavior = CreateCrateDie ModuleTag_11
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = TransitionDamageFX ModuleTag_13
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:10 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration     = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3        ; taking this much damage...
    AflameDamageDelay  = 500      ; this often.
  End

  Geometry = BOX
  GeometryMajorRadius = 13.0
  GeometryMinorRadius = 9.0
  GeometryHeight = 10
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45     ; minimum elevation angle above horizon. Used to limit shadow length
End














Object ChinaVehicleManticoreRogue
  ; *** ART Parameters ***
  SelectPortrait = SNManticore_L
  ButtonImage    = SNManticore

  ;-----
  Draw = W3DTruckDraw ModuleTag_01
    InitialRecoilSpeed = 100
    RecoilSettleSpeed = 4.0
    MaxRecoilDistance = 3.0
    ParticlesAttachedToAnimatedBones = Yes
    IgnoreConditionStates = ATTACKING USING_WEAPON_A PREATTACK_A RELOADING_A BETWEEN_FIRING_SHOTS_A USING_WEAPON_B FIRING_B PREATTACK_B RELOADING_B BETWEEN_FIRING_SHOTS_B
