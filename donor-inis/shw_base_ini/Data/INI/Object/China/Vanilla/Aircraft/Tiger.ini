
;This is the tiger... I know.. whatever. Kirov is Tiger so you can build it. Original Tiger.ini overwritten with actual Kirov
;This is so the AI will build it as well.
Object ChinaVehicleRealTiger

  ; *** ART Parameters ***
  SelectPortrait         = SNTiger_L
  ButtonImage            = SNTiger
  
  UpgradeCameo1 = Upgrade_HelixArmor
  
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ProjectileBoneFeedbackEnabledSlots = TERTIARY
    MaxRecoilDistance    = 2
    RecoilSettleSpeed    = 6
    
    DefaultConditionState
      Model                           = NVTiger
      Animation                       = NVTiger.NVTiger
      AnimationMode                   = LOOP
      Turret                          = Turret
      TurretPitch                     = TurretEL
      WeaponMuzzleFlash               = PRIMARY MuzzleFX
      WeaponFireFXBone                = PRIMARY Muzzle
      WeaponLaunchBone                = PRIMARY Muzzle
      WeaponFireFXBone                = SECONDARY WeaponA
      WeaponLaunchBone                = SECONDARY WeaponA
      WeaponRecoilBone                = SECONDARY Reload
      WeaponMuzzleFlash               = SECONDARY MuzzleFXA
      WeaponFireFXBone                = TERTIARY WeaponB
      WeaponLaunchBone                = TERTIARY WeaponB
    End

    ConditionState = REALLYDAMAGED
      Model                           = NVTiger_d
      Animation                       = NVTiger_d.NVTiger_d
      AnimationMode                   = LOOP
    End

    ConditionState = RUBBLE
      Model                           = NVTiger_d
      Animation                       = NVTiger_d.NVTiger_d
      AnimationMode                   = LOOP
    End

    ConditionState = RUBBLE SPECIAL_DAMAGED
      Model                           = NVTiger_d
      HideSubObject                   = ROTOR01 ROTOR02
    End
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:Tiger
  EditorSorting       = VEHICLE
  Side                = China
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 200.0 
  ShroudClearingRange = 600
  
  Prerequisites
    Object = ChinaWarFactory
  End

  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY     TigerAutoCannon
    PreferredAgainst    = PRIMARY     INFANTRY
    Weapon              = SECONDARY   TigerGrenadeLaunchers
    Weapon              = TERTIARY    TigerMissile
    PreferredAgainst    = TERTIARY    AIRCRAFT
  End

  WeaponSet
    Conditions          = PLAYER_UPGRADE 
    Weapon              = PRIMARY     TigerAutoCannon_Herioc
    PreferredAgainst    = PRIMARY     INFANTRY
    Weapon              = SECONDARY   TigerGrenadeLaunchers
    Weapon              = TERTIARY    TigerMissile
    PreferredAgainst    = TERTIARY    AIRCRAFT
  End

  ArmorSet
    Conditions      = None
    Armor           = TigerGunshipArmor
    DamageFX        = None
  End

  BuildCost           = 1400
  BuildTime           = 15              ; in seconds  
  ExperienceValue     = 125 150 175 200   ; Experience point value at each level
  ExperienceRequired  = 0 300 612 1000   ; Experience points needed to gain each level
  IsTrainable         = Yes             ; Can gain experience
  CommandSet          = ChinaTigerGunshipCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = TigerVoiceSelect
  VoiceMove             = TigerVoiceMove
  VoiceGuard            = TigerVoiceGuard
  VoiceAttack           = TigerVoiceAttack
  VoiceAttackAir        = TigerVoiceAttackAir
  SoundAmbient          = TigerAmbientLoop
  SoundAmbientRubble    = NoSound
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate         = TigerVoiceCreate
    VoiceGarrison       = TigerVoiceMove
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority   = UNIT
  KindOf          = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT PRODUCED_AT_HELIPAD EMP_HARDENED

  Body = ActiveBody ModuleTag_04
    MaxHealth       = 250.0
    InitialHealth   = 250.0

    SubdualDamageCap = 800
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 30
  End

  Behavior = FXListDie ModuleTag_05
    DeathFX = FX_TigerStartDeath
  End

  Behavior = ChinookAIUpdate ModuleTag_06
    Turret
      TurretTurnRate        = 100
      TurretPitchRate       = 100
      FiresWhileTurning     = Yes
      AllowsPitch           = Yes
      NaturalTurretPitch    = -8
      MinPhysicalPitch      = -160
      ControlledWeaponSlots = PRIMARY
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
    End
    AutoAcquireEnemiesWhenIdle    = Yes
  End
  
  Locomotor = SET_NORMAL  TigerLocomotor
  Locomotor = SET_TAXIING BasicHelicopterTaxiLocomotor

  Behavior = GrantUpgradeCreate ModuleTag_Blah02
    UpgradeToGrant = Upgrade_AmericaBattleDrone
  End

  Behavior                = CountermeasuresBehavior ModuleTag_Countermeasures99
    TriggeredBy           = Upgrade_AmericaBattleDrone
    FlareTemplateName     = CountermeasureFlare
    FlareBoneBaseName     = Flare ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize            = 3     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle        = 90.0  ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor  = 1.5   ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys   = 2000  ; Time between flare volleys
    NumberOfVolleys       = 2     ; Number of times the volleys will fire before reloading
    ReloadTime            = 2500  ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate           = 35%   ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 100     ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay     = 200   ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End

  Behavior = PhysicsBehavior ModuleTag_07
    VehicleCrashesIntoBuildingWeaponTemplate = MediumAircraftCrashingIntoBuildingWeapon
    Mass = 50.0
  End
  Behavior = HelicopterSlowDeathBehavior ModuleTag_08
    DestructionDelay                = 99999999        ; the destruction delay
    SpiralOrbitTurnRate             = 140.0           ; in degrees per second, bigger # = tighter spiral
    SpiralOrbitForwardSpeed         = 450.0           ; bigger # = larger spiral
    SpiralOrbitForwardSpeedDamping  = .9999           ; smaller #'s = slow down faster
    MaxBraking                      = 190   ; max braking we can use during death spiral (lower num = wilder spiral)    
    SoundDeathLoop                  = ComancheDamagedLoop
    MinSelfSpin                     = 100                     ; in degrees per second
    MaxSelfSpin                     = 300                     ; in degrees per second
    SelfSpinUpdateDelay             = 100             ; in milliseconds
    SelfSpinUpdateAmount            = 10             ; in degrees   
    FallHowFast                     = 11.0%  ; fraction of gravity, lower = take longer to fall
    MinBladeFlyOffDelay             = 1500            ; in milliseconds
    MaxBladeFlyOffDelay             = 1500            ; in milliseconds
    AttachParticle                  = SootySmokeTrail
    AttachParticleBone              = ROTOR01
    BladeObjectName                 = ComancheBlades
    BladeBoneName                   = ROTOR01    
    FXHitGround                     = FX_HelicopterHitGround
    OCLHitGround                    = OCL_HelicopterHitGround
    FXFinalBlowUp                   = FX_GroundedHelicopterBlowUp
    OCLFinalBlowUp                  = OCL_GroundedHelicopterBlowUp
    DelayFromGroundToFinalDeath     = 1
    FinalRubbleObject               = TigerRubbleHull
  End

  Behavior = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_ComancheDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior        = MaxHealthUpgrade ModuleTag_Armor01
    TriggeredBy   = Upgrade_HelixArmor
    AddMaxHealth  = 50.0
    ChangeType    = ADD_CURRENT_HEALTH_TOO
  End
  
  Behavior = WeaponSetUpgrade ModuleTag_Hero08
    TriggeredBy   = Upgrade_Veterancy_HEROIC
  End

  Behavior = EjectPilotDie ModuleTag_HijackerEmerge01
    DeathTypes = ALL -CRUSHED -SPLATTED
    RequiredStatus = HIJACKED
    VeterancyLevels =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList = OCL_HijackerEmergeViaParachute
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = GenerateMinefieldBehavior ModuleTag_0522340
    MineName                = ChinaUnitClusterMine
    DistanceAroundObject    = 20
    GenerateOnlyOnDeath     = Yes
    SmartBorder             = Yes
    SmartBorderSkipInterior = No
    AlwaysCircular          = Yes
    GenerationFX            = WeaponFX_ClusterMineImpact
  End
  
  Geometry = BOX
  GeometryMajorRadius = 20.0
  GeometryMinorRadius = 3.0
  GeometryHeight = 25.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length

End
