;Bottom gun is overlord contain
;Bomb bay is using free fire & hold fire weapon
Object RA2Kirov
  ; *** ART Parameters ***
  SelectPortrait         = RUKirov_L
  ButtonImage            = RUKirov

  Draw = W3DOverlordAircraftDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model               = RVKirov
      WeaponLaunchBone    = PRIMARY MUZZLEB
      WeaponLaunchBone    = SECONDARY None
    End

    ConditionState        = FIRING_A
      Model               = RVKirov
      Animation           = RVKirov.RVKirov
      AnimationMode       = ONCE
    End

    ConditionState        = REALLYDAMAGED
      Model               = RVKirov_D
      ParticleSysBone     = SMOKE01 SmokeFactionLarge
      ParticleSysBone     = SMOKE02 SmokeFactionLarge
      ParticleSysBone     = SMOKE03 SmolderingFire
      ParticleSysBone     = SMOKE04 SmolderingSmoke
      ParticleSysBone     = SMOKE05 SmokeFactionLarge
      ParticleSysBone     = SMOKE06 SmokeFactionLarge
      ParticleSysBone     = SMOKE07 SmolderingFire
      ParticleSysBone     = SMOKE08 SmolderingSmoke
      ParticleSysBone     = SMOKE09 SmokeFactionLarge
      ParticleSysBone     = SMOKE10 SmokeFactionLarge
    End

    ConditionState        = REALLYDAMAGED FIRING_A
      Model               = RVKirov_D
      Animation           = RVKirov.RVKirov
      AnimationMode       = ONCE
      ParticleSysBone     = SMOKE01 SmokeFactionLarge
      ParticleSysBone     = SMOKE02 SmokeFactionLarge
      ParticleSysBone     = SMOKE03 SmolderingFire
      ParticleSysBone     = SMOKE04 SmolderingSmoke
      ParticleSysBone     = SMOKE05 SmokeFactionLarge
      ParticleSysBone     = SMOKE06 SmokeFactionLarge
      ParticleSysBone     = SMOKE07 SmolderingFire
      ParticleSysBone     = SMOKE08 SmolderingSmoke
      ParticleSysBone     = SMOKE09 SmokeFactionLarge
      ParticleSysBone     = SMOKE10 SmokeFactionLarge
    End
    
    ConditionState        = RUBBLE
      Model               = RVKirov_D
      ParticleSysBone     = SMOKE01 SmolderingFire
      ParticleSysBone     = SMOKE01 SmolderingSmoke
      ParticleSysBone     = SMOKE02 FireFactionLarge
      ParticleSysBone     = SMOKE02 SmokeFactionLarge
      ParticleSysBone     = SMOKE03 SmolderingFire
      ParticleSysBone     = SMOKE03 SmolderingSmoke
      ParticleSysBone     = SMOKE04 FireFactionLarge
      ParticleSysBone     = SMOKE04 SmokeFactionLarge
      ParticleSysBone     = SMOKE05 SmolderingFire
      ParticleSysBone     = SMOKE05 SmolderingSmoke
      ParticleSysBone     = SMOKE06 FireFactionLarge
      ParticleSysBone     = SMOKE06 SmokeFactionLarge
      ParticleSysBone     = SMOKE07 SmolderingFire
      ParticleSysBone     = SMOKE07 SmolderingSmoke
      ParticleSysBone     = SMOKE08 FireFactionLarge
      ParticleSysBone     = SMOKE08 SmokeFactionLarge
      ParticleSysBone     = SMOKE09 SmolderingFire
      ParticleSysBone     = SMOKE09 SmolderingSmoke
      ParticleSysBone     = SMOKE10 FireFactionLarge
      ParticleSysBone     = SMOKE10 SmokeFactionLarge
    End
    AliasConditionState = RUBBLE FIRING_A ;Just in case?
  End
  
  Draw = W3DModelDraw ModuleTag_Engines01
    OkToChangeModelColor = Yes

    ConditionState        = NONE
      Model               = RVKirov_A1
      Animation           = RVKirov_A1.RVKirov_A1
      AnimationMode       = LOOP
      Flags               = MAINTAIN_FRAME_ACROSS_STATES
    End
    
    ConditionState        = REALLYDAMAGED
      Model               = RVKirov_A1D
      Animation           = RVKirov_A1D.RVKirov_A1D
      AnimationMode       = LOOP
      Flags               = MAINTAIN_FRAME_ACROSS_STATES
    End
    AliasConditionState   = RUBBLE
  End

  Draw = W3DModelDraw ModuleTag_Lights01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model               = RVKirov_A2
    End

    ConditionState        = NIGHT
      Model               = RVKirov_A2
      Animation           = RVKirov_A2.RVKirov_A2
      AnimationMode       = LOOP
      Flags               = MAINTAIN_FRAME_ACROSS_STATES2
    End
    
    ConditionState        = NIGHT REALLYDAMAGED
      Model               = RVKirov_A2D
      Animation           = RVKirov_A2D.RVKirov_A2D
      AnimationMode       = LOOP
      Flags               = MAINTAIN_FRAME_ACROSS_STATES2
    End
    AliasConditionState   = RUBBLE
  End

  
  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:RA2Kirov
  EditorSorting       = VEHICLE
  Side                = China
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  VisionRange         = 300.0 
  ShroudClearingRange = 600.0

  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY RA2KirovBombWeapon
    Weapon              = SECONDARY RA2KirovTargetingWeapon
    ShareWeaponReloadTime   = No
  End

  ArmorSet
    Conditions      = None
    Armor           = KirovArmor
    DamageFX        = None
  End

  Prerequisites
    Object = ChinaPropagandaCenter
    Object = ChinaInternetCenter
    Object = ChinaCommandCenter
    Object = ChinaNuclearMissileLauncher
  End

  MaxSimultaneousOfType = 1
  MaxSimultaneousLinkKey = Kirovsky
  
  BuildCost           = 5000
  
  BuildTime           = 90.0              ; in seconds  
  ExperienceValue     = 3000 6000 12000 20000 ; Experience point value at each level
  ExperienceRequired  = 0 5000 15000 45000    ; Experience points needed to gain each level
  IsTrainable         = Yes             ; Can gain experience
  
  CommandSet          = RA2KirovCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect    = KirovAirshipVoiceSelect
  VoiceMove      = KirovAirshipVoiceMove
  VoiceGuard     = KirovAirshipVoiceMove
  VoiceAttack    = KirovAirshipVoiceAttack
  VoiceFear      = KirovAirshipVoiceFear
  SoundMoveStart = KirovMoveStart
  SoundAmbient   = ChemicalBomberAmbientLoop
  SoundAmbientRubble = NoSound

  UnitSpecificSounds
    VoiceCreate  = RA2KirovAirshipVoiceCreate
    VoiceBombard = KirovAirshipVoiceAttack
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority   = UNIT
  KindOf          = PRELOAD CAN_ATTACK SELECTABLE VEHICLE SCORE EMP_HARDENED PRODUCED_AT_HELIPAD AIRCRAFT
  
  Body = ActiveBody ModuleTag_04
    MaxHealth       = 10000.0
    InitialHealth   = 10000.0
    
    SubdualDamageCap       = 30000
    SubdualDamageHealRate  = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = FXListDie ModuleTag_05
    DeathFX = FX_KirovAirshipStartDeath
  End

  Behavior = JetAIUpdate ModuleTag_06
    MinHeight                     = 5
    NeedsRunway                   = No
    KeepsParkingSpaceWhenAirborne = No
    ;Bomb bay
    Turret
      TurretTurnRate        = 0
      TurretPitchRate       = 0
      NaturalTurretPitch    = 0
      AllowsPitch           = No
      ControlledWeaponSlots = PRIMARY
      FiresWhileTurning     = Yes
    End
    AltTurret
      TurretTurnRate = 180
      TurretPitchRate = 180
      TurretPitchRate = 180
      AllowsPitch = Yes
      FiresWhileTurning = Yes
      ControlledWeaponSlots = SECONDARY
    End
    TurretsLinked = Yes
    AutoAcquireEnemiesWhenIdle = Yes ATTACK_BUILDINGS
    MoodAttackCheckRate        = 500
  End
  Locomotor = SET_NORMAL  FatFuckKirovLocomotor
  Locomotor = SET_TAXIING BasicHelicopterTaxiLocomotor

  Behavior = PhysicsBehavior ModuleTag_07
    VehicleCrashesIntoBuildingWeaponTemplate = RA2KirovCrashingIntoBuildingWeapon
    Mass = 5000.0
  End

  Behavior = HelicopterSlowDeathBehavior ModuleTag_Death02  ;Faster spin, bombs falling out, slower fall.
    DestructionDelay                = 30000           ; the destruction delay
    SpiralOrbitTurnRate             = 100.0           ; in degrees per second, bigger # = tighter spiral
    SpiralOrbitForwardSpeed         = 10.0            ; bigger # = larger spiral
    SpiralOrbitForwardSpeedDamping  = .9999           ; smaller #'s = slow down faster
    MaxBraking                      = 210             ; max braking we can use during death spiral (lower num = wilder spiral) 
    MinSelfSpin                     = 20              ; in degrees per second
    MaxSelfSpin                     = 50              ; in degrees per second
    SelfSpinUpdateDelay             = 600             ; in milliseconds
    SelfSpinUpdateAmount            = 5               ; in degrees    
    FallHowFast                     = 8.0%            ; fraction of gravity, lower = take longer to fall
    MinBladeFlyOffDelay             = 1500            ; in milliseconds
    MaxBladeFlyOffDelay             = 1500            ; in milliseconds
    AttachParticle                  = SootySmokeTrail
    AttachParticleBone              = Propeller02
    FXFinalBlowUp                   = FX_HelixHelicopterBlowUpBig
    OCLFinalBlowUp                  = OCL_RA2KirovHitsGround
    DelayFromGroundToFinalDeath     = 0
    FinalRubbleObject               = RA2KirovDeadHull
    MinBladeFlyOffDelay             = 1000
    MaxBladeFlyOffDelay             = 2000
    ;;;BladeObjectName                 = RA2Kirov5000kgBomb
    BladeBoneName                   = MUZZLEB
    OCLBlade                        = OCL_RA2KirovBombToss
  End

  Behavior = TransitionDamageFX ModuleTag_20
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_ComancheDamageTransition
  End
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = OverlordContain ModuleTag_BottomTurret01
    Slots                   = 1
    DamagePercentToUnits    = 100%
    AllowInsideKindOf       = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PayloadTemplateName     = RA2KirovBottomTurret
    ExperienceSinkForRider  = Yes ; I get the Exp for things my turret friend kills
    PassengersInTurret      = No
  End

  Behavior = ProductionUpdate ModuleTag_Production01
    ;na
  End

  Geometry = BOX
  GeometryMajorRadius = 48.0
  GeometryMinorRadius = 22.0
  GeometryHeight = 35.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME    
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End

Object RA2KirovBottomTurret
  Draw                    = W3DDependencyModelDraw ModuleTag_01
    OkToChangeModelColor  = Yes
    AttachToBoneInContainer = FIREPOINT01

    DefaultConditionState
      Model               = RVKirovT
      Turret              = TURRET
      TurretPitch         = TURRETEL
      WeaponLaunchBone    = PRIMARY BARREL
      WeaponRecoilBone    = PRIMARY BARREL
      WeaponFireFXBone    = PRIMARY MuzzleFX
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
    End

    ConditionState        = REALLYDAMAGED 
      Model               = RVKirovT_D
    End
  End

  ; ***DESIGN parameters ***
  Side             = China
  EditorSorting    = SYSTEM
  TransportSlotCount = 1

  WeaponSet
    Conditions          = None 
    Weapon              = PRIMARY RA2KirovBottomTurretWeapon
  End
  
  ArmorSet
    Conditions     = None
    Armor          = InvulnerableAllArmor ; We can't be hurt on the field.  We share damage from the Overlord with his damage module
  End
  
  VisionRange     = 250

  ; *** ENGINEERING Parameters ***
  KindOf            = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK CLICK_THROUGH IGNORED_IN_GUI
  
  Body            = StructureBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      ControlledWeaponSlots = PRIMARY
      TurretTurnRate      = 60     ; turn rate, in degrees per sec
      TurretPitchRate     = 60
      AllowsPitch         = Yes
      MinPhysicalPitch    = -89
      NaturalTurretPitch  = -45
      NaturalTurretAngle  = 0
      FiresWhileTurning   = Yes
      MinIdleScanAngle    = 10
      MaxIdleScanAngle    = 180
      MinIdleScanInterval = 3000
      MaxIdleScanInterval = 8000
    End
    AutoAcquireEnemiesWhenIdle = Yes 
    MoodAttackCheckRate = 250
  End

  Behavior             = DestroyDie ModuleTag_04
  End

  Geometry            = BOX
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight      = 1.0
  GeometryIsSmall     = No      
  Shadow              = SHADOW_VOLUME
  ShadowSizeX = 89  ; minimum elevation angle above horizon. Used to limit shadow length
End

Object RA2KirovDeadHull
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
  OkToChangeModelColor = Yes
  
    DefaultConditionState
      Model = RVKirov_D1
    End
  End

  ; ***DESIGN parameters ***
  DisplayName      = OBJECT:ComancheHull
  Side = China

  ; *** ENGINEERING Parameters ***
  KindOf = IMMOBILE NO_COLLIDE HULK

  Behavior = PhysicsBehavior ModuleTag_02
    Mass           = 2500.0
    AllowBouncing  = No
    ShockResistance = 1.0
  End
  Behavior = LifetimeUpdate ModuleTag_03
    MinLifetime    = 18000   ; min lifetime in msec
    MaxLifetime    = 18000   ; max lifetime in msec
  End
  Behavior = SlowDeathBehavior ModuleTag_05
    SinkDelay        = 3000
    SinkRate         = 4     ; in Dist/Sec
    DestructionDelay = 20000
  End

  Behavior = FireWeaponUpdate ModuleTag_HelicopterImpact01
    Weapon = RA2KirovHulkImpactWeapon
  End
End