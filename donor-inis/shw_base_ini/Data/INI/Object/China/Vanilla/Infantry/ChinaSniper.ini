Object ChinaInfantrySharpshooter
  ;pew pew
    ; *** ART Parameters ***
  SelectPortrait         = SRSpetsnaz_L
  ButtonImage            = Spetsnaz

  UpgradeCameo1 = Upgrade_Nationalism
  UpgradeCameo2 = Upgrade_ChinaChemicalSuits
  
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = AIPFDR_SKN
      IdleAnimation = AIPFDR_SKL.AIPFDR_STA 
      IdleAnimation = AIPFDR_SKL.AIPFDR_IDA
      AnimationMode = ONCE
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone  = SECONDARY Muzzle
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone  = TERTIARY Muzzle
      WeaponMuzzleFlash = TERTIARY MuzzleFX
      TransitionKey = TRANS_Standing
      HideSubObject = SUIT
    End
    AliasConditionState = REALLYDAMAGED

    ConditionState = MOVING
      Animation = AIPFDR_SKL.AIPFDR_RNA 25
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_Standing
      ParticleSysBone = None InfantryDustTrails
      HideSubObject = SUIT
    End
    AliasConditionState = MOVING REALLYDAMAGED

    ConditionState  = FIRING_A 
      Animation     = AIPFDR_SKL.AIPFDR_ATB                 ; recoil in standing position
      AnimationMode = ONCE
      TransitionKey = TRANS_FiringA
      HideSubObject = SUIT
    End
    AliasConditionState = FIRING_A MOVING
    AliasConditionState = FIRING_A MOVING REALLYDAMAGED
    AliasConditionState = FIRING_A REALLYDAMAGED
    AliasConditionState = FIRING_B
    AliasConditionState = FIRING_B MOVING
    AliasConditionState = FIRING_B MOVING REALLYDAMAGED
    AliasConditionState = FIRING_B REALLYDAMAGED

    ConditionState  = BETWEEN_FIRING_SHOTS_A
      Animation     = AIPFDR_SKL.AIPFDR_ATBST               ; motionless in standing position
      AnimationMode = ONCE
      WaitForStateToFinishIfPossible = TRANS_FiringA
      HideSubObject = SUIT
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED
    AliasConditionState = RELOADING_A
    AliasConditionState = RELOADING_A REALLYDAMAGED
    AliasConditionState = PREATTACK_A
    AliasConditionState = PREATTACK_A REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_B
    AliasConditionState = BETWEEN_FIRING_SHOTS_B REALLYDAMAGED
    AliasConditionState = RELOADING_B
    AliasConditionState = RELOADING_B REALLYDAMAGED
    AliasConditionState = PREATTACK_B
    AliasConditionState = PREATTACK_B REALLYDAMAGED

    ConditionState = DYING
      Animation = AIPFDR_SKL.AIPFDR_DTA
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
      HideSubObject = SUIT
    End
    
    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = AIPFDR_SKL.AIPFDR_ADTA1
      AnimationMode = ONCE
      HideSubObject = SUIT
    End

    ConditionState = DYING EXPLODED_FLAILING
      Animation = AIPFDR_SKL.AIPFDR_ADTA2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
      HideSubObject = SUIT
    End

    ConditionState = DYING EXPLODED_BOUNCING
      Animation = AIPFDR_SKL.AIPFDR_ADTA3
      AnimationMode = ONCE
      TransitionKey = None
      HideSubObject = SUIT
    End

    ConditionState = FREEFALL
      Animation = AIPFDR_SKL.AIPFDR_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_Falling
      HideSubObject = SUIT
    End
    AliasConditionState = FREEFALL DYING

    ConditionState = PARACHUTING
      Animation = AIPFDR_SKL.AIPFDR_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  
      ;our bone positions should come from the last frame, rather than the first
      TransitionKey = TRANS_Chute
      HideSubObject = SUIT
    End
    AliasConditionState = PARACHUTING DYING


    TransitionState = TRANS_Falling TRANS_Chute
      Animation = AIPFDR_SKL.AIPFDR_POP
      AnimationMode = ONCE
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  
      ;our bone positions should come from the last frame, rather than the first
      HideSubObject = SUIT
    End

    TransitionState = TRANS_Chute TRANS_Standing
      Animation = AIPFDR_SKL.AIPFDR_PTD
      AnimationMode = ONCE
      HideSubObject = SUIT
    End

    ;;;;Snowy maps use a different model
    ConditionState = SNOW
      Model = ASPFDR_SKN
      IdleAnimation = AIPFDR_SKL.AIPFDR_STA 
      IdleAnimation = AIPFDR_SKL.AIPFDR_IDA
      AnimationMode = ONCE
      WeaponFireFXBone  = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone  = SECONDARY Muzzle
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone  = TERTIARY Muzzle
      WeaponMuzzleFlash = TERTIARY MuzzleFX
      TransitionKey = TRANS_SNOWStanding
      HideSubObject = SUIT
    End
    AliasConditionState = SNOW REALLYDAMAGED

    ConditionState = SNOW MOVING
      Model = ASPFDR_SKN
      Animation = AIPFDR_SKL.AIPFDR_RNA 25
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = TRANS_SNOWStanding
      ParticleSysBone   = None InfantryDustTrails
      HideSubObject = SUIT
    End
    AliasConditionState = SNOW MOVING REALLYDAMAGED

    ConditionState  = SNOW FIRING_A 
      Model = ASPFDR_SKN
      Animation     = AIPFDR_SKL.AIPFDR_ATB                 ; recoil in standing position
      AnimationMode = ONCE
      TransitionKey = TRANS_SNOWFiringA
      HideSubObject = SUIT
    End
    AliasConditionState = FIRING_A MOVING SNOW
    AliasConditionState = FIRING_A MOVING REALLYDAMAGED SNOW
    AliasConditionState = FIRING_A REALLYDAMAGED SNOW
    AliasConditionState = FIRING_B SNOW
    AliasConditionState = FIRING_B MOVING SNOW
    AliasConditionState = FIRING_B MOVING REALLYDAMAGED SNOW
    AliasConditionState = FIRING_B REALLYDAMAGED SNOW

    ConditionState  = SNOW BETWEEN_FIRING_SHOTS_A
      Model = ASPFDR_SKN
      Animation     = AIPFDR_SKL.AIPFDR_ATBST               ; motionless in standing position
      AnimationMode = ONCE
      WaitForStateToFinishIfPossible = TRANS_SNOWFiringA
      HideSubObject = SUIT
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A REALLYDAMAGED SNOW
    AliasConditionState = RELOADING_A SNOW
    AliasConditionState = RELOADING_A REALLYDAMAGED SNOW
    AliasConditionState = PREATTACK_A SNOW
    AliasConditionState = PREATTACK_A SNOW REALLYDAMAGED
    AliasConditionState = BETWEEN_FIRING_SHOTS_B SNOW
    AliasConditionState = BETWEEN_FIRING_SHOTS_B REALLYDAMAGED SNOW
    AliasConditionState = RELOADING_B SNOW
    AliasConditionState = RELOADING_B REALLYDAMAGED SNOW
    AliasConditionState = PREATTACK_B SNOW
    AliasConditionState = PREATTACK_B SNOW REALLYDAMAGED

    ConditionState = SNOW DYING
      Model = ASPFDR_SKN
      Animation = AIPFDR_SKL.AIPFDR_DTA
      AnimationMode = ONCE
      TransitionKey = TRANS_SNOWDying
      HideSubObject = SUIT
    End
    
    TransitionState = TRANS_SNOWDying TRANS_SNOWFlailing
      Model = ASPFDR_SKN
      Animation = AIPFDR_SKL.AIPFDR_ADTA1
      AnimationMode = ONCE
      HideSubObject = SUIT
    End

    ConditionState = SNOW DYING EXPLODED_FLAILING
      Model = ASPFDR_SKN
      Animation = AIPFDR_SKL.AIPFDR_ADTA2
      AnimationMode = LOOP
      TransitionKey = TRANS_SNOWFlailing
      HideSubObject = SUIT
    End

    ConditionState = SNOW DYING EXPLODED_BOUNCING
      Model = ASPFDR_SKN
      Animation = AIPFDR_SKL.AIPFDR_ADTA3
      AnimationMode = ONCE
      TransitionKey = None
      HideSubObject = SUIT
    End

    ConditionState = SNOW FREEFALL
      Model = ASPFDR_SKN
      Animation = AIPFDR_SKL.AIPFDR_PFL
      AnimationMode = LOOP
      TransitionKey = TRANS_SNOWFalling
      HideSubObject = SUIT
    End
    AliasConditionState = SNOW FREEFALL DYING

    ConditionState = SNOW PARACHUTING
      Model = ASPFDR_SKN
      Animation = AIPFDR_SKL.AIPFDR_PHG
      AnimationMode = LOOP
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  
      ;our bone positions should come from the last frame, rather than the first
      TransitionKey = TRANS_SNOWChute
      HideSubObject = SUIT
    End
    AliasConditionState = SNOW PARACHUTING DYING


    TransitionState = TRANS_SNOWFalling TRANS_SNOWChute
      Model = ASPFDR_SKN
      Animation = AIPFDR_SKL.AIPFDR_POP
      AnimationMode = ONCE
      Flags = PRISTINE_BONE_POS_IN_FINAL_FRAME  
      ;our bone positions should come from the last frame, rather than the first
      HideSubObject = SUIT
    End

    TransitionState = TRANS_SNOWChute TRANS_SNOWStanding
      Model = ASPFDR_SKN
      Animation = AIPFDR_SKL.AIPFDR_PTD
      AnimationMode = ONCE
      HideSubObject = SUIT
    End
  End
  
  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:Sharpshooter
  Side               = China
  EditorSorting      = INFANTRY
  TransportSlotCount = 1                 ;how many "slots" we take in a transport (0 == not transportable)
  
  WeaponSet
    Conditions = None 
    Weapon     = PRIMARY ChinaSharpshooterRifle
    Weapon     = SECONDARY ChinaSharpshooterRifleGarrisons
    AutoChooseSources = SECONDARY NONE
    Weapon     = TERTIARY SharpshooterHoldFireDummyWeapon
    AutoChooseSources = TERTIARY NONE
  End

  ArmorSet
    Conditions      = None
    Armor           = HumanArmor
    DamageFX        = InfantryDamageFX
  End

  ArmorSet
    Conditions      = PLAYER_UPGRADE
    Armor           = Nuke_ChemSuitHumanArmor
    DamageFX        = InfantryDamageFX
  End

  VisionRange = 250
  ShroudClearingRange = 400

  Prerequisites
    Object = ChinaPropagandaCenter
  End

  BuildCost = 1200
  BuildTime = 26.0          ;in seconds  
  
  ExperienceValue    = 50 75 100 125    ;Experience point value at each level
  ExperienceRequired = 0 150 350 625  ;Experience points needed to gain each level
  IsTrainable        = Yes             ;Can gain experience
  CrushableLevel     = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet         = SharpshooterCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect         = SharpshooterVoiceSelect
  VoiceMove           = SharpshooterVoiceMove
  VoiceGuard          = SharpshooterVoiceMove
  VoiceAttack         = SharpshooterVoiceAttack
  SoundStealthOn      = StealthOn
  SoundStealthOff     = StealthOff
  
  UnitSpecificSounds
    VoiceCreate       = SharpshooterVoiceCreate
    VoiceGarrison     = SharpshooterVoiceMove
    VoiceEnter        = SharpshooterVoiceMove
    VoiceEnterHostile = SharpshooterVoiceMove
    VoiceGetHealed    = SharpshooterVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY STEALTH_GARRISON SCORE CANNOT_RETALIATE BLAST_CRATER ;Avoids Demo Traps

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 90.0
    InitialHealth   = 90.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes Stealthed
    MoodAttackCheckRate        = 250
  End
  Locomotor = SET_NORMAL SharpshooterLocomotor

  Behavior = AutoFindHealingUpdate   ModuleTag_04 ; This update will have the unit go to a healing station if injured. jba 
    ScanRate = 1000 ; once a second.
    ScanRange = 300 ;
    NeverHeal = 0.85 ;  don't heal if we are > 85% healthy.
    AlwaysHeal = 0.25 ; if we get below 25%, find healing right away.
  End

  Behavior = PhysicsBehavior ModuleTag_Physics01
    Mass = 5.0
    ShockResistance = 1.0
  End

  Behavior = StealthDetectorUpdate ModuleTag_08
    DetectionRate  = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange = 250 ;Dustin, enable this for independant balancing!
    CanDetectWhileGarrisoned = Yes ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained  = No ;Contained means being in a transport or tunnel network.
  End
  Behavior = StealthUpdate ModuleTag_09
    StealthDelay                = 2500           ; msec
    StealthForbiddenConditions  = TAKING_DAMAGE ;Position is revealed when attacking without silencer
    ;;HintDetectableConditions    = IS_AIMING_WEAPON IS_FIRING_WEAPON
    FriendlyOpacityMin          = 30.0%
    FriendlyOpacityMax          = 80.0%
    PulseFrequency              = 500   ; msec
    MoveThresholdSpeed          = 3
    InnateStealth               = Yes
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End

  Behavior = HordeUpdate ModuleTag_Horde01
    RubOffRadius = 60    ; if I am this close to a real hordesman, I will get to be an honorary hordesman
    UpdateRate = 1000    ; how often to recheck horde status (msec)
    Radius = 30          ; how close other units must be to us to count towards our horde-ness (~30 feet or so)
    KindOf = INFANTRY    ; what KindOf's must match to count towards horde-ness
    AlliesOnly = Yes     ; do we only count allies towards horde status? 
    ExactMatch = No      ; do we only count units of our exact same type towards horde status? (overrides kindof)
    Count = 5            ; how many units must be within Radius to grant us horde-ness
    Action = HORDE       ; when horde-ing, grant us the HORDE bonus
  End
 
  Behavior = SquishCollide ModuleTag_10
    ;nothing
  End

  Behavior                = ArmorUpgrade ModuleTag_Armor08
    TriggeredBy           = Upgrade_ChinaChemicalSuits
  End

  Behavior = FireWeaponWhenDamagedBehavior ModuleTag_HackChemSuit
    StartsActive  = No
    TriggeredBy   = Upgrade_ChinaChemicalSuits
    DamageTypes   = ALL
    ;Effectively all the time when set to zero which we want in this case
    DamageAmount  = 0
    ContinuousWeaponPristine      = ChinaChemDecalWeapon
    ContinuousWeaponDamaged       = ChinaChemDecalWeapon
    ContinuousWeaponReallyDamaged = ChinaChemDecalWeapon
    ;No rubble weapon as this decal should disappear when dead
    ;ContinuousWeaponRubble = 
  End

; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes          = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6 -EXTRA_7 -EXTRA_8
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_PathfinderDie
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes          = NONE +CRUSHED +SPLATTED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes          = NONE +EXPLODED
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_PathfinderDie
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes          = NONE +BURNED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireUSA
    OCL                 = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes          = NONE +POISONED
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinUSA
    OCL                 = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death06 ; don't forget to give it a new, unique module tag
    DeathTypes          = NONE +POISONED_BETA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinUSA
    OCL                 = INITIAL OCL_ToxicInfantryBeta ;you'll have to create this OCL and make it use the blue guys instead of green ones
  End

  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes          = NONE +POISONED_GAMMA
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByToxinUSA
    OCL                 = INITIAL OCL_ToxicInfantryGamma
  End
  Behavior = SlowDeathBehavior ModuleTag_Death08 ;new and shiney microwave death effect
    DeathTypes          = NONE +EXTRA_2
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireUSA
    OCL                 = INITIAL OCL_MicrowavedInfantry 
  End
  Behavior = SlowDeathBehavior ModuleTag_Death09
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireUSA
    FX                  = FINAL   FX_IfantryTeslaDie
    OCL                 = INITIAL OCL_TeslaDeathInfantry    
  End
  Behavior = SlowDeathBehavior ModuleTag_Death045 ;Brutal kill with lots of blood and no death scream
    DeathTypes          = NONE +EXTRA_4
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FX                  = INITIAL FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_036 ;Gore death explosion
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 30
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_BloodyGoreExplosion
    FX                  = FINAL   FX_InfantryGoreExplosion
  End
  Behavior = SlowDeathBehavior ModuleTag_Death0323
    DeathTypes          = NONE +EXTRA_5
    ProbabilityModifier = 70
    SinkDelay           = 3000
    SinkRate            = 0.5     ; in Dist/Sec
    DestructionDelay    = 8000
    FX                  = INITIAL FX_PathfinderDie
    OCL                 = INITIAL OCL_BrutalBloodyDeathBits
    FlingForce          = 8
    FlingForceVariance  = 3
    FlingPitch          = 60
    FlingPitchVariance  = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_03241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_6
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_RadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_DieByToxinUSA
  End
  Behavior = SlowDeathBehavior ModuleTag_0323241156 ;Radiation Melt
    DeathTypes          = NONE +EXTRA_7
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_NeutronRadiationDeathInfantry
    FX                  = INITIAL FX_GIDieVirus
    FX                  = FINAL   FX_DieByToxinUSA
  End
; --- end Death modules ---

  Behavior = PoisonedBehavior ModuleTag_13
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  End
 
  Geometry = CYLINDER
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14;
  ShadowSizeY = 14;
  ShadowTexture = ShadowI;
  BuildCompletion = APPEARS_AT_RALLY_POINT

End


