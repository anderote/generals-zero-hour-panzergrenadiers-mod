Object ChinaVehicleBullfrog

  ; *** ART Parameters ***
  SelectPortrait         = SNScoutCar_L
  ButtonImage            = SNScoutCar
  
  Draw = W3DTruckDraw ModuleTag_01
  
    OkToChangeModelColor = Yes

    ConditionState  = NONE
      Model         = NVSctCar
      Animation     = NVSctCar.NVSctCar
      AnimationMode = LOOP
    End

    ConditionState  = REALLYDAMAGED
      Model         = NVSctCar_D
      Animation     = NVSctCar_D.NVSctCar_D
      AnimationMode = LOOP
    End
    AliasConditionState = RUBBLE
    
    TrackMarks = EXTireTrack.tga

    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray

    LeftFrontTireBone     = Wheel01
    RightFrontTireBone    = Wheel02
    LeftRearTireBone      = Wheel03
    RightRearTireBone     = Wheel04

    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 0   ; This vehicle doesn't powerslide.

  End

  ; ***DESIGN parameters ***
  DisplayName   = OBJECT:AAJEEP
  Side          = China
  EditorSorting = VEHICLE
  TransportSlotCount = 3                 ;Just enough to fit into a Chinook.

  WeaponSet
    Conditions = None
    Weapon = PRIMARY  None
  End
  
  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions      = None
    Armor           = BullfrogArmor
    DamageFX        = TankDamageFX
  End
  
  BuildCost       = 100
  BuildTime       = 3.0          ;in seconds    
  VisionRange     = 200           ;Needs to see farther and match it's weapon range -- else troop crawlers will get slaughtered against tanks!
  ShroudClearingRange = 200
  
  ExperienceValue = 5 5 5 5  ;Experience point value at each level
  ExperienceRequired = 0 10 20 30  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  
  CrusherLevel           = 0  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = ChinaVehicleBullfrogCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = BullfrogVoiceSelect
  VoiceMove             = BullfrogVoiceMove
  VoiceGuard            = BullfrogVoiceMove
  VoiceAttack           = BullfrogVoiceAttack
  SoundMoveStart        = HumveeMoveStart
  SoundMoveStartDamaged = HumveeMoveStart
  
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = BullfrogVoiceCreate
    VoiceEnter  = BullfrogVoiceMove
  End


  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_CAST_REFLECTIONS CANNOT_RETALIATE VEHICLE SCORE CAN_ATTACK SALVAGER ;So the Rank-up ability works
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 100.0
    InitialHealth   = 100.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 300
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_042351
    AutoAcquireEnemiesWhenIdle = No
  End

  Locomotor = SET_NORMAL BullFrogLocomotor

  Behavior = TransportContain ModuleTag_5565
    Slots                 = 1
    InitialPayload        = ChinaInfantryAmbassador 1
    ScatterNearbyOnExit   = No
    HealthRegen%PerSec    = 10
    DamagePercentToUnits  = 10%
    AllowInsideKindOf     = INFANTRY
    ExitDelay         = 250
    NumberOfExitPaths = 3 ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit = Yes ; AI Will tell people to set their mood to Aggressive on exiting
  End
  
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 50.0
  End
  
  Behavior = SlowDeathBehavior ModuleTag_07
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 1
    FX  = FINAL    FX_SupplyTruckExplosionOneFinal
    OCL = FINAL    OCL_FinalBullfrogDebris
  End

  Behavior                 = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End

  Behavior = DestroyDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = FXListDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  
  Behavior = OCLSpecialPower ModuleTag_Scan01
    SpecialPowerTemplate = SpecialAbilityScoutCarScan
    OCL = OCL_ScoutCarAreaScan
    CreateLocation = USE_OWNER_OBJECT
  End
  
  Behavior = ProductionUpdate ModuleTag_Horn01
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Horn02
    UpgradeObject = OCL_CarHornDummyObject
    TriggeredBy   = Upgrade_GLAWorkerFakeCommandSet
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Geometry = BOX
  GeometryMajorRadius = 17.5
  GeometryMinorRadius = 9.0
  GeometryHeight = 13.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length    

End

Object ChinaInfantryAmbassador

  SelectPortrait         = SNMGRedGuard_L  
  ButtonImage            = SNMGRedGuard

    ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes

    DefaultConditionState
      Model = NIAMBSDR_SKN
      IdleAnimation = NIAMBSDR_SKL.NIAMBSDR_STA
      IdleAnimation = NIAMBSDR_SKL.NIAMBSDR_STA
      IdleAnimation = NIAMBSDR_SKL.NIAMBSDR_STA
      IdleAnimation = NIAMBSDR_SKL.NIAMBSDR_STA
      IdleAnimation = NIAMBSDR_SKL.NIAMBSDR_STA
      IdleAnimation = NIAMBSDR_SKL.NIAMBSDR_STA
      IdleAnimation = NIAMBSDR_SKL.NIAMBSDR_STA
      IdleAnimation = NIAMBSDR_SKL.NIAMBSDR_IDA
      IdleAnimation = NIAMBSDR_SKL.NIAMBSDR_IDB
      AnimationMode = ONCE
      TransitionKey = TRANS_Stand
    End
        
    ConditionState = MOVING
      Animation = NIAMBSDR_SKL.NIAMBSDR_RNA ;***was using WKA but it doesn't exist so I changed it to kill the assert -- Kris 
      AnimationMode = LOOP
      Flags = RANDOMSTART
    End

    ConditionState = MOVING PANICKING
      Animation = NIAMBSDR_SKL.NIAMBSDR_RNA 
      AnimationMode = LOOP
      Flags = RANDOMSTART
    End

    ConditionState = DYING
      Animation = NIAMBSDR_SKL.NIAMBSDR_DTA
      Animation = NIAMBSDR_SKL.NIAMBSDR_DTB
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End
  End

  ; ***DESIGN parameters ***
  Buildable           = No
  DisplayName         = OBJECT:Ambassador
  Side                = China
  EditorSorting       = INFANTRY
  TransportSlotCount  = 1                 ;how many "slots" we take in a transport (0 == not transportable)
  WeaponSet
    ; no weapons
  End
  ArmorSet
    Conditions      = None
    Armor           = HumanArmor
    DamageFX        = InfantryDamageFX
  End
  VisionRange = 150
  ShroudClearingRange = 150

  ExperienceValue = 5 5 5 5    ;Experience point value at each level
  IsTrainable = No             ;Can gain experience

  ; *** AUDIO Parameters ***

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY SCORE PARACHUTABLE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 50.0
    InitialHealth   = 50.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL BasicHumanLocomotor
  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 5.0
  End
  Behavior = SlowDeathBehavior ModuleTag_05
    SinkDelay = 3000
    SinkRate = 0.5     ; in Dist/Sec
    DestructionDelay = 8000
  End
 
  Behavior = SquishCollide ModuleTag_06
    ;nothing
  End

  Behavior = FXListDie ModuleTag_07
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_RedGuardDie
  End
  Behavior = FXListDie ModuleTag_08
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_GIDieCrushed
  End

  Behavior = PoisonedBehavior ModuleTag_09
    PoisonDamageInterval = 100  ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000       ; ... for this long after last hit by poison damage
  End
 
  Geometry = CYLINDER
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowI
  BuildCompletion = APPEARS_AT_RALLY_POINT

End