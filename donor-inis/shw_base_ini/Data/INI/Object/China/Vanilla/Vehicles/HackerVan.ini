Object ChinaVehicleHackerVan

  SelectPortrait         = HackVan_L
  ButtonImage            = HackVan

  Draw = W3DTruckDraw ModuleTag_01
    OkToChangeModelColor = Yes 
   
    DefaultConditionState
      Model               = NVHackVn
      Animation           = NVHackVn.NVHackVn
      AnimationMode       = LOOP
    End    

    ConditionState = REALLYDAMAGED
      Model               = NVHackVn_D
      Animation           = NVHackVn_D.NVHackVn_D
      AnimationMode       = LOOP
    End
   
    ConditionState = RUBBLE
      Model               = NVHackVn_D
    End 
    
    LeftFrontTireBone           = Tire01
    RightFrontTireBone          = Tire02
    MidLeftRearTireBone         = Tire03
    MidRightRearTireBone        = Tire04
    LeftRearTireBone            = Tire05
    RightRearTireBone           = Tire06
    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 2.5   ; This speed is added to the rotation speed when powersliding.

    RotationDamping = 0.7
    TrackMarks = EXTireTrack.tga
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:HackVan
  Side                = China
  EditorSorting       = VEHICLE
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)
  BuildCost           = 1000
  BuildTime           = 20.0      ;in seconds
  VisionRange         = 150
  ShroudClearingRange = 300
  
  WeaponSet
    Conditions = None 
    Weapon = PRIMARY None
  End

  Prerequisites
    Object            = ChinaPropagandaCenter
    Object            = ChinaInternetCenter
  End

  ArmorSet
    Conditions      = None
    Armor           = HackVanTruckArmor
    DamageFX        = TankDamageFX
  End
  CrusherLevel            = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel          = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet              = ChinaHackVanCommandSet

  ExperienceValue    = 125 175 250 325 ;Experience point value at each level
  ExperienceRequired = 0 350 875 1625  ;Experience points needed to gain each level
  IsTrainable = Yes

  ; *** AUDIO Parameters ***
  VoiceSelect           = HackerVanVoiceSelect
  VoiceMove             = HackerVanVoiceMove
  VoiceGuard            = HackerVanVoiceMove
  SoundMoveStart        = ChinaHackVanMoveStart
  SoundMoveStartDamaged = ChinaHackVanMoveStart
  SoundEnter            = HumveeEnter
  SoundExit             = HumveeExit
  UnitSpecificSounds
    VoiceCreate = ChinaGenericUnitReady
    VoiceEnter  = HackerVanVoiceMove
    UnitPack          = HackerDialDown
    UnitUnpack        = HackerDialup
    UnitCashPing      = HackerCashPing
    VoiceHackInternet = HackerVanVoiceCreate
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  ;@todo lorenzen removed the CAN_ATTACK from the chinasupplytruck... ok?
  KindOf = PRELOAD SELECTABLE CAN_CAST_REFLECTIONS IGNORES_SELECT_ALL VEHICLE TRANSPORT SCORE IMMUNE_TO_CAPTURE
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 400.0
    InitialHealth   = 400.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = HackInternetAIUpdate ModuleTag_03
    UnpackTime          = 10000
    PackTime            = 10000
    CashUpdateDelay     = 2000
    CashUpdateDelayFast = 2000  ; Fast speed used inside a container (can only hack inside an Internet Center)
    RegularCashAmount   = 10
    VeteranCashAmount   = 15
    EliteCashAmount     = 20
    HeroicCashAmount    = 25
    XpPerCashUpdate     = 5
    PackUnpackVariationFactor = 0.1
  End
  Locomotor = SET_NORMAL LargeSupplyTruckLocomotor

  Behavior = PhysicsBehavior ModuleTag_04
    Mass = 90.0
  End

  Behavior = SlowDeathBehavior ModuleTag_05
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 200
    DestructionDelayVariance = 100
    FX  = FINAL    FX_SupplyTruckExplosionOneFinal
    OCL = FINAL    OCL_ChinaHackVanDeathEffect
  End
    
  Behavior = FXListDie ModuleTag_06
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  
  Behavior = CreateObjectDie ModuleTag_07
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_ChinaHackVanDeathEffect
  End

  Behavior                       = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1         = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_10
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  ; A crushing defeat
  Behavior = DestroyDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = CreateCrateDie ModuleTag_12
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = StealthUpdate ModuleTag_Stealthy01
    StealthDelay                = 1500 ; msec
    StealthForbiddenConditions  = TAKING_DAMAGE
    MoveThresholdSpeed          = 3
    InnateStealth               = Yes
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End

  Behavior = EjectPilotDie ModuleTag_HijackerEmerge01
    DeathTypes = ALL -CRUSHED -SPLATTED
    RequiredStatus = HIJACKED
    VeterancyLevels =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList = OCL_HijackerEmergeViaParachute
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Geometry = BOX
  GeometryMajorRadius = 18.0
  GeometryMinorRadius = 8.0
  GeometryHeight = 14.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45
End