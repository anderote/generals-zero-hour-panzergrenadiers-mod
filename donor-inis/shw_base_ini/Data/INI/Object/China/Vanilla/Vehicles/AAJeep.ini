Object ChinaVehicleAAJeep

  ; *** ART Parameters ***
  SelectPortrait         = SNAAJeep_L
  ButtonImage            = SNAAJeep_L

  UpgradeCameo1 = Upgrade_Nationalism
  UpgradeCameo2 = Upgrade_ChinaChainGuns

  Draw = W3DTruckDraw ModuleTag_01
  
    OkToChangeModelColor = Yes

    ConditionState  = NONE
      Model         = NVJeep
      Animation     = NVJeep.NVJeep
      AnimationMode = MANUAL
      Turret            = TURRET01
      TurretPitch       = TURRETEL
      WeaponMuzzleFlash = PRIMARY   MuzzleFX
      WeaponFireFXBone  = PRIMARY   Muzzle
      WeaponLaunchBone  = PRIMARY   Muzzle
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone  = SECONDARY Muzzle
      WeaponLaunchBone  = SECONDARY Muzzle
    End

    ConditionState  = REALLYDAMAGED
      Model         = NVJeep_D
      Animation     = NVJeep_D.NVJeep_D
      AnimationMode = MANUAL
      Turret            = TURRET01
      TurretPitch       = TURRETEL
      WeaponMuzzleFlash = PRIMARY   MuzzleFX
      WeaponFireFXBone  = PRIMARY   Muzzle
      WeaponLaunchBone  = PRIMARY   Muzzle
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone  = SECONDARY Muzzle
      WeaponLaunchBone  = SECONDARY Muzzle
    End
    AliasConditionState = RUBBLE

    ConditionState      = ATTACKING
      Model             = NVJeep
      Animation         = NVJeep.NVJeep
      AnimationMode     = LOOP
      Turret            = TURRET01
      TurretPitch       = TURRETEL
      WeaponMuzzleFlash = PRIMARY   MuzzleFX
      WeaponFireFXBone  = PRIMARY   Muzzle
      WeaponLaunchBone  = PRIMARY   Muzzle
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone  = SECONDARY Muzzle
      WeaponLaunchBone  = SECONDARY Muzzle
    End

    ConditionState      = ATTACKING REALLYDAMAGED
      Model             = NVJeep_D
      Animation         = NVJeep_D.NVJeep_D
      AnimationMode     = LOOP
      Turret            = TURRET01
      TurretPitch       = TURRETEL
      WeaponMuzzleFlash = PRIMARY   MuzzleFX
      WeaponFireFXBone  = PRIMARY   Muzzle
      WeaponLaunchBone  = PRIMARY   Muzzle
      WeaponMuzzleFlash = SECONDARY MuzzleFX
      WeaponFireFXBone  = SECONDARY Muzzle
      WeaponLaunchBone  = SECONDARY Muzzle
    End
    
    TrackMarks = EXTireTrack.tga

    Dust = RocketBuggyDust
    DirtSpray = RocketBuggyDirtSpray

    LeftFrontTireBone     = Wheel01
    RightFrontTireBone    = Wheel02
    LeftRearTireBone      = Wheel03
    RightRearTireBone     = Wheel04

    TireRotationMultiplier      = 0.2   ; this * speed = rotation.
    PowerslideRotationAddition  = 0   ; This vehicle doesn't powerslide.

  End

  ; ***DESIGN parameters ***
  DisplayName        = OBJECT:BULLFROG
  Side               = China
  EditorSorting      = VEHICLE
  TransportSlotCount = 2

  WeaponSet
    Conditions              = None 
    Weapon                  = PRIMARY   AAJeepWeaponGround
    Weapon                  = SECONDARY AAJeepWeaponAir
    Weapon                  = TERTIARY CameleonCamoflaugeWeapon
    AutoChooseSources       = TERTIARY NONE
    ShareWeaponReloadTime   = Yes
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  SuicideCarBomb
  End

  ArmorSet
    Conditions      = None
    Armor           = AntiAirVehicle
    DamageFX        = TankDamageFX
  End

  Prerequisites
    Object           = ChinaVehicleAAJeep ChinaWarFactory
  End
  
  BuildCost       = 300
  BuildTime       = 8.0          ;in seconds    
  VisionRange     = 220           ;Needs to see farther and match it's weapon range -- else troop crawlers will get slaughtered against tanks!
  ShroudClearingRange = 400
  
  ExperienceValue    = 30 60 90 120  ;Experience point value at each level
  ExperienceRequired = 0 120 315 600  ;Experience points needed to gain each level
  IsTrainable        = Yes             ;Can gain experience
  
  CrusherLevel   = 0  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet     = ChinaVehicleAAJeepCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = BullfrogVoiceSelect
  VoiceMove             = BullfrogVoiceMove
  VoiceGuard            = BullfrogVoiceMove
  VoiceAttack           = BullfrogVoiceAttack
  VoiceAttackAir        = BullfrogVoiceAttack
  SoundMoveStart        = HumveeMoveStart
  SoundMoveStartDamaged = HumveeMoveStart
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit
  
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = BullfrogVoiceCreate
    VoiceEnter  = BullfrogVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf        = PRELOAD SELECTABLE CAN_CAST_REFLECTIONS CAN_ATTACK VEHICLE SCORE ATTACK_NEEDS_LINE_OF_SIGHT TRANSPORT SALVAGER ;So the Rank-up ability works
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 180.0
    InitialHealth   = 180.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 350
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = AIUpdateInterface ModuleTag_042351
    Turret
      TurretTurnRate        = 180   ; turn rate, in degrees per sec
      TurretPitchRate       = 90
      NaturalTurretPitch    = 45
      MinPhysicalPitch      = -20
      AllowsPitch           = Yes
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL BullFrogLocomotor

  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 50.0
  End

  Behavior = TransportContain ModuleTag_06
    Slots                 = 2
    ScatterNearbyOnExit   = No
    DamagePercentToUnits  = 100%
    AllowInsideKindOf     = INFANTRY
    ExitDelay             = 0
    NumberOfExitPaths     = 3 ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit    = Yes ; AI Will tell people to set their mood to Aggressive on exiting
  End

  Behavior = StealthDetectorUpdate ModuleTag_Detector01
    DetectionRate         = 500   ; how often to rescan for stealthed things in my sight (msec)
    DetectionRange        = 350 ;Dustin, enable this for independant balancing!
    CanDetectWhileGarrisoned = No ;Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained  = No ;Contained means being in a transport or tunnel network.
    ExtraRequiredKindOf      = AIRCRAFT  ; we can only detect AIRCRAFT, not other stealthed things
  End

  Behavior = StealthUpdate ModuleTag_Camonet01
    StealthDelay                = 2000
    StealthForbiddenConditions  = FIRING_PRIMARY FIRING_SECONDARY
    FriendlyOpacityMin          = 50.0%
    FriendlyOpacityMax          = 100.0%
    InnateStealth               = No
    OrderIdleEnemiesToAttackMeUponReveal  = Yes
  End

  Behavior = WeaponBonusUpgrade ModuleTag_22342
    TriggeredBy = Upgrade_ChinaChainGuns
  End

  Behavior = SlowDeathBehavior ModuleTag_07
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 1
    FX  = FINAL    FX_SupplyTruckExplosionOneFinal
    OCL = FINAL    OCL_FinalJeepAADebris
  End

  Behavior                 = TransitionDamageFX ModuleTag_08
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmallLightSmokeColumn
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_NukeCannonDamageTransition
  End

  Behavior = DestroyDie ModuleTag_09
    DeathTypes = NONE +CRUSHED +SPLATTED
  End

  Behavior = FXListDie ModuleTag_10
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  
  Behavior = ProductionUpdate ModuleTag_Horn01
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Horn02
    UpgradeObject = OCL_CarHornDummyObject
    TriggeredBy   = Upgrade_GLAWorkerFakeCommandSet
  End

  ; A crushing defeat
  Behavior = FXListDie ModuleTag_11
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = CreateCrateDie ModuleTag_Crate01
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = HordeUpdate ModuleTag_Horde01
    RubOffRadius = 150    ; if I am this close to a real hordesman, I will get to be an honorary hordesman
    UpdateRate = 1000     ; how often to recheck horde status (msec)
    Radius = 75           ; how close other units must be to us to count towards our horde-ness (~30 feet or so)
    KindOf = VEHICLE      ; what KindOf's must match to count towards horde-ness
    AlliesOnly = Yes      ; do we only count allies towards horde status? 
    Count = 5             ; how many units must be within Radius to grant us horde-ness
    Action = HORDE        ; when horde-ing, grant us the HORDE bonus
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Infection03
    DeathWeapon    = ScrapCarBombSuicide
    StartsActive   = Yes
    RequiredStatus = IS_CARBOMB
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length    

End

