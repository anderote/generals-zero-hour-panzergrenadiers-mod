Object ChinaTankOverlord

  ; *** ART Parameters ***
  SelectPortrait         = SNOverlord_L
  ButtonImage            = SNOverlord
  
  UpgradeCameo1 = Upgrade_ChinaUraniumShells
  UpgradeCameo2 = Upgrade_ChinaNuclearTanks
  UpgradeCameo3 = Upgrade_ChinaOverlordBattleBunker
  UpgradeCameo4 = Upgrade_ChinaOverlordGattlingCannon
  UpgradeCameo5 = Upgrade_ChinaOverlordPropagandaTower
  
  
  Draw = W3DOverlordTankDraw ModuleTag_01
    ConditionState        = NONE
      Model               = NVOvrlrd
      Animation           = NVOvrlrd.NVOvrlrd
      AnimationMode       = LOOP
      Turret              = Turret01
      HideSubObject       = BARREL01 BARREL02
    End
    ConditionState        = REALLYDAMAGED
      Model               = NVOvrlrd_d
      Animation           = NVOvrlrd_d.NVOvrlrd_d
      AnimationMode       = LOOP
      Turret              = Turret01
      HideSubObject       = BARREL01 BARREL02
    End

    ConditionState        = RUBBLE
      Model               = NVOvrlrd_d
      Turret              = Turret01
      HideSubObject       = BARREL01 BARREL02
    End

    TrackMarks           = EXTnkTrack.tga
    OkToChangeModelColor = Yes
    TreadAnimationRate = 2.0;  amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End
  
  Draw = W3DModelDraw ModuleTag_NewBarrels01
  
    OkToChangeModelColor = Yes
  
    ConditionState        = NONE
      Model               = NVOvrlrd_Brl
      Turret              = Turret01
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
    End
    
    ConditionState        = REALLYDAMAGED
      Model               = NVOvrlrd_Brld
      Turret              = Turret01
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
    End

    ConditionState        = RUBBLE
      Model               = NVOvrlrd_Brld
      Turret              = Turret01
      WeaponFireFXBone    = PRIMARY Muzzle
      WeaponRecoilBone    = PRIMARY Barrel
      WeaponMuzzleFlash   = PRIMARY MuzzleFX
      WeaponLaunchBone    = PRIMARY Muzzle
    End
    
  End
  
  Draw                    = W3DModelDraw ModuleTag_01241254123
    OkToChangeModelColor  = Yes
    
    DefaultConditionState
      Model               = NVDeva_U2
      Turret              = Turret01
    End
    AliasConditionState = REALLYDAMAGED
    AliasConditionState = RUBBLE

    ConditionState = USER_2
      Model         = NVOvrlrd_S
      Animation     = NVOvrlrd_S.NVOvrlrd_S
      AnimationMode = LOOP
    End
    
    ConditionState  = USER_2 REALLYDAMAGED
      Model         = NVOvrlrd_SD
      Animation     = NVOvrlrd_SD.NVOvrlrd_SD
      AnimationMode = LOOP
      ParticleSysBone = Smoke01 SmolderingSmoke
      ParticleSysBone = Smoke02 SmolderingSmoke
      ParticleSysBone = Flame01 SmolderingFire
      ParticleSysBone = Flame01 SmolderingFlameCore
      ParticleSysBone = Spark01 LiveWireSparks
    End
    AliasConditionState = USER_2 RUBBLE
    
  End

  ; ***DESIGN parameters ***
  DisplayName         = OBJECT:Overlord
  Side                = China
  EditorSorting       = VEHICLE
  TransportSlotCount  = 4                 ;how many "slots" we take in a transport (0 == not transportable)
  
  WeaponSet
    Weapon            = PRIMARY OverlordTankGun
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_AI FROM_SCRIPT
    PreferredAgainst  = PRIMARY INFANTRY
  End
  
  WeaponSet  
    Conditions        = PLAYER_UPGRADE
    Weapon            = PRIMARY OverlordTankGun
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_AI FROM_SCRIPT
    PreferredAgainst  = PRIMARY INFANTRY
    Weapon            = SECONDARY GattlingBuildingGunAirDummy ;Dummy weapon that allows manual targeting of air units outside range
    PreferredAgainst  = SECONDARY AIRCRAFT
  End

  WeaponSet
    Conditions = CARBOMB
    Weapon = PRIMARY  InfectedOverlordTankGun
  End
  WeaponSet
    Conditions = CARBOMB PLAYER_UPGRADE
    Weapon = PRIMARY  InfectedOverlordTankGun
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_AI FROM_SCRIPT
    PreferredAgainst  = PRIMARY INFANTRY
    Weapon            = SECONDARY GattlingBuildingGunAirDummy ;Dummy weapon that allows manual targeting of air units outside range
    PreferredAgainst  = SECONDARY AIRCRAFT
  End

  ArmorSet
    Conditions        = None
    Armor             = TankArmor
    DamageFX          = HeavyTankDamageFX
  End

  Prerequisites
    Object = ChinaTankOverlord ChinaWarFactory
  End

  BuildCost       = 2000
  BuildTime       = 20.0          ;in seconds    
  VisionRange     = 150
  ShroudClearingRange = 200
  Prerequisites
    Object = ChinaWarFactory
    Object = ChinaPropagandaCenter
  End

  ExperienceValue = 200 250 325 400   ;Experience point value at each level
  ExperienceRequired = 0 500 1137 2000  ;Experience points needed to gain each level
  IsTrainable = Yes             ;Can gain experience
  CrusherLevel           = 3  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel         = 3  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = ChinaTankOverlordDefaultCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect = OverlordTankVoiceSelect
  SoundMoveStart = OverlordTankMoveStart
  SoundMoveStartDamaged = OverlordTankMoveStart
  VoiceMove = OverlordTankVoiceMove
  VoiceGuard = OverlordTankVoiceMove
  VoiceAttack = OverlordTankVoiceAttack

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate          = OverlordTankVoiceCreate
    TurretMoveStart = NoSound
    TurretMoveLoop = OverlordTankTurretMoveLoop
    VoiceCrush = OverlordTankVoiceCrush
    VoiceEnter = OverlordTankVoiceMove
    VoiceUnload     = OverlordTankVoiceUnload
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SCORE HUGE_VEHICLE SALVAGER ;So the Rank-up ability works
  
  Body = ActiveBody ModuleTag_02
    MaxHealth       = 1100.0
    InitialHealth   = 1100.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 2200
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End

  Behavior = TransportAIUpdate ModuleTag_03
    Turret
      TurretTurnRate = 60
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY 
    End
    AutoAcquireEnemiesWhenIdle = Yes
    TurretsLinked = Yes
  End

  Locomotor = SET_NORMAL OverlordLocomotor
  Locomotor = SET_NORMAL_UPGRADED NuclearOverlordLocomotor

  Behavior = FireWeaponWhenDeadBehavior ModuleTag_04
    DeathWeapon   = NuclearTankDeathWeapon
    StartsActive  = No                        ; turned on by upgrade
    TriggeredBy   = Upgrade_ChinaNuclearTanks
  End
  Behavior = LocomotorSetUpgrade ModuleTag_05
    TriggeredBy = Upgrade_ChinaNuclearTanks
  End

  Behavior = OverlordContain ModuleTag_06 ; Like Transport, but when full, passes transport queries along to first passenger (redirects like tunnel) 
    Slots                 = 1
    DamagePercentToUnits        = 100%
    AllowInsideKindOf     = PORTABLE_STRUCTURE
    PassengersAllowedToFire = Yes
    PassengersInTurret = Yes ; My passengers ride in my turret, that's where the Firepoint bones are
    ExperienceSinkForRider = Yes ; I get the Exp for things my turret friend kills
  End
  
  Behavior = CreateObjectDie ModuleTag_Invulnerability01
    CreationList = OCL_InfantryEmergingFromTransportInvulnerability
  End

  Behavior = ObjectCreationUpgrade ModuleTag_07
    UpgradeObject = OCL_OverlordGattlingCannon
    TriggeredBy   = Upgrade_ChinaOverlordGattlingCannon
    ConflictsWith = Upgrade_ChinaOverlordPropagandaTower Upgrade_ChinaOverlordBattleBunker
  End
  Behavior = WeaponSetUpgrade ModuleTag_WeaponSetUpgrade01
    TriggeredBy = Upgrade_ChinaOverlordGattlingCannon
    ConflictsWith = Upgrade_ChinaOverlordPropagandaTower Upgrade_ChinaOverlordBattleBunker
  End
  Behavior = ObjectCreationUpgrade ModuleTag_08
    UpgradeObject = OCL_OverlordPropagandaTower
    TriggeredBy   = Upgrade_ChinaOverlordPropagandaTower
    ConflictsWith = Upgrade_ChinaOverlordGattlingCannon Upgrade_ChinaOverlordBattleBunker
  End  
  Behavior = ModelConditionUpgrade ModuleTag_VisualPropaganda01
    ConditionFlag = USER_2
    TriggeredBy   = Upgrade_ChinaOverlordPropagandaTower
    ConflictsWith = Upgrade_ChinaOverlordGattlingCannon Upgrade_ChinaOverlordBattleBunker
  End
  Behavior = ObjectCreationUpgrade ModuleTag_09
    UpgradeObject = OCL_OverlordBattleBunker
    TriggeredBy   = Upgrade_ChinaOverlordBattleBunker
    ConflictsWith = Upgrade_ChinaOverlordGattlingCannon Upgrade_ChinaOverlordPropagandaTower
  End

  Behavior = ProductionUpdate ModuleTag_10
    MaxQueueEntries = 1; So you can't build multiple upgrades in the same frame
  End

  Behavior = CommandSetUpgrade ModuleTag_11
    CommandSet = ChinaTankOverlordGattlingCannonCommandSet
    TriggeredBy   = Upgrade_ChinaOverlordGattlingCannon
    ConflictsWith = Upgrade_ChinaOverlordPropagandaTower Upgrade_ChinaOverlordBattleBunker
  End
  Behavior = CommandSetUpgrade ModuleTag_12
    CommandSet = ChinaTankOverlordPropagandaTowerCommandSet
    TriggeredBy   = Upgrade_ChinaOverlordPropagandaTower
    ConflictsWith = Upgrade_ChinaOverlordGattlingCannon Upgrade_ChinaOverlordBattleBunker
  End
  Behavior = CommandSetUpgrade ModuleTag_13
    CommandSet = ChinaTankOverlordBattleBunkerCommandSet
    TriggeredBy   = Upgrade_ChinaOverlordBattleBunker
    ConflictsWith = Upgrade_ChinaOverlordGattlingCannon Upgrade_ChinaOverlordPropagandaTower
  End

  Behavior = PhysicsBehavior ModuleTag_14
    Mass = 200.0
  End

  Behavior = WeaponBonusUpgrade ModuleTag_15
    TriggeredBy = Upgrade_ChinaUraniumShells
  End

  ; Just explode death
  Behavior = SlowDeathBehavior ModuleTag_16
    ProbabilityModifier = 25
    DestructionDelay = 200
    DestructionDelayVariance = 100
    OCL = FINAL    OCL_ChinaTankOverlordDebris
    FX  = FINAL    FX_OverlordExplosionOneFinal
  End
  Behavior = CreateCrateDie ModuleTag_17
    CrateData = SalvageCrateData
    CrateData = EliteTankCrateData
    CrateData = HeroicTankCrateData
  End

  Behavior = TransitionDamageFX ModuleTag_18
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_OverlordDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End
  
  Behavior = ObjectCreationUpgrade ModuleTag_Taunt02
    UpgradeObject = OCL_OverlordTauntObject
    TriggeredBy   = Upgrade_GLAWorkerFakeCommandSet
  End
  
  Behavior = FXListDie ModuleTag_HijackerEmerge02
    RequiredStatus = HIJACKED
    DeathTypes = ALL -CRUSHED -SPLATTED
    DeathFX = FX_HijackerEmerge
  End

  Behavior = HordeUpdate ModuleTag_Horde01
    RubOffRadius = 150    ; if I am this close to a real hordesman, I will get to be an honorary hordesman
    UpdateRate = 1000     ; how often to recheck horde status (msec)
    Radius = 75           ; how close other units must be to us to count towards our horde-ness (~30 feet or so)
    KindOf = VEHICLE      ; what KindOf's must match to count towards horde-ness
    AlliesOnly = Yes      ; do we only count allies towards horde status? 
    Count = 5             ; how many units must be within Radius to grant us horde-ness
    Action = HORDE        ; when horde-ing, grant us the HORDE bonus
  End

  Behavior = EjectPilotDie ModuleTag_Infection02
    DeathTypes         = ALL -CRUSHED -SPLATTED
    RequiredStatus     = HIJACKED
    ExemptStatus       = IS_CARBOMB
    VeterancyLevels    =  ALL
    GroundCreationList = OCL_HijackerEmerge
    AirCreationList    = OCL_HijackerEmergeViaParachute
  End

  Geometry = BOX
  GeometryMajorRadius = 26.0
  GeometryMinorRadius = 13.0
  GeometryHeight = 15.0     
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME     
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length
End




;Cheers mp, and the guy who commissioned this for allowing it to also be used in Chaos mod
Object ChinaTankApoc
  ; *** ART Parameters ***
  SelectPortrait         = SRApocalypse_L
  ButtonImage            = SRApocalypse
  
  UpgradeCameo1 = Upgrade_ChinaHEShells
  UpgradeCameo2 = Upgrade_ChinaUraniumShells

  Draw = W3DTankDraw ModuleTag_DrawTank
    OkToChangeModelColor = Yes
    InitialRecoilSpeed   = 120
    MaxRecoilDistance    = 5
    RecoilSettleSpeed    = 7
    ProjectileBoneFeedbackEnabledSlots = SECONDARY
    ParticlesAttachedToAnimatedBones = Yes
    
    DefaultConditionState
      Model               = NVApoc
      Turret              = TURRET
      TurretPitch         = TURRETEL
      WeaponRecoilBone    = PRIMARY BARREL
      WeaponFireFXBone    = PRIMARY CNNMUZ
      WeaponLaunchBone    = PRIMARY CNNMUZ
      WeaponMuzzleFlash   = PRIMARY CNNMUZFX
      WeaponFireFXBone    = SECONDARY WEAPONA
      WeaponLaunchBone    = SECONDARY WEAPONA
      HideSubObject       = GSSHROUD GSBRL01 GSBRL02 GENERATOR
      ParticleSysBone     = EXHAUST01 DozerSmokeLight
      ParticleSysBone     = EXHAUST02 DozerSmokeLight
      ParticleSysBone     = EXHAUST03 DozerSmokeLight
      ParticleSysBone     = EXHAUST04 DozerSmokeLight
    End

    ConditionState        = MOVING
      ParticleSysBone     = EXHAUST01 DozerSmokeHeavy
      ParticleSysBone     = EXHAUST02 DozerSmokeHeavy
      ParticleSysBone     = EXHAUST03 DozerSmokeHeavy
      ParticleSysBone     = EXHAUST04 DozerSmokeHeavy
    End

    ConditionState        = REALLYDAMAGED
      Model               = NVApoc_D
    End

    ConditionState        = REALLYDAMAGED MOVING
      Model               = NVApoc_D
      ParticleSysBone     = EXHAUST01 DozerSmokeHeavy
      ParticleSysBone     = EXHAUST02 DozerSmokeHeavy
      ParticleSysBone     = EXHAUST03 DozerSmokeHeavy
      ParticleSysBone     = EXHAUST04 DozerSmokeHeavy
    End

    TrackMarks              = EXTnkTrack.tga
    TreadAnimationRate      = 2.0  ; amount of tread texture to move per second
    TreadDriveSpeedFraction = 0.3  ; fraction of locomotor speed below which treads stop moving.
    TreadPivotSpeedFraction = 0.6  ; fraction of locomotor speed below which we allow pivoting.
  End

  Draw = W3DModelDraw ModuleTag_DrawBlade
    OkToChangeModelColor = Yes
    ConditionState    = NONE
      Model           = NVApoc_A1
    End

    ConditionState    = REALLYDAMAGED
      Model           = NVApoc_DA1
    End
  End

  ; ***DESIGN parameters ***
  DisplayName               = OBJECT:RA2Apoc
  Side                      = China
  EditorSorting             = VEHICLE
  TransportSlotCount        = 0            ;how many "slots" we take in a transport (0 == not transportable)

  WeaponSet
    Conditions              = None
    Weapon                  = PRIMARY RA2ApocTankGun
    Weapon                  = SECONDARY ApocalypseTankMissiles
  End
  WeaponSet
    Conditions              = HERO
    Weapon                  = PRIMARY   RA2ApocTankGunHeroic
    Weapon                  = SECONDARY  ApocalypseTankMissiles
  End

  WeaponSet
    Conditions              = PLAYER_UPGRADE
    Weapon                  = PRIMARY RA2ApocTankGunUpgraded
    Weapon                  = SECONDARY ApocalypseTankMissiles
  End
  WeaponSet
    Conditions              = PLAYER_UPGRADE HERO
    Weapon                  = PRIMARY   RA2ApocTankGunHeroicUpgraded
    Weapon                  = SECONDARY  ApocalypseTankMissiles
  End

  ArmorSet
    Conditions        = None
    Armor             = RA2ApocArmor
    DamageFX          = HeavyTankEraDamageFX
  End
  
  BuildCost       = 5000
  BuildTime       = 90.0          ;in seconds

  VisionRange     = 250
  ShroudClearingRange = 330
  
  Prerequisites
    Object = ChinaPropagandaCenter
  End

  ExperienceValue    = 3500 4500 6000 9001   ;Experience point value at each level
  ExperienceRequired = 0 2000 5000 12000  ;Experience points needed to gain each level
  IsTrainable        = Yes             ;Can gain experience
  CrusherLevel       = 2  ;What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel     = 4  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles

  CommandSet      = GenericCommandSet

  ; *** AUDIO Parameters ***
  VoiceSelect           = ApocVoiceSelect
  SoundMoveStart        = EmperorTankMoveStart
  SoundMoveStartDamaged = EmperorTankMoveStart
  VoiceMove             = ApocVoiceMove
  VoiceGuard            = ApocVoiceMove
  VoiceAttack           = ApocVoiceAttack

  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate     = ApocVoiceCreate
    TurretMoveLoop  = NewTurretMoveLoop
    VoiceCrush      = OverlordTankVoiceCrush
    VoiceEnter      = ApocVoiceMove
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf        = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT VEHICLE HUGE_VEHICLE SCORE IMMUNE_TO_CAPTURE DRONE
  
  Body            = ActiveBody ModuleTag_02
    MaxHealth     = 3800.0
    InitialHealth = 3800.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 11400
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  
  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate        = 45
      MinIdleScanAngle      = 10
      MaxIdleScanAngle      = 40
      MinIdleScanInterval   = 5000
      MaxIdleScanInterval   = 10000
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = NotWhileAttacking Yes
    MoodAttackCheckRate = 200
  End
  Locomotor = SET_NORMAL OverlordLocomotor

  Behavior          = PhysicsBehavior ModuleTag_04
    Mass            = 400.0
    ShockResistance = 1.0
  End

  Behavior = AutoHealBehavior ModuleTag_workaroundbecausestupidautohealdoesntwork
    HealingAmount = 8
    HealingDelay = 1000
    StartsActive  = Yes 
  End

  ; Just explode death
  Behavior = SlowDeathBehavior ModuleTag_05
    DeathTypes = ALL -CRUSHED -SPLATTED
    DestructionDelay = 1
    SinkRate = 0.5     ; in Dist/Sec
    OCL = FINAL    OCL_RA2ApocDebris
    FX  = FINAL    FX_OverlordExplosionOneFinal
  End

  Behavior = DestroyDie ModuleTag_CrushEffect
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = FXListDie ModuleTag_CrushEffect2
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_CrushEffect3
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_RA2ApocDebris
  End

  Behavior = CreateCrateDie ModuleTag_06
    CrateData = SalvageCrateData
  End

  Behavior = TransitionDamageFX ModuleTag_07
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End

  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000         ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3       ; taking this much damage...
    AflameDamageDelay = 500       ; this often.
  End

  Behavior = WeaponSetUpgrade ModuleTag_Upgrade01
    TriggeredBy = Upgrade_ChinaHEShells
  End
  Behavior = WeaponBonusUpgrade ModuleTag_Upgrade02
    TriggeredBy = Upgrade_ChinaUraniumShells
  End

  Geometry            = BOX
  GeometryMajorRadius = 30.0
  GeometryMinorRadius = 18.0
  GeometryHeight      = 20.0     
  GeometryIsSmall     = Yes
  Shadow              = SHADOW_VOLUME
  ShadowSizeX = 45  ; minimum elevation angle above horizon. Used to limit shadow length    
End