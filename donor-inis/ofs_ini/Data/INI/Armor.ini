  Armor = DEFAULT 100%     ; this sets the level for all nonspecified damage types
  Armor = HAZARD_CLEANUP 0%     ; Not harmed by cleaning weapons
  Armor = SUBDUAL_MISSILE 0%
  Armor = SUBDUAL_VEHICLE 0%
  Armor = SUBDUAL_BUILDING 0%
End
