    VoiceCreate = NoSound
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound
    VoiceEnter = NoSound
    Deploy = NoSound
    Undeploy = NoSound
  End
  Behavior = WeaponSetUpgrade ModuleTag_167
    TriggeredBy = Upgrade_AmericaSentryDroneGun
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE ATTACK_NEEDS_LINE_OF_SIGHT DRONE
  Body = ActiveBody ModuleTag_168
    MaxHealth = 300.0
    InitialHealth = 300.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 480
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = MaxHealthUpgrade ModuleTag_169
    TriggeredBy = Upgrade_AmericaDroneArmor
    AddMaxHealth = 75.0
    ChangeType = ADD_CURRENT_HEALTH_TOO
  End
  Behavior = DeployStyleAIUpdate ModuleTag_170
    Turret
      TurretTurnRate = 180
      TurretPitchRate = 180
      FirePitch = 0     ; Instead of aiming pitchwise at the target, it will aim here
      AllowsPitch = No
      RecenterTime = 1000     ; how long to wait during idle before recentering
      ControlledWeaponSlots = PRIMARY
      NaturalTurretAngle = 0
      InitiallyDisabled = No
      MinIdleScanInterval = 250     ; in milliseconds
      MaxIdleScanInterval = 250     ; in milliseconds
      MinIdleScanAngle = 0     ; in degrees off the natural turret angle
      MaxIdleScanAngle = 360     ; in degrees off the natural turret angle
    End
    AutoAcquireEnemiesWhenIdle = Yes     ; Stealthed ; Means "Yes when idle, even if I am stealthed"
    PackTime = 1000
    UnpackTime = 1000
    TurretsFunctionOnlyWhenDeployed = Yes
    TurretsMustCenterBeforePacking = Yes
  End
  Locomotor = SET_NORMAL SentryLocomotor
  Behavior = PhysicsBehavior ModuleTag_171
    Mass = 50.0
  End
  Behavior = StealthUpdate ModuleTag_172
    StealthDelay = 2000     ; msec
    StealthForbiddenConditions = FIRING_PRIMARY MOVING
    HintDetectableConditions = IS_FIRING_WEAPON
    FriendlyOpacityMin = 50.0%
    FriendlyOpacityMax = 100.0%
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal = Yes
