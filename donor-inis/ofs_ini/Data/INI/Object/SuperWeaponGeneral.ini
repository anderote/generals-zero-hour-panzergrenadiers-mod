Object SupW_AmericaJetRaptor ;Reaper Drone Reaperdrone
  ; *** ART Parameters ***
  SelectPortrait = AVReaperDrone_L ;SACRaptor_L
  ButtonImage = AVReaperDrone ;SACRaptor
  UpgradeCameo1 = Upgrade_AmericaLaserMissiles
  UpgradeCameo2 = ZGen_UpgradeDroneArmorNano ;Upgrade_AmericaAdvancedTraining
  UpgradeCameo3 = Upgrade_AmericaCountermeasures
  ; UpgradeCameo4 = NONE
  ; UpgradeCameo5 = NONE
  Draw = W3DModelDraw ModuleTag_047
    ProjectileBoneFeedbackEnabledSlots = Primary
    DefaultConditionState
      Model = AVReaper
      Animation = AVReaper.AVReaper
      AnimationMode = Manual
      ShowSubObject = Landing
      ;HideSubObject = BurnerFX01 BurnerFX02
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponFireFXBone = PRIMARY WeaponA
    End
    ConditionState = JETEXHAUST
      AnimationMode = LOOP
      HideSubObject = Landing
      ; exhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = JETEXHAUST JETAFTERBURNER
      AnimationMode = LOOP
      ; exhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = REALLYDAMAGED
      Model = AVReaper_D
      ; damage
      ParticleSysBone = Smoke01 JetSmoke
    End
    ConditionState = REALLYDAMAGED JETEXHAUST
      Model = AVReaper_D
      AnimationMode = LOOP
      HideSubObject = Landing
      ; damage
      ParticleSysBone = Smoke01 JetSmoke
      ; exhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = REALLYDAMAGED JETEXHAUST JETAFTERBURNER
      Model = AVReaper_D
      AnimationMode = LOOP
      ;HideSubObject = Landing
      ; damage
      ParticleSysBone = Smoke01 JetSmoke
      ; exhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = RUBBLE
      Model = AVReaper_D1
      HideSubObject = None
      ShowSubObject = None
    End
    ConditionState = RUBBLE JETEXHAUST JETAFTERBURNER
      Model = AVReaper_D1
      ; HideSubObject is needed cause there're inherited from default condition state
      HideSubObject = None
      ShowSubObject = None
      ParticleSysBone = Engine01 JetExhaust
      ParticleSysBone = Engine02 JetExhaust
      ; exhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    OkToChangeModelColor = Yes
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Reaper
  EditorSorting = VEHICLE
  Side = AmericaSuperWeaponGeneral
  TransportSlotCount = 0     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange = 250.0 ;200.0
  ShroudClearingRange = 400
  Prerequisites
   ;Object = SupW_AmericaAirfield TEST_MODE
    ;Object = SupW_AmericaStrategyCenter
  End
  WeaponSet
    Conditions = None
    Weapon = PRIMARY ReaperDroneMissileWeapon ;RaptorJetMissileWeapon ;Y_SupW_RaptorJetMissile
  End
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = None
  End
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = CountermeasuresAirplaneArmor
    DamageFX = None
  End
  BuildCost = 1200
  BuildTime = 14.0 ;20
  ExperienceValue = 70 70 120 170     ; Experience point value at each level
  ExperienceRequired = 0 50000 99999 99999 ;0 100 200 400     ; Experience points needed to gain each level
  IsTrainable = Yes     ; Can gain experience
  CrusherLevel = 1     ; What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = Generic_JetFighterCommandSet ;AmericaJetRaptorCommandSet
  ; *** AUDIO Parameters ***
  VoiceSelect = SADroneVoice2 ;RaptorVoiceSelect
  VoiceMove = SADroneVoice2 ;RaptorVoiceMove
  VoiceAttack = SADroneVoice2 ;RaptorVoiceAttack
  VoiceAttackAir = SADroneVoice2 ;RaptorVoiceAttackAir
  VoiceGuard = SADroneVoice2 ;RaptorVoiceAirPatrol
  SoundAmbient = RaptorAmbientLoop
  SoundAmbientRubble = NoSound
  ; SoundMoveLoop          = RaptorAmbientLoop  ; don't want sound while sitting at airfield
  ; SoundAmbient           = NoSound
  UnitSpecificSounds
    VoiceCreate = SADroneVoiceCreate ;RaptorVoiceCreate
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    Afterburner = UAVSound ;RaptorAfterburner
    VoiceLowFuel = SADroneVoiceLowFuel ;RaptorVoiceLowFuel
    VoiceGarrison = SADroneVoice2 ;RaptorVoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT
  Body = ActiveBody ModuleTag_048
    MaxHealth = 120 ;160.0
    InitialHealth = 120 ;160.0
  End
  Behavior = ArmorUpgrade ModuleTag_049
    TriggeredBy = Upgrade_AmericaCountermeasures
  End
  Behavior = CountermeasuresBehavior ModuleTag_050
    TriggeredBy = Upgrade_AmericaCountermeasures
    FlareTemplateName = CountermeasureFlare
    FlareBoneBaseName = Flare     ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize = 3     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle = 90.0     ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor = 1.0     ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys = 1000     ; Time between flare volleys
    NumberOfVolleys = 3     ; Number of times the volleys will fire before reloading
    ReloadTime = 0     ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate = 30%     ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 0     ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay = 200     ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End
  ;Behavior = ExperienceScalarUpgrade ModuleTag_051
   ; TriggeredBy = Upgrade_AmericaAdvancedTraining
   ; AddXPScalar = 1.0     ; Increases experience gained by an additional 100%
  ;End
  
  Behavior = MaxHealthUpgrade ModuleTag_362
    TriggeredBy = ZGen_UpgradeDroneArmorNano ;Upgrade_AmericaCompositeArmor
    AddMaxHealth = 30.0 ;40.0
    ChangeType = ADD_CURRENT_HEALTH_TOO     ; Choices are PRESERVE_RATIO, ADD_CURRENT_HEALTH_TOO, and SAME_CURRENTHEALTH
  End
  Behavior = AutoHealBehavior ModuleTag_460
    HealingAmount = 5
    HealingDelay = 1000     ; msec
    TriggeredBy = ZGen_UpgradeDroneArmorNano
  End
  Behavior = StealthUpdate ModuleStealth_09
    StealthDelay = 1000     ; msec
    StealthForbiddenConditions = ATTACKING
    InnateStealth = No     ; Requires upgrade first
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End
  Behavior = StealthUpgrade ModuleTag_597
    TriggeredBy = ZGen_UpgradeDroneArmorNano
  End
  Behavior = VeterancyGainCreate ModuleTag_Training
    StartingLevel = VETERAN
    ScienceRequired = ZSupW_SCIENCE_DroneTraining
  End
  Behavior = StealthDetectorUpdate ModuleTag_StealthDetect
    DetectionRate = 250 ;500     ; how often to rescan for stealthed things in my sight (msec)
    ; DetectionRange = ??? ;Dustin, enable this for independant balancing!
    CanDetectWhileGarrisoned = No     ; Garrisoned means being in a structure that you units can shoot out of.
    CanDetectWhileContained = No     ; Contained means being in a transport or tunnel network.
  End
  
  Behavior = JetSlowDeathBehavior ModuleTag_052
    FXOnGroundDeath = FX_JetOnGroundDeath
    OCLOnGroundDeath = OCL_ReaperDeathFinalBlowUp
    DestructionDelay = 99999999     ; destruction will happen when we
    RollRate = 0.2
    RollRateDelta = 100%     ; each frame, rollrate = rollrate * rollrateDelta
    PitchRate = 0.0
    FallHowFast = 110.0%     ; Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath = FX_StealthBomberDroneDeathInitial
    ;OCLInitialDeath = OCL_RaptorDeathInitial
    DelaySecondaryFromInitialDeath = 500     ; in milliseconds
    FXSecondary = FX_JetDeathSecondary
    OCLSecondary = OCL_RaptorDeathSecondary
    FXHitGround = FX_JetDeathHitGround
    OCLHitGround = OCL_ReaperDeathHitGround
    DelayFinalBlowUpFromHitGround = 200     ; in milliseconds
    FXFinalBlowUp = FX_JetDeathFinalBlowUp
    OCLFinalBlowUp = OCL_ReaperDeathFinalBlowUp
  ; DeathLoopSound                  = MICAL NEEDS TO MAKE ME
  End
  ;Behavior = EjectPilotDie ModuleTag_053
  ;  ExemptStatus = HIJACKED
  ;  GroundCreationList = OCL_EjectPilotOnGround
  ;  AirCreationList = OCL_EjectPilotViaParachute
  ;  VeterancyLevels = ALL -REGULAR     ; only vet+ gives pilot
  ;End
  Behavior = PhysicsBehavior ModuleTag_054
    Mass = 500.0
  End
  Behavior = TransitionDamageFX ModuleTag_055
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes Psys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_MIGDamageTransition
  End
  Behavior = JetAIUpdate ModuleTag_056
    OutOfAmmoDamagePerSecond = 5% ;10%     ; amount of damage to take per SEC (not per frame) when out of ammo
    ; note that it's expressed as a percent of max health, not an absolute
    TakeoffDistForMaxLift = 0%     ; larger numbers give more lift sooner when taking off
    TakeoffPause = 50 ;500
    MinHeight = 5
    ParkingOffset = 0 ;3     ; scooch it a little forward so the tail doesn't hit the doors
    ReturnToBaseIdleTime = 10000     ; if idle for this long, return to base, even if not out of ammo
  End
  Locomotor = SET_NORMAL ReaperDroneLocomotor ;RaptorJetLocomotor
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor
  Behavior = FlammableUpdate ModuleTag_057
    AflameDuration = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay = 500     ; this often.
  End
  Geometry = Box
  GeometryIsSmall = Yes
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 5.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89     ; minimum elevation angle above horizon. Used to limit shadow length.
End
