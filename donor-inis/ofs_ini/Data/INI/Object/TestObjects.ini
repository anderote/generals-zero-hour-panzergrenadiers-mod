      AnimationMode = ONCE ;LOOP
      Model = UITechS2_SKN
      WeaponMuzzleFlash = PRIMARY MuzzleFX01
      WeaponFireFXBone = PRIMARY Muzzle01
      TransitionKey = TRANS_Throwing
    End
    ConditionState = BETWEEN_FIRING_SHOTS_B WEAPONSET_CRATEUPGRADE_TWO
      Animation = UITech_SKL.UITech_THW2
      AnimationMode = MANUAL ;LOOP
      Flags = START_FRAME_LAST
      Model = UITechS2_SKN
      WeaponMuzzleFlash = PRIMARY MuzzleFX01
      WeaponFireFXBone = PRIMARY Muzzle01
      TransitionKey = TRANS_Throwing
      WaitForStateToFinishIfPossible = TRANS_Throwing
    End
    AliasConditionState = RELOADING_B WEAPONSET_CRATEUPGRADE_TWO
  End
