      TransitionKey = TRANS_Throwing
    End
    AliasConditionState = PREATTACK_B MOVING WEAPONSET_CRATEUPGRADE_TWO
    AliasConditionState = PREATTACK_B FIRING_B WEAPONSET_CRATEUPGRADE_TWO
    AliasConditionState = PREATTACK_B BETWEEN_FIRING_SHOTS_B WEAPONSET_CRATEUPGRADE_TWO
    ConditionState = FIRING_B WEAPONSET_CRATEUPGRADE_TWO
