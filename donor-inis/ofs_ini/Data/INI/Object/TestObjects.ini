  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_295
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = ExMsslTm
      ParticleSysBone = None UntitledMissileExhaust
      ;ParticleSysBone = None UntitledMissileTrailFlareLarge
      ParticleSysBone = None UntitledMissileTrailThin
    End
    ConditionState = JAMMED
      ParticleSysBone = None SparksMedium
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:RangerTeamMissile
  EditorSorting = SYSTEM
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_296
    MaxHealth = 100.0
    InitialHealth = 100.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    ; A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End
  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_297
    DeathTypes = NONE +DETONATED
  ; we detonated normally.
  ; no FX, just quiet destroy ourselves
  End
  Behavior = InstantDeathBehavior DeathModuleTag_298
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_299
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX = FX_GenericMissileDeath
  End
  ; ---- end Projectile death behaviors
  Behavior = PhysicsBehavior ModuleTag_300
    Mass = 50.0 ;50
    AerodynamicFriction = 0  ;1000
    AllowBouncing = Yes
    ;ZFriction = 1000
    ;ForwardFriction = 0
  End
  Behavior = MissileAIUpdate ModuleTag_301
    TryToFollowTarget = Yes     ; ;;;;;;;;No
    FuelLifetime = 10000
    InitialVelocity =  150     ; in dist/sec
    IgnitionDelay = 0; 2000
    ;DistanceToTravelBeforeTurning = 3
    IgnitionFX = FX_BuggyMissileIgnition
  End
  Locomotor = SET_NORMAL PatriotMissileLocomotor ;Test_MissileTestMissileLocomotor
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2.0
End

