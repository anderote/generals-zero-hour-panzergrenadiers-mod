      WeaponMuzzleFlash = PRIMARY MuzzleFX01
      WeaponFireFXBone = PRIMARY Muzzle01
      TransitionKey = TRANS_Throwing
      WaitForStateToFinishIfPossible = TRANS_Throwing
    End
    AliasConditionState = RELOADING_B WEAPONSET_CRATEUPGRADE_ONE
    ; ------------------ technical with WEAPONSET_CRATEUPGRADE_TWO ------------------------
    ConditionState = WEAPONSET_CRATEUPGRADE_TWO
      Model = UITechS2_SKN
      IdleAnimation = UITech_SKL.UITech_STA 0 6
      IdleAnimation = UITech_SKL.UITech_IDA
      IdleAnimation = UITech_SKL.UITech_IDB
