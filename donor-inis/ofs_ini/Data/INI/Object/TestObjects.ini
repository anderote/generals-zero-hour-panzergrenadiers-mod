Object Test_RaptorAntiAuroraMissile
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_077
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = AVRaptor_M
    End
    ConditionState = JAMMED
      ParticleSysBone = None SparksMedium
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Missile
  EditorSorting = SYSTEM
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD CAN_CAST_REFLECTIONS PROJECTILE SMALL_MISSILE ;Immune to Point Defense
  Body = ActiveBody ModuleTag_078
    MaxHealth = 200.0
    InitialHealth = 200.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    ; A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 400
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 100
  End
  Behavior = WeaponBonusUpgrade ModuleTag_079
    TriggeredBy = Upgrade_AmericaLaserMissiles
  End
  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_080
    DeathTypes = NONE +DETONATED
  ; we detonated normally.
  ; no FX, just quiet destroy ourselves
  End
  Behavior = InstantDeathBehavior DeathModuleTag_081
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_082
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX = FX_GenericMissileDeath
  End
  ; ---- end Projectile death behaviors
  Behavior = PhysicsBehavior ModuleTag_083
    Mass = 1
  End
  Behavior = MissileAIUpdate ModuleTag_084
    TryToFollowTarget = Yes
    FuelLifetime = 20000
    InitialVelocity = 300     ; in dist/sec
    IgnitionDelay = 30
    IgnitionFX = FX_JetMissileIgnition
    DistanceToTargetForLock = 600
    DetonateCallsKill = Yes
  End
  Locomotor = SET_NORMAL ZSupW_InterceptorMissileLocomotor
  Scale = 1.5
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End