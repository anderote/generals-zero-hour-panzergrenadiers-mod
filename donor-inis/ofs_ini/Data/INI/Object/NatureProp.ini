Object Hedge1

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model = PMHedge01
    End
    ConditionState      = AFLAME ;Currently on fire
      ParticleSysBone   = None FireTreeSmaller
      ParticleSysBone   = None SmoulderTree1
      ParticleSysBone   = None FireTreeSparks
    End
    ConditionState      = AFLAME SMOLDERING ;at the end of on fire, still has flames, but skeleton is burned
      Model             = PTBush01_B
      ParticleSysBone   = AFlame01 SmoulderTree1
      ParticleSysBone   = AFlame01 FireTreeSparks
    End
    AliasConditionState = RUBBLE AFLAME
    AliasConditionState = RUBBLE AFLAME SMOLDERING

    ConditionState      = SMOLDERING ; will never catch fire again.  burned out
      Model             = PTBush01_B
      ParticleSysBone   = AFlame01 SmoulderTree2
      ParticleSysBone   = AFlame01 SmoulderTree3
    End
    AliasConditionState = RUBBLE SMOLDERING

    ConditionState      = BURNED ; all burned and black and no effects
      Model             = PTBush01_B
    End
    AliasConditionState = RUBBLE BURNED
    AliasConditionState = RUBBLE
  End

  ; *** DESIGN parameters ***
  DisplayName     = OBJECT:Hedge
  EditorSorting   = MISC_NATURAL

  CrushableLevel = 1

  ArmorSet
    Conditions = None
    Armor      = TreeArmorNEW
    DamageFX   = None
  End

  FenceWidth      = 17.0 ; Spacing used by the fence tool in worldbuilder.
  FenceXOffset    = 8.5 ; Offset used by the fence tool in worldbuilder so corners line up.

  ; *** ENGINEERING Parameters ***
  KindOf = IMMOBILE FORCEATTACKABLE CLEARED_BY_BUILD

  Body            = ActiveBody ModuleTag_Hlth
    MaxHealth     = 50.0
    InitialHealth = 50.0
  End

  Behavior = ToppleUpdate ModuleTag_02
    ToppleFX = FX_ToppleTree
    BounceFX = FX_TreeBounce
    ToppleLeftOrRightOnly = Yes
    BounceVelocityPercent = 20% ; hedges don't really bounce (much) (default: 30%)
  End

  Behavior = FlammableUpdate ModuleTag_Burn
    FlameDamageLimit = 10         ;Catch fire if I take this much fire damage...
    FlameDamageExpiration = 40    ;in a span of this long
    AflameDuration   = 10000      ;If I catch fire, I'll burn for this long...
    AflameDamageAmount = 10       ;taking this much damage...
    AflameDamageDelay  = 1000     ;this often.
    BurnedDelay        = 5100     ;stay aflame until after death to trigger the right death behavior
    BurningSoundName   = GenericFireMediumLoop
  End

  Behavior = SlowDeathBehavior ModuleTag_03
    SinkRate          = 2    ; in Dist/Sec
    SinkDelay         = 10000
    DestructionDelay  = 16000
    FX                = INITIAL FX_OptTreeBounce
  End

  Geometry            = BOX
  GeometryMajorRadius = 9.0
  GeometryMinorRadius = 1.0
  GeometryHeight      = 10.0
  GeometryIsSmall     = No
  Shadow   = SHADOW_VOLUME

End


