Armor TreeArmorNEW
  Armor = DEFAULT           0%
  Armor = UNRESISTABLE      100%
  Armor = PARTICLE_BEAM     100%
  Armor = CRUSH             100%
  Armor = FLAME             100%
  Armor = MOLOTOV_COCKTAIL  100%
  Armor = HEALING           100%
  Armor = AURORA_BOMB       100%
  Armor = ARMOR_PIERCING    100%
  Armor = EXPLOSION         100%
  Armor = INFANTRY_MISSILE  100%
  Armor = STEALTHJET_MISSILES 100%
  Armor = JET_MISSILES        100%
  ;Armor = RADIATION         5%
  ;Armor = POISON            5%
  Armor = MICROWAVE         100%
  Armor = SMALL_ARMS        10%
  Armor = GATTLING          10%
  Armor = COMANCHE_VULCAN   25%
  ;Armor = MELEE             5%
  ;Armor = LASER             5%
  Armor = SURRENDER 100%
End

;------------------------------------------------------------------------------

Locomotor BurningEmberLocomotor
  Surfaces = GROUND WATER CLIFF RUBBLE ;AIR
  Speed = 15                ; in dist/sec
  SpeedDamaged = 12         ; in dist/sec
  MinSpeed = 8              ; in dist/sec
  TurnRate = 180            ; in degrees/sec
  TurnRateDamaged = 90      ; in degrees/sec
  Acceleration = 100        ; in dist/(sec^2)
  AccelerationDamaged = 80  ; in dist/(sec^2)
  Lift = 120                ; in dist/(sec^2)
  LiftDamaged = 80          ; in dist/(sec^2)
  Braking = 100             ; in dist/(sec^2)
  MinTurnSpeed = 8          ; in dist/sec
  PreferredHeight = 8       ;bush height is 5, and we also want to hit infantry
  AllowAirborneMotiveForce = Yes
  StickToGround = No
  ZAxisBehavior = SURFACE_RELATIVE_HEIGHT
  Appearance = HOVER ;THURST cannot use ZAxisBehavior or lift
  PitchInDirectionOfZVelFactor = 0.3 ;1.0
  PitchStiffness = 0.05                  ;  stiffness of the "springs" in the suspension forward & back.
  RollStiffness = 0.1                   ;  stiffness of the "springs" in the suspension side to side.
  PitchDamping = 0.3                    ;  How fast it damps.  0=perfect spring, bounces forever.  1=glued to terrain.
  RollDamping = 0.3                     ;  How fast it damps.  0=perfect spring, bounces forever.  1=glued to terrain.
  ForwardVelocityPitchFactor = -0.05     ;  How much velocity will cause the front to lift/dip
  LateralVelocityRollFactor = 0.1       ;  How much cornering will cause the chassis to roll.
  Apply2DFrictionWhenAirborne = Yes

  ; NOTE: The two wander parameters only apply to the TWO_LEGS appearance.
  WanderWidthFactor  = 2.0 ;2.0 ;how far we wander side to side approx body widths.
  WanderLengthFactor = 3.0 ;5.0 ;how we go forward before we cross back to the other side.
  WanderAboutPointRadius = 80.0 ;When we are wandering around a point, how far do we wander from the point (in 'feet' distance).
End

;------------------------------------------------------------------------------

AudioEvent FireFlareUp
  Sounds   = gfirlo1c gfirlo1d gfirlo1e gfirlo1f gfirlo1g gfirlo1a gfirlo1b gfirlo1c gfirlo1d gfirlo1a gfirlo1b
  Attack   = gfirlo1h gfirlo1i
  Decay    = gfirlo1j
  Control  = random
  Priority = low
  Limit    = 3
  Volume   = 65
  Type     = world shrouded everyone
End

AudioEvent TreeDamaged
  Sounds = gtreimpc gtreimpd gwalwdia gwalwdib
  Control = random interrupt
  Limit = 2
  PitchShift = -10 10
  VolumeShift = -20
  Volume = 45
  Priority = lowest ;low
  Type = world shrouded everyone
End

