;------------------------------------------------------------------------------
Object BurningEmber

  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    DefaultConditionState
      Model = PABLINKLITER ;AVAurora Scale = 0.4 for testing
      ParticleSysBone = NONE FireTreeSparks
      ParticleSysBone = NONE BurningEmberTrailUp
    End
  End

  ; ***DESIGN parameters ***
  DisplayName   = OBJECT:TrashPaper
  EditorSorting = DEBRIS

  ArmorSet
    Conditions = None
    Armor      = TreeArmor
    DamageFX   = None
  End

  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf = CAN_CAST_REFLECTIONS INFANTRY

  Body = ActiveBody ModuleTag_Hlth
    MaxHealth     = 10.0
    InitialHealth = 10.0
  End

  Behavior = FireWeaponCollide ModuleTag_Fire
    CollideWeapon = BurningEmberWeaponNew
    FireOnce = Yes
  End

  Behavior = WanderAIUpdate ModuleTag_AI
  End
  Locomotor = SET_NORMAL BurningEmberLocomotor
  Locomotor = SET_WANDER BurningEmberLocomotor

  Behavior = PhysicsBehavior ModuleTag_02
    Mass = 0.1
    AerodynamicFriction = 0.1
    ForwardFriction     = 0.1 ; this is now friction-per-sec
    AllowBouncing = Yes
    AllowCollideForce = Yes
    ShockResistance = 0.80
  End

  Behavior = LifetimeUpdate ModuleTag_03
    MinLifetime = 4000   ; min lifetime in msec
    MaxLifetime = 8000   ; max lifetime in msec
  End
  Behavior = SlowDeathBehavior ModuleTag_04
    DestructionDelay = 100
  End

  Geometry = SPHERE
  GeometryIsSmall = No
  GeometryMajorRadius = 5.0
End

