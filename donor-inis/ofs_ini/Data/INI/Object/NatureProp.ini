;MODIFIED BENGS SHRUBBERY FIX TO WORK WITH Operation Firestorm

;ZH trees become like Generals trees, only better - they can bbe damaged by more damage types
;Yet don't take much more CPU resources, in fact, possibly less than Generals trees

;DisplayName = OBJECT:Birch Fir MapleTree OakTree PalmTree PineTree SpruceTree
;But all say "Tree"

;stumps available for: TreeMapleStump TreeOakStump TreePalmStump TreePineStump TreeSpruceStump
;however only the spruce and palm stumps are useful. Others are too big.

;invisible shrubs fixed too


;Debris particle system notes

;ArtilleryBarrageDebris - big cloud of brown dirt, a bit too big for trees, ok for big vehicle explosion
;BarrelExplosionDebris - 2 big clouds of brown dirt, quite good actually *
;BattleMasterTankExplosionDebris - cloud of grey debris, ok for metal things like tanks exploding
;BattleMasterTransitionDebris -  very small very brief puff of debris, ok for unit damage FX
;BoobyTrapDebris - big cloud of medium sized black stones, good for demo trap or sth like that
;BuggyDebrisTireTrail - small brief and fast, hard to see
;BuggyDebrisTrail - cannot see it
;BuggyExplosionDebris - cannot see it
;BuggyMissileDebris - big cloud (bigger than BoobyTrapDebris) of medium sized black stones, good for big bomb like SupW Aurora
;BuggyNewExplosionDebris - small brief puff of grey metallic debris
;BuggyNewExplosionDebris2 - clouds of grey debris, falling not so fast, movement good for leaves but colour too grey
;BuildUpDebris - small clouds of black dirt falling, but SystemLifetime = 0 so lasts forever
;CarCrushDebris - cloud of brown debris, size ok, falls too fast
;ClstrMneDroped - black stones, like BoobyTrapDebris, but directional
;DemoTrapDebris - lots of biggish grey-brown dirt particles but falls too fast to look good
;DragonTankExplosionDebris - funny looking small cloud of black bits that does not fall, just stays still then vanishes
;DragonTransitionDebris - clouds of grey metal debris going outward, fast and brief
;GLAPowerPlantDamagedShockwave - 3 small brown clouds of birt rising like smoke
;GLAPowerPlantDeathShockwave1 - black clouds of smoke rising, not debris, good for big arty shell or bomb type explosion though
;HumveeExplosionDebris - clouds of brown debris falling at a not too fast speed, another good one *
;InfantryMortarDebris - column of brown dirt thrown up like mine explosion
;JetDebris - directional black bits thrown out fast when jet explodes, useful as ricochet for large structure getting hit or something
;JetExplosionGroundDebris - large clouds of brown dirt thrown up, directional, ok for large plane hitting ground
;MammothTankExplosionDebris - grey metal debris puffs falling, good for tank or medium bomb explosion
;MineDebris - column of brown dirt thrown up, directional upward, bigger than InfantryMortarDebris
;MineDisarmingDebris - small brief cloud of brown dirt thrown up, smaller than InfantryMortarDebris
;MortarDebris - huge clouds of brown dirt thrown up, ok for huge arty shell or huge bomb hit
;NukeCannonTransitionDebris - grey metal debris puffs falling, good for tank or medium bomb explosion
;OverlordExplosionDebris - similar to the above if a bit bigger
;OverlordTankExplosionDebris - like DragonTankExplosionDebris, funny immobile cloud of black bits
;OverlordTransitionDebris - grey metal debris puffs falling, good for tank or medium bomb explosion
;ScudLauncherTransitionDebris  - smaller grey metal debris puffs falling, ok for technical sized vehicle damage transition
;SpectreHowitzerDebris - reddish brown debris puffs, good size for trees but falls too fast for leaves
;StrategyCenterBarrageDebris - big expanding cloud fo brown soil thrown up, fades out before it falls down, good for mid to big bomb or arty shell
;StructureDamagedDebris - cloud of grey stones flung downwards into ground, good for dam or high bridge breaking perhaps
;StructureExplosionSmallDebris - a cloud of black stones flung up, smaller than BoobyTrapDebris, good for carpet bomb explosion or exploding patriot battery
;StructureExplosionDebris - hard to see
;TankStruckDebris - directional puff of grey metal debris, good for tank struck

