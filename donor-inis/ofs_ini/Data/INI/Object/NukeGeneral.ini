    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_627
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_Raider_CrushEffect
  End
  ;---- Instant Death ------
  Behavior = SlowDeathBehavior ModuleTag_D1
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 1
    FX  = FINAL    FX_SupplyTruckExplosionOneFinal
    OCL = FINAL    OCL_FinalRaiderDebris
  End
  ;----
   ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_D2
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED
    ProbabilityModifier = 100
    DestructionDelay = 1500
    DestructionDelayVariance = 600
    FX = INITIAL FX_CrusaderCatchFire
    FX  = FINAL    FX_SupplyTruckExplosionOneFinal
    OCL = FINAL    OCL_FinalRaiderDebris
  End
  ;----- Air Death ------
  Behavior = SlowDeathBehavior ModuleTag_D3
    DeathTypes = ALL -CRUSHED -SPLATTED -BURNED -POISONED
    ProbabilityModifier = 50
    DestructionDelay = 500
    DestructionDelayVariance = 1500
    OCL = INITIAL OCL_Raider_AirDeathStart
    FX = INITIAL FX_RocketBuggyAirDeathGroundPart
    OCL = FINAL OCL_Raider_AirDeath
    FX = FINAL FX_RocketBuggyAirDeathAirPart     ; This happens in the air
  End
  ;-------------
  
  Behavior = TransitionDamageFX ModuleTag_018
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  Behavior = FlammableUpdate ModuleTag_019
    AflameDuration = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay = 500     ; this often.
  End
  Geometry = BOX
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 6.0
  GeometryHeight = 10.5
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45     ; minimum elevation angle above horizon. Used to limit shadow length
End

