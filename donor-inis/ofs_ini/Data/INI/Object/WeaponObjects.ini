Object Y_SupW_TomahawkMissile
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_573
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = AVNukeMs_M
    End
    ConditionState = JAMMED
      ParticleSysBone = None SparksMedium
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TomahawkMissile
  EditorSorting = SYSTEM
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    ; *Be careful with this type, use in conjunction with KindOf = BALLISTIC_MISSILE to restrict targeting *to select weapons, because ballistic missile armor is weak! Weapons capable of targeting must have *AntiBallisticMissile = Yes set in the Weapon.ini.
    Armor = BallisticMissileArmor
    DamageFX = None
  End
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE BALLISTIC_MISSILE
  Body = ActiveBody ModuleTag_574
    MaxHealth = 200.0
    InitialHealth = 200.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health. The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own. A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 400
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End
  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_575
    DeathTypes = NONE +DETONATED
    ; we detonated normally.
    FX = WeaponFX_TomahawkMissileDetonation
  End
  Behavior = InstantDeathBehavior DeathModuleTag_576
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_577
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX = FX_GenericMissileDeath
  End
  ; ---- end Projectile death behaviors
  Behavior = PhysicsBehavior ModuleTag_578
    Mass = 1
  End
  Behavior = MissileAIUpdate ModuleTag_579
    TryToFollowTarget = No     ; Yes
    FuelLifetime = 6000
    IgnitionDelay = 0
    IgnitionFX = FX_TomahawkIgnition
    InitialVelocity = 50     ; in dist/sec
    DistanceToTravelBeforeTurning = 80
    DistanceToTargetBeforeDiving = 100     ; When I hit this close to target, I ignore PreferredHeight.
  ; Note, if this is too small, the missile will turn too late to hit.  And, since we have a 2D heart, being over the target counts as "there", so we'll give up and just go straight.
  ; DistanceToTargetForLock = 10     ; Short lock on, as it looks better flying.  jba.
  End
  Locomotor = SET_NORMAL Y_SupW_TomahawkMissileLocomotor
  Geometry = Cylinder     ; Since collision extents can't tilt, this is a little fake
  GeometryMajorRadius = 8.0
  GeometryHeight = 4.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
End
