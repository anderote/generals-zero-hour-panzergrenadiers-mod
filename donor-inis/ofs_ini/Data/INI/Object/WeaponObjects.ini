Object Y_Nuke_ApocalypseMissile
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_400
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = apo_missile
    End
    ConditionState = JAMMED
      ParticleSysBone = None SparksMedium
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Missile
  EditorSorting = SYSTEM
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_401
    MaxHealth = 100.0
    InitialHealth = 100.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    ; A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End
  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_402
    DeathTypes = NONE +DETONATED
  ; we detonated normally.
  ; no FX, just quiet destroy ourselves
  End
  Behavior = InstantDeathBehavior DeathModuleTag_403
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_07
    DeathWeapon = Y_Nuke_FireBonusWeapon
    StartsActive = Yes
  End
  Behavior = InstantDeathBehavior DeathModuleTag_404
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX = FX_GenericMissileDeath
  End
  ; ---- end Projectile death behaviors
  Behavior = PhysicsBehavior ModuleTag_407
    Mass = 1
  End
  Behavior = MissileAIUpdate ModuleTag_408
    TryToFollowTarget = Yes
    FuelLifetime = 4000
    InitialVelocity = 150     ; in dist/sec
    IgnitionDelay = 0
    DistanceToTravelBeforeTurning = 30
    IgnitionFX = FX_JetMissileIgnition
  End
  Locomotor = SET_NORMAL ScorpionMissileLocomotor
  Behavior = WeaponBonusUpgrade ModuleTag_409
    TriggeredBy = GenericGenpowerUpgrade_One
  End
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End
