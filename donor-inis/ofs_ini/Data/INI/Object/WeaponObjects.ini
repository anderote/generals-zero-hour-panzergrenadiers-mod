Object ZSupW_StealthDroneBomb
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_104
    DefaultConditionState
      Model = EXCarptBmb
    End
  End
  ; ***DESIGN parameters ***
  Side = America
  EditorSorting = SYSTEM
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  VisionRange = 0.0
  ; *** AUDIO Parameters ***
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD PROJECTILE ;CAN_CAST_REFLECTIONS ;PROJECTILE
  Body = ActiveBody ModuleTag_105
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  Behavior = PhysicsBehavior ModuleTag_106
    Mass = 75.0
    AerodynamicFriction = 2     ; this is now friction-per-sec
    ForwardFriction = 2     ; this is now friction-per-sec
    CenterOfMassOffset = 2     ; Default of 0 means nothing tips as it falls.  Positive tips forward, negative tips back
  End
  
  Behavior = WeaponBonusUpgrade ModuleTag_087
    TriggeredBy = Upgrade_AmericaBunkerBusters
  End
  
    ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_088
    DeathTypes = ALL ;NONE +DETONATED
  ; we detonated normally.
  ; no FX, just quiet destroy ourselves
  End
  ;Behavior = InstantDeathBehavior DeathModuleTag_089
  ;  DeathTypes = NONE +LASERED
  ;  ; shot down by laser.
  ;  FX = FX_GenericMissileDisintegrate
  ;  OCL = OCL_GenericMissileDisintegrate
 ; End
  ;Behavior = InstantDeathBehavior DeathModuleTag_090
   ; DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
   ; FX = FX_GenericMissileDeath
  ;End
  ; ---- end Projectile death behaviors
  Behavior = BunkerBusterBehavior ModuleTag_091
    UpgradeRequired = Upgrade_AmericaBunkerBusters
    DetonationFX = FX_BunkerBusterExplosion     ; the big detonation kaboom at the bottom
    CrashThroughBunkerFX = WeaponFX_BunkerBusterIntialImpact     ; the crash bang crunch FX on the way through the bunker ceiling
    CrashThroughBunkerFXFrequency = 250 ;571     ; msec... how often to play the crash bang crunch FX on the way through the bunker ceiling
    SeismicEffectRadius = 200
    SeismicEffectMagnitude = 5
    ShockwaveWeaponTemplate = BunkerBusterShockwaveWeaponSmall
    OccupantDamageWeaponTemplate = BunkerBusterAntiTunnelGarrisonWeaponWithABigName
  End
  
  ; it may seem odd to have a "bomb" with a Locomotor, especially a Thrust locomotor,
  ; but there's a good reason: the Aurora moves so freakin' fast that it's really
  ; hard to (1) find a reliable drop location, and (2) actually get it close enough to
  ; that location. So we cheat: just get fairly close, then let the "bomb" do a little (subtle)
  ; navigation on the way down. This works pretty well and actually looks much better
  ; than you might think. (srj)
  Behavior = MissileAIUpdate ModuleTag_107
    TryToFollowTarget = No
    FuelLifetime = 10000
    IgnitionDelay = 0
    InitialVelocity = 0     ; in dist/sec
    DistanceToTravelBeforeTurning = 0
    DistanceToTargetBeforeDiving = 0
    DetonateCallsKill = Yes
    KillSelfDelay = 500 ;2000    ; two seconds of crash bang crunch before we actually detonate
  End
  Locomotor = SET_NORMAL AuroraBombLocomotor     ; yes, that's right.
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2.0
End

