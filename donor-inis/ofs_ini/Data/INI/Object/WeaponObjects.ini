Object StingrayDroneDataStream
  ; *** ART Parameters ***
  ;Draw = W3DLaserDraw ModuleTag_398
  ;  Texture = EXBinaryStream32.tga ;exhackbeam.tga
  ;  NumBeams = 1     ; Number of overlapping cylinders that make the beam. 1 beam will just use inner data. Current max: 10
  ;  InnerBeamWidth = 3 ;4     ; The total width of beam
  ;  InnerColor = R:0 G:255 B:0 A:180     ; The inside color of the laser (hot)
  ;  Tile = Yes     ; The height of the texture will determine how many times to tile the texture to fit without scaling.
  ;  ScrollRate = -0.25     ; Scrolls the texture offset this fast -- towards(-) away(+)
  ;  Segments = 20     ; Number of segments -- more segments give smoother curve (but more joints) Current max: 20
  ;  ArcHeight = 30.0     ; The height of the arc
  ;  SegmentOverlapRatio = 0.000     ; This value overlaps(+) or separates(-) the segments by ratio
  ;  TilingScalar = 0.25     ; Stretches tiling if value > 1.0, otherwise shrinks it (1.0 is natural)
  ;End
  
  Draw = W3DLaserDraw ModuleTag_01
    Texture = EXEMPLaser_green.tga
    NumBeams = 1     ; Number of overlapping cylinders that make the beam. 1 beam will just use inner data.
    InnerBeamWidth = 6    ; The total width of beam
    InnerColor = R:255 G:255 B:255 A:100     ; The inside color of the laser (hot)
    Tile = Yes     ; The height of the texture will determine how many times to tile the texture to fit without scaling.
    ScrollRate = -4     ; Scrolls the texture offset this fast -- towards(-) away(+)
    TilingScalar = 1     ; Stretches tiling if value > 1.0, otherwise shrinks it (1.0 is natural)
  End
  
  KindOf = IMMOBILE
  ClientUpdate = LaserUpdate ModuleTag_033
    MuzzleParticleSystem = StingrayHackLaserFlareMuzzle
    TargetParticleSystem = StingrayHackLaserFlare
  End
  ; Used as a weapon, this is essentially a fast pulse laser. Adjusting
  ; the lifetime values will determine how long it renders. The damage
  ; is applied immediately, so lifetime doesn't matter.
  Behavior = LifetimeUpdate ModuleTag_034
    MinLifetime = 100     ; min lifetime in msec
    MaxLifetime = 100     ; max lifetime in msec
  End
  Behavior = DestroyDie ModuleTag_035
  ; nothing
  End
End

