Object V3Missile
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_840
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = uv3launcher_M
    End
    ConditionState = REALLYDAMAGED
      Model = uv3launcher_MD
    End
    ConditionState = JAMMED
      ParticleSysBone = None SparksMedium
    End
    ConditionState = REALLYDAMAGED JAMMED
      Model = uv3launcher_MD
      ParticleSysBone = None SparksMedium
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:SCUDMissile
  EditorSorting = SYSTEM
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    ; *Be careful with this type, use in conjunction with KindOf = BALLISTIC_MISSILE to restrict targeting
    ; *to select weapons, because ballistic missile armor is weak! Weapons capable of targeting must have
    ; *AntiBallisticMissile = Yes set in the Weapon.ini.
    Armor = BallisticMissileArmor
    DamageFX = None
  End
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE BALLISTIC_MISSILE
  Body = ActiveBody ModuleTag_841
    MaxHealth = 100.0
    InitialHealth = 100.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    ; A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End
  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_842
    DeathTypes = NONE +DETONATED
  ; we detonated normally.
  ; no FX, just quiet destroy ourselves
  End
  Behavior = InstantDeathBehavior DeathModuleTag_843
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = StealthUpdate ModuleTag_844
    StealthDelay = 0     ; msec
    StealthForbiddenConditions = FIRING_PRIMARY
    MoveThresholdSpeed = 3
    InnateStealth = Yes     ; doesnt Require upgrade first
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End
  Behavior = InstantDeathBehavior DeathModuleTag_845
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX = FX_GenericMissileDeath
  End
  ; ---- end Projectile death behaviors
  Behavior = PhysicsBehavior ModuleTag_846
    Mass = 1
  End
  Behavior = MissileAIUpdate ModuleTag_847
    TryToFollowTarget = No
    FuelLifetime = 5000
    IgnitionDelay = 0
    ; IgnitionFX = FX_ScudStormIgnition ;NOT WORKING
    InitialVelocity = 50     ; in dist/sec
    DistanceToTravelBeforeTurning = 200
    DistanceToTargetBeforeDiving = 200     ; When I hit this close to target, I ignore PreferredHeight.
  End
  Locomotor = SET_NORMAL SCUDMissileLocomotor
  Behavior = WeaponBonusUpgrade ModuleTag_848
    TriggeredBy = Upgrade_GLAAPRockets
  End
  Geometry = Cylinder     ; Since collision extents can't tilt, this is a little fake
  GeometryMajorRadius = 4.0
  GeometryHeight = 4.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
End
