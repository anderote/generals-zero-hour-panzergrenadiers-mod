    FuelLifetime = 6000
    InitialVelocity = 100     ; in dist/sec
    IgnitionDelay = 0 ;500
    DistanceToTravelBeforeTurning = 30
    IgnitionFX = None
    DistanceToTargetForLock = 50     ; If it gets within 100 of the target, it kills the target.
  End
  Behavior = WeaponBonusUpgrade Upgrade_01
    TriggeredBy = Upgrade_GLAAPRockets
  End
