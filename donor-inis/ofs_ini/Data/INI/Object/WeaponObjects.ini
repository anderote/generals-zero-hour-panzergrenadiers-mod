Object FCV_CruiseMissile
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_477
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = AVCruiseMissile
      ParticleSysBone = ENGINE01 CoastalCruiseMissileExhaust
      
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Missile
  Side = China
  EditorSorting = SYSTEM
  TransportSlotCount = 1     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange = 0.0
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  ; *** AUDIO Parameters ***
  SoundAmbient = CruiseMissileIncoming
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD CAN_CAST_REFLECTIONS PROJECTILE     ; SMALL_MISSILE
  Body = ActiveBody ModuleTag_478
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_479
    DeathTypes = NONE +DETONATED
  ; we detonated normally.  No effect, since it is in weapon.  Don't want to double.
  ; FX        = FX_ArtilleryBarrage
  End
  Behavior = InstantDeathBehavior DeathModuleTag_480
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_481
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX = FX_GenericMissileDeath
  End
  ; ---- end Projectile death behaviors
  ; Besides being the wrong weapon, the weapon is fired from the DeliverPayload listing in OCL.ini
  ; Behavior = FireWeaponWhenDeadBehavior ModuleTag_482
  ; DeathWeapon   = A10ThunderboltMissileWeapon
  ; StartsActive  = Yes
  ; End
  Behavior = PhysicsBehavior ModuleTag_483
    Mass = 1
  End
   Behavior = MissileAIUpdate ModuleTag_294
    TryToFollowTarget = No
    FuelLifetime = 25000
    IgnitionDelay = 0
    InitialVelocity = 20     ; in dist/sec
    DistanceToTravelBeforeTurning = 40
    DistanceToTargetBeforeDiving = 50     ; When I hit this close to target, I ignore PreferredHeight.
  ; Note, if this is too small, the missile will turn too late to hit.  And, since we have a 2D
  ; heart, being over the target counts as "there", so we'll give up and just go straight.
  End
  Locomotor = SET_NORMAL NuclearCannonShellLocomotor
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
  Scale = 0.98
  Behavior = SpecialPowerCompletionDie ModuleTag_486
    SpecialPowerTemplate = SuperweaponA10ThunderboltMissileStrike
  End
End

