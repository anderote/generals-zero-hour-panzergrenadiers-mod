  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = None
    End
  End

  KindOf = IMMOBILE UNATTACKABLE NO_COLLIDE CAN_ATTACK
  VisionRange = 99999.0
  Body = ImmortalBody ModuleTag_032
    MaxHealth = 1
    InitialHealth = 1
  End
  
  Behavior = AIUpdateInterface ModuleTag_061
    AutoAcquireEnemiesWhenIdle = Yes
    Turret
      ControlledWeaponSlots = PRIMARY
      TurretTurnRate = 360     ; turn rate, in degrees per sec
    End
  End
  
  Behavior = PhysicsBehavior ModuleTag_825
    Mass = 1.0
    AerodynamicFriction = 7     ; this is now friction-per-sec
    ForwardFriction = 200     ; this is now friction-per-sec
  End

  Behavior = DeletionUpdate ModuleTag_031
    MinLifetime = 3000     ; min lifetime in msec
    MaxLifetime = 3000    ; max lifetime in msec
  End
  
  WeaponSet
    Conditions = None
    Weapon = PRIMARY HunterSeekerAttackWeapon
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
  End
  

   Behavior = DestroyDie ModuleTag_006
  ; nothing
  End
End

; ------------------------------------------------------------------------------
Object HunterSeekerAttackMissile
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_281
    OkToChangeModelColor = Yes
    ;----- NORMAL -----------------
    DefaultConditionState
      Model = NVHSMissile
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
      ParticleSysBone = Engine01 HunterSeekerEngineFlare
      ParticleSysBone = Engine01 HunterSeekerEngineExhaust
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TomahawkMissile
  EditorSorting = SYSTEM
  VisionRange = 1000.0
  ShroudClearingRange = 1000.0
  RadarPriority = UNIT
  ArmorSet
    Conditions = None
    ; *Be careful with this type, use in conjunction with KindOf = BALLISTIC_MISSILE to restrict targeting
    ; *to select weapons, because ballistic missile armor is weak! Weapons capable of targeting must have
    ; *AntiBallisticMissile = Yes set in the Weapon.ini.
    Armor = BallisticMissileArmor
    DamageFX = None
  End
  ; *** AUDIO Parameters ***
  SoundAmbient = HunterSeekerMoveLoop
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE BALLISTIC_MISSILE
  Body = ActiveBody ModuleTag_282
    MaxHealth = 800.0
    InitialHealth = 800.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    ; A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 800
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End
  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_283
    DeathTypes = NONE +DETONATED
    ; we detonated normally.
    ;FX = WeaponFX_TomahawkMissileDetonation
  End
  Behavior = InstantDeathBehavior DeathModuleTag_284
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_285
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    ;FX = FX_TomaMissileDeath ;FX_GenericMissileDeath
  End
  ; ---- end Projectile death behaviors
  Behavior = PhysicsBehavior ModuleTag_286
    Mass = 1
  End

  
  Behavior = MissileAIUpdate ModuleTag_287
    TryToFollowTarget = Yes
    FuelLifetime = 0
    ;IgnitionDelay = 850
    ;IgnitionFX = FX_TomahawkIgnition
    InitialVelocity = 100     ; in dist/sec
    DistanceToTravelBeforeTurning = 150
    DistanceToTargetBeforeDiving = 350     ; When I hit this close to target, I ignore PreferredHeight.
    ; Note, if this is too small, the missile will turn too late to hit.  And, since we have a 2D
    ; heart, being over the target counts as "there", so we'll give up and just go straight.
    DistanceToTargetForLock = 150     ; Short lock on, as it looks better flying.  jba.
    DetonateCallsKill = Yes
  End
  Locomotor = SET_NORMAL HunterSeekerMissileLocomotor
  
  Behavior = CreateObjectDie ModuleTag_NewTarget
    DeathTypes = NONE +NORMAL
    CreationList = OCL_HunterSeekerNewTargetObject
  End
  
  Geometry = Cylinder     ; Since collision extents can't tilt, this is a little fake
  GeometryMajorRadius = 8.0
  GeometryHeight = 4.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
End

