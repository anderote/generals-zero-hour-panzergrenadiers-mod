Object NapalmMissile
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_201
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = AVRaptor_M
    End
    ConditionState = JAMMED
      ParticleSysBone = None SparksMedium
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Missile
  EditorSorting = SYSTEM
  VisionRange = 0.0     ; Projectiles can't see, but superweapons *may need to*
  TransportSlotCount = 1     ; since Napalm Strike carries us as payload, not weapon
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD CAN_CAST_REFLECTIONS PROJECTILE SMALL_MISSILE
  Body = ActiveBody ModuleTag_202
    MaxHealth = 100.0
    InitialHealth = 100.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    ; A projectile is not disabled, but instead loses target and scatters
    SubdualDamageCap = 200
    SubdualDamageHealRate = 100000
    SubdualDamageHealAmount = 50
  End
  ; ---- begin Projectile death behaviors
  Behavior = InstantDeathBehavior DeathModuleTag_203
    DeathTypes = NONE +DETONATED
  ; we detonated normally.
  ; no FX, just quiet destroy ourselves
  End
  Behavior = InstantDeathBehavior DeathModuleTag_204
    DeathTypes = NONE +LASERED
    ; shot down by laser.
    FX = FX_GenericMissileDisintegrate
    OCL = OCL_GenericMissileDisintegrate
  End
  Behavior = InstantDeathBehavior DeathModuleTag_205
    DeathTypes = ALL -LASERED -DETONATED
    ; shot down by nonlaser.
    FX = FX_GenericMissileDeath
  End
  ; ---- end Projectile death behaviors
  Behavior = PhysicsBehavior ModuleTag_206
    Mass = 1
  End
  Behavior = MissileAIUpdate ModuleTag_207
    TryToFollowTarget = Yes
    FuelLifetime = 10000
    InitialVelocity = 75     ; in dist/sec
    IgnitionDelay = 30
    IgnitionFX = FX_NapalmMissileIgnition
  End
  Locomotor = SET_NORMAL NapalmMissileLocomotor
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End


