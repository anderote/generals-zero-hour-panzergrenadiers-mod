Object SecW_TimedThermiteCharge     ; Created by Talon aka Jetpackdude
  ; No drawable because it's invisible
  ; *** ART Parameters ***
  ; ***DESIGN parameters ***
  Side = America
  EditorSorting = SYSTEM
  TransportSlotCount = 0     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange = 75.0     ; Allow the stickybomb to show itself to user?
  ShroudClearingRange = 75
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor
  End
  ; *** AUDIO Parameters ***
  UnitSpecificSounds
    UnitBombPing = ThermiteChargeBeep
    StickyBombCreated = ThermiteChargePlant
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = NOT_ON_RADAR
  KindOf = PROJECTILE MINE NO_COLLIDE
  ; Body = ActiveBody ModuleTag_231
  ; MaxHealth = 1.0
  ; InitialHealth = 1.0
  ; End
  Body = HighlanderBody ModuleTag_232
    MaxHealth = 1.0
    InitialHealth = 1.0
  End
  Behavior = StealthUpdate ModuleTag_233
    StealthDelay = 0     ; msec
    StealthForbiddenConditions = NONE
    FriendlyOpacityMin = 50.0%
    InnateStealth = Yes
  End
  ; This determines how long the bomb lives before it explodes (via SlowDeathBehavior)
  Behavior = LifetimeUpdate ModuleTag_234
    MinLifetime = 5000     ; min lifetime in msec
    MaxLifetime = 5000     ; max lifetime in msec
  End
  Behavior = StickyBombUpdate ModuleTag_235
  ; Keeps it attached properly to the intended target should it move.
  End
  Behavior = SlowDeathBehavior ModuleTag_236
    DestructionDelay = 0
    FX = FINAL ThermiteChargeInitialFX
    ;FX = FINAL WeaponFX_TNTStickyBombDetonation
    ;Weapon = FINAL BurtonC4ChargeWeapon
    OCL = FINAL OCL_ThermiteChargeBurnObject
  End
  Geometry = CYLINDER
  GeometryMajorRadius = 8.0
  GeometryHeight = 8.0
  GeometryIsSmall = Yes
End
