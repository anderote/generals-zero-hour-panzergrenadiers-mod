Object SmallFreeFallBomb
  ; ***DESIGN parameters ***
  Side = America
  EditorSorting = SYSTEM
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  VisionRange = 0.0
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_851
    OkToChangeModelColor = Yes
    ConditionState = NONE
      Model = AVBomber_B
    End
  End
  Behavior = HeightDieUpdate ModuleTag_852
    TargetHeight = 1.0
    TargetHeightIncludesStructures = No
  End
  ; **********************************HERE IT IS, TODD
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_853
    DeathWeapon = X_GLAFrogfootDetonationWeaponUpgraded
    DeathTypes = ALL
    StartsActive = No
    TriggeredBy = Upgrade_GLAAnthraxBeta
    ConflictsWith = Chem_Upgrade_GLAAnthraxGamma
  End
  Behavior = InstantDeathBehavior ModuleTag_854
    DeathTypes = ALL
  End
  ; it may seem odd to have a "bomb" with a Locomotor, especially a Thrust locomotor,
  ; but there's a good reason: the Aurora moves so freakin' fast that it's really
  ; hard to (1) find a reliable drop location, and (2) actually get it close enough to
  ; that location. So we cheat: just get fairly close, then let the "bomb" do a little (subtle)
  ; navigation on the way down. This works pretty well and actually looks much better
  ; than you might think. (srj)
  Behavior = MissileAIUpdate ModuleTag_855
    TryToFollowTarget = No
    FuelLifetime = 0
    IgnitionDelay = 0
    InitialVelocity = 0     ; in dist/sec
    DistanceToTravelBeforeTurning = 0
    DistanceToTargetBeforeDiving = 0
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag99
    DeathWeapon = X_GLAFrogfootDetonationWeaponGamma
    StartsActive = No
    TriggeredBy = Chem_Upgrade_GLAAnthraxGamma
    DeathTypes = ALL
  End
  ; **********************************HERE IT IS, TODD
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_856
    DeathWeapon = X_GLAFrogfootDetonationWeaopn
    DeathTypes = ALL
    StartsActive = Yes
    ConflictsWith = Upgrade_GLAAnthraxBeta Chem_Upgrade_GLAAnthraxGamma
  End
  ; *** AUDIO Parameters ***
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_857
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  Behavior = PhysicsBehavior ModuleTag_858
    Mass = 100.0
    AerodynamicFriction = 0.5     ; this is now friction-per-sec
    ForwardFriction = -33     ; this is now friction-per-sec
    CenterOfMassOffset = 2     ; Default of 0 means nothing tips as it falls.  Positive tips forward, negative tips back
  End
  Locomotor = SET_NORMAL FreeFallLocomotor     ; yes, that's right. Lol gay!!!
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2.0
  Scale = 0.65
End
