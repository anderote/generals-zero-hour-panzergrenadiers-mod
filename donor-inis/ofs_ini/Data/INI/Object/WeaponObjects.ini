Object TeslaBeamLarge
  ; *** ART Parameters ***
  Draw = W3DLaserDraw ModuleTag_1229
    Texture = EXTesla.tga
    NumBeams = 1     ; Number of overlapping cylinders that make the beam. 1 beam will just use inner data.
    InnerBeamWidth = 10     ; The total width of beam
    InnerColor = R:255 G:255 B:255 A:255     ; The inside color of the laser (hot)
    OuterBeamWidth = 10     ; The total width of beam
    OuterColor = R:255 G:255 B:255 A:255     ; The outside color of the laser (cool)
    Tile = No     ; The height of the texture will determine how many times to tile the texture to fit without scaling.
    ; ScrollRate = 35     ; Scrolls the texture offset this fast -- towards(-) away(+)
    Segments = 1     ; Number of segments -- more segments give smoother curve (but more joints) Current max: 20
    SegmentOverlapRatio = 1     ; This value overlaps(+) or separates(-) the segments by ratio
    TilingScalar = 1.0     ; Stretches tiling if value > 1.0, otherwise shrinks it (1.0 is natural)
  End
  KindOf = IMMOBILE
  ClientUpdate = LaserUpdate ModuleTag_1230
    MuzzleParticleSystem = SparksMedium
    TargetParticleSystem = SparksMedium
  End
  ; Used as a weapon, this is essentially a fast pulse laser. Adjusting
  ; the lifetime values will determine how long it renders. The damage
  ; is applied immediately, so lifetime doesn't matter.
  Behavior = LifetimeUpdate ModuleTag_1231
    MinLifetime = 200     ; min lifetime in msec
    MaxLifetime = 200     ; max lifetime in msec
  End
  Behavior = DestroyDie ModuleTag_1232
  ; nothing
  End
  Scale = 20
End
