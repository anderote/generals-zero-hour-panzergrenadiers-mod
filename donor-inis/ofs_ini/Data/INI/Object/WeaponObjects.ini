Object Chem_Su24Bomb
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_104
    DefaultConditionState
      Model = UVSu24_B
      ParticleSysBone = None BombTrailSmall
    End
  End
  ; ***DESIGN parameters ***
  Side = America
  EditorSorting = SYSTEM
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  VisionRange = 0.0
  ; *** AUDIO Parameters ***
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_105
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  Behavior = PhysicsBehavior ModuleTag_106
    Mass = 75.0
    AerodynamicFriction = 2     ; this is now friction-per-sec
    ForwardFriction = 2     ; this is now friction-per-sec
    CenterOfMassOffset = 2     ; Default of 0 means nothing tips as it falls.  Positive tips forward, negative tips back
  End
  ; it may seem odd to have a "bomb" with a Locomotor, especially a Thrust locomotor,
  ; but there's a good reason: the Aurora moves so freakin' fast that it's really
  ; hard to (1) find a reliable drop location, and (2) actually get it close enough to
  ; that location. So we cheat: just get fairly close, then let the "bomb" do a little (subtle)
  ; navigation on the way down. This works pretty well and actually looks much better
  ; than you might think. (srj)
  Behavior = MissileAIUpdate ModuleTag_107
    TryToFollowTarget = No
    FuelLifetime = 0
    IgnitionDelay = 0
    InitialVelocity = 0     ; in dist/sec
    DistanceToTravelBeforeTurning = 0
    DistanceToTargetBeforeDiving = 0
  End
  
   Behavior = FireWeaponWhenDeadBehavior ModuleTag_Toxin1
    DeathWeapon = Su25AnthraxFieldWeaponGamma
    StartsActive = No
    TriggeredBy = Chem_Upgrade_GLAAnthraxGamma Upgrade_GLAExtraMissiles
    RequiresAllTriggers = Yes     ; 
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Toxin2
    DeathWeapon = Su25AnthraxFieldWeapon
    StartsActive = No     ; turned on by upgrade
    TriggeredBy = Upgrade_GLAAnthraxBeta Upgrade_GLAExtraMissiles
    RequiresAllTriggers = Yes     ; TriggeredBy is an AND, not an OR like it normally is
    ConflictsWith = Chem_Upgrade_GLAAnthraxGamma
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Toxin3
    DeathWeapon = Su25ToxinFieldWeapon
    StartsActive = No     ; turned on by upgrade
    TriggeredBy = Upgrade_GLAExtraMissiles
    ConflictsWith = Upgrade_GLAAnthraxBeta Chem_Upgrade_GLAAnthraxGamma
  End
  
  Locomotor = SET_NORMAL NukeBomberBombLocomotor     ; yes, that's right.
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 2.0
  Scale = 1.1
End

