Object ZGen_OrcaGunshipLaserBeam
  Draw = W3DLaserDraw ModuleTag_702
    Texture = FXObeliskLaserHeroic.tga ;FXRailGunCore.tga ;dds ;EXRedLzrBm.tga
    NumBeams = 1;5     ; Number of overlapping cylinders that make the beam. 1 beam will just use inner data.
    InnerBeamWidth = 7.5     ; The total width of beam
    InnerColor = R:240 G:240 B:255 A:250 ;R:0 G:25 B:255 A:250     ; The inside color of the laser (hot)
    OuterBeamWidth = 12.0    ; The total width of beam
    OuterColor = R:200 G:200 B:255 A:150 ;R:25 G:50 B:200 A:150     ; The outside color of the laser (cool)
    ;------------------
    Tile = Yes ;No     ; The height of the texture will determine how many times to tile the texture to fit without scaling.
    ScrollRate = -2.5 ;-10 ;-70     ; Scrolls the texture offset this fast -- towards(-) away(+)
    Segments = 1     ; Number of segments -- more segments give smoother curve (but more joints) Current max: 20
    SegmentOverlapRatio = 0     ; This value overlaps(+) or separates(-) the segments by ratio
    TilingScalar = 1.0     
  ; MaxIntensityLifetime = 2000     ;Laser stays at max intensity for specified time in ms.
  ; FadeLifetime = 0                ;Laser will fade and delete.
  ; @todo -- add shot ability functionality (instead of instant point A to B)
  End
  KindOf = IMMOBILE
  Behavior = LifetimeUpdate ModuleTag_703
    MinLifetime = 500 ;300    ; min lifetime in msec
    MaxLifetime = 500 ;300    ; max lifetime in msec
  End
  ClientUpdate = LaserUpdate ModuleTag_704
    ;MuzzleParticleSystem = GenericRedLaserFlare ;PaladinPointDefenseLaserFlare
    MuzzleParticleSystem = GenericBlueLaserFlareMedium
    TargetParticleSystem = GenericBlueLaserFlareLarge ;GenericRedLaserFlare
    PunchThroughScalar = 1.3     ; If our target dies, we get this much bigger so it looks like we punched through
  End
End
