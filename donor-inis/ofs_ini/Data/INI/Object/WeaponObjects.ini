  Draw = W3DModelDraw ModuleTag_415
    ConditionState = NONE
      Model = EXTankShell
      ParticleSysBone = NONE TankShellTrail
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:TankShell
  EditorSorting = SYSTEM
  ArmorSet
    Armor = ProjectileArmor
  End
  VisionRange = 0.0
  ; *** ENGINEERING Parameters ***
  KindOf = PROJECTILE
  Body = ActiveBody ModuleTag_416
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  Behavior = DestroyDie ModuleTag_417
  ; nothing
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_418 ;ToxinShells
    DeathWeapon = ToxinShellWeapon
    StartsActive = No     ; turned on by upgrade
    TriggeredBy = Upgrade_GLAToxinShells
    ConflictsWith = Upgrade_GLAAnthraxBeta Chem_Upgrade_GLAAnthraxGamma Chem_Upgrade_Immunization
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_419 ;ToxinShells + Beta
    DeathWeapon = ToxinShellWeaponUpgraded
    StartsActive = No     ; turned on by upgrade
    TriggeredBy = Upgrade_GLAAnthraxBeta Upgrade_GLAToxinShells
    RequiresAllTriggers = Yes     ; TriggeredBy is an AND, not an OR like it normally is
    ConflictsWith = Chem_Upgrade_GLAAnthraxGamma Chem_Upgrade_Immunization
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag99 ;ToxingShells + Gamma
    DeathWeapon = Chem_ToxinShellWeaponGamma
    StartsActive = No
    TriggeredBy = Chem_Upgrade_GLAAnthraxGamma Upgrade_GLAToxinShells
    RequiresAllTriggers = Yes     ; 
    ConflictsWith = Chem_Upgrade_Immunization
  End
  
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_Chem1 ;ToxingShells + Gamma + Immunization
    DeathWeapon = Chem_ToxinShellWeaponGamma ;dummy object choose FF and beta/gamma
    StartsActive = No
    TriggeredBy = Upgrade_GLAToxinShells Chem_Upgrade_Immunization
    RequiresAllTriggers = Yes     ; 
  End
  
  Behavior = DumbProjectileBehavior ModuleTag_420
    DetonateCallsKill = Yes
    ; To tweak a Bezier path, please see GS
    FirstHeight = 5;10     ; Height of Bezier control points above highest intervening terrain
    SecondHeight = 5;10
    FirstPercentIndent = 50%     ; Percentage of shot distance control points are placed
    SecondPercentIndent = 90%
    FlightPathAdjustDistPerSecond = 100     ; Can allow a max speed this can attempt to follow a target. Units are their velocity we can tag.
  End
  Behavior = PhysicsBehavior ModuleTag_421
    Mass = 0.01     ; can't be zero, but we want it tiny so that it travels nearly straight
  End
  ; The Toxin explosions don't want to double up on particles, so only play this effect if we don't have Toxin
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_422
    DeathWeapon = ScorpionTankGunFXWeapon
    StartsActive = Yes
    ConflictsWith = Upgrade_GLAToxinShells
  End
  Behavior = WeaponBonusUpgrade ModuleTag_ToxShell
    TriggeredBy = Upgrade_GLAToxinShells
  End
  Scale = 0.85
  Geometry = Sphere
  GeometryIsSmall = Yes
  GeometryMajorRadius = 1.0
End
