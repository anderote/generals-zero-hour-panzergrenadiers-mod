Object SOCOM_AmericaApacheTurret    ; Seperate turret object so it can attack independantly
  ; *** ART Parameters ***
  SelectPortrait = SNPropSpeaker_L
  ButtonImage = SNPropSpeaker

  Draw = W3DDependencyModelDraw ModuleTag_418
    DefaultConditionState
      Model = AvApacheNew_G ;NVKA50_NG
      Turret = TURRET
      TurretPitch = TURRETEL
      WeaponMuzzleFlash = PRIMARY MuzzleFX
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponLaunchBone = PRIMARY Muzzle
    End
    AttachToBoneInContainer = Firepoint01
  End
  PlacementViewAngle = -45
  ; ***DESIGN parameters ***
  Side = AmericaSocomGeneral
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  WeaponSet
    Conditions = None
    Weapon = PRIMARY Apache30mmCannonWeapon ;Blackshark30mmCannonWeapon ;Blackshark_NeutronGattlingGun
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY Apache30mmCannonWeapon ;Blackshark30mmCannonWeapon ;Blackshark_NeutronGattlingGun
  End
  
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor     ; We can't be hurt on the field.  We share damage from the Avenger with his damage module
  End
  VisionRange = 200
  
  Behavior = WeaponSetUpgrade ModuleTag_02
    TriggeredBy = Upgrade_ComancheRocketPods
  End
  
  ; *** AUDIO Parameters ***
  UnitSpecificSounds
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound     ; TurretMoveLoop
  End
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CLICK_THROUGH IGNORED_IN_GUI
  Body = StructureBody ModuleTag_181
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  Behavior = AIUpdateInterface ModuleTag_182
    Turret
      ControlledWeaponSlots = PRIMARY ;SECONDARY
      TurretTurnRate = 180     ; turn rate, in degrees per sec
      TurretPitchRate = 180
      AllowsPitch = Yes
      MinPhysicalPitch = -85
      NaturalTurretPitch = 0 ;45
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 500     ; default is 2000
  End
  Behavior = DestroyDie ModuleTag_183
  ; <No Data>
  End
  Geometry = BOX
  GeometryMajorRadius = 6.0
  GeometryMinorRadius = 6.0
  GeometryHeight = 10.0
  GeometryIsSmall = No
  ;Shadow = SHADOW_VOLUME
  ;ShadowSizeX = 45     ; minimum elevation angle above horizon. Used to limit shadow length
End


