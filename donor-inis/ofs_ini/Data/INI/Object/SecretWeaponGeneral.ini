; ------------------------------------------------------------------------------
Object SecW_ChinaJetNapalmBomber
  ; *** ART Parameters ***
  SelectPortrait = SNMigBomberX_L ;SNNukeBomber
  ButtonImage = SNMigBomberX ;SNNukeBomber
  UpgradeCameo1 = Upgrade_ChinaAircraftArmor
  UpgradeCameo2 = Upgrade_SecW_PurifiedNapalm
  ;UpgradeCameo3 = GenericGenpowerUpgrade_One
  ; UpgradeCameo4 = NONE
  ; UpgradeCameo5 = NONE
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = NVMigBomberX ;NukeBomber
      HideSubObject = BurnerFX01 BurnerFX02
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponFireFXBone = PRIMARY WeaponA
    End
    ConditionState = JETEXHAUST
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = JETEXHAUST JETAFTERBURNER
      ShowSubObject = BurnerFX01 BurnerFX02
      ParticleSysBone = Exhaust01 JetExhaust
      ParticleSysBone = Exhaust02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = REALLYDAMAGED
      Model = NVMigBomberX_D
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = RUBBLE
      Model = NVMigBomber_D1
    End
    ConditionState = REALLYDAMAGED JETEXHAUST
      Model = NVMigBomberX_D
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = REALLYDAMAGED JETEXHAUST JETAFTERBURNER
      Model = NVMigBomberX_D
      ShowSubObject = BurnerFX01 BurnerFX02
      ParticleSysBone = Engine01 JetExhaust
      ParticleSysBone = Engine02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = RUBBLE JETEXHAUST JETAFTERBURNER
      ; @todo srj -- model missing
      ; Model              = NVMIG_D1B
      Model = NVMigBomber_D1
      ; HideSubObject is needed cause there're inherited from default condition state
      HideSubObject = None
      ShowSubObject = None
      ParticleSysBone = Engine01 JetExhaust
      ParticleSysBone = Engine02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:MIGBomber
  EditorSorting = VEHICLE
  Side = ChinaSecretWeaponsGeneral
  TransportSlotCount = 0     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange = 200.0
  ShroudClearingRange = 300.0
  Prerequisites
    Object = ChinaAirfield TEST_MODE
    Object = ChinaPropagandaCenter TEST_MODE
  End
  WeaponSet
    Conditions = None
    Weapon = PRIMARY ChinaBlackNapalmBomberWeapon
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY ChinaRedNapalmBomberWeapon
  End
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = None
  End
  ArmorSet
    Conditions            = PLAYER_UPGRADE
    Armor                 = CountermeasuresAirplaneArmor
    DamageFX              = None
  End
  BuildCost = 1800
  BuildTime = 17
  ExperienceValue = 50 75 130 180     ; Experience point value at each level
  ExperienceRequired = 0 100 200 400     ; Experience points needed to gain each level
  IsTrainable = Yes     ; Can gain experience
  CrusherLevel = 1     ; What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = Generic_JetBomberCommandSet ;Nuke_ChinaJetNukeBomberCommandSet
  ; *** AUDIO Parameters ***
  VoiceSelect = ChimeraVoiceSelect
  VoiceMove = ChimeraVoiceMove
  VoiceAttack = ChimeraVoiceAttack
  ;VoiceAttackAir = MigVoiceAttackAir
  VoiceGuard = ChimeraVoiceMove
  SoundAmbient = MigBomberAmbientLoop
  SoundStealthOn = StealthOn
  SoundStealthOff = StealthOff
  UnitSpecificSounds
    VoiceCreate = ChimeraVoiceCreate
    Afterburner = MigBomberAfterburner
    VoiceGarrison = ChimeraVoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT
  Body = ActiveBody ModuleTag_02
    MaxHealth = 180.0
    InitialHealth = 180.0
  End
  
  Behavior                = ArmorUpgrade ModuleTag_Armor01
    TriggeredBy           = GenericGenpowerUpgrade_One
  End
  Behavior                = CountermeasuresBehavior Upgrade_CM
    TriggeredBy           = GenericGenpowerUpgrade_One
    FlareTemplateName     = SecW_CountermeasureECM ;CountermeasureFlare
    FlareBoneBaseName     = Flare ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize            = 3     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle        = 90.0  ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor  = 1.0   ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys   = 1000  ; Time between flare volleys
    NumberOfVolleys       = 3     ; Number of times the volleys will fire before reloading
    ReloadTime            = 0     ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate           = 30%   ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 0     ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay     = 200   ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End
  
  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 1500     ; msec
    StealthForbiddenConditions = FIRING_PRIMARY
    ; not currently used... but maybe someday? (srj)
    ; RevealDistanceFromTarget             = 0.0f
    FriendlyOpacityMin = 50.0%
    FriendlyOpacityMax = 100.0%
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End
  
  Behavior = JetSlowDeathBehavior ModuleTag_03
    FXOnGroundDeath = FX_JetOnGroundDeath
    OCLOnGroundDeath = OCL_MIGBomberDeathFinalBlowUp
    DestructionDelay = 99999999     ; destruction will happen when we
    RollRate = 0.2
    RollRateDelta = 100%     ; each frame, rollrate = rollrate * rollrateDelta
    PitchRate = 0.0
    FallHowFast = 110.0%     ; Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath = FX_ChimeraDeathInitial
    OCLInitialDeath = OCL_MIGBomberDeathInitial
    DelaySecondaryFromInitialDeath = 500     ; in milliseconds
    FXSecondary = FX_JetDeathSecondary
    OCLSecondary = OCL_MIGDeathSecondary
    FXHitGround = FX_JetDeathHitGround
    OCLHitGround = OCL_MIGBomberDeathHitGround
    DelayFinalBlowUpFromHitGround = 200     ; in milliseconds
    FXFinalBlowUp = FX_JetDeathFinalBlowUp
    OCLFinalBlowUp = OCL_MIGBomberDeathFinalBlowUp
  End
  Behavior = WeaponSetUpgrade ModuleTag_04
    TriggeredBy = Upgrade_SecW_PurifiedNapalm
  End
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 500.0
  End
  Behavior = JetAIUpdate ModuleTag_06
    OutOfAmmoDamagePerSecond = 10%     ; amount of damage to take per SEC (not per frame) when out of ammo
    ; note that it's expressed as a percent of max health, not an absolute
    TakeoffDistForMaxLift = 0%     ; larger numbers give more lift sooner when taking off
    TakeoffPause = 500
    MinHeight = 5
    ReturnToBaseIdleTime = 10000     ; if idle for this long, return to base, even if not out of ammo
  End
  Locomotor = SET_NORMAL MIGLocomotor
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor
  Behavior = FlammableUpdate ModuleTag_08
    AflameDuration = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay = 500     ; this often.
  End
  Behavior = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes Psys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_MIGDamageTransition
  End
  Behavior = MaxHealthUpgrade ModuleTag_10
    TriggeredBy = Upgrade_ChinaAircraftArmor
    AddMaxHealth = 45.0 ;25% ;50.0
    ChangeType = ADD_CURRENT_HEALTH_TOO     ; Choices are PRESERVE_RATIO, ADD_CURRENT_HEALTH_TOO, and SAME_CURRENTHEALTH
  End
  
  Behavior = ProductionUpdate ModuleTag_11
    MaxQueueEntries = 1     ; So you can't build multiple upgrades in the same frame
  End
  
  Geometry = Box
  GeometryIsSmall = Yes
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 5.0
  Shadow = SHADOW_VOLUME
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89     ; minimum elevation angle above horizon. Used to limit shadow length
End

