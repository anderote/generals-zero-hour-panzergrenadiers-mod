Object SecW_ChinaVehicleHellhound
  ; *** ART Parameters ***
  SelectPortrait = SNHellhound_L
  ButtonImage = SNHellhound
  UpgradeCameo1 = Upgrade_SecW_PurifiedNapalm
  UpgradeCameo2 = Upgrade_ChinaAircraftArmor ;Upgrade_ChinaHelixPropagandaTower
  ;-----------------------
  ;Chassis + Guns (-Rotors)
  Draw = W3DModelDraw ModuleTag_01     ; Works with the dependencyModelDraw of the upgrade portable structures
    ProjectileBoneFeedbackEnabledSlots = SECONDARY
    ParticlesAttachedToAnimatedBones = Yes

    DefaultConditionState
      Model = NVHellhound
      Animation = NVHellhound.NVHellhound
      AnimationMode = LOOP
      TurretPitch = TURRETEL01
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MUZZLEFX
      WeaponLaunchBone = PRIMARY Muzzle
      WeaponRecoilBone = PRIMARY BARREL
      WeaponFireFXBone = SECONDARY WEAPONA
      WeaponLaunchBone = SECONDARY WEAPONA
      WeaponFireFXBone = TERTIARY WEAPONB
      WeaponLaunchBone = TERTIARY WEAPONB
    End
    
    ConditionState = MOVING
      ParticleSysBone = ENGINE01 HellhoundExhaust
      ParticleSysBone = ENGINE02 HellhoundExhaust
    End
    ConditionState = REALLYDAMAGED RUBBLE
      Model = NVHellhound_D
      Animation = NVHellhound_D.NVHellhound_D
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED RUBBLE MOVING
      Model = NVHellhound_D
      Animation = NVHellhound_D.NVHellhound_D
      AnimationMode = LOOP
      ParticleSysBone = ENGINE01 HellhoundExhaust
      ParticleSysBone = ENGINE02 HellhoundExhaust
    End
    ConditionState = RUBBLE SPECIAL_DAMAGED
      Model = NVHellhound_D
    End
    OkToChangeModelColor = Yes
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Hellhound
  EditorSorting = VEHICLE
  Side = ChinaSecretWeaponsGeneral
  TransportSlotCount = 0     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange = 200.0
  ShroudClearingRange = 600
  BuildCost = 1600
  BuildTime = 20.0     ; in seconds
  Prerequisites
    Object = ChinaAirfield TEST_MODE
    Object = ChinaPropagandaCenter TEST_MODE
  End
  ExperienceValue = 50 100 150 200     ; Experience point value at each level
  ExperienceRequired = 0 100 200 400     ; Experience points needed to gain each level
  IsTrainable = Yes
  CommandSet = ChinaVehicleHellhoundCommandSet
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor ;ChinookArmor
    DamageFX = None
  End
  ArmorSet
    Conditions            = PLAYER_UPGRADE
    Armor                 = CountermeasuresAirplaneArmor
    DamageFX              = None
  End
  WeaponSet
    Conditions = None
    ; ----------------------------
    Weapon = PRIMARY HellionCannonWeapon
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
    ; -- Missiles ---
    Weapon = SECONDARY ChinaLAHMissileWeapon
    AutoChooseSources = SECONDARY FROM_PLAYER FROM_SCRIPT FROM_AI
  ; ----------------------------
    Weapon = TERTIARY HellhoundRocketPodWeapon
    AutoChooseSources = TERTIARY NONE
  End
  ;---
  WeaponSet
    Conditions = PLAYER_UPGRADE
    ; ----------------------------
    Weapon = PRIMARY HellionCannonWeapon
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
    ; -- Missiles ---
    Weapon = SECONDARY ChinaLAHMissileWeapon
    AutoChooseSources = SECONDARY FROM_PLAYER FROM_SCRIPT FROM_AI
  ; ----------------------------
    Weapon = TERTIARY HellhoundRocketPodWeaponUpgraded
    AutoChooseSources = TERTIARY NONE
  End
  ; *** AUDIO Parameters ***
  VoiceSelect = ChinaHeliVoiceSelect
  VoiceMove = ChinaHeliVoiceMove
  VoiceGuard = ChinaHeliVoiceMove
  VoiceAttack = ChinaHeliVoiceAttack
  SoundAmbient = HellhoundAmbientLoop
  SoundAmbientRubble = NoSound
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = ChinaHeliVoiceCreate
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    Afterburner = RaptorAfterburner
    VoiceGarrison = ChinaHeliVoiceMove
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound
    VoiceFireRocketPods = ChinaHeliVoiceAttackRocket
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  ; note that, although Helixes aren't produced at helipads, we want to set this KINDOF so that they can land at
  ; (well, "near" actually) an Airfield to get healed...
  KindOf = PRELOAD CAN_CAST_REFLECTIONS SELECTABLE VEHICLE AIRCRAFT SCORE PRODUCED_AT_HELIPAD CAN_ATTACK
  Body = ActiveBody ModuleTag_03
    MaxHealth = 210.0
    InitialHealth = 210.0
  End
  
  Behavior = WeaponSetUpgrade ModuleTag_04b
    TriggeredBy = Upgrade_SecW_PurifiedNapalm
  End
  
  Behavior = FXListDie ModuleTag_05
    DeathFX = FX_HelicopterStartDeath
  End
  Behavior = TransitionDamageFX ModuleTag_06
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_ComancheDamageTransition
  End
  Behavior = JetAIUpdate ModuleTag_07
    MinHeight = 5
    NeedsRunway = No
    KeepsParkingSpaceWhenAirborne = No
    AutoAcquireEnemiesWhenIdle = Yes
    Turret
      TurretTurnRate = 0
      TurretPitchRate = 90
