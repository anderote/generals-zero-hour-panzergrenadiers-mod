; ------------------------------------------------------------------------------
Object Demo_ScudStormMissile
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_001
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = UBScudStrm_M
    End
    ConditionState = DAMAGED REALLYDAMAGED RUBBLE
      Model = NONE
    End
  End
  ; ***DESIGN parameters ***
  KindOf = PROJECTILE     ; BALLISTIC_MISSILE
  EditorSorting = SYSTEM
  VisionRange = 300.0
  ShroudClearingRange = 0
  TransportSlotCount = 10
  ArmorSet
    Conditions = None
    Armor = ProjectileArmor
    DamageFX = None
  End
  ; *** AUDIO Parameters ***
  ; SoundFallingFromPlane = DaisyCutterWeapon
  ; *** ENGINEERING Parameters ***
  Body = ActiveBody ModuleTag_002
    MaxHealth = 10000.0
    InitialHealth = 10000.0
  End
  Behavior = PhysicsBehavior ModuleTag_003
    Mass = 500.0
  End
  Behavior = MissileAIUpdate ModuleTag_004
    TryToFollowTarget = No
    FuelLifetime = 0     ; zero is infinite
    InitialVelocity = 0     ; in dist/sec
    IgnitionFX = FX_ScudStormIgnition
    DistanceToTravelBeforeTurning = 500
    DistanceToTargetBeforeDiving = 200     ; When I hit this close to target, I ignore PreferredHeight.
  End
  Locomotor = SET_NORMAL SCUDStormMissileLocomotor
  Behavior = HeightDieUpdate ModuleTag_005
    TargetHeight = 15.0
    TargetHeightIncludesStructures = Yes
    OnlyWhenMovingDown = Yes
    SnapToGroundOnDeath = Yes
    InitialDelay = 1000     ; Can't explode in the first second so we don't explode on the pad
  End
  Behavior = DestroyDie ModuleTag_006
  ; nothing
  End
  Behavior = SpecialPowerCompletionDie ModuleTag_007
    SpecialPowerTemplate = SuperweaponScudStorm
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_008
    DeathWeapon = ScudStormDamageWeapon ;Demo_ScudStormDamageWeapon
    StartsActive = Yes
  End
  Geometry = Cylinder
  GeometryIsSmall = Yes
  GeometryMajorRadius = 7.0
  GeometryHeight = 30.0
End
