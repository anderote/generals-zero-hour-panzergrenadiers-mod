    OCL = INITIAL OCL_DeadRocketeer
    ;FlingForce = 15
    ;FlingForceVariance = 15
    ;FlingPitch = -10
    ;FlingPitchVariance = 90
  End
  
  ;Behavior = AutoHealBehavior ModuleTag_HeliArmor
  ;  HealingAmount = 3
  ;  HealingDelay = 1000     ; msec
  ;  TriggeredBy = AirF_Upgrade_StealthComanche
  ;End
  
  ;JETAIUPDATE is not allowed, or else it won't move to rallypoint
  Behavior = AIUpdateInterface ModuleTag_AI
 ; Behavior = JetAIUpdate ModuleTag_107
 ;   MinHeight = 5
 ;   NeedsRunway = No
 ;   KeepsParkingSpaceWhenAirborne = No
    AutoAcquireEnemiesWhenIdle = Yes
    ; note that comanches do not return to base when idle
    ; this is a bit of a trick... normally, units cannot move-and-fire at
    ; the same time. we need the comanche to be able to. so we give it
    ; a "turret" (invisible) and put the two main weapons on it, but with
    ; no turn rate. voila!
    Turret
      TurretTurnRate = 180     
      TurretPitchRate = 180     
      AllowsPitch = Yes
      MinPhysicalPitch = -35
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
  End
  Locomotor = SET_NORMAL RocketeerLocomotor_Ground RocketeerLocomotor
  ;Locomotor = SET_TAXIING BasicHelicopterTaxiLocomotor
  
  Behavior = LockWeaponCreate ModuleTag_186
