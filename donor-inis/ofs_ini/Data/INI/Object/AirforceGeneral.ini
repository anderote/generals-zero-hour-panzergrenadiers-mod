Object AirF_AmericaVehicleDefenseDroneTurret
  ; *** ART Parameters ***
  Draw = W3DDependencyModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    AttachToBoneInContainer = CHASSIS
    DefaultConditionState
      Model = AVDefDrone_T
      Animation = AVDefDrone_T.AVDefDrone_T
      AnimationMode = MANUAL
      Turret = Turret
      TurretPitch = TurretEl
      AltTurret = TurretB
      AltTurretPitch = TurretELB
      WeaponLaunchBone = PRIMARY WEAPONA
      WeaponFireFXBone = PRIMARY WEAPONA
      WeaponMuzzleFlash = PRIMARY MUZZLEFX
      WeaponLaunchBone = SECONDARY WEAPONB
      WeaponFireFXBone = SECONDARY WEAPONB
    End
    ConditionState = ATTACKING
       AnimationMode = LOOP    
       Animation = AVDefDrone_T.AVDefDrone_T
       Turret = Turret
       TurretPitch = TurretEl
       AltTurret = TurretB
       AltTurretPitch = TurretELB
       WeaponLaunchBone = PRIMARY WEAPONA
       WeaponFireFXBone = PRIMARY WEAPONA
       WeaponMuzzleFlash = PRIMARY MUZZLEFX
       WeaponLaunchBone = SECONDARY WEAPONB
       WeaponFireFXBone = SECONDARY WEAPONB
    End
  End
  ; ***DESIGN parameters ***
  Side = AmericaAirForceGeneral
  EditorSorting = SYSTEM
  TransportSlotCount = 1
  WeaponSet
    Conditions = None
    Weapon = PRIMARY AirF_DefenseDroneCannonWeapon
    Weapon = SECONDARY AirF_DefenseDroneMissileWeapon
  End
  ArmorSet
    Conditions = None
    Armor = InvulnerableAllArmor     ; We can't be hurt on the field.  We share damage from the Overlord with his damage module
  End
  VisionRange = 250
  ;EnergyProduction = -1
  ; *** AUDIO Parameters ***
  UnitSpecificSounds
    TurretMoveStart = NoSound
    TurretMoveLoop = NoSound     ; TurretMoveLoop
    VoiceRapidFire = NoSound
  End
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD PORTABLE_STRUCTURE CAN_ATTACK CLICK_THROUGH IGNORED_IN_GUI ;POWERED
  Body = StructureBody ModuleTag_02
    MaxHealth = 100.0
    InitialHealth = 100.0
  End
  Behavior = AIUpdateInterface ModuleTag_03
    Turret
      TurretTurnRate = 720 ;180
      TurretPitchRate = 720 ;180
      MinPhysicalPitch = -90
      ControlledWeaponSlots = PRIMARY
    End
    AltTurret
      TurretTurnRate = 720 ;90     ; this "turret" does not turn
      TurretPitchRate = 720 ;90     ; nor does it pitch
      ControlledWeaponSlots = SECONDARY TERTIARY
    End
    AutoAcquireEnemiesWhenIdle = Yes ATTACK_BUILDINGS
    MoodAttackCheckRate = 33
  End
  Behavior = DestroyDie ModuleTag_04
  ; nothing
  End
  Geometry = BOX
  GeometryMajorRadius = 8.0
  GeometryMinorRadius = 8.0
  GeometryHeight = 9.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89     ; minimum elevation angle above horizon. Used to limit shadow length
End

