Object AirF_AmericaJetBurtonAirstrikeBomber ;burton Airstrike A10
  ; *** ART Parameters ***
  SelectPortrait = AV_A10_L
  ButtonImage = AV_A10
  UpgradeCameo1 = Upgrade_AmericaLaserMissiles
  UpgradeCameo2 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo3 = Upgrade_AmericaCountermeasures
  ;UpgradeCameo4 = Upgrade_AmericaBunkerBusters
  ; UpgradeCameo4 = NONE
  ; UpgradeCameo5 = NONE
  Draw = W3DModelDraw ModuleTag_690
   ProjectileBoneFeedbackEnabledSlots = SECONDARY
   ParticlesAttachedToAnimatedBones = Yes
   DefaultConditionState ; = NONE
     Model = AVA10_S ;AVF35
     ParticleSysBone = Wingtip01 JetContrail
     ParticleSysBone = Wingtip02 JetContrail      

     WeaponMuzzleFlash = PRIMARY MuzzleFX
     WeaponLaunchBone = SECONDARY WeaponA
     WeaponFireFXBone = SECONDARY WeaponA
    End
    AliasConditionState = RIDER1
    ;--
    ConditionState = RIDER2
      Model = AVA10_S2
      ;ParticleSysBone = Wingtip01 JetContrail
      ;ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = RIDER3
      Model = AVA10_S2
      ;ParticleSysBone = Wingtip01 JetContrail
      ;ParticleSysBone = Wingtip02 JetContrail
      HideSubObject = WeaponA01 WeaponA02 WeaponA03 WeaponA04 WeaponA05 WeaponA06
    End
    ;--
    ConditionState = REALLYDAMAGED
      Model = AVA10_SD
      ParticleSysBone = Smoke01 JetSmoke
      ParticleSysBone = EXHAUST01 JetEngineDamagedSmoke
    End
    AliasConditionState = RIDER1 REALLYDAMAGED
    ;--
    ConditionState = RIDER2 REALLYDAMAGED
      Model = AVA10_S2D
      ParticleSysBone = Smoke01 JetSmoke
      ParticleSysBone = EXHAUST01 JetEngineDamagedSmoke
    End
    ConditionState = RIDER3 REALLYDAMAGED
      Model = AVA10_S2D
      ParticleSysBone = Smoke01 JetSmoke
      ParticleSysBone = EXHAUST01 JetEngineDamagedSmoke
      HideSubObject = WeaponA01 WeaponA02 WeaponA03 WeaponA04 WeaponA05 WeaponA06
    End
    ;--
    OkToChangeModelColor = Yes
  End
  
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:A10Thunderbolt
  EditorSorting = VEHICLE
  Side = AmericaAirForceGeneral
  TransportSlotCount = 0     ; how many "slots" we take in a transport (0 == not transportable)
  ;VisionRange = 250.0
  ;ShroudClearingRange = 400
  WeaponSet
    Conditions = WEAPON_RIDER1
    Weapon = PRIMARY None
    Weapon = SECONDARY AirF_BurtonAirstrikeBomberWeapon ;AirF_A10_GAU8WeaponSpecial

    AutoChooseSources = PRIMARY NONE
    AutoChooseSources = SECONDARY NONE
  End
  WeaponSet
    Conditions = WEAPON_RIDER2
    Weapon = SECONDARY AirF_BurtonAirstrikeJetDummyWeapon
    AutoChooseSources = SECONDARY NONE
  End
  WeaponSet
    Conditions = WEAPON_RIDER3
    Weapon = SECONDARY NONE
    AutoChooseSources = SECONDARY NONE
  End
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = None
  End
  ArmorSet
    Conditions = PLAYER_UPGRADE
    Armor = CountermeasuresAirplaneArmor ;CountermeasuresComancheArmor
    DamageFX = None
  End

  SoundAmbient = A10ThunderboltAmbientLoop
  SoundAmbientRubble = NoSound

  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK VEHICLE AIRCRAFT
  Body = ActiveBody ModuleTag_693
    MaxHealth = 400 ;350.0
    InitialHealth = 400 ;350.0
  End
 
  Behavior = JetSlowDeathBehavior ModuleTag_A10Death
    DeathTypes = ALL -SUICIDED
    DestructionDelay = 99999999     ; destruction will happen when we
    RollRate = 0.0
    RollRateDelta = 100%     ; each frame, rollrate = rollrate * rollrateDelta
    PitchRate = 0.0
    FallHowFast = 110.0%     ; Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath = FX_JetDeathInitial
    OCLInitialDeath = None
    DelaySecondaryFromInitialDeath = 500     ; in milliseconds
    FXSecondary = FX_JetDeathSecondary
    OCLSecondary = None
    FXHitGround = FX_JetDeathHitGround
    OCLHitGround = OCL_NewA10DeathHitGround
    DelayFinalBlowUpFromHitGround = 200     ; in milliseconds
    FXFinalBlowUp = FX_JetDeathFinalBlowUp
    OCLFinalBlowUp = OCL_NewA10DeathFinalBlowUp
  End
  Behavior = PhysicsBehavior ModuleTag_697
    Mass = 500.0
  End
  Behavior = TransitionDamageFX ModuleTag_698
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes Psys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_MIGDamageTransition
  End
  Behavior = JetAIUpdate ModuleTag_699
    MinHeight = 10
    NeedsRunway = No
    ;DummyTurrets
    Turret
      TurretTurnRate = 0     ; 60   // turn rate, in degrees per sec
      ControlledWeaponSlots = PRIMARY SECONDARY TERTIARY
      FiresWhileTurning = Yes
    End
  End
  Locomotor = SET_SLUGGISH AirF_A10JetSpecialLocomotor
  Locomotor = SET_NORMAL AirF_A10JetSpecialLocomotor
  Locomotor = SET_SUPERSONIC AirF_A10JetSpecialLocomotor2


  ;Locomotor = SET_TAXIING BasicJetTaxiLocomotor
  
  Behavior = RiderChangeContain ModuleTag_Transform01
    ;;;;Normal Rank
    Rider1 = DummyRiderOne_Normal   RIDER1 WEAPON_RIDER1 STATUS_RIDER1 AmericaHeavyGunnerCommandSet SET_SLUGGISH
    Rider2 = DummyRiderTwo_Normal  RIDER2 WEAPON_RIDER2 STATUS_RIDER2 AmericaHeavyGunnerCommandSet SET_SUPERSONIC
    Rider3 = DummyRiderThree_Normal  RIDER3 WEAPON_RIDER3 STATUS_RIDER3 AmericaHeavyGunnerCommandSet SET_SUPERSONIC
   
    ;Standard TransportContain stuff
    Slots                 = 1
    InitialPayload        = DummyRiderTwo_Normal 1
    DamagePercentToUnits  = 100%
    BurnedDeathToUnits    = No
    AllowInsideKindOf     = CAN_ATTACK    
    ScuttleDelay          = 100
    ScuttleStatus         = TOPPLED
  End
  
  Behavior = FireWeaponUpdate ModuleTag_FW0a
    Weapon = AirF_BurtonAirstrikeDiveSoundWeapon
    InitialDelay = 500
  End
  Behavior = FireWeaponUpdate ModuleTag_FireWeapon1
    Weapon = AirF_A10_GAU8WeaponSpecial
    InitialDelay = 1500
  End
  Behavior = FireWeaponUpdate ModuleTag_FireWeapon1b
    Weapon = AirF_BurtonAirstrikeGau8SoundWeapon
    InitialDelay = 1500
  End
    
  ;Fire 
  Behavior = OCLUpdate ModuleTag_FireWeapon2
    FactionTriggered = No
    MinDelay = 66
    MaxDelay = 66
    CreateAtEdge = No
    OCL = AirF_OCL_BurtonAirstrikeFireWeaponSecondary
  End
  
  ;Remove Plane
  Behavior = FireWeaponUpdate ModuleTag_Remove
    Weapon = SuicideWeapon_Plane
    InitialDelay = 10000 ;8000
  End
  
  ;Switch to Dive-mode (Start Gau8)
  Behavior = FireWeaponUpdate ModuleTag_FW1
    Weapon = DummyRiderSwitchWeaponOne_Special ;AirF_A10SpecialDummyWeaponOne ;KillSelfWeapon ;AirF_A10SpecialDummyWeaponTwo
    InitialDelay = 2333 ;1500 ;1000
  End
  
  ;Switch to FlyOff-mode
  Behavior = FireWeaponUpdate ModuleTag_FW2
    Weapon = DummyRiderSwitchWeaponThree_Special ;AirF_A10SpecialDummyWeaponOne ;KillSelfWeapon ;AirF_A10SpecialDummyWeaponTwo
    InitialDelay = 3500 ;3500
  End
  
  Behavior = InstantDeathBehavior ModuleTag_1234
    DeathTypes = NONE +SUICIDED
  End
  
  Behavior = FlammableUpdate ModuleTag_700
    AflameDuration = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay = 500     ; this often.
  End
  Behavior = ArmorUpgrade ModuleTag_703
    TriggeredBy = Upgrade_AmericaCountermeasures
  End
  Behavior = CountermeasuresBehavior ModuleTag_704
    TriggeredBy = Upgrade_AmericaCountermeasures
    FlareTemplateName = CountermeasureFlare
    FlareBoneBaseName = Flare     ; Name of the base flare bone (Flare01, Flare02, Flare03)
    VolleySize = 4     ; Number of flares launched per volley (requires bones)
    VolleyArcAngle = 90.0     ; Max angle of flare relative to forward direction (with VolleySize of 1, flare will always goes straight back).
    VolleyVelocityFactor = 2.0     ; Shoots out flares at a stronger velocity with a higher value.
    DelayBetweenVolleys = 1000     ; Time between flare volleys
    NumberOfVolleys = 5     ; Number of times the volleys will fire before reloading
    ReloadTime = 0     ; After all volleys launched, then reloading must occur. If 0, then reloading occurs at airstrip only.
    EvasionRate = 30%     ; With active flares, the specified percentage will be diverted.
    ReactionLaunchLatency = 100     ; Reaction between getting shot at and the firing of the first volley of countermeasures.
    MissileDecoyDelay = 200     ; A reported missile that has been determined to hit a decoy will wait this long before acquiring countermeasures.
  End
  Geometry = Box
  GeometryIsSmall = Yes
  GeometryMajorRadius = 15.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 5.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89     ; minimum elevation angle above horizon. Used to limit shadow length.
End


