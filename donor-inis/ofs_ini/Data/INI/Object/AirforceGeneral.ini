  End
  Behavior = PhysicsBehavior ModuleTag_108
    Mass = 10.0
  End

  Geometry = BOX
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14     ; 
  ShadowSizeY = 14     ; 
  ShadowTexture = ShadowI     ; 
  BuildCompletion = APPEARS_AT_RALLY_POINT
End

