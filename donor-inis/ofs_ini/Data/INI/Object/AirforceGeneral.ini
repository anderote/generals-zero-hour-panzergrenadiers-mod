      ControlledWeaponSlots = PRIMARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
    MoodAttackCheckRate = 100
  End
  
  Behavior = SlavedUpdate ModuleTag_360
    GuardMaxRange = 130 ;65     ; How far away from master I'm allowed when master is idle (doesn't wander)
