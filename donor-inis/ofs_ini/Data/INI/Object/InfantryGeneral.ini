; ------------------------------------------------------------------------------
Object Infa_ChinaJetMIG
  ; *** ART Parameters ***
  SelectPortrait = SNMig29
  ButtonImage = SNMig29
  UpgradeCameo1 = Upgrade_ChinaAircraftArmor
  UpgradeCameo2 = Upgrade_ChinaChainGuns
  ; UpgradeCameo3 = NONE
  ; UpgradeCameo4 = NONE
  ; UpgradeCameo5 = NONE
  Draw = W3DModelDraw ModuleTag_001
    OkToChangeModelColor = Yes
    DefaultConditionState
      Model = NV_Mig29
      HideSubObject = BurnerFX01 BurnerFX02
      WeaponLaunchBone = PRIMARY WeaponA
    End
    ConditionState = JETEXHAUST
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = JETEXHAUST JETAFTERBURNER
      ShowSubObject = BurnerFX01 BurnerFX02
      ParticleSysBone = Exhaust01 JetExhaust
      ParticleSysBone = Exhaust02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = REALLYDAMAGED
      Model = NV_Mig29
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = RUBBLE
      Model = NV_Mig29
    End
    ConditionState = REALLYDAMAGED JETEXHAUST
      Model = NVMIG_D
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = REALLYDAMAGED JETEXHAUST JETAFTERBURNER
      Model = NV_Mig29
      ShowSubObject = BurnerFX01 BurnerFX02
      ParticleSysBone = Engine01 JetExhaust
      ParticleSysBone = Engine02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    ConditionState = RUBBLE JETEXHAUST JETAFTERBURNER
      ; @todo srj -- model missing
      ; Model              = NVMIG_D1B
      Model = NV_Mig29
      ; HideSubObject is needed cause there're inherited from default condition state
      HideSubObject = None
      ShowSubObject = None
      ParticleSysBone = Engine01 JetExhaust
      ParticleSysBone = Engine02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:MIG
  EditorSorting = VEHICLE
  Side = ChinaInfantryGeneral
  TransportSlotCount = 0     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange = 200.0
  ShroudClearingRange = 300.0
  Prerequisites
    Object = Infa_ChinaAirfield
  End
  WeaponSet
    Conditions = None
    Weapon = PRIMARY Infa_Mig29MissileWeapon
    Weapon = SECONDARY Infa_Mig29CannonWeapon
  ; AutoChooseSources = PRIMARY     NONE
  End
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = None
  End
  BuildCost = 1000
  BuildTime = 9
  ExperienceValue = 50 50 100 150     ; Experience point value at each level
  ExperienceRequired = 0 100 200 400     ; Experience points needed to gain each level
  IsTrainable = Yes     ; Can gain experience
  CrusherLevel = 1     ; What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = ChinaJetMIGCommandSet
  ; *** AUDIO Parameters ***
  VoiceSelect = MigVoiceSelect
  VoiceMove = MigVoiceMove
  VoiceAttack = MigVoiceAttack
  VoiceAttackAir = MigVoiceAttackAir
  VoiceGuard = MigVoiceAirPatrol
  SoundAmbient = MigAmbientLoop
  UnitSpecificSounds
    VoiceCreate = MigVoiceCreate
    Afterburner = RaptorAfterburner
    VoiceGarrison = MigVoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT
  Body = ActiveBody ModuleTag_002
    MaxHealth = 160.0
    InitialHealth = 160.0
  End
  Behavior = JetSlowDeathBehavior ModuleTag_003
    FXOnGroundDeath = FX_JetOnGroundDeath
    OCLOnGroundDeath = OCL_MIGDeathFinalBlowUp
    DestructionDelay = 99999999     ; destruction will happen when we
    RollRate = 0.2
    RollRateDelta = 100%     ; each frame, rollrate = rollrate * rollrateDelta
    PitchRate = 0.0
    FallHowFast = 110.0%     ; Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath = FX_MigDeathInitial
    OCLInitialDeath = OCL_MIGDeathInitial
    DelaySecondaryFromInitialDeath = 500     ; in milliseconds
    FXSecondary = FX_JetDeathSecondary
    OCLSecondary = OCL_MIGDeathSecondary
    FXHitGround = FX_JetDeathHitGround
    OCLHitGround = OCL_MIGDeathHitGround
    DelayFinalBlowUpFromHitGround = 200     ; in milliseconds
    FXFinalBlowUp = FX_JetDeathFinalBlowUp
    OCLFinalBlowUp = OCL_MIGDeathFinalBlowUp
  End
  Behavior = PhysicsBehavior ModuleTag_004
    Mass = 500.0
  End
  Behavior = JetAIUpdate ModuleTag_005
    OutOfAmmoDamagePerSecond = 5%     ; amount of damage to take per SEC (not per frame) when out of ammo
    ; note that it's expressed as a percent of max health, not an absolute
    TakeoffDistForMaxLift = 0%     ; larger numbers give more lift sooner when taking off
    TakeoffPause = 500
    MinHeight = 5
    ReturnToBaseIdleTime = 10000     ; if idle for this long, return to base, even if not out of ammo
  End
  Locomotor = SET_NORMAL MIGLocomotor
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor
  Behavior = FlammableUpdate ModuleTag_006
    AflameDuration = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay = 500     ; this often.
  End
  Behavior = TransitionDamageFX ModuleTag_007
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes Psys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_MIGDamageTransition
  End
  Behavior = MaxHealthUpgrade ModuleTag_008
    TriggeredBy = Upgrade_ChinaAircraftArmor
    AddMaxHealth = 40.0
    ChangeType = ADD_CURRENT_HEALTH_TOO     ; Choices are PRESERVE_RATIO, ADD_CURRENT_HEALTH_TOO, and SAME_CURRENTHEALTH
  End
  Geometry = Box
  GeometryIsSmall = Yes
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 5.0
  Shadow = SHADOW_VOLUME
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89     ; minimum elevation angle above horizon. Used to limit shadow length
End
