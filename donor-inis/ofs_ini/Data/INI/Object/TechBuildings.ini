  ;Behavior = GrantUpgradeCreate ModuleTag_TEST1
  ;  UpgradeToGrant = Upgrade_GenericObject400
  ;End
  ; 
  ;Behavior = ObjectCreationUpgrade ModuleTag_TEST2
