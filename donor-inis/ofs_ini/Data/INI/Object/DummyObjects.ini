Object JumpjetSafeguardDummyDrone
  
  ; ***DESIGN parameters ***
  EditorSorting       = SYSTEM
  TransportSlotCount  = 0

  ArmorSet
    Conditions        = None
    Armor             = InvulnerableAllArmor
    DamageFX          = EmptyDamageFX
  End
  
  ; *** ENGINEERING Parameters ***
  KindOf = NO_HEAL_ICON UNATTACKABLE NO_COLLIDE
  Body = ActiveBody ModuleTag_03
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End
  Behavior = AIUpdateInterface ModuleTag_04
  End
  Locomotor = SET_NORMAL Test_JetpackLocomotor
 
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 5.0
    ;KillWhenRestingOnGround = Yes
    AllowBouncing = No
  End
  Behavior = SlavedUpdate ModuleTag_07
    GuardMaxRange = 1       ;How far away from master I'm allowed when master is idle (doesn't wander)
    GuardWanderRange = 1    ;How far away I'm allowed to wander from master while guarding.
    AttackRange = 1         ;How far away from master I'm allowed when master is attacking a target.
    AttackWanderRange = 1   ;How far I'm allowed to wander from target.
    ScoutRange = 1          ;How far away from master I'm allowed when master is moving.
    ScoutWanderRange = 1    ;How far I'm allowed to wander from scout point.
    StayOnSameLayerAsMaster = Yes
  End
  Behavior = DestroyDie ModuleTag_die1
    DeathTypes = ALL
  End 
  Behavior = LifetimeUpdate ModuleTag_die2
    MinLifetime = 3500     ; min lifetime in msec
    MaxLifetime = 3500     ; max lifetime in msec
  End
  Behavior = InstantDeathBehavior DeathModuleTag_285
    DeathTypes = ALL
    ;FX = FX_GenericMissileDeath
  End
  Behavior = FireWeaponWhenDeadBehavior ModuleTag_die3
    DeathWeapon   = Test_JetpackMissileDummyWeapon
    StartsActive  = Yes
  End
  Geometry = CYLINDER
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 1.0

End

;------------------------------------------------------------------------------
;Cobra Tank
Object DeploySwitchUpgradeRemoverOne

  ; ***DESIGN parameters ***
  Side                = America
  EditorSorting       = SYSTEM
  TransportSlotCount  = 0                 ;how many "slots" we take in a transport (0 == not transportable)

  ArmorSet
    Conditions        = None
    Armor             = InvulnerableAllArmor
;    DamageFX          = EmptyDamageFX
  End 
  ; *** ENGINEERING Parameters ***
  KindOf = PRELOAD CAN_CAST_REFLECTIONS
  Body = ActiveBody ModuleTag_03
    MaxHealth       = 100.0
    InitialHealth   = 100.0
  End
  Behavior = AIUpdateInterface ModuleTag_04
  End
  Locomotor = SET_NORMAL CollideDummyDroneLocomotor
  
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 50.0
    KillWhenRestingOnGround = Yes
    AllowBouncing = No
  End

  Behavior = SlavedUpdate ModuleTag_07
    StayOnSameLayerAsMaster = Yes
  End

  Behavior = DestroyDie ModuleTag_08
    DeathTypes = ALL
  End

  Behavior = UpgradeDie  ModuleTag_12
    DeathTypes = ALL
    UpgradeToRemove     = Upgrade_GLAWorkerRealCommandSet ModuleTag_TF
  End

  Behavior = LifetimeUpdate ModuleTag_032
    MinLifetime = 2000 ;1000
    MaxLifetime = 2000 ;1000
  End

  Geometry = CYLINDER
  GeometryMajorRadius = 5.0
  GeometryMinorRadius = 5.0
  GeometryHeight = 5.0
  GeometryIsSmall = Yes 

End

