Object XYZ_DummyRider ;Combat Bike and DPV dummy rider

  ; ***DESIGN parameters ***
  EditorSorting       = SYSTEM
  TransportSlotCount  = 1
  
  WeaponSet
    Weapon            = SECONDARY DummyObjectDeleteWeapon
    AutoChooseSources = SECONDARY NONE
  End
  
  ArmorSet
    Conditions      = None
    Armor           = HumanArmor
    DamageFX        = DamageFX_Empty
  End
  
  ExperienceValue        = 0 0 0 0
  ;ExperienceRequired     = 0 50 100 200
  IsTrainable            = No             ;Can gain experience
  
  ; *** ENGINEERING Parameters ***
  KindOf =  PRELOAD INFANTRY CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS NO_COLLIDE IMMOBILE

  Body = ActiveBody ModuleTag_02
    MaxHealth       = 10.0
    InitialHealth   = 10.0
  End

  Behavior = AIUpdateInterface ModuleTag_03
  End

  Behavior = OCLUpdate ModuleTag_Remove01
    MinDelay     = 5000
    MaxDelay     = 5000
    OCL          = OCL_KillSelf
  End
  
  Behavior = DestroyDie ModuleTag_Die01
  End
  
  Geometry = CYLINDER
  GeometryMajorRadius = 1.0
  GeometryMinorRadius = 1.0
  GeometryHeight = 10000000.0
  GeometryIsSmall = Yes
End

