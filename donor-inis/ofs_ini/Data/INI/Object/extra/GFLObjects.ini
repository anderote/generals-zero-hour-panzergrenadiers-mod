Object Extra_InfantryUMP45
  ; *** ART Parameters ***
  ;SelectPortrait = SASocomBurton_L
  ;ButtonImage = SASocomBurton

  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ; idle
    ; WHILE CARRYING AK47
    ; ---------------------------------------------------------
    DefaultConditionState ;Idle with AK Slung
      Model = GFL_UMP45_SKN
      IdleAnimation = UIMOB01_SKL.UIMOB01_STD 0 25
      IdleAnimation = UIMOB01_SKL.UIMOB01_IDD1
      IdleAnimation = UIMOB01_SKL.UIMOB01_IDD2
      ;IdleAnimation = UIMOB01_SKL.UIMOB01_CHD
      AnimationMode = ONCE
      AnimationSpeedFactorRange = 0.9 1.1
      WeaponFireFXBone = PRIMARY MuzzleAK
      WeaponMuzzleFlash = PRIMARY MuzzleAKFX
      WeaponFireFXBone = SECONDARY "UIMOB01 R HAND"
      WeaponLaunchBone = SECONDARY "UIMOB01 R HAND"
      TransitionKey = TRANS_STAND_AK
    End
    ConditionState = MOVING
      Animation = UIMOB01_SKL.UIMOB01_RND
      AnimationMode = LOOP
      Flags = RANDOMSTART
      TransitionKey = MOVING_AK
    End
    ConditionState = DYING
      Animation = UIMOB01_SKL.UIMOB01_DD1
      Animation = UIMOB01_SKL.UIMOB01_DD2
      AnimationMode = ONCE
      TransitionKey = TRANS_Dying
    End
    ConditionState = SPECIAL_CHEERING
      Animation = UIMOB01_SKL.UIMOB01_CHD
      AnimationMode = ONCE
    End
    ; Drawing AK47
    ConditionState = PREATTACK_A
      Animation = UIMOB01_SKL.UIMOB01_ATD1_ST     ; start firing
      AnimationMode = ONCE
    End
    AliasConditionState = PREATTACK_A FIRING_A
    AliasConditionState = PREATTACK_A BETWEEN_FIRING_SHOTS_A
    ; Firing Gun
    ConditionState = FIRING_A
      Animation = UIMOB01_SKL.UIMOB01_ATD1_LP     ; looping firing
      AnimationMode = LOOP
      WeaponFireFXBone = SECONDARY MuzzleAK
      WeaponMuzzleFlash = SECONDARY MuzzleAKFX
      TransitionKey = TRANS_FIRING_AK
    End
    AliasConditionState = BETWEEN_FIRING_SHOTS_A
    ConditionState = RELOADING_A
      Animation = UIMOB01_SKL.UIMOB01_ATD1_ED     ; end firing
      AnimationMode = ONCE
    End
    ; This transition allows him to put his gun away when he's finished attacking.
    TransitionState = TRANS_FIRING_AK TRANS_STAND_AK
      Animation = UIMOB01_SKL.UIMOB01_ATD1_ED     ; end firing
      AnimationMode = ONCE
    End
    ;------
    ;Throw Grenade
    ;------
    ConditionState      = FIRING_B
      Animation         = UIMOB01_SKL.UIMOB01_ATCD_AF
      AnimationMode     = ONCE
      Flags             = MAINTAIN_FRAME_ACROSS_STATES
      TransitionKey     = TRANS_FiringB
    End
    ConditionState      = PREATTACK_B
      Animation         = UIMOB01_SKL.UIMOB01_ATCD_BF
      AnimationMode     = ONCE
      ;Flags             = START_FRAME_LAST
      ;TransitionKey     = TRANS_PreB
    End
    AliasConditionState = PREATTACK_B FIRING_B
    AliasConditionState = PREATTACK_B BETWEEN_FIRING_SHOTS_B
    ; TransitionState     = TRANS_Stand TRANS_PreB
      ; Animation         = UIPRTSN3_SKL.CIUNSL_ATA4_P
      ; AnimationMode     = ONCE
      ; AnimationSpeedFactorRange = 3 3
    ; End
    TransitionState     = TRANS_FiringB TRANS_STAND_AK
      Animation         = UIMOB01_SKL.UIMOB01_ATCD_AF
      AnimationMode     = ONCE
      Flags = MAINTAIN_FRAME_ACROSS_STATES
      AnimationSpeedFactorRange = 1 1
    End
    ; --------------------------------------------------------
    TransitionState = TRANS_Dying TRANS_Flailing
      Animation = UIMOB01_SKL.UIMOB01_A_ADTE1
      Animation = UIMOB01_SKL.UIMOB01_D_ADTE1
      AnimationMode = ONCE
    End
    ConditionState = DYING EXPLODED_FLAILING
      Animation = UIMOB01_SKL.UIMOB01_A_ADTE2
      Animation = UIMOB01_SKL.UIMOB01_D_ADTE2
      AnimationMode = LOOP
      TransitionKey = TRANS_Flailing
    End
    ConditionState = DYING EXPLODED_BOUNCING
      Animation = UIMOB01_SKL.UIMOB01_A_ADTE3
      Animation = UIMOB01_SKL.UIMOB01_D_ADTE3
      AnimationMode = ONCE
      TransitionKey = None
    End
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:UnknownUnit
  ;Side = AmericaSocomGeneral
  EditorSorting = INFANTRY
  TransportSlotCount = 1     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange = 150
  ShroudClearingRange = 500

  BuildCost = 1500
  BuildTime = 20.0     ; in seconds
  ExperienceValue = 50 100 100 150     ; Experience point value at each level
  ExperienceRequired = 0 200 300 600     ; Experience points needed to gain each level
  IsTrainable = Yes     ; Can gain experience
  CrushableLevel = 3     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = Extra_UMP45CommandSet

  WeaponSet
    Conditions = None
    Weapon = PRIMARY Extra_UMP45SMGWeapon
    Weapon = SECONDARY Extra_UMP45SmokeGrenadeWeapon
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
    AutoChooseSources = SECONDARY NONE
  End
  ArmorSet
    Conditions = None
    Armor = China_ChemSuitHumanArmor
    DamageFX = InfantryDamageFX
  End
  ; *** AUDIO Parameters ***
  VoiceSelect = BlackLotusVoiceSelect
  VoiceMove = BlackLotusVoiceMove
  VoiceAttack = BlackLotusVoiceAttack
  VoiceGuard = BlackLotusVoiceMove
  VoiceFear = BlackLotusVoiceFear
  ;VoiceTaskComplete = BlackLotusVoiceCaptureComplete
  SoundStealthOn = StealthOn
  SoundStealthOff = StealthOff
  UnitSpecificSounds
    VoiceCreate = BlackLotusVoiceCreate
    VoiceGarrison = BlackLotusVoiceMove
    VoiceEnter = BlackLotusVoiceMove
    VoiceEnterHostile = BlackLotusVoiceMove
    VoiceStealCashComplete = BlackLotusVoiceCashComplete
    VoiceDisableVehicleComplete = BlackLotusVoiceDisableComplete
    VoiceCaptureBuildingComplete = BlackLotusVoiceCaptureComplete
    VoiceGetHealed = BlackLotusVoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS INFANTRY SCORE HERO CANNOT_RETALIATE
  Body = ActiveBody ModuleTag_02
    MaxHealth = 600.0
    InitialHealth = 600.0
  End
  
  Behavior = AIUpdateInterface ModuleTag_03
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Behavior = CommandButtonHuntUpdate ModuleTag_04     ; allows use of command button hunt script with this unit.
  End
  Behavior = AutoFindHealingUpdate ModuleTag_05     ; This update will have the unit go to a healing station if injured. jba
    ScanRate = 1000     ; once a second.
    ScanRange = 300     ; 
    NeverHeal = 0.85     ; don't heal if we are > 85% healthy.
    AlwaysHeal = 0.25     ; if we get below 25%, find healing right away.
  End
  Locomotor = SET_NORMAL SOCOM_ColonelBurtonGroundLocomotor
  Behavior = PhysicsBehavior ModuleTag_06
    Mass = 5.0
  End

  Behavior = StealthUpdate ModuleTag_Stealth
    StealthDelay = 2000     ; msec
    StealthForbiddenConditions = FIRING_PRIMARY FIRING_TERTIARY
    FriendlyOpacityMin = 50.0%
    FriendlyOpacityMax = 100.0%
    InnateStealth = Yes
    OrderIdleEnemiesToAttackMeUponReveal = Yes
  End
  
  ; Hero units can't be squished!
  ; Behavior = SquishCollide ModuleTag_13
  ; ;nothing
  ; End
  ; --- begin Death modules ---
  Behavior = SlowDeathBehavior ModuleTag_Death01
    DeathTypes = ALL -CRUSHED -SPLATTED -EXPLODED -BURNED -POISONED -POISONED_BETA -POISONED_GAMMA -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6
    SinkDelay = 3000
    SinkRate = 0.5     ; in Dist/Sec
    DestructionDelay = 8000
    FX = INITIAL FX_BlackLotusDie
  End
  Behavior = SlowDeathBehavior ModuleTag_Death02
    DeathTypes = NONE +CRUSHED +SPLATTED
    SinkDelay = 3000
    SinkRate = 0.5     ; in Dist/Sec
    DestructionDelay = 8000
    FX = INITIAL FX_GIDieCrushed
  End
  Behavior = SlowDeathBehavior ModuleTag_Death03
    DeathTypes = NONE +EXPLODED
    SinkDelay = 3000
    SinkRate = 0.5     ; in Dist/Sec
    DestructionDelay = 8000
    FX = INITIAL FX_BlackLotusDie
    FlingForce = 8
    FlingForceVariance = 3
    FlingPitch = 60
    FlingPitchVariance = 10
  End
  Behavior = SlowDeathBehavior ModuleTag_Death04
    DeathTypes = NONE +BURNED
    DestructionDelay = 0
    FX = INITIAL FX_DieByFireFemale
    OCL = INITIAL OCL_FlamingInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death05
    DeathTypes = NONE +POISONED
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinFemale
    OCL = INITIAL OCL_ToxicInfantry
  End
  Behavior = SlowDeathBehavior ModuleTag_Death06     ; don't forget to give it a new, unique module tag
    DeathTypes = NONE +POISONED_BETA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinFemale
    OCL = INITIAL OCL_ToxicInfantryBeta     ; you'll have to create this OCL and make it use the blue guys instead of green ones
  End
  Behavior = SlowDeathBehavior ModuleTag_Death07
    DeathTypes = NONE +POISONED_GAMMA
    DestructionDelay = 0
    FX = INITIAL FX_DieByToxinGLA
    OCL = INITIAL OCL_ToxicInfantryGamma
  End
  ; ---------------------------------
  ; <Extra Death Types> -EXTRA_2 -EXTRA_3 -EXTRA_4 -EXTRA_5 -EXTRA_6
  ; ---------------------------------
  ;Radiation Melt
  Behavior = SlowDeathBehavior ModuleTag_D_Rad
    DeathTypes          = NONE +EXTRA_2
    DestructionDelay    = 0
    OCL                 = INITIAL OCL_RadiationDeathInfantry
    FX                  = INITIAL FX_GIDieRadiation
    FX                  = FINAL   FX_DieByToxinUSA
  End 
  ;Electrocuted
  Behavior = SlowDeathBehavior ModuleTag_D_Tesla
    DeathTypes          = NONE +EXTRA_3
    DestructionDelay    = 0
    FX                  = INITIAL FX_DieByFireUSA
    OCL                 = INITIAL OCL_TeslaDeathInfantry
    FX                  = FINAL   FX_InfantryTeslaDie
  End
  ;Bloody Explosion
  Behavior = SlowDeathBehavior ModuleTag_D_Gore
    DeathTypes          = NONE +EXTRA_4
    DestructionDelay    = 0
    FX                  = INITIAL FX_GoreDeathEffect
    OCL                 = INITIAL OCL_GoreDeathInfantry
  End
  ;Zombie Virus
  Behavior = SlowDeathBehavior ModuleTag_D_Virus
    DeathTypes          = NONE +EXTRA_5
    DestructionDelay    = 0
    FX                  = INITIAL FX_VirusDeathEffect
    OCL                 = INITIAL OCL_VirusDeathInfantry
  End
  ;NYI
  Behavior = SlowDeathBehavior ModuleTag_D_Placeholder
    DeathTypes          = NONE +EXTRA_6
    DestructionDelay    = 0
    FX                  = INITIAL FX_PlaceholderDeathEffect
    OCL                 = INITIAL OCL_PlaceholderDeathInfantry
  End
  ;Sniper (Uses regular slowdeath + this FX)
  Behavior = FXListDie ModuleTag_D_Sniper
    DeathTypes          = NONE +EXTRA_7
    DeathFX             = FX_DamageInfantryBloodSnipered
  End
  ; ---------------------------------
  ; </Extra Death Types>
  ; ---------------------------------
  ; --- end Death modules ---
  Behavior = PoisonedBehavior ModuleTag_18
    PoisonDamageInterval = 100     ; Every this many msec I will retake the poison damage dealt me...
    PoisonDuration = 3000     ; ... for this long after last hit by poison damage
  End
  Scale = 1.08
  Geometry = CYLINDER
  GeometryMajorRadius = 10.0
  GeometryMinorRadius = 10.0
  GeometryHeight = 12.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_DECAL
  ShadowSizeX = 14
  ShadowSizeY = 14
  ShadowTexture = ShadowI
  BuildCompletion = APPEARS_AT_RALLY_POINT
End

