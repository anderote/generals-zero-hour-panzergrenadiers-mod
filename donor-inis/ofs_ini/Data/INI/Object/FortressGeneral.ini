Object X_GLAJetFrogfoot
  ; *** ART Parameters ***
  SelectPortrait = SUFrogfootFort_L ;SUFrogfootRP
  ButtonImage = SUFrogfootFort ;SUFrogfootRP
  UpgradeCameo1 = Upgrade_GLAExtraMissiles
  UpgradeCameo2 = Upgrade_GLAAircraftArmor
  ; UpgradeCameo3 = NONE UpgradeCameo4 = NONE UpgradeCameo5 = NONE
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = Yes
    ProjectileBoneFeedbackEnabledSlots = PRIMARY
    DefaultConditionState
      Model = UVFrogfootF
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponFireFXBone = PRIMARY Muzzle ;WeaponA
      TransitionKey = Trans_Default
      HideSubObject = PYLONS_UP
    End
    ConditionState = JETEXHAUST
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
      TransitionKey = Trans_Flying
    End
    ConditionState = JETEXHAUST JETAFTERBURNER
      ParticleSysBone = Engine01 JetExhaust
      ParticleSysBone = Engine02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
    End
    TransitionState = Trans_Default Trans_Flying
      Animation = UVFrogfootF.UVFrogfootF
      AnimationMode = ONCE
      Flags = MAINTAIN_FRAME_ACROSS_STATES
    End
    TransitionState = Trans_Flying Trans_Default 
      Animation = UVFrogfootF.UVFrogfootF
      AnimationMode = ONCE_BACKWARDS
      Flags = MAINTAIN_FRAME_ACROSS_STATES2
    End
    ;--
    ConditionState = REALLYDAMAGED
      Model = UVFrogfootF_D
      TransitionKey = Trans_Default_D
    End
    AliasConditionState = RUBBLE
    ConditionState = REALLYDAMAGED JETEXHAUST
      Model = UVFrogfootF_D
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
      TransitionKey = Trans_Flying_D
    End
    AliasConditionState = RUBBLE JETEXHAUST
    ConditionState = REALLYDAMAGED JETEXHAUST JETAFTERBURNER
      Model = UVFrogfootF_D
      ParticleSysBone = Engine01 JetExhaust
      ParticleSysBone = Engine02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
      TransitionKey = Trans_Default_D
    End
    AliasConditionState = RUBBLE JETEXHAUST JETAFTERBURNER
    TransitionState = Trans_Default_D Trans_Flying_D
      Model = UVFrogfootF_D
      Animation = UVFrogfootF_D.UVFrogfootF_D
      AnimationMode = ONCE
      Flags = MAINTAIN_FRAME_ACROSS_STATES
    End
    TransitionState = Trans_Flying_D Trans_Default_D 
      Model = UVFrogfootF_D
      Animation = UVFrogfootF_D.UVFrogfootF_D
      AnimationMode = ONCE_BACKWARDS
      Flags = MAINTAIN_FRAME_ACROSS_STATES2
    End
    ;----
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponFireFXBone = PRIMARY WeaponA
      ShowSubObject = PYLONS_UP
      TransitionKey = Trans_DefaultUp
    End
    ConditionState = JETEXHAUST WEAPONSET_PLAYER_UPGRADE
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
      ShowSubObject = PYLONS_UP
      TransitionKey = Trans_DefaultUp
    End
    ConditionState = JETEXHAUST JETAFTERBURNER WEAPONSET_PLAYER_UPGRADE
      ParticleSysBone = Engine01 JetExhaust
      ParticleSysBone = Engine02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
      ShowSubObject = PYLONS_UP
      TransitionKey = Trans_FlyingUp
    End
    TransitionState = Trans_DefaultUp Trans_FlyingUp
      Animation = UVFrogfootF.UVFrogfootF
      AnimationMode = ONCE
      ShowSubObject = PYLONS_UP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
    End
    TransitionState = Trans_FlyingUp Trans_DefaultUp
      Animation = UVFrogfootF.UVFrogfootF
      AnimationMode = ONCE_BACKWARDS
      ShowSubObject = PYLONS_UP
      Flags = MAINTAIN_FRAME_ACROSS_STATES2
    End
    
    ConditionState = REALLYDAMAGED WEAPONSET_PLAYER_UPGRADE
      Model = UVFrogfootF_D
      ShowSubObject = PYLONS_UP
      TransitionKey = Trans_DefaultUp_D
    End
    AliasConditionState = RUBBLE WEAPONSET_PLAYER_UPGRADE
    ConditionState = REALLYDAMAGED JETEXHAUST WEAPONSET_PLAYER_UPGRADE
      Model = UVFrogfootF_D
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
      ShowSubObject = PYLONS_UP
      TransitionKey = Trans_DefaultUp_D
    End
    AliasConditionState = RUBBLE JETEXHAUST WEAPONSET_PLAYER_UPGRADE
    ConditionState = REALLYDAMAGED JETEXHAUST JETAFTERBURNER WEAPONSET_PLAYER_UPGRADE
      Model = UVFrogfootF_D
      ParticleSysBone = Engine01 JetExhaust
      ParticleSysBone = Engine02 JetExhaust
      ParticleSysBone = Wingtip01 JetContrail
      ParticleSysBone = Wingtip02 JetContrail
      ShowSubObject = PYLONS_UP
      TransitionKey = Trans_FlyingUp_D
    End
    AliasConditionState = RUBBLE JETEXHAUST JETAFTERBURNER WEAPONSET_PLAYER_UPGRADE
    
    TransitionState = Trans_DefaultUp_D Trans_FlyingUp_D
      Model = UVFrogfootF_D
      Animation = UVFrogfootF_D.UVFrogfootF_D
      AnimationMode = ONCE
      ShowSubObject = PYLONS_UP
      Flags = MAINTAIN_FRAME_ACROSS_STATES
    End
    TransitionState = Trans_FlyingUp_D Trans_DefaultUp_D 
      Model = UVFrogfootF_D
      Animation = UVFrogfootF_D.UVFrogfootF_D
      AnimationMode = ONCE_BACKWARDS
      ShowSubObject = PYLONS_UP
      Flags = MAINTAIN_FRAME_ACROSS_STATES2
    End
  
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Su25_Fort
  EditorSorting = VEHICLE
  Side = GLAFortressGeneral
  TransportSlotCount = 0     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange = 200.0
  ShroudClearingRange = 300.0
  Prerequisites
    Object = GLAAirfield TEST_MODE
    Object = GLASecretLab TEST_MODE
    Science = SCIENCE_Su25_R1
  End
  WeaponSet
    Conditions = None
    Weapon = PRIMARY Fort_GLAFrogfootMissileWeapon
    ;Weapon = PRIMARY X_Su25RocketPodWeapon
  End
 
  WeaponSet
    Conditions = PLAYER_UPGRADE
    Weapon = PRIMARY Fort_GLAFrogfootMissileWeapon_UPGRADED
  End
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor
    DamageFX = None
  End
  BuildCost = 1600
  BuildTime = 18
  ExperienceValue = 50 50 100 150     ; Experience point value at each level
  ExperienceRequired = 0 100 200 400     ; Experience points needed to gain each level
  IsTrainable = Yes     ; Can gain experience
  CrusherLevel = 1     ; What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = Generic_JetBomberCommandSet ;ChinaJetMIGCommandSet
  ; *** AUDIO Parameters ***
  VoiceSelect = Su25VoiceSelect
  VoiceMove = Su25VoiceMove
  VoiceAttack = Su25VoiceAttack
  VoiceAttackAir = Su25VoiceAttack
  VoiceGuard = Su25VoiceMove
  ; SoundMoveStart = ScorpionTankMoveStart
  ; SoundMoveStartDamaged = ScorpionTankMoveStart
  SoundAmbient = FrogfootAmbientLoop
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = Su25VoiceCreate
    ; TurretMoveStart = NoSound
    ;TurretMoveLoop = TurretMoveLoop
    VoiceEnter = Su25VoiceMove
    Afterburner = FrogfootAfterburner
    VoiceLowFuel =Su25VoiceLowFuel
    VoiceGarrison = Su25VoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD CAN_CAST_REFLECTIONS CAN_ATTACK SELECTABLE VEHICLE SCORE AIRCRAFT SALVAGER
  Body = ActiveBody ModuleTag_02
    MaxHealth = 200.0
    InitialHealth = 200.0
  End
  Behavior = WeaponSetUpgrade ModuleTag_WeapUp
    TriggeredBy = Upgrade_GLAExtraMissiles
  End
 
  Behavior = MaxHealthUpgrade ModuleTag_10
    TriggeredBy = Upgrade_GLAAircraftArmor
    AddMaxHealth = 50.0
    ChangeType = ADD_CURRENT_HEALTH_TOO     ; Choices are PRESERVE_RATIO, ADD_CURRENT_HEALTH_TOO, and SAME_CURRENTHEALTH
  End
  
  Behavior = JetSlowDeathBehavior ModuleTag_03
    FXOnGroundDeath = FX_JetOnGroundDeath
    OCLOnGroundDeath = OCL_Su25DeathFinalBlowUp
    DestructionDelay = 99999999     ; destruction will happen when we
    RollRate = 0.2
    RollRateDelta = 100%     ; each frame, rollrate = rollrate * rollrateDelta
    PitchRate = 0.0
    FallHowFast = 110.0%     ; Bigger is faster (can be over 100%,it's a fraction of gravity)
    FXInitialDeath = FX_Su25DeathInitial
    OCLInitialDeath = OCL_MIGDeathInitial
    DelaySecondaryFromInitialDeath = 500     ; in milliseconds
    FXSecondary = FX_JetDeathSecondary
    OCLSecondary = OCL_MIGDeathSecondary
    FXHitGround = FX_JetDeathHitGround
    OCLHitGround = OCL_MIGDeathHitGround
    DelayFinalBlowUpFromHitGround = 200     ; in milliseconds
    FXFinalBlowUp = FX_JetDeathFinalBlowUp
    OCLFinalBlowUp = OCL_Su25DeathFinalBlowUp ;OCL_MIGDeathFinalBlowUp
  End
  ; Behavior = WeaponSetUpgrade ModuleTag_04
  ; TriggeredBy = Upgrade_GLAAnthraxBeta
  ; End
  ; Behavior = SubObjectsUpgrade ModuleTag_39
    ; TriggeredBy = Upgrade_GLAExtraMissiles
    ; ShowSubObjects = PYLONS_UP
  ; End
  Behavior = PhysicsBehavior ModuleTag_05
    Mass = 500.0
  End
  Behavior = JetAIUpdate ModuleTag_06
    ;Turret
    ;  TurretTurnRate = 10000
    ;  RecenterTime = 1
    ;  ControlledWeaponSlots = PRIMARY
    ;End 
    OutOfAmmoDamagePerSecond = 10%     ; amount of damage to take per SEC (not per frame) when out of ammo
    ; note that it's expressed as a percent of max health, not an absolute
    TakeoffDistForMaxLift = 0%     ; larger numbers give more lift sooner when taking off
    TakeoffPause = 500
    MinHeight = 5
    ReturnToBaseIdleTime = 10000     ; if idle for this long, return to base, even if not out of ammo
    AutoAcquireEnemiesWhenIdle = No NotWhileAttacking
  End
  Locomotor = SET_NORMAL FrogfootLocomotor
  Locomotor = SET_TAXIING BasicJetTaxiLocomotor
  Behavior = FlammableUpdate ModuleTag_08
    AflameDuration = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay = 500     ; this often.
  End
  Behavior = TransitionDamageFX ModuleTag_09
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes Psys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_MIGDamageTransition
  End
  Geometry = Box
  GeometryIsSmall = Yes
  GeometryMajorRadius = 14.0
  GeometryMinorRadius = 7.0
  GeometryHeight = 5.0
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89     ; minimum elevation angle above horizon. Used to limit shadow length
End
