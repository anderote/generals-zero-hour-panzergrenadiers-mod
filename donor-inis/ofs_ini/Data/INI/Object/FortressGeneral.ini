    Rider6 = GLAInfantryHijacker RIDER6 WEAPON_RIDER6 STATUS_RIDER6 GLAVehicleCombatBikeDefaultCommandSetx SET_NORMAL
    Rider7 = GLAInfantrySaboteur RIDER7 WEAPON_RIDER7 STATUS_RIDER7 GLAVehicleCombatBikeDefaultCommandSetx SET_NORMAL
    Rider8 = XYZ_DummyRider RIDER8 WEAPON_RIDER8 STATUS_RIDER8 StopOnlyGenericCommandSet SET_SUPERSONIC
    ScuttleDelay = 1500
    ScuttleStatus = TOPPLED
    ; Standard TransportContain stuff
    Slots = 1
    InitialPayload = GLAInfantryRebel 1
    ScatterNearbyOnExit = No
    HealthRegen%PerSec = 0
    DamagePercentToUnits = 100%     ; This module will Delete the rider on death, but we need to kill him as well so he doesn't pick up the bike's salvage crate.
    BurnedDeathToUnits = No     ; And no Burned death.
    AllowInsideKindOf = INFANTRY
    ExitDelay = 250
    NumberOfExitPaths = 1     ; Defaults to 1.  Set 0 to not use ExitStart/ExitEnd, set higher than 1 to use ExitStart01-nn/ExitEnd01-nn
    GoAggressiveOnExit = Yes     ; AI Will tell people to set their mood to Aggressive on exiting
    DoorOpenTime = 0
