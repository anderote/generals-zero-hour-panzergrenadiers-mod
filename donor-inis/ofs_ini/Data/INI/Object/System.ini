Object SpySatellitePing
  ; ***DESIGN parameters ***
  VisionRange = 300.0
  EditorSorting = SYSTEM
  KindOf = NO_COLLIDE IMMOBILE UNATTACKABLE INERT
  ; *** ENGINEERING Parameters ***
  Body = ImmortalBody ModuleTag_024
    MaxHealth = 1
    InitialHealth = 1
  End
  Behavior = DynamicShroudClearingRangeUpdate ModuleTag_025
    FinalVision = 0.0
    ShrinkDelay = 10000
    ShrinkTime = 5000
    GrowDelay = 0
    GrowTime = 1000
    GrowInterval = 10     ; Faster than most
    ChangeInterval = 80     ; Faster than most
    GridDecalTemplate
      Texture = EXGrid
      Style = SHADOW_ADDITIVE_DECAL
      OpacityMin = 50%
      OpacityMax = 100%
      OpacityThrobTime = 500
      Color = R:32 G:64 B:128 A:0     ; dim blue, additive
    End
  End
  Behavior = DeletionUpdate ModuleTag_026     ; Not LifetimeUpdate, since I can't die.  This will DestroyObject me.
    MinLifetime = 13000     ; InitialDelay + TransitionTime for Vision Update
    MaxLifetime = 13000
  End
  Behavior = StealthDetectorUpdate ModuleTag_027
    DetectionRate = 500     ; how often to rescan for stealthed things in my sight (msec)
  End
End

