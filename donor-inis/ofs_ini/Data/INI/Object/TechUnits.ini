Object Tech_HoverMRLS ;Y_AirF_AmericaVehicleHoverMRLS
  ; *** ART Parameters ***
  SelectPortrait = SAHoverMRLSNew_L
  ButtonImage = SAHoverMRLSNew
  UpgradeCameo1 = Upgrade_AmericaBattleDrone
  UpgradeCameo2 = Upgrade_AmericaAdvancedMissiles ;Upgrade_AmericaScoutDrone
  UpgradeCameo3 = Upgrade_AmericaHellfireDrone
  Draw = W3DModelDraw ModuleTag_877 ;TankDraw
    ParticlesAttachedToAnimatedBones = Yes
    DefaultConditionState
      Model = AVHoverMRLS2b
      Animation = AVHoverMRLS2b.AVHoverMRLS2b
      AnimationMode = LOOP
     ;Flags = START_FRAME_LAST
      ;AnimationSpeedFactorRange = 0.8 0.8
      Turret = Turret
      TurretPitch = TurretEL
      WeaponFireFXBone = PRIMARY WeaponA
      WeaponLaunchBone = PRIMARY WeaponA
      WeaponFireFXBone = SECONDARY WeaponA
      WeaponLaunchBone = SECONDARY WeaponA
      ParticleSysBone = Engine01 HoverEffect_Distort
      ParticleSysBone = Engine03 HoverEffect_Distort
      ParticleSysBone = Engine04 HoverEffect_Distort
      ParticleSysBone = Engine06 HoverEffect_Distort
      ParticleSysBone = Engine01 HoverEffect_Glow
      ParticleSysBone = Engine03 HoverEffect_Glow
      ParticleSysBone = Engine04 HoverEffect_Glow
      ParticleSysBone = Engine06 HoverEffect_Glow
     ;TransitionKey = TRANS_Idle
    End
   ;-------- Damaged -------------
    ConditionState = REALLYDAMAGED
      Model = AVHoverMRLS2b_D
      Animation = AVHoverMRLS2b_D.AVHoverMRLS2b_D
     AnimationMode = LOOP
     ;TransitionKey = TRANS_Idle_d
    End
   ;-----------------
    ConditionState = RUBBLE
      Model = AVHoverMRLS2b_D
      AnimationMode = MANUAL
     Flags = MAINTAIN_FRAME_ACROSS_STATES
    End
    OkToChangeModelColor = Yes
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:HoverMRLS
  ;Side = AmericaAirForceGeneral
  EditorSorting = VEHICLE
  TransportSlotCount = 3     ; how many "slots" we take in a transport (0 == not transportable)
  WeaponSet
    Conditions = None
    Weapon = PRIMARY Y_AirF_HoverMRLSWeapon_withUpgrade ;+25% from Adv. Missiles
    Weapon = SECONDARY None
    Weapon = TERTIARY None
  End
  ArmorSet
    Conditions = None
    Armor = HeavyTruckArmor_MineSweeper ;TankArmor_MineSweeper ;Hover -> Resistant to mines
    DamageFX = TankDamageFX
  End
  BuildCost = 1500 ;1400
  BuildTime = 16.0 ;15.0     ; in seconds
  VisionRange = 150
  ShroudClearingRange = 300
  Prerequisites
    Object = Tech_SecFactoryUnlockDummy1
  End
  ExperienceValue = 125 125 250 500     ; Experience point value at each level
  ExperienceRequired = 0 175 350 700     ; Experience points needed to gain each level
  IsTrainable = Yes     ; Can gain experience
  CrusherLevel = 2     ; What can I crush?: 1 = infantry, 2 = trees, 3 = vehicles
  CrushableLevel = 2     ; What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
  CommandSet = AmericaTankPaladinCommandSet
  ; *** AUDIO Parameters ***
  VoiceSelect = PaladinTankVoiceSelect_HoverMRLS
  VoiceMove = PaladinTankVoiceMove
  VoiceGuard = PaladinTankVoiceMove
  VoiceAttack = PaladinTankVoiceAttack
  SoundMoveStart = HoverMRLSMoveStart
  SoundMoveStartDamaged = HoverMRLSMoveStart
  UnitSpecificSounds
    ; These have the syntax of SomeNameSomewhereInCode = SomeNameSomewhereInLookupINIs
    VoiceCreate = PaladinTankVoiceCreate
    TurretMoveLoop = TurretMoveLoop
    SoundEject = PilotSoundEject
    VoiceEject = PilotVoiceEject
    VoiceCrush = PaladinTankVoiceCrush
    VoiceEnter = PaladinTankVoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  KindOf = PRELOAD SELECTABLE CAN_ATTACK CAN_CAST_REFLECTIONS VEHICLE SCORE
  Body = ActiveBody ModuleTag_878
    MaxHealth = 375.0 ;Starts with Composite Armor
    InitialHealth = 375.0
    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 600
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 50
  End
  Behavior = AIUpdateInterface ModuleTag_879
    Turret
      TurretTurnRate = 150     ; 60   // turn rate, in degrees per sec
      TurretPitchRate = 150
      AllowsPitch = Yes
     ;GroundUnitPitch = 15
      ;MinPhysicalPitch = -15
      FiresWhileTurning = Yes
      ControlledWeaponSlots = PRIMARY SECONDARY
    End
    AutoAcquireEnemiesWhenIdle = Yes
  End
  Locomotor = SET_NORMAL Y_HoverMRLSLocomotor Y_HoverMRLSWaterLocomotor
  Behavior = PhysicsBehavior ModuleTag_880
    Mass = 40.0
  End
  ; Blow Up death
  Behavior = SlowDeathBehavior ModuleTag_881
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
    DestructionDelay = 1000
    DestructionDelayVariance = 300
    FX = INITIAL FX_HoverMRLSAirDeathGroundPart
    FX = FINAL FX_GenericTankDeathExplosion
   OCL = INITIAL OCL_HoverMRLSDeathEffectBlowUp
   OCL = FINAL OCL_HoverMRLSDeathEffectAir
  End
  ; Catch fire, and explode death
  Behavior = SlowDeathBehavior ModuleTag_882
    DeathTypes = ALL -CRUSHED -SPLATTED
    ProbabilityModifier = 50
   SinkDelay = 50
    SinkRate = 0.5     ; in Dist/Sec
    DestructionDelay = 2000
    DestructionDelayVariance = 300
    FX = INITIAL FX_CrusaderCatchFire
    OCL = FINAL OCL_HoverMRLSDeathEffect
    FX = FINAL FX_GenericTankDeathExplosion
  End
  Behavior = ObjectCreationUpgrade ModuleTag_883
    UpgradeObject = OCL_AmericanBattleDrone
    TriggeredBy = Upgrade_AmericaBattleDrone
    ConflictsWith = Upgrade_AmericaScoutDrone Upgrade_AmericaHellfireDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_884
    UpgradeObject = OCL_AmericanScoutDrone
    TriggeredBy = Upgrade_AmericaScoutDrone
    ConflictsWith = Upgrade_AmericaBattleDrone Upgrade_AmericaHellfireDrone
  End
  Behavior = ObjectCreationUpgrade ModuleTag_885
    UpgradeObject = OCL_AmericanHellfireDrone
    TriggeredBy = Upgrade_AmericaHellfireDrone
    ConflictsWith = Upgrade_AmericaBattleDrone Upgrade_AmericaScoutDrone
  End
  Behavior = ProductionUpdate ModuleTag_886
    MaxQueueEntries = 1     ; So you can't build multiple upgrades in the same frame
  End
  Behavior = ExperienceScalarUpgrade ModuleTag_887
    TriggeredBy = Upgrade_AmericaAdvancedTraining
    AddXPScalar = 1.0     ; Increases experience gained by an additional 100%
  End
  Behavior = TransitionDamageFX ModuleTag_888
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuous01
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_BattleMasterDamageTransition
  End
  Behavior = FXListDie ModuleTag_889
    DeathTypes = NONE +CRUSHED +SPLATTED
    DeathFX = FX_CarCrush
  End
  Behavior = CreateObjectDie ModuleTag_890
    DeathTypes = NONE +CRUSHED +SPLATTED
    CreationList = OCL_HoverMRLS_CrushEffect
  End
  Behavior = DestroyDie ModuleTag_891
    DeathTypes = NONE +CRUSHED +SPLATTED
  End
  Behavior = CreateCrateDie ModuleTag_892
    CrateData = SalvageCrateData
  ; CrateData = EliteTankCrateData
  ; CrateData = HeroicTankCrateData
  End
  Behavior = EjectPilotDie ModuleTag_893
    DeathTypes = ALL -CRUSHED -SPLATTED
    ExemptStatus = HIJACKED
    GroundCreationList = OCL_EjectPilotOnGround
    AirCreationList = OCL_EjectPilotViaParachute
    VeterancyLevels = ALL -REGULAR     ; only vet+ gives pilot
  End
  
  Behavior = VeterancyGainCreate ModuleTag_VET
    StartingLevel = VETERAN
  End
  
  Behavior = FlammableUpdate ModuleTag_895
    AflameDuration = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay = 500     ; this often.
  End
  Geometry = BOX
  GeometryMajorRadius = 16.0
  GeometryMinorRadius = 11.0
  GeometryHeight = 10.0
  GeometryIsSmall = Yes
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 45     ; minimum elevation angle above horizon. Used to limit shadow length
End

