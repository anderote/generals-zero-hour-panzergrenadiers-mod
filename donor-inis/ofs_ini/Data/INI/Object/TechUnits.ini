Object Tech_TankPaladin ZGen_TankPaladin
  ; *** ART Parameters ***
  SelectPortrait = AVPaladinNew_L ;SAPaladin_L
  ButtonImage = AVPaladinNew ;SAPaladin
  ;UpgradeCameo1 = GenericGenpowerUpgrade_One
  UpgradeCameo2 = Upgrade_AmericaBattleDrone ;ZGen_Upgrade_StealthGen
  UpgradeCameo3 = Upgrade_AmericaAdvancedTraining
  UpgradeCameo4 = Upgrade_AmericaCompositeArmor
  UpgradeCameo5 = Upgrade_AmericaHellfireDrone
  Draw = W3DOverlordTankDraw ModuleTag_593
    ExtraPublicBone = Laser
    DefaultConditionState ; = NONE
      Model = AVPal2
      Turret = Turret01
      HideSubObject = Barrel01 CRATES
      ShowSubObject = BarrelUP01 RAILGUNSTUFF
      WeaponFireFXBone = PRIMARY TurretMSUP
      WeaponRecoilBone = PRIMARY BarrelUP
      WeaponLaunchBone = PRIMARY TurretMSUP
