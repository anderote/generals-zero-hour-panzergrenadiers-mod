Object Tank_ChinaVehicleHelix
  ; *** ART Parameters ***
  SelectPortrait = SNHelix_L
  ButtonImage = SNHelix
  UpgradeCameo1 = Upgrade_HelixNapalmBomb
  UpgradeCameo2 = Upgrade_ChinaBlackNapalm
  ;UpgradeCameo4 = Upgrade_ChinaHelixGattlingCannon
  UpgradeCameo3 = Upgrade_ChinaAircraftArmor ;Upgrade_ChinaHelixPropagandaTower
  ;UpgradeCameo5 = Upgrade_ChinaHelixBattleBunker
  Draw = W3DOverlordAircraftDraw ModuleTag_01     ; Works with the dependencyModelDraw of the upgrade portable structures
    ProjectileBoneFeedbackEnabledSlots = SECONDARY
    ParticlesAttachedToAnimatedBones = Yes
    
    ; --------------------------------------
    ; -- Default = Unupgraded state --------
    ; --------------------------------------
    DefaultConditionState
      Model = NVHELIXV2
      Animation = NVHELIXV2.NVHELIXV2
      AnimationMode = LOOP
      TurretPitch = TURRETEL01
      WeaponFireFXBone = PRIMARY Muzzle
      WeaponMuzzleFlash = PRIMARY MUZZLEFX
      WeaponLaunchBone = PRIMARY Muzzle
      ;WeaponFireFXBone = SECONDARY Bomb
      ;WeaponLaunchBone = SECONDARY Bomb
      HideSubObject = BombWing Radar
    End
    ConditionState = MOVING
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End
    ConditionState = REALLYDAMAGED
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED MOVING
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End
    ConditionState = RUBBLE
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE MOVING
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End
    ConditionState = RUBBLE SPECIAL_DAMAGED
      Model = NVHELIXV2_d
    End
    ;-----------------------------------
    ;-- Gattling UP (hide Autocannon) --
    ;-----------------------------------
    ConditionState = WEAPONSET_PLAYER_UPGRADE
      HideSubObject = BombWing TURRETEL01
      ShowSubObject = Radar
    End
    ConditionState = MOVING WEAPONSET_PLAYER_UPGRADE
      HideSubObject = BombWing TURRETEL01
      ShowSubObject = Radar
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End
    ConditionState = REALLYDAMAGED WEAPONSET_PLAYER_UPGRADE
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      HideSubObject = BombWing TURRETEL01
      ShowSubObject = Radar
    End
    ConditionState = REALLYDAMAGED MOVING WEAPONSET_PLAYER_UPGRADE
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
      HideSubObject = BombWing TURRETEL01
      ShowSubObject = Radar
    End
    ConditionState = RUBBLE WEAPONSET_PLAYER_UPGRADE
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      HideSubObject = BombWing TURRETEL01
      ShowSubObject = Radar
    End
    ConditionState = RUBBLE MOVING WEAPONSET_PLAYER_UPGRADE
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
      HideSubObject = BombWing TURRETEL01
      ShowSubObject = Radar
    End
    
    ; --------------------------------------
    ; -- Bomb Upgrade ----------------------
    ; --------------------------------------
    ConditionState = WEAPONSET_CRATEUPGRADE_ONE
      HideSubObject = Radar
      ShowSubObject = BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
    End
    ConditionState = MOVING WEAPONSET_CRATEUPGRADE_ONE
      HideSubObject = Radar
      ShowSubObject = BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End
    ConditionState = REALLYDAMAGED WEAPONSET_CRATEUPGRADE_ONE
      HideSubObject = Radar
      ShowSubObject = BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
    End
    ConditionState = REALLYDAMAGED MOVING WEAPONSET_CRATEUPGRADE_ONE
      HideSubObject = Radar
      ShowSubObject = BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End
    ConditionState = RUBBLE WEAPONSET_CRATEUPGRADE_ONE
      HideSubObject = Radar
      ShowSubObject = BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
    End
    ConditionState = RUBBLE MOVING WEAPONSET_CRATEUPGRADE_ONE
      HideSubObject = Radar
      ShowSubObject = BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End
    ;-----------------------------------
    ;-- Bomb + Gattling Upgrades -------
    ;-----------------------------------
    ConditionState = WEAPONSET_PLAYER_UPGRADE WEAPONSET_CRATEUPGRADE_ONE
      HideSubObject = TURRETEL01
      ShowSubObject = Radar BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
    End
    ConditionState = MOVING WEAPONSET_PLAYER_UPGRADE WEAPONSET_CRATEUPGRADE_ONE
      HideSubObject = TURRETEL01
      ShowSubObject = Radar BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
    End
    ConditionState = REALLYDAMAGED WEAPONSET_PLAYER_UPGRADE WEAPONSET_CRATEUPGRADE_ONE
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      HideSubObject = TURRETEL01
      ShowSubObject = Radar BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
    End
    ConditionState = REALLYDAMAGED MOVING WEAPONSET_PLAYER_UPGRADE WEAPONSET_CRATEUPGRADE_ONE
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
      HideSubObject = TURRETEL01
      ShowSubObject = Radar BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
    End
    ConditionState = RUBBLE WEAPONSET_PLAYER_UPGRADE WEAPONSET_CRATEUPGRADE_ONE
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      HideSubObject = TURRETEL01
      ShowSubObject = Radar BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
    End
    ConditionState = RUBBLE MOVING WEAPONSET_PLAYER_UPGRADE WEAPONSET_CRATEUPGRADE_ONE
      Model = NVHELIXV2_d
      Animation = NVHELIXV2_d.NVHELIXV2_d
      AnimationMode = LOOP
      ParticleSysBone = SMOKE01 HelixExhaust
      ParticleSysBone = SMOKE02 HelixExhaust
      HideSubObject = TURRETEL01
      ShowSubObject = Radar BombWing
      WeaponFireFXBone = SECONDARY Bomb
      WeaponLaunchBone = SECONDARY Bomb
    End
    OkToChangeModelColor = Yes
  End
  ; ***DESIGN parameters ***
  DisplayName = OBJECT:Helix
  EditorSorting = VEHICLE
  Side = ChinaTankGeneral
  TransportSlotCount = 0     ; how many "slots" we take in a transport (0 == not transportable)
  VisionRange = 200.0
  ShroudClearingRange = 600
  BuildCost = 1400
  BuildTime = 20.0     ; in seconds
  Prerequisites
    Object = Tank_ChinaAirfield TEST_MODE
  End
  ExperienceValue = 50 100 150 200     ; Experience point value at each level
  ExperienceRequired = 0 100 200 400     ; Experience points needed to gain each level
  IsTrainable = Yes
  CommandSet = ChinaVehicleHelixCommandSet
  ArmorSet
    Conditions = None
    Armor = AirplaneArmor ;ChinookArmor
    DamageFX = None
  End
  WeaponSet
    Conditions = None
    ; ----------------------------
    Weapon = PRIMARY HelixMinigunWeapon
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
    ; -- Bombs ---
    Weapon = SECONDARY HelixNapalmBombWeapon
    AutoChooseSources = SECONDARY NONE ;FROM_PLAYER FROM_SCRIPT FROM_AI
  ; ----------------------------
  End
  WeaponSet
    Conditions = PLAYER_UPGRADE
    ; ----------------------------
    Weapon = PRIMARY HelixGattlingDummyWeapon
    PreferredAgainst = PRIMARY INFANTRY
    AutoChooseSources = PRIMARY FROM_PLAYER FROM_SCRIPT FROM_AI
    ; -- Bombs ---
    Weapon = SECONDARY HelixNapalmBombWeapon
    AutoChooseSources = SECONDARY NONE ;FROM_PLAYER FROM_SCRIPT FROM_AI
  ; ----------------------------
  End
  ; *** AUDIO Parameters ***
  VoiceSelect = HelixVoiceSelect
  VoiceMove = HelixVoiceMove
  VoiceAttack = HelixVoiceAttack
  SoundAmbient = HelixAmbientLoop
  SoundEnter = HumveeEnter
  SoundExit = HumveeExit
  UnitSpecificSounds
    VoiceCreate = HelixVoiceCreate
    VoiceUnload = HelixVoiceUnload
    VoiceGarrison = HelixVoiceMove
  End
  ; *** ENGINEERING Parameters ***
  RadarPriority = UNIT
  ; note that, although Helixes aren't produced at helipads, we want to set this KINDOF so that they can land at
  ; (well, "near" actually) an Airfield to get healed...
  KindOf = PRELOAD CAN_CAST_REFLECTIONS SELECTABLE VEHICLE HUGE_VEHICLE TRANSPORT AIRCRAFT SCORE PRODUCED_AT_HELIPAD CAN_ATTACK
  Body = ActiveBody ModuleTag_03
    MaxHealth = 500.0 ;300.0
    InitialHealth = 500.0 ;300.0
  End
  Behavior = FXListDie ModuleTag_05
    DeathFX = FX_HelicopterStartDeath
  End
  Behavior = TransitionDamageFX ModuleTag_06
    ReallyDamagedParticleSystem1 = Bone:Smoke RandomBone:Yes PSys:SmokeSmallContinuousDown
    ReallyDamagedFXList1 = Loc: X:0 Y:0 Z:0 FXList:FX_ComancheDamageTransition
  End
  Behavior = ChinookAIUpdate ModuleTag_07
    Turret
      TurretTurnRate = 0
      TurretPitchRate = 90
      AllowsPitch = Yes
      MinPhysicalPitch = -90     ; If allows pitch, the lowest I can dip down to shoot.  defaults to 0 (horizontal)
      ControlledWeaponSlots = PRIMARY ;SECONDARY
    End        
    AutoAcquireEnemiesWhenIdle = Yes
    RotorWashParticleSystem = HelixRotorWashRing
  End
  Behavior = CommandButtonHuntUpdate ModuleTag_Hunt     ; allows use of command button hunt script with this unit.
  End
  Locomotor = SET_NORMAL HelixLocomotor
  Locomotor = SET_TAXIING BasicHelicopterTaxiLocomotor
  Behavior = PhysicsBehavior ModuleTag_09
    Mass = 50.0
  End
  Behavior = HelicopterSlowDeathBehavior ModuleTag_10
    DestructionDelay = 99999999     ; the destruction delay
    SpiralOrbitTurnRate = 80.0     ; in degrees per second, bigger # = tighter spiral
    SpiralOrbitForwardSpeed = 110.0     ; bigger # = larger spiral
    SpiralOrbitForwardSpeedDamping = .9999     ; smaller #'s = slow down faster
    MaxBraking = 210     ; max braking we can use during death spiral (lower num = wilder spiral)
    SoundDeathLoop = HelixDamagedLoop
    MinSelfSpin = 40     ; in degrees per second
    MaxSelfSpin = 120     ; in degrees per second
    SelfSpinUpdateDelay = 300     ; in milliseconds
    SelfSpinUpdateAmount = 5     ; in degrees
    FallHowFast = 8.0%     ; fraction of gravity, lower = take longer to fall
    MinBladeFlyOffDelay = 1000     ; in milliseconds
    MaxBladeFlyOffDelay = 1000     ; in milliseconds
    AttachParticle = SootySmokeTrail
    AttachParticleBone = Propeller02
    BladeObjectName = HelixBlades
    BladeBoneName = Propeller01
    FXBlade = FX_HelicopterBladeExplosion
    OCLBlade = OCL_HelicopterBladeExplosion
    FXHitGround = FX_HelicopterHitGround
    OCLHitGround = OCL_HelicopterHitGround
    FXFinalBlowUp = FX_HelixHelicopterBlowUpBig
    OCLFinalBlowUp = OCL_HelixBlades
    DelayFromGroundToFinalDeath = 30
    FinalRubbleObject = HelixRubbleHull
  End
  Behavior = FlammableUpdate ModuleTag_21
    AflameDuration = 5000     ; If I catch fire, I'll burn for this long...
    AflameDamageAmount = 3     ; taking this much damage...
    AflameDamageDelay = 500     ; this often.
  End
  Behavior = ProductionUpdate ModuleTag_25
    MaxQueueEntries = 1     ; So you can't build multiple upgrades in the same frame
  End
  
   ; ---------------------------
  Behavior = SpecialAbility ModuleTag_467
    SpecialPowerTemplate = SpecialAbilityHelixNapalmBomb
    UpdateModuleStartsAttack = Yes
    StartsPaused = Yes     ; so the UnpauseSpecialPowerUpgrade, below can turn it on
    InitiateSound = HelixVoiceAttack
  End
  Behavior = SpecialAbilityUpdate ModuleTag_468
    SpecialPowerTemplate = SpecialAbilityHelixNapalmBomb
    StartAbilityRange = 3.0
    PreparationTime = 0
    SpecialObject = HelixNapalmBombSpawner
    MaxSpecialObjects = 1
    SpecialObjectsPersistWhenOwnerDies = Yes
    SpecialObjectsPersistent = Yes     ; Charges are persistent till lifetime expires or owner detonates them.
    UniqueSpecialObjectTargets = No     ; This would prevent multiple charges placed on the same object.
    UnpackTime = 500     ; slight delay to drop bomb
    FlipOwnerAfterUnpacking = No
    FleeRangeAfterCompletion = 0.0     ; DOes not run away after finishing ability
    UnpackSound = NoSound
    LoseStealthOnTrigger = No
    ApproachRequiresLOS = No     ; we are a helicopter, we can see everything
    NeedToFaceTarget = No     ; can drop the bomb at any angle to target
    PersistentPrepTime = 100
    PersistenceRequiresRecharge = Yes
  End
  Behavior = UnpauseSpecialPowerUpgrade ModuleTag_469
    SpecialPowerTemplate = SpecialAbilityHelixNapalmBomb
    TriggeredBy = Upgrade_HelixNapalmBomb
  End
  
  ;---------------------------
  ; Gattling Cannon
  ; --------------------------
  Behavior = ObjectCreationUpgrade ModuleTag_22
    UpgradeObject = OCL_HelixGattlingCannon
    TriggeredBy = Upgrade_ChinaHelixGattlingCannon
    ConflictsWith = Upgrade_ChinaHelixPropagandaTower Upgrade_ChinaHelixBattleBunker
  End
  Behavior = WeaponSetUpgrade ModuleTag_35
    TriggeredBy = Upgrade_ChinaHelixGattlingCannon
    ConflictsWith = Upgrade_ChinaHelixPropagandaTower Upgrade_ChinaHelixBattleBunker
  End
  Behavior = CommandSetUpgrade ModuleTag_26
    CommandSet = ChinaHelixGattlingCannonCommandSet
    TriggeredBy = Upgrade_ChinaHelixGattlingCannon
    ConflictsWith = Upgrade_ChinaHelixPropagandaTower Upgrade_ChinaHelixBattleBunker
  End
 
  ; ---
  
  ;---------------------------
  ; Propaganda Tower
  ; --------------------------
  Behavior = ObjectCreationUpgrade ModuleTag_23
    UpgradeObject = OCL_HelixPropagandaTower
    TriggeredBy = Upgrade_ChinaHelixPropagandaTower
    ConflictsWith = Upgrade_ChinaHelixGattlingCannon Upgrade_ChinaHelixBattleBunker
  End
  Behavior = CommandSetUpgrade ModuleTag_27
    CommandSet = ChinaHelixPropagandaTowerCommandSet
    TriggeredBy = Upgrade_ChinaHelixPropagandaTower
    ConflictsWith = Upgrade_ChinaHelixGattlingCannon Upgrade_ChinaHelixBattleBunker
  End
  ; ---
  
  ;---------------------------
  ; Bunker
  ; --------------------------
  Behavior = ObjectCreationUpgrade ModuleTag_24
    UpgradeObject = OCL_HelixBattleBunker
    TriggeredBy = Upgrade_ChinaHelixBattleBunker
    ConflictsWith = Upgrade_ChinaHelixGattlingCannon Upgrade_ChinaHelixPropagandaTower
  End
  Behavior = PassengersFireUpgrade ModuleTag_34
    TriggeredBy = Upgrade_ChinaHelixBattleBunker
    ConflictsWith = Upgrade_ChinaHelixGattlingCannon Upgrade_ChinaHelixPropagandaTower
  End
  Behavior = CommandSetUpgrade ModuleTag_28
    CommandSet = ChinaHelixBattleBunkerCommandSet
    TriggeredBy = Upgrade_ChinaHelixBattleBunker
    ConflictsWith = Upgrade_ChinaHelixGattlingCannon Upgrade_ChinaHelixPropagandaTower
  End
  
  
  
  Behavior = MaxHealthUpgrade ModuleTag_JetArmor
    TriggeredBy = Upgrade_ChinaAircraftArmor
    AddMaxHealth = 125.0 ;+25% (500)
    ChangeType = ADD_CURRENT_HEALTH_TOO     ; Choices are PRESERVE_RATIO, ADD_CURRENT_HEALTH_TOO, and SAME_CURRENTHEALTH
  End
  ; --- 
  Behavior = HelixContain ModuleTag_29
    Slots = 6
    DamagePercentToUnits = 100%
    AllowInsideKindOf = INFANTRY VEHICLE PORTABLE_STRUCTURE
    ForbidInsideKindOf = AIRCRAFT
    ExitDelay = 100
    NumberOfExitPaths = 1
    PassengersAllowedToFire = No     ; the
    WeaponBonusPassedToPassengers = Yes
  End
  Behavior = GrantUpgradeCreate ModuleTag_FP1
    UpgradeToGrant = Upgrade_CostReduction
  End
  Behavior = WeaponBonusUpgrade ModuleTag_FP2
    TriggeredBy = Upgrade_CostReduction
  End
  ;Behavior = SubObjectsUpgrade ModuleTag_39
  ;  TriggeredBy = Upgrade_HelixNapalmBomb
  ;  ShowSubObjects = BombWing
  ;End
  Behavior = ModelConditionUpgrade ModuleTag_39b
    ConditionFlag = WEAPONSET_CRATEUPGRADE_ONE
    TriggeredBy = Upgrade_HelixNapalmBomb
  End
  Geometry = CYLINDER
  GeometryMajorRadius = 35.0
  GeometryHeight = 30.0
  GeometryIsSmall = No
  Shadow = SHADOW_VOLUME
  ShadowSizeX = 89     ; minimum elevation angle above horizon. Used to limit shadow length
End
