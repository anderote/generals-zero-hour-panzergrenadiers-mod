Object SalvageCrateHugeCollide
  ; *** ART Parameters ***
  Draw = W3DScienceModelDraw ModuleTag_01
    RequiredScience = SCIENCE_GLA ; Only GLA players and observers can see us.
    DefaultConditionState
      Model = PMJnkCrate
    End
  End

  ; ***DESIGN parameters ***
  EditorSorting   = MISC_MAN_MADE

  ; *** ENGINEERING Parameters ***  
  KindOf = PARACHUTABLE SELECTABLE ;Only Salvage crates are marked Selectable so the Mouse can interact with them and give Salvage voices.  Being dead makes them not actually selectable
  
  Behavior = SalvageCrateCollide ModuleTag_02
    ForbiddenKindOf = PROJECTILE INFANTRY
    PickupScience = SCIENCE_GLA   ; Only GLA players can pick this up (Draw module makes it so only they can see it)
    ;ExecuteFX = FX_CratePickup    ; FXList to play when sucessfully picked up

    WeaponChance = 50%           ; If we are WeaponSalvager, this is the chance we get a WeaponSet upgrade if not fully upgraded
    LevelChance = 0%             ; Either we are just a regular Salvager, or we are fully upgraded.  This is the chance we gain a level
    MoneyChance = 100%             ; And this is the chance we get money.  Level + Money = 100%.  Weapon is an idependant FirstChance
    MinMoney = 5                 ; If we get money, this is how much we get.  Make them different to get a random range.
    MaxMoney = 5
  End      

  Behavior = DeletionUpdate ModuleTag_03 ; Not LifetimeUpdate, since I can't die.  This will DestroyObject me. 
    MinLifetime = 50   
    MaxLifetime = 50   
  End

  ;Geometry = BOX
  ;GeometryMajorRadius = 150.0
  ;GeometryMinorRadius = 150.0
  ;GeometryHeight = 12.0     
  ;GeometryIsSmall = Yes
  Geometry = Cylinder     ; Since collision extents can't tilt, this is a little fake
  GeometryMajorRadius = 150.0
  GeometryHeight = 20.0
  GeometryIsSmall = No ;Yes
  Shadow          = SHADOW_VOLUME

End

