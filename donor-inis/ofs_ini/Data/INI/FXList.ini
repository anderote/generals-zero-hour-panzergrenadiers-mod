    Name = TankStruckLenzflare
    Height = 10 10 CONSTANT
  End
  LightPulse 
    Color = R:255 G:255 B:128 
    Radius = 30 
    IncreaseTime = 0 
    DecreaseTime = 500
  End
  Sound
    Name = VehicleImpactHeavy
  End
End

