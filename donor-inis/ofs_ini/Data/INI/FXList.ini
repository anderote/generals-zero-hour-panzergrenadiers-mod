FXList WeaponFX_GenericTankGunNoTracerLarge
  ViewShake 
    Type = NORMAL
  End
  LightPulse 
    Color = R:255 G:255 B:196
    Radius = 45 
    IncreaseTime = 0 
    DecreaseTime = 500
  End
  ParticleSystem
    Name = LargeTankGunMuzzleFire
    OrientToObject = Yes
  End
  ParticleSystem
    Name = LargeTankGunMuzzleSparks
    OrientToObject = Yes
  End
  ParticleSystem
    Name = LargeTankGunMuzzleSmoke
    OrientToObject = Yes
  End
  ParticleSystem
    Name = LargeTankGunMuzzleFlare
    OrientToObject = Yes
  End
  ParticleSystem
    Name = LargeTankGunDustWave
    OrientToObject = Yes
    CreateAtGroundHeight = Yes
  End
  ParticleSystem
    Name = TankMuzzleWave
    OrientToObject = Yes
    CreateAtGroundHeight = Yes
  End
  ParticleSystem
    Name = LargeTankGunMuzzleSmokeLeft
    OrientToObject = Yes
  End
  ParticleSystem
    Name = LargeTankGunMuzzleSmokeRight
    OrientToObject = Yes
  End
  Tracer  
    TracerName = MuzzleFX_GenericTankLarge
    Speed = 400
  End
  Sound
    Name = GenericTankGunEchoHuge
  End
End

