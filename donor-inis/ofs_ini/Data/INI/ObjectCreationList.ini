ObjectCreationList OCL_CreateDamagedBarrel
  CreateDebris
    ModelNames = PMBarrel01_D1
    Offset = X:0 Y:0 Z:0
    Mass = 2
    Count = 1
    Disposition = RANDOM_FORCE
    MinForceMagnitude = 5
    MaxForceMagnitude = 7
    SpinRate = 180
    MinForcePitch = 75
    MaxForcePitch = 90
    ParticleSystem = BlackTrail
  End
End

