ObjectCreationList OCL_Starstreak_DeathEffect
  CreateObject
    ObjectNames = DeadStarstreakHulk
    Offset = X:0 Y:0 Z:0
    Count = 1
    Disposition = SEND_IT_FLYING
    DispositionIntensity = 0.1
  End
  
  ;Wheels
  CreateDebris
    ModelNames = AVRepairAPC_D2
    Offset = X:0.25 Y:-6.0 Z:2.0
    Mass = 5.0
    Count = 1
    Disposition = SEND_IT_FLYING RANDOM_FORCE
    DispositionIntensity = 2.1
    Shadow = SHADOW_VOLUME
    BounceSound    = VehicleDebris
  End
  CreateDebris
    ModelNames = AVRepairAPC_D2
    Offset = X:10.0 Y:5.0 Z:2.0
    Mass = 5.0
    Count = 1
    Disposition = SEND_IT_FLYING RANDOM_FORCE
    DispositionIntensity = 2.5
    Shadow = SHADOW_VOLUME
    BounceSound    = VehicleDebris
  End

