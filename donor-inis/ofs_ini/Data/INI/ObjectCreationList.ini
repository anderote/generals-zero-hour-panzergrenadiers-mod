ObjectCreationList OCL_SecW_SUPERWEAPON_MeteorStrike

  Attack
    WeaponSlot = SECONDARY
    NumberOfShots = 1
  End

  ;Small Meteors
  DeliverPayload
    Transport                       = ChinaArtilleryCannon
    FormationSize                   = 8
    FormationSpacing                = 1.0
    StartAtPreferredHeight          = Yes
    StartAtMaxSpeed                 = Yes
    MaxAttempts                     = 1                   ;max attempts
    DeliveryDistance                = 150                 ;distance from target allowed to start/stop dropping.
    WeaponErrorRadius               = 250                 ; how bad the artillerist is
    DelayDeliveryMax                = 7500                ; his delayed reaction to "Fire!"
    VisibleItemsDroppedPerInterval  = 1                   ;Drops two bombs at a time
    VisibleDropBoneBaseName         = RootTransform       ;The bombs are created and dropped at this bone base
    VisibleSubObjectBaseName        = Bomb                ;The bombs are visible until dropped.
    VisibleNumBones                 = 1                   ;Number of bones.
    VisiblePayloadTemplateName      = MeteorStrikeProjectileSmall  ;Created when payload is dropped.
    VisiblePayloadWeaponTemplate    = MeteorStrikeLaunchWeaponSmall
    InheritTransportVelocity        = Yes                 ;The bombs will start at transport velocity.
    ExitPitchRate                   = 45                  ;The bomb will pitch down.
    SelfDestructObject              = Yes                 ; so the delivery vehicle goes away 'POP!'
    PreOpenDistance                 = 300
    DeliveryDecalRadius = 210
    DeliveryDecal
      Texture           = SCCA10Strike_USA
      Style             = SHADOW_ALPHA_DECAL
      OpacityMin        = 25%
      OpacityMax        = 50%
      OpacityThrobTime  = 500
      Color             = R:255 G:156 B:0 A:255 
      OnlyVisibleToOwningPlayer = Yes
    End
  End
  
  ;Medium Meteors
  DeliverPayload
    Transport                       = ChinaArtilleryCannon
    FormationSize                   = 4
    FormationSpacing                = 1.0
    StartAtPreferredHeight          = Yes
    StartAtMaxSpeed                 = Yes
    MaxAttempts                     = 1                   ;max attempts
    DeliveryDistance                = 300                 ;distance from target allowed to start/stop dropping.
    WeaponErrorRadius               = 200                 ; how bad the artillerist is
    DelayDeliveryMax                = 5000                ; his delayed reaction to "Fire!"
    VisibleItemsDroppedPerInterval  = 1                   ;Drops two bombs at a time
    VisibleDropBoneBaseName         = RootTransform       ;The bombs are created and dropped at this bone base
    VisibleSubObjectBaseName        = Bomb                ;The bombs are visible until dropped.
    VisibleNumBones                 = 1                   ;Number of bones.
    VisiblePayloadTemplateName      = MeteorStrikeProjectileMedium  ;Created when payload is dropped.
    VisiblePayloadWeaponTemplate    = MeteorStrikeLaunchWeaponMedium
    InheritTransportVelocity        = Yes                 ;The bombs will start at transport velocity.
    ExitPitchRate                   = 45                  ;The bomb will pitch down.
    SelfDestructObject              = Yes                 ; so the delivery vehicle goes away 'POP!'
    PreOpenDistance                 = 150
  End
  
  ;Large Meteor
  DeliverPayload
    Transport                       = ChinaArtilleryCannon
    FormationSize                   = 1
    FormationSpacing                = 1.0
    StartAtPreferredHeight          = Yes
    StartAtMaxSpeed                 = Yes
    MaxAttempts                     = 1                   ;max attempts
    DeliveryDistance                = 450                 ;distance from target allowed to start/stop dropping.
    WeaponErrorRadius               = 0                 ; how bad the artillerist is
    DelayDeliveryMax                = 5000                ; his delayed reaction to "Fire!"
    VisibleItemsDroppedPerInterval  = 1                   ;Drops two bombs at a time
    VisibleDropBoneBaseName         = RootTransform       ;The bombs are created and dropped at this bone base
    VisibleSubObjectBaseName        = Bomb                ;The bombs are visible until dropped.
    VisibleNumBones                 = 1                   ;Number of bones.
    VisiblePayloadTemplateName      = MeteorStrikeProjectileLarge  ;Created when payload is dropped.
    VisiblePayloadWeaponTemplate    = MeteorStrikeLaunchWeaponLarge
    InheritTransportVelocity        = Yes                 ;The bombs will start at transport velocity.
    ExitPitchRate                   = 45                  ;The bomb will pitch down.
    SelfDestructObject              = Yes                 ; so the delivery vehicle goes away 'POP!'
  End
  

End
